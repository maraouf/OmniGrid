version: "3.8"
services:
  omnigrid:
    image: python:3.12-slim
    # Persistent pip cache (see the extra volume below) so restarts don't
    # re-download the dependency tree every time. Upgrading pip first makes
    # the cache-hit check faster on modern indexes.
    command: >
      sh -c "pip install --cache-dir=/pip-cache --root-user-action=ignore --upgrade pip &&
             pip install --cache-dir=/pip-cache --root-user-action=ignore -r /app/requirements.txt &&
             cd /app &&
             exec uvicorn main:app --host 0.0.0.0 --port 8088 --workers 1"
    ports:
      - "9500:8088"

    # Every tunable — including DB_PATH — lives in `.env` at the repo
    # root and ships via CI rsync to /opt/omnigrid/app/.env. main.py
    # loads that file via python-dotenv at startup (already visible
    # inside the container at /app/.env thanks to the bind mount below).
    # We deliberately don't use Compose's `env_file:` because Portainer's
    # web-editor stacks can't resolve relative paths (they'd look in
    # /data/compose/<stack-id>/ inside Portainer's container). Letting
    # the app read its own file sidesteps that entirely — and keeps the
    # compose file free of service-level config.

    # Container timezone. Python's zoneinfo module reads /etc/localtime,
    # but the python:3.12-slim base image ships with UTC and tzdata
    # isn't guaranteed to be present. Setting TZ here makes
    # `time.localtime()` + the scheduler's `scheduler_timezone` default
    # align with the operator's wall clock instead of UTC. Change this
    # to match wherever the operator physically runs OmniGrid from.
    environment:
      - TZ=Africa/Cairo

    volumes:
      - /opt/omnigrid/app:/app:ro             # source code (read-only, hot-reload with a container restart)
      # Per-file writable bind for VERSION.txt — Docker layers nested binds
      # path-most-specific-wins, so this stays writable even though the
      # parent /app mount is :ro. The deploy pipeline writes here from
      # the host (pi-user SSH); Admin → Version writes here from inside
      # the container. Both writers target the same path; whoever writes
      # last wins. open()-and-truncate preserves the inode + host owner
      # so cross-writer permission flips don't strand either side.
      - /opt/omnigrid/app/VERSION.txt:/app/VERSION.txt
      - /opt/omnigrid/data:/app/data          # database for history / ignores / settings / users / sessions (SQLite today; more backends planned)
      - /opt/omnigrid/pip-cache:/pip-cache    # persistent pip cache across restarts
      - /etc/ssl/certs:/etc/ssl/certs:ro      # trust your internal CA so HTTPS calls to portainer.example.com work
      - /etc/localtime:/etc/localtime:ro      # belt-and-braces for TZ — libc functions that bypass $TZ still see the right zone

    networks:
      - nginx-proxy-manager_default
      - default

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8088/api/healthz',timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      # Zero-downtime rolling update. `start-first` boots the new task and
      # waits for its healthcheck to pass before the old one is stopped,
      # which also cuts the CI verify step's waiting time down to the
      # healthcheck warm-up instead of a stop → start round-trip.
      update_config:
        parallelism: 1
        delay: 0s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 0s
        order: start-first

networks:
  nginx-proxy-manager_default:
    external: true
    name: nginx-proxy-manager_default
