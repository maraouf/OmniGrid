version: "3.8"
services:
  omnigrid:
    # Built from the in-tree Dockerfile by the deploy pipeline on the
    # Swarm manager AND pushed to Forgejo's container registry on
    # every successful build. The pipeline sets `OMNIGRID_IMAGE`
    # in the runner env to the registry path
    # (`<REGISTRY_HOST>/<NAMESPACE>/<IMAGE>:latest`) before
    # `docker stack deploy`, and `${OMNIGRID_IMAGE:-omnigrid:latest}`
    # below resolves to that registry path. The default (`omnigrid:latest`,
    # placeholder hostname for hostname-scrub compliance — the registry
    # path lives in CI vars, not the committed compose file) lets a
    # manual `docker compose up` on a dev machine still find a local
    # build. Each task is pinned to the exact version tag via the
    # pipeline's `docker service update --force --image
    # <REG_PATH>:<version>` step so rollbacks point at a discrete tag.
    image: ${OMNIGRID_IMAGE:-omnigrid:latest}
    ports:
      - "9500:8088"

    # Container timezone. Python's zoneinfo module reads /etc/localtime,
    # but the python:3.14-slim base ships UTC and tzdata isn't
    # guaranteed. Setting TZ here makes `time.localtime()` and the
    # scheduler's `scheduler_timezone` default align with the operator's
    # wall clock instead of UTC. Match this to wherever OmniGrid runs.
    environment:
      - TZ=Africa/Cairo

    # Raw socket capability — ONLY required for the Ping host-stats
    # provider's optional ICMP transport. icmplib needs
    # CAP_NET_RAW to open SOCK_RAW; without it every ICMP probe raises
    # SocketPermissionError and logic/ping.py falls back to TCP-connect
    # at probe time (still functional, just no ICMP). Granting NET_RAW
    # only marginally widens attack surface because the container
    # already runs as root via python:3.14-slim's default user; if
    # you ever switch to a non-root image, drop this and add `user: 0`
    # only where required.
    cap_add:
      - NET_RAW

    volumes:
      # Database, avatars, asset_inventory cache, persistent logs, etc.
      # Bind-mount so a `docker stack rm` doesn't lose state.
      - /opt/omnigrid/data:/app/data

      # Secrets / config. Read by main.py via python-dotenv at startup
      # (logic/auth.py + logic/portainer.py read DB-backed settings
      # but the .env still carries SESSION_SECRET, BOOTSTRAP_*, and
      # any process-level overrides). Per-file bind, read-only.
      - /opt/omnigrid/app/.env:/app/.env:ro

      # Trust the host's CA bundle so HTTPS calls to internal CAs
      # (portainer.example.com et al.) don't have to set VERIFY_TLS=false.
      - /etc/ssl/certs:/etc/ssl/certs:ro

      # Belt-and-braces for TZ — libc functions that bypass $TZ still
      # see the right zone by reading /etc/localtime directly.
      - /etc/localtime:/etc/localtime:ro

      # Bypass Docker's embedded DNS resolver (127.0.0.11) and use the
      # host's DNS configuration directly. The user runs the same
      # bind-mount on other stacks in this fleet; without it, Docker's
      # embedded resolver was producing intermittent `ConnectTimeout`
      # against internal hostnames the host's resolver finds fine.
      # CAVEAT: if the host runs systemd-resolved (resolv.conf points
      # at 127.0.0.53 stub), DNS inside the container would route to
      # the container's own loopback and fail — verified non-issue on
      # this fleet. Same caveat applies to any future deployment that
      # adopts this stack file.
      # - /etc/resolv.conf:/etc/resolv.conf:ro

    networks:
      - omnigrid

    healthcheck:
      # Tolerant on purpose: /api/healthz is a trivial in-memory response, so
      # it only fails when the single event loop is momentarily blocked (the
      # samplers + gather hit SQLite synchronously on the loop). The urllib
      # timeout rides out a transient stall; docker's timeout sits above it.
      # On a large fleet (172+ hosts) a sampler burst can momentarily delay
      # the loop for several seconds at a time as per-host sync SQLite writes
      # serialize through the single connection, even with WAL + busy_timeout.
      # The widened timeouts here cover that bursty pattern; retries x
      # interval still gives a meaningful "sustained unresponsiveness" window
      # before kill. Pre-fix (8s urllib / 10s docker / 5 retries) flapped on
      # large fleets where the host_baseline tick + gather worker-node
      # ConnectTimeouts coincided with a healthcheck window.
      test: [ "CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8088/api/healthz',timeout=20)" ]
      interval: 30s
      timeout: 25s
      retries: 8
      start_period: 180s

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      # CPU + memory reservations / limits. Operator-flagged 2026-05-10
      # after observing OmniGrid pinned at 100% CPU on the host.
      # Default (no resources block) lets the container use ALL host
      # CPUs unbounded, so a busy gather + sampler tick + registry-
      # digest fan-out can saturate one core and visually read as
      # "100%". Adding an EXPLICIT reservation guarantees the kernel
      # gives OmniGrid the CPU it needs even under contention from
      # neighbouring services; the LIMIT keeps a runaway loop
      # (e.g. an AI prompt that triggers an infinite refetch) from
      # starving the manager. Tune both up if the host has more
      # headroom — `cpus: '4.0'` / `memory: 4G` is reasonable on a
      # 16-core / 32G manager.
      resources:
        reservations:
          # Guaranteed minimum — Swarm scheduler refuses to place the
          # task on a node without this much free. Memory bumped from
          # 512M → 1G after operator observed the live process
          # holding ~520MB steady-state (sampler tables + Beszel hub
          # batch maps + AI conversation cache); 512M was right at
          # the cap and any growth pushed us into reservation
          # underrun territory.
          cpus: '2.0'
          memory: 1G
        limits:
          # Burst ceiling. The Python process is single-threaded for
          # the GIL-bound work but offloads sampler I/O + httpx fan-
          # out to the event loop, so 4 CPU = ~400% in `top` is the
          # practical ceiling. Raised from 2.0 → 4.0 on
          # operator request after the unbounded-default observed at
          # 100% CPU on a busy gather + sampler tick + registry-digest
          # fan-out cycle.
          cpus: '4.0'
          memory: 2G
      # Zero-downtime rolling update. `start-first` boots the new task
      # and waits for its healthcheck before stopping the old one,
      # cutting CI verify time from a stop→start round-trip down to
      # the healthcheck warm-up.
      update_config:
        parallelism: 1
        delay: 0s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 0s
        order: start-first

networks:
  # Stack-internal overlay. Reverse proxies (NPM / Traefik) reach the
  # service via the published host port (9500:8088 above) — no shared
  # external network needed. If you later want NPM to talk container-
  # to-container, attach NPM to this network with
  #   `docker network connect <stack>_omnigrid <npm-container>` or
  # add the same `external: true` block to NPM's compose.
  omnigrid:
    driver: overlay
    attachable: true
