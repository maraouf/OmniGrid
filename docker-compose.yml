version: "3.8"
services:
  portaupdate:
    image: python:3.12-slim
    # Persistent pip cache (see the extra volume below) so restarts don't
    # re-download the dependency tree every time. Upgrading pip first makes
    # the cache-hit check faster on modern indexes.
    command: >
      sh -c "pip install --cache-dir=/pip-cache --root-user-action=ignore --upgrade pip &&
             pip install --cache-dir=/pip-cache --root-user-action=ignore -r /app/requirements.txt &&
             cd /app &&
             exec uvicorn main:app --host 0.0.0.0 --port 8088 --workers 1"
    ports:
      - "9500:8088"

    # All secrets and per-host tunables live in `.env` at the repo root and
    # ship via CI rsync to /opt/portaupdate/app/.env. The repo is private, so
    # secrets-in-git is acceptable here; the alternative (server-side-only
    # .env) adds one-off operator steps and gets out-of-sync with the code.
    # Reference: notes/notes_env_example.txt for every key PortaUpdate reads.
    env_file:
      - ./app/.env

    environment:
      # Fixed path inside the container — kept out of .env because it's not
      # something the operator would ever need to override per-host.
      DB_PATH: "/app/data/portaupdate.db"

    volumes:
      - /opt/portaupdate/app:/app:ro          # source code (read-only, hot-reload with a container restart)
      - /opt/portaupdate/data:/app/data       # SQLite for history / ignores / settings / users / sessions
      - /opt/portaupdate/pip-cache:/pip-cache # persistent pip cache across restarts
      - /etc/ssl/certs:/etc/ssl/certs:ro      # trust your internal CA so HTTPS calls to portainer.home.lan work

    networks:
      - nginx-proxy-manager_default
      - default

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8088/api/healthz',timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      # Zero-downtime rolling update. `start-first` boots the new task and
      # waits for its healthcheck to pass before the old one is stopped,
      # which also cuts the CI verify step's waiting time down to the
      # healthcheck warm-up instead of a stop → start round-trip.
      update_config:
        parallelism: 1
        delay: 0s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 0s
        order: start-first

networks:
  nginx-proxy-manager_default:
    external: true
    name: nginx-proxy-manager_default
