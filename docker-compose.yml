version: "3.8"
services:
  omnigrid:
    # Built from the in-tree Dockerfile by the deploy pipeline on the
    # Swarm manager. The pipeline tags both `omnigrid:latest` and
    # `omnigrid:<version>`; this file references `:latest` so the
    # compose-spec stays static across deploys, while the pipeline's
    # `docker service update --force --image omnigrid:<version>` step
    # pins each task to the exact version-tagged image (so rollbacks
    # have a discrete tag to point at).
    image: omnigrid:latest
    ports:
      - "9500:8088"

    # Container timezone. Python's zoneinfo module reads /etc/localtime,
    # but the python:3.12-slim base ships UTC and tzdata isn't
    # guaranteed. Setting TZ here makes `time.localtime()` and the
    # scheduler's `scheduler_timezone` default align with the operator's
    # wall clock instead of UTC. Match this to wherever OmniGrid runs.
    environment:
      - TZ=Africa/Cairo

    # Raw socket capability — ONLY required for the Ping host-stats
    # provider's optional ICMP transport (#343). icmplib needs
    # CAP_NET_RAW to open SOCK_RAW; without it every ICMP probe raises
    # SocketPermissionError and logic/ping.py falls back to TCP-connect
    # at probe time (still functional, just no ICMP). Granting NET_RAW
    # only marginally widens attack surface because the container
    # already runs as root via python:3.12-slim's default user; if
    # you ever switch to a non-root image, drop this and add `user: 0`
    # only where required.
    cap_add:
      - NET_RAW

    volumes:
      # Database, avatars, asset_inventory cache, persistent logs, etc.
      # Bind-mount so a `docker stack rm` doesn't lose state.
      - /opt/omnigrid/data:/app/data

      # Secrets / config. Read by main.py via python-dotenv at startup
      # (logic/auth.py + logic/portainer.py read DB-backed settings
      # but the .env still carries SESSION_SECRET, BOOTSTRAP_*, and
      # any process-level overrides). Per-file bind, read-only.
      - /opt/omnigrid/app/.env:/app/.env:ro

      # Trust the host's CA bundle so HTTPS calls to internal CAs
      # (portainer.example.com et al.) don't have to set VERIFY_TLS=false.
      - /etc/ssl/certs:/etc/ssl/certs:ro

      # Belt-and-braces for TZ — libc functions that bypass $TZ still
      # see the right zone by reading /etc/localtime directly.
      - /etc/localtime:/etc/localtime:ro

    networks:
      - omnigrid

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8088/api/healthz',timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      # Zero-downtime rolling update. `start-first` boots the new task
      # and waits for its healthcheck before stopping the old one,
      # cutting CI verify time from a stop→start round-trip down to
      # the healthcheck warm-up.
      update_config:
        parallelism: 1
        delay: 0s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 0s
        order: start-first

networks:
  # Stack-internal overlay. Reverse proxies (NPM / Traefik) reach the
  # service via the published host port (9500:8088 above) — no shared
  # external network needed. If you later want NPM to talk container-
  # to-container, attach NPM to this network with
  #   `docker network connect <stack>_omnigrid <npm-container>` or
  # add the same `external: true` block to NPM's compose.
  omnigrid:
    driver: overlay
    attachable: true
