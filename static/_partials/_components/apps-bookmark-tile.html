<!-- Bookmark (external link) tile for the Custom Apps board. Bound inside
     `<template x-for="item in sec.items">`, so `item` (kind='bookmark') and
     `sec` are in scope, as is `appsCustomEditMode`. Pure-frontend on the
     ui_prefs layout blob. In LOCKED mode it's a real <a> link opening in a
     new tab; in EDIT mode the href is dropped, the tile is draggable, and a
     remove button appears.

     Layout mirrors the app card (apps-card.html): a logo block on the
     leading edge, a flex-1 text column (larger name + url subtitle), and a
     trailing action stack with the settings gear pill at the TOP — so a
     bookmark sitting next to an app card / widget reads as the same kind of
     card (operator-flagged: name too small, gear not at top, no hover). -->
<!--suppress HtmlUnknownAttribute -->
<a class="apps-bookmark-tile apps-card border border-[var(--border)] rounded-md p-3 cursor-pointer flex items-start gap-3"
   :class="'apps-card--up'"
   :href="appsCustomEditMode ? null : (item.url || null)"
   :target="appsCustomEditMode ? null : '_blank'" rel="noopener"
   :draggable="appsCustomEditMode ? 'true' : 'false'"
   :aria-label="(item.name || appsBookmarkHost(item.url)) + (item.url ? (' — ' + item.url) : '')"
   @dragstart="appsCustomEditMode ? appsItemDragStart($event, item.uid) : null"
   @dragover.prevent
   @drop.stop="appsCustomEditMode ? appsTileDrop(sec.id, item.uid) : null"
   @click="appsCustomEditMode ? $event.preventDefault() : null">
  <!-- Open launch glyph — pinned to the BOTTOM-RIGHT corner of the tile
       (operator-flagged: not bottom-left, not below the gear). NOT a pill —
       a clean borderless primary-tinted glyph with a circular hover halo
       that reads as "this opens in a new tab" without heavy CTA chrome.
       Absolutely positioned via `.apps-bookmark-tile .apps-card-open-glyph`
       so it anchors to the corner regardless of the row flow. aria-hidden:
       the enclosing <a> carries the link role + accessible name. -->
  <span x-show="!appsCustomEditMode" class="apps-card-open-glyph" aria-hidden="true">
    <svg width="15" height="15" aria-hidden="true">
      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-external-link"/>
    </svg>
  </span>
  <!-- Logo block — same tinted backdrop slot the app card uses, so the
       brand icon reads as deliberate composition. Falls back to a
       link-glyph when no icon resolves (a bookmark may have no brand
       match), instead of leaving an empty gap. -->
  <div class="apps-card-logo">
    <!-- The brand <img> renders UNCONDITIONALLY (no x-if gate) so any
         resolvable icon shows; on a genuine load failure the @error
         handler hides the img + reveals the fallback link glyph. The
         earlier x-if gate caused the icon to vanish whenever the
         resolver returned a falsy-at-first-eval value (operator-flagged:
         ftth / 5g slugs not rendering). `x-show` keeps the img element
         present so @error can fire. The `:key` rebinds the img when the
         resolved URL changes (icon edit) so a previously-errored img
         re-attempts the new URL. -->
    <img :src="appsBookmarkIconUrl(item)" alt=""
         x-show="!_bookmarkIconBroken[item.uid]"
         @error="_bookmarkIconBroken[item.uid] = true"
         @load="_bookmarkIconBroken[item.uid] = false">
    <!-- Fallback link glyph — shown only when the img has no src OR the
         resolved file failed to load. -->
    <svg width="24" height="24" aria-hidden="true"
         x-show="!appsBookmarkIconUrl(item) || _bookmarkIconBroken[item.uid]"
         class="text-[var(--text-faint)]">
      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-link"/>
    </svg>
  </div>
  <div class="flex-1 min-w-0">
    <h3 class="apps-card-name truncate" x-text="item.name || appsBookmarkHost(item.url)"></h3>
    <div class="apps-card-meta truncate" x-text="appsBookmarkHost(item.url)"></div>
  </div>
  <!-- Action stack — gear pill (top), matching apps + widgets; the
       edit-mode remove button sits below it. The open-in-new-tab glyph
       moved to the leading edge (see top of the tile). -->
  <div class="flex flex-col items-stretch gap-1 flex-shrink-0">
    <button type="button"
            class="apps-card-action-pill whitespace-nowrap"
            @click.stop.prevent="toggleAppsCardFlipped(item.uid)"
            :aria-pressed="appsCardIsFlipped(item.uid) ? 'true' : 'false'"
            :title="t('apps.custom.gear_title') || 'Card settings'"
            :aria-label="t('apps.custom.gear_aria') || 'Card settings'">
      <svg width="11" height="11" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-settings"/>
      </svg>
    </button>
    <button type="button" x-show="appsCustomEditMode"
            class="apps-card-action-pill apps-card-action-pill--danger whitespace-nowrap"
            @click.stop.prevent="removeAppsItem(sec.id, item.uid)"
            :aria-label="t('apps.custom.remove_tile') || 'Remove tile'"
            :title="t('apps.custom.remove_tile') || 'Remove tile'">
      <svg width="11" height="11" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash-2"/>
      </svg>
    </button>
  </div>
</a>
