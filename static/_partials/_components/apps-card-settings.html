<!-- Shared apps-card back-face settings pane (flip-side of the gear
     button). Renders inside `.apps-card-face-back` when the card is
     flipped. Universal controls (card-size radio) at the top; the
     widget-specific blocks below self-gate via `<template x-if>` so
     only the matching widget's settings render.

     Expected scope: `item` (the rendered Custom-layout item view-
     model from `_buildAppsCustom`) — `{uid, kind, opts, ...}`. Calls
     `setAppsItemOpt(uid, key, value)` for every binding so each edit
     persists immediately via the existing ui_prefs.apps_custom_layout
     channel; no explicit Save button needed (the back face IS the
     control surface). -->
<!--suppress HtmlUnknownAttribute -->
<div class="apps-card-settings-pane">

  <!-- Header — title + close button -->
  <div class="flex items-center justify-between mb-2">
    <span class="apps-card-settings-label"
          x-text="t('apps.custom.settings.title') || 'Card settings'"></span>
    <button type="button" class="apps-card-gear"
            @click.stop="closeAppsCardFlipped(item.uid)"
            :title="t('actions.close') || 'Close'"
            :aria-label="t('actions.close') || 'Close'">
      <svg width="14" height="14" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-x"/>
      </svg>
    </button>
  </div>

  <!-- ============================================================
       Universal: card size (every card type — apps + widgets +
       bookmarks). Three-radio shape so the operator sees all options
       at once without having to drag a slider or cycle a button.
       ============================================================ -->
  <div class="apps-card-settings-row">
    <span class="apps-card-settings-label"
          x-text="t('apps.custom.settings.size_label') || 'Size'"></span>
    <div class="inline-flex gap-1" role="radiogroup" @keydown="_radiogroupArrowKey($event)"
         :aria-label="t('apps.custom.settings.size_label') || 'Size'">
      <template x-for="opt in ['half', 'normal', 'double', 'xlarge']" :key="opt">
        <button type="button" role="radio"
                :aria-checked="appsCardSize(item) === opt ? 'true' : 'false'"
                :tabindex="appsCardSize(item) === opt ? 0 : -1"
                class="apps-seg-btn fs-2xs"
                @click.stop="setAppsCardSize(item.uid, opt)"
                x-text="(t('apps.custom.settings.size_' + opt) || opt)"></button>
      </template>
    </div>
    <span class="apps-card-settings-hint"
          x-text="t('apps.custom.settings.size_hint') || 'Half: title only. Normal: full card. Double: wider. X-Large: widest.'"></span>
  </div>

  <!-- ============================================================
       Universal: card height (two presets — short / tall). Every card
       type (apps + widgets + bookmarks) is locked to one of these two
       heights so it can never grow past its preset. Drag the bottom-
       edge handle in edit mode, or pick here.
       ============================================================ -->
  <div class="apps-card-settings-row">
    <span class="apps-card-settings-label"
          x-text="t('apps.custom.settings.height_label') || 'Height'"></span>
    <div class="inline-flex gap-1" role="radiogroup" @keydown="_radiogroupArrowKey($event)"
         :aria-label="t('apps.custom.settings.height_label') || 'Height'">
      <template x-for="opt in ['short', 'tall']" :key="opt">
        <button type="button" role="radio"
                :aria-checked="appsCardHeight(item) === opt ? 'true' : 'false'"
                :tabindex="appsCardHeight(item) === opt ? 0 : -1"
                class="apps-seg-btn fs-2xs"
                @click.stop="setAppsCardHeight(item.uid, opt)"
                x-text="(t('apps.custom.settings.height_' + opt) || opt)"></button>
      </template>
    </div>
    <span class="apps-card-settings-hint"
          x-text="t('apps.custom.settings.height_hint') || 'Short: compact tile. Tall: roomy card for lists / large widgets.'"></span>
  </div>

  <!-- ============================================================
       Clock widget — per-card timezone + format + analog/digital
       overrides. Gates on item.kind=widget AND item.widget=clock.
       ============================================================ -->
  <template x-if="item.kind === 'widget' && item.widget === 'clock'">
    <div class="space-y-2 mt-1">

      <!-- Follow-user toggle — when checked, ALL clock settings fall
           back to the user's profile (TZ + datetime format). When
           unchecked, the override fields below take effect. -->
      <div class="apps-card-settings-row">
        <label class="flex items-center gap-2 fs-xs">
          <input type="checkbox"
                 :checked="(item.opts && item.opts.follow_user !== false)"
                 @change.stop="setAppsItemOpt(item.uid, 'follow_user', $event.target.checked)">
          <span x-text="t('apps.custom.settings.clock.follow_user') || 'Follow user profile (timezone + format)'"></span>
        </label>
      </div>

      <!-- Style: analog vs digital. Always visible regardless of
           follow-user (the style is the clock's look, not its data
           source). -->
      <div class="apps-card-settings-row">
        <span class="apps-card-settings-label"
              x-text="t('apps.custom.settings.clock.style_label') || 'Style'"></span>
        <div class="inline-flex gap-1" role="radiogroup" @keydown="_radiogroupArrowKey($event)">
          <template x-for="opt in ['digital', 'analog']" :key="opt">
            <button type="button" role="radio"
                    :aria-checked="effectiveClockOpts(item).style === opt ? 'true' : 'false'"
                    :tabindex="effectiveClockOpts(item).style === opt ? 0 : -1"
                    class="apps-seg-btn fs-2xs"
                    @click.stop="setAppsItemOpt(item.uid, 'clock_style', opt)"
                    x-text="t('apps.custom.settings.clock.style_' + opt) || opt"></button>
          </template>
        </div>
      </div>

      <!-- Override-only block: TZ + format. Disabled when
           follow_user=true so the user can see what the override
           values WOULD be without re-typing them. -->
      <label class="apps-card-settings-row">
        <span class="apps-card-settings-label"
              x-text="t('apps.custom.settings.clock.tz_label') || 'Timezone'"></span>
        <input type="text" list="apps-clock-tz-list"
               class="input fs-xs"
               :disabled="(item.opts && item.opts.follow_user !== false)"
               :value="(item.opts && item.opts.clock_tz) || ''"
               @change.stop="setAppsItemOpt(item.uid, 'clock_tz', $event.target.value.trim())"
               :placeholder="t('apps.custom.settings.clock.tz_placeholder') || 'e.g. Europe/London (blank = user profile)'">
        <datalist id="apps-clock-tz-list">
          <template x-for="tz in appsClockTimezones()" :key="tz">
            <option :value="tz"></option>
          </template>
        </datalist>
      </label>

      <label class="apps-card-settings-row">
        <span class="apps-card-settings-label"
              x-text="t('apps.custom.settings.clock.format_label') || 'Date/time format'"></span>
        <input type="text" class="input fs-xs"
               :disabled="(item.opts && item.opts.follow_user !== false)"
               :value="(item.opts && item.opts.clock_format) || ''"
               @change.stop="setAppsItemOpt(item.uid, 'clock_format', $event.target.value.trim())"
               :placeholder="t('apps.custom.settings.clock.format_placeholder') || 'e.g. HH:mm:ss (blank = user profile)'">
        <span class="apps-card-settings-hint"
              x-text="t('apps.custom.settings.clock.format_hint') || 'Tokens: yyyy yy MMMM MMM MM M dd d HH H hh h mm m ss s a'"></span>
      </label>
    </div>
  </template>

  <!-- ============================================================
       Weather widget — per-card location + units + forecast days +
       show-conditions toggle.
       ============================================================ -->
  <template x-if="item.kind === 'widget' && item.widget === 'weather'">
    <div class="space-y-2 mt-1">

      <div class="apps-card-settings-row">
        <label class="flex items-center gap-2 fs-xs">
          <input type="checkbox"
                 :checked="(item.opts && item.opts.follow_user !== false)"
                 @change.stop="setAppsItemOpt(item.uid, 'follow_user', $event.target.checked)">
          <span x-text="t('apps.custom.settings.weather.follow_user') || 'Follow user settings (location + units)'"></span>
        </label>
      </div>

      <!-- Override location — label + lat + lng. Label is the human
           name shown in the card header; lat/lng feed the weather
           backend. -->
      <label class="apps-card-settings-row">
        <span class="apps-card-settings-label"
              x-text="t('apps.custom.settings.weather.label_label') || 'Location label'"></span>
        <input type="text" class="input fs-xs"
               :disabled="(item.opts && item.opts.follow_user !== false)"
               :value="(item.opts && item.opts.weather_label) || ''"
               @change.stop="setAppsItemOpt(item.uid, 'weather_label', $event.target.value.trim())"
               :placeholder="t('apps.custom.settings.weather.label_placeholder') || 'e.g. Cairo, Egypt'">
      </label>

      <div class="grid grid-cols-2 gap-2">
        <label class="apps-card-settings-row">
          <span class="apps-card-settings-label"
                x-text="t('apps.custom.settings.weather.lat_label') || 'Latitude'"></span>
          <input type="number" step="0.0001" min="-90" max="90"
                 class="input fs-xs"
                 :disabled="(item.opts && item.opts.follow_user !== false)"
                 :value="(item.opts && typeof item.opts.weather_lat === 'number') ? item.opts.weather_lat : ''"
                 @change.stop="setAppsItemOpt(item.uid, 'weather_lat', $event.target.value === '' ? null : parseFloat($event.target.value))">
        </label>
        <label class="apps-card-settings-row">
          <span class="apps-card-settings-label"
                x-text="t('apps.custom.settings.weather.lng_label') || 'Longitude'"></span>
          <input type="number" step="0.0001" min="-180" max="180"
                 class="input fs-xs"
                 :disabled="(item.opts && item.opts.follow_user !== false)"
                 :value="(item.opts && typeof item.opts.weather_lng === 'number') ? item.opts.weather_lng : ''"
                 @change.stop="setAppsItemOpt(item.uid, 'weather_lng', $event.target.value === '' ? null : parseFloat($event.target.value))">
        </label>
      </div>

      <!-- Units: Celsius vs Fahrenheit -->
      <div class="apps-card-settings-row">
        <span class="apps-card-settings-label"
              x-text="t('apps.custom.settings.weather.units_label') || 'Units'"></span>
        <div class="inline-flex gap-1" role="radiogroup" @keydown="_radiogroupArrowKey($event)">
          <template x-for="opt in ['metric', 'imperial']" :key="opt">
            <button type="button" role="radio"
                    :aria-checked="((item.opts && item.opts.weather_units) || 'metric') === opt ? 'true' : 'false'"
                    :tabindex="((item.opts && item.opts.weather_units) || 'metric') === opt ? 0 : -1"
                    class="apps-seg-btn fs-2xs"
                    :disabled="(item.opts && item.opts.follow_user !== false)"
                    @click.stop="setAppsItemOpt(item.uid, 'weather_units', opt)"
                    x-text="opt === 'metric' ? (t('apps.custom.settings.weather.units_metric') || '°C') : (t('apps.custom.settings.weather.units_imperial') || '°F')"></button>
          </template>
        </div>
      </div>

      <!-- Forecast days: 0..7. 0 hides the forecast strip entirely. -->
      <label class="apps-card-settings-row">
        <span class="apps-card-settings-label">
          <span x-text="t('apps.custom.settings.weather.forecast_label') || 'Forecast days'"></span>
          <span class="text-[var(--text-faint)]"
                x-text="' (' + ((item.opts && typeof item.opts.weather_forecast_days === 'number') ? item.opts.weather_forecast_days : 4) + ')'"></span>
        </span>
        <input type="range" min="0" max="7" step="1"
               :value="(item.opts && typeof item.opts.weather_forecast_days === 'number') ? item.opts.weather_forecast_days : 4"
               @change.stop="setAppsItemOpt(item.uid, 'weather_forecast_days', parseInt($event.target.value, 10))">
      </label>

      <!-- Show weather conditions (rain / cloudy / wind chips) -->
      <div class="apps-card-settings-row">
        <label class="flex items-center gap-2 fs-xs">
          <input type="checkbox"
                 :checked="!(item.opts && item.opts.weather_show_conditions === false)"
                 @change.stop="setAppsItemOpt(item.uid, 'weather_show_conditions', $event.target.checked)">
          <span x-text="t('apps.custom.settings.weather.show_conditions') || 'Display weather conditions'"></span>
        </label>
      </div>
    </div>
  </template>

  <!-- ============================================================
       *arr release-calendar — per-service "Open in app" link override.
       The probe keeps using the integration base (machine host:port);
       these optional friendly URLs (e.g. a reverse-proxy hostname) only
       change where the popover's "Open in Radarr / Sonarr / …" pill
       points. Blank = use the integration base. Stored in opts via
       setAppsItemOpt (arr_link_<slug>) and read by arrCalItemAppUrl.
       ============================================================ -->
  <template x-if="item.kind === 'widget' && item.widget === 'arr_calendar'">
    <div class="space-y-2 mt-1">
      <span class="apps-card-settings-hint"
            x-text="t('apps.custom.settings.arr_calendar.links_hint') || 'Optional friendly redirect URLs for the “Open in app” link. The release data still comes from each service’s integration address — these only change where the link points (e.g. a reverse-proxy hostname). Leave blank to use the integration address.'"></span>
      <template x-for="svc in ['radarr','sonarr','lidarr','readarr']" :key="svc">
        <label class="apps-card-settings-row">
          <span class="apps-card-settings-label"
                x-text="arrCalServiceLabel(svc)"></span>
          <input type="url" class="input fs-xs"
                 :value="(item.opts && item.opts['arr_link_' + svc]) || ''"
                 @change.stop="setAppsItemOpt(item.uid, 'arr_link_' + svc, $event.target.value.trim())"
                 :placeholder="t('apps.custom.settings.arr_calendar.link_placeholder') || 'https://sonarr.example.com'">
        </label>
      </template>
    </div>
  </template>

  <!-- ============================================================
       App with an extras-capable template — admin-only "Show extras"
       toggle. Writes the SAME catalog flag as the Admin → Apps template
       toggle (via /api/apps/catalog/{slug}/show-extras), so the per-app
       extras panel (e.g. APC's UPS stats) can be flipped from either
       place. Gated on appsTemplateSupportsExtras so it only shows for
       apps that actually have an extras partial (APC / Speedtest).
       ============================================================ -->
  <template x-if="item.kind === 'app' && item.app && item.app.catalog && appsTemplateSupportsExtras(item.app.catalog.slug) && isAdmin()">
    <div class="apps-card-settings-row mt-1">
      <label class="flex items-center gap-2 fs-xs">
        <!-- SAME control as the Admin → Apps instance editor's "Show extras"
             checkbox: both write the per-instance show_extras and the
             backend syncs it across every instance of the app, so editing
             either surface updates the other (no precedence / divergence).
             `:checked` reads the EFFECTIVE value (appsShowExtras). -->
        <input type="checkbox"
               :checked="appsCardShowExtrasChecked(item)"
               @change.stop="appsSetCardShowExtras(item, $event.target.checked)">
        <span x-text="t('apps.custom.settings.show_extras_label') || 'Show extras panel'"></span>
      </label>
      <span class="apps-card-settings-hint"
            x-text="t('apps.custom.settings.show_extras_hint') || 'Show this app’s extra data panel (e.g. APC UPS stats) on the card. Same setting as the Admin → Apps instance editor — changing either updates both.'"></span>
    </div>
  </template>

  <!-- ============================================================
       Speedtest Tracker — per-instance "Averages window" (admin only).
       Unlike the show-extras toggle above (a catalog-level flag), this
       writes CHIP data (hosts_config services[].avg_window) via the
       admin PATCH /api/services/{host}/{idx}, resolved from the card's
       first instance. Blank = the app default (10); 2..60 otherwise.
       Same setting as the Admin → Apps instance editor.
       ============================================================ -->
  <template x-if="item.kind === 'app' && (typeof speedtestIsApp === 'function') && speedtestIsApp(item.app) && isAdmin()">
    <label class="apps-card-settings-row mt-1">
      <span class="apps-card-settings-label"
            x-text="t('apps.speedtest.avg_window_label') || 'Averages window (tests)'"></span>
      <input type="number" min="2" max="60" step="1" class="input fs-xs mono"
             :value="appChipAvgWindow(item)"
             @change.stop="setAppChipAvgWindow(item, $event.target.value)"
             :placeholder="t('apps.speedtest.avg_window_placeholder') || '10 (default)'">
    </label>
  </template>

  <!-- ============================================================
       Speedtest Tracker — per-instance "Below-floor alert (Mbps)" (admin
       only). Same CHIP-data PATCH as avg_window above (services[].
       speed_floor_mbps via PATCH /api/services/{host}/{idx}). Blank = OFF;
       the card flags the % of tests below this ISP floor. The "Recommend"
       button derives ~90% of the median download over the last
       appsSpeedFloorDays days from this chip's own history. Mirrors the
       Admin → Apps instance editor (changing either updates both).
       ============================================================ -->
  <template x-if="item.kind === 'app' && (typeof speedtestIsApp === 'function') && speedtestIsApp(item.app) && isAdmin()">
    <div class="apps-card-settings-row mt-1">
      <span class="apps-card-settings-label"
            x-text="t('apps.speedtest.floor_label') || 'Below-floor alert (Mbps)'"></span>
      <div class="flex items-center gap-2">
        <input aria-label="Below-floor alert (Mbps)" type="number" min="0" max="100000" step="1" class="input fs-xs mono flex-1 min-w-0"
               :value="appChipSpeedFloor(item)"
               @change.stop="setAppChipSpeedFloor(item, $event.target.value)"
               :aria-label="t('apps.speedtest.floor_label') || 'Below-floor alert (Mbps)'"
               :placeholder="t('apps.speedtest.floor_placeholder') || 'off'">
        <!-- One-click fill: ~90% of the median download over the last 30 days
             of this chip's own history → written straight into the field. -->
        <button type="button" class="btn btn-soft fs-2xs shrink-0"
                :title="t('apps.speedtest.floor_recommend_hint')"
                @click.stop="appsRecommendSpeedFloor((item.app.instances && item.app.instances[0] || {}).host_id, (item.app.instances && item.app.instances[0] || {}).service_idx, 30).then(v => { if (v) { setAppChipSpeedFloor(item, v); } })"
                x-text="t('apps.speedtest.floor_recommend') || 'Recommend'"></button>
      </div>
    </div>
  </template>

  <!-- ============================================================
       Bookmark — edit Name / URL / icon. Top-level item fields (not
       opts), persisted via setAppsItemField. The icon accepts a brand
       slug (resolved through appsBookmarkIconUrl: brand resolver +
       explicit-slug file fallback, so e.g. `ftth` works), a full URL,
       or blank (auto-resolve from the name).
       ============================================================ -->
  <template x-if="item.kind === 'bookmark'">
    <div class="space-y-2 mt-1">
      <label class="apps-card-settings-row">
        <span class="apps-card-settings-label"
              x-text="t('apps.custom.settings.bookmark.name_label') || 'Name'"></span>
        <input type="text" class="input fs-xs"
               :value="item.name || ''"
               @change.stop="setAppsItemField(item.uid, 'name', $event.target.value.trim())"
               :placeholder="t('apps.custom.settings.bookmark.name_placeholder') || 'Display name'">
      </label>
      <label class="apps-card-settings-row">
        <span class="apps-card-settings-label"
              x-text="t('apps.custom.settings.bookmark.url_label') || 'URL'"></span>
        <input type="url" class="input fs-xs"
               :value="item.url || ''"
               @change.stop="setAppsItemField(item.uid, 'url', $event.target.value.trim())"
               :placeholder="t('apps.custom.settings.bookmark.url_placeholder') || 'https://example.com'">
      </label>
      <label class="apps-card-settings-row">
        <span class="apps-card-settings-label"
              x-text="t('apps.custom.settings.bookmark.icon_label') || 'Icon'"></span>
        <input type="text" class="input fs-xs"
               :value="item.icon || ''"
               @change.stop="setAppsItemField(item.uid, 'icon', $event.target.value.trim())"
               :placeholder="t('apps.custom.settings.bookmark.icon_placeholder') || 'brand slug, URL, or blank'">
        <span class="apps-card-settings-hint"
              x-text="t('apps.custom.settings.bookmark.icon_hint') || 'A brand slug (e.g. ftth, plex), a full URL, or blank to auto-resolve from the name.'"></span>
      </label>
    </div>
  </template>

</div>
