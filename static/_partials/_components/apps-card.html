<!-- Shared "big" app card — the per-app card used by BOTH the Apps
     view's group-by-app grid AND the Custom layout's LOCKED sections.
     Bound inside a `<template x-for="app in ...">`, so `app` is in scope;
     every helper (openAppDrawer / iconUrlFor / appStatusPillClass /
     appsChipAriaLabel / probeAllInstances / appsVisibleInstances / …) lives
     on the single app() component and resolves in either context. Keep this
     the SINGLE source of the big card — the Custom locked view and the
     by-app grid must not drift. Per-status accent (`apps-card--<status>`)
     drives the polished chrome — left border, logo backdrop tint, hover
     glow, status pill — via the `--apps-card-accent` CSS variable family
     wired in style.css. -->
<!--suppress HtmlUnknownAttribute -->
<!-- Clickable card: `<article>` (a card is an article) made keyboard-
     focusable + activatable via tabindex + Enter/Space, with an aria-label
     describing the action. We do NOT set role="button" — `button` isn't a
     valid ARIA role for <article>, and the card holds its own interactive
     descendants (URL links, probe/open buttons) which a button role forbids. -->
<!--
  `:class` binds TWO modifiers:
    - `apps-card--<status>` — colour/accent based on rollup status.
    - `apps-card--span-2` — when the helper `appsCardSpan(app)`
      reports a 2-column span. The helper walks
      `window.OG_APPS_EXTENDERS` (per-app SPA modules under
      `static/js/apps/<slug>.js`) and returns the first
      registered `cardSpan(app)` that exceeds 1; absent extenders
      fall through to default 1. The matching
      `.apps-card--span-2 { grid-column: span 2 }` CSS rule sits
      next to `.apps-card`.
-->
<article class="apps-card border border-[var(--border)] rounded-md p-3 cursor-pointer flex items-start gap-3"
         :class="('apps-card--' + app.status) + (appsCardSpan(app) === 2 ? ' apps-card--span-2' : '')"
         :data-apps-group-id="app.group_id"
         x-init="_observeAppCard($el, app.group_id)"
         tabindex="0"
         :aria-label="t('apps.drawer.open_aria', {name: app.name})"
         @click="openAppDrawer(app)"
         @keydown.enter="openAppDrawer(app)"
         @keydown.space.prevent="openAppDrawer(app)">
  <!-- App logo with tinted backdrop. The accent-tinted container reads
       as deliberate composition rather than a floating sticker; tint
       intensifies on card hover via the parent's `--apps-card-accent`
       variable. 72px outer slot / 56px logo gives generous breathing
       room without inflating tile height. -->
  <div class="apps-card-logo">
    <img :src="iconUrlFor(app.icon || app.name)" alt=""
         @error="$event.target.style.visibility='hidden'">
  </div>
  <div class="flex-1 min-w-0">
    <header class="mb-3">
      <div class="flex items-start justify-between gap-2">
        <div class="flex-1 min-w-0">
          <h3 class="apps-card-name truncate" x-text="app.name"></h3>
          <!-- Meta row — instances-up count picks up the status accent
               so the "5 / 6 up" reads as a status-aware breakdown
               rather than just dim text. Plain description sentence
               wins when the catalog template carries one. -->
          <div class="apps-card-meta">
            <span x-show="!(app.catalog && app.catalog.description)" class="flex items-center gap-1">
              <span class="apps-card-meta-value"
                    x-text="(app.up_count || 0) + ' / ' + (app.instance_count || 0)"></span>
              <span x-text="t('apps.counts.up_suffix') || 'up'"></span>
            </span>
            <span x-show="app.catalog && app.catalog.description" class="truncate"
                  x-text="app.catalog && app.catalog.description"></span>
          </div>
        </div>
        <!-- Polished status pill + admin-only bulk-action mini-toolbar
             stacked below. Pill upgraded from the generic chip to a
             status-coloured dot+label combo with subtle ring. -->
        <!-- Status pill + action pills stacked vertically. The action
             buttons now render as `apps-card-action-pill` — same dot+
             label combo + ring + padding as the status pill, but in
             a neutral grey accent. Result: each card has TWO (or
             three) consistent pills stacked below each other, reading
             as a tight visual cluster rather than a status pill + a
             mismatched icon-only button row. Operator-flagged UI
             consistency request. -->
        <div class="flex flex-col items-end gap-1 flex-shrink-0">
          <!-- Settings (gear) pill — FIRST in the stack, above the
               status pill, per the operator's requested order
               (settings → status → refresh → open). Only renders in the
               Custom-dashboard scope, where the enclosing x-for binds
               `item` (with a stable `item.uid` to flip). The `typeof`
               guard keeps it inert in the by-app grid view, where this
               same partial is included WITHOUT an `item` in scope — a
               bare `item` reference there would throw "item is not
               defined" and break the whole card. `x-if` (not x-show) so
               the gear bindings never evaluate in that scope. -->
          <template x-if="typeof item !== 'undefined' && item && item.uid">
            <button type="button"
                    class="apps-card-action-pill whitespace-nowrap"
                    @click.stop="toggleAppsCardFlipped(item.uid)"
                    :aria-pressed="appsCardIsFlipped(item.uid) ? 'true' : 'false'"
                    :title="t('apps.custom.gear_title') || 'Card settings'"
                    :aria-label="t('apps.custom.gear_aria') || 'Card settings'">
              <svg width="11" height="11" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-settings"/>
              </svg>
              <span x-text="t('apps.custom.settings.title') || 'Settings'"></span>
            </button>
          </template>
          <span class="apps-card-status whitespace-nowrap"
                :aria-label="appsChipAriaLabel(app)">
            <span class="apps-card-status-dot" aria-hidden="true"></span>
            <span x-text="(t('apps.status_' + app.status) || app.status)"></span>
          </span>
          <button type="button" x-show="isAdmin() && appsProbeTargetCount(app)"
                  class="apps-card-action-pill whitespace-nowrap"
                  :disabled="appsProbingAll(app)"
                  @click.stop="probeAllInstances(app)"
                  :title="t('apps.probe_all_title') || 'Probe every instance of this app now'"
                  :aria-label="t('apps.probe_all_aria', {name: app.name}) || ('Probe all instances of ' + app.name)">
            <svg width="11" height="11" :class="appsProbingAll(app) ? 'spin-md' : ''" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-cw"/>
            </svg>
            <span x-text="t('apps.probe_all_label') || 'Refresh'"></span>
          </button>
          <button type="button" x-show="appsOpenableCount(app)"
                  class="apps-card-action-pill whitespace-nowrap"
                  @click.stop="openAllInstances(app)"
                  :title="t('apps.open_all_title') || 'Open every instance URL in a new tab'"
                  :aria-label="t('apps.open_all_aria', {name: app.name}) || ('Open all URLs for ' + app.name)">
            <svg width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-external-link"/>
            </svg>
            <span x-text="t('apps.open_all_label') || 'Open'"></span>
          </button>
        </div>
      </div>
      <span x-show="appsProbeAllSummary(app)" class="fs-3xs text-[var(--text-faint)] mt-1 block"
            aria-live="polite"
            x-text="appsProbeAllSummary(app)"></span>
    </header>
    <!-- ============================================================
         Two-stage lazy-render gate:
           1. `appsCardVisible(group_id)` flips when the tile enters
              the viewport (IntersectionObserver via _observeAppCard).
              Below the gate the off-screen STUB renders — the small
              instance-count line below.
           2. `appsCardReady(group_id)` flips one step LATER, when the
              RAF-paced render queue (`_processAppsTileQueue`) picks
              the tile. Between visible-and-not-ready, the SKELETON
              block below renders (shimmer placeholders matching the
              real body's shape so the layout doesn't shift). Once
              ready, the real chip / port / sparkline body mounts.
         The two-stage split is what keeps N simultaneously-becoming-
         visible tiles from all building their heavy subtrees in the
         same Alpine flush — the symptom that caused the page hang
         after every tile's header had painted but BEFORE any stats
         appeared. One tile per animation frame so the browser gets
         to paint between mounts. Per-tile timing in devtools via
         `[apps-tile]` console.debug lines AND container stdout via
         the matching POST /api/apps/tile-trace diagnostic sink. -->
    <template x-if="!appsCardVisible(app.group_id)">
      <div class="fs-2xs text-[var(--text-faint)] italic mt-1"
           x-text="(app.instance_count || 0) + ' ' + (t('apps.counts.up_suffix') || 'instance(s)')"></div>
    </template>
    <template x-if="appsCardVisible(app.group_id) && !appsCardReady(app.group_id)">
      <!-- Body-shape skeleton — mirrors the real chip-list height so
           swapping in the body once ready doesn't visibly shift the
           grid row. Three pseudo-rows + a port-pill row, all using
           the same shimmer animation as the Stacks / Services
           initial-paint skeletons (see `.skeleton-cell` in
           static/css/style.css). aria-hidden — the loading state is
           announced by the parent card's status pill. -->
      <div class="space-y-1 mt-1" aria-hidden="true">
        <div class="skeleton-cell short" style="width: 70%;"></div>
        <div class="skeleton-cell short" style="width: 55%;"></div>
        <div class="skeleton-cell bar" style="width: 80%;"></div>
      </div>
    </template>
    <template x-if="appsCardReady(app.group_id)">
      <div>
        <!-- Per-host instance list — each row in a subtle row-card with
             hover background so operators get a precise hit-target signal
             (clicking the host name / sparkline opens the parent app
             drawer via the article's @click; only the per-port pills +
             external link short-circuit propagation). -->
        <ul class="space-y-0.5 fs-xs">
          <template x-for="inst in appsVisibleInstances(app)" :key="inst.host_id + ':' + inst.service_idx">
            <li class="apps-card-instance">
              <div class="apps-card-instance-row">
            <span class="apps-card-dot"
                  :class="'apps-card-dot--' + inst.status"
                  :title="t('apps.status_' + inst.status) || inst.status"
                  aria-hidden="true"></span>
                <span class="apps-card-instance-host"
                      :title="appsInstanceHostTitle(inst)"
                      x-text="inst.host_address || inst.host_id"></span>
                <span x-show="inst.last_probe && inst.last_probe.rtt_ms" class="apps-card-latency"
                      x-text="(inst.last_probe && inst.last_probe.rtt_ms) ? appsLatencyMs(inst.last_probe.rtt_ms) : ''"></span>
                <!-- Per-instance uptime sparkline (last N rollup probes from
                     service_samples): a flat top line reads as healthy, a dip to
                     the baseline as an outage. appsInstanceSpark memoizes the
                     points / title / colour against inst.status_history so they
                     don't rebuild per flush. The x-if gate (>= 2 points) keeps an
                     unprobed chip spark-less. aria-hidden — the status dot +
                     reason line carry the accessible status; the title adds the
                     uptime %. -->
                <template x-if="(inst.status_history || []).length > 1">
              <span class="apps-spark-wrap"
                    :title="appsInstanceSpark(inst) ? t('apps.spark_title', { pct: appsInstanceSpark(inst).pct, n: appsInstanceSpark(inst).n }) : ''">
                <svg class="apps-spark"
                     :class="(appsInstanceSpark(inst) && appsInstanceSpark(inst).allUp) ? 'apps-spark--up' : 'apps-spark--mixed'"
                     width="48" height="12" viewBox="0 0 48 12" preserveAspectRatio="none" aria-hidden="true">
                  <polyline :points="appsInstanceSpark(inst) ? appsInstanceSpark(inst).points : ''"
                            fill="none" stroke="currentColor" stroke-width="1.25"
                            vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round"/>
                </svg>
              </span>
                </template>
                <a x-show="inst.url" :href="inst.url" target="_blank" rel="noopener"
                   class="apps-card-instance-link" :aria-label="t('apps.open_link') || 'Open service URL'"
                   @click.stop>
                  <svg width="12" height="12" aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-external-link"/>
                  </svg>
                </a>
              </div>
              <!-- Diagnosis: WHY this instance is degraded / down. Shows the
                   failing port's error (multi-port) or the chip-level probe
                   error so operators don't have to guess. Hidden for up. -->
              <div x-show="appsInstanceReason(inst)"
                   class="ps-4 fs-3xs truncate"
                   :class="inst.status === 'down' ? 'text-[var(--danger)]' : 'text-[var(--text-faint)]'"
                   :title="appsInstanceReason(inst)"
                   x-text="appsInstanceReason(inst)"></div>
              <!-- Per-port pills for multi-port chips — which port is up /
                   down + its rtt + error tooltip. Mirrors the host-drawer
                   Apps card. Single-port chips skip this (reason line above
                   already carries their one error). -->
              <!-- Show the port pill for EVERY app (was multi-port only).
                   A pill flagged open_url (+ http/https) renders as a
                   clickable link to <scheme>://<host>:<port>; @click.stop
                   so it doesn't also open the app drawer. -->
              <div x-show="(inst.port_results || []).length" class="apps-port-grid ps-4">
                <template x-for="pr in (inst.port_results || [])" :key="pr.port">
                  <a class="apps-port-pill"
                     :class="'apps-port-pill--' + appsPortState(pr) + (appsPortHref(pr, inst) ? ' apps-port-pill--link' : '')"
                     :href="appsPortHref(pr, inst) || null"
                     :target="appsPortHref(pr, inst) ? '_blank' : null"
                     rel="noopener"
                     @click.stop
                     :title="appsPortTitle(pr)">
                    <span class="apps-card-dot" :class="'apps-card-dot--' + appsPortState(pr)" aria-hidden="true"></span>
                    <span x-text="pr.port + '/' + (pr.protocol || 'tcp')" class="mono"></span>
                  </a>
                </template>
              </div>
            </li>
          </template>
        </ul>
        <!-- Per-app expanded-card extras — every per-app partial under
             `_components/apps/` self-gates via its own
             `<template x-if="...IsApp(app)...">` so only the chip's
             matching app renders. Per-instance host loop runs once per
             visible instance so each host gets its own extras row when
             the matching per-app partial fires.

             OUTER `<template x-if="anyAppExtrasMatch(app)">` gate skips
             the entire iteration for apps that don't match ANY
             registered per-app extras partial — saves N empty wrapper
             divs per non-matching card. Big win on fleets with many
             generic apps (Plex / Sonarr / Portainer / etc.) where
             only ~2 apps (APC / Speedtest) actually need extras.

             Adding a new per-app extras partial does NOT touch this
             file — drop the partial under `_components/apps/` + add
             one INCLUDE line in `_components/apps/_all_extras.html`. -->
        <template x-if="anyAppExtrasMatch(app)">
          <div class="mt-2 space-y-2">
            <template x-for="inst in appsVisibleInstances(app)" :key="'ext:' + inst.host_id + ':' + inst.service_idx">
              <div>
                <!-- INCLUDE: _components/apps/_all_extras.html -->
              </div>
            </template>
          </div>
        </template>
        <!-- Show-all / Show-less toggle so an app on many hosts doesn't
             grow the card tall + break the grid's uniform rows. -->
        <button type="button" x-show="appsInstancesCollapsible(app)"
                class="btn btn-ghost fs-3xs mt-1" @click.stop="toggleAppsInstances(app)"
                x-text="(appsInstancesExpanded[app.group_id]) ? (t('apps.show_less') || 'Show less') : (t('apps.show_all', { n: (app.instances || []).length }) || ('Show all (' + (app.instances || []).length + ')'))"></button>
      </div>
    </template>
    <!-- End lazy-render gate ============================================ -->
  </div>
</article>
