<!-- Per-app editor fields -- AdGuard Home.

     Renders inside the Admin -> Apps per-instance editor, gated on
     `adguardIsApp(...)` so the username + password inputs appear ONLY
     for an AdGuard chip (each app surfaces its OWN auth fields — e.g.
     Speedtest shows just an api_key). AdGuard's control API uses HTTP
     Basic auth, so each host carries a username + password:
       - username -> non-secret `username` chip field (round-trips in
         the clear so the input shows the saved value).
       - password -> the secret `api_key` chip field (never returned;
         only an `api_key_set` flag, keep-current-if-blank on save). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="adguardIsApp && adguardIsApp({catalog: {slug: appsInstanceEditForm.catalog_slug || (appsInstanceEditForm.catalog_name || '').toLowerCase()}})">
  <div class="space-y-2 pt-3 mt-3 border-t border-[var(--border)]">
    <div>
      <label for="apps-instance-adguard-username"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.adguard.username_label') || 'AdGuard username'"></label>
      <input id="apps-instance-adguard-username"
             type="text" x-model="appsInstanceEditForm.username"
             class="w-full bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm"
             :placeholder="t('apps.adguard.username_placeholder') || 'Admin username'"
             autocomplete="off" spellcheck="false">
    </div>
    <div>
      <label for="apps-instance-adguard-password"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.adguard.password_label') || 'AdGuard password'"></label>
      <input id="apps-instance-adguard-password"
             type="password" x-model="appsInstanceEditForm.api_key"
             class="w-full bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm"
             :placeholder="appsInstanceEditForm.api_key_set
               ? (t('apps.adguard.password_placeholder_saved') || 'Saved -- leave blank to keep')
               : (t('apps.adguard.password_placeholder_unset') || 'Admin password')"
             autocomplete="off" spellcheck="false">
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('apps.adguard.creds_hint') || 'Required for the aggregated stats + fleet actions. The password is stored encrypted-at-rest and never shown again; leave blank to keep the saved one.'"></p>
    </div>
    <div class="flex items-center gap-2">
      <button type="button"
              class="btn btn-secondary fs-xs"
              :disabled="appsInstanceTestBusy"
              @click="testInstanceCredential()">
        <span x-show="!appsInstanceTestBusy"
              x-text="t('actions.test_connection') || 'Test connection'"></span>
        <span x-show="appsInstanceTestBusy"
              x-text="t('common.testing') || 'Testing...'"></span>
      </button>
      <span x-show="appsInstanceTestResult"
            :class="(appsInstanceTestResult && appsInstanceTestResult.ok)
              ? 'fs-xs text-[var(--success)]'
              : 'fs-xs text-[var(--danger)]'"
            x-text="appsInstanceTestResult ? appsInstanceTestResult.detail : ''"></span>
    </div>
  </div>
</template>
