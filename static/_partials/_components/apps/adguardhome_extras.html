<!-- App-LEVEL aggregated extras -- AdGuard Home.

     Rendered ONCE per app card (via apps-card.html's app-level slot +
     `_all_extras_app.html`), with `app` in scope (NO `inst`). The
     operator runs N AdGuard hosts; this block aggregates them into ONE
     summary instead of a row per host (operator decision). The
     aggregation + fleet-action dispatch live in
     `static/js/apps/adguardhome.js`:
       adguardIsApp(app)           -- gate "is this an AdGuard chip"
       adguardAggregate(app)       -- {ready, loading, queries, blocked,
                                       pct, rules, clients, avgMs,
                                       topBlocked, protOn, protTotal,
                                       protOffHosts, failedHosts, okN, n}
       adguardInt/Pct/Ms           -- formatters
       adguardDisablePresets()     -- [{label, skill}]
       adguardFleetSkill(app, id)  -- dispatch a fleet skill
       adguardSkillBusy(app, id)   -- in-flight gate

     Actions are FLEET-wide (all hosts at once) and admin-only; the
     backend skill route + run_skill fan-out enforce both. -->
<!--suppress HtmlUnknownAttribute, HtmlUnknownTag -->
<template x-if="adguardIsApp && adguardIsApp(app)">
  <div class="apps-card-adguard mt-1 pt-1 border-t border-[var(--border)] space-y-2">
    <!-- Compute the aggregate ONCE per render via a single-element x-for. -->
    <template x-for="agg in [adguardAggregate(app)]" :key="'agg'">
      <div class="space-y-2">
        <!-- Stats grid (aggregated across every reachable host). Uses the
             canonical `.apps-card-ups-*` tinted-chip family so AdGuard reads
             identically to every other app's extras AND inherits the
             1x1..4x2 size rules (which target `.apps-card-ups-*`). -->
        <template x-if="agg.ready">
          <div class="apps-card-ups">
            <div class="apps-card-ups-grid">
              <div class="apps-card-ups-stat">
                <div class="apps-card-stat-label"
                     x-text="t('apps.adguard.blocked_today') || 'Blocked today'"></div>
                <div class="apps-card-stat-value">
                  <span x-text="adguardInt(agg.blocked)"></span>
                  <span class="fs-2xs text-[var(--text-faint)]"
                        x-text="'(' + adguardPct(agg.pct) + ')'"></span>
                </div>
              </div>
              <div class="apps-card-ups-stat">
                <div class="apps-card-stat-label"
                     x-text="t('apps.adguard.queries_today') || 'Queries today'"></div>
                <div class="apps-card-stat-value" x-text="adguardInt(agg.queries)"></div>
              </div>
              <div class="apps-card-ups-stat">
                <div class="apps-card-stat-label"
                     x-text="t('apps.adguard.blocklist') || 'Blocklist domains'"></div>
                <div class="apps-card-stat-value" x-text="adguardInt(agg.rules)"></div>
              </div>
              <div class="apps-card-ups-stat">
                <div class="apps-card-stat-label"
                     x-text="t('apps.adguard.clients') || 'Active clients'"></div>
                <div class="apps-card-stat-value" x-text="adguardInt(agg.clients)"></div>
              </div>
              <div class="apps-card-ups-stat">
                <div class="apps-card-stat-label"
                     x-text="t('apps.adguard.avg_processing') || 'Avg processing'"></div>
                <div class="apps-card-stat-value" x-text="adguardMs(agg.avgMs)"></div>
              </div>
              <div class="apps-card-ups-stat" x-show="agg.topBlocked">
                <div class="apps-card-stat-label"
                     x-text="t('apps.adguard.top_blocked') || 'Top blocked'"></div>
                <div class="apps-card-stat-value truncate"
                     :title="agg.topBlocked ? (agg.topBlocked.name + ' (' + adguardInt(agg.topBlocked.count) + ')') : ''"
                     x-text="agg.topBlocked ? agg.topBlocked.name : '—'"></div>
              </div>
              <div class="apps-card-ups-stat" x-show="agg.topQueried">
                <div class="apps-card-stat-label"
                     x-text="t('apps.adguard.top_queried') || 'Top queried'"></div>
                <div class="apps-card-stat-value truncate"
                     :title="agg.topQueried ? (agg.topQueried.name + ' (' + adguardInt(agg.topQueried.count) + ')') : ''"
                     x-text="agg.topQueried ? agg.topQueried.name : '—'"></div>
              </div>
              <div class="apps-card-ups-stat" x-show="agg.topClient">
                <div class="apps-card-stat-label"
                     x-text="t('apps.adguard.top_client') || 'Top client'"></div>
                <div class="apps-card-stat-value truncate"
                     :title="agg.topClient ? (agg.topClient.name + ' (' + adguardInt(agg.topClient.count) + ')') : ''"
                     x-text="agg.topClient ? agg.topClient.name : '—'"></div>
              </div>
              <!-- P1 — slowest upstream resolver (the "why is DNS slow" stat). -->
              <div class="apps-card-ups-stat" x-show="agg.slowestUpstream">
                <div class="apps-card-stat-label"
                     x-text="t('apps.adguard.slowest_upstream') || 'Slowest upstream'"></div>
                <div class="apps-card-stat-value truncate"
                     :title="agg.slowestUpstream ? (agg.slowestUpstream.name + ' · ' + adguardMs(agg.slowestUpstream.ms)) : ''"
                     x-text="agg.slowestUpstream ? adguardMs(agg.slowestUpstream.ms) : '—'"></div>
              </div>
              <!-- P1 — operator custom-rule count (hand-written allow/block/rewrite). -->
              <div class="apps-card-ups-stat" x-show="agg.customRules > 0">
                <div class="apps-card-stat-label"
                     x-text="t('apps.adguard.custom_rules') || 'Custom rules'"></div>
                <div class="apps-card-stat-value" x-text="adguardInt(agg.customRules)"></div>
              </div>
            </div>
            <!-- Safe-browsing / parental block split (only when non-zero). -->
            <div x-show="(agg.safebrowsing + agg.parental) > 0"
                 class="fs-3xs text-[var(--text-faint)] mt-1"
                 x-text="(t('apps.adguard.safebrowsing') || 'Safe-browsing') + ': ' + adguardInt(agg.safebrowsing) + ' · ' + (t('apps.adguard.parental') || 'Parental') + ': ' + adguardInt(agg.parental)"></div>
            <!-- P3 — top-blocked-domain distribution: horizontal bars of the
                 top-10 most-blocked domains, merged across the fleet (data is
                 already in /control/stats). Drawer-only — no room on the grid
                 card. Bars scale to the #1 domain (the sorted list's head). -->
            <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && agg.topBlockedList && agg.topBlockedList.length">
              <div class="mt-2">
                <div class="apps-card-stat-label mb-1"
                     x-text="t('apps.adguard.top_blocked_dist') || 'Top blocked domains'"></div>
                <template x-for="(b, bi) in agg.topBlockedList" :key="(b.name || '') + ':' + bi">
                  <div class="flex items-center gap-2 fs-3xs py-0.5">
                    <span class="mono truncate basis-[42%] shrink-0" :title="b.name" x-text="b.name || '?'"></span>
                    <span class="apps-skill-item-bar flex-auto">
                      <span class="apps-skill-item-bar-fill"
                            :style="'width:' + (agg.topBlockedList[0].count > 0 ? Math.round(b.count / agg.topBlockedList[0].count * 100) : 0) + '%'"></span>
                    </span>
                    <span class="text-[var(--text-faint)] shrink-0 mono" x-text="adguardInt(b.count)"></span>
                  </div>
                </template>
              </div>
            </template>
            <!-- Queries-vs-blocked time-bucket chart (from the same /control/stats
                 response — no extra call), summed across the fleet. Queries +
                 blocked share one scale so blocked reads as a true proportion.
                 Drawer-only (`appsExtrasInDrawer`) — the apps-grid card has no
                 room for the chart, so it shows only in the app drawer. -->
            <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && agg.queriesSeries && agg.queriesSeries.length >= 2">
              <div class="space-y-1 mt-1">
                <span class="fs-2xs text-[var(--text-faint)] block"
                      x-text="t('apps.adguard.activity') || 'Queries vs blocked'"></span>
                <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                  <path :d="adguardSeriesPath(agg.queriesSeries, adguardSeriesMax(agg.queriesSeries))"
                        fill="none" stroke="var(--info)" stroke-width="1.5"/>
                  <path :d="adguardSeriesPath(agg.blockedSeries, adguardSeriesMax(agg.queriesSeries))"
                        fill="none" stroke="var(--danger)" stroke-width="1.5"/>
                </svg>
                <div class="flex items-center justify-around fs-2xs text-[var(--text-faint)]">
                  <span><span class="inline-block w-2 h-2 rounded-full me-1" style="background: var(--info);"></span><span
                    x-text="t('apps.adguard.legend_queries') || 'queries'"></span></span>
                  <span><span class="inline-block w-2 h-2 rounded-full me-1" style="background: var(--danger);"></span><span
                    x-text="t('apps.adguard.legend_blocked') || 'blocked'"></span></span>
                </div>
              </div>
            </template>
            <!-- Long-horizon blocked-% trend (from OmniGrid's adguard_samples,
                 surviving AdGuard's short rolling window + restarts). Drawer-
                 only — no room on the apps-grid card. -->
            <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && agg.trend && agg.trend.series && agg.trend.series.length >= 2">
              <div class="space-y-1 mt-1 pt-1 border-t border-[var(--border)]">
                <span class="fs-2xs text-[var(--text-faint)] block"
                      x-text="t('apps.adguard.blocked_trend', { days: agg.trend.days }) || ('Blocked % trend (' + agg.trend.days + ' days)')"></span>
                <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                  <path :d="adguardTrendPath(agg.trend.series)" fill="none" stroke="var(--success)" stroke-width="1.5"/>
                </svg>
                <div class="fs-3xs text-[var(--text-faint)]"
                     x-text="(t('apps.adguard.median_blocked') || 'Median blocked') + ': ' + adguardPct(agg.trend.median_pct)"></div>
              </div>
            </template>
            <!-- Protection status — green when every host is ON, amber when
                 some are OFF (the actionable warning). -->
            <div class="flex items-center gap-1.5 fs-2xs mt-1">
              <span class="apps-fleet-dot"
                    :class="agg.protOn === agg.protTotal ? 'apps-fleet-dot--on' : 'apps-fleet-dot--off'"
                    aria-hidden="true"></span>
              <span x-show="agg.protOn === agg.protTotal" class="text-[var(--text-faint)]"
                    x-text="t('apps.adguard.protection_on') || 'Protection on'"></span>
              <span x-show="agg.protOn !== agg.protTotal" class="text-[var(--warning)]"
                    x-text="(t('apps.adguard.protection_partial') || 'Protection OFF on') + ' ' + agg.protOffHosts.join(', ')"></span>
            </div>
            <!-- Partial-failure footnote (some hosts down but totals shown). -->
            <div x-show="agg.failedHosts.length" class="fs-2xs text-[var(--warning)] mt-1"
                 x-text="(t('apps.adguard.unreachable') || 'Unreachable') + ': ' + agg.failedHosts.join(', ')"></div>
            <!-- Version footnote (from the AdGuard /control/status response). -->
            <div x-show="agg.version" class="fs-3xs text-[var(--text-faint)] mt-1 mono"
                 x-text="t('apps.version_footnote', { brand: 'AdGuard Home', v: (agg.version || '') })"></div>
          </div>
        </template>
        <!-- Loading / error states (plain text, outside the box — matches
             every other app's extras placeholder pattern). -->
        <template x-if="!agg.ready && agg.loading">
          <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
            <span class="spin" aria-hidden="true"></span>
            <span x-text="t('apps.adguard.loading') || 'Loading AdGuard stats…'"></span></p>
        </template>
        <template x-if="!agg.ready && !agg.loading">
          <p class="fs-xs text-[var(--danger)] italic"
             x-text="(t('apps.adguard.all_unreachable') || 'No AdGuard host reachable')
               + (agg.failedHosts.length ? ' — ' + agg.failedHosts.join(', ') : '')"></p>
        </template>

        <!-- Fleet actions (admin-only; need at least one credentialed host).
             Gated on `appsExtrasInDrawer` so they render ONLY in the app
             drawer — the Apps-grid card stays stats-only (actions + details
             live in the drawer). `typeof` guard: the card include never sets
             the flag, so it reads undefined → actions hidden there. -->
        <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && isAdmin() && (app.instances || []).some((i) => i.api_key_set)">
          <div class="apps-adguard-actions pt-2 mt-1 border-t border-[var(--border)] space-y-1.5">
            <div class="flex items-center gap-1.5 flex-wrap">
              <button type="button" class="apps-card-action-pill whitespace-nowrap"
                      :disabled="adguardSkillBusy(app, 'adguard_enable')"
                      @click.stop="adguardFleetSkill(app, 'adguard_enable')"
                      :title="t('apps.adguard.action_enable_title') || 'Enable protection on every host'">
                <svg width="11" height="11" :class="adguardSkillBusy(app, 'adguard_enable') ? 'spin-md' : ''" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-shield"/>
                </svg>
                <span x-text="t('apps.adguard.action_enable') || 'Enable'"></span>
              </button>
              <button type="button" class="apps-card-action-pill apps-card-action-pill--danger whitespace-nowrap"
                      :disabled="adguardSkillBusy(app, 'adguard_disable')"
                      @click.stop="adguardFleetSkill(app, 'adguard_disable')"
                      :title="t('apps.adguard.action_disable_title') || 'Disable protection on every host (indefinitely)'">
                <svg width="11" height="11" :class="adguardSkillBusy(app, 'adguard_disable') ? 'spin-md' : ''" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-pause"/>
                </svg>
                <span x-text="t('apps.adguard.action_disable') || 'Disable'"></span>
              </button>
              <button type="button" class="apps-card-action-pill whitespace-nowrap"
                      :disabled="adguardSkillBusy(app, 'adguard_refresh')"
                      @click.stop="adguardFleetSkill(app, 'adguard_refresh')"
                      :title="t('apps.adguard.action_refresh_title') || 'Re-download blocklists on every host'">
                <svg width="11" height="11" :class="adguardSkillBusy(app, 'adguard_refresh') ? 'spin-md' : ''" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-cw"/>
                </svg>
                <span x-text="t('apps.adguard.action_refresh') || 'Refresh lists'"></span>
              </button>
              <button type="button" class="apps-card-action-pill whitespace-nowrap"
                      :disabled="adguardSkillBusy(app, 'adguard_flush_cache')"
                      @click.stop="adguardFleetSkill(app, 'adguard_flush_cache')"
                      :title="t('apps.adguard.action_flush_title') || 'Flush the DNS resolver cache on every host'">
                <svg width="11" height="11" :class="adguardSkillBusy(app, 'adguard_flush_cache') ? 'spin-md' : ''" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash-2"/>
                </svg>
                <span x-text="t('apps.adguard.action_flush') || 'Flush cache'"></span>
              </button>
              <button type="button" class="apps-card-action-pill whitespace-nowrap"
                      :disabled="adguardSkillBusy(app, 'adguard_status')"
                      @click.stop="adguardFleetSkill(app, 'adguard_status')"
                      :title="t('apps.adguard.action_status_title') || 'Refresh the aggregated stats'">
                <svg width="11" height="11" :class="adguardSkillBusy(app, 'adguard_status') ? 'spin-md' : ''" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-activity"/>
                </svg>
                <span x-text="t('apps.adguard.action_status') || 'Refresh'"></span>
              </button>
            </div>
            <!-- Timed-disable presets. -->
            <div class="flex items-center gap-1 flex-wrap">
              <span class="fs-2xs text-[var(--text-faint)] me-1"
                    x-text="(t('apps.adguard.disable_for') || 'Disable for') + ':'"></span>
              <template x-for="ds in adguardDisablePresets()" :key="ds.skill">
                <button type="button"
                        class="apps-adguard-preset"
                        :disabled="adguardSkillBusy(app, ds.skill)"
                        @click.stop="adguardFleetSkill(app, ds.skill)"
                        x-text="ds.label"></button>
              </template>
            </div>
          </div>
        </template>
      </div>
    </template>
  </div>
</template>
