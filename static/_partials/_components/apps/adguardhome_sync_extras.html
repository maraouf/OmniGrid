<!-- Per-app expanded-card extras -- AdGuard Home Sync (bakito/adguardhome-sync).

     Renders inside `apps-card.html` as the per-instance host row when the
     chip is the AdGuard Home Sync catalog template AND the operator hasn't
     hidden extras via the per-instance `show_extras` toggle. The data
     comes from the sync tool's `GET /api/v1/status` (via
     `logic/apps/adguardhome_sync.py:fetch_data`), read through the
     generic, cache-backed `appsAppData(inst)` -- so the card never
     triggers a per-card round-trip on the hot path.

     Outer gate is just "is this a sync chip + extras visible" -- the data
     presence is checked on the INNER branches so the card shows a
     "Loading AdGuard sync status…" placeholder (and an error state)
     instead of rendering nothing until the first fetch lands (matches the
     Radarr / Speedtest / APC extras pattern). Only the populated stat
     panel sits in the boxed `.apps-card-ups`; placeholders render as plain
     italic text.

     Helpers used (all from `static/js/apps/adguardhome_sync.js`):
       adguardsyncIsApp(app)   -- gate "is this a sync chip"
       adguardsyncData(inst)   -- per-instance sync-status payload
       adguardsyncCount(v)     -- integer formatter
       adguardsyncFailed(inst) -- failing-replica name list
       adguardsyncAllOk(inst)  -- true when origin + every replica in sync -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="adguardsyncIsApp && adguardsyncIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null))">
  <!--suppress JSUnresolvedVariable -->
  <!-- Neutral wrapper (NOT the accent-tinted `.apps-card-ups` box) so the
       loading / error placeholders render as plain text. Only the
       populated stat panel sits inside the boxed `.apps-card-ups`. -->
  <div class="apps-card-adguardsync">
    <!-- Data present — render the status panel (the accent-tinted box). -->
    <template x-if="adguardsyncData(inst)">
      <div class="apps-card-ups" :data-adguardsync-host="inst.host_id">
        <!-- Per-host header (host name only when the app has > 1 instance). -->
        <div x-show="(app.instances || []).length > 1"
             class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
             x-text="inst.host_address || inst.host_id"></div>
        <div class="apps-card-ups-grid">
          <!-- Sync state (running / idle) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.adguardsync.sync_state') || 'Sync'"></div>
            <div class="apps-card-stat-value"
                 :class="adguardsyncData(inst).sync_running ? 'text-[var(--info)]' : ''"
                 x-text="adguardsyncData(inst).sync_running
                   ? (t('apps.adguardsync.running') || 'Running')
                   : (t('apps.adguardsync.idle') || 'Idle')"></div>
          </div>
          <!-- Origin status -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.adguardsync.origin') || 'Origin'"></div>
            <div class="apps-card-stat-value"
                 :class="adguardsyncData(inst).origin_ok ? 'text-[var(--success)]' : 'text-[var(--danger)]'"
                 x-text="adguardsyncData(inst).origin_ok
                   ? (t('apps.adguardsync.ok') || 'OK')
                   : (adguardsyncData(inst).origin_status || (t('apps.adguardsync.unknown') || 'Unknown'))"></div>
          </div>
          <!-- Replicas in sync (ok / total) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.adguardsync.replicas') || 'Replicas'"></div>
            <div class="apps-card-stat-value"
                 :class="adguardsyncAllOk(inst) ? 'text-[var(--success)]' : 'text-[var(--warning)]'"
                 x-text="adguardsyncCount(adguardsyncData(inst).replicas_ok) + ' / ' + adguardsyncCount(adguardsyncData(inst).replicas_total)"></div>
          </div>
        </div>
        <!-- Per-replica detail — which replica is stale + HOW stale (last-sync
             age) + why (error, drawer-only so the grid card stays compact). -->
        <template x-if="adguardsyncReplicas(inst).length">
          <div class="mt-1 space-y-0.5">
            <template x-for="(rep, ri) in adguardsyncReplicas(inst)" :key="(rep.host || '') + ':' + ri">
              <div class="fs-3xs">
                <div class="flex items-baseline justify-between gap-2">
                  <span class="flex items-baseline gap-1 min-w-0">
                    <span class="apps-ddns-dot"
                          :class="rep.ok ? 'apps-ddns-dot--ok' : 'apps-ddns-dot--fail'"
                          aria-hidden="true"></span>
                    <span class="mono truncate" x-text="rep.host || '?'" :title="rep.host"></span>
                  </span>
                  <span class="text-[var(--text-faint)] shrink-0"
                        x-show="adguardsyncRelAge(rep.last_sync)"
                        x-text="t('apps.adguardsync.last_sync', { ago: adguardsyncRelAge(rep.last_sync) }) || ('synced ' + adguardsyncRelAge(rep.last_sync))"></span>
                </div>
                <!-- Error detail — drawer-only (too long for the grid card). -->
                <div x-show="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && !rep.ok && rep.error"
                     class="text-[var(--danger)] ps-3 truncate" :title="rep.error"
                     x-text="rep.error"></div>
              </div>
            </template>
          </div>
        </template>
        <!-- Sync-reliability trend — daily-MIN in-sync %, recorded by the
             lifespan sampler (the sync tool keeps no history of its own).
             Shown once at least two samples exist in the window. -->
        <template x-if="adguardsyncHistory(inst) && adguardsyncHistory(inst).samples > 1">
          <div class="mt-2">
            <div class="flex items-baseline justify-between gap-2">
              <span class="apps-card-stat-label" x-text="t('apps.adguardsync.reliability') || 'Sync reliability'"></span>
              <span class="fs-3xs mono"
                    :class="adguardsyncHistory(inst).reliability_pct >= 99 ? 'text-[var(--success)]' : (adguardsyncHistory(inst).reliability_pct >= 90 ? 'text-[var(--warning)]' : 'text-[var(--danger)]')"
                    x-text="(adguardsyncHistory(inst).reliability_pct != null ? adguardsyncHistory(inst).reliability_pct : 0) + '%'"></span>
            </div>
            <template x-if="(adguardsyncHistory(inst).sync_pct_series || []).length > 1">
              <svg class="apps-spark apps-spark--mini" viewBox="0 0 100 24" preserveAspectRatio="none" aria-hidden="true">
                <polyline class="apps-spark-line" :points="adguardsyncSyncSpark(inst)"></polyline>
              </svg>
            </template>
            <div class="fs-3xs text-[var(--text-faint)] mono"
                 x-text="t('apps.adguardsync.reliability_caption', { days: adguardsyncHistory(inst).days, n: adguardsyncHistory(inst).out_of_sync_days }) || ('Last ' + adguardsyncHistory(inst).days + ' days · ' + adguardsyncHistory(inst).out_of_sync_days + ' out-of-sync day(s)')"></div>
          </div>
        </template>
        <!-- Sync interval / total syncs footnote (best-effort — only when the
             API exposes them). -->
        <div x-show="adguardsyncData(inst).sync_interval || adguardsyncData(inst).total_syncs"
             class="fs-3xs text-[var(--text-faint)] mt-1"
             x-text="[
               adguardsyncData(inst).sync_interval ? ((t('apps.adguardsync.interval') || 'Every') + ' ' + adguardsyncData(inst).sync_interval) : '',
               adguardsyncData(inst).total_syncs ? (adguardsyncCount(adguardsyncData(inst).total_syncs) + ' ' + (t('apps.adguardsync.syncs') || 'syncs')) : ''
             ].filter(Boolean).join(' · ')"></div>
        <!-- Version footnote (best-effort scrape from the sync web UI). -->
        <div x-show="adguardsyncData(inst).version"
             class="fs-3xs text-[var(--text-faint)] mt-1 mono"
             x-text="t('apps.version_footnote', { brand: 'AdGuard Home Sync', v: (adguardsyncData(inst).version || '') })"></div>
      </div>
    </template>
    <!-- Loading — first fetch in flight. -->
    <template x-if="!adguardsyncData(inst) && appsAppDataStatus(inst) === 'pending'">
      <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('apps.adguardsync.loading') || 'Loading AdGuard sync status…'"></span></p>
    </template>
    <!-- Error — upstream fetch failed. -->
    <template x-if="!adguardsyncData(inst) && appsAppDataStatus(inst) === 'error'">
      <p class="fs-xs text-[var(--danger)] italic"
         x-text="(t('apps.adguardsync.fetch_failed') || 'AdGuard sync fetch failed') + ': ' + appsAppDataError(inst)"></p>
    </template>
  </div>
</template>
