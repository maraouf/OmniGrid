<!-- Per-app expanded-card extras -- APC (UPS / NMC / PDU).

     Renders inside `apps-card.html` as the per-instance host row
     when the chip is the APC catalog template AND the operator
     hasn't explicitly hidden extras via the per-instance
     `show_extras` toggle. The data comes from the
     `host_snmp_samples` DB table (NOT the live host row): the
     gate's `apcHostUpsData(inst)` call reads the generic,
     cache-backed `appsAppData(inst)`, which fetches the latest
     sample for the pinned host via the per-app dispatcher
     (`logic/apps/apc.py:fetch_data`). Evaluating the gate kicks
     the DB-backed fetch on first mount and re-renders when it
     lands -- no per-card live SNMP probe. Returns null while
     idle / pending / errored OR when the sample carries no UPS
     field, so the panel gates cleanly for non-UPS hosts pinned
     to the APC template by mistake.

     Helpers used (all from `static/js/apps/apc.js`):
       apcIsApp(app)             -- gate "is this an APC chip"
       apcHostUpsData(inst)      -- per-instance UPS data dict
       apcUpsRuntimeLabel(s)     -- human runtime formatter -->
<!-- Outer gate is just "is this an APC chip + extras visible" — the
     data presence is checked on the INNER branches so the card shows a
     "Loading UPS data…" placeholder (and error / no-data states) instead
     of rendering nothing until the first DB-backed fetch lands (matches
     the Speedtest extras pattern). `apcHostUpsData(inst)` (on the data
     branch) calls `appsAppData(inst)`, which kicks the fetch on mount;
     `appsAppDataStatus(inst)` reads the cache sentinel for the empty
     states (it does NOT itself trigger a fetch). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="apcIsApp && apcIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null))">
  <!--suppress JSUnresolvedVariable -->
  <!-- Neutral wrapper (NOT the accent-tinted `.apps-card-ups` box) so the
       loading / error / no-data placeholders render as plain text — matching
       the Speedtest / Seerr / Bazarr extras. Only the populated 5-stat panel
       sits inside the boxed `.apps-card-ups`. -->
  <div class="apps-card-apc">
    <!-- Data present — render the 5-stat panel (the accent-tinted box). -->
    <template x-if="apcHostUpsData(inst)">
      <div class="apps-card-ups" :data-ups-host="inst.host_id">
        <!-- Per-host header (host name only when the app has > 1
             instance; with 1 instance the card header already shows
             the host). -->
        <div x-show="(app.instances || []).length > 1"
             class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
             x-text="inst.host_address || inst.host_id"></div>
        <div class="apps-card-ups-grid">
          <!-- Battery % -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.ups.battery') || 'Battery'"></div>
            <div class="apps-card-stat-value"
                 x-text="(apcHostUpsData(inst).battery_percent != null) ? (apcHostUpsData(inst).battery_percent.toFixed(0) + '%') : '--'"></div>
          </div>
          <!-- Output load % -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.ups.output_load') || 'Output load'"></div>
            <div class="apps-card-stat-value"
                 x-text="(apcHostUpsData(inst).load_percent != null) ? (apcHostUpsData(inst).load_percent.toFixed(0) + '%') : '--'"></div>
          </div>
          <!-- Runtime remaining (mm:ss / Nh Mm) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.ups.runtime') || 'Runtime remaining'"></div>
            <div class="apps-card-stat-value"
                 x-text="apcUpsRuntimeLabel(apcHostUpsData(inst).runtime_s)"></div>
          </div>
          <!-- Battery temperature degC -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.ups.battery_temp') || 'Battery temperature'"></div>
            <div class="apps-card-stat-value"
                 x-text="(apcHostUpsData(inst).battery_temp_c != null) ? (apcHostUpsData(inst).battery_temp_c.toFixed(0) + '°C') : '--'"></div>
          </div>
          <!-- Battery state (Normal / Low / On Battery / etc.) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.ups.battery_state') || 'Battery state'"></div>
            <div class="apps-card-stat-value" x-text="apcHostUpsData(inst).status || '--'"></div>
          </div>
        </div>
        <!-- Power-quality scalars (input/output voltage, mains frequency, last
             transfer cause, self-test, battery-replace flag). Read-only SNMP
             (PowerNet-MIB). Hidden when the UPS / firmware doesn't expose them. -->
        <template x-if="apcHasPowerQuality(apcHostUpsData(inst))">
          <div class="mt-2">
            <div class="apps-card-ups-grid">
              <!-- Input voltage (utility line VAC) -->
              <template x-if="apcHostUpsData(inst).input_voltage != null">
                <div class="apps-card-ups-stat">
                  <div class="apps-card-stat-label" x-text="t('apps.apc.input_voltage') || 'Input voltage'"></div>
                  <div class="apps-card-stat-value"
                       x-text="apcHostUpsData(inst).input_voltage.toFixed(0) + ' V'"></div>
                </div>
              </template>
              <!-- Output voltage (VAC) -->
              <template x-if="apcHostUpsData(inst).output_voltage != null">
                <div class="apps-card-ups-stat">
                  <div class="apps-card-stat-label" x-text="t('apps.apc.output_voltage') || 'Output voltage'"></div>
                  <div class="apps-card-stat-value"
                       x-text="apcHostUpsData(inst).output_voltage.toFixed(0) + ' V'"></div>
                </div>
              </template>
              <!-- Input mains frequency (Hz) -->
              <template x-if="apcHostUpsData(inst).input_freq_hz != null">
                <div class="apps-card-ups-stat">
                  <div class="apps-card-stat-label" x-text="t('apps.apc.input_freq') || 'Line frequency'"></div>
                  <div class="apps-card-stat-value"
                       x-text="apcHostUpsData(inst).input_freq_hz.toFixed(0) + ' Hz'"></div>
                </div>
              </template>
              <!-- Last transfer-to-battery cause -->
              <template x-if="apcHostUpsData(inst).last_transfer">
                <div class="apps-card-ups-stat">
                  <div class="apps-card-stat-label" x-text="t('apps.apc.last_transfer') || 'Last transfer'"></div>
                  <div class="apps-card-stat-value" x-text="apcTransferLabel(apcHostUpsData(inst).last_transfer)"></div>
                </div>
              </template>
              <!-- Last self-test result -->
              <template x-if="apcHostUpsData(inst).self_test">
                <div class="apps-card-ups-stat">
                  <div class="apps-card-stat-label" x-text="t('apps.apc.self_test') || 'Self-test'"></div>
                  <div class="apps-card-stat-value" x-text="apcSelfTestLabel(apcHostUpsData(inst).self_test)"></div>
                </div>
              </template>
              <!-- Output real power (Watts) — model-dependent OID. -->
              <template x-if="apcHostUpsData(inst).output_power_w != null">
                <div class="apps-card-ups-stat">
                  <div class="apps-card-stat-label" x-text="t('apps.apc.output_power') || 'Output power'"></div>
                  <div class="apps-card-stat-value" x-text="apcHostUpsData(inst).output_power_w + ' W'"></div>
                </div>
              </template>
              <!-- Battery last-replace date (battery-age reference). -->
              <template x-if="apcHostUpsData(inst).battery_replace_date">
                <div class="apps-card-ups-stat">
                  <div class="apps-card-stat-label" x-text="t('apps.apc.battery_installed') || 'Battery installed'"></div>
                  <div class="apps-card-stat-value mono" x-text="apcHostUpsData(inst).battery_replace_date"></div>
                </div>
              </template>
            </div>
            <!-- On-battery banner — only shown DURING an outage (the OID reads 0
                 on mains). Tells you how long the UPS has been carrying load. -->
            <template x-if="(Number(apcHostUpsData(inst).time_on_battery_s) || 0) > 0">
              <p class="fs-3xs text-[var(--warning)] mt-1.5 inline-flex items-center gap-1"
                 x-text="'🔋 ' + t('apps.apc.on_battery_for', { dur: apcUpsRuntimeLabel(apcHostUpsData(inst).time_on_battery_s) })"></p>
            </template>
            <!-- Battery-replace warning (only when the UPS reports it needs a
                 new battery pack). -->
            <template x-if="apcHostUpsData(inst).battery_replace === 1">
              <p class="fs-3xs text-[var(--danger)] mt-1.5 inline-flex items-center gap-1"
                 x-text="'⚠️ ' + (t('apps.apc.battery_replace') || 'Battery needs replacing')"></p>
            </template>
          </div>
        </template>
        <!-- Battery / load / runtime trend sparklines — windowed read of the
             already-persisted host_snmp_samples (no APC sampler). Shown once at
             least two samples exist in the window. -->
        <template x-if="apcHistory(inst) && apcHistory(inst).samples > 1">
          <div class="mt-2 space-y-1.5">
            <!-- Runtime remaining (minutes) — the headline UPS trend. -->
            <template x-if="(apcHistory(inst).runtime_series || []).length > 1">
              <div>
                <div class="flex items-baseline justify-between gap-2">
                  <span class="apps-card-stat-label" x-text="t('apps.ups.runtime_trend') || 'Runtime trend'"></span>
                  <span class="fs-3xs text-[var(--text-faint)] mono"
                        x-text="(apcHistory(inst).runtime_low_min != null ? ((t('apps.ups.low') || 'low') + ' ' + apcHistory(inst).runtime_low_min + 'm') : '')"></span>
                </div>
                <svg class="apps-spark apps-spark--trend" viewBox="0 0 100 24" preserveAspectRatio="none" aria-hidden="true">
                  <polyline class="apps-spark-line" :points="apcSparkPoints(inst, 'runtime')"></polyline>
                </svg>
              </div>
            </template>
            <!-- Battery % + Output load % mini sparklines side by side. -->
            <div class="apps-card-ups-grid">
              <template x-if="(apcHistory(inst).battery_series || []).length > 1">
                <div>
                  <div class="apps-card-stat-label" x-text="t('apps.ups.battery') || 'Battery'"></div>
                  <svg class="apps-spark apps-spark--mini" viewBox="0 0 100 24" preserveAspectRatio="none" aria-hidden="true">
                    <polyline class="apps-spark-line" :points="apcSparkPoints(inst, 'battery')"></polyline>
                  </svg>
                </div>
              </template>
              <template x-if="(apcHistory(inst).load_series || []).length > 1">
                <div>
                  <div class="apps-card-stat-label" x-text="t('apps.ups.output_load') || 'Output load'"></div>
                  <svg class="apps-spark apps-spark--mini" viewBox="0 0 100 24" preserveAspectRatio="none" aria-hidden="true">
                    <polyline class="apps-spark-line" :points="apcSparkPoints(inst, 'load')"></polyline>
                  </svg>
                </div>
              </template>
            </div>
            <!-- Input-voltage (mains-quality) trend — reuses the same
                 host_snmp_samples history; shown when the UPS reports input
                 voltage and at least two points exist. -->
            <template x-if="(apcHistory(inst).voltage_series || []).length > 1">
              <div>
                <div class="flex items-baseline justify-between gap-2">
                  <span class="apps-card-stat-label" x-text="t('apps.apc.input_voltage_trend') || 'Input voltage trend'"></span>
                  <span class="fs-3xs text-[var(--text-faint)] mono"
                        x-text="(apcHistory(inst).voltage_current != null) ? (apcHistory(inst).voltage_current + ' V') : ''"></span>
                </div>
                <svg class="apps-spark apps-spark--mini" viewBox="0 0 100 24" preserveAspectRatio="none" aria-hidden="true">
                  <polyline class="apps-spark-line" :points="apcSparkPoints(inst, 'voltage')"></polyline>
                </svg>
              </div>
            </template>
            <div class="fs-3xs text-[var(--text-faint)] mono"
                 x-text="t('apps.ups.trend_caption', { days: apcHistory(inst).days }) || ('Last ' + apcHistory(inst).days + ' days')"></div>
          </div>
        </template>
      </div>
    </template>
    <!-- Loading — first fetch in flight. -->
    <template x-if="!apcHostUpsData(inst) && appsAppDataStatus(inst) === 'pending'">
      <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('apps.ups.loading') || 'Loading UPS data…'"></span></p>
    </template>
    <!-- Error — upstream / SNMP fetch failed. -->
    <template x-if="!apcHostUpsData(inst) && appsAppDataStatus(inst) === 'error'">
      <p class="fs-xs text-[var(--danger)] italic"
         x-text="(t('apps.ups.fetch_failed') || 'UPS fetch failed') + ': ' + appsAppDataError(inst)"></p>
    </template>
    <!-- Fetched OK but the sample carries no UPS field (a plain SNMP host
         pinned to the APC template by mistake). -->
    <template x-if="!apcHostUpsData(inst) && appsAppDataStatus(inst) === 'ok'">
      <p class="fs-xs text-[var(--text-faint)] italic"
         x-text="t('apps.ups.no_data') || 'No UPS data reported for this host'"></p>
    </template>
  </div>
</template>
