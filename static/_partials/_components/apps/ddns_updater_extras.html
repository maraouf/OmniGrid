<!-- Per-app expanded-card extras -- ddns-updater (qdm12/ddns-updater).

     Renders inside `apps-card.html` when the chip is the ddns-updater catalog
     template AND extras are visible. ddns-updater has NO JSON API, so the data
     comes from the backend parsing its web-UI HTML table
     (`logic/apps/ddns_updater.py:fetch_data`), read through the cache-backed
     `appsAppData(inst)`. Shows Records / Up to date / Failing + the public IP
     + a failing-domains footnote.

     Helpers used (all from `static/js/apps/ddns_updater.js`):
       ddnsIsApp(app) / ddnsData(inst) / ddnsCount(v) / ddnsFailing(inst) -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="ddnsIsApp && ddnsIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null))">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-ddns">
    <template x-if="ddnsData(inst)">
      <div class="apps-card-ups" :data-ddns-host="inst.host_id">
        <div x-show="(app.instances || []).length > 1"
             class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
             x-text="inst.host_address || inst.host_id"></div>
        <div class="apps-card-ups-grid">
          <!-- Records (total managed) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-ups-label" x-text="t('apps.ddns.records') || 'Records'"></div>
            <div class="apps-card-ups-value" x-text="ddnsCount(ddnsData(inst).records_total)"></div>
          </div>
          <!-- Up to date -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-ups-label" x-text="t('apps.ddns.up_to_date') || 'Up to date'"></div>
            <div class="apps-card-ups-value text-[var(--success)]" x-text="ddnsCount(ddnsData(inst).up_count)"></div>
          </div>
          <!-- Failing -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-ups-label" x-text="t('apps.ddns.failing') || 'Failing'"></div>
            <div class="apps-card-ups-value"
                 :class="(Number(ddnsData(inst).fail_count) || 0) > 0 ? 'text-[var(--danger)]' : 'text-[var(--success)]'"
                 x-text="ddnsCount(ddnsData(inst).fail_count)"></div>
          </div>
        </div>
        <!-- Public IP footnote. -->
        <div x-show="ddnsData(inst).public_ip"
             class="fs-3xs text-[var(--text-faint)] mt-1 mono"
             x-text="(t('apps.ddns.public_ip') || 'Public IP') + ': ' + (ddnsData(inst).public_ip || '')"></div>
        <!-- Failing-domains footnote (only when > 0). -->
        <div x-show="ddnsFailing(inst).length"
             class="fs-3xs text-[var(--danger)] mt-1"
             x-text="(t('apps.ddns.failing') || 'Failing') + ': ' + ddnsFailing(inst).join(', ')"></div>
      </div>
    </template>
    <!-- Loading — first fetch in flight. -->
    <template x-if="!ddnsData(inst) && appsAppDataStatus(inst) === 'pending'">
      <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('apps.ddns.loading') || 'Loading ddns-updater data…'"></span></p>
    </template>
    <!-- Error — upstream fetch failed. -->
    <template x-if="!ddnsData(inst) && appsAppDataStatus(inst) === 'error'">
      <p class="fs-xs text-[var(--danger)] italic"
         x-text="(t('apps.ddns.fetch_failed') || 'ddns-updater fetch failed') + ': ' + appsAppDataError(inst)"></p>
    </template>
  </div>
</template>
