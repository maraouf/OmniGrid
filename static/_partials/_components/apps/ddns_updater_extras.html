<!-- Per-app expanded-card extras -- ddns-updater (qdm12/ddns-updater).

     Renders inside `apps-card.html` when the chip is the ddns-updater catalog
     template AND extras are visible. ddns-updater has NO JSON API, so the data
     comes from the backend parsing its web-UI HTML table
     (`logic/apps/ddns_updater.py:fetch_data`), read through the cache-backed
     `appsAppData(inst)`. Shows Records / Up to date / Failing + the public IP
     + a failing-domains footnote.

     Helpers used (all from `static/js/apps/ddns_updater.js`):
       ddnsIsApp(app) / ddnsData(inst) / ddnsCount(v) / ddnsFailing(inst) -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="ddnsIsApp && ddnsIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null))">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-ddns">
    <template x-if="ddnsData(inst)">
      <div class="apps-card-ups" :data-ddns-host="inst.host_id">
        <div x-show="(app.instances || []).length > 1"
             class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
             x-text="inst.host_address || inst.host_id"></div>
        <div class="apps-card-ups-grid">
          <!-- Records (total managed) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.ddns.records') || 'Records'"></div>
            <div class="apps-card-stat-value" x-text="ddnsCount(ddnsData(inst).records_total)"></div>
          </div>
          <!-- Up to date -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.ddns.up_to_date') || 'Up to date'"></div>
            <div class="apps-card-stat-value text-[var(--success)]" x-text="ddnsCount(ddnsData(inst).up_count)"></div>
          </div>
          <!-- Failing -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.ddns.failing') || 'Failing'"></div>
            <div class="apps-card-stat-value"
                 :class="(Number(ddnsData(inst).fail_count) || 0) > 0 ? 'text-[var(--danger)]' : 'text-[var(--success)]'"
                 x-text="ddnsCount(ddnsData(inst).fail_count)"></div>
          </div>
        </div>
        <!-- Public IP footnote. -->
        <div x-show="ddnsData(inst).public_ip"
             class="fs-3xs text-[var(--text-faint)] mt-1 mono"
             x-text="(t('apps.ddns.public_ip') || 'Public IP') + ': ' + (ddnsData(inst).public_ip || '')"></div>
        <!-- Failing-domains footnote (only when > 0). -->
        <div x-show="ddnsFailing(inst).length"
             class="fs-3xs text-[var(--danger)] mt-1"
             x-text="(t('apps.ddns.failing') || 'Failing') + ': ' + ddnsFailing(inst).join(', ')"></div>
        <!-- Stale-record footnote (an OK record that hasn't re-pushed within the
             threshold — amber, only when > 0). -->
        <div x-show="(Number(ddnsData(inst).stale_count) || 0) > 0"
             class="fs-3xs text-[var(--warning)] mt-1"
             x-text="t('apps.ddns.stale_footnote', { count: (Number(ddnsData(inst).stale_count) || 0), hours: (Number(ddnsData(inst).stale_after_hours) || 24) }) || ((Number(ddnsData(inst).stale_count) || 0) + ' stale (no update in >' + (Number(ddnsData(inst).stale_after_hours) || 24) + 'h)')"></div>

        <!-- Public-IP-change timeline (newest-first). From the lifespan ddns
             sampler — shown once at least one change has been recorded. -->
        <template x-if="ddnsIpChanges(inst).length">
          <div class="mt-2">
            <div class="apps-card-stat-label mb-1"
                 x-text="t('apps.ddns.ip_timeline_title') || 'Public IP changes'"></div>
            <template x-for="(chg, ci) in ddnsIpChanges(inst).slice(0, 6)" :key="chg.ts + ':' + chg.ip">
              <div class="flex items-center justify-between gap-2 fs-3xs">
                <span class="mono"
                      :class="ci === 0 ? 'text-[var(--success)]' : 'text-[var(--text-dim)]'"
                      x-text="(ci === 0 ? '→ ' : '') + chg.ip"></span>
                <span class="text-[var(--text-faint)]"
                      x-text="t('apps.ddns.ago', { ago: fmtAgo(chg.ts * 1000) }) || (fmtAgo(chg.ts * 1000) + ' ago')"></span>
              </div>
            </template>
          </div>
        </template>

        <!-- Failing-count sparkline (daily max). Only when there's a trend to
             show (samples accrued AND at least one failure in the window). -->
        <template x-if="ddnsHistory(inst) && ddnsHistory(inst).samples > 0 && ddnsHistory(inst).fail_peak > 0">
          <div class="mt-2">
            <div class="apps-card-stat-label mb-1"
                 x-text="t('apps.ddns.fail_trend_title') || 'Failing records'"></div>
            <svg class="apps-spark" viewBox="0 0 100 24" preserveAspectRatio="none" aria-hidden="true">
              <polyline class="apps-spark-line apps-spark-line--danger" :points="ddnsFailSparkPoints(inst)"></polyline>
            </svg>
            <div class="fs-3xs text-[var(--text-faint)]"
                 x-text="t('apps.ddns.fail_trend_caption', { days: ddnsHistory(inst).days }) || ('Failing records, last ' + ddnsHistory(inst).days + ' days')"></div>
          </div>
        </template>

        <!-- Per-record detail (provider / IP version / last-updated /
             previous IP). The richer parse the card couldn't show before. -->
        <template x-if="ddnsRecords(inst).length">
          <div class="mt-2">
            <div class="apps-card-stat-label mb-1"
                 x-text="t('apps.ddns.records_title') || 'Records'"></div>
            <template x-for="(rec, ri) in ddnsRecords(inst).slice(0, 6)" :key="(rec.domain || '') + ':' + ri">
              <div class="flex items-baseline justify-between gap-2 fs-3xs py-0.5">
                <span class="flex items-baseline gap-1 min-w-0">
                  <span class="apps-ddns-dot"
                        :class="rec.status === 'ok' ? 'apps-ddns-dot--ok' : (rec.status === 'fail' ? 'apps-ddns-dot--fail' : 'apps-ddns-dot--pending')"
                        aria-hidden="true"></span>
                  <span class="mono truncate" x-text="rec.domain || '?'" :title="rec.domain"></span>
                  <span class="text-[var(--text-faint)] truncate"
                        x-show="rec.provider || rec.ip_version"
                        x-text="'· ' + [rec.provider, rec.ip_version].filter(Boolean).join(' · ')"></span>
                </span>
                <span class="text-[var(--text-faint)] shrink-0"
                      x-show="rec.last_updated"
                      x-text="t('apps.ddns.last_updated', { when: rec.last_updated }) || rec.last_updated"></span>
              </div>
            </template>
            <div x-show="ddnsRecords(inst).length > 6"
                 class="fs-3xs text-[var(--text-faint)] mt-0.5"
                 x-text="t('apps.ddns.more_records', { count: ddnsRecords(inst).length - 6 }) || ('+' + (ddnsRecords(inst).length - 6) + ' more')"></div>
          </div>
        </template>
      </div>
    </template>
    <!-- Loading — first fetch in flight. -->
    <template x-if="!ddnsData(inst) && appsAppDataStatus(inst) === 'pending'">
      <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('apps.ddns.loading') || 'Loading ddns-updater data…'"></span></p>
    </template>
    <!-- Error — upstream fetch failed. -->
    <template x-if="!ddnsData(inst) && appsAppDataStatus(inst) === 'error'">
      <p class="fs-xs text-[var(--danger)] italic"
         x-text="(t('apps.ddns.fetch_failed') || 'ddns-updater fetch failed') + ': ' + appsAppDataError(inst)"></p>
    </template>
  </div>
</template>
