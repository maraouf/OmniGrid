<!-- Per-app editor fields -- Fing (network device inventory + presence).

     Renders inside the Admin -> Apps per-instance editor as a conditional
     `<template x-if="...">` so it only appears when the chip's catalog template
     is Fing. Gates on `fingIsApp({catalog:{slug: appsInstanceEditForm.catalog_slug}})`
     so the helper from `static/js/apps/fing.js` is the single source of truth
     for "is this a Fing chip?". Fing's Local API is guarded by a single API KEY
     sent as the `?auth=<key>` QUERY PARAMETER (NOT a header) -> the secret
     `api_key` chip field (never returned; only an `api_key_set` flag,
     keep-current-if-blank on save). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="fingIsApp && fingIsApp({catalog: {slug: appsInstanceEditForm.catalog_slug || (appsInstanceEditForm.catalog_name || '').toLowerCase()}, name: appsInstanceEditForm.name || appsInstanceEditForm.catalog_name || ''})">
  <div class="space-y-2 pt-3 mt-3 border-t border-[var(--border)]">
    <div>
      <label for="apps-instance-fing-api-key"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.fing.api_key_label') || 'Fing Local API key'"></label>
      <input id="apps-instance-fing-api-key"
             type="password" x-model="appsInstanceEditForm.api_key"
             class="w-full bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm"
             :placeholder="appsInstanceEditForm.api_key_set
               ? (t('apps.fing.api_key_placeholder_saved') || 'Saved -- leave blank to keep')
               : (t('apps.fing.api_key_placeholder_unset') || 'Local API key')"
             autocomplete="off" spellcheck="false">
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('apps.fing.api_key_hint') || 'Enable the Local API on your Fing unit, then copy the key. On the Fing Agent (Docker / Linux / NAS) it is OFF by default — turn it on at app.fing.com → Manage → Settings → Local API (or the mobile app → your agent → Settings → Local API) and set a port + key there; in Fing Desktop it is in the desktop app settings. The key is sent as the ?auth=<key> query parameter (not a header). Point the chip URL at the Local API port (default :49090) — note the Fing Agent published port 44444 is UPnP status only, not the API. Stored encrypted-at-rest and never shown again; leave blank to keep the saved one.'"></p>
    </div>
    <!-- Per-instance data-cache TTL (contained in the app, NOT a global Config
         tunable). Blank = the app default (60s); backend clamps 5..3600. -->
    <div>
      <label for="apps-instance-fing-cache-ttl"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.cache_ttl_label') || 'Data cache TTL (seconds)'"></label>
      <div class="flex flex-wrap items-center gap-2">
        <input id="apps-instance-fing-cache-ttl"
               type="number" min="5" max="3600" step="1"
               x-model="appsInstanceEditForm.cache_ttl"
               @change="appsInstanceEditForm.cache_ttl = appsClampCacheTtl(appsInstanceEditForm.cache_ttl)"
               class="w-32 bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm mono"
               :placeholder="t('apps.cache_ttl_placeholder') || 'App default'"
               autocomplete="off">
        <div class="bounds-chips" role="group"
             :aria-label="t('admin.config.bounds.group_label') || 'Bounds'">
          <span class="bounds-chip bounds-chip--min" :title="t('admin.config.bounds.min_title') || 'Minimum'">
            <svg width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/>
            </svg>
            <span>5</span>
          </span>
          <span class="bounds-chip bounds-chip--max" :title="t('admin.config.bounds.max_title') || 'Maximum'">
            <svg width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/>
            </svg>
            <span>3600</span>
          </span>
          <span class="bounds-chip bounds-chip--default" :title="t('admin.config.bounds.default_title') || 'Default'">
            <svg width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/>
            </svg>
            <span>60</span>
          </span>
        </div>
      </div>
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('apps.cache_ttl_hint') || 'How long fetched device data is cached before re-querying Fing (5–3600s). Leave blank for the app default (60s).'"></p>
    </div>
    <!-- Shared Test-connection unit (same button + result box as the
         Portainer / OIDC admin panels) so the per-app editor never drifts. -->
    <div x-data="{ tcRun: () => testInstanceCredential(), tcResult: () => appsInstanceTestResult, tcLastTs: () => appsInstanceEditForm.last_test_ok_ts }">
      <!-- INCLUDE: _components/og-test-connection.html -->
    </div>
  </div>
</template>
