<!-- Per-app expanded-card extras -- FlareSolverr (Cloudflare-challenge solver).

     Renders inside `apps-card.html` when the chip is the FlareSolverr catalog
     template AND extras are visible. Data comes from
     `logic/apps/flaresolverr.py:fetch_data` (GET / + POST /v1 sessions.list),
     read through the cache-backed `appsAppData(inst)`. Reuses the shared
     `.apps-card-ups-*` stat-grid (a generic telemetry panel, not UPS-specific).

     Helpers used (all from `static/js/apps/flaresolverr.js`):
       flaresolverrIsApp(app) / flaresolverrData(inst) / flaresolverrCount(v) -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="flaresolverrIsApp && flaresolverrIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && flaresolverrData(inst)">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-ups" :data-flaresolverr-host="inst.host_id">
    <!-- Per-host header (host name only when the app has > 1 instance). -->
    <div x-show="(app.instances || []).length > 1"
         class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
         x-text="inst.host_address || inst.host_id"></div>
    <div class="apps-card-ups-grid">
      <!-- Ready / not ready. -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.flaresolverr.status') || 'Status'"></div>
        <div class="apps-card-stat-value"
             :class="flaresolverrData(inst).ready ? 'text-[var(--success)]' : 'text-[var(--warning)]'"
             x-text="flaresolverrData(inst).ready ? (t('apps.flaresolverr.ready') || 'Ready') : (t('apps.flaresolverr.up') || 'Up')"></div>
      </div>
      <!-- Active browser sessions. -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.flaresolverr.sessions') || 'Sessions'"></div>
        <div class="apps-card-stat-value" x-text="flaresolverrCount(flaresolverrData(inst).sessions)"></div>
      </div>
    </div>
    <!-- Version + user-agent footnote. -->
    <div class="fs-3xs text-[var(--text-faint)] mt-1 mono"
         x-show="flaresolverrData(inst).version"
         x-text="t('apps.version_footnote', { brand: 'FlareSolverr', v: (flaresolverrData(inst).version || '') })"></div>
    <div class="fs-3xs text-[var(--text-faint)] mt-1 mono truncate"
         x-show="flaresolverrData(inst).user_agent"
         :title="flaresolverrData(inst).user_agent"
         x-text="t('apps.flaresolverr.ua_footnote', { ua: (flaresolverrData(inst).user_agent || '') })"></div>
  </div>
</template>
<!-- Loading — first fetch in flight. -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="flaresolverrIsApp && flaresolverrIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && !flaresolverrData(inst) && appsAppDataStatus(inst) === 'pending'">
  <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
    <span class="spin" aria-hidden="true"></span>
    <span x-text="t('apps.flaresolverr.loading') || 'Loading FlareSolverr data…'"></span></p>
</template>
<!-- Error — upstream fetch failed. -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="flaresolverrIsApp && flaresolverrIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && !flaresolverrData(inst) && appsAppDataStatus(inst) === 'error'">
  <p class="fs-xs text-[var(--danger)] italic"
     x-text="(t('apps.flaresolverr.fetch_failed') || 'FlareSolverr fetch failed') + ': ' + appsAppDataError(inst)"></p>
</template>
