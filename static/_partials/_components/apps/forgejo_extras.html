<!-- Per-app expanded-card extras -- Forgejo (self-hosted Git service).

     Renders inside `apps-card.html` as the per-instance host row when the
     chip is the Forgejo catalog template AND the operator hasn't hidden
     extras via the per-instance `show_extras` toggle. The data comes from the
     Forgejo (Gitea-compatible) REST API (user/repos + issues/search +
     notifications) via `logic/apps/forgejo.py:fetch_data`, read through the
     generic, cache-backed `appsAppData(inst)` -- so the card never triggers a
     per-card round-trip on the hot path.

     Reuses the shared `.apps-card-ups-*` stat-grid component (the same
     2-column stat panel Plex / Jellyfin / Bazarr render) -- the classes are a
     generic telemetry stat grid, not UPS-specific.

     Helpers used (all from `static/js/apps/forgejo.js`):
       forgejoIsApp(app)   -- gate "is this a Forgejo chip"
       forgejoData(inst)   -- per-instance repo / PR / issue payload
       forgejoCount(v)     -- thousands-separated integer formatter -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="forgejoIsApp && forgejoIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && forgejoData(inst)">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-ups" :data-forgejo-host="inst.host_id">
    <!-- Per-host header (host name only when the app has > 1 instance). -->
    <div x-show="(app.instances || []).length > 1"
         class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
         x-text="inst.host_address || inst.host_id"></div>
    <div class="apps-card-ups-grid">
      <!-- Repos -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.forgejo.repos') || 'Repos'"></div>
        <div class="apps-card-stat-value" x-text="forgejoCount(forgejoData(inst).repos)"></div>
      </div>
      <!-- Open PRs -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.forgejo.open_prs') || 'Open PRs'"></div>
        <div class="apps-card-stat-value" x-text="forgejoCount(forgejoData(inst).open_prs)"></div>
      </div>
      <!-- Open issues -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.forgejo.open_issues') || 'Open issues'"></div>
        <div class="apps-card-stat-value" x-text="forgejoCount(forgejoData(inst).open_issues)"></div>
      </div>
      <!-- Unread notifications -- highlighted when > 0 -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.forgejo.notifications') || 'Notifications'"></div>
        <div class="apps-card-stat-value"
             :class="(Number(forgejoData(inst).notifications) || 0) > 0 ? 'text-[var(--warning)]' : ''"
             x-text="forgejoCount(forgejoData(inst).notifications)"></div>
      </div>
    </div>
    <!-- Version footnote. -->
    <div class="fs-3xs text-[var(--text-faint)] mt-1 mono inline-flex flex-wrap gap-x-2">
      <span x-show="forgejoData(inst).version"
            x-text="t('apps.version_footnote', { brand: 'Forgejo', v: (forgejoData(inst).version || '') })"></span>
    </div>
  </div>
</template>
<!-- No API token yet — idle and unconfigured. -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="forgejoIsApp && forgejoIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && appsAppDataStatus(inst) === 'idle' && !inst.api_key_set">
  <p class="fs-xs text-[var(--text-faint)] italic"
     x-text="t('apps.forgejo.no_api_key') || 'No API token set -- add one in Admin -> Apps to enable.'"></p>
</template>
<!-- Loading — first fetch in flight (panel above gates on forgejoData). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="forgejoIsApp && forgejoIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && !forgejoData(inst) && appsAppDataStatus(inst) === 'pending'">
  <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
    <span class="spin" aria-hidden="true"></span>
    <span x-text="t('apps.forgejo.loading') || 'Loading Forgejo data…'"></span></p>
</template>
<!-- Error — upstream fetch failed. -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="forgejoIsApp && forgejoIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && !forgejoData(inst) && appsAppDataStatus(inst) === 'error'">
  <p class="fs-xs text-[var(--danger)] italic"
     x-text="(t('apps.forgejo.fetch_failed') || 'Forgejo fetch failed') + ': ' + appsAppDataError(inst)"></p>
</template>
