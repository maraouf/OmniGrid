<!-- Per-app expanded-card extras -- GitSync Connector (Forgejo -> GitHub repo sync).

     Renders inside `apps-card.html` as the per-instance host row when the
     chip is the GitSync catalog template AND the operator hasn't hidden
     extras via the per-instance `show_extras` toggle. The data comes from the
     GitSync Connector REST API (`GET /api/v1/metrics`) via
     `logic/apps/gitsync.py:fetch_data`, read through the generic, cache-backed
     `appsAppData(inst)` -- so the card never triggers a per-card round-trip on
     the hot path.

     Reuses the shared `.apps-card-ups-*` stat-grid component (the same
     2-column stat panel Plex / Grafana / Forgejo render) -- the classes are a
     generic telemetry stat grid, not UPS-specific.

     Helpers used (all from `static/js/apps/gitsync.js`):
       gitsyncIsApp(app)     -- gate "is this a GitSync chip"
       gitsyncData(inst)     -- per-instance fleet metrics payload
       gitsyncCount(v)       -- thousands-separated integer formatter
       gitsyncAlertTotal(d)  -- total unacknowledged alerts -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="gitsyncIsApp && gitsyncIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && gitsyncData(inst)">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-ups" :data-gitsync-host="inst.host_id">
    <!-- Per-host header (host name only when the app has > 1 instance). -->
    <div x-show="(app.instances || []).length > 1"
         class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
         x-text="inst.host_address || inst.host_id"></div>
    <div class="apps-card-ups-grid">
      <!-- Pairs -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.gitsync.pairs') || 'Pairs'"></div>
        <div class="apps-card-stat-value" x-text="gitsyncCount(gitsyncData(inst).pairs)"></div>
      </div>
      <!-- Paused -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.gitsync.paused') || 'Paused'"></div>
        <div class="apps-card-stat-value" x-text="gitsyncCount(gitsyncData(inst).paused)"></div>
      </div>
      <!-- Issues -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.gitsync.issues') || 'Issues'"></div>
        <div class="apps-card-stat-value" x-text="gitsyncCount(gitsyncData(inst).issue_mappings)"></div>
      </div>
      <!-- Commits -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.gitsync.commits') || 'Commits'"></div>
        <div class="apps-card-stat-value" x-text="gitsyncCount(gitsyncData(inst).commit_mappings)"></div>
      </div>
      <!-- Releases -- only when present (>0). -->
      <div class="apps-card-ups-stat" x-show="(Number(gitsyncData(inst).release_mappings) || 0) > 0">
        <div class="apps-card-stat-label" x-text="t('apps.gitsync.releases') || 'Releases'"></div>
        <div class="apps-card-stat-value" x-text="gitsyncCount(gitsyncData(inst).release_mappings)"></div>
      </div>
      <!-- Synced refs -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.gitsync.refs') || 'Synced refs'"></div>
        <div class="apps-card-stat-value" x-text="gitsyncCount(gitsyncData(inst).synced_refs)"></div>
      </div>
    </div>
    <!-- Alerts footnote -- only when there are unacknowledged alerts. -->
    <div x-show="gitsyncAlertTotal(gitsyncData(inst)) > 0"
         class="fs-3xs mt-1 mono"
         :class="(Number(gitsyncData(inst).alerts_error) || 0) > 0 ? 'text-[var(--danger)]' : 'text-[var(--warning)]'"
         x-text="t('apps.gitsync.alerts_summary', { error: (Number(gitsyncData(inst).alerts_error) || 0), warn: (Number(gitsyncData(inst).alerts_warn) || 0), info: (Number(gitsyncData(inst).alerts_info) || 0) })"></div>
    <!-- Stale-pair + longest-run freshness stats (derived from the per-pair
         last-sync timestamps). Stale = enabled+configured pairs whose last sync
         is older than the threshold (or never synced); shown only when > 0. -->
    <div x-show="(Number(gitsyncData(inst).stale_pairs) || 0) > 0
                 || (gitsyncData(inst).longest_run && (Number(gitsyncData(inst).longest_run.duration_s) || 0) > 0)"
         class="flex flex-wrap items-center gap-x-4 gap-y-0.5 fs-xs mt-1.5">
      <span x-show="(Number(gitsyncData(inst).stale_pairs) || 0) > 0" class="inline-flex items-center gap-1 text-[var(--warning)]"
            :title="t('apps.gitsync.stale_title') || 'Pairs whose last sync is overdue'">
        <span aria-hidden="true">⏳</span>
        <span class="mono" x-text="t('apps.gitsync.stale_n', { n: gitsyncCount(gitsyncData(inst).stale_pairs) })
                                   + ((gitsyncData(inst).stalest_pair && gitsyncData(inst).stalest_pair.name) ? (' · ' + gitsyncData(inst).stalest_pair.name + ' ' + gitsyncAge(gitsyncData(inst).stalest_pair.age_s)) : '')"></span>
      </span>
      <span x-show="gitsyncData(inst).longest_run && (Number(gitsyncData(inst).longest_run.duration_s) || 0) > 0" class="inline-flex items-center gap-1"
            :title="t('apps.gitsync.longest_title') || 'Longest last-run duration'">
        <span class="text-[var(--text-dim)]" aria-hidden="true">⏱️</span>
        <span class="mono" x-text="gitsyncData(inst).longest_run.name + ' ' + gitsyncAge(gitsyncData(inst).longest_run.duration_s)"></span>
      </span>
    </div>
    <!-- Mirror trend — mappings-growth line + (when any) an alert-error trend,
         from the shared lifespan gitsync_sampler. DRAWER-ONLY (the card stays
         compact). Shown once >= 2 samples exist. -->
    <template x-if="appsExtrasInDrawer && gitsyncTrend(inst) && gitsyncTrend(inst).samples > 1 && (gitsyncTrend(inst).series_mappings || []).length > 1">
      <div class="mt-2">
        <div class="flex items-baseline justify-between gap-2">
          <span class="apps-card-stat-label" x-text="t('apps.gitsync.mappings_trend') || 'Mappings synced'"></span>
          <span class="fs-3xs text-[var(--text-faint)] mono"
                x-text="t('apps.gitsync.mappings_caption', { now: (Number(gitsyncTrend(inst).latest_mappings) || 0), week: (Number(gitsyncTrend(inst).week_throughput) || 0), days: (Number(gitsyncTrend(inst).days) || 0) })"></span>
        </div>
        <svg class="apps-spark apps-spark--trend" viewBox="0 0 100 24" preserveAspectRatio="none" aria-hidden="true">
          <polyline class="apps-spark-line" :points="gitsyncTrendPath(gitsyncTrend(inst).series_mappings)"></polyline>
        </svg>
        <!-- Alert-error trend — only when the window saw any errors. -->
        <template x-if="(Number(gitsyncTrend(inst).peak_alerts) || 0) > 0 && (gitsyncTrend(inst).series_alerts || []).length > 1">
          <div class="mt-1">
            <div class="apps-card-stat-label text-[var(--danger)]" x-text="t('apps.gitsync.alerts_trend') || 'Alert errors'"></div>
            <svg class="apps-spark apps-spark--mini" viewBox="0 0 100 24" preserveAspectRatio="none" aria-hidden="true">
              <polyline class="apps-spark-line" style="stroke: var(--danger)" :points="gitsyncTrendPath(gitsyncTrend(inst).series_alerts)"></polyline>
            </svg>
          </div>
        </template>
      </div>
    </template>
    <!-- Enabled-count + version footnote. -->
    <div class="fs-3xs text-[var(--text-faint)] mt-1 mono inline-flex flex-wrap gap-x-2">
      <span x-text="(t('apps.gitsync.enabled') || 'Enabled') + ': ' + gitsyncCount(gitsyncData(inst).enabled) + ' / ' + gitsyncCount(gitsyncData(inst).pairs)"></span>
      <span x-show="gitsyncData(inst).version"
            x-text="t('apps.version_footnote', { brand: 'GitSync', v: (gitsyncData(inst).version || '') })"></span>
    </div>
  </div>
</template>
<!-- No API token yet — idle and unconfigured. -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="gitsyncIsApp && gitsyncIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && appsAppDataStatus(inst) === 'idle' && !inst.api_key_set">
  <p class="fs-xs text-[var(--text-faint)] italic"
     x-text="t('apps.gitsync.no_api_key') || 'No API token set -- add one in Admin -> Apps to enable.'"></p>
</template>
<!-- Loading — first fetch in flight (panel above gates on gitsyncData). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="gitsyncIsApp && gitsyncIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && !gitsyncData(inst) && appsAppDataStatus(inst) === 'pending'">
  <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
    <span class="spin" aria-hidden="true"></span>
    <span x-text="t('apps.gitsync.loading') || 'Loading GitSync data…'"></span></p>
</template>
<!-- Error — upstream fetch failed. -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="gitsyncIsApp && gitsyncIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && !gitsyncData(inst) && appsAppDataStatus(inst) === 'error'">
  <p class="fs-xs text-[var(--danger)] italic"
     x-text="(t('apps.gitsync.fetch_failed') || 'GitSync fetch failed') + ': ' + appsAppDataError(inst)"></p>
</template>
