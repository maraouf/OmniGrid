<!-- Per-app expanded-card extras -- Grafana (metrics + observability dashboard).

     Renders inside `apps-card.html` as the per-instance host row when the
     chip is the Grafana catalog template AND the operator hasn't hidden
     extras via the per-instance `show_extras` toggle. The data comes from the
     Grafana REST API (org + search + folders + datasources + admin/stats) via
     `logic/apps/grafana.py:fetch_data`, read through the generic, cache-backed
     `appsAppData(inst)` -- so the card never triggers a per-card round-trip on
     the hot path.

     Reuses the shared `.apps-card-ups-*` stat-grid component (the same
     2-column stat panel Plex / Jellyfin / Forgejo render) -- the classes are a
     generic telemetry stat grid, not UPS-specific.

     Helpers used (all from `static/js/apps/grafana.js`):
       grafanaIsApp(app)   -- gate "is this a Grafana chip"
       grafanaData(inst)   -- per-instance dashboard / datasource payload
       grafanaCount(v)     -- thousands-separated integer formatter -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="grafanaIsApp && grafanaIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && grafanaData(inst)">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-ups" :data-grafana-host="inst.host_id">
    <!-- Per-host header (host name only when the app has > 1 instance). -->
    <div x-show="(app.instances || []).length > 1"
         class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
         x-text="inst.host_address || inst.host_id"></div>
    <div class="apps-card-ups-grid">
      <!-- Dashboards -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.grafana.dashboards') || 'Dashboards'"></div>
        <div class="apps-card-stat-value" x-text="grafanaCount(grafanaData(inst).dashboards)"></div>
      </div>
      <!-- Folders -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.grafana.folders') || 'Folders'"></div>
        <div class="apps-card-stat-value" x-text="grafanaCount(grafanaData(inst).folders)"></div>
      </div>
      <!-- Datasources -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.grafana.datasources') || 'Datasources'"></div>
        <div class="apps-card-stat-value" x-text="grafanaCount(grafanaData(inst).datasources)"></div>
      </div>
      <!-- Users -- only when an Admin token reports them (>0). -->
      <div class="apps-card-ups-stat" x-show="(Number(grafanaData(inst).users) || 0) > 0">
        <div class="apps-card-stat-label" x-text="t('apps.grafana.users') || 'Users'"></div>
        <div class="apps-card-stat-value" x-text="grafanaCount(grafanaData(inst).users)"></div>
      </div>
      <!-- Orgs -- only when an Admin token reports them (>0). -->
      <div class="apps-card-ups-stat" x-show="(Number(grafanaData(inst).orgs) || 0) > 0">
        <div class="apps-card-stat-label" x-text="t('apps.grafana.orgs') || 'Orgs'"></div>
        <div class="apps-card-stat-value" x-text="grafanaCount(grafanaData(inst).orgs)"></div>
      </div>
    </div>
    <!-- Datasource health — the headline Grafana-admin signal. Shown only when
         an Admin token found at least one unhealthy datasource. -->
    <template x-if="(Number(grafanaData(inst).datasources_unhealthy) || 0) > 0">
      <div class="fs-3xs text-[var(--danger)] mt-1"
           :title="grafanaNames(grafanaData(inst).datasources_unhealthy_names)"
           x-text="'⚠️ ' + (t('apps.grafana.ds_unhealthy', { n: grafanaData(inst).datasources_unhealthy, total: grafanaData(inst).datasources }) || (grafanaData(inst).datasources_unhealthy + ' of ' + grafanaData(inst).datasources + ' datasources unhealthy')) + (grafanaNames(grafanaData(inst).datasources_unhealthy_names) ? ': ' + grafanaNames(grafanaData(inst).datasources_unhealthy_names) : '')"></div>
    </template>
    <!-- Unified-alerting summary — a 🚨 firing chip + ⏳ pending chip. Shown only
         when alerting is reachable AND something is firing / pending. -->
    <template x-if="(Number(grafanaData(inst).alerts_firing) || 0) > 0 || (Number(grafanaData(inst).alerts_pending) || 0) > 0">
      <div class="flex flex-wrap items-center gap-x-3 gap-y-0.5 fs-3xs mt-1">
        <span x-show="(Number(grafanaData(inst).alerts_firing) || 0) > 0"
              class="inline-flex items-center gap-1 text-[var(--danger)]"
              :title="grafanaNames(grafanaData(inst).alerts_firing_names)">
          <span aria-hidden="true">🚨</span>
          <span x-text="t('apps.grafana.alerts_firing_n', { n: grafanaData(inst).alerts_firing }) || (grafanaData(inst).alerts_firing + ' firing')"></span>
        </span>
        <span x-show="(Number(grafanaData(inst).alerts_pending) || 0) > 0"
              class="inline-flex items-center gap-1 text-[var(--warning)]">
          <span aria-hidden="true">⏳</span>
          <span x-text="t('apps.grafana.alerts_pending_n', { n: grafanaData(inst).alerts_pending }) || (grafanaData(inst).alerts_pending + ' pending')"></span>
        </span>
      </div>
    </template>
    <!-- Firing-alert meta-monitor trend — a 'monitor of the monitor' sparkline
         from the shared lifespan grafana_sampler. DRAWER-ONLY (the card stays
         compact). Shown once >= 2 samples exist AND the window saw any alert
         firing (an all-zero line is noise on a healthy Grafana). -->
    <template x-if="appsExtrasInDrawer && grafanaTrend(inst) && grafanaTrend(inst).samples > 1 && (Number(grafanaTrend(inst).peak_firing) || 0) > 0 && (grafanaTrend(inst).series_firing || []).length > 1">
      <div class="mt-2">
        <div class="flex items-baseline justify-between gap-2">
          <span class="apps-card-stat-label text-[var(--danger)]" x-text="t('apps.grafana.firing_trend') || 'Alerts firing'"></span>
          <span class="fs-3xs text-[var(--text-faint)] mono"
                x-text="t('apps.grafana.firing_caption', { now: (Number(grafanaTrend(inst).latest_firing) || 0), peak: (Number(grafanaTrend(inst).peak_firing) || 0), days: (Number(grafanaTrend(inst).days) || 0) })"></span>
        </div>
        <svg class="apps-spark apps-spark--trend" viewBox="0 0 100 24" preserveAspectRatio="none" aria-hidden="true">
          <polyline class="apps-spark-line" style="stroke: var(--danger)" :points="grafanaTrendPath(grafanaTrend(inst).series_firing)"></polyline>
        </svg>
      </div>
    </template>
    <!-- Org + version footnote. -->
    <div class="fs-3xs text-[var(--text-faint)] mt-1 mono inline-flex flex-wrap gap-x-2">
      <span x-show="grafanaData(inst).org"
            x-text="(t('apps.grafana.org') || 'Org') + ': ' + grafanaData(inst).org"></span>
      <span x-show="grafanaData(inst).version"
            x-text="t('apps.version_footnote', { brand: 'Grafana', v: (grafanaData(inst).version || '') })"></span>
    </div>
  </div>
</template>
<!-- No API token yet — idle and unconfigured. -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="grafanaIsApp && grafanaIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && appsAppDataStatus(inst) === 'idle' && !inst.api_key_set">
  <p class="fs-xs text-[var(--text-faint)] italic"
     x-text="t('apps.grafana.no_api_key') || 'No API token set -- add one in Admin -> Apps to enable.'"></p>
</template>
<!-- Loading — first fetch in flight (panel above gates on grafanaData). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="grafanaIsApp && grafanaIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && !grafanaData(inst) && appsAppDataStatus(inst) === 'pending'">
  <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
    <span class="spin" aria-hidden="true"></span>
    <span x-text="t('apps.grafana.loading') || 'Loading Grafana data…'"></span></p>
</template>
<!-- Error — upstream fetch failed. -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="grafanaIsApp && grafanaIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && !grafanaData(inst) && appsAppDataStatus(inst) === 'error'">
  <p class="fs-xs text-[var(--danger)] italic"
     x-text="(t('apps.grafana.fetch_failed') || 'Grafana fetch failed') + ': ' + appsAppDataError(inst)"></p>
</template>
