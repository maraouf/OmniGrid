<!-- Per-app expanded-card extras -- Jellyfin (open-source media server).

     Renders inside `apps-card.html` as the per-instance host row when the
     chip is the Jellyfin catalog template AND the operator hasn't hidden
     extras via the per-instance `show_extras` toggle. The data comes from the
     Jellyfin REST API (Items/Counts + Sessions + System/Info) via
     `logic/apps/jellyfin.py:fetch_data`, read through the generic,
     cache-backed `appsAppData(inst)` -- so the card never triggers a per-card
     round-trip on the hot path.

     Reuses the shared `.apps-card-ups-*` stat-grid component (the same
     2-column stat panel Plex / Bazarr / APC render) -- the classes are a
     generic telemetry stat grid, not UPS-specific.

     Helpers used (all from `static/js/apps/jellyfin.js`):
       jellyfinIsApp(app)   -- gate "is this a Jellyfin chip"
       jellyfinData(inst)   -- per-instance library payload
       jellyfinCount(v)     -- thousands-separated integer formatter -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="jellyfinIsApp && jellyfinIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && jellyfinData(inst)">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-ups" :data-jellyfin-host="inst.host_id">
    <!-- Per-host header (host name only when the app has > 1 instance). -->
    <div x-show="(app.instances || []).length > 1"
         class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
         x-text="inst.host_address || inst.host_id"></div>
    <div class="apps-card-ups-grid">
      <!-- Movies -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.jellyfin.movies') || 'Movies'"></div>
        <div class="apps-card-stat-value" x-text="jellyfinCount(jellyfinData(inst).movies)"></div>
      </div>
      <!-- Series -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.jellyfin.series') || 'Series'"></div>
        <div class="apps-card-stat-value" x-text="jellyfinCount(jellyfinData(inst).series)"></div>
      </div>
      <!-- Songs -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.jellyfin.songs') || 'Songs'"></div>
        <div class="apps-card-stat-value" x-text="jellyfinCount(jellyfinData(inst).songs)"></div>
      </div>
      <!-- Now playing (active streams) -- highlighted when > 0 -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.jellyfin.now_playing') || 'Now playing'"></div>
        <div class="apps-card-stat-value"
             :class="(Number(jellyfinData(inst).sessions_active) || 0) > 0 ? 'text-[var(--success)]' : ''"
             x-text="jellyfinCount(jellyfinData(inst).sessions_active)"></div>
      </div>
    </div>
    <!-- Streaming detail: total bandwidth + transcode / direct-play split,
         shown only while something is playing. -->
    <div x-show="(Number(jellyfinData(inst).sessions_active) || 0) > 0"
         class="flex flex-wrap items-center gap-x-4 gap-y-0.5 fs-xs mt-1.5">
      <span x-show="(Number(jellyfinData(inst).bandwidth_bps) || 0) > 0" class="inline-flex items-center gap-1"
            :title="t('apps.jellyfin.bandwidth_title') || 'Total streaming bandwidth'">
        <span class="text-[var(--info)]" aria-hidden="true">📶</span>
        <span class="mono" x-text="jellyfinBandwidth(jellyfinData(inst).bandwidth_bps)"></span>
      </span>
      <span x-show="(Number(jellyfinData(inst).transcodes) || 0) > 0" class="inline-flex items-center gap-1"
            :title="t('apps.jellyfin.transcodes_title') || 'Transcoding streams'">
        <span class="text-[var(--warning)]" aria-hidden="true">🔄</span>
        <span class="mono" x-text="t('apps.jellyfin.transcodes_n', { n: jellyfinCount(jellyfinData(inst).transcodes) })"></span>
      </span>
      <!-- WHY the sessions are transcoding (codec / bandwidth / subtitle / …) —
           from each session's TranscodeReasons, busiest first. -->
      <span x-show="(jellyfinData(inst).transcode_reasons || []).length"
            class="inline-flex items-center gap-1 text-[var(--warning)]"
            :title="t('apps.jellyfin.transcode_why_title') || 'Why the active streams are transcoding'"
            x-text="'(' + (jellyfinData(inst).transcode_reasons || []).map(r => jellyfinCount(r.count) + ' ' + (t('apps.jellyfin.transcode_' + r.label) || r.label)).join(' · ') + ')'"></span>
      <span x-show="(Number(jellyfinData(inst).direct_streams) || 0) > 0" class="inline-flex items-center gap-1"
            :title="t('apps.jellyfin.direct_title') || 'Direct-play streams'">
        <span class="text-[var(--success)]" aria-hidden="true">▶️</span>
        <span class="mono" x-text="t('apps.jellyfin.direct_n', { n: jellyfinCount(jellyfinData(inst).direct_streams) })"></span>
      </span>
      <!-- Distinct watchers + devices among the active sessions. -->
      <span x-show="(Number(jellyfinData(inst).active_users) || 0) > 0" class="inline-flex items-center gap-1"
            :title="t('apps.jellyfin.active_users_title') || 'Distinct viewers · devices'">
        <span class="text-[var(--text-dim)]" aria-hidden="true">👥</span>
        <span class="mono" x-text="t('apps.jellyfin.users_devices', { u: jellyfinCount(jellyfinData(inst).active_users), d: jellyfinCount(jellyfinData(inst).active_devices) })"></span>
      </span>
    </div>
    <!-- All libraries (name + item count) + grand total — a multi-library
         server shows EVERY library here, not just the Movies/Series/Songs grid. -->
    <div x-show="(jellyfinData(inst).library_list || []).length" class="mt-2">
      <div class="apps-card-stat-label mb-1 flex items-baseline gap-1.5">
        <span x-text="t('apps.jellyfin.all_libraries') || 'Libraries'"></span>
        <span class="fs-3xs text-[var(--text-faint)] font-normal"
              x-text="t('apps.jellyfin.items_count', { n: (Number(jellyfinData(inst).items_total) || 0) })"></span>
      </div>
      <div class="flex flex-col gap-0.5">
        <template x-for="lib in jellyfinData(inst).library_list" :key="lib.name">
          <div class="flex items-center justify-between gap-2 fs-2xs min-w-0">
            <span class="truncate text-[var(--text-dim)]" x-text="lib.name"></span>
            <span class="mono text-[var(--text-faint)] shrink-0" x-text="jellyfinCount(lib.count)"></span>
          </div>
        </template>
      </div>
    </div>
    <!-- Episodes + version footnote (+ library count when the list is empty)
         + "N added this week" (from the bounded recently-added pull). -->
    <div class="fs-3xs text-[var(--text-faint)] mt-1 mono inline-flex flex-wrap gap-x-2">
      <span x-show="!(jellyfinData(inst).library_list || []).length"
            x-text="t('apps.jellyfin.libraries_footnote', { n: (Number(jellyfinData(inst).libraries) || 0) })"></span>
      <span x-show="(Number(jellyfinData(inst).episodes) || 0) > 0"
            x-text="t('apps.jellyfin.episodes_footnote', { n: (Number(jellyfinData(inst).episodes) || 0) })"></span>
      <span x-show="(Number(jellyfinData(inst).items_this_week) || 0) > 0" class="text-[var(--success)]"
            x-text="t('apps.jellyfin.added_this_week', { n: jellyfinCount(jellyfinData(inst).items_this_week) }) + (jellyfinData(inst).items_this_week_capped ? '+' : '')"></span>
      <span x-show="(Number(jellyfinData(inst).users_total) || 0) > 0"
            x-text="t('apps.jellyfin.users_footnote', { n: jellyfinCount(jellyfinData(inst).users_total) })"></span>
      <span x-show="(Number(jellyfinData(inst).resume_count) || 0) > 0"
            x-text="t('apps.jellyfin.resume_footnote', { n: jellyfinCount(jellyfinData(inst).resume_count) })"></span>
      <span x-show="jellyfinData(inst).version"
            x-text="t('apps.version_footnote', { brand: 'Jellyfin', v: (jellyfinData(inst).version || '') })"></span>
    </div>
    <!-- Streaming trend — daily peak-streams sparkline + 'peak N today / window'
         from the shared lifespan emby_sampler (one sampler serves both brands).
         DRAWER-ONLY. Shown once >= 2 samples exist. -->
    <template x-if="appsExtrasInDrawer && jellyfinTrend(inst) && jellyfinTrend(inst).samples > 1 && (jellyfinTrend(inst).series_streams || []).length > 1">
      <div class="mt-2">
        <div class="flex items-baseline justify-between gap-2">
          <span class="apps-card-stat-label" x-text="t('apps.jellyfin.streams_trend') || 'Peak streams'"></span>
          <span class="fs-3xs text-[var(--text-faint)] mono"
                x-text="t('apps.jellyfin.streams_peak', { today: (Number(jellyfinTrend(inst).peak_streams_today) || 0), peak: (Number(jellyfinTrend(inst).peak_streams) || 0), days: (Number(jellyfinTrend(inst).days) || 0) })"></span>
        </div>
        <svg class="apps-spark apps-spark--trend" viewBox="0 0 100 24" preserveAspectRatio="none" aria-hidden="true">
          <polyline class="apps-spark-line" :points="jellyfinTrendPath(jellyfinTrend(inst).series_streams)"></polyline>
        </svg>
      </div>
    </template>
  </div>
</template>
<!-- No API key yet — idle and unconfigured. -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="jellyfinIsApp && jellyfinIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && appsAppDataStatus(inst) === 'idle' && !inst.api_key_set">
  <p class="fs-xs text-[var(--text-faint)] italic"
     x-text="t('apps.jellyfin.no_api_key') || 'No API key set -- add one in Admin -> Apps to enable.'"></p>
</template>
<!-- Loading — first fetch in flight (panel above gates on jellyfinData). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="jellyfinIsApp && jellyfinIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && !jellyfinData(inst) && appsAppDataStatus(inst) === 'pending'">
  <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
    <span class="spin" aria-hidden="true"></span>
    <span x-text="t('apps.jellyfin.loading') || 'Loading Jellyfin data…'"></span></p>
</template>
<!-- Error — upstream fetch failed. -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="jellyfinIsApp && jellyfinIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && !jellyfinData(inst) && appsAppDataStatus(inst) === 'error'">
  <p class="fs-xs text-[var(--danger)] italic"
     x-text="(t('apps.jellyfin.fetch_failed') || 'Jellyfin fetch failed') + ': ' + appsAppDataError(inst)"></p>
</template>
