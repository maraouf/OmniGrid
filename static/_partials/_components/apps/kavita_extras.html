<!-- Per-app expanded-card extras -- Kavita (self-hosted digital library).

     Renders inside `apps-card.html` when the chip is the Kavita catalog
     template AND extras are visible. Data from Kavita's `GET /api/Library`
     (+ admin server stats), via `logic/apps/kavita.py:fetch_data`, read through
     the cache-backed `appsAppData(inst)`. Mirrors lidarr_extras.html (canonical
     `.apps-card-ups-*` stat grid + loading/error/no-api-key plain-text
     branches) but Kavita has no per-mount disks, so it shows Libraries / Series
     / Volumes / Size and has NO Storage section. Series / Volumes / Size come
     from the ADMIN-only server-stats call, so they read 0 / — when the API key
     isn't an admin's (the Libraries count is the always-available one).

     Helpers used (all from `static/js/apps/kavita.js`):
       kavitaIsApp(app) / kavitaData(inst) / kavitaCount(v) / kavitaSize(bytes) -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="kavitaIsApp && kavitaIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null))">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-kavita">
    <template x-if="kavitaData(inst)">
      <div class="apps-card-ups" :data-kavita-host="inst.host_id">
        <div x-show="(app.instances || []).length > 1"
             class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
             x-text="inst.host_address || inst.host_id"></div>
        <div class="apps-card-ups-grid">
          <!-- Libraries (always available) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.kavita.libraries') || 'Libraries'"></div>
            <div class="apps-card-stat-value" x-text="kavitaCount(kavitaData(inst).libraries)"></div>
          </div>
          <!-- Series (admin server stats) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.kavita.series') || 'Series'"></div>
            <div class="apps-card-stat-value" x-text="kavitaCount(kavitaData(inst).series_count)"></div>
          </div>
          <!-- Volumes (admin server stats) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.kavita.volumes') || 'Volumes'"></div>
            <div class="apps-card-stat-value" x-text="kavitaCount(kavitaData(inst).volume_count)"></div>
          </div>
          <!-- Size (admin server stats) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.kavita.size') || 'Size'"></div>
            <div class="apps-card-stat-value" x-text="kavitaSize(kavitaData(inst).total_size)"></div>
          </div>
          <!-- Active readers (reading-activity — admin server stats; hidden for a
               non-admin key that returns 0). -->
          <div class="apps-card-ups-stat" x-show="(Number(kavitaData(inst).active_readers) || 0) > 0">
            <div class="apps-card-stat-label" x-text="t('apps.kavita.active_readers') || 'Active readers'"></div>
            <div class="apps-card-stat-value text-[var(--info)]" x-text="kavitaCount(kavitaData(inst).active_readers)"></div>
          </div>
          <!-- Reading time (reading-activity). -->
          <div class="apps-card-ups-stat" x-show="(Number(kavitaData(inst).reading_minutes) || 0) > 0">
            <div class="apps-card-stat-label" x-text="t('apps.kavita.reading_time') || 'Reading time'"></div>
            <div class="apps-card-stat-value" x-text="kavitaReadingTime(kavitaData(inst).reading_minutes)"></div>
          </div>
        </div>
        <!-- Most-read series (reading-activity) — the top entry from the admin
             server stats; the kavita_most_read skill shows the full poster list. -->
        <div x-show="kavitaData(inst).top_read_series"
             class="fs-3xs text-[var(--text-faint)] mt-1 truncate"
             :title="kavitaData(inst).top_read_series"
             x-text="(t('apps.kavita.most_read') || 'Most read') + ': ' + (kavitaData(inst).top_read_series || '')"></div>
        <!-- Library-growth trend (from OmniGrid's kavita_samples): series count
             + total size over time. Drawer-only (`appsExtrasInDrawer`) — no room
             on the apps-grid card; shown once ≥ 2 daily points exist. -->
        <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && kavitaTrend(inst) && kavitaTrend(inst).series_series && kavitaTrend(inst).series_series.length >= 2">
          <div class="space-y-2 mt-1 pt-1 border-t border-[var(--border)]">
            <!-- Series count over time (the growth line). -->
            <div class="space-y-1">
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.kavita.series_trend', { days: kavitaTrend(inst).days }) || ('Library growth (' + kavitaTrend(inst).days + ' days)')"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                <path :d="kavitaTrendPath(kavitaTrend(inst).series_series)" fill="none" stroke="var(--success)" stroke-width="1.5"/>
              </svg>
              <div x-show="(Number(kavitaTrend(inst).series_added) || 0) > 0" class="fs-3xs text-[var(--text-faint)]"
                   x-text="t('apps.kavita.series_added', { count: kavitaCount(kavitaTrend(inst).series_added), days: kavitaTrend(inst).days }) || ('+' + kavitaCount(kavitaTrend(inst).series_added) + ' series in ' + kavitaTrend(inst).days + ' days')"></div>
            </div>
            <!-- Total library size over time. -->
            <div class="space-y-1">
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.kavita.size_trend', { days: kavitaTrend(inst).days }) || ('Library size (' + kavitaTrend(inst).days + ' days)')"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                <path :d="kavitaTrendPath(kavitaTrend(inst).size_series)" fill="none" stroke="var(--info)" stroke-width="1.5"/>
              </svg>
              <div class="fs-3xs text-[var(--text-faint)]"
                   x-text="(t('apps.kavita.size_now') || 'Now') + ': ' + kavitaSize(kavitaTrend(inst).latest_size)"></div>
            </div>
          </div>
        </template>
        <!-- Footnote: version + chapter count. -->
        <div x-show="kavitaData(inst).version || (Number(kavitaData(inst).chapter_count) || 0) > 0"
             class="fs-3xs text-[var(--text-faint)] mt-1 mono">
          <span x-show="kavitaData(inst).version" x-text="t('apps.version_footnote', { brand: 'Kavita', v: (kavitaData(inst).version || '') })"></span>
          <span x-show="(Number(kavitaData(inst).chapter_count) || 0) > 0"
                x-text="(kavitaData(inst).version ? ' · ' : '') + (t('apps.kavita.chapters_n', { n: kavitaData(inst).chapter_count }) || (kavitaData(inst).chapter_count + ' chapters'))"></span>
        </div>
      </div>
    </template>
    <!-- No API key yet — idle and unconfigured. -->
    <template x-if="appsAppDataStatus(inst) === 'idle' && !inst.api_key_set">
      <p class="fs-xs text-[var(--text-faint)] italic"
         x-text="t('apps.kavita.no_api_key') || 'No API key set -- add one in Admin -> Apps to enable.'"></p>
    </template>
    <!-- Loading — first fetch in flight. -->
    <template x-if="!kavitaData(inst) && appsAppDataStatus(inst) === 'pending'">
      <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('apps.kavita.loading') || 'Loading Kavita data…'"></span></p>
    </template>
    <!-- Error — upstream fetch failed. -->
    <template x-if="!kavitaData(inst) && appsAppDataStatus(inst) === 'error'">
      <p class="fs-xs text-[var(--danger)] italic"
         x-text="(t('apps.kavita.fetch_failed') || 'Kavita fetch failed') + ': ' + appsAppDataError(inst)"></p>
    </template>
  </div>
</template>
