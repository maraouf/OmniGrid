<!-- Per-app expanded-card extras -- Lidarr (music collection manager).

     Renders inside `apps-card.html` when the chip is the Lidarr catalog
     template AND extras are visible. Data from Lidarr's `GET /api/v1/artist`
     (+ wanted/missing / queue / disk / health), via
     `logic/apps/lidarr.py:fetch_data`, read through the cache-backed
     `appsAppData(inst)`. Mirrors sonarr_extras.html (Artists / Missing
     albums / Downloading / Monitored + a per-mount Storage section +
     loading/error/no-api-key plain-text branches).

     Helpers used (all from `static/js/apps/lidarr.js`):
       lidarrIsApp(app) / lidarrData(inst) / lidarrCount(v).
     Storage uses the shared _components/apps/_arr_storage.html include
     (generic appsDisks / appsDiskUsedPct / appsFmtSize helpers). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="lidarrIsApp && lidarrIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null))">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-lidarr">
    <template x-if="lidarrData(inst)">
      <div class="apps-card-ups" :data-lidarr-host="inst.host_id">
        <div x-show="(app.instances || []).length > 1"
             class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
             x-text="inst.host_address || inst.host_id"></div>
        <div class="apps-card-ups-grid">
          <!-- Artists (total library size) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.lidarr.artists') || 'Artists'"></div>
            <div class="apps-card-stat-value" x-text="lidarrCount(lidarrData(inst).artists_total)"></div>
          </div>
          <!-- Missing (monitored albums, no file) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.lidarr.missing') || 'Missing albums'"></div>
            <div class="apps-card-stat-value"
                 :class="(Number(lidarrData(inst).missing) || 0) > 0 ? 'text-[var(--warning)]' : 'text-[var(--success)]'"
                 x-text="lidarrCount(lidarrData(inst).missing)"></div>
          </div>
          <!-- Downloading (queue) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.lidarr.downloading') || 'Downloading'"></div>
            <div class="apps-card-stat-value"
                 :class="(Number(lidarrData(inst).queue) || 0) > 0 ? 'text-[var(--info)]' : ''"
                 x-text="lidarrCount(lidarrData(inst).queue)"></div>
          </div>
          <!-- Monitored artists -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.lidarr.monitored') || 'Monitored'"></div>
            <div class="apps-card-stat-value" x-text="lidarrCount(lidarrData(inst).monitored)"></div>
          </div>
        </div>
        <!-- Storage — every mount the app reports, each as a clean card
             with free / total + a colour-coded usage bar. Shared across
             the *arr family. -->
        <!-- INCLUDE: _components/apps/_arr_storage.html -->
        <!-- Footnote: version + health issues. -->
        <div x-show="lidarrData(inst).version || (Number(lidarrData(inst).health_issues) || 0) > 0"
             class="fs-3xs text-[var(--text-faint)] mt-1 mono">
          <span x-show="lidarrData(inst).version" x-text="t('apps.version_footnote', { brand: 'Lidarr', v: (lidarrData(inst).version || '') })"></span>
          <span x-show="(Number(lidarrData(inst).health_issues) || 0) > 0"
                class="text-[var(--warning)]"
                x-text="(lidarrData(inst).version ? ' · ' : '') + (t('apps.lidarr.health_issues_n', { n: lidarrData(inst).health_issues }) || (lidarrData(inst).health_issues + ' health issue(s)'))"></span>
        </div>
      </div>
    </template>
    <!-- No API key yet — idle and unconfigured. -->
    <template x-if="appsAppDataStatus(inst) === 'idle' && !inst.api_key_set">
      <p class="fs-xs text-[var(--text-faint)] italic"
         x-text="t('apps.lidarr.no_api_key') || 'No API key set -- add one in Admin -> Apps to enable.'"></p>
    </template>
    <!-- Loading — first fetch in flight. -->
    <template x-if="!lidarrData(inst) && appsAppDataStatus(inst) === 'pending'">
      <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('apps.lidarr.loading') || 'Loading Lidarr data…'"></span></p>
    </template>
    <!-- Error — upstream fetch failed. -->
    <template x-if="!lidarrData(inst) && appsAppDataStatus(inst) === 'error'">
      <p class="fs-xs text-[var(--danger)] italic"
         x-text="(t('apps.lidarr.fetch_failed') || 'Lidarr fetch failed') + ': ' + appsAppDataError(inst)"></p>
    </template>
  </div>
</template>
