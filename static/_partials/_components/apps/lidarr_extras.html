<!-- Per-app expanded-card extras -- Lidarr (music collection manager).

     Renders inside `apps-card.html` when the chip is the Lidarr catalog
     template AND extras are visible. Data from Lidarr's `GET /api/v1/artist`
     (+ wanted/missing / queue / disk / health), via
     `logic/apps/lidarr.py:fetch_data`, read through the cache-backed
     `appsAppData(inst)`. Mirrors sonarr_extras.html (Artists / Missing
     albums / Downloading / Monitored + a per-mount Storage section +
     loading/error/no-api-key plain-text branches).

     Helpers used (all from `static/js/apps/lidarr.js`):
       lidarrIsApp(app) / lidarrData(inst) / lidarrCount(v).
     Storage uses the shared _components/apps/_arr_storage.html include
     (generic appsDisks / appsDiskUsedPct / appsFmtSize helpers). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="lidarrIsApp && lidarrIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null))">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-lidarr">
    <template x-if="lidarrData(inst)">
      <div class="apps-card-ups" :data-lidarr-host="inst.host_id">
        <div x-show="(app.instances || []).length > 1"
             class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
             x-text="inst.host_address || inst.host_id"></div>
        <div class="apps-card-ups-grid">
          <!-- Card essentials: Artists · Missing albums · Incomplete artists ·
               Downloading (+ conditional This-week / Today). Secondary stats
               (Monitored / Albums / Tracks / Below-cutoff / Library-size) are
               drawer-only. -->
          <!-- Artists (total library size) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.lidarr.artists') || 'Artists'"></div>
            <div class="apps-card-stat-value" x-text="lidarrCount(lidarrData(inst).artists_total)"></div>
          </div>
          <!-- Missing (monitored albums, no file) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.lidarr.missing') || 'Missing albums'"></div>
            <div class="apps-card-stat-value"
                 :class="(Number(lidarrData(inst).missing) || 0) > 0 ? 'text-[var(--warning)]' : 'text-[var(--success)]'"
                 x-text="lidarrCount(lidarrData(inst).missing)"></div>
          </div>
          <!-- Incomplete artists — the "artists" half of the missing split
               (monitored artists not fully downloaded). -->
          <div class="apps-card-ups-stat" :title="t('apps.lidarr.incomplete_title') || 'Monitored artists not fully downloaded (some tracks missing)'">
            <div class="apps-card-stat-label" x-text="t('apps.lidarr.incomplete') || 'Incomplete'"></div>
            <div class="apps-card-stat-value"
                 :class="(Number(lidarrData(inst).artists_incomplete) || 0) > 0 ? 'text-[var(--warning)]' : 'text-[var(--success)]'"
                 x-text="lidarrCount(lidarrData(inst).artists_incomplete)"></div>
          </div>
          <!-- Downloading (queue) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.lidarr.downloading') || 'Downloading'"></div>
            <div class="apps-card-stat-value"
                 :class="(Number(lidarrData(inst).queue) || 0) > 0 ? 'text-[var(--info)]' : ''"
                 x-text="lidarrCount(lidarrData(inst).queue)"></div>
          </div>
          <!-- Released this week (last 7 days) — only when there's new music. -->
          <div class="apps-card-ups-stat" x-show="(Number(lidarrData(inst).releases_this_week) || 0) > 0"
               :title="t('apps.lidarr.this_week_title') || 'Album releases from monitored artists in the last 7 days'">
            <div class="apps-card-stat-label" x-text="t('apps.lidarr.this_week') || 'This week'"></div>
            <div class="apps-card-stat-value text-[var(--info)]" x-text="lidarrCount(lidarrData(inst).releases_this_week)"></div>
          </div>
          <!-- Releasing today (calendar) — only when something is due today. -->
          <div class="apps-card-ups-stat" x-show="(Number(lidarrData(inst).calendar_today) || 0) > 0">
            <div class="apps-card-stat-label" x-text="t('apps.lidarr.releasing_today') || 'Today'"></div>
            <div class="apps-card-stat-value text-[var(--info)]" x-text="lidarrCount(lidarrData(inst).calendar_today)"></div>
          </div>
          <!-- Monitored artists — DRAWER-ONLY. -->
          <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer)">
            <div class="apps-card-ups-stat">
              <div class="apps-card-stat-label" x-text="t('apps.lidarr.monitored') || 'Monitored'"></div>
              <div class="apps-card-stat-value" x-text="lidarrCount(lidarrData(inst).monitored)"></div>
            </div>
          </template>
          <!-- Albums (total) — DRAWER-ONLY, when there are albums. -->
          <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && (Number(lidarrData(inst).albums_total) || 0) > 0">
            <div class="apps-card-ups-stat">
              <div class="apps-card-stat-label" x-text="t('apps.lidarr.albums') || 'Albums'"></div>
              <div class="apps-card-stat-value" x-text="lidarrCount(lidarrData(inst).albums_total)"></div>
            </div>
          </template>
          <!-- Tracks (have / total) — DRAWER-ONLY, when there are tracks. -->
          <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && (Number(lidarrData(inst).tracks_total) || 0) > 0">
            <div class="apps-card-ups-stat">
              <div class="apps-card-stat-label" x-text="t('apps.lidarr.tracks') || 'Tracks'"></div>
              <div class="apps-card-stat-value"
                   x-text="lidarrCount(lidarrData(inst).tracks_have) + ' / ' + lidarrCount(lidarrData(inst).tracks_total)"></div>
            </div>
          </template>
          <!-- Below quality cutoff — DRAWER-ONLY (secondary to Missing). -->
          <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer)">
            <div class="apps-card-ups-stat">
              <div class="apps-card-stat-label" x-text="t('apps.lidarr.cutoff_unmet') || 'Below cutoff'"></div>
              <div class="apps-card-stat-value"
                   :class="(Number(lidarrData(inst).cutoff_unmet) || 0) > 0 ? 'text-[var(--warning)]' : ''"
                   x-text="lidarrCount(lidarrData(inst).cutoff_unmet)"></div>
            </div>
          </template>
          <!-- Library size on disk — DRAWER-ONLY, when known. -->
          <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && (Number(lidarrData(inst).library_size_gb) || 0) > 0">
            <div class="apps-card-ups-stat">
              <div class="apps-card-stat-label" x-text="t('apps.lidarr.library_size') || 'Library size'"></div>
              <div class="apps-card-stat-value" x-text="lidarrGb(lidarrData(inst).library_size_gb)"></div>
            </div>
          </template>
        </div>
        <!-- Disk-fill projection chip — "disk full in ~N days at current growth"
             from the retention series. Card-level (always visible). -->
        <div x-show="lidarrTrend(inst) && (Number(lidarrTrend(inst).disk_runway_days) || 0) > 0"
             class="fs-3xs text-[var(--warning)] mt-1"
             x-text="t('apps.lidarr.disk_runway', { days: lidarrTrend(inst) ? lidarrTrend(inst).disk_runway_days : 0 }) || ('Disk full in ~' + (lidarrTrend(inst) ? lidarrTrend(inst).disk_runway_days : 0) + ' days at this fill rate')"></div>
        <!-- Storage — every mount the app reports, each as a clean card
             with free / total + a colour-coded usage bar. Shared across
             the *arr family. -->
        <!-- INCLUDE: _components/apps/_arr_storage.html -->
        <!-- Library-growth + missing-backlog + disk-free trend (from OmniGrid's
             shared servarr_samples). Drawer-only (`appsExtrasInDrawer`) — no
             room on the apps-grid card; shown once ≥ 2 daily points exist. -->
        <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && lidarrTrend(inst) && lidarrTrend(inst).series_total && lidarrTrend(inst).series_total.length >= 2">
          <div class="space-y-2 mt-1 pt-1 border-t border-[var(--border)]">
            <div class="space-y-1">
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.lidarr.library_trend', { days: lidarrTrend(inst).days }) || ('Library growth (' + lidarrTrend(inst).days + ' days)')"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                <path :d="lidarrTrendPath(lidarrTrend(inst).series_total)" fill="none" stroke="var(--info)" stroke-width="1.5"/>
              </svg>
            </div>
            <div class="space-y-1" x-show="(Number(lidarrTrend(inst).peak_missing) || 0) > 0">
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.lidarr.missing_trend', { days: lidarrTrend(inst).days }) || ('Missing backlog (' + lidarrTrend(inst).days + ' days)')"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                <path :d="lidarrTrendPath(lidarrTrend(inst).series_missing)" fill="none" stroke="var(--warning)" stroke-width="1.5"/>
              </svg>
              <div class="fs-3xs text-[var(--text-faint)]"
                   x-text="(t('apps.lidarr.peak_missing') || 'Peak missing') + ': ' + lidarrCount(lidarrTrend(inst).peak_missing)"></div>
            </div>
            <div class="space-y-1">
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.lidarr.disk_trend', { days: lidarrTrend(inst).days }) || ('Free disk (' + lidarrTrend(inst).days + ' days)')"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                <path :d="lidarrTrendPath(lidarrTrend(inst).series_disk_free)" fill="none" stroke="var(--success)" stroke-width="1.5"/>
              </svg>
              <div x-show="(Number(lidarrTrend(inst).disk_runway_days) || 0) > 0"
                   class="fs-3xs text-[var(--warning)]"
                   x-text="t('apps.lidarr.disk_runway', { days: lidarrTrend(inst).disk_runway_days }) || ('Disk full in ~' + lidarrTrend(inst).disk_runway_days + ' days at this fill rate')"></div>
            </div>
            <!-- Download-queue depth over time (only when there's ever been a queue). -->
            <div class="space-y-1" x-show="(Number(lidarrTrend(inst).peak_queue) || 0) > 0">
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.lidarr.queue_trend', { days: lidarrTrend(inst).days }) || ('Download queue (' + lidarrTrend(inst).days + ' days)')"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                <path :d="lidarrTrendPath(lidarrTrend(inst).series_queue)" fill="none" stroke="var(--primary)" stroke-width="1.5"/>
              </svg>
              <div class="fs-3xs text-[var(--text-faint)]"
                   x-text="(t('apps.lidarr.peak_queue') || 'Peak queue') + ': ' + lidarrCount(lidarrTrend(inst).peak_queue)"></div>
            </div>
          </div>
        </template>
        <!-- Footnote: version + health issues. -->
        <div x-show="lidarrData(inst).version || (Number(lidarrData(inst).health_issues) || 0) > 0"
             class="fs-3xs text-[var(--text-faint)] mt-1 mono">
          <span x-show="lidarrData(inst).version" x-text="t('apps.version_footnote', { brand: 'Lidarr', v: (lidarrData(inst).version || '') })"></span>
          <span x-show="(Number(lidarrData(inst).health_issues) || 0) > 0"
                class="text-[var(--warning)]"
                x-text="(lidarrData(inst).version ? ' · ' : '') + (t('apps.lidarr.health_issues_n', { n: lidarrData(inst).health_issues }) || (lidarrData(inst).health_issues + ' health issue(s)'))"></span>
        </div>
      </div>
    </template>
    <!-- No API key yet — idle and unconfigured. -->
    <template x-if="appsAppDataStatus(inst) === 'idle' && !inst.api_key_set">
      <p class="fs-xs text-[var(--text-faint)] italic"
         x-text="t('apps.lidarr.no_api_key') || 'No API key set -- add one in Admin -> Apps to enable.'"></p>
    </template>
    <!-- Loading — first fetch in flight. -->
    <template x-if="!lidarrData(inst) && appsAppDataStatus(inst) === 'pending'">
      <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('apps.lidarr.loading') || 'Loading Lidarr data…'"></span></p>
    </template>
    <!-- Error — upstream fetch failed. -->
    <template x-if="!lidarrData(inst) && appsAppDataStatus(inst) === 'error'">
      <p class="fs-xs text-[var(--danger)] italic"
         x-text="(t('apps.lidarr.fetch_failed') || 'Lidarr fetch failed') + ': ' + appsAppDataError(inst)"></p>
    </template>
  </div>
</template>
