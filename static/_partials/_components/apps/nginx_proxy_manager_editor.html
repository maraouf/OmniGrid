<!-- Per-app editor fields -- Nginx Proxy Manager (NPM).

     Renders inside the Admin -> Apps per-instance editor, gated on
     `npmIsApp(...)` so the email + password inputs appear ONLY for an NPM
     chip. NPM authenticates with the admin email + password (exchanged for a
     bearer token):
       - email    -> non-secret `username` chip field (round-trips in the clear
         so the input shows the saved value).
       - password -> the secret `api_key` chip field (never returned; only an
         `api_key_set` flag, keep-current-if-blank on save).
     Set the chip URL to the NPM admin UI (default port 81). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="npmIsApp && npmIsApp({catalog: {slug: appsInstanceEditForm.catalog_slug || (appsInstanceEditForm.catalog_name || '').toLowerCase()}, name: appsInstanceEditForm.name || appsInstanceEditForm.catalog_name || ''})">
  <div class="space-y-2 pt-3 mt-3 border-t border-[var(--border)]">
    <div>
      <label for="apps-instance-npm-email"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.npm.email_label') || 'NPM admin email'"></label>
      <input id="apps-instance-npm-email"
             type="text" x-model="appsInstanceEditForm.username"
             class="w-full bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm"
             :placeholder="t('apps.npm.email_placeholder') || 'admin@example.com'"
             autocomplete="off" spellcheck="false">
    </div>
    <div>
      <label for="apps-instance-npm-password"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.npm.password_label') || 'NPM admin password'"></label>
      <input id="apps-instance-npm-password"
             type="password" x-model="appsInstanceEditForm.api_key"
             class="w-full bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm"
             :placeholder="appsInstanceEditForm.api_key_set
               ? (t('apps.npm.password_placeholder_saved') || 'Saved -- leave blank to keep')
               : (t('apps.npm.password_placeholder_unset') || 'Admin password')"
             autocomplete="off" spellcheck="false">
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('apps.npm.creds_hint') || 'The NPM admin login (Settings -> Users). Required for the proxy-host + certificate stats and the enable/disable actions. The password is stored encrypted-at-rest and never shown again; leave blank to keep the saved one. Set the chip URL to the NPM admin UI (default port 81).'"></p>
    </div>
    <!-- 2FA TOTP secret — ONLY needed when this NPM user has two-factor auth
         enabled. The base32 setup key (shown when you enabled 2FA in NPM) so
         OmniGrid can generate the codes for its background polls. Secret,
         keep-current-if-blank. -->
    <div>
      <label for="apps-instance-npm-totp"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.npm.totp_label') || '2FA secret (only if 2FA is enabled)'"></label>
      <input id="apps-instance-npm-totp"
             type="password" x-model="appsInstanceEditForm.totp_secret"
             class="w-full bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm mono"
             :placeholder="appsInstanceEditForm.totp_secret_set
               ? (t('apps.npm.totp_placeholder_saved') || 'Saved -- leave blank to keep')
               : (t('apps.npm.totp_placeholder_unset') || 'base32 TOTP key (blank if no 2FA)')"
             autocomplete="off" spellcheck="false">
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('apps.npm.totp_hint') || 'Leave blank unless this NPM user has 2FA enabled. Paste the base32 setup key (the text shown alongside the QR when you enabled 2FA) so OmniGrid can generate the TOTP codes itself. Stored encrypted-at-rest.'"></p>
    </div>
    <!-- TLS verification — OFF by default (NPM's admin UI usually has a
         self-signed cert). Turn ON only when NPM is fronted by a real cert. -->
    <label class="flex items-center gap-2 fs-xs">
      <input type="checkbox" x-model="appsInstanceEditForm.verify_tls">
      <span x-text="t('apps.npm.verify_tls_label') || 'Verify TLS certificate (off for self-signed)'"></span>
    </label>
    <!-- Per-instance data-cache TTL (contained in the app, NOT a global Config
         tunable). Blank = the app default (60s); backend clamps 5..3600. -->
    <div>
      <label for="apps-instance-npm-cache-ttl"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.cache_ttl_label') || 'Data cache TTL (seconds)'"></label>
      <div class="flex flex-wrap items-center gap-2">
        <input id="apps-instance-npm-cache-ttl"
               type="number" min="5" max="3600" step="1"
               x-model="appsInstanceEditForm.cache_ttl"
               @change="appsInstanceEditForm.cache_ttl = appsClampCacheTtl(appsInstanceEditForm.cache_ttl)"
               class="w-32 bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm mono"
               :placeholder="t('apps.cache_ttl_placeholder') || 'App default'"
               autocomplete="off">
        <div class="bounds-chips" role="group"
             :aria-label="t('admin.config.bounds.group_label') || 'Bounds'">
          <span class="bounds-chip bounds-chip--min" :title="t('admin.config.bounds.min_title') || 'Minimum'">
            <svg width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/>
            </svg>
            <span>5</span>
          </span>
          <span class="bounds-chip bounds-chip--max" :title="t('admin.config.bounds.max_title') || 'Maximum'">
            <svg width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/>
            </svg>
            <span>3600</span>
          </span>
          <span class="bounds-chip bounds-chip--default" :title="t('admin.config.bounds.default_title') || 'Default'">
            <svg width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/>
            </svg>
            <span>60</span>
          </span>
        </div>
      </div>
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('apps.npm.cache_ttl_hint') || 'How long fetched NPM stats are cached before re-querying (5–3600s). Leave blank for the app default (60s).'"></p>
    </div>
    <!-- Shared Test-connection unit (same button + result box as the
         Portainer / OIDC admin panels). tcRun is the per-app test fn; tcResult
         is its reactive {pending, ok, detail} result. -->
    <div x-data="{ tcRun: () => testInstanceCredential(), tcResult: () => appsInstanceTestResult, tcLastTs: () => appsInstanceEditForm.last_test_ok_ts }">
      <!-- INCLUDE: _components/og-test-connection.html -->
    </div>
  </div>
</template>
