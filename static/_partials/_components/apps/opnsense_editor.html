<!-- Per-app editor fields -- OPNsense.

     Renders inside the Admin -> Apps per-instance editor, gated on
     `opnsenseIsApp(...)` so the API-key + API-secret inputs appear ONLY for an
     OPNsense chip. OPNsense's REST API uses HTTP Basic auth with an API KEY +
     API SECRET pair (System -> Access -> Users -> edit a user -> "API keys"):
       - API KEY    -> non-secret `username` chip field (round-trips in the
         clear so the input shows the saved value).
       - API SECRET -> the secret `api_key` chip field (never returned; only an
         `api_key_set` flag, keep-current-if-blank on save). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="opnsenseIsApp && opnsenseIsApp({catalog: {slug: appsInstanceEditForm.catalog_slug || (appsInstanceEditForm.catalog_name || '').toLowerCase()}, name: appsInstanceEditForm.name || appsInstanceEditForm.catalog_name || ''})">
  <div class="space-y-2 pt-3 mt-3 border-t border-[var(--border)]">
    <div>
      <label for="apps-instance-opnsense-key"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.opnsense.key_label') || 'OPNsense API key'"></label>
      <input id="apps-instance-opnsense-key"
             type="text" x-model="appsInstanceEditForm.username"
             class="w-full bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm mono"
             :placeholder="t('apps.opnsense.key_placeholder') || 'API key (the long base64 key)'"
             autocomplete="off" spellcheck="false">
    </div>
    <div>
      <label for="apps-instance-opnsense-secret"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.opnsense.secret_label') || 'OPNsense API secret'"></label>
      <input id="apps-instance-opnsense-secret"
             type="password" x-model="appsInstanceEditForm.api_key"
             class="w-full bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm"
             :placeholder="appsInstanceEditForm.api_key_set
               ? (t('apps.opnsense.secret_placeholder_saved') || 'Saved -- leave blank to keep')
               : (t('apps.opnsense.secret_placeholder_unset') || 'API secret')"
             autocomplete="off" spellcheck="false">
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('apps.opnsense.creds_hint') || 'OPNsense API key + secret (System -> Access -> Users -> edit a user -> API keys -> +). They are sent as HTTP Basic auth (key = username, secret = password). The user needs read access to the diagnostics / firmware / gateway pages. The secret is stored encrypted-at-rest and never shown again; leave blank to keep the saved one. Set the chip URL to the OPNsense web UI root (https, default :443).'"></p>
    </div>
    <!-- TLS verification — OFF by default (OPNsense ships a self-signed cert).
         Turn ON only when fronted by a real cert. -->
    <label class="flex items-center gap-2 fs-xs">
      <input type="checkbox" x-model="appsInstanceEditForm.verify_tls">
      <span x-text="t('apps.opnsense.verify_tls_label') || 'Verify TLS certificate (off for self-signed)'"></span>
    </label>
    <!-- Active/passive failover: name(s) of STANDBY gateways (comma-separated,
         substring match). A standby WAN at 100% loss is expected, so it's
         excluded from the "N/M online" health + worst-gateway pick and shown
         as standby instead. -->
    <div>
      <label for="apps-instance-opnsense-standby"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.opnsense.standby_gateways_label') || 'Standby (failover) gateways'"></label>
      <input id="apps-instance-opnsense-standby"
             type="text" maxlength="256"
             x-model="appsInstanceEditForm.standby_gateways"
             class="w-full bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm mono"
             :placeholder="t('apps.opnsense.standby_gateways_placeholder') || 'e.g. WAN_CELL_DHCP'"
             :aria-label="t('apps.opnsense.standby_gateways_label') || 'Standby (failover) gateways'"
             autocomplete="off">
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('apps.opnsense.standby_gateways_hint') || 'Comma-separated gateway names (or substrings) you run as passive failover. They are not counted as down when offline.'"></p>
    </div>
    <!-- Per-instance data-cache TTL (contained in the app, NOT a global Config
         tunable). Blank = the app default (30s); backend clamps 5..3600. -->
    <div>
      <label for="apps-instance-opnsense-cache-ttl"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.cache_ttl_label') || 'Data cache TTL (seconds)'"></label>
      <div class="flex flex-wrap items-center gap-2">
        <input id="apps-instance-opnsense-cache-ttl"
               type="number" min="5" max="3600" step="1"
               x-model="appsInstanceEditForm.cache_ttl"
               @change="appsInstanceEditForm.cache_ttl = appsClampCacheTtl(appsInstanceEditForm.cache_ttl)"
               class="w-32 bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm mono"
               :placeholder="t('apps.cache_ttl_placeholder') || 'App default'"
               autocomplete="off">
        <div class="bounds-chips" role="group"
             :aria-label="t('admin.config.bounds.group_label') || 'Bounds'">
          <span class="bounds-chip bounds-chip--min" :title="t('admin.config.bounds.min_title') || 'Minimum'">
            <svg width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/>
            </svg>
            <span>5</span>
          </span>
          <span class="bounds-chip bounds-chip--max" :title="t('admin.config.bounds.max_title') || 'Maximum'">
            <svg width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/>
            </svg>
            <span>3600</span>
          </span>
          <span class="bounds-chip bounds-chip--default" :title="t('admin.config.bounds.default_title') || 'Default'">
            <svg width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/>
            </svg>
            <span>30</span>
          </span>
        </div>
      </div>
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('apps.cache_ttl_hint') || 'How long fetched stats are cached before re-querying OPNsense (5–3600s). Leave blank for the app default (30s).'"></p>
    </div>
    <!-- Shared Test-connection unit (same button + result box as the
         Portainer / OIDC admin panels) so the per-app editor never drifts. -->
    <div x-data="{ tcRun: () => testInstanceCredential(), tcResult: () => appsInstanceTestResult, tcLastTs: () => appsInstanceEditForm.last_test_ok_ts }">
      <!-- INCLUDE: _components/og-test-connection.html -->
    </div>
  </div>
</template>
