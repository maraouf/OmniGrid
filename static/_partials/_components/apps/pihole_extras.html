<!-- App-LEVEL aggregated extras -- Pi-hole (v6 FTL).

     Rendered ONCE per app card (via apps-card.html's app-level slot +
     `_all_extras_app.html`), with `app` in scope (NO `inst`). The
     operator runs N Pi-hole hosts; this block aggregates them into ONE
     summary instead of a row per host (operator decision). The
     aggregation + fleet-action dispatch live in
     `static/js/apps/pihole.js`:
       piholeIsApp(app)           -- gate "is this a Pi-hole chip"
       piholeAggregate(app)       -- {ready, loading, queries, blocked,
                                      pct, rules, clients, topBlocked,
                                      protOn, protTotal, protOffHosts,
                                      failedHosts, okN, n}
       piholeInt/Pct              -- formatters
       piholeDisablePresets()     -- [{label, skill}]
       piholeFleetSkill(app, id)  -- dispatch a fleet skill
       piholeSkillBusy(app, id)   -- in-flight gate

     Pi-hole has NO avg-processing metric (unlike AdGuard), so the stat
     grid omits it. Actions are FLEET-wide (all hosts at once) and
     admin-only; the backend skill route + run_skill fan-out enforce
     both. The presentational classes are the shared `apps-fleet-*`
     family (same as AdGuard). -->
<!--suppress HtmlUnknownAttribute, HtmlUnknownTag -->
<template x-if="piholeIsApp && piholeIsApp(app)">
  <div class="apps-card-pihole mt-1 pt-1 border-t border-[var(--border)] space-y-2">
    <!-- Compute the aggregate ONCE per render via a single-element x-for. -->
    <template x-for="agg in [piholeAggregate(app)]" :key="'agg'">
      <div class="space-y-2">
        <!-- Stats grid (aggregated across every reachable host). Uses the
             canonical `.apps-card-ups-*` tinted-chip family so Pi-hole reads
             identically to every other app's extras AND inherits the
             1x1..4x2 size rules (which target `.apps-card-ups-*`). -->
        <template x-if="agg.ready">
          <div class="apps-card-ups">
            <div class="apps-card-ups-grid">
              <div class="apps-card-ups-stat">
                <div class="apps-card-stat-label"
                     x-text="t('apps.pihole.blocked_today') || 'Blocked today'"></div>
                <div class="apps-card-stat-value">
                  <span x-text="piholeInt(agg.blocked)"></span>
                  <span class="fs-2xs text-[var(--text-faint)]"
                        x-text="'(' + piholePct(agg.pct) + ')'"></span>
                </div>
              </div>
              <div class="apps-card-ups-stat">
                <div class="apps-card-stat-label"
                     x-text="t('apps.pihole.queries_today') || 'Queries today'"></div>
                <div class="apps-card-stat-value" x-text="piholeInt(agg.queries)"></div>
              </div>
              <div class="apps-card-ups-stat">
                <div class="apps-card-stat-label"
                     x-text="t('apps.pihole.blocklist') || 'Blocklist domains'"></div>
                <div class="apps-card-stat-value" x-text="piholeInt(agg.rules)"></div>
              </div>
              <div class="apps-card-ups-stat">
                <div class="apps-card-stat-label"
                     x-text="t('apps.pihole.clients') || 'Active clients'"></div>
                <div class="apps-card-stat-value" x-text="piholeInt(agg.clients)"></div>
              </div>
              <div class="apps-card-ups-stat" x-show="agg.topBlocked">
                <div class="apps-card-stat-label"
                     x-text="t('apps.pihole.top_blocked') || 'Top blocked'"></div>
                <div class="apps-card-stat-value truncate"
                     :title="agg.topBlocked ? (agg.topBlocked.name + ' (' + piholeInt(agg.topBlocked.count) + ')') : ''"
                     x-text="agg.topBlocked ? agg.topBlocked.name : '—'"></div>
              </div>
              <div class="apps-card-ups-stat" x-show="agg.topQueried">
                <div class="apps-card-stat-label"
                     x-text="t('apps.pihole.top_queried') || 'Top queried'"></div>
                <div class="apps-card-stat-value truncate"
                     :title="agg.topQueried ? (agg.topQueried.name + ' (' + piholeInt(agg.topQueried.count) + ')') : ''"
                     x-text="agg.topQueried ? agg.topQueried.name : '—'"></div>
              </div>
              <div class="apps-card-ups-stat" x-show="agg.topClient">
                <div class="apps-card-stat-label"
                     x-text="t('apps.pihole.top_client') || 'Top client'"></div>
                <div class="apps-card-stat-value truncate"
                     :title="agg.topClient ? (agg.topClient.name + ' (' + piholeInt(agg.topClient.count) + ')') : ''"
                     x-text="agg.topClient ? agg.topClient.name : '—'"></div>
              </div>
            </div>
            <!-- Queries-vs-blocked time-bucket chart (from /api/history),
                 summed across the fleet. Queries + blocked share one scale so
                 blocked reads as a true proportion. Drawer-only
                 (`appsExtrasInDrawer`) — no room on the apps-grid card. -->
            <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && agg.queriesSeries && agg.queriesSeries.length >= 2">
              <div class="space-y-1 mt-1">
                <span class="fs-2xs text-[var(--text-faint)] block"
                      x-text="t('apps.pihole.activity') || 'Queries vs blocked'"></span>
                <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                  <path :d="piholeSeriesPath(agg.queriesSeries, piholeSeriesMax(agg.queriesSeries))"
                        fill="none" stroke="var(--info)" stroke-width="1.5"/>
                  <path :d="piholeSeriesPath(agg.blockedSeries, piholeSeriesMax(agg.queriesSeries))"
                        fill="none" stroke="var(--danger)" stroke-width="1.5"/>
                </svg>
                <div class="flex items-center justify-around fs-2xs text-[var(--text-faint)]">
                  <span><span class="inline-block w-2 h-2 rounded-full me-1" style="background: var(--info);"></span><span
                    x-text="t('apps.pihole.legend_queries') || 'queries'"></span></span>
                  <span><span class="inline-block w-2 h-2 rounded-full me-1" style="background: var(--danger);"></span><span
                    x-text="t('apps.pihole.legend_blocked') || 'blocked'"></span></span>
                </div>
              </div>
            </template>
            <!-- Long-horizon blocked-% trend (from OmniGrid's pihole_samples,
                 surviving FTL's counter reset on restart). Drawer-only — no
                 room on the apps-grid card. -->
            <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && agg.trend && agg.trend.series && agg.trend.series.length >= 2">
              <div class="space-y-1 mt-1 pt-1 border-t border-[var(--border)]">
                <span class="fs-2xs text-[var(--text-faint)] block"
                      x-text="t('apps.pihole.blocked_trend', { days: agg.trend.days }) || ('Blocked % trend (' + agg.trend.days + ' days)')"></span>
                <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                  <path :d="piholeTrendPath(agg.trend.series)" fill="none" stroke="var(--success)" stroke-width="1.5"/>
                </svg>
                <div class="fs-3xs text-[var(--text-faint)]"
                     x-text="(t('apps.pihole.median_blocked') || 'Median blocked') + ': ' + piholePct(agg.trend.median_pct)"></div>
              </div>
            </template>
            <!-- Protection status — green when every host is ON, amber when
                 some are OFF (the actionable warning). -->
            <div class="flex items-center gap-1.5 fs-2xs mt-1">
              <span class="apps-fleet-dot"
                    :class="agg.protOn === agg.protTotal ? 'apps-fleet-dot--on' : 'apps-fleet-dot--off'"
                    aria-hidden="true"></span>
              <span x-show="agg.protOn === agg.protTotal" class="text-[var(--text-faint)]"
                    x-text="t('apps.pihole.protection_on') || 'Blocking on'"></span>
              <span x-show="agg.protOn !== agg.protTotal" class="text-[var(--warning)]"
                    x-text="(t('apps.pihole.protection_partial') || 'Blocking OFF on') + ' ' + agg.protOffHosts.join(', ')"></span>
            </div>
            <!-- Partial-failure footnote (some hosts down but totals shown). -->
            <div x-show="agg.failedHosts.length" class="fs-2xs text-[var(--warning)] mt-1"
                 x-text="(t('apps.pihole.unreachable') || 'Unreachable') + ': ' + agg.failedHosts.join(', ')"></div>
            <!-- Version footnote (from the Pi-hole /api/info/version response). -->
            <div x-show="agg.version" class="fs-3xs text-[var(--text-faint)] mt-1 mono"
                 x-text="t('apps.version_footnote', { brand: 'Pi-hole', v: (agg.version || '') })"></div>
          </div>
        </template>
        <!-- Loading / error states (plain text, outside the box — matches
             every other app's extras placeholder pattern). -->
        <template x-if="!agg.ready && agg.loading">
          <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
            <span class="spin" aria-hidden="true"></span>
            <span x-text="t('apps.pihole.loading') || 'Loading Pi-hole stats…'"></span></p>
        </template>
        <template x-if="!agg.ready && !agg.loading">
          <p class="fs-xs text-[var(--danger)] italic"
             x-text="(t('apps.pihole.all_unreachable') || 'No Pi-hole host reachable')
               + (agg.failedHosts.length ? ' — ' + agg.failedHosts.join(', ') : '')"></p>
        </template>

        <!-- Fleet actions (admin-only; need at least one credentialed host).
             Gated on `appsExtrasInDrawer` so they render ONLY in the app
             drawer — the Apps-grid card stays stats-only (actions + details
             live in the drawer). `typeof` guard: the card include never sets
             the flag, so it reads undefined → actions hidden there. -->
        <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && isAdmin() && (app.instances || []).some((i) => i.api_key_set)">
          <div class="apps-fleet-actions pt-2 mt-1 border-t border-[var(--border)] space-y-1.5">
            <div class="flex items-center gap-1.5 flex-wrap">
              <button type="button" class="apps-card-action-pill whitespace-nowrap"
                      :disabled="piholeSkillBusy(app, 'pihole_enable')"
                      @click.stop="piholeFleetSkill(app, 'pihole_enable')"
                      :title="t('apps.pihole.action_enable_title') || 'Enable blocking on every host'">
                <svg width="11" height="11" :class="piholeSkillBusy(app, 'pihole_enable') ? 'spin-md' : ''" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-shield"/>
                </svg>
                <span x-text="t('apps.pihole.action_enable') || 'Enable'"></span>
              </button>
              <button type="button" class="apps-card-action-pill apps-card-action-pill--danger whitespace-nowrap"
                      :disabled="piholeSkillBusy(app, 'pihole_disable')"
                      @click.stop="piholeFleetSkill(app, 'pihole_disable')"
                      :title="t('apps.pihole.action_disable_title') || 'Disable blocking on every host (indefinitely)'">
                <svg width="11" height="11" :class="piholeSkillBusy(app, 'pihole_disable') ? 'spin-md' : ''" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-pause"/>
                </svg>
                <span x-text="t('apps.pihole.action_disable') || 'Disable'"></span>
              </button>
              <button type="button" class="apps-card-action-pill whitespace-nowrap"
                      :disabled="piholeSkillBusy(app, 'pihole_refresh')"
                      @click.stop="piholeFleetSkill(app, 'pihole_refresh')"
                      :title="t('apps.pihole.action_refresh_title') || 'Update gravity (blocklists) on every host'">
                <svg width="11" height="11" :class="piholeSkillBusy(app, 'pihole_refresh') ? 'spin-md' : ''" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-cw"/>
                </svg>
                <span x-text="t('apps.pihole.action_refresh') || 'Update gravity'"></span>
              </button>
              <button type="button" class="apps-card-action-pill whitespace-nowrap"
                      :disabled="piholeSkillBusy(app, 'pihole_status')"
                      @click.stop="piholeFleetSkill(app, 'pihole_status')"
                      :title="t('apps.pihole.action_status_title') || 'Refresh the aggregated stats'">
                <svg width="11" height="11" :class="piholeSkillBusy(app, 'pihole_status') ? 'spin-md' : ''" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-activity"/>
                </svg>
                <span x-text="t('apps.pihole.action_status') || 'Refresh'"></span>
              </button>
            </div>
            <!-- Timed-disable presets. -->
            <div class="flex items-center gap-1 flex-wrap">
              <span class="fs-2xs text-[var(--text-faint)] me-1"
                    x-text="(t('apps.pihole.disable_for') || 'Disable for') + ':'"></span>
              <template x-for="ds in piholeDisablePresets()" :key="ds.skill">
                <button type="button"
                        class="apps-fleet-preset"
                        :disabled="piholeSkillBusy(app, ds.skill)"
                        @click.stop="piholeFleetSkill(app, ds.skill)"
                        x-text="ds.label"></button>
              </template>
            </div>
          </div>
        </template>
      </div>
    </template>
  </div>
</template>
