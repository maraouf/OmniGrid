<!-- Per-app expanded-card extras -- Plex (media server).

     Renders inside `apps-card.html` as the per-instance host row when the
     chip is the Plex catalog template AND the operator hasn't hidden extras
     via the per-instance `show_extras` toggle. The data comes from the PMS
     HTTP API (library sections + per-section totalSize + /status/sessions)
     via `logic/apps/plex.py:fetch_data`, read through the generic,
     cache-backed `appsAppData(inst)` -- so the card never triggers a
     per-card round-trip on the hot path. Returns null while idle / pending /
     errored, so the panel gates cleanly.

     Reuses the shared `.apps-card-ups-*` stat-grid component (the same
     2-column stat panel Bazarr / APC render) -- the classes are a generic
     telemetry stat grid, not UPS-specific.

     Helpers used (all from `static/js/apps/plex.js`):
       plexIsApp(app)   -- gate "is this a Plex chip"
       plexData(inst)   -- per-instance library payload
       plexCount(v)     -- thousands-separated integer formatter -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="plexIsApp && plexIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && plexData(inst)">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-ups" :data-plex-host="inst.host_id">
    <!-- Per-host header (host name only when the app has > 1 instance). -->
    <div x-show="(app.instances || []).length > 1"
         class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
         x-text="inst.host_address || inst.host_id"></div>
    <div class="apps-card-ups-grid">
      <!-- Movies -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.plex.movies') || 'Movies'"></div>
        <div class="apps-card-stat-value" x-text="plexCount(plexData(inst).movies)"></div>
      </div>
      <!-- Shows (series) -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.plex.shows') || 'Shows'"></div>
        <div class="apps-card-stat-value" x-text="plexCount(plexData(inst).shows)"></div>
      </div>
      <!-- Music artists -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.plex.music') || 'Music'"></div>
        <div class="apps-card-stat-value" x-text="plexCount(plexData(inst).music)"></div>
      </div>
      <!-- Now playing (active streams) -- highlighted when > 0 -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.plex.now_playing') || 'Now playing'"></div>
        <div class="apps-card-stat-value"
             :class="(Number(plexData(inst).sessions_active) || 0) > 0 ? 'text-[var(--success)]' : ''"
             x-text="plexCount(plexData(inst).sessions_active)"></div>
      </div>
    </div>
    <!-- Active-stream detail — the transcode-vs-direct-play split + total
         bandwidth, only while something is playing (otherwise it reads as
         redundant 0s). Transcoding is warning-tinted (it's the load signal). -->
    <div x-show="(Number(plexData(inst).sessions_active) || 0) > 0"
         class="fs-3xs text-[var(--text-faint)] mt-1 mono inline-flex flex-wrap gap-x-2">
      <span x-show="(Number(plexData(inst).sessions_transcoding) || 0) > 0"
            class="text-[var(--warning)]"
            x-text="t('apps.plex.transcoding_footnote', { n: (Number(plexData(inst).sessions_transcoding) || 0) })"></span>
      <!-- WHY the sessions are transcoding (codec / bandwidth / …). -->
      <span x-show="(plexData(inst).transcode_reasons || []).length"
            class="text-[var(--warning)]"
            :title="t('apps.plex.transcode_why_title') || 'Why the active streams are transcoding'"
            x-text="'(' + (plexData(inst).transcode_reasons || []).map(r => plexCount(r.count) + ' ' + (t('apps.plex.transcode_' + r.label) || r.label)).join(' · ') + ')'"></span>
      <span x-show="(Number(plexData(inst).direct_streams) || 0) > 0"
            x-text="t('apps.plex.direct_footnote', { n: (Number(plexData(inst).direct_streams) || 0) })"></span>
      <span x-show="plexBandwidth(inst)"
            x-text="t('apps.plex.bandwidth_footnote', { bw: plexBandwidth(inst) })"></span>
    </div>
    <!-- Libraries + added-this-week + version footnote. -->
    <div class="fs-3xs text-[var(--text-faint)] mt-1 mono inline-flex flex-wrap gap-x-2">
      <span x-text="t('apps.plex.libraries_footnote', { n: (Number(plexData(inst).libraries) || 0) })"></span>
      <span x-show="plexAddedWeek(inst) !== null"
            class="text-[var(--info)]"
            x-text="t('apps.plex.added_week_footnote', { n: (plexAddedWeek(inst) || 0) })"></span>
      <span x-show="plexData(inst).version"
            x-text="t('apps.version_footnote', { brand: 'Plex', v: (plexData(inst).version || '') })"></span>
    </div>
    <!-- Concurrent-streams retention trend (drawer-only): per-day peak streams.
         Plex keeps no concurrent-stream history of its own, so the lifespan
         plex_sampler fills it; ≥ 2 daily points. -->
    <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && plexTrend(inst) && plexTrend(inst).series_streams && plexTrend(inst).series_streams.length >= 2">
      <div class="space-y-1 mt-2 pt-2 border-t border-[var(--border)]">
        <span class="fs-2xs text-[var(--text-faint)] block"
              x-text="t('apps.plex.streams_trend', { days: plexTrend(inst).days })"></span>
        <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
          <path :d="plexTrendPath(plexTrend(inst).series_streams)" fill="none" stroke="var(--success)" stroke-width="1.5"/>
        </svg>
        <div class="fs-3xs text-[var(--text-faint)]"
             x-text="t('apps.plex.streams_peak', { peak: plexTrend(inst).peak_streams, latest: plexTrend(inst).latest_streams })"></div>
      </div>
    </template>
  </div>
</template>
<!-- Loading — first fetch in flight (panel above gates on plexData). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="plexIsApp && plexIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && !plexData(inst) && appsAppDataStatus(inst) === 'pending'">
  <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
    <span class="spin" aria-hidden="true"></span>
    <span x-text="t('apps.plex.loading') || 'Loading Plex data…'"></span></p>
</template>
