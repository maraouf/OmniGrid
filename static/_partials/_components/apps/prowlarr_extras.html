<!-- Per-app expanded-card extras -- Prowlarr (indexer manager).

     Renders inside `apps-card.html` when the chip is the Prowlarr catalog
     template AND extras are visible. Data from Prowlarr's `GET /api/v1/indexer`
     (+ applications / indexerstats / health), via
     `logic/apps/prowlarr.py:fetch_data`, read through the cache-backed
     `appsAppData(inst)`. Mirrors lidarr_extras.html (canonical `.apps-card-ups-*`
     stat grid + loading/error/no-api-key plain-text branches) but Prowlarr
     manages no media library, so it shows Indexers / Apps synced / Queries /
     Grabs and has NO Storage section.

     Helpers used (all from `static/js/apps/prowlarr.js`):
       prowlarrIsApp(app) / prowlarrData(inst) / prowlarrCount(v) /
       prowlarrIndexersLabel(inst) -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="prowlarrIsApp && prowlarrIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null))">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-prowlarr">
    <template x-if="prowlarrData(inst)">
      <div class="apps-card-ups" :data-prowlarr-host="inst.host_id">
        <div x-show="(app.instances || []).length > 1"
             class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
             x-text="inst.host_address || inst.host_id"></div>
        <div class="apps-card-ups-grid">
          <!-- Indexers (enabled / total) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.prowlarr.indexers') || 'Indexers'"></div>
            <div class="apps-card-stat-value" x-text="prowlarrIndexersLabel(inst)"></div>
          </div>
          <!-- Apps synced -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.prowlarr.apps_synced') || 'Apps synced'"></div>
            <div class="apps-card-stat-value" x-text="prowlarrCount(prowlarrData(inst).apps_synced)"
                 :title="prowlarrAppsNames(inst)"></div>
          </div>
          <!-- Queries (lifetime) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.prowlarr.queries') || 'Queries'"></div>
            <div class="apps-card-stat-value" x-text="prowlarrCount(prowlarrData(inst).queries)"></div>
          </div>
          <!-- Grabs (lifetime) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.prowlarr.grabs') || 'Grabs'"></div>
            <div class="apps-card-stat-value" x-text="prowlarrCount(prowlarrData(inst).grabs)"></div>
          </div>
          <!-- Query failure rate (across all indexers) -->
          <div class="apps-card-ups-stat" x-show="(Number(prowlarrData(inst).queries) || 0) > 0">
            <div class="apps-card-stat-label" x-text="t('apps.prowlarr.failure_rate') || 'Failure rate'"></div>
            <div class="apps-card-stat-value"
                 :class="(Number(prowlarrData(inst).fail_rate_pct) || 0) >= 25 ? 'text-[var(--danger)]' : ((Number(prowlarrData(inst).fail_rate_pct) || 0) >= 10 ? 'text-[var(--warning)]' : 'text-[var(--success)]')"
                 x-text="(Number(prowlarrData(inst).fail_rate_pct) || 0).toFixed(1) + '%'"></div>
          </div>
        </div>
        <!-- Most-failing + slowest indexer — the single most actionable Prowlarr
             insight ('indexer X: 40% failure rate'). Shown only when a
             meaningful offender exists (>= a few queries). -->
        <template x-if="prowlarrData(inst).worst_failing && prowlarrData(inst).worst_failing.name">
          <div class="fs-3xs text-[var(--warning)] mt-1"
               x-text="'🛑 ' + (t('apps.prowlarr.most_failing') || 'Most failing') + ': ' + prowlarrData(inst).worst_failing.name + ' (' + (Number(prowlarrData(inst).worst_failing.fail_rate_pct) || 0).toFixed(1) + '% of ' + prowlarrCount(prowlarrData(inst).worst_failing.queries) + ' queries)'"></div>
        </template>
        <template x-if="prowlarrData(inst).slowest_indexer && prowlarrData(inst).slowest_indexer.name">
          <div class="fs-3xs text-[var(--text-faint)] mt-0.5"
               x-text="'🐢 ' + (t('apps.prowlarr.slowest') || 'Slowest') + ': ' + prowlarrData(inst).slowest_indexer.name + ' (' + prowlarrCount(prowlarrData(inst).slowest_indexer.avg_response_ms) + 'ms avg)'"></div>
        </template>
        <!-- Per-indexer failure-rate distribution (drawer-only) — the top
             failing indexers rendered as horizontal bars, a richer view than
             the single "most failing" footnote above. Hidden when nothing is
             failing. Bar width uses the sanctioned --w inline var; the fill
             colour comes from the ok/warn/crit class (same 10/25% thresholds
             as the failure-rate stat). -->
        <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && prowlarrFailBars && prowlarrFailBars(inst).length">
          <div class="space-y-1 mt-2 pt-2 border-t border-[var(--border)]">
            <span class="fs-2xs text-[var(--text-faint)] block"
                  x-text="t('apps.prowlarr.fail_distribution') || 'Indexer failure rates'"></span>
            <template x-for="row in prowlarrFailBars(inst)" :key="row.name">
              <div class="apps-prowlarr-failbar">
                <span class="apps-prowlarr-failbar-name mono fs-3xs" x-text="row.name" :title="row.name"></span>
                <span class="apps-prowlarr-failbar-track">
                  <span class="apps-prowlarr-failbar-fill" :class="row.level" :style="'--w:' + row.pct + '%'"></span>
                </span>
                <span class="apps-prowlarr-failbar-pct fs-3xs mono"
                      :class="row.level === 'crit' ? 'text-[var(--danger)]' : (row.level === 'warn' ? 'text-[var(--warning)]' : 'text-[var(--success)]')"
                      x-text="row.pct.toFixed(1) + '%'"
                      :title="t('apps.prowlarr.fail_bar_detail', { failed: prowlarrCount(row.failed), queries: prowlarrCount(row.queries) })"></span>
              </div>
            </template>
          </div>
        </template>
        <!-- Connected-app names: the REAL synced *arr apps (Sonarr / Radarr /
             Whisparr / …), rendered as brand-icon chips rather than a raw
             comma-joined string. Lives outside the stat-grid so the 1x1..4x2
             card-size rules are unaffected. -->
        <template x-if="prowlarrAppsList(inst).length">
          <div class="apps-prowlarr-synced" :title="prowlarrAppsNames(inst)">
            <span class="apps-prowlarr-synced-label"
                  x-text="(t('apps.prowlarr.apps_synced') || 'Apps synced') + ':'"></span>
            <span class="apps-prowlarr-synced-chips">
              <template x-for="ap in prowlarrAppsList(inst)" :key="ap.name">
                <span class="apps-prowlarr-app-chip">
                  <img x-show="ap.icon" :src="ap.icon" alt="" loading="lazy"
                       class="apps-prowlarr-app-chip-icon"
                       @error="$event.target.style.display='none'">
                  <span x-text="ap.name"></span>
                </span>
              </template>
            </span>
          </div>
        </template>
        <!-- Counter-rate retention trend (from OmniGrid's prowlarr_samples):
             per-day query / grab throughput + a daily failure-rate. Drawer-only
             (`appsExtrasInDrawer`) — no room on the apps-grid card; shown once
             ≥ 2 daily points exist. -->
        <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && prowlarrTrend(inst) && prowlarrTrend(inst).series_queries && prowlarrTrend(inst).series_queries.length >= 2">
          <div class="space-y-2 mt-2 pt-2 border-t border-[var(--border)]">
            <!-- Query / grab throughput per day (two lines, shared scale). -->
            <div class="space-y-1">
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.prowlarr.throughput_trend', { days: prowlarrTrend(inst).days }) || ('Queries / grabs per day (' + prowlarrTrend(inst).days + ' days)')"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                <path :d="prowlarrTrendPath(prowlarrTrend(inst).series_queries)" fill="none" stroke="var(--info)" stroke-width="1.5"/>
                <path :d="prowlarrTrendPath(prowlarrTrend(inst).series_grabs)" fill="none" stroke="var(--success)" stroke-width="1.5"/>
              </svg>
              <div class="fs-3xs text-[var(--text-faint)]"
                   x-text="t('apps.prowlarr.window_totals', { queries: prowlarrCount(prowlarrTrend(inst).window_queries), grabs: prowlarrCount(prowlarrTrend(inst).window_grabs), days: prowlarrTrend(inst).days })"></div>
            </div>
            <!-- Daily failure-rate trend. -->
            <div class="space-y-1">
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.prowlarr.failrate_trend', { days: prowlarrTrend(inst).days }) || ('Failure rate per day (' + prowlarrTrend(inst).days + ' days)')"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                <path :d="prowlarrTrendPath(prowlarrTrend(inst).series_fail_rate)" fill="none" stroke="var(--warning)" stroke-width="1.5"/>
              </svg>
              <div x-show="(Number(prowlarrTrend(inst).avg_fail_rate) || 0) > 0" class="fs-3xs text-[var(--text-faint)]"
                   x-text="t('apps.prowlarr.avg_failrate', { pct: (Number(prowlarrTrend(inst).avg_fail_rate) || 0).toFixed(1) })"></div>
            </div>
            <!-- Avg query response-time per day — the "indexers getting slower"
                 signal (query-weighted fleet average). Shown once positive
                 response data exists. -->
            <div class="space-y-1"
                 x-show="prowlarrTrend(inst).series_response_ms && prowlarrTrend(inst).series_response_ms.length >= 2 && (Number(prowlarrTrend(inst).peak_response_ms) || 0) > 0">
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.prowlarr.response_trend', { days: prowlarrTrend(inst).days }) || ('Avg response time (' + prowlarrTrend(inst).days + ' days)')"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                <path :d="prowlarrTrendPath(prowlarrTrend(inst).series_response_ms)" fill="none" stroke="var(--info)" stroke-width="1.5"/>
              </svg>
              <div class="fs-3xs text-[var(--text-faint)]"
                   x-text="t('apps.prowlarr.response_latest', { latest: prowlarrCount(prowlarrTrend(inst).latest_response_ms), peak: prowlarrCount(prowlarrTrend(inst).peak_response_ms) })"></div>
            </div>
          </div>
        </template>
        <!-- Footnote: version + health issues. -->
        <div x-show="prowlarrData(inst).version || (Number(prowlarrData(inst).health_issues) || 0) > 0"
             class="fs-3xs text-[var(--text-faint)] mt-1 mono">
          <span x-show="prowlarrData(inst).version" x-text="t('apps.version_footnote', { brand: 'Prowlarr', v: (prowlarrData(inst).version || '') })"></span>
          <span x-show="(Number(prowlarrData(inst).health_issues) || 0) > 0"
                class="text-[var(--warning)]"
                x-text="(prowlarrData(inst).version ? ' · ' : '') + (t('apps.prowlarr.health_issues_n', { n: prowlarrData(inst).health_issues }) || (prowlarrData(inst).health_issues + ' health issue(s)'))"></span>
        </div>
      </div>
    </template>
    <!-- No API key yet — idle and unconfigured. -->
    <template x-if="appsAppDataStatus(inst) === 'idle' && !inst.api_key_set">
      <p class="fs-xs text-[var(--text-faint)] italic"
         x-text="t('apps.prowlarr.no_api_key') || 'No API key set -- add one in Admin -> Apps to enable.'"></p>
    </template>
    <!-- Loading — first fetch in flight. -->
    <template x-if="!prowlarrData(inst) && appsAppDataStatus(inst) === 'pending'">
      <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('apps.prowlarr.loading') || 'Loading Prowlarr data…'"></span></p>
    </template>
    <!-- Error — upstream fetch failed. -->
    <template x-if="!prowlarrData(inst) && appsAppDataStatus(inst) === 'error'">
      <p class="fs-xs text-[var(--danger)] italic"
         x-text="(t('apps.prowlarr.fetch_failed') || 'Prowlarr fetch failed') + ': ' + appsAppDataError(inst)"></p>
    </template>
  </div>
</template>
