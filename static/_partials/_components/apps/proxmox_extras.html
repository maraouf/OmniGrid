<!-- Per-app expanded-card extras -- Proxmox VE (hypervisor management).

     Renders inside `apps-card.html` when the chip is the Proxmox catalog
     template AND extras are visible. Data comes from
     `logic/apps/proxmox.py:fetch_data` (one /cluster/resources call), read
     through the cache-backed `appsAppData(inst)`. Reuses the shared
     `.apps-card-ups-*` stat-grid (a generic telemetry panel).

     Helpers used (all from `static/js/apps/proxmox.js`):
       proxmoxIsApp(app) / proxmoxData(inst) / proxmoxCount(v) /
       proxmoxFraction(inst, kind) / proxmoxStorage(inst) -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="proxmoxIsApp && proxmoxIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && proxmoxData(inst)">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-ups" :data-proxmox-host="inst.host_id">
    <!-- Per-host header (host name only when the app has > 1 instance). -->
    <div x-show="(app.instances || []).length > 1"
         class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
         x-text="inst.host_address || inst.host_id"></div>
    <div class="apps-card-ups-grid">
      <!-- Nodes online/total -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.proxmox.nodes') || 'Nodes'"></div>
        <div class="apps-card-stat-value" x-text="proxmoxFraction(inst, 'node')"></div>
      </div>
      <!-- VMs running/total -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.proxmox.vms') || 'VMs'"></div>
        <div class="apps-card-stat-value"
             :class="(Number(proxmoxData(inst).vms_running) || 0) > 0 ? 'text-[var(--success)]' : ''"
             x-text="proxmoxFraction(inst, 'vm')"></div>
      </div>
      <!-- Containers running/total -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.proxmox.containers') || 'Containers'"></div>
        <div class="apps-card-stat-value"
             :class="(Number(proxmoxData(inst).cts_running) || 0) > 0 ? 'text-[var(--success)]' : ''"
             x-text="proxmoxFraction(inst, 'ct')"></div>
      </div>
      <!-- Cluster CPU % -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.proxmox.cpu') || 'CPU'"></div>
        <div class="apps-card-stat-value" x-text="proxmoxCount(proxmoxData(inst).cpu_percent) + '%'"></div>
      </div>
      <!-- Cluster Memory % -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.proxmox.memory') || 'Memory'"></div>
        <div class="apps-card-stat-value" x-text="proxmoxCount(proxmoxData(inst).mem_percent) + '%'"></div>
      </div>
      <!-- Cluster quorum — only for a real cluster (a standalone node has no
           quorum). Green when quorate, red (the cluster-health alarm) when not. -->
      <div class="apps-card-ups-stat" x-show="proxmoxQuorum(inst)">
        <div class="apps-card-stat-label" x-text="t('apps.proxmox.quorum') || 'Quorum'"></div>
        <div class="apps-card-stat-value fs-3xs"
             :class="(proxmoxQuorum(inst) && proxmoxQuorum(inst).quorate) ? 'text-[var(--success)]' : 'text-[var(--danger)]'"
             x-text="(proxmoxQuorum(inst) && proxmoxQuorum(inst).quorate) ? (t('apps.proxmox.quorate') || 'Quorate') : (t('apps.proxmox.no_quorum') || 'No quorum')"></div>
      </div>
    </div>
    <!-- Permission-scope warning: the token sees the node(s) but no guests or
         per-node metrics. Prefers the backend-derived `perm_hint` — the precise
         diagnosis from probing the token's own GET /access/permissions (e.g.
         "Confirmed: the token has NO effective permissions — Privilege
         Separation is ON …") — so the card names the exact fix; falls back to
         the generic localized message when the probe couldn't pin it down. -->
    <div x-show="proxmoxData(inst).perm_limited"
         class="fs-3xs mt-1" style="color: var(--warning);"
         x-text="proxmoxData(inst).perm_hint || t('apps.proxmox.perm_limited')"></div>
    <!-- Storage + version footnote. -->
    <div x-show="proxmoxStorage(inst) || proxmoxData(inst).version"
         class="fs-3xs text-[var(--text-faint)] mt-1 mono inline-flex flex-wrap gap-x-2">
      <span x-show="proxmoxStorage(inst)"
            x-text="t('apps.proxmox.storage_footnote', { used: proxmoxStorage(inst), pct: (Number(proxmoxData(inst).storage_percent) || 0) })"></span>
      <span x-show="proxmoxData(inst).version"
            x-text="t('apps.version_footnote', { brand: 'Proxmox', v: (proxmoxData(inst).version || '') })"></span>
    </div>
    <!-- Last-backup footnote — age + recent-failure count from the per-node
         vzdump task log. Warning-tinted when the last backup failed OR any
         recent backup failed; faint otherwise. -->
    <template x-if="proxmoxBackup(inst)">
      <div class="fs-3xs mt-1 mono"
           :class="(!proxmoxBackup(inst).last_ok || (Number(proxmoxBackup(inst).failed_recent) || 0) > 0) ? 'text-[var(--warning)]' : 'text-[var(--text-faint)]'"
           x-text="t('apps.proxmox.backup_footnote', { age: proxmoxBackupAge(inst) }) + ((Number(proxmoxBackup(inst).failed_recent) || 0) > 0 ? ' · ' + t('apps.proxmox.backup_failed', { failed: (Number(proxmoxBackup(inst).failed_recent) || 0), total: (Number(proxmoxBackup(inst).total_recent) || 0) }) : '')"></div>
    </template>
    <!-- Cluster-resource trend (from OmniGrid's proxmox_samples): per-day average
         CPU% (amber) + memory% (blue) + storage% (green) on a shared 0..100
         scale. Drawer-only; ≥ 2 daily points. Proxmox keeps no such history. -->
    <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && proxmoxTrend(inst) && proxmoxTrend(inst).series_cpu && proxmoxTrend(inst).series_cpu.length >= 2">
      <div class="space-y-1 mt-2 pt-2 border-t border-[var(--border)]">
        <span class="fs-2xs text-[var(--text-faint)] block"
              x-text="t('apps.proxmox.resource_trend', { days: proxmoxTrend(inst).days }) || ('Cluster load (' + proxmoxTrend(inst).days + ' days)')"></span>
        <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
          <path :d="proxmoxTrendPath(proxmoxTrend(inst).series_cpu)" fill="none" stroke="var(--warning)" stroke-width="1.5"/>
          <path :d="proxmoxTrendPath(proxmoxTrend(inst).series_mem)" fill="none" stroke="var(--info)" stroke-width="1.5"/>
          <path :d="proxmoxTrendPath(proxmoxTrend(inst).series_storage)" fill="none" stroke="var(--success)" stroke-width="1.5"/>
        </svg>
        <div class="fs-3xs text-[var(--text-faint)] inline-flex flex-wrap gap-x-2">
          <span class="text-[var(--warning)]" x-text="t('apps.proxmox.trend_cpu', { peak: proxmoxTrend(inst).peak_cpu, latest: proxmoxTrend(inst).latest_cpu })"></span>
          <span class="text-[var(--info)]" x-text="t('apps.proxmox.trend_mem', { peak: proxmoxTrend(inst).peak_mem, latest: proxmoxTrend(inst).latest_mem })"></span>
          <span class="text-[var(--success)]" x-text="t('apps.proxmox.trend_storage', { latest: proxmoxTrend(inst).latest_storage })"></span>
        </div>
      </div>
    </template>
  </div>
</template>
<!-- No token yet — idle and unconfigured. -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="proxmoxIsApp && proxmoxIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && appsAppDataStatus(inst) === 'idle' && !inst.api_key_set">
  <p class="fs-xs text-[var(--text-faint)] italic"
     x-text="t('apps.proxmox.no_token') || 'No API token set -- add one in Admin -> Apps to enable.'"></p>
</template>
<!-- Loading — first fetch in flight (panel above gates on proxmoxData). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="proxmoxIsApp && proxmoxIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && !proxmoxData(inst) && appsAppDataStatus(inst) === 'pending'">
  <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
    <span class="spin" aria-hidden="true"></span>
    <span x-text="t('apps.proxmox.loading') || 'Loading Proxmox data…'"></span></p>
</template>
<!-- Error — upstream fetch failed. -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="proxmoxIsApp && proxmoxIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && !proxmoxData(inst) && appsAppDataStatus(inst) === 'error'">
  <p class="fs-xs text-[var(--danger)] italic"
     x-text="(t('apps.proxmox.fetch_failed') || 'Proxmox fetch failed') + ': ' + appsAppDataError(inst)"></p>
</template>
