<!-- Per-app editor fields -- qBittorrent.

     Renders inside the Admin -> Apps per-instance editor, gated on
     `qbittorrentIsApp(...)` so the username + password inputs appear ONLY
     for a qBittorrent chip. qBittorrent's WebUI API authenticates with a
     username + password (session login -> SID cookie):
       - username -> non-secret `username` chip field (round-trips in the
         clear so the input shows the saved value).
       - password -> the secret `api_key` chip field (never returned; only
         an `api_key_set` flag, keep-current-if-blank on save).
     Leave both blank if the WebUI is set to bypass authentication for the
     OmniGrid host. -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="qbittorrentIsApp && qbittorrentIsApp({catalog: {slug: appsInstanceEditForm.catalog_slug || (appsInstanceEditForm.catalog_name || '').toLowerCase()}})">
  <div class="space-y-2 pt-3 mt-3 border-t border-[var(--border)]">
    <div>
      <label for="apps-instance-qbittorrent-username"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.qbittorrent.username_label') || 'qBittorrent username'"></label>
      <input id="apps-instance-qbittorrent-username"
             type="text" x-model="appsInstanceEditForm.username"
             class="w-full bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm"
             :placeholder="t('apps.qbittorrent.username_placeholder') || 'WebUI username (default: admin)'"
             autocomplete="off" spellcheck="false">
    </div>
    <div>
      <label for="apps-instance-qbittorrent-password"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.qbittorrent.password_label') || 'qBittorrent password'"></label>
      <input id="apps-instance-qbittorrent-password"
             type="password" x-model="appsInstanceEditForm.api_key"
             class="w-full bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm"
             :placeholder="appsInstanceEditForm.api_key_set
               ? (t('apps.qbittorrent.password_placeholder_saved') || 'Saved -- leave blank to keep')
               : (t('apps.qbittorrent.password_placeholder_unset') || 'WebUI password')"
             autocomplete="off" spellcheck="false">
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('apps.qbittorrent.creds_hint') || 'qBittorrent → Tools → Options → Web UI. The password is stored encrypted-at-rest and never shown again; leave blank to keep the saved one. Leave both blank only if the WebUI bypasses auth for this host.'"></p>
    </div>
    <!-- Per-instance data-cache TTL (contained in the app, NOT a global
         Config tunable). Blank = the app default (15s); backend clamps
         5..3600. -->
    <div>
      <label for="apps-instance-qbittorrent-cache-ttl"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.cache_ttl_label') || 'Data cache TTL (seconds)'"></label>
      <div class="flex flex-wrap items-center gap-2">
        <input id="apps-instance-qbittorrent-cache-ttl"
               type="number" min="5" max="3600" step="1"
               x-model="appsInstanceEditForm.cache_ttl"
               @change="appsInstanceEditForm.cache_ttl = appsClampCacheTtl(appsInstanceEditForm.cache_ttl)"
               class="w-32 bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm mono"
               :placeholder="t('apps.cache_ttl_placeholder') || 'App default'"
               autocomplete="off">
        <div class="bounds-chips" role="group"
             :aria-label="t('admin.config.bounds.group_label') || 'Bounds'">
          <span class="bounds-chip bounds-chip--min" :title="t('admin.config.bounds.min_title') || 'Minimum'">
            <svg width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/>
            </svg>
            <span>5</span>
          </span>
          <span class="bounds-chip bounds-chip--max" :title="t('admin.config.bounds.max_title') || 'Maximum'">
            <svg width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/>
            </svg>
            <span>3600</span>
          </span>
          <span class="bounds-chip bounds-chip--default" :title="t('admin.config.bounds.default_title') || 'Default'">
            <svg width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/>
            </svg>
            <span>15</span>
          </span>
        </div>
      </div>
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('apps.qbittorrent.cache_ttl_hint') || 'How long fetched transfer stats are cached before re-querying qBittorrent (5–3600s). Leave blank for the app default (15s).'"></p>
    </div>
    <!-- Shared Test-connection unit (same button + result box as the
         Portainer / OIDC admin panels) so the per-app editor never drifts
         on style. -->
    <div x-data="{ tcRun: () => testInstanceCredential(), tcResult: () => appsInstanceTestResult, tcLastTs: () => appsInstanceEditForm.last_test_ok_ts }">
      <!-- INCLUDE: _components/og-test-connection.html -->
    </div>
  </div>
</template>
