<!-- Per-app expanded-card extras -- Radarr (movie collection manager).

     Renders inside `apps-card.html` as the per-instance host row when the
     chip is the Radarr catalog template AND the operator hasn't hidden
     extras via the per-instance `show_extras` toggle. The data comes from
     Radarr's `GET /api/v3/movie` (+ queue / disk / health), via
     `logic/apps/radarr.py:fetch_data`, read through the generic,
     cache-backed `appsAppData(inst)` -- so the card never triggers a
     per-card round-trip on the hot path.

     Outer gate is just "is this a Radarr chip + extras visible" -- the
     data presence is checked on the INNER branches so the card shows a
     "Loading Radarr data…" placeholder (and error / no-api-key states)
     instead of rendering nothing until the first fetch lands (matches the
     Speedtest / APC extras pattern). Only the populated stat panel sits in
     the boxed `.apps-card-ups`; placeholders render as plain italic text.

     Reuses the shared `.apps-card-ups-*` stat-grid component (the same
     2-column stat panel APC / Bazarr render) so the responsive tile-size
     rules apply for free.

     Helpers used (from `static/js/apps/radarr.js`):
       radarrIsApp(app)   -- gate "is this a Radarr chip"
       radarrData(inst)   -- per-instance library-summary payload
       radarrCount(v)     -- thousands-separated integer formatter
     Storage uses the shared `_components/apps/_arr_storage.html` include
     (generic appsDisks / appsDiskUsedPct / appsFmtSize helpers). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="radarrIsApp && radarrIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null))">
  <!--suppress JSUnresolvedVariable -->
  <!-- Neutral wrapper (NOT the accent-tinted `.apps-card-ups` box) so the
       loading / error / no-api-key placeholders render as plain text. Only
       the populated stat panel sits inside the boxed `.apps-card-ups`. -->
  <div class="apps-card-radarr">
    <!-- Data present — render the 4-stat panel (the accent-tinted box). -->
    <template x-if="radarrData(inst)">
      <div class="apps-card-ups" :data-radarr-host="inst.host_id">
        <!-- Per-host header (host name only when the app has > 1 instance). -->
        <div x-show="(app.instances || []).length > 1"
             class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
             x-text="inst.host_address || inst.host_id"></div>
        <div class="apps-card-ups-grid">
          <!-- Movies (total library size) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.radarr.movies') || 'Movies'"></div>
            <div class="apps-card-stat-value" x-text="radarrCount(radarrData(inst).movies_total)"></div>
          </div>
          <!-- Missing (monitored, no file) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.radarr.missing') || 'Missing'"></div>
            <div class="apps-card-stat-value"
                 :class="(Number(radarrData(inst).missing) || 0) > 0 ? 'text-[var(--warning)]' : 'text-[var(--success)]'"
                 x-text="radarrCount(radarrData(inst).missing)"></div>
          </div>
          <!-- Below quality cutoff (has a file but below the cutoff) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.radarr.cutoff_unmet') || 'Below cutoff'"></div>
            <div class="apps-card-stat-value"
                 :class="(Number(radarrData(inst).cutoff_unmet) || 0) > 0 ? 'text-[var(--warning)]' : ''"
                 x-text="radarrCount(radarrData(inst).cutoff_unmet)"></div>
          </div>
          <!-- Downloading (queue) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.radarr.downloading') || 'Downloading'"></div>
            <div class="apps-card-stat-value"
                 :class="(Number(radarrData(inst).queue) || 0) > 0 ? 'text-[var(--info)]' : ''"
                 x-text="radarrCount(radarrData(inst).queue)"></div>
          </div>
          <!-- Releasing today (calendar) — only when something is due today. -->
          <div class="apps-card-ups-stat" x-show="(Number(radarrData(inst).calendar_today) || 0) > 0">
            <div class="apps-card-stat-label" x-text="t('apps.radarr.releasing_today') || 'Today'"></div>
            <div class="apps-card-stat-value text-[var(--info)]" x-text="radarrCount(radarrData(inst).calendar_today)"></div>
          </div>
          <!-- Library size on disk -->
          <div class="apps-card-ups-stat" x-show="(Number(radarrData(inst).library_size_gb) || 0) > 0">
            <div class="apps-card-stat-label" x-text="t('apps.radarr.library_size') || 'Library size'"></div>
            <div class="apps-card-stat-value" x-text="radarrGb(radarrData(inst).library_size_gb)"></div>
          </div>
        </div>
        <!-- Disk-fill projection chip — the forward-looking "disk full in ~N
             days at current growth" signal derived from the retention series.
             Card-level (always visible, not drawer-only) since it's the single
             highest-value forward signal. -->
        <div x-show="radarrTrend(inst) && (Number(radarrTrend(inst).disk_runway_days) || 0) > 0"
             class="fs-3xs text-[var(--warning)] mt-1"
             x-text="t('apps.radarr.disk_runway', { days: radarrTrend(inst) ? radarrTrend(inst).disk_runway_days : 0 }) || ('Disk full in ~' + (radarrTrend(inst) ? radarrTrend(inst).disk_runway_days : 0) + ' days at this fill rate')"></div>
        <!-- Storage — every mount the app reports (root / library volume /
             remote shares), each as a clean card with free / total + a
             colour-coded usage bar. Shared across the *arr family. -->
        <!-- INCLUDE: _components/apps/_arr_storage.html -->
        <!-- Library-growth + missing-backlog + disk-free trend (from OmniGrid's
             shared servarr_samples). Drawer-only (`appsExtrasInDrawer`) — no
             room on the apps-grid card; shown once ≥ 2 daily points exist. -->
        <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && radarrTrend(inst) && radarrTrend(inst).series_total && radarrTrend(inst).series_total.length >= 2">
          <div class="space-y-2 mt-1 pt-1 border-t border-[var(--border)]">
            <!-- Library growth (total movies over time). -->
            <div class="space-y-1">
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.radarr.library_trend', { days: radarrTrend(inst).days }) || ('Library growth (' + radarrTrend(inst).days + ' days)')"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                <path :d="radarrTrendPath(radarrTrend(inst).series_total)" fill="none" stroke="var(--info)" stroke-width="1.5"/>
              </svg>
            </div>
            <!-- Missing backlog over time (only when there's ever been a backlog). -->
            <div class="space-y-1" x-show="(Number(radarrTrend(inst).peak_missing) || 0) > 0">
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.radarr.missing_trend', { days: radarrTrend(inst).days }) || ('Missing backlog (' + radarrTrend(inst).days + ' days)')"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                <path :d="radarrTrendPath(radarrTrend(inst).series_missing)" fill="none" stroke="var(--warning)" stroke-width="1.5"/>
              </svg>
              <div class="fs-3xs text-[var(--text-faint)]"
                   x-text="(t('apps.radarr.peak_missing') || 'Peak missing') + ': ' + radarrCount(radarrTrend(inst).peak_missing)"></div>
            </div>
            <!-- Free disk over time + the disk-runway projection footnote. -->
            <div class="space-y-1">
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.radarr.disk_trend', { days: radarrTrend(inst).days }) || ('Free disk (' + radarrTrend(inst).days + ' days)')"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                <path :d="radarrTrendPath(radarrTrend(inst).series_disk_free)" fill="none" stroke="var(--success)" stroke-width="1.5"/>
              </svg>
              <div x-show="(Number(radarrTrend(inst).disk_runway_days) || 0) > 0"
                   class="fs-3xs text-[var(--warning)]"
                   x-text="t('apps.radarr.disk_runway', { days: radarrTrend(inst).disk_runway_days }) || ('Disk full in ~' + radarrTrend(inst).disk_runway_days + ' days at this fill rate')"></div>
            </div>
            <!-- Download-queue depth over time (only when there's ever been a queue). -->
            <div class="space-y-1" x-show="(Number(radarrTrend(inst).peak_queue) || 0) > 0">
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.radarr.queue_trend', { days: radarrTrend(inst).days }) || ('Download queue (' + radarrTrend(inst).days + ' days)')"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                <path :d="radarrTrendPath(radarrTrend(inst).series_queue)" fill="none" stroke="var(--primary)" stroke-width="1.5"/>
              </svg>
              <div class="fs-3xs text-[var(--text-faint)]"
                   x-text="(t('apps.radarr.peak_queue') || 'Peak queue') + ': ' + radarrCount(radarrTrend(inst).peak_queue)"></div>
            </div>
          </div>
        </template>
        <!-- Footnote: version + health issues (when reported). -->
        <div x-show="radarrData(inst).version || (Number(radarrData(inst).health_issues) || 0) > 0"
             class="fs-3xs text-[var(--text-faint)] mt-1 mono">
          <span x-show="radarrData(inst).version" x-text="t('apps.version_footnote', { brand: 'Radarr', v: (radarrData(inst).version || '') })"></span>
          <span x-show="(Number(radarrData(inst).health_issues) || 0) > 0"
                class="text-[var(--warning)]"
                x-text="(radarrData(inst).version ? ' · ' : '') + (t('apps.radarr.health_issues_n', { n: radarrData(inst).health_issues }) || (radarrData(inst).health_issues + ' health issue(s)'))"></span>
        </div>
      </div>
    </template>
    <!-- No API key yet — idle and unconfigured. -->
    <template x-if="appsAppDataStatus(inst) === 'idle' && !inst.api_key_set">
      <p class="fs-xs text-[var(--text-faint)] italic"
         x-text="t('apps.radarr.no_api_key') || 'No API key set -- add one in Admin -> Apps to enable.'"></p>
    </template>
    <!-- Loading — first fetch in flight. -->
    <template x-if="!radarrData(inst) && appsAppDataStatus(inst) === 'pending'">
      <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('apps.radarr.loading') || 'Loading Radarr data…'"></span></p>
    </template>
    <!-- Error — upstream fetch failed. -->
    <template x-if="!radarrData(inst) && appsAppDataStatus(inst) === 'error'">
      <p class="fs-xs text-[var(--danger)] italic"
         x-text="(t('apps.radarr.fetch_failed') || 'Radarr fetch failed') + ': ' + appsAppDataError(inst)"></p>
    </template>
  </div>
</template>
