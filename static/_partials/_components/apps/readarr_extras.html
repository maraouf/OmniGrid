<!-- Per-app expanded-card extras -- Readarr (book / audiobook manager).

     Renders inside `apps-card.html` when the chip is the Readarr catalog
     template AND extras are visible. Data from Readarr's `GET /api/v1/author`
     (+ wanted/missing / queue / disk / health), via
     `logic/apps/readarr.py:fetch_data`, read through the cache-backed
     `appsAppData(inst)`. Mirrors lidarr_extras.html (Authors / Missing books /
     Downloading / Monitored + a per-mount Storage section + loading/error/
     no-api-key plain-text branches).

     Helpers used (all from `static/js/apps/readarr.js`):
       readarrIsApp(app) / readarrData(inst) / readarrCount(v).
     Storage uses the shared _components/apps/_arr_storage.html include
     (generic appsDisks / appsDiskUsedPct / appsFmtSize helpers). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="readarrIsApp && readarrIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null))">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-readarr">
    <template x-if="readarrData(inst)">
      <div class="apps-card-ups" :data-readarr-host="inst.host_id">
        <div x-show="(app.instances || []).length > 1"
             class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
             x-text="inst.host_address || inst.host_id"></div>
        <div class="apps-card-ups-grid">
          <!-- Authors (total library size) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.readarr.authors') || 'Authors'"></div>
            <div class="apps-card-stat-value" x-text="readarrCount(readarrData(inst).authors_total)"></div>
          </div>
          <!-- Missing (monitored books, no file) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.readarr.missing') || 'Missing books'"></div>
            <div class="apps-card-stat-value"
                 :class="(Number(readarrData(inst).missing) || 0) > 0 ? 'text-[var(--warning)]' : 'text-[var(--success)]'"
                 x-text="readarrCount(readarrData(inst).missing)"></div>
          </div>
          <!-- Downloading (queue) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.readarr.downloading') || 'Downloading'"></div>
            <div class="apps-card-stat-value"
                 :class="(Number(readarrData(inst).queue) || 0) > 0 ? 'text-[var(--info)]' : ''"
                 x-text="readarrCount(readarrData(inst).queue)"></div>
          </div>
          <!-- Monitored authors -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.readarr.monitored') || 'Monitored'"></div>
            <div class="apps-card-stat-value" x-text="readarrCount(readarrData(inst).monitored)"></div>
          </div>
        </div>
        <!-- Storage — every mount the app reports, each as a clean card
             with free / total + a colour-coded usage bar. Shared across
             the *arr family. -->
        <!-- INCLUDE: _components/apps/_arr_storage.html -->
        <!-- Footnote: version + health issues. -->
        <div x-show="readarrData(inst).version || (Number(readarrData(inst).health_issues) || 0) > 0"
             class="fs-3xs text-[var(--text-faint)] mt-1 mono">
          <span x-show="readarrData(inst).version" x-text="t('apps.version_footnote', { brand: 'Readarr', v: (readarrData(inst).version || '') })"></span>
          <span x-show="(Number(readarrData(inst).health_issues) || 0) > 0"
                class="text-[var(--warning)]"
                x-text="(readarrData(inst).version ? ' · ' : '') + (t('apps.readarr.health_issues_n', { n: readarrData(inst).health_issues }) || (readarrData(inst).health_issues + ' health issue(s)'))"></span>
        </div>
      </div>
    </template>
    <!-- No API key yet — idle and unconfigured. -->
    <template x-if="appsAppDataStatus(inst) === 'idle' && !inst.api_key_set">
      <p class="fs-xs text-[var(--text-faint)] italic"
         x-text="t('apps.readarr.no_api_key') || 'No API key set -- add one in Admin -> Apps to enable.'"></p>
    </template>
    <!-- Loading — first fetch in flight. -->
    <template x-if="!readarrData(inst) && appsAppDataStatus(inst) === 'pending'">
      <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('apps.readarr.loading') || 'Loading Readarr data…'"></span></p>
    </template>
    <!-- Error — upstream fetch failed. -->
    <template x-if="!readarrData(inst) && appsAppDataStatus(inst) === 'error'">
      <p class="fs-xs text-[var(--danger)] italic"
         x-text="(t('apps.readarr.fetch_failed') || 'Readarr fetch failed') + ': ' + appsAppDataError(inst)"></p>
    </template>
  </div>
</template>
