<!-- Per-app expanded-card extras -- Rundeck (runbook automation / job scheduler).

     Renders inside `apps-card.html` when the chip is the Rundeck catalog
     template AND extras are visible. Data comes from
     `logic/apps/rundeck.py:fetch_data` (API-token REST), read through the
     cache-backed `appsAppData(inst)`. Reuses the shared `.apps-card-ups-*`
     stat-grid (a generic telemetry panel).

     Helpers used (all from `static/js/apps/rundeck.js`):
       rundeckIsApp(app) / rundeckData(inst) / rundeckCount(v) -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="rundeckIsApp && rundeckIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && rundeckData(inst)">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-ups" :data-rundeck-host="inst.host_id">
    <!-- Per-host header (host name only when the app has > 1 instance). -->
    <div x-show="(app.instances || []).length > 1"
         class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
         x-text="inst.host_address || inst.host_id"></div>
    <div class="apps-card-ups-grid">
      <!-- Projects -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.rundeck.projects') || 'Projects'"></div>
        <div class="apps-card-stat-value" x-text="rundeckCount(rundeckData(inst).projects)"></div>
      </div>
      <!-- Jobs -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.rundeck.jobs') || 'Jobs'"></div>
        <div class="apps-card-stat-value" x-text="rundeckCount(rundeckData(inst).jobs)"></div>
      </div>
      <!-- Running now -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.rundeck.running') || 'Running'"></div>
        <div class="apps-card-stat-value"
             :class="(Number(rundeckData(inst).running) || 0) > 0 ? 'text-[var(--success)]' : ''"
             x-text="rundeckCount(rundeckData(inst).running)"></div>
      </div>
      <!-- Recent failure rate (CI-health signal) — danger-tinted when any
           recent run failed. Shown only when there are finished runs. -->
      <div class="apps-card-ups-stat" x-show="(Number(rundeckData(inst).recent_completed) || 0) > 0">
        <div class="apps-card-stat-label" x-text="t('apps.rundeck.failure_rate') || 'Failure rate'"></div>
        <div class="apps-card-stat-value"
             :class="(Number(rundeckData(inst).recent_failed) || 0) > 0 ? 'text-[var(--danger)]' : 'text-[var(--success)]'"
             x-text="rundeckFailureRate(inst)"></div>
      </div>
      <!-- Average execution run time (from recent finished executions). -->
      <div class="apps-card-ups-stat" x-show="(Number(rundeckData(inst).avg_duration_s) || 0) > 0">
        <div class="apps-card-stat-label" x-text="t('apps.rundeck.avg_duration') || 'Avg run time'"></div>
        <div class="apps-card-stat-value" x-text="rundeckDuration(rundeckData(inst).avg_duration_s)"></div>
      </div>
      <!-- Scheduled (schedule-enabled) jobs count. -->
      <div class="apps-card-ups-stat" x-show="(Number(rundeckData(inst).scheduled_jobs) || 0) > 0">
        <div class="apps-card-stat-label" x-text="t('apps.rundeck.scheduled') || 'Scheduled'"></div>
        <div class="apps-card-stat-value" x-text="rundeckCount(rundeckData(inst).scheduled_jobs)"></div>
      </div>
      <!-- Executions per day (throughput — runs started in the last 24h). -->
      <div class="apps-card-ups-stat" x-show="(Number(rundeckData(inst).executions_per_day) || 0) > 0">
        <div class="apps-card-stat-label" x-text="t('apps.rundeck.runs_per_day') || 'Runs/day'"></div>
        <div class="apps-card-stat-value" x-text="rundeckCount(rundeckData(inst).executions_per_day)"></div>
      </div>
    </div>
    <!-- Next scheduled run (best-effort; needs Rundeck API v31+). Footnote with
         the soonest upcoming job + when. -->
    <div x-show="rundeckData(inst).next_run_job && (Number(rundeckData(inst).next_run_in_s) || 0) > 0"
         class="fs-3xs text-[var(--text-faint)] mt-1 mono"
         x-text="t('apps.rundeck.next_run', { job: (rundeckData(inst).next_run_job || ''), in: rundeckDuration(rundeckData(inst).next_run_in_s) })"></div>
    <!-- Recent-runs footnote — "2 of 12 recent runs failed". -->
    <div x-show="(Number(rundeckData(inst).recent_completed) || 0) > 0 && (Number(rundeckData(inst).recent_failed) || 0) > 0"
         class="fs-3xs text-[var(--danger)] mt-1 mono"
         x-text="t('apps.rundeck.recent_failed_summary', { failed: (Number(rundeckData(inst).recent_failed) || 0), total: (Number(rundeckData(inst).recent_completed) || 0) })"></div>
    <!-- Failure-rate trend — sampled by the lifespan rundeck_sampler. Drawer-
         only (appsExtrasInDrawer); shown once at least one sample exists. -->
    <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && rundeckTrend(inst) && rundeckTrend(inst).samples > 0">
      <div class="mt-2">
        <div class="apps-card-ups-grid">
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.rundeck.fr_peak') || 'Peak fail %'"></div>
            <div class="apps-card-stat-value" x-text="(Number(rundeckTrend(inst).peak) || 0) + '%'"></div>
          </div>
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.rundeck.fr_avg') || 'Avg fail %'"></div>
            <div class="apps-card-stat-value" x-text="(Number(rundeckTrend(inst).avg) || 0) + '%'"></div>
          </div>
        </div>
        <svg class="apps-spark" viewBox="0 0 100 24" preserveAspectRatio="none" aria-hidden="true">
          <polyline class="apps-spark-line apps-spark-line--danger" :points="rundeckSparkPoints(inst)"></polyline>
        </svg>
        <div class="fs-3xs text-[var(--text-faint)] mono"
             x-text="t('apps.rundeck.fr_caption', { days: rundeckTrend(inst).days }) || ('Failure rate, last ' + rundeckTrend(inst).days + ' days')"></div>
      </div>
    </template>
    <!-- Rundeck version footnote. -->
    <div x-show="rundeckData(inst).version"
         class="fs-3xs text-[var(--text-faint)] mt-1 mono"
         x-text="t('apps.version_footnote', { brand: 'Rundeck', v: (rundeckData(inst).version || '') })"></div>
  </div>
</template>
<!-- No token yet — idle and unconfigured. -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="rundeckIsApp && rundeckIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && appsAppDataStatus(inst) === 'idle' && !inst.api_key_set">
  <p class="fs-xs text-[var(--text-faint)] italic"
     x-text="t('apps.rundeck.no_token') || 'No API token set -- add one in Admin -> Apps to enable.'"></p>
</template>
<!-- Loading — first fetch in flight (panel above gates on rundeckData). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="rundeckIsApp && rundeckIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && !rundeckData(inst) && appsAppDataStatus(inst) === 'pending'">
  <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
    <span class="spin" aria-hidden="true"></span>
    <span x-text="t('apps.rundeck.loading') || 'Loading Rundeck data…'"></span></p>
</template>
<!-- Error — upstream fetch failed. -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="rundeckIsApp && rundeckIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && !rundeckData(inst) && appsAppDataStatus(inst) === 'error'">
  <p class="fs-xs text-[var(--danger)] italic"
     x-text="(t('apps.rundeck.fetch_failed') || 'Rundeck fetch failed') + ': ' + appsAppDataError(inst)"></p>
</template>
