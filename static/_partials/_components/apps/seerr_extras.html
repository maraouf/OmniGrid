<!-- Per-app expanded-card extras -- Seerr (media-request manager).

     Renders inside `apps-card.html` as the per-instance host row when the
     chip is the Seerr catalog template AND the operator hasn't hidden
     extras via the per-instance `show_extras` toggle. The data comes from
     Seerr's `GET /api/v1/request/count` (via
     `logic/apps/seerr.py:fetch_data`), read through the generic,
     cache-backed `appsAppData(inst)` -- so the card never triggers a
     per-card round-trip on the hot path. Returns null while idle /
     pending / errored, so the panel gates cleanly.

     Reuses the shared `.apps-card-ups-*` stat-grid component (the same
     2-column stat panel APC / Bazarr render) so the responsive tile-size
     rules apply for free -- the classes are a generic telemetry stat
     grid, not UPS-specific.

     Helpers used (all from `static/js/apps/seerr.js`):
       seerrIsApp(app)   -- gate "is this a Seerr chip"
       seerrData(inst)   -- per-instance request-count payload
       seerrCount(v)     -- thousands-separated integer formatter -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="seerrIsApp && seerrIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && seerrData(inst)">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-ups" :data-seerr-host="inst.host_id">
    <!-- Per-host header (host name only when the app has > 1 instance). -->
    <div x-show="(app.instances || []).length > 1"
         class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
         x-text="inst.host_address || inst.host_id"></div>
    <div class="apps-card-ups-grid">
      <!-- Card essentials (always shown): Pending · Processing · Available ·
           This week. The rest (Declined / Movies / TV / Total) are drawer-only
           so the apps-grid card stays lean. -->
      <!-- Pending approval -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.seerr.pending') || 'Pending'"></div>
        <div class="apps-card-stat-value"
             :class="(Number(seerrData(inst).pending) || 0) > 0 ? 'text-[var(--warning)]' : ''"
             x-text="seerrCount(seerrData(inst).pending)"></div>
      </div>
      <!-- Processing (downloading) -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.seerr.processing') || 'Processing'"></div>
        <div class="apps-card-stat-value" x-text="seerrCount(seerrData(inst).processing)"></div>
      </div>
      <!-- Available (fulfilled, in the library) -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.seerr.available') || 'Available'"></div>
        <div class="apps-card-stat-value text-[var(--success)]"
             x-text="seerrCount(seerrData(inst).available_count)"></div>
      </div>
      <!-- Requests this week (demand / volume — created in the last 7 days; a
           full page shows "N+"). Card essential. -->
      <div class="apps-card-ups-stat">
        <div class="apps-card-stat-label" x-text="t('apps.seerr.this_week') || 'This week'"></div>
        <div class="apps-card-stat-value"
             :class="(Number(seerrData(inst).requests_this_week) || 0) > 0 ? 'text-[var(--info)]' : ''"
             x-text="seerrCount(seerrData(inst).requests_this_week) + (seerrData(inst).requests_this_week_capped ? '+' : '')"></div>
      </div>
      <!-- Declined (rejected) — DRAWER-ONLY. -->
      <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer)">
        <div class="apps-card-ups-stat">
          <div class="apps-card-stat-label" x-text="t('apps.seerr.declined') || 'Declined'"></div>
          <div class="apps-card-stat-value"
               :class="(Number(seerrData(inst).declined) || 0) > 0 ? 'text-[var(--danger)]' : ''"
               x-text="seerrCount(seerrData(inst).declined)"></div>
        </div>
      </template>
      <!-- Movie requests (handled by Radarr) — DRAWER-ONLY. -->
      <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer)">
        <div class="apps-card-ups-stat" :title="t('apps.seerr.movies_title') || 'Movie requests (handled by Radarr)'">
          <div class="apps-card-stat-label" x-text="t('apps.seerr.movies') || 'Movies'"></div>
          <div class="apps-card-stat-value" x-text="seerrCount(seerrData(inst).movie_count)"></div>
        </div>
      </template>
      <!-- TV requests (handled by Sonarr) — DRAWER-ONLY. -->
      <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer)">
        <div class="apps-card-ups-stat" :title="t('apps.seerr.tv_title') || 'TV requests (handled by Sonarr)'">
          <div class="apps-card-stat-label" x-text="t('apps.seerr.tv') || 'TV'"></div>
          <div class="apps-card-stat-value" x-text="seerrCount(seerrData(inst).tv_count)"></div>
        </div>
      </template>
      <!-- Total requests — DRAWER-ONLY. -->
      <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer)">
        <div class="apps-card-ups-stat">
          <div class="apps-card-stat-label" x-text="t('apps.seerr.total') || 'Total'"></div>
          <div class="apps-card-stat-value" x-text="seerrCount(seerrData(inst).total)"></div>
        </div>
      </template>
    </div>
    <!-- Median requested→available latency — "fulfilled in ~X days median"
         over the recent available requests (createdAt → media.mediaAddedAt).
         DRAWER-ONLY. Hidden when no samples. -->
    <div x-show="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && (Number(seerrData(inst).availability_sample_count) || 0) > 0"
         class="fs-2xs text-[var(--text-faint)] mt-1.5 inline-flex items-center gap-1">
      <svg width="11" height="11" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-timer"/>
      </svg>
      <span x-text="t('apps.seerr.availability_latency', { days: seerrData(inst).availability_median_days, n: seerrData(inst).availability_sample_count }) || ('Fulfilled in ~' + seerrData(inst).availability_median_days + ' days median (' + seerrData(inst).availability_sample_count + ' recent)')"></span>
    </div>
    <!-- Top requesters — avatar + name + request count (from
         GET /api/v1/user?sort=requests; hidden when none). DRAWER-ONLY. -->
    <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && (seerrData(inst).top_users || []).length">
      <div class="mt-2">
        <div class="apps-card-stat-label mb-1" x-text="t('apps.seerr.top_requesters') || 'Top requesters'"></div>
        <div class="flex flex-col gap-1">
          <template x-for="u in (seerrData(inst).top_users || [])" :key="u.id + ':' + u.name">
            <div class="flex items-center gap-1.5 fs-xs">
              <template x-if="u.avatar">
                <img :src="appsImageProxyUrl(inst, u.avatar)" alt="" class="w-4 h-4 rounded-full object-cover flex-shrink-0 img-shimmer" loading="lazy" @load="$event.target.classList.add('img-loaded')" @error="$event.target.style.display='none'">
              </template>
              <template x-if="!u.avatar">
                <svg width="14" height="14" class="text-[var(--text-faint)] flex-shrink-0" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-users"/>
                </svg>
              </template>
              <span class="truncate" x-text="u.name"></span>
              <span class="ms-auto mono text-[var(--text-dim)]" x-text="seerrCount(u.count)"></span>
            </div>
          </template>
        </div>
      </div>
    </template>
    <!-- Failed / stuck requests footnote (only when > 0 — very actionable). -->
    <div x-show="(Number(seerrData(inst).failed_count) || 0) > 0"
         class="fs-3xs text-[var(--danger)] mt-1"
         x-text="(t('apps.seerr.failed') || 'Failed / stuck') + ': ' + seerrCount(seerrData(inst).failed_count)"></div>
    <!-- Open-issues footnote (only when > 0). -->
    <div x-show="(Number(seerrData(inst).issues_open) || 0) > 0"
         class="fs-3xs text-[var(--danger)] mt-1"
         x-text="(t('apps.seerr.issues_open') || 'Open issues') + ': ' + seerrCount(seerrData(inst).issues_open)"></div>
    <!-- Pending-backlog trend (from OmniGrid's seerr_samples). Drawer-only
         (`appsExtrasInDrawer`) — no room on the apps-grid card; shown once
         ≥ 2 daily points exist. -->
    <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && seerrTrend(inst) && seerrTrend(inst).series && seerrTrend(inst).series.length >= 2">
      <div class="space-y-1 mt-1 pt-1 border-t border-[var(--border)]">
        <span class="fs-2xs text-[var(--text-faint)] block"
              x-text="t('apps.seerr.backlog_trend', { days: seerrTrend(inst).days }) || ('Pending backlog (' + seerrTrend(inst).days + ' days)')"></span>
        <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
          <path :d="seerrTrendPath(seerrTrend(inst).series)" fill="none" stroke="var(--warning)" stroke-width="1.5"/>
        </svg>
        <div class="fs-3xs text-[var(--text-faint)]"
             x-text="(t('apps.seerr.peak_pending') || 'Peak pending') + ': ' + seerrCount(seerrTrend(inst).peak_pending)"></div>
      </div>
    </template>
    <!-- Request-volume trend — NEW requests per day (demand spikes), from the
         day-over-day diff of OmniGrid's cumulative request-count sampler.
         Drawer-only; shown once ≥ 2 daily points exist AND at least one request
         landed in the window. -->
    <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && seerrTrend(inst) && (seerrTrend(inst).volume_series || []).length >= 2 && (Number(seerrTrend(inst).volume_total) || 0) > 0">
      <div class="space-y-1 mt-1 pt-1 border-t border-[var(--border)]">
        <span class="fs-2xs text-[var(--text-faint)] block"
              x-text="t('apps.seerr.volume_trend', { days: seerrTrend(inst).days }) || ('Requests per day (' + seerrTrend(inst).days + ' days)')"></span>
        <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
          <path :d="seerrTrendPath(seerrTrend(inst).volume_series)" fill="none" stroke="var(--info)" stroke-width="1.5"/>
        </svg>
        <div class="fs-3xs text-[var(--text-faint)]"
             x-text="t('apps.seerr.volume_peak', { n: seerrCount(seerrTrend(inst).volume_peak) }) || ('Peak ' + seerrCount(seerrTrend(inst).volume_peak) + '/day')"></div>
      </div>
    </template>
    <!-- Request-state composition (available / approved / declined) over the
         window — daily-avg stacked bars, drawer-only, shown once ≥ 2 days
         of samples exist. -->
    <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && seerrTrend(inst) && (seerrTrend(inst).composition || []).length >= 2">
      <div class="space-y-1 mt-1 pt-1 border-t border-[var(--border)]">
        <span class="fs-2xs text-[var(--text-faint)] block"
              x-text="t('apps.seerr.state_composition') || 'Request states over time'"></span>
        <div class="flex items-end gap-px h-10">
          <template x-for="(c, ci) in seerrTrend(inst).composition" :key="ci">
            <div class="flex-1 flex flex-col justify-end min-w-0"
                 :title="(t('apps.seerr.available') || 'Available') + ': ' + c.available + ' · ' + (t('apps.seerr.approved') || 'Approved') + ': ' + c.approved + ' · ' + (t('apps.seerr.declined') || 'Declined') + ': ' + c.declined">
              <div class="seerr-comp seerr-comp--declined"
                   :style="'height:' + Math.round((c.declined / (seerrTrend(inst).composition_max || 1)) * 100) + '%'"></div>
              <div class="seerr-comp seerr-comp--approved"
                   :style="'height:' + Math.round((c.approved / (seerrTrend(inst).composition_max || 1)) * 100) + '%'"></div>
              <div class="seerr-comp seerr-comp--available"
                   :style="'height:' + Math.round((c.available / (seerrTrend(inst).composition_max || 1)) * 100) + '%'"></div>
            </div>
          </template>
        </div>
        <div class="flex flex-wrap items-center gap-2 fs-3xs text-[var(--text-faint)]">
          <span class="inline-flex items-center gap-1"><span class="seerr-comp-dot seerr-comp--available"></span><span x-text="t('apps.seerr.available') || 'Available'"></span></span>
          <span class="inline-flex items-center gap-1"><span class="seerr-comp-dot seerr-comp--approved"></span><span x-text="t('apps.seerr.approved') || 'Approved'"></span></span>
          <span class="inline-flex items-center gap-1"><span class="seerr-comp-dot seerr-comp--declined"></span><span x-text="t('apps.seerr.declined') || 'Declined'"></span></span>
        </div>
      </div>
    </template>
    <!-- Version footnote (when reported by /api/v1/status). -->
    <div x-show="seerrData(inst).version"
         class="fs-3xs text-[var(--text-faint)] mt-1 mono"
         x-text="t('apps.version_footnote', { brand: 'Seerr', v: (seerrData(inst).version || '') })"></div>
  </div>
</template>
<!-- Loading — first fetch in flight (panel above gates on seerrData). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="seerrIsApp && seerrIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null)) && !seerrData(inst) && appsAppDataStatus(inst) === 'pending'">
  <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
    <span class="spin" aria-hidden="true"></span>
    <span x-text="t('apps.seerr.loading') || 'Loading Seerr data…'"></span></p>
</template>
