<!-- Per-app expanded-card extras -- Sonarr (TV-series collection manager).

     Renders inside `apps-card.html` when the chip is the Sonarr catalog
     template AND extras are visible. Data from Sonarr's `GET /api/v3/series`
     (+ wanted/missing / queue / disk / health), via
     `logic/apps/sonarr.py:fetch_data`, read through the cache-backed
     `appsAppData(inst)`. Mirrors radarr_extras.html (Series / Missing
     episodes / Downloading + a per-mount Storage section + loading/error/
     no-api-key plain-text branches).

     Helpers used (all from `static/js/apps/sonarr.js`):
       sonarrIsApp(app) / sonarrData(inst) / sonarrCount(v).
     Storage uses the shared _components/apps/_arr_storage.html include
     (generic appsDisks / appsDiskUsedPct / appsFmtSize helpers). -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="sonarrIsApp && sonarrIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null))">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-sonarr">
    <template x-if="sonarrData(inst)">
      <div class="apps-card-ups" :data-sonarr-host="inst.host_id">
        <div x-show="(app.instances || []).length > 1"
             class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
             x-text="inst.host_address || inst.host_id"></div>
        <div class="apps-card-ups-grid">
          <!-- Card essentials: Series · Missing eps · Today-missing · Downloading
               (+ conditional Today / Grabbed-today / Library-size). Secondary
               stats (Monitored / Episodes / Below-cutoff / Airing-this-week /
               Imported-today / No-files) are drawer-only. -->
          <!-- Series (total library size) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.sonarr.series') || 'Series'"></div>
            <div class="apps-card-stat-value" x-text="sonarrCount(sonarrData(inst).series_total)"></div>
          </div>
          <!-- Missing (monitored episodes, no file) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.sonarr.missing') || 'Missing eps'"></div>
            <div class="apps-card-stat-value"
                 :class="(Number(sonarrData(inst).missing) || 0) > 0 ? 'text-[var(--warning)]' : 'text-[var(--success)]'"
                 x-text="sonarrCount(sonarrData(inst).missing)"></div>
          </div>
          <!-- Aired today but still missing — highly actionable: episodes that
               aired earlier today and have no file yet. -->
          <div class="apps-card-ups-stat" :title="t('apps.sonarr.today_missing_title') || 'Episodes that aired earlier today but have no file yet'">
            <div class="apps-card-stat-label" x-text="t('apps.sonarr.today_missing') || 'Today missing'"></div>
            <div class="apps-card-stat-value"
                 :class="(Number(sonarrData(inst).today_aired_missing) || 0) > 0 ? 'text-[var(--danger)]' : 'text-[var(--success)]'"
                 x-text="sonarrCount(sonarrData(inst).today_aired_missing)"></div>
          </div>
          <!-- Downloading (queue) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.sonarr.downloading') || 'Downloading'"></div>
            <div class="apps-card-stat-value"
                 :class="(Number(sonarrData(inst).queue) || 0) > 0 ? 'text-[var(--info)]' : ''"
                 x-text="sonarrCount(sonarrData(inst).queue)"></div>
          </div>
          <!-- Airing today (calendar) — only when something is due today. -->
          <div class="apps-card-ups-stat" x-show="(Number(sonarrData(inst).calendar_today) || 0) > 0">
            <div class="apps-card-stat-label" x-text="t('apps.sonarr.releasing_today') || 'Today'"></div>
            <div class="apps-card-stat-value text-[var(--info)]" x-text="sonarrCount(sonarrData(inst).calendar_today)"></div>
          </div>
          <!-- Grabbed today (sent to the downloader today) — card essential when active. -->
          <div class="apps-card-ups-stat" x-show="(Number(sonarrData(inst).grabbed_today) || 0) > 0">
            <div class="apps-card-stat-label" x-text="t('apps.sonarr.grabbed_today') || 'Grabbed today'"></div>
            <div class="apps-card-stat-value text-[var(--success)]" x-text="sonarrCount(sonarrData(inst).grabbed_today)"></div>
          </div>
          <!-- Library size on disk -->
          <div class="apps-card-ups-stat" x-show="(Number(sonarrData(inst).library_size_gb) || 0) > 0">
            <div class="apps-card-stat-label" x-text="t('apps.sonarr.library_size') || 'Library size'"></div>
            <div class="apps-card-stat-value" x-text="sonarrGb(sonarrData(inst).library_size_gb)"></div>
          </div>
          <!-- Monitored series — DRAWER-ONLY. -->
          <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer)">
            <div class="apps-card-ups-stat">
              <div class="apps-card-stat-label" x-text="t('apps.sonarr.monitored') || 'Monitored'"></div>
              <div class="apps-card-stat-value" x-text="sonarrCount(sonarrData(inst).monitored)"></div>
            </div>
          </template>
          <!-- Episodes (have / total) — DRAWER-ONLY, when there are episodes. -->
          <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && (Number(sonarrData(inst).episodes_total) || 0) > 0">
            <div class="apps-card-ups-stat">
              <div class="apps-card-stat-label" x-text="t('apps.sonarr.episodes') || 'Episodes'"></div>
              <div class="apps-card-stat-value"
                   x-text="sonarrCount(sonarrData(inst).episodes_have) + ' / ' + sonarrCount(sonarrData(inst).episodes_total)"></div>
            </div>
          </template>
          <!-- Below quality cutoff — DRAWER-ONLY (secondary to Missing). -->
          <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer)">
            <div class="apps-card-ups-stat">
              <div class="apps-card-stat-label" x-text="t('apps.sonarr.cutoff_unmet') || 'Below cutoff'"></div>
              <div class="apps-card-stat-value"
                   :class="(Number(sonarrData(inst).cutoff_unmet) || 0) > 0 ? 'text-[var(--warning)]' : ''"
                   x-text="sonarrCount(sonarrData(inst).cutoff_unmet)"></div>
            </div>
          </template>
          <!-- Airing this week (calendar, next 7 days) — DRAWER-ONLY, when >0. -->
          <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && (Number(sonarrData(inst).airing_this_week) || 0) > 0">
            <div class="apps-card-ups-stat">
              <div class="apps-card-stat-label" x-text="t('apps.sonarr.airing_week') || 'Airing this week'"></div>
              <div class="apps-card-stat-value text-[var(--info)]" x-text="sonarrCount(sonarrData(inst).airing_this_week)"></div>
            </div>
          </template>
          <!-- Imported today (landed in the library today) — DRAWER-ONLY, when >0. -->
          <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && (Number(sonarrData(inst).imported_today) || 0) > 0">
            <div class="apps-card-ups-stat">
              <div class="apps-card-stat-label" x-text="t('apps.sonarr.imported_today') || 'Imported today'"></div>
              <div class="apps-card-stat-value text-[var(--success)]" x-text="sonarrCount(sonarrData(inst).imported_today)"></div>
            </div>
          </template>
          <!-- Monitored series with no files (season-pass) — DRAWER-ONLY, when >0. -->
          <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && (Number(sonarrData(inst).series_no_files) || 0) > 0">
            <div class="apps-card-ups-stat" :title="t('apps.sonarr.no_files_title') || 'Monitored series you have zero episodes of'">
              <div class="apps-card-stat-label" x-text="t('apps.sonarr.no_files') || 'No files'"></div>
              <div class="apps-card-stat-value text-[var(--warning)]" x-text="sonarrCount(sonarrData(inst).series_no_files)"></div>
            </div>
          </template>
        </div>
        <!-- Disk-fill projection chip — "disk full in ~N days at current growth"
             from the retention series. Card-level (always visible). -->
        <div x-show="sonarrTrend(inst) && (Number(sonarrTrend(inst).disk_runway_days) || 0) > 0"
             class="fs-3xs text-[var(--warning)] mt-1"
             x-text="t('apps.sonarr.disk_runway', { days: sonarrTrend(inst) ? sonarrTrend(inst).disk_runway_days : 0 }) || ('Disk full in ~' + (sonarrTrend(inst) ? sonarrTrend(inst).disk_runway_days : 0) + ' days at this fill rate')"></div>
        <!-- Storage — every mount the app reports, each as a clean card
             with free / total + a colour-coded usage bar. Shared across
             the *arr family. -->
        <!-- INCLUDE: _components/apps/_arr_storage.html -->
        <!-- Library-growth + missing-backlog + disk-free trend (from OmniGrid's
             shared servarr_samples). Drawer-only (`appsExtrasInDrawer`) — no
             room on the apps-grid card; shown once ≥ 2 daily points exist. -->
        <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && sonarrTrend(inst) && sonarrTrend(inst).series_total && sonarrTrend(inst).series_total.length >= 2">
          <div class="space-y-2 mt-1 pt-1 border-t border-[var(--border)]">
            <div class="space-y-1">
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.sonarr.library_trend', { days: sonarrTrend(inst).days }) || ('Library growth (' + sonarrTrend(inst).days + ' days)')"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                <path :d="sonarrTrendPath(sonarrTrend(inst).series_total)" fill="none" stroke="var(--info)" stroke-width="1.5"/>
              </svg>
            </div>
            <div class="space-y-1" x-show="(Number(sonarrTrend(inst).peak_missing) || 0) > 0">
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.sonarr.missing_trend', { days: sonarrTrend(inst).days }) || ('Missing backlog (' + sonarrTrend(inst).days + ' days)')"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                <path :d="sonarrTrendPath(sonarrTrend(inst).series_missing)" fill="none" stroke="var(--warning)" stroke-width="1.5"/>
              </svg>
              <div class="fs-3xs text-[var(--text-faint)]"
                   x-text="(t('apps.sonarr.peak_missing') || 'Peak missing') + ': ' + sonarrCount(sonarrTrend(inst).peak_missing)"></div>
            </div>
            <div class="space-y-1">
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.sonarr.disk_trend', { days: sonarrTrend(inst).days }) || ('Free disk (' + sonarrTrend(inst).days + ' days)')"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                <path :d="sonarrTrendPath(sonarrTrend(inst).series_disk_free)" fill="none" stroke="var(--success)" stroke-width="1.5"/>
              </svg>
              <div x-show="(Number(sonarrTrend(inst).disk_runway_days) || 0) > 0"
                   class="fs-3xs text-[var(--warning)]"
                   x-text="t('apps.sonarr.disk_runway', { days: sonarrTrend(inst).disk_runway_days }) || ('Disk full in ~' + sonarrTrend(inst).disk_runway_days + ' days at this fill rate')"></div>
            </div>
            <!-- Download-queue depth over time (only when there's ever been a queue). -->
            <div class="space-y-1" x-show="(Number(sonarrTrend(inst).peak_queue) || 0) > 0">
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.sonarr.queue_trend', { days: sonarrTrend(inst).days }) || ('Download queue (' + sonarrTrend(inst).days + ' days)')"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
                <path :d="sonarrTrendPath(sonarrTrend(inst).series_queue)" fill="none" stroke="var(--primary)" stroke-width="1.5"/>
              </svg>
              <div class="fs-3xs text-[var(--text-faint)]"
                   x-text="(t('apps.sonarr.peak_queue') || 'Peak queue') + ': ' + sonarrCount(sonarrTrend(inst).peak_queue)"></div>
            </div>
          </div>
        </template>
        <!-- Footnote: version + health issues. -->
        <div x-show="sonarrData(inst).version || (Number(sonarrData(inst).health_issues) || 0) > 0"
             class="fs-3xs text-[var(--text-faint)] mt-1 mono">
          <span x-show="sonarrData(inst).version" x-text="t('apps.version_footnote', { brand: 'Sonarr', v: (sonarrData(inst).version || '') })"></span>
          <span x-show="(Number(sonarrData(inst).health_issues) || 0) > 0"
                class="text-[var(--warning)]"
                x-text="(sonarrData(inst).version ? ' · ' : '') + (t('apps.sonarr.health_issues_n', { n: sonarrData(inst).health_issues }) || (sonarrData(inst).health_issues + ' health issue(s)'))"></span>
        </div>
      </div>
    </template>
    <!-- No API key yet — idle and unconfigured. -->
    <template x-if="appsAppDataStatus(inst) === 'idle' && !inst.api_key_set">
      <p class="fs-xs text-[var(--text-faint)] italic"
         x-text="t('apps.sonarr.no_api_key') || 'No API key set -- add one in Admin -> Apps to enable.'"></p>
    </template>
    <!-- Loading — first fetch in flight. -->
    <template x-if="!sonarrData(inst) && appsAppDataStatus(inst) === 'pending'">
      <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('apps.sonarr.loading') || 'Loading Sonarr data…'"></span></p>
    </template>
    <!-- Error — upstream fetch failed. -->
    <template x-if="!sonarrData(inst) && appsAppDataStatus(inst) === 'error'">
      <p class="fs-xs text-[var(--danger)] italic"
         x-text="(t('apps.sonarr.fetch_failed') || 'Sonarr fetch failed') + ': ' + appsAppDataError(inst)"></p>
    </template>
  </div>
</template>
