<!-- Per-app editor fields -- Speedtest Tracker.

     Renders inside the Admin -> Apps per-instance editor as a
     conditional `<template x-if="...">` so it only appears when
     the chip's catalog template is Speedtest Tracker. Gates on
     `speedtestIsApp({catalog:{slug: appsInstanceEditForm.catalog_slug}})`
     so the helper from `static/js/apps/speedtest_tracker.js`
     is the single source of truth for "is this a Speedtest
     chip?" -- adding a new app's editor fields is a sibling
     partial + one INCLUDE marker line for the partial path
     `_components/apps/[slug]_editor.html` in `_all_editors.html`. -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="speedtestIsApp && speedtestIsApp({catalog: {slug: appsInstanceEditForm.catalog_slug || (appsInstanceEditForm.catalog_name || '').toLowerCase()}, name: appsInstanceEditForm.name || appsInstanceEditForm.catalog_name || ''})">
  <div class="space-y-2 pt-3 mt-3 border-t border-[var(--border)]">
    <div>
      <label for="apps-instance-speedtest-api-key"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.speedtest.api_key_label') || 'Speedtest Tracker API key'"></label>
      <input id="apps-instance-speedtest-api-key"
             type="password" x-model="appsInstanceEditForm.api_key"
             class="w-full bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm"
             :placeholder="appsInstanceEditForm.api_key_set
               ? (t('apps.speedtest.api_key_placeholder_saved') || 'Saved -- leave blank to keep')
               : (t('apps.speedtest.api_key_placeholder_unset') || 'Bearer token from Speedtest Tracker')"
             autocomplete="off" spellcheck="false">
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('apps.speedtest.api_key_hint') || 'Required for the expanded card to fetch latest/average/graph data. Leave blank to keep the stored key.'"></p>
    </div>
    <!-- Averages window — how many of the most-recent results the card +
         skills roll the "Avg of last N tests" over. Blank = the app
         default (10); backend clamps 2..60. -->
    <div>
      <label for="apps-instance-speedtest-avg-window"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.speedtest.avg_window_label') || 'Averages window (tests)'"></label>
      <input id="apps-instance-speedtest-avg-window"
             type="number" min="2" max="60" step="1"
             x-model="appsInstanceEditForm.avg_window"
             @change="appsInstanceEditForm.avg_window = appsClampAvgWindow(appsInstanceEditForm.avg_window)"
             class="w-32 bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm mono"
             :placeholder="t('apps.speedtest.avg_window_placeholder') || '10 (default)'"
             autocomplete="off">
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('apps.speedtest.avg_window_hint') || 'How many of the most-recent results to average for &quot;Avg of last N tests&quot; (2–60). Leave blank for the default of 10.'"></p>
    </div>
    <!-- Below-floor reliability — the operator's OWN ISP-advertised download
         floor (Mbps); the card flags the % of tests below it. Blank = OFF.
         "Recommend" derives ~90% of the median download over the last N days
         (the days input) from this chip's own history. Does NOT read
         speedtest-tracker's own threshold. -->
    <div>
      <label for="apps-instance-speedtest-floor"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.speedtest.floor_label') || 'Below-floor alert (Mbps)'"></label>
      <div class="flex items-center gap-2 flex-wrap">
        <input id="apps-instance-speedtest-floor"
               type="number" min="0" max="100000" step="1"
               x-model="appsInstanceEditForm.speed_floor_mbps"
               @change="appsInstanceEditForm.speed_floor_mbps = appsClampSpeedFloor(appsInstanceEditForm.speed_floor_mbps)"
               class="w-32 bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm mono"
               :placeholder="t('apps.speedtest.floor_placeholder') || 'off'"
               autocomplete="off">
        <input aria-label="History (days)" type="number" min="1" max="365" step="1"
               x-model.number="appsSpeedFloorDays"
               class="w-20 bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm mono"
               :aria-label="t('apps.speedtest.floor_days_label') || 'History (days)'"
               :title="t('apps.speedtest.floor_days_label') || 'History (days)'">
        <button type="button" class="btn btn-soft fs-xs"
                @click="appsRecommendSpeedFloor(appsInstanceEditForm.host_id, appsInstanceEditForm.service_idx, appsSpeedFloorDays).then(v => { if (v) { appsInstanceEditForm.speed_floor_mbps = String(v); } })"
                x-text="t('apps.speedtest.floor_recommend') || 'Recommend'"></button>
      </div>
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('apps.speedtest.floor_hint') || 'Your ISP-advertised download speed (Mbps). The card flags the % of tests below it as a reliability signal. Blank = off. “Recommend” suggests ~90% of your median download over the last N days.'"></p>
    </div>
    <!-- Per-instance data-cache TTL (contained in the app, NOT a global
         Config tunable). Blank = the app default (60s); backend clamps
         5..3600. -->
    <div>
      <label for="apps-instance-speedtest-cache-ttl"
             class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('apps.cache_ttl_label') || 'Data cache TTL (seconds)'"></label>
      <div class="flex flex-wrap items-center gap-2">
        <input id="apps-instance-speedtest-cache-ttl"
               type="number" min="5" max="3600" step="1"
               x-model="appsInstanceEditForm.cache_ttl"
               @change="appsInstanceEditForm.cache_ttl = appsClampCacheTtl(appsInstanceEditForm.cache_ttl)"
               class="w-32 bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm mono"
               :placeholder="t('apps.cache_ttl_placeholder') || 'App default'"
               autocomplete="off">
        <div class="bounds-chips" role="group"
             :aria-label="t('admin.config.bounds.group_label') || 'Bounds'">
          <span class="bounds-chip bounds-chip--min" :title="t('admin.config.bounds.min_title') || 'Minimum'">
            <svg width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/>
            </svg>
            <span>5</span>
          </span>
          <span class="bounds-chip bounds-chip--max" :title="t('admin.config.bounds.max_title') || 'Maximum'">
            <svg width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/>
            </svg>
            <span>3600</span>
          </span>
          <span class="bounds-chip bounds-chip--default" :title="t('admin.config.bounds.default_title') || 'Default'">
            <svg width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/>
            </svg>
            <span>60</span>
          </span>
        </div>
      </div>
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('apps.cache_ttl_hint') || 'How long fetched results are cached before re-querying Speedtest Tracker (5–3600s). Leave blank for the app default (60s).'"></p>
    </div>
    <!-- Shared Test-connection unit (same button + result box as the
         Portainer / OIDC admin panels) so the per-app editor never drifts
         on style. tcRun is the per-app test fn; tcResult is its reactive
         {pending, ok, detail} result. -->
    <div x-data="{ tcRun: () => testInstanceCredential(), tcResult: () => appsInstanceTestResult, tcLastTs: () => appsInstanceEditForm.last_test_ok_ts }">
      <!-- INCLUDE: _components/og-test-connection.html -->
    </div>
  </div>
</template>
