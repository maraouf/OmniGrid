<!-- Per-app expanded-card extras -- Speedtest Tracker.

     Renders inside `apps-card.html` as the per-instance host row
     when the chip is a Speedtest Tracker template AND the
     operator hasn't explicitly hidden extras via the per-instance
     `show_extras` toggle. The data shape comes from the generic
     `appsAppData(inst)` dispatcher, which fetches from
     `/api/services/{host_id}/{service_idx}/app-data` and lets
     the per-app backend module
     (`logic/apps/speedtest_tracker.py:fetch_data`) shape the
     payload (`{latest, averages, series, fetched_at}`).

     Helpers used (all from `static/js/apps/speedtest_tracker.js`):
       speedtestIsApp(app)           -- gate "is this a Speedtest chip"
       speedtestMbpsLabel(v)         -- format download/upload Mbps
       speedtestPingLabel(v)         -- format ping ms
       speedtestSparkPath(series, k) -- SVG `d` attr for the chart -->
<!--suppress HtmlUnknownAttribute, HtmlUnknownTag -->
<template x-if="speedtestIsApp && speedtestIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null))">
  <div class="apps-card-speedtest mt-3 pt-3 border-t border-[var(--border)] space-y-2">
    <template x-if="appsAppData(inst)">
      <div class="space-y-2">
        <div class="apps-speedtest-grid">
          <div class="apps-speedtest-statgrid">
            <div class="apps-card-stat">
              <div class="fs-2xs text-[var(--text-faint)]"
                   x-text="t('apps.speedtest.latest_download') || 'Latest down'"></div>
              <div class="fs-md font-semibold"
                   x-text="appsAppData(inst).latest
                   ? speedtestMbpsLabel(appsAppData(inst).latest.download) : '--'"></div>
            </div>
            <div class="apps-card-stat">
              <div class="fs-2xs text-[var(--text-faint)]"
                   x-text="t('apps.speedtest.latest_upload') || 'Latest up'"></div>
              <div class="fs-md font-semibold"
                   x-text="appsAppData(inst).latest
                   ? speedtestMbpsLabel(appsAppData(inst).latest.upload) : '--'"></div>
            </div>
            <div class="apps-card-stat">
              <div class="fs-2xs text-[var(--text-faint)]"
                   x-text="t('apps.speedtest.latest_ping') || 'Latest ping'"></div>
              <div class="fs-md font-semibold"
                   x-text="appsAppData(inst).latest
                   ? speedtestPingLabel(appsAppData(inst).latest.ping) : '--'"></div>
            </div>
          </div>
          <div class="apps-speedtest-statgrid">
            <div class="apps-card-stat">
              <div class="fs-2xs text-[var(--text-faint)]"
                   x-text="t('apps.speedtest.avg_download', { n: (appsAppData(inst).averages.sample_size || 10) }) || ('Avg down (last ' + (appsAppData(inst).averages.sample_size || 10) + ')')"></div>
              <div class="fs-sm"
                   x-text="speedtestMbpsLabel(appsAppData(inst).averages.download)"></div>
            </div>
            <div class="apps-card-stat">
              <div class="fs-2xs text-[var(--text-faint)]"
                   x-text="t('apps.speedtest.avg_upload', { n: (appsAppData(inst).averages.sample_size || 10) }) || ('Avg up (last ' + (appsAppData(inst).averages.sample_size || 10) + ')')"></div>
              <div class="fs-sm"
                   x-text="speedtestMbpsLabel(appsAppData(inst).averages.upload)"></div>
            </div>
            <div class="apps-card-stat">
              <div class="fs-2xs text-[var(--text-faint)]"
                   x-text="t('apps.speedtest.avg_ping', { n: (appsAppData(inst).averages.sample_size || 10) }) || ('Avg ping (last ' + (appsAppData(inst).averages.sample_size || 10) + ')')"></div>
              <div class="fs-sm"
                   x-text="speedtestPingLabel(appsAppData(inst).averages.ping)"></div>
            </div>
          </div>
          <template x-if="appsAppData(inst).series && appsAppData(inst).series.length >= 2">
            <div class="space-y-1 apps-speedtest-trend">
              <!-- No per-chart reload button — the card header already carries a
                   refresh pill, so a second reload affordance here is redundant
                   (operator-flagged). -->
              <span class="fs-2xs text-[var(--text-faint)] block"
                    x-text="t('apps.speedtest.trend') || 'Trend (last ' + appsAppData(inst).series.length + ' tests)'"></span>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none"
                   class="w-full h-8 apps-card-speedtest-chart">
                <path :d="speedtestSparkPath(appsAppData(inst).series, 'download')"
                      fill="none" stroke="var(--success)" stroke-width="1.5"/>
                <path :d="speedtestSparkPath(appsAppData(inst).series, 'upload')"
                      fill="none" stroke="var(--info)" stroke-width="1.5"/>
                <path :d="speedtestSparkPath(appsAppData(inst).series, 'ping')"
                      fill="none" stroke="var(--warning)" stroke-width="1.5"
                      stroke-dasharray="2 2"/>
              </svg>
              <div class="flex items-center justify-around fs-2xs text-[var(--text-faint)]">
              <span><span class="inline-block w-2 h-2 rounded-full mr-1"
                          style="background: var(--success);"></span><span
                x-text="t('apps.speedtest.legend_download') || 'down'"></span></span>
                <span><span class="inline-block w-2 h-2 rounded-full mr-1"
                            style="background: var(--info);"></span><span
                  x-text="t('apps.speedtest.legend_upload') || 'up'"></span></span>
                <span><span class="inline-block w-2 h-2 rounded-full mr-1"
                            style="background: var(--warning);"></span><span
                  x-text="t('apps.speedtest.legend_ping') || 'ping'"></span></span>
              </div>
            </div>
          </template>
        </div>
        <!-- Axed trend chart — shown ONLY on the wide-tall tiles (3x2 / 4x2)
             via CSS (.apps-speedtest-axchart hidden elsewhere; the simple
             .apps-speedtest-trend above is hidden at those two sizes). Puts
             download + upload on a SHARED Mbps left axis + ping on a ms right
             axis over a time x-axis with tick labels so the operator can read
             absolute values + see the lines relative to one another. The model
             (paths + ticks) is built once via a single-element x-for over
             speedtestChartModel(series). preserveAspectRatio is left at the
             default (meet) so the tick TEXT isn't horizontally stretched. -->
        <template x-if="appsAppData(inst).series && appsAppData(inst).series.length >= 2">
          <div class="apps-speedtest-axchart space-y-1">
            <template x-for="cm in [speedtestChartModel(appsAppData(inst).series)]" :key="'axc'">
              <div>
                <!-- Axes are rendered as EXPLICIT (non-x-for) SVG children: an
                     Alpine x-for template nested inside an SVG element
                     instantiates its clones in the HTML namespace, so the
                     line / text it produces don't render as SVG shapes (the bug
                     that made the axes vanish while the direct path data lines
                     drew fine). The tick arrays are fixed-length (yTicks 3 /
                     pTicks 2 / xTicks 2) so we index them directly. cm is
                     guaranteed non-null here — the outer x-if gates on
                     series.length >= 2. -->
                <!-- viewBox is a STATIC attribute (W/H are fixed constants in
                     speedtestChartModel: 460 x 92). A `:viewBox` Alpine binding
                     is silently broken on inline SVG: the HTML parser lowercases
                     the directive name to `:viewbox` (it is NOT in the SVG
                     attribute-case-adjustment table, unlike a static viewBox), so
                     Alpine setAttribute('viewbox', ...) which SVG ignores -> no
                     valid viewBox -> paths render in raw userspace and the chart
                     fills only the left ~460px of a wide box (the "half width" /
                     "scattered" symptom). Keeping it static preserves the case. -->
                <svg viewBox="0 0 460 92" preserveAspectRatio="none" width="100%"
                     class="w-full apps-card-speedtest-axchart-svg" role="img"
                     :aria-label="t('apps.speedtest.chart_aria') || 'Speedtest trend: download and upload in Mbps, ping in ms, over time'">
                  <!-- Mbps gridlines + left y-axis ticks (0 / half / max) -->
                  <line :x1="cm.axisX0" :y1="cm.yTicks[0].y" :x2="cm.axisX1" :y2="cm.yTicks[0].y" class="apps-axchart-grid"/>
                  <line :x1="cm.axisX0" :y1="cm.yTicks[1].y" :x2="cm.axisX1" :y2="cm.yTicks[1].y" class="apps-axchart-grid"/>
                  <line :x1="cm.axisX0" :y1="cm.yTicks[2].y" :x2="cm.axisX1" :y2="cm.yTicks[2].y" class="apps-axchart-grid"/>
                  <text :x="cm.axisX0 - 3" :y="cm.yTicks[0].y" text-anchor="end" dominant-baseline="middle" class="apps-axchart-tick" x-text="cm.yTicks[0].label"></text>
                  <text :x="cm.axisX0 - 3" :y="cm.yTicks[1].y" text-anchor="end" dominant-baseline="middle" class="apps-axchart-tick" x-text="cm.yTicks[1].label"></text>
                  <text :x="cm.axisX0 - 3" :y="cm.yTicks[2].y" text-anchor="end" dominant-baseline="middle" class="apps-axchart-tick" x-text="cm.yTicks[2].label"></text>
                  <!-- ping right y-axis ticks (0 / max), ms -->
                  <text :x="cm.axisX1 + 3" :y="cm.pTicks[0].y" text-anchor="start" dominant-baseline="middle" class="apps-axchart-tick apps-axchart-tick--ping" x-text="cm.pTicks[0].label"></text>
                  <text :x="cm.axisX1 + 3" :y="cm.pTicks[1].y" text-anchor="start" dominant-baseline="middle" class="apps-axchart-tick apps-axchart-tick--ping" x-text="cm.pTicks[1].label"></text>
                  <!-- x-axis baseline + first/last time labels -->
                  <line :x1="cm.axisX0" :y1="cm.axisY1" :x2="cm.axisX1" :y2="cm.axisY1" class="apps-axchart-axis"/>
                  <text :x="cm.xTicks[0].x" :y="cm.h - 4" class="apps-axchart-tick apps-axchart-tick--start" x-text="cm.xTicks[0].label"></text>
                  <text :x="cm.xTicks[1].x" :y="cm.h - 4" class="apps-axchart-tick apps-axchart-tick--end" x-text="cm.xTicks[1].label"></text>
                  <!-- data lines: download + upload (Mbps, left), ping (ms, right, dashed) -->
                  <path :d="cm.downPath" fill="none" stroke="var(--success)" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
                  <path :d="cm.upPath" fill="none" stroke="var(--info)" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
                  <path :d="cm.pingPath" fill="none" stroke="var(--warning)" stroke-width="1.5" stroke-dasharray="2 2" vector-effect="non-scaling-stroke"/>
                </svg>
                <div class="flex items-center justify-between fs-3xs text-[var(--text-faint)]">
                  <span x-text="t('apps.speedtest.axis_mbps') || 'Mbps (down / up)'"></span>
                  <span x-text="t('apps.speedtest.axis_ms') || 'ms (ping)'"></span>
                </div>
                <div class="flex items-center justify-around fs-2xs text-[var(--text-faint)]">
                  <span><span class="inline-block w-2 h-2 rounded-full mr-1"
                              style="background: var(--success);"></span><span
                    x-text="t('apps.speedtest.legend_download') || 'down'"></span></span>
                  <span><span class="inline-block w-2 h-2 rounded-full mr-1"
                              style="background: var(--info);"></span><span
                    x-text="t('apps.speedtest.legend_upload') || 'up'"></span></span>
                  <span><span class="inline-block w-2 h-2 rounded-full mr-1"
                              style="background: var(--warning);"></span><span
                    x-text="t('apps.speedtest.legend_ping') || 'ping'"></span></span>
                </div>
              </div>
            </template>
          </div>
        </template>
      </div>
    </template>
    <template x-if="appsAppDataStatus(inst) === 'idle' && !inst.api_key_set">
      <p class="fs-xs text-[var(--text-faint)] italic"
         x-text="t('apps.speedtest.no_api_key') || 'No API key set -- add one in Admin -> Apps to enable.'"></p>
    </template>
    <template x-if="appsAppDataStatus(inst) === 'pending'">
      <p class="fs-xs text-[var(--text-faint)] italic"
         x-text="t('apps.speedtest.loading') || 'Loading speedtest data...'"></p>
    </template>
    <template x-if="appsAppDataStatus(inst) === 'error'">
      <p class="fs-xs text-[var(--danger)] italic"
         x-text="(t('apps.speedtest.fetch_failed') || 'Speedtest fetch failed') + ': ' + appsAppDataError(inst)"></p>
    </template>
  </div>
</template>
