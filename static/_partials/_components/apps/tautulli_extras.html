<!-- Per-app expanded-card extras -- Tautulli (Plex monitoring + statistics).

     Renders inside `apps-card.html` when the chip is the Tautulli catalog
     template AND extras are visible. Data from Tautulli's `cmd=get_activity`
     (+ get_libraries / get_tautulli_info), via
     `logic/apps/tautulli.py:fetch_data`, read through the cache-backed
     `appsAppData(inst)`. Mirrors kavita_extras.html (canonical
     `.apps-card-ups-*` stat grid + loading/error/no-api-key plain-text
     branches) but Tautulli monitors Plex, so it shows Streams / Transcodes /
     Bandwidth / Libraries and has NO Storage section.

     Helpers used (all from `static/js/apps/tautulli.js`):
       tautulliIsApp(app) / tautulliData(inst) / tautulliCount(v) /
       tautulliBandwidth(kbps) -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="tautulliIsApp && tautulliIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null))">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-tautulli">
    <template x-if="tautulliData(inst)">
      <div class="apps-card-ups" :data-tautulli-host="inst.host_id">
        <div x-show="(app.instances || []).length > 1"
             class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
             x-text="inst.host_address || inst.host_id"></div>
        <div class="apps-card-ups-grid">
          <!-- Active streams (card essential; highlighted when something plays) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tautulli.streams') || 'Streams'"></div>
            <div class="apps-card-stat-value"
                 :class="(Number(tautulliData(inst).streams) || 0) > 0 ? 'text-[var(--success)]' : ''"
                 x-text="tautulliCount(tautulliData(inst).streams)"></div>
          </div>
          <!-- Transcodes (card essential; warning-tinted when transcoding) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tautulli.transcodes') || 'Transcodes'"></div>
            <div class="apps-card-stat-value"
                 :class="(Number(tautulliData(inst).transcodes) || 0) > 0 ? 'text-[var(--warning)]' : ''"
                 x-text="tautulliCount(tautulliData(inst).transcodes)"></div>
          </div>
          <!-- Bandwidth (card essential) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tautulli.bandwidth') || 'Bandwidth'"></div>
            <div class="apps-card-stat-value" x-text="tautulliBandwidth(tautulliData(inst).bandwidth_kbps)"></div>
          </div>
          <!-- Libraries (card essential) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tautulli.libraries') || 'Libraries'"></div>
            <div class="apps-card-stat-value" x-text="tautulliCount(tautulliData(inst).libraries)"></div>
          </div>
          <!-- This week — total watch time over the last 7 days (card essential;
               Tautulli's own filter_duration). -->
          <div class="apps-card-ups-stat" x-show="tautulliData(inst).watch_time_week_label">
            <div class="apps-card-stat-label" x-text="t('apps.tautulli.watch_week') || 'This week'"></div>
            <div class="apps-card-stat-value fs-sm truncate" x-text="tautulliData(inst).watch_time_week_label || '—'"></div>
          </div>
          <!-- Peak concurrent today — from the local sampler (card essential, >0). -->
          <div class="apps-card-ups-stat" x-show="tautulliTodayPeak(inst) > 0">
            <div class="apps-card-stat-label" x-text="t('apps.tautulli.peak_today') || 'Peak today'"></div>
            <div class="apps-card-stat-value" x-text="tautulliCount(tautulliTodayPeak(inst))"></div>
          </div>
          <!-- Plays in the last 30 days (drawer-only). -->
          <div class="apps-card-ups-stat" x-show="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && (Number(tautulliData(inst).plays_30d) || 0) > 0">
            <div class="apps-card-stat-label" x-text="t('apps.tautulli.plays_30d') || 'Plays (30d)'"></div>
            <div class="apps-card-stat-value" x-text="tautulliCount(tautulliData(inst).plays_30d)"></div>
          </div>
          <!-- Most-active library (last 30d) — drawer-only. -->
          <div class="apps-card-ups-stat" x-show="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && tautulliMostActiveLib(inst)">
            <div class="apps-card-stat-label" x-text="t('apps.tautulli.most_active_library') || 'Top library'"></div>
            <div class="apps-card-stat-value fs-sm truncate" x-text="(tautulliMostActiveLib(inst) || {}).name || '—'"></div>
          </div>
          <!-- Most-played title (last 30d) — drawer-only. -->
          <div class="apps-card-ups-stat" x-show="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && tautulliMostPlayed(inst)">
            <div class="apps-card-stat-label" x-text="t('apps.tautulli.most_played_stat') || 'Most played'"></div>
            <div class="apps-card-stat-value fs-sm truncate" x-text="(tautulliMostPlayed(inst) || {}).title || '—'"></div>
          </div>
          <!-- Peak concurrent (30d) — Tautulli's native most_concurrent, drawer-only. -->
          <div class="apps-card-ups-stat" x-show="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && (Number(tautulliData(inst).peak_concurrent_30d) || 0) > 0">
            <div class="apps-card-stat-label" x-text="t('apps.tautulli.peak_30d') || 'Peak (30d)'"></div>
            <div class="apps-card-stat-value" x-text="tautulliCount(tautulliData(inst).peak_concurrent_30d)"></div>
          </div>
          <!-- Top watcher (last 30d) — drawer-only. -->
          <div class="apps-card-ups-stat" x-show="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && tautulliTopUser(inst)">
            <div class="apps-card-stat-label" x-text="t('apps.tautulli.top_watcher') || 'Top watcher'"></div>
            <div class="apps-card-stat-value fs-sm truncate" x-text="(tautulliTopUser(inst) || {}).name || '—'"></div>
          </div>
          <!-- Avg watched — mean % completion across recent plays (drawer-only). -->
          <div class="apps-card-ups-stat" x-show="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && (Number(tautulliData(inst).history_sampled) || 0) > 0">
            <div class="apps-card-stat-label" x-text="t('apps.tautulli.avg_watched') || 'Avg watched'"></div>
            <div class="apps-card-stat-value" x-text="(Number(tautulliData(inst).avg_completion) || 0) + '%'"></div>
          </div>
        </div>
        <!-- Plays-over-time sparkline (last 30 days) — drawer-only. -->
        <div x-show="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && tautulliHasPlays(inst)" class="mt-2">
          <div class="apps-card-stat-label mb-1" x-text="t('apps.tautulli.plays_chart') || 'Plays (last 30 days)'"></div>
          <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="apps-tautulli-spark" role="img"
               :aria-label="t('apps.tautulli.plays_chart') || 'Plays (last 30 days)'">
            <path :d="tautulliPlaysPath(inst)" fill="none" stroke="var(--primary)" stroke-width="1.5"/>
          </svg>
        </div>
        <!-- Analytics: top watchers / most-played + play-distribution charts
             (the signature Tautulli insight). Drawer-only (`appsExtrasInDrawer`)
             — no room on the apps-grid card. -->
        <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && (((tautulliData(inst).top_users || []).length) || ((tautulliData(inst).top_media || []).length) || tautulliPeak(tautulliData(inst).dayofweek) || tautulliPeak(tautulliData(inst).hourofday) || tautulliHasStreamType(inst))">
          <div class="space-y-2 mt-2 pt-2 border-t border-[var(--border)]">
            <!-- Top watchers (avatar via the pms_image_proxy hook). -->
            <div x-show="(tautulliData(inst).top_users || []).length" class="space-y-1">
              <div class="apps-card-stat-label" x-text="t('apps.tautulli.top_watchers') || 'Top watchers (30d)'"></div>
              <template x-for="u in (tautulliData(inst).top_users || []).slice(0, 5)" :key="u.name">
                <div class="flex items-center gap-2 fs-2xs min-w-0">
                  <img x-show="u.avatar" :src="appsImageProxyUrl(inst, u.avatar)" alt="" loading="lazy"
                       class="w-4 h-4 rounded-full shrink-0 object-cover img-shimmer"
                       @load="$event.target.classList.add('img-loaded')"
                       @error="$event.target.style.display='none'"/>
                  <span class="truncate text-[var(--text-dim)]" x-text="u.name"></span>
                  <span class="mono text-[var(--text-faint)] shrink-0 ms-auto"
                        x-text="t('apps.tautulli.plays_n', { n: tautulliCount(u.plays) })"></span>
                </div>
              </template>
            </div>
            <!-- Most-played media. -->
            <div x-show="(tautulliData(inst).top_media || []).length" class="space-y-1">
              <div class="apps-card-stat-label" x-text="t('apps.tautulli.most_played') || 'Most played (30d)'"></div>
              <template x-for="m in (tautulliData(inst).top_media || []).slice(0, 5)" :key="m.title">
                <div class="flex items-center gap-2 fs-2xs min-w-0">
                  <span aria-hidden="true" x-text="m.type === 'movie' ? '🎬' : '📺'"></span>
                  <span class="truncate text-[var(--text-dim)]" x-text="m.title"></span>
                  <span class="mono text-[var(--text-faint)] shrink-0 ms-auto"
                        x-text="t('apps.tautulli.plays_n', { n: tautulliCount(m.plays) })"></span>
                </div>
              </template>
            </div>
            <!-- Plays by day-of-week (bar chart) + busiest-day caption. -->
            <div x-show="tautulliPeak(tautulliData(inst).dayofweek)" class="space-y-1">
              <div class="apps-card-stat-label" x-text="t('apps.tautulli.dayofweek') || 'Plays by day'"></div>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8" role="img"
                   :aria-label="t('apps.tautulli.dayofweek') || 'Plays by day'">
                <template x-for="(b, i) in tautulliBars((tautulliData(inst).dayofweek || {}).values)" :key="i">
                  <rect :x="b.x" :y="b.y" :width="b.w" :height="b.h" fill="var(--info)"/>
                </template>
              </svg>
              <div class="fs-3xs text-[var(--text-faint)]"
                   x-text="t('apps.tautulli.busiest', { label: (tautulliPeak(tautulliData(inst).dayofweek) || {}).label, n: tautulliCount((tautulliPeak(tautulliData(inst).dayofweek) || {}).value) })"></div>
            </div>
            <!-- Plays by hour-of-day (bar chart) + busiest-hour caption. -->
            <div x-show="tautulliPeak(tautulliData(inst).hourofday)" class="space-y-1">
              <div class="apps-card-stat-label" x-text="t('apps.tautulli.hourofday') || 'Plays by hour'"></div>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8" role="img"
                   :aria-label="t('apps.tautulli.hourofday') || 'Plays by hour'">
                <template x-for="(b, i) in tautulliBars((tautulliData(inst).hourofday || {}).values)" :key="i">
                  <rect :x="b.x" :y="b.y" :width="b.w" :height="b.h" fill="var(--success)"/>
                </template>
              </svg>
              <div class="fs-3xs text-[var(--text-faint)]"
                   x-text="t('apps.tautulli.busiest_hour', { label: (tautulliPeak(tautulliData(inst).hourofday) || {}).label, n: tautulliCount((tautulliPeak(tautulliData(inst).hourofday) || {}).value) })"></div>
            </div>
            <!-- Direct-vs-transcode plays over time (shared scale): direct play
                 (green) vs transcode (amber) — the hardware-load signal that
                 justifies a faster CPU / GPU. -->
            <div x-show="tautulliHasStreamType(inst)" class="space-y-1">
              <div class="apps-card-stat-label" x-text="t('apps.tautulli.stream_type_chart') || 'Direct vs transcode (30d)'"></div>
              <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8" role="img"
                   :aria-label="t('apps.tautulli.stream_type_chart') || 'Direct vs transcode (30d)'">
                <path :d="tautulliStreamTypePath(tautulliStreamType(inst).direct, tautulliStreamTypeMax(inst))"
                      fill="none" stroke="var(--success)" stroke-width="1.5"/>
                <path :d="tautulliStreamTypePath(tautulliStreamType(inst).transcode, tautulliStreamTypeMax(inst))"
                      fill="none" stroke="var(--warning)" stroke-width="1.5"/>
              </svg>
              <div class="flex items-center justify-around fs-2xs text-[var(--text-faint)]">
                <span><span class="inline-block w-2 h-2 rounded-full me-1" style="background: var(--success);"></span><span
                  x-text="t('apps.tautulli.direct_legend') || 'direct'"></span></span>
                <span><span class="inline-block w-2 h-2 rounded-full me-1" style="background: var(--warning);"></span><span
                  x-text="t('apps.tautulli.transcode_legend') || 'transcode'"></span></span>
                <span x-show="tautulliTranscodeShare(inst) !== null"
                      x-text="t('apps.tautulli.transcode_share', { n: (tautulliTranscodeShare(inst) || 0) })"></span>
              </div>
            </div>
          </div>
        </template>
        <!-- Concurrent-streams retention trend (drawer-only): per-day peak
             streams from the lifespan tautulli_sampler — an OmniGrid-owned trend
             that doesn't round-trip Tautulli's history each render; ≥ 2 daily
             points. -->
        <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && tautulliTrend(inst) && tautulliTrend(inst).series_streams && tautulliTrend(inst).series_streams.length >= 2">
          <div class="space-y-1 mt-2 pt-2 border-t border-[var(--border)]">
            <span class="fs-2xs text-[var(--text-faint)] block"
                  x-text="t('apps.tautulli.streams_trend', { days: tautulliTrend(inst).days })"></span>
            <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8 apps-card-speedtest-chart">
              <path :d="tautulliTrendPath(tautulliTrend(inst).series_streams)" fill="none" stroke="var(--success)" stroke-width="1.5"/>
            </svg>
            <div class="fs-3xs text-[var(--text-faint)]"
                 x-text="t('apps.tautulli.streams_peak', { peak: tautulliTrend(inst).peak_streams, latest: tautulliTrend(inst).latest_streams })"></div>
          </div>
        </template>
        <!-- Footnote: version + total library items. -->
        <div x-show="tautulliData(inst).version || (Number(tautulliData(inst).total_items) || 0) > 0"
             class="fs-3xs text-[var(--text-faint)] mt-1 mono">
          <span x-show="tautulliData(inst).version" x-text="t('apps.version_footnote', { brand: 'Tautulli', v: (tautulliData(inst).version || '') })"></span>
          <span x-show="(Number(tautulliData(inst).total_items) || 0) > 0"
                x-text="(tautulliData(inst).version ? ' · ' : '') + (t('apps.tautulli.items_n', { n: tautulliData(inst).total_items }) || (tautulliData(inst).total_items + ' items'))"></span>
        </div>
      </div>
    </template>
    <!-- No API key yet — idle and unconfigured. -->
    <template x-if="appsAppDataStatus(inst) === 'idle' && !inst.api_key_set">
      <p class="fs-xs text-[var(--text-faint)] italic"
         x-text="t('apps.tautulli.no_api_key') || 'No API key set -- add one in Admin -> Apps to enable.'"></p>
    </template>
    <!-- Loading — first fetch in flight. -->
    <template x-if="!tautulliData(inst) && appsAppDataStatus(inst) === 'pending'">
      <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('apps.tautulli.loading') || 'Loading Tautulli data…'"></span></p>
    </template>
    <!-- Error — upstream fetch failed. -->
    <template x-if="!tautulliData(inst) && appsAppDataStatus(inst) === 'error'">
      <p class="fs-xs text-[var(--danger)] italic"
         x-text="(t('apps.tautulli.fetch_failed') || 'Tautulli fetch failed') + ': ' + appsAppDataError(inst)"></p>
    </template>
  </div>
</template>
