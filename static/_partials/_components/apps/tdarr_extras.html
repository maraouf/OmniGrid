<!-- Per-app expanded-card extras -- Tdarr (distributed media-transcode automation).

     Renders inside `apps-card.html` when the chip is the Tdarr catalog
     template AND extras are visible. Data from Tdarr's cruddb StatisticsJSONDB
     + get-nodes, via `logic/apps/tdarr.py:fetch_data`, read through the
     cache-backed `appsAppData(inst)`. Mirrors tracearr_extras.html (canonical
     `.apps-card-ups-*` stat grid + loading/error branches) — Tdarr shows
     Files / Transcode queue / Health queue / Space saved / Workers. NO
     "no api key" branch: Tdarr is open by default, so the card works without
     a key.

     Helpers used (all from `static/js/apps/tdarr.js`):
       tdarrIsApp(app) / tdarrData(inst) / tdarrCount(v) / tdarrSpace(d) /
       tdarrWorkers(d) -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="tdarrIsApp && tdarrIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null))">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-tdarr">
    <template x-if="tdarrData(inst)">
      <div class="apps-card-ups" :data-tdarr-host="inst.host_id">
        <div x-show="(app.instances || []).length > 1"
             class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
             x-text="inst.host_address || inst.host_id"></div>
        <div class="apps-card-ups-grid">
          <!-- Total files -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tdarr.files') || 'Files'"></div>
            <div class="apps-card-stat-value" x-text="tdarrCount(tdarrData(inst).total_files)"></div>
          </div>
          <!-- Transcode queue -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tdarr.transcode_queue') || 'Transcode queue'"></div>
            <div class="apps-card-stat-value" x-text="tdarrCount(tdarrData(inst).transcode_queue)"></div>
          </div>
          <!-- Health-check queue -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tdarr.health_queue') || 'Health queue'"></div>
            <div class="apps-card-stat-value" x-text="tdarrCount(tdarrData(inst).health_queue)"></div>
          </div>
          <!-- Space saved -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tdarr.space_saved') || 'Space saved'"></div>
            <div class="apps-card-stat-value" x-text="tdarrSpace(tdarrData(inst))"></div>
          </div>
          <!-- Workers active / nodes -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tdarr.workers') || 'Workers'"></div>
            <div class="apps-card-stat-value" x-text="tdarrWorkers(tdarrData(inst))"></div>
          </div>
        </div>
        <!-- Footnote: version + total transcodes done. -->
        <div x-show="tdarrData(inst).version || (Number(tdarrData(inst).transcodes) || 0) > 0"
             class="fs-3xs text-[var(--text-faint)] mt-1 mono">
          <span x-show="tdarrData(inst).version" x-text="t('apps.version_footnote', { brand: 'Tdarr', v: (tdarrData(inst).version || '') })"></span>
          <span x-show="(Number(tdarrData(inst).transcodes) || 0) > 0"
                x-text="(tdarrData(inst).version ? ' · ' : '') + (t('apps.tdarr.transcodes_n', { n: tdarrData(inst).transcodes }) || (tdarrData(inst).transcodes + ' transcodes'))"></span>
        </div>
      </div>
    </template>
    <!-- Loading — first fetch in flight. -->
    <template x-if="!tdarrData(inst) && appsAppDataStatus(inst) === 'pending'">
      <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('apps.tdarr.loading') || 'Loading Tdarr data…'"></span></p>
    </template>
    <!-- Error — upstream fetch failed. -->
    <template x-if="!tdarrData(inst) && appsAppDataStatus(inst) === 'error'">
      <p class="fs-xs text-[var(--danger)] italic"
         x-text="(t('apps.tdarr.fetch_failed') || 'Tdarr fetch failed') + ': ' + appsAppDataError(inst)"></p>
    </template>
  </div>
</template>
