<!-- Per-app expanded-card extras -- Tracearr (Plex / Jellyfin / Emby fleet monitoring).

     Renders inside `apps-card.html` when the chip is the Tracearr catalog
     template AND extras are visible. Data from Tracearr's `/api/v1/public/stats`
     (+ /health), via `logic/apps/tracearr.py:fetch_data`, read through the
     cache-backed `appsAppData(inst)`. Mirrors tautulli_extras.html (canonical
     `.apps-card-ups-*` stat grid + loading/error/no-api-key plain-text
     branches) but Tracearr watches a multi-server fleet, so it shows
     Active streams / Servers / Users / Violations and has NO Storage section.

     Helpers used (all from `static/js/apps/tracearr.js`):
       tracearrIsApp(app) / tracearrData(inst) / tracearrCount(v) /
       tracearrServers(d) -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="tracearrIsApp && tracearrIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null))">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-tracearr">
    <template x-if="tracearrData(inst)">
      <div class="apps-card-ups" :data-tracearr-host="inst.host_id">
        <div x-show="(app.instances || []).length > 1"
             class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
             x-text="inst.host_address || inst.host_id"></div>
        <div class="apps-card-ups-grid">
          <!-- Active streams -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tracearr.streams') || 'Streams'"></div>
            <div class="apps-card-stat-value" x-text="tracearrCount(tracearrData(inst).active_streams)"></div>
          </div>
          <!-- Transcodes -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tracearr.transcodes') || 'Transcodes'"></div>
            <div class="apps-card-stat-value" x-text="tracearrCount(tracearrData(inst).transcodes)"></div>
          </div>
          <!-- Bandwidth -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tracearr.bandwidth') || 'Bandwidth'"></div>
            <div class="apps-card-stat-value" x-text="tracearrBandwidth(tracearrData(inst))"></div>
          </div>
          <!-- Servers online/total -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tracearr.servers') || 'Servers'"></div>
            <div class="apps-card-stat-value" x-text="tracearrServers(tracearrData(inst))"></div>
          </div>
          <!-- Users -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tracearr.users') || 'Users'"></div>
            <div class="apps-card-stat-value" x-text="tracearrCount(tracearrData(inst).total_users)"></div>
          </div>
          <!-- Violations (last 7 days) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tracearr.violations') || 'Violations'"></div>
            <div class="apps-card-stat-value" x-text="tracearrCount(tracearrData(inst).recent_violations)"></div>
          </div>
          <!-- Violation rate — violations per 100 plays (the abuse-intensity
               signal). Only when there's a rate to show. -->
          <div class="apps-card-ups-stat" x-show="tracearrViolationRate(tracearrData(inst)) !== null">
            <div class="apps-card-stat-label" x-text="t('apps.tracearr.violation_rate') || 'Viol. rate'"></div>
            <div class="apps-card-stat-value"
                 x-text="t('apps.tracearr.per_100', { n: tracearrViolationRate(tracearrData(inst)) })"></div>
          </div>
        </div>
        <!-- Account-sharing VIOLATION trend (drawer-only): the rolling 7-day
             violation count over time — answers "is abuse trending up", which
             the point-in-time count can't. Backed by the lifespan sampler. -->
        <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && tracearrHasTrend(tracearrData(inst), 'series_violations')">
          <div class="space-y-1 mt-2 pt-2 border-t border-[var(--border)]">
            <div class="apps-card-stat-label"
                 x-text="t('apps.tracearr.violation_trend', { days: tracearrTrend(tracearrData(inst)).days })"></div>
            <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8" role="img"
                 :aria-label="t('apps.tracearr.violation_trend', { days: tracearrTrend(tracearrData(inst)).days })">
              <path :d="tracearrTrendPath(tracearrTrend(tracearrData(inst)).series_violations)" fill="none" stroke="var(--danger)" stroke-width="1.5"/>
            </svg>
            <div class="fs-3xs text-[var(--text-faint)]"
                 x-show="(Number(tracearrTrend(tracearrData(inst)).week_change_violations) || 0) !== 0"
                 x-text="(Number(tracearrTrend(tracearrData(inst)).week_change_violations) || 0) > 0
                   ? t('apps.tracearr.viol_up', { n: tracearrTrend(tracearrData(inst)).week_change_violations })
                   : t('apps.tracearr.viol_down', { n: Math.abs(Number(tracearrTrend(tracearrData(inst)).week_change_violations) || 0) })"></div>
          </div>
        </template>
        <!-- Fleet CONCURRENCY trend (drawer-only): the per-day peak active-stream
             count over time, independent of Tracearr's own retention. -->
        <template x-if="(typeof appsExtrasInDrawer !== 'undefined' && appsExtrasInDrawer) && tracearrHasTrend(tracearrData(inst), 'series_streams')">
          <div class="space-y-1 mt-2 pt-2 border-t border-[var(--border)]">
            <div class="apps-card-stat-label"
                 x-text="t('apps.tracearr.streams_trend', { days: tracearrTrend(tracearrData(inst)).days })"></div>
            <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="w-full h-8" role="img"
                 :aria-label="t('apps.tracearr.streams_trend', { days: tracearrTrend(tracearrData(inst)).days })">
              <path :d="tracearrTrendPath(tracearrTrend(tracearrData(inst)).series_streams)" fill="none" stroke="var(--info)" stroke-width="1.5"/>
            </svg>
            <div class="fs-3xs text-[var(--text-faint)]"
                 x-text="t('apps.tracearr.streams_peak', { peak: tracearrTrend(tracearrData(inst)).peak_streams, latest: tracearrTrend(tracearrData(inst)).latest_streams })"></div>
          </div>
        </template>
        <!-- Footnote: version + plays (last 30 days). -->
        <div x-show="tracearrData(inst).version || (Number(tracearrData(inst).total_sessions) || 0) > 0"
             class="fs-3xs text-[var(--text-faint)] mt-1 mono">
          <span x-show="tracearrData(inst).version" x-text="t('apps.version_footnote', { brand: 'Tracearr', v: (tracearrData(inst).version || '') })"></span>
          <span x-show="(Number(tracearrData(inst).total_sessions) || 0) > 0"
                x-text="(tracearrData(inst).version ? ' · ' : '') + (t('apps.tracearr.plays_n', { n: tracearrData(inst).total_sessions }) || (tracearrData(inst).total_sessions + ' plays (30d)'))"></span>
        </div>
        <!-- Plays-over-time sparkline (last 30 days) — like the speedtest graph. -->
        <div x-show="tracearrHasPlays(tracearrData(inst))" class="mt-2">
          <div class="apps-card-stat-label mb-1" x-text="t('apps.tracearr.plays_chart') || 'Plays (last 30 days)'"></div>
          <svg viewBox="0 0 200 32" preserveAspectRatio="none" class="apps-tracearr-spark" role="img"
               :aria-label="t('apps.tracearr.plays_chart') || 'Plays (last 30 days)'">
            <path :d="tracearrPlaysPath(tracearrData(inst))" fill="none" stroke="var(--primary)" stroke-width="1.5"/>
          </svg>
        </div>
        <!-- Streaming-quality breakdown: Direct Play / Direct Stream / Transcode.
             (Tracearr's API reports the playback-tier split, not a 4k/1080p
             resolution pie.) -->
        <div x-show="tracearrHasQuality(tracearrData(inst))" class="mt-2">
          <div class="apps-card-stat-label mb-1" x-text="t('apps.tracearr.quality_title') || 'Streaming quality'"></div>
          <div class="apps-quality-bar" role="img"
               :aria-label="t('apps.tracearr.quality_title') || 'Streaming quality'">
            <div class="apps-quality-seg apps-quality-seg--dp" :style="'width:' + tracearrQualityPct(tracearrData(inst), 'direct_play') + '%'"></div>
            <div class="apps-quality-seg apps-quality-seg--ds" :style="'width:' + tracearrQualityPct(tracearrData(inst), 'direct_stream') + '%'"></div>
            <div class="apps-quality-seg apps-quality-seg--tc" :style="'width:' + tracearrQualityPct(tracearrData(inst), 'transcode') + '%'"></div>
          </div>
          <div class="flex flex-wrap gap-x-3 gap-y-0.5 fs-3xs mt-1 text-[var(--text-dim)]">
            <span class="inline-flex items-center gap-1">
              <span class="apps-quality-dot apps-quality-dot--dp"></span>
              <span x-text="(t('apps.tracearr.direct_play') || 'Direct Play') + ' ' + tracearrQualityPct(tracearrData(inst), 'direct_play') + '%'"></span>
            </span>
            <span class="inline-flex items-center gap-1">
              <span class="apps-quality-dot apps-quality-dot--ds"></span>
              <span x-text="(t('apps.tracearr.direct_stream') || 'Direct Stream') + ' ' + tracearrQualityPct(tracearrData(inst), 'direct_stream') + '%'"></span>
            </span>
            <span class="inline-flex items-center gap-1">
              <span class="apps-quality-dot apps-quality-dot--tc"></span>
              <span x-text="(t('apps.tracearr.transcode') || 'Transcode') + ' ' + tracearrQualityPct(tracearrData(inst), 'transcode') + '%'"></span>
            </span>
          </div>
        </div>
        <!-- Top platforms (by play count, last 30 days). -->
        <div x-show="tracearrPlatforms(tracearrData(inst)).length" class="mt-2">
          <div class="apps-card-stat-label mb-1" x-text="t('apps.tracearr.platforms') || 'Top platforms'"></div>
          <div class="flex flex-wrap gap-1">
            <template x-for="p in tracearrPlatforms(tracearrData(inst))" :key="p.name">
              <span class="chip pill-muted fs-3xs" x-text="p.name + ' · ' + tracearrCount(p.count)"></span>
            </template>
          </div>
        </div>
      </div>
    </template>
    <!-- No API key yet — idle and unconfigured. -->
    <template x-if="appsAppDataStatus(inst) === 'idle' && !inst.api_key_set">
      <p class="fs-xs text-[var(--text-faint)] italic"
         x-text="t('apps.tracearr.no_api_key') || 'No API token set -- add one in Admin -> Apps to enable.'"></p>
    </template>
    <!-- Loading — first fetch in flight. -->
    <template x-if="!tracearrData(inst) && appsAppDataStatus(inst) === 'pending'">
      <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('apps.tracearr.loading') || 'Loading Tracearr data…'"></span></p>
    </template>
    <!-- Error — upstream fetch failed. -->
    <template x-if="!tracearrData(inst) && appsAppDataStatus(inst) === 'error'">
      <p class="fs-xs text-[var(--danger)] italic"
         x-text="(t('apps.tracearr.fetch_failed') || 'Tracearr fetch failed') + ': ' + appsAppDataError(inst)"></p>
    </template>
  </div>
</template>
