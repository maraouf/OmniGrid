<!-- Per-app expanded-card extras -- Tracearr (Plex / Jellyfin / Emby fleet monitoring).

     Renders inside `apps-card.html` when the chip is the Tracearr catalog
     template AND extras are visible. Data from Tracearr's `/api/v1/public/stats`
     (+ /health), via `logic/apps/tracearr.py:fetch_data`, read through the
     cache-backed `appsAppData(inst)`. Mirrors tautulli_extras.html (canonical
     `.apps-card-ups-*` stat grid + loading/error/no-api-key plain-text
     branches) but Tracearr watches a multi-server fleet, so it shows
     Active streams / Servers / Users / Violations and has NO Storage section.

     Helpers used (all from `static/js/apps/tracearr.js`):
       tracearrIsApp(app) / tracearrData(inst) / tracearrCount(v) /
       tracearrServers(d) -->
<!--suppress HtmlUnknownAttribute -->
<template x-if="tracearrIsApp && tracearrIsApp(app) && appsShowExtras(app, inst, (typeof item !== 'undefined' ? item : null))">
  <!--suppress JSUnresolvedVariable -->
  <div class="apps-card-tracearr">
    <template x-if="tracearrData(inst)">
      <div class="apps-card-ups" :data-tracearr-host="inst.host_id">
        <div x-show="(app.instances || []).length > 1"
             class="apps-card-ups-host fs-3xs text-[var(--text-faint)] mb-1 mono"
             x-text="inst.host_address || inst.host_id"></div>
        <div class="apps-card-ups-grid">
          <!-- Active streams -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tracearr.streams') || 'Streams'"></div>
            <div class="apps-card-stat-value" x-text="tracearrCount(tracearrData(inst).active_streams)"></div>
          </div>
          <!-- Transcodes -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tracearr.transcodes') || 'Transcodes'"></div>
            <div class="apps-card-stat-value" x-text="tracearrCount(tracearrData(inst).transcodes)"></div>
          </div>
          <!-- Bandwidth -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tracearr.bandwidth') || 'Bandwidth'"></div>
            <div class="apps-card-stat-value" x-text="tracearrBandwidth(tracearrData(inst))"></div>
          </div>
          <!-- Servers online/total -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tracearr.servers') || 'Servers'"></div>
            <div class="apps-card-stat-value" x-text="tracearrServers(tracearrData(inst))"></div>
          </div>
          <!-- Users -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tracearr.users') || 'Users'"></div>
            <div class="apps-card-stat-value" x-text="tracearrCount(tracearrData(inst).total_users)"></div>
          </div>
          <!-- Violations (last 7 days) -->
          <div class="apps-card-ups-stat">
            <div class="apps-card-stat-label" x-text="t('apps.tracearr.violations') || 'Violations'"></div>
            <div class="apps-card-stat-value" x-text="tracearrCount(tracearrData(inst).recent_violations)"></div>
          </div>
        </div>
        <!-- Footnote: version + plays (last 30 days). -->
        <div x-show="tracearrData(inst).version || (Number(tracearrData(inst).total_sessions) || 0) > 0"
             class="fs-3xs text-[var(--text-faint)] mt-1 mono">
          <span x-show="tracearrData(inst).version" x-text="t('apps.version_footnote', { brand: 'Tracearr', v: (tracearrData(inst).version || '') })"></span>
          <span x-show="(Number(tracearrData(inst).total_sessions) || 0) > 0"
                x-text="(tracearrData(inst).version ? ' · ' : '') + (t('apps.tracearr.plays_n', { n: tracearrData(inst).total_sessions }) || (tracearrData(inst).total_sessions + ' plays (30d)'))"></span>
        </div>
      </div>
    </template>
    <!-- No API key yet — idle and unconfigured. -->
    <template x-if="appsAppDataStatus(inst) === 'idle' && !inst.api_key_set">
      <p class="fs-xs text-[var(--text-faint)] italic"
         x-text="t('apps.tracearr.no_api_key') || 'No API token set -- add one in Admin -> Apps to enable.'"></p>
    </template>
    <!-- Loading — first fetch in flight. -->
    <template x-if="!tracearrData(inst) && appsAppDataStatus(inst) === 'pending'">
      <p class="fs-xs text-[var(--text-faint)] italic inline-flex items-center gap-1.5">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('apps.tracearr.loading') || 'Loading Tracearr data…'"></span></p>
    </template>
    <!-- Error — upstream fetch failed. -->
    <template x-if="!tracearrData(inst) && appsAppDataStatus(inst) === 'error'">
      <p class="fs-xs text-[var(--danger)] italic"
         x-text="(t('apps.tracearr.fetch_failed') || 'Tracearr fetch failed') + ': ' + appsAppDataError(inst)"></p>
    </template>
  </div>
</template>
