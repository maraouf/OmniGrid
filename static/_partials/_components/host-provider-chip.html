<!--
  Shared per-host provider chip — consumed by BOTH the mobile-card
  host header AND the desktop-table host row. Single source of truth
  for the chip class / style / title contract so a future state
  addition (or i18n tweak) lands in one place instead of two
  divergent copies.

  Surrounding Alpine scope MUST define:
    - h  : the host row object (carries `id`, `provider_pause_state`,
           etc.). Used to scope the chip-click popover to a specific
           (host, provider) pair.
    - p  : provider state object from `providerStates(h)` x-for loop.
           Carries { name, state, consecutive_failures?, last_error? }.

  States rendered:
    - failing             → pill-error
    - paused              → pill-info (auto-paused after N failures)
    - configured_inactive → pill-muted (host has provider mapped but
                            master toggle is OFF in Admin → Providers)
    - loading             → pill-custom chip-loading (probe in flight)
    - default (healthy)   → pill-custom with operator-customised
                            provider colour via providerChipStyle()

  Click contract: clicking the chip toggles a small popover anchored
  to the chip (see provider-chip-popover.html). The popover is
  positioned relative to a wrapping `.relative` span; the chip is a
  `<button>` (not a `<span>`) so it's keyboard-reachable and AT users
  can activate the popover via Enter / Space.

  Title strings + aria-label route through i18n so non-en locales
  translate.
-->
<!--suppress HtmlUnknownAttribute -->
<!-- Wrapper is a `<div>` rendered inline-flex via Tailwind so the
     included `provider-chip-popover.html` (which is a block-level
     `<div>` with absolute positioning) lives as a child without
     the block-in-inline HTML violation that an inline `<span>`
     parent would trigger. -->
<div class="relative inline-flex">
  <button type="button"
          class="chip fs-3xs-half px-1 py-0"
          :class="p.state === 'failing' ? 'pill-error'
                  : (p.state === 'paused' ? 'pill-info'
                  : (p.state === 'configured_inactive' ? 'pill-muted'
                  : (p.state === 'loading' ? 'pill-custom chip-loading' : 'pill-custom')))"
          :style="(p.state === 'failing' || p.state === 'paused' || p.state === 'configured_inactive') ? '' : providerChipStyle(p.name)"
          aria-haspopup="dialog"
          :aria-expanded="chipPopoverOpen
                  && chipPopoverOpen.host_id === h.id
                  && chipPopoverOpen.provider_name === p.name ? 'true' : 'false'"
          @click.stop="openProviderChipPopover(h.id, p)"
          :title="p.state === 'paused' ? t('hosts_extra.provider_paused', { provider: t('settings.host_stats.source_' + p.name) || p.name, count: p.consecutive_failures, error: p.last_error || '—' })
                  : (p.state === 'failing' ? t('hosts_extra.provider_failing', { provider: t('settings.host_stats.source_' + p.name) || p.name })
                  : (p.state === 'configured_inactive' ? (t('hosts_extra.provider_configured_inactive', { provider: t('settings.host_stats.source_' + p.name) || p.name }) || ((t('settings.host_stats.source_' + p.name) || p.name) + ' — configured but provider not enabled in Admin → Providers'))
                  : (p.state === 'loading' ? t('hosts_extra.provider_loading', { provider: t('settings.host_stats.source_' + p.name) || p.name }) || ((t('settings.host_stats.source_' + p.name) || p.name) + ' — fetching…') : '')))"
          :aria-label="p.state === 'paused' ? t('hosts_extra.provider_paused', { provider: t('settings.host_stats.source_' + p.name) || p.name, count: p.consecutive_failures, error: p.last_error || '—' })
                  : (p.state === 'failing' ? t('hosts_extra.provider_failing', { provider: t('settings.host_stats.source_' + p.name) || p.name })
                  : (p.state === 'configured_inactive' ? (t('hosts_extra.provider_configured_inactive', { provider: t('settings.host_stats.source_' + p.name) || p.name }) || ((t('settings.host_stats.source_' + p.name) || p.name) + ' — configured but provider not enabled in Admin → Providers'))
                  : (p.state === 'loading' ? t('hosts_extra.provider_loading', { provider: t('settings.host_stats.source_' + p.name) || p.name }) || ((t('settings.host_stats.source_' + p.name) || p.name) + ' — fetching…')
                  : (t('settings.host_stats.source_' + p.name) || p.name))))"
          x-text="t('settings.host_stats.source_' + p.name) || p.name"></button>
  <!-- INCLUDE: _components/provider-chip-popover.html -->
</div>
