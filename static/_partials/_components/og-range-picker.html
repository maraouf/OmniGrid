<!--
  Shared range-picker chip strip — used by every chip-strip pattern in
  the SPA that needs mutually-exclusive choices (4 stats range pickers
  + topbar refresh-interval picker). Single source of truth for the
  ARIA contract — the WAI-ARIA Authoring Practices "Radio Group"
  pattern: wrapper carries `role="radiogroup"` + `aria-label`; each
  child button carries `role="radio"` + `aria-checked="true|false"`
  (NOT `aria-pressed`, which is the toggle-button semantic — radio
  is a mutually-exclusive selection within a group, toggle is per-
  button independent on/off) + the radiogroup tabindex pattern
  (`tabindex="0"` on the selected option, `-1` on the rest, so Tab
  enters the group, Arrow keys cycle within). Arrow / Home / End
  keyboard navigation handled by `_buttonGroupArrowKey` on the
  wrapper.

  Surrounding Alpine scope MUST define:
    - rpOptions   : array of option objects (see shape below)
    - rpCurrent   : current selected value (compared via `===`) — use a
                    GETTER (`get rpCurrent() { return outerState; }`) so
                    the binding stays reactive across changes
    - rpOnChange  : function `(value) => void` fired on chip click
    - rpAriaLabel : aria-label string for the radiogroup wrapper

  Option object shape:
    { value: <primitive>,           // identity for compare + key
      label: <string>,              // visible chip text
      title?: <string>,             // optional :title for tooltip
      dotColor?: <CSS colour>,      // optional leading dot (Live/Off)
      activeBg?: <Tailwind class>,  // override active bg (default: --primary)
      activeText?: <Tailwind class> // paired active text token
    }

  The wrapper picks up any extra Tailwind classes via an optional
  `rpExtraClass` string on the parent scope (e.g. responsive width
  utilities for the topbar picker).

  Optional parent-scope keys (all read via `$data['<name>']` so a parent
  that doesn't declare them resolves cleanly to undefined):
    - rpBusy : truthy while a range fetch is in flight — sets
               `aria-busy="true"` on the wrapper + `:disabled` on every
               radio so the operator can't rapid-switch ranges mid-fetch
               (which raced out-of-order chart updates on slow networks).
    - rpExtraClass / rpLeadingLabel / rpTitle (see above / below).
-->
<!--suppress HtmlUnknownAttribute -->
<!--
  NB: optional rpLeadingLabel / rpExtraClass / rpTitle are read via
  `$data['<name>']` (bracket-notation property access on Alpine's
  scope proxy). The earlier `typeof X !== 'undefined' && X` pattern
  works in plain JS but Alpine v3 compiles expressions with strict
  semantics where a bare undeclared identifier throws ReferenceError
  BEFORE typeof can guard it (caught fleet-wide on the 4 stats range
  pickers — only the topbar consumer declared rpLeadingLabel, the
  others crashed on every mount). `$data['rpLeadingLabel']` returns
  undefined cleanly when the parent scope doesn't declare it.
-->
<div class="flex items-center gap-0 bg-[var(--surface-2)] rounded-md p-0.5 border border-[var(--border)]"
     :class="$data['rpExtraClass'] ? $data['rpExtraClass'] : ''"
     role="radiogroup"
     :aria-label="rpAriaLabel"
     :aria-busy="$data['rpBusy'] ? 'true' : 'false'"
     :title="$data['rpTitle'] ? $data['rpTitle'] : ''"
     @keydown="_buttonGroupArrowKey($event)">
  <!-- Optional leading decorative label (topbar refresh picker uses
       this for the "REFRESH" prefix text). Sits inside the styled
       chrome but outside the role="radiogroup" semantic via
       aria-hidden — screen-readers hear only the radio options. -->
  <span x-show="$data['rpLeadingLabel']"
        aria-hidden="true"
        class="px-1.5 fs-3xs text-faint uppercase tracking-wider"
        x-text="$data['rpLeadingLabel']"></span>
  <template x-for="opt in rpOptions" :key="opt.value">
    <button type="button"
            role="radio"
            :aria-checked="rpCurrent === opt.value ? 'true' : 'false'"
            :aria-label="t('common.range_option_aria', { label: opt.label, group: rpAriaLabel })"
            :tabindex="rpCurrent === opt.value ? 0 : -1"
            :disabled="$data['rpBusy']"
            :title="opt.title || ''"
            :class="rpCurrent === opt.value
              ? (opt.activeBg
                  ? (opt.activeBg + ' ' + (opt.activeText || 'text-[var(--text-on-primary)]'))
                  : 'bg-[var(--primary)] text-[var(--text-on-primary)]')
              : 'text-[var(--text-dim)] hover:text-[var(--text)]'"
            class="px-2 py-0.5 rounded fs-xs font-medium transition flex items-center gap-1 disabled:opacity-40 disabled:cursor-not-allowed"
            @click="rpOnChange(opt.value)">
      <span x-show="opt.dotColor"
            class="inline-block w-1.5 h-1.5 rounded-full"
            :style="opt.dotColor ? ('background: ' + (rpCurrent === opt.value ? 'currentColor' : opt.dotColor)) : ''"></span>
      <span x-text="opt.label"></span>
    </button>
  </template>
</div>
