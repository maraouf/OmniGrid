<!-- Custom-dashboard arr_calendar widget body. Extracted from apps-widget-tile.html
     so each widget owns its own partial (mirrors the per-app editor / extras
     partials). Self-gated by its `<template x-if="item.widget === 'arr_calendar'">`;
     aggregated via _all_widgets.html, included once by apps-widget-tile.html. -->

<!-- *arr release-calendar widget — Homarr-style month grid of upcoming
     movie / series / album / book releases from the CONFIGURED Radarr /
     Sonarr / Lidarr / Readarr instances. Hover (desktop) or tap (mobile)
     a day to see that day's titles in an in-tile popover (poster + the
     service's brand icon + title + SxxExx / artist / author). Each day's
     service-coloured dots show which services have a release. Self-fetches
     the visible month on first mount (per-month cache). Single root
     (.apps-widget-arr-cal-wrap, display:contents) so the outer x-if
     renders BOTH the grid AND the empty-state (Alpine renders only the
     first root child of a <template x-if>). -->
<template x-if="item.widget === 'arr_calendar'">
  <div class="apps-widget-arr-cal-wrap" x-init="(typeof _arrCalSpin === 'function' ? _arrCalSpin(_ensureArrCalendar()) : _ensureArrCalendar())"
       @click.outside="arrCalCloseDay()">
    <!-- Grid body — shown when ≥1 *arr service is configured. -->
    <template x-if="arrCalendar && arrCalendar.configured !== false">
      <div class="apps-widget-arr-cal">
        <div class="apps-widget-arr-cal-head">
          <button type="button" class="apps-widget-arr-cal-nav"
                  @click.stop="arrCalPrevMonth()"
                  :aria-label="t('apps.custom.widget_arr_calendar_prev') || 'Previous month'">
            <svg width="13" height="13" aria-hidden="true" style="transform: scaleX(-1);">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
            </svg>
          </button>
          <span class="apps-widget-arr-cal-month" x-text="arrCalMonthLabel()"></span>
          <button type="button" class="apps-widget-arr-cal-nav"
                  @click.stop="arrCalNextMonth()"
                  :aria-label="t('apps.custom.widget_arr_calendar_next') || 'Next month'">
            <svg width="13" height="13" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
            </svg>
          </button>
        </div>
        <div class="apps-widget-arr-cal-weekdays" aria-hidden="true">
          <template x-for="(wd, wi) in arrCalWeekdays()" :key="wi">
            <span class="apps-widget-arr-cal-weekday" x-text="wd"></span>
          </template>
        </div>
        <div class="apps-widget-arr-cal-grid">
          <template x-for="week in arrCalendarGrid()" :key="week[0].date">
            <template x-for="cell in week" :key="cell.date">
              <div class="apps-widget-arr-cal-cell-wrap">
                <button type="button" class="apps-widget-arr-cal-cell"
                        :class="{ 'is-out': !cell.inMonth, 'is-today': cell.isToday, 'has-rel': cell.count > 0, 'is-active': arrCalActiveDay() === cell.date }"
                        :disabled="cell.count === 0"
                        @click.stop="cell.count > 0 && arrCalToggleDay(cell.date, $event, item)"
                        :aria-label="cell.date + (cell.count ? (' — ' + cell.count) : '')">
                  <span class="apps-widget-arr-cal-daynum" x-text="cell.day"></span>
                  <span class="apps-widget-arr-cal-dots" x-show="cell.count > 0" aria-hidden="true">
                          <template x-for="(svc, si) in cell.services.slice(0, 4)" :key="si">
                            <span class="apps-widget-arr-cal-dot" :class="'apps-widget-arr-cal-dot--' + svc"></span>
                          </template>
                        </span>
                </button>
              </div>
            </template>
          </template>
        </div>
        <!-- Day popover — TELEPORTED to <body> so it escapes the tile's
             `container-type: size` + `overflow: hidden` clip and renders as a
             position:fixed layer anchored (arrCalPopStyle) to the clicked
             cell. Click-pinned: a transparent backdrop catches outside
             clicks; Esc / page-scroll / resize also close it. Keeps the
             Alpine component scope of this template after teleport. -->
        <template x-teleport="body">
          <div class="apps-widget-arr-cal-pop-layer" x-show="arrCalOpenDay" style="display:none;"
               @keydown.escape.window="arrCalCloseDay()"
               @scroll.window="arrCalCloseDay()"
               @resize.window="arrCalCloseDay()">
            <div class="apps-widget-arr-cal-pop-backdrop" @click="arrCalCloseDay()"></div>
            <div class="apps-widget-arr-cal-pop" :style="arrCalPopStyle()" @click.stop>
              <div class="apps-widget-arr-cal-pop-list scrollbar">
                <template x-for="(rel, ri) in arrCalDayItems(arrCalOpenDay)" :key="ri">
                  <div class="apps-widget-arr-cal-pop-row">
                    <!-- Media-type header (type icon + label + count) before
                         the first item of each type group. -->
                    <div x-show="rel._group_head" class="apps-widget-arr-cal-pop-group">
                      <svg class="apps-widget-arr-cal-pop-typeicon" aria-hidden="true">
                        <use :href="'/img/ui-sprite.svg?v=__APP_VERSION__#' + arrCalTypeIcon(rel.type)"/>
                      </svg>
                      <span x-text="arrCalTypeLabel(rel.type)"></span>
                      <span class="apps-widget-arr-cal-pop-group-count" x-text="rel._group_count"></span>
                    </div>
                    <div class="apps-widget-arr-cal-pop-item">
                      <img x-show="arrCalItemPoster(rel)" :src="arrCalItemPoster(rel)"
                           alt="" loading="lazy" class="apps-widget-arr-cal-pop-poster img-shimmer"
                           @load="$event.target.classList.add('img-loaded')"
                           @error="$event.target.style.display='none'">
                      <div class="apps-widget-arr-cal-pop-meta">
                        <span class="apps-widget-arr-cal-pop-title" x-text="rel.title"></span>
                        <span x-show="rel.subtitle" class="apps-widget-arr-cal-pop-sub" x-text="rel.subtitle"></span>
                        <!-- Facts line — release time (clock) + runtime. -->
                        <span x-show="rel.time || rel.runtime > 0" class="apps-widget-arr-cal-pop-facts">
                          <span x-show="rel.time" class="apps-widget-arr-cal-pop-fact">
                            <svg class="apps-widget-arr-cal-pop-clock" aria-hidden="true">
                              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-clock"/>
                            </svg>
                            <span x-text="_fmtClockTime(rel.time)"></span>
                          </span>
                          <span x-show="rel.runtime > 0" class="apps-widget-arr-cal-pop-fact">
                            <svg class="apps-widget-arr-cal-pop-clock" aria-hidden="true">
                              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-timer"/>
                            </svg>
                            <span x-text="arrCalRuntimeLabel(rel.runtime)"></span>
                          </span>
                        </span>
                        <span x-show="rel.overview" class="apps-widget-arr-cal-pop-overview"
                              x-text="rel.overview"></span>
                        <!-- Action pills — open in the source app + IMDb / TMDB.
                             Gate on RAW fields only (service_slug is always set
                             for an *arr item, so the row always shows); the app
                             pill's href resolves through arrCalItemAppUrl inside.
                             Never call arrCalItemAppUrl in this x-show — if it
                             ever threw, Alpine would hide the ENTIRE pill row
                             (incl. IMDb / TMDB), which is the regression this
                             avoids. -->
                        <span x-show="rel.service_slug || rel.imdb_url || rel.tmdb_url"
                              class="apps-widget-arr-cal-pop-actions">
                          <!-- Source-app chip — ALWAYS shown so the operator sees
                               which *arr the release came from. Clickable (opens
                               the app, deep-linked) when a URL resolves (friendly
                               override or the integration base); a plain identifier
                               chip when neither is set. -->
                          <a x-show="rel.service_slug"
                             :href="arrCalItemAppUrl(rel) || null"
                             target="_blank" rel="noopener noreferrer"
                             class="apps-widget-arr-cal-pop-link apps-widget-arr-cal-pop-link--app"
                             :class="!arrCalItemAppUrl(rel) ? 'apps-widget-arr-cal-pop-link--nolink' : ''"
                             :aria-label="t('apps.custom.widget_arr_calendar_open_in', {app: arrCalServiceLabel(rel.service_slug)})">
                            <img :src="arrCalServiceIcon(rel.service_slug)" alt=""
                                 class="apps-widget-arr-cal-pop-linkicon"
                                 @error="$event.target.style.display='none'">
                            <span x-text="arrCalServiceLabel(rel.service_slug)"></span>
                          </a>
                          <a x-show="rel.imdb_url" :href="rel.imdb_url" target="_blank"
                             rel="noopener noreferrer"
                             class="apps-widget-arr-cal-pop-link">
                            <img src="/img/icons/imdb.svg?v=__APP_VERSION__" alt=""
                                 class="apps-widget-arr-cal-pop-linkicon"
                                 @error="$event.target.style.display='none'">
                            <span x-text="t('apps.custom.widget_arr_calendar_imdb')"></span>
                          </a>
                          <a x-show="rel.tmdb_url" :href="rel.tmdb_url" target="_blank"
                             rel="noopener noreferrer"
                             class="apps-widget-arr-cal-pop-link">
                            <img src="/img/icons/tmdb.svg?v=__APP_VERSION__" alt=""
                                 class="apps-widget-arr-cal-pop-linkicon"
                                 @error="$event.target.style.display='none'">
                            <span x-text="t('apps.custom.widget_arr_calendar_tmdb')"></span>
                          </a>
                        </span>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>
        <div class="apps-widget-arr-cal-legend" x-show="(arrCalendar.services || []).length">
          <template x-for="(svc, li) in (arrCalendar.services || [])" :key="li">
                  <span class="apps-widget-arr-cal-legend-item">
                    <span class="apps-widget-arr-cal-dot" :class="'apps-widget-arr-cal-dot--' + svc" aria-hidden="true"></span>
                    <span x-text="arrCalServiceLabel(svc)"></span>
                  </span>
          </template>
        </div>
      </div>
    </template>
    <!-- Loading state — a provider IS configured (picker/client_config says
         so) but the first month fetch hasn't landed yet. Shows a spinner
         instead of the "configure a service" empty state (which would read as
         a misconfiguration while it's merely loading). -->
    <template x-if="!arrCalendar && arrCalAvailable()">
      <div class="apps-widget-empty">
        <span class="spin apps-widget-arr-cal-spinner" aria-hidden="true"></span>
        <span class="apps-widget-empty-text"
              x-text="t('apps.custom.widget_arr_calendar_loading') || 'Loading upcoming releases…'"></span>
      </div>
    </template>
    <!-- Empty state — no *arr service configured (also the picker hides
         the widget via client_config.arr_calendar_available, but an
         already-placed tile can land here if every *arr is later removed). -->
    <template x-if="(!arrCalendar && !arrCalAvailable()) || (arrCalendar && arrCalendar.configured === false)">
      <div class="apps-widget-empty">
        <svg class="apps-widget-empty-icon" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-calendar"/>
        </svg>
        <span class="apps-widget-empty-text"
              x-text="t('apps.custom.widget_arr_calendar_no_instances') || 'Configure a Radarr / Sonarr / Lidarr / Readarr service in Admin → Apps to see upcoming releases here.'"></span>
      </div>
    </template>
  </div>
</template>
