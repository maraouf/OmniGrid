            <table x-show="aiDashboardLoaded && aiDashboard && aiDashboard.trend.length > 0" class="w-full fs-xs mono">
              <thead>
              <tr class="fs-3xs uppercase tracking-wider text-[var(--text-faint)]">
                <!-- Sortable headers — same shape as the JOBS
                     table above. Trend rows are bucketed by
                     hour from /api/admin/ai/dashboard, so
                     pagination is client-side via
                     `aiTrendRows()` (slice of
                     aiDashboard.trend). Column keys mirror
                     the row dict's actual fields. -->
                <th class="text-start py-1.5"
                    :aria-sort="_sortAria('ts', aiModalSortCol, aiModalSortDir)">
                  <button type="button" @click="aiSortBy('ts')" class="uppercase tracking-wider hover:text-[var(--text)]">
                    <span x-text="t('admin.ai.modal.col_when')"></span><span x-text="aiSortIndicator('ts')"></span>
                  </button>
                </th>
                <th class="text-end py-1.5"
                    :aria-sort="_sortAria('jobs', aiModalSortCol, aiModalSortDir)">
                  <button type="button" @click="aiSortBy('jobs')" class="uppercase tracking-wider hover:text-[var(--text)]">
                    <span x-text="t('admin.ai.modal.col_jobs')"></span><span x-text="aiSortIndicator('jobs')"></span>
                  </button>
                </th>
                <th class="text-end py-1.5"
                    :aria-sort="_sortAria('pass_rate', aiModalSortCol, aiModalSortDir)">
                  <button type="button" @click="aiSortBy('pass_rate')" class="uppercase tracking-wider hover:text-[var(--text)]">
                    <span x-text="t('admin.ai.modal.col_pass_rate')"></span><span x-text="aiSortIndicator('pass_rate')"></span>
                  </button>
                </th>
                <th class="text-end py-1.5"
                    :aria-sort="_sortAria('total_tokens', aiModalSortCol, aiModalSortDir)">
                  <button type="button" @click="aiSortBy('total_tokens')" class="uppercase tracking-wider hover:text-[var(--text)]">
                    <span x-text="t('admin.ai.modal.col_tokens')"></span><span x-text="aiSortIndicator('total_tokens')"></span>
                  </button>
                </th>
                <th class="text-end py-1.5"
                    :aria-sort="_sortAria('total_cost_usd', aiModalSortCol, aiModalSortDir)">
                  <button type="button" @click="aiSortBy('total_cost_usd')" class="uppercase tracking-wider hover:text-[var(--text)]">
                    <span x-text="t('admin.ai.modal.col_cost')"></span><span x-text="aiSortIndicator('total_cost_usd')"></span>
                  </button>
                </th>
                <th class="text-end py-1.5"
                    :aria-sort="_sortAria('avg_accuracy_score', aiModalSortCol, aiModalSortDir)">
                  <button type="button" @click="aiSortBy('avg_accuracy_score')" class="uppercase tracking-wider hover:text-[var(--text)]">
                    <span x-text="t('admin.ai.modal.col_accuracy')"></span><span x-text="aiSortIndicator('avg_accuracy_score')"></span>
                  </button>
                </th>
              </tr>
              </thead>
              <tbody>
              <!-- Loop variable is `row`, NOT `t` — using
                   `t` would shadow the global `t()` i18n
                   helper inside the loop scope. -->
              <template x-for="row in aiTrendRows()" :key="row.ts">
                <tr class="border-t border-[var(--border)]">
                  <td class="py-1" x-text="aiFormatTime(row.ts)"></td>
                  <td class="py-1 text-end" x-text="row.jobs"></td>
                  <td class="py-1 text-end" x-text="Math.round((row.pass_rate || 0) * 100) + '%'"></td>
                  <td class="py-1 text-end" x-text="aiFormatNumber(row.total_tokens || 0)"></td>
                  <td class="py-1 text-end" x-text="aiFormatCost(row.total_cost_usd)"></td>
                  <td class="py-1 text-end" x-text="aiFormatPct01(row.avg_accuracy_score)"></td>
                </tr>
              </template>
              </tbody>
            </table>
            <!-- Paginator — same shape as the JOBS modal. Trend
                 rows page client-side; no extra round-trip on
                 Prev/Next. -->
            <div x-show="aiDashboard && aiDashboard.trend.length > 0 && aiModalTotalPages() > 1"
                 class="flex items-center justify-between gap-3 mt-3 fs-xs">
                    <span class="text-[var(--text-faint)]"
                          x-text="t('admin.ai.modal.page_label', { page: aiModalPage, total: aiModalTotalPages() })"></span>
              <div class="inline-flex items-center gap-2">
                <button type="button"
                        :disabled="aiModalPage <= 1"
                        @click="aiModalGoPage(aiModalPage - 1)"
                        class="btn btn-ghost fs-xs"
                        x-text="t('pagination.prev')"></button>
                <button type="button"
                        :disabled="aiModalPage >= aiModalTotalPages()"
                        @click="aiModalGoPage(aiModalPage + 1)"
                        class="btn btn-ghost fs-xs"
                        x-text="t('pagination.next')"></button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
