<!--suppress HtmlUnknownAttribute, HtmlFormInputWithoutLabel, RequiredAttributes -->
<section x-show="adminTab==='apps'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
  <!-- Apps feature — reusable service-template catalog + cross-host
       instance overview. The data spine is the existing per-host
       services[] array (managed via Admin → Hosts); this tab is
       where operators curate the catalog templates that chips can
       optionally link to via `catalog_id`. -->
  <div class="flex items-center justify-between gap-2 mb-2">
    <div class="flex items-center gap-2">
      <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-grid"/>
      </svg>
      <h3 class="font-semibold fs-md" x-text="t('admin_apps.title') || 'Apps'"></h3>
    </div>
    <span class="chip pill-info fs-2xs"
          x-text="(appsCatalog.length || 0) + ' ' + (t('admin_apps.templates_pill') || 'templates')"></span>
  </div>
  <p class="fs-xs text-[var(--text-faint)] mb-3 leading-snug max-w-[720px]"
     x-text="t('admin_apps.intro') || 'Reusable service templates. Each row carries default ports + probe paths + brand-icon slug so a chip in Admin → Hosts can inherit recipe defaults via catalog_id instead of redefining per host. Built-in seed covers ~15 essentials; add operator-authored templates for in-house services.'"></p>

  <!-- App-extras freshness TTL — relocated here from Admin → Config so
       the knob lives next to the feature it governs. Controls how stale a
       per-card extras (Speedtest / APC) /app-data entry may get before a
       background refresh fires (stale-while-revalidate). Section-owned
       save: editing flips the amber Save ring; saveAppsSettingsSection()
       POSTs it in one body. Same bounds-chips + effective-label shape every
       Admin → Config row uses. -->
  <div x-show="tuningLoaded" class="mb-4 pb-4 border-b border-[var(--border)] space-y-2">
    <template x-for="key in ['tuning_apps_extras_ttl_seconds']" :key="key">
      <div>
        <label class="block fs-xs font-medium mb-1" :for="'apps-' + key"
               x-text="t('admin.config.fields.' + key + '.label')"></label>
        <p class="fs-2xs text-[var(--text-faint)] leading-snug mb-2"
           x-text="t('admin.config.fields.' + key + '.help')"></p>
        <div class="flex flex-wrap items-center gap-2">
          <label class="contents">
            <input type="number" :id="'apps-' + key"
                   :aria-label="t('admin.config.fields.' + key + '.label')"
                   x-model="tuningForm[key]" :placeholder="tuningPlaceholder(key)"
                   :min="(tuningEffective[key] || {}).min" :max="(tuningEffective[key] || {}).max"
                   :disabled="!isAdmin() || appsSettingsSaving"
                   class="w-44 mono fs-sm py-1">
          </label>
          <div class="bounds-chips" role="group" :aria-label="t('admin.config.bounds.group_label')">
            <span class="bounds-chip bounds-chip--min" :title="t('admin.config.bounds.min_title')">
              <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
              <span x-text="(tuningEffective[key] || {}).min"></span>
            </span>
            <span class="bounds-chip bounds-chip--max" :title="t('admin.config.bounds.max_title')">
              <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/></svg>
              <span x-text="(tuningEffective[key] || {}).max"></span>
            </span>
            <span class="bounds-chip bounds-chip--default" :title="t('admin.config.bounds.default_title')">
              <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/></svg>
              <span x-text="(tuningEffective[key] || {}).default"></span>
            </span>
          </div>
          <span class="fs-2xs text-[var(--text-faint)] ms-auto" x-text="tuningEffectiveLabel(key)"></span>
        </div>
        <div class="mt-2 flex items-center gap-2 flex-wrap">
          <button type="button" x-show="isAdmin()" @click="saveAppsSettingsSection()"
                  class="btn btn-primary fs-sm"
                  :class="appsSettingsSectionDirty() ? 'ring-2 ring-[var(--warning)]' : ''"
                  :disabled="appsSettingsSaving || !appsSettingsSectionDirty()">
            <span x-show="!appsSettingsSaving" x-text="t('actions.save')"></span>
            <span x-show="appsSettingsSaving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving') || 'Saving…'"></span></span>
          </button>
          <span x-show="appsSettingsSectionDirty()" class="fs-xs text-[var(--warning)] flex items-center gap-1.5" :title="t('common.unsaved_title')">
            <span class="w-1.5 h-1.5 rounded-full bg-[var(--warning)] animate-pulse"></span>
            <span class="unsaved-flash" x-text="t('hosts_actions.unsaved_label')"></span>
          </span>
        </div>
      </div>
    </template>
  </div>

  <!-- Tab strip — Templates / Instances. Delegated to the shared
       og-tab-strip partial for the blue-pill active state + leading
       sprite icons, matching the Providers tab strip for cross-admin
       consistency. The two panels below mirror the component's
       `apps-admin-tabpanel-<value>` / `apps-admin-tab-<value>`
       id naming so the WAI-ARIA Tabs wiring stays intact. -->
  <div x-data="{
                 get tsOptions() {
                   return [
                     {value: 'templates', label: t('admin_apps.tab_templates') || 'Templates', iconKind: 'sprite', iconId: 'icon-grid'},
                     {value: 'instances', label: t('admin_apps.tab_instances') || 'Instances', iconKind: 'sprite', iconId: 'icon-server'},
                   ];
                 },
                 get tsCurrent() { return appsAdminTab; },
                 tsOnChange(v) { setAppsAdminTab(v); },
                 tsCycle(dir) {
                   const order = ['templates', 'instances'];
                   const i = order.indexOf(appsAdminTab);
                   const n = order.length;
                   setAppsAdminTab(order[(((i < 0 ? 0 : i) + dir) % n + n) % n]);
                 },
                 tsHome() { setAppsAdminTab('templates'); },
                 tsEnd() { setAppsAdminTab('instances'); },
                 get tsAriaLabel() { return t('admin_apps.tablist_label') || 'Apps sub-tabs'; },
                 tsIdPrefix: 'apps-admin'
               }">
    <!-- INCLUDE: _components/og-tab-strip.html -->
  </div>

  <!-- TEMPLATES TAB -->
  <div x-show="appsAdminTab === 'templates'" role="tabpanel"
       id="apps-admin-tabpanel-templates" aria-labelledby="apps-admin-tab-templates" tabindex="0">
    <div class="flex items-center gap-2 mb-3 flex-wrap">
      <button type="button" x-show="isAdmin()" @click="openAppCatalogNew()"
              class="btn btn-soft fs-sm inline-flex items-center gap-1.5">
        <svg width="13" height="13" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-plus"/>
        </svg>
        <span x-text="t('admin_apps.add_template') || 'Add template'"></span>
      </button>
      <button type="button" x-show="isAdmin()" @click="openAppsDiscoverWizard()"
              class="btn btn-soft fs-sm inline-flex items-center gap-1.5"
              :title="t('admin_apps.discover_title') || 'Match a host’s open ports against catalog templates'">
        <svg width="13" height="13" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-search"/>
        </svg>
        <span x-text="t('admin_apps.discover_button') || 'Discover on host…'"></span>
      </button>
      <button type="button" x-show="isAdmin()" @click="reseedAppCatalog()"
              class="btn btn-soft fs-sm inline-flex items-center gap-1.5"
              :disabled="appsCatalogReseeding"
              :title="t('admin_apps.reseed_title') || 'Re-add any built-in templates you deleted'">
        <svg width="13" height="13" :class="appsCatalogReseeding ? 'spin-md' : ''" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-cw"/>
        </svg>
        <span x-text="t('admin_apps.reseed_button') || 'Re-seed built-ins'"></span>
      </button>
      <button type="button" x-show="isAdmin()" @click="exportAppCatalog()"
              class="btn btn-soft fs-sm inline-flex items-center gap-1.5"
              :title="t('admin_apps.export_title') || 'Download all templates as a JSON pack'">
        <svg width="13" height="13" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-download"/>
        </svg>
        <span x-text="t('admin_apps.export_button') || 'Export'"></span>
      </button>
      <button type="button" x-show="isAdmin()" @click="$refs.catalogImportFile.click()"
              class="btn btn-soft fs-sm inline-flex items-center gap-1.5"
              :disabled="appsCatalogImporting"
              :title="t('admin_apps.import_title') || 'Import a catalog pack (upsert templates by slug)'">
        <svg width="13" height="13" :class="appsCatalogImporting ? 'spin-md' : ''" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-upload"/>
        </svg>
        <span x-text="t('admin_apps.import_button') || 'Import'"></span>
      </button>
      <!-- Hidden file picker for Import — click()'d by the Import button. -->
      <input type="file" accept="application/json,.json" x-ref="catalogImportFile" class="hidden"
             @change="importAppCatalog($event)">
      <span x-show="appsCatalogStatus" class="fs-xs text-[var(--text-faint)]" x-text="appsCatalogStatus"></span>
    </div>

    <!-- Search / filter — client-side over name / slug / description / port.
         Full-width input (we have the room) with the match count beside it. -->
    <div x-show="appsCatalogLoaded" class="mb-3">
      <div class="flex items-center gap-2">
        <div class="inline-flex items-center gap-1.5 flex-1">
          <svg width="14" height="14" class="text-[var(--text-faint)] flex-shrink-0" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-search"/>
          </svg>
          <input type="search" x-model="appsCatalogSearch" class="fs-sm flex-1 w-full"
                 :placeholder="t('admin_apps.search_placeholder') || 'Search templates by name, slug, or port…'"
                 :aria-label="t('admin_apps.search_placeholder') || 'Search templates'">
        </div>
        <span x-show="appsCatalogSearch.trim()" class="fs-2xs text-[var(--text-faint)] flex-shrink-0 whitespace-nowrap"
              x-text="t('admin_apps.search_count', { shown: filteredAppsCatalog().length, total: appsCatalog.length }) || (filteredAppsCatalog().length + ' / ' + appsCatalog.length)"></span>
      </div>
    </div>

    <!-- Bulk-delete bar — appears when ≥1 template row is checked. Removes
         every selected catalog template in one action (count-named confirm). -->
    <div x-show="appsCatalogLoaded && appsCatalogSelectedCount() > 0"
         class="flex items-center gap-2 mb-3 p-2 rounded border border-[var(--border)] bg-[var(--surface-2)]">
      <span class="fs-xs text-[var(--text-dim)]"
            x-text="t('admin_apps.bulk_selected', { n: appsCatalogSelectedCount() }) || (appsCatalogSelectedCount() + ' selected')"></span>
      <button type="button" class="btn btn-danger fs-2xs inline-flex items-center gap-1 ms-auto"
              :disabled="appsCatalogBulkDeleting"
              @click="bulkDeleteCatalog()"
              :title="t('admin_apps.bulk_delete_templates_title') || 'Delete all selected templates'">
        <svg width="12" height="12" :class="appsCatalogBulkDeleting ? 'spin-md' : ''" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash"/>
        </svg>
        <span x-text="t('admin_apps.bulk_delete', { n: appsCatalogSelectedCount() }) || ('Delete (' + appsCatalogSelectedCount() + ')')"></span>
      </button>
      <button type="button" class="btn btn-soft fs-2xs" @click="clearCatalogSelection()"
              x-text="t('admin_apps.bulk_clear') || 'Clear'"></button>
    </div>

    <div x-show="!appsCatalogLoaded" class="loading-state">
      <span class="spin-lg" aria-hidden="true"></span>
      <span class="fs-sm text-[var(--text-dim)]" x-text="t('common.loading') || 'Loading…'"></span>
    </div>

    <table x-show="appsCatalogLoaded" class="w-full fs-sm">
      <thead>
      <tr class="text-[var(--text-dim)] border-b border-[var(--border)]">
        <th class="text-start py-2 ps-2 w-[28px]">
          <input type="checkbox" :checked="appsCatalogAllSelected()"
                 x-effect="$el.indeterminate = appsCatalogSelectedCount() > 0 && !appsCatalogAllSelected()"
                 @click.stop="toggleSelectAllCatalog()"
                 :aria-label="t('admin_apps.bulk_select_all') || 'Select all'">
        </th>
        <th class="text-start py-2 ps-2 w-[36px]"></th>
        <th class="text-start py-2" x-text="t('admin_apps.col_name') || 'Name'"></th>
        <th class="text-start py-2 hidden md:table-cell" x-text="t('admin_apps.col_slug') || 'Slug'"></th>
        <th class="text-start py-2" x-text="t('admin_apps.col_ports') || 'Default ports'"></th>
        <th class="text-start py-2 hidden lg:table-cell" x-text="t('admin_apps.col_source') || 'Source'"></th>
        <th class="text-end py-2 pe-2 w-[110px]"></th>
      </tr>
      </thead>
      <tbody>
      <template x-for="entry in filteredAppsCatalog()" :key="entry.id">
        <tr class="border-b border-[var(--border)] hover:bg-[var(--row-hover)]"
            :class="isCatalogSelected(entry) ? 'bg-[var(--row-hover)]' : ''">
          <td class="py-2 ps-2" @click.stop>
            <input type="checkbox" :checked="isCatalogSelected(entry)"
                   @click.stop="toggleCatalogSelected(entry)"
                   :aria-label="t('admin_apps.bulk_select_row') || 'Select'">
          </td>
          <td class="py-2 ps-2">
            <img :src="iconUrlFor(entry.icon || entry.slug)" alt="" width="22" height="22" class="rounded"
                 @error="$event.target.style.visibility='hidden'">
          </td>
          <td class="py-2">
            <div class="font-medium" x-text="entry.name"></div>
            <div class="fs-2xs text-[var(--text-faint)]" x-text="entry.description || ''"></div>
          </td>
          <td class="py-2 hidden md:table-cell">
            <code class="fs-xs text-[var(--text-dim)]" x-text="entry.slug"></code>
          </td>
          <td class="py-2">
            <div class="flex flex-wrap gap-1">
              <template x-for="p in (entry.default_ports || [])" :key="p.port + ':' + p.protocol">
                        <span class="chip pill-muted fs-2xs inline-flex items-center gap-0.5 whitespace-nowrap"
                              :title="(p.label || '') + ' (' + p.protocol + ')' + (p.open_url ? ' — ' + (t('admin_apps.port_open_url') || 'opens as URL') : '')">
                          <!-- Link indicator: this port is marked open-as-URL
                               (clickable in the Apps view) — visible without
                               opening the edit popup. -->
                          <svg x-show="p.open_url" width="9" height="9" class="flex-shrink-0 text-[var(--primary)]" aria-hidden="true">
                            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-external-link"/>
                          </svg>
                          <span x-text="p.port + '/' + (p.protocol || 'tcp')"></span>
                        </span>
              </template>
              <span x-show="!(entry.default_ports || []).length" class="fs-2xs text-[var(--text-faint)] italic" x-text="t('admin_apps.no_ports') || 'no ports'"></span>
            </div>
          </td>
          <td class="py-2 hidden lg:table-cell">
                    <span class="chip fs-2xs"
                          :class="entry.source === 'builtin' ? 'pill-info' : 'pill-ok'"
                          x-text="entry.source === 'builtin' ? (t('admin_apps.source_builtin') || 'built-in') : (t('admin_apps.source_operator') || 'operator')"></span>
          </td>
          <td class="py-2 pe-2 text-end">
            <button type="button" class="user-action-btn"
                    :aria-label="t('admin_apps.pin_to_host') || 'Pin to a host'"
                    :title="t('admin_apps.pin_to_host') || 'Pin to a host'"
                    @click="openAppCatalogPin(entry)">
              <svg width="14" height="14" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-link"/>
              </svg>
            </button>
            <button type="button" class="user-action-btn"
                    :aria-label="t('admin_apps.edit') || 'Edit template'"
                    :title="t('admin_apps.edit') || 'Edit template'"
                    @click="openAppCatalogEdit(entry)">
              <svg width="14" height="14" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-pencil"/>
              </svg>
            </button>
            <button type="button" class="user-action-btn user-action-btn--danger"
                    :aria-label="t('admin_apps.delete') || 'Delete template'"
                    :title="t('admin_apps.delete') || 'Delete template'"
                    @click="deleteAppCatalogEntry(entry)">
              <svg width="14" height="14" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash"/>
              </svg>
            </button>
          </td>
        </tr>
      </template>
      <tr x-show="appsCatalogLoaded && !appsCatalog.length">
        <td colspan="7" class="py-6 text-center text-[var(--text-faint)] fs-sm" x-text="t('admin_apps.empty_templates') || 'No templates yet — click Add or Re-seed built-ins.'"></td>
      </tr>
      <tr x-show="appsCatalogLoaded && appsCatalog.length && !filteredAppsCatalog().length">
        <td colspan="7" class="py-6 text-center text-[var(--text-faint)] fs-sm"
            x-text="t('admin_apps.search_no_match', { q: appsCatalogSearch }) || ('No templates match “' + appsCatalogSearch + '”')"></td>
      </tr>
      </tbody>
    </table>
  </div>

  <!-- INSTANCES TAB -->
  <div x-show="appsAdminTab === 'instances'" role="tabpanel"
       id="apps-admin-tabpanel-instances" aria-labelledby="apps-admin-tab-instances" tabindex="0">
    <p class="fs-xs text-[var(--text-faint)] mb-3" x-text="t('admin_apps.instances_intro') || 'Every app chip pinned to a host. Catalog-linked instances inherit their name + icon from the template; click a row (or the edit icon) to change name / URL / icon / probe, or remove the chip.'"></p>
    <div x-show="appsInstancesLoaded && appsInstances.length" class="flex items-center gap-1.5 mb-3 flex-wrap">
      <div class="flex items-center gap-1.5"
           role="group" :aria-label="t('admin_apps.group_by_label') || 'Group instances by'">
        <span class="fs-2xs text-[var(--text-faint)] me-1" x-text="(t('admin_apps.group_by_label') || 'Group by') + ':'"></span>
        <button type="button" class="btn fs-2xs"
                :class="appsInstancesGroupBy === 'host' ? 'btn-primary' : 'btn-soft'"
                :aria-pressed="appsInstancesGroupBy === 'host'"
                @click="setAppsInstancesGroupBy('host')" x-text="t('admin_apps.group_by_host') || 'Host'"></button>
        <button type="button" class="btn fs-2xs"
                :class="appsInstancesGroupBy === 'service' ? 'btn-primary' : 'btn-soft'"
                :aria-pressed="appsInstancesGroupBy === 'service'"
                @click="setAppsInstancesGroupBy('service')" x-text="t('admin_apps.group_by_service') || 'Service'"></button>
        <button type="button" class="btn fs-2xs"
                :class="appsInstancesGroupBy === 'none' ? 'btn-primary' : 'btn-soft'"
                :aria-pressed="appsInstancesGroupBy === 'none'"
                @click="setAppsInstancesGroupBy('none')" x-text="t('admin_apps.group_by_none') || 'None'"></button>
      </div>
      <!-- Collapse / expand every group at once — only meaningful when
           the table is actually grouped (the 'none' mode has no
           collapsible headers). -->
      <div x-show="appsInstancesGroupBy !== 'none'" class="flex items-center gap-1.5 ms-auto">
        <button type="button" class="btn btn-soft fs-2xs inline-flex items-center gap-1"
                @click="expandAllAppsInstanceGroups()"
                :title="t('admin_apps.expand_all_title') || 'Expand every group'">
          <svg width="11" height="11" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-down"/>
          </svg>
          <span x-text="t('admin_apps.expand_all') || 'Expand all'"></span>
        </button>
        <button type="button" class="btn btn-soft fs-2xs inline-flex items-center gap-1"
                @click="collapseAllAppsInstanceGroups()"
                :title="t('admin_apps.collapse_all_title') || 'Collapse every group'">
          <svg width="11" height="11" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-up"/>
          </svg>
          <span x-text="t('admin_apps.collapse_all') || 'Collapse all'"></span>
        </button>
      </div>
    </div>
    <!-- Search / filter — client-side over name / catalog / host / port. -->
    <div x-show="appsInstancesLoaded && appsInstances.length" class="mb-3">
      <div class="flex items-center gap-2">
        <div class="inline-flex items-center gap-1.5 flex-1">
          <svg width="14" height="14" class="text-[var(--text-faint)] flex-shrink-0" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-search"/>
          </svg>
          <input type="search" x-model="appsInstancesSearch" class="fs-sm flex-1 w-full"
                 :placeholder="t('admin_apps.instances_search_placeholder') || 'Search instances by name, host, or port…'"
                 :aria-label="t('admin_apps.instances_search_placeholder') || 'Search instances'">
        </div>
        <span x-show="appsInstancesSearch.trim()" class="fs-2xs text-[var(--text-faint)] flex-shrink-0 whitespace-nowrap"
              x-text="t('admin_apps.search_count', { shown: appsInstancesMatchCount(), total: appsInstances.length }) || (appsInstancesMatchCount() + ' / ' + appsInstances.length)"></span>
      </div>
    </div>
    <!-- Bulk-delete bar — appears when ≥1 instance row is checked. Removes
         every selected chip in one action (count-named confirm). -->
    <div x-show="appsInstancesLoaded && appsInstancesSelectedCount() > 0"
         class="flex items-center gap-2 mb-3 p-2 rounded border border-[var(--border)] bg-[var(--surface-2)]">
      <span class="fs-xs text-[var(--text-dim)]"
            x-text="t('admin_apps.bulk_selected', { n: appsInstancesSelectedCount() }) || (appsInstancesSelectedCount() + ' selected')"></span>
      <button type="button" class="btn btn-danger fs-2xs inline-flex items-center gap-1 ms-auto"
              :disabled="appsInstancesBulkDeleting"
              @click="bulkDeleteInstances()"
              :title="t('admin_apps.bulk_delete_title') || 'Remove all selected instances'">
        <svg width="12" height="12" :class="appsInstancesBulkDeleting ? 'spin-md' : ''" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash"/>
        </svg>
        <span x-text="t('admin_apps.bulk_delete', { n: appsInstancesSelectedCount() }) || ('Delete (' + appsInstancesSelectedCount() + ')')"></span>
      </button>
      <button type="button" class="btn btn-soft fs-2xs" @click="clearInstanceSelection()"
              x-text="t('admin_apps.bulk_clear') || 'Clear'"></button>
    </div>
    <div x-show="!appsInstancesLoaded" class="loading-state">
      <span class="spin-lg" aria-hidden="true"></span>
      <span class="fs-sm text-[var(--text-dim)]" x-text="t('common.loading') || 'Loading…'"></span>
    </div>
    <table x-show="appsInstancesLoaded" class="w-full fs-sm">
      <thead>
      <tr class="text-[var(--text-dim)] border-b border-[var(--border)]">
        <th class="text-start py-2 ps-2 w-[28px]">
          <input type="checkbox" :checked="appsInstancesAllSelected()"
                 x-effect="$el.indeterminate = appsInstancesSelectedCount() > 0 && !appsInstancesAllSelected()"
                 @click.stop="toggleSelectAllInstances()"
                 :aria-label="t('admin_apps.bulk_select_all') || 'Select all instances'">
        </th>
        <th class="text-start py-2 ps-2 w-[36px]"></th>
        <th class="text-start py-2" x-text="t('admin_apps.col_name') || 'Name'"></th>
        <th class="text-start py-2" x-text="t('admin_apps.col_host') || 'Host'"></th>
        <th class="text-start py-2 hidden md:table-cell" x-text="t('admin_apps.col_catalog') || 'Catalog'"></th>
        <th class="text-start py-2" x-text="t('admin_apps.col_status') || 'Status'"></th>
        <th class="text-start py-2 hidden md:table-cell" x-text="t('admin_apps.col_ports_instance') || 'Ports'"></th>
        <th class="text-end py-2 pe-2" x-text="t('admin_apps.col_actions') || 'Actions'"></th>
      </tr>
      </thead>
      <template x-for="grp in appsInstancesGroups()" :key="grp.key">
        <tbody>
        <tr x-show="grp.key !== '__all__'" class="cursor-pointer select-none bg-[var(--surface-2)]"
            @click="toggleAppsInstanceGroup(grp.key)">
          <td colspan="8" class="py-1.5 px-2 border-y border-[var(--border)]">
              <span class="inline-flex items-center gap-1.5 fs-xs font-semibold">
                <svg width="11" height="11" class="flip-rtl" aria-hidden="true"
                     :style="appsInstancesCollapsed[grp.key] ? '' : 'transform: rotate(90deg)'">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
                </svg>
                <span x-text="grp.label"></span>
                <span class="chip pill-muted fs-3xs" x-text="grp.count"></span>
              </span>
          </td>
        </tr>
        <template x-for="inst in (appsInstancesCollapsed[grp.key] ? [] : grp.items)" :key="inst.host_id + ':' + inst.service_idx">
          <tr class="border-b border-[var(--border)] hover:bg-[var(--row-hover)] cursor-pointer"
              :class="isInstanceSelected(inst) ? 'bg-[var(--row-hover)]' : ''"
              @click="openInstanceEdit(inst)">
            <td class="py-2 ps-2" @click.stop>
              <input type="checkbox" :checked="isInstanceSelected(inst)"
                     @click.stop="toggleInstanceSelected(inst)"
                     :aria-label="t('admin_apps.bulk_select_row') || 'Select instance'">
            </td>
            <td class="py-2 ps-2">
              <img :src="iconUrlFor(inst.icon || inst.catalog_slug || inst.name)" alt="" width="22" height="22" class="rounded"
                   @error="$event.target.style.visibility='hidden'">
            </td>
            <td class="py-2 font-medium">
              <span x-text="inst.name || '—'"></span>
              <!-- Tiny Docker-linked indicator — shows ONLY when the chip is
                   linked to a container / stack, so rows WITHOUT it stand out
                   as candidates to link. Title names the target. -->
              <svg x-show="inst.docker_container || inst.docker_stack"
                   width="11" height="11" class="inline-block ms-1 text-[var(--primary)] align-[-1px]"
                   aria-hidden="true"
                   :title="t('admin_apps.docker_linked_title', { target: inst.docker_container || inst.docker_stack }) || ('Linked to Docker: ' + (inst.docker_container || inst.docker_stack))">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-link"/>
              </svg>
            </td>
            <td class="py-2">
              <code class="fs-xs text-[var(--text-dim)]"
                    x-text="inst.host_address || inst.host_id"></code>
              <div x-show="inst.host_label && inst.host_label !== (inst.host_address || inst.host_id)"
                   class="fs-3xs text-[var(--text-faint)] italic"
                   x-text="inst.host_label"></div>
            </td>
            <td class="py-2 hidden md:table-cell">
              <span x-show="inst.catalog_name" class="chip pill-info fs-2xs" x-text="inst.catalog_name"></span>
              <span x-show="!inst.catalog_name" class="fs-2xs text-[var(--text-faint)] italic" x-text="t('admin_apps.unlinked') || '— unlinked —'"></span>
            </td>
            <td class="py-2">
                <span class="chip fs-2xs"
                      :class="inst.status === 'up' ? 'pill-ok' : (inst.status === 'down' ? 'pill-error' : 'pill-muted')"
                      x-text="t('admin_apps.status_' + inst.status) || inst.status"></span>
            </td>
            <td class="py-2 hidden md:table-cell">
              <div class="flex flex-wrap gap-1">
                <template x-for="p in (inst.ports || [])" :key="p.port + ':' + (p.protocol || 'tcp')">
                    <span class="chip pill-muted fs-2xs inline-flex items-center gap-0.5 whitespace-nowrap"
                          :title="(p.label || '') + ' (' + (p.protocol || 'tcp') + ')' + (p.open_url ? ' — ' + (t('admin_apps.port_open_url') || 'opens as URL') : '')">
                      <!-- Open-as-URL indicator (inherited from the template at
                           pin time, or set per-chip) — see it without opening
                           the edit popup. -->
                      <svg x-show="p.open_url" width="9" height="9" class="flex-shrink-0 text-[var(--primary)]" aria-hidden="true">
                        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-external-link"/>
                      </svg>
                      <span x-text="p.port + '/' + (p.protocol || 'tcp')"></span>
                    </span>
                </template>
                <span x-show="!(inst.ports || []).length" class="fs-2xs text-[var(--text-faint)] italic"
                      x-text="t('admin_apps.no_ports') || 'no ports'"></span>
              </div>
            </td>
            <td class="py-2 pe-2 text-end whitespace-nowrap">
              <button type="button" class="user-action-btn" @click.stop="openInstanceEdit(inst)"
                      :aria-label="t('admin_apps.action_edit') || 'Edit instance'"
                      :title="t('admin_apps.action_edit') || 'Edit instance'">
                <svg width="14" height="14" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-edit"/>
                </svg>
              </button>
              <button type="button" class="user-action-btn user-action-btn--danger" @click.stop="deleteInstance(inst)"
                      :aria-label="t('admin_apps.action_delete') || 'Remove instance'"
                      :title="t('admin_apps.action_delete') || 'Remove instance'">
                <svg width="14" height="14" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash"/>
                </svg>
              </button>
            </td>
          </tr>
        </template>
        </tbody>
      </template>
      <tbody x-show="appsInstancesLoaded && !appsInstances.length">
      <tr>
        <td colspan="8" class="py-6 text-center text-[var(--text-faint)] fs-sm">
          <div class="mb-2" x-text="t('admin_apps.empty_instances') || 'No app instances yet.'"></div>
          <div class="flex items-center justify-center gap-2 flex-wrap">
            <button type="button" class="btn btn-soft fs-sm inline-flex items-center gap-1.5"
                    @click="setAppsAdminTab('templates')">
              <svg width="13" height="13" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-link"/>
              </svg>
              <span x-text="t('admin_apps.empty_instances_pin_cta') || 'Pin from Templates'"></span>
            </button>
            <button type="button" class="btn btn-soft fs-sm inline-flex items-center gap-1.5"
                    @click="setAppsAdminTab('templates'); openAppsDiscoverWizard()">
              <svg width="13" height="13" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-search"/>
              </svg>
              <span x-text="t('admin_apps.empty_instances_discover_cta') || 'Run Discovery wizard'"></span>
            </button>
          </div>
          <p class="fs-2xs text-[var(--text-faint)] mt-3" x-text="t('admin_apps.empty_instances_hint') || 'Tip: on the Templates tab, click the link icon on any catalog row to pin it to a host.'"></p>
        </td>
      </tr>
      </tbody>
      <tbody x-show="appsInstancesLoaded && appsInstances.length && appsInstancesSearch.trim() && appsInstancesMatchCount() === 0">
      <tr>
        <td colspan="8" class="py-6 text-center text-[var(--text-faint)] fs-sm"
            x-text="t('admin_apps.instances_search_no_match', { q: appsInstancesSearch }) || ('No instances match “' + appsInstancesSearch + '”')"></td>
      </tr>
      </tbody>
    </table>
  </div>

  <!-- INLINE TEMPLATE EDITOR — opens via openAppCatalogNew / openAppCatalogEdit.
       Modal-ish overlay; not a true modal but reuses the .drawer pattern
       to stay inside the admin section's flow. The data-apps-editor-anchor
       attribute is the target the SPA scrolls into view when the editor
       opens — without it the operator on a long catalog table clicked
       Edit on a row at the bottom and the editor opened below the fold. -->
  <div x-show="appsCatalogEditOpen" data-apps-editor-anchor class="mt-5 pt-4 border-t border-[var(--border)] space-y-3" x-cloak>
    <div class="flex items-center justify-between">
      <h4 class="font-semibold fs-md" x-text="appsCatalogEdit.id ? (t('admin_apps.edit_title') || 'Edit template') : (t('admin_apps.new_title') || 'New template')"></h4>
      <button type="button" class="user-action-btn"
              :aria-label="t('actions.close') || 'Close'"
              @click="closeAppCatalogEditor()">
        <svg width="14" height="14" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-x"/>
        </svg>
      </button>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
      <div>
        <label class="block fs-xs font-medium mb-1" x-text="t('admin_apps.field_name') || 'Name'"></label>
        <input type="text" class="w-full" maxlength="128" x-model="appsCatalogEdit.name">
      </div>
      <div>
        <label class="block fs-xs font-medium mb-1" x-text="t('admin_apps.field_slug') || 'Slug'"></label>
        <input type="text" class="w-full" maxlength="64" x-model="appsCatalogEdit.slug"
               :placeholder="t('admin_apps.field_slug_placeholder') || 'auto from name'">
      </div>
      <div>
        <label class="block fs-xs font-medium mb-1" x-text="t('admin_apps.field_icon') || 'Icon slug'"></label>
        <input type="text" class="w-full" maxlength="64" x-model="appsCatalogEdit.icon"
               :placeholder="t('admin_apps.field_icon_placeholder') || 'defaults to slug'">
      </div>
      <div>
        <label class="block fs-xs font-medium mb-1" x-text="t('admin_apps.field_description') || 'Description'"></label>
        <input type="text" class="w-full" maxlength="512" x-model="appsCatalogEdit.description">
      </div>
    </div>

    <!-- Template-level "Show extras" — applies to every instance pinned
         to this template unless a per-instance override is set. Gated
         on `appsTemplateSupportsExtras(...)` — registry-driven via
         `window.OG_APPS_EXTENDERS`; any template whose slug matches
         a registered per-app SPA module (under `static/js/apps/`)
         qualifies. The checkbox renders only where there's something
         to opt out of. -->
    <div x-show="appsTemplateSupportsExtras(appsCatalogEdit.slug || appsCatalogEdit.name)">
      <label class="inline-flex items-center gap-2 fs-sm">
        <input type="checkbox" x-model="appsCatalogEdit.show_extras">
        <span x-text="t('admin_apps.template_show_extras') || 'Show extras (UPS stats etc.) on app cards by default'"></span>
      </label>
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('admin_apps.template_show_extras_hint') || 'Per-instance overrides take precedence. Uncheck here to hide by default but allow individual hosts to opt in.'"></p>
    </div>

    <div>
      <div class="flex items-center justify-between mb-1">
        <label class="block fs-xs font-medium" x-text="t('admin_apps.field_ports') || 'Default ports'"></label>
        <button type="button" class="btn btn-soft fs-2xs" @click="addAppCatalogPort()"
                x-text="(t('admin_apps.add_port') || 'Add port')"></button>
      </div>
      <template x-for="(p, idx) in (appsCatalogEdit.default_ports || [])" :key="idx">
        <!-- Single root element — an <template x-for> renders ONLY its first
             root child, so the grid row + the URL toggle MUST share one
             wrapper or the toggle silently never renders. -->
        <div class="mb-2">
          <div class="grid grid-cols-6 gap-2 items-end">
            <div>
              <label class="block fs-3xs text-[var(--text-faint)]" x-text="t('admin_apps.port_port') || 'Port'"></label>
              <input type="number" class="w-full fs-xs" min="1" max="65535" x-model.number="p.port">
            </div>
            <div>
              <label class="block fs-3xs text-[var(--text-faint)]" x-text="t('admin_apps.port_protocol') || 'Proto'"></label>
              <select class="w-full fs-xs" x-model="p.protocol">
                <option value="tcp">tcp</option>
                <option value="udp">udp</option>
                <option value="http">http</option>
                <option value="https">https</option>
              </select>
            </div>
            <div class="col-span-2">
              <label class="block fs-3xs text-[var(--text-faint)]" x-text="t('admin_apps.port_label') || 'Label'"></label>
              <input type="text" class="w-full fs-xs" maxlength="64" x-model="p.label">
            </div>
            <div>
              <label class="block fs-3xs text-[var(--text-faint)]" x-text="t('admin_apps.port_path') || 'Probe path'"></label>
              <input type="text" class="w-full fs-xs" maxlength="256" x-model="p.probe_path">
            </div>
            <div class="flex items-end gap-1">
              <div class="flex-1">
                <label class="block fs-3xs text-[var(--text-faint)]" x-text="t('admin_apps.port_status') || 'Status'"></label>
                <input type="number" class="w-full fs-xs" min="0" max="599" x-model.number="p.probe_status">
              </div>
              <button type="button" class="user-action-btn user-action-btn--danger" @click="removeAppCatalogPort(idx)"
                      :aria-label="t('admin_apps.remove_port') || 'Remove port'">
                <svg width="13" height="13" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash"/>
                </svg>
              </button>
            </div>
          </div>
          <!-- URL toggle — when ticked, this port renders as a clickable link
               (<scheme>://<host>:<port><path>) in the Apps view + host drawer,
               on ANY protocol. Cloned onto the chip when the template is pinned. -->
          <label class="inline-flex items-center gap-1.5 fs-xs mt-1 ps-1 cursor-pointer"
                 :class="p.open_url ? 'text-[var(--primary)]' : 'text-[var(--text-dim)]'"
                 :title="t('admin_apps.port_open_url_title') || 'Open as URL — makes the port pill a clickable link (any protocol)'">
            <input type="checkbox" x-model="p.open_url">
            <svg x-show="p.open_url" width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-external-link"/>
            </svg>
            <span x-text="t('admin_apps.port_open_url') || 'Open as URL'"></span>
          </label>
        </div>
      </template>
    </div>

    <div class="flex items-center gap-2 pt-2">
      <button type="button" class="btn btn-primary fs-sm" @click="saveAppCatalogEntry()"
              :disabled="appsCatalogSaving || !appsCatalogDirty()"
              :title="!appsCatalogDirty() ? (t('apps.no_changes') || 'No changes to save') : ''">
        <span x-text="t('actions.save') || 'Save'"></span>
      </button>
      <button type="button" class="btn btn-soft fs-sm" @click="closeAppCatalogEditor()" :disabled="appsCatalogSaving">
        <span x-text="t('actions.cancel') || 'Cancel'"></span>
      </button>
      <span x-show="appsCatalogEditError" class="fs-xs text-[var(--danger)]" x-text="appsCatalogEditError"></span>
    </div>
  </div>

  <!-- PIN-TO-HOST MODAL — operator picks a curated host + optional URL
       override + probe-enable flag, then POSTs to /api/services/catalog
       /{cid}/pin which appends a new chip to the host's services[]
       array pre-filled from the template. Lives at the bottom of the
       Admin → Apps section so the SweetAlert-style overlay sits over
       the whole partial. Uses the same .modal-backdrop / .modal-card
       pattern as the AI memory + SSH terminal modals. -->
  <div x-show="appsPinModalOpen" x-cloak
       class="fixed inset-0 z-50 flex items-center justify-center"
       role="dialog" aria-modal="true"
       :aria-label="t('admin_apps.pin_title') || 'Pin to host'"
       @keydown.escape.window="closeAppCatalogPin()">
    <div class="absolute inset-0 bg-[var(--backdrop-strong)]"
         @click="closeAppCatalogPin()"></div>
    <div class="relative bg-[var(--surface)] border border-[var(--border)] rounded-md p-5 shadow-lg max-w-[480px] w-full mx-4">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-1.5 min-w-0">
          <svg width="16" height="16" class="text-[var(--primary)] flex-shrink-0" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-pin"/>
          </svg>
          <!-- Brand icon: collapse to display:none on load failure (NOT
               visibility:hidden) so a missing icon leaves no empty 22px box
               between the pin glyph and the title. -->
          <img x-show="appsPinForm.template"
               :src="iconUrlFor((appsPinForm.template && (appsPinForm.template.icon || appsPinForm.template.slug)) || '')"
               alt="" width="22" height="22" class="rounded flex-shrink-0"
               @error="$event.target.style.display='none'">
          <h3 class="font-semibold fs-md truncate"
              x-text="(t('admin_apps.pin_title') || 'Pin to host') + (appsPinForm.template ? ' — ' + appsPinForm.template.name : '')"></h3>
        </div>
        <button type="button" class="user-action-btn"
                :aria-label="t('actions.close') || 'Close'"
                :title="t('actions.close') || 'Close'"
                @click="closeAppCatalogPin()">
          <svg width="14" height="14" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-x"/>
          </svg>
        </button>
      </div>

      <p class="fs-xs text-[var(--text-faint)] mb-3 leading-snug"
         x-text="t('admin_apps.pin_intro') || 'Creates a new chip on the selected host pre-filled from this template. Edit the chip later via Admin → Hosts to tweak per-host overrides.'"></p>

      <div class="space-y-3">
        <div>
          <label class="block fs-xs font-medium mb-1" for="apps-pin-host-search"
                 x-text="t('admin_apps.pin_hosts') || 'Hosts'"></label>
          <!-- Selected hosts — removable chips. Pin can target MANY hosts
               at once; clicking a host in the dropdown toggles it here. -->
          <div x-show="(appsPinForm.host_ids || []).length" class="flex flex-wrap gap-1 mb-1.5">
            <template x-for="sh in appsPinSelectedHosts()" :key="sh.id">
              <span class="chip pill-info fs-2xs inline-flex items-center gap-1 whitespace-nowrap">
                <span x-text="appsHostLabel(sh)"></span>
                <button type="button" class="inline-flex items-center" @click.stop="removeAppsPinHost(sh.id)"
                        :aria-label="t('actions.remove') || 'Remove'" :title="t('actions.remove') || 'Remove'">
                  <svg width="10" height="10" aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-x"/>
                  </svg>
                </button>
              </span>
            </template>
          </div>
          <!-- Searchable host picker — same combobox pattern as the
               discovery wizard. Type to filter; arrow keys move the
               highlight, Enter TOGGLES the host, Escape closes. The
               dropdown stays open after a pick so several hosts can be
               selected in a row. -->
          <div class="relative" @click.outside="appsPinHostDropdownOpen = false">
            <input id="apps-pin-host-search" type="text" class="w-full"
                   autocomplete="off" role="combobox" aria-controls="apps-pin-host-list"
                   :aria-expanded="appsPinHostDropdownOpen ? 'true' : 'false'"
                   :aria-activedescendant="appsPinHostActiveIdx >= 0 ? ('apps-pin-host-row-' + appsPinHostActiveIdx) : ''"
                   :placeholder="t('admin_apps.pin_hosts_search') || 'Type to filter, click to add hosts…'"
                   x-model="appsPinHostSearch"
                   @focus="appsPinHostDropdownOpen = true; appsPinHostActiveIdx = -1"
                   @input="appsPinHostDropdownOpen = true; appsPinHostActiveIdx = -1"
                   @keydown.arrow-down.prevent="appsPinHostMove(1)"
                   @keydown.arrow-up.prevent="appsPinHostMove(-1)"
                   @keydown.enter.prevent="appsPinHostEnter()"
                   @keydown.escape.prevent.stop="appsPinHostDropdownOpen = false">
            <ul x-show="appsPinHostDropdownOpen" x-cloak id="apps-pin-host-list" role="listbox" aria-multiselectable="true"
                class="absolute z-10 mt-1 w-full max-h-56 overflow-y-auto scrollbar rounded-md border border-[var(--border)] bg-[var(--surface-2)] shadow-lg">
              <template x-for="(h, idx) in appsPinFilteredHosts()" :key="h.id">
                <li role="option" :id="'apps-pin-host-row-' + idx"
                    :aria-selected="appsPinHostChosen(h) ? 'true' : 'false'"
                    :class="idx === appsPinHostActiveIdx ? 'bg-[var(--row-hover)]' : ''"
                    class="px-3 py-1.5 fs-sm cursor-pointer hover:bg-[var(--row-hover)] flex items-center gap-2"
                    @mouseenter="appsPinHostActiveIdx = idx"
                    @click="toggleAppsPinHost(h)">
                  <svg width="12" height="12" class="flex-shrink-0 text-[var(--primary)]"
                       :style="appsPinHostChosen(h) ? '' : 'visibility:hidden'" aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-check"/>
                  </svg>
                  <span class="truncate" x-text="appsHostLabel(h)"></span>
                </li>
              </template>
              <li x-show="!appsPinFilteredHosts().length"
                  class="px-3 py-1.5 fs-sm text-[var(--text-faint)]"
                  x-text="t('admin_apps.pin_host_no_match') || 'No matching hosts'"></li>
            </ul>
          </div>
          <p x-show="!(hostsConfig || []).length" class="fs-2xs text-[var(--text-faint)] mt-1"
             x-text="t('admin_apps.pin_no_hosts') || 'No curated hosts yet — add one via Admin → Hosts first.'"></p>
        </div>
        <div>
          <label class="block fs-xs font-medium mb-1" x-text="t('admin_apps.pin_url') || 'URL (optional)'"></label>
          <input type="text" class="w-full" maxlength="256" x-model="appsPinForm.url"
                 :placeholder="t('admin_apps.pin_url_placeholder') || 'https://… — leave blank if probing by host IP + ports'">
        </div>
        <div>
          <label class="flex items-center gap-2 fs-sm cursor-pointer">
            <input type="checkbox" x-model="appsPinForm.probe_enabled">
            <span x-text="t('admin_apps.pin_probe_enabled') || 'Enable reachability probe'"></span>
          </label>
        </div>
      </div>

      <div class="flex items-center gap-2 pt-4 mt-4 border-t border-[var(--border)]">
        <button type="button" class="btn btn-primary fs-sm"
                @click="submitAppCatalogPin()"
                :disabled="appsPinSaving || !(appsPinForm.host_ids || []).length">
          <span x-show="!appsPinSaving" x-text="t('admin_apps.pin_submit') || 'Pin to host'"></span>
          <span x-show="appsPinSaving" x-text="t('admin_apps.pin_saving') || 'Pinning…'"></span>
        </button>
        <button type="button" class="btn btn-soft fs-sm" @click="closeAppCatalogPin()" :disabled="appsPinSaving"
                x-text="t('actions.cancel') || 'Cancel'"></button>
        <span x-show="appsPinError" class="fs-xs text-[var(--danger)] ms-2" x-text="appsPinError"></span>
      </div>
    </div>
  </div>

  <!-- DISCOVERY WIZARD — picks a curated host, runs the port-scan +
       catalog-template match, lets the operator one-click bulk-bind
       the proposed catalog templates as chips on the chosen host.
       Reuses the existing `host_port_scans` data spine — operators
       must run a port-scan on the host FIRST (Hosts view → drawer →
       Scan ports) for this wizard to have anything to match against. -->
  <div x-show="appsDiscoverOpen" x-cloak
       class="fixed inset-0 z-50 flex items-center justify-center"
       role="dialog" aria-modal="true"
       :aria-label="t('admin_apps.discover_title') || 'Discover apps on host'"
       @keydown.escape.window="closeAppsDiscoverWizard()">
    <div class="absolute inset-0 bg-[var(--backdrop-strong)]"
         @click="closeAppsDiscoverWizard()"></div>
    <div class="relative bg-[var(--surface)] border border-[var(--border)] rounded-md p-5 shadow-lg max-w-[640px] w-full mx-4 max-h-[85vh] flex flex-col">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold fs-md inline-flex items-center gap-2">
          <svg width="16" height="16" class="text-[var(--primary)] flex-shrink-0" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-search"/>
          </svg>
          <span x-text="t('admin_apps.discover_title') || 'Discover apps on host'"></span>
        </h3>
        <button type="button" class="user-action-btn"
                :aria-label="t('actions.close') || 'Close'"
                :title="t('actions.close') || 'Close'"
                @click="closeAppsDiscoverWizard()">
          <svg width="14" height="14" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-x"/>
          </svg>
        </button>
      </div>
      <p class="fs-xs text-[var(--text-faint)] mb-3 leading-snug"
         x-text="t('admin_apps.discover_intro') || 'Match a host’s last port-scan results against catalog default ports. Templates already bound to the host are filtered out. Operator can multi-select proposals before pinning.'"></p>

      <!-- Step 1: host picker — searchable input + live-filtered dropdown.
           Type to narrow a long fleet by label / id / address before picking;
           arrow keys move the highlight, Enter selects, Escape closes. -->
      <div class="mb-3">
        <label class="block fs-xs font-medium mb-1" for="apps-discover-host-search"
               x-text="t('admin_apps.discover_host') || 'Host to scan'"></label>
        <div class="relative" @click.outside="appsDiscoverHostDropdownOpen = false">
          <input id="apps-discover-host-search" type="text" class="w-full"
                 autocomplete="off" role="combobox" aria-controls="apps-discover-host-list"
                 :aria-expanded="appsDiscoverHostDropdownOpen ? 'true' : 'false'"
                 :aria-activedescendant="appsDiscoverHostActiveIdx >= 0 ? ('apps-discover-host-row-' + appsDiscoverHostActiveIdx) : ''"
                 :placeholder="t('admin_apps.discover_host_search') || 'Type to filter hosts…'"
                 x-model="appsDiscoverHostSearch"
                 @focus="appsDiscoverHostDropdownOpen = true; appsDiscoverHostActiveIdx = -1"
                 @input="appsDiscoverHostDropdownOpen = true; appsDiscoverHostActiveIdx = -1"
                 @keydown.arrow-down.prevent="appsDiscoverHostMove(1)"
                 @keydown.arrow-up.prevent="appsDiscoverHostMove(-1)"
                 @keydown.enter.prevent="appsDiscoverHostEnter()"
                 @keydown.escape.prevent.stop="appsDiscoverHostDropdownOpen = false">
          <ul x-show="appsDiscoverHostDropdownOpen" x-cloak id="apps-discover-host-list" role="listbox"
              class="absolute z-10 mt-1 w-full max-h-56 overflow-y-auto scrollbar rounded-md border border-[var(--border)] bg-[var(--surface-2)] shadow-lg">
            <template x-for="(h, idx) in appsDiscoverFilteredHosts()" :key="h.id">
              <li role="option" :id="'apps-discover-host-row-' + idx"
                  :aria-selected="appsDiscoverForm.host_id === h.id ? 'true' : 'false'"
                  :class="idx === appsDiscoverHostActiveIdx ? 'bg-[var(--row-hover)]' : ''"
                  class="px-3 py-1.5 fs-sm cursor-pointer hover:bg-[var(--row-hover)]"
                  @mouseenter="appsDiscoverHostActiveIdx = idx"
                  @click="selectAppsDiscoverHost(h)"
                  x-text="appsHostLabel(h)"></li>
            </template>
            <li x-show="!appsDiscoverFilteredHosts().length"
                class="px-3 py-1.5 fs-sm text-[var(--text-faint)]"
                x-text="t('admin_apps.discover_host_no_match') || 'No matching hosts'"></li>
          </ul>
        </div>
      </div>

      <!-- Loading state — matches the canonical admin-table spinner. -->
      <div x-show="appsDiscoverLoading" class="loading-state">
        <span class="spin-lg" aria-hidden="true"></span>
        <span class="fs-sm text-[var(--text-faint)]"
              x-text="t('admin_apps.discover_loading') || 'Matching template ports…'"></span>
      </div>

      <!-- Error state -->
      <div x-show="appsDiscoverError"
           class="rounded-md px-3 py-2 mb-3 fs-sm bg-[var(--pill-error-bg)] text-[var(--pill-error-fg)] border border-[var(--pill-error-br)]">
        <span x-text="appsDiscoverError"></span>
      </div>

      <!-- Result summary + proposal list -->
      <div x-show="appsDiscoverResult && !appsDiscoverLoading" class="flex-1 overflow-y-auto scrollbar" style="min-height:0;">
        <div class="fs-xs text-[var(--text-faint)] mb-2 flex items-center gap-2 flex-wrap">
          <span x-show="(appsDiscoverResult.detected_ports || []).length"
                x-text="t('admin_apps.discover_detected', { n: (appsDiscoverResult.detected_ports || []).length }) || ('Detected ' + (appsDiscoverResult.detected_ports || []).length + ' open port(s) on this host')"></span>
          <span x-show="!(appsDiscoverResult.detected_ports || []).length"
                class="text-[var(--warning)]"
                x-text="t('admin_apps.discover_no_ports') || 'No port-scan history for this host — run a port scan from the Hosts view first.'"></span>
          <span x-show="appsDiscoverResult.scanned_at"
                class="italic"
                x-text="t('admin_apps.discover_scanned', { age: relativeAge(Date.now()/1000 - appsDiscoverResult.scanned_at) })"></span>
        </div>

        <!-- No proposals -->
        <div x-show="(appsDiscoverResult.detected_ports || []).length && !(appsDiscoverResult.proposals || []).length"
             class="text-center py-6 text-[var(--text-faint)] fs-sm"
             x-text="t('admin_apps.discover_no_matches') || 'No catalog templates matched. Add custom templates or pin manually via the catalog rows above.'"></div>

        <!-- Proposal table -->
        <table x-show="(appsDiscoverResult.proposals || []).length" class="w-full fs-sm">
          <thead>
          <tr class="text-[var(--text-dim)] border-b border-[var(--border)]">
            <th class="text-start py-2 ps-2 w-[36px]">
              <input type="checkbox"
                     @change="toggleAllAppsDiscoverSelections($event.target.checked)"
                     :checked="(appsDiscoverResult.proposals || []).length > 0 && appsDiscoverSelected.size === (appsDiscoverResult.proposals || []).length"
                     :aria-label="t('admin_apps.discover_select_all') || 'Select all'">
            </th>
            <th class="text-start py-2 w-[28px]"></th>
            <th class="text-start py-2" x-text="t('admin_apps.col_name') || 'Name'"></th>
            <th class="text-start py-2" x-text="t('admin_apps.discover_matched') || 'Matched ports'"></th>
            <th class="text-end py-2 pe-2" x-text="t('admin_apps.discover_confidence') || 'Confidence'"></th>
          </tr>
          </thead>
          <tbody>
          <template x-for="prop in (appsDiscoverResult.proposals || [])" :key="prop.catalog.id">
            <tr class="border-b border-[var(--border)] hover:bg-[var(--row-hover)] cursor-pointer"
                @click="toggleAppsDiscoverSelection(prop.catalog.id)">
              <td class="py-2 ps-2">
                <input type="checkbox"
                       :checked="appsDiscoverSelected.has(prop.catalog.id)"
                       @click.stop="toggleAppsDiscoverSelection(prop.catalog.id)"
                       :aria-label="t('admin_apps.discover_select_row', { name: prop.catalog.name }) || ('Select ' + prop.catalog.name)">
              </td>
              <td class="py-2">
                <img :src="iconUrlFor(prop.catalog.icon || prop.catalog.slug)" alt=""
                     width="22" height="22" class="rounded"
                     @error="$event.target.style.visibility='hidden'">
              </td>
              <td class="py-2">
                <div class="font-medium" x-text="prop.catalog.name"></div>
                <div class="fs-2xs text-[var(--text-faint)]"
                     x-text="(prop.match_reasons || []).join(' · ')"></div>
              </td>
              <td class="py-2">
                <div class="flex flex-wrap gap-1">
                  <!-- Show EVERY template port. Detected-on-host -> green
                       (pill-ok); not detected (incl. detected-but-claimed
                       by another app) -> greyed (pill-muted) instead of
                       hidden, so the full template port set is visible. -->
                  <template x-for="dp in ((prop.catalog && prop.catalog.default_ports) || [])"
                            :key="'p:' + dp.port + ':' + (dp.protocol || 'tcp')">
                    <span class="chip fs-2xs inline-flex items-center gap-0.5 whitespace-nowrap"
                          :class="discoverPortIsMatched(prop, dp.port) ? 'pill-ok' : 'pill-muted'"
                          :title="discoverPortIsMatched(prop, dp.port)
                                  ? (dp.open_url ? (t('admin_apps.port_open_url') || 'opens as URL') : '')
                                  : (t('admin_apps.discover_unmatched_tip') || 'Template defines this port but the host scan did not detect it open')">
                      <svg x-show="dp.open_url" width="9" height="9" class="flex-shrink-0 text-[var(--primary)]" aria-hidden="true">
                        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-external-link"/>
                      </svg>
                      <span x-text="dp.port + '/' + (dp.protocol || 'tcp')"></span>
                    </span>
                  </template>
                </div>
              </td>
              <td class="py-2 pe-2 text-end">
                <span class="chip fs-2xs"
                      :class="prop.confidence >= 0.9 ? 'pill-ok' : (prop.confidence >= 0.7 ? 'pill-info' : 'pill-warning')"
                      x-text="Math.round(prop.confidence * 100) + '%'"></span>
              </td>
            </tr>
          </template>
          </tbody>
        </table>
      </div>

      <div class="flex items-center gap-2 pt-3 mt-3 border-t border-[var(--border)]">
        <button type="button" class="btn btn-primary fs-sm"
                @click="submitAppsDiscoverApply()"
                :disabled="appsDiscoverApplying || appsDiscoverSelected.size === 0">
          <span x-show="!appsDiscoverApplying"
                x-text="(t('admin_apps.discover_apply') || 'Pin selected') + ' (' + appsDiscoverSelected.size + ')'"></span>
          <span x-show="appsDiscoverApplying"
                x-text="t('admin_apps.discover_applying') || 'Pinning…'"></span>
        </button>
        <button type="button" class="btn btn-soft fs-sm"
                @click="closeAppsDiscoverWizard()"
                :disabled="appsDiscoverApplying"
                x-text="t('actions.close') || 'Close'"></button>
        <span x-show="appsDiscoverApplyError" class="fs-xs text-[var(--danger)] ms-2" x-text="appsDiscoverApplyError"></span>
      </div>
    </div>
  </div>

  <!-- Instance edit modal — edit a pinned chip's name / URL / icon /
       probe. For a catalog-linked chip, clearing name / icon re-inherits
       from the template. Writes through PATCH /api/services/{host}/{idx}. -->
  <div x-show="appsInstanceEditOpen" x-cloak
       class="fixed inset-0 z-50 flex items-center justify-center"
       role="dialog" aria-modal="true"
       :aria-label="t('admin_apps.instance_edit_title') || 'Edit app instance'"
       @keydown.escape.window="closeInstanceEdit()">
    <div class="absolute inset-0 bg-[var(--backdrop-strong)]" @click="closeInstanceEdit()"></div>
    <div class="relative bg-[var(--surface)] border border-[var(--border)] rounded-md p-5 shadow-lg max-w-[640px] w-full mx-4 max-h-[85vh] overflow-y-auto scrollbar">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold fs-md truncate inline-flex items-center gap-1.5 min-w-0">
          <svg width="16" height="16" class="text-[var(--primary)] flex-shrink-0" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-edit"/>
          </svg>
          <img x-show="appsInstanceEditForm.icon || appsInstanceEditForm.catalog_slug || appsInstanceEditForm.name"
               :src="iconUrlFor(appsInstanceEditForm.icon || appsInstanceEditForm.catalog_slug || appsInstanceEditForm.name)"
               alt="" width="20" height="20" class="rounded flex-shrink-0"
               @error="$event.target.style.display='none'">
          <span class="truncate" x-text="t('admin_apps.instance_edit_title') || 'Edit app instance'"></span>
        </h3>
        <button type="button" class="user-action-btn" :aria-label="t('actions.close') || 'Close'"
                :title="t('actions.close') || 'Close'" @click="closeInstanceEdit()">
          <svg width="14" height="14" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-x"/>
          </svg>
        </button>
      </div>
      <p class="fs-2xs text-[var(--text-faint)] mb-3"
         x-text="(t('admin_apps.instance_edit_host') || 'On host:') + ' ' + appsInstanceEditForm.host_label"></p>
      <div class="space-y-3">
        <div>
          <label class="block fs-xs font-medium mb-1" x-text="t('admin_apps.col_name') || 'Name'"></label>
          <input type="text" class="w-full" maxlength="64" x-model="appsInstanceEditForm.name"
                 :placeholder="appsInstanceEditForm.catalog_name || ''">
          <p x-show="appsInstanceEditForm.catalog_name" class="fs-2xs text-[var(--text-faint)] mt-1"
             x-text="(t('admin_apps.instance_inherit_hint') || 'Leave blank to inherit from template:') + ' ' + appsInstanceEditForm.catalog_name"></p>
        </div>
        <div>
          <label class="block fs-xs font-medium mb-1" x-text="t('admin_apps.col_url') || 'URL'"></label>
          <input type="text" class="w-full" maxlength="256" x-model="appsInstanceEditForm.url" placeholder="https://…">
        </div>
        <div>
          <label class="block fs-xs font-medium mb-1" x-text="t('admin_apps.instance_edit_icon') || 'Icon slug (optional)'"></label>
          <input type="text" class="w-full" maxlength="64" x-model="appsInstanceEditForm.icon"
                 :placeholder="appsInstanceEditForm.catalog_name || ''">
        </div>
        <label class="inline-flex items-center gap-2 fs-sm">
          <input type="checkbox" x-model="appsInstanceEditForm.probe_enabled">
          <span x-text="t('admin_apps.instance_edit_probe_enabled') || 'Probe this app for reachability'"></span>
        </label>
        <!-- Per-instance "Show extras on app card" — surfaces the
             per-app extras panel (e.g. UPS stats, speedtest
             latest / average / chart) on the app card when
             checked. Tri-state model: indeterminate (the
             operator hasn't decided) inherits the template's
             `show_extras` default. Checked = always render the
             extras for THIS instance regardless of template.
             Unchecked = always hide regardless of template. Gated
             on `appsTemplateSupportsExtras(...)` which walks the
             per-app SPA module registry — the checkbox renders
             only for templates whose slug matches a registered
             per-app module. -->
        <label x-show="appsTemplateSupportsExtras(appsInstanceEditForm.catalog_slug || appsInstanceEditForm.catalog_name)"
               class="inline-flex items-center gap-2 fs-sm">
          <input type="checkbox"
                 :indeterminate="appsInstanceEditForm.show_extras === null"
                 :checked="appsInstanceEditForm.show_extras === true"
                 @change="appsInstanceEditForm.show_extras = $event.target.checked">
          <span x-text="t('admin_apps.instance_edit_show_extras') || 'Show extras (UPS stats etc.) on the app card'"></span>
        </label>
        <!-- Per-app editor-fields hook — every per-app partial under
             `_components/apps/` self-gates via its own
             `<template x-if="...IsApp({catalog:{slug:...}})...">` so
             only the matching app's fields render. Adding a new
             per-app editor does NOT touch this file — drop the
             partial under `_components/apps/` + add one INCLUDE
             line in `_components/apps/_all_editors.html`. -->
        <!-- INCLUDE: _components/apps/_all_editors.html -->
        <!-- Per-port editor — seeded from the chip's probe.ports[]
             (inherited from the catalog template at pin time, e.g.
             AdGuard's 3 ports). Each row: port + protocol + optional
             HTTP probe path + expected status. -->
        <div>
          <div class="flex items-center justify-between mb-1">
            <label class="block fs-xs font-medium" x-text="t('admin_apps.instance_edit_ports') || 'Ports'"></label>
            <button type="button" class="btn btn-soft fs-2xs inline-flex items-center gap-1"
                    @click="addInstancePort()">
              <svg width="11" height="11" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-plus"/>
              </svg>
              <span x-text="t('admin_apps.instance_edit_add_port') || 'Add port'"></span>
            </button>
          </div>
          <p x-show="!(appsInstanceEditForm.ports || []).length" class="fs-2xs text-[var(--text-faint)] italic mb-1"
             x-text="t('admin_apps.instance_edit_no_ports') || 'No ports — this chip has no reachability ports configured.'"></p>
          <div class="space-y-1.5">
            <template x-for="(p, pi) in appsInstanceEditForm.ports" :key="p._uid || pi">
              <div class="flex flex-wrap items-center gap-1.5">
                <input type="number" min="1" max="65535" class="w-[78px] fs-xs" x-model.number="p.port"
                       :placeholder="t('admin_apps.instance_edit_port') || 'Port'">
                <select class="fs-xs" x-model="p.protocol">
                  <option value="tcp">tcp</option>
                  <option value="udp">udp</option>
                  <option value="http">http</option>
                  <option value="https">https</option>
                </select>
                <input type="text" maxlength="256" class="flex-1 min-w-[120px] fs-xs" x-model="p.probe_path"
                       :placeholder="t('admin_apps.instance_edit_path') || 'HTTP path (e.g. /health)'">
                <input type="number" min="0" max="599" class="w-[64px] fs-xs" x-model.number="p.probe_status"
                       :title="t('admin_apps.instance_edit_status') || 'Expected HTTP status (0 = any 2xx/3xx)'"
                       :placeholder="t('admin_apps.instance_edit_status_ph') || 'Status'">
                <!-- Clickable-port toggle — when ticked (+ protocol http/https)
                     the port pill links to <scheme>://<host>:<port>. -->
                <label class="flex items-center gap-1 fs-3xs text-[var(--text-faint)] whitespace-nowrap"
                       :title="t('admin_apps.port_open_url_title') || 'Open as URL — makes the port pill a clickable link (any protocol)'">
                  <input type="checkbox" x-model="p.open_url">
                  <span x-text="t('admin_apps.port_open_url_short') || 'URL'"></span>
                </label>
                <button type="button" class="user-action-btn user-action-btn--danger" @click="removeInstancePort(pi)"
                        :aria-label="t('actions.remove') || 'Remove'" :title="t('actions.remove') || 'Remove'">
                  <svg width="13" height="13" aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash"/>
                  </svg>
                </button>
              </div>
            </template>
          </div>
        </div>
        <!-- Link to Docker (optional) — links the chip to a Portainer
             container / stack so the App drawer can offer an inline
             Restart. Free-text inputs backed by datalists sourced from
             the current /api/items snapshot. -->
        <div>
          <label class="block fs-xs font-medium mb-1" x-text="t('admin_apps.instance_edit_docker_label') || 'Link to Docker (optional)'"></label>
          <p class="fs-2xs text-[var(--text-faint)] mb-1" x-text="t('admin_apps.instance_edit_docker_hint') || 'Link this app to a Docker container on a specific host (precise — a stack can span hosts) or a Swarm service, to enable inline Restart / Update in the app drawer. Pick from running items — no free text.'"></p>
          <!-- Searchable combobox — type to filter a long containers /
               services list instead of scrolling a giant <select>. Click an
               option to link; the X clears the link. -->
          <div class="relative" @click.outside="appsDockerLinkClose()">
            <input type="text" class="fs-xs w-full" autocomplete="off" role="combobox"
                   aria-controls="apps-docker-link-list"
                   :aria-expanded="appsDockerLinkDropdownOpen ? 'true' : 'false'"
                   :aria-activedescendant="appsDockerLinkActiveDom()"
                   x-model="appsDockerLinkSearch"
                   @focus="appsDockerLinkDropdownOpen = true; appsDockerLinkActiveIdx = -1"
                   @input="appsDockerLinkDropdownOpen = true; appsDockerLinkActiveIdx = -1"
                   @keydown.arrow-down.prevent="appsDockerLinkMove(1)"
                   @keydown.arrow-up.prevent="appsDockerLinkMove(-1)"
                   @keydown.enter.prevent="appsDockerLinkEnter()"
                   @keydown.escape.prevent.stop="appsDockerLinkClose()"
                   :placeholder="t('admin_apps.instance_edit_docker_search') || 'Type to search containers / services…'"
                   :aria-label="t('admin_apps.instance_edit_docker_label') || 'Link to Docker (optional)'">
            <ul x-show="appsDockerLinkDropdownOpen" x-cloak id="apps-docker-link-list" role="listbox"
                class="absolute z-20 mt-1 w-full max-h-56 overflow-y-auto scrollbar rounded border border-[var(--border)] bg-[var(--surface)] shadow-lg fs-xs">
              <li role="option" id="apps-docker-link-opt-none"
                  class="px-2 py-1 cursor-pointer hover:bg-[var(--row-hover)] text-[var(--text-faint)] italic"
                  :class="appsDockerLinkActiveDom() === 'apps-docker-link-opt-none' ? 'bg-[var(--row-hover)]' : ''"
                  @mouseenter="appsDockerLinkActiveIdx = 0"
                  @click="appsDockerLinkPick('', '')"
                  x-text="t('admin_apps.instance_edit_docker_none') || '— Not linked —'"></li>
              <template x-if="appsDockerLinkFiltered().containers.length">
                <li class="px-2 pt-1.5 pb-0.5 fs-3xs uppercase tracking-wider text-[var(--text-faint)]"
                    x-text="t('admin_apps.instance_edit_docker_containers') || 'Containers (on a host)'"></li>
              </template>
              <template x-for="(o, idx) in appsDockerLinkFiltered().containers" :key="o.id">
                <li role="option" :id="'apps-docker-link-opt-c' + idx"
                    class="px-2 py-1 cursor-pointer hover:bg-[var(--row-hover)] mono"
                    :class="(appsInstanceDockerLinkValue() === o.id ? 'font-semibold ' : '') + (appsDockerLinkActiveDom() === ('apps-docker-link-opt-c' + idx) || appsInstanceDockerLinkValue() === o.id ? 'bg-[var(--row-hover)]' : '')"
                    @mouseenter="appsDockerLinkFocusDom('apps-docker-link-opt-c' + idx)"
                    @click="appsDockerLinkPick(o.id, o.label)" x-text="o.label"></li>
              </template>
              <template x-if="appsDockerLinkFiltered().services.length">
                <li class="px-2 pt-1.5 pb-0.5 fs-3xs uppercase tracking-wider text-[var(--text-faint)]"
                    x-text="t('admin_apps.instance_edit_docker_services') || 'Services (span hosts)'"></li>
              </template>
              <template x-for="(o, idx) in appsDockerLinkFiltered().services" :key="o.id">
                <li role="option" :id="'apps-docker-link-opt-s' + idx"
                    class="px-2 py-1 cursor-pointer hover:bg-[var(--row-hover)] mono"
                    :class="(appsInstanceDockerLinkValue() === o.id ? 'font-semibold ' : '') + (appsDockerLinkActiveDom() === ('apps-docker-link-opt-s' + idx) || appsInstanceDockerLinkValue() === o.id ? 'bg-[var(--row-hover)]' : '')"
                    @mouseenter="appsDockerLinkFocusDom('apps-docker-link-opt-s' + idx)"
                    @click="appsDockerLinkPick(o.id, o.label)" x-text="o.label"></li>
              </template>
              <li x-show="!appsDockerLinkFiltered().containers.length && !appsDockerLinkFiltered().services.length"
                  class="px-2 py-1 text-[var(--text-faint)] italic"
                  x-text="t('admin_apps.instance_edit_docker_no_match') || 'No containers / services match'"></li>
            </ul>
          </div>
          <p class="fs-2xs text-[var(--text-faint)] mt-1 mono"
             x-show="appsInstanceEditForm.docker_container || appsInstanceEditForm.docker_stack"
             x-text="appsInstanceDockerLinkSummary()"></p>
        </div>
      </div>
      <div class="flex items-center gap-2 mt-4">
        <button type="button" class="btn btn-primary fs-sm"
                :disabled="appsInstanceEditSaving || !appsInstanceDirty()"
                :title="!appsInstanceDirty() ? (t('apps.no_changes') || 'No changes to save') : ''"
                @click="saveInstanceEdit()">
          <span x-show="!appsInstanceEditSaving" x-text="t('actions.save') || 'Save'"></span>
          <span x-show="appsInstanceEditSaving" x-text="t('actions.saving') || 'Saving…'"></span>
        </button>
        <button type="button" class="btn btn-soft fs-sm" :disabled="appsInstanceEditSaving"
                @click="closeInstanceEdit()" x-text="t('actions.cancel') || 'Cancel'"></button>
        <span x-show="appsInstanceEditError" class="fs-xs text-[var(--danger)] ms-2" x-text="appsInstanceEditError"></span>
      </div>
    </div>
  </div>
</section>
