<!--suppress HtmlUnknownAttribute, HtmlFormInputWithoutLabel -->
<section x-show="adminTab==='apps'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
  <!-- Apps feature — reusable service-template catalog + cross-host
       instance overview. The data spine is the existing per-host
       services[] array (managed via Admin → Hosts); this tab is
       where operators curate the catalog templates that chips can
       optionally link to via `catalog_id`. -->
  <div class="flex items-center justify-between gap-2 mb-2">
    <div class="flex items-center gap-2">
      <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-grid"/>
      </svg>
      <h3 class="font-semibold fs-md" x-text="t('admin_apps.title') || 'Apps'"></h3>
    </div>
    <span class="chip pill-info fs-2xs"
          x-text="(appsCatalog.length || 0) + ' ' + (t('admin_apps.templates_pill') || 'templates')"></span>
  </div>
  <p class="fs-xs text-[var(--text-faint)] mb-3 leading-snug max-w-[720px]"
     x-text="t('admin_apps.intro') || 'Reusable service templates. Each row carries default ports + probe paths + brand-icon slug so a chip in Admin → Hosts can inherit recipe defaults via catalog_id instead of redefining per host. Built-in seed covers ~15 essentials; add operator-authored templates for in-house services.'"></p>

  <!-- Tab strip — Templates / Instances. Templates is CRUD; Instances
       is read-only (operator edits chips via Admin → Hosts). -->
  <div role="tablist" aria-orientation="horizontal" class="flex gap-1 mb-3 border-b border-[var(--border)]">
    <button type="button" role="tab"
            :aria-selected="appsAdminTab === 'templates'"
            :class="appsAdminTab === 'templates' ? 'border-b-2 border-[var(--primary)] text-[var(--text)]' : 'text-[var(--text-dim)] hover:text-[var(--text)]'"
            class="px-3 py-1.5 fs-sm"
            @click="setAppsAdminTab('templates')"
            x-text="t('admin_apps.tab_templates') || 'Templates'"></button>
    <button type="button" role="tab"
            :aria-selected="appsAdminTab === 'instances'"
            :class="appsAdminTab === 'instances' ? 'border-b-2 border-[var(--primary)] text-[var(--text)]' : 'text-[var(--text-dim)] hover:text-[var(--text)]'"
            class="px-3 py-1.5 fs-sm"
            @click="setAppsAdminTab('instances')"
            x-text="t('admin_apps.tab_instances') || 'Instances'"></button>
  </div>

  <!-- TEMPLATES TAB -->
  <div x-show="appsAdminTab === 'templates'">
    <div class="flex items-center gap-2 mb-3 flex-wrap">
      <button type="button" x-show="isAdmin()" @click="openAppCatalogNew()"
              class="btn btn-soft fs-sm inline-flex items-center gap-1.5">
        <svg width="13" height="13" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-plus"/>
        </svg>
        <span x-text="t('admin_apps.add_template') || 'Add template'"></span>
      </button>
      <button type="button" x-show="isAdmin()" @click="openAppsDiscoverWizard()"
              class="btn btn-soft fs-sm inline-flex items-center gap-1.5"
              :title="t('admin_apps.discover_title') || 'Match a host’s open ports against catalog templates'">
        <svg width="13" height="13" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-search"/>
        </svg>
        <span x-text="t('admin_apps.discover_button') || 'Discover on host…'"></span>
      </button>
      <button type="button" x-show="isAdmin()" @click="reseedAppCatalog()"
              class="btn btn-soft fs-sm inline-flex items-center gap-1.5"
              :disabled="appsCatalogReseeding"
              :title="t('admin_apps.reseed_title') || 'Re-add any built-in templates you deleted'">
        <svg width="13" height="13" :class="appsCatalogReseeding ? 'spin-md' : ''" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-cw"/>
        </svg>
        <span x-text="t('admin_apps.reseed_button') || 'Re-seed built-ins'"></span>
      </button>
      <span x-show="appsCatalogStatus" class="fs-xs text-[var(--text-faint)]" x-text="appsCatalogStatus"></span>
    </div>

    <div x-show="!appsCatalogLoaded" class="loading-state">
      <span class="spin-lg" aria-hidden="true"></span>
    </div>

    <table x-show="appsCatalogLoaded" class="w-full fs-sm">
      <thead>
      <tr class="text-[var(--text-dim)] border-b border-[var(--border)]">
        <th class="text-start py-2 ps-2 w-[36px]"></th>
        <th class="text-start py-2" x-text="t('admin_apps.col_name') || 'Name'"></th>
        <th class="text-start py-2 hidden md:table-cell" x-text="t('admin_apps.col_slug') || 'Slug'"></th>
        <th class="text-start py-2" x-text="t('admin_apps.col_ports') || 'Default ports'"></th>
        <th class="text-start py-2 hidden lg:table-cell" x-text="t('admin_apps.col_source') || 'Source'"></th>
        <th class="text-end py-2 pe-2 w-[110px]"></th>
      </tr>
      </thead>
      <tbody>
      <template x-for="entry in appsCatalog" :key="entry.id">
        <tr class="border-b border-[var(--border)] hover:bg-[var(--row-hover)]">
          <td class="py-2 ps-2">
            <img :src="iconUrlFor(entry.icon || entry.slug)" alt="" width="22" height="22" class="rounded"
                 @error="$event.target.style.visibility='hidden'">
          </td>
          <td class="py-2">
            <div class="font-medium" x-text="entry.name"></div>
            <div class="fs-2xs text-[var(--text-faint)]" x-text="entry.description || ''"></div>
          </td>
          <td class="py-2 hidden md:table-cell">
            <code class="fs-xs text-[var(--text-dim)]" x-text="entry.slug"></code>
          </td>
          <td class="py-2">
            <div class="flex flex-wrap gap-1">
              <template x-for="p in (entry.default_ports || [])" :key="p.port + ':' + p.protocol">
                        <span class="chip pill-muted fs-2xs"
                              :title="(p.label || '') + ' (' + p.protocol + ')'"
                              x-text="p.port + (p.protocol !== 'tcp' ? '/' + p.protocol : '')"></span>
              </template>
              <span x-show="!(entry.default_ports || []).length" class="fs-2xs text-[var(--text-faint)] italic" x-text="t('admin_apps.no_ports') || 'no ports'"></span>
            </div>
          </td>
          <td class="py-2 hidden lg:table-cell">
                    <span class="chip fs-2xs"
                          :class="entry.source === 'builtin' ? 'pill-info' : 'pill-ok'"
                          x-text="entry.source === 'builtin' ? (t('admin_apps.source_builtin') || 'built-in') : (t('admin_apps.source_operator') || 'operator')"></span>
          </td>
          <td class="py-2 pe-2 text-end">
            <button type="button" class="user-action-btn"
                    :aria-label="t('admin_apps.pin_to_host') || 'Pin to a host'"
                    :title="t('admin_apps.pin_to_host') || 'Pin to a host'"
                    @click="openAppCatalogPin(entry)">
              <svg width="14" height="14" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-link"/>
              </svg>
            </button>
            <button type="button" class="user-action-btn"
                    :aria-label="t('admin_apps.edit') || 'Edit template'"
                    :title="t('admin_apps.edit') || 'Edit template'"
                    @click="openAppCatalogEdit(entry)">
              <svg width="14" height="14" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-pencil"/>
              </svg>
            </button>
            <button type="button" class="user-action-btn user-action-btn--danger"
                    :aria-label="t('admin_apps.delete') || 'Delete template'"
                    :title="t('admin_apps.delete') || 'Delete template'"
                    @click="deleteAppCatalogEntry(entry)">
              <svg width="14" height="14" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash"/>
              </svg>
            </button>
          </td>
        </tr>
      </template>
      <tr x-show="appsCatalogLoaded && !appsCatalog.length">
        <td colspan="6" class="py-6 text-center text-[var(--text-faint)] fs-sm" x-text="t('admin_apps.empty_templates') || 'No templates yet — click Add or Re-seed built-ins.'"></td>
      </tr>
      </tbody>
    </table>
  </div>

  <!-- INSTANCES TAB -->
  <div x-show="appsAdminTab === 'instances'">
    <p class="fs-xs text-[var(--text-faint)] mb-3" x-text="t('admin_apps.instances_intro') || 'Read-only summary of every chip pinned to a host via Admin → Hosts. Catalog-linked instances inherit defaults; click a row to jump to the host editor.'"></p>
    <div x-show="!appsInstancesLoaded" class="loading-state">
      <span class="spin-lg" aria-hidden="true"></span>
    </div>
    <table x-show="appsInstancesLoaded" class="w-full fs-sm">
      <thead>
      <tr class="text-[var(--text-dim)] border-b border-[var(--border)]">
        <th class="text-start py-2 ps-2 w-[36px]"></th>
        <th class="text-start py-2" x-text="t('admin_apps.col_name') || 'Name'"></th>
        <th class="text-start py-2" x-text="t('admin_apps.col_host') || 'Host'"></th>
        <th class="text-start py-2 hidden md:table-cell" x-text="t('admin_apps.col_catalog') || 'Catalog'"></th>
        <th class="text-start py-2" x-text="t('admin_apps.col_status') || 'Status'"></th>
        <th class="text-start py-2 hidden lg:table-cell" x-text="t('admin_apps.col_url') || 'URL'"></th>
      </tr>
      </thead>
      <tbody>
      <template x-for="inst in appsInstances" :key="inst.host_id + ':' + inst.service_idx">
        <tr class="border-b border-[var(--border)] hover:bg-[var(--row-hover)] cursor-pointer"
            @click="goToAdminHostsForInstance(inst)">
          <td class="py-2 ps-2">
            <img :src="iconUrlFor(inst.icon || inst.catalog_slug || inst.name)" alt="" width="22" height="22" class="rounded"
                 @error="$event.target.style.visibility='hidden'">
          </td>
          <td class="py-2 font-medium" x-text="inst.name || '—'"></td>
          <td class="py-2">
            <code class="fs-xs text-[var(--text-dim)]"
                  x-text="inst.host_address || inst.host_id"></code>
            <div x-show="inst.host_label && inst.host_label !== (inst.host_address || inst.host_id)"
                 class="fs-3xs text-[var(--text-faint)] italic"
                 x-text="inst.host_label"></div>
          </td>
          <td class="py-2 hidden md:table-cell">
            <span x-show="inst.catalog_name" class="chip pill-info fs-2xs" x-text="inst.catalog_name"></span>
            <span x-show="!inst.catalog_name" class="fs-2xs text-[var(--text-faint)] italic" x-text="t('admin_apps.unlinked') || '— unlinked —'"></span>
          </td>
          <td class="py-2">
                    <span class="chip fs-2xs"
                          :class="inst.status === 'up' ? 'pill-ok' : (inst.status === 'down' ? 'pill-error' : 'pill-muted')"
                          x-text="t('admin_apps.status_' + inst.status) || inst.status"></span>
          </td>
          <td class="py-2 hidden lg:table-cell">
            <a x-show="inst.url" :href="inst.url" target="_blank" rel="noopener" class="fs-xs text-[var(--primary)] underline" @click.stop x-text="inst.url"></a>
            <span x-show="!inst.url" class="fs-2xs text-[var(--text-faint)] italic">—</span>
          </td>
        </tr>
      </template>
      <tr x-show="appsInstancesLoaded && !appsInstances.length">
        <td colspan="6" class="py-6 text-center text-[var(--text-faint)] fs-sm">
          <div class="mb-2" x-text="t('admin_apps.empty_instances') || 'No app instances yet.'"></div>
          <div class="flex items-center justify-center gap-2 flex-wrap">
            <button type="button" class="btn btn-soft fs-sm inline-flex items-center gap-1.5"
                    @click="setAppsAdminTab('templates')">
              <svg width="13" height="13" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-link"/></svg>
              <span x-text="t('admin_apps.empty_instances_pin_cta') || 'Pin from Templates'"></span>
            </button>
            <button type="button" class="btn btn-soft fs-sm inline-flex items-center gap-1.5"
                    @click="setAppsAdminTab('templates'); openAppsDiscoverWizard()">
              <svg width="13" height="13" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-search"/></svg>
              <span x-text="t('admin_apps.empty_instances_discover_cta') || 'Run Discovery wizard'"></span>
            </button>
          </div>
          <p class="fs-2xs text-[var(--text-faint)] mt-3" x-text="t('admin_apps.empty_instances_hint') || 'Tip: on the Templates tab, click the link icon on any catalog row to pin it to a host.'"></p>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <!-- INLINE TEMPLATE EDITOR — opens via openAppCatalogNew / openAppCatalogEdit.
       Modal-ish overlay; not a true modal but reuses the .drawer pattern
       to stay inside the admin section's flow. The data-apps-editor-anchor
       attribute is the target the SPA scrolls into view when the editor
       opens — without it the operator on a long catalog table clicked
       Edit on a row at the bottom and the editor opened below the fold. -->
  <div x-show="appsCatalogEditOpen" data-apps-editor-anchor class="mt-5 pt-4 border-t border-[var(--border)] space-y-3" x-cloak>
    <div class="flex items-center justify-between">
      <h4 class="font-semibold fs-md" x-text="appsCatalogEdit.id ? (t('admin_apps.edit_title') || 'Edit template') : (t('admin_apps.new_title') || 'New template')"></h4>
      <button type="button" class="user-action-btn"
              :aria-label="t('actions.close') || 'Close'"
              @click="closeAppCatalogEditor()">
        <svg width="14" height="14" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-x"/>
        </svg>
      </button>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
      <div>
        <label class="block fs-xs font-medium mb-1" x-text="t('admin_apps.field_name') || 'Name'"></label>
        <input type="text" class="w-full" maxlength="128" x-model="appsCatalogEdit.name">
      </div>
      <div>
        <label class="block fs-xs font-medium mb-1" x-text="t('admin_apps.field_slug') || 'Slug'"></label>
        <input type="text" class="w-full" maxlength="64" x-model="appsCatalogEdit.slug"
               :placeholder="t('admin_apps.field_slug_placeholder') || 'auto from name'">
      </div>
      <div>
        <label class="block fs-xs font-medium mb-1" x-text="t('admin_apps.field_icon') || 'Icon slug'"></label>
        <input type="text" class="w-full" maxlength="64" x-model="appsCatalogEdit.icon"
               :placeholder="t('admin_apps.field_icon_placeholder') || 'defaults to slug'">
      </div>
      <div>
        <label class="block fs-xs font-medium mb-1" x-text="t('admin_apps.field_description') || 'Description'"></label>
        <input type="text" class="w-full" maxlength="512" x-model="appsCatalogEdit.description">
      </div>
    </div>

    <div>
      <div class="flex items-center justify-between mb-1">
        <label class="block fs-xs font-medium" x-text="t('admin_apps.field_ports') || 'Default ports'"></label>
        <button type="button" class="btn btn-soft fs-2xs" @click="addAppCatalogPort()"
                x-text="(t('admin_apps.add_port') || 'Add port')"></button>
      </div>
      <template x-for="(p, idx) in (appsCatalogEdit.default_ports || [])" :key="idx">
        <div class="grid grid-cols-6 gap-2 mb-2 items-end">
          <div>
            <label class="block fs-3xs text-[var(--text-faint)]" x-text="t('admin_apps.port_port') || 'Port'"></label>
            <input type="number" class="w-full fs-xs" min="1" max="65535" x-model.number="p.port">
          </div>
          <div>
            <label class="block fs-3xs text-[var(--text-faint)]" x-text="t('admin_apps.port_protocol') || 'Proto'"></label>
            <select class="w-full fs-xs" x-model="p.protocol">
              <option value="tcp">tcp</option>
              <option value="udp">udp</option>
              <option value="http">http</option>
              <option value="https">https</option>
            </select>
          </div>
          <div class="col-span-2">
            <label class="block fs-3xs text-[var(--text-faint)]" x-text="t('admin_apps.port_label') || 'Label'"></label>
            <input type="text" class="w-full fs-xs" maxlength="64" x-model="p.label">
          </div>
          <div>
            <label class="block fs-3xs text-[var(--text-faint)]" x-text="t('admin_apps.port_path') || 'Probe path'"></label>
            <input type="text" class="w-full fs-xs" maxlength="256" x-model="p.probe_path">
          </div>
          <div class="flex items-end gap-1">
            <div class="flex-1">
              <label class="block fs-3xs text-[var(--text-faint)]" x-text="t('admin_apps.port_status') || 'Status'"></label>
              <input type="number" class="w-full fs-xs" min="0" max="599" x-model.number="p.probe_status">
            </div>
            <button type="button" class="user-action-btn user-action-btn--danger" @click="removeAppCatalogPort(idx)"
                    :aria-label="t('admin_apps.remove_port') || 'Remove port'">
              <svg width="13" height="13" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash"/>
              </svg>
            </button>
          </div>
        </div>
      </template>
    </div>

    <div class="flex items-center gap-2 pt-2">
      <button type="button" class="btn btn-primary fs-sm" @click="saveAppCatalogEntry()" :disabled="appsCatalogSaving">
        <span x-text="t('actions.save') || 'Save'"></span>
      </button>
      <button type="button" class="btn btn-soft fs-sm" @click="closeAppCatalogEditor()" :disabled="appsCatalogSaving">
        <span x-text="t('actions.cancel') || 'Cancel'"></span>
      </button>
      <span x-show="appsCatalogEditError" class="fs-xs text-[var(--danger)]" x-text="appsCatalogEditError"></span>
    </div>
  </div>

  <!-- PIN-TO-HOST MODAL — operator picks a curated host + optional URL
       override + probe-enable flag, then POSTs to /api/services/catalog
       /{cid}/pin which appends a new chip to the host's services[]
       array pre-filled from the template. Lives at the bottom of the
       Admin → Apps section so the SweetAlert-style overlay sits over
       the whole partial. Uses the same .modal-backdrop / .modal-card
       pattern as the AI memory + SSH terminal modals. -->
  <div x-show="appsPinModalOpen" x-cloak
       class="fixed inset-0 z-50 flex items-center justify-center"
       role="dialog" aria-modal="true"
       :aria-label="t('admin_apps.pin_title') || 'Pin to host'"
       @keydown.escape.window="closeAppCatalogPin()">
    <div class="absolute inset-0 bg-[var(--backdrop-strong)]"
         @click="closeAppCatalogPin()"></div>
    <div class="relative bg-[var(--surface)] border border-[var(--border)] rounded-md p-5 shadow-lg max-w-[480px] w-full mx-4">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2 min-w-0">
          <img x-show="appsPinForm.template"
               :src="iconUrlFor((appsPinForm.template && (appsPinForm.template.icon || appsPinForm.template.slug)) || '')"
               alt="" width="22" height="22" class="rounded flex-shrink-0"
               @error="$event.target.style.visibility='hidden'">
          <h3 class="font-semibold fs-md truncate"
              x-text="(t('admin_apps.pin_title') || 'Pin to host') + (appsPinForm.template ? ' — ' + appsPinForm.template.name : '')"></h3>
        </div>
        <button type="button" class="user-action-btn"
                :aria-label="t('actions.close') || 'Close'"
                :title="t('actions.close') || 'Close'"
                @click="closeAppCatalogPin()">
          <svg width="14" height="14" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-x"/>
          </svg>
        </button>
      </div>

      <p class="fs-xs text-[var(--text-faint)] mb-3 leading-snug"
         x-text="t('admin_apps.pin_intro') || 'Creates a new chip on the selected host pre-filled from this template. Edit the chip later via Admin → Hosts to tweak per-host overrides.'"></p>

      <div class="space-y-3">
        <div>
          <label class="block fs-xs font-medium mb-1" x-text="t('admin_apps.pin_host') || 'Host'"></label>
          <select class="w-full" x-model="appsPinForm.host_id">
            <option value="" x-text="t('admin_apps.pin_host_placeholder') || '— pick a host —'"></option>
            <template x-for="h in (hostsConfig || [])" :key="h.id">
              <option :value="h.id" x-text="(h.address || h.id) + (h.label && h.label !== (h.address || h.id) ? ' — ' + h.label : '')"></option>
            </template>
          </select>
          <p x-show="!(hostsConfig || []).length" class="fs-2xs text-[var(--text-faint)] mt-1"
             x-text="t('admin_apps.pin_no_hosts') || 'No curated hosts yet — add one via Admin → Hosts first.'"></p>
        </div>
        <div>
          <label class="block fs-xs font-medium mb-1" x-text="t('admin_apps.pin_url') || 'URL (optional)'"></label>
          <input type="text" class="w-full" maxlength="256" x-model="appsPinForm.url"
                 :placeholder="t('admin_apps.pin_url_placeholder') || 'https://… — leave blank if probing by host IP + ports'">
        </div>
        <div>
          <label class="flex items-center gap-2 fs-sm cursor-pointer">
            <input type="checkbox" x-model="appsPinForm.probe_enabled">
            <span x-text="t('admin_apps.pin_probe_enabled') || 'Enable reachability probe'"></span>
          </label>
        </div>
      </div>

      <div class="flex items-center gap-2 pt-4 mt-4 border-t border-[var(--border)]">
        <button type="button" class="btn btn-primary fs-sm"
                @click="submitAppCatalogPin()"
                :disabled="appsPinSaving || !appsPinForm.host_id">
          <span x-show="!appsPinSaving" x-text="t('admin_apps.pin_submit') || 'Pin to host'"></span>
          <span x-show="appsPinSaving" x-text="t('admin_apps.pin_saving') || 'Pinning…'"></span>
        </button>
        <button type="button" class="btn btn-soft fs-sm" @click="closeAppCatalogPin()" :disabled="appsPinSaving"
                x-text="t('actions.cancel') || 'Cancel'"></button>
        <span x-show="appsPinError" class="fs-xs text-[var(--danger)] ms-2" x-text="appsPinError"></span>
      </div>
    </div>
  </div>

  <!-- DISCOVERY WIZARD — picks a curated host, runs the port-scan +
       catalog-template match, lets the operator one-click bulk-bind
       the proposed catalog templates as chips on the chosen host.
       Reuses the existing `host_port_scans` data spine — operators
       must run a port-scan on the host FIRST (Hosts view → drawer →
       Scan ports) for this wizard to have anything to match against. -->
  <div x-show="appsDiscoverOpen" x-cloak
       class="fixed inset-0 z-50 flex items-center justify-center"
       role="dialog" aria-modal="true"
       :aria-label="t('admin_apps.discover_title') || 'Discover apps on host'"
       @keydown.escape.window="closeAppsDiscoverWizard()">
    <div class="absolute inset-0 bg-[var(--backdrop-strong)]"
         @click="closeAppsDiscoverWizard()"></div>
    <div class="relative bg-[var(--surface)] border border-[var(--border)] rounded-md p-5 shadow-lg max-w-[640px] w-full mx-4 max-h-[85vh] flex flex-col">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold fs-md"
            x-text="t('admin_apps.discover_title') || 'Discover apps on host'"></h3>
        <button type="button" class="user-action-btn"
                :aria-label="t('actions.close') || 'Close'"
                :title="t('actions.close') || 'Close'"
                @click="closeAppsDiscoverWizard()">
          <svg width="14" height="14" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-x"/>
          </svg>
        </button>
      </div>
      <p class="fs-xs text-[var(--text-faint)] mb-3 leading-snug"
         x-text="t('admin_apps.discover_intro') || 'Match a host’s last port-scan results against catalog default ports. Templates already bound to the host are filtered out. Operator can multi-select proposals before pinning.'"></p>

      <!-- Step 1: host picker -->
      <div class="mb-3">
        <label class="block fs-xs font-medium mb-1" x-text="t('admin_apps.discover_host') || 'Host to scan'"></label>
        <select class="w-full"
                x-model="appsDiscoverForm.host_id"
                @change="runAppsDiscovery()">
          <option value="" x-text="t('admin_apps.pin_host_placeholder') || '— pick a host —'"></option>
          <template x-for="h in (hostsConfig || [])" :key="h.id">
            <option :value="h.id" x-text="(h.address || h.id) + (h.label && h.label !== (h.address || h.id) ? ' — ' + h.label : '')"></option>
          </template>
        </select>
      </div>

      <!-- Loading state — matches the canonical admin-table spinner. -->
      <div x-show="appsDiscoverLoading" class="loading-state">
        <span class="spin-lg" aria-hidden="true"></span>
        <span class="fs-sm text-[var(--text-faint)]"
              x-text="t('admin_apps.discover_loading') || 'Matching template ports…'"></span>
      </div>

      <!-- Error state -->
      <div x-show="appsDiscoverError"
           class="rounded-md px-3 py-2 mb-3 fs-sm bg-[var(--pill-error-bg)] text-[var(--pill-error-fg)] border border-[var(--pill-error-br)]">
        <span x-text="appsDiscoverError"></span>
      </div>

      <!-- Result summary + proposal list -->
      <div x-show="appsDiscoverResult && !appsDiscoverLoading" class="flex-1 overflow-y-auto scrollbar" style="min-height:0;">
        <div class="fs-xs text-[var(--text-faint)] mb-2 flex items-center gap-2 flex-wrap">
          <span x-show="(appsDiscoverResult.detected_ports || []).length"
                x-text="t('admin_apps.discover_detected', { n: (appsDiscoverResult.detected_ports || []).length }) || ('Detected ' + (appsDiscoverResult.detected_ports || []).length + ' open port(s) on this host')"></span>
          <span x-show="!(appsDiscoverResult.detected_ports || []).length"
                class="text-[var(--warning)]"
                x-text="t('admin_apps.discover_no_ports') || 'No port-scan history for this host — run a port scan from the Hosts view first.'"></span>
          <span x-show="appsDiscoverResult.scanned_at"
                class="italic"
                x-text="(t('admin_apps.discover_scanned_at') || 'scanned ') + relativeAge(Date.now()/1000 - appsDiscoverResult.scanned_at) + ' ago'"></span>
        </div>

        <!-- No proposals -->
        <div x-show="(appsDiscoverResult.detected_ports || []).length && !(appsDiscoverResult.proposals || []).length"
             class="text-center py-6 text-[var(--text-faint)] fs-sm"
             x-text="t('admin_apps.discover_no_matches') || 'No catalog templates matched. Add custom templates or pin manually via the catalog rows above.'"></div>

        <!-- Proposal table -->
        <table x-show="(appsDiscoverResult.proposals || []).length" class="w-full fs-sm">
          <thead>
          <tr class="text-[var(--text-dim)] border-b border-[var(--border)]">
            <th class="text-start py-2 ps-2 w-[36px]">
              <input type="checkbox"
                     @change="toggleAllAppsDiscoverSelections($event.target.checked)"
                     :checked="(appsDiscoverResult.proposals || []).length > 0 && appsDiscoverSelected.size === (appsDiscoverResult.proposals || []).length"
                     :aria-label="t('admin_apps.discover_select_all') || 'Select all'">
            </th>
            <th class="text-start py-2 w-[28px]"></th>
            <th class="text-start py-2" x-text="t('admin_apps.col_name') || 'Name'"></th>
            <th class="text-start py-2" x-text="t('admin_apps.discover_matched') || 'Matched ports'"></th>
            <th class="text-end py-2 pe-2" x-text="t('admin_apps.discover_confidence') || 'Confidence'"></th>
          </tr>
          </thead>
          <tbody>
          <template x-for="prop in (appsDiscoverResult.proposals || [])" :key="prop.catalog.id">
            <tr class="border-b border-[var(--border)] hover:bg-[var(--row-hover)] cursor-pointer"
                @click="toggleAppsDiscoverSelection(prop.catalog.id)">
              <td class="py-2 ps-2">
                <input type="checkbox"
                       :checked="appsDiscoverSelected.has(prop.catalog.id)"
                       @click.stop="toggleAppsDiscoverSelection(prop.catalog.id)"
                       :aria-label="t('admin_apps.discover_select_row', { name: prop.catalog.name }) || ('Select ' + prop.catalog.name)">
              </td>
              <td class="py-2">
                <img :src="iconUrlFor(prop.catalog.icon || prop.catalog.slug)" alt=""
                     width="22" height="22" class="rounded"
                     @error="$event.target.style.visibility='hidden'">
              </td>
              <td class="py-2">
                <div class="font-medium" x-text="prop.catalog.name"></div>
                <div class="fs-2xs text-[var(--text-faint)]"
                     x-text="(prop.match_reasons || []).join(' · ')"></div>
              </td>
              <td class="py-2">
                <div class="flex flex-wrap gap-1">
                  <template x-for="port in (prop.matched_ports || [])" :key="'m:' + port">
                    <span class="chip pill-ok fs-2xs" x-text="port"></span>
                  </template>
                  <template x-for="port in (prop.unmatched_ports || [])" :key="'u:' + port">
                    <span class="chip pill-muted fs-2xs"
                          :title="t('admin_apps.discover_unmatched_tip') || 'Template defines this port but the host scan did not detect it open'"
                          x-text="port"></span>
                  </template>
                </div>
              </td>
              <td class="py-2 pe-2 text-end">
                <span class="chip fs-2xs"
                      :class="prop.confidence >= 0.9 ? 'pill-ok' : (prop.confidence >= 0.7 ? 'pill-info' : 'pill-warning')"
                      x-text="Math.round(prop.confidence * 100) + '%'"></span>
              </td>
            </tr>
          </template>
          </tbody>
        </table>
      </div>

      <div class="flex items-center gap-2 pt-3 mt-3 border-t border-[var(--border)]">
        <button type="button" class="btn btn-primary fs-sm"
                @click="submitAppsDiscoverApply()"
                :disabled="appsDiscoverApplying || appsDiscoverSelected.size === 0">
          <span x-show="!appsDiscoverApplying"
                x-text="(t('admin_apps.discover_apply') || 'Pin selected') + ' (' + appsDiscoverSelected.size + ')'"></span>
          <span x-show="appsDiscoverApplying"
                x-text="t('admin_apps.discover_applying') || 'Pinning…'"></span>
        </button>
        <button type="button" class="btn btn-soft fs-sm"
                @click="closeAppsDiscoverWizard()"
                :disabled="appsDiscoverApplying"
                x-text="t('actions.close') || 'Close'"></button>
        <span x-show="appsDiscoverApplyError" class="fs-xs text-[var(--danger)] ms-2" x-text="appsDiscoverApplyError"></span>
      </div>
    </div>
  </div>
</section>
