      <div x-show="adminTab==='backups'" class="space-y-4">
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
          <div class="flex items-center gap-2 mb-2">
            <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true"><use href="/img/ui-sprite.svg#icon-archive"/></svg>
            <h3 class="font-semibold text-[13px]" x-text="t('admin.backups.create_title')"></h3>
          </div>
          <p class="text-[11.5px] text-[var(--text-faint)] mb-3" x-html="t('admin.backups.create_desc')"></p>
          <div class="flex items-center gap-2 flex-wrap">
            <button @click="createBackup()" :disabled="backupBusy"
                    class="btn btn-primary text-[12px]"
                    :class="backupBusy && 'opacity-60'"
                    x-text="backupBusy ? t('loading.creating') : t('admin.backups.backup_now')"></button>
            <label class="btn btn-soft text-[12px] cursor-pointer">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <span x-text="t('admin.backups.restore_from_file')"></span>
              <input type="file" accept=".zip,application/zip"
                     class="hidden" @change="restoreBackupFromFile($event)">
            </label>
          </div>
          <!-- Retention: keep the newest N backups after every create
               (manual or scheduled). 0 = keep all. Applies to the
               manual "Backup now" button AND the scheduler 'backup' kind. -->
          <div class="mt-4 pt-4 border-t border-[var(--border)] flex items-end gap-2 flex-wrap">
            <div class="flex flex-col gap-1">
              <label class="text-[11px] text-[var(--text-faint)]"
                     x-text="t('admin.backups.retention_label')"></label>
              <input x-model.number="settings.backup_retention_count"
                     type="number" min="0" step="1"
                     class="w-28">
              <span class="text-[10.5px] text-[var(--text-faint)]"
                    x-text="t('admin.backups.retention_hint')"></span>
            </div>
            <button @click="saveRetention()"
                    :disabled="retentionSaving"
                    class="btn btn-primary text-[12px]">
              <span x-show="!retentionSaving" x-text="t('actions.save')"></span>
              <span x-show="retentionSaving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving')"></span></span>
            </button>
          </div>
        </section>

        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md overflow-hidden">
          <div class="p-4 border-b border-[var(--border)] flex justify-between items-center">
            <div class="flex items-center gap-2">
              <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true"><use href="/img/ui-sprite.svg#icon-archive"/></svg>
              <h3 class="font-semibold text-[13px]">
                <span x-text="t('admin.backups.list_title')"></span> <span class="text-[var(--text-faint)] font-normal" x-text="'(' + backups.length + ')'"></span>
              </h3>
            </div>
            <button @click="loadBackups()" class="btn btn-ghost text-[11px]" x-text="t('actions.reload')"></button>
          </div>
          <div class="overflow-x-auto scrollbar">
            <table class="w-full text-[12.5px]">
              <thead class="bg-[var(--surface-2)] text-[10.5px] uppercase tracking-wider text-[var(--text-faint)]">
                <tr>
                  <th class="text-start px-4 py-2" x-text="t('columns.name')"></th>
                  <th class="text-start px-4 py-2" x-text="t('columns.size')"></th>
                  <th class="text-start px-4 py-2" x-text="t('columns.created')"></th>
                  <th class="text-start px-4 py-2" x-text="t('columns.produced_by')"></th>
                  <th class="text-end px-4 py-2" x-text="t('columns.actions')"></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="b in backups" :key="b.name">
                  <tr class="border-t border-[var(--border)]">
                    <td class="px-4 py-2 mono text-[11.5px]" x-text="b.name"></td>
                    <td class="px-4 py-2 mono text-[11px] text-[var(--text-dim)]" x-text="fmtBytes(b.size)"></td>
                    <td class="px-4 py-2 mono text-[11px] text-[var(--text-dim)]" x-text="fmtDate(b.mtime)"></td>
                    <td class="px-4 py-2 mono text-[11px] text-[var(--text-dim)]" x-text="b.version || '—'"></td>
                    <td class="px-4 py-2 text-end">
                      <div class="inline-flex gap-1">
                        <a :href="'/api/backups/' + encodeURIComponent(b.name)"
                           class="btn btn-soft text-[11px]" :title="t('admin.backups.download')" x-text="t('admin.backups.download')"></a>
                        <button @click="restoreBackup(b)" class="btn btn-soft text-[11px]" :title="t('admin.backups.restore')" x-text="t('admin.backups.restore')"></button>
                        <button @click="deleteBackup(b)" class="btn btn-ghost text-[11px] text-danger" x-text="t('actions.delete')"></button>
                      </div>
                    </td>
                  </tr>
                </template>
                <tr x-show="backups.length===0">
                  <td colspan="5" class="text-center py-8 text-[var(--text-faint)]" x-text="t('empty.no_backups')"></td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>

      <!-- LOGS TAB — two sub-tabs : Live (in-memory ring buffer)
           and Files (persistent daily logs on disk with download). -->
