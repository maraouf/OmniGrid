      <div x-show="adminTab==='debug'" class="space-y-4">
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
          <div class="flex items-center gap-2 mb-2">
            <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-bug"/></svg>
            <h3 class="font-semibold fs-md"
                x-text="t('admin.debug.title')"></h3>
          </div>
          <p class="fs-xs text-[var(--text-faint)] mb-3 max-w-[720px]"
             x-text="t('admin.debug.intro')"></p>

          <!-- Master toggle — canonical AI-checkbox-tunable shape:
               inline-flex label + checkbox + visible name, then a
               separate help paragraph below. Matches the AI Integration
               section's `tuning_ai_retry_enabled` / `tuning_ai_conversation_export_enabled`
               checkboxes for visual consistency across admin panels. -->
          <div class="mb-3">
            <label class="inline-flex items-center gap-2 fs-sm font-medium cursor-pointer">
              <input type="checkbox"
                     x-model="settings.debug_panel_enabled"
                     :disabled="!isAdmin()"
                     class="cursor-pointer">
              <span x-text="t('admin_hosts.debug_panel_toggle_label')"></span>
            </label>
            <p class="fs-2xs text-[var(--text-faint)] mt-1 leading-snug"
               x-text="t('admin_hosts.debug_panel_toggle_hint')"></p>
          </div>

          <!-- Save button + dirty indicator — same pattern as the
               other admin tabs (Apprise / OpenMeteo / Portainer / OIDC /
               Config). Toggling the checkbox just marks the tab dirty;
               operator commits via Save. -->
          <div class="flex items-center gap-2 flex-wrap mt-4 pt-3 border-t border-[var(--border)]">
            <button type="button" x-show="isAdmin()" @click="saveDebugSettings()"
                    class="btn btn-primary fs-sm"
                    :disabled="debugSaving"
                    :class="debugDirty() ? 'ring-2 ring-[var(--warning)]' : ''">
              <span x-show="!debugSaving" x-text="t('actions.save')"></span>
              <span x-show="debugSaving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving')"></span></span>
            </button>
            <span x-show="debugDirty()"
                  class="fs-xs text-[var(--warning)] flex items-center gap-1.5"
                  :title="t('common.unsaved_title')">
              <span class="w-1.5 h-1.5 rounded-full bg-[var(--warning)] animate-pulse"></span>
              <span class="unsaved-flash" x-text="t('common.unsaved')"></span>
            </span>
          </div>
        </section>
