      <div x-show="adminTab==='debug'" class="space-y-4">
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
          <div class="flex items-center gap-2 mb-2">
            <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true"><use href="/img/ui-sprite.svg#icon-bug"/></svg>
            <h3 class="font-semibold text-[13px]"
                x-text="t('admin.debug.title')"></h3>
          </div>
          <p class="text-[11.5px] text-[var(--text-faint)] mb-3 max-w-[720px]"
             x-text="t('admin.debug.intro')"></p>

          <div class="border border-[var(--border)] rounded-md bg-[var(--surface-2)] p-3">
            <label class="flex items-start gap-3 cursor-pointer select-none">
              <input type="checkbox"
                     x-model="settings.debug_panel_enabled"
                     :disabled="!isAdmin()"
                     class="mt-0.5">
              <span class="flex-1">
                <span class="text-[13px] font-medium block"
                      x-text="t('admin_hosts.debug_panel_toggle_label')"></span>
                <span class="text-[11.5px] text-[var(--text-faint)] block mt-0.5 leading-snug"
                      x-text="t('admin_hosts.debug_panel_toggle_hint')"></span>
              </span>
            </label>
          </div>

          <!-- Save button + dirty indicator — same pattern as the
               other admin tabs (Apprise / OpenMeteo / Portainer / OIDC /
               Config). Toggling the checkbox just marks the tab dirty;
               operator commits via Save. -->
          <div class="flex items-center gap-2 flex-wrap mt-4">
            <button x-show="isAdmin()" @click="saveDebugSettings()"
                    class="btn btn-primary text-[12.5px]"
                    :disabled="debugSaving"
                    :class="debugDirty() ? 'ring-2 ring-[var(--warning)]' : ''">
              <span x-show="!debugSaving" x-text="t('actions.save')"></span>
              <span x-show="debugSaving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving')"></span></span>
            </button>
            <span x-show="debugDirty()"
                  class="text-[11.5px] text-[var(--warning)] flex items-center gap-1.5"
                  :title="t('common.unsaved_title')">
              <span class="w-1.5 h-1.5 rounded-full bg-[var(--warning)] animate-pulse"></span>
              <span class="unsaved-flash" x-text="t('common.unsaved')"></span>
            </span>
          </div>
        </section>
