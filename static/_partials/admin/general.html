      <section x-show="adminTab==='general'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
        <div class="flex items-center gap-2 mb-2">
          <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sliders"/></svg>
          <h3 class="font-semibold text-[13px]" x-text="t('admin.general.title')"></h3>
        </div>
        <p class="text-[11.5px] text-[var(--text-faint)] mb-3" x-text="t('admin.general.subtitle')"></p>

        <!-- Open-Meteo upstream — where the topbar weather widget
             fetches its data. Default is the free public endpoint;
             admins can point at a self-hosted instance (or a
             compatible mirror) without editing .env. Blank clears
             the override and falls back to the default. -->
        <div>
          <h4 class="font-semibold text-[12.5px] mb-1" x-text="t('admin_integrations.open_meteo_title')"></h4>
          <!-- Master switch — disables the weather endpoint without
               erasing the URL. Saved by the Open-Meteo Save button
               below (no auto-save on change). -->
          <label class="flex items-center gap-2 text-[12.5px] cursor-pointer mb-2 select-none">
            <input type="checkbox" x-model="settings.open_meteo_enabled"
                   @change="markOpenMeteoDirty()"
                   :disabled="isReadonly()">
            <span class="font-medium" x-text="t('admin_integrations.enabled_label')"></span>
            <span class="text-[11px] text-[var(--text-faint)]"
                  x-text="settings.open_meteo_enabled ? '' : t('admin_integrations.disabled_hint')"></span>
          </label>
          <p class="text-[11px] text-[var(--text-faint)] mb-2" x-text="t('admin_integrations.open_meteo_desc')"></p>
          <input x-model="settings.open_meteo_url" type="url"
                 @input="markOpenMeteoDirty()"
                 :disabled="isReadonly() || !settings.open_meteo_enabled"
                 :placeholder="t('admin_integrations.open_meteo_placeholder')"
                 class="w-full mono text-[12px]">
          <!-- Save action row below the input — matches the Apprise
               panel above it for visual consistency (operator request). -->
          <div class="flex items-center gap-3 mt-3 flex-wrap pt-3 border-t border-[var(--border)]" x-show="isAdmin()">
            <button @click="saveOpenMeteoUrl()"
                    :disabled="openMeteoSaving"
                    :class="openMeteoDirty() ? 'ring-2 ring-[var(--warning)]' : ''"
                    class="btn btn-primary text-[12px]">
              <span x-show="!openMeteoSaving" x-text="t('actions.save')"></span>
              <span x-show="openMeteoSaving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving')"></span></span>
            </button>
            <span x-show="openMeteoDirty()"
                  class="text-[11.5px] text-[var(--warning)] flex items-center gap-1.5">
              <span class="w-1.5 h-1.5 rounded-full bg-[var(--warning)] animate-pulse"></span>
              <span class="unsaved-flash" x-text="t('hosts_actions.unsaved_label')"></span>
            </span>
          </div>
          <p class="text-[10.5px] text-[var(--text-faint)] mt-2" x-text="t('admin_integrations.open_meteo_hint')"></p>
        </div>
      </section>
