      <section x-show="adminTab==='host_stats'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
        <div class="flex items-center gap-2 mb-2">
          <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-activity"/></svg>
          <h3 class="font-semibold text-[13px]" x-text="t('settings.host_stats.title')"></h3>
        </div>
        <p class="text-[11.5px] text-[var(--text-faint)] mb-3" x-text="t('settings.host_stats.desc')"></p>
        <!-- provider TABS replace the prior flat list of source
             checkboxes + sequential config blocks. Each tab is one
             provider's full config in isolation; the master enable
             toggle for that provider lives at the top of its tab body
             (see the per-tab "Enable" rows below). Tab strip mirrors
             the Admin tabs (`adminTab`) and Logs sub-tabs (`logsTab`)
             shape — `hostStatsTab` reactive state, persisted to
             `localStorage.hostStatsTab`. Adding a sixth provider
             (SNMP) is one line on this strip + one new tab
             body below. -->
        <div class="flex items-center gap-1 border-b border-[var(--border)] mb-4 overflow-x-auto overflow-y-hidden scrollbar"
             role="tablist" aria-orientation="horizontal" :aria-label="t('settings.host_stats.tablist_label')">
          <template x-for="tab in [
            ['node_exporter', t('settings.host_stats.source_node_exporter')],
            ['beszel',        t('settings.host_stats.source_beszel')],
            ['pulse',         t('settings.host_stats.source_pulse')],
            ['webmin',        t('settings.host_stats.source_webmin')],
            ['ping',          t('settings.host_stats.source_ping')],
            ['snmp',          t('settings.host_stats.source_snmp')],
          ]" :key="tab[0]">
            <button @click="setHostStatsTab(tab[0])"
                    role="tab"
                    :id="'provider-tab-' + tab[0]"
                    :aria-selected="hostStatsTab === tab[0] ? 'true' : 'false'"
                    :aria-controls="'provider-tabpanel-' + tab[0]"
                    :tabindex="hostStatsTab === tab[0] ? 0 : -1"
                    @keydown.right.prevent="cycleHostStatsTab(1)"
                    @keydown.left.prevent="cycleHostStatsTab(-1)"
                    @keydown.home.prevent="setHostStatsTab(HOST_STATS_TAB_ORDER[0])"
                    @keydown.end.prevent="setHostStatsTab(HOST_STATS_TAB_ORDER[HOST_STATS_TAB_ORDER.length - 1])"
                    :class="hostStatsTab === tab[0]
                      ? 'text-[var(--text)] border-[var(--primary)]'
                      : 'text-[var(--text-dim)] hover:text-[var(--text)] border-transparent'"
                    class="px-3 py-1.5 text-[12.5px] font-medium border-b-2 -mb-[1px] transition flex items-center gap-1.5 whitespace-nowrap">
              <span class="w-1.5 h-1.5 rounded-full"
                    :class="hasHostStatsSource(tab[0]) ? 'dot-on' : 'dot-off'"
                    :title="hasHostStatsSource(tab[0]) ? t('settings.host_stats.tab_active_dot') : t('settings.host_stats.tab_inactive_dot')"></span>
              <!-- mono provider icon painted in the operator-
                   customised chip colour. Active tab gets the
                   full provider colour; inactive tabs use a muted
                   token-driven foreground so the strip doesn't read
                   like six saturated buttons all at once. -->
              <span class="provider-icon"
                    :style="hostStatsTab === tab[0]
                      ? providerIconStyle(tab[0])
                      : ('--provider-icon-url: url(/img/icons/' + providerIconSlug(tab[0]) + '.svg); color: var(--text-faint);')"
                    aria-hidden="true"></span>
              <span x-text="tab[1]"></span>
            </button>
          </template>
        </div>
        <!-- Per-provider config blocks — visible always, inputs
             disabled when the matching toggle in the source-list above
             is off. Wrapper div carries `opacity-60` so the off state
             reads as "saved but inactive" instead of disappearing.
             Operator can audit configured values for a disabled
             provider without flipping it back on. -->
        <div x-show="hostStatsTab === 'node_exporter'" class="space-y-3" role="tabpanel" id="provider-tabpanel-node_exporter" aria-labelledby="provider-tab-node_exporter" :class="!hasHostStatsSource('node_exporter') ? 'opacity-60' : ''">

            </label>
            <span class="chip"
                  :class="hasHostStatsSource('node_exporter') ? 'pill-ok' : 'pill-muted'"

          </div>
          <div>
            <label class="block text-[11px] text-[var(--text-faint)] mb-1"

                   :disabled="isReadonly() || !hasHostStatsSource('node_exporter')"

            <textarea x-model="settings.node_exporter_overrides_json"
                      :disabled="isReadonly() || !hasHostStatsSource('node_exporter')" rows="5"
                      class="w-full mono text-[11.5px]"

            <p class="text-[10.5px] text-[var(--text-faint)] mt-1"
               x-text="t('settings.host_stats.overrides_hint')"></p>
          </div>

          <!-- NE probe timeout — moved here from the generic Process
               tunables section so operators editing NE config have
               the timeout knob ready to hand. Same `tuningForm` /
               `tuningEffective` Alpine state. Disabled when NE isn't
               an active provider so the disabled state matches the
               other fields above. -->
          <div class="mt-3 pt-3 border-t border-[var(--border)] space-y-3"

                         x-model="tuningForm[key]"
                         :placeholder="tuningPlaceholder(key)"
                         :min="(tuningEffective[key] || {}).min"
                         :max="(tuningEffective[key] || {}).max"
                         :disabled="tuneKnobDisabled('node_exporter')"
                         class="w-32 mono text-[12px]">
                  <div class="bounds-chips" role="group"
                       :aria-label="t('admin.config.bounds.group_label')">
                    <span class="bounds-chip bounds-chip--min"
                          :title="t('admin.config.bounds.min_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).min"></span>
                    </span>
                    <span class="bounds-chip bounds-chip--max"
                          :title="t('admin.config.bounds.max_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).max"></span>
                    </span>
                    <span class="bounds-chip bounds-chip--default"
                          :title="t('admin.config.bounds.default_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/></svg>
                      <span x-text="(tuningEffective[key] || {}).default"></span>
                    </span>

                  <span class="text-[11px] text-[var(--text-dim)] ms-auto"

                </div>
              </div>
            </template>
          </div>
          <!-- Per-provider chip colour — operator-customisable
               override that flows into the row-chip + drawer-chip

               built-in default colour" (a distinct hue per provider). -->
          <div class="pt-3 mt-3 border-t border-[var(--border)] flex items-center gap-3 flex-wrap">
            <label class="text-[11px] flex items-center gap-2">
              <span x-text="t('settings.host_stats.chip_color_label')"></span>
              <input type="color" x-model="settings.provider_color_node_exporter"

                     class="w-9 h-7 cursor-pointer p-0 bg-transparent border border-[var(--border)] rounded">
              <input type="text" x-model="settings.provider_color_node_exporter"

            <button type="button"

            <span class="chip pill-custom text-[10.5px]"

                  x-text="t('settings.host_stats.chip_color_preview')"></span>
            <p class="basis-full text-[10.5px] text-[var(--text-faint)]"
               x-text="t('settings.host_stats.chip_color_hint')"></p>
          </div>
        </div>
        <div x-show="hostStatsTab === 'beszel'" class="space-y-3" role="tabpanel" id="provider-tabpanel-beszel" aria-labelledby="provider-tab-beszel" :class="!hasHostStatsSource('beszel') ? 'opacity-60' : ''">
          <div class="flex items-center justify-between gap-2 pb-2 border-b border-dashed border-[var(--border)]">
            <label class="inline-flex items-center gap-2 text-[12px] font-medium">

            <p class="text-[10.5px] text-[var(--text-faint)] mt-1"

          <div>
            <label class="block text-[11px] text-[var(--text-faint)] mb-1"

                   :disabled="isReadonly() || !hasHostStatsSource('beszel')"

          <div>
            <label class="block text-[11px] text-[var(--text-faint)] mb-1">
              <span x-text="t('settings.host_stats.beszel_password_label')"></span>

            <span x-show="settings.beszel_password_set" class="block text-[11px] text-[var(--success)] mb-1"

                      :disabled="!hasHostStatsSource('beszel')"
                      class="btn btn-ghost text-[11.5px] secret-input-clear"
                      x-text="t('settings.host_stats.clear_secret_label')"></button>
            </div>

          <label class="inline-flex items-center gap-2 text-[12px] text-[var(--text-dim)]">
            <input type="checkbox" x-model="settings.beszel_verify_tls"
                   :disabled="isReadonly() || !hasHostStatsSource('beszel')">
            <span x-text="t('settings.host_stats.beszel_verify_tls')"></span>
          </label>
          <!-- Test button + last-connected label + result chip all on
               one row to match the Portainer / OIDC layout. Operators
               wanted the "Last connected: X ago" hint inline next to
               the button, not on a separate line below. flex-wrap
               handles narrow viewports. -->
          <div class="flex items-center gap-2 flex-wrap">
            <button x-show="isAdmin()" @click="testBeszelConnection()"
                    :disabled="(beszelTestResult && beszelTestResult.pending) || !hasHostStatsSource('beszel')"
                    class="btn btn-soft text-[12px]"
                    x-text="(beszelTestResult && beszelTestResult.pending) ? t('settings.host_stats.beszel_testing') : t('settings.host_stats.beszel_test_button')"></button>
            <span x-show="lastTestSuccessLabel('beszel')"
                  class="text-[11.5px] text-[var(--text-faint)]"

                  :class="beszelTestResult && !beszelTestResult.pending
                          ? (beszelTestResult.ok ? 'text-[var(--success)]' : 'text-[var(--danger)]')
                          : 'text-[var(--text-faint)]'"
                  x-text="beszelTestResult && !beszelTestResult.pending
                          ? ((beszelTestResult.ok ? '✓ ' : '✗ ') + (beszelTestResult.detail || ''))

          </div>
          <p class="text-[10.5px] text-[var(--text-faint)]"

          <!-- Beszel auto-pause threshold. -->

                         class="w-32 mono text-[12px]">

                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).min"></span>
                    </span>
                    <span class="bounds-chip bounds-chip--max"
                          :title="t('admin.config.bounds.max_title')">

                  :style="providerChipStyle('beszel')"
                  x-text="t('settings.host_stats.chip_color_preview')"></span>
            <p class="basis-full text-[10.5px] text-[var(--text-faint)]"
               x-text="t('settings.host_stats.chip_color_hint')"></p>

        </div>

        <!-- Pulse config — third provider. PVE-only, so it pairs well

        <div x-show="hostStatsTab === 'pulse'" class="space-y-3" role="tabpanel" id="provider-tabpanel-pulse" aria-labelledby="provider-tab-pulse" :class="!hasHostStatsSource('pulse') ? 'opacity-60' : ''">

          <p class="text-[10.5px] text-[var(--text-faint)]" x-text="t('settings.host_stats.pulse_aliases_hint')"></p>

            </template>

        <div x-show="hostStatsTab === 'webmin'" class="space-y-3" role="tabpanel" id="provider-tabpanel-webmin" aria-labelledby="provider-tab-webmin" :class="!hasHostStatsSource('webmin') ? 'opacity-60' : ''">

            <span class="chip"
                  :class="hasHostStatsSource('webmin') ? 'pill-ok' : 'pill-muted'"

          <div>

          <label class="inline-flex items-center gap-2 text-[12px] text-[var(--text-dim)]">

          <div class="flex items-center gap-2 flex-wrap">

          </div>

          <!-- Webmin tunables — three knobs moved here from the
               generic Process tunables section per operator request

               every related knob ready to hand. Same `tuningForm` /

          <div class="mt-3 pt-3 border-t border-[var(--border)] space-y-3"

                         :max="(tuningEffective[key] || {}).max"

                         class="w-32 mono text-[12px]">
                  <div class="bounds-chips" role="group"
                       :aria-label="t('admin.config.bounds.group_label')">
                    <span class="bounds-chip bounds-chip--min"
                          :title="t('admin.config.bounds.min_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).min"></span>
                    </span>
                    <span class="bounds-chip bounds-chip--max"
                          :title="t('admin.config.bounds.max_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).max"></span>
                    </span>
                    <span class="bounds-chip bounds-chip--default"
                          :title="t('admin.config.bounds.default_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/></svg>
                      <span x-text="(tuningEffective[key] || {}).default"></span>
                    </span>
                  </div>
                  <span class="text-[11px] text-[var(--text-dim)] ms-auto"

            <!-- per-section Save button removed. The main

          </div>
          <!-- Per-provider chip colour. -->
          <div class="pt-3 mt-3 border-t border-[var(--border)] flex items-center gap-3 flex-wrap">
            <label class="text-[11px] flex items-center gap-2">
              <span x-text="t('settings.host_stats.chip_color_label')"></span>

                     :disabled="isReadonly() || !hasHostStatsSource('webmin')"

              <input type="text" x-model="settings.provider_color_webmin"

        <!-- Ping — fifth provider. No credentials, no aliases.
             Defaults flow into per-host config; per-host overrides win.
             Per-host opt-in still gates probing, so this block is the
             "globals" panel. -->
        <div x-show="hostStatsTab === 'ping'" class="space-y-3" role="tabpanel" id="provider-tabpanel-ping" aria-labelledby="provider-tab-ping" :class="!hasHostStatsSource('ping') ? 'opacity-60' : ''">
          <div class="flex items-center justify-between gap-2 pb-2 border-b border-dashed border-[var(--border)]">
            <label class="inline-flex items-center gap-2 text-[12px] font-medium">
              <input type="checkbox" :disabled="isReadonly()"
                     :checked="hasHostStatsSource('ping')"
                     @change="toggleHostStatsSource('ping', $event.target.checked)">
              <span x-text="t('settings.host_stats.tab_enable_label', { provider: t('settings.host_stats.source_ping') })"></span>
            </label>
            <span class="chip"
                  :class="hasHostStatsSource('ping') ? 'pill-ok' : 'pill-muted'"
                  x-text="hasHostStatsSource('ping') ? t('settings.host_stats.tab_enabled') : t('settings.host_stats.tab_disabled')"></span>
          </div>
          <div class="flex items-center gap-2">
            <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-radio"/></svg>
            <h4 class="font-semibold text-[12.5px]"
                x-text="t('settings.host_stats.ping.section_title')"></h4>
          </div>
          <p class="text-[10.5px] text-[var(--text-faint)] mt-1"
             x-text="t('settings.host_stats.ping.section_desc')"></p>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
            <div>
              <label class="block text-[11px] text-[var(--text-faint)] mb-1"
                     x-text="t('settings.host_stats.ping.default_port_label')"></label>
              <input x-model="settings.ping_default_port" type="number" min="1" max="65535"
                     :disabled="isReadonly() || !hasHostStatsSource('ping')"
                     class="w-full mono text-[11.5px]"
                     placeholder="443">
              <p class="text-[10.5px] text-[var(--text-faint)] mt-1"
                 x-text="t('settings.host_stats.ping.default_port_hint')"></p>
            </div>
            <div>
              <label class="inline-flex items-center gap-2 text-[12px] text-[var(--text-dim)] mb-1">
                <input type="checkbox" x-model="settings.ping_use_icmp"
                       :disabled="isReadonly() || !hasHostStatsSource('ping') || !settings.ping_has_icmp_support">
                <span x-text="t('settings.host_stats.ping.use_icmp_label')"></span>
              </label>
              <p class="text-[10.5px] text-[var(--text-faint)]"
                 x-text="t('settings.host_stats.ping.use_icmp_hint')"></p>
              <p x-show="!settings.ping_has_icmp_support"
                 class="text-[10.5px] text-[var(--warning)] mt-1"
                 x-text="t('settings.host_stats.ping.icmp_unavailable')"></p>
            </div>
          </div>
          <!-- Test button — picks an opted-in host and fires a one-shot
               live probe via /api/ping/test. -->
          <div class="flex items-center gap-2 flex-wrap">
            <button x-show="isAdmin()" @click="testPingConnection()"
                    :disabled="(pingTestResult && pingTestResult.pending) || !hasHostStatsSource('ping') || !pingTestHostId"
                    class="btn btn-soft text-[12px]"
                    x-text="(pingTestResult && pingTestResult.pending) ? t('settings.host_stats.ping.test_running') : t('settings.host_stats.ping.test_button')"></button>
            <select x-model="pingTestHostId"
                    :disabled="isReadonly() || !hasHostStatsSource('ping')"
                    class="text-[11.5px] mono">
              <option value="" x-text="t('settings.host_stats.ping.test_target_label')"></option>
              <template x-for="opt in pingEnabledHosts()" :key="opt.id">
                <option :value="opt.id" x-text="opt.label"></option>
              </template>
            </select>
            <span x-show="pingTestResult && !pingTestResult.pending"
                  :class="pingTestResult && pingTestResult.ok ? 'text-[var(--success)]' : 'text-[var(--danger)]'"
                  class="text-[11.5px]"
                  x-text="(pingTestResult && pingTestResult.detail) || ''"></span>
            <span x-show="hasHostStatsSource('ping') && !pingEnabledHosts().length"
                  class="text-[10.5px] text-[var(--text-faint)] italic"
                  x-text="t('settings.host_stats.ping.test_no_hosts')"></span>
            <span x-show="lastTestSuccessLabel('ping')"
                  class="text-[11.5px] text-[var(--text-faint)]"
                  x-text="lastTestSuccessLabel('ping')"></span>
          </div>
          <!-- Ping tunables — same Alpine state as the other tunable
               cards (tuningForm / tuningEffective). Renders inline so
               operators tweaking ping have everything to hand. -->
          <div class="mt-3 pt-3 border-t border-[var(--border)] space-y-3"
               x-show="tuningLoaded">
            <template x-for="key in _perProviderTuneKeys.ping" :key="key">
              <div class="space-y-1">
                <label class="block text-[11px] font-medium"
                       x-text="t('admin.config.fields.' + key + '.label')"></label>
                <p class="text-[10.5px] text-[var(--text-faint)] leading-snug"
                   x-text="t('admin.config.fields.' + key + '.help')"></p>
                <div class="flex flex-wrap items-center gap-2">
                  <input type="number"
                         x-model="tuningForm[key]"
                         :placeholder="tuningPlaceholder(key)"
                         :min="(tuningEffective[key] || {}).min"
                         :max="(tuningEffective[key] || {}).max"
                         :disabled="tuneKnobDisabled('ping')"
                         class="w-32 mono text-[12px]">
                  <div class="bounds-chips" role="group"
                       :aria-label="t('admin.config.bounds.group_label')">
                    <span class="bounds-chip bounds-chip--min"
                          :title="t('admin.config.bounds.min_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).min"></span>
                    </span>
                    <span class="bounds-chip bounds-chip--max"
                          :title="t('admin.config.bounds.max_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).max"></span>
                    </span>
                    <span class="bounds-chip bounds-chip--default"
                          :title="t('admin.config.bounds.default_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/></svg>
                      <span x-text="(tuningEffective[key] || {}).default"></span>
                    </span>
                  </div>
                  <span class="text-[11px] text-[var(--text-dim)] ms-auto"
                        x-text="t('admin.config.effective_label', { value: (tuningEffective[key] || {}).effective })"></span>
                </div>
              </div>
            </template>
          </div>
          <!-- Per-provider chip colour. -->
          <div class="pt-3 mt-3 border-t border-[var(--border)] flex items-center gap-3 flex-wrap">
            <label class="text-[11px] flex items-center gap-2">
              <span x-text="t('settings.host_stats.chip_color_label')"></span>
              <input type="color" x-model="settings.provider_color_ping"
                     :value="settings.provider_color_ping || providerColor('ping')"
                     :disabled="isReadonly() || !hasHostStatsSource('ping')"
                     class="w-9 h-7 cursor-pointer p-0 bg-transparent border border-[var(--border)] rounded">
              <input type="text" x-model="settings.provider_color_ping"
                     @input="settings.provider_color_ping = normalizeHexColor($event.target.value)"
                     :placeholder="providerColor('ping')"
                     :disabled="isReadonly() || !hasHostStatsSource('ping')"
                     pattern="^#[0-9a-fA-F]{6}$" maxlength="7"
                     class="w-24 mono text-[11.5px] uppercase">
            </label>
            <button type="button"
                    x-show="settings.provider_color_ping"
                    @click="settings.provider_color_ping = ''"
                    class="btn btn-ghost text-[10.5px]"
                    x-text="t('settings.host_stats.chip_color_reset')"></button>
            <span class="chip pill-custom text-[10.5px]"
                  :style="providerChipStyle('ping')"
                  x-text="t('settings.host_stats.chip_color_preview')"></span>
            <p class="basis-full text-[10.5px] text-[var(--text-faint)]"
               x-text="t('settings.host_stats.chip_color_hint')"></p>
          </div>
        </div>
        <!-- SNMP provider. Sixth host-stats provider for
             managed switches / routers / printers / UPSes / managed APs
             that speak SNMP v2c/v3 but don't run unix-style agents.
             Mirrors the Webmin tab structure (per-host probe with a
             per-host alias map) plus a v3-only sub-block for USM
             credentials. -->
        <div x-show="hostStatsTab === 'snmp'" class="space-y-3" role="tabpanel" id="provider-tabpanel-snmp" aria-labelledby="provider-tab-snmp" :class="!hasHostStatsSource('snmp') ? 'opacity-60' : ''">
          <div class="flex items-center justify-between gap-2 pb-2 border-b border-dashed border-[var(--border)]">
            <label class="inline-flex items-center gap-2 text-[12px] font-medium">
              <input type="checkbox" :disabled="isReadonly() || !settings.snmp_has_snmp_support"
                     :checked="hasHostStatsSource('snmp')"
                     @change="toggleHostStatsSource('snmp', $event.target.checked)">
              <span x-text="t('settings.host_stats.tab_enable_label', { provider: t('settings.host_stats.source_snmp') })"></span>
            </label>
            <span class="chip"
                  :class="hasHostStatsSource('snmp') ? 'pill-ok' : 'pill-muted'"
                  x-text="hasHostStatsSource('snmp') ? t('settings.host_stats.tab_enabled') : t('settings.host_stats.tab_disabled')"></span>
          </div>
          <!-- when pysnmp doesn't import cleanly the SPA shows
               BOTH the generic "package not installed" hint AND the
               actual ImportError text from the server. Operators don't
               have to grep server logs to figure out which symbol or
               module path is missing — the inline error pinpoints it.
               import_error stays empty when the import succeeds. The
               import-error line uses the same `--warning` (orange)
               token as the unavailable hint so the diagnostic
               reads as a unified warning block rather than a two-tone
               muted-then-bright surface. -->
          <div x-show="!settings.snmp_has_snmp_support" class="space-y-1">
            <p class="text-[10.5px] text-[var(--warning)]"
               x-text="t('settings.host_stats.snmp.unavailable')"></p>
            <p x-show="settings.snmp_import_error"
               class="text-[10.5px] mono text-[var(--warning)] break-all"
               x-text="t('settings.host_stats.snmp.import_error_label', { error: settings.snmp_import_error })"></p>
          </div>
          <p class="text-[10.5px] text-[var(--text-faint)]"
             x-text="t('settings.host_stats.snmp.section_desc')"></p>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
            <div>
              <label class="block text-[11px] text-[var(--text-faint)] mb-1"
                     x-text="t('settings.host_stats.snmp.community_label')"></label>

                     :disabled="isReadonly() || !hasHostStatsSource('snmp')"
                     class="w-full mono text-[11.5px]"
                     placeholder="public">
            </div>
            <div>
              <label class="block text-[11px] text-[var(--text-faint)] mb-1"
                     x-text="t('settings.host_stats.snmp.version_label')"></label>
              <select x-model="settings.snmp_default_version"
                      :disabled="isReadonly() || !hasHostStatsSource('snmp')"
                      class="w-full text-[11.5px]">
                <option value="v2c">v2c</option>
                <option value="v3">v3 (USM)</option>
              </select>
            </div>
            <div>
              <label class="block text-[11px] text-[var(--text-faint)] mb-1"
                     x-text="t('settings.host_stats.snmp.port_label')"></label>
              <input x-model="settings.snmp_default_port" type="number" min="1" max="65535"
                     :disabled="isReadonly() || !hasHostStatsSource('snmp')"
                     class="w-full mono text-[11.5px]"
                     placeholder="161">
            </div>
          </div>
          <p class="text-[10.5px] text-[var(--text-faint)]"
             x-text="t('settings.host_stats.snmp.community_hint')"></p>

          <!-- v3 USM block — only visible when version=v3. -->
          <div x-show="settings.snmp_default_version === 'v3'"
               class="space-y-2 pt-3 mt-2 border-t border-dashed border-[var(--border)]">
            <h4 class="font-semibold text-[12.5px]"
                x-text="t('settings.host_stats.snmp.v3_section_title')"></h4>
            <p class="text-[10.5px] text-[var(--text-faint)]"
               x-text="t('settings.host_stats.snmp.v3_section_hint')"></p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
              <div>
                <label class="block text-[11px] text-[var(--text-faint)] mb-1"
                       x-text="t('settings.host_stats.snmp.v3_user_label')"></label>
                <input x-model="settings.snmp_v3_user" type="text"
                       :disabled="isReadonly() || !hasHostStatsSource('snmp')"
                       class="w-full text-[11.5px]"
                       :placeholder="t('settings.host_stats.snmp.v3_user_placeholder')">
              </div>
              <div>
                <label class="block text-[11px] text-[var(--text-faint)] mb-1">
                  <span x-text="t('settings.host_stats.snmp.v3_auth_key_label')"></span>
                </label>
                <span x-show="settings.snmp_v3_auth_key_set" class="block text-[11px] text-[var(--success)] mb-1"
                      x-text="t('settings.secret_input.saved_hint')"></span>
                <input x-model="settings.snmp_v3_auth_key" type="password"
                       autocomplete="new-password"
                       :disabled="isReadonly() || !hasHostStatsSource('snmp')"
                       class="w-full text-[11.5px]"
                       :placeholder="settings.snmp_v3_auth_key_set ? t('settings.secret_input.placeholder_keep') : t('settings.host_stats.snmp.v3_auth_key_placeholder')">
              </div>
              <div>
                <label class="block text-[11px] text-[var(--text-faint)] mb-1">
                  <span x-text="t('settings.host_stats.snmp.v3_priv_key_label')"></span>
                </label>
                <span x-show="settings.snmp_v3_priv_key_set" class="block text-[11px] text-[var(--success)] mb-1"
                      x-text="t('settings.secret_input.saved_hint')"></span>
                <input x-model="settings.snmp_v3_priv_key" type="password"
                       autocomplete="new-password"
                       :disabled="isReadonly() || !hasHostStatsSource('snmp')"
                       class="w-full text-[11.5px]"
                       :placeholder="settings.snmp_v3_priv_key_set ? t('settings.secret_input.placeholder_keep') : t('settings.host_stats.snmp.v3_priv_key_placeholder')">
              </div>
            </div>
          </div>

          <!-- Per-host alias map (Docker hostname → SNMP target IP/host).
               Same JSON-textarea contract as node_exporter_overrides. -->
          <div>
            <label class="block text-[11px] text-[var(--text-faint)] mb-1"
                   x-text="t('settings.host_stats.snmp.aliases_label')"></label>
            <textarea x-model="settings.snmp_aliases_json"
                      :disabled="isReadonly() || !hasHostStatsSource('snmp')" rows="5"
                      class="w-full mono text-[11.5px]"
                      :placeholder='`{\n  "switch01": "192.X.X.10",\n  "ups01": "192.X.X.50"\n}`'></textarea>
            <p class="text-[10.5px] text-[var(--text-faint)] mt-1"
               x-text="t('settings.host_stats.snmp.aliases_hint')"></p>
          </div>

          <!-- Test button + result chip — UX unified with the Ping
               test. Picker shows curated hosts that have an
               `snmp_name` mapped; testSnmpConnection resolves the
               row's target + overrides client-side and submits to
               /api/snmp/test, falling back to global defaults
               server-side for fields the row doesn't override. -->
          <div class="flex items-center gap-2 flex-wrap">
            <button x-show="isAdmin()" @click="testSnmpConnection()"
                    :disabled="(snmpTestResult && snmpTestResult.pending) || !hasHostStatsSource('snmp') || !snmpTestHostId"
                    class="btn btn-soft text-[12px]"
                    x-text="(snmpTestResult && snmpTestResult.pending) ? t('settings.host_stats.snmp.testing') : t('settings.host_stats.snmp.test_button')"></button>
            <select x-model="snmpTestHostId"
                    :disabled="isReadonly() || !hasHostStatsSource('snmp')"
                    class="text-[11.5px] mono">
              <option value="" x-text="t('settings.host_stats.snmp.test_target_label')"></option>
              <template x-for="opt in snmpEnabledHosts()" :key="opt.id">
                <option :value="opt.id" x-text="opt.label"></option>
              </template>
            </select>
            <span x-show="snmpTestResult && !snmpTestResult.pending"
                  :class="snmpTestResult && snmpTestResult.ok ? 'text-[var(--success)]' : 'text-[var(--danger)]'"
                  class="text-[11.5px]"
                  x-text="(snmpTestResult && snmpTestResult.ok ? '✓ ' : '✗ ') + (snmpTestResult && snmpTestResult.detail || '')"></span>
            <span x-show="hasHostStatsSource('snmp') && !snmpEnabledHosts().length"
                  class="text-[10.5px] text-[var(--text-faint)] italic"
                  x-text="t('settings.host_stats.snmp.test_no_hosts')"></span>
            <span x-show="lastTestSuccessLabel('snmp')"
                  class="text-[11.5px] text-[var(--text-faint)]"
                  x-text="lastTestSuccessLabel('snmp')"></span>
          </div>

          <!-- Tunables — SNMP probe timeout + concurrency. Same Alpine
               state pattern as the other relocated tunables. -->
          <div class="mt-3 pt-3 border-t border-[var(--border)] space-y-3"
               x-show="tuningLoaded">
            <template x-for="key in _perProviderTuneKeys.snmp" :key="key">
              <div class="space-y-1">
                <label class="block text-[11px] font-medium"
                       x-text="t('admin.config.fields.' + key + '.label')"></label>
                <p class="text-[10.5px] text-[var(--text-faint)] leading-snug"
                   x-text="t('admin.config.fields.' + key + '.help')"></p>
                <div class="flex flex-wrap items-center gap-2">
                  <input type="number"
                         x-model="tuningForm[key]"
                         :placeholder="tuningPlaceholder(key)"
                         :min="(tuningEffective[key] || {}).min"
                         :max="(tuningEffective[key] || {}).max"
                         :disabled="tuneKnobDisabled('snmp')"
                         class="w-32 mono text-[12px]">
                  <div class="bounds-chips" role="group"
                       :aria-label="t('admin.config.bounds.group_label')">
                    <span class="bounds-chip bounds-chip--min"
                          :title="t('admin.config.bounds.min_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).min"></span>
                    </span>
                    <span class="bounds-chip bounds-chip--max"
                          :title="t('admin.config.bounds.max_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).max"></span>
                    </span>
                    <span class="bounds-chip bounds-chip--default"
                          :title="t('admin.config.bounds.default_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/></svg>
                      <span x-text="(tuningEffective[key] || {}).default"></span>
                    </span>
                  </div>
                  <span class="text-[11px] text-[var(--text-dim)] ms-auto"
                        x-text="t('admin.config.effective_label', { value: (tuningEffective[key] || {}).effective })"></span>
                </div>
              </div>
            </template>
          </div>

          <!-- Per-provider chip colour. -->
          <div class="pt-3 mt-3 border-t border-[var(--border)] flex items-center gap-3 flex-wrap">
            <label class="text-[11px] flex items-center gap-2">
              <span x-text="t('settings.host_stats.chip_color_label')"></span>
              <input type="color" x-model="settings.provider_color_snmp"
                     :value="settings.provider_color_snmp || providerColor('snmp')"
                     :disabled="isReadonly() || !hasHostStatsSource('snmp')"
                     class="w-9 h-7 cursor-pointer p-0 bg-transparent border border-[var(--border)] rounded">
              <input type="text" x-model="settings.provider_color_snmp"
                     @input="settings.provider_color_snmp = normalizeHexColor($event.target.value)"
                     :placeholder="providerColor('snmp')"
                     :disabled="isReadonly() || !hasHostStatsSource('snmp')"
                     pattern="^#[0-9a-fA-F]{6}$" maxlength="7"
                     class="w-24 mono text-[11.5px] uppercase">
            </label>
            <button type="button"
                    x-show="settings.provider_color_snmp"
                    @click="settings.provider_color_snmp = ''"
                    class="btn btn-ghost text-[10.5px]"
                    x-text="t('settings.host_stats.chip_color_reset')"></button>
            <span class="chip pill-custom text-[10.5px]"
                  :style="providerChipStyle('snmp')"
                  x-text="t('settings.host_stats.chip_color_preview')"></span>
            <p class="basis-full text-[10.5px] text-[var(--text-faint)]"
               x-text="t('settings.host_stats.chip_color_hint')"></p>
          </div>
        </div>

        <!-- Save + unsaved-changes indicator. Same visual treatment as
             the Admin → Hosts editor so the two match: amber ring on
             the Save button when dirty, animated amber dot + label
             next to it. `hostStatsDirty()` compares the live settings
             against a baseline captured on loadSettings / save. -->
        <div class="mt-4 flex items-center gap-3 flex-wrap">
          <button x-show="isAdmin()" @click="saveHostStats()"
                  :disabled="hostStatsSaving"
                  :class="hostStatsDirty() ? 'ring-2 ring-[var(--warning)]' : ''"
                  class="btn btn-primary text-[12px]">
            <span x-show="!hostStatsSaving" x-text="t('actions.save')"></span>
            <span x-show="hostStatsSaving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving')"></span></span>
          </button>
          <span x-show="hostStatsDirty()"
                class="text-[11.5px] text-[var(--warning)] flex items-center gap-1.5"
                :title="t('hosts_actions.host_stats_unsaved_title')">
            <span class="w-1.5 h-1.5 rounded-full bg-[var(--warning)] animate-pulse"></span>
            <span class="unsaved-flash" x-text="t('hosts_actions.unsaved_label')"></span>
          </span>
        </div>
      </section>

      <!-- HOSTS TAB — curated host list editor. Cards instead of a
           table so inputs have room to breathe. Each card edits one
           host: basic row on top (ID / Label / enabled / delete),
           provider-specific fields expand below in a 3-col grid so
           each input gets a sensible minimum width. -->
