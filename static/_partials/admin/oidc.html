<!--suppress HtmlUnknownAttribute -->
<section x-show="adminTab==='oidc'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
  <div class="flex items-start justify-between">
    <div>
      <div class="flex items-center gap-2 mb-2">
        <!-- text-color MUST be on the <svg>, not the parent — `currentColor`
             inside an external <use> doesn't reliably inherit
             from a parent div across browsers; it does inherit
             from the SVG element itself. Same pattern as every
             other working admin-header sprite consumer. -->
        <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-authentik"/>
        </svg>
        <h3 class="font-semibold fs-md" x-text="t('settings.oidc.title')"></h3>
      </div>
      <p class="fs-xs text-[var(--text-faint)] mb-3" x-text="t('settings.oidc.description')"></p>
    </div>
    <span x-show="oidcStatus"
          class="chip"
          :class="oidcStatus && oidcStatus.enabled ? 'pill-ok' : 'pill-muted'"
          x-text="oidcStatus ? (oidcStatus.enabled ? t('settings.oidc.enabled') : t('settings.oidc.disabled')) : ''"></span>
  </div>
  <div x-show="oidcStatus" class="space-y-3">
    <label class="flex items-center gap-2 fs-sm cursor-pointer select-none">
      <input type="checkbox" :checked="oidcForm.enabled"
             @change="oidcForm.enabled = $event.target.checked; markOidcFormDirty()"
             :disabled="isReadonly()">
      <span class="font-medium" x-text="t('settings.oidc.enable_toggle')"></span>
      <span class="fs-xs text-[var(--text-faint)]"
            x-text="oidcForm.enabled ? '' : t('admin_integrations.disabled_hint')"></span>
    </label>
    <div>
      <label for="og-oidc-issuer-url" class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('settings.oidc.issuer_url')"></label>
      <input id="og-oidc-issuer-url" x-model="oidcForm.issuer_url" type="url"
             @input="markOidcFormDirty()"
             :disabled="isReadonly() || !oidcForm.enabled"
             :placeholder="t('settings.oidc.issuer_placeholder')"
             class="w-full mono fs-sm">
      <p class="fs-xs text-[var(--text-faint)] mt-1" x-html="t('settings.oidc.issuer_hint')"></p>
    </div>
    <div>
      <label for="og-oidc-client-id" class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('settings.oidc.client_id')"></label>
      <input id="og-oidc-client-id" x-model="oidcForm.client_id" type="text"
             @input="markOidcFormDirty()"
             :disabled="isReadonly() || !oidcForm.enabled"
             :placeholder="t('settings.oidc.client_id_placeholder')"
             class="w-full mono fs-sm">
    </div>
    <div>
      <label for="og-oidc-client-secret" class="block fs-xs text-[var(--text-dim)] mb-1">
        <span x-text="t('settings.oidc.client_secret')"></span>
      </label>
      <span x-show="oidcStatus && oidcStatus.client_secret_set"
            class="block fs-xs text-[var(--success)] mb-1"
            x-text="t('settings.secret_input.saved_hint')"></span>
      <div class="secret-input-row">
        <input id="og-oidc-client-secret" x-model="oidcForm.client_secret" type="password"
               @input="markOidcFormDirty()"
               :disabled="isReadonly() || !oidcForm.enabled"
               :placeholder="(oidcStatus && oidcStatus.client_secret_set) ? t('settings.secret_input.placeholder_keep') : t('settings.oidc.client_secret_placeholder')"
               autocomplete="new-password"
               class="w-full mono fs-sm">
        <button type="button"
                x-show="oidcStatus && oidcStatus.client_secret_set && isAdmin()"
                @click="clearOidcClientSecret()"
                :disabled="!oidcForm.enabled"
                class="btn btn-ghost fs-xs secret-input-clear"
                x-text="t('settings.host_stats.clear_secret_label')"></button>
      </div>
    </div>
    <div>
      <label for="og-oidc-redirect-uri" class="block fs-xs text-[var(--text-dim)] mb-1">
        <span x-text="t('settings.oidc.redirect_uri')"></span> <span class="text-[var(--text-faint)]" x-text="t('settings.oidc.redirect_uri_note')"></span>
      </label>
      <div class="flex items-stretch gap-2">
        <input id="og-oidc-redirect-uri" :value="oidcStatus && oidcStatus.redirect_uri_default || ''" readonly
               class="w-full mono fs-sm flex-1 bg-[var(--surface-2)]">
        <button @click="copyRedirectUri()" type="button"
                class="btn btn-soft fs-sm whitespace-nowrap"
                :title="t('settings.oidc.copy_title')" x-text="t('settings.oidc.copy')"></button>
      </div>
      <p class="fs-xs text-[var(--text-faint)] mt-1" x-text="t('settings.oidc.redirect_uri_hint')"></p>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div>
        <label for="og-oidc-scopes" class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('settings.oidc.scopes')"></label>
        <input id="og-oidc-scopes" x-model="oidcForm.scopes" type="text"
               @input="markOidcFormDirty()"
               :disabled="isReadonly() || !oidcForm.enabled"
               :placeholder="t('settings.oidc.scopes_placeholder')"
               class="w-full mono fs-sm">
        <p class="fs-xs text-[var(--text-faint)] mt-1" x-html="t('settings.oidc.scopes_hint')"></p>
      </div>
      <div>
        <label for="og-oidc-admin-group" class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('settings.oidc.admin_group')"></label>
        <input id="og-oidc-admin-group" x-model="oidcForm.admin_group" type="text"
               @input="markOidcFormDirty()"
               :disabled="isReadonly() || !oidcForm.enabled"
               :placeholder="t('settings.oidc.admin_group_placeholder')"
               class="w-full mono fs-sm">
        <p class="fs-xs text-[var(--text-faint)] mt-1" x-html="t('settings.oidc.admin_group_hint')"></p>
      </div>
    </div>
    <!-- Verify TLS toggle — help text BEFORE the checkbox
         (operator-canonical pattern matching Authentication /
         Public IP / Notifications). Indent dropped so the
         checkbox row aligns flush-left with the rest of the
         form. -->
    <div>
      <span class="block fs-xs text-[var(--text-faint)] mb-1" x-html="t('settings.oidc.verify_tls_hint')"></span>
      <label class="flex items-center gap-2 fs-sm cursor-pointer">
        <input type="checkbox" :checked="oidcForm.verify_tls"
               @change="oidcForm.verify_tls = $event.target.checked; markOidcFormDirty()"
               :disabled="isReadonly() || !oidcForm.enabled">
        <span class="font-medium" x-text="t('settings.oidc.verify_tls_title')"></span>
      </label>
    </div>
    <div>
      <span class="block fs-xs text-[var(--text-faint)] mb-1" x-html="t('settings.oidc.group_case_sensitive_hint')"></span>
      <label class="flex items-center gap-2 fs-sm cursor-pointer">
        <input type="checkbox" :checked="oidcForm.group_case_sensitive"
               @change="oidcForm.group_case_sensitive = $event.target.checked; markOidcFormDirty()"
               :disabled="isReadonly() || !oidcForm.enabled">
        <span class="font-medium" x-text="t('settings.oidc.group_case_sensitive_title')"></span>
      </label>
    </div>
    <!-- OIDC tunables — canonical header pattern (icon + h3 +
         intro paragraph) matching every other admin tab
         (AI / Asset Inventory / Portainer / Notifications / NE /
         SSH / Beszel / Pulse / Ping / Webmin / SNMP). Outbound
         HTTP wall-clock covers discovery / JWKS / token exchange /
         Test-connection probe. All edits commit through the OIDC
         Save button. -->
    <details x-show="isAdmin()" class="mt-3 bg-[var(--surface-2)] border border-[var(--border)] rounded-md p-3">
      <summary class="cursor-pointer fs-sm font-medium select-none flex items-center gap-2">
        <svg width="12" height="12" class="transition-transform" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/></svg>
        <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sliders"/></svg>
        <span x-text="t('common.tunables')"></span>
      </summary>
      <div class="mt-3 space-y-3">
      <p class="fs-2xs text-[var(--text-faint)] mb-2 leading-snug"
         x-text="t('settings.oidc.tunables_intro')"></p>
      <div class="border-t border-[var(--border)] mb-3" aria-hidden="true"></div>
      <div x-show="!tuningLoaded" class="flex items-center gap-2 fs-xs text-[var(--text-faint)] py-2">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('common.loading')"></span>
      </div>
      <template x-for="key in (tuningLoaded ? ['tuning_oidc_http_timeout_seconds'] : [])"
                :key="key">
        <div>
          <label :for="'og-oidc-tunable-' + key" class="block fs-xs font-medium mb-1"
                 x-text="t('admin.config.fields.' + key + '.label')"></label>
          <p class="fs-2xs text-[var(--text-faint)] leading-snug mb-2"
             x-text="t('admin.config.fields.' + key + '.help')"></p>
          <div class="flex flex-wrap items-center gap-2">
            <!--
              The label-association IS in place via Alpine's :for
              (label) and :id (input) — both resolve to
              og-oidc-tunable-<KEY> at render time. WebStorm's
              "Missing associated label" inspection is static-HTML-
              only and doesn't evaluate colon-prefixed Alpine
              bindings, so it sees just :id (an unknown attribute)
              and flags the input as unlabeled. Same false-positive
              class the top-of-file HtmlUnknownAttribute suppress
              already covers; this is a narrower suppress for the
              one input where it fires.
            -->
            <!--suppress HtmlFormInputWithoutLabel -->
            <input :id="'og-oidc-tunable-' + key" type="number"
                   x-model="tuningForm[key]"
                   :placeholder="tuningPlaceholder(key)"
                   :min="(tuningEffective[key] || {}).min"
                   :max="(tuningEffective[key] || {}).max"
                   :disabled="isReadonly() || !oidcForm.enabled"
                   class="w-44 mono fs-sm py-1">
            <div class="bounds-chips" role="group"
                 :aria-label="t('admin.config.bounds.group_label')">
                    <span class="bounds-chip bounds-chip--min" :title="t('admin.config.bounds.min_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).min"></span>
                    </span>
              <span class="bounds-chip bounds-chip--max" :title="t('admin.config.bounds.max_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).max"></span>
                    </span>
              <span class="bounds-chip bounds-chip--default" :title="t('admin.config.bounds.default_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/></svg>
                      <span x-text="(tuningEffective[key] || {}).default"></span>
                    </span>
            </div>
            <span class="fs-2xs text-[var(--text-faint)] ms-auto"
                  x-text="tuningEffectiveLabel(key)"></span>
          </div>
        </div>
      </template>
      </div>
    </details>
    <div x-show="isAdmin()" class="flex items-center gap-3 flex-wrap pt-3 border-t border-[var(--border)]">
      <!-- Same Save-gating as Admin → Portainer: when OIDC is
           enabled, Save is locked until a Test connection has
           succeeded against the CURRENT form values; any edit
           after a passing Test re-locks Save. When the master
           toggle is OFF the gate releases (no IdP probe will
           fire either way). -->
      <button type="button" @click="saveOidcSettings()"
              :disabled="oidcSaving || !canSaveOidc()"
              :class="oidcDirty() ? 'ring-2 ring-[var(--warning)]' : ''"
              :title="!canSaveOidc() ? t('settings.oidc.save_requires_test') : ''"
              class="btn btn-primary fs-sm">
        <span x-show="!oidcSaving" x-text="t('actions.save')"></span>
        <span x-show="oidcSaving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving')"></span></span>
      </button>
      <!--
        Disabled gate uses strict-equality on `pending` so the
        button NEVER stays disabled after a failed test (the
        result object stamps `pending: false` on every outcome
        branch, but defence-in-depth here means even a regression
        that omits the field can't visually wedge the button —
        `undefined === true` is always false). Pre-fix the gate
        was `(oidcTestResult && oidcTestResult.pending)` which
        evaluated to `undefined` (also falsy) but read
        ambiguously to anyone reviewing the markup AND would
        still wedge if any reactive proxy ever surfaced `true`
        for a missing property.
      -->
      <button type="button" @click="testOidcConnection()"
              :disabled="!oidcForm.enabled || (oidcTestResult && oidcTestResult.pending === true)"
              class="btn btn-soft fs-sm inline-flex items-center gap-1.5">
        <svg width="13" height="13" :class="(oidcTestResult && oidcTestResult.pending === true) ? 'spin-md' : ''" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-play"/>
        </svg>
        <span x-show="!(oidcTestResult && oidcTestResult.pending === true)" x-text="t('settings.oidc.test_button')"></span>
        <span x-show="oidcTestResult && oidcTestResult.pending === true" x-text="t('actions.testing')"></span>
      </button>
      <span x-show="lastTestSuccessLabel('oidc')"
            class="fs-xs text-[var(--text-faint)]"
            x-text="lastTestSuccessLabel('oidc')"></span>
      <span x-show="oidcDirty()"
            class="fs-xs text-[var(--warning)] flex items-center gap-1.5">
              <span class="w-1.5 h-1.5 rounded-full bg-[var(--warning)] animate-pulse"></span>
              <span class="unsaved-flash" x-text="t('hosts_actions.unsaved_label')"></span>
            </span>
    </div>
    <div x-show="oidcForm.enabled && !canSaveOidc()"
         class="fs-xs text-[var(--text-faint)] -mt-1"
         x-text="t('settings.oidc.save_requires_test')"></div>
    <div x-show="oidcTestResult" class="fs-sm rounded-md px-3 py-2"
         :class="(oidcTestResult && oidcTestResult.pending) ? 'bg-[var(--pill-warning-bg)] text-[var(--pill-warning-fg)] border border-[var(--pill-warning-br)]' : (oidcTestResult && oidcTestResult.ok ? 'bg-[var(--pill-ok-bg)] text-[var(--pill-ok-fg)] border border-[var(--pill-ok-br)]' : 'bg-[var(--pill-error-bg)] text-[var(--pill-error-fg)] border border-[var(--pill-error-br)]')">
      <template x-if="oidcTestResult && oidcTestResult.pending">
        <span x-text="t('loading.testing')"></span>
      </template>
      <template x-if="oidcTestResult && !oidcTestResult.pending">
              <span>
                <span x-text="oidcTestResult.ok ? '✓' : '✗'"></span>
                <span class="ms-1" x-text="oidcTestResult.detail"></span>
              </span>
      </template>
    </div>
  </div>
</section>
