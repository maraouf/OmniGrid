      <section x-show="adminTab==='port_scan'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
        <!-- Title row + Enabled/Disabled pill — matches Admin →
             SSH / Portainer / Notifications visual rhythm. Port Scan
             was originally filed under Admin → Providers but it isn't
             a continuous-telemetry source like Beszel / Pulse / NE /
             Webmin / SNMP / Ping — it's an on-demand action surface
             closer in spirit to SSH (operator-triggered, not polled).
             Lifted into its own admin tab placed AFTER SSH so the
             two action-style admin surfaces sit together. -->
        <div class="flex items-start justify-between">
          <div>
            <div class="flex items-center gap-2 mb-2">
              <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-search"/></svg>
              <h3 class="font-semibold text-[13px]" x-text="t('admin_port_scan.title')"></h3>
            </div>
            <p class="text-[11.5px] text-[var(--text-faint)] mb-3 leading-snug max-w-[720px]"
               x-text="t('admin_port_scan.intro')"></p>
          </div>
          <span class="chip"
                :class="settings.port_scan_enabled ? 'pill-ok' : 'pill-muted'"
                x-text="settings.port_scan_enabled ? t('settings.host_stats.tab_enabled') : t('settings.host_stats.tab_disabled')"></span>
        </div>

        <!-- Master toggle. Mirrors the master-toggle dirty-mark pattern
             documented in CLAUDE.md ("Master-toggle pattern across
             admin tabs"): clicking the toggle ONLY marks the form
             dirty; dependent inputs visually disable; Save is what
             commits. Backend short-circuits on `port_scan_enabled` —
             `_merge_one_host` skips the detected_ports stamp and
             `POST /api/hosts/{id}/port-scan` returns a 400 when off. -->
        <div class="flex items-center justify-between gap-2 pb-2 border-b border-dashed border-[var(--border)] mt-2">
          <label class="inline-flex items-center gap-2 text-[12px] font-medium">
            <input type="checkbox"
                   :disabled="isReadonly()"
                   x-model="settings.port_scan_enabled">
            <span x-text="t('admin_port_scan.master_toggle_label')"></span>
          </label>
        </div>

        <p class="text-[10.5px] text-[var(--text-faint)] mt-3"
           x-text="t('settings.host_stats.port_scan.section_desc')"></p>

        <div class="mt-3">
          <label class="block text-[11px] text-[var(--text-faint)] mb-1"
                 x-text="t('settings.host_stats.port_scan.default_ports_label')"></label>
          <input x-model="settings.port_scan_default_ports" type="text"
                 :disabled="isReadonly() || !settings.port_scan_enabled"
                 class="w-full mono text-[11.5px]"
                 placeholder="22,80,443,8000-8100">
          <p class="text-[10.5px] text-[var(--text-faint)] mt-1"
             x-text="t('settings.host_stats.port_scan.default_ports_hint')"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
          <div>
            <label class="block text-[11px] text-[var(--text-faint)] mb-1"
                   x-text="t('admin.config.fields.tuning_port_scan_default_timeout_seconds.label')"></label>
            <input x-model="tuningForm['tuning_port_scan_default_timeout_seconds']"
                   type="number"
                   :placeholder="tuningPlaceholder('tuning_port_scan_default_timeout_seconds')"
                   :min="(tuningEffective['tuning_port_scan_default_timeout_seconds'] || {}).min"
                   :max="(tuningEffective['tuning_port_scan_default_timeout_seconds'] || {}).max"
                   :disabled="isReadonly() || !settings.port_scan_enabled || tuningSaving"
                   class="w-full mono text-[11.5px]">
            <p class="text-[10.5px] text-[var(--text-faint)] mt-1"
               x-text="t('admin.config.fields.tuning_port_scan_default_timeout_seconds.help')"></p>
          </div>
          <div>
            <label class="block text-[11px] text-[var(--text-faint)] mb-1"
                   x-text="t('admin.config.fields.tuning_port_scan_default_concurrency.label')"></label>
            <input x-model="tuningForm['tuning_port_scan_default_concurrency']"
                   type="number"
                   :placeholder="tuningPlaceholder('tuning_port_scan_default_concurrency')"
                   :min="(tuningEffective['tuning_port_scan_default_concurrency'] || {}).min"
                   :max="(tuningEffective['tuning_port_scan_default_concurrency'] || {}).max"
                   :disabled="isReadonly() || !settings.port_scan_enabled || tuningSaving"
                   class="w-full mono text-[11.5px]">
            <p class="text-[10.5px] text-[var(--text-faint)] mt-1"
               x-text="t('admin.config.fields.tuning_port_scan_default_concurrency.help')"></p>
          </div>
        </div>

        <!-- Outer scan budget + banner-grab read timeout. Both flow
             through TUNABLES so operators can extend the budget for
             larger ranges (the 11000-port range cap can need 10-15
             min on slow links) and tune banner read for noisy
             services without redeploy. -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
          <div>
            <label class="block text-[11px] text-[var(--text-faint)] mb-1"
                   x-text="t('admin.config.fields.tuning_port_scan_max_seconds.label')"></label>
            <input x-model="tuningForm['tuning_port_scan_max_seconds']"
                   type="number"
                   :placeholder="tuningPlaceholder('tuning_port_scan_max_seconds')"
                   :min="(tuningEffective['tuning_port_scan_max_seconds'] || {}).min"
                   :max="(tuningEffective['tuning_port_scan_max_seconds'] || {}).max"
                   :disabled="isReadonly() || !settings.port_scan_enabled || tuningSaving"
                   class="w-full mono text-[11.5px]">
            <p class="text-[10.5px] text-[var(--text-faint)] mt-1"
               x-text="t('admin.config.fields.tuning_port_scan_max_seconds.help')"></p>
          </div>
          <div>
            <label class="block text-[11px] text-[var(--text-faint)] mb-1"
                   x-text="t('admin.config.fields.tuning_port_scan_banner_read_seconds.label')"></label>
            <input x-model="tuningForm['tuning_port_scan_banner_read_seconds']"
                   type="number"
                   :placeholder="tuningPlaceholder('tuning_port_scan_banner_read_seconds')"
                   :min="(tuningEffective['tuning_port_scan_banner_read_seconds'] || {}).min"
                   :max="(tuningEffective['tuning_port_scan_banner_read_seconds'] || {}).max"
                   :disabled="isReadonly() || !settings.port_scan_enabled || tuningSaving"
                   class="w-full mono text-[11.5px]">
            <p class="text-[10.5px] text-[var(--text-faint)] mt-1"
               x-text="t('admin.config.fields.tuning_port_scan_banner_read_seconds.help')"></p>
          </div>
        </div>

        <p class="text-[10.5px] text-[var(--text-faint)] italic mt-3"
           x-text="t('settings.host_stats.port_scan.on_demand_note')"></p>

        <!-- Save + unsaved-changes indicator. The page now mixes
             plain settings (`port_scan_enabled` + the CSV
             `port_scan_default_ports`) AND TUNABLES (the four
             integer knobs); the Save row commits BOTH when either
             is dirty. Same pattern as Admin → AI Integration. -->
        <div class="mt-4 flex items-center gap-3 flex-wrap pt-3 border-t border-[var(--border)]">
          <button x-show="isAdmin()" @click="if (hostStatsDirty()) saveHostStats(); if (tuningDirty()) saveTuning();"
                  :disabled="hostStatsSaving || tuningSaving || (!hostStatsDirty() && !tuningDirty())"
                  :class="(hostStatsDirty() || tuningDirty()) ? 'ring-2 ring-[var(--warning)]' : ''"
                  class="btn btn-primary text-[12px]">
            <span x-show="!hostStatsSaving && !tuningSaving" x-text="t('actions.save')"></span>
            <span x-show="hostStatsSaving || tuningSaving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving')"></span></span>
          </button>
          <span x-show="hostStatsDirty() || tuningDirty()"
                class="text-[11.5px] text-[var(--warning)] flex items-center gap-1.5"
                :title="t('hosts_actions.host_stats_unsaved_title')">
            <span class="w-1.5 h-1.5 rounded-full bg-[var(--warning)] animate-pulse"></span>
            <span x-text="t('common.unsaved')"></span>
          </span>
        </div>
      </section>
