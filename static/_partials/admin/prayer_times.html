<!--suppress HtmlUnknownAttribute -->
<section x-show="adminTab==='prayer_times'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
  <!-- Title row + Enabled/Disabled pill — matches every other
       master-toggled admin tab (Weather / Public IP / Portainer). -->
  <div class="flex items-center justify-between gap-2 mb-2">
    <div class="flex items-center gap-2">
      <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-mosque"/>
      </svg>
      <h3 class="font-semibold fs-md" x-text="t('admin_prayer_times.title') || 'Prayer Times'"></h3>
    </div>
    <span x-show="!settingsLoaded" class="chip pill-muted inline-flex items-center gap-1.5">
      <span class="spin" aria-hidden="true"></span>
      <span x-text="t('common.loading') || 'Loading…'"></span>
    </span>
    <span x-show="settingsLoaded" class="chip"
          :class="settings.prayer_times_enabled ? 'pill-ok' : 'pill-muted'"
          x-text="settings.prayer_times_enabled ? t('admin_integrations.enabled_pill') : t('admin_integrations.disabled_pill')"></span>
  </div>
  <p class="fs-xs text-[var(--text-faint)] mb-3 leading-snug max-w-[720px]"
     x-text="t('admin_prayer_times.intro') || 'Show the five daily prayers + the Hijri date on a custom-dashboard widget card, and let the AI assistant + Telegram bot answer prayer-time and Hijri-calendar questions. Times come from the AlAdhan API (api.aladhan.com — free, no API key). The widget uses each user\'s saved Weather location; set a calculation method + Asr school below.'"></p>

  <!-- Master switch (prayer_times_enabled — a plain DB setting like
       weather_enabled, loads with settingsLoaded; NOT a tunable). Help
       text BEFORE the checkbox per the canonical admin-section pattern. -->
  <p class="fs-xs text-[var(--text-faint)] mb-1 leading-snug max-w-[720px]"
     x-text="t('admin_prayer_times.enable_hint') || 'When off, the widget shows a disabled state and no outbound call to api.aladhan.com is made.'"></p>
  <label class="flex items-center gap-2 fs-sm cursor-pointer mb-3 select-none">
    <input type="checkbox"
           x-model="settings.prayer_times_enabled"
           :disabled="isReadonly() || !settingsLoaded">
    <span class="font-medium" x-text="t('admin_integrations.enabled_label')"></span>
    <span x-show="!settingsLoaded" class="fs-xs text-[var(--text-faint)] inline-flex items-center gap-1.5">
      <span class="spin" aria-hidden="true"></span>
      <span x-text="t('common.loading') || 'Loading…'"></span>
    </span>
  </label>

  <!-- Calculation method + Asr school + fallback location settings.
       DB-backed (prayer_times_* settings). Disabled until the master
       toggle is on, mirroring the weather/portainer dependent-input
       pattern. -->
  <div class="space-y-3 max-w-[560px]"
       :class="settings.prayer_times_enabled ? '' : 'opacity-60'">
    <div>
      <label for="prayer-method" class="block fs-xs font-medium mb-1"
             x-text="t('admin_prayer_times.method_label') || 'Calculation method'"></label>
      <p class="fs-2xs text-[var(--text-faint)] leading-snug mb-1"
         x-text="t('admin_prayer_times.method_help') || 'The authority whose Fajr / Isha twilight angles are used. Pick the one standard in your region.'"></p>
      <select id="prayer-method" x-model="settings.prayer_times_method"
              :disabled="isReadonly() || !settings.prayer_times_enabled"
              class="w-full bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm">
        <option value="" x-text="t('admin_prayer_times.method_default_option', { n: (settings.prayer_times && settings.prayer_times.default_method) }) || ('App default (' + ((settings.prayer_times && settings.prayer_times.default_method) || 5) + ')')"></option>
        <template x-for="m in ((settings.prayer_times && settings.prayer_times.methods) || [])" :key="m.id">
          <option :value="String(m.id)" x-text="m.id + ' — ' + m.name"></option>
        </template>
      </select>
    </div>
    <div>
      <label for="prayer-school" class="block fs-xs font-medium mb-1"
             x-text="t('admin_prayer_times.school_label') || 'Asr school (madhab)'"></label>
      <p class="fs-2xs text-[var(--text-faint)] leading-snug mb-1"
         x-text="t('admin_prayer_times.school_help') || 'Standard (Shafi\'i / Maliki / Hanbali): Asr when shadow = object length. Hanafi: Asr when shadow = twice the object length (later).'"></p>
      <select id="prayer-school" x-model="settings.prayer_times_school"
              :disabled="isReadonly() || !settings.prayer_times_enabled"
              class="w-full bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm">
        <option value="" x-text="t('admin_prayer_times.school_default_option') || 'App default (Standard / Shafi\'i)'"></option>
        <option value="0" x-text="t('admin_prayer_times.school_standard') || '0 — Standard (Shafi\'i / Maliki / Hanbali)'"></option>
        <option value="1" x-text="t('admin_prayer_times.school_hanafi') || '1 — Hanafi'"></option>
      </select>
    </div>

    <!-- Fallback location — used ONLY when a user has no saved Weather
         location. The widget itself prefers each user's own Weather
         location. -->
    <div class="pt-2 border-t border-[var(--border)]">
      <p class="fs-xs font-medium mb-1"
         x-text="t('admin_prayer_times.location_label') || 'Default location (fallback)'"></p>
      <p class="fs-2xs text-[var(--text-faint)] leading-snug mb-2"
         x-text="t('admin_prayer_times.location_help') || 'Used only when a user has no saved Weather location. Each user\'s own Weather location takes precedence.'"></p>
      <div class="flex flex-wrap gap-2">
        <label class="contents">
          <input type="text" inputmode="decimal" x-model="settings.prayer_times_default_lat"
                 :aria-label="t('admin_prayer_times.lat_label') || 'Default latitude'"
                 :disabled="isReadonly() || !settings.prayer_times_enabled"
                 :placeholder="t('admin_prayer_times.lat_placeholder') || 'Latitude (e.g. 30.0444)'"
                 class="w-44 bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm mono">
        </label>
        <label class="contents">
          <input type="text" inputmode="decimal" x-model="settings.prayer_times_default_lon"
                 :aria-label="t('admin_prayer_times.lon_label') || 'Default longitude'"
                 :disabled="isReadonly() || !settings.prayer_times_enabled"
                 :placeholder="t('admin_prayer_times.lon_placeholder') || 'Longitude (e.g. 31.2357)'"
                 class="w-44 bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm mono">
        </label>
        <label class="contents">
          <input type="text" x-model="settings.prayer_times_default_label"
                 :aria-label="t('admin_prayer_times.label_field_label') || 'Default location label'"
                 :disabled="isReadonly() || !settings.prayer_times_enabled"
                 :placeholder="t('admin_prayer_times.label_placeholder') || 'Label (e.g. Cairo)'"
                 class="flex-1 min-w-[140px] bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm">
        </label>
      </div>
    </div>

    <!-- AlAdhan base URL override. Blank = the documented default
         (api.aladhan.com/v1). Plain field (not collapsed) per operator
         preference. -->
    <div>
      <label for="prayer-base-url" class="block fs-xs font-medium mb-1"
             x-text="t('admin_prayer_times.base_url_label') || 'AlAdhan API base URL'"></label>
      <p class="fs-2xs text-[var(--text-faint)] leading-snug mb-1"
         x-text="t('admin_prayer_times.base_url_help') || 'AlAdhan REST base. Leave blank for the default (api.aladhan.com/v1).'"></p>
      <input id="prayer-base-url" type="text" x-model="settings.prayer_times_api_base_url"
             :aria-label="t('admin_prayer_times.base_url_label') || 'AlAdhan API base URL'"
             :disabled="isReadonly()"
             :placeholder="t('admin_prayer_times.base_url_placeholder') || 'api.aladhan.com/v1'"
             class="w-full bg-[var(--surface-2)] border border-[var(--border)] rounded-md px-2 py-1.5 fs-sm mono">
    </div>
  </div>

  <!-- Shared Test-connection component — probes api.aladhan.com with the
       default location + method/school and shows the next prayer + Hijri
       date in the result box. -->
  <!-- Test works regardless of the enable toggle (the backend test route
       bypasses the master gate) so the admin can verify the connection
       BEFORE enabling + saving — hence no tcDisabled gate on the toggle. -->
  <div class="mt-3" x-show="isAdmin()"
       x-data="{ tcRun: () => testPrayerTimes(), tcResult: () => (prayerTimesTesting ? { pending: true } : (prayerTimesTestResult ? { pending: false, ok: prayerTimesTestOk, detail: prayerTimesTestResult } : null)), tcSuccessKey: 'prayer_times' }">
    <!-- INCLUDE: _components/og-test-connection.html -->
  </div>

  <!-- Prayer-times tunables — cache TTL + fetch timeout. Same
       bounds-chips shape every Admin → Config row uses. Saved together
       with the settings above by savePrayerTimesSection(). -->
  <details x-show="isAdmin()" class="mt-3 bg-[var(--surface-2)] border border-[var(--border)] rounded-md p-3">
    <summary class="cursor-pointer fs-sm font-medium select-none flex items-center gap-2">
      <svg width="12" height="12" class="transition-transform" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
      </svg>
      <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sliders"/>
      </svg>
      <span x-text="t('common.tunables')"></span>
    </summary>
    <div class="mt-3 space-y-3">
      <div x-show="!tuningLoaded" class="flex items-center gap-2 fs-xs text-[var(--text-faint)] py-2">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('common.loading')"></span>
      </div>
      <template x-for="key in (tuningLoaded ? ['tuning_prayer_times_cache_ttl_seconds',
                                    'tuning_prayer_times_fetch_timeout_seconds',
                                    'tuning_prayer_times_sampler_interval_seconds',
                                    'tuning_prayer_times_history_retention_days'] : [])"
                :key="key">
        <div>
          <label class="block fs-xs font-medium mb-1"
                 :for="'prayer-' + key"
                 x-text="t('admin.config.fields.' + key + '.label')"></label>
          <p class="fs-2xs text-[var(--text-faint)] leading-snug mb-2"
             x-text="t('admin.config.fields.' + key + '.help')"></p>
          <div class="flex flex-wrap items-center gap-2">
            <label class="contents">
              <input type="number"
                     :id="'prayer-' + key"
                     :aria-label="t('admin.config.fields.' + key + '.label')"
                     x-model="tuningForm[key]"
                     :placeholder="tuningPlaceholder(key)"
                     :min="(tuningEffective[key] || {}).min"
                     :max="(tuningEffective[key] || {}).max"
                     :disabled="!isAdmin() || prayerTimesSaving"
                     class="w-44 mono fs-sm py-1">
            </label>
            <div class="bounds-chips" role="group"
                 :aria-label="t('admin.config.bounds.group_label')">
              <span class="bounds-chip bounds-chip--min" :title="t('admin.config.bounds.min_title')">
                <svg width="11" height="11" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/>
                </svg>
                <span x-text="(tuningEffective[key] || {}).min"></span>
              </span>
              <span class="bounds-chip bounds-chip--max" :title="t('admin.config.bounds.max_title')">
                <svg width="11" height="11" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/>
                </svg>
                <span x-text="(tuningEffective[key] || {}).max"></span>
              </span>
              <span class="bounds-chip bounds-chip--default" :title="t('admin.config.bounds.default_title')">
                <svg width="11" height="11" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/>
                </svg>
                <span x-text="(tuningEffective[key] || {}).default"></span>
              </span>
            </div>
            <span class="fs-2xs text-[var(--text-faint)] ms-auto"
                  x-text="tuningEffectiveLabel(key)"></span>
          </div>
        </div>
      </template>
    </div>
  </details>

  <!-- Recent samples panel — admin-only confirmation that the lifespan
       prayer-times sampler is writing rows to prayer_times_samples. Loaded
       lazily via loadPrayerHistory() on first expand; shows the most
       recent 30 rows (one per day per location) with date + the five
       prayers + Hijri. Timestamps / dates format through the user's
       Settings > Profile > Formats datetime_format pref. -->
  <details x-show="isAdmin()" class="mt-3 bg-[var(--surface-2)] border border-[var(--border)] rounded-md p-3"
           @toggle="if ($event.target.open) { loadPrayerHistory(); }">
    <summary class="cursor-pointer fs-sm font-medium select-none flex items-center gap-2">
      <svg width="12" height="12" class="transition-transform" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
      </svg>
      <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-database"/>
      </svg>
      <span x-text="t('admin_prayer_times.history_label') || 'Recent samples'"></span>
      <span class="fs-2xs text-[var(--text-faint)]"
            x-show="prayerHistory && prayerHistory.length"
            x-text="'(' + prayerHistory.length + ')'"></span>
      <!-- Reload via the shared og-reload-button. A <span> (not a div —
           <summary> only allows phrasing content) carries ms-auto to
           right-float + @click.stop so the button's click doesn't toggle
           the <details>. -->
      <span class="ms-auto" @click.stop
            x-data="{ rbKey: 'prayer_times_history', rbOnClick: () => _runWithBusy('prayer_times_history', () => loadPrayerHistory()) }">
        <!-- INCLUDE: _components/og-reload-button.html -->
      </span>
    </summary>
    <div class="mt-3 overflow-x-auto scrollbar">
      <div x-show="prayerHistoryLoading" class="fs-xs text-[var(--text-faint)] flex items-center gap-1.5">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('actions.loading')"></span>
      </div>
      <div x-show="!prayerHistoryLoading && (!prayerHistory || !prayerHistory.length)"
           class="fs-xs text-[var(--text-faint)] italic"
           x-text="t('admin_prayer_times.history_empty') || 'No samples yet. The sampler writes one row per day per location once Prayer Times is enabled.'"></div>
      <table x-show="!prayerHistoryLoading && prayerHistory && prayerHistory.length"
             class="w-full fs-xs whitespace-nowrap">
        <thead>
        <tr class="text-[var(--text-faint)] text-start">
          <th class="text-start py-1 pe-2" x-text="t('admin_prayer_times.history_col_date') || 'Date'"></th>
          <th class="text-start py-1 pe-2" x-text="t('admin_prayer_times.history_col_location') || 'Location'"></th>
          <th class="text-start py-1 pe-2" x-text="t('admin_prayer_times.history_col_fajr') || 'Fajr'"></th>
          <th class="text-start py-1 pe-2" x-text="t('admin_prayer_times.history_col_dhuhr') || 'Dhuhr'"></th>
          <th class="text-start py-1 pe-2" x-text="t('admin_prayer_times.history_col_asr') || 'Asr'"></th>
          <th class="text-start py-1 pe-2" x-text="t('admin_prayer_times.history_col_maghrib') || 'Maghrib'"></th>
          <th class="text-start py-1 pe-2" x-text="t('admin_prayer_times.history_col_isha') || 'Isha'"></th>
          <th class="text-start py-1" x-text="t('admin_prayer_times.history_col_hijri') || 'Hijri'"></th>
        </tr>
        </thead>
        <tbody>
        <template x-for="row in prayerHistory" :key="row.greg_date + '-' + row.lat + '-' + row.lon + '-' + row.method + '-' + row.school">
          <tr class="border-t border-[var(--border)]">
            <td class="py-1 pe-2 mono" x-text="row.greg_date || '—'"></td>
            <td class="py-1 pe-2" x-text="row.label || (row.lat + ',' + row.lon)"></td>
            <td class="py-1 pe-2 mono" x-text="row.fajr || '—'"></td>
            <td class="py-1 pe-2 mono" x-text="row.dhuhr || '—'"></td>
            <td class="py-1 pe-2 mono" x-text="row.asr || '—'"></td>
            <td class="py-1 pe-2 mono" x-text="row.maghrib || '—'"></td>
            <td class="py-1 pe-2 mono" x-text="row.isha || '—'"></td>
            <td class="py-1" x-text="row.hijri_text || '—'"></td>
          </tr>
        </template>
        </tbody>
      </table>
    </div>
  </details>

  <!-- Save row — amber ring + Unsaved pulse-dot when dirty. -->
  <div class="mt-3 pt-3 border-t border-[var(--border)] flex items-center gap-2 flex-wrap">
    <button type="button" x-show="isAdmin()" @click="savePrayerTimesSection()"
            class="btn btn-primary fs-sm"
            :class="prayerTimesSectionDirty() ? 'ring-2 ring-[var(--warning)]' : ''"
            :disabled="prayerTimesSaving || !prayerTimesSectionDirty()">
      <span x-show="!prayerTimesSaving" x-text="t('actions.save')"></span>
      <span x-show="prayerTimesSaving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('admin_prayer_times.saving') || 'Saving…'"></span></span>
    </button>
    <span x-show="prayerTimesSectionDirty()"
          class="fs-xs text-[var(--warning)] flex items-center gap-1.5"
          :title="t('common.unsaved_title')">
      <span class="w-1.5 h-1.5 rounded-full bg-[var(--warning)] animate-pulse"></span>
      <span class="unsaved-flash" x-text="t('hosts_actions.unsaved_label')"></span>
    </span>
  </div>
</section>
