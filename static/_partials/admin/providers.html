<!--suppress HtmlUnknownAttribute, HtmlFormInputWithoutLabel -->
<section x-show="adminTab==='providers'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
  <div class="flex items-center gap-2 mb-2">
    <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-activity"/>
    </svg>
    <h3 class="font-semibold fs-md" x-text="t('settings.host_stats.title')"></h3>
  </div>
  <p class="fs-xs text-[var(--text-faint)] mb-3" x-text="t('settings.host_stats.desc')"></p>
  <!-- provider TABS replace the prior flat list of source
       checkboxes + sequential config blocks. Each tab is one
       provider's full config in isolation; the master enable
       toggle for that provider lives at the top of its tab body
       (see the per-tab "Enable" rows below). Tab strip mirrors
       the Admin tabs (`adminTab`) and Logs sub-tabs (`logsTab`)
       shape — `hostStatsTab` reactive state, persisted to
       `localStorage.hostStatsTab`. Adding a sixth provider
       (SNMP) is one line on this strip + one new tab
       body below. -->
  <!-- Provider tab strip — blue-pill active state matching the
       Admin → Notifications tabs. Pre-fix the active tab carried
       only a bottom-border accent + tinted text; operator-feedback
       preferred the higher-contrast pill style. Active tab fills
       with --primary + reads in --text-on-primary; inactive tabs
       keep the muted text + hover-on-surface-2 affordance. -->
  <div class="flex flex-wrap items-center gap-1 mb-4 pb-2 border-b border-[var(--border)] overflow-x-auto overflow-y-hidden scrollbar"
       role="tablist" aria-orientation="horizontal" :aria-label="t('settings.host_stats.tablist_label')">
    <template x-for="tab in [
            ['node_exporter', t('settings.host_stats.source_node_exporter')],
            ['beszel',        t('settings.host_stats.source_beszel')],
            ['pulse',         t('settings.host_stats.source_pulse')],
            ['webmin',        t('settings.host_stats.source_webmin')],
            ['ping',          t('settings.host_stats.source_ping')],
            ['snmp',          t('settings.host_stats.source_snmp')],
            ['http_probe',    t('settings.host_stats.source_http_probe')],
            ['service_probe', t('settings.host_stats.source_service_probe')],
          ]" :key="tab[0]">
      <button type="button" @click="setHostStatsTab(tab[0])"
              role="tab"
              :id="'provider-tab-' + tab[0]"
              :aria-selected="hostStatsTab === tab[0] ? 'true' : 'false'"
              :aria-controls="'provider-tabpanel-' + tab[0]"
              :aria-label="tab[1] + ' — ' + (hasHostStatsSource(tab[0])
                            ? t('settings.host_stats.tab_active_dot')
                            : t('settings.host_stats.tab_inactive_dot'))"
              :tabindex="hostStatsTab === tab[0] ? 0 : -1"
              @keydown.right.prevent="cycleHostStatsTab(1)"
              @keydown.left.prevent="cycleHostStatsTab(-1)"
              @keydown.home.prevent="setHostStatsTab(HOST_STATS_TAB_ORDER[0])"
              @keydown.end.prevent="setHostStatsTab(HOST_STATS_TAB_ORDER[HOST_STATS_TAB_ORDER.length - 1])"
              :class="hostStatsTab === tab[0]
                      ? 'bg-[var(--primary)] text-[var(--text-on-primary)]'
                      : 'text-[var(--text-dim)] hover:bg-[var(--surface-2)]'"
              class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded fs-xs font-medium whitespace-nowrap">
              <span class="w-1.5 h-1.5 rounded-full"
                    :class="hasHostStatsSource(tab[0]) ? 'dot-on' : 'dot-off'"
                    :title="hasHostStatsSource(tab[0]) ? t('settings.host_stats.tab_active_dot') : t('settings.host_stats.tab_inactive_dot')"></span>
        <!-- Colored brand icon (matches Notifications tab
             strip for visual consistency across master-toggled
             admin tabs). Drops the mask-image / mono treatment
             in favour of the canonical SVG so each provider's
             brand identity reads at a glance. -->
        <img width="14" height="14" alt="" aria-hidden="true"
             :src="'/img/icons/' + providerIconSlug(tab[0]) + '.svg?v=__APP_VERSION__'">
        <span x-text="tab[1]"></span>
      </button>
    </template>
  </div>
  <!-- Per-provider config blocks — visible always, inputs
       disabled when the matching toggle in the source-list above
       is off. Wrapper div carries `opacity-60` so the off state
       reads as "saved but inactive" instead of disappearing.
       Operator can audit configured values for a disabled
       provider without flipping it back on. -->
  <div x-show="hostStatsTab === 'node_exporter'" class="space-y-3" role="tabpanel" id="provider-tabpanel-node_exporter" aria-labelledby="provider-tab-node_exporter" tabindex="0" :class="!hasHostStatsSource('node_exporter') ? 'opacity-60' : ''">
    <div class="flex items-center justify-between gap-2 pb-2 border-b border-dashed border-[var(--border)]">
      <label class="inline-flex items-center gap-2 fs-sm font-medium">
        <input type="checkbox" :disabled="isReadonly()"
               :checked="hasHostStatsSource('node_exporter')"
               @change="toggleHostStatsSource('node_exporter', $event.target.checked)">
        <span x-text="t('settings.host_stats.tab_enable_label', { provider: t('settings.host_stats.source_node_exporter') })"></span>
      </label>
      <span class="chip"
            :class="hasHostStatsSource('node_exporter') ? 'pill-ok' : 'pill-muted'"
            x-text="hasHostStatsSource('node_exporter') ? t('settings.host_stats.tab_enabled') : t('settings.host_stats.tab_disabled')"></span>
    </div>
    <p class="fs-2xs text-[var(--text-faint)] mt-1"
       x-text="t('settings.host_stats.section_desc_node_exporter')"></p>
    <div>
      <label class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('settings.host_stats.url_label')"></label>
      <input x-model="settings.node_exporter_url_template" type="text"
             :disabled="isReadonly() || !hasHostStatsSource('node_exporter')"
             class="w-full mono fs-xs"
             :placeholder="t('settings.host_stats.url_placeholder')">
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('settings.host_stats.url_hint')"></p>
    </div>
    <div>
      <label class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('settings.host_stats.overrides_label')"></label>
      <textarea x-model="settings.node_exporter_overrides_json"
                :disabled="isReadonly() || !hasHostStatsSource('node_exporter')" rows="5"
                class="w-full mono fs-xs"
                :placeholder='`{\n  "host-id": "http://192.X.X.X:9100/metrics"\n}`'></textarea>
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('settings.host_stats.overrides_hint')"></p>
    </div>

    <!-- NE provider tunables — canonical header pattern (icon +
         h3 + intro paragraph) matching every other admin tab
         (Portainer / AI / SSH / Logs / Asset Inventory /
         Notifications). All edits commit through the NE-section
         Save alongside the URL template + per-host overrides. -->
    <div class="mt-3 pt-3 border-t border-[var(--border)] space-y-3"
         x-show="tuningLoaded">
      <div class="flex items-center gap-2 mb-1">
        <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sliders"/>
        </svg>
        <h3 class="font-semibold fs-sm"
            x-text="t('settings.host_stats.tunables_heading_node_exporter')"></h3>
      </div>
      <p class="fs-2xs text-[var(--text-faint)] mb-2 leading-snug"
         x-text="t('settings.host_stats.tunables_intro_node_exporter')"></p>
      <template x-for="key in _perProviderTuneKeys.node_exporter" :key="key">
        <div class="space-y-1">
          <label class="block fs-xs font-medium"
                 x-text="t('admin.config.fields.' + key + '.label')"></label>
          <p class="fs-2xs text-[var(--text-faint)] leading-snug"
             x-text="t('admin.config.fields.' + key + '.help')"></p>
          <div class="flex flex-wrap items-center gap-2">
            <input type="number"
                   x-model="tuningForm[key]"
                   :placeholder="tuningPlaceholder(key)"
                   :min="(tuningEffective[key] || {}).min"
                   :max="(tuningEffective[key] || {}).max"
                   :disabled="tuneKnobDisabled('node_exporter')"
                   class="w-32 mono fs-sm">
            <div class="bounds-chips" role="group"
                 :aria-label="t('admin.config.bounds.group_label')">
                    <span class="bounds-chip bounds-chip--min"
                          :title="t('admin.config.bounds.min_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).min"></span>
                    </span>
              <span class="bounds-chip bounds-chip--max"
                    :title="t('admin.config.bounds.max_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).max"></span>
                    </span>
              <span class="bounds-chip bounds-chip--default"
                    :title="t('admin.config.bounds.default_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/></svg>
                      <span x-text="(tuningEffective[key] || {}).default"></span>
                    </span>
            </div>
            <span class="fs-xs text-[var(--text-dim)] ms-auto"
                  x-text="tuningEffectiveLabel(key)"></span>
          </div>
        </div>
      </template>
    </div>
    <!-- Per-provider chip colour — operator-customisable
         override that flows into the row-chip + drawer-chip
         render via `providerChipStyle`. Empty means "use the
         built-in default colour" (a distinct hue per provider). -->
    <div class="pt-3 mt-3 border-t border-[var(--border)] flex items-center gap-3 flex-wrap">
      <label class="fs-xs flex items-center gap-2">
        <span x-text="t('settings.host_stats.chip_color_label')"></span>
        <input type="color"
               :value="settings.provider_color_node_exporter || providerColor('node_exporter')"
               @input="settings.provider_color_node_exporter = $event.target.value"
               :disabled="isReadonly() || !hasHostStatsSource('node_exporter')"
               class="w-9 h-7 cursor-pointer p-0 bg-transparent border border-[var(--border)] rounded">
        <input type="text" x-model="settings.provider_color_node_exporter"
               @input="settings.provider_color_node_exporter = normalizeHexColor($event.target.value)"
               :placeholder="providerColor('node_exporter')"
               :disabled="isReadonly() || !hasHostStatsSource('node_exporter')"
               pattern="^#[0-9a-fA-F]{6}$" maxlength="7"
               class="w-24 mono fs-xs uppercase">
      </label>
      <button type="button"
              x-show="settings.provider_color_node_exporter"
              @click="settings.provider_color_node_exporter = ''"
              class="btn btn-ghost fs-2xs"
              x-text="t('settings.host_stats.chip_color_reset')"></button>
      <span class="chip pill-custom fs-2xs"
            :style="providerChipStyle('node_exporter')"
            x-text="t('settings.host_stats.chip_color_preview')"></span>
      <p class="basis-full fs-2xs text-[var(--text-faint)]"
         x-text="t('settings.host_stats.chip_color_hint')"></p>
    </div>
    <!-- Section-owned Save at the END of the sub-tab. Posts only
         NE's plain settings + the NE probe-timeout tunable. -->
    <div class="pt-3 mt-3 border-t border-[var(--border)] flex items-center gap-2 flex-wrap">
      <button type="button"
              @click="saveNeSection()"
              :disabled="isReadonly() || hostStatsSaving"
              :class="neSectionDirty() ? 'btn-dirty' : ''"
              class="btn btn-primary fs-sm"
              x-text="hostStatsSaving ? t('actions.saving') : t('actions.save')"></button>
      <span x-show="neSectionDirty() && !hostStatsSaving"
            class="fs-xs text-[var(--warning)] inline-flex items-center gap-1">
              <span class="pulse-dot pulse-dot--warning" aria-hidden="true"></span>
              <span x-text="t('common.unsaved')"></span>
            </span>
    </div>
  </div>
  <div x-show="hostStatsTab === 'beszel'" class="space-y-3" role="tabpanel" id="provider-tabpanel-beszel" aria-labelledby="provider-tab-beszel" tabindex="0" :class="!hasHostStatsSource('beszel') ? 'opacity-60' : ''">
    <div class="flex items-center justify-between gap-2 pb-2 border-b border-dashed border-[var(--border)]">
      <label class="inline-flex items-center gap-2 fs-sm font-medium">
        <input type="checkbox" :disabled="isReadonly()"
               :checked="hasHostStatsSource('beszel')"
               @change="toggleHostStatsSource('beszel', $event.target.checked)">
        <span x-text="t('settings.host_stats.tab_enable_label', { provider: t('settings.host_stats.source_beszel') })"></span>
      </label>
      <span class="chip"
            :class="hasHostStatsSource('beszel') ? 'pill-ok' : 'pill-muted'"
            x-text="hasHostStatsSource('beszel') ? t('settings.host_stats.tab_enabled') : t('settings.host_stats.tab_disabled')"></span>
    </div>
    <p class="fs-2xs text-[var(--text-faint)] mt-1"
       x-text="t('settings.host_stats.section_desc_beszel')"></p>
    <div>
      <label class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('settings.host_stats.beszel_url_label')"></label>
      <input x-model="settings.beszel_hub_url" type="url"
             :disabled="isReadonly() || !hasHostStatsSource('beszel')"
             class="w-full mono fs-xs"
             :placeholder="t('settings.host_stats.beszel_url_placeholder')">
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('settings.host_stats.beszel_url_hint')"></p>
    </div>
    <div>
      <label class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('settings.host_stats.beszel_identity_label')"></label>
      <input x-model="settings.beszel_identity" type="text"
             :disabled="isReadonly() || !hasHostStatsSource('beszel')"
             class="w-full fs-xs"
             :placeholder="t('settings.host_stats.beszel_identity_placeholder')">
    </div>
    <div>
      <label class="block fs-xs text-[var(--text-faint)] mb-1">
        <span x-text="t('settings.host_stats.beszel_password_label')"></span>
      </label>
      <span x-show="settings.beszel_password_set" class="block fs-xs text-[var(--success)] mb-1"
            x-text="t('settings.secret_input.saved_hint')"></span>
      <div class="secret-input-row">
        <input x-model="settings.beszel_password" type="password"
               autocomplete="new-password"
               :disabled="isReadonly() || !hasHostStatsSource('beszel')"
               class="w-full fs-xs"
               :placeholder="settings.beszel_password_set ? t('settings.secret_input.placeholder_keep') : t('settings.host_stats.beszel_password_placeholder')">
        <button type="button"
                x-show="settings.beszel_password_set && isAdmin()"
                @click="clearBeszelPassword()"
                :disabled="!hasHostStatsSource('beszel')"
                class="btn btn-ghost fs-xs secret-input-clear"
                x-text="t('settings.host_stats.clear_secret_label')"></button>
      </div>
    </div>
    <label class="inline-flex items-center gap-2 fs-sm text-[var(--text-dim)]">
      <input type="checkbox" x-model="settings.beszel_verify_tls"
             :disabled="isReadonly() || !hasHostStatsSource('beszel')">
      <span x-text="t('settings.host_stats.beszel_verify_tls')"></span>
    </label>
    <!-- Test button + last-connected label + result chip all on
         one row to match the Portainer / OIDC layout. Operators
         wanted the "Last connected: X ago" hint inline next to
         the button, not on a separate line below. flex-wrap
         handles narrow viewports. -->
    <div class="flex items-center gap-2 flex-wrap">
      <button type="button" x-show="isAdmin()" @click="testBeszelConnection()"
              :disabled="(beszelTestResult && beszelTestResult.pending) || !hasHostStatsSource('beszel')"
              class="btn btn-soft fs-sm inline-flex items-center gap-1.5">
        <svg width="13" height="13" :class="(beszelTestResult && beszelTestResult.pending) ? 'spin-md' : ''" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-play"/>
        </svg>
        <span x-text="(beszelTestResult && beszelTestResult.pending) ? t('settings.host_stats.beszel_testing') : t('settings.host_stats.beszel_test_button')"></span>
      </button>
      <span x-show="lastTestSuccessLabel('beszel')"
            class="fs-xs text-[var(--text-faint)]"
            x-text="lastTestSuccessLabel('beszel')"></span>
    </div>
    <!-- Test result chip — full-width below the action row,
         matching Portainer's pattern. Three-state colour box:
         yellow while pending, green on ok, red on error. -->
    <div x-show="beszelTestResult" class="fs-sm rounded-md px-3 py-2"
         :class="beszelTestResult && beszelTestResult.pending
                       ? 'bg-[var(--pill-warning-bg)] text-[var(--pill-warning-fg)] border border-[var(--pill-warning-br)]'
                       : (beszelTestResult && beszelTestResult.ok
                         ? 'bg-[var(--pill-ok-bg)] text-[var(--pill-ok-fg)] border border-[var(--pill-ok-br)]'
                         : 'bg-[var(--pill-error-bg)] text-[var(--pill-error-fg)] border border-[var(--pill-error-br)]')"
         x-text="beszelTestResult && beszelTestResult.pending
                       ? t('actions.testing')
                       : (beszelTestResult ? ((beszelTestResult.ok ? '✓ ' : '✗ ') + (beszelTestResult.detail || '')) : '')"></div>
    <p class="fs-2xs text-[var(--text-faint)]"
       x-text="t('settings.host_stats.beszel_naming_hint')"></p>
    <!-- Beszel provider tunables — canonical header pattern
         (icon + h3 + intro paragraph) matching every other admin
         tab (AI / Asset Inventory / Portainer / Notifications /
         NE / SSH). Covers probe timeout, sampler interval (0 =
         inherit global), and the auto-pause threshold. All edits
         commit through the Beszel section's Save button. -->
    <div class="mt-3 pt-3 border-t border-[var(--border)] space-y-3"
         x-show="tuningLoaded">
      <div class="flex items-center gap-2 mb-1">
        <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sliders"/>
        </svg>
        <h3 class="font-semibold fs-sm"
            x-text="t('settings.host_stats.tunables_heading_beszel')"></h3>
      </div>
      <p class="fs-2xs text-[var(--text-faint)] mb-2 leading-snug"
         x-text="t('settings.host_stats.tunables_intro_beszel')"></p>
      <template x-for="key in _perProviderTuneKeys.beszel" :key="key">
        <div class="space-y-1">
          <label class="block fs-xs font-medium"
                 x-text="t('admin.config.fields.' + key + '.label')"></label>
          <p class="fs-2xs text-[var(--text-faint)] leading-snug"
             x-text="t('admin.config.fields.' + key + '.help')"></p>
          <div class="flex flex-wrap items-center gap-2">
            <input type="number"
                   x-model="tuningForm[key]"
                   :placeholder="tuningPlaceholder(key)"
                   :min="(tuningEffective[key] || {}).min"
                   :max="(tuningEffective[key] || {}).max"
                   :disabled="tuneKnobDisabled('beszel')"
                   class="w-32 mono fs-sm">
            <div class="bounds-chips" role="group"
                 :aria-label="t('admin.config.bounds.group_label')">
                    <span class="bounds-chip bounds-chip--min"
                          :title="t('admin.config.bounds.min_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).min"></span>
                    </span>
              <span class="bounds-chip bounds-chip--max"
                    :title="t('admin.config.bounds.max_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).max"></span>
                    </span>
              <span class="bounds-chip bounds-chip--default"
                    :title="t('admin.config.bounds.default_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/></svg>
                      <span x-text="(tuningEffective[key] || {}).default"></span>
                    </span>
            </div>
            <span class="fs-xs text-[var(--text-dim)] ms-auto"
                  x-text="tuningEffectiveLabel(key)"></span>
          </div>
        </div>
      </template>
    </div>
    <!-- Per-provider chip colour. -->
    <div class="pt-3 mt-3 border-t border-[var(--border)] flex items-center gap-3 flex-wrap">
      <label class="fs-xs flex items-center gap-2">
        <span x-text="t('settings.host_stats.chip_color_label')"></span>
        <input type="color"
               :value="settings.provider_color_beszel || providerColor('beszel')"
               @input="settings.provider_color_beszel = $event.target.value"
               :disabled="isReadonly() || !hasHostStatsSource('beszel')"
               class="w-9 h-7 cursor-pointer p-0 bg-transparent border border-[var(--border)] rounded">
        <input type="text" x-model="settings.provider_color_beszel"
               @input="settings.provider_color_beszel = normalizeHexColor($event.target.value)"
               :placeholder="providerColor('beszel')"
               :disabled="isReadonly() || !hasHostStatsSource('beszel')"
               pattern="^#[0-9a-fA-F]{6}$" maxlength="7"
               class="w-24 mono fs-xs uppercase">
      </label>
      <button type="button"
              x-show="settings.provider_color_beszel"
              @click="settings.provider_color_beszel = ''"
              class="btn btn-ghost fs-2xs"
              x-text="t('settings.host_stats.chip_color_reset')"></button>
      <span class="chip pill-custom fs-2xs"
            :style="providerChipStyle('beszel')"
            x-text="t('settings.host_stats.chip_color_preview')"></span>
      <p class="basis-full fs-2xs text-[var(--text-faint)]"
         x-text="t('settings.host_stats.chip_color_hint')"></p>
    </div>
    <!-- Beszel section save row. Section-owned per the canonical
         convention: dirty cue + Save commits ONLY Beszel's plain
         settings + the 3 Beszel tunables. Mirrors NE / Webmin / Ping
         / SNMP / HTTP probe shape. -->
    <div class="pt-3 mt-3 border-t border-[var(--border)] flex items-center gap-2 flex-wrap">
      <button type="button"
              @click="saveBeszelSection()"
              :disabled="isReadonly() || hostStatsSaving"
              :class="beszelSectionDirty() ? 'btn-dirty' : ''"
              class="btn btn-primary fs-sm"
              x-text="hostStatsSaving ? t('actions.saving') : t('actions.save')"></button>
      <span x-show="beszelSectionDirty() && !hostStatsSaving"
            class="fs-xs text-[var(--warning)] inline-flex items-center gap-1">
              <span class="pulse-dot pulse-dot--warning" aria-hidden="true"></span>
              <span x-text="t('common.unsaved')"></span>
            </span>
    </div>
  </div>

  <!-- Pulse config — third provider. PVE-only, so it pairs well
       with Beszel (cross-platform) + node-exporter (Linux detail).
       Token is write-only like Beszel's password. -->
  <div x-show="hostStatsTab === 'pulse'" class="space-y-3" role="tabpanel" id="provider-tabpanel-pulse" aria-labelledby="provider-tab-pulse" tabindex="0" :class="!hasHostStatsSource('pulse') ? 'opacity-60' : ''">
    <div class="flex items-center justify-between gap-2 pb-2 border-b border-dashed border-[var(--border)]">
      <label class="inline-flex items-center gap-2 fs-sm font-medium">
        <input type="checkbox" :disabled="isReadonly()"
               :checked="hasHostStatsSource('pulse')"
               @change="toggleHostStatsSource('pulse', $event.target.checked)">
        <span x-text="t('settings.host_stats.tab_enable_label', { provider: t('settings.host_stats.source_pulse') })"></span>
      </label>
      <span class="chip"

    <div>

      <div class="secret-input-row">
        <input x-model="settings.pulse_token" type="password"
               autocomplete="new-password"
               :disabled="isReadonly() || !hasHostStatsSource('pulse')"

         :class="pulseTestResult && pulseTestResult.pending
                       ? 'bg-[var(--pill-warning-bg)] text-[var(--pill-warning-fg)] border border-[var(--pill-warning-br)]'
                       : (pulseTestResult && pulseTestResult.ok
                         ? 'bg-[var(--pill-ok-bg)] text-[var(--pill-ok-fg)] border border-[var(--pill-ok-br)]'
                         : 'bg-[var(--pill-error-bg)] text-[var(--pill-error-fg)] border border-[var(--pill-error-br)]')"
         x-text="pulseTestResult && pulseTestResult.pending
                       ? t('actions.testing')
                       : (pulseTestResult ? ((pulseTestResult.ok ? '✓ ' : '✗ ') + (pulseTestResult.detail || '')) : '')"></div>
    <p class="fs-2xs text-[var(--text-faint)]" x-text="t('settings.host_stats.pulse_aliases_hint')"></p>
    <!-- Pulse provider tunables — canonical header pattern
         (icon + h3 + intro paragraph) matching every other admin
         tab (AI / Asset Inventory / Portainer / Notifications /
         NE / SSH / Beszel). Covers probe timeout, sampler

      <template x-for="key in _perProviderTuneKeys.pulse" :key="key">

               @input="settings.provider_color_pulse = normalizeHexColor($event.target.value)"

               :disabled="isReadonly() || !hasHostStatsSource('pulse')"

      <p class="basis-full fs-2xs text-[var(--text-faint)]"
         x-text="t('settings.host_stats.chip_color_hint')"></p>
    </div>
    <!-- Pulse section save row. Section-owned per the canonical
         convention: posts ONLY Pulse's plain settings + the 3 Pulse
         tunables. Token follows keep-current-if-blank. -->
    <div class="pt-3 mt-3 border-t border-[var(--border)] flex items-center gap-2 flex-wrap">
      <button type="button"
              @click="savePulseSection()"
              :disabled="isReadonly() || hostStatsSaving"

      <span x-show="pulseSectionDirty() && !hostStatsSaving"

              <span x-text="t('common.unsaved')"></span>
            </span>

  <!-- Webmin config — fourth provider. Each target host runs its
       own Miniserv instance, so unlike Pulse / Beszel the URL is

       These fields carry the SHARED credentials that probe every
       Webmin endpoint. Password is write-only like the others. -->
  <div x-show="hostStatsTab === 'webmin'" class="space-y-3" role="tabpanel" id="provider-tabpanel-webmin" aria-labelledby="provider-tab-webmin" tabindex="0" :class="!hasHostStatsSource('webmin') ? 'opacity-60' : ''">
    <div class="flex items-center justify-between gap-2 pb-2 border-b border-dashed border-[var(--border)]">
      <label class="inline-flex items-center gap-2 fs-sm font-medium">
        <input type="checkbox" :disabled="isReadonly()"
               :checked="hasHostStatsSource('webmin')"
               @change="toggleHostStatsSource('webmin', $event.target.checked)">
        <span x-text="t('settings.host_stats.tab_enable_label', { provider: t('settings.host_stats.source_webmin') })"></span>
      </label>
      <span class="chip"
            :class="hasHostStatsSource('webmin') ? 'pill-ok' : 'pill-muted'"
            x-text="hasHostStatsSource('webmin') ? t('settings.host_stats.tab_enabled') : t('settings.host_stats.tab_disabled')"></span>

       x-text="t('settings.host_stats.section_desc_webmin')"></p>
    <div>
      <label class="block fs-xs text-[var(--text-faint)] mb-1" x-text="t('settings.host_stats.webmin_user_label')"></label>
      <input x-model="settings.webmin_user" type="text"
             :disabled="isReadonly() || !hasHostStatsSource('webmin')"
             class="w-full fs-xs"
             :placeholder="t('settings.host_stats.webmin_user_placeholder')">

         x-html="t('settings.host_stats.webmin_user_hint_html')"></p>
    </div>
    <div>
      <label class="block fs-xs text-[var(--text-faint)] mb-1">
        <span x-text="t('settings.host_stats.webmin_password_label')"></span>
      </label>
      <span x-show="settings.webmin_password_set" class="block fs-xs text-[var(--success)] mb-1"
            x-text="t('settings.secret_input.saved_hint')"></span>
      <div class="secret-input-row">
        <input x-model="settings.webmin_password" type="password"
               autocomplete="new-password"
               :disabled="isReadonly() || !hasHostStatsSource('webmin')"

               :placeholder="settings.webmin_password_set ? t('settings.secret_input.placeholder_keep') : t('settings.host_stats.webmin_password_placeholder')">

        <svg width="13" height="13" :class="(webminTestResult && webminTestResult.pending) ? 'spin-md' : ''" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-play"/>

            x-text="lastTestSuccessLabel('webmin')"></span>
    </div>
    <div x-show="webminTestResult" class="fs-sm rounded-md px-3 py-2"
         :class="webminTestResult && webminTestResult.pending
                       ? 'bg-[var(--pill-warning-bg)] text-[var(--pill-warning-fg)] border border-[var(--pill-warning-br)]'
                       : (webminTestResult && webminTestResult.ok
                         ? 'bg-[var(--pill-ok-bg)] text-[var(--pill-ok-fg)] border border-[var(--pill-ok-br)]'
                         : 'bg-[var(--pill-error-bg)] text-[var(--pill-error-fg)] border border-[var(--pill-error-br)]')"
         x-text="webminTestResult && webminTestResult.pending
                       ? t('actions.testing')
                       : (webminTestResult ? ((webminTestResult.ok ? '✓ ' : '✗ ') + (webminTestResult.detail || '')) : '')"></div>
    <p class="fs-2xs text-[var(--text-faint)]"
       x-html="t('settings.host_stats.webmin_aliases_hint_html')"></p>

    <!-- Webmin provider tunables — canonical header pattern
         (icon + h3 + intro paragraph) matching every other admin
         tab (AI / Asset Inventory / Portainer / Notifications /
         NE / SSH / Beszel / Pulse / Ping). Covers probe budget,
         sampler budget, per-host probe timeout, per-host success
         + failure cache TTLs, and per-(provider, host) auto-pause
         threshold. All edits commit through the Webmin section's
         Save button. -->
    <div class="mt-3 pt-3 border-t border-[var(--border)] space-y-3"
         x-show="tuningLoaded">
      <div class="flex items-center gap-2 mb-1">
        <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sliders"/>
        </svg>
        <h3 class="font-semibold fs-sm"
            x-text="t('settings.host_stats.tunables_heading_webmin')"></h3>
      </div>
      <p class="fs-2xs text-[var(--text-faint)] mb-2 leading-snug"
         x-text="t('settings.host_stats.tunables_intro_webmin')"></p>
      <template x-for="key in _perProviderTuneKeys.webmin" :key="key">
        <div class="space-y-1">
          <label class="block fs-xs font-medium"
                 x-text="t('admin.config.fields.' + key + '.label')"></label>
          <p class="fs-2xs text-[var(--text-faint)] leading-snug"
             x-text="t('admin.config.fields.' + key + '.help')"></p>
          <div class="flex flex-wrap items-center gap-2">
            <input type="number"
                   x-model="tuningForm[key]"
                   :placeholder="tuningPlaceholder(key)"
                   :min="(tuningEffective[key] || {}).min"
                   :max="(tuningEffective[key] || {}).max"
                   :disabled="tuneKnobDisabled('webmin')"
                   class="w-32 mono fs-sm">
            <div class="bounds-chips" role="group"
                 :aria-label="t('admin.config.bounds.group_label')">
                    <span class="bounds-chip bounds-chip--min"
                          :title="t('admin.config.bounds.min_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).min"></span>
                    </span>
              <span class="bounds-chip bounds-chip--max"
                    :title="t('admin.config.bounds.max_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).max"></span>
                    </span>
              <span class="bounds-chip bounds-chip--default"
                    :title="t('admin.config.bounds.default_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/></svg>
                      <span x-text="(tuningEffective[key] || {}).default"></span>

               @input="settings.provider_color_webmin = $event.target.value"
               :disabled="isReadonly() || !hasHostStatsSource('webmin')"

        <input type="text" x-model="settings.provider_color_webmin"
               @input="settings.provider_color_webmin = normalizeHexColor($event.target.value)"
               :placeholder="providerColor('webmin')"
               :disabled="isReadonly() || !hasHostStatsSource('webmin')"
               pattern="^#[0-9a-fA-F]{6}$" maxlength="7"
               class="w-24 mono fs-xs uppercase">

      <button type="button"
              x-show="settings.provider_color_webmin"
              @click="settings.provider_color_webmin = ''"
              class="btn btn-ghost fs-2xs"
              x-text="t('settings.host_stats.chip_color_reset')"></button>
      <span class="chip pill-custom fs-2xs"
            :style="providerChipStyle('webmin')"
            x-text="t('settings.host_stats.chip_color_preview')"></span>
      <p class="basis-full fs-2xs text-[var(--text-faint)]"
         x-text="t('settings.host_stats.chip_color_hint')"></p>

    <div class="pt-3 mt-3 border-t border-[var(--border)] flex items-center gap-2 flex-wrap">

              <span x-text="t('common.unsaved')"></span>
            </span>
