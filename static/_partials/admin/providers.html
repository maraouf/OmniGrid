  <!-- Ping — fifth provider. No credentials, no aliases.
       Defaults flow into per-host config; per-host overrides win.
       Per-host opt-in still gates probing, so this block is the
       "globals" panel. -->
  <div x-show="hostStatsTab === 'ping'" class="space-y-3" role="tabpanel" id="provider-tabpanel-ping" aria-labelledby="provider-tab-ping" tabindex="0" :class="!hasHostStatsSource('ping') ? 'opacity-60' : ''">
    <div class="flex items-center justify-between gap-2 pb-2 border-b border-dashed border-[var(--border)]">
      <label class="inline-flex items-center gap-2 fs-sm font-medium">
        <input type="checkbox" :disabled="isReadonly()"
               :checked="hasHostStatsSource('ping')"
               @change="toggleHostStatsSource('ping', $event.target.checked)">
        <span x-text="t('settings.host_stats.tab_enable_label', { provider: t('settings.host_stats.source_ping') })"></span>
      </label>
      <span class="chip"
            :class="hasHostStatsSource('ping') ? 'pill-ok' : 'pill-muted'"
            x-text="hasHostStatsSource('ping') ? t('settings.host_stats.tab_enabled') : t('settings.host_stats.tab_disabled')"></span>
    </div>
    <p class="fs-2xs text-[var(--text-faint)] mt-1"
       x-text="t('settings.host_stats.ping.section_desc')"></p>
    <!-- Default TCP port — single row, full width so the input
         doesn't share a row with the ICMP toggle (operator-
         flagged: the ICMP hint reads as belonging to the port
         input when they sit side-by-side). -->
    <div>
      <label class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('settings.host_stats.ping.default_port_label')"></label>
      <input x-model="settings.ping_default_port" type="number" min="1" max="65535"
             :disabled="isReadonly() || !hasHostStatsSource('ping')"
             class="w-full mono fs-xs"
             placeholder="443">
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('settings.host_stats.ping.default_port_hint')"></p>
    </div>
    <!-- ICMP-echo preference — on its own row (operator request)
         so the "Prefer raw ICMP echo when possible" caption is
         unambiguously about the toggle, not the port above.
         Help text BEFORE the checkbox (operator-canonical
         pattern matching every other admin section). -->
    <div class="mt-3">
      <p class="fs-2xs text-[var(--text-faint)] mb-1"
         x-text="t('settings.host_stats.ping.use_icmp_hint')"></p>
      <label class="inline-flex items-center gap-2 fs-sm text-[var(--text-dim)]">
        <input type="checkbox" x-model="settings.ping_use_icmp"
               :disabled="isReadonly() || !hasHostStatsSource('ping') || !settings.ping_has_icmp_support">
        <span x-text="t('settings.host_stats.ping.use_icmp_label')"></span>
      </label>
      <p x-show="!settings.ping_has_icmp_support"
         class="fs-2xs text-[var(--warning)] mt-1"
         x-text="t('settings.host_stats.ping.icmp_unavailable')"></p>
    </div>
    <!-- Test button — picks an opted-in host and fires a one-shot
         live probe via /api/ping/test. -->
    <div class="flex items-center gap-2 flex-wrap">
      <button type="button" x-show="isAdmin()" @click="testPingConnection()"
              :disabled="(pingTestResult && pingTestResult.pending) || !hasHostStatsSource('ping') || !pingTestHostId"
              class="btn btn-soft fs-sm inline-flex items-center gap-1.5">
        <svg width="13" height="13" :class="(pingTestResult && pingTestResult.pending) ? 'spin-md' : ''" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-play"/>
        </svg>
        <span x-text="(pingTestResult && pingTestResult.pending) ? t('settings.host_stats.ping.test_running') : t('settings.host_stats.ping.test_button')"></span>
      </button>
      <select x-model="pingTestHostId"
              :disabled="isReadonly() || !hasHostStatsSource('ping')"
              class="fs-xs mono">
        <option value="" x-text="t('settings.host_stats.ping.test_target_label')"></option>
        <template x-for="opt in pingEnabledHosts()" :key="opt.id">
          <option :value="opt.id" x-text="opt.label"></option>
        </template>
      </select>
      <!-- Result chip moved out of the action row — see the
           full-width div directly below the closing `</div>` of
           this flex row to match the Portainer pattern. -->
      <span x-show="hasHostStatsSource('ping') && !pingEnabledHosts().length"
            class="fs-2xs text-[var(--text-faint)] italic"
            x-text="t('settings.host_stats.ping.test_no_hosts')"></span>
      <span x-show="lastTestSuccessLabel('ping')"
            class="fs-xs text-[var(--text-faint)]"
            x-text="lastTestSuccessLabel('ping')"></span>
    </div>
    <div x-show="pingTestResult" class="fs-sm rounded-md px-3 py-2"
         :class="pingTestResult && pingTestResult.pending
                       ? 'bg-[var(--pill-warning-bg)] text-[var(--pill-warning-fg)] border border-[var(--pill-warning-br)]'
                       : (pingTestResult && pingTestResult.ok
                         ? 'bg-[var(--pill-ok-bg)] text-[var(--pill-ok-fg)] border border-[var(--pill-ok-br)]'
                         : 'bg-[var(--pill-error-bg)] text-[var(--pill-error-fg)] border border-[var(--pill-error-br)]')"
         x-text="pingTestResult && pingTestResult.pending
                       ? t('actions.testing')
                       : (pingTestResult ? ((pingTestResult.ok ? '✓ ' : '✗ ') + (pingTestResult.detail || '')) : '')"></div>
    <!-- Ping provider tunables — canonical header pattern
         (icon + h3 + intro paragraph) matching every other admin
         tab (AI / Asset Inventory / Portainer / Notifications /
         NE / SSH / Beszel / Pulse). Covers sampler interval, fan-
         out concurrency, probe timeout, cooldown, ICMP packet
         spacing, and per-(provider, host) auto-pause threshold.
         All edits commit through the Ping section's Save button. -->
    <div class="mt-3 pt-3 border-t border-[var(--border)] space-y-3"
         x-show="tuningLoaded">
      <div class="flex items-center gap-2 mb-1">
        <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sliders"/>
        </svg>
        <h3 class="font-semibold fs-sm"
            x-text="t('settings.host_stats.tunables_heading_ping')"></h3>
      </div>
      <p class="fs-2xs text-[var(--text-faint)] mb-2 leading-snug"
         x-text="t('settings.host_stats.tunables_intro_ping')"></p>
      <template x-for="key in _perProviderTuneKeys.ping" :key="key">
        <div class="space-y-1">
          <label class="block fs-xs font-medium"
                 x-text="t('admin.config.fields.' + key + '.label')"></label>
          <p class="fs-2xs text-[var(--text-faint)] leading-snug"
             x-text="t('admin.config.fields.' + key + '.help')"></p>
          <div class="flex flex-wrap items-center gap-2">
            <input type="number"
                   x-model="tuningForm[key]"
                   :placeholder="tuningPlaceholder(key)"
                   :min="(tuningEffective[key] || {}).min"
                   :max="(tuningEffective[key] || {}).max"
                   :disabled="tuneKnobDisabled('ping')"
                   class="w-32 mono fs-sm">
            <div class="bounds-chips" role="group"
                 :aria-label="t('admin.config.bounds.group_label')">
                    <span class="bounds-chip bounds-chip--min"
                          :title="t('admin.config.bounds.min_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).min"></span>
                    </span>
              <span class="bounds-chip bounds-chip--max"
                    :title="t('admin.config.bounds.max_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).max"></span>
                    </span>
              <span class="bounds-chip bounds-chip--default"
                    :title="t('admin.config.bounds.default_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/></svg>
                      <span x-text="(tuningEffective[key] || {}).default"></span>
                    </span>
            </div>
            <span class="fs-xs text-[var(--text-dim)] ms-auto"
                  x-text="tuningEffectiveLabel(key)"></span>
          </div>
        </div>
      </template>
    </div>
    <!-- Per-provider chip colour. -->
    <div class="pt-3 mt-3 border-t border-[var(--border)] flex items-center gap-3 flex-wrap">
      <label class="fs-xs flex items-center gap-2">
        <span x-text="t('settings.host_stats.chip_color_label')"></span>
        <input type="color"
               :value="settings.provider_color_ping || providerColor('ping')"
               @input="settings.provider_color_ping = $event.target.value"
               :disabled="isReadonly() || !hasHostStatsSource('ping')"
               class="w-9 h-7 cursor-pointer p-0 bg-transparent border border-[var(--border)] rounded">
        <input type="text" x-model="settings.provider_color_ping"
               @input="settings.provider_color_ping = normalizeHexColor($event.target.value)"
               :placeholder="providerColor('ping')"
               :disabled="isReadonly() || !hasHostStatsSource('ping')"
               pattern="^#[0-9a-fA-F]{6}$" maxlength="7"
               class="w-24 mono fs-xs uppercase">
      </label>
      <button type="button"
              x-show="settings.provider_color_ping"
              @click="settings.provider_color_ping = ''"
              class="btn btn-ghost fs-2xs"
              x-text="t('settings.host_stats.chip_color_reset')"></button>
      <span class="chip pill-custom fs-2xs"
            :style="providerChipStyle('ping')"
            x-text="t('settings.host_stats.chip_color_preview')"></span>
      <p class="basis-full fs-2xs text-[var(--text-faint)]"
         x-text="t('settings.host_stats.chip_color_hint')"></p>
    </div>
    <!-- Section-owned Save at the END of the sub-tab. Posts only
         Ping's plain settings + the five Ping tunables. -->
    <div class="pt-3 mt-3 border-t border-[var(--border)] flex items-center gap-2 flex-wrap">
      <button type="button"
              @click="savePingSection()"
              :disabled="isReadonly() || hostStatsSaving"
              :class="pingSectionDirty() ? 'btn-dirty' : ''"
              class="btn btn-primary fs-sm"
              x-text="hostStatsSaving ? t('actions.saving') : t('actions.save')"></button>
      <span x-show="pingSectionDirty() && !hostStatsSaving"
            class="fs-xs text-[var(--warning)] inline-flex items-center gap-1">
              <span class="pulse-dot pulse-dot--warning" aria-hidden="true"></span>
              <span x-text="t('common.unsaved')"></span>
            </span>
    </div>
  </div>
  <!-- SNMP provider. Sixth host-stats provider for
       managed switches / routers / printers / UPSes / managed APs
       that speak SNMP v2c/v3 but don't run unix-style agents.
       Mirrors the Webmin tab structure (per-host probe with a
       per-host alias map) plus a v3-only sub-block for USM
       credentials. -->
  <div x-show="hostStatsTab === 'snmp'" class="space-y-3" role="tabpanel" id="provider-tabpanel-snmp" aria-labelledby="provider-tab-snmp" tabindex="0" :class="!hasHostStatsSource('snmp') ? 'opacity-60' : ''">
    <div class="flex items-center justify-between gap-2 pb-2 border-b border-dashed border-[var(--border)]">
      <label class="inline-flex items-center gap-2 fs-sm font-medium">
        <input type="checkbox" :disabled="isReadonly() || !settings.snmp_has_snmp_support"
               :checked="hasHostStatsSource('snmp')"
               @change="toggleHostStatsSource('snmp', $event.target.checked)">
        <span x-text="t('settings.host_stats.tab_enable_label', { provider: t('settings.host_stats.source_snmp') })"></span>
      </label>
      <span class="chip"
            :class="hasHostStatsSource('snmp') ? 'pill-ok' : 'pill-muted'"
            x-text="hasHostStatsSource('snmp') ? t('settings.host_stats.tab_enabled') : t('settings.host_stats.tab_disabled')"></span>
    </div>
    <!-- when pysnmp doesn't import cleanly the SPA shows
         BOTH the generic "package not installed" hint AND the
         actual ImportError text from the server. Operators don't
         have to grep server logs to figure out which symbol or
         module path is missing — the inline error pinpoints it.
         import_error stays empty when the import succeeds. The
         import-error line uses the same `--warning` (orange)
         token as the unavailable hint so the diagnostic
         reads as a unified warning block rather than a two-tone
         muted-then-bright surface. -->
    <div x-show="!settings.snmp_has_snmp_support" class="space-y-1">
      <p class="fs-2xs text-[var(--warning)]"
         x-text="t('settings.host_stats.snmp.unavailable')"></p>
      <p x-show="settings.snmp_import_error"
         class="fs-2xs mono text-[var(--warning)] break-all"
         x-text="t('settings.host_stats.snmp.import_error_label', { error: settings.snmp_import_error })"></p>
    </div>
    <p class="fs-2xs text-[var(--text-faint)]"
       x-text="t('settings.host_stats.snmp.section_desc')"></p>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
      <div>
        <label class="block fs-xs text-[var(--text-faint)] mb-1"
               x-text="t('settings.host_stats.snmp.community_label')"></label>
        <input x-model="settings.snmp_default_community" type="text"
               :disabled="isReadonly() || !hasHostStatsSource('snmp')"
               class="w-full mono fs-xs"
               placeholder="public">
      </div>
      <div>
        <label class="block fs-xs text-[var(--text-faint)] mb-1"
               x-text="t('settings.host_stats.snmp.version_label')"></label>
        <select x-model="settings.snmp_default_version"
                :disabled="isReadonly() || !hasHostStatsSource('snmp')"
                class="w-full fs-xs">
          <option value="v2c">v2c</option>
          <option value="v3">v3 (USM)</option>
        </select>
      </div>
      <div>
        <label class="block fs-xs text-[var(--text-faint)] mb-1"
               x-text="t('settings.host_stats.snmp.port_label')"></label>
        <input x-model="settings.snmp_default_port" type="number" min="1" max="65535"
               :disabled="isReadonly() || !hasHostStatsSource('snmp')"
               class="w-full mono fs-xs"
               placeholder="161">
      </div>
    </div>
    <p class="fs-2xs text-[var(--text-faint)]"
       x-text="t('settings.host_stats.snmp.community_hint')"></p>

    <!-- v3 USM block — only visible when version=v3. -->
    <div x-show="settings.snmp_default_version === 'v3'"
         class="space-y-2 pt-3 mt-2 border-t border-dashed border-[var(--border)]">
      <h4 class="font-semibold fs-sm"
          x-text="t('settings.host_stats.snmp.v3_section_title')"></h4>
      <p class="fs-2xs text-[var(--text-faint)]"
         x-text="t('settings.host_stats.snmp.v3_section_hint')"></p>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
        <div>
          <label class="block fs-xs text-[var(--text-faint)] mb-1"
                 x-text="t('settings.host_stats.snmp.v3_user_label')"></label>
          <input x-model="settings.snmp_v3_user" type="text"
                 :disabled="isReadonly() || !hasHostStatsSource('snmp')"
                 class="w-full fs-xs"
                 :placeholder="t('settings.host_stats.snmp.v3_user_placeholder')">
        </div>
        <div>
          <label class="block fs-xs text-[var(--text-faint)] mb-1">
            <span x-text="t('settings.host_stats.snmp.v3_auth_key_label')"></span>
          </label>
          <span x-show="settings.snmp_v3_auth_key_set" class="block fs-xs text-[var(--success)] mb-1"
                x-text="t('settings.secret_input.saved_hint')"></span>
          <input x-model="settings.snmp_v3_auth_key" type="password"
                 autocomplete="new-password"
                 :disabled="isReadonly() || !hasHostStatsSource('snmp')"
                 class="w-full fs-xs"
                 :placeholder="settings.snmp_v3_auth_key_set ? t('settings.secret_input.placeholder_keep') : t('settings.host_stats.snmp.v3_auth_key_placeholder')">
        </div>
        <div>
          <label class="block fs-xs text-[var(--text-faint)] mb-1">
            <span x-text="t('settings.host_stats.snmp.v3_priv_key_label')"></span>
          </label>
          <span x-show="settings.snmp_v3_priv_key_set" class="block fs-xs text-[var(--success)] mb-1"
                x-text="t('settings.secret_input.saved_hint')"></span>
          <input x-model="settings.snmp_v3_priv_key" type="password"
                 autocomplete="new-password"
                 :disabled="isReadonly() || !hasHostStatsSource('snmp')"
                 class="w-full fs-xs"
                 :placeholder="settings.snmp_v3_priv_key_set ? t('settings.secret_input.placeholder_keep') : t('settings.host_stats.snmp.v3_priv_key_placeholder')">
        </div>
      </div>
    </div>

    <!-- Per-host alias map (Docker hostname → SNMP target IP/host).
         Same JSON-textarea contract as node_exporter_overrides. -->
    <div>
      <label class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('settings.host_stats.snmp.aliases_label')"></label>
      <textarea x-model="settings.snmp_aliases_json"
                :disabled="isReadonly() || !hasHostStatsSource('snmp')" rows="5"
                class="w-full mono fs-xs"
                :placeholder='`{\n  "switch01": "192.X.X.10",\n  "ups01": "192.X.X.50"\n}`'></textarea>
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('settings.host_stats.snmp.aliases_hint')"></p>
    </div>

    <!-- Test button + result chip — UX unified with the Ping
         test. Picker shows curated hosts that have an
         `snmp_name` mapped; testSnmpConnection resolves the
         row's target + overrides client-side and submits to
         /api/snmp/test, falling back to global defaults
         server-side for fields the row doesn't override. -->
    <div class="flex items-center gap-2 flex-wrap">
      <button type="button" x-show="isAdmin()" @click="testSnmpConnection()"
              :disabled="(snmpTestResult && snmpTestResult.pending) || !hasHostStatsSource('snmp') || !snmpTestHostId"
              class="btn btn-soft fs-sm inline-flex items-center gap-1.5">
        <svg width="13" height="13" :class="(snmpTestResult && snmpTestResult.pending) ? 'spin-md' : ''" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-play"/>
        </svg>
        <span x-text="(snmpTestResult && snmpTestResult.pending) ? t('settings.host_stats.snmp.testing') : t('settings.host_stats.snmp.test_button')"></span>
      </button>
      <select x-model="snmpTestHostId"
              :disabled="isReadonly() || !hasHostStatsSource('snmp')"
              class="fs-xs mono">
        <option value="" x-text="t('settings.host_stats.snmp.test_target_label')"></option>
        <template x-for="opt in snmpEnabledHosts()" :key="opt.id">
          <option :value="opt.id" x-text="opt.label"></option>
        </template>
      </select>
      <span x-show="hasHostStatsSource('snmp') && !snmpEnabledHosts().length"
            class="fs-2xs text-[var(--text-faint)] italic"
            x-text="t('settings.host_stats.snmp.test_no_hosts')"></span>
      <span x-show="lastTestSuccessLabel('snmp')"
            class="fs-xs text-[var(--text-faint)]"
            x-text="lastTestSuccessLabel('snmp')"></span>
    </div>
    <div x-show="snmpTestResult" class="fs-sm rounded-md px-3 py-2"
         :class="snmpTestResult && snmpTestResult.pending
                       ? 'bg-[var(--pill-warning-bg)] text-[var(--pill-warning-fg)] border border-[var(--pill-warning-br)]'
                       : (snmpTestResult && snmpTestResult.ok
                         ? 'bg-[var(--pill-ok-bg)] text-[var(--pill-ok-fg)] border border-[var(--pill-ok-br)]'
                         : 'bg-[var(--pill-error-bg)] text-[var(--pill-error-fg)] border border-[var(--pill-error-br)]')"
         x-text="snmpTestResult && snmpTestResult.pending
                       ? t('actions.testing')
                       : (snmpTestResult ? ((snmpTestResult.ok ? '✓ ' : '✗ ') + (snmpTestResult.detail || '')) : '')"></div>

    <!-- SNMP provider tunables — canonical header pattern
         (icon + h3 + intro paragraph) matching every other admin
         tab (AI / Asset Inventory / Portainer / Notifications /
         NE / SSH / Beszel / Pulse / Ping / Webmin). Covers probe
         timeout, wall-clock budget, fan-out concurrency, per-
         host walk concurrency, sample interval, per-host success
         + failure cache TTLs, unreachable cooldown, and per-
         (provider, host) auto-pause threshold. All edits commit
         through the SNMP section's Save button. -->
    <div class="mt-3 pt-3 border-t border-[var(--border)] space-y-3"
         x-show="tuningLoaded">
      <div class="flex items-center gap-2 mb-1">
        <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sliders"/>
        </svg>
        <h3 class="font-semibold fs-sm"
            x-text="t('settings.host_stats.tunables_heading_snmp')"></h3>
      </div>
      <p class="fs-2xs text-[var(--text-faint)] mb-2 leading-snug"
         x-text="t('settings.host_stats.tunables_intro_snmp')"></p>
      <template x-for="key in _perProviderTuneKeys.snmp" :key="key">
        <div class="space-y-1">
          <label class="block fs-xs font-medium"
                 x-text="t('admin.config.fields.' + key + '.label')"></label>
          <p class="fs-2xs text-[var(--text-faint)] leading-snug"
             x-text="t('admin.config.fields.' + key + '.help')"></p>
          <div class="flex flex-wrap items-center gap-2">
            <input type="number"
                   x-model="tuningForm[key]"
                   :placeholder="tuningPlaceholder(key)"
                   :min="(tuningEffective[key] || {}).min"
                   :max="(tuningEffective[key] || {}).max"
                   :disabled="tuneKnobDisabled('snmp')"
                   class="w-32 mono fs-sm">
            <div class="bounds-chips" role="group"
                 :aria-label="t('admin.config.bounds.group_label')">
                    <span class="bounds-chip bounds-chip--min"
                          :title="t('admin.config.bounds.min_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).min"></span>
                    </span>
              <span class="bounds-chip bounds-chip--max"
                    :title="t('admin.config.bounds.max_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).max"></span>
                    </span>
              <span class="bounds-chip bounds-chip--default"
                    :title="t('admin.config.bounds.default_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/></svg>
                      <span x-text="(tuningEffective[key] || {}).default"></span>
                    </span>
            </div>
            <span class="fs-xs text-[var(--text-dim)] ms-auto"
                  x-text="tuningEffectiveLabel(key)"></span>
          </div>
        </div>
      </template>
    </div>

    <!-- Per-provider chip colour. -->
    <div class="pt-3 mt-3 border-t border-[var(--border)] flex items-center gap-3 flex-wrap">
      <label class="fs-xs flex items-center gap-2">
        <span x-text="t('settings.host_stats.chip_color_label')"></span>
        <input type="color"
               :value="settings.provider_color_snmp || providerColor('snmp')"
               @input="settings.provider_color_snmp = $event.target.value"
               :disabled="isReadonly() || !hasHostStatsSource('snmp')"
               class="w-9 h-7 cursor-pointer p-0 bg-transparent border border-[var(--border)] rounded">
        <input type="text" x-model="settings.provider_color_snmp"
               @input="settings.provider_color_snmp = normalizeHexColor($event.target.value)"
               :placeholder="providerColor('snmp')"
               :disabled="isReadonly() || !hasHostStatsSource('snmp')"
               pattern="^#[0-9a-fA-F]{6}$" maxlength="7"
               class="w-24 mono fs-xs uppercase">
      </label>
      <button type="button"
              x-show="settings.provider_color_snmp"
              @click="settings.provider_color_snmp = ''"
              class="btn btn-ghost fs-2xs"
              x-text="t('settings.host_stats.chip_color_reset')"></button>
      <span class="chip pill-custom fs-2xs"
            :style="providerChipStyle('snmp')"
            x-text="t('settings.host_stats.chip_color_preview')"></span>
      <p class="basis-full fs-2xs text-[var(--text-faint)]"
         x-text="t('settings.host_stats.chip_color_hint')"></p>
    </div>
    <!-- Section-owned Save at the END of the sub-tab. Posts only
         SNMP's plain settings + every SNMP tunable rendered
         above. -->
    <div class="pt-3 mt-3 border-t border-[var(--border)] flex items-center gap-2 flex-wrap">
      <button type="button"
              @click="saveSnmpSection()"
              :disabled="isReadonly() || hostStatsSaving"
              :class="snmpSectionDirty() ? 'btn-dirty' : ''"
              class="btn btn-primary fs-sm"
              x-text="hostStatsSaving ? t('actions.saving') : t('actions.save')"></button>
      <span x-show="snmpSectionDirty() && !hostStatsSaving"
            class="fs-xs text-[var(--warning)] inline-flex items-center gap-1">
              <span class="pulse-dot pulse-dot--warning" aria-hidden="true"></span>
              <span x-text="t('common.unsaved')"></span>
            </span>
    </div>
  </div>

  <!-- HTTP / TLS / DNS health probe — seventh host-stats provider.
       Active per-URL TCP / TLS / DNS check. Targets the operator's
       existing curated URLs (top-level url + every services[].url)
       so the provider auto-covers the fleet on day one with zero
       per-monitor configuration. Per-host opt-in via Admin → Hosts. -->
  <!-- Single master toggle (no separate tab-strip / CSV-inclusion
       checkbox like the legacy telemetry providers). Same simplification
       as service_probe below — for the probe-result providers the CSV-
       inclusion and sampler-master collapse to one operator intent so
       two near-identical "Enable" boxes was just noise. Save handler
       syncs the host_stats_source CSV to settings.http_probe_enabled
       so the Stats Dashboard chip stays accurate. -->
  <div x-show="hostStatsTab === 'http_probe'" class="space-y-3" role="tabpanel" id="provider-tabpanel-http_probe" aria-labelledby="provider-tab-http_probe" tabindex="0" :class="!settings.http_probe_enabled ? 'opacity-60' : ''">
    <div class="flex items-center justify-between gap-2 pb-2 border-b border-dashed border-[var(--border)]">
      <label class="inline-flex items-center gap-2 fs-sm font-medium">
        <input type="checkbox" x-model="settings.http_probe_enabled"
               :disabled="isReadonly()">
        <span x-text="t('settings.host_stats.tab_enable_label', { provider: t('settings.host_stats.source_http_probe') })"></span>
      </label>
      <span class="chip"
            :class="settings.http_probe_enabled ? 'pill-ok' : 'pill-muted'"
            x-text="settings.http_probe_enabled ? t('settings.host_stats.tab_enabled') : t('settings.host_stats.tab_disabled')"></span>
    </div>
    <p class="fs-xs text-[var(--text-faint)] mb-1"
       x-text="t('settings.host_stats.http_probe.section_desc')"></p>
    <p class="fs-xs text-[var(--text-faint)] mb-1"
       x-text="t('settings.host_stats.http_probe.enabled_hint')"></p>
    <!-- Global URL aliases removed — per-host override lives on each
             row's `http_probe.urls` field in Admin → Hosts, which the
             sampler already prefers over the curated `url` + services[]
             fallback. Operator edits the URL list on the host that needs
             it instead of maintaining a parallel CSV at the global level. -->
    <!-- Test-connection row. Operator types a URL; the test fires
         POST /api/http-probe/test against it and stamps
         _httpProbeLastPassedTest on success so the Save button
         unlocks per the Test-before-Save gate pattern. -->
    <div class="flex items-end gap-2 flex-wrap">
      <div class="flex-1 min-w-[260px]">
        <label class="block fs-xs text-[var(--text-faint)] mb-1"
               x-text="t('settings.host_stats.http_probe.test_url_label')"></label>
        <input x-model="httpProbeTestUrl" type="text"
               :disabled="isReadonly() || !settings.http_probe_enabled"
               class="w-full mono fs-xs"
               :placeholder="t('settings.host_stats.http_probe.test_url_placeholder')">
      </div>
      <button type="button" x-show="isAdmin()" @click="testHttpProbe()"
              :disabled="(httpProbeTestResult && httpProbeTestResult.pending) || !settings.http_probe_enabled || !httpProbeTestUrl"
              class="btn btn-ghost fs-sm inline-flex items-center gap-1.5">
        <svg width="13" height="13" :class="(httpProbeTestResult && httpProbeTestResult.pending) ? 'spin-md' : ''" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-zap"/>
        </svg>
        <span x-text="(httpProbeTestResult && httpProbeTestResult.pending) ? t('settings.host_stats.http_probe.testing') : t('settings.host_stats.http_probe.test_button')"></span>
      </button>
    </div>
    <div x-show="httpProbeTestResult && !httpProbeTestResult.pending" class="mt-1">
      <p x-show="httpProbeTestResult && httpProbeTestResult.ok"
         class="fs-xs text-[var(--success)] mono"
         x-text="t('settings.host_stats.http_probe.test_result_ok', {
                   url: httpProbeTestResult && httpProbeTestResult.url,
                   status: (httpProbeTestResult && httpProbeTestResult.status_code) || '?',
                   latency_ms: (httpProbeTestResult && httpProbeTestResult.latency_ms) || '?'
                 })"></p>
      <p x-show="httpProbeTestResult && !httpProbeTestResult.ok"
         class="fs-xs text-[var(--danger)] mono"
         x-text="t('settings.host_stats.http_probe.test_result_fail', {
                   url: (httpProbeTestResult && httpProbeTestResult.url) || '',
                   error: (httpProbeTestResult && httpProbeTestResult.error) || ''
                 })"></p>
    </div>
    <!-- HTTP probe provider tunables — canonical header pattern
         (icon + h3 + intro paragraph) matching every other admin
         tab. Per-knob row: label + value input + bounds-chips badge
         showing the operator min / max / default for the knob.
         Bounds-chips renderer iterates the _perProviderTuneKeys.http_probe
         array so adding a knob to that array surfaces a row here
         automatically. -->
    <div class="mt-3 pt-3 border-t border-[var(--border)] space-y-3"
         x-show="tuningLoaded">
      <div class="flex items-center gap-2 mb-1">
        <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sliders"/>
        </svg>
        <h3 class="font-semibold fs-sm"
            x-text="t('settings.host_stats.tunables_heading_http_probe')"></h3>
      </div>
      <p class="fs-2xs text-[var(--text-faint)] mb-2 leading-snug"
         x-text="t('settings.host_stats.tunables_intro_http_probe')"></p>
      <template x-for="key in (_perProviderTuneKeys && _perProviderTuneKeys.http_probe) || []" :key="key">
        <div class="space-y-1">
          <label class="block fs-xs font-medium"
                 x-text="t('admin.config.fields.' + key + '.label')"></label>
          <p class="fs-2xs text-[var(--text-faint)] leading-snug"
             x-text="t('admin.config.fields.' + key + '.help')"></p>
          <div class="flex flex-wrap items-center gap-2">
            <input type="number"
                   x-model="tuningForm[key]"
                   :placeholder="tuningPlaceholder(key)"
                   :min="(tuningEffective[key] || {}).min"
                   :max="(tuningEffective[key] || {}).max"
                   :disabled="isReadonly() || !settings.http_probe_enabled"
                   class="w-32 mono fs-sm">
            <div class="bounds-chips" role="group"
                 :aria-label="t('admin.config.bounds.group_label')">
                    <span class="bounds-chip bounds-chip--min"
                          :title="t('admin.config.bounds.min_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).min"></span>
                    </span>
              <span class="bounds-chip bounds-chip--max"
                    :title="t('admin.config.bounds.max_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).max"></span>
                    </span>
              <span class="bounds-chip bounds-chip--default"
                    :title="t('admin.config.bounds.default_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/></svg>
                      <span x-text="(tuningEffective[key] || {}).default"></span>
                    </span>
            </div>
            <span class="fs-xs text-[var(--text-dim)] ms-auto"
                  x-text="tuningEffectiveLabel(key)"></span>
          </div>
        </div>
      </template>
    </div>
    <!-- Chip colour picker (matches the SNMP / Ping pattern). -->
    <div x-show="settings.http_probe_enabled" class="flex items-center gap-2 flex-wrap pt-3 border-t border-dashed border-[var(--border)]">
      <label class="fs-xs text-[var(--text-faint)] inline-flex items-center gap-1.5">
        <span x-text="t('settings.host_stats.chip_color_label')"></span>
      </label>
      <input type="color"
             :value="settings.provider_color_http_probe || providerColor('http_probe')"
             @input="settings.provider_color_http_probe = $event.target.value"
             :disabled="isReadonly() || !settings.http_probe_enabled"
             class="h-7 w-8 cursor-pointer border-0 p-0 bg-transparent">
      <input type="text" x-model="settings.provider_color_http_probe"
             @blur="settings.provider_color_http_probe = normalizeHexColor(settings.provider_color_http_probe)"
             :disabled="isReadonly() || !settings.http_probe_enabled"
             :placeholder="t('settings.host_stats.chip_color_placeholder')"
             pattern="^#[0-9a-fA-F]{6}$"
             class="mono fs-2xs w-28">
      <button type="button"
              :disabled="isReadonly() || !settings.http_probe_enabled"
              x-show="settings.provider_color_http_probe"
              @click="settings.provider_color_http_probe = ''"
              class="btn btn-ghost fs-2xs"
              x-text="t('settings.host_stats.chip_color_reset')"></button>
      <span class="chip pill-custom fs-2xs"
            :style="providerChipStyle('http_probe')"
            x-text="t('settings.host_stats.chip_color_preview')"></span>
      <p class="basis-full fs-2xs text-[var(--text-faint)]"
         x-text="t('settings.host_stats.chip_color_hint')"></p>
    </div>
    <!-- Section-owned Save row. Test-before-Save gate: when master
         enable is ON, Save is disabled until a probe against the
         current form values passes. Dirty cue stays tied purely to
         httpProbeSectionDirty(). Save unlocks purely on dirty state —
         no Test-before-Save gate here; per-host URLs live on each
         Admin → Hosts row and the section's Test button is a one-shot
         diagnostic, not a section-level config validator. -->
    <div class="pt-3 mt-3 border-t border-[var(--border)] flex items-center gap-2 flex-wrap">
      <button type="button"
              @click="saveHttpProbeSection()"
              :disabled="isReadonly() || hostStatsSaving"
              :class="httpProbeSectionDirty() ? 'btn-dirty' : ''"
              class="btn btn-primary fs-sm"
              x-text="hostStatsSaving ? t('actions.saving') : t('actions.save')"></button>
      <span x-show="httpProbeSectionDirty() && !hostStatsSaving"
            class="fs-xs text-[var(--warning)] inline-flex items-center gap-1">
              <span class="pulse-dot pulse-dot--warning" aria-hidden="true"></span>
              <span x-text="t('common.unsaved')"></span>
            </span>
    </div>
  </div>

  <!-- SERVICE PROBE — per-service-chip reachability sampler. Distinct
       from http_probe (which is per-HOST): this one polls each opted-in
       service entry on each host's `services[].probe = {enabled, type,
       port, path, expected_status}` config and writes one row per
       (host, service, ts) to the `service_samples` table. Per-chip
       probe config lives on each Admin → Hosts row's services[] —
       this sub-tab only carries the master toggle, the four sampler
       tunables, and the chip colour.
       Single master toggle (no separate tab-strip / CSV-inclusion
       checkbox like http_probe's). For service_probe the CSV-inclusion
       and the sampler-master collapse to the same operator intent
       ("is this sampler running?") so two near-identical "Enable
       service probe" boxes was just noise. -->
  <div x-show="hostStatsTab === 'service_probe'" class="space-y-3" role="tabpanel" id="provider-tabpanel-service_probe" aria-labelledby="provider-tab-service_probe" tabindex="0" :class="!settings.service_probe_enabled ? 'opacity-60' : ''">
    <div class="flex items-center justify-between gap-2 pb-2 border-b border-dashed border-[var(--border)]">
      <label class="inline-flex items-center gap-2 fs-sm font-medium">
        <input type="checkbox" x-model="settings.service_probe_enabled"
               :disabled="isReadonly()">
        <span x-text="t('settings.host_stats.tab_enable_label', { provider: t('settings.host_stats.source_service_probe') })"></span>
      </label>
      <span class="chip"
            :class="settings.service_probe_enabled ? 'pill-ok' : 'pill-muted'"
            x-text="settings.service_probe_enabled ? t('settings.host_stats.tab_enabled') : t('settings.host_stats.tab_disabled')"></span>
    </div>
    <p class="fs-xs text-[var(--text-faint)] mb-1"
       x-text="t('settings.host_stats.service_probe.section_desc')"></p>
    <p class="fs-xs text-[var(--text-faint)] mb-1"
       x-text="t('settings.host_stats.service_probe.enabled_hint')"></p>
    <!-- No per-section "Test connection" diagnostic: probes are
         per-chip (services[].probe), configured on each Admin → Hosts
         row. Operator validates with the per-host "Test" button in
         the chip editor, not here. -->
    <!-- Service probe tunables — same bounds-chips renderer pattern
         as every other provider sub-tab. The renderer iterates
         _perProviderTuneKeys.service_probe so adding a knob to that
         array surfaces a row here automatically. -->
    <div class="mt-3 pt-3 border-t border-[var(--border)] space-y-3"
         x-show="tuningLoaded">
      <div class="flex items-center gap-2 mb-1">
        <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sliders"/>
        </svg>
        <h3 class="font-semibold fs-sm"
            x-text="t('settings.host_stats.tunables_heading_service_probe')"></h3>
      </div>
      <p class="fs-2xs text-[var(--text-faint)] mb-2 leading-snug"
         x-text="t('settings.host_stats.tunables_intro_service_probe')"></p>
      <template x-for="key in (_perProviderTuneKeys && _perProviderTuneKeys.service_probe) || []" :key="key">
        <div class="space-y-1">
          <label class="block fs-xs font-medium"
                 x-text="t('admin.config.fields.' + key + '.label')"></label>
          <p class="fs-2xs text-[var(--text-faint)] leading-snug"
             x-text="t('admin.config.fields.' + key + '.help')"></p>
          <div class="flex flex-wrap items-center gap-2">
            <input type="number"
                   x-model="tuningForm[key]"
                   :placeholder="tuningPlaceholder(key)"
                   :min="(tuningEffective[key] || {}).min"
                   :max="(tuningEffective[key] || {}).max"
                   :disabled="isReadonly() || !settings.service_probe_enabled"
                   class="w-32 mono fs-sm">
            <div class="bounds-chips" role="group"
                 :aria-label="t('admin.config.bounds.group_label')">
                    <span class="bounds-chip bounds-chip--min"
                          :title="t('admin.config.bounds.min_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).min"></span>
                    </span>
              <span class="bounds-chip bounds-chip--max"
                    :title="t('admin.config.bounds.max_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/></svg>
                      <span x-text="(tuningEffective[key] || {}).max"></span>
                    </span>
              <span class="bounds-chip bounds-chip--default"
                    :title="t('admin.config.bounds.default_title')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/></svg>
                      <span x-text="(tuningEffective[key] || {}).default"></span>
                    </span>
            </div>
            <span class="fs-xs text-[var(--text-dim)] ms-auto"
                  x-text="tuningEffectiveLabel(key)"></span>
          </div>
        </div>
      </template>
    </div>
    <!-- Chip colour picker (matches the HTTP probe / SNMP / Ping pattern).
         Gate on the master toggle directly (service_probe has only one
         enable knob — see header comment above). -->
    <div x-show="settings.service_probe_enabled" class="flex items-center gap-2 flex-wrap pt-3 border-t border-dashed border-[var(--border)]">
      <label class="fs-xs text-[var(--text-faint)] inline-flex items-center gap-1.5">
        <span x-text="t('settings.host_stats.chip_color_label')"></span>
      </label>
      <input type="color"
             :value="settings.provider_color_service_probe || providerColor('service_probe')"
             @input="settings.provider_color_service_probe = $event.target.value"
             :disabled="isReadonly() || !settings.service_probe_enabled"
             class="h-7 w-8 cursor-pointer border-0 p-0 bg-transparent">
      <input type="text" x-model="settings.provider_color_service_probe"
             @blur="settings.provider_color_service_probe = normalizeHexColor(settings.provider_color_service_probe)"
             :disabled="isReadonly() || !settings.service_probe_enabled"
             :placeholder="t('settings.host_stats.chip_color_placeholder')"
             pattern="^#[0-9a-fA-F]{6}$"
             class="mono fs-2xs w-28">
      <button type="button"
              :disabled="isReadonly() || !settings.service_probe_enabled"
              x-show="settings.provider_color_service_probe"
              @click="settings.provider_color_service_probe = ''"
              class="btn btn-ghost fs-2xs"
              x-text="t('settings.host_stats.chip_color_reset')"></button>
      <span class="chip pill-custom fs-2xs"
            :style="providerChipStyle('service_probe')"
            x-text="t('settings.host_stats.chip_color_preview')"></span>
      <p class="basis-full fs-2xs text-[var(--text-faint)]"
         x-text="t('settings.host_stats.chip_color_hint')"></p>
    </div>
    <!-- Section-owned Save row. Save unlocks purely on dirty state —
         no Test-before-Save gate here; per-chip probes are validated
         from each Admin → Hosts row. -->
    <div class="pt-3 mt-3 border-t border-[var(--border)] flex items-center gap-2 flex-wrap">
      <button type="button"
              @click="saveServiceProbeSection()"
              :disabled="isReadonly() || hostStatsSaving"
              :class="serviceProbeSectionDirty() ? 'btn-dirty' : ''"
              class="btn btn-primary fs-sm"
              x-text="hostStatsSaving ? t('actions.saving') : t('actions.save')"></button>
      <span x-show="serviceProbeSectionDirty() && !hostStatsSaving"
            class="fs-xs text-[var(--warning)] inline-flex items-center gap-1">
              <span class="pulse-dot pulse-dot--warning" aria-hidden="true"></span>
              <span x-text="t('common.unsaved')"></span>
            </span>
    </div>
  </div>

  <!-- Port Scan was previously rendered here as a 7th provider
       tab, but it isn't a continuous-telemetry source like the
       other six — it's an on-demand action surface (operator
       clicks "Scan ports" in the host drawer or asks the AI
       palette). Lifted to its own admin sub-tab AFTER SSH so
       the two action-style admin surfaces sit together. The
       four settings (`port_scan_enabled` master toggle +
       default ports / timeout / concurrency) still live on
       the same `settings` payload that this tab's Save row
       commits, so dirty-tracking + saveHostStats() round-trip
       unchanged. See `static/_partials/admin/port_scan.html`. -->

  <!-- Global Save row removed — every provider sub-tab now owns
       its own section Save at the end of its block (NE / Beszel /
       Pulse / Webmin / Ping / SNMP / HTTP probe). One Save button
       per sub-tab is the consistent operator experience; the
       legacy global Save fell back only for Beszel + Pulse which
       hadn't been migrated yet. -->
</section>

<!-- HOSTS TAB — curated host list editor. Cards instead of a
     table so inputs have room to breathe. Each card edits one
     host: basic row on top (ID / Label / enabled / delete),
     provider-specific fields expand below in a 3-col grid so
     each input gets a sensible minimum width. -->
