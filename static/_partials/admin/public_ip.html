<!--suppress HtmlUnknownAttribute -->
<section x-show="adminTab==='public_ip'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
  <!-- Title row + Enabled/Disabled pill — matches every other
       master-toggled admin tab (Asset Inventory / SSH /
       Portainer / OIDC) for visual consistency. -->
  <div class="flex items-center justify-between gap-2 mb-2">
    <div class="flex items-center gap-2">
      <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-globe"/>
      </svg>
      <h3 class="font-semibold fs-md" x-text="t('admin_public_ip.title')"></h3>
    </div>
    <span class="chip"
          :class="(tuningForm['tuning_public_ip_enabled'] === '1' || tuningForm['tuning_public_ip_enabled'] === 1) ? 'pill-ok' : 'pill-muted'"
          x-text="(tuningForm['tuning_public_ip_enabled'] === '1' || tuningForm['tuning_public_ip_enabled'] === 1) ? t('admin_integrations.enabled_pill') : t('admin_integrations.disabled_pill')"></span>
  </div>
  <p class="fs-xs text-[var(--text-faint)] mb-3 leading-snug max-w-[720px]"
     x-text="t('admin_public_ip.intro')"></p>

  <!-- Master switch. Encoded as the int tunable
       `tuning_public_ip_enabled` (1 = on, 0 = off) per the
       canonical TUNABLES pattern. When off, every call into
       `logic.public_ip.fetch()` short-circuits to None and no
       outbound request to ifconfig.co fires. -->
  <label class="flex items-center gap-2 fs-sm cursor-pointer mb-3 select-none">
    <input type="checkbox"
           :checked="tuningForm['tuning_public_ip_enabled'] === '1' || tuningForm['tuning_public_ip_enabled'] === 1"
           @change="tuningForm['tuning_public_ip_enabled'] = ($event.target.checked ? '1' : '0')"
           :disabled="isReadonly()">
    <span class="font-medium" x-text="t('admin_integrations.enabled_label')"></span>
    <span class="fs-xs text-[var(--text-faint)]"
          x-text="(tuningForm['tuning_public_ip_enabled'] === '1' || tuningForm['tuning_public_ip_enabled'] === 1) ? '' : t('admin_integrations.disabled_hint')"></span>
  </label>

  <!-- Action row 1: Test lookup button + last-result chip.
       Mirrors the Asset Inventory pattern (Test up top, Save
       below on its own row separated by HR). Test still works
       when disabled? — NO, ifconfig.co outbound is gated on
       the tunable; disabling the gate disables the test. -->
  <div class="mt-3 flex items-center gap-2 flex-wrap">
    <button type="button" x-show="isAdmin()" @click="testPublicIpLookup()"
            class="btn btn-soft fs-sm inline-flex items-center gap-1.5"
            :disabled="publicIpTesting || !(tuningForm['tuning_public_ip_enabled'] === '1' || tuningForm['tuning_public_ip_enabled'] === 1)">
      <svg width="13" height="13" :class="publicIpTesting ? 'spin-md' : ''" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-play"/>
      </svg>
      <span x-show="!publicIpTesting" x-text="t('admin_public_ip.test_button') || 'Test lookup'"></span>
      <span x-show="publicIpTesting" x-text="t('admin_public_ip.testing') || 'Testing…'"></span>
    </button>
  </div>

  <!-- Test result chip — same shape as Asset Inventory's chip.
       Pending / OK / error tones via the canonical pill tokens. -->
  <div x-show="publicIpTestResult"
       class="mt-3 rounded-md px-3 py-2 fs-sm"
       :class="publicIpTestOk
                     ? 'bg-[var(--pill-ok-bg)] text-[var(--pill-ok-fg)] border border-[var(--pill-ok-br)]'
                     : 'bg-[var(--pill-error-bg)] text-[var(--pill-error-fg)] border border-[var(--pill-error-br)]'">
    <pre class="mono fs-xs whitespace-pre-wrap break-all" x-text="publicIpTestResult"></pre>
  </div>

  <!-- Public-IP-scoped tunables — operator-tunable cache TTL +
       outbound HTTP timeout. Section-owned save: editing
       either flips the same amber ring as the master toggle;
       `savePublicIpSection()` POSTs them in one body so dirty
       / undirty round-trip cleanly. Same bounds-chips +
       effective-label shape every Admin → Config row uses. -->
  <div x-show="tuningLoaded" class="mt-3 pt-3 border-t border-[var(--border)] space-y-3">
    <div class="flex items-center gap-2 mb-1">
      <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sliders"/>
      </svg>
      <h3 class="font-semibold fs-sm"
          x-text="t('admin_public_ip.tunables_heading') || 'Tunables'"></h3>
    </div>
    <p class="fs-2xs text-[var(--text-faint)] mb-2 leading-snug"
       x-text="t('admin_public_ip.tunables_intro') || 'In-process cache TTL + outbound HTTP wall-clock. Per-call reads so an edit takes effect on the next lookup without restart.'"></p>
    <template x-for="key in ['tuning_public_ip_cache_ttl_seconds',
                                    'tuning_public_ip_fetch_timeout_seconds']"
              :key="key">
      <div>
        <label class="block fs-xs font-medium mb-1"
               :for="'pubip-' + key"
               x-text="t('admin.config.fields.' + key + '.label')"></label>
        <p class="fs-2xs text-[var(--text-faint)] leading-snug mb-2"
           x-text="t('admin.config.fields.' + key + '.help')"></p>
        <div class="flex flex-wrap items-center gap-2">
          <input type="number"
                 :id="'pubip-' + key"
                 :aria-label="t('admin.config.fields.' + key + '.label')"
                 x-model="tuningForm[key]"
                 :placeholder="tuningPlaceholder(key)"
                 :min="(tuningEffective[key] || {}).min"
                 :max="(tuningEffective[key] || {}).max"
                 :disabled="!isAdmin() || publicIpSaving"
                 class="w-44 mono fs-sm py-1">
          <div class="bounds-chips" role="group"
               :aria-label="t('admin.config.bounds.group_label')">
                  <span class="bounds-chip bounds-chip--min" :title="t('admin.config.bounds.min_title')">
                    <svg width="11" height="11" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/>
                    </svg>
                    <span x-text="(tuningEffective[key] || {}).min"></span>
                  </span>
            <span class="bounds-chip bounds-chip--max" :title="t('admin.config.bounds.max_title')">
                    <svg width="11" height="11" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/>
                    </svg>
                    <span x-text="(tuningEffective[key] || {}).max"></span>
                  </span>
            <span class="bounds-chip bounds-chip--default" :title="t('admin.config.bounds.default_title')">
                    <svg width="11" height="11" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/>
                    </svg>
                    <span x-text="(tuningEffective[key] || {}).default"></span>
                  </span>
          </div>
          <span class="fs-2xs text-[var(--text-faint)] ms-auto"
                x-text="tuningEffectiveLabel(key)"></span>
        </div>
      </div>
    </template>
  </div>

  <!-- Action row 2 (Save): separated by HR — same shape as
       Asset Inventory's Save row. Save button gets the amber
       ring when dirty + an inline "Unsaved" pulse-dot chip. -->
  <div class="mt-3 pt-3 border-t border-[var(--border)] flex items-center gap-2 flex-wrap">
    <button type="button" x-show="isAdmin()" @click="savePublicIpSection()"
            class="btn btn-primary fs-sm"
            :class="publicIpSectionDirty() ? 'ring-2 ring-[var(--warning)]' : ''"
            :disabled="publicIpSaving || !publicIpSectionDirty()">
      <span x-show="!publicIpSaving" x-text="t('actions.save')"></span>
      <span x-show="publicIpSaving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('admin_public_ip.saving') || 'Saving…'"></span></span>
    </button>
    <span x-show="publicIpSectionDirty()"
          class="fs-xs text-[var(--warning)] flex items-center gap-1.5"
          :title="t('common.unsaved_title')">
            <span class="w-1.5 h-1.5 rounded-full bg-[var(--warning)] animate-pulse"></span>
            <span class="unsaved-flash" x-text="t('hosts_actions.unsaved_label')"></span>
          </span>
  </div>
</section>
