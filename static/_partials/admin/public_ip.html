<!--suppress HtmlUnknownAttribute -->
<section x-show="adminTab==='public_ip'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
  <!-- Title row + Enabled/Disabled pill — matches every other
       master-toggled admin tab (Asset Inventory / SSH /
       Portainer / OIDC) for visual consistency. -->
  <div class="flex items-center justify-between gap-2 mb-2">
    <div class="flex items-center gap-2">
      <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-globe"/>
      </svg>
      <h3 class="font-semibold fs-md" x-text="t('admin_public_ip.title')"></h3>
    </div>
    <!-- Until tuningForm has loaded, the enabled flag is unknown — show a
         neutral "Loading…" pill instead of the default-falsy "Disabled",
         which flashed Disabled->Enabled on every reload and deceived the
         user into thinking the feature was off. -->
    <span x-show="!tuningLoaded" class="chip pill-muted"
          x-text="t('common.loading') || 'Loading…'"></span>
    <span x-show="tuningLoaded" class="chip"
          :class="(tuningForm['tuning_public_ip_enabled'] === '1' || tuningForm['tuning_public_ip_enabled'] === 1) ? 'pill-ok' : 'pill-muted'"
          x-text="(tuningForm['tuning_public_ip_enabled'] === '1' || tuningForm['tuning_public_ip_enabled'] === 1) ? t('admin_integrations.enabled_pill') : t('admin_integrations.disabled_pill')"></span>
  </div>
  <p class="fs-xs text-[var(--text-faint)] mb-3 leading-snug max-w-[720px]"
     x-text="t('admin_public_ip.intro')"></p>

  <!-- Master switch. Encoded as the int tunable
       `tuning_public_ip_enabled` (1 = on, 0 = off) per the
       canonical TUNABLES pattern. When off, every call into
       `logic.public_ip.fetch()` short-circuits to None and no
       outbound request to ifconfig.co fires. -->
  <label class="flex items-center gap-2 fs-sm cursor-pointer mb-3 select-none">
    <!-- Disabled until tuningForm loads so the checkbox can't show a
         premature unchecked (=looks-off) state nor accept a toggle against
         a value we haven't read yet — pairs with the Loading pill above. -->
    <input type="checkbox"
           :checked="tuningForm['tuning_public_ip_enabled'] === '1' || tuningForm['tuning_public_ip_enabled'] === 1"
           @change="tuningForm['tuning_public_ip_enabled'] = ($event.target.checked ? '1' : '0')"
           :disabled="isReadonly() || !tuningLoaded">
    <span class="font-medium" x-text="t('admin_integrations.enabled_label')"></span>
    <span class="fs-xs text-[var(--text-faint)]"
          x-text="!tuningLoaded ? (t('common.loading') || 'Loading…') : ((tuningForm['tuning_public_ip_enabled'] === '1' || tuningForm['tuning_public_ip_enabled'] === 1) ? '' : t('admin_integrations.disabled_hint'))"></span>
  </label>

  <!-- Shared Test-connection component — unified Test button (Test
       connection + play icon) + pending/success/error result box. The
       lookup returns the canonical /api/public-ip payload; the
       multi-line pretty-JSON renders in the box via .og-test-detail
       (pre-wrap). The adapter synthesises the {pending,ok,detail} shape
       the component expects from the publicIpTesting / publicIpTestOk /
       publicIpTestResult state fields. -->
  <div class="mt-3" x-show="isAdmin()"
       x-data="{ tcRun: () => testPublicIpLookup(), tcResult: () => (publicIpTesting ? { pending: true } : (publicIpTestResult ? { pending: false, ok: publicIpTestOk, detail: publicIpTestResult } : null)), tcDisabled: () => !(tuningForm['tuning_public_ip_enabled'] === '1' || tuningForm['tuning_public_ip_enabled'] === 1), tcSuccessKey: 'public_ip' }">
    <!-- INCLUDE: _components/og-test-connection.html -->
  </div>

  <!-- Public-IP-scoped tunables — operator-tunable cache TTL +
       outbound HTTP timeout. Section-owned save: editing
       either flips the same amber ring as the master toggle;
       `savePublicIpSection()` POSTs them in one body so dirty
       / undirty round-trip cleanly. Same bounds-chips +
       effective-label shape every Admin → Config row uses. -->
  <details x-show="isAdmin()" class="mt-3 bg-[var(--surface-2)] border border-[var(--border)] rounded-md p-3">
    <summary class="cursor-pointer fs-sm font-medium select-none flex items-center gap-2">
      <svg width="12" height="12" class="transition-transform" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
      </svg>
      <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sliders"/>
      </svg>
      <span x-text="t('common.tunables')"></span>
    </summary>
    <div class="mt-3 space-y-3">
      <p class="fs-2xs text-[var(--text-faint)] mb-2 leading-snug"
         x-text="t('admin_public_ip.tunables_intro') || 'In-process cache TTL + outbound HTTP wall-clock. Per-call reads so an edit takes effect on the next lookup without restart.'"></p>
      <div class="border-t border-[var(--border)] mb-3" aria-hidden="true"></div>
      <div x-show="!tuningLoaded" class="flex items-center gap-2 fs-xs text-[var(--text-faint)] py-2">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('common.loading')"></span>
      </div>
      <template x-for="key in (tuningLoaded ? ['tuning_public_ip_cache_ttl_seconds',
                                    'tuning_public_ip_fetch_timeout_seconds',
                                    'tuning_public_ip_sample_interval_seconds'] : [])"
                :key="key">
        <div>
          <label class="block fs-xs font-medium mb-1"
                 :for="'pubip-' + key"
                 x-text="t('admin.config.fields.' + key + '.label')"></label>
          <p class="fs-2xs text-[var(--text-faint)] leading-snug mb-2"
             x-text="t('admin.config.fields.' + key + '.help')"></p>
          <div class="flex flex-wrap items-center gap-2">
            <label class="contents">
              <input type="number"
                     :id="'pubip-' + key"
                     :aria-label="t('admin.config.fields.' + key + '.label')"
                     x-model="tuningForm[key]"
                     :placeholder="tuningPlaceholder(key)"
                     :min="(tuningEffective[key] || {}).min"
                     :max="(tuningEffective[key] || {}).max"
                     :disabled="!isAdmin() || publicIpSaving"
                     class="w-44 mono fs-sm py-1">
            </label>
            <div class="bounds-chips" role="group"
                 :aria-label="t('admin.config.bounds.group_label')">
                  <span class="bounds-chip bounds-chip--min" :title="t('admin.config.bounds.min_title')">
                    <svg width="11" height="11" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/>
                    </svg>
                    <span x-text="(tuningEffective[key] || {}).min"></span>
                  </span>
              <span class="bounds-chip bounds-chip--max" :title="t('admin.config.bounds.max_title')">
                    <svg width="11" height="11" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/>
                    </svg>
                    <span x-text="(tuningEffective[key] || {}).max"></span>
                  </span>
              <span class="bounds-chip bounds-chip--default" :title="t('admin.config.bounds.default_title')">
                    <svg width="11" height="11" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/>
                    </svg>
                    <span x-text="(tuningEffective[key] || {}).default"></span>
                  </span>
            </div>
            <span class="fs-2xs text-[var(--text-faint)] ms-auto"
                  x-text="tuningEffectiveLabel(key)"></span>
          </div>
        </div>
      </template>
    </div>
  </details>

  <!-- Action row 2 (Save): separated by HR — same shape as
       Asset Inventory's Save row. Save button gets the amber
       ring when dirty + an inline "Unsaved" pulse-dot chip. -->
  <div class="mt-3 pt-3 border-t border-[var(--border)] flex items-center gap-2 flex-wrap">
    <button type="button" x-show="isAdmin()" @click="savePublicIpSection()"
            class="btn btn-primary fs-sm"
            :class="publicIpSectionDirty() ? 'ring-2 ring-[var(--warning)]' : ''"
            :disabled="publicIpSaving || !publicIpSectionDirty()">
      <span x-show="!publicIpSaving" x-text="t('actions.save')"></span>
      <span x-show="publicIpSaving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('admin_public_ip.saving') || 'Saving…'"></span></span>
    </button>
    <span x-show="publicIpSectionDirty()"
          class="fs-xs text-[var(--warning)] flex items-center gap-1.5"
          :title="t('common.unsaved_title')">
            <span class="w-1.5 h-1.5 rounded-full bg-[var(--warning)] animate-pulse"></span>
            <span class="unsaved-flash" x-text="t('hosts_actions.unsaved_label')"></span>
          </span>
  </div>

  <!-- Recent samples (database) — admin-only history of recorded public-IP
       CHANGES (public_ip_history). Lazy-loaded on first expand; the refresh
       button reloads the table in place. Mirrors the Weather Recent-samples
       panel (same details + chevron + database icon + refresh shape). -->
  <details class="mt-3 bg-[var(--surface-2)] border border-[var(--border)] rounded-md p-3"
           @toggle="if ($event.target.open) { loadPublicIpHistory(); }">
    <summary class="cursor-pointer fs-sm font-medium select-none flex items-center gap-2">
      <svg width="12" height="12" class="transition-transform" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
      </svg>
      <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-database"/>
      </svg>
      <span x-text="t('admin_public_ip.history_label') || 'Recent IP changes'"></span>
      <span class="fs-2xs text-[var(--text-faint)]"
            x-show="publicIpHistory && publicIpHistory.length"
            x-text="'(' + publicIpHistory.length + ')'"></span>
      <!-- Reload via the shared og-reload-button component. A <span>
           (NOT a div — <summary> only allows phrasing content, a div is
           invalid here) carries ms-auto to right-float as a flex item +
           @click.stop to catch the button's bubbling click before the
           <summary> toggles the <details>. -->
      <span class="ms-auto" @click.stop
            x-data="{ rbKey: 'public_ip_history', rbOnClick: () => _runWithBusy('public_ip_history', () => loadPublicIpHistory()) }">
        <!-- INCLUDE: _components/og-reload-button.html -->
      </span>
    </summary>
    <div class="mt-3">
      <div x-show="publicIpHistoryLoading" class="fs-xs text-[var(--text-faint)] flex items-center gap-1.5">
        <span class="spin"></span>
        <span x-text="t('actions.loading')"></span>
      </div>
      <div x-show="!publicIpHistoryLoading && (!publicIpHistory || !publicIpHistory.length)"
           class="fs-xs text-[var(--text-faint)] italic"
           x-text="t('admin_public_ip.history_empty') || 'No public-IP changes recorded yet.'"></div>
      <table x-show="!publicIpHistoryLoading && publicIpHistory && publicIpHistory.length"
             class="w-full fs-xs">
        <thead>
        <tr class="text-[var(--text-faint)] text-start">
          <th class="text-start py-1 pe-2" x-text="t('admin_public_ip.history_col_ts') || 'When'"></th>
          <th class="text-start py-1 pe-2" x-text="t('admin_public_ip.history_col_ip') || 'IP'"></th>
          <th class="text-start py-1 pe-2" x-text="t('admin_public_ip.history_col_isp') || 'ISP'"></th>
          <th class="text-start py-1" x-text="t('admin_public_ip.history_col_loc') || 'Location'"></th>
        </tr>
        </thead>
        <tbody>
        <template x-for="row in publicIpHistory" :key="row.ts + '-' + (row.ip || '')">
          <tr class="border-t border-[var(--border)]">
            <td class="py-1 pe-2 mono" x-text="fmtDate(row.ts)"></td>
            <td class="py-1 pe-2 mono" x-text="row.ip || '—'"></td>
            <td class="py-1 pe-2" x-text="row.isp || '—'"></td>
            <td class="py-1" x-text="[row.city, row.country].filter(Boolean).join(', ') || '—'"></td>
          </tr>
        </template>
        </tbody>
      </table>
    </div>
  </details>
</section>
