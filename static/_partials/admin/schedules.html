<!--suppress HtmlUnknownAttribute, HtmlFormInputWithoutLabel -->
<div x-show="adminTab==='schedules'" class="space-y-4">
  <!-- Timezone setting — lives here rather than Settings because
       the Scheduler UI itself is in Admin, and it makes sense
       for the TZ knob to sit next to the schedules it governs.
       Blank = container-local (legacy); any IANA name routes
       cadence anchors through zoneinfo instead. -->
  <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
    <div class="flex items-center gap-2 mb-2">
      <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-calendar"/>
      </svg>
      <h3 class="font-semibold fs-md" x-text="t('scheduler_settings.title')"></h3>
    </div>
    <p class="fs-xs text-[var(--text-faint)] mb-3" x-text="t('scheduler_settings.intro')"></p>
    <div class="flex flex-col gap-1">
      <label class="fs-xs text-[var(--text-faint)]" x-text="t('scheduler_settings.tz_label')"></label>
      <input type="text" x-model="settings.scheduler_timezone"
             :disabled="!isAdmin()"
             list="tz-common-admin"
             :placeholder="t('scheduler_settings.tz_placeholder')"
             class="w-64 mono fs-sm">
      <datalist id="tz-common-admin">
        <option value="Africa/Cairo">Africa/Cairo</option>
        <option value="America/Los_Angeles">America/Los_Angeles</option>
        <option value="America/New_York">America/New_York</option>
        <option value="America/Chicago">America/Chicago</option>
        <option value="Europe/London">Europe/London</option>
        <option value="Europe/Berlin">Europe/Berlin</option>
        <option value="Europe/Istanbul">Europe/Istanbul</option>
        <option value="Asia/Dubai">Asia/Dubai</option>
        <option value="Asia/Kolkata">Asia/Kolkata</option>
        <option value="Asia/Singapore">Asia/Singapore</option>
        <option value="Asia/Tokyo">Asia/Tokyo</option>
        <option value="Australia/Sydney">Australia/Sydney</option>
        <option value="UTC" x-text="t('scheduler_settings.tz_utc_label')">UTC</option>
      </datalist>
      <span class="fs-2xs text-[var(--text-faint)]">
        <span x-text="t('scheduler_settings.tz_hint_prefix')"></span>
        <a href="https://en.wikipedia.org/wiki/List_of_tz_database_time_zones" target="_blank" rel="noopener" class="text-[var(--primary)] hover:underline"
           x-text="t('scheduler_settings.tz_hint_link')"></a><span x-text="t('scheduler_settings.tz_hint_suffix')"></span>
      </span>
    </div>
    <div class="mt-3 pt-3 border-t border-[var(--border)] flex items-center gap-3 flex-wrap">
      <button type="button" x-show="isAdmin()" @click="saveSchedulerSettings()"
              :disabled="schedulerSaving || !schedulerSettingsDirty()"
              class="btn btn-primary fs-sm"
              :class="schedulerSettingsDirty() ? 'ring-2 ring-[var(--warning)]' : ''">
        <span x-show="!schedulerSaving" x-text="t('actions.save')"></span>
        <span x-show="schedulerSaving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving')"></span></span>
      </button>
      <span x-show="isAdmin() && schedulerSettingsDirty() && !schedulerSaving"
            class="fs-2xs text-[var(--warning)] flex items-center gap-1">
              <span class="dot dot-warning dot-pulse" aria-hidden="true"></span>
              <span class="unsaved-flash" x-text="t('common.unsaved')"></span>
            </span>
    </div>
    <!-- Backend's _scheduler_tz validates the IANA name on every
         anchor calculation and silently falls back to container-
         local time when ZoneInfo rejects the value. Surface that
         state so the operator can spot the typo without grepping
         Admin → Logs. -->
    <div x-show="me && me.client_config && me.client_config.scheduler_tz && me.client_config.scheduler_tz.fallback"
         class="mt-3 fs-xs rounded-md px-3 py-2 bg-[var(--pill-error-bg)] text-[var(--pill-error-fg)] border border-[var(--pill-error-br)]"
         x-text="t('scheduler_settings.tz_fallback_warning', { tz: (me && me.client_config && me.client_config.scheduler_tz && me.client_config.scheduler_tz.configured) || '' })"></div>
  </section>

  <!-- Create schedule card -->
  <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
    <div class="flex items-center gap-2 mb-2">
      <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-calendar"/>
      </svg>
      <h3 class="font-semibold fs-md" x-text="t('admin.schedules.create_title')"></h3>
    </div>
    <p class="fs-xs text-[var(--text-faint)] mb-3" x-text="t('admin.schedules.create_hint')"></p>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
      <input x-model="newSchedule.name" type="text"
             :placeholder="t('admin.schedules.name_placeholder')" class="w-full">
      <select x-model="newSchedule.kind" class="w-full">
        <template x-for="k in sortedScheduleKinds()" :key="k">
          <option :value="k" x-text="t('admin.schedules.kinds.' + k) || k"></option>
        </template>
      </select>
      <!-- Cadence mode — picks which of the rows below are active.
           'interval' uses interval_seconds; the other three use
           run_at_hhmm plus an optional day filter. -->
      <div class="flex flex-col gap-1">
        <label class="fs-xs text-[var(--text-faint)]"
               x-text="t('admin.schedules.cadence_label')"></label>
        <select x-model="newSchedule.cadence_mode" class="w-full">
          <template x-for="m in ['interval','daily','weekly','monthly']" :key="m">
            <option :value="m" x-text="t('admin.schedules.cadence.' + m)"></option>
          </template>
        </select>
      </div>
      <label class="inline-flex items-center gap-2 fs-sm text-[var(--text-dim)]">
        <input type="checkbox" x-model="newSchedule.enabled">
        <span x-text="t('admin.schedules.enabled')"></span>
      </label>
    </div>
    <!-- Mode-specific fields. Only the active mode's field is rendered
         so the form shrinks to the minimum the operator needs. -->
    <div class="mt-2 grid grid-cols-1 md:grid-cols-2 gap-2">
      <template x-if="newSchedule.cadence_mode === 'interval'">
        <div class="flex flex-col gap-1">
          <input x-model.number="newSchedule.interval_seconds" type="number"
                 :min="scheduleMinInterval" step="60"
                 :placeholder="t('admin.schedules.interval_placeholder')" class="w-full">
          <span class="fs-2xs text-[var(--text-faint)]"
                x-text="t('admin.schedules.min_interval_hint', { min: scheduleMinInterval })"></span>
        </div>
      </template>
      <template x-if="newSchedule.cadence_mode !== 'interval'">
        <input x-model="newSchedule.run_at_hhmm" type="time"
               class="w-full"
               :placeholder="t('admin.schedules.run_at_placeholder')">
      </template>
      <template x-if="newSchedule.cadence_mode === 'monthly'">
        <input x-model.number="newSchedule.day_of_month" type="number"
               min="1" max="31" step="1"
               :placeholder="t('admin.schedules.dom_placeholder')" class="w-full">
      </template>
    </div>
    <!-- Weekday picker — visible only in weekly mode. Checkboxes
         rather than a multi-select so it's friendly on mobile. -->
    <div x-show="newSchedule.cadence_mode === 'weekly'" class="mt-2">
      <label class="fs-xs text-[var(--text-faint)] block mb-1"
             x-text="t('admin.schedules.dow_label')"></label>
      <div class="flex flex-wrap gap-1.5">
        <template x-for="d in weekdayOrder" :key="'new-'+d">
          <button type="button"
                  @click="toggleWeekday(newSchedule, d)"
                  class="btn fs-xs"
                  :class="(newSchedule.days_of_week || []).includes(d) ? 'btn-primary' : 'btn-soft'"
                  x-text="t('admin.schedules.weekdays.' + d)"></button>
        </template>
      </div>
    </div>
    <div class="mt-2">
      <label class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('admin.schedules.params_label')"></label>
      <textarea x-model="newSchedule.params_text" rows="3"
                class="w-full mono fs-xs"
                :placeholder="t('admin.schedules.params_placeholder')"></textarea>
    </div>
    <div class="mt-3 pt-3 border-t border-[var(--border)] flex items-center gap-2">
      <button type="button" @click="createSchedule()" :disabled="scheduleBusy"
              class="btn btn-primary fs-sm"
              :class="scheduleBusy && 'opacity-60'"
              x-text="scheduleBusy ? t('loading.creating') : t('admin.schedules.create_button')"></button>
    </div>
  </section>

  <!-- Scheduled table -->
  <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md overflow-hidden">
    <div class="p-4 border-b border-[var(--border)] flex justify-between items-center">
      <div class="flex items-center gap-2">
        <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-calendar"/>
        </svg>
        <h3 class="font-semibold fs-md">
          <span x-text="t('admin.schedules.scheduled_title')"></span>
          <span class="text-[var(--text-faint)] font-normal" x-text="'(' + schedules.length + ')'"></span>
        </h3>
      </div>
      <!-- Reload via the shared og-reload-button component — single source
           of truth for text / icon / spinner / busy wiring. schedules is
           pre-declared in app-admin.js _loadBusy. -->
      <div x-data="{ rbKey: 'schedules', rbOnClick: () => _runWithBusy('schedules', () => loadSchedules()) }">
        <!-- INCLUDE: _components/og-reload-button.html -->
      </div>
    </div>
    <!-- Loading indicator — same pattern as Users / Backups /
         Logs / Snapshots so every admin table communicates
         "still fetching" instead of flashing an empty body. -->
    <div x-show="!schedulesLoaded" class="loading-state">
      <span class="spin-lg" aria-hidden="true"></span>
      <span x-text="t('loading.section')"></span>
    </div>
    <div class="overflow-x-auto scrollbar" x-show="schedulesLoaded">
      <table class="w-full fs-sm">
        <thead class="bg-[var(--surface-2)] fs-2xs uppercase tracking-wider text-[var(--text-faint)]">
        <tr>
          <th class="text-start px-4 py-2" :aria-sort="_sortAria('name', schedulesSort.col, schedulesSort.dir)">
            <button type="button" @click="_sortToggle(schedulesSort, 'name')" class="uppercase tracking-wider hover:text-[var(--text)]">
              <span x-text="t('columns.name')"></span><span x-text="_sortIndicator('name', schedulesSort.col, schedulesSort.dir)"></span>
            </button>
          </th>
          <th class="text-start px-4 py-2" :aria-sort="_sortAria('kind', schedulesSort.col, schedulesSort.dir)">
            <button type="button" @click="_sortToggle(schedulesSort, 'kind')" class="uppercase tracking-wider hover:text-[var(--text)]">
              <span x-text="t('admin.schedules.cols.kind')"></span><span x-text="_sortIndicator('kind', schedulesSort.col, schedulesSort.dir)"></span>
            </button>
          </th>
          <th class="text-start px-4 py-2" x-text="t('admin.schedules.cols.interval')"></th>
          <th class="text-start px-4 py-2" :aria-sort="_sortAria('enabled', schedulesSort.col, schedulesSort.dir)">
            <button type="button" @click="_sortToggle(schedulesSort, 'enabled')" class="uppercase tracking-wider hover:text-[var(--text)]">
              <span x-text="t('admin.schedules.cols.enabled')"></span><span x-text="_sortIndicator('enabled', schedulesSort.col, schedulesSort.dir)"></span>
            </button>
          </th>
          <th class="text-start px-4 py-2" :aria-sort="_sortAria('last_run_at', schedulesSort.col, schedulesSort.dir)">
            <button type="button" @click="_sortToggle(schedulesSort, 'last_run_at')" class="uppercase tracking-wider hover:text-[var(--text)]">
              <span x-text="t('admin.schedules.cols.last_execution')"></span><span x-text="_sortIndicator('last_run_at', schedulesSort.col, schedulesSort.dir)"></span>
            </button>
          </th>
          <th class="text-start px-4 py-2" :aria-sort="_sortAria('last_duration', schedulesSort.col, schedulesSort.dir)">
            <button type="button" @click="_sortToggle(schedulesSort, 'last_duration')" class="uppercase tracking-wider hover:text-[var(--text)]">
              <span x-text="t('admin.schedules.cols.last_duration')"></span><span x-text="_sortIndicator('last_duration', schedulesSort.col, schedulesSort.dir)"></span>
            </button>
          </th>
          <th class="text-start px-4 py-2" :aria-sort="_sortAria('last_status', schedulesSort.col, schedulesSort.dir)">
            <button type="button" @click="_sortToggle(schedulesSort, 'last_status')" class="uppercase tracking-wider hover:text-[var(--text)]">
              <span x-text="t('admin.schedules.cols.last_status')"></span><span x-text="_sortIndicator('last_status', schedulesSort.col, schedulesSort.dir)"></span>
            </button>
          </th>
          <th class="text-start px-4 py-2" :aria-sort="_sortAria('next_run_at', schedulesSort.col, schedulesSort.dir)">
            <button type="button" @click="_sortToggle(schedulesSort, 'next_run_at')" class="uppercase tracking-wider hover:text-[var(--text)]">
              <span x-text="t('admin.schedules.cols.next_execution')"></span><span x-text="_sortIndicator('next_run_at', schedulesSort.col, schedulesSort.dir)"></span>
            </button>
          </th>
          <th class="text-end px-4 py-2" x-text="t('columns.actions')"></th>
        </tr>
        </thead>
        <tbody>
        <template x-for="s in sortedSchedules()" :key="s.id">
          <tr class="border-t border-[var(--border)]">
            <td class="px-4 py-2 font-medium" x-text="s.name"></td>
            <td class="px-4 py-2 mono fs-xs text-[var(--text-dim)]"
                x-text="t('admin.schedules.kinds.' + s.kind) || s.kind"></td>
            <td class="px-4 py-2 mono fs-xs text-[var(--text-dim)]"
                x-text="cadenceLabel(s)"></td>
            <td class="px-4 py-2">
              <button type="button" @click="toggleScheduleEnabled(s)"
                      class="btn btn-soft fs-xs"
                      :title="s.enabled ? t('admin.schedules.disable_title') : t('admin.schedules.enable_title')"
                      x-text="s.enabled ? t('admin.schedules.on') : t('admin.schedules.off')"></button>
            </td>
            <td class="px-4 py-2 mono fs-xs text-[var(--text-dim)]"
                x-text="s.last_run_at ? humanRelTime(s.last_run_at) : '—'"
                :title="s.last_run_at ? fmtDate(s.last_run_at) : ''"></td>
            <td class="px-4 py-2 mono fs-xs text-[var(--text-dim)]"
                x-text="s.last_duration != null ? fmtDuration(s.last_duration) : '—'"></td>
            <td class="px-4 py-2">
                      <span x-show="s.last_status"
                            :class="scheduleStatusClass(s.last_status)"
                            x-text="s.last_status || '—'"></span>
              <span x-show="!s.last_status" class="text-[var(--text-faint)] fs-xs">—</span>
            </td>
            <td class="px-4 py-2 mono fs-xs text-[var(--text-dim)]"
                x-text="s.enabled ? humanNextRun(s.next_run_at) : t('admin.schedules.paused')"
                :title="s.enabled ? fmtDate(s.next_run_at) : ''"></td>
            <td class="px-4 py-2 text-end">
              <!-- Action-button row — same pattern as Admin →
                   Users + Backup + Config Backup
                   (`.user-action-btn` 26×26 icon-only buttons
                   + `.user-action-sep` divider before the
                   destructive action). Operator-flagged for
                   cross-tab unification. -->
              <div class="inline-flex items-center gap-0.5 justify-end user-actions">
                <button type="button"
                        @click="runSchedule(s)"
                        class="user-action-btn"
                        :title="t('admin.schedules.run_now_title')"
                        :aria-label="t('admin.schedules.run_now')">
                  <svg width="14" height="14" aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-play"/>
                  </svg>
                </button>
                <button type="button"
                        @click="editSchedule(s)"
                        class="user-action-btn"
                        :title="t('admin.schedules.edit_title')"
                        :aria-label="t('actions.edit')">
                  <svg width="14" height="14" aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-edit"/>
                  </svg>
                </button>
                <span class="user-action-sep"></span>
                <button type="button"
                        @click="deleteSchedule(s)"
                        class="user-action-btn user-action-btn--danger"
                        :title="t('admin.schedules.delete_title')"
                        :aria-label="t('actions.delete')">
                  <svg width="14" height="14" aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash"/>
                  </svg>
                </button>
              </div>
            </td>
          </tr>
        </template>
        <tr x-show="schedules.length===0">
          <td colspan="9" class="text-center py-8 text-[var(--text-faint)]"
              x-text="t('admin.schedules.empty')"></td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- Queue table -->
  <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md overflow-hidden">
    <div class="p-4 border-b border-[var(--border)] flex justify-between items-center gap-3 flex-wrap">
      <div class="flex items-center gap-2">
        <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-clock"/>
        </svg>
        <h3 class="font-semibold fs-md">
          <span x-text="t('admin.schedules.queue_title')"></span>
          <span class="text-[var(--text-faint)] font-normal" x-text="'(' + scheduleQueueTotal + ')'"></span>
        </h3>
      </div>
      <!-- Server-side search — name / op_type / status. Debounced
           250ms; clearing the field re-fetches the unfiltered
           first page. -->
      <div class="flex items-center gap-2 ms-auto">
        <input type="search"
               x-model="scheduleQueueSearch"
               @input="onScheduleQueueSearchInput()"
               :placeholder="t('admin.schedules.queue_search_placeholder')"
               class="fs-sm py-1 min-w-[220px]">
        <button type="button" x-show="scheduleQueueSearch" @click="clearScheduleQueueSearch()"
                class="btn btn-ghost fs-xs"
                :title="t('hosts_extra.empty.clear_filter')"
                :aria-label="t('hosts_extra.empty.clear_filter') || 'Clear filter'">✕
        </button>
        <!-- Reload via the shared og-reload-button component — single source
             of truth for text / icon / spinner / busy wiring. schedule_queue
             is pre-declared in app-admin.js _loadBusy. -->
        <div x-data="{ rbKey: 'schedule_queue', rbOnClick: () => _runWithBusy('schedule_queue', () => loadScheduleQueue()) }">
          <!-- INCLUDE: _components/og-reload-button.html -->
        </div>
      </div>
    </div>
    <div class="overflow-x-auto scrollbar">
      <table class="w-full fs-sm">
        <thead class="bg-[var(--surface-2)] fs-2xs uppercase tracking-wider text-[var(--text-faint)]">
        <tr>
          <th class="text-start px-4 py-2" x-text="t('admin.schedules.cols.queue_name')"></th>
          <th class="text-start px-4 py-2" x-text="t('admin.schedules.cols.queue_kind')"></th>
          <th class="text-start px-4 py-2" x-text="t('admin.schedules.cols.started')"></th>
          <th class="text-start px-4 py-2" x-text="t('admin.schedules.cols.duration')"></th>
          <th class="text-start px-4 py-2" x-text="t('admin.schedules.cols.status')"></th>
        </tr>
        </thead>
        <tbody>
        <template x-for="q in scheduleQueuePageItems()" :key="q.id">
          <tr class="border-t border-[var(--border)]">
            <td class="px-4 py-2 mono fs-xs" x-text="q.target_name || '—'"></td>
            <td class="px-4 py-2 mono fs-xs text-[var(--text-dim)]"
                x-text="t('admin.schedules.kinds.' + q.op_type) || q.op_type"></td>
            <td class="px-4 py-2 mono fs-xs text-[var(--text-dim)]"
                x-text="humanRelTime(q.ts)" :title="fmtDate(q.ts)"></td>
            <td class="px-4 py-2 mono fs-xs text-[var(--text-dim)]"
                x-text="fmtDuration(q.duration)"></td>
            <td class="px-4 py-2">
              <span :class="scheduleStatusClass(q.status)" x-text="q.status"></span>
            </td>
          </tr>
        </template>
        <tr x-show="scheduleQueue.length===0">
          <td colspan="5" class="text-center py-8 text-[var(--text-faint)]"
              x-text="t('admin.schedules.queue_empty')"></td>
        </tr>
        </tbody>
      </table>
    </div>
    <!-- Pagination bar — server-side. Each page change triggers
         a /api/schedules/queue fetch with page + page_size. Page
         size persists to localStorage via setScheduleQueuePageSize(). -->
    <div x-show="scheduleQueueTotal > 0"
         class="flex items-center justify-between gap-3 flex-wrap p-3 border-t border-[var(--border)] fs-xs">
      <div class="flex items-center gap-2 text-[var(--text-dim)]">
        <span x-text="t('admin.schedules.queue_per_page')"></span>
        <select :value="scheduleQueuePageSize"
                @change="setScheduleQueuePageSize($event.target.value)"
                class="fs-xs py-1">
          <option value="10">10</option>
          <option value="25">25</option>
          <option value="50">50</option>
        </select>
        <span class="text-[var(--text-faint)]"
              x-text="(((scheduleQueuePage - 1) * scheduleQueuePageSize) + 1)
                            + '–'
                            + Math.min(scheduleQueueTotal, scheduleQueuePage * scheduleQueuePageSize)
                            + ' / ' + scheduleQueueTotal"></span>
      </div>
      <div class="flex items-center gap-1.5">
        <button type="button"
                class="btn btn-ghost fs-xs px-2"
                :disabled="scheduleQueuePage <= 1"
                @click="scheduleQueueGoto(1)"
                :title="t('admin.schedules.queue_page_first')">«
        </button>
        <button type="button"
                class="btn btn-ghost fs-xs px-2 flip-rtl"
                :disabled="scheduleQueuePage <= 1"
                @click="scheduleQueueGoto(scheduleQueuePage - 1)"
                :title="t('admin.schedules.queue_page_prev')">‹
        </button>
        <span class="mono fs-xs text-[var(--text-dim)] px-2"
              x-text="t('admin.schedules.queue_page_label', { page: scheduleQueuePage, total: scheduleQueuePages() })"></span>
        <button type="button"
                class="btn btn-ghost fs-xs px-2 flip-rtl"
                :disabled="scheduleQueuePage >= scheduleQueuePages()"
                @click="scheduleQueueGoto(scheduleQueuePage + 1)"
                :title="t('admin.schedules.queue_page_next')">›
        </button>
        <button type="button"
                class="btn btn-ghost fs-xs px-2"
                :disabled="scheduleQueuePage >= scheduleQueuePages()"
                @click="scheduleQueueGoto(scheduleQueuePages())"
                :title="t('admin.schedules.queue_page_last')">»
        </button>
      </div>
    </div>
  </section>

  <!-- Edit modal. role="dialog" + aria-modal="true" + focus-
       trap wired to match every modal in static/index.html
       (canonical pattern). The aria-label is the visible title
       so AT users hear the modal's purpose on focus. -->
  <div x-show="editingSchedule" x-cloak class="fixed inset-0 z-50 fade-in">
    <div class="absolute inset-0 backdrop" @click="cancelEditSchedule()"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <div class="bg-[var(--surface)] border border-[var(--border)] rounded-md w-full max-w-lg slide-in p-5"
           role="dialog" aria-modal="true"
           :aria-label="t('admin.schedules.edit_title_modal')"
           @keydown="editingSchedule && _focusTrapKeydown($event, $el)"
           @click.stop>
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-semibold fs-md" x-text="t('admin.schedules.edit_title_modal')"></h3>
          <button type="button" @click="cancelEditSchedule()" class="btn btn-ghost fs-sm"
                  x-text="t('actions.cancel')"></button>
        </div>
        <template x-if="editingSchedule">
          <div class="space-y-2">
            <input x-model="editingSchedule.name" type="text"
                   :placeholder="t('admin.schedules.name_placeholder')" class="w-full">
            <select x-model="editingSchedule.kind" class="w-full">
              <template x-for="k in scheduleKinds" :key="k">
                <option :value="k" x-text="t('admin.schedules.kinds.' + k) || k"></option>
              </template>
            </select>
            <div class="flex flex-col gap-1">
              <label class="fs-xs text-[var(--text-faint)]"
                     x-text="t('admin.schedules.cadence_label')"></label>
              <select x-model="editingSchedule.cadence_mode" class="w-full">
                <template x-for="m in ['interval','daily','weekly','monthly']" :key="m">
                  <option :value="m" x-text="t('admin.schedules.cadence.' + m)"></option>
                </template>
              </select>
            </div>
            <template x-if="editingSchedule.cadence_mode === 'interval'">
              <input x-model.number="editingSchedule.interval_seconds" type="number"
                     :min="scheduleMinInterval" step="60"
                     :placeholder="t('admin.schedules.interval_placeholder')" class="w-full">
            </template>
            <template x-if="editingSchedule.cadence_mode !== 'interval'">
              <input x-model="editingSchedule.run_at_hhmm" type="time"
                     class="w-full"
                     :placeholder="t('admin.schedules.run_at_placeholder')">
            </template>
            <template x-if="editingSchedule.cadence_mode === 'monthly'">
              <input x-model.number="editingSchedule.day_of_month" type="number"
                     min="1" max="31" step="1"
                     :placeholder="t('admin.schedules.dom_placeholder')" class="w-full">
            </template>
            <div x-show="editingSchedule.cadence_mode === 'weekly'">
              <label class="fs-xs text-[var(--text-faint)] block mb-1"
                     x-text="t('admin.schedules.dow_label')"></label>
              <div class="flex flex-wrap gap-1.5">
                <template x-for="d in weekdayOrder" :key="'edit-'+d">
                  <button type="button"
                          @click="toggleWeekday(editingSchedule, d)"
                          class="btn fs-xs"
                          :class="(editingSchedule.days_of_week || []).includes(d) ? 'btn-primary' : 'btn-soft'"
                          x-text="t('admin.schedules.weekdays.' + d)"></button>
                </template>
              </div>
            </div>
            <label class="inline-flex items-center gap-2 fs-sm text-[var(--text-dim)]">
              <input type="checkbox" x-model="editingSchedule.enabled">
              <span x-text="t('admin.schedules.enabled')"></span>
            </label>
            <div>
              <label class="block fs-xs text-[var(--text-faint)] mb-1"
                     x-text="t('admin.schedules.params_label')"></label>
              <textarea x-model="editingSchedule.params_text" rows="4"
                        class="w-full mono fs-xs"
                        :placeholder="t('admin.schedules.params_placeholder')"></textarea>
            </div>
          </div>
        </template>
        <div class="mt-4 flex justify-end gap-2">
          <button type="button" @click="cancelEditSchedule()" class="btn btn-ghost fs-sm"
                  x-text="t('actions.cancel')"></button>
          <button type="button" @click="saveSchedule()"
                  :disabled="scheduleSaving"
                  class="btn btn-primary fs-sm">
            <span x-show="!scheduleSaving" x-text="t('actions.save')"></span>
            <span x-show="scheduleSaving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving')"></span></span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
