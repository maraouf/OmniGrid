<!--suppress HtmlUnknownAttribute -->
<section x-show="adminTab==='ssh'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
  <!-- Title row + Enabled/Disabled pill — matches Admin →
       Portainer / Notifications for visual consistency across
       master-toggled admin tabs. -->
  <div class="flex items-start justify-between">
    <div>
      <div class="flex items-center gap-2 mb-2">
        <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-terminal"/>
        </svg>
        <h3 class="font-semibold fs-md" x-text="t('admin_ssh.title')"></h3>
      </div>
      <p class="fs-xs text-[var(--text-faint)] mb-3 leading-snug max-w-[720px]"
         x-text="t('admin_ssh.intro')"></p>
    </div>
    <span x-show="!settingsLoaded" class="chip pill-muted inline-flex items-center gap-1.5">
      <span class="spin" aria-hidden="true"></span>
      <span x-text="t('common.loading') || 'Loading…'"></span>
    </span>
    <span x-show="settingsLoaded" class="chip"
          :class="settings.ssh_enabled ? 'pill-ok' : 'pill-muted'"
          x-text="settings.ssh_enabled ? t('admin_integrations.enabled_pill') : t('admin_integrations.disabled_pill')"></span>
  </div>
  <!-- Master switch. When off, every `resolve_ssh_params`
       call short-circuits to disabled=true with a clear error,
       and every host-drawer SSH card reads as "Not configured".
       Stored creds + per-host overrides STAY in the settings
       table so flipping back on resumes service. Saved via the
       SSH Save button below, same as every other field on this
       tab — no auto-save on change. -->
  <label class="flex items-center gap-2 fs-sm cursor-pointer mb-4 select-none">
    <input type="checkbox" x-model="settings.ssh_enabled"
           @change="markSshSettingsDirty()"
           :disabled="isReadonly()">
    <span class="font-medium" x-text="t('admin_integrations.enabled_label')"></span>
    <span class="fs-xs text-[var(--text-faint)]"
          x-text="settings.ssh_enabled ? '' : t('admin_integrations.disabled_hint')"></span>
  </label>
  <div class="grid grid-cols-1 md:grid-cols-[1fr_120px] gap-3 mb-3">
    <div>
      <label class="block fs-xs text-[var(--text-faint)] mb-1"
             for="ssh-user" x-text="t('admin_ssh.user_label')"></label>
      <input x-model="sshSettings.user" id="ssh-user" type="text"
             @input="markSshSettingsDirty()"
             :disabled="isReadonly() || !settings.ssh_enabled"
             class="w-full mono fs-sm py-1.5"
             :placeholder="t('admin_ssh.user_placeholder')">
    </div>
    <div>
      <label class="block fs-xs text-[var(--text-faint)] mb-1"
             for="ssh-port" x-text="t('admin_ssh.port_label')"></label>
      <input x-model.number="sshSettings.port" id="ssh-port" type="number"
             @input="markSshSettingsDirty()"
             :disabled="isReadonly() || !settings.ssh_enabled"
             min="1" max="65535"
             class="w-full mono fs-sm py-1.5">
    </div>
  </div>
  <div class="mb-3">
    <label for="ssh-key" class="block fs-xs text-[var(--text-faint)] mb-1">
      <span id="ssh-key-lbl" x-text="t('admin_ssh.key_label')"></span>
    </label>
    <span x-show="sshSettings.private_key_set" class="block fs-xs text-[var(--success)] mb-1"
          x-text="t('settings.secret_input.saved_hint')"></span>
    <div class="secret-input-row">
            <textarea x-model="sshSettings.private_key" id="ssh-key"
                      @input="markSshSettingsDirty()"
                      :disabled="isReadonly() || !settings.ssh_enabled"
                      rows="6"
                      class="w-full mono fs-xs py-1.5 scrollbar"
                      :placeholder="sshSettings.private_key_set ? t('settings.secret_input.placeholder_keep') : t('admin_ssh.key_placeholder')"></textarea>
      <button type="button"
              x-show="sshSettings.private_key_set && isAdmin()"
              @click="clearSshSecret('private_key')"
              class="btn btn-ghost fs-xs secret-input-clear"
              :title="t('admin_ssh.clear_key_title')"
              x-text="t('admin_ssh.clear_label')"></button>
    </div>
    <p class="fs-2xs text-[var(--text-faint)] mt-1"
       x-text="t('admin_ssh.key_hint')"></p>
  </div>
  <div class="mb-3">
    <label for="ssh-pass" class="block fs-xs text-[var(--text-faint)] mb-1">
      <span id="ssh-pass-lbl" x-text="t('admin_ssh.passphrase_label')"></span>
    </label>
    <span x-show="sshSettings.passphrase_set" class="block fs-xs text-[var(--success)] mb-1"
          x-text="t('settings.secret_input.saved_hint')"></span>
    <div class="secret-input-row">
      <input x-model="sshSettings.passphrase" id="ssh-pass" type="password"
             autocomplete="new-password"
             @input="markSshSettingsDirty()"
             :disabled="isReadonly() || !settings.ssh_enabled"
             class="w-full fs-sm"
             :placeholder="sshSettings.passphrase_set ? t('settings.secret_input.placeholder_keep') : t('admin_ssh.passphrase_placeholder')">
      <button type="button"
              x-show="sshSettings.passphrase_set && isAdmin()"
              @click="clearSshSecret('passphrase')"
              class="btn btn-ghost fs-xs secret-input-clear"
              :title="t('admin_ssh.clear_passphrase_title')"
              x-text="t('admin_ssh.clear_label')"></button>
    </div>
  </div>
  <!-- Password auth (alternative to private key). When both are
       set, the key wins. Useful for hosts that only accept
       password auth — NAS boxes, routers, fresh VM images. -->
  <div class="mb-3">
    <label for="ssh-pw" class="block fs-xs text-[var(--text-faint)] mb-1">
      <span id="ssh-pw-lbl" x-text="t('admin_ssh.password_label')"></span>
    </label>
    <span x-show="sshSettings.password_set" class="block fs-xs text-[var(--success)] mb-1"
          x-text="t('settings.secret_input.saved_hint')"></span>
    <div class="secret-input-row">
      <input x-model="sshSettings.password" id="ssh-pw" type="password"
             autocomplete="new-password"
             @input="markSshSettingsDirty()"
             :disabled="isReadonly() || !settings.ssh_enabled"
             class="w-full fs-sm"
             :placeholder="sshSettings.password_set ? t('settings.secret_input.placeholder_keep') : t('admin_ssh.password_placeholder')">
      <button type="button"
              x-show="sshSettings.password_set && isAdmin()"
              @click="clearSshSecret('password')"
              class="btn btn-ghost fs-xs secret-input-clear"
              :title="t('admin_ssh.clear_password_title')"
              x-text="t('admin_ssh.clear_label')"></button>
    </div>
    <p class="fs-2xs text-[var(--text-faint)] mt-1"
       x-text="t('admin_ssh.password_help')"></p>
  </div>
  <!-- FQDN suffix — appended to bare host IDs during SSH resolve.
       Example: ssh_fqdn_suffix=".example.com", host id="webserver"
       → SSH target becomes "webserver.example.com". Host IDs that
       already contain a dot are used as-is. Per-host ssh.host
       / ssh.fqdn override wins over the suffix rule. -->
  <div class="mb-3">
    <label class="block fs-xs text-[var(--text-faint)] mb-1"
           for="ssh-fqdn" x-text="t('admin_ssh.fqdn_suffix_label')"></label>
    <input x-model="sshSettings.fqdn_suffix" id="ssh-fqdn" type="text"
           @input="markSshSettingsDirty()"
           :disabled="isReadonly() || !settings.ssh_enabled"
           :placeholder="t('admin_ssh.fqdn_suffix_placeholder')"
           class="w-full mono fs-sm py-1.5">
    <p class="fs-2xs text-[var(--text-faint)] mt-1"
       x-text="t('admin_ssh.fqdn_suffix_help')"></p>
  </div>
  <div class="mb-3">
    <label class="block fs-xs text-[var(--text-faint)] mb-1"
           for="ssh-knownhosts" x-text="t('admin_ssh.known_hosts_label')"></label>
    <textarea x-model="sshSettings.known_hosts" id="ssh-knownhosts"
              @input="markSshSettingsDirty()"
              :disabled="isReadonly() || !settings.ssh_enabled"
              rows="3"
              class="w-full mono fs-xs py-1.5 scrollbar"
              :placeholder="t('admin_ssh.known_hosts_placeholder')"></textarea>
    <p class="fs-2xs text-[var(--text-faint)] mt-1"
       x-text="t('admin_ssh.known_hosts_hint')"></p>
  </div>
  <div class="mb-3">
    <label class="block fs-xs text-[var(--text-faint)] mb-1"
           x-text="t('admin_ssh.custom_actions_label')"></label>
    <p class="fs-2xs text-[var(--text-faint)] mb-2"
       x-text="t('admin_ssh.custom_actions_hint')"></p>
    <div class="flex flex-col gap-2">
      <template x-for="(action, idx) in (sshSettings.custom_actions || [])"
                :key="'sa-' + idx">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-2 items-start p-2 rounded border border-[var(--border)]">
          <div class="md:col-span-4">
            <label class="block fs-2xs text-[var(--text-faint)] mb-0.5">
              <span x-text="t('admin_ssh.custom_action_title_label')"></span>
              <input type="text"
                     :value="action.title"
                     @input="action.title = $event.target.value; markSshSettingsDirty()"
                     :disabled="isReadonly() || !settings.ssh_enabled"
                     :placeholder="t('admin_ssh.custom_action_title_placeholder')"
                     class="w-full fs-sm py-1">
            </label>
          </div>
          <div class="md:col-span-7">
            <label class="block fs-2xs text-[var(--text-faint)] mb-0.5">
              <span x-text="t('admin_ssh.custom_action_command_label')"></span>
              <textarea :value="action.command"
                        @input="action.command = $event.target.value; markSshSettingsDirty()"
                        :disabled="isReadonly() || !settings.ssh_enabled"
                        rows="9"
                        class="w-full mono fs-xs py-2 scrollbar"
                        style="min-height: 11rem; resize: vertical;"
                        :placeholder="t('admin_ssh.custom_action_command_placeholder')"></textarea>
            </label>
          </div>
          <div class="md:col-span-1 flex md:flex-col items-center justify-end gap-1">
            <button type="button" class="btn btn-ghost fs-xs px-1.5"
                    x-show="isAdmin()"
                    @click="moveSshCustomAction(idx, -1)"
                    :disabled="idx === 0"
                    :title="t('admin_ssh.custom_action_move_up')">↑
            </button>
            <button type="button" class="btn btn-ghost fs-xs px-1.5"
                    x-show="isAdmin()"
                    @click="moveSshCustomAction(idx, 1)"
                    :disabled="idx === (sshSettings.custom_actions || []).length - 1"
                    :title="t('admin_ssh.custom_action_move_down')">↓
            </button>
            <button type="button"
                    class="btn btn-ghost fs-xs text-[var(--danger)] px-1.5"
                    x-show="isAdmin()"
                    @click="removeSshCustomAction(idx)"
                    :title="t('admin_ssh.custom_action_remove')"
                    :aria-label="t('admin_ssh.custom_action_remove') || 'Remove custom action'">✕
            </button>
          </div>
        </div>
      </template>
      <div x-show="(sshSettings.custom_actions || []).length === 0"
           class="fs-xs text-[var(--text-faint)] italic"
           x-text="t('admin_ssh.custom_actions_empty')"></div>
    </div>
    <button type="button"
            x-show="isAdmin()"
            @click="addSshCustomAction()"
            class="btn btn-soft fs-xs mt-2"
            x-text="t('admin_ssh.custom_action_add')"></button>
  </div>
  <div class="mb-3">
    <label class="block fs-xs text-[var(--text-faint)] mb-1"
           for="ssh-destructive" x-text="t('admin_ssh.destructive_label')"></label>
    <textarea x-model="sshSettings.destructive_patterns" id="ssh-destructive"
              @input="markSshSettingsDirty()"
              :disabled="isReadonly() || !settings.ssh_enabled"
              rows="4"
              class="w-full mono fs-xs py-1.5 scrollbar"
              :placeholder="t('admin_ssh.destructive_placeholder')"></textarea>
    <p class="fs-2xs text-[var(--text-faint)] mt-1"
       x-text="t('admin_ssh.destructive_hint')"></p>
  </div>
  <!-- Test before Save. Operator workflow: configure
       credentials → verify connectivity against a real host →
       only THEN commit. Putting Save first asked the operator
       to "save first, hope it works second" which inverted the
       dirty-state intent (testing tests the in-form values via
       the keep-current-if-blank contract on credentials). The
       divider is ABOVE the Test block — separates the form
       fields above from the Test+Save group below. -->
  <!-- SSH tunables — canonical header pattern (icon + h3 + intro
       paragraph) matching every other admin tab (Portainer / AI /
       Asset Inventory / Notifications / NE provider). Covers WS
       heartbeat cadence, terminal connect / login timeouts, and
       connection-close wait. All edits commit through the SSH
       section's Save button. Rendered BEFORE the "Test on a host"
       widget so configuration lands above the test action. -->
  <details class="bg-[var(--surface-2)] border border-[var(--border)] rounded-md p-3 mt-4" x-show="isAdmin()">
    <summary class="cursor-pointer fs-sm font-medium select-none flex items-center gap-2">
      <svg width="12" height="12" class="transition-transform" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
      </svg>
      <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sliders"/>
      </svg>
      <span x-text="t('common.tunables')"></span>
    </summary>
    <div class="mt-3">
      <p class="fs-2xs text-[var(--text-faint)] mb-3 leading-snug"
         x-text="t('admin_ssh.tunables_intro')"></p>
      <div class="border-t border-[var(--border)] mb-3" aria-hidden="true"></div>
      <div x-show="!tuningLoaded" class="flex items-center gap-2 fs-xs text-[var(--text-faint)] py-2">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('common.loading')"></span>
      </div>
      <div x-show="tuningLoaded">
      <label class="block fs-xs font-medium mb-1"
             for="ssh-tun-hb" x-text="t('admin.config.fields.tuning_ssh_ws_heartbeat_seconds.label')"></label>
      <p class="fs-xs text-[var(--text-faint)] mb-2 leading-snug"
         x-text="t('admin.config.fields.tuning_ssh_ws_heartbeat_seconds.help')"></p>
      <div class="flex flex-wrap items-center gap-2">
        <input type="number"
               x-model="tuningForm['tuning_ssh_ws_heartbeat_seconds']" id="ssh-tun-hb"
               @input="markSshSettingsDirty()"
               :placeholder="tuningPlaceholder('tuning_ssh_ws_heartbeat_seconds')"
               :min="(tuningEffective['tuning_ssh_ws_heartbeat_seconds'] || {}).min"
               :max="(tuningEffective['tuning_ssh_ws_heartbeat_seconds'] || {}).max"
               :disabled="!isAdmin() || tuningSaving"
               class="w-44 mono fs-sm py-1">
        <div class="bounds-chips" role="group"
             :aria-label="t('admin.config.bounds.group_label')">
              <span class="bounds-chip bounds-chip--min"
                    :title="t('admin.config.bounds.min_title')">
                <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
                <span x-text="(tuningEffective['tuning_ssh_ws_heartbeat_seconds'] || {}).min"></span>
              </span>
          <span class="bounds-chip bounds-chip--max"
                :title="t('admin.config.bounds.max_title')">
                <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/></svg>
                <span x-text="(tuningEffective['tuning_ssh_ws_heartbeat_seconds'] || {}).max"></span>
              </span>
          <span class="bounds-chip bounds-chip--default"
                :title="t('admin.config.bounds.default_title')">
                <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/></svg>
                <span x-text="(tuningEffective['tuning_ssh_ws_heartbeat_seconds'] || {}).default"></span>
              </span>
        </div>
        <span class="fs-xs text-[var(--text-dim)] ms-auto"
              x-text="tuningEffectiveLabel('tuning_ssh_ws_heartbeat_seconds')"></span>
      </div>
    </div>

    <!-- Terminal entrypoint wall-clocks. Two
         knobs mirror the WS heartbeat block above: connect timeout
         and login timeout. Default 20s each; operators with WAN-
         routed targets raise, strict-watchdog setups lower. -->
    <div class="mt-4" x-show="tuningLoaded">
      <label class="block fs-xs font-medium mb-1"
             for="ssh-tun-conn" x-text="t('admin.config.fields.tuning_ssh_terminal_connect_timeout_seconds.label')"></label>
      <p class="fs-xs text-[var(--text-faint)] mb-2 leading-snug"
         x-text="t('admin.config.fields.tuning_ssh_terminal_connect_timeout_seconds.help')"></p>
      <div class="flex flex-wrap items-center gap-2">
        <input type="number"
               x-model="tuningForm['tuning_ssh_terminal_connect_timeout_seconds']" id="ssh-tun-conn"
               @input="markSshSettingsDirty()"
               :placeholder="tuningPlaceholder('tuning_ssh_terminal_connect_timeout_seconds')"
               :min="(tuningEffective['tuning_ssh_terminal_connect_timeout_seconds'] || {}).min"
               :max="(tuningEffective['tuning_ssh_terminal_connect_timeout_seconds'] || {}).max"
               :disabled="!isAdmin() || tuningSaving"
               class="w-44 mono fs-sm py-1">
        <div class="bounds-chips" role="group"
             :aria-label="t('admin.config.bounds.group_label')">
              <span class="bounds-chip bounds-chip--min"
                    :title="t('admin.config.bounds.min_title')">
                <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
                <span x-text="(tuningEffective['tuning_ssh_terminal_connect_timeout_seconds'] || {}).min"></span>
              </span>
          <span class="bounds-chip bounds-chip--max"
                :title="t('admin.config.bounds.max_title')">
                <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/></svg>
                <span x-text="(tuningEffective['tuning_ssh_terminal_connect_timeout_seconds'] || {}).max"></span>
              </span>
          <span class="bounds-chip bounds-chip--default"
                :title="t('admin.config.bounds.default_title')">
                <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/></svg>
                <span x-text="(tuningEffective['tuning_ssh_terminal_connect_timeout_seconds'] || {}).default"></span>
              </span>
        </div>
        <span class="fs-xs text-[var(--text-dim)] ms-auto"
              x-text="tuningEffectiveLabel('tuning_ssh_terminal_connect_timeout_seconds')"></span>
      </div>
    </div>

    <div class="mt-4" x-show="tuningLoaded">
      <label class="block fs-xs font-medium mb-1"
             for="ssh-tun-login" x-text="t('admin.config.fields.tuning_ssh_terminal_login_timeout_seconds.label')"></label>
      <p class="fs-xs text-[var(--text-faint)] mb-2 leading-snug"
         x-text="t('admin.config.fields.tuning_ssh_terminal_login_timeout_seconds.help')"></p>
      <div class="flex flex-wrap items-center gap-2">
        <input type="number"
               x-model="tuningForm['tuning_ssh_terminal_login_timeout_seconds']" id="ssh-tun-login"
               @input="markSshSettingsDirty()"
               :placeholder="tuningPlaceholder('tuning_ssh_terminal_login_timeout_seconds')"
               :min="(tuningEffective['tuning_ssh_terminal_login_timeout_seconds'] || {}).min"
               :max="(tuningEffective['tuning_ssh_terminal_login_timeout_seconds'] || {}).max"
               :disabled="!isAdmin() || tuningSaving"
               class="w-44 mono fs-sm py-1">
        <div class="bounds-chips" role="group"
             :aria-label="t('admin.config.bounds.group_label')">
              <span class="bounds-chip bounds-chip--min"
                    :title="t('admin.config.bounds.min_title')">
                <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
                <span x-text="(tuningEffective['tuning_ssh_terminal_login_timeout_seconds'] || {}).min"></span>
              </span>
          <span class="bounds-chip bounds-chip--max"
                :title="t('admin.config.bounds.max_title')">
                <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/></svg>
                <span x-text="(tuningEffective['tuning_ssh_terminal_login_timeout_seconds'] || {}).max"></span>
              </span>
          <span class="bounds-chip bounds-chip--default"
                :title="t('admin.config.bounds.default_title')">
                <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/></svg>
                <span x-text="(tuningEffective['tuning_ssh_terminal_login_timeout_seconds'] || {}).default"></span>
              </span>
        </div>
        <span class="fs-xs text-[var(--text-dim)] ms-auto"
              x-text="tuningEffectiveLabel('tuning_ssh_terminal_login_timeout_seconds')"></span>
      </div>
    </div>

    <!-- Connection-close wait timeout — wall-clock cap on
         `conn.wait_closed()` after a terminal session ends. Lower
         on flaky networks where the FIN never arrives (close blocks
         forever, audit row stays open); raise if you genuinely care
         about clean teardown. -->
    <div class="mt-4" x-show="tuningLoaded">
      <label class="block fs-xs font-medium mb-1"
             for="ssh-tun-close" x-text="t('admin.config.fields.tuning_ssh_close_timeout_seconds.label')"></label>
      <p class="fs-xs text-[var(--text-faint)] mb-2 leading-snug"
         x-text="t('admin.config.fields.tuning_ssh_close_timeout_seconds.help')"></p>
      <div class="flex flex-wrap items-center gap-2">
        <input type="number"
               x-model="tuningForm['tuning_ssh_close_timeout_seconds']" id="ssh-tun-close"
               @input="markSshSettingsDirty()"
               :placeholder="tuningPlaceholder('tuning_ssh_close_timeout_seconds')"
               :min="(tuningEffective['tuning_ssh_close_timeout_seconds'] || {}).min"
               :max="(tuningEffective['tuning_ssh_close_timeout_seconds'] || {}).max"
               :disabled="!isAdmin() || tuningSaving"
               class="w-44 mono fs-sm py-1">
        <div class="bounds-chips" role="group"
             :aria-label="t('admin.config.bounds.group_label')">
              <span class="bounds-chip bounds-chip--min"
                    :title="t('admin.config.bounds.min_title')">
                <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-down-to-line"/></svg>
                <span x-text="(tuningEffective['tuning_ssh_close_timeout_seconds'] || {}).min"></span>
              </span>
          <span class="bounds-chip bounds-chip--max"
                :title="t('admin.config.bounds.max_title')">
                <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-to-line"/></svg>
                <span x-text="(tuningEffective['tuning_ssh_close_timeout_seconds'] || {}).max"></span>
              </span>
          <span class="bounds-chip bounds-chip--default"
                :title="t('admin.config.bounds.default_title')">
                <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-target"/></svg>
                <span x-text="(tuningEffective['tuning_ssh_close_timeout_seconds'] || {}).default"></span>
              </span>
        </div>
        <span class="fs-xs text-[var(--text-dim)] ms-auto"
              x-text="tuningEffectiveLabel('tuning_ssh_close_timeout_seconds')"></span>
      </div>
      </div>
    </div>
  </details>

  <!-- Test on a host — admin-only smoke probe that resolves the
       effective ssh_user / port / key path for one curated host
       and runs `whoami` over a one-shot connection. Live s BELOW
       the tunable block so all configuration is set first, then
       the operator can verify against any curated host. -->
  <div class="mt-5 pt-4 border-t border-dashed border-[var(--border)]">
    <h4 class="font-semibold fs-sm mb-1" x-text="t('admin_ssh.test_widget_title')"></h4>
    <p class="fs-xs text-[var(--text-faint)] mb-2" x-text="t('admin_ssh.test_widget_hint')"></p>
    <!-- Test button FIRST, then a column with the host label ON TOP of
         the dropdown — same shape as the HTTP/TLS/DNS provider test row
         (label-above-control, not inline beside it). -->
    <div class="flex items-end gap-2 flex-wrap">
      <button type="button" x-show="isAdmin()" @click="runSshAdminTest()"
              :disabled="sshTestOnHost.pending || !sshTestOnHost.host_id"
              class="btn btn-soft fs-sm inline-flex items-center gap-1.5">
        <svg width="13" height="13" :class="sshTestOnHost.pending ? 'spin-md' : ''" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-play"/>
        </svg>
        <span x-show="!sshTestOnHost.pending" x-text="t('admin_ssh.test_button')"></span>
        <span x-show="sshTestOnHost.pending" x-text="t('admin_ssh.testing')"></span>
      </button>
      <div class="flex-1 min-w-[240px]">
        <label class="block fs-xs text-[var(--text-faint)] mb-1" for="ssh-testhost" x-text="t('admin_ssh.test_host_label')"></label>
        <select x-model="sshTestOnHost.host_id" id="ssh-testhost"
                class="fs-sm py-1 w-full">
          <option value="">—</option>
          <template x-for="h in hostsConfig" :key="h.id">
            <option :value="h.id" x-text="hostDisplayName(h) + ' (' + h.id + ')'"></option>
          </template>
        </select>
      </div>
    </div>
    <div x-show="sshTestOnHost.result || sshTestOnHost.pending"
         class="mt-2 fs-sm rounded-md px-3 py-2"
         :class="sshTestOnHost.pending
                       ? 'bg-[var(--pill-warning-bg)] text-[var(--pill-warning-fg)] border border-[var(--pill-warning-br)]'
                       : (sshTestOnHost.result && sshTestOnHost.result.ok
                         ? 'bg-[var(--pill-ok-bg)] text-[var(--pill-ok-fg)] border border-[var(--pill-ok-br)]'
                         : 'bg-[var(--pill-error-bg)] text-[var(--pill-error-fg)] border border-[var(--pill-error-br)]')"
         x-text="sshTestOnHost.pending
                       ? t('admin_ssh.testing')
                       : ((sshTestOnHost.result && sshTestOnHost.result.ok ? t('admin_ssh.test_ok_prefix') : t('admin_ssh.test_fail_prefix')) + (sshTestOnHost.result && (sshTestOnHost.result.error || (sshTestOnHost.result.resolved && (sshTestOnHost.result.resolved.user + '@' + sshTestOnHost.result.resolved.host + ':' + sshTestOnHost.result.resolved.port))) || ''))"></div>
  </div>

  <div class="mt-5 flex items-center gap-3 flex-wrap pt-3 border-t border-[var(--border)]">
    <button type="button" x-show="isAdmin()" @click="saveSshSettings()"
            :disabled="sshSettingsBusy"
            :class="sshSettingsDirty ? 'ring-2 ring-[var(--warning)]' : ''"
            class="btn btn-primary fs-sm">
      <span x-show="!sshSettingsBusy" x-text="t('actions.save')"></span>
      <span x-show="sshSettingsBusy" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving')"></span></span>
    </button>
    <span x-show="sshSettingsDirty"
          class="fs-xs text-[var(--warning)] flex items-center gap-1.5">
            <span class="w-1.5 h-1.5 rounded-full bg-[var(--warning)] animate-pulse"></span>
            <span class="unsaved-flash" x-text="t('hosts_actions.unsaved_label')"></span>
          </span>
  </div>
</section>
