      <div x-show="adminTab==='tokens'" class="space-y-4">
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
          <div class="flex items-center gap-2 mb-2">
            <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-key"/></svg>
            <h3 class="font-semibold fs-md" x-text="t('admin.tokens.create_title')"></h3>
          </div>
          <p class="fs-xs text-[var(--text-faint)] mb-3" x-text="t('admin.tokens.create_hint')"></p>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
            <input x-model="newToken.name" type="text" :placeholder="t('admin.tokens.name_placeholder')" class="w-full md:col-span-2">
            <select x-model="newToken.role" class="w-full">
              <option value="readonly" x-text="t('admin.users.role_readonly')"></option>
              <option value="admin" x-text="t('admin.users.role_admin')"></option>
            </select>
          </div>
          <div class="mt-3 pt-3 border-t border-[var(--border)] flex items-center gap-3 flex-wrap">
            <button @click="createToken()" class="btn btn-primary fs-sm" x-text="t('admin.tokens.create_button')"></button>
          </div>
        </section>

        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md overflow-hidden">
          <div class="p-4 border-b border-[var(--border)] flex justify-between items-center">
            <div class="flex items-center gap-2">
              <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-key"/></svg>
              <h3 class="font-semibold fs-md"><span x-text="t('admin.tokens.list_title')"></span> <span class="text-[var(--text-faint)] font-normal" x-text="'(' + tokens.length + ')'"></span></h3>
            </div>
            <button @click="loadTokens()" class="btn btn-ghost fs-xs" x-text="t('actions.reload')"></button>
          </div>
          <div x-show="!tokensLoaded" class="loading-state">
            <span class="spin-lg" aria-hidden="true"></span>
            <span x-text="t('loading.section')"></span>
          </div>
          <div class="overflow-x-auto scrollbar" x-show="tokensLoaded">
            <table class="w-full fs-sm">
              <thead class="bg-[var(--surface-2)] fs-2xs uppercase tracking-wider text-[var(--text-faint)]">
                <tr>
                  <th class="text-start px-4 py-2" x-text="t('columns.name')"></th>
                  <th class="text-start px-4 py-2" x-text="t('columns.role')"></th>
                  <th class="text-start px-4 py-2" x-text="t('columns.created_by')"></th>
                  <th class="text-start px-4 py-2" x-text="t('columns.last_used')"></th>
                  <th class="text-end px-4 py-2" x-text="t('columns.action')"></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="tk in tokens" :key="tk.id">
                  <tr class="border-t border-[var(--border)]">
                    <td class="px-4 py-2 font-medium" x-text="tk.name"></td>
                    <td class="px-4 py-2">
                      <span class="pill" :class="tk.role==='admin' ? 'pill-primary' : 'pill-muted'" x-text="tk.role"></span>
                    </td>
                    <td class="px-4 py-2 fs-xs text-[var(--text-dim)]" x-text="tk.created_by_username || '—'"></td>
                    <td class="px-4 py-2 mono fs-xs text-[var(--text-dim)]"
                        x-text="tk.last_used_at ? fmtDate(tk.last_used_at) : t('states.never')"></td>
                    <td class="px-4 py-2 text-end">
                      <!-- Action-button row — same pattern as Admin →
                           Users / Backup / Config Backup / Schedules.
                           Single destructive action; uses the
                           danger-tinted icon-button slot. -->
                      <div class="inline-flex items-center gap-0.5 justify-end user-actions">
                        <button type="button"
                                @click="deleteToken(tk)"
                                class="user-action-btn user-action-btn--danger"
                                :title="t('admin.tokens.revoke')"
                                :aria-label="t('admin.tokens.revoke')">
                          <svg width="14" height="14" aria-hidden="true">
                            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash"/>
                          </svg>
                        </button>
                      </div>
                    </td>
                  </tr>
                </template>
                <tr x-show="tokens.length===0">
                  <td colspan="5" class="text-center py-8 text-[var(--text-faint)]" x-text="t('empty.no_tokens')"></td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>

      <!-- Intro paragraph for the user-management tabs (Users /
           Sessions / Tokens) — moved here from above the boxes so the
           start of every Admin tab page is visually consistent
           (heading area first, copy at the bottom). Renders only on
           those three tabs; other tabs carry their own per-section
           subtitle. -->
      <div x-show="['users','sessions','tokens'].includes(adminTab)">
        <p class="fs-xs text-[var(--text-faint)] mt-3" x-text="t('admin.intro')"></p>
      </div>

      <!-- NOTIFICATIONS TAB (admin-only global config). Open-Meteo
           lives in its own General tab below; per-event toggle grid
           sits below the Apprise panel. -->
