<!--suppress HtmlUnknownAttribute, HtmlFormInputWithoutLabel -->
<!-- Admin → Weather — dual-provider (Open-Meteo or WeatherAPI.com)
     configuration. Provider selector at the top decides which
     downstream fields apply: Open-Meteo just needs a URL override
     (or default public endpoint); WeatherAPI.com requires a free
     key but unlocks moon-phase data. The moon-phase Apps widget +
     AI palette moon-question handling + Telegram /moon command all
     auto-disable when Open-Meteo is selected (no moon data on that
     provider).
     Location is per-USER (Settings → Profile → Weather) — the admin
     tab no longer carries a fallback location field; the SPA widget,
     AI palette context, and Telegram /weather all read each user's
     own saved location. The lifespan historical sampler iterates
     over every distinct user-configured location.
     Layout mirrors the other provider admin tabs (Portainer / OIDC
     / Asset Inventory) with provider-conditional fields hidden via
     x-show, Portainer-style result-box for the Test action, and a
     section-owned save that bundles per-section tunables + plain
     settings into one POST. Test-before-Save gate only applies to
     WeatherAPI (Open-Meteo has no key to validate). -->
<section x-show="adminTab==='weather'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
  <div class="flex items-center gap-2 mb-2">
    <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-cloud"/>
    </svg>
    <h3 class="font-semibold fs-md" x-text="t('admin.weather.title')"></h3>
  </div>
  <p class="fs-xs text-[var(--text-faint)] mb-3" x-text="t('admin.weather.subtitle')"></p>

  <!-- Master toggle — disabling stops the topbar widget + sampler
       + AI palette context block from fetching, regardless of which
       provider is selected. -->
  <div class="mb-4">
    <p class="fs-xs text-[var(--text-faint)] mb-1" x-text="t('admin.weather.enabled_hint')"></p>
    <label class="flex items-center gap-2 fs-sm cursor-pointer select-none">
      <input type="checkbox" x-model="settings.weather_enabled"
             @change="markWeatherDirty()"
             :disabled="isReadonly()">
      <span class="font-medium" x-text="t('admin.weather.enabled_label')"></span>
    </label>
  </div>

  <!-- Provider selector — Open-Meteo (default, free, no key, NO
       moon data) vs WeatherAPI.com (requires free key, full moon
       astronomy). Radio-group ARIA so screen readers announce as
       a single mutually-exclusive choice. -->
  <fieldset class="mb-4 border border-[var(--border)] rounded-md p-3"
            :disabled="isReadonly() || !settings.weather_enabled">
    <legend class="fs-xs font-medium px-1" x-text="t('admin.weather.provider_label')"></legend>
    <p class="fs-xs text-[var(--text-faint)] mb-2" x-text="t('admin.weather.provider_hint')"></p>
    <div role="radiogroup" :aria-label="t('admin.weather.provider_label')"
         class="grid grid-cols-1 md:grid-cols-2 gap-2">
      <label class="flex items-start gap-2 fs-sm cursor-pointer p-2 rounded-md border"
             :class="settings.weather_provider === 'open-meteo' ? 'border-[var(--primary)] bg-[var(--primary-soft)]' : 'border-[var(--border)] hover:bg-[var(--row-hover)]'">
        <input type="radio" value="open-meteo" x-model="settings.weather_provider"
               @change="markWeatherDirty()"
               :disabled="isReadonly() || !settings.weather_enabled"
               class="mt-0.5">
        <span class="flex-1">
          <span class="block font-medium" x-text="t('admin.weather.provider_open_meteo_label')"></span>
          <span class="block fs-xs text-[var(--text-faint)] mt-0.5"
                x-text="t('admin.weather.provider_open_meteo_hint')"></span>
        </span>
      </label>
      <label class="flex items-start gap-2 fs-sm cursor-pointer p-2 rounded-md border"
             :class="settings.weather_provider === 'weatherapi' ? 'border-[var(--primary)] bg-[var(--primary-soft)]' : 'border-[var(--border)] hover:bg-[var(--row-hover)]'">
        <input type="radio" value="weatherapi" x-model="settings.weather_provider"
               @change="markWeatherDirty()"
               :disabled="isReadonly() || !settings.weather_enabled"
               class="mt-0.5">
        <span class="flex-1">
          <span class="block font-medium" x-text="t('admin.weather.provider_weatherapi_label')"></span>
          <span class="block fs-xs text-[var(--text-faint)] mt-0.5"
                x-text="t('admin.weather.provider_weatherapi_hint')"></span>
        </span>
      </label>
    </div>
  </fieldset>

  <!-- WeatherAPI-only — API key with write-only `_set` flag pattern.
       Hidden when Open-Meteo is selected (no key needed). -->
  <div class="mb-3" x-show="settings.weather_provider === 'weatherapi'">
    <label class="block fs-sm font-medium mb-1" x-text="t('admin.weather.api_key_label')"></label>
    <div class="flex items-center gap-2">
      <input x-model="weatherForm.api_key" type="password"
             @input="markWeatherDirty()"
             :disabled="isReadonly() || !settings.weather_enabled"
             :placeholder="(settings.weather && settings.weather.api_key_set) ? t('admin.weather.api_key_set_placeholder') : t('admin.weather.api_key_placeholder')"
             class="flex-1 mono fs-sm"
             autocomplete="off"
             spellcheck="false">
      <button type="button" x-show="settings.weather && settings.weather.api_key_set"
              :disabled="isReadonly() || !settings.weather_enabled"
              @click="weatherForm.clear_api_key = true; weatherForm.api_key = ''; markWeatherDirty()"
              class="btn btn-ghost btn-sm fs-xs"
              :title="t('admin.weather.api_key_clear_title')"
              x-text="t('actions.clear')"></button>
    </div>
    <p class="fs-2xs text-[var(--text-faint)] mt-1" x-text="t('admin.weather.api_key_hint')"></p>
  </div>

  <!-- Base URL — meaning depends on the active provider. Open-Meteo:
       the full forecast endpoint (default public). WeatherAPI.com:
       base path that gets /forecast.json appended. -->
  <div class="mb-3">
    <label class="block fs-sm font-medium mb-1" x-text="t('admin.weather.api_base_url_label')"></label>
    <input x-model="settings.weather_api_base_url" type="url"
           @input="markWeatherDirty()"
           :disabled="isReadonly() || !settings.weather_enabled"
           :placeholder="t('admin.weather.api_base_url_placeholder')"
           class="w-full mono fs-sm">
    <p class="fs-2xs text-[var(--text-faint)] mt-1"
       x-text="settings.weather_provider === 'weatherapi' ? t('admin.weather.api_base_url_hint_weatherapi') : t('admin.weather.api_base_url_hint_open_meteo')"></p>
  </div>

  <!-- Location-source hint — operators see the contract at a glance:
       weather location is per-USER (Settings → Profile → Weather),
       NOT operator-set here. Removes the old default_label/lat/lon
       form fields that were confusing alongside the user-side
       location pref. -->
  <div class="mb-4 p-3 rounded-md border border-[var(--border)] bg-[var(--surface-2)]">
    <div class="flex items-start gap-2">
      <svg width="14" height="14" class="text-[var(--text-dim)] flex-shrink-0 mt-0.5" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-map-pin"/>
      </svg>
      <div>
        <p class="fs-sm font-medium mb-1" x-text="t('admin.weather.location_per_user_title')"></p>
        <p class="fs-xs text-[var(--text-faint)]" x-text="t('admin.weather.location_per_user_hint')"></p>
      </div>
    </div>
  </div>

  <!-- Test connection button + Portainer-style result box. Probes
       the SELECTED provider — WeatherAPI validates the API key,
       Open-Meteo just confirms the endpoint is reachable. Box
       background flips ok/error tones via pill-token classes. -->
  <div class="mb-4">
    <div class="flex items-center gap-2 flex-wrap mb-2">
      <button type="button"
              @click="testWeather()"
              :disabled="isReadonly() || !settings.weather_enabled || weatherTesting"
              class="btn btn-secondary fs-sm flex items-center gap-1.5">
        <svg width="13" height="13" :class="weatherTesting ? 'spin-md' : ''" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-plug-zap"/>
        </svg>
        <span x-show="!weatherTesting" x-text="t('actions.test_connection')"></span>
        <span x-show="weatherTesting" x-text="t('actions.testing')"></span>
      </button>
      <span x-show="settings.weather_enabled && !canSaveWeather()"
            class="fs-xs text-[var(--text-faint)]"
            x-text="t('admin.weather.save_requires_test')"></span>
    </div>
    <div x-show="weatherTestResult && weatherTestResult.detail"
         class="fs-sm rounded-md px-3 py-2"
         :class="(weatherTestResult && weatherTestResult.ok)
           ? 'bg-[var(--pill-ok-bg)] text-[var(--pill-ok-fg)] border border-[var(--pill-ok-br)]'
           : 'bg-[var(--pill-error-bg)] text-[var(--pill-error-fg)] border border-[var(--pill-error-br)]'">
      <span x-text="(weatherTestResult && weatherTestResult.ok) ? '✓' : '✗'"></span>
      <span class="ms-1" x-text="weatherTestResult && weatherTestResult.detail"></span>
    </div>
  </div>

  <!-- Moon-data availability badge — visible affordance so the
       operator sees at-a-glance whether the active provider supplies
       moon-phase data. -->
  <div class="mb-4 p-3 rounded-md border"
       :class="settings.weather_provider === 'weatherapi' ? 'border-[var(--success)] bg-[var(--surface-2)]' : 'border-[var(--text-faint)] bg-[var(--surface-2)]'">
    <div class="flex items-center gap-2">
      <svg width="14" height="14" aria-hidden="true">
        <use :href="'/img/ui-sprite.svg?v=__APP_VERSION__#icon-' + (settings.weather_provider === 'weatherapi' ? 'moon' : 'circle-off')"/>
      </svg>
      <span class="font-medium fs-sm"
            x-text="settings.weather_provider === 'weatherapi' ? t('admin.weather.moon_supported_title') : t('admin.weather.moon_unsupported_title')"></span>
    </div>
    <p class="fs-2xs text-[var(--text-faint)] mt-1"
       x-text="settings.weather_provider === 'weatherapi' ? t('admin.weather.moon_supported_hint') : t('admin.weather.moon_unsupported_hint')"></p>
  </div>

  <!-- Per-section tunables — surfaced from the canonical TUNABLES
       registry via the existing tuningKeys array. Hidden entirely
       when the array is empty (degenerate case — collapse-arrow
       UX without expandable content is a known frustration the
       operator flagged). The section-owned save bundles them into
       the same POST as the weather settings above so a single Save
       commits the whole configuration. -->
  <details x-show="weatherTuningKeys().length > 0"
           class="bg-[var(--surface-2)] border border-[var(--border)] rounded-md p-3 mb-4">
    <summary class="cursor-pointer fs-sm font-medium select-none flex items-center gap-2">
      <svg width="12" height="12" class="transition-transform" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
      </svg>
      <span x-text="t('admin.weather.advanced_label')"></span>
    </summary>
    <div class="mt-3 grid grid-cols-1 md:grid-cols-2 gap-3">
      <template x-for="key in weatherTuningKeys()" :key="key">
        <div>
          <label class="block fs-xs font-medium mb-1" x-text="tuningFieldLabel(key)"></label>
          <input x-model="tuningForm[key]"
                 @input="markWeatherDirty()"
                 :disabled="isReadonly()"
                 :placeholder="tuningFieldPlaceholder(key)"
                 type="text"
                 inputmode="numeric"
                 class="w-full mono fs-sm">
          <p class="fs-2xs text-[var(--text-faint)] mt-0.5" x-text="tuningFieldHelp(key)"></p>
          <p class="fs-2xs text-[var(--text-faint)] mt-0.5"
             x-text="tuningFieldBoundsLine(key)"></p>
        </div>
      </template>
    </div>
  </details>

  <!-- Save action row — section-owned save bundles the per-section
       tunables + plain settings into one POST. Test-before-Save
       gate only applies to WeatherAPI; Open-Meteo Save is
       unconditional (no key to validate). -->
  <div class="flex items-center gap-3 mt-3 flex-wrap pt-3 border-t border-[var(--border)]" x-show="isAdmin()">
    <button type="button" @click="saveWeatherSection()"
            :disabled="weatherSaving || !canSaveWeather()"
            :class="weatherSectionDirty() ? 'ring-2 ring-[var(--warning)]' : ''"
            :title="!canSaveWeather() ? t('admin.weather.save_requires_test') : ''"
            class="btn btn-primary fs-sm">
      <span x-show="!weatherSaving" x-text="t('actions.save')"></span>
      <span x-show="weatherSaving" class="flex items-center gap-1">
        <span class="spin"></span>
        <span x-text="t('actions.saving')"></span>
      </span>
    </button>
    <span x-show="weatherSectionDirty()"
          class="fs-xs text-[var(--warning)] flex items-center gap-1.5">
      <span class="w-1.5 h-1.5 rounded-full bg-[var(--warning)] animate-pulse"></span>
      <span class="unsaved-flash" x-text="t('hosts_actions.unsaved_label')"></span>
    </span>
  </div>
</section>
