<!--suppress HtmlUnknownAttribute, HtmlFormInputWithoutLabel -->
<section x-show="settingsSection === 'ignores'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
  <div class="flex items-center gap-2 mb-2">
    <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash"/>
    </svg>
    <h3 class="font-semibold fs-md" x-text="t('settings.ignores.title')"></h3>
  </div>
  <p class="fs-xs text-[var(--text-faint)] mb-3">
    <span x-text="t('settings.ignores.intro_prefix')"></span> <span class="pill pill-ignored" x-text="t('states.ignored')"></span> <span x-text="t('settings.ignores.intro_suffix')"></span>
  </p>
  <div class="flex gap-2 flex-wrap" x-show="isAdmin()">
    <select aria-label="Items matching these patterns show as" :aria-label="t('settings.ignores.intro_prefix')" x-model="newIgnore.kind" class="min-w-[100px]">
      <option value="image" x-text="t('settings.ignores.kind_image')"></option>
      <option value="stack" x-text="t('settings.ignores.kind_stack')"></option>
    </select>
    <input aria-label="Stack" :aria-label="t('settings.ignores.kind_stack')" x-model="newIgnore.pattern" type="text" :placeholder="t('settings.ignores.pattern_placeholder')" class="flex-1 min-w-[200px]">
    <button type="button" @click="addIgnore()" class="btn btn-primary fs-sm" x-text="t('actions.add')"></button>
  </div>
  <div class="mt-3 space-y-1">
    <template x-for="ig in ignores" :key="ig.pattern">
      <div class="flex items-center justify-between bg-[var(--surface-2)] rounded-md px-3 py-2 fs-sm">
        <div class="flex items-center gap-2">
          <span class="chip" x-text="ig.kind"></span>
          <span class="mono" x-text="ig.pattern"></span>
        </div>
        <button type="button" x-show="isAdmin()" @click="delIgnore(ig.pattern)" class="text-[var(--danger)] hover:underline fs-xs" x-text="t('actions.remove_link')"></button>
      </div>
    </template>
    <div x-show="ignores.length===0" class="fs-xs text-[var(--text-faint)] italic" x-text="t('empty.no_ignores')"></div>
  </div>
</section>

<!-- Authentik OIDC moved to Admin. Stub stays below so the old
     markup doesn't diff-explode; x-show="false" keeps it dormant. -->
<section x-show="false" style="display:none;">
  <div class="flex items-start justify-between">
    <div>
      <h3 class="font-semibold fs-md mb-2" x-text="t('settings.oidc.title')"></h3>
      <p class="fs-xs text-[var(--text-faint)] mb-3" x-text="t('settings.oidc.description')"></p>
    </div>
    <span x-show="oidcStatus"
          class="chip"
          :class="oidcStatus && oidcStatus.enabled ? 'pill-success' : 'pill-muted'"
          x-text="oidcStatus ? (oidcStatus.enabled ? t('settings.oidc.enabled') : t('settings.oidc.disabled')) : ''"></span>
  </div>

  <div x-show="oidcStatus" class="space-y-3">
    <label class="flex items-center gap-2 fs-sm cursor-pointer">
      <input type="checkbox" :checked="oidcForm.enabled"
             @change="oidcForm.enabled = $event.target.checked"
             :disabled="isReadonly()">
      <span x-text="t('settings.oidc.enable_toggle')"></span>
    </label>

    <div>
      <label class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('settings.oidc.issuer_url')"></label>
      <input aria-label="Issuer URL" :aria-label="t('settings.oidc.issuer_url')" x-model="oidcForm.issuer_url" type="url" :disabled="isReadonly()"
             :placeholder="t('settings.oidc.issuer_placeholder')"
             class="w-full mono fs-sm">
      <p class="fs-xs text-[var(--text-faint)] mt-1" x-html="t('settings.oidc.issuer_hint')"></p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div>
        <label class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('settings.oidc.client_id')"></label>
        <input aria-label="Client ID" :aria-label="t('settings.oidc.client_id')" x-model="oidcForm.client_id" type="text" :disabled="isReadonly()"
               :placeholder="t('settings.oidc.client_id_placeholder')"
               class="w-full mono fs-sm">
      </div>
      <div>
        <label class="block fs-xs text-[var(--text-dim)] mb-1">
          <span x-text="t('settings.oidc.client_secret')"></span>
        </label>
        <span x-show="oidcStatus && oidcStatus.client_secret_set"
              class="block fs-xs text-[var(--success)] mb-1"
              x-text="t('settings.secret_input.saved_hint')"></span>
        <input aria-label="✓ Saved — leave blank to keep, or paste a new value to replace" :aria-label="t('settings.secret_input.saved_hint')" x-model="oidcForm.client_secret" type="password" :disabled="isReadonly()"
               :placeholder="(oidcStatus && oidcStatus.client_secret_set) ? t('settings.secret_input.placeholder_keep') : t('settings.oidc.client_secret_placeholder')"
               autocomplete="new-password"
               class="w-full mono fs-sm">
      </div>
    </div>

    <div>
      <label class="block fs-xs text-[var(--text-dim)] mb-1">
        <span x-text="t('settings.oidc.redirect_uri')"></span> <span class="text-[var(--text-faint)]" x-text="t('settings.oidc.redirect_uri_note')"></span>
      </label>
      <div class="flex items-stretch gap-2">
        <input aria-label="Redirect URI" :aria-label="t('settings.oidc.redirect_uri')" :value="oidcStatus && oidcStatus.redirect_uri_default || ''" readonly
               class="w-full mono fs-sm flex-1 bg-[var(--surface-2)]">
        <button @click="copyRedirectUri()" type="button"
                class="btn btn-soft fs-sm whitespace-nowrap"
                :title="t('settings.oidc.copy_title')" x-text="t('settings.oidc.copy')"></button>
      </div>
      <p class="fs-xs text-[var(--text-faint)] mt-1" x-text="t('settings.oidc.redirect_uri_hint')"></p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div>
        <label class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('settings.oidc.scopes')"></label>
        <input aria-label="Scopes" :aria-label="t('settings.oidc.scopes')" x-model="oidcForm.scopes" type="text" :disabled="isReadonly()"
               :placeholder="t('settings.oidc.scopes_placeholder')"
               class="w-full mono fs-sm">
        <p class="fs-xs text-[var(--text-faint)] mt-1" x-html="t('settings.oidc.scopes_hint')"></p>
      </div>
      <div>
        <label class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('settings.oidc.admin_group')"></label>
        <input aria-label="Admin group" :aria-label="t('settings.oidc.admin_group')" x-model="oidcForm.admin_group" type="text" :disabled="isReadonly()"
               :placeholder="t('settings.oidc.admin_group_placeholder')"
               class="w-full mono fs-sm">
        <p class="fs-xs text-[var(--text-faint)] mt-1" x-html="t('settings.oidc.admin_group_hint')"></p>
      </div>
    </div>

    <label class="flex items-start gap-2 fs-sm cursor-pointer">
      <input type="checkbox" :checked="oidcForm.verify_tls"
             @change="oidcForm.verify_tls = $event.target.checked"
             :disabled="isReadonly()" class="mt-0.5">
      <span>
              <span class="font-medium" x-text="t('settings.oidc.verify_tls_title')"></span>
              <span class="block fs-xs text-[var(--text-faint)] mt-0.5" x-html="t('settings.oidc.verify_tls_hint')"></span>
            </span>
    </label>

    <div x-show="isAdmin()" class="flex gap-2 pt-1 flex-wrap">
      <button type="button" @click="saveOidcSettings()"
              :disabled="oidcSaving"
              class="btn btn-primary fs-sm">
        <span x-show="!oidcSaving" x-text="t('actions.save')"></span>
        <span x-show="oidcSaving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving')"></span></span>
      </button>
      <button type="button" @click="testOidcConnection()" class="btn btn-soft fs-sm" x-text="t('settings.oidc.test_button')"></button>
    </div>

    <div x-show="oidcTestResult" class="fs-sm rounded-md px-3 py-2"
         :class="oidcTestResult && oidcTestResult.ok ? 'bg-[var(--pill-ok-bg)] text-[var(--pill-ok-fg)] border border-[var(--pill-ok-br)]' : 'bg-[var(--pill-error-bg)] text-[var(--pill-error-fg)] border border-[var(--pill-error-br)]'">
      <template x-if="oidcTestResult && oidcTestResult.pending">
        <span x-text="t('loading.testing')"></span>
      </template>
      <template x-if="oidcTestResult && !oidcTestResult.pending">
              <span>
                <span x-text="oidcTestResult.ok ? '✓' : '✗'"></span>
                <span class="ms-1" x-text="oidcTestResult.detail"></span>
              </span>
      </template>
    </div>
  </div>
</section>

<!-- Language section — lets operators pick the UI language. The
     same picker also lives in the topbar for quick access. Dropping
     a new file into static/i18n/ + listing it in index.json makes it
     appear here automatically on next reload. -->
