<!--suppress HtmlUnknownAttribute, HtmlUnknownTag, HtmlFormInputWithoutLabel -->
<section x-show="settingsSection === 'notifications'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
  <div class="flex items-center gap-2 mb-1">
    <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-bell"/>
    </svg>
    <h3 class="font-semibold fs-md" x-text="t('profile.notifications.title')"></h3>
  </div>
  <p class="fs-xs text-[var(--text-faint)] mb-3" x-text="t('profile.notifications.subtitle_per_medium')"></p>

  <!-- ============== CATEGORISED NOTIFICATIONS PANEL ==========
       Replaces the flat per-event matrix with three collapsible
       category cards (Operations / Health / Security). Each
       category header carries an active-count badge + per-medium
       state chips that bulk-toggle the whole category. Search
       input at the top filters event rows live.

       Why this shape over the flat grid: the event catalogue
       scales as new sources ship (host_paused, swarm_agent_*,
       pending updates and more in the pipeline) — a 30-row
       flat matrix overwhelms users. Categories collapse the
       noise by default; users expand only the rows they care
       about. The data model is unchanged: profileForm.notify_events
       still keys events by bare name + per-medium dict, and
       the existing helpers drive the per-row checkboxes inside
       each expanded category. -->

  <!-- Search + expand-all controls -->
  <div class="flex items-center gap-2 mb-3 flex-wrap">
    <div class="relative flex-1 min-w-[220px]">
      <svg width="13" height="13"
           class="absolute start-3 top-1/2 -translate-y-1/2 text-[var(--text-faint)] pointer-events-none"
           aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-search"/>
      </svg>
      <!-- Inline padding overrides the global `input[type="text"] {
           padding: 5px 10px }` rule whose attribute-selector
           specificity beats Tailwind's `ps-9` / `pe-8` utilities;
           without the override the leading search icon (~25px from
           the start edge) overlaps the placeholder text. -->
      <input type="text"
             x-model="notifySearchQuery"
             :placeholder="t('profile.notifications.search_placeholder') || 'Search events…'"
             class="w-full py-1.5 fs-sm"
             style="padding-inline-start: 2.25rem; padding-inline-end: 2rem;"
             :aria-label="t('profile.notifications.search_placeholder') || 'Search events'">
      <button type="button"
              x-show="notifySearchQuery"
              @click="notifySearchQuery = ''"
              class="absolute end-2 top-1/2 -translate-y-1/2 text-[var(--text-faint)] hover:text-[var(--text)]"
              :title="t('actions.clear') || 'Clear'"
              :aria-label="t('actions.clear_search') || t('actions.clear') || 'Clear search'">✕
      </button>
    </div>
    <button type="button"
            @click="expandAllNotifyCategories(true)"
            class="btn btn-ghost fs-xs"
            x-text="t('profile.notifications.expand_all') || 'Expand all'"></button>
    <button type="button"
            @click="expandAllNotifyCategories(false)"
            class="btn btn-ghost fs-xs"
            x-text="t('profile.notifications.collapse_all') || 'Collapse all'"></button>
  </div>

  <!-- Category cards. Each iterates notifyCategoryFilteredRows
       so search filters rows BEFORE they render; categories
       with zero matching rows hide entirely so the panel
       collapses gracefully. -->
  <div class="flex flex-col gap-2">
    <template x-for="cat in notifyCategories()" :key="cat.id">
      <section class="notify-category"
               x-show="notifySearchQuery === '' || notifyCategoryFilteredRows(cat).length > 0">
        <!-- Header row. The expand/collapse trigger and the
             per-medium bulk-toggle chips are SIBLING <button type="button">
             elements — nesting interactive content inside a
             parent <button type="button"> is invalid HTML5 (browsers handle
             focus / Enter activation inconsistently for
             nested-button cases) AND defeats the keyboard
             navigation contract per CLAUDE.md's "Clickable
             elements MUST be <button type='button'>" rule.
             The wrapper is a flex row, not a button itself. -->
        <div class="notify-category-header">
          <button type="button"
                  class="notify-category-toggle"
                  @click="toggleNotifyCategoryExpanded(cat.id)"
                  :aria-expanded="isNotifyCategoryExpanded(cat.id) ? 'true' : 'false'"
                  :aria-controls="'notify-cat-body-' + cat.id">
            <svg width="14" height="14"
                 class="text-[var(--text-dim)] flex-shrink-0"
                 aria-hidden="true">
              <use :href="'/img/ui-sprite.svg?v=__APP_VERSION__#' + cat.icon"/>
            </svg>
            <div class="flex flex-col min-w-0 flex-1 text-start">
                    <span class="fs-sm font-semibold text-[var(--text)]"
                          x-text="t(cat.label_key)"></span>
              <span class="fs-2xs text-[var(--text-faint)] truncate"
                    x-text="t(cat.desc_key)"></span>
            </div>
            <span class="notify-cat-count"
                  :title="t('profile.notifications.cat_count_title') || 'Events with at least one channel routing'">
                    <span x-text="notifyCategoryEnabledCount(cat).on"></span>
                    <span class="text-[var(--text-faint)]" x-text="' / ' + notifyCategoryEnabledCount(cat).total"></span>
                  </span>
            <svg width="11" height="11"
                 class="text-[var(--text-faint)] flex-shrink-0 transition-transform"
                 :class="isNotifyCategoryExpanded(cat.id) ? 'rotate-180' : ''"
                 aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-down"/>
            </svg>
          </button>
          <!-- per-medium state chips. Sibling <button type="button">s, NOT
               nested in the toggle. Clicking a chip cycles all
               → none → all for that medium across the entire
               category. Disabled-by-admin chips render as
               <span> (no click target) so the operator sees
               the channel can't be toggled until the admin
               re-enables it globally. -->
          <div class="notify-cat-chip-row" role="group"
               :aria-label="t('admin.notifications.bulk_medium_toggles_aria', { category: t(cat.label_key) })">
            <template x-for="m in notifyMediumNames()" :key="cat.id + '_chip_' + m">
              <button type="button"
                      class="notify-cat-chip"
                      :class="'notify-cat-chip--' + notifyCategoryStateForMedium(cat, m)
                                    + (notifyMediumIsGloballyEnabled(m) ? '' : ' notify-cat-chip--admin-disabled')
                                    + (notifyCategoryDirtyForMedium(cat, m) ? ' notify-cat-chip--dirty' : '')"
                      :disabled="!notifyMediumIsGloballyEnabled(m)"
                      :title="(notifyMediumIsGloballyEnabled(m)
                                     ? (t('profile.notifications.cat_chip_title', { medium: t('admin.notifications.medium_' + m) }) || ('Click to toggle ' + m + ' for this category'))
                                     : (t('profile.notifications.medium_globally_disabled') || 'Disabled by admin'))
                                    + (notifyCategoryDirtyForMedium(cat, m) ? ' — ' + (t('profile.notifications.cat_chip_dirty') || 'Unsaved change') : '')"
                      :aria-pressed="notifyCategoryStateForMedium(cat, m) === 'all' ? 'true' : (notifyCategoryStateForMedium(cat, m) === 'none' ? 'false' : 'mixed')"
                      @click="toggleNotifyCategoryMedium(cat.id, m)">
                <span x-text="t('admin.notifications.medium_' + m)"></span>
                <svg width="9" height="9" class="ms-1" aria-hidden="true">
                  <use :href="notifyCategoryStateForMedium(cat, m) === 'all' ? '/img/ui-sprite.svg?v=__APP_VERSION__#icon-activity'
                                    : (notifyCategoryStateForMedium(cat, m) === 'partial' ? '/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle'
                                    : '/img/ui-sprite.svg?v=__APP_VERSION__#icon-bug')"/>
                </svg>
                <!-- Dirty dot — visible only when this chip's
                     routing has been changed by the operator
                     but not yet Saved. Pairs with the page-Save's
                     amber ring so the operator sees BOTH cues. -->
                <span x-show="notifyCategoryDirtyForMedium(cat, m)"
                      class="notify-cat-chip-dirty-dot"
                      :aria-label="t('profile.notifications.cat_chip_dirty') || 'Unsaved change'"></span>
              </button>
            </template>
          </div>
        </div>
        <div x-show="isNotifyCategoryExpanded(cat.id)" x-cloak class="notify-category-body"
             :id="'notify-cat-body-' + cat.id">
          <!-- Sub-header column labels — only visible inside
               the expanded body. -->
          <div class="notify-grid notify-grid-body"
               :style="'grid-template-columns: minmax(0, 1fr) ' + notifyMediumNames().map(() => 'auto').join(' ') + ' auto'">
            <div class="fs-2xs text-[var(--text-faint)] uppercase tracking-wider pb-1.5 border-b border-[var(--border)]"
                 x-text="t('profile.notifications.column_event')"></div>
            <template x-for="m in notifyMediumNames()" :key="cat.id + '_hdr_' + m">
              <div class="fs-2xs uppercase tracking-wider pb-1.5 border-b border-[var(--border)] text-center"
                   :class="notifyMediumIsGloballyEnabled(m) ? 'text-[var(--text-dim)]' : 'text-[var(--text-faint)] opacity-60'"
                   :title="notifyMediumIsGloballyEnabled(m) ? t('profile.notifications.medium_column_hint') : t('profile.notifications.medium_globally_disabled')">
                <span x-text="t('admin.notifications.medium_' + m)"></span>
                <svg x-show="!notifyMediumIsGloballyEnabled(m)" width="10" height="10" class="opacity-70 ms-1 inline-block" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-alert-triangle"/>
                </svg>
              </div>
            </template>
            <div class="fs-2xs text-[var(--text-faint)] uppercase tracking-wider pb-1.5 border-b border-[var(--border)] text-center"
                 x-text="t('profile.notifications.column_all')"></div>
            <!-- Operations category renders as paired groups
                 (one operation header + success / failure
                 sub-rows). Health + Security stay flat — single
                 toggle per event. The cat.groups truthy gate
                 picks which path renders. -->
            <template x-if="cat.groups">
              <template x-for="grp in notifyCategoryFilteredGroups(cat)" :key="cat.id + '_grp_' + grp.label">
                <div class="contents">
                  <!-- Operation header row, spans every grid column. -->
                  <div class="py-1.5 mt-1 fs-xs font-semibold text-[var(--text)] uppercase tracking-wider"
                       style="grid-column: 1 / -1; border-top: 1px solid var(--border);"
                       x-text="t('admin.notifications.events.' + grp.label)"></div>
                  <!-- Two sub-rows: success then failure. -->
                  <template x-for="kind in ['success', 'failure']" :key="cat.id + '_grp_' + grp.label + '_' + kind">
                    <div class="contents">
                      <div class="py-1.5 ps-3 fs-sm flex items-center gap-1.5 min-w-0">
                        <span class="text-[var(--text-faint)]" aria-hidden="true">↳</span>
                        <span x-text="t('admin.notifications.events.' + kind)"
                              :class="kind === 'failure' ? 'text-[var(--danger)]' : 'text-[var(--success)]'"
                              class="font-medium"></span>
                        <!-- Profile-side template inspector — opens
                             the same modal as Admin in READ-ONLY
                             mode so users can see what title/body
                             the admin has configured for this event
                             without touching it. -->
                        <button type="button"
                                class="notify-tmpl-info-btn text-[var(--text-faint)] hover:text-[var(--text)]"
                                @click="openNotifyTemplateViewer(kind === 'success' ? grp.success_key.replace(/^notify_event_/, '') : grp.failure_key.replace(/^notify_event_/, ''))"
                                :title="t('profile.notify_templates.view_template_title')"
                                :aria-label="t('profile.notify_templates.view_template_title')">
                          <svg width="11" height="11" aria-hidden="true">
                            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-info"/>
                          </svg>
                        </button>
                      </div>
                      <template x-for="m in notifyMediumNames()" :key="cat.id + '_grp_' + grp.label + '_' + kind + '_' + m">
                        <div class="py-1.5 flex items-center justify-center">
                          <label class="inline-flex items-center select-none p-1 rounded hover:bg-[var(--surface-2)]"
                                 :class="userNotifyEventDisabledByAdmin(kind === 'success' ? grp.success_key : grp.failure_key) ? 'opacity-50 cursor-not-allowed' : (notifyMediumIsGloballyEnabled(m) ? 'cursor-pointer' : 'opacity-60 cursor-pointer')"
                                 :title="userNotifyEventDisabledByAdmin(kind === 'success' ? grp.success_key : grp.failure_key)
                                                 ? t('profile.notifications.disabled_by_admin')
                                                 : (notifyMediumIsGloballyEnabled(m) ? '' : t('profile.notifications.medium_globally_disabled'))">
                            <input type="checkbox"
                                   :checked="userNotifyEventValue(kind === 'success' ? grp.success_key : grp.failure_key, m)"
                                   @change="setUserNotifyEventValue(kind === 'success' ? grp.success_key : grp.failure_key, m, $event.target.checked)"
                                   :disabled="userNotifyEventDisabledByAdmin(kind === 'success' ? grp.success_key : grp.failure_key)">
                          </label>
                        </div>
                      </template>
                      <div class="py-1.5 flex items-center justify-center">
                        <label class="inline-flex items-center select-none p-1 rounded hover:bg-[var(--surface-2)]"
                               :class="userNotifyEventDisabledByAdmin(kind === 'success' ? grp.success_key : grp.failure_key) ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'"
                               :title="userNotifyEventDisabledByAdmin(kind === 'success' ? grp.success_key : grp.failure_key) ? t('profile.notifications.disabled_by_admin') : t('profile.notifications.row_all_hint')">
                          <input type="checkbox"
                                 :checked="userNotifyEventRowAll(kind === 'success' ? grp.success_key : grp.failure_key)"
                                 @change="toggleUserNotifyEventRow(kind === 'success' ? grp.success_key : grp.failure_key, $event.target.checked)"
                                 :disabled="userNotifyEventDisabledByAdmin(kind === 'success' ? grp.success_key : grp.failure_key)">
                        </label>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </template>
            <!-- Flat per-event rows for non-grouped categories
                 (Health / Security). -->
            <template x-if="!cat.groups">
              <template x-for="row in notifyCategoryFilteredRows(cat)" :key="cat.id + '_row_' + row.key">
                <div class="contents">
                  <div class="py-1.5 fs-sm text-[var(--text)] flex items-center gap-2 min-w-0">
                          <span x-text="t('admin.notifications.events.' + row.label)"
                                :title="t('admin.notifications.events.' + row.label)"
                                class="text-[var(--text-dim)] truncate"></span>
                    <template x-if="row.kind">
                      <span class="text-[var(--text-faint)]" x-text="'·'"></span>
                    </template>
                    <template x-if="row.kind">
                            <span x-text="t('admin.notifications.events.' + row.kind)"
                                  :title="t('admin.notifications.events.' + row.kind)"
                                  :class="row.kind === 'failure' ? 'text-[var(--danger)]' : 'text-[var(--success)]'"
                                  class="font-medium"></span>
                    </template>
                    <!-- Profile-side template inspector. Same modal,
                         read-only mode for non-admins. -->
                    <button type="button"
                            class="btn-reset text-[var(--text-faint)] hover:text-[var(--text)] flex-shrink-0"
                            @click="openNotifyTemplateViewer(row.key.replace(/^notify_event_/, ''))"
                            :title="t('profile.notify_templates.view_template_title')"
                            :aria-label="t('profile.notify_templates.view_template_title')">
                      <svg width="11" height="11" aria-hidden="true">
                        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-info"/>
                      </svg>
                    </button>
                  </div>
                  <template x-for="m in notifyMediumNames()" :key="cat.id + '_chk_' + m + '_' + row.key">
                    <div class="py-1.5 flex items-center justify-center">
                      <label class="inline-flex items-center select-none p-1 rounded hover:bg-[var(--surface-2)]"
                             :class="userNotifyEventDisabledByAdmin(row.key) ? 'opacity-50 cursor-not-allowed' : (notifyMediumIsGloballyEnabled(m) ? 'cursor-pointer' : 'opacity-60 cursor-pointer')"
                             :title="userNotifyEventDisabledByAdmin(row.key)
                                             ? t('profile.notifications.disabled_by_admin')
                                             : (notifyMediumIsGloballyEnabled(m) ? '' : t('profile.notifications.medium_globally_disabled'))">
                        <input type="checkbox"
                               :checked="userNotifyEventValue(row.key, m)"
                               @change="setUserNotifyEventValue(row.key, m, $event.target.checked)"
                               :disabled="userNotifyEventDisabledByAdmin(row.key)">
                      </label>
                    </div>
                  </template>
                  <div class="py-1.5 flex items-center justify-center">
                    <label class="inline-flex items-center select-none p-1 rounded hover:bg-[var(--surface-2)]"
                           :class="userNotifyEventDisabledByAdmin(row.key) ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'"
                           :title="userNotifyEventDisabledByAdmin(row.key) ? t('profile.notifications.disabled_by_admin') : t('profile.notifications.row_all_hint')">
                      <input type="checkbox"
                             :checked="userNotifyEventRowAll(row.key)"
                             @change="toggleUserNotifyEventRow(row.key, $event.target.checked)"
                             :disabled="userNotifyEventDisabledByAdmin(row.key)">
                    </label>
                  </div>
                </div>
              </template>
            </template>
          </div>
        </div>
      </section>
    </template>
    <!-- Empty-state when no category has any matching row. -->
    <div x-show="notifySearchQuery && notifyCategories().every(c => notifyCategoryFilteredRows(c).length === 0)"
         class="fs-xs text-[var(--text-faint)] italic py-3 text-center"
         x-text="t('profile.notifications.search_no_match', { query: notifySearchQuery })"></div>
  </div>

  <!-- User-side convenience buttons — Enable all / Disable all /
       Errors only. Operate on profileForm.notify_events (per-user
       opt-in state) and skip events the admin has globally
       disabled (the backend would 400 such an opt-in anyway). -->
  <div class="flex items-center gap-2 flex-wrap mt-3 pt-3 border-t border-[var(--border)]">
    <button type="button" @click="setAllUserNotifyEvents(true)"
            class="btn btn-soft fs-xs"
            x-text="t('admin.notifications.events.enable_all')"></button>
    <button type="button" @click="setAllUserNotifyEvents(false)"
            class="btn btn-soft fs-xs"
            x-text="t('admin.notifications.events.disable_all')"></button>
    <button type="button" @click="setUserNotifyEventsErrorsOnly()"
            class="btn btn-soft fs-xs"
            x-text="t('admin.notifications.events.errors_only')"></button>
  </div>

  <!-- Bulk-pattern picker — operator picks one medium for "all
       success events" and another for "all failure events" so
       they can route SUCCESSES to (e.g.) In-app and FAILURES to
       Apprise in one click instead of clicking 12+ checkboxes.
       Operates on profileForm.notify_events; skips events the
       admin has globally disabled. -->
  <div class="flex items-center gap-2 flex-wrap mt-3 pt-3 border-t border-[var(--border)] fs-xs">
          <span class="text-[var(--text-dim)] me-1"
                x-text="t('admin.notifications.events.bulk_pattern_label')"></span>
    <span class="text-[var(--text-faint)]"
          x-text="t('admin.notifications.events.bulk_pattern_success_to')"></span>
    <select x-model="userNotifyBulkSuccessMedium"
            class="bg-[var(--surface-2)] border border-[var(--border)] rounded px-1.5 py-0.5">
      <option value="" x-text="t('admin.notifications.events.bulk_pattern_skip')"></option>
      <template x-for="m in notifyMediumNames()" :key="m">
        <option :value="m" x-text="m.charAt(0).toUpperCase() + m.slice(1)"></option>
      </template>
    </select>
    <span class="text-[var(--text-faint)]"
          x-text="t('admin.notifications.events.bulk_pattern_failure_to')"></span>
    <select x-model="userNotifyBulkFailureMedium"
            class="bg-[var(--surface-2)] border border-[var(--border)] rounded px-1.5 py-0.5">
      <option value="" x-text="t('admin.notifications.events.bulk_pattern_skip')"></option>
      <template x-for="m in notifyMediumNames()" :key="m">
        <option :value="m" x-text="m.charAt(0).toUpperCase() + m.slice(1)"></option>
      </template>
    </select>
    <button type="button"
            @click="setUserNotifyEventsByMediumPattern(userNotifyBulkSuccessMedium, userNotifyBulkFailureMedium)"
            :disabled="!userNotifyBulkSuccessMedium && !userNotifyBulkFailureMedium"
            :class="(!userNotifyBulkSuccessMedium && !userNotifyBulkFailureMedium) ? 'opacity-50 cursor-not-allowed' : ''"
            class="btn btn-soft"
            x-text="t('admin.notifications.events.bulk_pattern_apply')"></button>
  </div>

  <div class="flex items-center gap-3 flex-wrap mt-4 pt-4 border-t border-[var(--border)]">
    <button type="button" @click="saveProfile()" :disabled="profileBusy"
            :class="profileDirty() ? 'ring-2 ring-[var(--warning)]' : ''"
            class="btn btn-primary fs-sm"
            x-text="profileBusy ? t('actions.saving') : t('actions.save_changes')"></button>
    <span x-show="profileDirty()"
          class="fs-xs text-[var(--warning)] flex items-center gap-1.5"
          :title="t('common.unsaved_title')">
            <span class="w-1.5 h-1.5 rounded-full bg-[var(--warning)] animate-pulse"></span>
            <span class="unsaved-flash" x-text="t('hosts_actions.unsaved_label')"></span>
          </span>
  </div>
</section>

<!-- Portainer / Providers / OIDC / Notifications moved to Admin. -->
<section x-show="false" style="display:none;">
  <h3 class="font-semibold fs-md mb-2" x-text="t('settings.host_stats.title')"></h3>
  <p class="fs-xs text-[var(--text-faint)] mb-3" x-text="t('settings.host_stats.desc')"></p>

  <label class="block fs-xs text-[var(--text-faint)] mb-1"
         x-text="t('settings.host_stats.source_label')"></label>
  <div class="flex flex-wrap gap-4 mb-4 fs-sm text-[var(--text-dim)]">
    <label class="inline-flex items-center gap-2">
      <input type="radio" x-model="settings.host_stats_source" value="none" :disabled="isReadonly()">
      <span x-text="t('settings.host_stats.source_none')"></span>
    </label>
    <label class="inline-flex items-center gap-2">
      <input type="radio" x-model="settings.host_stats_source" value="node_exporter" :disabled="isReadonly()">
      <span x-text="t('settings.host_stats.source_node_exporter')"></span>
    </label>
    <label class="inline-flex items-center gap-2">
      <input type="radio" x-model="settings.host_stats_source" value="beszel" :disabled="isReadonly()">
      <span x-text="t('settings.host_stats.source_beszel')"></span>
    </label>
  </div>

  <!-- node-exporter config -->
  <div x-show="hasHostStatsSource('node_exporter')" class="space-y-3">
    <div>
      <label class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('settings.host_stats.url_label')"></label>
      <input x-model="settings.node_exporter_url_template" type="text"
             :disabled="isReadonly()"
             class="w-full mono fs-xs"
             :placeholder="t('settings.host_stats.url_placeholder')">
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('settings.host_stats.url_hint')"></p>
    </div>
    <div>
      <label class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('settings.host_stats.overrides_label')"></label>
      <textarea x-model="settings.node_exporter_overrides_json"
                :disabled="isReadonly()" rows="5"
                class="w-full mono fs-xs"
                :placeholder='`{\n  "host-id": "http://192.X.X.X:9100/metrics"\n}`'></textarea>
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('settings.host_stats.overrides_hint')"></p>
    </div>
  </div>

  <!-- Beszel config -->
  <div x-show="hasHostStatsSource('beszel')" class="space-y-3">
    <div>
      <label class="block fs-xs text-[var(--text-faint)] mb-1"
             x-text="t('settings.host_stats.beszel_url_label')"></label>
      <input x-model="settings.beszel_hub_url" type="url"
             :disabled="isReadonly()"
             class="w-full mono fs-xs"
             :placeholder="t('settings.host_stats.beszel_url_placeholder')">
      <p class="fs-2xs text-[var(--text-faint)] mt-1"
         x-text="t('settings.host_stats.beszel_url_hint')"></p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
      <div>
        <label class="block fs-xs text-[var(--text-faint)] mb-1"
               x-text="t('settings.host_stats.beszel_identity_label')"></label>
        <input x-model="settings.beszel_identity" type="text"
               :disabled="isReadonly()"
               class="w-full fs-xs"
               :placeholder="t('settings.host_stats.beszel_identity_placeholder')">
      </div>
      <div>
        <label class="block fs-xs text-[var(--text-faint)] mb-1">
          <span x-text="t('settings.host_stats.beszel_password_label')"></span>
        </label>
        <span x-show="settings.beszel_password_set" class="block fs-xs text-[var(--success)] mb-1"
              x-text="t('settings.secret_input.saved_hint')"></span>
        <input x-model="settings.beszel_password" type="password"
               :disabled="isReadonly()"
               autocomplete="new-password"
               class="w-full fs-xs"
               :placeholder="settings.beszel_password_set ? t('settings.secret_input.placeholder_keep') : t('settings.host_stats.beszel_password_placeholder')">
      </div>
    </div>
    <label class="inline-flex items-center gap-2 fs-sm text-[var(--text-dim)]">
      <input type="checkbox" x-model="settings.beszel_verify_tls" :disabled="isReadonly()">
      <span x-text="t('settings.host_stats.beszel_verify_tls')"></span>
    </label>
    <!-- third-pass fix: switched from flex+justify-between
         to a 2-column grid (1fr for the result span, auto for
         the button). Flex+justify-between only works when both
         children participate in the layout; with `flex-wrap`
         the button could STILL wrap onto its own line on
         narrow viewports and lose the right-edge anchor.
         Grid columns are absolute — first column always grows,
         second column always hugs the button content. -->
    <div class="grid grid-cols-[1fr_auto] items-center gap-2">
            <span class="fs-xs min-w-0"
                  :class="beszelTestResult && !beszelTestResult.pending
                          ? (beszelTestResult.ok ? 'text-[var(--success)]' : 'text-[var(--danger)]')
                          : 'text-[var(--text-faint)]'"
                  x-text="beszelTestResult && !beszelTestResult.pending
                          ? ((beszelTestResult.ok ? '✓ ' : '✗ ') + (beszelTestResult.detail || ''))
                          : ''"></span>
      <button type="button" x-show="isAdmin()" @click="testBeszelConnection()"
              :disabled="beszelTestResult && beszelTestResult.pending"
              class="btn btn-soft fs-sm justify-self-end"
              x-text="(beszelTestResult && beszelTestResult.pending) ? t('settings.host_stats.beszel_testing') : t('settings.host_stats.beszel_test_button')"></button>
    </div>
    <p class="fs-2xs text-[var(--text-faint)]"
       x-text="t('settings.host_stats.beszel_naming_hint')"></p>
  </div>

  <button type="button" x-show="isAdmin()" @click="saveHostStats()"
          class="btn btn-primary fs-sm mt-4"
          x-text="t('actions.save')"></button>
</section>
