      <div x-show="settingsSection === 'profile'" class="grid grid-cols-1 lg:grid-cols-[260px_1fr] gap-5">
        <!-- Avatar / identity card -->
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5 flex flex-col items-center text-center">
          <div class="relative mb-4">
            <template x-if="me && me.avatar_url">
              <img :src="me.avatar_url" class="w-[120px] h-[120px] rounded-full object-cover border-2 border-[var(--border-bright)]" alt="Avatar">
            </template>
            <template x-if="!(me && me.avatar_url)">
              <div class="user-avatar user-avatar--lg font-semibold"
                   :style="'--avatar-hue: ' + avatarHue()"
                   x-text="initial()"></div>
            </template>
            <!-- Logical-direction `end-1` instead of physical `right-1`
                 so the upload affordance auto-flips to the visual-end
                 (left) edge of the avatar in RTL locales — matches
                 the rest of the SPA's RTL contract. -->
            <label class="absolute bottom-1 end-1 w-8 h-8 rounded-full bg-[var(--surface-3)] border border-[var(--border-bright)] flex items-center justify-center cursor-pointer hover:bg-[var(--surface-2)]"
                   :class="avatarBusy && 'opacity-60'"
                   :title="t('settings.profile.avatar_upload_title')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              <input type="file" accept="image/*" class="hidden" @change="uploadAvatar($event)" :disabled="avatarBusy">
            </label>
          </div>
          <div class="fs-xl font-semibold" x-text="(me && me.display_name) || (me && me.username) || ''"></div>
          <div class="fs-xs text-[var(--text-dim)] mt-0.5" x-text="me && me.username"></div>
          <div class="mt-3 flex items-center gap-2">
            <span class="pill" :class="me && me.role === 'admin' ? 'pill-primary' : 'pill-muted'" x-text="me && me.role"></span>
            <!-- Auth-source chip — `.chip` declares `display: inline-block`
                 (deliberate, so multi-word chips wrap as one unit), so the
                 sibling `inline-flex` Tailwind utility loses on cascade
                 specificity and the icon + label stack vertically. Force
                 inline-flex via the style attribute so the logo + text
                 share one row. -->
            <span class="chip items-center gap-1.5" style="display: inline-flex">
              <img x-show="me && me.source === 'authentik'" src="/img/icons/authentik.svg" alt="" class="w-3 h-3" aria-hidden="true">
              <span x-text="me && me.source"></span>
            </span>
          </div>
          <button x-show="me && me.avatar_url" @click="clearAvatar()"
                  class="mt-4 fs-xs text-[var(--danger)] hover:underline" x-text="t('settings.profile.avatar_remove')"></button>
        </section>

        <!-- Identity + account info card -->
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
          <div class="flex items-center gap-2 mb-4">
            <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-user"/></svg>
            <h3 class="font-semibold fs-md" x-text="t('settings.profile.account')"></h3>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('settings.profile.username')"></label>
              <input :value="me && me.username" disabled class="w-full fs-sm">
              <p class="fs-3xs text-[var(--text-faint)] mt-1"
                 x-text="t(me && me.source === 'authentik' ? 'settings.profile.username_hint_authentik' : 'settings.profile.username_hint')"></p>
            </div>
            <div>
              <label class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('settings.profile.source')"></label>
              <input :value="me && me.source" disabled class="w-full fs-sm mono">
            </div>
            <div>
              <label class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('settings.profile.role')"></label>
              <input :value="me && me.role" disabled class="w-full fs-sm mono">
            </div>
            <div>
              <label class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('settings.profile.last_login')"></label>
              <input :value="me && me.last_login_at ? fmtDate(me.last_login_at) : '—'" disabled class="w-full fs-sm mono">
            </div>
            <div class="sm:col-span-2">
              <label class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('settings.profile.member_since')"></label>
              <input :value="me && me.created_at ? fmtDate(me.created_at) : '—'" disabled class="w-full fs-sm mono">
            </div>
          </div>
        </section>

        <!-- About card — editable display name + bio + email -->
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5 lg:col-span-2">
          <div class="flex items-center gap-2 mb-4">
            <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-id-card"/></svg>
            <h3 class="font-semibold fs-md" x-text="t('settings.profile.about')"></h3>
          </div>
          <div class="space-y-3">
            <div>
              <label class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('settings.profile.display_name')"></label>
              <input x-model="profileForm.display_name" type="text" maxlength="80"
                     :placeholder="t('settings.profile.display_name_placeholder')" class="w-full fs-sm">
            </div>
            <div>
              <label class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('settings.profile.email')"></label>
              <input x-model="profileForm.email" type="email" maxlength="200"
                     :placeholder="t('settings.profile.email_placeholder')"
                     :disabled="me && me.source === 'authentik'"
                     class="w-full fs-sm">
              <p x-show="me && me.source === 'authentik'"
                 class="fs-3xs text-[var(--text-faint)] mt-1"
                 x-text="t('settings.profile.email_hint_authentik')"></p>
            </div>
            <div>
              <label class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('settings.profile.bio')"></label>
              <textarea x-model="profileForm.bio" rows="3" maxlength="500"
                        :placeholder="t('settings.profile.bio_placeholder')"
                        class="w-full fs-sm"></textarea>
              <p class="fs-3xs text-[var(--text-faint)] mt-1" x-text="t('settings.profile.bio_count', { count: (profileForm.bio || '').length })"></p>
            </div>
            <div class="flex items-center gap-3 flex-wrap">
              <button @click="saveProfile()" :disabled="profileBusy"
                      :class="profileDirty() ? 'ring-2 ring-[var(--warning)]' : ''"
                      class="btn btn-primary fs-sm"
                      x-text="profileBusy ? t('actions.saving') : t('actions.save_changes')"></button>
              <span x-show="profileDirty()"
                    class="fs-xs text-[var(--warning)] flex items-center gap-1.5"
                    :title="t('common.unsaved_title')">
                <span class="w-1.5 h-1.5 rounded-full bg-[var(--warning)] animate-pulse"></span>
                <span class="unsaved-flash" x-text="t('hosts_actions.unsaved_label')"></span>
              </span>
            </div>
          </div>
        </section>

        <!-- Topbar widgets — per-browser preferences stored in
             localStorage (no backend persistence; each device is
             independent). Changes take effect immediately on blur. -->
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5 lg:col-span-2">
          <div class="flex items-center gap-2 mb-4">
            <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-clock"/></svg>
            <h3 class="font-semibold fs-md" x-text="t('topbar_widgets.title')"></h3>
          </div>
          <p class="fs-xs text-[var(--text-faint)] mb-4">
            <span x-text="t('topbar_widgets.intro_prefix')"></span><a href="https://open-meteo.com" target="_blank" rel="noopener" class="text-[var(--primary)] hover:underline" x-text="t('topbar_widgets.intro_link')"></a><span x-text="t('topbar_widgets.intro_suffix')"></span>
          </p>
          <div class="space-y-3">
            <label class="flex items-center gap-2 fs-sm">
              <input type="checkbox" x-model="headerClockEnabled">
              <span x-text="t('topbar_widgets.show_clock')"></span>
            </label>
            <!-- Weather toggle hidden entirely when the admin
                 hasn't configured Open-Meteo upstream — there's no
                 endpoint to call, so the feature isn't available
                 to opt into. Becomes visible the moment the admin
                 sets the URL in Settings → Notifications. -->
            <label class="flex items-center gap-2 fs-sm"
                   x-show="settings && (settings.open_meteo_url || '').trim()">
              <input type="checkbox" x-model="headerWeatherEnabled">
              <span x-text="t('topbar_widgets.show_weather')"></span>
            </label>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3"
                 x-show="headerWeatherEnabled && settings && (settings.open_meteo_url || '').trim()">
              <div>
                <label class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('topbar_widgets.city_label')"></label>
                <input type="text" x-model="headerWeatherLabel"
                       :placeholder="t('topbar_widgets.city_placeholder')"
                       class="w-full fs-sm">
              </div>
              <div>
                <label class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('topbar_widgets.lat_label')"></label>
                <input type="number" step="any" x-model.number="headerWeatherLat"
                       placeholder="30.0444"
                       class="w-full fs-sm mono">
              </div>
              <div>
                <label class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('topbar_widgets.lon_label')"></label>
                <input type="number" step="any" x-model.number="headerWeatherLon"
                       placeholder="31.2357"
                       class="w-full fs-sm mono">
              </div>
            </div>
            <p class="fs-2xs text-[var(--text-faint)]" x-show="headerWeatherEnabled">
              <span x-text="t('topbar_widgets.tip_prefix')"></span><a href="https://www.google.com/maps" target="_blank" rel="noopener" class="text-[var(--primary)] hover:underline" x-text="t('topbar_widgets.tip_maps')"></a><span x-text="t('topbar_widgets.tip_suffix')"></span>
            </p>
            <div x-show="headerWeatherEnabled && weather && weather.error"
                 class="fs-xs text-[var(--danger)]"
                 x-text="t('topbar_widgets.fetch_failed', { error: (weather && weather.error) || '' })"></div>
            <!-- AI preferences sub-section — visually separated from
                 the topbar widgets above (clock + weather) but shares
                 the SAME Save button below to avoid two Save buttons
                 on one card. Hidden entirely when the AI feature is
                 globally disabled (no provider configured), since
                 there's nothing to opt out of in that state. -->
            <template x-if="aiSidebarSurfaceEnabled()">
              <div>
                <hr class="border-[var(--border)] my-4">
                <div class="flex items-center gap-2 mb-3">
                  <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sparkles"/>
                  </svg>
                  <h3 class="font-semibold fs-md" x-text="t('settings.ai_prefs.title')"></h3>
                </div>
                <label class="flex items-center gap-2 fs-sm">
                  <input type="checkbox" x-model="aiSidebarLauncherHiddenDraft">
                  <span x-text="t('topbar_widgets.hide_ai_launcher')"></span>
                </label>
                <p x-show="aiSidebarLauncherHiddenDraft"
                   class="fs-3xs text-[var(--text-faint)] mt-1 ms-6"
                   x-text="t('topbar_widgets.hide_ai_launcher_hint')"></p>
              </div>
            </template>
            <!-- Save button — toggling the checkboxes / typing in the
                 lat/lon/label fields ONLY marks the form dirty. Save
                 commits to localStorage AND syncs to /api/me/ui-prefs
                 for cross-device persistence. Same dirty-pattern as
                 the rest of the admin tabs (Profile / Apprise / OIDC
                 / etc.) — amber ring + "Unsaved" indicator while
                 dirty, both clear after save. The Save button covers
                 BOTH the topbar widgets above AND the AI preferences
                 sub-section — all fields ride one dirty-tracker
                 (`headerPrefsDirty`) and one save handler. -->
            <div class="pt-2 border-t border-[var(--border)] mt-3 flex items-center gap-3 flex-wrap">
              <button type="button"
                      @click="saveHeaderPrefs()"
                      :class="headerPrefsDirty() ? 'ring-2 ring-[var(--warning)]' : ''"
                      class="btn btn-primary fs-sm"
                      x-text="t('topbar_widgets.save')"></button>
              <span x-show="headerPrefsDirty()"
                    class="fs-xs text-[var(--warning)] flex items-center gap-1.5"
                    :title="t('common.unsaved_title')">
                <span class="w-1.5 h-1.5 rounded-full bg-[var(--warning)] animate-pulse"></span>
                <span class="unsaved-flash" x-text="t('hosts_actions.unsaved_label')"></span>
              </span>
            </div>
          </div>
        </section>

      </div>

      <!-- ===== SECURITY section — settings-sidebar peer of
           Profile / Notifications / Ignore list / Language. Hosts the
           change-password card AND the TOTP / 2FA enrolment card; the
           Profile grid stays focused on identity (display name / email
           / bio / topbar widgets / appearance). The two cards moved
           verbatim from the Profile grid; bindings unchanged. -->
