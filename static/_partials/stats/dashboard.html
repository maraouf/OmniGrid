<!--suppress HtmlUnknownAttribute, HtmlUnknownTag -->
<div x-show="statsTab==='dashboard'" class="space-y-4">
  <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md overflow-hidden"
           :aria-busy="(_loadBusy.stats_overview === true || !statsOverviewLoaded || !statsSummaryLoaded) ? 'true' : 'false'">
    <div class="p-5 border-b border-[var(--border)] flex justify-between items-center">
      <div>
        <div class="flex items-center gap-2 mb-2">
          <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-layout-dashboard"/>
          </svg>
          <h3 class="font-semibold fs-md" x-text="t('stats.dashboard.title')"></h3>
        </div>
        <p class="fs-xs text-[var(--text-faint)]" x-text="t('stats.dashboard.hint')"></p>
      </div>
      <!-- Reload via the shared og-reload-button component — single source
           of truth for text / icon / spinner / busy wiring. stats_overview
           is pre-declared in app-admin.js _loadBusy. Reloads BOTH the
           overview blob AND the summary cards. -->
      <div x-data="{ rbKey: 'stats_overview', rbOnClick: () => _runWithBusy('stats_overview', () => loadStatsOverview()) }">
        <!-- INCLUDE: _components/og-reload-button.html -->
      </div>
    </div>
    <!-- The grid renders IMMEDIATELY — no full-section loading gate. Each
         card paints its icon + title at once and shows an in-card skeleton
         (.stats-card-skel) until ITS data source has loaded, so a slow
         fetch (e.g. the COUNT-scan-backed summary cards) never blocks the
         rest of the grid from painting. Overview cards gate on
         statsOverviewLoaded; the seven summary cards (db size, samplers,
         total samples, incidents, network, AI cost, AI jobs) gate on
         statsSummaryLoaded (loaded in parallel from a separate endpoint). -->
    <div class="p-5 stats-card-grid">

      <!-- Users -->
      <button type="button"
              @click="view='admin'; openAdminTab('users')"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_sub', {
                              label: t('stats.cards.users.label'),
                              sub: t('stats.cards.users.sub', {
                                active:   (statsOverview.users && statsOverview.users.active) || 0,
                                disabled: Math.max(0, ((statsOverview.users && statsOverview.users.total) || 0) - ((statsOverview.users && statsOverview.users.active) || 0)),
                                admins:   (statsOverview.users && statsOverview.users.admins) || 0
                              }).replace(/ · /g, ', ')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-users"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.users.label')"></div>
          <div class="stats-card-skel" x-show="!statsOverviewLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <!-- Operator-flagged: render as `active/total` slash-
               format (same shape as Hosts / Schedules tiles) so
               the disabled count is visible at a glance instead
               of buried in the sub line. Sub now carries the
               admin-count tail only. -->
          <div class="stats-card-value" x-show="statsOverviewLoaded"
               x-text="((statsOverview.users && statsOverview.users.active) || 0) + '/' + ((statsOverview.users && statsOverview.users.total) || 0)"></div>
          <!-- Sub-line mirrors Providers' "{enabled} enabled · {disabled} disabled"
               pattern so the operator reads the slash-format value's
               decomposition at a glance (e.g. "2/3" → "2 active · 1 disabled · 1 admin"). -->
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsOverviewLoaded"
               x-text="t('stats.cards.users.sub', {
                       active: (statsOverview.users && statsOverview.users.active) || 0,
                       disabled: Math.max(0, ((statsOverview.users && statsOverview.users.total) || 0) - ((statsOverview.users && statsOverview.users.active) || 0)),
                       admins: (statsOverview.users && statsOverview.users.admins) || 0
                     })"></div>
        </div>
      </button>

      <!-- Sessions -->
      <button type="button"
              @click="view='admin'; openAdminTab('sessions')"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.sessions.label'),
                              value: ((statsOverview.sessions && statsOverview.sessions.total) || 0),
                              sub: t('stats.cards.sessions.sub')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-id-card"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.sessions.label')"></div>
          <div class="stats-card-skel" x-show="!statsOverviewLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsOverviewLoaded" x-text="(statsOverview.sessions && statsOverview.sessions.total) || 0"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsOverviewLoaded" x-text="t('stats.cards.sessions.sub')"></div>
        </div>
      </button>

      <!-- Providers (enabled / disabled split) -->
      <button type="button"
              @click="view='admin'; openAdminTab('providers')"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_sub', {
                              label: t('stats.cards.providers.label'),
                              sub: t('stats.cards.providers.sub', {
                                enabled:  ((statsOverview.providers && statsOverview.providers.enabled)  || []).length,
                                disabled: ((statsOverview.providers && statsOverview.providers.disabled) || []).length
                              }).replace(/ · /g, ', ')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-cpu"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.providers.label')"></div>
          <div class="stats-card-skel" x-show="!statsOverviewLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsOverviewLoaded" x-text="((statsOverview.providers && statsOverview.providers.enabled) || []).length + ' / ' + ((statsOverview.providers && statsOverview.providers.total) || 0)"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsOverviewLoaded"
               x-text="t('stats.cards.providers.sub', {
                       enabled: ((statsOverview.providers && statsOverview.providers.enabled) || []).length,
                       disabled: ((statsOverview.providers && statsOverview.providers.disabled) || []).length
                     })"></div>
          <div class="flex flex-wrap gap-1 mt-1.5" x-show="statsOverviewLoaded">
            <template x-for="p in ((statsOverview.providers && statsOverview.providers.enabled) || [])" :key="'on:'+p">
              <span class="chip pill-ok fs-3xs" x-text="p"></span>
            </template>
            <template x-for="p in ((statsOverview.providers && statsOverview.providers.disabled) || [])" :key="'off:'+p">
              <span class="chip pill-muted fs-3xs" x-text="p"></span>
            </template>
          </div>
        </div>
      </button>

      <!-- Hosts -->
      <button type="button"
              @click="view='admin'; openAdminTab('hosts')"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.hosts.label'),
                              value: ((statsOverview.hosts && statsOverview.hosts.total) || 0),
                              sub: t('stats.cards.hosts.sub', {
                                enabled: (statsOverview.hosts && statsOverview.hosts.enabled) || 0
                              })
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-monitor"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.hosts.label')"></div>
          <div class="stats-card-skel" x-show="!statsOverviewLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsOverviewLoaded" x-text="(statsOverview.hosts && statsOverview.hosts.total) || 0"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsOverviewLoaded"
               x-text="t('stats.cards.hosts.sub', {
                       enabled: (statsOverview.hosts && statsOverview.hosts.enabled) || 0
                     })"></div>
        </div>
      </button>

      <!-- Problem hosts — surfaces ONLY when problemHostCount() > 0
           (operators on a healthy fleet don't see the tile). Click jumps to
           the Hosts view AND arms the problem-hosts filter chip so the list
           narrows to the actionable rows in one click. ALWAYS present (with an
           in-card skeleton during load) so the grid card count is identical in
           the loading and loaded states; it turns red + becomes a one-click
           triage filter only when there's something to act on (count > 0),
           otherwise a muted "0". -->
      <button type="button"
              @click="if (problemHostCount() > 0) { view='hosts'; hostsProblemFilter = true; try { sessionStorage.setItem('hostsProblemFilter', '1'); } catch (_) {} }"
              class="stats-card"
              :style="statsOverviewLoaded && problemHostCount() > 0 ? 'border-color: var(--pill-error-br); background: var(--pill-error-bg);' : ''"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.problem_hosts.label'),
                              value: problemHostCount(),
                              sub: t('stats.cards.problem_hosts.sub')
                            })">
        <div class="stats-card-icon"
             :style="statsOverviewLoaded && problemHostCount() > 0 ? 'color: var(--pill-error-fg);' : ''">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-alert-triangle"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.problem_hosts.label')"></div>
          <div class="stats-card-skel" x-show="!statsOverviewLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsOverviewLoaded" x-text="problemHostCount()"></div>
          <div class="stats-card-sub fs-3xs" x-show="statsOverviewLoaded" x-text="t('stats.cards.problem_hosts.sub')"></div>
        </div>
      </button>

      <!-- Host groups -->
      <button type="button"
              @click="view='admin'; openAdminTab('host_groups')"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.host_groups.label'),
                              value: ((statsOverview.host_groups && statsOverview.host_groups.total) || 0),
                              sub: t('stats.cards.host_groups.sub')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-folder"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.host_groups.label')"></div>
          <div class="stats-card-skel" x-show="!statsOverviewLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsOverviewLoaded" x-text="(statsOverview.host_groups && statsOverview.host_groups.total) || 0"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsOverviewLoaded" x-text="t('stats.cards.host_groups.sub')"></div>
        </div>
      </button>

      <!-- Assets -->
      <button type="button"
              @click="view='admin'; openAdminTab('assets')"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.assets.label'),
                              value: ((statsOverview.assets && statsOverview.assets.total) || 0),
                              sub: t('stats.cards.assets.sub')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-package"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.assets.label')"></div>
          <div class="stats-card-skel" x-show="!statsOverviewLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsOverviewLoaded" x-text="(statsOverview.assets && statsOverview.assets.total) || 0"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsOverviewLoaded" x-text="t('stats.cards.assets.sub')"></div>
        </div>
      </button>

      <!-- Nodes -->
      <button type="button"
              @click="view='nodes'"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.nodes.label'),
                              value: ((statsOverview.nodes && statsOverview.nodes.total) || 0),
                              sub: t('stats.cards.nodes.sub')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-server"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.nodes.label')"></div>
          <div class="stats-card-skel" x-show="!statsOverviewLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsOverviewLoaded" x-text="(statsOverview.nodes && statsOverview.nodes.total) || 0"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsOverviewLoaded" x-text="t('stats.cards.nodes.sub')"></div>
        </div>
      </button>

      <!-- Stacks -->
      <button type="button"
              @click="view='stacks'"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.stacks.label'),
                              value: ((statsOverview.stacks && statsOverview.stacks.total) || 0),
                              sub: t('stats.cards.stacks.sub')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-layers"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.stacks.label')"></div>
          <div class="stats-card-skel" x-show="!statsOverviewLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsOverviewLoaded" x-text="(statsOverview.stacks && statsOverview.stacks.total) || 0"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsOverviewLoaded" x-text="t('stats.cards.stacks.sub')"></div>
        </div>
      </button>

      <!-- Services -->
      <button type="button"
              @click="view='services'"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.services.label'),
                              value: ((statsOverview.services && statsOverview.services.total) || 0),
                              sub: t('stats.cards.services.sub')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-box"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.services.label')"></div>
          <div class="stats-card-skel" x-show="!statsOverviewLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsOverviewLoaded" x-text="(statsOverview.services && statsOverview.services.total) || 0"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsOverviewLoaded" x-text="t('stats.cards.services.sub')"></div>
        </div>
      </button>

      <!-- Containers (replicas of services + standalone containers) -->
      <button type="button"
              @click="view='stacks'"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.containers.label'),
                              value: ((statsOverview.containers && statsOverview.containers.total) || 0),
                              sub: t('stats.cards.containers.sub', {
                                replicas: (statsOverview.containers && statsOverview.containers.replicas) || 0,
                                standalone: (statsOverview.containers && statsOverview.containers.standalone) || 0
                              }).replace(/ · /g, ', ')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-terminal"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.containers.label')"></div>
          <div class="stats-card-skel" x-show="!statsOverviewLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsOverviewLoaded" x-text="(statsOverview.containers && statsOverview.containers.total) || 0"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsOverviewLoaded"
               x-text="t('stats.cards.containers.sub', {
                       replicas: (statsOverview.containers && statsOverview.containers.replicas) || 0,
                       standalone: (statsOverview.containers && statsOverview.containers.standalone) || 0
                     })"></div>
        </div>
      </button>

      <!-- Schedules -->
      <button type="button"
              @click="view='admin'; openAdminTab('schedules')"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.schedules.label'),
                              value: (((statsOverview.schedules && statsOverview.schedules.enabled) || 0) + '/' + ((statsOverview.schedules && statsOverview.schedules.total) || 0)),
                              sub: t('stats.cards.schedules.sub', {
                                enabled: (statsOverview.schedules && statsOverview.schedules.enabled) || 0,
                                disabled: Math.max(0, ((statsOverview.schedules && statsOverview.schedules.total) || 0) - ((statsOverview.schedules && statsOverview.schedules.enabled) || 0))
                              }).replace(/ · /g, ', ')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-calendar"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.schedules.label')"></div>
          <div class="stats-card-skel" x-show="!statsOverviewLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <!-- Operator-flagged: render as `enabled/total` slash-
               format so the disabled count is visible at a
               glance (e.g. `7/7` when every schedule is
               enabled). Sub-line carries the descriptive
               "cron-style background jobs" tail only. -->
          <div class="stats-card-value" x-show="statsOverviewLoaded"
               x-text="((statsOverview.schedules && statsOverview.schedules.enabled) || 0) + '/' + ((statsOverview.schedules && statsOverview.schedules.total) || 0)"></div>
          <!-- Sub-line mirrors Providers' "{enabled} enabled · {disabled} disabled"
               pattern so the operator reads the slash-format value's
               decomposition at a glance (e.g. "7/7" → "7 enabled · 0 disabled"). -->
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsOverviewLoaded"
               x-text="t('stats.cards.schedules.sub', {
                       enabled: (statsOverview.schedules && statsOverview.schedules.enabled) || 0,
                       disabled: Math.max(0, ((statsOverview.schedules && statsOverview.schedules.total) || 0) - ((statsOverview.schedules && statsOverview.schedules.enabled) || 0))
                     })"></div>
        </div>
      </button>

      <!-- Backups -->
      <button type="button"
              @click="view='admin'; openAdminTab('backups')"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.backups.label'),
                              value: ((statsOverview.backups && statsOverview.backups.total) || 0),
                              sub: t('stats.cards.backups.sub')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-archive"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.backups.label')"></div>
          <div class="stats-card-skel" x-show="!statsOverviewLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsOverviewLoaded" x-text="(statsOverview.backups && statsOverview.backups.total) || 0"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsOverviewLoaded" x-text="t('stats.cards.backups.sub')"></div>
        </div>
      </button>

      <!-- Config backups -->
      <button type="button"
              @click="view='admin'; openAdminTab('config_backup')"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.config_backups.label'),
                              value: ((statsOverview.config_backups && statsOverview.config_backups.total) || 0),
                              sub: t('stats.cards.config_backups.sub')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-save"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.config_backups.label')"></div>
          <div class="stats-card-skel" x-show="!statsOverviewLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsOverviewLoaded" x-text="(statsOverview.config_backups && statsOverview.config_backups.total) || 0"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsOverviewLoaded" x-text="t('stats.cards.config_backups.sub')"></div>
        </div>
      </button>

      <!-- Apps (cross-host instance roll-up). Tile reads the
           statsOverview.apps block populated by api_admin_stats_overview
           → service_catalog.list_apps(). `value` shows up/total
           instances; sub-text shows breakdown across apps + templates
           + degraded/down counts. Card click navigates to the
           top-level Apps view so the operator can drill in.  -->
      <button type="button"
              @click="view='apps'"
              class="stats-card"
              :aria-label="t('stats.cards.apps.aria_label', {
                              up: (statsOverview.apps && statsOverview.apps.apps_up) || 0,
                              total: (statsOverview.apps && statsOverview.apps.apps) || 0,
                              apps: (statsOverview.apps && statsOverview.apps.apps) || 0,
                              templates: (statsOverview.apps && statsOverview.apps.templates) || 0
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-grid"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.apps.label') || 'Apps'"></div>
          <div class="stats-card-skel" x-show="!statsOverviewLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <!-- App-GROUP-level health (matches the Apps page + the top-bar
               badge): apps_up / total apps. The instance count + the
               degraded / down app counts move to the sub. -->
          <div class="stats-card-value" x-show="statsOverviewLoaded"
               x-text="((statsOverview.apps && statsOverview.apps.apps_up) || 0) + ' / ' + ((statsOverview.apps && statsOverview.apps.apps) || 0)"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsOverviewLoaded"
               x-text="t('stats.cards.apps.sub', {
                         instances: (statsOverview.apps && statsOverview.apps.instances) || 0,
                         templates: (statsOverview.apps && statsOverview.apps.templates) || 0,
                         degraded: (statsOverview.apps && statsOverview.apps.apps_degraded) || 0,
                         down: (statsOverview.apps && statsOverview.apps.apps_down) || 0
                       }) || (((statsOverview.apps && statsOverview.apps.instances) || 0) + ' instances · ' + ((statsOverview.apps && statsOverview.apps.apps_degraded) || 0) + ' degraded · ' + ((statsOverview.apps && statsOverview.apps.apps_down) || 0) + ' down')"></div>
        </div>
      </button>

      <!-- Apps with extras — how many pinned apps have a per-app module
           (rich expanded card: Radarr / Sonarr / Seerr / Bazarr / APC /
           Speedtest / AdGuard / Pi-hole) and how many are currently active
           (≥1 instance up). Reads statsOverview.apps.extras /
           .extras_active. Click navigates to the Apps view. -->
      <button type="button"
              @click="view='apps'"
              class="stats-card"
              :aria-label="t('stats.cards.apps_extras.aria_label', {
                              active: (statsOverview.apps && statsOverview.apps.extras_active) || 0,
                              total: (statsOverview.apps && statsOverview.apps.extras) || 0
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-tag"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.apps_extras.label') || 'Apps with extras'"></div>
          <div class="stats-card-skel" x-show="!statsOverviewLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsOverviewLoaded"
               x-text="((statsOverview.apps && statsOverview.apps.extras_active) || 0) + ' / ' + ((statsOverview.apps && statsOverview.apps.extras) || 0)"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsOverviewLoaded"
               x-text="t('stats.cards.apps_extras.sub', {
                         active: (statsOverview.apps && statsOverview.apps.extras_active) || 0,
                         total: (statsOverview.apps && statsOverview.apps.extras) || 0
                       }) || ('active: ' + ((statsOverview.apps && statsOverview.apps.extras_active) || 0))"></div>
        </div>
      </button>

      <!-- Tunables -->
      <button type="button"
              @click="view='admin'; openAdminTab('config')"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.tunables.label'),
                              value: ((statsOverview.tunables && statsOverview.tunables.total) || 0),
                              sub: t('stats.cards.tunables.sub', {
                                overridden: (statsOverview.tunables && statsOverview.tunables.overridden) || 0
                              })
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sliders"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.tunables.label')"></div>
          <div class="stats-card-skel" x-show="!statsOverviewLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsOverviewLoaded" x-text="(statsOverview.tunables && statsOverview.tunables.total) || 0"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsOverviewLoaded"
               x-text="t('stats.cards.tunables.sub', {
                       overridden: (statsOverview.tunables && statsOverview.tunables.overridden) || 0
                     })"></div>
        </div>
      </button>

      <!-- ============================================================
           Summary cards — headline number lifted from each deeper
           Stats sub-page so the dashboard gives a one-glance read on
           everything. Loaded from /api/admin/stats/summary (separate
           from the overview fetch; the total-samples figure is a
           COUNT scan so it's cached 60s server-side). Each shows an
           in-card skeleton until statsSummaryLoaded — independent of
           the overview cards above.
           ============================================================ -->

      <!-- Database size -->
      <button type="button"
              @click="openStatsTab('database')"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.db_size.label'),
                              value: fmtBytes(statsSummary.db_size_bytes),
                              sub: t('stats.cards.db_size.sub')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-database"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.db_size.label')"></div>
          <div class="stats-card-skel" x-show="!statsSummaryLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsSummaryLoaded" x-text="fmtBytes(statsSummary.db_size_bytes)"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsSummaryLoaded" x-text="t('stats.cards.db_size.sub')"></div>
        </div>
      </button>

      <!-- Samplers — how many sample-bearing tables are actively persisting
           rows (active) out of the full roster (total). Sits before Total
           samples; click opens the Samplers tab. -->
      <button type="button"
              @click="openStatsTab('samplers')"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.samplers.label') || 'Samplers',
                              value: (((statsSummary.samplers || 0)) + ' / ' + ((statsSummary.samplers_total || 0))),
                              sub: t('stats.cards.samplers.sub') || 'active sampler tables'
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-loader"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.samplers.label') || 'Samplers'"></div>
          <div class="stats-card-skel" x-show="!statsSummaryLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsSummaryLoaded"
               x-text="((statsSummary.samplers || 0)) + ' / ' + ((statsSummary.samplers_total || 0))"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsSummaryLoaded"
               x-text="t('stats.cards.samplers.sub') || 'active sampler tables'"></div>
        </div>
      </button>

      <!-- Total samples (across every sample-bearing table) -->
      <button type="button"
              @click="openStatsTab('samples')"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.total_samples.label'),
                              value: ((statsSummary.total_samples || 0).toLocaleString()),
                              sub: t('stats.cards.total_samples.sub')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-layers"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.total_samples.label')"></div>
          <div class="stats-card-skel" x-show="!statsSummaryLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsSummaryLoaded" x-text="(statsSummary.total_samples || 0).toLocaleString()"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsSummaryLoaded" x-text="t('stats.cards.total_samples.sub')"></div>
        </div>
      </button>

      <!-- Incidents (last 30 days) -->
      <button type="button"
              @click="openStatsTab('incidents')"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.incidents.label'),
                              value: ((statsSummary.incidents_30d || 0).toLocaleString()),
                              sub: t('stats.cards.incidents.sub')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-bug"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.incidents.label')"></div>
          <div class="stats-card-skel" x-show="!statsSummaryLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsSummaryLoaded" x-text="(statsSummary.incidents_30d || 0).toLocaleString()"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsSummaryLoaded" x-text="t('stats.cards.incidents.sub')"></div>
        </div>
      </button>

      <!-- Network traffic (combined RX+TX, last 30 days) -->
      <button type="button"
              @click="openStatsTab('network')"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.network.label'),
                              value: fmtBytes(statsSummary.network_30d_bytes),
                              sub: t('stats.cards.network.sub')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-activity"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.network.label')"></div>
          <div class="stats-card-skel" x-show="!statsSummaryLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsSummaryLoaded" x-text="fmtBytes(statsSummary.network_30d_bytes)"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsSummaryLoaded" x-text="t('stats.cards.network.sub')"></div>
        </div>
      </button>

      <!-- AI cost (last 30 days) -->
      <button type="button"
              @click="openStatsTab('ai_cost')"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.ai_cost.label'),
                              value: ('$' + (statsSummary.ai_cost_30d || 0).toFixed(2)),
                              sub: t('stats.cards.ai_cost.sub')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-zap"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.ai_cost.label')"></div>
          <div class="stats-card-skel" x-show="!statsSummaryLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsSummaryLoaded" x-text="'$' + (statsSummary.ai_cost_30d || 0).toFixed(2)"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsSummaryLoaded" x-text="t('stats.cards.ai_cost.sub')"></div>
        </div>
      </button>

      <!-- AI jobs (last 30 days) -->
      <button type="button"
              @click="openStatsTab('ai_cost')"
              class="stats-card"
              :aria-label="t('stats.cards.aria_label_value_sub', {
                              label: t('stats.cards.ai_jobs.label'),
                              value: ((statsSummary.ai_jobs_30d || 0).toLocaleString()),
                              sub: t('stats.cards.ai_jobs.sub')
                            })">
        <div class="stats-card-icon">
          <svg width="20" height="20" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-message-circle"/>
          </svg>
        </div>
        <div class="stats-card-body">
          <div class="stats-card-label" x-text="t('stats.cards.ai_jobs.label')"></div>
          <div class="stats-card-skel" x-show="!statsSummaryLoaded" aria-hidden="true">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell short"></div>
          </div>
          <div class="stats-card-value" x-show="statsSummaryLoaded" x-text="(statsSummary.ai_jobs_30d || 0).toLocaleString()"></div>
          <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-show="statsSummaryLoaded" x-text="t('stats.cards.ai_jobs.sub')"></div>
        </div>
      </button>

    </div>
  </section>
</div>
