      <div x-show="statsTab==='samples'" class="space-y-4">
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md overflow-hidden">
          <div class="p-5 border-b border-[var(--border)] flex justify-between items-center">
            <div>
              <div class="flex items-center gap-2 mb-2">
                <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-layers"/></svg>
                <h3 class="font-semibold fs-md" x-text="t('stats.samples.title')"></h3>
              </div>
              <p class="fs-xs text-[var(--text-faint)]" x-text="t('stats.samples.hint')"></p>
            </div>
            <button type="button"
                    @click="_runWithBusy('stats_samples', () => loadStatsSamples())"
                    :disabled="_loadBusy.stats_samples === true"
                    :title="t('actions.reload')"
                    :aria-label="t('actions.reload')"
                    class="btn btn-ghost fs-xs inline-flex items-center gap-1.5">
              <svg width="13" height="13" :class="_loadBusy.stats_samples === true ? 'spin-md' : ''" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-cw"/>
              </svg>
              <span x-text="t('actions.reload')"></span>
            </button>
          </div>

          <div x-show="!statsSamplesLoaded" class="loading-state">
            <span class="spin-lg" aria-hidden="true"></span>
            <span x-text="t('loading.section')"></span>
          </div>

          <div x-show="statsSamplesLoaded" class="p-5 space-y-5">

            <!-- Grand total card -->
            <div class="stats-card" style="cursor:default">
              <div class="stats-card-icon">
                <svg width="20" height="20" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-layers"/></svg>
              </div>
              <div class="stats-card-body">
                <div class="stats-card-label" x-text="t('stats.samples.grand_total.label')"></div>
                <div class="stats-card-value mono" x-text="Number((statsSamples.grand_total || 0)).toLocaleString()"></div>
                <div class="stats-card-sub fs-3xs text-[var(--text-faint)]" x-text="t('stats.samples.grand_total.sub', { count: (statsSamples.tables || []).length })"></div>
              </div>
            </div>

            <hr class="border-[var(--border)] my-2">

            <!-- Per-table breakdown — sorted client-side by rows desc
                 for at-a-glance "which sample family writes most". -->
            <div>
              <h4 class="font-semibold fs-sm mb-2" x-text="t('stats.samples.tables.title')"></h4>
              <p class="fs-xs text-[var(--text-faint)] mb-2" x-text="t('stats.samples.tables.hint')"></p>
              <div class="overflow-x-auto scrollbar">
                <table class="w-full fs-sm">
                  <thead class="bg-[var(--surface-2)] fs-2xs uppercase tracking-wider text-[var(--text-faint)]">
                    <tr>
                      <th class="text-start px-4 py-2" x-text="t('stats.samples.tables.col_provider')"></th>
                      <th class="text-start px-4 py-2" x-text="t('stats.samples.tables.col_name')"></th>
                      <th class="text-start px-4 py-2" x-text="t('stats.samples.tables.col_kind')"></th>
                      <th class="text-end px-4 py-2" x-text="t('stats.samples.tables.col_rows')"></th>
                      <th class="text-end px-4 py-2" x-text="t('stats.samples.tables.col_hosts')"></th>
                      <th class="text-start px-4 py-2" x-text="t('stats.samples.tables.col_oldest')"></th>
                      <th class="text-start px-4 py-2" x-text="t('stats.samples.tables.col_newest')"></th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="row in ((statsSamples.tables || []).slice().sort((a, b) => (b.rows || 0) - (a.rows || 0)))" :key="row.name">
                      <!-- Whole-row click opens the per-provider
                           drill-down modal. Error rows + zero-row
                           rows skip the open (no useful detail to
                           render). `cursor: pointer` only when the
                           row is openable so the affordance is
                           honest. -->
                      <tr class="border-t border-[var(--border)] hover:bg-[var(--surface-2)] transition"
                          :class="row.error ? 'opacity-60 cursor-default' : (Number(row.rows || 0) > 0 ? 'cursor-pointer' : 'cursor-default')"
                          @click="if (!row.error && Number(row.rows || 0) > 0) openStatsSamplesDrillDown(row)"
                          :title="(!row.error && Number(row.rows || 0) > 0) ? t('stats.samples.drill_down.open_title') : ''">
                        <td class="px-4 py-2 mono fs-xs">
                          <span class="chip pill-custom fs-3xs uppercase"
                                :style="providerChipStyle(row.provider)"
                                x-text="row.provider"></span>
                        </td>
                        <td class="px-4 py-2 mono" x-text="row.name"></td>
                        <td class="px-4 py-2 fs-xs text-[var(--text-dim)]" x-text="row.kind"></td>
                        <td class="px-4 py-2 mono text-end font-semibold" x-text="Number(row.rows || 0).toLocaleString()"></td>
                        <td class="px-4 py-2 mono text-end" x-text="row.unique_hosts != null ? Number(row.unique_hosts).toLocaleString() : '—'"></td>
                        <td class="px-4 py-2 mono fs-xs text-[var(--text-dim)]"
                            :title="row.oldest_ts ? fmtDate(row.oldest_ts) : ''"
                            x-text="row.oldest_ts ? fmtDate(row.oldest_ts) : '—'"></td>
                        <td class="px-4 py-2 mono fs-xs text-[var(--text-dim)]"
                            :title="row.newest_ts ? fmtDate(row.newest_ts) : ''"
                            x-text="row.newest_ts ? fmtDate(row.newest_ts) : '—'"></td>
                      </tr>
                    </template>
                    <tr x-show="!(statsSamples.tables || []).length">
                      <td colspan="7" class="text-center py-6 text-[var(--text-faint)]" x-text="t('stats.samples.tables.empty')"></td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

            <hr class="border-[var(--border)] my-2">

            <!-- Samples-written chart — sums every sample-bearing
                 table's rows per bucket over the operator-selected
                 range. Backend (`/api/admin/stats/samples?range=X`)
                 returns `bucket_totals: [{date, total}, ...]` already
                 sorted ASC, ZERO-FILLED for missing buckets so the
                 chart shows a contiguous timeline. SVG-based with
                 proper x + y axis labels (operator-flagged the prior
                 CSS bar chart for missing axis values). Per-section
                 range picker (1h / 24h / 7d / 30d / 90d) — the rest
                 of the Samples tab stays all-time. -->
            <div>
              <div class="flex items-center justify-between gap-2 mb-2 flex-wrap">
                <h4 class="font-semibold fs-sm" x-text="t('stats.samples.daily_chart.title')"></h4>
                <!-- Range picker — same segmented control pattern as
                     the Incidents window picker at the top of the
                     stats page. Click reloads the chart with the new
                     bucket size; the Samples table sections above
                     don't refetch. -->
                <div class="flex items-center gap-2">
                  <div class="flex items-center gap-0 bg-[var(--surface-2)] rounded-md p-0.5 border border-[var(--border)]"
                       role="group"
                       :aria-label="t('stats.samples.daily_chart.range_label')">
                    <template x-for="opt in ['1h', '24h', '7d', '30d', '90d']" :key="opt">
                      <!-- Range click routes through `_runWithBusy` so
                           the inline spinner below + the section's
                           Reload button both reflect the in-flight
                           refetch. Without the busy gate the chips
                           feel inert when the network is slow. -->
                      <button type="button"
                              @click="_runWithBusy('stats_samples', () => loadStatsSamples(opt))"
                              :disabled="_loadBusy.stats_samples === true"
                              :class="(statsSamples.range || statsSamplesRange) === opt ? 'bg-[var(--primary)] text-white' : 'text-[var(--text-dim)] hover:text-[var(--text)]'"
                              class="px-2 py-0.5 rounded fs-xs font-medium transition"
                              x-text="opt"></button>
                    </template>
                  </div>
                  <!-- Inline spinner — same `spin-md` glyph as the
                       Reload button at the section header so operators
                       get visual feedback as soon as a chip is clicked,
                       even before the chart re-renders. -->
                  <svg x-show="_loadBusy.stats_samples === true"
                       width="13" height="13" class="spin-md text-[var(--text-dim)]" aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-cw"/>
                  </svg>
                </div>
              </div>
              <p class="fs-xs text-[var(--text-faint)] mb-3" x-text="t('stats.samples.daily_chart.hint')"></p>

              <div x-show="!(statsSamples.bucket_totals || statsSamples.daily_totals || []).length"
                   class="text-center py-8 fs-sm text-[var(--text-faint)] italic"
                   x-text="t('stats.samples.daily_chart.empty')"></div>

              <div x-show="(statsSamples.bucket_totals || statsSamples.daily_totals || []).length"
                   :class="_loadBusy.stats_samples === true ? 'chart-loading' : ''"
                   class="bg-[var(--bg)] border border-[var(--border)] rounded-md p-3">
                <!-- SVG bar chart with proper x + y axes. See
                     `_renderSamplesBucketChart()` in static/js/app.js
                     for the full renderer. The container's
                     `x-html` re-evaluates whenever statsSamples
                     changes, so the range-picker click → loadStatsSamples
                     → response → redraw cycle is implicit. -->
                <div x-html="_renderSamplesBucketChart(statsSamples.bucket_totals || statsSamples.daily_totals || [], statsSamples.range || statsSamplesRange)"></div>
                <div class="flex justify-between items-center mt-2 fs-2xs text-[var(--text-dim)]">
                  <span x-text="t('stats.samples.daily_chart.legend_total', { n: Number((statsSamples.bucket_totals || statsSamples.daily_totals || []).reduce((a, d) => a + (d.total || 0), 0)).toLocaleString() })"></span>
                  <span x-text="t('stats.samples.daily_chart.legend_days', { n: (statsSamples.bucket_totals || statsSamples.daily_totals || []).length })"></span>
                </div>
              </div>
            </div>

            <hr class="border-[var(--border)] my-2">

            <!-- Errors block — surfaces tables that couldn't be queried.
                 Usually means the schema didn't ship them yet (fresh
                 deploy, sampler never ran). Hidden when empty. -->
            <div x-show="(statsSamples.errors || []).length"
                 class="rounded-md p-3 fs-xs bg-[var(--pill-warning-bg)] text-[var(--pill-warning-fg)] border border-[var(--pill-warning-br)]">
              <div class="font-semibold mb-1" x-text="t('stats.samples.errors.title')"></div>
              <ul class="mono space-y-0.5">
                <template x-for="e in (statsSamples.errors || [])" :key="e.table">
                  <li><span x-text="e.table"></span>: <span class="text-[var(--text-faint)]" x-text="e.error"></span></li>
                </template>
              </ul>
            </div>

          </div>
        </section>

        <!-- Per-provider drill-down modal. Opens on row click in the
             per-table breakdown above; lists every host's row count
             for the picked sample-bearing table sorted DESC. Footer
             total cross-checks against the outer per-table count
             (operator-flagged: "make sure the total count matches on
             both, sum of all hosts displayed in popup is equal the
             outside number"). Click backdrop / Esc / ✕ to close. -->
        <div x-show="statsSamplesDrillDown.open"
             class="fixed inset-0 z-50 flex items-center justify-center p-4"
             style="background: var(--backdrop)"
             @click.self="closeStatsSamplesDrillDown()"
             @keydown.escape.window="if (statsSamplesDrillDown.open) closeStatsSamplesDrillDown()"
             x-cloak>
          <div class="bg-[var(--surface)] border border-[var(--border)] rounded-md shadow-lg w-full max-w-2xl max-h-[80vh] flex flex-col">
            <!-- Header -->
            <div class="p-4 border-b border-[var(--border)] flex justify-between items-center gap-3">
              <div class="min-w-0">
                <h3 class="font-semibold fs-md truncate"
                    x-text="t('stats.samples.drill_down.title', { label: statsSamplesDrillDown.label })"></h3>
                <p class="fs-2xs text-[var(--text-faint)] mt-1"
                   x-text="t('stats.samples.drill_down.hint')"></p>
              </div>
              <button type="button"
                      class="user-action-btn"
                      @click="closeStatsSamplesDrillDown()"
                      :title="t('actions.close')"
                      :aria-label="t('actions.close')">
                <svg width="14" height="14" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-x"/>
                </svg>
              </button>
            </div>

            <!-- Loading state -->
            <div x-show="statsSamplesDrillDown.loading" class="loading-state">
              <span class="spin-lg" aria-hidden="true"></span>
              <span x-text="t('loading.section')"></span>
            </div>

            <!-- Error banner -->
            <div x-show="!statsSamplesDrillDown.loading && statsSamplesDrillDown.error"
                 class="m-4 rounded-md p-3 fs-xs bg-[var(--pill-error-bg)] text-[var(--pill-error-fg)] border border-[var(--pill-error-br)]"
                 x-text="statsSamplesDrillDown.error"></div>

            <!-- Body — per-host rows (sorted DESC server-side). -->
            <div x-show="!statsSamplesDrillDown.loading && !statsSamplesDrillDown.error"
                 class="flex-1 overflow-y-auto scrollbar">
              <table class="w-full fs-sm">
                <thead class="bg-[var(--surface-2)] fs-2xs uppercase tracking-wider text-[var(--text-faint)] sticky top-0">
                  <tr>
                    <th class="text-start px-4 py-2" x-text="t('stats.samples.drill_down.col_host')"></th>
                    <th class="text-end px-4 py-2" x-text="t('stats.samples.drill_down.col_rows')"></th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="row in (statsSamplesDrillDown.rows || [])" :key="row.host_id || '<unknown>'">
                    <tr class="border-t border-[var(--border)]">
                      <td class="px-4 py-2 mono fs-xs" x-text="row.host_id || '—'"></td>
                      <td class="px-4 py-2 mono text-end font-semibold" x-text="Number(row.rows || 0).toLocaleString()"></td>
                    </tr>
                  </template>
                  <tr x-show="!(statsSamplesDrillDown.rows || []).length">
                    <td colspan="2" class="text-center py-6 text-[var(--text-faint)]"
                        x-text="t('stats.samples.drill_down.empty')"></td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- Footer — total cross-checks the outer row count. A
                 mismatch is a SQL bug, not an expected divergence. -->
            <div x-show="!statsSamplesDrillDown.loading && !statsSamplesDrillDown.error"
                 class="p-4 border-t border-[var(--border)] flex justify-between items-center fs-xs bg-[var(--surface-2)]">
              <span class="text-[var(--text-dim)]"
                    x-text="t('stats.samples.drill_down.footer_total', { total: Number(statsSamplesDrillDown.total || 0).toLocaleString(), outer: Number(statsSamplesDrillDown.outer || 0).toLocaleString() })"></span>
              <span x-show="Number(statsSamplesDrillDown.total || 0) !== Number(statsSamplesDrillDown.outer || 0)"
                    class="text-[var(--danger)] font-semibold"
                    x-text="t('stats.samples.drill_down.mismatch_warn')"></span>
              <span x-show="Number(statsSamplesDrillDown.total || 0) === Number(statsSamplesDrillDown.outer || 0) && Number(statsSamplesDrillDown.total || 0) > 0"
                    class="text-[var(--success)]"
                    x-text="t('stats.samples.drill_down.match_ok')"></span>
            </div>
          </div>
        </div>
      </div>
