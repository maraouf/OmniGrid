<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Router body -->
  <rect x="10" y="40" width="44" height="16" rx="2" fill="#4c1d95"/>
  <!-- Status LEDs -->
  <circle cx="16" cy="48" r="1.6" fill="#c4b5fd"/>
  <circle cx="22" cy="48" r="1.6" fill="#c4b5fd"/>
  <circle cx="28" cy="48" r="1.6" fill="#c4b5fd"/>
  <!-- Antenna stick -->
  <line x1="32" y1="40" x2="32" y2="20" stroke="#7c3aed" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="32" cy="18" r="2" fill="#7c3aed"/>
  <!-- Signal waves rippling from top of antenna -->
  <path d="M20 22 Q 32 10, 44 22" stroke="#a78bfa" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M14 22 Q 32 4, 50 22"  stroke="#a78bfa" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.65"/>
  <!-- Label -->
  <text x="38" y="52" font-family="sans-serif" font-size="8" font-weight="700" fill="#ffffff">5G</text>
</svg>
