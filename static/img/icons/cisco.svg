<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 140">
  <title>Cisco</title>
  <!-- Traditional Cisco logo — "Golden Gate Bridge" bar glyph above
       the lowercase `cisco` wordmark. Both rendered in Cisco blue
       `#1BA0D7`. The bars form a symmetric arc with three internal
       peaks (Cisco's canonical layout). -->
  <g fill="#1BA0D7">
    <!-- 11-bar pyramid arc, centred on x=160 -->
    <rect x="50"  y="48" width="7" height="20" rx="2"/>
    <rect x="65"  y="38" width="7" height="30" rx="2"/>
    <rect x="80"  y="28" width="7" height="40" rx="2"/>
    <rect x="95"  y="14" width="7" height="54" rx="2"/>
    <rect x="110" y="28" width="7" height="40" rx="2"/>
    <rect x="125" y="38" width="7" height="30" rx="2"/>
    <rect x="140" y="14" width="7" height="54" rx="2"/>
    <rect x="155" y="28" width="7" height="40" rx="2"/>
    <rect x="170" y="38" width="7" height="30" rx="2"/>
    <rect x="185" y="14" width="7" height="54" rx="2"/>
    <rect x="200" y="28" width="7" height="40" rx="2"/>
    <rect x="215" y="38" width="7" height="30" rx="2"/>
    <rect x="230" y="48" width="7" height="20" rx="2"/>
  </g>
  <text x="160" y="125" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-weight="400"
        font-size="46"
        letter-spacing="1.5"
        fill="#1BA0D7">cisco</text>
</svg>