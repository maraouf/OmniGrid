<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96">
  <title>Cisco</title>
  <!-- Stylised "bridge" glyph above the wordmark — seven vertical bars
       of varying heights, evoking a signal-strength / equaliser look
       that's long been a Cisco motif. -->
  <g fill="#049FD9">
    <rect x="30"  y="28" width="5" height="18" rx="1"/>
    <rect x="45"  y="18" width="5" height="28" rx="1"/>
    <rect x="60"  y="6"  width="5" height="40" rx="1"/>
    <rect x="75"  y="18" width="5" height="28" rx="1"/>
    <rect x="90"  y="6"  width="5" height="40" rx="1"/>
    <rect x="105" y="18" width="5" height="28" rx="1"/>
    <rect x="120" y="28" width="5" height="18" rx="1"/>
  </g>
  <text x="160" y="84" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-weight="500"
        font-size="38"
        letter-spacing="1"
        fill="#049FD9">cisco</text>
</svg>