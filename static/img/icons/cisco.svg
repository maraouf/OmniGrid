<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <title>Cisco</title>
  <!-- Iconic Cisco "Golden Gate Bridge" mark — eleven vertical bars
       in a symmetric pyramid arc. More recognisable than the wordmark
       variant at small icon sizes. Classic Cisco blue #1BA0D7. -->
  <g fill="#1BA0D7">
    <rect x="10"  y="56" width="6" height="16" rx="2"/>
    <rect x="22"  y="48" width="6" height="32" rx="2"/>
    <rect x="34"  y="36" width="6" height="56" rx="2"/>
    <rect x="46"  y="24" width="6" height="80" rx="2"/>
    <rect x="58"  y="16" width="6" height="96" rx="2"/>
    <rect x="70"  y="16" width="6" height="96" rx="2"/>
    <rect x="82"  y="24" width="6" height="80" rx="2"/>
    <rect x="94"  y="36" width="6" height="56" rx="2"/>
    <rect x="106" y="48" width="6" height="32" rx="2"/>
    <rect x="118" y="56" width="6" height="16" rx="2"/>
  </g>
</svg>