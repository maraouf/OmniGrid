  <path d="M22 32 C 22 22, 30 18, 40 16" stroke="#fbbf24" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M30 32 C 30 24, 38 22, 48 22" stroke="#ef4444" stroke-width="2.4" fill="none" stroke-linecap="round"/>
