  <rect x="10" y="32" width="44" height="16" rx="2" fill="#1f6feb"/>
  <!-- Status LEDs -->
  <circle cx="16" cy="40" r="1.6" fill="#7cc4ff"/>
  <circle cx="22" cy="40" r="1.6" fill="#7cc4ff"/>
  <circle cx="28" cy="40" r="1.6" fill="#7cc4ff"/>
  <!-- Fiber-optic strands curving up -->
