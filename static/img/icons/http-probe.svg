<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#fb923c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
  <!-- Globe + heartbeat pulse — "web health check" mark. Brand-context
       fill via the stroke colour; mask-image context picks up the
       glyph alpha for the per-provider chip tint. -->
  <circle cx="12" cy="12" r="9"/>
  <path d="M3 12h18"/>
  <path d="M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0 -18"/>
  <!-- Heartbeat pulse on top — small upward beat at left, downward dip,
       central beat, returns to the baseline. Sits along the equator. -->
  <path d="M5 12 l1.5 0 l1 -3 l1.5 6 l1.5 -4 l1 2 l1 0" stroke="#22c55e" stroke-width="1.4"/>
</svg>
