<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- PiVPN — raspberry-red rounded square + lock mark. Dashboard-
       icons doesn't ship a glyph for PiVPN so this is a minimal
       stand-in in the project's branding colours. -->
  <rect width="512" height="512" rx="96" fill="#c51a4a"/>
  <!-- Lock body -->
  <rect x="144" y="224" width="224" height="176" rx="24"
        fill="#ffffff" opacity="0.96"/>
  <!-- Lock shackle -->
  <path d="M200 224 v-48 a56 56 0 0 1 112 0 v48"
        fill="none" stroke="#ffffff" stroke-width="28"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Keyhole -->
  <circle cx="256" cy="296" r="20" fill="#c51a4a"/>
  <rect x="248" y="292" width="16" height="54" rx="6" fill="#c51a4a"/>
</svg>
