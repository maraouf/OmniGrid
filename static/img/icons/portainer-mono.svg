<!-- Mono Portainer mark — same geometry as the brand portainer.svg, but
     both shapes use `currentColor` so the icon picks up the surrounding
     text colour and adapts to dark / light themes via the parent's
     color rule. The accent block keeps a lower opacity so the visual
     hierarchy of the original (letter + accent) is preserved without
     introducing a second tone. Used by the Admin → Portainer header. -->
