<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 225 225" width="225" height="225">
  <title>Reolink</title>
  <!-- Operator-supplied raster logo embedded as base64 — kept inside
       an SVG wrapper so the existing icon resolver (which appends
       `.svg`) finds it without a special-case PNG branch. Replace
       with a vector source if Reolink publishes one. -->
  <image x="0" y="0" width="225" height="225"
         preserveAspectRatio="xMidYMid meet"
         xlink:href="data:image/png;base64,"/>
</svg>
