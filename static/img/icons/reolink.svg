<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 98 138" width="98" height="138">
  <title>Reolink</title>
  <!-- Reolink brand mark from logowik.com (operator-supplied URL).
       Source is a 6.7 KB lossy WebP — embedded here as a base64
       data URI inside an SVG wrapper so the icon resolver still
       finds a `.svg` file. preserveAspectRatio keeps the original
       98×138 aspect ratio when scaled into host-card sizes. Swap
       in a vector source if Reolink ever publishes one. -->
  <image x="0" y="0" width="98" height="138"
         preserveAspectRatio="xMidYMid meet"
         xlink:href="data:image/webp;base64,"/>
</svg>
