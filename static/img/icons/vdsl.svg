  <rect x="10" y="32" width="44" height="16" rx="2" fill="#78350f"/>
  <!-- Status LEDs -->
  <circle cx="16" cy="40" r="1.6" fill="#fde68a"/>
  <circle cx="22" cy="40" r="1.6" fill="#fde68a"/>
  <circle cx="28" cy="40" r="1.6" fill="#fde68a"/>
  <!-- RJ11 phone jack silhouette -->
  <rect x="42" y="36" width="8" height="8" rx="1" fill="#d97706"/>
