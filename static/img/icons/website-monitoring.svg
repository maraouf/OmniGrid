<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="22" fill="url(#bg)"/>

  <!-- Globe -->
  <circle cx="64" cy="64" r="36" fill="none" stroke="#94a3b8" stroke-width="2.5" opacity="0.55"/>
  <ellipse cx="64" cy="64" rx="36" ry="14" fill="none" stroke="#94a3b8" stroke-width="2" opacity="0.45"/>
  <ellipse cx="64" cy="64" rx="14" ry="36" fill="none" stroke="#94a3b8" stroke-width="2" opacity="0.45"/>
  <line x1="28" y1="64" x2="100" y2="64" stroke="#94a3b8" stroke-width="2" opacity="0.45"/>

  <!-- Pulse line -->
  <polyline points="22,64 42,64 50,46 60,82 70,52 78,72 86,64 106,64"
            fill="none"
            stroke="url(#pulse)"
            stroke-width="4"
            stroke-linecap="round"
            stroke-linejoin="round"/>

  <!-- Alert dot -->
  <circle cx="98" cy="30" r="10" fill="#ef4444"/>
  <circle cx="98" cy="30" r="10" fill="none" stroke="#fecaca" stroke-width="2" opacity="0.6"/>
  <rect x="96.5" y="24" width="3" height="8" rx="1.5" fill="#fff"/>
  <circle cx="98" cy="35.5" r="1.6" fill="#fff"/>
</svg>
