<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Windows Server — four-panel mark tinted cyan-teal to match
       the server product line (vs. consumer Windows' red/green/
       blue/yellow). Rounded-square chassis hints at the server
       role. -->
  <rect width="256" height="256" rx="36" fill="#111827"/>
  <g transform="translate(22 22)">
    <rect x="0"   y="0"   width="100" height="100" fill="#0078D4"/>
    <rect x="112" y="0"   width="100" height="100" fill="#5EB8FF"/>
    <rect x="0"   y="112" width="100" height="100" fill="#00B294"/>
    <rect x="112" y="112" width="100" height="100" fill="#005A9E"/>
  </g>
  <!-- Small "S" monogram bottom-right to distinguish from the
       consumer Windows icon. -->
  <text x="204" y="236" font-family="Arial, sans-serif"
        font-size="32" font-weight="700" fill="#ffffff"
        text-anchor="middle">S</text>
</svg>
