              :aria-label="t('ai_sidebar.export_txt')">
        <svg width="14" height="14" aria-hidden="true">
          <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-file-text'"/>
        </svg>
      </button>
      <button type="button"
              @click="exportAiConversation('json')"
              x-show="aiConversation.length > 0 && (me && me.client_config && me.client_config.ai_conversation_export_enabled !== false)"
              class="btn btn-ghost fs-xs"
              :title="t('ai_sidebar.export_json_title')"
              :aria-label="t('ai_sidebar.export_json')">
        <svg width="14" height="14" aria-hidden="true">
          <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-braces'"/>
        </svg>
      </button>
      <!-- Clear keeps both icon AND text per user preference: it's a
           destructive-ish action (screen-clears the visible chat),
           and the explicit "Clear" word makes the affordance
           unmistakable for mouse + keyboard users alike. -->
      <button type="button"
              @click="clearAiConversation()"
              x-show="aiConversation.length > 0"
              class="btn btn-ghost fs-xs flex items-center gap-1"
              :title="t('ai_sidebar.clear_title')"
              :aria-label="t('ai_sidebar.clear')">
        <svg width="12" height="12" aria-hidden="true">
          <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-trash'"/>
        </svg>
        <span x-text="t('ai_sidebar.clear')"></span>
      </button>
      <!-- Pin to dock — converts the slide-out drawer into a permanent
           left-edge split (main view shrinks via `body.ai-pinned`).
           Hidden on mobile (max-width: 480px) where a 100vw sidebar +
           pin would hide all main content. Persisted across sessions
           via `togglePinAiSidebar` → ui_prefs.ai_sidebar_pinned. -->
      <button type="button"
              @click="togglePinAiSidebar()"
              class="btn btn-ghost fs-xs hidden sm:inline-flex"
              :title="aiSidebarPinned ? t('ai_sidebar.unpin_title') : t('ai_sidebar.pin_title')"
              :aria-label="aiSidebarPinned ? t('ai_sidebar.unpin') : t('ai_sidebar.pin')"
              :aria-pressed="aiSidebarPinned ? 'true' : 'false'">
        <svg width="14" height="14" aria-hidden="true">
          <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + (aiSidebarPinned ? '#icon-pin-off' : '#icon-pin')"/>
        </svg>
      </button>
      <button type="button"
              @click="closeAiSidebar()"
              class="btn btn-ghost fs-xs"
              :title="t('actions.close')"
              :aria-label="t('actions.close')">
        <svg width="14" height="14" aria-hidden="true">
          <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-x'"/>
        </svg>
      </button>
    </div>
    <!-- In-conversation scrollback search — gated on >5 turns so a
         fresh chat doesn't carry a search input it doesn't need. Enter
         cycles through matches; Escape clears. Hidden on mobile (max-
         width: 480px) where a 100vw sidebar would push the log
         off-screen with the search input on top. From the UX review
         IA-LOW finding. -->
    <div class="ai-sidebar-search hidden sm:flex"
         x-show="aiConversation.length > 5">
      <svg width="13" height="13" class="text-[var(--text-faint)]" aria-hidden="true">
        <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-search'"/>
      </svg>
      <input type="text"
             x-model.debounce.150ms="aiConversationSearch"
             @input="_recomputeAiConversationMatches()"
             @keydown.enter.prevent="cycleAiConversationMatch(1)"
             @keydown.escape.prevent="aiConversationSearch = ''; _recomputeAiConversationMatches()"
             :placeholder="t('ai_sidebar.search_placeholder')"
             :aria-label="t('ai_sidebar.search_aria')"
             class="ai-sidebar-search-input">
      <span class="ai-sidebar-search-meta fs-2xs mono"
            x-show="aiConversationSearch"
            x-text="aiConversationSearchMatches.length
              ? ((aiConversationSearchMatchIdx + 1) + ' / ' + aiConversationSearchMatches.length)
              : t('ai_sidebar.search_no_match')"></span>
      <button type="button"
              @click="cycleAiConversationMatch(-1)"
              x-show="aiConversationSearch && aiConversationSearchMatches.length > 1"
              class="btn btn-ghost fs-2xs"
              :title="t('ai_sidebar.search_prev')"
              :aria-label="t('ai_sidebar.search_prev')">↑
      </button>
      <button type="button"
              @click="cycleAiConversationMatch(1)"
              x-show="aiConversationSearch && aiConversationSearchMatches.length > 1"
              class="btn btn-ghost fs-2xs"
              :title="t('ai_sidebar.search_next')"
              :aria-label="t('ai_sidebar.search_next')">↓
      </button>
      <button type="button"
              @click="aiConversationSearch = ''; _recomputeAiConversationMatches()"
              x-show="aiConversationSearch"
              class="btn btn-ghost fs-2xs"
              :title="t('actions.clear')"
              :aria-label="t('actions.clear')">✕
      </button>
    </div>
    <div id="og-ai-sidebar-log" class="ai-sidebar-log scrollbar"
         role="log" aria-live="polite" aria-relevant="additions" aria-atomic="false"
         @scroll="_onAiSidebarLogScroll($event)">
      <div x-show="aiConversation.length === 0"
           class="ai-sidebar-log-empty">
        <div>
          <div class="fs-sm mb-1" x-text="t('ai_sidebar.empty_title')"></div>
          <div class="fs-xs" x-text="t('ai_sidebar.empty_hint')"></div>
        </div>
      </div>
      <template x-for="(turn, idx) in aiConversation" :key="idx">
        <div class="ai-turn"
             :data-ai-turn-idx="idx"
             :class="[
               turn.role === 'user' ? 'ai-turn-user' : 'ai-turn-assistant',
               (aiConversationSearch && aiConversationSearchMatches.includes(idx)) ? 'ai-turn--matched' : '',
               (aiConversationSearch && aiConversationSearchMatches[aiConversationSearchMatchIdx] === idx) ? 'ai-turn--matched-active' : ''
             ]">
          <!--
            Bubble rendering — assistant turns render via `x-html` so
            fenced code blocks (```...```), bold (**…**), inline code
            (`…`), and ul/ol lists from `_renderAiAnswerMd` produce
            real DOM. User turns + error turns stay on `x-text` (no
            markdown processing — what the user typed renders verbatim,
            and error strings come from the backend with no markdown
            contract). The XSS surface is `_logEscape` inside the
            renderer — every body string is escaped before any inline
            replacement runs, and fenced-block bodies are escaped
            again before the placeholder substitution. The data-code
            attribute on the copy button is JSON-encoded so newlines /
            quotes survive round-tripping through the HTML attr parser.
          -->
          <div x-show="(turn.text || turn.error) && (turn.role === 'user' || turn.error)"
               class="ai-bubble"
               :class="turn.role === 'user' ? 'ai-bubble-user' : 'ai-bubble-error'"
               x-text="turn.error ? t('ai_sidebar.error_label', { error: turn.error }) : turn.text"></div>
          <div x-show="turn.text && turn.role !== 'user' && !turn.error"
               class="ai-bubble ai-bubble-assistant"
               x-html="turn._html || _renderAiAnswerMd(turn.text)"></div>
          <!-- Pending inline confirmation — destructive action awaits
               operator's Yes / Cancel click in-conversation. Replaces
               the SweetAlert popup that the modal palette uses.
               `role="alertdialog"` per WAI-ARIA 1.2 mandates an
               `aria-describedby` reference to a node carrying the
               consequence summary. The visible prompt span IS the
               consequence summary so we point describedby at it via
               an id stamped per turn-index (one chip per pending turn). -->
          <div x-show="turn.role === 'assistant' && turn.pending_confirm && !turn.pending_tool_confirms"
               class="ai-confirm-chip"
               role="alertdialog"
               aria-live="assertive"
               aria-atomic="true"
               :aria-label="t('ai_sidebar.confirm_run_prompt', { action: turn.action_label })"
               :aria-describedby="'ai-confirm-desc-' + idx">
            <svg width="11" height="11" aria-hidden="true">
              <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-alert-triangle'"/>
            </svg>
            <span class="ai-confirm-label"
                  :id="'ai-confirm-desc-' + idx"
                  x-text="t('ai_sidebar.confirm_run_prompt', { action: turn.action_label })"></span>
            <button type="button"
                    class="ai-confirm-btn ai-confirm-btn-yes"
                    @click="confirmInlineAction(idx)"
                    x-text="t('ai_sidebar.confirm_yes')"></button>
            <button type="button"
                    class="ai-confirm-btn ai-confirm-btn-no"
                    @click="cancelInlineAction(idx)"
                    x-text="t('ai_sidebar.confirm_cancel')"></button>
          </div>
          <!-- Tool-dispatch confirm chip. Separate from the destructive-
               action chip above so the two confirm flows don't collide.
               Fires when the AI emits TOOL: ssh_diag / docker_container_du
               directives — the backend short-circuits dispatch with a
               `pending_tool_confirms` envelope; the SPA renders this chip;
               clicking Yes re-POSTs to /api/ai/palette with
               `tool_confirm_granted: true` so the dispatcher fires the
               tools and returns the second-round AI reply composed from
               the actual tool output. -->
          <div x-show="turn.role === 'assistant' && turn.pending_tool_confirms && turn.pending_tool_confirms.length"
               class="ai-confirm-chip"
               role="alertdialog"
               aria-live="assertive"
               aria-atomic="true"
               :aria-label="t('ai_sidebar.tool_dispatch_prompt')"
               :aria-describedby="'ai-tooldispatch-desc-' + idx">
            <svg width="11" height="11" aria-hidden="true">
              <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-alert-triangle'"/>
            </svg>
            <span class="ai-confirm-label"
                  :id="'ai-tooldispatch-desc-' + idx">
              <span x-text="t('ai_sidebar.tool_dispatch_prompt')"></span>
              <template x-for="(tc, ti) in (turn.pending_tool_confirms || [])" :key="ti">
                <code class="mono fs-2xs ms-1" x-text="tc.tool + (tc.args && tc.args.preset ? ': ' + tc.args.preset : (tc.args && tc.args.container_name ? ': ' + tc.args.container_name : ''))"></code>
              </template>
            </span>
            <button type="button"
                    class="ai-confirm-btn ai-confirm-btn-yes"
                    @click="confirmInlineToolDispatch(idx)"
                    :disabled="aiSidebarBusy"
                    x-text="aiSidebarBusy ? (t('actions.working') || 'Working…') : t('ai_sidebar.tool_dispatch_yes')"></button>
            <button type="button"
                    class="ai-confirm-btn ai-confirm-btn-no"
                    @click="cancelInlineToolDispatch(idx)"
                    :disabled="aiSidebarBusy"
                    x-text="t('ai_sidebar.confirm_cancel')"></button>
          </div>
          <!-- Cancelled — operator picked Cancel. Show a faint marker
               so the chat history accurately reflects what happened. -->
          <div x-show="turn.role === 'assistant' && turn.cancelled"
               class="ai-bubble-action ai-bubble-action--cancelled">
            <span x-text="t('ai_sidebar.cancelled_label', { action: turn.action_label })"></span>
          </div>
          <div x-show="turn.role === 'assistant' && turn.action_label && turn.action_ran && !turn.cancelled"
               class="ai-bubble-action">
            <svg width="10" height="10" aria-hidden="true">
              <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-check'"/>
            </svg>
            <span x-text="t('ai_sidebar.action_ran_label', { action: turn.action_label })"></span>
          </div>
          <div x-show="turn.role === 'assistant' && !turn.error && !turn.slash"
               class="ai-bubble-feedback">
            <button type="button"
                    class="ai-feedback-btn"
                    :class="turn.feedback === 'up' ? 'active-up' : ''"
                    :disabled="aiSidebarFeedbackBusy[idx]"
                    :title="t('ai_sidebar.feedback_up')"
                    :aria-label="t('ai_sidebar.feedback_up')"
                    :aria-pressed="turn.feedback === 'up'"
                    @click="submitAiFeedback(idx, 'up')"><span aria-hidden="true">👍</span></button>
            <button type="button"
                    class="ai-feedback-btn"
                    :class="turn.feedback === 'down' ? 'active-down' : ''"
                    :disabled="aiSidebarFeedbackBusy[idx]"
                    :title="t('ai_sidebar.feedback_down')"
                    :aria-label="t('ai_sidebar.feedback_down')"
                    :aria-pressed="turn.feedback === 'down'"
                    @click="submitAiFeedback(idx, 'down')"><span aria-hidden="true">👎</span></button>
          </div>
          <!-- Inline disk-projection charts — rendered when the AI
               returned a HOSTS list with the answer. Shells use a
               stable `<template x-for>` so the OUTER element's
               `data-disk-host` / `data-turn-ts` attributes don't
               get clobbered by Alpine re-renders. The populator
               (`_populateAiSidebarHostChart`) writes ONLY to the
               inner `[data-chart-slot]` div which has no Alpine
               binding — so the rendered SVG survives any reactive
               re-evaluation of the parent template. Pre-fix the
               shells rendered via `x-html` and any bubble-state
               update overwrote the populator's innerHTML, leaving
               the spinner stuck on reload. -->
          <template x-if="turn.role === 'assistant' && !turn.error && Array.isArray(turn.host_ids) && turn.host_ids.length > 0">
            <div>
              <template x-for="hid in (turn.host_ids || [])" :key="hid">
                <div class="ai-resp-chart"
                     :data-disk-host="String(hid).replace(/[^A-Za-z0-9_.-]/g, '_')"
                     :data-turn-ts="turn.ts">
                  <div data-chart-slot>
                    <div class="ai-resp-chart-header">
                      <span class="ai-resp-chart-title" x-text="hid"></span>
                      <span class="ai-resp-chart-status" x-text="t('command_palette.ai.disk_chart.loading')"></span>
                    </div>
                    <div class="ai-resp-chart-body">
                      <span class="spin" aria-hidden="true"></span>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </template>
          <div x-show="turn.role === 'assistant' && !turn.error && !turn.slash && aiTurnSubline(turn)"
               class="ai-bubble-meta"
               x-text="aiTurnSubline(turn)"></div>
        </div>
      </template>
      <div x-show="aiSidebarBusy" class="ai-sidebar-thinking">
        <span class="spin" aria-hidden="true"></span>
        <span x-text="t('command_palette.ai.thinking_title')"></span>
      </div>
    </div>
    <!-- Floating "↓ N new" pill — surfaces at the bottom-right of the
         conversation log when the operator is reading prior turns
         AND a new assistant turn arrives below the fold. Click jumps
         to the latest turn (force=true bypasses the near-bottom gate)
         and clears the unseen counter. The counter is auto-cleared
         when the operator scrolls back near the bottom on their own. -->
    <button type="button"
            class="ai-sidebar-jump-latest"
            x-show="aiSidebarUnseenCount > 0"
            x-cloak
            @click="jumpToLatestAiTurn()"
            :title="t('ai_sidebar.jump_latest_title')"
            :aria-label="t('ai_sidebar.jump_latest_title')">
      <svg width="11" height="11" aria-hidden="true">
        <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-arrow-down'"/>
      </svg>
      <span x-text="aiSidebarUnseenCount + ' ' + t('ai_sidebar.jump_latest_label')"></span>
    </button>
    <!-- Slash-command picker — surfaces above the textarea when the
         input starts with `/`. Filters every command-palette action;
         click or Enter fires the action immediately (no AI round-trip,
         no ai_jobs row). Same dispatcher as Cmd-K modal so destructive
         actions still confirm via SweetAlert. Markup mirrors the modal
         palette's `.cmdpal-row` row shape so the visual language is
         consistent across both surfaces. -->
    <div class="ai-slash-picker scrollbar" x-show="aiSidebarSlashOpen()" x-cloak>
      <div class="ai-slash-header">
        <span x-text="t('ai_sidebar.slash_header')"></span>
        <span class="text-[var(--text-faint)] mono ms-2" x-text="t('ai_sidebar.slash_hint')"></span>
      </div>
      <div role="listbox"
           :aria-activedescendant="aiSidebarSlashOpen() && aiSidebarSlashResults().length ? ('ai-slash-row-' + aiSidebarSlashIdx) : null">
        <template x-for="(act, sIdx) in aiSidebarSlashResults()"
                  :key="act.kind + ':' + ((act.payload && act.payload.id) || act.label || sIdx)">
          <button type="button"
                  role="option"
                  tabindex="-1"
                  :id="'ai-slash-row-' + sIdx"
                  :data-slash-row-idx="sIdx"
                  :aria-selected="aiSidebarSlashIdx === sIdx ? 'true' : 'false'"
                  class="cmdpal-row w-full text-start px-3 py-2 cursor-pointer flex items-center gap-3 border-b border-[var(--border)] last:border-0"
                  :class="aiSidebarSlashIdx === sIdx ? 'cmdpal-row-active' : ''"
                  @click="runAiSidebarSlashAction(act)"
                  @mouseenter="aiSidebarSlashIdx = sIdx">
            <span class="cmdpal-kind-pill fs-3xs uppercase tracking-wider px-1.5 py-0.5 rounded"
                  :class="'cmdpal-kind-' + (act.group || 'actions')"
                  x-text="t('command_palette.group.' + (act.group || 'actions')) || (act.group || 'Action')"></span>
            <span class="flex-1 min-w-0">
              <span class="block fs-sm text-[var(--text)] truncate" x-text="act.label"></span>
              <span x-show="act.sub" class="block fs-2xs text-[var(--text-faint)] truncate mono" x-text="act.sub"></span>
            </span>
            <span x-show="act.destructive"
                  class="pill pill-error fs-3xs uppercase tracking-wider inline-flex items-center gap-1">
              <svg width="9" height="9" aria-hidden="true">
                <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-alert-triangle'"/>
              </svg>
              <span x-text="t('ai_sidebar.slash_destructive')"></span>
            </span>
            <span x-show="aiSidebarSlashIdx === sIdx" class="fs-2xs text-[var(--text-faint)]" aria-hidden="true">↵</span>
          </button>
        </template>
        <div x-show="!aiSidebarSlashResults().length"
             class="px-3 py-2 fs-sm text-[var(--text-faint)] italic"
             x-text="t('ai_sidebar.slash_no_match')"></div>
      </div>
    </div>
    <!-- Proactive incident chip — surfaces above the input when the
         sidebar is open AND a relevant SSE event lands (host failure
         state change, warning-level notification). One chip at a
         time (newest wins) to avoid spam. Click triggers the
         pre-built query; X dismisses without firing. Closes the
         loop "incident → drawer → open AI" into one click. -->
    <div x-show="aiSidebarIncidentChip"
         class="ai-sidebar-incident-chip"
         role="alert"
         aria-live="polite"
         aria-atomic="true">
      <button type="button"
              class="ai-incident-chip-action"
              @click="runAiIncidentChip()"
              :title="t('ai_sidebar.incident_chip_run_title')">
        <svg width="13" height="13" aria-hidden="true">
          <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-zap'"/>
        </svg>
        <span class="ai-incident-chip-text"
              x-text="(aiSidebarIncidentChip || {}).title || ''"></span>
      </button>
      <button type="button"
              class="ai-incident-chip-dismiss"
              @click="dismissAiIncidentChip()"
              :title="t('actions.close')"
              :aria-label="t('actions.close')">
        <svg width="11" height="11" aria-hidden="true">
          <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-x'"/>
        </svg>
      </button>
    </div>
    <div class="ai-sidebar-input-row">
      <!--
        Textarea is fully uncontrolled — NO `x-model`, NO `@input`.
        Iteration 1 used `x-model.debounce.150ms` which still routed
        every keystroke through Alpine's reactivity system; iteration 2
        kept that AND a `@input` handler that reset `aiSidebarSlashIdx`
        on every keystroke (a second per-keystroke Alpine state write).
        On this complex page (1900+ binding sites in index.html alone)
        even debounced reactivity registered as visible typing lag.
        Iteration 3 (this one) goes nuclear: drop both bindings and
        let the browser's native input handling take typing entirely
        out of Alpine's path. The `og-ai-sidebar-input` id is the
        single hook — `init()` attaches a vanilla-JS `input` listener
        that throttles state propagation to ~300 ms via setTimeout,
        and the Enter / Esc / arrow-key handlers in
        `aiSidebarHandleKeydown` read `e.target.value` directly so
        they never depend on the throttled state.
      -->
      <!-- Iteration 4: ALL Alpine bindings removed from the textarea.
           Every binding (`:placeholder`, `:disabled`, `@keydown`) was
           pulled because Alpine's reactivity processed the binding-
           expression on every event the element fired — even with
           x-model gone, the cumulative cost of evaluating these
           expressions per keystroke on a 1900-binding-site page
           registered as visible lag for some operators. The vanilla
           `init()` block now (1) sets `placeholder` directly via
           DOM, (2) toggles `disabled` via a `$watch` on
           `aiSidebarBusy`, (3) attaches a vanilla `keydown`
           listener that calls `aiSidebarHandleKeydown` with `this`
           bound to the Alpine component. Net effect: typing into
           this textarea does NOT trip Alpine's reactivity at all
           until the 300 ms throttle fires (or the operator presses
           Enter / blurs / clicks Send). -->
      <textarea id="og-ai-sidebar-input" rows="2"></textarea>
      <div class="ai-sidebar-input-actions">
        <button type="button"
                @click="sendAiSidebarMessage()"
                :disabled="aiSidebarBusy || !aiSidebarQuery.trim() || !aiSidebarSurfaceEnabled() || aiSidebarSlashOpen()"
                class="btn btn-primary fs-sm">
          <span x-show="!aiSidebarBusy" x-text="t('ai_sidebar.send')"></span>
          <span x-show="aiSidebarBusy" class="flex items-center gap-1">
            <span class="spin"></span>
            <span x-text="t('ai_sidebar.send_busy')"></span>
          </span>
        </button>
        <!-- Mode toggle — Approval (default) vs Autonomous. Sits in
             the send-button row so it's adjacent to the action that
             will fire (Send → action). Same `fs-sm` size as the Send
             button so the row reads as one unit instead of two
             different typographic scales. -->
        <select class="ai-sidebar-mode-select fs-sm"
                :value="aiSidebarMode"
                @change="setAiSidebarMode($event.target.value)"
                :title="aiSidebarMode === 'autonomous' ? t('ai_sidebar.mode_autonomous_title') : t('ai_sidebar.mode_approval_title')"
                :aria-label="t('ai_sidebar.mode_label')"
                aria-describedby="ai-mode-help">
          <option value="approval" x-text="t('ai_sidebar.mode_approval')"></option>
          <option value="autonomous" x-text="t('ai_sidebar.mode_autonomous')"></option>
        </select>
        <!-- Sr-only help text — explains what each mode does so AT
             users hear "Mode, Approval; AI proposes actions and waits
             for your confirm" instead of just "Mode, Approval". -->
        <span id="ai-mode-help" class="sr-only" x-text="t('ai_sidebar.mode_help')"></span>
        <span class="fs-3xs text-[var(--text-faint)]"
              x-show="!aiSidebarSlashOpen() && aiSidebarSurfaceEnabled()"
              x-text="t('ai_sidebar.enter_hint')"></span>
        <span class="fs-3xs text-[var(--text-faint)]"
              x-show="aiSidebarSlashOpen()"
              x-text="t('ai_sidebar.slash_hint')"></span>
        <span class="fs-2xs text-[var(--warning)]"
              x-show="!aiSidebarSlashOpen() && !aiSidebarSurfaceEnabled()"
              x-text="t('command_palette.ai.disabled')"></span>
      </div>
    </div>
  </aside>

  <!-- Modal display gated by inline :style instead of x-show.
       Three rounds of operator reports of Ctrl+K not opening the
       panel; capture-phase listener confirmed the keystroke
       reaches the page (see init() in app.js) and openCommandPalette
       is being called. The remaining failure mode is x-show toggling
       display on this outermost div not propagating through the
       cascade reliably (Tailwind v4 in-browser JIT also touches
       inline display in arbitrary-class generation). Explicit
       `:style="commandPaletteOpen ? '' : 'display:none'"` is the
       most deterministic gate available — Alpine still reactively
       re-evaluates on every state change but the assignment is a
       direct style override that beats every cascade quirk. -->
  <div :style="commandPaletteOpen ? 'display:flex' : 'display:none'"
       class="fixed inset-0 z-50 fade-in"
       role="dialog" aria-modal="true" :aria-label="t('command_palette.dialog_label')"
       @keydown="_focusTrapKeydown($event, $el)">
    <div @click="closeCommandPalette()" class="absolute inset-0 backdrop-strong"></div>
    <!-- x-if gates the heavy card body — its x-for results list,
         bulk-chip strip, AI thinking pane, and ~100 t() bindings only
         mount when the palette is actually open. The outer
         `:style="display:flex/none"` wrapper above keeps the dialog
         role + focus-trap intact for ARIA semantics; this inner x-if
         removes the subtree from Alpine's reactive graph when closed
         so a host-refresh / SSE event won't re-walk every closed-
         palette binding. -->
    <template x-if="commandPaletteOpen">
      <div class="relative flex items-center justify-center p-4 w-full h-full overflow-auto scrollbar">
        <!-- Inner card uses inline style for max-height instead of
             Tailwind v4's `max-h-[80vh]` arbitrary class — the in-
             browser JIT was inconsistent at generating the arbitrary
             value, leaving the card collapsed to its content height
             AND with no scrollable overflow on long result lists.
             The hotkeys modal renders fine because it uses standard
             classes too — operator-confirmed Ctrl+K wasn't showing
             the panel even though the keydown was firing. -->
        <div id="cmdpal-card"
             style="max-height: 80vh;"
             class="bg-[var(--surface)] border border-[var(--border)] rounded-md max-w-2xl w-full flex flex-col overflow-hidden shadow-xl"
             @click.stop>
          <div class="flex items-center gap-2 p-3 border-b border-[var(--border)]">
            <svg width="16" height="16" class="text-[var(--text-faint)]" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-search"/>
            </svg>
            <input type="text" id="cmdpal-input"
                   x-model="commandPaletteQuery"
                   @input="commandPaletteSelectedIdx = 0"
                   @keydown.arrow-down.prevent="commandPaletteMove(1)"
                   @keydown.arrow-up.prevent="commandPaletteMove(-1)"
                   @keydown.enter.prevent="commandPaletteActivate()"
                   :placeholder="t('command_palette.placeholder')"
                   class="flex-1 bg-transparent border-0 outline-none fs-lg text-[var(--text)] placeholder:text-[var(--text-faint)]"
                   autocomplete="off" spellcheck="false"
                   role="combobox"
                   aria-controls="cmdpal-results"
                   aria-expanded="true"
                   :aria-activedescendant="commandPaletteResults().length ? 'cmdpal-row-' + commandPaletteSelectedIdx : null">
            <kbd class="fs-2xs text-[var(--text-faint)] border border-[var(--border)] rounded px-1.5 py-0.5">Esc</kbd>
          </div>
          <div class="overflow-y-auto scrollbar flex-1">
            <!-- BULK MODE — chip strip + run row. Only renders when the
                 query parses as `<verb>: <selector>` (pause: / resume:).
                 The chip strip lets the operator click off individual
                 hosts before committing; the run row is keyboard-active
                 (Enter triggers `commandPaletteActivate` which the JS
                 re-routes to `runCommandPaletteBulk`). -->
            <template x-if="isCommandPaletteBulkMode()">
              <div class="cmdpal-bulk">
                <div class="cmdpal-bulk-summary">
                <span class="cmdpal-bulk-verb"
                      x-text="(commandPaletteBulkState() && commandPaletteBulkState().verb) || ''"></span>
                  <span x-text="t('command_palette.bulk.matched_label', { matched: (commandPaletteBulkState() && commandPaletteBulkState().matched.length) || 0, selected: (commandPaletteBulkState() && commandPaletteBulkState().selected.length) || 0 })"></span>
                  <span class="flex-1"></span>
                  <span class="fs-2xs text-[var(--text-faint)]"
                        x-text="t('command_palette.bulk.dsl_hint')"></span>
                </div>
                <div class="cmdpal-bulk-chips scrollbar">
                  <template x-for="h in (commandPaletteBulkState() && commandPaletteBulkState().matched) || []"
                            :key="h.id || h.host">
                    <button type="button"
                            @click.stop="toggleCommandPaletteBulkChip(h.id || h.host)"
                            :class="(commandPaletteBulkExcluded && commandPaletteBulkExcluded.has(h.id || h.host)) ? 'cmdpal-bulk-chip is-excluded' : 'cmdpal-bulk-chip is-included'"
                            :title="t('command_palette.bulk.chip_toggle_hint')">
                      <span class="cmdpal-bulk-chip-dot" aria-hidden="true"></span>
                      <span x-text="h.label || h.id || h.host"></span>
                    </button>
                  </template>
                  <span x-show="!(commandPaletteBulkState() && commandPaletteBulkState().matched.length)"
                        class="fs-xs text-[var(--text-faint)] italic"
                        x-text="t('command_palette.bulk.no_matches')"></span>
                </div>
                <button type="button"
                        class="cmdpal-bulk-run"
                        :disabled="!(commandPaletteBulkState() && commandPaletteBulkState().selected.length)"
                        @click.stop="runCommandPaletteBulk()">
                <span class="cmdpal-bulk-run-label"
                      x-text="t('command_palette.bulk.run_label_' + (commandPaletteBulkState() && commandPaletteBulkState().verb), { count: (commandPaletteBulkState() && commandPaletteBulkState().selected.length) || 0 })"></span>
                  <span class="cmdpal-bulk-run-hint" aria-hidden="true">↵</span>
                </button>
              </div>
            </template>
            <template x-if="!isCommandPaletteBulkMode() && commandPaletteResults().length === 0">
              <div class="p-6 text-center fs-sm text-[var(--text-faint)]"
                   x-text="commandPaletteQuery ? t('command_palette.empty_state') : t('command_palette.start_typing')"></div>
            </template>
            <template x-if="!isCommandPaletteBulkMode() && commandPaletteResults().length > 0">
              <div id="cmdpal-results" role="listbox" :aria-label="t('command_palette.results_label')">
                <template x-for="(r, i) in commandPaletteResults()" :key="r.kind + ':' + (r.payload && (r.payload.id || r.payload) || r.label) + ':' + i">
                  <button type="button"
                          :id="'cmdpal-row-' + i"
                          :data-cmdpal-idx="i"
                          role="option"
                          :aria-selected="commandPaletteSelectedIdx === i ? 'true' : 'false'"
                          tabindex="-1"
                          @click="commandPaletteSelectedIdx = i; commandPaletteActivate()"
                          @mouseenter="commandPaletteSelectedIdx = i"
                          class="cmdpal-row w-full text-start px-3 py-2 cursor-pointer flex items-center gap-3 border-b border-[var(--border)] last:border-0"
                          :class="commandPaletteSelectedIdx === i ? 'cmdpal-row-active' : ''">
                  <span class="cmdpal-kind-pill fs-3xs uppercase tracking-wider px-1.5 py-0.5 rounded"
                        :class="'cmdpal-kind-' + r.group"
                        x-text="t('command_palette.group.' + r.group)"></span>
                    <span class="flex-1 min-w-0">
                    <span class="block fs-sm text-[var(--text)] truncate" x-text="r.label"></span>
                    <span x-show="r.sub" class="block fs-2xs text-[var(--text-faint)] truncate mono" x-text="r.sub"></span>
                  </span>
                    <span x-show="commandPaletteSelectedIdx === i" class="fs-2xs text-[var(--text-faint)]" aria-hidden="true">↵</span>
                  </button>
                </template>
              </div>
            </template>
          </div>
          <div class="px-3 py-2 border-t border-[var(--border)] fs-2xs text-[var(--text-faint)] flex items-center gap-3 flex-wrap">
            <span><kbd class="border border-[var(--border)] rounded px-1">↑</kbd> <kbd class="border border-[var(--border)] rounded px-1">↓</kbd> <span x-text="t('command_palette.footer_navigate')"></span></span>
            <span><kbd class="border border-[var(--border)] rounded px-1">↵</kbd> <span x-text="t('command_palette.footer_select')"></span></span>
            <span><kbd class="border border-[var(--border)] rounded px-1">Esc</kbd> <span x-text="t('command_palette.footer_close')"></span></span>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- ================== HOTKEYS HELP MODAL ================== -->
  <template x-if="showHotkeys">
    <div class="fixed inset-0 z-50 fade-in">
      <div @click="showHotkeys=false" class="absolute inset-0 backdrop-strong"></div>
      <div class="relative flex items-center justify-center p-4 h-full overflow-auto scrollbar"
           role="dialog" aria-modal="true" :aria-label="t('hotkeys.title')"
           @keydown="_focusTrapKeydown($event, $el)">
        <div class="bg-[var(--surface)] border border-[var(--border)] rounded-md max-w-2xl w-full max-h-[90vh] overflow-y-auto scrollbar">
          <div class="p-4 border-b border-[var(--border)] flex justify-between items-center sticky top-0 bg-[var(--surface)] z-10">
            <div class="flex items-start gap-2">
              <!-- Header icon matches the Settings sidebar's `shortcuts`
                   entry (`icon-help-circle`) so the modal's identity is
                   consistent with the navigation chrome that opens it. -->
              <svg width="16" height="16" class="text-[var(--text-dim)] mt-1" aria-hidden="true">
                <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-help-circle'"/>
              </svg>
              <div>
                <h2 class="fs-xl font-semibold" x-text="t('hotkeys.title')"></h2>
                <p class="fs-xs text-[var(--text-faint)] mt-0.5" x-html="t('hotkeys.hint')"></p>
              </div>
            </div>
            <button type="button" @click="showHotkeys=false" class="btn btn-ghost"
                    :aria-label="t('actions.close')">✕
            </button>
          </div>
          <div class="p-5 grid grid-cols-1 md:grid-cols-2 gap-5">
            <template x-for="group in hotkeyGroups()" :key="group.title">
              <section>
                <h3 class="font-semibold fs-sm uppercase tracking-wider text-[var(--text-faint)] mb-2" x-text="group.title"></h3>
                <ul class="space-y-1.5">
                  <template x-for="entry in group.items" :key="entry.label">
                    <li class="flex items-center justify-between gap-3 fs-sm">
                    <span class="text-[var(--text-dim)]">
                      <span x-text="entry.label"></span>
                      <span x-show="entry.note" class="fs-2xs text-[var(--text-faint)] ms-1" x-text="'· ' + (entry.note || '')"></span>
                    </span>
                      <span class="flex items-center gap-1 flex-shrink-0">
                      <template x-for="(k, i) in entry.keys" :key="i">
                        <span class="flex items-center gap-1">
                          <kbd class="kbd" x-text="k"></kbd>
                          <span x-show="i < entry.keys.length - 1" class="fs-3xs text-[var(--text-faint)]">+</span>
                        </span>
                      </template>
                    </span>
                    </li>
                  </template>
                </ul>
              </section>
            </template>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ================== INTERACTIVE SSH TERMINAL MODAL ==================
       Live PTY-backed shell. Browser <-WSS-> backend <-asyncssh-> target.
       Cookie-authed; admin-only. Audit row written at session OPEN + CLOSE
       (start/end events only — keystrokes never logged). Esc / X to close.
       The xterm.js viewport renders into the .terminal-host div via Alpine
       lifecycle hooks (openHostTerminal / closeHostTerminal). -->
  <div x-show="terminalModalOpen" class="fixed inset-0 z-50 fade-in" x-cloak>
    <div @click="closeHostTerminal()" class="absolute inset-0 backdrop-strong"></div>
    <div class="relative flex items-center justify-center p-4 h-full overflow-auto scrollbar">
      <div class="bg-[var(--surface)] border border-[var(--border)] rounded-md max-w-5xl w-full flex flex-col modal-panel--default-height"
           role="dialog" aria-modal="true" :aria-label="t('hosts_extra_ssh.terminal.modal_title', { host: terminalHost && (terminalHost.label || terminalHost.id) || '' })"
           @keydown="_focusTrapKeydown($event, $el)">
        <header class="p-3 border-b border-[var(--border)] flex justify-between items-center bg-[var(--surface)] z-10 flex-shrink-0">
          <div class="flex items-center gap-3 min-w-0">
            <h2 class="fs-lg font-semibold truncate"
                x-text="t('hosts_extra_ssh.terminal.modal_title', { host: terminalHost && (terminalHost.label || terminalHost.id) || '' })"></h2>
            <span class="ssh-term-status mono fs-xs"
                  :class="{
                    'ssh-term-status--ok': terminalState === 'connected',
                    'ssh-term-status--warn': terminalState === 'connecting',
                    'ssh-term-status--err': terminalState === 'disconnected' || terminalState === 'error',
                  }">
              <span x-show="terminalState === 'connecting'" x-text="t('hosts_extra_ssh.terminal.connecting')"></span>
              <span x-show="terminalState === 'connected'" x-text="t('hosts_extra_ssh.terminal.connected')"></span>
              <span x-show="terminalState === 'disconnected'"
                    x-text="terminalCloseReason
                      ? t('hosts_extra_ssh.terminal.disconnected_with_reason', { reason: terminalCloseReason })
                      : t('hosts_extra_ssh.terminal.disconnected')"></span>
              <span x-show="terminalState === 'error'"
                    x-text="terminalCloseReason
                      ? t('hosts_extra_ssh.terminal.connection_failed_with_reason', { reason: terminalCloseReason })
                      : t('hosts_extra_ssh.terminal.connection_failed')"></span>
            </span>
            <span x-show="terminalResolved && terminalResolved.user"
                  class="host-debug-tag mono fs-2xs"
                  x-text="terminalResolved ? ((terminalResolved.user || '?') + '@' + (terminalResolved.host || '') + ':' + (terminalResolved.port || 22)) : ''"></span>
          </div>
          <div class="flex items-center gap-2">
            <button type="button" class="btn btn-ghost fs-xs"
                    x-show="terminalState === 'disconnected' || terminalState === 'error'"
                    @click="reconnectHostTerminal()"
                    x-text="t('hosts_extra_ssh.terminal.reconnect')"></button>
            <button type="button" @click="closeHostTerminal()" class="user-action-btn"
                    :title="t('hosts_extra_ssh.terminal.close_hint')"
                    :aria-label="t('hosts_extra_ssh.terminal.close_hint')">
              <svg width="14" height="14" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-x"/>
              </svg>
            </button>
          </div>
        </header>
        <div class="terminal-host scrollbar"
             x-ref="terminalHost"
             :dir="'ltr'"
             style="flex: 1 1 auto; min-height: 0; background: var(--terminal-bg); padding: var(--s-2);"></div>
      </div>
    </div>
  </div>

  <!-- ================== TOAST ================== -->
  <!--suppress XmlUnboundNsPrefix, HtmlUnknownAttribute -->
  <!-- Logical-property classes (`end-4` / `border-s-4`) replace
       physical `right-4` / `border-l-4` so the toast slides in from
       the trailing edge in RTL locales (Arabic / Hebrew) without
       extra rules. ARIA: `role="status"` + `aria-live="polite"` +
       `aria-atomic="true"` so screen readers announce the toast as
       it appears; error toasts upgrade to `role="alert"` +
       `aria-live="assertive"` so they're announced immediately
       (matches the user-visible tonal urgency of red toasts). -->
  <!-- Toast container. Hover / focus pauses the auto-dismiss timer
       so the operator has time to read + select + copy the text —
       user-flagged: "when I move it into focus I want to copy its
       text for debugging, so making it hide so fast doesn't allow
       me to copy". Pointer-enter and focus-within both hold the
       timer; pointer-leave / focus-leave resume it from where it
       paused. The ⧉ (copy) and × (close) buttons offer explicit
       actions that don't require selecting the text manually. -->
  <div x-show="toast"
       :role="toastType === 'error' ? 'alert' : 'status'"
       :aria-live="toastType === 'error' ? 'assertive' : 'polite'"
       aria-atomic="true"
       tabindex="0"
       @mouseenter="_holdToast()"
       @mouseleave="_resumeToast()"
       @focusin="_holdToast()"
       @focusout="_resumeToast()"
       x-transition.opacity.duration.200ms
       class="fixed bottom-4 end-4 bg-[var(--surface)] border-s-4 ps-4 pe-2 py-2 rounded-md shadow-2xl z-[60] max-w-[90vw] flex items-start gap-3 cursor-default"
       :class="toastType==='error' ? 'border-[var(--danger)]' : 'border-[var(--success)]'">
    <div class="fs-sm select-text break-words flex-1 pt-0.5" x-text="toast"></div>
    <div class="flex items-center gap-1 flex-shrink-0">
      <button type="button"
              @click.stop="copyToastText()"
              class="btn btn-ghost fs-xs px-1.5"
              :title="t('toasts.copy_title') || 'Copy text'"
              :aria-label="t('toasts.copy_title') || 'Copy text'">
        <svg width="12" height="12" aria-hidden="true">
          <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-copy'"/>
        </svg>
      </button>
      <button type="button"
              @click.stop="_dismissToast()"
              class="btn btn-ghost fs-xs px-1.5"
              :title="t('actions.close') || 'Close'"
              :aria-label="t('actions.close') || 'Close'">✕
      </button>
    </div>
  </div>

  <!-- ================== FOOTER ================== -->
  <footer class="app-footer">
    <span x-text="t('app.version')"></span>
    <span class="mono" x-text="version || '—'"></span>
  </footer>

</div>

<!-- app.js moved to <head> — see the comment there for why it must
     load before Alpine. The previous deferred-at-bottom placement
     raced against alpine-gate.js's dynamic Alpine injection on the
     reload-after-new-version path. -->

</body>
</html>
