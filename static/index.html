                <td class="mono text-[11.5px] text-[var(--text-dim)]" x-text="item.stack || '—'"></td>
                <td class="mono text-[11.5px] text-dim col-image">
                  <span x-text="imageRepo(item)"></span><span class="text-[var(--text-faint)]">:</span><span class="text-[var(--text-faint)]" x-text="item.tag"></span>
                </td>
                <td><span class="pill" :class="'pill-' + (item.health || 'unknown')" x-text="item.health || '—'"></span></td>
                <td><span class="pill" :class="'pill-' + statusKey(item.status)" x-text="item.status"></span></td>
                <td class="hidden lg:table-cell text-[12px] mono"
                    :class="(item.replicas && item.replicas.running < item.replicas.desired) ? 'text-[var(--warning)]' : 'text-[var(--text-dim)]'">
                  <span x-text="item.replicas ? (item.replicas.running + '/' + item.replicas.desired) : '—'"></span>
                </td>
                <td class="hidden md:table-cell stat-cell">
                  <template x-if="statsFor(item).has_stats">
                    <div class="stat-bar" x-bind="statBarBind(statsFor(item).cpu_percent, 'columns.cpu')" :class="[barLevel(statsFor(item).cpu_percent), (!statsLoaded || isStale(statsFor(item))) ? 'stale' : '']" :style="`--w:${statsFor(item).cpu_percent}%`" :title="staleAge(statsFor(item))">
                      <div class="fill"></div>
                      <div class="label" x-text="cpuLabel(statsFor(item).cpu_percent)"></div>
                    </div>
                  </template>
                  <template x-if="!statsFor(item).has_stats">
                    <span class="text-[11px] text-[var(--text-faint)]">—</span>
                  </template>
                </td>
                <td class="hidden md:table-cell stat-cell">
                  <template x-if="statsFor(item).has_stats">
                    <div>
                      <div class="stat-bar" x-bind="statBarBind(memPercent(item), 'columns.memory')" :class="[barLevel(memPercent(item)), (!statsLoaded || isStale(statsFor(item))) ? 'stale' : '']" :style="`--w:${memPercent(item)}%`" :title="staleAge(statsFor(item))">
                        <div class="fill"></div>
                        <div class="label" x-text="memPercent(item).toFixed(0) + '%'"></div>
                      </div>
                      <div class="stat-sub" x-text="fmtBytes(statsFor(item).mem_usage) + ' / ' + fmtBytes(statsFor(item).mem_limit)"></div>
                    </div>
                  </template>
                  <template x-if="!statsFor(item).has_stats">
                    <span class="text-[11px] text-[var(--text-faint)]">—</span>
                  </template>
                </td>
                <td class="hidden xl:table-cell stat-cell">
                  <template x-if="statsFor(item).has_size">
                    <div class="stat-bar info" x-bind="statBarBind(diskPercent(item), 'columns.disk')" :class="(!statsLoaded || isStale(statsFor(item))) ? 'stale' : ''" :style="`--w:${diskPercent(item)}%`" :title="staleAge(statsFor(item))">
                      <div class="fill"></div>
                      <div class="label" x-text="fmtBytes(statsFor(item).size_root)"></div>
                    </div>
                  </template>
                  <template x-if="!statsFor(item).has_size">
                    <span class="text-[11px] text-[var(--text-faint)]">—</span>
                  </template>
                </td>
                <td class="hidden lg:table-cell text-[11.5px] mono text-dim" x-text="fmtAgo(uptimeFor(item))"></td>
                <td class="hidden xl:table-cell col-node">
                  <template x-if="topologyGroups(item).length">
                    <div class="topology-map">
                      <template x-for="group in topologyGroups(item)" :key="group.node">
                        <span class="topology-node"
                              :title="topologyNodeTooltip(group)">
                          <span class="topology-host" x-text="group.node"></span>
                          <template x-for="(c, i) in group.chips" :key="i">
                            <span class="topology-chip"
                                  :class="'topology-' + (c.state || 'unknown')"
                                  :title="topologyChipTooltip(c)"></span>
                          </template>
                        </span>
                      </template>
                    </div>
                  </template>
                  <template x-if="!topologyGroups(item).length">
                    <span class="text-[11.5px] text-[var(--text-faint)]">—</span>
                  </template>
                </td>
                <td class="align-right" @click.stop>
                  <div class="flex items-center justify-end gap-1.5">
                    <button x-show="isAdmin() && item.status==='update' && canUpdate(item)"
                            @click="itemAction(item)"
                            :disabled="isItemBusy(item)"
                            class="btn btn-warning text-[11px]">
                      <template x-if="isItemBusy(item)"><span class="flex items-center gap-1"><span class="spin"></span>…</span></template>
                      <template x-if="!isItemBusy(item)"><span x-text="actionLabel(item)"></span></template>
                    </button>
                    <button x-show="isAdmin() && isRestartable(item)"
                            @click="restartItem(item)"
                            :disabled="isRestartBusy(item)"
                            class="btn btn-soft text-[11px]"
                            :title="t('actions.restart_force_title')">
                      <template x-if="isRestartBusy(item)"><span class="spin"></span></template>
                      <template x-if="!isRestartBusy(item)">
                        <svg width="11" height="11" stroke-width="2.2" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-rotate-cw"/></svg>
                      </template>
                    </button>
                    <button x-show="isAdmin() && item.removable"
                            @click="removeContainer(item)"
                            :disabled="isItemBusy(item)"
                            class="btn btn-danger-outline text-[11px]"
                            :title="t('actions.remove_container_title')">
                      <svg width="11" height="11" stroke-width="2.2" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash"/></svg>
                    </button>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
      <div x-show="loading && items.length === 0" class="skeleton-table" :aria-label="t('loading.resources')">
        <template x-for="i in 6" :key="i">
          <div class="skeleton-row">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell"></div>
            <div class="skeleton-cell bar"></div>
            <div class="skeleton-cell bar"></div>
            <div class="skeleton-cell short"></div>
            <div class="skeleton-cell short"></div>
          </div>
        </template>
      </div>
      <div x-show="!loading && items.length === 0 && portainerConfigured === false"
           class="rounded border border-[var(--warning)] bg-[var(--surface-2)] px-4 py-3 text-[12.5px] text-[var(--text-dim)] flex items-start gap-3">
        <svg width="18" height="18" class="text-[var(--warning)] flex-shrink-0 mt-0.5" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-info"/></svg>
        <div class="min-w-0 flex-1">
          <div class="font-semibold text-[var(--text)]" x-text="t('empty.portainer_not_configured.title')"></div>
          <div class="mt-1" x-text="t('empty.portainer_not_configured.body')"></div>
          <button x-show="isAdmin()" @click="view='admin'; adminTab='portainer'"
                  class="btn btn-primary text-[12px] mt-2"
                  x-text="t('empty.portainer_not_configured.cta')"></button>
        </div>
      </div>
      <div x-show="filteredItems.length===0 && !loading && items.length > 0" class="text-center py-16 text-[var(--text-faint)] text-sm" x-text="t('empty.no_match')">
      </div>
    </div>

    <!-- ===== NODES VIEW ===== -->
    <!-- One collapsible card per Swarm node. Inside: items grouped by
         their stack, matching the stacks-view layout so operators can
         navigate vertically by node ("what's on web02?") instead of by
         stack. Reuses the same filter pipeline (health / status / search). -->
    <div x-show="view==='nodes'" class="space-y-3">
      <template x-for="node in nodeGroups()" :key="node.key">
        <div class="bg-[var(--surface)] border border-[var(--border)] rounded-md overflow-hidden">
          <!-- Node header — left side toggles, right side has actions
               (Prune etc). Kept as a flex row (not one big <button>) so
               the Prune click doesn't also collapse/expand the card.
               Stacks vertically on mobile (was inline-wrapping with
               name + subtitle both inline, which squeezed both into
               unreadable mush — operator's iPhone screenshots showed
               name disappearing entirely while pills overlapped the
               wrapped subtitle). On sm: and up, returns to the
               desktop single-row layout. -->
          <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-3 px-4 py-3 hover:bg-[var(--surface-2)]/50 transition">
            <!-- Toggle area (clickable). Title + subtitle nested in a
                 vertical-stacked div so they NEVER compete for inline
                 space — name on its own line, subtitle below it. -->
            <button type="button" @click="toggleNode(node.name)"
                    :aria-expanded="isNodeExpanded(node.name)"
                    :aria-label="(isNodeExpanded(node.name) ? (t('actions.collapse') || 'Collapse') : (t('actions.expand') || 'Expand')) + ': ' + node.name"
                    class="flex items-center gap-3 flex-1 min-w-0 cursor-pointer text-start bg-transparent border-0 p-0">
              <svg width="13" height="13" aria-hidden="true" class="text-[var(--text-dim)] transition-transform flex-shrink-0" :class="isNodeExpanded(node.name) ? 'rotate-90' : ''"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/></svg>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[var(--text-dim)] flex-shrink-0">
                <rect x="2" y="2" width="20" height="8" rx="2"/>
                <rect x="2" y="14" width="20" height="8" rx="2"/>
                <line x1="6" y1="6" x2="6.01" y2="6"/>
                <line x1="6" y1="18" x2="6.01" y2="18"/>
              </svg>
              <div class="flex-1 min-w-0 flex flex-col sm:flex-row sm:items-baseline sm:gap-3">
                <span class="font-semibold text-[13px] mono truncate" x-text="node.name"></span>
                <span class="text-[11px] text-[var(--text-faint)]">
                  <span x-text="node.services"></span> svc ·
                  <span x-text="node.containers"></span> ctn ·
                  <span x-text="node.stacks"></span> stacks
                </span>
              </div>
            </button>
            <!-- Right-side pills + action buttons. Doesn't toggle.
                 On mobile (parent is flex-col), this sits BELOW the
                 toggle area as its own row + wraps internally. On sm+
                 (parent is flex-row), `ms-auto` re-anchors it to the
                 right and pills sit inline. -->
            <div class="flex items-center gap-2 flex-wrap sm:ms-auto">
              <span x-show="node.updates > 0"
                    class="pill pill-update text-[10.5px]">
                <span x-text="node.updates"></span> updates
              </span>
              <span x-show="node.offline > 0"
                    class="pill pill-error text-[10.5px]">
                <span x-text="node.offline"></span> offline
              </span>
              <span x-show="node.degraded > 0"
                    class="pill pill-update text-[10.5px]">
                <span x-text="node.degraded"></span> degraded
              </span>
              <!-- Up-to-date green pill — matches the Stacks view's
                   "uptodate / total ok" convention so all three views
                   (stacks / services / nodes) share the same colour
                   language. Only shows when there are matches AND no
                   updates are pending (don't want a green chip next
                   to an amber "updates" chip — confusing). -->
              <span x-show="node.uptodate > 0 && node.updates === 0"
                    class="pill pill-ok text-[10.5px]">
                <span x-text="node.uptodate"></span>
                <span x-text="t('chips.ok_suffix')"></span>
              </span>
              <!-- Host-stats chip — green when at least one configured
                   source (node-exporter / Beszel / Pulse) returned
                   data for this node. The label shows whichever
                   sources are active; hidden when all host-stats
                   sources are off. -->
              <span x-show="nodeStats(node.name).exporterStatus === 'ok'"
                    class="pill pill-ok text-[10.5px]"
                    :title="t('nodes.stats_merged_from_title', { sources: nodeProviderList(node.name) })">
                <span x-text="nodeProviderChip(node.name)"></span> ✓
              </span>
              <span x-show="nodeStats(node.name).exporterStatus === 'error'"
                    class="pill pill-error text-[10.5px] cursor-help"
                    :title="nodeStats(node.name).exporterError || t('nodes.stats_all_failed_title')">
                <span x-text="nodeProviderChip(node.name)"></span> ✗
              </span>
              <span class="text-[11px] text-[var(--text-dim)] mx-1">
                <span x-text="node.total"></span> total
              </span>
              <!-- Prune — admin-only, hidden on the synthetic Unpinned
                   bucket because there's no real node to target. -->
              <button x-show="isAdmin() && !node.is_unpinned"
                      @click="pruneNode(node.name)"
                      :disabled="isPruneBusy(node.name)"
                      class="btn btn-danger-outline text-[11px]"
                      :title="t('nodes.prune_button_title', { node: node.name })">
                <template x-if="isPruneBusy(node.name)"><span class="flex items-center gap-1"><span class="spin"></span><span x-text="t('nodes.pruning_label')"></span></span></template>
                <template x-if="!isPruneBusy(node.name)"><span class="flex items-center gap-1">
                  <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash"/></svg>
                  <span x-text="t('nodes.prune_label')"></span>
                </span></template>
              </button>
            </div>
          </div>

          <!-- Always-visible stats strip: CPU / Memory / Disk / Uptime
               for this node, aggregated from its containers' stats plus
               a sparkline mirroring the stacks-view pattern. Non-collapsed
               so operators get at-a-glance node health without clicking. -->
          <div x-show="!node.is_unpinned"
               class="grid grid-cols-2 md:grid-cols-4 gap-3 px-5 py-3 border-t border-[var(--border)] bg-[var(--surface-2)]/40">
            <!-- CPU (percentage is of node capacity — containers' raw
                 sum divided by the node's core count, clamped 0-100). -->
            <div>
              <div class="flex items-baseline justify-between mb-1.5">
                <span class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)]"
                      x-text="nodeStats(node.name).hasHostCpu ? 'Host CPU' : 'CPU'"></span>
                <span class="text-[12px] mono"
                      x-text="(nodeStats(node.name).hasHostCpu || nodeStats(node.name).hasStats)
                              ? cpuLabel(nodeCpuPercent(node.name))
                              : '—'"></span>
              </div>
              <div class="stat-bar" x-bind="statBarBind(nodeCpuPercent(node.name), 'columns.cpu')"
                   :class="barLevel(nodeCpuPercent(node.name))"
                   :style="'--w: ' + nodeCpuPercent(node.name) + '%'">
                <div class="fill"></div>
              </div>
              <div class="text-[10.5px] text-[var(--text-faint)] mt-1"
                   x-show="nodeStats(node.name).cores"
                   x-text="nodeStats(node.name).cores + ' cores'"></div>
              <svg viewBox="0 0 60 10" preserveAspectRatio="none"
                   class="spark mt-1"
                   :class="nodeSparkClass(node.name, 'cpu')"
                   x-show="nodeSparkPoints(node.name, 'cpu')">
                <polyline fill="none" stroke="currentColor" stroke-width="1" :points="nodeSparkPoints(node.name, 'cpu')"></polyline>
              </svg>
            </div>

            <!-- Memory — host RAM via node-exporter when available, else
                 the container-sum vs. node capacity we had before. -->
            <div>
              <div class="flex items-baseline justify-between mb-1.5">
                <span class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)]"
                      x-text="nodeStats(node.name).hasHostStats ? 'Host memory' : 'Memory'"></span>
                <template x-if="nodeStats(node.name).hasHostStats && nodeStats(node.name).hostMemTotal">
                  <span class="text-[12px] mono"
                        x-text="hostMemPercent(node.name).toFixed(1) + '% · '
                                + fmtBytes(nodeStats(node.name).hostMemUsed) + ' / '
                                + fmtBytes(nodeStats(node.name).hostMemTotal)"></span>
                </template>
                <template x-if="!(nodeStats(node.name).hasHostStats && nodeStats(node.name).hostMemTotal)">
                  <span class="text-[12px] mono"
                        x-text="nodeStats(node.name).hasStats
                                ? nodeMemPercent(node.name).toFixed(1) + '% · '
                                  + fmtBytes(nodeStats(node.name).memUsage) + ' / '
                                  + fmtBytes(nodeStats(node.name).memLimit)
                                : '—'"></span>
                </template>
              </div>
              <div class="stat-bar" x-bind="statBarBind((nodeStats(node.name).hasHostStats ? hostMemPercent(node.name) : nodeMemPercent(node.name)), 'columns.memory')"
                   :class="barLevel(nodeStats(node.name).hasHostStats ? hostMemPercent(node.name) : nodeMemPercent(node.name))"
                   :style="'--w: ' + (nodeStats(node.name).hasHostStats ? hostMemPercent(node.name) : nodeMemPercent(node.name)) + '%'">
                <div class="fill"></div>
              </div>
              <svg viewBox="0 0 60 10" preserveAspectRatio="none"
                   class="spark mt-1"
                   :class="nodeSparkClass(node.name, 'mem')"
                   x-show="nodeSparkPoints(node.name, 'mem')">
                <polyline fill="none" stroke="currentColor" stroke-width="1" :points="nodeSparkPoints(node.name, 'mem')"></polyline>
              </svg>
            </div>

            <!-- Disk — when node-exporter is available, show REAL host
                 disk (all non-pseudo mounts, from node_filesystem_*
               metrics). Docker daemon footprint (from /system/df)
                 stays as a second line so operators can see both. -->
            <div>
              <template x-if="nodeStats(node.name).hasHostStats && nodeStats(node.name).hostDiskTotal">
                <div>
                  <div class="flex items-baseline justify-between mb-1.5">
                    <span class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)]"
                          :title="t('nodes.host_disk_tooltip')"
                          x-text="t('nodes.host_disk_label')"></span>
                    <span class="text-[12px] mono"
                          x-text="hostDiskPercent(node.name).toFixed(1) + '% · '
                                  + fmtBytes(nodeStats(node.name).hostDiskUsed) + ' / '
                                  + fmtBytes(nodeStats(node.name).hostDiskTotal)"></span>
                  </div>
                  <div class="stat-bar" x-bind="statBarBind(hostDiskPercent(node.name), 'columns.disk')"
                       :class="barLevel(hostDiskPercent(node.name))"
                       :style="'--w: ' + hostDiskPercent(node.name) + '%'">
                    <div class="fill"></div>
                  </div>
                  <div class="text-[10px] text-[var(--text-faint)] mt-1"
                       x-text="t('nodes.docker_disk_label', { value: (nodeStats(node.name).hasSize ? fmtBytes(nodeStats(node.name).dockerDisk) : '—') })"></div>
                </div>
              </template>
              <template x-if="!(nodeStats(node.name).hasHostStats && nodeStats(node.name).hostDiskTotal)">
                <div>
                  <div class="flex items-baseline justify-between mb-1.5">
                    <span class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)]"
                          :title="t('nodes.docker_disk_tooltip')"
                          x-text="t('nodes.docker_disk_label_short')"></span>
                    <span class="text-[12px] mono"
                          x-text="nodeStats(node.name).hasSize ? fmtBytes(nodeStats(node.name).dockerDisk) : '—'"></span>
                  </div>
                  <div class="stat-bar" x-bind="statBarBind(nodeDiskPercent(node.name), 'columns.disk')"
                       :class="barLevel(nodeDiskPercent(node.name))"
                       :style="'--w: ' + nodeDiskPercent(node.name) + '%'">
                    <div class="fill"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- Uptime — host boot time from node-exporter when
                 available, else the oldest-running-task proxy. The
                 label itself says which source; no caption needed. -->
            <div>
              <div class="flex items-baseline justify-between mb-1.5">
                <span class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)]"
                      x-text="nodeUptimeKind(node.name) === 'host' ? 'Host uptime' : 'Uptime (task)'"></span>
                <span class="text-[12px] mono" x-text="fmtDuration(nodeUptime(node.name))"></span>
              </div>
            </div>
          </div>

          <!-- Node body — stack-grouped items. Same row renderer as
               the stacks view's individual item rows, but we tee it
               up with a lightweight custom list here to avoid a full
               table re-layout per node (simpler to scan visually). -->
          <div x-show="isNodeExpanded(node.name)" class="border-t border-[var(--border)]">
            <template x-for="stack in node.stackList" :key="node.name + '|' + stack.name">
              <div class="border-b border-[var(--border)] last:border-b-0">
                <div class="px-4 py-2 bg-[var(--surface-2)]/40 flex items-center gap-2">
                  <span class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)]" x-text="stack.is_standalone ? 'Standalone' : 'Stack'"></span>
                  <span class="font-semibold text-[12px]" x-text="stack.name"></span>
                  <span class="text-[10.5px] text-[var(--text-faint)]"
                        x-text="'(' + stack.items.length + ')'"></span>
                </div>
                <template x-for="item in stack.items" :key="node.name + '|' + item.id">
                  <div class="flex items-center gap-3 px-5 py-2 border-t border-[var(--border)] hover:bg-[var(--row-hover)] cursor-pointer"
                       :class="(item._stale || isStale(statsFor(item))) ? 'row-stale-flash' : ''"
                       @click="openDrawer(item)">
                    <img :src="itemIconUrl(item)" x-show="itemIconUrl(item)" width="18" height="18" class="opacity-90 flex-shrink-0">
                    <div class="flex-1 min-w-0">
                      <div class="text-[12.5px] font-medium truncate" x-text="item.name"></div>
                      <div class="text-[10.5px] text-[var(--text-faint)] mono truncate" x-text="item.image"></div>
                    </div>
                    <span class="pill" :class="'pill-' + (item.health || 'unknown')" x-text="item.health || '—'"></span>
                    <span class="pill" :class="'pill-' + statusKey(item.status)" x-text="item.status || '—'"></span>
                    <span class="text-[10.5px] text-[var(--text-faint)] mono hidden md:inline"
                          x-text="item.type"></span>
                  </div>
                </template>
              </div>
            </template>
            <div x-show="node.stackList.length === 0"
                 class="px-5 py-6 text-center text-[11px] text-[var(--text-faint)] italic">
              No resources on this node match the current filter.
            </div>
          </div>
        </div>
      </template>
      <!-- Empty-state ladder, same pattern as stacks/services views:
             1. loading + no data yet → spinner
             2. loading done + empty → point at Portainer settings / filter
             3. filtered out → "no match" with a clear-filters shortcut -->
      <div x-show="loading && items.length === 0" class="skeleton-table" :aria-label="t('loading.resources')">
        <template x-for="i in 6" :key="i">
          <div class="skeleton-row">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell"></div>
            <div class="skeleton-cell bar"></div>
            <div class="skeleton-cell bar"></div>
            <div class="skeleton-cell short"></div>
            <div class="skeleton-cell short"></div>
          </div>
        </template>
      </div>
      <div x-show="!loading && items.length === 0 && portainerConfigured === false"
           class="rounded border border-[var(--warning)] bg-[var(--surface-2)] px-4 py-3 text-[12.5px] text-[var(--text-dim)] flex items-start gap-3">
        <svg width="18" height="18" class="text-[var(--warning)] flex-shrink-0 mt-0.5" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-info"/></svg>
        <div class="min-w-0 flex-1">
          <div class="font-semibold text-[var(--text)]" x-text="t('empty.portainer_not_configured.title')"></div>
          <div class="mt-1" x-text="t('empty.portainer_not_configured.body')"></div>
          <button x-show="isAdmin()" @click="view='admin'; adminTab='portainer'"
                  class="btn btn-primary text-[12px] mt-2"
                  x-text="t('empty.portainer_not_configured.cta')"></button>
        </div>
      </div>
      <div x-show="!loading && items.length === 0 && portainerConfigured !== false" class="text-center py-16 text-[var(--text-faint)] text-sm" x-text="t('empty.no_nodes')"></div>
      <div x-show="!loading && items.length > 0 && nodeGroups().length === 0" class="text-center py-16 text-[var(--text-faint)] text-sm">
        <span x-text="t('empty.no_match_filters')"></span>
        <button @click="search='';statusFilter='';healthFilter=''" class="ms-2 text-[var(--primary)] hover:underline" x-text="t('empty.clear')"></button>
      </div>
    </div>

    <!-- ===== HOSTS VIEW ===== -->
    <!-- Beszel-backed host list. Each row matches the collapsed Beszel
         layout (status dot, hostname, platform, CPU/Mem/Disk bars,
         uptime, agent, cores, arch, kernel). Expanding a row reveals
         SYSTEM + HARDWARE cards. See /api/hosts for the data shape. -->
    <div x-show="view==='hosts'" class="space-y-3">
      <!-- HOSTS BULK PROGRESS BADGE — appears for ~5 s after a bulk
           action lands so the operator gets visible confirmation
           that N rows were touched. Cleared by `_bulkAppliedTimer`
           in `_hostsBulkPost`. Per-row check glyphs render
           alongside this on each affected row. -->
      <div x-show="view==='hosts' && bulkAppliedSummary"
           class="hosts-bulk-progress fade-in"
           role="status"
           aria-live="polite"
           x-cloak>
        <svg width="13" height="13" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-check"/></svg>
        <span x-text="t('hosts_extra.bulk.progress_badge', {
                       applied: (bulkAppliedSummary && bulkAppliedSummary.applied) || 0,
                       total:   (bulkAppliedSummary && bulkAppliedSummary.total)   || 0,
                     }) || ((bulkAppliedSummary && bulkAppliedSummary.applied) + ' / ' + (bulkAppliedSummary && bulkAppliedSummary.total) + ' applied')"></span>
      </div>
      <!-- HOSTS BULK ACTION BAR — sticky at the bottom of the page
           when one or more hosts are selected via the row checkbox.
           Admin-only because every action mutates curated config or
           sampler state; readonly users still see the checkboxes
           hidden via the `isAdmin()` gate on the row. Mirrors the
           items bulk bar pattern (4 actions + clear button). -->
      <div x-show="selectedHosts.size > 0 && isAdmin()"
           class="hosts-bulk-bar fade-in"
           role="toolbar"
           :aria-label="t('hosts_extra.bulk.bar_aria') || 'Bulk host actions'">
        <span class="hosts-bulk-bar-count"
              x-text="t('hosts_extra.bulk.selected', { count: selectedHosts.size }) || (selectedHosts.size + ' selected')"></span>
        <button type="button" @click="bulkResumeHosts()"
                class="btn btn-soft text-[12px]"
                :title="t('hosts_extra.bulk.resume_title') || 'Resume sampling on selected hosts'">
          <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-rotate-cw"/></svg>
          <span x-text="t('hosts_extra.bulk.resume') || 'Resume'"></span>
        </button>
        <button type="button" @click="bulkPauseHosts()"
                class="btn btn-warning text-[12px]"
                :title="t('hosts_extra.bulk.pause_title') || 'Pause sampling on selected hosts'">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          <span x-text="t('hosts_extra.bulk.pause') || 'Pause'"></span>
        </button>
        <!-- Visual separator between sampler-state actions (Resume /
             Pause — affect runtime sampling) and SNMP-config actions
             (Vendors / Tunables — affect curated `hosts_config`). The
             two groups touch different state planes; the divider
             signals the semantic distinction at a glance. -->
        <span class="hosts-bulk-bar-divider" aria-hidden="true"></span>
        <button type="button" @click="openBulkSnmpVendorsModal()"
                class="btn btn-ghost text-[12px]"
                :title="t('hosts_extra.bulk.snmp_vendors_title') || 'Apply SNMP vendor MIBs'">
          <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-server"/></svg>
          <span x-text="t('hosts_extra.bulk.snmp_vendors') || 'SNMP vendors'"></span>
        </button>
        <button type="button" @click="openBulkSnmpTunablesModal()"
                class="btn btn-ghost text-[12px]"
                :title="t('hosts_extra.bulk.snmp_tunables_title') || 'Apply per-host SNMP tunable overrides'">
          <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sliders"/></svg>
          <span x-text="t('hosts_extra.bulk.snmp_tunables') || 'Tunables'"></span>
        </button>
        <span class="flex-1"></span>
        <button type="button" @click="clearHostSelection()"
                class="btn btn-ghost text-[12px]"
                x-text="t('hosts_extra.bulk.clear') || 'Clear'"></button>
      </div>
      <!-- BULK SNMP VENDORS MODAL -->
      <div x-show="bulkSnmpVendorsModal.open"
           x-cloak
           class="fixed inset-0 z-50 flex items-center justify-center p-4"
           :style="bulkSnmpVendorsModal.open ? 'display:flex' : 'display:none'"
           role="dialog" aria-modal="true">
        <div class="absolute inset-0 backdrop" @click="closeBulkSnmpVendorsModal()"></div>
        <div class="relative bg-[var(--surface)] border border-[var(--border-bright)] rounded-md p-5 w-full max-w-md shadow-xl">
          <h3 class="text-[13px] font-semibold mb-3"
              x-text="t('hosts_extra.bulk.snmp_vendors_modal_title', { count: selectedHosts.size }) || 'Apply SNMP vendor MIBs to ' + selectedHosts.size + ' host(s)'"></h3>
          <p class="text-[11.5px] text-[var(--text-dim)] mb-3"
             x-text="t('hosts_extra.bulk.snmp_vendors_modal_body') || 'Pick which vendor MIB families to walk on the selected hosts. Empty list with mode = set clears the override (resumes auto-detect from sysDescr).'"></p>
          <div class="mb-3">
            <label class="text-[11px] text-[var(--text-faint)] block mb-1"
                   x-text="t('hosts_extra.bulk.snmp_vendors_mode_label') || 'Mode'"></label>
            <select x-model="bulkSnmpVendorsModal.mode" class="text-[12px] w-full">
              <option value="set" x-text="t('hosts_extra.bulk.snmp_vendors_mode_set') || 'Replace selection'"></option>
              <option value="add" x-text="t('hosts_extra.bulk.snmp_vendors_mode_add') || 'Add to existing'"></option>
              <option value="remove" x-text="t('hosts_extra.bulk.snmp_vendors_mode_remove') || 'Remove from existing'"></option>
            </select>
          </div>
          <div class="mb-4">
            <label class="text-[11px] text-[var(--text-faint)] block mb-2"
                   x-text="t('hosts_extra.bulk.snmp_vendors_picker_label') || 'Vendors'"></label>
            <div class="flex flex-wrap gap-2">
              <template x-for="v in (me && me.client_config && me.client_config.snmp_vendor_keys) || ['dell','cisco','apc','synology','ucd','printer']" :key="v">
                <label class="chip text-[11px] px-2 py-1 cursor-pointer"
                       :class="(bulkSnmpVendorsModal.vendors || []).includes(v) ? 'pill-info' : 'pill-muted'">
                  <input type="checkbox"
                         class="me-1"
                         :checked="(bulkSnmpVendorsModal.vendors || []).includes(v)"
                         @change="toggleBulkVendor(v)">
                  <span x-text="snmpVendorLabel(v)"></span>
                </label>
              </template>
            </div>
          </div>
          <p class="text-[11.5px] text-[var(--text-faint)] mb-3"
             x-text="t('hosts_extra.bulk.affects_count', { count: selectedHosts.size })"></p>
          <div class="flex items-center justify-end gap-2">
            <button type="button" @click="closeBulkSnmpVendorsModal()"
                    class="btn btn-ghost text-[12px]"
                    x-text="t('actions.cancel') || 'Cancel'"></button>
            <button type="button" @click="submitBulkSnmpVendors()"
                    class="btn btn-primary text-[12px]"
                    x-text="t('hosts_extra.bulk.apply') || 'Apply'"></button>
          </div>
        </div>
      </div>
      <!-- BULK SNMP TUNABLES MODAL -->
      <div x-show="bulkSnmpTunablesModal.open"
           x-cloak
           class="fixed inset-0 z-50 flex items-center justify-center p-4"
           :style="bulkSnmpTunablesModal.open ? 'display:flex' : 'display:none'"
           role="dialog" aria-modal="true">
        <div class="absolute inset-0 backdrop" @click="closeBulkSnmpTunablesModal()"></div>
        <div class="relative bg-[var(--surface)] border border-[var(--border-bright)] rounded-md p-5 w-full max-w-md shadow-xl">
          <h3 class="text-[13px] font-semibold mb-3"
              x-text="t('hosts_extra.bulk.snmp_tunables_modal_title', { count: selectedHosts.size }) || 'Apply SNMP tunables to ' + selectedHosts.size + ' host(s)'"></h3>
          <p class="text-[11.5px] text-[var(--text-dim)] mb-3"
             x-text="t('hosts_extra.bulk.snmp_tunables_modal_body') || 'Set per-host overrides for walk_concurrency (1-16) and wall_clock_budget (5-600s). Leave a field blank to skip it. Enable Clear to remove existing overrides.'"></p>
          <div class="grid grid-cols-2 gap-3 mb-4">
            <div>
              <label class="text-[11px] text-[var(--text-faint)] block mb-1"
                     x-text="t('hosts_extra.bulk.snmp_tunables_walk_label') || 'walk_concurrency (1-16)'"></label>
              <input type="number" min="1" max="16"
                     x-model="bulkSnmpTunablesModal.walk_concurrency"
                     :disabled="bulkSnmpTunablesModal.clear"
                     class="text-[12px] w-full">
            </div>
            <div>
              <label class="text-[11px] text-[var(--text-faint)] block mb-1"
                     x-text="t('hosts_extra.bulk.snmp_tunables_budget_label') || 'wall_clock_budget (5-600s)'"></label>
              <input type="number" min="5" max="600"
                     x-model="bulkSnmpTunablesModal.wall_clock_budget"
                     :disabled="bulkSnmpTunablesModal.clear"
                     class="text-[12px] w-full">
            </div>
          </div>
          <label class="flex items-center gap-2 text-[12px] mb-4">
            <input type="checkbox" x-model="bulkSnmpTunablesModal.clear">
            <span x-text="t('hosts_extra.bulk.snmp_tunables_clear_label') || 'Clear (remove per-host overrides)'"></span>
          </label>
          <p class="text-[11.5px] text-[var(--text-faint)] mb-3"
             x-text="t('hosts_extra.bulk.affects_count', { count: selectedHosts.size })"></p>
          <div class="flex items-center justify-end gap-2">
            <button type="button" @click="closeBulkSnmpTunablesModal()"
                    class="btn btn-ghost text-[12px]"
                    x-text="t('actions.cancel') || 'Cancel'"></button>
            <button type="button" @click="submitBulkSnmpTunables()"
                    class="btn btn-primary text-[12px]"
                    x-text="t('hosts_extra.bulk.apply') || 'Apply'"></button>
          </div>
        </div>
      </div>
      <!-- Drawer backdrop — dims the page behind the host
           detail drawer + closes it on click. Same pattern as the
           item / node drawers: outer fixed-position box at z-30 (the
           drawer panel itself is z-40 on `.host-drawer`), inner
           backdrop div, fade-in keyframe class for the dimming sweep
           that pairs with the panel's slide-in. -->
      <div x-show="drawerHost"
           x-transition:enter="transition ease-out duration-200"
           x-transition:enter-start="opacity-0"
           x-transition:enter-end="opacity-100"
           x-transition:leave="transition ease-in duration-150"
           x-transition:leave-start="opacity-100"
           x-transition:leave-end="opacity-0"
           @click="closeHostDrawer()"
           class="fixed inset-0 z-30 backdrop fade-in"></div>
      <!-- Toolbar — quick links to each configured provider UI, so
           adding or managing systems outside OmniGrid is one click
           away. Each button carries the provider's brand glyph for a
           quick visual anchor. The status strip in the middle shows
           which providers are actually feeding this view. -->
      <div x-show="hostsConfigured" class="flex items-center justify-between gap-3 flex-wrap">
        <div class="flex items-center gap-3 text-[12px] text-[var(--text-dim)] flex-wrap">
          <span>
            <span x-text="hosts.length === 1 ? t('hosts_extra.host_count_one') : t('hosts_extra.host_count_many', { count: hosts.length })"></span>
            <span class="text-[var(--text-faint)]">
              <span x-show="(hostsActiveSources || []).length > 0">
                <span x-text="t('hosts_extra.merged_from', { sources: (hostsActiveSources || []).map(s => s === 'node_exporter' ? 'node-exporter' : s).join(' + ') })"></span>
              </span>
              <!-- Polling-cadence label gated on `refreshInterval`
                   (the unified picker), NOT `statsInterval`.
                   `statsInterval === 0` is true in BOTH Live mode AND
                   Off mode (because Live maps `statsInterval=0` so the
                   SPA polls idle while SSE pushes), so reading
                   `statsInterval` alone showed "polling off" even in
                   Live mode. Now: refreshInterval=-1 → Live label,
                   refreshInterval=0 → operator-explicit Off (warning
                   colour), refreshInterval>0 → interval-mode label. -->
              <span x-show="refreshInterval === -1"
                    x-text="t('hosts_extra.live_mode')"></span>
              <span x-show="refreshInterval > 0"
                    x-text="t('hosts_extra.polled_every', { interval: fmtIntervalShort(refreshInterval) })"></span>
              <span x-show="refreshInterval === 0" class="text-[var(--warning)]"
                    x-text="t('hosts_extra.polling_off')"></span>
            </span>
          </span>
          <span class="flex items-center gap-1.5 flex-wrap"
                x-show="(hosts && hosts.length) || Object.keys(hostsProviderErrors || {}).length">
            <!-- clickable provider filter chips. Each chip
                 toggles the provider into the active filter set
                 (multi-select OR semantics); the "All" button clears
                 the set; the "No provider" chip filters to curated
                 rows without any provider mapped. Mono SVG icons
                 (mask-image + currentColor) match the Admin → Hosts
                 collapsed-card chip strip so the visual language is
                 consistent across both surfaces. State / error /
                 unmatched colouring kept.
                 The chip's :class adds `chip-active` when the chip is
                 in the filter set so operators see the currently-
                 selected providers at a glance. -->
            <button type="button"
                    @click="clearHostsProviderFilter()"
                    class="chip text-[10.5px] cursor-pointer"
                    :class="(hostsProviderFilter && hostsProviderFilter.size === 0) ? 'pill-primary' : 'pill-muted'"
                    :title="t('hosts_extra.provider_filter.all_title')"
                    :aria-pressed="!!(hostsProviderFilter && hostsProviderFilter.size === 0)">
              <span x-text="t('hosts_extra.provider_filter.show_all')"></span>
              <!-- NIT-UX — small reset glyph appears only when at
                   least one chip is currently active, signalling that
                   "All" is a clear-all rather than a separate filter. -->
              <span x-show="hostsProviderFilter && hostsProviderFilter.size > 0" class="ms-1">↻</span>
            </button>
            <template x-for="p in ['beszel','pulse','node_exporter','webmin','ping','snmp']" :key="p">
              <button type="button"
                      x-show="hostsProviderState(p).visible"
                      @click="toggleHostsProviderFilter(p)"
                      class="chip text-[10.5px] cursor-pointer flex items-center gap-1"
                      :class="[
                        isHostsProviderFilterActive(p) ? 'chip-active' : '',
                        hostsProviderState(p).cls
                      ]"
                      :style="hostsProviderState(p).styled ? providerChipStyle(p) : ''"
                      :title="hostsProviderState(p).title"
                      :aria-pressed="isHostsProviderFilterActive(p)">
                <span class="provider-icon"
                      :style="providerIconStyle(p)"
                      aria-hidden="true"></span>
                <span x-text="p === 'node_exporter' ? 'exporter' : p"></span>
                <span x-show="hostsProviderState(p).icon" x-text="hostsProviderState(p).icon"></span>
              </button>
            </template>
            <button type="button"
                    x-show="hostsWithNoProviderCount() > 0"
                    @click="toggleHostsProviderFilter('none')"
                    class="chip text-[10.5px] cursor-pointer"
                    :class="isHostsProviderFilterActive('none') ? 'chip-active pill-warning' : 'pill-muted'"
                    :title="t('hosts_extra.provider_filter.none_title', { count: hostsWithNoProviderCount() })"
                    :aria-pressed="isHostsProviderFilterActive('none')">
              <span x-text="t('hosts_extra.provider_filter.none')"></span>
              <span class="ms-1" x-text="hostsWithNoProviderCount()"></span>
            </button>
          </span>
        </div>
        <!-- Right-side toolbar cluster. `grow` makes this cluster fill
             the remaining width to the right of the LEFT (status) cluster
             so the inner spacer has room to push the Beszel / Pulse links
             to the trailing edge. Without `grow` the cluster shrinks to
             fit-content and the spacer collapses to 0 px — operator-flagged
             twice that the buttons stayed packed left next to expand /
             collapse. RTL-aware via the logical-property spacer. -->
        <div class="flex items-center gap-2 flex-wrap grow">
          <!-- Expand / collapse all — lives here on the Hosts view
               because the shared toolbar above sits inside the
               stacks/services/nodes filter bar that this view
               doesn't render. Same handlers the other views use. -->
          <div x-show="hosts.length > 0"
               class="flex items-center gap-1 bg-[var(--surface-2)] rounded-md p-0.5 border border-[var(--border)]">
            <button @click="expandAllHosts()"
                    class="px-2.5 py-1 rounded text-[11px] font-medium text-[var(--text-dim)] hover:text-[var(--text)] transition flex items-center gap-1.5">
              <svg width="10" height="10" stroke-width="2.4" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-down"/></svg>
              <span x-text="t('filters.expand_all')"></span>
            </button>
            <button @click="collapseAllHosts()"
                    class="px-2.5 py-1 rounded text-[11px] font-medium text-[var(--text-dim)] hover:text-[var(--text)] transition flex items-center gap-1.5">
              <svg width="10" height="10" stroke-width="2.4" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-up"/></svg>
              <span x-text="t('filters.collapse_all')"></span>
            </button>
          </div>
          <!-- Group expand/collapse. Visible only when the
               operator has defined at least one host group. -->
          <div x-show="hostGroups.length > 0 && hosts.length > 0"
               class="flex items-center gap-1 bg-[var(--surface-2)] rounded-md p-0.5 border border-[var(--border)]">
            <button @click="expandAllGroups()"
                    :title="t('hosts_extra_groups.expand_all_title')"
                    class="px-2.5 py-1 rounded text-[11px] font-medium text-[var(--text-dim)] hover:text-[var(--text)] transition flex items-center gap-1.5">
              <svg width="10" height="10" stroke-width="2.4" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-down"/></svg>
              <span x-text="t('hosts_extra_groups.expand_all')"></span>
            </button>
            <button @click="collapseAllGroups()"
                    :title="t('hosts_extra_groups.collapse_all_title')"
                    class="px-2.5 py-1 rounded text-[11px] font-medium text-[var(--text-dim)] hover:text-[var(--text)] transition flex items-center gap-1.5">
              <svg width="10" height="10" stroke-width="2.4" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-up"/></svg>
              <span x-text="t('hosts_extra_groups.collapse_all')"></span>
            </button>
          </div>
          <!-- Hosts-toolbar refresh button removed in the
               topbar refresh icon is now context-aware and triggers
               `loadHosts()` automatically when the Hosts view is
               active. One refresh affordance is plenty. -->
          <!-- Flex-spacer pushes the external-link cluster to the
               trailing edge. Originally used `ms-auto` on the cluster
               itself; Tailwind v4's in-browser JIT was unreliable
               applying it (operator-flagged 2026-05-01). The empty
               grow-1 spacer is robust across Tailwind versions and
               keeps the layout RTL-correct (the spacer just fills
               whichever direction is the writing flow). -->
          <div class="grow" aria-hidden="true"></div>
          <div class="flex items-center gap-2"
               x-show="settings.beszel_hub_url || settings.pulse_url">
            <a :href="settings.beszel_hub_url || '#'" target="_blank" rel="noopener"
               x-show="settings.beszel_hub_url"
               class="btn btn-ghost text-[12px] flex items-center gap-1.5"
               :title="t('hosts_extra.open_beszel_title')">
              <img src="/img/icons/beszel.svg" alt="" width="14" height="14" class="rounded-sm">
              <span x-text="t('hosts_extra.open_beszel')"></span>
              <svg width="10" height="10" class="opacity-60" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-right"/></svg>
            </a>
            <a :href="settings.pulse_url || '#'" target="_blank" rel="noopener"
               x-show="settings.pulse_url"
               class="btn btn-ghost text-[12px] flex items-center gap-1.5"
               :title="t('hosts_extra.open_pulse_title')">
              <img src="/img/icons/pulse.svg" alt="" width="14" height="14" class="rounded-sm">
              <span x-text="t('hosts_extra.open_pulse')"></span>
              <svg width="10" height="10" class="opacity-60" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-arrow-up-right"/></svg>
            </a>
          </div>
        </div>
      </div>

      <!-- Config banner — Beszel not set up, or hub returning errors. -->
      <div x-show="!hostsConfigured" class="rounded border border-[var(--warning)] bg-[var(--surface-2)] px-4 py-3 text-[12.5px] text-[var(--text-dim)]">
        <span x-text="hostsError || 'Beszel is not configured — set Hub URL / identity / password in Settings → Host stats.'"></span>
      </div>
      <!-- Aggregate error banner — hidden when per-provider chips in
           the toolbar are carrying the detail (avoids duplicate
           reporting). Only shows when every provider errored or
           something outside a provider failed. -->
      <div x-show="hostsConfigured && hostsError && Object.keys(hostsProviderErrors || {}).length === 0"
           class="rounded border border-[var(--danger)] bg-[var(--surface-2)] px-4 py-3 text-[12.5px] text-[var(--danger)]">
        <span x-text="t('hosts_extra.probe_error', { error: hostsError })"></span>
      </div>

      <!-- Search + sort row — filters the table by host id / label / OS /
           platform / kernel / provider names. Sort dropdown picks the
           ordering axis; default is status (alive first). Empty search
           = show all. `flex-wrap` so the search input + sort + toggle
           wrap onto separate rows on phone widths instead of clipping
           the "Hide hosts without agents" label and pushing the sort
           dropdown off-screen. `min-w-[180px]` on the search keeps it
           usable when the row wraps. -->
      <div x-show="hostsConfigured && hosts.length > 0" class="flex items-center gap-2 flex-wrap">
        <svg width="14" height="14" class="text-[var(--text-faint)]" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-search"/></svg>
        <input type="search" x-model.debounce.150ms="hostsSearch"
               class="flex-1 min-w-[180px] text-[12.5px] py-1.5"
               :placeholder="t('hosts_extra.filter_placeholder')">
        <span class="text-[10.5px] text-[var(--text-faint)]"
              x-show="hostsSearch"
              x-text="filteredHosts().length + ' of ' + hosts.length"></span>
        <button x-show="hostsSearch" @click="hostsSearch=''"
                class="btn btn-ghost text-[11px]" :title="t('hosts_extra.empty.clear_filter')"
                :aria-label="t('hosts_extra.empty.clear_filter')">✕</button>
        <label class="flex items-center gap-1.5 text-[11px] text-[var(--text-faint)] whitespace-nowrap"
               :title="t('hosts_extra.hide_unconfigured_title')">
          <input type="checkbox" x-model="hostsHideUnconfigured" class="align-middle">
          <span x-text="t('hosts_extra.hide_unconfigured_label')"></span>
          <!-- Count badge — shows how many no-agent hosts (typically IOT
               inventory: routers, switches, smart-home devices) are
               hidden behind the toggle so the operator stays aware of
               the rows that exist but aren't shown right now. -->
          <span x-show="hostsHideUnconfigured && (hosts || []).filter(h => !hostHasAgent(h)).length > 0"
                class="pill text-[10px] py-0 px-1.5 mono"
                x-text="(hosts || []).filter(h => !hostHasAgent(h)).length"></span>
        </label>
        <label class="flex items-center gap-1.5 text-[11px] text-[var(--text-faint)]">
          <span x-text="t('hosts_extra.sort_label')"></span>
          <select x-model="hostsSort" class="text-[12px] py-1 px-1.5"
                  :title="t('hosts_extra.sort_title')">
            <option value="status"        x-text="t('hosts_extra.sort.status')"></option>
            <option value="custom_number" x-text="t('hosts_extra.sort.custom_number')"></option>
            <option value="seq"           x-text="t('hosts_extra.sort.seq')"></option>
            <option value="name"          x-text="t('hosts_extra.sort.name')"></option>
            <option value="type"          x-text="t('hosts_extra.sort.type')"></option>
            <option value="cpu"           x-text="t('hosts_extra.sort.cpu')"></option>
            <option value="mem"           x-text="t('hosts_extra.sort.mem')"></option>
            <option value="disk"          x-text="t('hosts_extra.sort.disk')"></option>
            <option value="uptime"        x-text="t('hosts_extra.sort.uptime')"></option>
          </select>
        </label>
      </div>

      <!-- Mobile-first card layout — shown below 768px via CSS. Each
           card has the at-a-glance essentials (status, name, CPU /
           Mem / Disk %) and taps into the shared host drawer for
           full detail. Actions and per-row Test live in the drawer,
           not the card, to keep the tap target large. -->
      <div x-show="hostsConfigured" class="hosts-mobile-cards">
        <!-- Grouped render. When host_groups is empty the
             helper returns a single {group: null, hosts: [...]} bucket
             so the markup degrades to the flat list. -->
        <template x-for="(bucket, bi) in groupedHosts()" :key="(bucket.group ? bucket.group.name : '_ungrouped') + ':' + bi">
          <div>
            <!-- Group heading — shown only when at least one group is
                 defined OR when the ungrouped bucket is one of many. -->
            <div x-show="hostGroups.length > 0"
                 @click="toggleGroup(bucket.group ? bucket.group.name : '')"
                 class="host-group-heading flex items-center gap-2 mt-3 mb-1 px-2 py-1.5 rounded cursor-pointer select-none bg-[var(--surface-2)] border border-[var(--border)]">
              <svg width="11" height="11" aria-hidden="true" class="text-[var(--text-dim)] transition-transform flip-rtl" :style="isGroupCollapsed(bucket.group ? bucket.group.name : '') ? '' : 'transform: rotate(90deg)'"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/></svg>
              <!-- Parent label uses --text-dim (slightly faded) so sub-
                   group labels (which inherit full --text) stand out
                   as the more specific row. Operator request — visual
                   distinction between parent + sub-group at a glance
                   without reading the indent / range chips. -->
              <span class="font-semibold text-[12px] text-[var(--text-dim)]"
                    x-text="bucket.group ? hostGroupHeading(bucket.group) : t('hosts_extra_groups.ungrouped_label')"></span>
              <!-- Right-aligned cluster: range + IP chips immediately
                   before the host count so they read as a single
                   metadata strip on the right. -->
              <div class="flex items-center gap-2 ms-auto">
                <span x-show="bucket.group" class="pill pill-info text-[10px] mono"
                      x-text="'#' + bucket.group.range_start + '–' + bucket.group.range_end"></span>
                <span x-show="bucket.group && bucket.group.ip_range" class="pill pill-info text-[10px] mono"
                      x-text="bucket.group && bucket.group.ip_range"></span>
                <span class="text-[10.5px] text-[var(--text-faint)]"
                      x-text="bucketTotalHosts(bucket) === 1 ? t('hosts_extra_groups.count_one', {count: bucketTotalHosts(bucket)}) : t('hosts_extra_groups.count_many', {count: bucketTotalHosts(bucket)})"></span>
              </div>
            </div>
            <!-- One render loop covers BOTH parent-direct and
                 sub-group hosts (2-level nesting). bucketRenderList()
                 flattens with `_sub_group` + `_sub_heading` markers
                 so the SAME host-mobile-card markup serves both —
                 no template duplication. -->
            <template x-for="h in bucketRenderList(bucket)" :key="(h._sub_group ? h._sub_group.name + '|' : '') + h.host">
              <div>
                <!-- Sub-group heading row (first host of each sub). -->
                <div x-show="h._sub_heading && !isGroupCollapsed(bucket.group ? bucket.group.name : '')"
                     @click="toggleGroup(h._sub_group ? h._sub_group.name : '')"
                     class="host-group-heading flex items-center gap-2 mt-2 mb-1 ms-4 px-2 py-1.5 rounded cursor-pointer select-none bg-[var(--surface)] border border-[var(--border)]">
                  <svg width="11" height="11" aria-hidden="true" class="text-[var(--text-dim)] transition-transform flip-rtl" :style="(h._sub_group && isGroupCollapsed(h._sub_group.name)) ? '' : 'transform: rotate(90deg)'"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/></svg>
                  <span class="font-semibold text-[11.5px]" x-text="h._sub_group ? hostGroupHeading(h._sub_group) : ''"></span>
                  <div class="flex items-center gap-2 ms-auto" x-show="h._sub_group">
                    <span class="pill pill-info text-[10px] mono"
                          x-text="h._sub_group ? ('#' + h._sub_group.range_start + '–' + h._sub_group.range_end) : ''"></span>
                    <span x-show="h._sub_group && h._sub_group.ip_range" class="pill pill-info text-[10px] mono"
                          x-text="h._sub_group ? h._sub_group.ip_range : ''"></span>
                  </div>
                </div>
          <div class="host-mobile-card"
               :class="[h._sub_group ? 'ms-4' : '', isStale(h) ? 'row-stale-flash' : '']"
               x-show="!h._heading_only && !isGroupCollapsed(bucket.group ? bucket.group.name : '') && (!h._sub_group || !isGroupCollapsed(h._sub_group.name))"
               :data-expandable="isHostExpandable(h) ? 'true' : 'false'"
               :data-host-id="h.id"
               x-init="observeHostRow($el, h.id)"
               @click="toggleHost(h.host)">
            <div class="host-mobile-card-head">
              <!-- Bulk-selection checkbox. Same admin-only gate +
                   click-stop pattern as the desktop row. -->
              <input type="checkbox"
                     x-show="isAdmin()"
                     :checked="isHostSelected(h.id)"
                     @click.stop
                     @change="toggleHostSelection(h.id)"
                     class="hosts-row-select"
                     :aria-label="t('hosts_extra.bulk.row_select_aria', { name: hostDisplayName(h) }) || 'Select host'">
              <!-- Loading spinner replaces the status dot while
                   refreshHostRow is in flight for this row. Clear
                   visual signal that data is arriving. -->
              <template x-if="h._loading">
                <span class="host-loading-spinner" aria-hidden="true"></span>
              </template>
              <template x-if="!h._loading">
                <span class="host-mobile-card-status"
                      :class="'dot-status-' + (h.status || 'unknown')"
                      :title="hostProbeTitle(h)"></span>
              </template>
              <img class="host-mobile-card-icon" :src="hostIconUrl(h)"
                   x-show="hostIconUrl(h)" alt="" loading="lazy"
                   @error="$event.target.style.display='none'">
              <div class="host-mobile-card-title">
                <div class="flex items-center gap-1.5 min-w-0">
                  <span class="label" x-text="hostTypePrefix(h) + hostDisplayName(h)"></span>
                  <!-- Per-row bulk-applied check glyph. Drains
                       after ~5 s via the shared `_bulkAppliedTimer`
                       in `_hostsBulkPost`. -->
                  <span x-show="h._bulkApplied"
                        role="img"
                        class="bulk-applied-glyph inline-flex flex-shrink-0"
                        :title="t('hosts_extra.bulk.row_applied') || 'Bulk action applied'"
                        :aria-label="t('hosts_extra.bulk.row_applied') || 'Bulk action applied'">
                    <svg width="13" height="13" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-check"/></svg>
                  </span>
                  <!-- Health score chip — same shape as the desktop
                       row. Hidden when no axis is computable. -->
                  <span x-show="healthScore(h) != null"
                        class="chip text-[10px] px-1.5 py-0 mono health-chip flex-shrink-0"
                        :class="healthChipClass(healthScore(h))"
                        :title="t('hosts_extra.health.chip_title', { score: healthScore(h), worst: (healthWorstAxis(h) ? healthWorstAxis(h).label : '—') })"
                        x-text="healthScore(h)"></span>
                  <!-- Permanent-fail + probe-timeout + stale badges
                       — priority order matches the desktop table:
                       paused (red) > probe_timeout (amber, transient
                       60s back-off) > stale (amber, snapshot
                       fallback). Each gate excludes the higher-
                       priority states so only one badge ever
                       renders at a time. Wrapped in <span> so the
                       title attribute fires reliably as a hover
                       tooltip + screen readers announce it. -->
                  <span x-show="h.sampling_paused"
                        role="img"
                        class="inline-flex flex-shrink-0 cursor-help"
                        :title="t('hosts_extra.permanent_fail.badge_title_full', { minutes: hostFailureMinutes(h), error: (h.last_error || '—') })"
                        :aria-label="t('hosts_extra.permanent_fail.badge_title_full', { minutes: hostFailureMinutes(h), error: (h.last_error || '—') })">
                    <svg width="13" height="13"
                         class="text-[var(--danger)]"
                         aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-alert-triangle"/></svg>
                  </span>
                  <span x-show="!h.sampling_paused && h._probe_timeout"
                        role="img"
                        class="inline-flex flex-shrink-0 cursor-help"
                        :title="t('hosts_extra.probe_timeout.badge_title_full')"
                        :aria-label="t('hosts_extra.probe_timeout.badge_title_full')">
                    <svg width="12" height="12"
                         class="text-[var(--warning)]"
                         aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-zap"/></svg>
                  </span>
                  <span x-show="!h.sampling_paused && !h._probe_timeout && isStale(h)"
                        role="img"
                        class="inline-flex flex-shrink-0 cursor-help"
                        :title="t('hosts_extra.stale_marker.badge_title_full', { age: staleAge(h), fields: ((h._stale_fields || []).join(', ') || '—') })"
                        :aria-label="t('hosts_extra.stale_marker.badge_title_full', { age: staleAge(h), fields: ((h._stale_fields || []).join(', ') || '—') })">
                    <svg width="12" height="12"
                         class="text-[var(--warning)]"
                         aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-clock"/></svg>
                  </span>
                </div>
                <span class="sub" x-text="h.host + ' · ' + (h.os || h.platform || '—')"></span>
              </div>
              <div class="host-mobile-providers">
                <!-- Per-host provider chips. Red when provider is
                     globally enabled AND mapped to this host but
                     didn't return data (paused / unreachable / 401).
                     Brand color when healthy — driven by
                     `providerColor()`, per-provider customisable
                     under Settings → Providers. -->
                <template x-for="p in providerStates(h)" :key="p.name">
                  <span class="chip text-[9.5px] px-1 py-0"
                        :class="p.state === 'failing' ? 'pill-error'
                                : (p.state === 'paused' ? 'pill-warning'
                                : (p.state === 'loading' ? 'pill-custom chip-loading' : 'pill-custom'))"
                        :style="(p.state === 'failing' || p.state === 'paused') ? '' : providerChipStyle(p.name)"
                        :title="p.state === 'paused' ? t('hosts_extra.provider_paused', { provider: p.name, count: p.consecutive_failures, error: p.last_error || '—' })
                                : (p.state === 'failing' ? t('hosts_extra.provider_failing', { provider: p.name })
                                : (p.state === 'loading' ? t('hosts_extra.provider_loading', { provider: p.name }) || (p.name + ' — fetching…') : ''))"
                        x-text="p.name === 'node_exporter' ? 'exporter' : p.name"></span>
                </template>
              </div>
            </div>
            <!-- Metric strip — only rendered for hosts that are
                 actually online AND have a telemetry provider that
                 contributes CPU / Mem / Disk gauges. Ping-only hosts
                 are "up" via reachability but don't have those
                 gauges; rendering empty bars on them looks broken
                 . Offline / unknown hosts collapse the whole
                 row to just header + status dot so "0%" bars don't
                 imply "loading" on a host that's down. -->
            <div class="host-mobile-card-metrics" x-show="h.status === 'up' && hostHasTelemetry(h)">
              <div class="host-mobile-card-metric" x-show="hostHasCpuMetric(h)">
                <span class="name" x-text="t('columns.cpu')"></span>
                <span class="value" x-text="(h.cpu_percent || 0).toFixed(1) + '%'"></span>
                <div class="stat-bar" x-bind="statBarBind(Math.round(Math.min(100, h.cpu_percent || 0)), 'columns.cpu')"
                     :class="[barLevel(h.cpu_percent), isStaleField(h, 'host_cpu_percent') ? 'stale' : '']"
                     :style="'--w: ' + Math.round(Math.min(100, h.cpu_percent || 0)) + '%'"
                     :title="isStaleField(h, 'host_cpu_percent') ? staleAge(h) : ''">
                  <div class="fill"></div>
                </div>
                <svg x-show="hostHasInlineSpark(h, 'cpu')" class="spark"
                     :class="hostSparkClass(h, 'cpu')"
                     viewBox="0 0 100 16" preserveAspectRatio="none" aria-hidden="true">
                  <path fill="none" stroke="currentColor" stroke-width="1" :d="hostInlineSparkline(h, 'cpu')"/>
                </svg>
              </div>
              <div class="host-mobile-card-metric" x-show="hostHasMemMetric(h)">
                <span class="name" x-text="t('columns.memory')"></span>
                <span class="value"
                      x-text="Math.round(h.mem_percent || memPercentOf(h)) + '%'"></span>
                <div class="stat-bar" x-bind="statBarBind(Math.round(h.mem_percent || memPercentOf(h)), 'columns.memory')"
                     :class="[barLevel(h.mem_percent || memPercentOf(h)), (isStaleField(h, 'host_mem_total') || isStaleField(h, 'host_mem_used')) ? 'stale' : '']"
                     :style="'--w: ' + Math.round(h.mem_percent || memPercentOf(h)) + '%'"
                     :title="(isStaleField(h, 'host_mem_total') || isStaleField(h, 'host_mem_used')) ? staleAge(h) : ''">
                  <div class="fill"></div>
                </div>
                <svg x-show="hostHasInlineSpark(h, 'memory')" class="spark"
                     :class="hostSparkClass(h, 'memory')"
                     viewBox="0 0 100 16" preserveAspectRatio="none" aria-hidden="true">
                  <path fill="none" stroke="currentColor" stroke-width="1" :d="hostInlineSparkline(h, 'memory')"/>
                </svg>
              </div>
              <div class="host-mobile-card-metric" x-show="hostHasDiskMetric(h)">
                <span class="name" x-text="t('columns.disk')"></span>
                <span class="value"
                      x-text="fmtPercentLabel(h.disk_percent || diskPercentOf(h))"></span>
                <div class="stat-bar" x-bind="statBarBind(Math.round(h.disk_percent || diskPercentOf(h)), 'columns.disk')"
                     :class="[barLevel(h.disk_percent || diskPercentOf(h)), (isStaleField(h, 'host_disk_total') || isStaleField(h, 'host_disk_used')) ? 'stale' : '']"
                     :style="'--w: ' + ((h.disk_percent || diskPercentOf(h)) > 0 ? Math.max(1, Math.round(h.disk_percent || diskPercentOf(h))) : 0) + '%'"
                     :title="(isStaleField(h, 'host_disk_total') || isStaleField(h, 'host_disk_used')) ? staleAge(h) : ''">
                  <div class="fill"></div>
                </div>
                <svg x-show="hostHasInlineSpark(h, 'disk')" class="spark"
                     :class="hostSparkClass(h, 'disk')"
                     viewBox="0 0 100 16" preserveAspectRatio="none" aria-hidden="true">
                  <path fill="none" stroke="currentColor" stroke-width="1" :d="hostInlineSparkline(h, 'disk')"/>
                </svg>
              </div>
            </div>
          </div>
              </div><!-- /per-row wrapper from bucketRenderList template -->
            </template>
          </div>
        </template>
      </div>

      <div x-show="hostsConfigured" class="hosts-desktop-table rounded border border-[var(--border)] overflow-hidden bg-[var(--surface)]">
        <!-- Header row — mirrors Beszel's columns. -->
        <div class="grid grid-cols-[26px_minmax(320px,1.8fr)_140px_140px_140px_minmax(160px,1fr)_80px_60px_72px_84px_40px] gap-3 px-4 py-2 border-b border-[var(--border)] bg-[var(--surface-2)] text-[10.5px] uppercase tracking-wider text-[var(--text-faint)]">
          <div></div>
          <div x-text="t('columns.host')"></div>
          <div x-text="t('columns.platform')"></div>
          <div x-text="t('columns.cpu')"></div>
          <div x-text="t('columns.memory')"></div>
          <div x-text="t('columns.disk')"></div>
          <div class="text-center" x-text="t('columns.uptime')"></div>
          <div class="text-center" x-text="t('columns.cores')"></div>
          <div class="text-center" x-text="t('columns.arch')"></div>
          <div class="text-center" x-text="t('columns.kernel')"></div>
          <div></div>
        </div>

        <!-- Grouped render. When host_groups is empty the
             helper returns a single bucket so the markup degrades to
             the flat list. Group headings render only when there's at
             least one defined group — an all-ungrouped run keeps the
             toolbar-compact look. -->
        <template x-for="(bucket, bi) in groupedHosts()" :key="(bucket.group ? bucket.group.name : '_ungrouped') + ':' + bi">
          <div>
            <div x-show="hostGroups.length > 0"
                 @click="toggleGroup(bucket.group ? bucket.group.name : '')"
                 class="host-group-heading flex items-center gap-2 px-4 py-2 border-b border-[var(--border)] bg-[var(--surface-2)] cursor-pointer select-none">
              <svg width="11" height="11" aria-hidden="true" class="text-[var(--text-dim)] transition-transform flip-rtl" :style="isGroupCollapsed(bucket.group ? bucket.group.name : '') ? '' : 'transform: rotate(90deg)'"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/></svg>
              <!-- Parent label uses --text-dim (slightly faded) so sub-
                   group labels (which inherit full --text) stand out
                   as the more specific row. -->
              <span class="font-semibold text-[12px] text-[var(--text-dim)]"
                    x-text="bucket.group ? hostGroupHeading(bucket.group) : t('hosts_extra_groups.ungrouped_label')"></span>
              <div class="flex items-center gap-2 ms-auto">
                <span x-show="bucket.group" class="pill pill-info text-[10px] mono"
                      x-text="'#' + bucket.group.range_start + '–' + bucket.group.range_end"></span>
                <span x-show="bucket.group && bucket.group.ip_range" class="pill pill-info text-[10px] mono"
                      x-text="bucket.group && bucket.group.ip_range"></span>
                <span class="text-[10.5px] text-[var(--text-faint)]"
                      x-text="bucketTotalHosts(bucket) === 1 ? t('hosts_extra_groups.count_one', {count: bucketTotalHosts(bucket)}) : t('hosts_extra_groups.count_many', {count: bucketTotalHosts(bucket)})"></span>
              </div>
            </div>
            <!-- One render loop covers BOTH parent-direct hosts and
                 sub-group hosts. `bucketRenderList(bucket)` flattens
                 them in order and tags each row with `_sub_group` +
                 `_sub_heading`; we emit a sub-group heading once
                 before its first row, then render every host using
                 the SAME markup. No template duplication — adding a
                 feature in one place picks it up everywhere. -->
            <template x-for="h in bucketRenderList(bucket)" :key="(h._sub_group ? h._sub_group.name + '|' : '') + h.host">
              <div>
                <!-- Sub-group heading row (first host of each sub). -->
                <div x-show="h._sub_heading && !isGroupCollapsed(bucket.group ? bucket.group.name : '')"
                     @click="toggleGroup(h._sub_group ? h._sub_group.name : '')"
                     class="host-group-heading flex items-center gap-2 px-4 py-2 ps-10 border-b border-[var(--border)] bg-[var(--surface)] cursor-pointer select-none">
                  <svg width="11" height="11" aria-hidden="true" class="text-[var(--text-dim)] transition-transform flip-rtl" :style="(h._sub_group && isGroupCollapsed(h._sub_group.name)) ? '' : 'transform: rotate(90deg)'"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/></svg>
                  <span class="font-semibold text-[12px]" x-text="h._sub_group ? hostGroupHeading(h._sub_group) : ''"></span>
                  <div class="flex items-center gap-2 ms-auto" x-show="h._sub_group">
                    <span class="pill pill-info text-[10px] mono"
                          x-text="h._sub_group ? ('#' + h._sub_group.range_start + '–' + h._sub_group.range_end) : ''"></span>
                    <span x-show="h._sub_group && h._sub_group.ip_range" class="pill pill-info text-[10px] mono"
                          x-text="h._sub_group ? h._sub_group.ip_range : ''"></span>
                  </div>
                </div>
                <!-- Host row — used for BOTH parent-direct and
                     sub-group hosts. Indent applied when the row
                     belongs to a sub-group. -->
                <div class="border-b border-[var(--border)] last:border-b-0"
                     x-show="!h._heading_only && !isGroupCollapsed(bucket.group ? bucket.group.name : '') && (!h._sub_group || !isGroupCollapsed(h._sub_group.name))"
                     :data-host-id="h.id"
                     x-init="observeHostRow($el, h.id)">
            <!-- Collapsed row — click-to-expand only when the host
                 is "up" AND at least one provider returned data.
                 Dead / unmatched rows get a muted cursor and no
                 hover tint so the operator gets the same visual
                 signal the red/grey status dot already implies. -->
            <div class="grid grid-cols-[26px_minmax(320px,1.8fr)_140px_140px_140px_minmax(160px,1fr)_80px_60px_72px_84px_40px] gap-3 px-4 py-3 items-center"
                 :class="[isHostExpandable(h) ? 'cursor-pointer hover:bg-[var(--row-hover)]' : 'cursor-default opacity-75', isStale(h) ? 'row-stale-flash' : '']"
                 @click="toggleHost(h.host)">
              <!-- Checkbox + Chevron + status dot. Checkbox gated on
                   admin role (readonly users can't run bulk actions
                   so the column would just clutter the row).
                   `@click.stop` on the checkbox so toggling selection
                   doesn't open the drawer. -->
              <div class="flex items-center gap-1.5">
                <input type="checkbox"
                       x-show="isAdmin()"
                       :checked="isHostSelected(h.id)"
                       @click.stop
                       @change="toggleHostSelection(h.id)"
                       class="hosts-row-select"
                       :aria-label="t('hosts_extra.bulk.row_select_aria', { name: hostDisplayName(h) }) || 'Select host'">
                <svg width="11" height="11" aria-hidden="true" class="text-[var(--text-dim)] transition-transform" :class="isHostExpanded(h.host) ? 'rotate-90' : (isHostExpandable(h) ? '' : 'opacity-30')"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/></svg>
                <template x-if="h._loading">
                  <span class="host-loading-spinner" aria-hidden="true"></span>
                </template>
                <template x-if="!h._loading">
                  <span class="w-2 h-2 rounded-full flex-shrink-0"
                        :class="'dot-status-' + (h.status || 'unknown')"
                        :title="hostProbeTitle(h)"></span>
                </template>
              </div>
