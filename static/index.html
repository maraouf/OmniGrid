                         x-show="typeof h.host_battery_temp_c === 'number'">
                      <span>
                        <span class="metric-legend-dot" style="background: var(--danger)"></span>
                        <span x-text="t('host_drawer.snmp_charts.ups_battery_temp_legend')"></span>
                        <span class="legend-val mono" x-text="(+h.host_battery_temp_c).toFixed(0) + '°C'"></span>
                      </span>
                    </div>
                  </div>
                  <template x-if="snmpHasUpsBatteryTempHistory(h.id)">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <span x-text="snmpUpsBatteryTempMax(h.id).toFixed(0) + '°'"></span>
                        <span x-text="(snmpUpsBatteryTempMax(h.id) / 2).toFixed(0) + '°'"></span>
                        <span x-text="'0°'"></span>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                        <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                        <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                        <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                        <path fill="none" stroke="var(--danger)" stroke-width="1.5" :d="snmpUpsBatteryTempLine(h.id)"></path>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'ups-temp-x-' + i"><span x-text="l"></span></template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!snmpHasUpsBatteryTempHistory(h.id)">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div><div x-text="t('loading.collecting_data')"></div></div>
                    </div>
                  </template>
                </div>

                <!-- Dell server temperature-probe chart.
                     Multi-line — one polyline per probe (Inlet / Exhaust /
                     CPU1 / CPU2 / chipset / etc.) sharing a single y-axis.
                     Each probe gets a distinct hue from a palette via
                     `dellTempProbes(h.id)`; the legend below the chart
                     pairs name + last reading. Auto-ranged to max(60,
                     observed_max) so a normal-range server still has
                     visible vertical movement. -->
                <div class="metric-card metric-card--wide"
                     x-show="dellHasTemps(h.id)">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('host_drawer.snmp_charts.dell_temps_title')"></span><span class="unit">°C</span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'dell_temps')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'dell_temps')"
                            @click.stop="toggleMetricTooltip(h, 'dell_temps')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === (h.id + ':dell_temps')"
                              x-text="metricSource(h, 'dell_temps')"
                              @click.outside="metricTooltipOpen = null"></span>
                      </button>
                    </div>
                  </div>
                  <template x-if="dellHasTempHistory(h.id)">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <span x-text="dellTempMaxC(h.id).toFixed(0) + '°'"></span>
                        <span x-text="(dellTempMaxC(h.id) / 2).toFixed(0) + '°'"></span>
                        <span x-text="'0°'"></span>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                        <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                        <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                        <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                        <!-- Eight hardcoded paths indexed against dellTempProbes(h.id)[N]
                             — same fixed-polyline-by-index pattern the per-port chart
                             uses because Alpine's <template x-for> doesn't work inside
                             <svg>. Most servers have ≤8 temp probes (Inlet / Exhaust /
                             CPU1 / CPU2 / + optional chipset / DIMM banks); slots
                             beyond the host's actual probe count render with empty
                             stroke + empty d so the renderer skips them cleanly. -->
                        <path fill="none" stroke-width="1.5"
                              :stroke="(dellTempProbes(h.id)[0] || {}).color || 'transparent'"
                              :d="(dellTempProbes(h.id)[0] ? dellTempLine(h.id, dellTempProbes(h.id)[0].points) : '')"></path>
                        <path fill="none" stroke-width="1.5"
                              :stroke="(dellTempProbes(h.id)[1] || {}).color || 'transparent'"
                              :d="(dellTempProbes(h.id)[1] ? dellTempLine(h.id, dellTempProbes(h.id)[1].points) : '')"></path>
                        <path fill="none" stroke-width="1.5"
                              :stroke="(dellTempProbes(h.id)[2] || {}).color || 'transparent'"
                              :d="(dellTempProbes(h.id)[2] ? dellTempLine(h.id, dellTempProbes(h.id)[2].points) : '')"></path>
                        <path fill="none" stroke-width="1.5"
                              :stroke="(dellTempProbes(h.id)[3] || {}).color || 'transparent'"
                              :d="(dellTempProbes(h.id)[3] ? dellTempLine(h.id, dellTempProbes(h.id)[3].points) : '')"></path>
                        <path fill="none" stroke-width="1.5"
                              :stroke="(dellTempProbes(h.id)[4] || {}).color || 'transparent'"
                              :d="(dellTempProbes(h.id)[4] ? dellTempLine(h.id, dellTempProbes(h.id)[4].points) : '')"></path>
                        <path fill="none" stroke-width="1.5"
                              :stroke="(dellTempProbes(h.id)[5] || {}).color || 'transparent'"
                              :d="(dellTempProbes(h.id)[5] ? dellTempLine(h.id, dellTempProbes(h.id)[5].points) : '')"></path>
                        <path fill="none" stroke-width="1.5"
                              :stroke="(dellTempProbes(h.id)[6] || {}).color || 'transparent'"
                              :d="(dellTempProbes(h.id)[6] ? dellTempLine(h.id, dellTempProbes(h.id)[6].points) : '')"></path>
                        <path fill="none" stroke-width="1.5"
                              :stroke="(dellTempProbes(h.id)[7] || {}).color || 'transparent'"
                              :d="(dellTempProbes(h.id)[7] ? dellTempLine(h.id, dellTempProbes(h.id)[7].points) : '')"></path>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'dell-temp-x-' + i"><span x-text="l"></span></template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!dellHasTempHistory(h.id)">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div><div x-text="t('loading.collecting_data')"></div></div>
                    </div>
                  </template>
                  <!-- Legend: probe name + last reading per probe.
                       Wraps to multi-row when the probe count exceeds
                       what fits in one line. -->
                  <div class="metric-legend-grid">
                    <template x-for="probe in dellTempProbes(h.id)" :key="'dell-temp-legend-' + probe.idx">
                      <span class="metric-legend-item">
                        <span class="metric-legend-dot" :style="'background:' + probe.color"></span>
                        <span x-text="probe.name"></span>
                        <span class="legend-val mono"
                              x-text="probe.last_c != null ? (+probe.last_c).toFixed(1) + '°C' : '—'"></span>
                      </span>
                    </template>
                  </div>
                </div>
              </div>

              <div class="mt-3 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"
                   x-show="(h.beszel_id || h.ne_url || h.pulse_name || h.webmin_name) && h.status === 'up' && (h.providers || []).length > 0"
                   :class="hostHistoryRangeBusy ? 'charts-refreshing' : ''">
                <!-- CPU % — hidden for ping-only hosts. The
                     grid wrapper now opens for ping_enabled too so the
                     Ping chart renders, but ping doesn't contribute a
                     CPU gauge. -->
                <div class="metric-card metric-card--cpu" x-show="h.beszel_id || h.ne_url || h.pulse_name || h.webmin_name">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('columns.cpu')"></span><span class="unit">%</span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'cpu')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'cpu')"
                            @click.stop="toggleMetricTooltip(h, 'cpu')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === metricTooltipKey(h, 'cpu')"
                              x-cloak
                              @click.stop
                              x-transition.opacity.duration.120ms
                              x-text="metricSource(h, 'cpu')"></span>
                      </button>
                    </div>
                    <div class="metric-card-stats"
                         x-show="hostMetricStats(hostHistoryKey(h), 'cpu')">
                      <span>Min <span class="min-val" x-text="hostMetricStats(hostHistoryKey(h), 'cpu') ? hostMetricStats(hostHistoryKey(h), 'cpu').min : ''"></span></span>
                      <span>Max <span class="max-val" x-text="hostMetricStats(hostHistoryKey(h), 'cpu') ? hostMetricStats(hostHistoryKey(h), 'cpu').max : ''"></span></span>
                    </div>
                  </div>
                  <template x-if="hostChart(hostHistoryKey(h), 'cpu', { min: 0, max: 100 })">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <template x-for="(l, i) in yAxisPercent()" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                        <!-- Gridlines as a single <path> string — Alpine
                             `<template x-for>` doesn't work inside <svg>
                             (the SVG-namespace template element isn't a
                             real HTMLTemplateElement, so .content is
                             undefined and Alpine throws). hostChart()
                             precomputes `gridPath` to avoid the issue. -->
                        <path class="metric-grid" :d="hostChart(hostHistoryKey(h), 'cpu', { min: 0, max: 100, height: 120 }).gridPath" fill="none"/>
                        <path class="metric-area" :d="hostChart(hostHistoryKey(h), 'cpu', { min: 0, max: 100, height: 120 }).area"/>
                        <path class="metric-line" :d="hostChart(hostHistoryKey(h), 'cpu', { min: 0, max: 100, height: 120 }).pathGapped"/>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!hostChart(hostHistoryKey(h), 'cpu', { min: 0, max: 100 })">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div>
                        <div x-text="t('loading.collecting_data')"></div>
                        <div class="text-[10.5px] text-[var(--text-faint)] not-italic mt-0.5" x-text="t('loading.history_will_appear')"></div>
                      </div>
                    </div>
                  </template>
                </div>

                <!-- Memory % — same telemetry gate as CPU. -->
                <div class="metric-card metric-card--mem" x-show="h.beszel_id || h.ne_url || h.pulse_name || h.webmin_name">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('columns.memory')"></span><span class="unit">%</span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'memory')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'memory')"
                            @click.stop="toggleMetricTooltip(h, 'memory')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === metricTooltipKey(h, 'memory')"
                              x-cloak
                              @click.stop
                              x-transition.opacity.duration.120ms
                              x-text="metricSource(h, 'memory')"></span>
                      </button>
                    </div>
                    <div class="metric-card-stats"
                         x-show="hostMetricStats(hostHistoryKey(h), 'mp')">
                      <span>Min <span class="min-val" x-text="hostMetricStats(hostHistoryKey(h), 'mp') ? hostMetricStats(hostHistoryKey(h), 'mp').min : ''"></span></span>
                      <span>Max <span class="max-val" x-text="hostMetricStats(hostHistoryKey(h), 'mp') ? hostMetricStats(hostHistoryKey(h), 'mp').max : ''"></span></span>
                    </div>
                  </div>
                  <template x-if="hostChart(hostHistoryKey(h), 'mp', { min: 0, max: 100 })">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <template x-for="(l, i) in yAxisPercent()" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                        <path class="metric-area" :d="hostChart(hostHistoryKey(h), 'mp', { min: 0, max: 100, height: 120 }).area"/>
                        <path class="metric-line" :d="hostChart(hostHistoryKey(h), 'mp', { min: 0, max: 100, height: 120 }).pathGapped"/>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!hostChart(hostHistoryKey(h), 'mp', { min: 0, max: 100 })">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div>
                        <div x-text="t('loading.collecting_data')"></div>
                      </div>
                    </div>
                  </template>
                </div>

                <!-- Disk % — same telemetry gate. -->
                <div class="metric-card metric-card--disk" x-show="h.beszel_id || h.ne_url || h.pulse_name || h.webmin_name">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('columns.disk')"></span><span class="unit">%</span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'disk')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'disk')"
                            @click.stop="toggleMetricTooltip(h, 'disk')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === metricTooltipKey(h, 'disk')"
                              x-cloak
                              @click.stop
                              x-transition.opacity.duration.120ms
                              x-text="metricSource(h, 'disk')"></span>
                      </button>
                    </div>
                    <div class="metric-card-stats"
                         x-show="hostMetricStats(hostHistoryKey(h), 'dp')">
                      <span>Min <span class="min-val" x-text="hostMetricStats(hostHistoryKey(h), 'dp') ? hostMetricStats(hostHistoryKey(h), 'dp').min : ''"></span></span>
                      <span>Max <span class="max-val" x-text="hostMetricStats(hostHistoryKey(h), 'dp') ? hostMetricStats(hostHistoryKey(h), 'dp').max : ''"></span></span>
                    </div>
                  </div>
                  <template x-if="hostChart(hostHistoryKey(h), 'dp', { min: 0, max: 100 })">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <template x-for="(l, i) in yAxisPercent()" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                        <path class="metric-area" :d="hostChart(hostHistoryKey(h), 'dp', { min: 0, max: 100, height: 120 }).area"/>
                        <path class="metric-line" :d="hostChart(hostHistoryKey(h), 'dp', { min: 0, max: 100, height: 120 }).pathGapped"/>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!hostChart(hostHistoryKey(h), 'dp', { min: 0, max: 100 })">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div>
                        <div x-text="t('loading.collecting_data')"></div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>

              <!-- Combined Net In/Out + Disk I/O + Load Average grid.
                   #318 / #319 / was 2 separate Net cards; now
                   one Network card with both lines on a shared y-axis,
                   plus Disk I/O + Load Average. Ping was promoted to
                   its own full-width row above the 3-col grid 
                   because its visual proportions (ms y-axis, narrow
                   value range) read poorly in a half-width slot beside
                   B/s gauges. The wrapper's gate no longer carries
                   `|| h.ping_enabled` for that reason. -->
              <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4"
                   x-show="(h.beszel_id || h.ne_url || h.pulse_name || h.webmin_name) && h.status === 'up' && (h.providers || []).length > 0">

                <!-- ====== Network (combined In + Out) ======
                     Two polylines on one SVG, shared y-axis via
                     `hostChartMax(['nr','ns'])` so the lines are
                     directly comparable. Legend at top shows both
                     metrics with their min/max from `hostMetricStats`. -->
                <div class="metric-card metric-card--net"
                     x-show="(h.beszel_id || h.ne_url || h.pulse_name || h.webmin_name) && !hostChartIsPermanentlyFlat(hostHistoryKey(h), ['nr','ns'])"
                     :class="hostChartMax(hostHistoryKey(h), ['nr','ns']) === 0 ? 'metric-card--flat' : ''">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('hosts_extra.metrics.network')"></span><span class="unit" x-text="unitForBytes(hostChartMax(hostHistoryKey(h), ['nr','ns'])) + '/s'"></span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'network')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'network')"
                            @click.stop="toggleMetricTooltip(h, 'network')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === metricTooltipKey(h, 'network')"
                              x-cloak
                              @click.stop
                              x-transition.opacity.duration.120ms
                              x-text="metricSource(h, 'network')"></span>
                      </button>
                    </div>
                    <div class="metric-card-stats">
                      <span x-show="hostMetricStats(hostHistoryKey(h), 'nr', false)">
                        <span class="metric-legend-dot" style="background: var(--metric-net)"></span>
                        <span x-text="t('hosts_extra.metrics.net_in')"></span>
                        <span class="legend-val" x-text="hostMetricStats(hostHistoryKey(h), 'nr', false) ? hostMetricStats(hostHistoryKey(h), 'nr', false).max : ''"></span>
                      </span>
                      <span x-show="hostMetricStats(hostHistoryKey(h), 'ns', false)">
                        <span class="metric-legend-dot" style="background: var(--metric-net-out)"></span>
                        <span x-text="t('hosts_extra.metrics.net_out')"></span>
                        <span class="legend-val" x-text="hostMetricStats(hostHistoryKey(h), 'ns', false) ? hostMetricStats(hostHistoryKey(h), 'ns', false).max : ''"></span>
                      </span>
                    </div>
                  </div>
                  <template x-if="hostChart(hostHistoryKey(h), 'nr') && hostChartMax(hostHistoryKey(h), ['nr','ns']) > 0">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <template x-for="(l, i) in yAxisAuto(hostChartMax(hostHistoryKey(h), ['nr','ns']), _fmtAxisBytesAt(hostChartMax(hostHistoryKey(h), ['nr','ns']))) " :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                        <path class="metric-grid" :d="hostChart(hostHistoryKey(h), 'nr', { min: 0, max: hostChartMax(hostHistoryKey(h), ['nr','ns']), height: 120 }).gridPath" fill="none"/>
                        <!-- Two polylines, shared y-scale via the max
                             passed to hostChart for both. The In line
                             uses `metric-net` color; Out uses
                             `metric-net-out` so they're visually
                             distinguishable on the legend. -->
                        <path class="metric-line" style="color: var(--metric-net)"
                                  :d="hostChart(hostHistoryKey(h), 'nr', { min: 0, max: hostChartMax(hostHistoryKey(h), ['nr','ns']), height: 120 }).pathGapped"/>
                        <path class="metric-line" style="color: var(--metric-net-out)"
                                  :d="hostChart(hostHistoryKey(h), 'ns', { min: 0, max: hostChartMax(hostHistoryKey(h), ['nr','ns']), height: 120 }).pathGapped"/>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                    </div>
                  </template>
                  <!-- node-exporter on this host never produced a
                       non-null `node_network_*` sample in the window. The
                       generic "no NIC activity" branch below would tell
                       the operator to wait for activity, but the metric
                       is permanently missing — surface remediation copy
                       (enable `--collector.netstats`) instead. Fires
                       BEFORE the inactive branch so it wins the race. -->
                  <template x-if="hostChart(hostHistoryKey(h), 'nr') && hostChartMax(hostHistoryKey(h), ['nr','ns']) === 0 && hostCollectorMissing(h, 'net')">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-loader"/></svg>
                      <div>
                        <div x-text="t('hosts_extra.collectors_missing.net_title')"></div>
                        <div class="text-[10.5px] text-[var(--text-faint)] mt-1"
                             x-html="t('hosts_extra.collectors_missing.net_body', {
                               metric: '<code class=\'mono text-[var(--text-dim)]\'>node_network_*</code>',
                               flag: '<code class=\'mono text-[var(--text-dim)]\'>--collector.netstats</code>'
                             })"></div>
                      </div>
                    </div>
                  </template>
                  <template x-if="hostChart(hostHistoryKey(h), 'nr') && hostChartMax(hostHistoryKey(h), ['nr','ns']) === 0 && !hostCollectorMissing(h, 'net')">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-info"/></svg>
                      <div>
                        <div x-text="t('hosts_extra.net_inactive.title')"></div>
                        <!-- Source-specific guidance:
                              - Pure Beszel host (no NE configured): Beszel
                                "set NICS=eth0" hint — that agent's NIC list
                                is opt-in and operator can fix it.
                              - Any host with NE configured (NE-only OR
                                Beszel + NE both): NE wording. The earlier
                                gate on `h.beszel_id` mis-fired when the
                                operator ran BOTH agents on the same host
                                (e.g. opnsense at 192.X.X.X) and Beszel
                                reported zero NICs while NE had real net
                                data — the operator wants the NE-flavoured
                                empty-state because that's the source they
                                expect to fix. Gating on `h.ne_url` instead
                                of `h.beszel_id` makes the rule "if NE is
                                in play, show NE copy" regardless of
                                whether Beszel is also configured.
                        -->
                        <template x-if="!h.ne_url">
                          <div class="text-[10.5px] text-[var(--text-faint)] mt-1"
                               x-html="t('hosts_extra.net_inactive.body_in', {
                                 code: '<code class=\'mono text-[var(--text-dim)]\'>NICS=eth0</code>',
                                 ipcmd: '<code class=\'mono text-[var(--text-dim)]\'>ip a</code>'
                               })"></div>
                        </template>
                        <template x-if="h.ne_url">
                          <div class="text-[10.5px] text-[var(--text-faint)] mt-1"
                               x-text="t('hosts_extra.net_inactive.body_in_ne')"></div>
                        </template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!hostChart(hostHistoryKey(h), 'nr')">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div>
                        <div x-text="t('loading.collecting_data')"></div>
                      </div>
                    </div>
                  </template>
                </div>

                <!-- Ping latency card was promoted out of this grid in
                     see the standalone full-width row above the
                     3-col CPU/Mem/Disk grid. -->

                <!-- ====== Disk I/O — same dual-line pattern as
                     the combined Network card. Read/write summed across
                     mounts in `logic/beszel.py:fetch_system_history` for
                     Beszel hosts and across non-loopback / non-partition
                     block devices in `logic/host_metrics_sampler.py` for
                     NE-only hosts. Card stays visible across
                     both source types — the "idle" hint correctly
                     surfaces a genuinely-quiet disk regardless of source. -->
                <div class="metric-card metric-card--disk"
                     x-show="(h.beszel_id || h.ne_url || h.pulse_name || h.webmin_name) && !hostChartIsPermanentlyFlat(hostHistoryKey(h), ['dr','dw'])"
                     :class="hostChartMax(hostHistoryKey(h), ['dr','dw']) === 0 ? 'metric-card--flat' : ''">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('hosts_extra.metrics.disk_io')"></span><span class="unit" x-text="unitForBytes(hostChartMax(hostHistoryKey(h), ['dr','dw'])) + '/s'"></span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'disk_io')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'disk_io')"
                            @click.stop="toggleMetricTooltip(h, 'disk_io')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === metricTooltipKey(h, 'disk_io')"
                              x-cloak
                              @click.stop
                              x-transition.opacity.duration.120ms
                              x-text="metricSource(h, 'disk_io')"></span>
                      </button>
                    </div>
                    <div class="metric-card-stats">
                      <span x-show="hostMetricStats(hostHistoryKey(h), 'dr', false)">
                        <span class="metric-legend-dot" style="background: var(--metric-net)"></span>
                        <span x-text="t('hosts_extra.metrics.read')"></span>
                        <span class="legend-val" x-text="hostMetricStats(hostHistoryKey(h), 'dr', false) ? hostMetricStats(hostHistoryKey(h), 'dr', false).max : ''"></span>
                      </span>
                      <span x-show="hostMetricStats(hostHistoryKey(h), 'dw', false)">
                        <span class="metric-legend-dot" style="background: var(--metric-net-out)"></span>
                        <span x-text="t('hosts_extra.metrics.write')"></span>
                        <span class="legend-val" x-text="hostMetricStats(hostHistoryKey(h), 'dw', false) ? hostMetricStats(hostHistoryKey(h), 'dw', false).max : ''"></span>
                      </span>
                    </div>
                  </div>
                  <template x-if="hostChart(hostHistoryKey(h), 'dr') && hostChartMax(hostHistoryKey(h), ['dr','dw']) > 0">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <template x-for="(l, i) in yAxisAuto(hostChartMax(hostHistoryKey(h), ['dr','dw']), _fmtAxisBytesAt(hostChartMax(hostHistoryKey(h), ['dr','dw']))) " :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                        <path class="metric-grid" :d="hostChart(hostHistoryKey(h), 'dr', { min: 0, max: hostChartMax(hostHistoryKey(h), ['dr','dw']), height: 120 }).gridPath" fill="none"/>
                        <path class="metric-line" style="color: var(--metric-net)"
                                  :d="hostChart(hostHistoryKey(h), 'dr', { min: 0, max: hostChartMax(hostHistoryKey(h), ['dr','dw']), height: 120 }).pathGapped"/>
                        <path class="metric-line" style="color: var(--metric-net-out)"
                                  :d="hostChart(hostHistoryKey(h), 'dw', { min: 0, max: hostChartMax(hostHistoryKey(h), ['dr','dw']), height: 120 }).pathGapped"/>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                    </div>
                  </template>
                  <!-- node-exporter on this host never produced a
                       non-null `node_disk_*` sample in the window. The
                       generic "no disk I/O activity" branch below would
                       suggest waiting; the metric is permanently
                       missing instead. Show remediation copy (enable
                       `--collector.diskstats`). Fires BEFORE the idle
                       branch so it wins the race. -->
                  <template x-if="hostChart(hostHistoryKey(h), 'dr') && hostChartMax(hostHistoryKey(h), ['dr','dw']) === 0 && hostCollectorMissing(h, 'disk_io')">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-loader"/></svg>
                      <div>
                        <div x-text="t('hosts_extra.collectors_missing.disk_io_title')"></div>
                        <div class="text-[10.5px] text-[var(--text-faint)] mt-1"
                             x-html="t('hosts_extra.collectors_missing.disk_io_body', {
                               metric: '<code class=\'mono text-[var(--text-dim)]\'>node_disk_*</code>',
                               flag: '<code class=\'mono text-[var(--text-dim)]\'>--collector.diskstats</code>'
                             })"></div>
                      </div>
                    </div>
                  </template>
                  <template x-if="hostChart(hostHistoryKey(h), 'dr') && hostChartMax(hostHistoryKey(h), ['dr','dw']) === 0 && !hostCollectorMissing(h, 'disk_io')">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-info"/></svg>
                      <div>
                        <div x-text="t('hosts_extra.metrics.disk_io_idle')"></div>
                      </div>
                    </div>
                  </template>
                  <template x-if="!hostChart(hostHistoryKey(h), 'dr')">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div>
                        <div x-text="t('loading.collecting_data')"></div>
                      </div>
                    </div>
                  </template>
                </div>

                <!-- ====== Load Average — three polylines for
                     1m / 5m / 15m on a shared y-axis. Beszel's `la`
                     field is parsed in fetch_system_history into
                     `la1` / `la5` / `la15`. Hidden when all three
                     are zero (containers / agents without load
                     reporting). Spans both columns on md+ — load
                     is a single-axis metric where extra width
                     improves readability. -->
                <div class="metric-card metric-card--cpu"
                     x-show="hostChartMax(hostHistoryKey(h), ['la1_pct','la5_pct','la15_pct','la1','la5','la15']) > 0">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('hosts_extra.metrics.load_avg')"></span><span class="unit">%</span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'load_avg')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'load_avg')"
                            @click.stop="toggleMetricTooltip(h, 'load_avg')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === metricTooltipKey(h, 'load_avg')"
                              x-cloak
                              @click.stop
                              x-transition.opacity.duration.120ms
                              x-text="metricSource(h, 'load_avg')"></span>
                      </button>
                    </div>
                    <div class="metric-card-stats">
                      <span x-show="hostMetricStats(hostHistoryKey(h), 'la1_pct', false)">
                        <span class="metric-legend-dot" style="background: var(--metric-cpu)"></span>1m
                        <span class="legend-val" x-text="hostMetricStats(hostHistoryKey(h), 'la1_pct', false) ? Math.round(hostMetricStats(hostHistoryKey(h), 'la1_pct', false).maxRaw) + '%' : ''"></span>
                      </span>
                      <span x-show="hostMetricStats(hostHistoryKey(h), 'la5_pct', false)">
                        <span class="metric-legend-dot" style="background: var(--metric-mem)"></span>5m
                        <span class="legend-val" x-text="hostMetricStats(hostHistoryKey(h), 'la5_pct', false) ? Math.round(hostMetricStats(hostHistoryKey(h), 'la5_pct', false).maxRaw) + '%' : ''"></span>
                      </span>
                      <span x-show="hostMetricStats(hostHistoryKey(h), 'la15_pct', false)">
                        <span class="metric-legend-dot" style="background: var(--metric-disk)"></span>15m
                        <span class="legend-val" x-text="hostMetricStats(hostHistoryKey(h), 'la15_pct', false) ? Math.round(hostMetricStats(hostHistoryKey(h), 'la15_pct', false).maxRaw) + '%' : ''"></span>
                      </span>
                    </div>
                  </div>
                  <template x-if="hostChart(hostHistoryKey(h), 'la1_pct')">
                    <div class="metric-card-body">
                      <!-- Y-axis to match CPU/Mem/Disk card height + alignment.
                           Without this column-1 cell rendered empty and the
                           SVG visually shifted, making the chart look shorter. -->
                      <div class="metric-y-axis">
                        <template x-for="(l, i) in yAxisPercent()" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                        <path class="metric-grid" :d="hostChart(hostHistoryKey(h), 'la1_pct', { min: 0, max: 100, height: 120 }).gridPath" fill="none"/>
                        <path class="metric-line" style="color: var(--metric-cpu)"
                                  :d="hostChart(hostHistoryKey(h), 'la1_pct', { min: 0, max: 100, height: 120 }).pathGapped"/>
                        <path class="metric-line" style="color: var(--metric-mem)"
                                  :d="hostChart(hostHistoryKey(h), 'la5_pct', { min: 0, max: 100, height: 120 }).pathGapped"/>
                        <path class="metric-line" style="color: var(--metric-disk)"
                                  :d="hostChart(hostHistoryKey(h), 'la15_pct', { min: 0, max: 100, height: 120 }).pathGapped"/>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!hostChart(hostHistoryKey(h), 'la1_pct')">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div><div x-text="t('loading.collecting_data')"></div></div>
                    </div>
                  </template>
                </div>

                <!-- ====== Bandwidth — single-line aggregate of
                     in + out bytes/s, mirroring Beszel's "Bandwidth"
                     chart. Distinct from the Network card above (which
                     splits In + Out into two lines): this is the
                     summed total at each point. The `net` field is
                     pre-computed by `fetch_system_history`
                     (`nr + ns`, falls back to `b` for older agents
                     that don't split the directions). Hidden when the
                     summed peak is zero. -->
                <div class="metric-card metric-card--net-out"
                     x-show="hostMetricStats(hostHistoryKey(h), 'net', false) && hostMetricStats(hostHistoryKey(h), 'net', false).maxRaw > 0">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('hosts_extra.metrics.bandwidth')"></span><span class="unit" x-text="unitForBytes(hostChartMax(hostHistoryKey(h), ['net'])) + '/s'"></span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'bandwidth')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'bandwidth')"
                            @click.stop="toggleMetricTooltip(h, 'bandwidth')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === metricTooltipKey(h, 'bandwidth')"
                              x-cloak
                              @click.stop
                              x-transition.opacity.duration.120ms
                              x-text="metricSource(h, 'bandwidth')"></span>
                      </button>
                    </div>
                    <div class="metric-card-stats"
                         x-show="hostMetricStats(hostHistoryKey(h), 'net', false)">
                      <span>Min <span class="min-val" x-text="hostMetricStats(hostHistoryKey(h), 'net', false) ? hostMetricStats(hostHistoryKey(h), 'net', false).min : ''"></span></span>
                      <span>Max <span class="max-val" x-text="hostMetricStats(hostHistoryKey(h), 'net', false) ? hostMetricStats(hostHistoryKey(h), 'net', false).max : ''"></span></span>
                    </div>
                  </div>
                  <template x-if="hostChart(hostHistoryKey(h), 'net')">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <template x-for="(l, i) in yAxisAuto(hostChart(hostHistoryKey(h), 'net').max, _fmtAxisBytesAt(hostChart(hostHistoryKey(h), 'net').max)) " :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                        <path class="metric-area" :d="hostChart(hostHistoryKey(h), 'net', { min: 0, height: 120 }).area"/>
                        <path class="metric-line" :d="hostChart(hostHistoryKey(h), 'net', { min: 0, height: 120 }).pathGapped"/>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!hostChart(hostHistoryKey(h), 'net')">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div><div x-text="t('loading.collecting_data')"></div></div>
                    </div>
                  </template>
                </div>

                <!-- ====== Swap usage — single-line plot of
                     swap-percent (`s`) over time. Hidden when the
                     host doesn't have swap configured (every point
                     is 0). Beszel's source field: `s` for percent,
                     `su` for absolute GiB. We chart the percent so
                     the y-axis maps cleanly to 0..100. -->
                <div class="metric-card metric-card--mem"
                     x-show="hostMetricStats(hostHistoryKey(h), 's') && hostMetricStats(hostHistoryKey(h), 's').maxRaw > 0">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('hosts_extra.metrics.swap')"></span><span class="unit">%</span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'swap')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'swap')"
                            @click.stop="toggleMetricTooltip(h, 'swap')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === metricTooltipKey(h, 'swap')"
                              x-cloak
                              @click.stop
                              x-transition.opacity.duration.120ms
                              x-text="metricSource(h, 'swap')"></span>
                      </button>
                    </div>
                    <div class="metric-card-stats"
                         x-show="hostMetricStats(hostHistoryKey(h), 's')">
                      <span>Min <span class="min-val" x-text="hostMetricStats(hostHistoryKey(h), 's') ? hostMetricStats(hostHistoryKey(h), 's').min : ''"></span></span>
                      <span>Max <span class="max-val" x-text="hostMetricStats(hostHistoryKey(h), 's') ? hostMetricStats(hostHistoryKey(h), 's').max : ''"></span></span>
                    </div>
                  </div>
                  <template x-if="hostChart(hostHistoryKey(h), 's', { min: 0, max: 100 })">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <template x-for="(l, i) in yAxisPercent()" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                        <path class="metric-area" :d="hostChart(hostHistoryKey(h), 's', { min: 0, max: 100, height: 120 }).area"/>
                        <path class="metric-line" :d="hostChart(hostHistoryKey(h), 's', { min: 0, max: 100, height: 120 }).pathGapped"/>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!hostChart(hostHistoryKey(h), 's')">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div><div x-text="t('loading.collecting_data')"></div></div>
                    </div>
                  </template>
                </div>

                <!-- TEMPERATURE chart. Renders only when the
                     Beszel agent emits at least one thermal sensor in
                     stats.t (Raspberry Pi → cpu_thermal; Intel/AMD with
                     coretemp → package_id_0; NVMe SSDs → nvme_composite).
                     The series carries `temp_max` (peak across all
                     sensors at each tick) for the line, and `temps`
                     (full {sensor: °C} dict) for the live header so the
                     operator can tell which sensor is hottest. Hosts
                     without any sensor (most VMs) hide this card
                     entirely via the `host_temperatures` length gate. -->
                <div class="metric-card metric-card--temp"
                     x-show="h.host_temperatures && Object.keys(h.host_temperatures).length > 0">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('hosts_extra.metrics.temperature')"></span><span class="unit">°C</span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'temperature')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'temperature')"
                            @click.stop="toggleMetricTooltip(h, 'temperature')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === metricTooltipKey(h, 'temperature')"
                              x-cloak
                              @click.stop
                              x-transition.opacity.duration.120ms
                              x-text="metricSource(h, 'temperature')"></span>
                      </button>
                    </div>
                    <!-- Live per-sensor readout — sorted hottest-first
                         so the operator's eye lands on the worst
                         offender. Capped at top-3 (the chart shows
                         the full set as separate lines); a "+N more"
                         chip appears when the host has more sensors
                         than fit inline. Each chip carries a colour
                         swatch matching its line in the chart so the
                         operator can map name → line at a glance
                         . Each chip is `whitespace-nowrap` so
                         name+swatch+value stay visually paired even
                         when the header row wraps on a narrow drawer
                         . -->
                    <div class="metric-card-stats"
                         x-show="h.host_temperatures && Object.keys(h.host_temperatures).length > 0">
                      <template x-for="[name, c] in hostTemperatureRows(h)" :key="name">
                        <span class="whitespace-nowrap inline-flex items-center gap-1">
                          <span class="metric-temp-swatch"
                                :style="'background:' + hostTempLineColor(name, Object.keys(h.host_temperatures || {}).sort())"></span>
                          <span class="text-[var(--text-faint)]" x-text="name"></span>
                          <span class="max-val" x-text="(c).toFixed(1) + '°'"></span>
                        </span>
                      </template>
                      <span x-show="hostTemperatureExtraCount(h) > 0"
                            class="text-[var(--text-faint)] whitespace-nowrap"
                            :title="Object.keys(h.host_temperatures || {}).slice(3).join(', ')"
                            x-text="'+' + hostTemperatureExtraCount(h) + ' more'"></span>
                    </div>
                  </div>
                  <!-- Multi-line chart — one polyline per sensor, with
                       auto-scaled Y axis padded ±5°C and colour-cycle
                       matching the header swatches. Y-axis
                       labels mirror the percentage charts' layout
                       so the operator can read off °C without
                       hovering. -->
                  <template x-if="hostTempChart(hostHistoryKey(h))">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <template x-for="(l, i) in hostTempChart(hostHistoryKey(h)).yAxis" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                      <!-- Alpine `<template x-for>` does NOT work inside
                           <svg> (the SVG-namespace template element
                           isn't a real HTMLTemplateElement; .content
                           is undefined and Alpine throws). The chart
                           returns a `dByColor` dict that pre-joins
                           every sensor's path data per palette token,
                           so we render five fixed <path>s and the
                           chart helper assigns each sensor to one of
                           them. Each path uses `class="metric-line"`
                           which sets `stroke: currentColor`, then
                           `style="color: var(--token)"` resolves the
                           CSS variable and paints the lines. Hidden
                           when the slug has no data so an empty `d`
                           doesn't render an invisible glyph. -->
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                        <path class="metric-line" style="color: var(--primary)"
                              :d="(hostTempChart(hostHistoryKey(h)).dByColor || {}).primary || ''"
                              fill="none"></path>
                        <path class="metric-line" style="color: var(--warning)"
                              :d="(hostTempChart(hostHistoryKey(h)).dByColor || {}).warning || ''"
                              fill="none"></path>
                        <path class="metric-line" style="color: var(--danger)"
                              :d="(hostTempChart(hostHistoryKey(h)).dByColor || {}).danger || ''"
                              fill="none"></path>
                        <path class="metric-line" style="color: var(--success)"
                              :d="(hostTempChart(hostHistoryKey(h)).dByColor || {}).success || ''"
                              fill="none"></path>
                        <path class="metric-line" style="color: var(--info)"
                              :d="(hostTempChart(hostHistoryKey(h)).dByColor || {}).info || ''"
                              fill="none"></path>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                    </div>
                  </template>
                  <!-- Collecting-data spinner shown until hostTempChart
                       produces a series. Operator-flagged: temperature
                       was the only chart card without a "Collecting
                       data..." fallback during the warm-up window —
                       looked broken between drawer-open and the first
                       successful history fetch. Same pattern the
                       Disk-IO / Net / Bandwidth / Swap cards use. -->
                  <template x-if="!hostTempChart(hostHistoryKey(h))">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div>
                        <div x-text="t('loading.collecting_data')"></div>
                      </div>
                    </div>
                  </template>
                </div>

                <!-- GPU Power Draw. Average watts across every
                     GPU on the host, plotted from the per-tick
                     `gpu_pwr` field synthesized in
                     `logic/beszel.py:fetch_system_history`. Card
                     hidden when the host has no GPU (host_gpus empty
                     OR every history point's gpu_pwr is 0 — no
                     discrete GPU surfaces no telemetry). -->
                <div class="metric-card metric-card--gpu"
                     x-show="(h.host_gpus || []).length > 0">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('hosts_extra.metrics.gpu_power')"></span><span class="unit">W</span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'gpu')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'gpu')"
                            @click.stop="toggleMetricTooltip(h, 'gpu_pwr')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === metricTooltipKey(h, 'gpu_pwr')"
                              x-cloak @click.stop
                              x-transition.opacity.duration.120ms
                              x-text="metricSource(h, 'gpu')"></span>
                      </button>
                    </div>
                    <div class="metric-card-stats">
                      <template x-for="(gpu, i) in (h.host_gpus || [])" :key="'gpw' + i">
                        <span class="text-[11px]">
                          <span class="metric-legend-dot" style="background: var(--warning)"></span>
                          <span x-text="gpu.name || ('GPU ' + gpu.index)"></span>
                          <span class="legend-val" x-text="(+gpu.power_watts || 0).toFixed(1) + ' W'"></span>
                        </span>
                      </template>
                    </div>
                  </div>
                  <template x-if="hostChartMax(hostHistoryKey(h), ['gpu_pwr']) > 0">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <template x-for="(l, i) in yAxisAuto(hostChartMax(hostHistoryKey(h), ['gpu_pwr']), n => Math.round(n) + ' W')" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                        <path class="metric-grid"
                              :d="hostChart(hostHistoryKey(h), 'gpu_pwr', { min: 0, max: hostChartMax(hostHistoryKey(h), ['gpu_pwr']), height: 120 }).gridPath" fill="none"/>
                        <path class="metric-line" style="color: var(--warning)" fill="none"
                                  :d="hostChart(hostHistoryKey(h), 'gpu_pwr', { min: 0, max: hostChartMax(hostHistoryKey(h), ['gpu_pwr']), height: 120 }).pathGapped"/>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i"><span x-text="l"></span></template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!(hostChartMax(hostHistoryKey(h), ['gpu_pwr']) > 0)">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div><div x-text="t('loading.collecting_data')"></div></div>
                    </div>
                  </template>
                </div>

                <!-- GPU Usage. Average utilization % across
                     every GPU. -->
                <div class="metric-card metric-card--gpu"
                     x-show="(h.host_gpus || []).length > 0">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('hosts_extra.metrics.gpu_usage')"></span><span class="unit">%</span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'gpu')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'gpu')"
                            @click.stop="toggleMetricTooltip(h, 'gpu_usage')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"

                      <div class="metric-x-axis">
                        <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i"><span x-text="l"></span></template>
                      </div>

                  <template x-if="!(hostChart(hostHistoryKey(h), 'gpu_usage') && (hostHistory[hostHistoryKey(h)] && (hostHistory[hostHistoryKey(h)].series || []).length >= 2))">

                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div><div x-text="t('loading.collecting_data')"></div></div>

              </div>

              <!-- Admin-only debug panel — side-by-side JSON blobs for
                   each provider's raw response, the normalized extract,
                   the merged best-of dict, and the rendered API payload
                   the UI consumes. Collapsed by default; first open
                   triggers a lazy fetch. Useful for spotting dropped
                   fields / shape mismatches without grepping logs.
                   Operator-toggled in Admin → Hosts (settings.debug_panel_enabled);
                   default true preserves legacy visibility. -->
              <template x-if="me && me.role === 'admin' && (settings && settings.debug_panel_enabled !== false)">
                <div class="host-debug-panel">
                  <button type="button"
                          class="host-debug-toggle host-debug-toggle--accent"
                          @click="toggleHostDebug(h.id)"

                    <svg width="12" height="12" class="flip-rtl" aria-hidden="true" :style="hostsDebugOpen[h.id] ? 'transform: rotate(90deg)' : ''"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/></svg>
                    <svg width="14" height="14" class="host-debug-toggle-icon" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-bug"/></svg>
                    <span x-text="hostsDebugOpen[h.id] ? t('debug_panel.hide') : t('debug_panel.show')"></span>
                    <span class="host-debug-hint" x-show="!hostsDebugOpen[h.id]" x-text="t('debug_panel.hint')"></span>
                  </button>
                  <div x-show="hostsDebugOpen[h.id]" class="host-debug-body"
                       :data-host-section="'debug-' + h.id">
                    <template x-if="hostsDebugLoading[h.id]">
                      <div class="host-debug-loading">
                        <span class="spin-lg" aria-hidden="true"></span>
                        <span x-text="t('debug_panel.probing')"></span>
                      </div>
                    </template>
                    <template x-if="!hostsDebugLoading[h.id] && hostsDebug[h.id] && hostsDebug[h.id]._error">
                      <div class="host-debug-error" x-text="t('debug_panel.error_prefix', { error: hostsDebug[h.id]._error })"></div>
                    </template>
                    <template x-if="!hostsDebugLoading[h.id] && hostsDebug[h.id] && !hostsDebug[h.id]._error">
                      <div class="host-debug-content">
                        <div class="host-debug-toolbar">
                          <div class="host-debug-meta">
                            <span x-text="t('debug_panel.active_providers')"></span>
                            <template x-for="p in (hostsDebug[h.id].active_providers || [])" :key="p">
                              <span class="chip pill-custom"
                                    :style="providerChipStyle(p)"
                                    :title="p">
                                <span class="provider-icon"
                                      :style="providerIconStyle(p)"
                                      aria-hidden="true"></span>
                                <span x-text="p === 'node_exporter' ? 'exporter' : p"></span>
                              </span>
                            </template>
                            <template x-if="(hostsDebug[h.id].active_providers || []).length === 0">
                              <span class="host-debug-tag host-debug-tag--warn" x-text="t('debug_panel.none')"></span>
                            </template>
                          </div>
                          <button type="button" class="btn btn-ghost text-[11px] inline-flex items-center gap-1"
                                  @click="loadHostDebug(h.id)"
                                  :disabled="!!hostsDebugLoading[h.id]"
                                  :title="t('debug_panel.refresh_title')">
                            <svg width="14" height="14" aria-hidden="true"
                                 :class="hostsDebugLoading[h.id] ? 'spin-md' : ''"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                            <span x-text="t('debug_panel.refresh')"></span>
                          </button>
                        </div>
                        <!-- Five columns wrap to two rows on narrow
                             viewports. Each block is independently
                             scrollable so a huge raw dump doesn't push
                             the others off-screen. -->
                        <div class="host-debug-grid">
                          <!-- Counters & state — moved to FIRST position. Operators investigating
                               a host issue almost always want to see
                               failure-state + per-provider pause status
                               + sample row counts BEFORE waded through
                               the raw provider JSON. The wide-column
                               span keeps the failure_state object

                          <section class="host-debug-box host-debug-box--wide" x-show="hasDebugData(hostsDebug[h.id].counters)">

                              <span class="host-debug-hint" x-text="t('debug_panel.hints.counters')"></span>

                              <span class="host-debug-label host-debug-label--pulse" x-text="t('debug_panel.labels.raw_pulse')"></span>
                              <button type="button" class="host-debug-copy"
                                      @click="copyDebugJson(hostsDebug[h.id].providers_raw?.pulse, 'debug_panel.labels.raw_pulse')"

                                      :title="t('debug_panel.copy_title')">
                                <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/></svg>
                              </button>
                            </header>
                            <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(hostsDebug[h.id].providers_raw?.pulse)"></pre>
                          </section>
                          <section class="host-debug-box" x-show="hasDebugData(hostsDebug[h.id].providers_raw?.beszel)">
                            <header class="host-debug-box-head">
                              <span class="host-debug-label host-debug-label--beszel" x-text="t('debug_panel.labels.raw_beszel')"></span>
                              <button type="button" class="host-debug-copy"
                                      @click="copyDebugJson(hostsDebug[h.id].providers_raw?.beszel, 'debug_panel.labels.raw_beszel')"
                                      :aria-label="copyAriaLabel('debug_panel.labels.raw_beszel')"
                                      :title="t('debug_panel.copy_title')">
                                <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/></svg>
                              </button>
                            </header>
                            <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(hostsDebug[h.id].providers_raw?.beszel)"></pre>
                          </section>
                          <section class="host-debug-box" x-show="hasDebugData(hostsDebug[h.id].providers_raw?.node_exporter)">
                            <header class="host-debug-box-head">
                              <span class="host-debug-label host-debug-label--ne" x-text="t('debug_panel.labels.raw_ne')"></span>
                              <button type="button" class="host-debug-copy"
                                      @click="copyDebugJson(hostsDebug[h.id].providers_raw?.node_exporter, 'debug_panel.labels.raw_ne')"
                                      :aria-label="copyAriaLabel('debug_panel.labels.raw_ne')"
                                      :title="t('debug_panel.copy_title')">
                                <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/></svg>
                              </button>
                            </header>
                            <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(hostsDebug[h.id].providers_raw?.node_exporter)"></pre>
                          </section>
                          <section class="host-debug-box" x-show="hasDebugData(hostsDebug[h.id].providers_raw?.webmin)">
                            <header class="host-debug-box-head">
                              <span class="host-debug-label host-debug-label--webmin" x-text="t('debug_panel.labels.raw_webmin')"></span>
                              <button type="button" class="host-debug-copy"
                                      @click="copyDebugJson(hostsDebug[h.id].providers_raw?.webmin, 'debug_panel.labels.raw_webmin')"
                                      :aria-label="copyAriaLabel('debug_panel.labels.raw_webmin')"
                                      :title="t('debug_panel.copy_title')">
                                <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/></svg>
                              </button>
                            </header>
                            <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(hostsDebug[h.id].providers_raw?.webmin)"></pre>
                          </section>
                          <section class="host-debug-box" x-show="hasDebugData(hostsDebug[h.id].providers_raw?.ping)">
                            <header class="host-debug-box-head">
                              <span class="host-debug-label host-debug-label--ping" x-text="t('debug_panel.labels.raw_ping')"></span>
                              <button type="button" class="host-debug-copy"
                                      @click="copyDebugJson(hostsDebug[h.id].providers_raw?.ping, 'debug_panel.labels.raw_ping')"
                                      :aria-label="copyAriaLabel('debug_panel.labels.raw_ping')"
                                      :title="t('debug_panel.copy_title')">
                                <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/></svg>
                              </button>
                            </header>
                            <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(hostsDebug[h.id].providers_raw?.ping)"></pre>
                          </section>
                          <section class="host-debug-box" x-show="hasDebugData(hostsDebug[h.id].providers_raw?.snmp)">
                            <header class="host-debug-box-head">
                              <span class="host-debug-label host-debug-label--snmp" x-text="t('debug_panel.labels.raw_snmp')"></span>
                              <button type="button" class="host-debug-copy"
                                      @click="copyDebugJson(hostsDebug[h.id].providers_raw?.snmp, 'debug_panel.labels.raw_snmp')"

                                      :title="t('debug_panel.copy_title')">

                              </button>
                            </header>
                            <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(hostsDebug[h.id].providers_raw?.snmp)"></pre>

                          <section class="host-debug-box" x-show="hasDebugData(hostsDebug[h.id].merged)">
                            <header class="host-debug-box-head">

                              <span class="host-debug-hint" x-text="t('debug_panel.hints.rendered')"></span>
                              <button type="button" class="host-debug-copy"
