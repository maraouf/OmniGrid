                  <span>Min <span class="min-val" x-text="hostMetricStats(hostHistoryKey(h), 'net', false) ? hostMetricStats(hostHistoryKey(h), 'net', false).min : ''"></span></span>
                  <span>Max <span class="max-val" x-text="hostMetricStats(hostHistoryKey(h), 'net', false) ? hostMetricStats(hostHistoryKey(h), 'net', false).max : ''"></span></span>
                </div>
              </div>
              <template x-if="hostChart(hostHistoryKey(h), 'net')">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in yAxisAuto(hostChart(hostHistoryKey(h), 'net').max, _fmtAxisBytesAt(hostChart(hostHistoryKey(h), 'net').max)) " :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                    <path class="metric-area" :d="hostChart(hostHistoryKey(h), 'net', { min: 0, height: 120 }).area"/>
                    <path class="metric-line" :d="hostChart(hostHistoryKey(h), 'net', { min: 0, height: 120 }).pathGapped"/>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                </div>
              </template>
              <template x-if="!hostChart(hostHistoryKey(h), 'net')">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- ====== Swap usage — single-line plot of
                     swap-percent (`s`) over time. Hidden when the
                     host doesn't have swap configured (every point
                     is 0). Beszel's source field: `s` for percent,
                     `su` for absolute GiB. We chart the percent so
                     the y-axis maps cleanly to 0..100. -->
            <div class="metric-card metric-card--mem"
                 x-show="hostMetricStats(hostHistoryKey(h), 's') && hostMetricStats(hostHistoryKey(h), 's').maxRaw > 0">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('hosts_extra.metrics.swap')"></span><span class="unit">%</span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'swap')" :title="metricSource(h, 'swap')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'swap')"
                          @click.stop="toggleMetricTooltip(h, 'swap')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'swap')"
                          x-cloak
                          @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'swap')"></span>
                  </button>
                </div>
                <div class="metric-card-stats"
                     x-show="hostMetricStats(hostHistoryKey(h), 's')">
                  <span>Min <span class="min-val" x-text="hostMetricStats(hostHistoryKey(h), 's') ? hostMetricStats(hostHistoryKey(h), 's').min : ''"></span></span>
                  <span>Max <span class="max-val" x-text="hostMetricStats(hostHistoryKey(h), 's') ? hostMetricStats(hostHistoryKey(h), 's').max : ''"></span></span>
                </div>
              </div>
              <template x-if="hostChart(hostHistoryKey(h), 's', { min: 0, max: 100 })">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in yAxisPercent()" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                    <path class="metric-area" :d="hostChart(hostHistoryKey(h), 's', { min: 0, max: 100, height: 120 }).area"/>
                    <path class="metric-line" :d="hostChart(hostHistoryKey(h), 's', { min: 0, max: 100, height: 120 }).pathGapped"/>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                </div>
              </template>
              <template x-if="!hostChart(hostHistoryKey(h), 's')">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- TEMPERATURE chart. Renders only when the
                     Beszel agent emits at least one thermal sensor in
                     stats.t (Raspberry Pi → cpu_thermal; Intel/AMD with
                     coretemp → package_id_0; NVMe SSDs → nvme_composite).
                     The series carries `temp_max` (peak across all
                     sensors at each tick) for the line, and `temps`
                     (full {sensor: °C} dict) for the live header so the
                     operator can tell which sensor is hottest. Hosts
                     without any sensor (most VMs) hide this card
                     entirely via the `host_temperatures` length gate. -->
            <div class="metric-card metric-card--temp"
                 x-show="h.host_temperatures && Object.keys(h.host_temperatures).length > 0">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('hosts_extra.metrics.temperature')"></span><span class="unit">°C</span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'temperature')" :title="metricSource(h, 'temperature')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'temperature')"
                          @click.stop="toggleMetricTooltip(h, 'temperature')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'temperature')"
                          x-cloak
                          @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'temperature')"></span>
                  </button>
                </div>
                <!-- Live per-sensor readout — sorted hottest-first
                         so the operator's eye lands on the worst
                         offender. Capped at top-3 (the chart shows
                         the full set as separate lines); a "+N more"
                         chip appears when the host has more sensors
                         than fit inline. Each chip carries a colour
                         swatch matching its line in the chart so the
                         operator can map name → line at a glance
                         . Each chip is `whitespace-nowrap` so
                         name+swatch+value stay visually paired even
                         when the header row wraps on a narrow drawer
                         . -->
                <div class="metric-card-stats"
                     x-show="h.host_temperatures && Object.keys(h.host_temperatures).length > 0">
                  <template x-for="[name, c] in hostTemperatureRows(h)" :key="name">
                        <span class="whitespace-nowrap inline-flex items-center gap-1">
                          <span class="metric-temp-swatch"
                                :style="'background:' + hostTempLineColor(name, Object.keys(h.host_temperatures || {}).sort())"></span>
                          <span class="text-[var(--text-faint)]" x-text="name"></span>
                          <span class="max-val" x-text="(c).toFixed(1) + '°'"></span>
                        </span>
                  </template>
                  <span x-show="hostTemperatureExtraCount(h) > 0"
                        class="text-[var(--text-faint)] whitespace-nowrap"
                        :title="Object.keys(h.host_temperatures || {}).slice(3).join(', ')"
                        x-text="'+' + hostTemperatureExtraCount(h) + ' more'"></span>
                </div>
              </div>
              <!-- Multi-line chart — one polyline per sensor, with
                       auto-scaled Y axis padded ±5°C and colour-cycle
                       matching the header swatches. Y-axis
                       labels mirror the percentage charts' layout
                       so the operator can read off °C without
                       hovering. -->
              <template x-if="hostTempChart(hostHistoryKey(h))">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in hostTempChart(hostHistoryKey(h)).yAxis" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                  <!-- Alpine `<template x-for>` does NOT work inside
                           <svg> (the SVG-namespace template element
                           isn't a real HTMLTemplateElement; .content
                           is undefined and Alpine throws). The chart
                           returns a `dByColor` dict that pre-joins
                           every sensor's path data per palette token,
                           so we render five fixed <path>s and the
                           chart helper assigns each sensor to one of
                           them. Each path uses `class="metric-line"`
                           which sets `stroke: currentColor`, then
                           `style="color: var(--token)"` resolves the
                           CSS variable and paints the lines. Hidden
                           when the slug has no data so an empty `d`
                           doesn't render an invisible glyph. -->
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                    <path class="metric-line" style="color: var(--primary);"
                          :d="(hostTempChart(hostHistoryKey(h)).dByColor || {}).primary || ''"
                          fill="none"></path>
                    <path class="metric-line" style="color: var(--warning);"
                          :d="(hostTempChart(hostHistoryKey(h)).dByColor || {}).warning || ''"
                          fill="none"></path>
                    <path class="metric-line" style="color: var(--danger);"
                          :d="(hostTempChart(hostHistoryKey(h)).dByColor || {}).danger || ''"
                          fill="none"></path>
                    <path class="metric-line" style="color: var(--success);"
                          :d="(hostTempChart(hostHistoryKey(h)).dByColor || {}).success || ''"
                          fill="none"></path>
                    <path class="metric-line" style="color: var(--info);"
                          :d="(hostTempChart(hostHistoryKey(h)).dByColor || {}).info || ''"
                          fill="none"></path>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                </div>
              </template>
              <!-- Collecting-data spinner shown until hostTempChart
                       produces a series. Operator-flagged: temperature
                       was the only chart card without a "Collecting
                       data..." fallback during the warm-up window —
                       looked broken between drawer-open and the first
                       successful history fetch. Same pattern the
                       Disk-IO / Net / Bandwidth / Swap cards use. -->
              <template x-if="!hostTempChart(hostHistoryKey(h))">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- GPU Power Draw. Average watts across every
                     GPU on the host, plotted from the per-tick
                     `gpu_pwr` field synthesized in
                     `logic/beszel.py:fetch_system_history`. Card
                     hidden when the host has no GPU (host_gpus empty
                     OR every history point's gpu_pwr is 0 — no
                     discrete GPU surfaces no telemetry). -->
            <div class="metric-card metric-card--gpu"
                 x-show="(h.host_gpus || []).length > 0">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('hosts_extra.metrics.gpu_power')"></span><span class="unit">W</span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'gpu')" :title="metricSource(h, 'gpu')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'gpu')"
                          @click.stop="toggleMetricTooltip(h, 'gpu_pwr')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'gpu_pwr')"
                          x-cloak @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'gpu')"></span>
                  </button>
                </div>
                <div class="metric-card-stats">
                  <template x-for="(gpu, i) in (h.host_gpus || [])" :key="'gpw' + i">
                        <span class="fs-xs">
                          <span class="metric-legend-dot" style="background: var(--warning);"></span>
                          <span x-text="gpu.name || ('GPU ' + gpu.index)"></span>
                          <span class="legend-val" x-text="(+gpu.power_watts || 0).toFixed(1) + ' W'"></span>
                        </span>
                  </template>
                </div>
              </div>
              <template x-if="hostChartMax(hostHistoryKey(h), ['gpu_pwr']) > 0">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in yAxisAuto(hostChartMax(hostHistoryKey(h), ['gpu_pwr']), n => Math.round(n) + ' W')" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                    <path class="metric-grid"
                          :d="hostChart(hostHistoryKey(h), 'gpu_pwr', { min: 0, max: hostChartMax(hostHistoryKey(h), ['gpu_pwr']), height: 120 }).gridPath" fill="none"/>
                    <path class="metric-line" style="color: var(--warning);" fill="none"
                          :d="hostChart(hostHistoryKey(h), 'gpu_pwr', { min: 0, max: hostChartMax(hostHistoryKey(h), ['gpu_pwr']), height: 120 }).pathGapped"/>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i"><span x-text="l"></span></template>
                  </div>
                </div>
              </template>
              <template x-if="!(hostChartMax(hostHistoryKey(h), ['gpu_pwr']) > 0)">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- GPU Usage. Average utilization % across
                     every GPU. -->
            <div class="metric-card metric-card--gpu"
                 x-show="(h.host_gpus || []).length > 0">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('hosts_extra.metrics.gpu_usage')"></span><span class="unit">%</span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'gpu')" :title="metricSource(h, 'gpu')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'gpu')"
                          @click.stop="toggleMetricTooltip(h, 'gpu_usage')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'gpu_usage')"
                          x-cloak @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'gpu')"></span>
                  </button>
                </div>
                <div class="metric-card-stats">
                  <template x-for="(gpu, i) in (h.host_gpus || [])" :key="'gus' + i">
                        <span class="fs-xs">
                          <span class="metric-legend-dot" style="background: var(--success);"></span>
                          <span x-text="gpu.name || ('GPU ' + gpu.index)"></span>
                          <span class="legend-val" x-text="Math.round(+gpu.usage_percent || 0) + '%'"></span>
                        </span>
                  </template>
                </div>
              </div>
              <template x-if="hostChart(hostHistoryKey(h), 'gpu_usage') && (hostHistory[hostHistoryKey(h)] && (hostHistory[hostHistoryKey(h)].series || []).length >= 2)">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in yAxisPercent()" :key="i"><span x-text="l"></span></template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                    <path class="metric-grid"
                          :d="hostChart(hostHistoryKey(h), 'gpu_usage', { min: 0, max: 100, height: 120 }).gridPath" fill="none"/>
                    <path class="metric-line" style="color: var(--success);" fill="none"
                          :d="hostChart(hostHistoryKey(h), 'gpu_usage', { min: 0, max: 100, height: 120 }).pathGapped"/>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i"><span x-text="l"></span></template>
                  </div>
                </div>
              </template>
              <template x-if="!(hostChart(hostHistoryKey(h), 'gpu_usage') && (hostHistory[hostHistoryKey(h)] && (hostHistory[hostHistoryKey(h)].series || []).length >= 2))">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- GPU VRAM. Plots the % of VRAM used; legend
                     shows used / total bytes via fmtBytes. -->
            <div class="metric-card metric-card--gpu"
                 x-show="(h.host_gpus || []).length > 0">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('hosts_extra.metrics.gpu_vram')"></span><span class="unit">%</span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'gpu')" :title="metricSource(h, 'gpu')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'gpu')"
                          @click.stop="toggleMetricTooltip(h, 'gpu_vram')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'gpu_vram')"
                          x-cloak @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'gpu')"></span>
                  </button>
                </div>
                <div class="metric-card-stats">
                  <template x-for="(gpu, i) in (h.host_gpus || [])" :key="'gvr' + i">
                        <span class="fs-xs">
                          <span class="metric-legend-dot" style="background: var(--info);"></span>
                          <span x-text="gpu.name || ('GPU ' + gpu.index)"></span>
                          <span class="legend-val"
                                x-text="fmtBytes(gpu.vram_used_bytes) + ' / ' + fmtBytes(gpu.vram_total_bytes)"></span>
                        </span>
                  </template>
                </div>
              </div>
              <template x-if="hostChart(hostHistoryKey(h), 'gpu_vram_pct') && (hostHistory[hostHistoryKey(h)] && (hostHistory[hostHistoryKey(h)].series || []).length >= 2)">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in yAxisPercent()" :key="i"><span x-text="l"></span></template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                    <path class="metric-grid"
                          :d="hostChart(hostHistoryKey(h), 'gpu_vram_pct', { min: 0, max: 100, height: 120 }).gridPath" fill="none"/>
                    <path class="metric-line" style="color: var(--info);" fill="none"
                          :d="hostChart(hostHistoryKey(h), 'gpu_vram_pct', { min: 0, max: 100, height: 120 }).pathGapped"/>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i"><span x-text="l"></span></template>
                  </div>
                </div>
              </template>
              <template x-if="!(hostChart(hostHistoryKey(h), 'gpu_vram_pct') && (hostHistory[hostHistoryKey(h)] && (hostHistory[hostHistoryKey(h)].series || []).length >= 2))">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Admin-only debug panel — side-by-side JSON blobs for
                   each provider's raw response, the normalized extract,
                   the merged best-of dict, and the rendered API payload
                   the UI consumes. Collapsed by default; first open
                   triggers a lazy fetch. Useful for spotting dropped
                   fields / shape mismatches without grepping logs.
                   Operator-toggled in Admin → Hosts (settings.debug_panel_enabled);
                   default true preserves legacy visibility. -->
          <template x-if="me && me.role === 'admin' && (settings && settings.debug_panel_enabled !== false)">
            <div class="host-debug-panel">
              <button type="button"
                      class="host-debug-toggle host-debug-toggle--accent"
                      @click="toggleHostDebug(h.id)"
                      :aria-expanded="hostsDebugOpen[h.id] ? 'true' : 'false'">
                <svg width="12" height="12" class="flip-rtl" aria-hidden="true" :style="hostsDebugOpen[h.id] ? 'transform: rotate(90deg)' : ''">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
                </svg>
                <svg width="14" height="14" class="host-debug-toggle-icon" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-bug"/>
                </svg>
                <span x-text="hostsDebugOpen[h.id] ? t('debug_panel.hide') : t('debug_panel.show')"></span>
                <span class="host-debug-hint" x-show="!hostsDebugOpen[h.id]" x-text="t('debug_panel.hint')"></span>
              </button>
              <template x-if="hostsDebugOpen[h.id]">
                <div class="host-debug-body"
                     :data-host-section="'debug-' + h.id">
                  <template x-if="hostsDebugLoading[h.id]">
                    <div class="host-debug-loading">
                      <span class="spin-lg" aria-hidden="true"></span>
                      <span x-text="t('debug_panel.probing')"></span>
                    </div>
                  </template>
                  <template x-if="!hostsDebugLoading[h.id] && hostsDebug[h.id] && hostsDebug[h.id]._error">
                    <div class="host-debug-error" x-text="t('debug_panel.error_prefix', { error: hostsDebug[h.id]._error })"></div>
                  </template>
                  <template x-if="!hostsDebugLoading[h.id] && hostsDebug[h.id] && !hostsDebug[h.id]._error">
                    <div class="host-debug-content">
                      <div class="host-debug-toolbar">
                        <div class="host-debug-meta">
                          <span x-text="t('debug_panel.active_providers')"></span>
                          <template x-for="p in (hostsDebug[h.id].active_providers || [])" :key="p">
                              <span class="chip pill-custom"
                                    :style="providerChipStyle(p)"
                                    :title="p">
                                <span class="provider-icon"
                                      :style="providerIconStyle(p)"
                                      aria-hidden="true"></span>
                                <span x-text="p === 'node_exporter' ? 'exporter' : p"></span>
                              </span>
                          </template>
                          <template x-if="(hostsDebug[h.id].active_providers || []).length === 0">
                            <span class="host-debug-tag host-debug-tag--warn" x-text="t('debug_panel.none')"></span>
                          </template>
                        </div>
                        <!-- Copy ALL debug panes + Refresh grouped as one
                                 flex child so the toolbar's space-between
                                 places the meta strip on the left and the
                                 action cluster on the right. Pre-fix the
                                 toolbar had three children → space-between
                                 pushed the middle (Copy all) to center,
                                 which read visually as "centered, not
                                 grouped with Refresh". Pre-Refresh source
                                 order keeps the action row reading
                                 left→right as "copy first, then refresh
                                 if you need newer data". -->
                        <div class="host-debug-toolbar-actions">
                          <button type="button" class="btn btn-ghost fs-xs inline-flex items-center gap-1"
                                  @click="copyAllDebug(h.id)"
                                  :disabled="!hostsDebug[h.id]"
                                  :title="t('debug_panel.copy_all_title')">
                            <svg width="14" height="14" aria-hidden="true">
                              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/>
                            </svg>
                            <span x-text="t('debug_panel.copy_all')"></span>
                          </button>
                          <button type="button" class="btn btn-ghost fs-xs inline-flex items-center gap-1"
                                  @click="loadHostDebug(h.id)"
                                  :disabled="!!hostsDebugLoading[h.id]"
                                  :title="t('debug_panel.refresh_title')">
                            <svg width="14" height="14" aria-hidden="true"
                                 :class="hostsDebugLoading[h.id] ? 'spin-md' : ''">
                              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                            </svg>
                            <span x-text="t('debug_panel.refresh')"></span>
                          </button>
                        </div>
                      </div>
                      <!-- Five columns wrap to two rows on narrow
                               viewports. Each block is independently
                               scrollable so a huge raw dump doesn't push
                               the others off-screen. -->
                      <div class="host-debug-grid">
                        <!-- Counters & state — moved to FIRST position. Operators investigating
                                 a host issue almost always want to see
                                 failure-state + per-provider pause status
                                 + sample row counts BEFORE waded through
                                 the raw provider JSON. The wide-column
                                 span keeps the failure_state object
                                 readable on its own row. -->
                        <!-- Samples in window — dedicated table-shaped
                                 panel keyed off the chart range picker. Shows
                                 per-table sample counts within the SELECTED
                                 window (1h / 6h / 24h / 7d) plus the median
                                 gap between consecutive samples + the age
                                 of the newest sample. The diagnostic for
                                 "why is the past-hour chart cut?" — operator
                                 can see at a glance whether the sampler has
                                 been ticking on cadence (median_gap_s ≈
                                 sampler interval) or skipping (median_gap_s
                                 >> interval, count below expected). -->
                        <section class="host-debug-box host-debug-box--wide"
                                 x-show="hostsDebug[h.id].counters
                                           && hostsDebug[h.id].counters.samples_in_window">
                          <header class="host-debug-box-head">
                              <span class="host-debug-label host-debug-label--rendered"
                                    x-text="t('debug_panel.labels.samples_in_window')"></span>
                            <span class="host-debug-hint"
                                  x-text="t('debug_panel.hints.samples_in_window', { hours: (hostsDebug[h.id].counters.samples_in_window.hours || 1) })"></span>
                            <button type="button" class="host-debug-copy"
                                    @click="copyDebugJson(hostsDebug[h.id].counters.samples_in_window, 'debug_panel.labels.samples_in_window')"
                                    :aria-label="copyAriaLabel('debug_panel.labels.samples_in_window')"
                                    :title="t('debug_panel.copy_title')">
                              <svg width="12" height="12" aria-hidden="true">
                                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/>
                              </svg>
                            </button>
                          </header>
                          <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(hostsDebug[h.id].counters.samples_in_window)"></pre>
                        </section>
                        <section class="host-debug-box host-debug-box--wide" x-show="hasDebugData(hostsDebug[h.id].counters)">
                          <header class="host-debug-box-head">
                            <span class="host-debug-label host-debug-label--rendered" x-text="t('debug_panel.labels.counters')"></span>
                            <span class="host-debug-hint" x-text="t('debug_panel.hints.counters')"></span>
                            <button type="button" class="host-debug-copy"
                                    @click="copyDebugJson(hostsDebug[h.id].counters, 'debug_panel.labels.counters')"
                                    :aria-label="copyAriaLabel('debug_panel.labels.counters')"
                                    :title="t('debug_panel.copy_title')">
                              <svg width="12" height="12" aria-hidden="true">
                                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/>
                              </svg>
                            </button>
                          </header>
                          <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(hostsDebug[h.id].counters)"></pre>
                        </section>
                        <section class="host-debug-box" x-show="hasDebugData(hostsDebug[h.id].providers_raw?.pulse)">
                          <header class="host-debug-box-head">
                            <span class="host-debug-label host-debug-label--pulse" x-text="t('debug_panel.labels.raw_pulse')"></span>
                            <button type="button" class="host-debug-copy"
                                    @click="copyDebugJson(hostsDebug[h.id].providers_raw?.pulse, 'debug_panel.labels.raw_pulse')"
                                    :aria-label="copyAriaLabel('debug_panel.labels.raw_pulse')"
                                    :title="t('debug_panel.copy_title')">
                              <svg width="12" height="12" aria-hidden="true">
                                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/>
                              </svg>
                            </button>
                          </header>
                          <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(hostsDebug[h.id].providers_raw?.pulse)"></pre>
                        </section>
                        <section class="host-debug-box" x-show="hasDebugData(hostsDebug[h.id].providers_raw?.beszel)">
                          <header class="host-debug-box-head">
                            <span class="host-debug-label host-debug-label--beszel" x-text="t('debug_panel.labels.raw_beszel')"></span>
                            <button type="button" class="host-debug-copy"
                                    @click="copyDebugJson(hostsDebug[h.id].providers_raw?.beszel, 'debug_panel.labels.raw_beszel')"
                                    :aria-label="copyAriaLabel('debug_panel.labels.raw_beszel')"
                                    :title="t('debug_panel.copy_title')">
                              <svg width="12" height="12" aria-hidden="true">

          <!-- Admin-only SSH card — one-shot command runner against
                   the host resolved from its hosts_config id. Dry-run-
                   first by default; destructive commands raise a typed-
                   hostname confirm before the real run (also enforced
                   backend-side via logic/ssh.command_is_destructive).
                   Visible only when SSH is ENABLED for this host
                   (post-fix opt-in semantics —
                   hosts_config[].ssh.enabled=true). Gate reads
                   `h.ssh_enabled` straight from the row (not
                   sshStatus) so the panel never appears even for a
                   split second before sshStatus loads. -->
          <template x-if="me && me.role === 'admin' && h.ssh_enabled">
            <div class="host-debug-panel">
              <button type="button"
                      class="host-debug-toggle host-debug-toggle--accent"
                      @click="toggleSshCard(h.id)"
                      :aria-expanded="sshOpen[h.id] ? 'true' : 'false'">
                <svg width="12" height="12" class="flip-rtl" aria-hidden="true" :style="sshOpen[h.id] ? 'transform: rotate(90deg)' : ''">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
                </svg>
                <svg width="14" height="14" class="host-debug-toggle-icon" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-terminal"/>
                </svg>
                <span x-text="t('hosts_extra_ssh.card_title')"></span>
                <span class="host-debug-hint ms-2"
                      x-text="!sshStatus[h.id] ? t('hosts_extra_ssh.status_checking')
                                   : sshStatus[h.id].configured ? t('hosts_extra_ssh.status_ready')
                                   : t('hosts_extra_ssh.status_not_configured')"></span>
              </button>
              <template x-if="sshOpen[h.id]">
                <div class="host-debug-body"
                     :data-host-section="'ssh-' + h.id">
                  <!-- Resolved target summary -->
                  <div class="host-debug-toolbar">
                    <div class="host-debug-meta">
                      <span x-text="t('hosts_extra_ssh.resolved_label') + ':'"></span>
                      <span class="host-debug-tag mono"
                            x-text="sshStatus[h.id] && sshStatus[h.id].resolved
                                       ? (sshStatus[h.id].resolved.user || '?') + '@' + (sshStatus[h.id].resolved.host || h.id) + ':' + (sshStatus[h.id].resolved.port || 22)
                                       : h.id"></span>
                      <span x-show="sshStatus[h.id] && sshStatus[h.id].resolved && sshStatus[h.id].resolved.key_fingerprint"
                            class="host-debug-tag mono"
                            :title="t('hosts_extra_ssh.fingerprint_label')"
                            x-text="'SHA256:' + (sshStatus[h.id] && sshStatus[h.id].resolved && sshStatus[h.id].resolved.key_fingerprint || '')"></span>
                      <span x-show="sshStatus[h.id] && !sshStatus[h.id].configured"
                            class="host-debug-tag host-debug-tag--warn"
                            x-text="t('hosts_extra_ssh.fingerprint_empty')"></span>
                    </div>
                    <div class="flex items-center gap-2">
                      <button type="button" class="btn btn-ghost fs-xs"
                              @click="testSshConnection(h.id)"
                              :disabled="!!sshTestBusy[h.id]"
                              x-text="sshTestBusy[h.id] ? t('hosts_extra_ssh.running') : t('hosts_extra_ssh.test_button')"></button>
                      <!-- Interactive PTY terminal modal. Admin-only,
                               same gating as the rest of the SSH card. Disabled until
                               SSH is configured + the host is up — same rules as the
                               one-shot Run button. Styled as a primary action with
                               an icon so it reads as a clickable button, not a link. -->
                      <button type="button"
                              class="btn btn-primary fs-xs flex items-center gap-1.5"
                              @click="openHostTerminal(h)"
                              :disabled="!(sshStatus[h.id] && sshStatus[h.id].configured) || !isSshAllowed(h)"
                              :title="!isSshAllowed(h) ? sshDisabledReason(h) : t('hosts_extra_ssh.terminal.open_button_hint')">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round"
                             aria-hidden="true">
                          <polyline points="4 17 10 11 4 5"/>
                          <line x1="12" y1="19" x2="20" y2="19"/>
                        </svg>
                        <span x-text="t('hosts_extra_ssh.terminal.open_button')"></span>
                      </button>
                    </div>
                  </div>

                  <!-- Common actions — ALL driven by Admin → SSH
                           custom actions. Clicking a preset drops the
                           rendered command (with `{host}` substituted)
                           into the textarea below so the operator can
                           review and edit before hitting Run. -->
                  <div class="mb-3"
                       x-show="(sshSettings.custom_actions || []).length > 0">
                    <div class="fs-xs text-[var(--text-faint)] mb-1.5"
                         x-text="t('hosts_extra_ssh.common_actions_label')"></div>
                    <div class="flex flex-wrap gap-2">
                      <template x-for="(action, idx) in (sshSettings.custom_actions || [])"
                                :key="action.id || ('a' + idx)">
                        <button type="button" class="btn btn-soft fs-xs"
                                @click="runSshCustomAction(h.id, action)"
                                :disabled="!isSshAllowed(h)"
                                :title="isSshAllowed(h) ? action.command : sshDisabledReason(h)"
                                x-text="action.title"></button>
                      </template>
                    </div>
                  </div>

                  <!-- Custom command + dry-run + Run button. -->
                  <div class="mb-3">
                    <label class="block fs-xs text-[var(--text-faint)] mb-1"
                           x-text="t('hosts_extra_ssh.custom_label')"></label>
                    <textarea :value="sshCommand[h.id] || ''"
                              @input="sshCommand = Object.assign({}, sshCommand, { [h.id]: $event.target.value })"
                              :disabled="!(sshStatus[h.id] && sshStatus[h.id].configured) || !isSshAllowed(h)"
                              :title="!isSshAllowed(h) ? sshDisabledReason(h) : ''"
                              rows="6" maxlength="4096"
                              class="w-full mono fs-xs py-2 scrollbar"
                              style="min-height: 7rem; resize: vertical;"
                              :placeholder="t('hosts_extra_ssh.custom_placeholder')"></textarea>
                    <div class="flex items-center gap-3 flex-wrap mt-2">
                      <label class="inline-flex items-center gap-2 fs-xs text-[var(--text-dim)]">
                        <input type="checkbox"
                               :checked="sshDryRun[h.id] === true"
                               @change="sshDryRun = Object.assign({}, sshDryRun, { [h.id]: $event.target.checked })">
                        <span x-text="t('hosts_extra_ssh.dry_run_label')"></span>
                      </label>
                      <button type="button"
                              class="btn btn-primary fs-sm"
                              @click="runSshCommand(h.id)"
                              :disabled="!!sshBusy[h.id] || !(sshStatus[h.id] && sshStatus[h.id].configured) || !((sshCommand[h.id] || '').trim()) || !isSshAllowed(h)"
                              :title="!isSshAllowed(h) ? sshDisabledReason(h) : ''">
                        <span x-show="!sshBusy[h.id]" x-text="t('hosts_extra_ssh.run_button')"></span>
                        <span x-show="!!sshBusy[h.id]" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('hosts_extra_ssh.running')"></span></span>
                      </button>
                      <span x-show="!isSshAllowed(h)"
                            class="fs-xs text-[var(--warning)]"
                            x-text="sshDisabledReason(h)"></span>
                    </div>
                  </div>

                  <!-- Result pane — exit, stdout, stderr, duration,
                           copy. Shown only after at least one run. -->
                  <template x-if="sshResult[h.id]">
                    <div class="host-debug-box">
                      <header class="host-debug-box-head">
                          <span class="host-debug-label"
                                x-text="t('hosts_extra_ssh.result_exit') + ': ' + (sshResult[h.id].exit_code == null ? '—' : sshResult[h.id].exit_code)"></span>
                        <span class="host-debug-hint"
                              x-text="t('hosts_extra_ssh.result_duration') + ': ' + (sshResult[h.id].duration_ms || 0) + 'ms' + (sshResult[h.id].dry_run ? ' · dry-run' : '')"></span>
                        <button type="button" class="host-debug-copy"
                                @click="copySshOutput(h.id)"
                                :aria-label="t('hosts_extra_ssh.result_copy')"
                                :title="t('hosts_extra_ssh.result_copy')">
                          <svg width="12" height="12" aria-hidden="true">
                            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/>
                          </svg>
                        </button>
                      </header>
                      <div x-show="sshResult[h.id].error" class="host-debug-error"
                           x-text="sshResult[h.id].error"></div>
                      <div x-show="sshResult[h.id].stdout" class="px-3 pt-2 fs-2xs text-[var(--text-faint)]"
                           x-text="t('hosts_extra_ssh.result_stdout')"></div>
                      <pre x-show="sshResult[h.id].stdout" class="host-debug-json scrollbar"
                           x-text="sshResult[h.id].stdout"></pre>
                      <div x-show="sshResult[h.id].stderr" class="px-3 pt-2 fs-2xs text-[var(--danger)]"
                           x-text="t('hosts_extra_ssh.result_stderr')"></div>
                      <pre x-show="sshResult[h.id].stderr" class="host-debug-json scrollbar ssh-result-stderr"
                           x-text="sshResult[h.id].stderr"></pre>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>

        </div>
      </div>
    </template>
  </template>

  <!-- ================== NODE DRAWER ================== -->
  <!-- Per-node config: Beszel system-name alias, etc. Opens from the
       Nodes view's "Settings" button. Same slide-in pattern as the
       item drawer. Settings save calls POST /api/settings with a
       merged beszel_aliases object so other nodes' entries are kept. -->
  <template x-if="drawerNode">
    <div class="fixed inset-0 z-40 fade-in">
      <div @click="drawerNode=null" class="absolute inset-0 backdrop"></div>
      <aside x-show="drawerNode"
             role="dialog" aria-modal="true"
             :aria-label="drawerNode && drawerNode.name ? t('nodes.beszel.alias_section_aria', {title: t('nodes.beszel.alias_section_title'), name: drawerNode.name}) : t('nodes.beszel.alias_section_title')"
             @keydown="_focusTrapKeydown($event, $el)"
             class="absolute inset-y-0 end-0 w-full md:w-[460px] bg-[var(--surface)] border-s border-[var(--border)] overflow-y-auto scrollbar slide-in">
        <template x-if="drawerNode">
          <div class="p-5">
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0">
                <div class="fs-2xs uppercase tracking-wider text-[var(--text-faint)]" x-text="t('nodes.beszel.drawer_kicker')"></div>
                <h2 class="fs-display-sm font-semibold mt-1 mono break-all" x-text="drawerNode.name"></h2>
              </div>
              <button type="button" @click="drawerNode=null" class="btn btn-ghost text-base leading-none"
                      :aria-label="t('actions.close')">✕
              </button>
            </div>

            <div class="mt-5 space-y-5">
              <!-- Beszel alias editor -->
              <section>
                <h3 class="fs-sm uppercase tracking-wider text-[var(--text-dim)] mb-2"
                    x-text="t('nodes.beszel.alias_section_title')"></h3>
                <p class="fs-sm text-[var(--text-faint)] mb-3 leading-snug"
                   x-html="t('nodes.beszel.alias_section_desc')"></p>
                <label class="block fs-xs text-[var(--text-dim)] mb-1" for="node-beszel-alias"
                       x-text="t('nodes.beszel.alias_input_label')"></label>
                <input id="node-beszel-alias"
                       type="text"
                       class="input w-full"
                       :placeholder="drawerNode.name"
                       x-model="drawerNode.aliasInput"
                       @keydown.enter="saveNodeBeszelMapping()">
                <div class="flex items-center gap-2 mt-3">
                  <button type="button" class="btn btn-primary fs-sm"
                          :disabled="drawerNodeSaving"
                          @click="saveNodeBeszelMapping()">
                    <span x-show="!drawerNodeSaving" x-text="t('actions.save')"></span>
                    <span x-show="drawerNodeSaving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving')"></span></span>
                  </button>
                  <button type="button" class="btn btn-ghost fs-sm" @click="drawerNode=null" x-text="t('actions.cancel')"></button>
                </div>
              </section>

              <!-- Debug panel — admin-only, same gating as the host
                   drawer's panel (debug_panel_enabled setting). Surfaces
                   the cached _cache["nodes_info"] entry + items-on-node
                   count + a diagnostics list explaining why host CPU /
                   Mem / Disk bars are empty (no provider data, etc.).
                   `--compact` modifier shrinks the column min + box
                   height so two panes fit per row in the 460px node
                   drawer. -->
              <template x-if="me && me.role === 'admin' && (settings && settings.debug_panel_enabled !== false)">
                <section class="host-debug-panel host-debug-panel--compact">
                  <button type="button"
                          class="host-debug-toggle host-debug-toggle--accent"
                          @click="toggleSubjectDebug('node', drawerNode.name)"
                          :aria-expanded="subjectsDebugOpen[subjectDebugKey('node', drawerNode.name)] ? 'true' : 'false'">
                    <svg width="12" height="12" class="flip-rtl" aria-hidden="true"
                         :style="subjectsDebugOpen[subjectDebugKey('node', drawerNode.name)] ? 'transform: rotate(90deg)' : ''">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
                    </svg>
                    <svg width="14" height="14" class="host-debug-toggle-icon" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-bug"/>
                    </svg>
                    <span x-text="subjectsDebugOpen[subjectDebugKey('node', drawerNode.name)] ? t('debug_panel.hide') : t('debug_panel.show')"></span>
                  </button>
                  <div x-show="subjectsDebugOpen[subjectDebugKey('node', drawerNode.name)]" class="host-debug-body">
                    <template x-if="subjectsDebugLoading[subjectDebugKey('node', drawerNode.name)]">
                      <div class="host-debug-loading">
                        <span class="spin-lg" aria-hidden="true"></span>
                        <span x-text="t('debug_panel.probing')"></span>
                      </div>
                    </template>
                    <template x-if="subjectsDebug[subjectDebugKey('node', drawerNode.name)] && subjectsDebug[subjectDebugKey('node', drawerNode.name)]._error">
                      <div class="host-debug-error" x-text="t('debug_panel.error_prefix', { error: subjectsDebug[subjectDebugKey('node', drawerNode.name)]._error })"></div>
                    </template>
                    <template x-if="subjectsDebug[subjectDebugKey('node', drawerNode.name)] && !subjectsDebug[subjectDebugKey('node', drawerNode.name)]._error">
                      <div class="host-debug-content">
                        <div class="host-debug-toolbar">
                          <div class="host-debug-toolbar-actions">
                            <button type="button" class="btn btn-ghost fs-xs inline-flex items-center gap-1"
                                    @click="loadSubjectDebug('node', drawerNode.name)"
                                    :disabled="!!subjectsDebugLoading[subjectDebugKey('node', drawerNode.name)]"
                                    :title="t('debug_panel.refresh_title')">
                              <svg width="14" height="14" aria-hidden="true"
                                   :class="subjectsDebugLoading[subjectDebugKey('node', drawerNode.name)] ? 'spin-md' : ''">
                                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                              </svg>
                              <span x-text="t('debug_panel.refresh')"></span>
                            </button>
                          </div>
                        </div>
                        <div class="host-debug-grid">
                          <section class="host-debug-box"
                                   x-show="(subjectsDebug[subjectDebugKey('node', drawerNode.name)].diagnostics || []).length">
                            <header class="host-debug-box-head">
                              <span class="host-debug-label host-debug-label--rendered" x-text="t('debug_panel.labels.diagnostics')"></span>
                            </header>
                            <ul class="host-debug-json scrollbar" style="margin:0; padding-inline-start: var(--s-5); list-style: disc;">
                              <template x-for="msg in (subjectsDebug[subjectDebugKey('node', drawerNode.name)].diagnostics || [])" :key="msg">
                                <li class="fs-xs" x-text="msg"></li>
                              </template>
                            </ul>
                          </section>
                          <section class="host-debug-box">
                            <header class="host-debug-box-head">
                              <span class="host-debug-label host-debug-label--rendered" x-text="t('debug_panel.labels.items_on_node')"></span>
                              <button type="button" class="host-debug-copy"
                                      @click="copyDebugJson(subjectsDebug[subjectDebugKey('node', drawerNode.name)].items_on_node, 'debug_panel.labels.items_on_node')"
                                      :aria-label="copyAriaLabel('debug_panel.labels.items_on_node')"
                                      :title="t('debug_panel.copy_title')">
                                <svg width="12" height="12" aria-hidden="true">
                                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/>
                                </svg>
                              </button>
                            </header>
                            <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(subjectsDebug[subjectDebugKey('node', drawerNode.name)].items_on_node || {})"></pre>
                          </section>
                          <section class="host-debug-box">
                            <header class="host-debug-box-head">
                              <span class="host-debug-label host-debug-label--rendered" x-text="t('debug_panel.labels.nodes_info')"></span>
                              <button type="button" class="host-debug-copy"
                                      @click="copyDebugJson(subjectsDebug[subjectDebugKey('node', drawerNode.name)].nodes_info, 'debug_panel.labels.nodes_info')"
                                      :aria-label="copyAriaLabel('debug_panel.labels.nodes_info')"
                                      :title="t('debug_panel.copy_title')">
                                <svg width="12" height="12" aria-hidden="true">
                                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/>
                                </svg>
                              </button>
                            </header>
                            <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(subjectsDebug[subjectDebugKey('node', drawerNode.name)].nodes_info || {})"></pre>
                          </section>
                        </div>
                      </div>
                    </template>
                  </div>
                </section>
              </template>
            </div>
          </div>
        </template>
      </aside>
    </div>
  </template>

  <!-- ================== APP DETAIL / DEBUG DRAWER ==================
       Opened by clicking an app card in the Apps view. Shows the app's
       catalog binding + every host instance with its per-port status,
       a "Probe now" action, and a per-instance "Show debug" panel that
       fetches the resolved probe target(s) + chip/catalog config +
       latest outcomes so the operator can see WHY a given app on a
       given host isn't reporting. Mirrors the host drawer's debug
       panel; lives top-level (x-if) like the other drawers. -->
  <template x-if="drawerApp">
    <div class="fixed inset-0 z-40 fade-in">
      <div @click="closeAppDrawer()" class="absolute inset-0 backdrop"></div>
      <aside role="dialog" aria-modal="true"
             :aria-label="drawerApp && drawerApp.name ? drawerApp.name : (t('apps.drawer.title') || 'App detail')"
             @keydown="_focusTrapKeydown($event, $el)"
             class="absolute inset-y-0 end-0 w-full md:w-[560px] bg-[var(--surface)] border-s border-[var(--border)] overflow-y-auto scrollbar slide-in">
        <template x-if="drawerApp">
          <div class="p-5">
            <!-- Header -->
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0 flex-1 flex items-start gap-2">
                <img :src="iconUrlFor(drawerApp.icon || drawerApp.name)" alt=""
                     class="drawer-item-icon" @error="$event.target.style.display='none'">
                <div class="min-w-0">
                  <h2 class="fs-display-sm font-semibold break-all" x-text="drawerApp.name"></h2>
                  <div class="flex items-center gap-1.5 flex-wrap mt-1">
                    <span class="chip fs-3xs" :class="appStatusPillClass(drawerApp.status)"
                          x-text="t('apps.status_' + drawerApp.status) || drawerApp.status"></span>
                    <span class="fs-3xs text-[var(--text-faint)]"
                          x-text="t('apps.counts.instances_up', { up: drawerApp.up_count, total: drawerApp.instance_count })"></span>
                  </div>
                </div>
              </div>
              <button type="button" @click="closeAppDrawer()" class="user-action-btn"
                      :aria-label="t('actions.close')" :title="t('actions.close')">
                <svg width="14" height="14" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-x"/>
                </svg>
              </button>
            </div>

            <!-- Catalog binding -->
            <template x-if="drawerApp.catalog">
              <div class="mt-4 rounded-md border border-[var(--border)] bg-[var(--surface-2)] p-3">
                <div class="fs-2xs uppercase tracking-wide text-[var(--text-faint)] mb-1"
                     x-text="t('apps.drawer.catalog') || 'Catalog template'"></div>
                <div class="fs-sm font-medium" x-text="drawerApp.catalog.name"></div>
                <div class="fs-xs text-[var(--text-dim)]" x-show="drawerApp.catalog.description"
                     x-text="drawerApp.catalog.description"></div>
                <div class="fs-2xs text-[var(--text-faint)] mt-1 mono"
                     x-show="(drawerApp.catalog.default_ports || []).length"
                     x-text="(t('apps.drawer.default_ports') || 'Default ports') + ': ' + (drawerApp.catalog.default_ports || []).map(p => p.port + '/' + p.protocol).join(', ')"></div>
              </div>
            </template>

            <!-- Instances -->
            <div class="mt-4">
              <div class="fs-2xs uppercase tracking-wide text-[var(--text-faint)] mb-2"
                   x-text="t('apps.drawer.instances') || 'Instances'"></div>
              <div class="space-y-2">
                <template x-for="inst in (drawerApp.instances || [])" :key="inst.host_id + ':' + inst.service_idx">
                  <div class="space-y-2">
                    <div class="rounded-md border border-[var(--border)] p-3">
                      <div class="flex items-center gap-2">
                        <span class="apps-card-dot" :class="'apps-card-dot--' + inst.status" aria-hidden="true"></span>
                        <span class="flex-1 truncate fs-sm mono" :title="appsInstanceHostTitle(inst)"
                              x-text="inst.host_address || inst.host_id"></span>
                        <a x-show="inst.url" :href="inst.url" target="_blank" rel="noopener"
                           class="text-[var(--primary)]" :aria-label="t('apps.open_link') || 'Open service URL'" @click.stop>
                          <svg width="12" height="12" aria-hidden="true">
                            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-external-link"/>
                          </svg>
                        </a>
                      </div>
                      <div x-show="appsInstanceReason(inst)" class="fs-xs mt-1"
                           :class="inst.status === 'down' ? 'text-[var(--danger)]' : 'text-[var(--text-faint)]'"
                           x-text="appsInstanceReason(inst)"></div>
                      <div x-show="(inst.port_results || []).length" class="apps-port-grid mt-1">
                        <template x-for="pr in (inst.port_results || [])" :key="pr.port">
                          <a class="apps-port-pill"
                             :class="'apps-port-pill--' + appsPortState(pr) + (appsPortHref(pr, inst) ? ' apps-port-pill--link' : '')"
                             :href="appsPortHref(pr, inst) || null"
                             :target="appsPortHref(pr, inst) ? '_blank' : null"
                             rel="noopener"
                             @click.stop
                             :title="appsPortTitle(pr)">
                            <span class="apps-card-dot" :class="'apps-card-dot--' + appsPortState(pr)" aria-hidden="true"></span>
                            <span x-text="pr.port + '/' + (pr.protocol || 'tcp')" class="mono"></span>
                          </a>
                        </template>
                      </div>
                      <div class="flex items-center gap-2 mt-2 flex-wrap">
                        <button type="button" x-show="isAdmin()" @click.stop="appDrawerProbeNow(inst)"
                                :disabled="appProbeBusy(inst)"
                                class="btn btn-soft fs-xs inline-flex items-center gap-1.5">
                          <svg width="13" height="13" :class="appProbeBusy(inst) ? 'spin-md' : ''" aria-hidden="true">
                            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-cw"/>
                          </svg>
                          <span x-text="t('apps.drawer.probe_now') || 'Probe now'"></span>
                        </button>
                        <button type="button" x-show="isAdmin()" @click.stop="editAppInstanceFromDrawer(inst)"
                                class="btn btn-soft fs-xs inline-flex items-center gap-1.5">
                          <svg width="13" height="13" aria-hidden="true">
                            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-edit"/>
                          </svg>
                          <span x-text="t('apps.drawer.edit') || 'Edit'"></span>
                        </button>
                        <!-- Inline Restart — only when the chip is linked to a
                             Docker container / stack. Resolves the target from
                             the items list + hands off to restartItem (confirm +
                             audit + agent-target routing). -->
                        <button type="button" x-show="isAdmin() && (inst.docker_container || inst.docker_stack)"
                                @click.stop="appDrawerRestart(inst)"
                                class="btn btn-soft fs-xs inline-flex items-center gap-1.5">
                          <svg width="13" height="13" aria-hidden="true">
                            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-rotate-ccw"/>
                          </svg>
                          <span x-text="t('apps.drawer.restart') || 'Restart'"></span>
                        </button>
                        <!-- Inline Update — only when the linked Docker target
                             currently has an update available. -->
                        <button type="button"
                                x-show="isAdmin() && (inst.docker_container || inst.docker_stack) && appDrawerHasUpdate(inst)"
                                @click.stop="appDrawerUpdate(inst)"
                                class="btn btn-warning fs-xs inline-flex items-center gap-1.5">
                          <svg width="13" height="13" aria-hidden="true">
                            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-download"/>
                          </svg>
                          <span x-text="t('apps.drawer.update') || 'Update'"></span>
                        </button>
                        <!-- Inline Logs — only when the chip resolves to a
                             Docker CONTAINER in the current items list (service
                             links don't have a single container to tail). Opens
                             a modal that fetches the container's tail via
                             Portainer. -->
                        <button type="button"
                                x-show="isAdmin() && appDrawerCanLogs(inst)"
                                @click.stop="appDrawerLogs(inst)"
                                class="btn btn-soft fs-xs inline-flex items-center gap-1.5">
                          <svg width="13" height="13" aria-hidden="true">
                            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-file-text"/>
                          </svg>
                          <span x-text="t('apps.drawer.logs') || 'Logs'"></span>
                        </button>
                        <!-- Show debug — admin-only AND gated on the Admin →
                             Debug `debug_panel_enabled` tunable, matching the
                             host / node / item drawers (the /debug endpoint is
                             admin-only too). -->
                        <button type="button" @click.stop="toggleAppInstanceDebug(inst)"
                                x-show="me && me.role === 'admin' && (settings && settings.debug_panel_enabled !== false)"
                                class="btn btn-ghost fs-xs inline-flex items-center gap-1.5">
                          <svg width="13" height="13" aria-hidden="true">
                            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-bug"/>
                          </svg>
                          <span x-text="appDebugOpen[appInstanceKey(inst)] ? (t('apps.drawer.hide_debug') || 'Hide debug') : (t('apps.drawer.show_debug') || 'Show debug')"></span>
                        </button>
                      </div>
                      <!-- x-if (not x-show) so the heavy fetched debug JSON unmounts
                           when collapsed — user-toggled panel, safe to unmount. -->
                      <template x-if="appDebugOpen[appInstanceKey(inst)] && me && me.role === 'admin' && (settings && settings.debug_panel_enabled !== false)">
                        <div class="mt-2 rounded-md bg-[var(--surface-2)] border border-[var(--border)] p-2">
                          <template x-if="appDebug[appInstanceKey(inst)] && appDebug[appInstanceKey(inst)].loading">
                            <div class="fs-xs text-[var(--text-faint)] flex items-center gap-2">
                              <span class="spin"></span><span x-text="t('apps.drawer.debug_loading') || 'Loading diagnostics…'"></span>
                            </div>
                          </template>
                          <template x-if="appDebug[appInstanceKey(inst)] && appDebug[appInstanceKey(inst)].error">
                            <div class="fs-xs text-[var(--danger)]" x-text="appDebug[appInstanceKey(inst)].error"></div>
                          </template>
                          <template x-if="appDebug[appInstanceKey(inst)] && appDebug[appInstanceKey(inst)].data">
                            <div class="fs-xs space-y-2">
                              <div x-show="appDebug[appInstanceKey(inst)].data.probe_reason" class="text-[var(--warning)]"
                                   x-text="appDebug[appInstanceKey(inst)].data.probe_reason"></div>
                              <!-- Continuous-probe blockers — why the port pills stay grey
                                   even though "Probe now" works. Each blocker is a reason
                                   the lifespan sampler skips this chip (master provider OFF
                                   and/or this chip's probe disabled). Empty => eligible. -->
                              <div x-show="(appDebug[appInstanceKey(inst)].data.live_probe_blockers || []).length"
                                   class="rounded-md px-2 py-1.5 bg-[var(--pill-warning-bg)] text-[var(--pill-warning-fg)] border border-[var(--pill-warning-br)]">
                                <div class="fs-2xs uppercase tracking-wide mb-1"
                                     x-text="t('apps.drawer.live_probe_blocked') || 'Live probing not running — reasons:'"></div>
                                <ul class="list-disc ps-4 space-y-0.5">
                                  <template x-for="b in (appDebug[appInstanceKey(inst)].data.live_probe_blockers || [])" :key="b">
                                    <li x-text="b"></li>
                                  </template>
                                </ul>
                              </div>
                              <div x-show="(appDebug[appInstanceKey(inst)].data.resolved_targets || []).length">
                                <div class="fs-2xs uppercase tracking-wide text-[var(--text-faint)] mb-1"
                                     x-text="t('apps.drawer.resolved_targets') || 'Resolved probe targets'"></div>
                                <template x-for="rt in appDebug[appInstanceKey(inst)].data.resolved_targets" :key="rt.target">
                                  <div class="mono fs-2xs break-all">
                                    <span x-text="rt.target"></span>
                                    <span class="text-[var(--text-faint)]"
                                          x-text="' [' + rt.probe_type + (rt.expected_status ? ' → ' + rt.expected_status : '') + ']'"></span>
                                  </div>
                                </template>
                              </div>
                              <div class="mono fs-2xs text-[var(--text-dim)]"
                                   x-text="(t('apps.drawer.probe_enabled') || 'Probe enabled') + ': ' + (appDebug[appInstanceKey(inst)].data.chip.probe.enabled ? '✓' : '✕') + ' · ' + appDebug[appInstanceKey(inst)].data.chip.probe.type"></div>
                              <!-- Master Service-probe provider toggle (Admin → Providers).
                                   OFF means NO chip on any host gets continuous probing. -->
                              <div class="mono fs-2xs text-[var(--text-dim)]"
                                   x-text="(t('apps.drawer.master_probe_enabled') || 'Service-probe provider (global)') + ': ' + (appDebug[appInstanceKey(inst)].data.service_probe_master_enabled ? '✓' : '✕')"></div>
                              <div class="flex items-center gap-2">
                                <details class="flex-1 min-w-0">
                                  <summary class="fs-2xs text-[var(--text-faint)] cursor-pointer"
                                           x-text="t('apps.drawer.raw_json') || 'Raw debug JSON'"></summary>
                                  <pre class="fs-2xs mono whitespace-pre-wrap break-all mt-1"
                                       x-text="JSON.stringify(appDebug[appInstanceKey(inst)].data, null, 2)"></pre>
                                </details>
                                <button type="button" class="btn btn-ghost fs-2xs inline-flex items-center gap-1 flex-shrink-0 self-start"
                                        @click.stop="copyToClipboard(JSON.stringify(appDebug[appInstanceKey(inst)].data, null, 2))"
                                        :aria-label="t('apps.drawer.copy_debug') || 'Copy debug JSON'"
                                        :title="t('apps.drawer.copy_debug') || 'Copy debug JSON'">
                                  <svg width="12" height="12" aria-hidden="true">
                                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/>
                                  </svg>
                                  <span x-text="t('apps.drawer.copy_debug') || 'Copy'"></span>
                                </button>
                              </div>
                            </div>
                          </template>
                        </div>
                      </template>
                    </div>
                    <!-- Per-app extras as a SEPARATE boxed card BELOW the instance
                         box (not an hr divider under the action buttons). `app` is
                         bound to drawerApp via a single-element x-for so the per-app
                         partials (which gate on `app` + `inst` via anyAppExtrasMatch
                         / appsShowExtras) resolve in the drawer scope;
                         .apps-drawer-extras-box neutralises the partial's own top
                         divider (mt-3 / pt-3 / border-t) so the card border is the
                         only frame. Same gating + data path the app CARD uses. -->
                    <template x-for="app in [drawerApp]" :key="'extras:' + inst.host_id + ':' + inst.service_idx">
                      <template x-if="anyAppExtrasMatch(app)">
                        <div class="rounded-md border border-[var(--border)] p-3 apps-drawer-extras-box">
                          <!-- INCLUDE: _components/apps/_all_extras.html -->
                        </div>
                      </template>
                    </template>
                    <!-- Per-app SKILL buttons in their OWN boxed card AFTER the
                         extras box (moved out of the instance action bar so the
                         app-specific actions read as a distinct section, not mixed
                         with the generic Probe / Edit / Restart row). Rendered only
                         when the chip's app declares skills AND its api_key is set
                         (appInstanceSkillsEnabled); the backend re-enforces both. The
                         icon spins while a run is in flight; the same skills are
                         offered to the AI / Telegram. -->
                    <!-- Per-instance skill card — hidden for apps that render
                         APP-LEVEL aggregated extras (e.g. AdGuard), whose actions
                         are fleet-wide and live in ONE app-level card below the
                         instance loop. Without this gate the skill buttons
                         duplicated once per host. -->
                    <template x-if="isAdmin() && appInstanceSkillsEnabled(inst) && !anyAppAggExtrasMatch(drawerApp)">
                      <div class="rounded-md border border-[var(--border)] p-3">
                        <div class="fs-2xs uppercase tracking-wide text-[var(--text-faint)] mb-2"
                             x-text="t('apps.drawer.skills_title') || 'App skills'"></div>
                        <div class="flex items-center gap-2 flex-wrap">
                          <template x-for="sk in appInstanceSkills(inst)" :key="sk.id">
                            <button type="button"
                                    @click.stop="runAppSkill(inst, sk.id)"
                                    :disabled="appSkillBusy(inst, sk.id)"
                                    class="btn btn-primary fs-xs inline-flex items-center gap-1.5">
                              <svg width="13" height="13" :class="appSkillBusy(inst, sk.id) ? 'spin-md' : ''" aria-hidden="true">
                                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-zap"/>
                              </svg>
                              <span x-text="appSkillLabel(sk)"></span>
                            </button>
                          </template>
                        </div>
                        <!-- Inline skill output. A read-only skill (e.g.
