                         preserved (busy by traffic desc) so toggling
                         on reveals the lower-traffic ports inline. -->
                    <template x-if="networkIfacesBusyHiddenCount(h) > 0">
                      <div class="pt-2 border-t border-dashed border-[var(--border)]">
                        <button @click="toggleNetworkIfacesBusyAll(h)"
                                class="text-[11.5px] text-[var(--text-dim)] hover:text-[var(--text)] flex items-center gap-1.5"
                                :title="t('host_drawer.network.busy_all_toggle_title')">
                          <svg width="10" height="10" stroke-width="3" aria-hidden="true" :style="networkIfacesShowAllBusy[h.id] ? 'transform: rotate(90deg)' : ''" style="transition: transform 120ms ease-out"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/></svg>
                          <span x-text="networkIfacesShowAllBusy[h.id]
                                        ? t('host_drawer.network.busy_all_hide', { count: networkIfacesBusyHiddenCount(h) })
                                        : t('host_drawer.network.busy_all_show', { count: networkIfacesBusyHiddenCount(h) })"></span>
                        </button>
                      </div>
                    </template>
                    <!-- Idle interfaces (no traffic, no IP).
                         Same toggle pattern as the Docker veths block
                         below, applied within the "real" group so a
                         32-port switch's empty Port-Channel pool
                         doesn't dominate the drawer. -->
                    <template x-if="networkIfacesActivityPartition(h).idle.length > 0">
                      <div class="pt-2 border-t border-dashed border-[var(--border)]">
                        <button @click="toggleNetworkIfacesIdle(h)"
                                class="text-[11.5px] text-[var(--text-dim)] hover:text-[var(--text)] flex items-center gap-1.5"
                                :title="t('host_drawer.network.idle_toggle_title')">
                          <svg width="10" height="10" stroke-width="3" aria-hidden="true" :style="networkIfacesShowIdle[h.id] ? 'transform: rotate(90deg)' : ''" style="transition: transform 120ms ease-out"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/></svg>
                          <span x-text="networkIfacesShowIdle[h.id]
                                        ? t('host_drawer.network.idle_hide', { count: networkIfacesActivityPartition(h).idle.length })
                                        : t('host_drawer.network.idle_show', { count: networkIfacesActivityPartition(h).idle.length })"></span>
                        </button>
                        <div x-show="networkIfacesShowIdle[h.id]" class="space-y-1.5 mt-2">
                          <template x-for="(iface, i) in networkIfacesActivityPartition(h).idle" :key="'idle' + i">
                            <div class="flex items-baseline gap-2 flex-wrap">
                              <span x-show="typeof iface === 'object' && iface.oper_status"
                                    class="inline-block w-1.5 h-1.5 rounded-full self-center"
                                    :class="iface.oper_status === 'up' ? 'dot-on' : 'dot-off'"></span>
                              <span class="font-semibold text-[12.5px] mono opacity-70"
                                    x-text="typeof iface === 'string' ? iface : iface.name"></span>
                            </div>
                          </template>
                        </div>
                      </div>
                    </template>
                    <!-- Docker / k8s / Proxmox internal interfaces. Hidden
                         by default behind a toggle keyed per host. On a
                         Docker host with 30+ veths this collapses the
                         drawer from a 50-row wall to a tidy summary.
                         when a host has ONLY ONE interface and
                         it's docker/internal (e.g. a thin VM showing
                         just `vmbr0`), the toggle is friction; render
                         the single iface inline AND skip the toggle
                         entirely. The condition checks the raw
                         partition, not the activity-busy/idle split,
                         because the single docker iface lives in
                         `internal` regardless of traffic. -->
                    <template x-if="networkIfacesPartition(h).internal.length === 1
                                    && networkIfacesActivityPartition(h).busy.length === 0
                                    && networkIfacesActivityPartition(h).idle.length === 0">
                      <div class="pt-2 border-t border-dashed border-[var(--border)]">
                        <template x-for="(iface, i) in networkIfacesPartition(h).internal" :key="'i-solo' + i">
                          <div class="space-y-1.5">
                            <div class="flex items-baseline gap-2 flex-wrap">
                              <span class="font-semibold text-[12.5px] mono"
                                    x-text="typeof iface === 'string' ? iface : iface.name"></span>
                              <span x-show="typeof iface === 'object' && iface.mac"
                                    class="ip-chip ip-chip--mac"
                                    x-text="iface.mac"></span>
                            </div>
                            <div x-show="typeof iface === 'object' && (iface.addrs || []).length"
                                 class="flex flex-wrap gap-1.5">
                              <template x-for="a in (typeof iface === 'object' ? (iface.addrs || []) : [])" :key="a">
                                <span class="ip-chip"
                                      :class="a.includes(':') ? 'ip-chip--v6' : 'ip-chip--v4'"
                                      x-text="a"></span>
                              </template>
                            </div>
                          </div>
                        </template>
                      </div>
                    </template>
                    <template x-if="!(networkIfacesPartition(h).internal.length === 1
                                      && networkIfacesActivityPartition(h).busy.length === 0
                                      && networkIfacesActivityPartition(h).idle.length === 0)
                                    && networkIfacesPartition(h).internal.length > 0">
                      <div class="pt-2 border-t border-dashed border-[var(--border)]">
                        <button @click="toggleNetworkIfacesDocker(h)"
                                class="text-[11.5px] text-[var(--text-dim)] hover:text-[var(--text)] flex items-center gap-1.5"
                                :title="t('host_drawer.network.docker_toggle_title')">
                          <svg width="10" height="10" stroke-width="3" aria-hidden="true" :style="networkIfacesShowDocker[h.id] ? 'transform: rotate(90deg)' : ''" style="transition: transform 120ms ease-out"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/></svg>
                          <span x-text="networkIfacesShowDocker[h.id]
                                        ? t('host_drawer.network.docker_hide', { count: networkIfacesPartition(h).internal.length })
                                        : t('host_drawer.network.docker_show', { count: networkIfacesPartition(h).internal.length })"></span>
                        </button>
                        <div x-show="networkIfacesShowDocker[h.id]" class="space-y-1.5 mt-2">
                          <template x-for="(iface, i) in networkIfacesPartition(h).internal" :key="'i' + i">
                            <div class="space-y-1.5">
                              <div class="flex items-baseline gap-2 flex-wrap">
                                <span class="font-semibold text-[12.5px] mono"
                                      x-text="typeof iface === 'string' ? iface : iface.name"></span>
                                <span x-show="typeof iface === 'object' && iface.mac"
                                      class="ip-chip ip-chip--mac"
                                      x-text="iface.mac"></span>
                              </div>
                              <div x-show="typeof iface === 'object' && (iface.addrs || []).length"
                                   class="flex flex-wrap gap-1.5">
                                <template x-for="a in (typeof iface === 'object' ? (iface.addrs || []) : [])" :key="a">
                                  <span class="ip-chip"
                                        :class="a.includes(':') ? 'ip-chip--v6' : 'ip-chip--v4'"
                                        x-text="a"></span>
                                </template>
                              </div>
                            </div>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </section>

                <!-- DISKS — always rendered when we have at least the
                     aggregate disk total from Beszel / Pulse / node-
                     exporter. Starts with a "Total Usage" bar (the
                     merged host_disk_total/used from whichever
                     provider reported it), then drops in per-mount
                     bars under ``efs`` when the newer Beszel agent
                     emits them. This keeps the card informative for
                     container-mode Beszel agents (which skip ``efs``)
                     while still showing richer detail for full-host
                     agents. -->
                <section x-show="h.disk_total > 0 || (h.mounts || []).length > 0"
                         class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                  <h4 class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)] mb-3" x-text="t('host_drawer.disks.heading')"></h4>
                  <div class="space-y-3">
                    <!-- Total usage row — single-colour aggregate bar.
                         Per-mount rows below give the breakdown; the
                         segmented rendering now lives on the
                         collapsed host row's small disk column
                         instead (see the Disk column in the grid
                         row). Keeps the expanded DISKS card matching
                         Beszel's reference layout. -->
                    <div x-show="h.disk_total > 0">
                      <div class="flex items-baseline justify-between">
                        <span class="text-[11.5px] text-[var(--text-dim)] font-semibold" x-text="t('host_drawer.disks.total_usage')"></span>
                        <span class="text-[10.5px] text-[var(--text-faint)] mono"
                              x-text="diskPercentOf(h).toFixed(1) + '% · '
                                      + fmtBytes(h.disk_used) + ' / '
                                      + fmtBytes(h.disk_total)"></span>
                      </div>
                      <div class="stat-bar mt-1" x-bind="statBarBind(diskPercentOf(h), 'columns.disk')"
                           :class="barLevel(diskPercentOf(h))"
                           :style="'--w: ' + diskPercentOf(h) + '%'">
                        <div class="fill"></div>
                      </div>
                    </div>
                    <!-- Per-mount breakdown (when stats.efs was
                         populated — full-host Beszel agents only).
                         Zero-usage mounts collapse behind a toggle
                         to keep hosts with many ZFS datasets readable
                         the card). visibleMounts(h) returns the
                         above-threshold set; toggleHostShowEmptyDisks
                         expands to show the remainder. -->
                    <template x-for="(m, i) in visibleMounts(h)" :key="i">
                      <div class="disk-mount-row">
                        <div class="flex items-baseline justify-between">
                          <span class="text-[11.5px] mono truncate" x-text="m.n || m.name || '(disk)'"></span>
                          <span class="text-[10.5px] text-[var(--text-faint)] mono"
                                x-text="m.d && m.du
                                        ? (m.dp || 0).toFixed(1) + '% · '
                                          + fmtBytes((m.du || 0) * 1024**3) + ' / '
                                          + fmtBytes((m.d || 0) * 1024**3)
                                        : ''"></span>
                        </div>
                        <div class="stat-bar mt-0.5" x-bind="statBarBind((m.dp || 0))"
                             :class="barLevel(m.dp || 0)"
                             :style="'--w: ' + (m.dp || 0) + '%'">
                          <div class="fill"></div>
                        </div>
                      </div>
                    </template>
                    <!-- Show-empty toggle when there are zero-usage
                         mounts hiding. Clicking expands (or collapses)
                         them for this host only. -->
                    <button type="button"
                            x-show="emptyMountCount(h) > 0"
                            @click="toggleHostShowEmptyDisks(h.host)"
                            class="text-[10.5px] text-[var(--text-faint)] hover:text-[var(--primary)] hover:underline w-full text-start pt-1 mono">
                      <span x-show="!hostDisksShowEmpty[h.host]"
                            x-text="emptyMountCount(h) === 1 ? t('host_drawer.disks.show_empty_one') : t('host_drawer.disks.show_empty_many', { count: emptyMountCount(h) })"></span>
                      <span x-show="hostDisksShowEmpty[h.host]"
                            x-text="emptyMountCount(h) === 1 ? t('host_drawer.disks.hide_empty_one') : t('host_drawer.disks.hide_empty_many', { count: emptyMountCount(h) })"></span>
                    </button>
                  </div>
                </section>

                <!-- UPDATES — only rendered when Webmin reported
                     pending packages. Informational in Phase 1; a
                     later phase may link to a full package list. -->
                <section x-show="(h.updates_pending || 0) > 0"
                         class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                  <h4 class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)] mb-3" x-text="t('host_drawer.updates.heading')"></h4>
                  <dl class="drawer-dl text-[12px]">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.updates.pending')"></dt>
                    <dd class="mono text-end" x-text="h.updates_pending"></dd>
                    <template x-if="(h.updates_security || 0) > 0">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.updates.security')"></dt>
                    </template>
                    <template x-if="(h.updates_security || 0) > 0">
                      <dd class="text-end">
                        <span class="pill pill-degraded text-[10.5px]"
                              x-text="t('host_drawer.updates.security_count', { count: h.updates_security })"></span>
                      </dd>
                    </template>
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.updates.source')"></dt>
                    <dd class="mono text-end text-[var(--text-faint)]" x-text="t('settings.host_stats.source_webmin')"></dd>
                  </dl>
                </section>
              </div>

              <!-- Time-range picker — segmented buttons. Range applies
                   to ALL chart cards in the drawer (CPU / Mem / Disk /
                   Net / Disk-IO / Load + Ping + SNMP). `setHostHistoryRange`
                   re-fires `loadHostHistory` (Beszel/NE), `loadHostPingHistory`
                   , and `loadHostSnmpHistory` / `loadHostSnmpIfaceHistory`
                    so picker clicks refresh every series in
                   lock-step. Gate widened over time: `h.ping_enabled`
                   for ping-only hosts, `hostHasSnmpCharts(h)` for SNMP-
                   only hosts (managed switches / UPSes / NVRs / embedded
                   routers — no Beszel/NE so the original gate hid the
                   picker even though SNMP charts were rendering below). -->
              <div class="mt-4 flex items-center gap-2 flex-wrap"
                   x-show="((h.beszel_id || h.ne_url || h.pulse_name || h.webmin_name) && h.status === 'up' && (h.providers || []).length > 0) || h.ping_enabled || hostHasSnmpCharts(h)">
                <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-clock"/></svg>
                <!-- Buttons disabled while the picker's underlying
                     loaders are in flight. Prevents the operator
                     from rapid-clicking 1h → 6h → 24h while the first
                     fetch is still resolving — pre-fix the SPA lagged
                     the chart updates on slow networks and presented
                     inconsistent data because each pending fetch
                     finished out of order. The CSS disabled-state
                     styling is inherited from the `.range-seg button`
                     base rule. -->
                <div class="range-seg"
                     role="radiogroup"
                     :aria-label="t('host_drawer.charts.range_picker_label')"
                     :aria-busy="hostHistoryRangeBusy ? 'true' : 'false'"
                     @keydown="_radiogroupArrowKey($event)">
                  <button type="button" role="radio" :class="hostHistoryRange === 1 ? 'active' : ''"
                          :aria-checked="hostHistoryRange === 1"
                          :aria-label="t('host_drawer.charts.range_1h_aria')"
                          :tabindex="hostHistoryRange === 1 ? 0 : -1"
                          :disabled="hostHistoryRangeBusy"
                          @click="setHostHistoryRange(1)"
                          x-text="t('host_drawer.charts.range_1h')"></button>
                  <button type="button" role="radio" :class="hostHistoryRange === 6 ? 'active' : ''"
                          :aria-checked="hostHistoryRange === 6"
                          :aria-label="t('host_drawer.charts.range_6h_aria')"
                          :tabindex="hostHistoryRange === 6 ? 0 : -1"
                          :disabled="hostHistoryRangeBusy"
                          @click="setHostHistoryRange(6)"
                          x-text="t('host_drawer.charts.range_6h')"></button>
                  <button type="button" role="radio" :class="hostHistoryRange === 24 ? 'active' : ''"
                          :aria-checked="hostHistoryRange === 24"
                          :aria-label="t('host_drawer.charts.range_24h_aria')"
                          :tabindex="hostHistoryRange === 24 ? 0 : -1"
                          :disabled="hostHistoryRangeBusy"
                          @click="setHostHistoryRange(24)"
                          x-text="t('host_drawer.charts.range_24h')"></button>
                  <button type="button" role="radio" :class="hostHistoryRange === 168 ? 'active' : ''"
                          :aria-checked="hostHistoryRange === 168"
                          :aria-label="t('host_drawer.charts.range_7d_aria')"
                          :tabindex="hostHistoryRange === 168 ? 0 : -1"
                          :disabled="hostHistoryRangeBusy"
                          @click="setHostHistoryRange(168)"
                          x-text="t('host_drawer.charts.range_7d')"></button>
                </div>
                <!-- Subtle data-freshness hint — only shows after
                     the first successful fetch. Ticks every 30s via the
                     shared `hostHistoryNow` timer in init() so the
                     "Xm ago" label stays current without re-fetching.
                     Hidden while the picker is reloading so the
                     spinner below is the only indicator. -->
                <span class="text-[10.5px] italic text-[var(--text-faint)]"
                      x-show="hostHistoryFreshness(h) && !hostHistoryRangeBusy"
                      :title="hostHistoryFreshnessAbsolute(h)"
                      x-text="hostHistoryFreshness(h)"></span>
                <!-- Refreshing spinner shown while the picker's
                     underlying loaders are in flight.
                     Pre-fix the buttons just disabled silently with no
                     visual cue that data was being fetched, so the
                     operator wasn't sure if the click had registered.
                     Lives here next to the range picker so the cue is
                     adjacent to what the operator just clicked. -->
                <span x-show="hostHistoryRangeBusy"
                      class="inline-flex items-center gap-1 text-[10.5px] italic text-[var(--text-faint)]">
                  <span class="spin"></span>
                  <span x-text="t('actions.refreshing')"></span>
                </span>
              </div>
              <!-- "Link this host to Beszel/NE" hint — shown ONLY when
                   the host has zero time-series sources at all (no
                   beszel/ne, no ping). Ping-only hosts already have
                   the Ping latency chart as their time-series source
                   so this hint is misleading there; the gate now
                   excludes `h.ping_enabled`. -->
              <div x-show="!h.beszel_id && !h.ne_url && !h.pulse_name && !h.webmin_name && !h.ping_enabled && !hostHasSnmpCharts(h) && !h.snmp_name && !h.snmp_enabled && h.status === 'up' && (h.providers || []).length > 0"
                   class="mt-4 text-[11.5px] text-[var(--text-faint)] italic">
                <span x-text="t('host_drawer.charts.no_source_hint_prefix')"></span>
                <button type="button" @click="openAdminTab('hosts')"
                        class="text-[var(--primary)] hover:underline bg-transparent border-0 p-0 cursor-pointer"
                        x-text="t('host_drawer.charts.admin_hosts_link')"></button>
                <span x-text="t('host_drawer.charts.no_source_hint_suffix')"></span>
              </div>

              <!-- Ping latency — promoted to its own full-width row
                   ABOVE the CPU/Mem/Disk grid. RTT shape doesn't
                   match the percentage cards (different y-axis, narrow
                   value range, ms unit), so giving it dedicated space
                   reads cleaner than wedging it into the 2-col grid
                   with Net/Disk-IO. Card hidden when the host hasn't
                   opted in via per-host `ping.enabled` — gate is the
                   same `x-show` the inner metric-card carries. -->
              <div class="mt-3 grid grid-cols-1 gap-4"
                   x-show="h.ping_enabled">
                <div class="metric-card metric-card--ping"
                     x-show="h.ping_enabled"
                     :class="hostChartMax(hostPingHistoryKey(h), ['rtt']) === 0 ? 'metric-card--flat' : ''">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('hosts_extra.metrics.ping')"></span>
                      <span class="unit">ms</span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'ping')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'ping')"
                            @click.stop="toggleMetricTooltip(h, 'ping')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === metricTooltipKey(h, 'ping')"
                              x-cloak @click.stop
                              x-transition.opacity.duration.120ms
                              x-text="metricSource(h, 'ping')"></span>
                      </button>
                    </div>
                    <div class="metric-card-stats">
                      <span x-show="h.ping_alive === false"
                            class="chip pill-error text-[10.5px] px-1.5 py-0"
                            x-text="t('hosts_extra.metrics.ping_down')"></span>
                      <span x-show="hostPingWindowLoss(hostPingHistoryKey(h)) > 0"
                            class="chip pill-update text-[10.5px] px-1.5 py-0"
                            :title="t('hosts_extra.metrics.ping_loss_title')"
                            x-text="hostPingWindowLoss(hostPingHistoryKey(h)) + '% loss'"></span>
                      <span x-show="hostMetricStats(hostPingHistoryKey(h), 'rtt', false)">
                        <span class="metric-legend-dot" style="background: var(--success)"></span>
                        <span x-text="t('hosts_extra.metrics.ping_rtt')"></span>
                        <span class="legend-val"
                              x-text="hostMetricStats(hostPingHistoryKey(h), 'rtt', false) ? (hostMetricStats(hostPingHistoryKey(h), 'rtt', false).minRaw.toFixed(1) + '–' + hostMetricStats(hostPingHistoryKey(h), 'rtt', false).maxRaw.toFixed(1) + ' ms') : ''"></span>
                      </span>
                    </div>
                  </div>
                  <template x-if="hostChart(hostPingHistoryKey(h), 'rtt') && hostChartMax(hostPingHistoryKey(h), ['rtt']) > 0">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <template x-for="(l, i) in yAxisAuto(hostChartMax(hostPingHistoryKey(h), ['rtt']), n => Math.round(n) + ' ms')" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                        <path class="metric-grid" :d="hostChart(hostPingHistoryKey(h), 'rtt', { min: 0, max: hostChartMax(hostPingHistoryKey(h), ['rtt']), height: 120 }).gridPath" fill="none"/>
                        <path class="metric-line" style="color: var(--success)"
                                  :d="hostChart(hostPingHistoryKey(h), 'rtt', { min: 0, max: hostChartMax(hostPingHistoryKey(h), ['rtt']), height: 120 }).pathGapped"/>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in xAxisFromSeries(hostPingHistoryKey(h), 5)" :key="i">
                          <span x-text="l"></span>
                        </template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!hostChart(hostPingHistoryKey(h), 'rtt')">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div>
                        <div x-text="t('loading.collecting_data')"></div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>

              <!-- Metric cards — Beszel-style. Three percentage charts
                   (CPU / Memory / Disk) in a 3-col grid, then Net In /
                   Net Out side by side beneath. Axis labels live
                   outside the SVG so the polyline can stretch edge to
                   edge and still read at a glance. Whole grid hides
                   when no provider matched — the "Collecting data…"
                   placeholders are misleading for hosts that never had
                   a provider mapping. -->
              <!-- Chart grid: renders when Beszel matched AND
                   returned history, OR when the host has a node-exporter
                   URL configured (host_metrics_sampler writes
                   per-host gauges + net rates into host_metrics_samples
                   so NE-only hosts also get historical charts). Hosts
                   with neither show the "link to Beszel / set NE URL"
                   hint above instead of an empty "Collecting data…" grid.
                   Ping was promoted out of this layout ; the
                   gate no longer needs to consider `h.ping_enabled`
                   since ping-only hosts are served by the standalone
                   row above. -->
              <!-- SNMP time-series charts. Three cards for hosts
                   probed via SNMP whose data isn't covered by the
                   Beszel / NE charts: per-core CPU (multi-line), load
                   averages (3 lines), memory stacked layers. Each
                   card individually gates so a host that returns ONLY
                   per-core CPU + no load avg still gets the CPU card. -->
              <!-- Freshness banner for the SNMP chart section.
                   When the displayed data came from `host_snmp_samples`
                   (loaded from the table while the live probe is in
                   flight or pending), surface "Updated Xs ago" so the
                   operator can tell the chart isn't real-time. Goes
                   amber after 10 minutes (2× sampler cadence). -->
              <div x-show="hostHasSnmpCharts(h) && snmpHistoryFreshness(h)"
                   class="mt-3 text-[11px] flex items-center gap-2 text-[var(--warning)]">
                <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-clock"/></svg>
                <span x-text="snmpHistoryFreshness(h)
                                ? t('host_drawer.snmp_charts.freshness', { age: snmpHistoryFreshness(h).label })
                                : ''"></span>
                <span x-show="hostSnmpHistory[h.id] && hostSnmpHistory[h.id].loading"
                      class="ms-1 inline-flex items-center gap-1 text-[var(--text-faint)]">
                  <span class="spin"></span>
                  <span x-text="t('host_drawer.snmp_charts.refreshing')"></span>
                </span>
              </div>
              <!-- "Collecting first samples" hint when the
                   sampler hasn't accumulated 2+ samples yet. SNMP just
                   enabled? Live legend values (CPU%, Load avg, Mem
                   bytes) populate from the live probe immediately, but
                   polylines need 2 points minimum to draw a line — so
                   each chart card looks empty for ~5 minutes until the
                   second sampler tick lands. This hint replaces the
                   blank with an explicit message so the operator knows
                   it's NOT broken — just warming up. Hidden once
                   `points.length >= 2`. -->
              <!-- "Collecting first samples" hint shown ONLY when the
                   host has zero history rows AND no probe is currently
                   in flight. Pre-fix the gate was `points.length < 2`
                   which fired even on a host with 1 stale sample (e.g.
                   last sample 2h ago, no recent probe coming) — the
                   "chart will populate after the next sampler tick"
                   copy was misleading because no tick was actually
                   imminent. Now hidden the moment ANY historical
                   sample exists; the freshness banner above ("Last
                   sample N ago") carries the messaging from there. -->
              <div x-show="hostHasSnmpCharts(h)
                           && (!hostSnmpHistory[h.id]
                               || (hostSnmpHistory[h.id].points || []).length === 0)
                           && !(hostSnmpHistory[h.id] && hostSnmpHistory[h.id].loading)"
                   class="mt-2 text-[11px] flex items-center gap-2 text-[var(--text-faint)]">
                <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-info"/></svg>
                <span x-text="snmpWarmingUpText()"></span>
              </div>
              <div class="mt-3 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"
                   x-show="hostHasSnmpCharts(h)"
                   :class="hostHistoryRangeBusy ? 'charts-refreshing' : ''">
                <!-- Per-core CPU + ssCpuIdle overlay. Matches
                     the Beszel/NE chart cards: viewBox 420×120,
                     gridlines as a path, legend dots with last-value
                     readouts, x-axis timestamps. -->
                <div class="metric-card"
                     x-show="(h.host_cpu_per_core || []).length > 0
                             || (hostSnmpHistory[h.id] && hostSnmpHistory[h.id].points
                                 && hostSnmpHistory[h.id].points.some(p => p.cpu_used_pct !== null))">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('host_drawer.snmp_charts.cpu_title')"></span><span class="unit">%</span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'snmp_cpu')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'snmp_cpu')"
                            @click.stop="toggleMetricTooltip(h, 'snmp_cpu')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === metricTooltipKey(h, 'snmp_cpu')"
                              x-cloak @click.stop
                              x-transition.opacity.duration.120ms
                              x-text="metricSource(h, 'snmp_cpu')"></span>
                      </button>
                    </div>
                    <div class="metric-card-stats">
                      <span x-show="snmpStats(h.id, 'cpu_used_pct')">
                        <span class="metric-legend-dot" style="background: var(--success)"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_used')"></span>
                        <span class="legend-val" x-text="snmpStats(h.id, 'cpu_used_pct') ? Math.round(snmpStats(h.id, 'cpu_used_pct').last) + '%' : ''"></span>
                      </span>
                      <span x-show="(h.host_cpu_per_core || []).length">
                        <span class="metric-legend-dot" style="background: var(--info); opacity: 0.55"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_per_core', { n: (h.host_cpu_per_core || []).length })"></span>
                      </span>
                    </div>
                  </div>
                  <template x-if="snmpHasEnoughHistory(h.id)">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <template x-for="(l, i) in yAxisPercent()" :key="'cpu-y-' + i"><span x-text="l"></span></template>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                        <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                        <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                        <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                        <path fill="none" stroke="var(--info)" stroke-opacity="0.55" stroke-width="1" :d="snmpCpuPerCoreCombinedLine(h.id)"></path>
                        <path fill="none" stroke="var(--success)" stroke-width="1.5" :d="snmpCpuUsedPctLine(h.id)"></path>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'cpu-x-' + i"><span x-text="l"></span></template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!snmpHasEnoughHistory(h.id)">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div><div x-text="t('loading.collecting_data')"></div></div>
                    </div>
                  </template>
                </div>

                <!-- Load averages — three lines (1m / 5m / 15m)
                     with legend dots + current values in the head. -->
                <div class="metric-card"
                     x-show="h.host_load_1m || h.host_load_5m || h.host_load_15m
                             || (hostSnmpHistory[h.id] && (hostSnmpHistory[h.id].points || []).some(p => p.load_1m || p.load_5m || p.load_15m))">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('host_drawer.snmp_charts.load_title')"></span><span class="unit">%</span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'snmp_load')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'snmp_load')"
                            @click.stop="toggleMetricTooltip(h, 'snmp_load')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === metricTooltipKey(h, 'snmp_load')"
                              x-cloak @click.stop
                              x-transition.opacity.duration.120ms
                              x-text="metricSource(h, 'snmp_load')"></span>
                      </button>
                    </div>
                    <div class="metric-card-stats">
                      <span>
                        <span class="metric-legend-dot" style="background: var(--success)"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_load_1m')"></span>
                        <span class="legend-val" x-text="Math.round(snmpLoadPctLive(h.id, h.host_load_1m || (snmpStats(h.id, 'load_1m') || {}).max || 0)) + '%'"></span>
                      </span>
                      <span>
                        <span class="metric-legend-dot" style="background: var(--warning)"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_load_5m')"></span>
                        <span class="legend-val" x-text="Math.round(snmpLoadPctLive(h.id, h.host_load_5m || (snmpStats(h.id, 'load_5m') || {}).max || 0)) + '%'"></span>
                      </span>
                      <span>
                        <span class="metric-legend-dot" style="background: var(--info)"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_load_15m')"></span>
                        <span class="legend-val" x-text="Math.round(snmpLoadPctLive(h.id, h.host_load_15m || (snmpStats(h.id, 'load_15m') || {}).max || 0)) + '%'"></span>
                      </span>
                    </div>
                  </div>
                  <template x-if="snmpHasEnoughHistory(h.id)">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <template x-for="(l, i) in yAxisPercent()" :key="'snmp-load-y-' + i"><span x-text="l"></span></template>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                        <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                        <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                        <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                        <path fill="none" stroke="var(--success)" stroke-width="1.5" :d="snmpLoadLine(h.id, 'load_1m')"></path>
                        <path fill="none" stroke="var(--warning)" stroke-width="1" :d="snmpLoadLine(h.id, 'load_5m')"></path>
                        <path fill="none" stroke="var(--info)" stroke-width="1" :d="snmpLoadLine(h.id, 'load_15m')"></path>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'load-x-' + i"><span x-text="l"></span></template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!snmpHasEnoughHistory(h.id)">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div><div x-text="t('loading.collecting_data')"></div></div>
                    </div>
                  </template>
                </div>

                <!-- Memory layers: used / cached / buffers / free
                     with legend dots + last-known byte values. -->
                <div class="metric-card"
                     x-show="(h.host_mem_buffers || h.host_mem_cached
                             || (hostSnmpHistory[h.id] && (hostSnmpHistory[h.id].points || []).some(p => p.mem_buffers || p.mem_cached)))">
                  <div class="metric-card-head">
                    <!-- generic "B" unit suffix on the title was
                         redundant once the legend started rendering the
                         actual unit per value (GB / MB). Dropped. The
                         legend + Y-axis use `fmtBytesAt(value, max)`
                         to lock all four layers + axis labels to the
                         SAME unit family (operator screenshot showed
                         "1012 MB" next to "1.9 GB" — visually
                         misaligned). -->
                    <div class="metric-card-title">
                      <span x-text="t('host_drawer.snmp_charts.mem_title')"></span><span class="unit" x-text="unitForBytes(snmpMemMax(h))"></span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'snmp_memory')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'snmp_memory')"
                            @click.stop="toggleMetricTooltip(h, 'snmp_memory')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === metricTooltipKey(h, 'snmp_memory')"
                              x-cloak @click.stop
                              x-transition.opacity.duration.120ms
                              x-text="metricSource(h, 'snmp_memory')"></span>
                      </button>
                    </div>
                    <div class="metric-card-stats">
                      <span x-show="snmpStats(h.id, 'mem_used')">
                        <span class="metric-legend-dot" style="background: var(--danger)"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_mem_used')"></span>
                        <span class="legend-val" x-text="snmpStats(h.id, 'mem_used') ? fmtBytesAt(snmpStats(h.id, 'mem_used').last, snmpMemMax(h)) : ''"></span>
                      </span>
                      <span x-show="snmpStats(h.id, 'mem_cached')">
                        <span class="metric-legend-dot" style="background: var(--warning)"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_mem_cached')"></span>
                        <span class="legend-val" x-text="snmpStats(h.id, 'mem_cached') ? fmtBytesAt(snmpStats(h.id, 'mem_cached').last, snmpMemMax(h)) : ''"></span>
                      </span>
                      <span x-show="snmpStats(h.id, 'mem_buffers')">
                        <span class="metric-legend-dot" style="background: var(--info)"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_mem_buffers')"></span>
                        <span class="legend-val" x-text="snmpStats(h.id, 'mem_buffers') ? fmtBytesAt(snmpStats(h.id, 'mem_buffers').last, snmpMemMax(h)) : ''"></span>
                      </span>
                      <span x-show="snmpStats(h.id, 'mem_free')">
                        <span class="metric-legend-dot" style="background: var(--success)"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_mem_free')"></span>
                        <span class="legend-val" x-text="snmpStats(h.id, 'mem_free') ? fmtBytesAt(snmpStats(h.id, 'mem_free').last, snmpMemMax(h)) : ''"></span>
                      </span>
                    </div>
                  </div>
                  <template x-if="snmpHasEnoughHistory(h.id)">
                    <div class="metric-card-body">
                      <!-- Y-axis labels use `fmtBytesAt(v, max)` so all
                           three labels share the same unit family. -->
                      <div class="metric-y-axis">
                        <span x-text="fmtBytesAt(snmpMemMax(h), snmpMemMax(h))"></span>
                        <span x-text="fmtBytesAt(snmpMemMax(h) / 2, snmpMemMax(h))"></span>
                        <span>0</span>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                        <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                        <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                        <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                        <path fill="none" stroke="var(--danger)"  stroke-width="1.5" :d="snmpMemArea(h.id, 'used')"></path>
                        <path fill="none" stroke="var(--warning)" stroke-width="1"   :d="snmpMemArea(h.id, 'cached')"></path>
                        <path fill="none" stroke="var(--info)"    stroke-width="1"   :d="snmpMemArea(h.id, 'buffers')"></path>
                        <path fill="none" stroke="var(--success)" stroke-width="1"   :d="snmpMemArea(h.id, 'free')"></path>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'mem-x-' + i"><span x-text="l"></span></template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!snmpHasEnoughHistory(h.id)">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div><div x-text="t('loading.collecting_data')"></div></div>
                    </div>
                  </template>
                </div>

                <!-- switch / router total throughput. Two
                     polylines (in / out) computed from the cumulative
                     IF-MIB ifHCInOctets / ifHCOutOctets columns
                     persisted on `host_snmp_samples`. Skip-don't-
                     synthesize on out-of-bounds deltas (counter wrap,
                     reboot, gap > 1h, > 10 GB delta). Hidden until at
                     least 2 ticks recorded the IF-MIB counters. -->
                <div class="metric-card"
                     x-show="snmpHasThroughput(h.id)">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('host_drawer.snmp_charts.throughput_title')"></span><span class="unit" x-text="unitForBytes(snmpThroughputMaxBps(h.id)) + '/s'"></span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'snmp_throughput')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'snmp_throughput')"
                            @click.stop="toggleMetricTooltip(h, 'snmp_throughput')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === metricTooltipKey(h, 'snmp_throughput')"
                              x-cloak @click.stop
                              x-transition.opacity.duration.120ms
                              x-text="metricSource(h, 'snmp_throughput')"></span>
                      </button>
                    </div>
                    <div class="metric-card-stats">
                      <span>
                        <span class="metric-legend-dot" style="background: var(--success)"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_throughput_in')"></span>
                        <span class="legend-val" x-text="fmtBytesAt(snmpThroughputLast(h.id, 'rx'), snmpThroughputMaxBps(h.id)) + '/s'"></span>
                      </span>
                      <span>
                        <span class="metric-legend-dot" style="background: var(--info)"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_throughput_out')"></span>
                        <span class="legend-val" x-text="fmtBytesAt(snmpThroughputLast(h.id, 'tx'), snmpThroughputMaxBps(h.id)) + '/s'"></span>
                      </span>
                    </div>
                  </div>
                  <!-- static-rate headline above the chart so
                       operators see current rx + tx without parsing
                       the chart line. Same prominence as the printer
                       lifetime page count. Hidden when no live data. -->
                  <div x-show="snmpThroughputLast(h.id, 'rx') > 0 || snmpThroughputLast(h.id, 'tx') > 0"
                       class="px-4 pb-2 flex items-baseline gap-3 text-[12px]">
                    <span class="flex items-baseline gap-1.5">
                      <span class="text-[var(--success)]">↓</span>
                      <span class="text-[16px] font-semibold mono"
                            x-text="fmtBytesAt(snmpThroughputLast(h.id, 'rx'), snmpThroughputMaxBps(h.id)) + '/s'"></span>
                    </span>
                    <span class="flex items-baseline gap-1.5">
                      <span class="text-[var(--info)]">↑</span>
                      <span class="text-[16px] font-semibold mono"
                            x-text="fmtBytesAt(snmpThroughputLast(h.id, 'tx'), snmpThroughputMaxBps(h.id)) + '/s'"></span>
                    </span>
                  </div>
                  <template x-if="snmpHasEnoughHistory(h.id)">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <span x-text="fmtBytesAt(snmpThroughputMaxBps(h.id), snmpThroughputMaxBps(h.id)) + '/s'"></span>
                        <span x-text="fmtBytesAt(snmpThroughputMaxBps(h.id) / 2, snmpThroughputMaxBps(h.id)) + '/s'"></span>
                        <span>0</span>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                        <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                        <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                        <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                        <path fill="none" stroke="var(--success)" stroke-width="1.5" :d="snmpThroughputLine(h.id, 'rx')"></path>
                        <path fill="none" stroke="var(--info)"    stroke-width="1.5" :d="snmpThroughputLine(h.id, 'tx')"></path>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'thr-x-' + i"><span x-text="l"></span></template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!snmpHasEnoughHistory(h.id)">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div><div x-text="t('loading.collecting_data')"></div></div>
                    </div>
                  </template>
                </div>

                <!-- per-port throughput. Multi-line chart with
                     up to top-5 interfaces by latest combined rate
                     (in + out). Each iface gets one line; in / out
                     not stacked — operators want to see absolute per-
                     port throughput. Hidden when fewer than 2 ticks
                     of iface history exist. -->
                <div class="metric-card md:col-span-2 lg:col-span-3"
                     x-show="snmpHasIfaceHistory(h.id) || (h.network_ifaces && h.network_ifaces.length > 0)">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('host_drawer.snmp_charts.per_port_title')"></span><span class="unit" x-text="unitForBytes(snmpIfaceMaxBps(h.id)) + '/s'"></span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'snmp_throughput')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'snmp_throughput')"
                            @click.stop="toggleMetricTooltip(h, 'snmp_per_port')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === metricTooltipKey(h, 'snmp_per_port')"
                              x-cloak @click.stop
                              x-transition.opacity.duration.120ms
                              x-text="metricSource(h, 'snmp_throughput')"></span>
                      </button>
                    </div>
                    <div class="metric-card-stats">
                      <template x-for="(iface, idx) in snmpTopIfacesByThroughput(h.id, 5)" :key="'pp-leg-' + iface.name">
                        <span class="text-[11px]">
                          <span class="metric-legend-dot"
                                :style="'background:' + ['var(--success)','var(--info)','var(--warning)','var(--danger)','var(--primary)'][idx % 5]"></span>
                          <span class="font-semibold" x-text="iface.name"></span>
                          <span class="text-[var(--text-faint)]"
                                x-text="' ' + fmtBytesAt(iface.lastIn, snmpIfaceMaxBps(h.id)) + '/s ↓ ' + fmtBytesAt(iface.lastOut, snmpIfaceMaxBps(h.id)) + '/s ↑'"></span>
                        </span>
                      </template>
                    </div>
                  </div>
                  <template x-if="snmpHasIfaceHistory(h.id)">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <span x-text="fmtBytesAt(snmpIfaceMaxBps(h.id), snmpIfaceMaxBps(h.id)) + '/s'"></span>
                        <span x-text="fmtBytesAt(snmpIfaceMaxBps(h.id) / 2, snmpIfaceMaxBps(h.id)) + '/s'"></span>
                        <span>0</span>
                      </div>
                      <!-- Alpine `<template x-for>` doesn't work inside
                           SVG (template elements are HTML-only) — same
                           constraint the Temperature chart hits. Render
                           5 fixed in-polylines + 5 fixed out-polylines
                           by index instead so the chart actually draws. -->
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                        <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                        <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                        <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                        <path fill="none" stroke-width="1.5" stroke="var(--success)" :d="(snmpTopIfacesByThroughput(h.id, 5)[0] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[0].name, 'in', snmpIfaceMaxBps(h.id)) : '')"></path>
                        <path fill="none" stroke-width="1.5" stroke="var(--info)"    :d="(snmpTopIfacesByThroughput(h.id, 5)[1] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[1].name, 'in', snmpIfaceMaxBps(h.id)) : '')"></path>
                        <path fill="none" stroke-width="1.5" stroke="var(--warning)" :d="(snmpTopIfacesByThroughput(h.id, 5)[2] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[2].name, 'in', snmpIfaceMaxBps(h.id)) : '')"></path>
                        <path fill="none" stroke-width="1.5" stroke="var(--danger)"  :d="(snmpTopIfacesByThroughput(h.id, 5)[3] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[3].name, 'in', snmpIfaceMaxBps(h.id)) : '')"></path>
                        <path fill="none" stroke-width="1.5" stroke="var(--primary)" :d="(snmpTopIfacesByThroughput(h.id, 5)[4] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[4].name, 'in', snmpIfaceMaxBps(h.id)) : '')"></path>
                        <path fill="none" stroke-width="1" stroke-dasharray="3,2" stroke="var(--success)" :d="(snmpTopIfacesByThroughput(h.id, 5)[0] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[0].name, 'out', snmpIfaceMaxBps(h.id)) : '')"></path>
                        <path fill="none" stroke-width="1" stroke-dasharray="3,2" stroke="var(--info)"    :d="(snmpTopIfacesByThroughput(h.id, 5)[1] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[1].name, 'out', snmpIfaceMaxBps(h.id)) : '')"></path>
                        <path fill="none" stroke-width="1" stroke-dasharray="3,2" stroke="var(--warning)" :d="(snmpTopIfacesByThroughput(h.id, 5)[2] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[2].name, 'out', snmpIfaceMaxBps(h.id)) : '')"></path>
                        <path fill="none" stroke-width="1" stroke-dasharray="3,2" stroke="var(--danger)"  :d="(snmpTopIfacesByThroughput(h.id, 5)[3] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[3].name, 'out', snmpIfaceMaxBps(h.id)) : '')"></path>
                        <path fill="none" stroke-width="1" stroke-dasharray="3,2" stroke="var(--primary)" :d="(snmpTopIfacesByThroughput(h.id, 5)[4] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[4].name, 'out', snmpIfaceMaxBps(h.id)) : '')"></path>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'pp-x-' + i"><span x-text="l"></span></template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!snmpHasIfaceHistory(h.id)">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div><div x-text="t('loading.collecting_data')"></div></div>
                    </div>
                  </template>
                </div>

                <!-- per-port utilization LINE chart (replaces
                     the chip-strip heatmap operator-flagged as
                     unreadable). Top 5 interfaces by current rate
                     (same ranking as the throughput chart) plotted
                     as utilization % of link capacity. Y-axis 0-100%.
                     Spinner shows during warm-up. Same 10-fixed-
                     polyline-by-index pattern as per-port throughput
                     since `<template x-for>` doesn't work inside
                     `<svg>`. -->
                <div class="metric-card md:col-span-2 lg:col-span-3"
                     x-show="snmpHasIfaceHistory(h.id) || (h.network_ifaces && h.network_ifaces.length > 0)">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('host_drawer.snmp_charts.heatmap_title')"></span><span class="unit">%</span>
                      <button type="button" class="metric-source-help" :title="metricSource(h, 'snmp_throughput')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'snmp_throughput')"
                            @click.stop="toggleMetricTooltip(h, 'snmp_heatmap')"
                            @keydown.escape.window="metricTooltipOpen = null">
                        <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/></svg>
                        <span class="metric-source-tooltip"
                              x-show="metricTooltipOpen === metricTooltipKey(h, 'snmp_heatmap')"
                              x-cloak @click.stop
                              x-transition.opacity.duration.120ms
                              x-text="metricSource(h, 'snmp_throughput')"></span>
                      </button>
                    </div>
                    <div class="metric-card-stats">
                      <template x-for="(iface, idx) in snmpTopIfacesByThroughput(h.id, 5)" :key="'util-leg-' + iface.name">
                        <span class="text-[11px]"
                              :title="snmpIfaceLinkSpeedAssumed(h.id, iface.name, h) ? t('host_drawer.snmp_charts.heatmap_assumed_speed') : ''">
                          <span class="metric-legend-dot"
                                :style="'background:' + ['var(--success)','var(--info)','var(--warning)','var(--danger)','var(--primary)'][idx % 5]"></span>
                          <span class="font-semibold" x-text="iface.name"></span>
                          <!-- Percentage prefixed with `~` when the
                               link speed was assumed (no ifHighSpeed
                               from agent) so the approximation lives
                               in the value itself, not just the
                               trailing asterisk + colour cue. CLAUDE.md
                               "colour is never the sole carrier of
                               meaning" — the `~` doubles up the signal
                               for operators who don't notice the warn-
                               coloured `*`. The asterisk + hover
                               tooltip still surface the full "assumed
                               100 Mbps" caveat for operators who want
                               the detail. -->
                          <span class="text-[var(--text-faint)]"
                                x-text="snmpIfaceUtilizationPct(h.id, iface.name, h) != null
                                          ? ' ' + (snmpIfaceLinkSpeedAssumed(h.id, iface.name, h) ? '~' : '') + Math.round(snmpIfaceUtilizationPct(h.id, iface.name, h)) + '%'
                                          : ''"></span>
                          <span x-show="snmpIfaceLinkSpeedAssumed(h.id, iface.name, h)"
                                class="text-[var(--warning)]">*</span>
                        </span>
                      </template>
                    </div>
                  </div>
                  <template x-if="snmpHasIfaceUtilization(h.id, h)">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <template x-for="(l, i) in yAxisPercent()" :key="'util-y-' + i"><span x-text="l"></span></template>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                        <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                        <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                        <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                        <path fill="none" stroke-width="1.5" stroke="var(--success)" :d="(snmpTopIfacesByThroughput(h.id, 5)[0] ? snmpIfaceUtilizationLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[0].name, h) : '')"></path>
                        <path fill="none" stroke-width="1.5" stroke="var(--info)"    :d="(snmpTopIfacesByThroughput(h.id, 5)[1] ? snmpIfaceUtilizationLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[1].name, h) : '')"></path>
                        <path fill="none" stroke-width="1.5" stroke="var(--warning)" :d="(snmpTopIfacesByThroughput(h.id, 5)[2] ? snmpIfaceUtilizationLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[2].name, h) : '')"></path>
                        <path fill="none" stroke-width="1.5" stroke="var(--danger)"  :d="(snmpTopIfacesByThroughput(h.id, 5)[3] ? snmpIfaceUtilizationLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[3].name, h) : '')"></path>
                        <path fill="none" stroke-width="1.5" stroke="var(--primary)" :d="(snmpTopIfacesByThroughput(h.id, 5)[4] ? snmpIfaceUtilizationLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[4].name, h) : '')"></path>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'util-x-' + i"><span x-text="l"></span></template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!snmpHasIfaceUtilization(h.id, h)">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div><div x-text="t('loading.collecting_data')"></div></div>
                    </div>
                  </template>
                </div>

                <!-- Pages printed chart REMOVED per operator
                     request. The Printer card already surfaces the
                     lifetime page count as an 18 px headline ;
                     the pages-per-day rate sparkline added marginal
                     value for the cost of a permanently-spinner card
                     on idle printers. -->

                <!-- APC UPS Output Load % chart. Reads
                     `load_percent` from `host_snmp_samples` rows the
                     sampler writes when host_load_percent is present.
                     Y-axis pinned to 100% so a busy UPS doesn't auto-
                     rescale the chart on every tick. Visible only
                     when ≥ 2 ticks have a non-null load_percent — the
                     gate matches `snmpHasUpsLoad(h.id)` so non-UPS
                     hosts and brand-new UPS rows skip the card cleanly. -->
                <div class="metric-card"
                     x-show="snmpHasUpsLoad(h.id)">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('host_drawer.snmp_charts.ups_load_title')"></span><span class="unit">%</span>
                    </div>
                    <div class="metric-card-stats"
                         x-show="typeof h.host_load_percent === 'number'">
                      <span>
                        <span class="metric-legend-dot" style="background: var(--warning)"></span>
                        <span x-text="t('host_drawer.snmp_charts.ups_load_legend')"></span>
                        <span class="legend-val mono" x-text="(+h.host_load_percent).toFixed(0) + '%'"></span>
                      </span>
                    </div>
                  </div>
                  <template x-if="snmpHasUpsLoadHistory(h.id)">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <template x-for="(l, i) in yAxisPercent()" :key="'ups-load-y-' + i"><span x-text="l"></span></template>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                        <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                        <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                        <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                        <path fill="none" stroke="var(--warning)" stroke-width="1.5" :d="snmpUpsLoadLine(h.id)"></path>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'ups-load-x-' + i"><span x-text="l"></span></template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!snmpHasUpsLoadHistory(h.id)">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div><div x-text="t('loading.collecting_data')"></div></div>

                <!-- APC UPS Battery % chart. Discharge curve

                <div class="metric-card"
                     x-show="snmpHasUpsBattery(h.id)">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('host_drawer.snmp_charts.ups_battery_title')"></span><span class="unit">%</span>
                    </div>
                    <div class="metric-card-stats"
                         x-show="typeof h.host_battery_percent === 'number'">
                      <span>
                        <span class="metric-legend-dot" style="background: var(--success)"></span>
                        <span x-text="t('host_drawer.snmp_charts.ups_battery_legend')"></span>
                        <span class="legend-val mono" x-text="(+h.host_battery_percent).toFixed(0) + '%'"></span>
                      </span>
                    </div>
                  </div>
                  <template x-if="snmpHasUpsBatteryHistory(h.id)">
                    <div class="metric-card-body">
                      <div class="metric-y-axis">
                        <template x-for="(l, i) in yAxisPercent()" :key="'ups-batt-y-' + i"><span x-text="l"></span></template>
                      </div>
                      <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                        <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                        <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                        <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                        <path fill="none" stroke="var(--success)" stroke-width="1.5" :d="snmpUpsBatteryLine(h.id)"></path>
                      </svg>
                      <div class="metric-x-axis">
                        <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'ups-batt-x-' + i"><span x-text="l"></span></template>
                      </div>
                    </div>
                  </template>
                  <template x-if="!snmpHasUpsBatteryHistory(h.id)">
                    <div class="collecting-block">
                      <svg aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                      <div><div x-text="t('loading.collecting_data')"></div></div>
                    </div>
                  </template>
                </div>

                <!-- APC UPS Battery Temperature chart. Auto-
                     ranges to max(50, observed_max) so a flat-ish 36°C
                     line still has vertical movement instead of
                     compressing into the bottom margin of a 0..100
                     scale. -->
                <div class="metric-card"
                     x-show="snmpHasUpsBatteryTemp(h.id)">
                  <div class="metric-card-head">
                    <div class="metric-card-title">
                      <span x-text="t('host_drawer.snmp_charts.ups_battery_temp_title')"></span><span class="unit">°C</span>
                    </div>
