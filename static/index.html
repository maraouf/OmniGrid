                      <template x-if="assetForHost(h).sku">
                        <dd class="mono text-end break-all" x-text="assetForHost(h).sku"></dd>
                      </template>
                      <template x-if="assetForHost(h).ram">
                        <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.ram')"></dt>
                      </template>
                      <template x-if="assetForHost(h).ram">
                        <dd class="mono text-end" x-text="assetForHost(h).ram"></dd>
                      </template>
                      <template x-if="assetForHost(h).firmware">
                        <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.firmware')"></dt>
                      </template>
                      <template x-if="assetForHost(h).firmware">
                        <dd class="mono text-end break-all" x-text="assetForHost(h).firmware"></dd>
                      </template>
                      <template x-if="assetForHost(h).hardware_version">
                        <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.hardware_version')"></dt>
                      </template>
                      <template x-if="assetForHost(h).hardware_version">
                        <dd class="mono text-end" x-text="assetForHost(h).hardware_version"></dd>
                      </template>
                    </dl>

                    <template x-if="(assetForHost(h).interfaces || []).length">
                      <div class="mt-4 pt-3 border-t border-[var(--border)]">
                        <div class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)] mb-2"
                             x-text="t('host_drawer.asset.interfaces_heading')"></div>
                        <div class="space-y-1.5">
                          <template x-for="iface in assetForHost(h).interfaces" :key="iface.number + ':' + iface.name + ':' + iface.ip">
                            <div class="grid grid-cols-[1fr_auto] gap-x-3 text-[12px]"
                                 :class="iface.enabled ? '' : 'opacity-50'">
                              <div class="flex items-center gap-2 min-w-0">
                                <span x-show="iface.number != null"
                                      class="pill pill-info text-[10px] mono"
                                      x-text="'#' + iface.number"></span>
                                <span class="font-semibold mono" x-text="iface.name || '—'"></span>
                                <span x-show="iface.comment"
                                      class="text-[10.5px] text-[var(--text-faint)] truncate"
                                      :title="iface.comment"
                                      x-text="'· ' + iface.comment"></span>
                              </div>
                              <div class="text-end mono">
                                <span x-show="iface.ip" x-text="iface.ip"></span>
                                <span x-show="iface.mac"
                                      class="ms-2 text-[10.5px] text-[var(--text-faint)]"
                                      x-text="iface.mac"></span>
                              </div>
                            </div>
                          </template>
                        </div>
                      </div>
                    </template>

                    <template x-if="(assetForHost(h).ports || []).length">
                      <div class="mt-4 pt-3 border-t border-[var(--border)]">
                        <div class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)] mb-2"
                             x-text="t('host_drawer.asset.ports_heading')"></div>
                        <div class="flex flex-wrap gap-1.5">
                          <!-- Every port renders as the same chip;
                               clickable ones wrap in <a>, the rest
                               wrap in <span>. Uniform styling so a
                               port without a service URL is just as
                               visible as one with — operator wanted
                               ALL ports surfaced, not only URL ones. -->
                          <!-- Each iteration of <template x-for>
                               needs a SINGLE root element. Two
                               sibling <template x-if> blocks would
                               cause Alpine to render only the first
                               (URL-only ports), silently dropping
                               every non-URL port. Wrapping them in
                               one <span> per iteration fixes it. -->
                          <template x-for="port in assetForHost(h).ports" :key="port.id || (port.name + ':' + port.number)">
                            <span>
                              <a x-show="assetPortServiceUrl(port, h)"
                                 :href="assetPortServiceUrl(port, h)" target="_blank" rel="noopener"
                                 class="pill pill-info text-[10.5px] mono hover:underline"
                                 :title="port.protocol || ''"
                                 x-text="port.name + (port.number != null ? ' ' + port.number : '')"></a>
                              <span x-show="!assetPortServiceUrl(port, h)"
                                    class="text-[11px] mono text-[var(--text-faint)] px-1.5 py-1"
                                    :title="port.protocol || ''"
                                    x-text="port.name + (port.number != null ? ' ' + port.number : '')"></span>
                            </span>
                          </template>
                        </div>
                      </div>
                    </template>

                  </section>
                </template>

                <!-- SYSTEM — only the fields Beszel's agent actually
                     reports for this host are rendered. Container-mode
                     agents tend to skip platform / OS / kernel / arch;
                     hiding those empty rows makes the card honest instead
                     of full of em-dashes. -->
                <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                  <h4 class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)] mb-3" x-text="t('host_drawer.system.heading')"></h4>
                  <dl class="drawer-dl text-[12px]">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.hostname')"></dt>
                    <dd class="mono text-end" x-text="h.host"></dd>
                    <!-- Hide Platform when it duplicates the OS's
                         first word (common when Pulse derived the
                         platform hint from its ``osName``). "debian"
                         + "debian 13.4" reads as a single row now. -->
                    <template x-if="h.platform && !(h.os && h.os.toLowerCase().startsWith(h.platform.toLowerCase()))">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.platform')"></dt>
                    </template>
                    <template x-if="h.platform && !(h.os && h.os.toLowerCase().startsWith(h.platform.toLowerCase()))">
                      <dd class="text-end" :class="isStaleField(h, 'host_platform') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_platform') ? staleAge(h) : ''"
                          x-text="h.platform"></dd>
                    </template>
                    <template x-if="h.os">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.os')"></dt>
                    </template>
                    <template x-if="h.os">
                      <dd class="text-end" :class="isStaleField(h, 'host_os') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_os') ? staleAge(h) : ''"
                          x-text="h.os"></dd>
                    </template>
                    <template x-if="h.kernel">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.kernel')"></dt>
                    </template>
                    <template x-if="h.kernel">
                      <dd class="mono text-end break-all" :class="isStaleField(h, 'host_kernel') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_kernel') ? staleAge(h) : ''"
                          x-text="h.kernel"></dd>
                    </template>
                    <template x-if="h.arch">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.arch')"></dt>
                    </template>
                    <template x-if="h.arch">
                      <dd class="mono text-end" :class="isStaleField(h, 'host_arch') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_arch') ? staleAge(h) : ''"
                          x-text="h.arch"></dd>
                    </template>
                    <!-- Uptime row only renders when a provider actually
                         reported uptime_s. Inventory-only / no-agent hosts
                         (status='unconfigured') used to show "Uptime —"
                         which read as "we know but don't know" rather than
                         "no source". Hide entirely instead. -->
                    <template x-if="h.uptime_s != null && h.uptime_s > 0">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.uptime')"></dt>
                    </template>
                    <template x-if="h.uptime_s != null && h.uptime_s > 0">
                      <dd class="mono text-end flex items-center justify-end gap-2"
                          :class="isStaleField(h, 'host_uptime_s') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_uptime_s') ? staleAge(h) : ''">
                        <span x-text="fmtUptimeShort(h.uptime_s)"></span>
                        <!-- fresh-reboot badge. Only surfaces
                             when SNMP history caught an uptime backwards-
                             jump in the last 24 h (snmpRebootInfo handles
                             the windowing). Compact warning chip so the
                             operator catches a "this just bounced" signal
                             without expanding any debug panel. -->
                        <template x-if="snmpRebootInfo(h)">
                          <span class="chip pill-warning text-[10px]"
                                :title="t('host_drawer.system.reboot_title', { ago: fmtUptimeShort(snmpRebootInfo(h).age_s) })"
                                x-text="t('host_drawer.system.reboot_badge', { ago: fmtUptimeShort(snmpRebootInfo(h).age_s) })"></span>
                        </template>
                      </dd>
                    </template>
                    <template x-if="h.docker_node">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.docker_node')"></dt>
                    </template>
                    <template x-if="h.docker_node">
                      <dd class="mono text-end" x-text="h.docker_node"></dd>
                    </template>
                    <!-- DMI / hardware identity — populated only when
                         node-exporter scraped `node_dmi_info` on a
                         physical / VM host (containers usually skip
                         the DMI collector). Vendor + product identify
                         the actual box (e.g. "QOTOM Q555G6"); BIOS
                         version is useful for firmware audit; serial
                         shown last + muted because most operators
                         treat it as private. -->
                    <template x-if="h.dmi_vendor">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.vendor')"></dt>
                    </template>
                    <template x-if="h.dmi_vendor">
                      <dd class="text-end" x-text="h.dmi_vendor"></dd>
                    </template>
                    <template x-if="h.dmi_product">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.product')"></dt>
                    </template>
                    <template x-if="h.dmi_product">
                      <dd class="text-end" x-text="h.dmi_product"></dd>
                    </template>
                    <template x-if="h.dmi_bios_version">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.bios_version')"></dt>
                    </template>
                    <template x-if="h.dmi_bios_version">
                      <dd class="mono text-end break-all" x-text="h.dmi_bios_version"></dd>
                    </template>
                    <template x-if="h.dmi_serial">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.serial')"></dt>
                    </template>
                    <template x-if="h.dmi_serial">
                      <dd class="mono text-end break-all text-[var(--text-faint)]" x-text="h.dmi_serial"></dd>
                    </template>
                    <!-- Proxmox metadata from Pulse — shows VM/LXC
                         identity and the PVE host it runs on so the
                         operator can tell apart two guests with
                         similar names (e.g. docker, docker-dev). -->
                    <template x-if="h.pulse_kind">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.proxmox')"></dt>
                    </template>
                    <template x-if="h.pulse_kind">
                      <dd class="mono text-end">
                        <span x-text="h.pulse_kind === 'lxc' ? t('host_drawer.proxmox_kind.lxc')
                                     : h.pulse_kind === 'qemu' ? t('host_drawer.proxmox_kind.qemu')
                                     : h.pulse_kind === 'node' ? t('host_drawer.proxmox_kind.node')
                                     : (h.pulse_kind || '').toUpperCase()"></span>
                        <span x-show="h.pulse_vmid" class="text-[var(--text-faint)]"
                              x-text="' #' + h.pulse_vmid"></span>
                        <span x-show="h.pulse_node && h.pulse_kind !== 'node'" class="text-[var(--text-faint)]"
                              x-text="' · on ' + h.pulse_node"></span>
                      </dd>
                    </template>
                    <!-- URL row — always visible. Clickable link when
                         populated, "+ Add" deep-link to Admin → Hosts
                         when empty, matching Beszel's affordance. -->
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.url')"></dt>
                    <dd class="text-end">
                      <a x-show="h.url" :href="h.url" target="_blank" rel="noopener"
                         class="text-[var(--primary)] hover:underline mono" x-text="h.url"></a>
                      <!--: previous wiring only set `adminTab`
                           which has no visible effect when the SPA is
                           on the Hosts view — the click looked dead.
                           Now: close the drawer, switch the SPA to
                           Admin, route to the Hosts editor sub-tab,
                           and scroll the row matching this host id
                           into view + auto-expand it so the operator
                           lands directly on the URL field they wanted
                           to edit. -->
                      <!-- (revised): pre-fix the click chained
                           `$nextTick(() => focusHostsConfigRow(h.id))`
                           after `openAdminTab('hosts')`, but
                           `openAdminTab` is async + AWAITS
                           `loadHostsConfig()` + `loadSettings()` for
                           the hosts branch — `$nextTick` was firing
                           before either resolved, so `hostsConfig` was
                           still empty when `focusHostsConfigRow`
                           queried it (`cfgIdx === -1` → early return →
                           no expand, no scroll). Switching to
                           `.then()` chains the focus call AFTER the
                           openAdminTab Promise resolves; by then the
                           cfg array is populated and the row's _uid is
                           minted in loadHostsConfig. -->
                      <a x-show="!h.url" href="#"
                         @click.prevent="(() => { const _hid = h.id; closeHostDrawer(); view='admin'; openAdminTab('hosts').then(() => focusHostsConfigRow(_hid)); })()"
                         class="text-[var(--primary)] hover:underline"
                         :aria-label="t('host_drawer.system.add_url_aria')"
                         x-text="t('host_drawer.system.add_url')"></a>
                    </dd>
                  </dl>
                </section>

                <!-- ENABLED AGENTS — dedicated card listing
                     the providers WIRED on this curated row, rendered
                     as colored pills (not a comma-joined string in the
                     System card — operator wanted real visual chips).
                     Distinct from the per-row `providers` chips next
                     to the host name: those reflect what RETURNED data
                     THIS tick (live up/down state); these reflect what
                     the operator has CONFIGURED, regardless of current
                     reachability. Useful at a glance for "why is this
                     row grey — did I forget to enable an agent?". Chip
                     colour comes from `providerColor()` — defaults to a
                     distinct hue per provider and overridable via
                     Settings → Providers. -->
                <template x-if="hostEnabledAgents(h).length">
                  <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                    <h4 class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)] mb-3" x-text="t('host_drawer.system.agents')"></h4>
                    <!-- Top-aligned: chips have variable height because some
                         carry a Resume button + "Updated Xm ago" subtitle
                         while others don't. `items-start` keeps the
                         baseline of every chip flush at the top so the
                         row reads as a list rather than a centered
                         constellation of differently-sized pills. -->
                    <div class="flex items-start gap-1.5 flex-wrap">
                      <template x-for="agent in hostEnabledAgents(h)" :key="agent.name">
                        <!-- Wrapper so the per-provider Paused badge + Resume
                             button sit beside the chip + the "Updated
                             Xm ago" last-OK subtitle sits below. -->
                        <div class="inline-flex flex-col items-start gap-0.5">
                          <span class="inline-flex items-center gap-1">
                            <!-- Chip colour mirrors the per-host provider
                                 state used by the outer Hosts row + the
                                 mobile chip strip — failing → pill-error
                                 (red), paused → pill-warning (orange),
                                 healthy → pill-custom + providerChipStyle
                                 (operator-customised brand colour).
                                 Pre-fix the drawer chip ignored the
                                 failing state and showed brand colour
                                 even when the outside chip was red,
                                 visually contradicting the host's actual
                                 health. -->
                            <span class="chip text-[11px] px-2 py-0.5"
                                  :class="agentStateClass(h, agent.name)"
                                  :style="agentStateStyle(h, agent.name)"
                                  :title="agentStateTitle(h, agent.name)"
                                  x-text="agent.label"></span>
                            <template x-if="agentPauseInfo(h, agent.name) && isAdmin()">
                              <!-- Visual separator + button styling
                                   distinct from the chip so the operator
                                   reads "Resume" as a button to click,
                                   not as a status pill. Pre-fix the
                                   button used `class="chip"` which
                                   visually nested inside the paused
                                   chip, making the interactive boundary
                                   ambiguous. -->
                              <button type="button"
                                      class="text-[10.5px] font-medium px-2 py-0.5 rounded border bg-[color-mix(in_srgb,var(--warning)_18%,transparent)] border-[color-mix(in_srgb,var(--warning)_60%,var(--border))] text-[var(--text)] hover:bg-[color-mix(in_srgb,var(--warning)_28%,transparent)] hover:border-[var(--warning)] disabled:opacity-50 disabled:cursor-wait inline-flex items-center gap-1 cursor-pointer"
                                      @click="resumeProvider(h, agent.name)"
                                      :disabled="!canResume(h, agent.name)"
                                      :aria-busy="providerResumeBusy[h.id + ':' + agent.name] ? 'true' : 'false'"
                                      :aria-label="t('hosts_extra.provider_resume_aria', { provider: agent.name })"
                                      :aria-keyshortcuts="'Enter'"
                                      :title="t('hosts_extra.provider_resume_title', { provider: agent.name })">
                                <svg width="9" height="9" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                  <polygon points="5 3 19 12 5 21 5 3"/>
                                </svg>
                                <span x-text="providerResumeBusy[h.id + ':' + agent.name] ? t('hosts_extra.provider_resuming') : t('hosts_extra.provider_resume')"></span>
                              </button>
                            </template>
                          </span>
                          <!-- Last successful probe timestamp subtitle.
                               Reads provider_pause_state[<name>].last_ok_ts
                               (epoch seconds). Hidden when the provider has
                               never had a successful probe recorded yet
                               (last_ok_ts === 0 or null). Helps operators
                               distinguish "this chip is fine but we haven't
                               heard from it in 6 hours" from "fresh data". -->
                          <span x-show="providerLastOkSeconds(h, agent.name) > 0"
                                class="text-[9.5px] text-[var(--text-faint)] mono ps-0.5"
                                :title="t('hosts_extra.provider_last_ok_title', { provider: agent.name })"
                                x-text="t('hosts_extra.provider_last_ok', { age: providerLastOkAge(h, agent.name) })"></span>
                        </div>
                      </template>
                    </div>
                    <!-- "Resume all (N)" rollup. Renders only when ≥ 2
                         providers on this host are currently paused —
                         a single-paused host already has one Resume
                         button on its chip, so the rollup would be
                         redundant. Admin-only. Pairs with the per-chip
                         Resume button: this fans out the same action
                         to every paused chip in one click. -->
                    <template x-if="isAdmin() && pausedProvidersFor(h).length >= 2">
                      <div class="mt-3 pt-3 border-t border-[var(--border)] flex items-center justify-end">
                        <button type="button"
                                class="text-[11px] px-2.5 py-1 rounded border bg-[color-mix(in_srgb,var(--warning)_10%,transparent)] border-[color-mix(in_srgb,var(--warning)_50%,var(--border))] text-[var(--text)] hover:bg-[color-mix(in_srgb,var(--warning)_18%,transparent)] hover:border-[var(--warning)] disabled:opacity-50 disabled:cursor-wait inline-flex items-center gap-1.5"
                                @click="resumeAllProviders(h)"
                                :disabled="!canResumeAny(h)"
                                :aria-label="t('hosts_extra.provider_resume_all_aria', { count: pausedProvidersFor(h).length })"
                                :aria-keyshortcuts="'Enter'"
                                :title="t('hosts_extra.provider_resume_all_title')">
                          <svg width="11" height="11" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                          </svg>
                          <span x-text="t('hosts_extra.provider_resume_all', { count: pausedProvidersFor(h).length })"></span>
                        </button>
                      </div>
                    </template>
                  </section>
                </template>

                <!-- HARDWARE — same honest-fields rule. CPU model /
                     Cores come from the host-daemon agent; container
                     agents omit them. Threads / Memory / Disk / Agent /
                     Status are always emitted, so they always render.
                     Card visible when EITHER the host is up (live
                     metrics) OR an asset-inventory match exists
                     (vendor / model / serial from <asset-api-host> — useful
                     even for hosts with no live providers like FTTH
                     routers / 5G modems). Each row inside is gated
                     on its own field so cards stay tidy when only
                     one source contributes data. -->
                <!-- Section gate now also fires on snapshot-fallback
                     hits so cached hardware values (cpu_model /
                     mem_total / disk_total / serial / model / firmware
                     / vendor / swap_used) stay mounted when every
                     live provider is offline. Mirrors the symmetry
                     introduced for UPS / Printer / Network cards
                      — the operator's last-known view of
                     the hardware shouldn't disappear just because the
                     SNMP / NE / Webmin probes are temporarily failing,
                     since the snapshot fallback is exactly what's
                     supposed to bridge that gap. -->
                <section x-show="h.status === 'up'
                                 || assetForHost(h)
                                 || isStaleField(h, 'host_cpu_model')
                                 || isStaleField(h, 'host_mem_total')
                                 || isStaleField(h, 'host_disk_total')
                                 || isStaleField(h, 'host_serial')
                                 || isStaleField(h, 'host_model')
                                 || isStaleField(h, 'host_firmware')
                                 || isStaleField(h, 'host_vendor')
                                 || isStaleField(h, 'host_swap_used')
                                 || isStaleField(h, 'host_bios_version')
                                 || h.host_bios_version"
                         class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                  <h4 class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)] mb-3" x-text="t('host_drawer.hardware.heading')"></h4>
                  <dl class="drawer-dl text-[12px]">
                    <template x-if="h.cpu_model">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.hardware.cpu')"></dt>
                    </template>
                    <template x-if="h.cpu_model">
                      <dd class="text-end mono break-all" :class="isStaleField(h, 'host_cpu_model') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_cpu_model') ? staleAge(h) : ''"
                          x-text="h.cpu_model"></dd>
                    </template>
                    <template x-if="h.cores">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.hardware.cores')"></dt>
                    </template>
                    <template x-if="h.cores">
                      <dd class="mono text-end" :class="(isStaleField(h, 'host_cores') || isStaleField(h, 'host_threads')) ? 'stale' : ''"
                          :title="(isStaleField(h, 'host_cores') || isStaleField(h, 'host_threads')) ? staleAge(h) : ''"
                          x-text="h.cores"></dd>
                    </template>
                    <template x-if="h.threads">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.hardware.threads')"></dt>
                    </template>
                    <template x-if="h.threads">
                      <dd class="mono text-end" :class="isStaleField(h, 'host_threads') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_threads') ? staleAge(h) : ''"
                          x-text="h.threads"></dd>
                    </template>
                    <template x-if="h.mem_total">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.hardware.memory')"></dt>
                    </template>
                    <template x-if="h.mem_total">
                      <dd class="mono text-end" :class="isStaleField(h, 'host_mem_total') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_mem_total') ? staleAge(h) : ''"
                          x-text="fmtBytes(h.mem_total)"></dd>
                    </template>
                    <!-- Swap usage — pulled from host_swap_used (bytes).
                         Snapshot fallback stamps this when live providers
                         stop returning it; without rendering anywhere,
                         the field surfaced as "1 stale field" in the
                         drawer banner with no UI bind point (the swap
                         CHART card uses host_swap_percent / `s`, not
                         used-bytes). Render here so cached snapshot
                         data is identifiable + operators can spot
                         memory pressure at a glance even on stable
                         hosts. -->
                    <template x-if="h.host_swap_used">
                      <dt class="text-[var(--text-dim)]" x-text="t('charts.swap')"></dt>
                    </template>
                    <template x-if="h.host_swap_used">
                      <dd class="mono text-end" :class="isStaleField(h, 'host_swap_used') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_swap_used') ? staleAge(h) : ''"
                          x-text="fmtBytes(h.host_swap_used)"></dd>
                    </template>
                    <template x-if="h.disk_total">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.hardware.disk')"></dt>
                    </template>
                    <template x-if="h.disk_total">
                      <dd class="mono text-end" :class="isStaleField(h, 'host_disk_total') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_disk_total') ? staleAge(h) : ''"
                          x-text="fmtBytes(h.disk_total)"></dd>
                    </template>
                    <template x-if="h.agent">
                      <dt class="text-[var(--text-dim)]"
                          :title="t('host_drawer.hardware.beszel_agent_title')"
                          x-text="t('host_drawer.hardware.beszel_agent')"></dt>
                    </template>
                    <template x-if="h.agent">
                      <dd class="mono text-end" x-text="h.agent"></dd>
                    </template>
                    <!-- Load averages — three windows (1m / 5m / 15m)
                         rendered as percentages of total CPU capacity
                         (load ÷ cores × 100). Each labelled inline so
                         the operator doesn't have to remember which
                         number is which window. Falls back to raw
                         load when core count is unknown (rare — only
                         when the live providers haven't reported it
                         yet). Populated only when node-exporter
                         scraped this host. -->
                    <template x-if="(h.load_1m || 0) > 0 || (h.load_5m || 0) > 0 || (h.load_15m || 0) > 0">
                      <dt class="text-[var(--text-dim)]"
                          :title="t('host_drawer.hardware.load_title')"
                          x-text="t('host_drawer.hardware.load')"></dt>
                    </template>
                    <template x-if="(h.load_1m || 0) > 0 || (h.load_5m || 0) > 0 || (h.load_15m || 0) > 0">
                      <dd class="mono text-end whitespace-nowrap"
                          :class="(isStaleField(h, 'host_load_1m') || isStaleField(h, 'host_load_5m') || isStaleField(h, 'host_load_15m')) ? 'stale' : ''"
                          x-text="(h.cores && h.cores > 0)
                            ? ((((h.load_1m || 0) / h.cores) * 100).toFixed(0) + '% · '
                               + (((h.load_5m || 0) / h.cores) * 100).toFixed(0) + '% · '
                               + (((h.load_15m || 0) / h.cores) * 100).toFixed(0) + '%')
                            : ((h.load_1m || 0).toFixed(2) + ' · '
                               + (h.load_5m || 0).toFixed(2) + ' · '
                               + (h.load_15m || 0).toFixed(2))"
                          :title="(isStaleField(h, 'host_load_1m') || isStaleField(h, 'host_load_5m') || isStaleField(h, 'host_load_15m'))
                            ? staleAge(h)
                            : ((h.cores && h.cores > 0)
                               ? ('1m / 5m / 15m load (% of total CPU capacity, ' + h.cores + ' cores)')
                               : '1m / 5m / 15m load average')"></dd>
                    </template>
                    <!-- Asset inventory rows.
                         Matched by h.custom_number against the cached
                         <asset-api-host> asset list. Each row gated on its own
                         field so hosts without that data stay tidy.
                         Distinct from DMI so operators can spot when
                         the DB record ≠ what node-exporter reports
                         on the box (manufacturer mismatch / swap
                         wasn't recorded upstream). Title tooltip
                         explains the source. -->
                    <template x-if="assetForHost(h) && assetForHost(h).vendor">
                      <dt class="text-[var(--text-dim)]"
                          :title="t('host_drawer.hardware.asset_title')"
                          x-text="t('host_drawer.hardware.asset_vendor')"></dt>
                    </template>
                    <template x-if="assetForHost(h) && assetForHost(h).vendor">
                      <dd class="text-end break-all" x-text="assetForHost(h).vendor"></dd>
                    </template>
                    <template x-if="assetForHost(h) && assetForHost(h).model">
                      <dt class="text-[var(--text-dim)]"
                          :title="t('host_drawer.hardware.asset_title')"
                          x-text="t('host_drawer.hardware.asset_model')"></dt>
                    </template>
                    <template x-if="assetForHost(h) && assetForHost(h).model">
                      <dd class="text-end break-all" x-text="assetForHost(h).model"></dd>
                    </template>
                    <template x-if="assetForHost(h) && assetForHost(h).serial">
                      <dt class="text-[var(--text-dim)]"
                          :title="t('host_drawer.hardware.asset_title')"
                          x-text="t('host_drawer.hardware.asset_serial')"></dt>
                    </template>
                    <template x-if="assetForHost(h) && assetForHost(h).serial">
                      <dd class="mono text-end break-all text-[var(--text-faint)]"
                          x-text="assetForHost(h).serial"></dd>
                    </template>
                    <!-- SNMP-derived hardware. entPhysicalTable +
                         Cisco MIB walks populate host_model / host_serial /
                         host_firmware on the API row. Each gated on its
                         own field so hosts without SNMP (or without the
                         specific OID) skip the row. Distinct from
                         asset_model / asset_serial above — those are the
                         operator-curated DB record; these are what the
                         device itself reports right now. Mismatch is a
                         signal worth surfacing (swapped hardware not
                         updated in inventory). -->
                    <template x-if="h.host_model || isStaleField(h, 'host_model')">
                      <dt class="text-[var(--text-dim)]"
                          :title="t('host_drawer.hardware.snmp_title')"
                          x-text="t('host_drawer.hardware.snmp_model')"></dt>
                    </template>
                    <template x-if="h.host_model || isStaleField(h, 'host_model')">
                      <dd class="text-end break-all"
                          :class="isStaleField(h, 'host_model') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_model') ? staleAge(h) : ''"
                          x-text="h.host_model || '—'"></dd>
                    </template>
                    <template x-if="h.host_serial || isStaleField(h, 'host_serial')">
                      <dt class="text-[var(--text-dim)]"
                          :title="t('host_drawer.hardware.snmp_title')"
                          x-text="t('host_drawer.hardware.snmp_serial')"></dt>
                    </template>
                    <template x-if="h.host_serial || isStaleField(h, 'host_serial')">
                      <dd class="mono text-end break-all text-[var(--text-faint)]"
                          :class="isStaleField(h, 'host_serial') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_serial') ? staleAge(h) : ''"
                          x-text="h.host_serial || '—'"></dd>
                    </template>
                    <template x-if="h.host_firmware || isStaleField(h, 'host_firmware')">
                      <dt class="text-[var(--text-dim)]"
                          :title="t('host_drawer.hardware.snmp_title')"
                          x-text="t('host_drawer.hardware.snmp_firmware')"></dt>
                    </template>
                    <template x-if="h.host_firmware || isStaleField(h, 'host_firmware')">
                      <dd class="mono text-end break-all"
                          :class="isStaleField(h, 'host_firmware') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_firmware') ? staleAge(h) : ''"
                          x-text="h.host_firmware || '—'"></dd>
                    </template>
                    <!-- BIOS version + release date — Dell systemBIOSTable. Distinct from host_firmware which
                         on a Dell server actually carries the iDRAC
                         firmware string; host_bios_version is the
                         server's own BIOS / UEFI revision. Stale-fallback
                         gated like every other Hardware card row. -->
                    <template x-if="h.host_bios_version || isStaleField(h, 'host_bios_version')">
                      <dt class="text-[var(--text-dim)]"
                          x-text="t('host_drawer.hardware.bios_version')"></dt>
                    </template>
                    <template x-if="h.host_bios_version || isStaleField(h, 'host_bios_version')">
                      <dd class="mono text-end break-all"
                          :class="isStaleField(h, 'host_bios_version') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_bios_version') ? staleAge(h) : ''">
                        <span x-text="h.host_bios_version || '—'"></span>
                        <span x-show="h.host_bios_date"
                              class="text-[var(--text-faint)] ms-1"
                              x-text="'(' + h.host_bios_date + ')'"></span>
                      </dd>
                    </template>
                    <!-- Status row hidden for inventory-only / no-agent
                         hosts. The header status dot already conveys
                         "unconfigured" — repeating it here as a row that
                         literally reads "Status: unconfigured" was just
                         noise. Show only when something meaningful is
                         being communicated (up / down / paused / unknown). -->
                    <template x-if="h.status && h.status !== 'unconfigured'">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.hardware.status')"></dt>
                    </template>
                    <template x-if="h.status && h.status !== 'unconfigured'">
                      <dd class="text-end">
                        <span class="pill text-[10.5px]"
                              :class="h.status === 'up' ? 'pill-ok' : h.status === 'down' ? 'pill-error' : 'pill-unknown'"
                              x-text="h.status"></span>
                      </dd>
                    </template>
                    <!-- Services summary. Row appears only when the
                         host's Beszel agent is reporting services (total > 0).
                         Always shows "{N} services"; appends "· {F} failed"
                         in red when failures exist; lists failed names
                         underneath. Hosts whose agent doesn't track services
                         skip this row entirely (the gate). -->
                    <template x-if="(h.services || {}).total > 0">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.hardware.services')"></dt>
                    </template>
                    <template x-if="(h.services || {}).total > 0">
                      <dd class="text-end">
                        <!-- Count colour: green when no failures (positive
                             "all good" signal so the operator can scan
                             at a glance), neutral mono otherwise — the
                             ·N failed in red carries the alarm in that
                             case so the count itself shouldn't compete. -->
                        <span class="mono"
                              :class="h.services.failed === 0 ? 'text-[var(--success)]' : ''"
                              x-text="h.services.total + ' ' + t('host_drawer.hardware.services_unit')"></span>
                        <!-- Always render "· N failed" — green "0 failed"
                             when N=0 reassures the operator that
                             monitoring is live AND clean (vs. silent =
                             ambiguous "not tracked OR no failures?"). -->
                        <span class="ms-1"
                              :class="h.services.failed > 0 ? 'text-[var(--danger)]' : 'text-[var(--success)]'"
                              x-text="'· ' + h.services.failed + ' ' + t('host_drawer.hardware.services_failed')"></span>
                        <div x-show="h.services.failed > 0"
                             class="text-[10.5px] text-[var(--danger)] mt-1 mono break-all"
                             x-text="(h.services.failed_names || []).join(', ')"></div>
                      </dd>
                    </template>
                  </dl>
                </section>

                <!-- UPS — APC PowerNet-MIB data. Rendered
                     ONLY when the host probed via SNMP returned PowerNet
                     data — `host_ups_status` is the gate. Status badge
                     plus battery / load gauges using the same `.stat-bar`
                     primitive other cards use. Battery temperature shows
                     red above 40°C (APC's "warm" threshold for SLA cells),
                     battery percent shows red below 20% and amber below
                     50%, runtime uses fmtUpsRuntime for the human format. -->
                <!-- Card gate fires on ANY UPS field truthy — pre-fix
                     the gate required `host_ups_status` to be a non-
                     empty string, but a UPS whose SNMP probe extracted
                     battery_percent + battery_temp_c but not the output-
                     status OID (some basic Smart-UPS models) had the
                     entire card hidden despite having usable data. The
                     section also surfaces when the values are stale
                     (snapshot fallback), so a probe outage doesn't
                     blank the card. Live OR stale on any single field
                     is enough. -->
                <section x-show="!!(h.host_ups_status)
                                 || typeof h.host_battery_percent === 'number'
                                 || typeof h.host_battery_temp_c === 'number'
                                 || typeof h.host_load_percent === 'number'
                                 || h.host_battery_runtime_s
                                 || h.host_battery_status
                                 || isStaleField(h, 'host_ups_status')
                                 || isStaleField(h, 'host_battery_percent')
                                 || isStaleField(h, 'host_load_percent')"
                         class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                  <h4 class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)] mb-3 flex items-center gap-2">
                    <span x-text="t('host_drawer.ups.heading')"></span>
                    <span x-show="h.host_ups_status"
                          class="chip text-[10.5px]"
                          :class="[upsStatusPillClass(h.host_ups_status), isStaleField(h, 'host_ups_status') ? 'stale' : '']"
                          :title="isStaleField(h, 'host_ups_status') ? staleAge(h) : ''"
                          x-text="upsStatusLabel(h.host_ups_status)"></span>
                  </h4>
                  <dl class="drawer-dl text-[12px]">
                    <template x-if="typeof h.host_battery_percent === 'number'">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.ups.battery')"></dt>
                    </template>
                    <template x-if="typeof h.host_battery_percent === 'number'">
                      <dd class="text-end"
                          :class="isStaleField(h, 'host_battery_percent') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_battery_percent') ? staleAge(h) : ''">
                        <div class="flex items-center justify-end gap-2">
                          <div class="stat-bar w-24" x-bind="statBarBind((h.host_battery_percent || 0), 'hosts_extra.metrics.ups_battery')"
                               role="progressbar"
                               aria-valuemin="0"
                               aria-valuemax="100"
                               :aria-valuenow="(+h.host_battery_percent || 0).toFixed(0)"
                               :aria-valuetext="(+h.host_battery_percent || 0).toFixed(0) + '% — ' + t('host_drawer.ups.battery')"
                               :class="upsBatteryLevel(h.host_battery_percent)"
                               :style="'--w:' + (h.host_battery_percent || 0) + '%'">
                            <div class="fill"></div>
                          </div>
                          <span class="mono" x-text="(+h.host_battery_percent).toFixed(0) + '%'"></span>
                        </div>
                      </dd>
                    </template>
                    <template x-if="typeof h.host_load_percent === 'number'">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.ups.load')"></dt>
                    </template>
                    <template x-if="typeof h.host_load_percent === 'number'">
                      <dd class="text-end"
                          :class="isStaleField(h, 'host_load_percent') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_load_percent') ? staleAge(h) : ''">
                        <div class="flex items-center justify-end gap-2">
                          <div class="stat-bar w-24" x-bind="statBarBind((h.host_load_percent || 0), 'hosts_extra.metrics.load_avg')"
                               role="progressbar"
                               aria-valuemin="0"
                               aria-valuemax="100"
                               :aria-valuenow="(+h.host_load_percent || 0).toFixed(0)"
                               :aria-valuetext="(+h.host_load_percent || 0).toFixed(0) + '% — ' + t('host_drawer.ups.load')"
                               :class="barLevel(h.host_load_percent)"
                               :style="'--w:' + (h.host_load_percent || 0) + '%'">
                            <div class="fill"></div>
                          </div>
                          <span class="mono" x-text="(+h.host_load_percent).toFixed(0) + '%'"></span>
                        </div>
                      </dd>
                    </template>
                    <template x-if="h.host_battery_runtime_s">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.ups.runtime')"></dt>
                    </template>
                    <template x-if="h.host_battery_runtime_s">
                      <dd class="text-end mono"
                          :class="isStaleField(h, 'host_battery_runtime_s') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_battery_runtime_s') ? staleAge(h) : ''"
                          x-text="fmtUpsRuntime(h.host_battery_runtime_s)"></dd>
                    </template>
                    <template x-if="h.host_battery_temp_c">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.ups.battery_temp')"></dt>
                    </template>
                    <template x-if="h.host_battery_temp_c">
                      <dd class="text-end mono"
                          :class="[(+h.host_battery_temp_c) > 40 ? 'text-[var(--danger)]' : '', isStaleField(h, 'host_battery_temp_c') ? 'stale' : '']"
                          :title="isStaleField(h, 'host_battery_temp_c') ? staleAge(h) : ''"
                          x-text="(+h.host_battery_temp_c).toFixed(0) + '°C'"></dd>
                    </template>
                    <template x-if="h.host_battery_status">
                      <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.ups.battery_status')"></dt>
                    </template>
                    <template x-if="h.host_battery_status">
                      <dd class="text-end">
                        <span class="chip text-[10.5px]"
                              :class="[upsBatteryStatusPillClass(h.host_battery_status), isStaleField(h, 'host_battery_status') ? 'stale' : '']"
                              :title="isStaleField(h, 'host_battery_status') ? staleAge(h) : ''"
                              x-text="upsBatteryStatusLabel(h.host_battery_status)"></span>
                      </dd>
                    </template>
                  </dl>
                </section>

                <!-- SERVER HEALTH — DELL-RAC-MIB grids.
                     Renders for any host whose SNMP probe walked back
                     non-empty Dell server-health tables. Per-section
                     subsections gate on EITHER live data OR snapshot
                     fallback so a brief SNMP outage doesn't blank
                     them. Status pills follow the standard Dell health
                     enum (ok / non-critical / critical / non-recoverable
                     / unknown). The chassis-power figure surfaces in
                     the header next to the heading — drawn from the
                     amperageProbeTable's type=23/24 system-power probes
                     when the iDRAC reports them; older firmware leaves
                     the pill hidden. -->
                <section x-show="(h.host_dell_fans && h.host_dell_fans.length)
                                 || (h.host_dell_temps && h.host_dell_temps.length)
                                 || (h.host_dell_psus && h.host_dell_psus.length)
                                 || (h.host_dell_voltages && h.host_dell_voltages.length)
                                 || (h.host_dell_phys_disks && h.host_dell_phys_disks.length)
                                 || (h.host_dell_virt_disks && h.host_dell_virt_disks.length)
                                 || isStaleField(h, 'host_dell_fans')
                                 || isStaleField(h, 'host_dell_temps')
                                 || isStaleField(h, 'host_dell_psus')
                                 || isStaleField(h, 'host_dell_phys_disks')
                                 || isStaleField(h, 'host_dell_virt_disks')"
                         class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-12">
                  <h4 class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)] mb-3 flex items-center gap-2 flex-wrap">
                    <span x-text="t('host_drawer.server_health.heading')"></span>
                    <span x-show="typeof h.host_dell_power_watts === 'number' && h.host_dell_power_watts > 0"
                          class="chip text-[10.5px]"
                          :class="isStaleField(h, 'host_dell_power_watts') ? 'stale' : ''"
                          :title="isStaleField(h, 'host_dell_power_watts') ? staleAge(h) : ''">
                      <span x-text="t('host_drawer.server_health.power_consumption')"></span>
                      <span class="mono ms-1" x-text="(+h.host_dell_power_watts || 0).toFixed(0) + ' W'"></span>
                    </span>
                  </h4>

                  <!-- Two-column responsive grid for the per-section
                       sub-cards. Compact layout so a single drawer
                       view comfortably fits all six tables on a
                       desktop screen. -->
                  <div class="server-health-grid">
                    <!-- Fans (coolingDeviceTable) -->
                    <div x-show="(h.host_dell_fans && h.host_dell_fans.length) || isStaleField(h, 'host_dell_fans')"
                         class="server-health-section"
                         :class="isStaleField(h, 'host_dell_fans') ? 'stale' : ''"
                         :title="isStaleField(h, 'host_dell_fans') ? staleAge(h) : ''">
                      <div class="server-health-section-title">
                        <span x-text="t('host_drawer.server_health.fans')"></span>
                        <span class="text-[var(--text-faint)] ms-1"
                              x-text="'(' + ((h.host_dell_fans || []).length) + ')'"></span>
                      </div>
                      <ul class="server-health-list mono">
                        <template x-for="row in (h.host_dell_fans || [])" :key="row.idx">
                          <li class="server-health-row">
                            <span class="server-health-row-name" x-text="row.name"></span>
                            <span class="server-health-row-value">
                              <span x-show="row.rpm" x-text="row.rpm + ' ' + t('host_drawer.server_health.rpm')"></span>
                              <span x-show="!row.rpm" class="text-[var(--text-faint)]">—</span>
                            </span>
                            <span class="chip text-[10px]" :class="dellHealthPillClass(row.status)"
                                  x-text="dellHealthLabel(row.status)"></span>
                          </li>
                        </template>
                      </ul>
                    </div>

                    <!-- Temperature probes (temperatureProbeTable) -->
                    <div x-show="(h.host_dell_temps && h.host_dell_temps.length) || isStaleField(h, 'host_dell_temps')"
                         class="server-health-section"
                         :class="isStaleField(h, 'host_dell_temps') ? 'stale' : ''"
                         :title="isStaleField(h, 'host_dell_temps') ? staleAge(h) : ''">
                      <div class="server-health-section-title">
                        <span x-text="t('host_drawer.server_health.temperatures')"></span>
                        <span class="text-[var(--text-faint)] ms-1"
                              x-text="'(' + ((h.host_dell_temps || []).length) + ')'"></span>
                      </div>
                      <ul class="server-health-list mono">
                        <template x-for="row in (h.host_dell_temps || [])" :key="row.idx">
                          <li class="server-health-row">
                            <span class="server-health-row-name" x-text="row.name"></span>
                            <span class="server-health-row-value"
                                  :class="(typeof row.celsius === 'number' && row.celsius > 60) ? 'text-[var(--danger)]' : ''">
                              <span x-show="typeof row.celsius === 'number'"
                                    x-text="(+row.celsius).toFixed(1) + '°C'"></span>
                              <span x-show="!(typeof row.celsius === 'number')" class="text-[var(--text-faint)]">—</span>
                            </span>
                            <span class="chip text-[10px]" :class="dellHealthPillClass(row.status)"
                                  x-text="dellHealthLabel(row.status)"></span>
                          </li>
                        </template>
                      </ul>
                    </div>

                    <!-- Power supplies (powerSupplyTable) -->
                    <div x-show="(h.host_dell_psus && h.host_dell_psus.length) || isStaleField(h, 'host_dell_psus')"
                         class="server-health-section"
                         :class="isStaleField(h, 'host_dell_psus') ? 'stale' : ''"
                         :title="isStaleField(h, 'host_dell_psus') ? staleAge(h) : ''">
                      <div class="server-health-section-title">
                        <span x-text="t('host_drawer.server_health.psus')"></span>
                        <span class="text-[var(--text-faint)] ms-1"
                              x-text="'(' + ((h.host_dell_psus || []).length) + ')'"></span>
                      </div>
                      <ul class="server-health-list mono">
                        <template x-for="row in (h.host_dell_psus || [])" :key="row.idx">
                          <li class="server-health-row">
                            <span class="server-health-row-name" x-text="row.name"></span>
                            <span class="server-health-row-value">
                              <span x-show="row.watts" x-text="(+row.watts || 0).toFixed(0) + ' W'"></span>
                              <span x-show="!row.watts" class="text-[var(--text-faint)]">—</span>
                            </span>
                            <span class="chip text-[10px]" :class="dellHealthPillClass(row.status)"
                                  x-text="dellHealthLabel(row.status)"></span>
                          </li>
                        </template>
                      </ul>
                    </div>

                    <!-- Voltage probes (voltageProbeTable) -->
                    <div x-show="h.host_dell_voltages && h.host_dell_voltages.length"
                         class="server-health-section">
                      <div class="server-health-section-title">
                        <span x-text="t('host_drawer.server_health.voltages')"></span>
                        <span class="text-[var(--text-faint)] ms-1"
                              x-text="'(' + ((h.host_dell_voltages || []).length) + ')'"></span>
                      </div>
                      <ul class="server-health-list mono"
                          :id="'server-health-volt-' + h.id"
                          :class="(h.host_dell_voltages || []).length > 12 ? 'server-health-list--dense' : ''">
                        <template x-for="row in serverHealthVisibleRows(h.id, 'volt', h.host_dell_voltages || [])" :key="row.idx">
                          <li class="server-health-row"
                              :class="(h.host_dell_voltages || []).length > 12 ? 'server-health-row--dense' : ''">
                            <span class="server-health-row-name" x-text="row.name"></span>
                            <span class="server-health-row-value">
                              <span x-show="row.millivolts"
                                    x-text="(row.millivolts / 1000).toFixed(2) + ' V'"></span>
                              <span x-show="!row.millivolts" class="text-[var(--text-faint)]">—</span>
                            </span>
                            <span class="chip text-[10px]" :class="dellHealthPillClass(row.status)"
                                  x-text="dellHealthLabel(row.status)"></span>
                          </li>
                        </template>
                      </ul>
                      <button x-show="serverHealthCollapsible(h.host_dell_voltages || [])"
                              type="button"
                              class="server-health-toggle"
                              :aria-expanded="serverHealthIsExpanded(h.id, 'volt')"
                              :aria-controls="'server-health-volt-' + h.id"
                              @click="toggleServerHealthExpanded(h.id, 'volt')"
                              x-text="serverHealthIsExpanded(h.id, 'volt')
                                        ? t('host_drawer.server_health.show_fewer')
                                        : t('host_drawer.server_health.show_all', { count: (h.host_dell_voltages || []).length })"></button>
                    </div>

                    <!-- Physical disks (physicalDiskTable) -->
                    <div x-show="(h.host_dell_phys_disks && h.host_dell_phys_disks.length) || isStaleField(h, 'host_dell_phys_disks')"
                         class="server-health-section"
                         :class="isStaleField(h, 'host_dell_phys_disks') ? 'stale' : ''"
                         :title="isStaleField(h, 'host_dell_phys_disks') ? staleAge(h) : ''">
                      <div class="server-health-section-title">
                        <span x-text="t('host_drawer.server_health.physical_disks')"></span>
                        <span class="text-[var(--text-faint)] ms-1"
                              x-text="'(' + ((h.host_dell_phys_disks || []).length) + ')'"></span>
                      </div>
                      <ul class="server-health-list mono"
                          :id="'server-health-pd-' + h.id"
                          :class="(h.host_dell_phys_disks || []).length > 12 ? 'server-health-list--dense' : ''">
                        <template x-for="row in serverHealthVisibleRows(h.id, 'pd', h.host_dell_phys_disks || [])" :key="row.idx">
                          <li class="server-health-row"
                              :class="(h.host_dell_phys_disks || []).length > 12 ? 'server-health-row--dense' : ''">
                            <span class="server-health-row-name" x-text="row.name"></span>
                            <span class="server-health-row-value">
                              <span x-show="row.capacity_mb"
                                    x-text="fmtBytes(row.capacity_mb * 1024 * 1024)"></span>
                              <span x-show="!row.capacity_mb" class="text-[var(--text-faint)]">—</span>
                            </span>
                            <span class="chip text-[10px]" :class="dellPdStatePillClass(row.state)"
                                  x-text="dellStateLabel(row.state)"></span>
                          </li>
                        </template>
                      </ul>
                      <button x-show="serverHealthCollapsible(h.host_dell_phys_disks || [])"
                              type="button"
                              class="server-health-toggle"
                              :aria-expanded="serverHealthIsExpanded(h.id, 'pd')"
                              :aria-controls="'server-health-pd-' + h.id"
                              @click="toggleServerHealthExpanded(h.id, 'pd')"
                              x-text="serverHealthIsExpanded(h.id, 'pd')
                                        ? t('host_drawer.server_health.show_fewer')
                                        : t('host_drawer.server_health.show_all', { count: (h.host_dell_phys_disks || []).length })"></button>
                    </div>

                    <!-- Virtual disks (virtualDiskTable) -->
                    <div x-show="(h.host_dell_virt_disks && h.host_dell_virt_disks.length) || isStaleField(h, 'host_dell_virt_disks')"
                         class="server-health-section"
                         :class="isStaleField(h, 'host_dell_virt_disks') ? 'stale' : ''"
                         :title="isStaleField(h, 'host_dell_virt_disks') ? staleAge(h) : ''">
                      <div class="server-health-section-title">
                        <span x-text="t('host_drawer.server_health.virtual_disks')"></span>
                        <span class="text-[var(--text-faint)] ms-1"
                              x-text="'(' + ((h.host_dell_virt_disks || []).length) + ')'"></span>
                      </div>
                      <ul class="server-health-list mono">
                        <template x-for="row in (h.host_dell_virt_disks || [])" :key="row.idx">
                          <li class="server-health-row">
                            <span class="server-health-row-name">
                              <span x-text="row.name"></span>
                              <span x-show="row.layout"
                                    class="text-[var(--text-faint)] ms-1"
                                    x-text="'· ' + row.layout"></span>
                            </span>
                            <span class="server-health-row-value">
                              <span x-show="row.size_mb"
                                    x-text="fmtBytes(row.size_mb * 1024 * 1024)"></span>
                              <span x-show="!row.size_mb" class="text-[var(--text-faint)]">—</span>
                            </span>
                            <span class="chip text-[10px]" :class="dellVdStatePillClass(row.state)"
                                  x-text="dellStateLabel(row.state)"></span>
                          </li>
                        </template>
                      </ul>
                    </div>
                  </div>
                </section>

                <!-- PRINTER — Printer-MIB toner / supply levels.
                     Section gate fires on EITHER live data OR cached
                     snapshot data so the card stays visible while the
                     SNMP provider is unreachable. Each supply renders as a
                     horizontal bar showing fill level (current/max);
                     the colour comes from the supply description (cyan /
                     magenta / yellow / black / waste). -->
                <section x-show="(h.printer_supplies || []).length > 0
                                 || isStaleField(h, 'printer_supplies')
                                 || isStaleField(h, 'printer_page_count')
                                 || h.printer_page_count"
                         class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                  <h4 class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)] mb-3"
                      x-text="t('host_drawer.printer.heading')"></h4>
                  <!-- printer freshness line. Always visible
                       when SNMP history exists; renders in `--warning`
                       orange (matches the SNMP chart freshness banner and the snapshot-stale banner pattern).
                       Operators wanted explicit "last refreshed Xm
                       ago" visibility on the printer card whether or
                       not the data was actually stale — the original
                       gate (only when isStaleField fires) was invisible
                       in normal operation. -->
                  <div x-show="snmpHistoryFreshness(h)"
                       class="mb-3 text-[11px] flex items-center gap-2 text-[var(--warning)]"
                       :title="snmpHistoryFreshness(h) ? t('host_drawer.snmp_charts.freshness_source_' + snmpHistoryFreshness(h).source) : ''">
                    <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-clock"/></svg>
                    <span x-text="snmpHistoryFreshness(h) ? t('host_drawer.snmp_charts.freshness', { age: snmpHistoryFreshness(h).label }) : ''"></span>
                  </div>
                  <!-- Operator-flagged: surface the lifetime page count
                       prominently inside the box rather than as small
                       greyed sub-text in the heading. -->
                  <div x-show="h.printer_page_count || isStaleField(h, 'printer_page_count')"
                       class="mb-3 flex items-baseline gap-2"
                       :class="isStaleField(h, 'printer_page_count') ? 'stale' : ''"
                       :title="isStaleField(h, 'printer_page_count') ? staleAge(h) : ''">
                    <span class="text-[18px] font-semibold mono"
                          x-text="(+h.printer_page_count || 0).toLocaleString()"></span>
                    <span class="text-[11.5px] text-[var(--text-dim)]"
                          x-text="t('host_drawer.printer.pages_label')"></span>
                  </div>
                  <div class="space-y-2.5"
                       :class="isStaleField(h, 'printer_supplies') ? 'stale' : ''"
                       :title="isStaleField(h, 'printer_supplies') ? staleAge(h) : ''">
                    <template x-for="(supply, i) in (h.printer_supplies || [])" :key="'p' + i">
                      <div class="space-y-1">
                        <div class="flex items-center justify-between text-[12px]">
                          <!-- Title-case the supply name so HP / Brother
                               replies that come back ALL-CAPS ("BLACK
                               CARTRIDGE") render cleanly. -->
                          <span class="font-semibold" x-text="titleCase(supply.name) || t('host_drawer.printer.supply_unknown')"></span>
                          <span class="mono text-[var(--text-faint)]"
                                x-text="(supply.percent !== null && supply.percent !== undefined)
                                        ? Math.round(supply.percent) + '%'
                                        : (supply.level + ' / ' + supply.max)"></span>
                        </div>
                        <!-- Custom-coloured fill — `.stat-bar > .fill`
                             defaults to `var(--success)`; for printer
                             supplies we want each supply painted in
                             its mapped brand colour (cyan / magenta /
                             yellow / black / waste-grey). Set the fill
                             background inline to the resolved colour. -->
                        <div class="stat-bar" x-bind="statBarBind(Math.round(supply.percent || 0))"
                             :class="printerSupplyLevel(supply)"
                             :style="'--w:' + Math.round(supply.percent || 0) + '%'">
                          <div class="fill" :style="'background:' + printerSupplyColor(supply)"></div>
                        </div>
                      </div>
                    </template>
                    <div x-show="h.printer_console_msg || isStaleField(h, 'printer_console_msg')"
                         class="pt-2 mt-2 border-t border-dashed border-[var(--border)] text-[11.5px] text-[var(--text-dim)] mono"
                         :class="isStaleField(h, 'printer_console_msg') ? 'stale' : ''"
                         :title="isStaleField(h, 'printer_console_msg') ? staleAge(h) : ''"
                         x-text="h.printer_console_msg"></div>
                  </div>
                </section>

                <!-- NETWORK — each interface rendered as a block with
                     its MAC (muted) and IPv4 / IPv6 addresses colour-
                     coded by family. Matches Beszel's own layout so
                     the operator's eye reads the two UIs the same way. -->
                <section x-show="(h.network_ifaces || []).length > 0 || h.bandwidth"
                         class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                  <h4 class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)] mb-3" x-text="t('host_drawer.network.heading')"></h4>
                  <div class="space-y-3">
                    <div x-show="h.bandwidth" class="flex items-center justify-between text-[12px]">
                      <span class="text-[var(--text-dim)]" x-text="t('host_drawer.network.bandwidth')"></span>
                      <span class="mono" x-text="fmtBytes(h.bandwidth) + '/s'"></span>
                    </div>
                    <!-- "Busy" real interfaces always render — physical /
                         virtual NICs the operator cares about (ens*, eth*,
                         wlan*, enp*, etc.) that have traffic OR an IP
                         address. Idle ports (Cisco SG300's 32-port
                         Port-Channel pool with no traffic, switch ports
                         with no link) get partitioned out and hidden
                         behind a toggle below — switches expose 30+
                         interfaces and most are unused. Sorted by
                         total traffic descending so the dominant NIC
                         floats to the top. -->
                    <template x-for="(iface, i) in networkIfacesBusyVisible(h)" :key="'r' + i">
                      <div class="space-y-1.5">
                        <div class="flex items-baseline gap-2 flex-wrap">
                          <!-- oper_status dot when SNMP returned it.
                               Up = success token, down = danger token. -->
                          <span x-show="typeof iface === 'object' && iface.oper_status"
                                class="inline-block w-1.5 h-1.5 rounded-full self-center"
                                :class="iface.oper_status === 'up' ? 'dot-on' : 'dot-off'"
                                :title="iface.oper_status === 'up' ? t('host_drawer.network.iface_up') : t('host_drawer.network.iface_down')"></span>
                          <span class="font-semibold text-[12.5px] mono"
                                x-text="typeof iface === 'string' ? iface : iface.name"></span>
                          <!-- 32-bit counter degraded badge. SNMP devices
                               that don't expose ifHCInOctets fall back to
                               32-bit ifInOctets (wraps every ~17s on a 1G
                               link at line rate). The backend tags each
                               iface row with `counter_width: 32 | 64`;
                               showing the badge here lets operators know
                               the chart can silently misrepresent under-
                               wrap traffic on this iface. -->
                          <span x-show="typeof iface === 'object' && iface.counter_width === 32"
                                class="chip pill-warning text-[9.5px] px-1 py-0"
                                :title="t('host_drawer.network.counter_32_title')"
                                x-text="'32'"></span>
                          <span x-show="typeof iface === 'object' && iface.mac"
                                class="ip-chip ip-chip--mac"
                                x-text="iface.mac"></span>
                          <!-- SNMP traffic totals. Only rendered
                               when the iface row has rx/tx counters
                               (SNMP-derived hosts only). Compact
                               rendering: ↓ rx · ↑ tx, mono so the
                               numbers align across rows. -->
                          <span x-show="hostIfaceHasTraffic(iface)"
                                class="ms-auto text-[10.5px] mono text-[var(--text-faint)]">
                            <span x-text="'↓ ' + fmtBytes(iface.rx_bytes || 0)"></span>
                            <span class="mx-1">·</span>
                            <span x-text="'↑ ' + fmtBytes(iface.tx_bytes || 0)"></span>
                          </span>
                        </div>
                        <!-- stacked rx/tx bar, normalised to the
                             busiest interface on the host. Only rendered
                             when this iface has traffic AND the host has
                             at least one busy interface to scale against. -->
                        <div x-show="hostIfaceHasTraffic(iface) && hostIfaceMaxTotal(h) > 0"
                             class="iface-bar"
                             :style="hostIfaceBarStyle(iface, hostIfaceMaxTotal(h))"
                             :title="t('host_drawer.network.iface_bar_title', { rx: fmtBytes(iface.rx_bytes || 0), tx: fmtBytes(iface.tx_bytes || 0) })">
                          <span class="iface-bar-rx"></span>
                          <span class="iface-bar-tx"></span>
                        </div>
                        <div x-show="typeof iface === 'object' && (iface.addrs || []).length"
                             class="flex flex-wrap gap-1.5">
                          <template x-for="a in (typeof iface === 'object' ? (iface.addrs || []) : [])" :key="a">
                            <span class="ip-chip"
                                  :class="a.includes(':') ? 'ip-chip--v6' : 'ip-chip--v4'"
                                  x-text="a"></span>
                          </template>
                        </div>
                      </div>
                    </template>
                    <!-- Top-N cap on the busy-iface list. When
                         the active list exceeds `networkIfacesBusyCap`
                         (default 10), the rest are hidden behind a
                         per-host "Show all (N)" toggle so a 52-port
                         switch's drawer stays scannable. Sort order is
