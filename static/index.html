<!--suppress AnonymousFunctionJS, ConditionalExpressionJS, HtmlUnknownAttribute, ConstantOnRightSideOfComparisonJS, NestedConditionalExpressionJS, HtmlUnknownTag, EmptyCatchBlockJS, UnusedCatchParameterJS, FunctionWithMultipleReturnPointsJS, MagicNumberJS, HtmlFormInputWithoutLabel, HtmlWrongAttributeValue, HtmlRequiredAltAttribute, CssConvertColorToRgbInspection, ReuseOfLocalVariableJS -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Mobile viewport: disable pinch-zoom + iOS input-focus auto-zoom
     (the auto-zoom only fires when user-scalable is allowed AND the
     focused input has font-size < 16px; locking max-scale=1 +
     user-scalable=no kills both behaviours). Operator explicitly
     asked for this — accessibility callers can rely on the OS-level
     zoom + browser reader-mode if they need magnification. -->
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>OmniGrid</title>
  <!-- Favicon stack — 1Password / iOS / Android scanners prefer
     standard <link rel="...icon"> paths over data: URIs (which they
     sometimes ignore for credential-suggestion purposes). The SVG
     data URI stays as a quick-load fallback for tab favicons; the
     real 512×512 PNG drives apple-touch-icon (iOS home screen +
     1Password vault items) and the .ico-style 192/512 hints. -->
  <link rel="icon" type="image/png" sizes="512x512" href="/img/logo/omnigrid.png">
  <link rel="icon" type="image/svg+xml" href="/img/logo/omnigrid.svg">
  <!-- UI sprite: NO <link rel="preload">. Every icon is a
       `<use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-...">` which
       fetches the same-origin sprite on first render. A preload hint was
       tried (both `as="image"` and `as="fetch"` + matching `?v=` query)
       but Chrome will NOT credit a preload of an SVG sprite consumed via
       `<use>` as "used" — the `<use>` request's destination/mode differs
       from the preload's, so it floods the console with "preloaded but
       not used within a few seconds" regardless of `as` value. The
       sprite is tiny + same-origin, so the parallel-fetch micro-win
       isn't worth the warning noise; the `<use>` fetch loads it fine. -->
  <link rel="apple-touch-icon" href="/img/logo/omnigrid.png">
  <link rel="shortcut icon" href="/img/logo/omnigrid.png">
  <script>
    (function () {
      const pref = localStorage.getItem('theme') || 'auto';
      const sysLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
      const resolved = pref === 'auto' ? (sysLight ? 'light' : 'dark') : pref;
      document.documentElement.setAttribute('data-theme', resolved);
      // Apply persisted language/direction before first paint so RTL layout
      // doesn't flash LTR on page load. The full i18n helper below handles
      // JSON fetch + key lookups.
      const lang = localStorage.getItem('lang') || 'en';
      document.documentElement.setAttribute('lang', lang);
      // `ar` is hard-coded as RTL here just so the *shell* flips before the
      // async JSON fetch completes. Every other language's direction comes
      // from its own _meta.dir once loaded.
      document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
    })();

    // iOS Safari ignores the viewport `user-scalable=no` hint since iOS
    // 10 (accessibility), so the meta tag alone doesn't disable pinch
    // zoom. Combined with `touch-action: pan-x pan-y` on body (in
    // style.css), preventing the relevant touch + gesture events here
    // closes the remaining paths. The `gesturestart` family covers
    // desktop Safari + macOS trackpads; the `touchstart` / `touchmove`
    // multi-touch path covers iOS Safari (which fires touch events for
    // pinch on the page). `e.scale !== 1` detects iOS-specific
    // pinch-scale events. The 300ms double-tap detector blocks the
    // iOS double-tap-to-zoom shortcut. Operator-requested behaviour
    //. Listeners use `{passive: false}` because preventDefault()
    // requires it. Attached to BOTH document and window so iOS Safari
    // can't bypass via either path.
    (function () {
      const pd = function (e) {
        try {
          e.preventDefault();
        } catch (_) {
        }
      };
      ['gesturestart', 'gesturechange', 'gestureend'].forEach(function (evt) {
        document.addEventListener(evt, pd, {passive: false});
        window.addEventListener(evt, pd, {passive: false});
      });
      const blockMultiTouch = function (e) {
        if (e.touches && e.touches.length > 1) {
          pd(e);
          return;
        }
        // iOS-specific: e.scale != 1 means a pinch is in progress
        // (independent of touches.length on certain iOS versions).
        if (typeof e.scale === 'number' && e.scale !== 1) {
          pd(e);
        }
      };
      document.addEventListener('touchstart', blockMultiTouch, {passive: false});
      document.addEventListener('touchmove', blockMultiTouch, {passive: false});
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function (e) {
        const now = Date.now();
        if (now - lastTouchEnd < 300) {
          pd(e);
        }
        lastTouchEnd = now;
      }, {passive: false});
    })();
  </script>
  <!-- Expose the app version to JS so client-side helpers (e.g. icon
     URL cache-bust in `_themeIcon`) can append the same `?v=` query
     string the script tags use. The literal `__APP_VERSION__` marker
     is substituted server-side at HTML serve time (main.py:api_index).
     The global is named `OG_VERSION` (not `__APP_VERSION__`) so the
     server-side substitution doesn't replace the LHS identifier — when
     the version is numeric like `1.3.66`, replacing both sides would
     produce `window.1.3.66 = "1.3.66"` which is "Unexpected number"
     at the dot. The reader in app.js mirrors this name. -->
  <script>window.OG_VERSION = "__APP_VERSION__";</script>
  <script src="/js/i18n.js?v=__APP_VERSION__"></script>
  <!-- Poppins is vendored under /fonts/ and declared in css/style.css. No
     external font fetches — the app stays functional fully offline. -->

  <!-- app.js is now an ES module — it imports sibling app-*.js files
     (icon registry, curated refresh-field whitelist, window.__ogCopyAiCode
     copy-handler global). `<script type="module">` is implicitly
     deferred, executing right before DOMContentLoaded along with other
     deferred scripts in document order. alpine-gate.js (immediately
     below) is a classic script that runs synchronously but only injects
     the Alpine bundle AFTER `await window.__i18nReady` resolves, which
     involves network fetches — far slower than our module parse. Net:
     `window.app` is set before Alpine instantiates `x-data="app()"`.
     `main.py:serve_app_js_module` substitutes the literal
     `__APP_VERSION__` marker inside the served file so module imports
     get cache-busted on every deploy. -->
  <script type="module" src="/js/app.js?v=__APP_VERSION__"></script>

  <!-- All three front-end deps served straight from /node_modules/. Tailwind
     uses @tailwindcss/browser (v4's in-browser JIT runtime equivalent to
     the old v3 Play CDN). Bump versions in package.json, `npm install`,
     commit node_modules. -->
  <script src="/node_modules/@tailwindcss/browser/dist/index.global.js"></script>
  <script src="/js/alpine-gate.js?v=__APP_VERSION__"></script>
  <script src="/node_modules/sweetalert2/dist/sweetalert2.all.min.js"></script>
  <!-- xterm.js — interactive SSH terminal modal. UMD bundles expose
       window.Terminal + window.FitAddon + window.WebLinksAddon. LAZY-
       loaded by `openHostTerminal()` in `static/js/app-ssh.js` (which
       awaits a `_loadXtermDeps()` helper) so the shell load doesn't
       parse them — eliminates the steady-state Chromium `[Violation]
       Added non-passive event listener to a scroll-blocking
       'mousewheel' event` warning (xterm registers wheel + touch
       handlers without `{passive:true}` because it needs preventDefault
       to keep its custom scrollback behaviour; we can't change that
       without forking, so the practical mitigation is to defer the
       registration until the SSH terminal is actually opened). The CSS
       file ships in the same lazy chain. -->
  <!-- xterm script/link tags intentionally absent here. -->
  <!--suppress JSUnresolvedReference -->
  <!--suppress HtmlUnknownAttribute -->
  <!--suppress JSUnresolvedFunction -->
  <!-- LAZY: xterm + addons loaded on demand by openHostTerminal. -->
  <!--suppress JSUnusedLocalSymbols -->
  <!-- qrcode-generator — pure-JS QR rendering used by the Profile -> Two-
     factor authentication enrolment flow. UMD bundle exposes
     a global `qrcode(typeNumber, errorCorrectionLevel)` factory. -->
  <script src="/node_modules/qrcode-generator/dist/qrcode.js"></script>
  <link rel="stylesheet" href="/css/style.css?v=__APP_VERSION__">
  <script src="/js/auth-fetch.js?v=__APP_VERSION__"></script>
</head>
<body class="min-h-screen">

<!-- LOW-IA / keyboard-only skip-to-main-content link. Visually
     hidden until focused (CSS handles the slide-in animation); first
     interactive element in <body> so a Tab from an empty page focuses
     it before the topbar's ~15 nav stops. Targets `#main` which is
     declared as the role="main" landmark below. -->
<a href="#main" class="skip-link" x-text="t('app.skip_to_main')"></a>

<!-- ICON SYMBOL LIBRARY moved to static/img/ui-sprite.svg (2026-05-03) — every <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-..."/> reference resolves through that same-origin file. Preload <link> in the <head> kicks off the fetch in parallel with the HTML parse. Adding a new icon: edit static/img/ui-sprite.svg, NOT this file. -->

<div x-data="app()" x-init="init()" x-cloak
     class="flex flex-col min-h-screen og-app-shell"
     :class="aiSidebarPinned ? 'og-app-shell--ai-pinned' : ''"
     x-effect="_applyDrawerScrollLock(drawerHost, drawerItem, drawerNode, aiSidebarOpen, aiSidebarPinned, drawerApp, drawerAppHost)">

  <!-- Backend-unreachable offline banner. Thin sticky strip at the very
       top of the viewport; slides in after `backendUnreachable` flips true,
       gated by the `tuning_backend_unreachable_threshold_seconds` TUNABLE
       (default 30s of silence from both SSE + REST; 0 disables). Auto-hides
       on the next successful backend signal. role=alert + aria-live so
       screen readers announce the transition; aria-hidden on the icon so it
       isn't announced twice. -->
  <div x-show="backendUnreachable"
       x-transition.opacity.duration.200ms
       role="alert"
       aria-live="assertive"
       class="backend-offline-banner">
    <svg width="14" height="14" aria-hidden="true">
      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-alert-triangle"/>
    </svg>
    <span x-text="t('app.backend_offline_banner.message')"></span>
  </div>

  <!-- ================== TOPBAR ================== -->
  <!-- On mobile (<sm), the <header> itself becomes a flex-wrap container
       so the utility-belt items (SYNC picker, theme, hotkeys, language)
       can be reordered via Tailwind `order-` classes alongside row 1's
       items. The two row wrappers below get `display: contents` on
       mobile so their children flow directly into the <header> flex
       (otherwise row 2 stacks below row 1 visually with the page
       search bar between them — operator's specific complaint). On
       desktop (sm+), <header> reverts to block + each row is its
       own flex-wrap container with the original border-top divider. -->
  <header class="sticky top-0 z-30 bg-[var(--surface)]/95 backdrop-blur border-b border-[var(--border)] flex flex-wrap items-center gap-3 px-3 py-2.5 sm:block sm:gap-0 sm:p-0">
    <!-- Row 1 — primary nav. Wraps on narrow viewports (was a single
         no-wrap row that pushed the page horizontally on phones, per
         operator's iPhone 17 Pro screenshot). flex-wrap + min-w-0 on
         every flexible child means nothing overflows; tablet+ still
         renders single-row because there's room. The search input
         drops to its own row on mobile via order classes. On mobile,
         this wrapper is `display: contents` so its children flow into
         the <header> flex above. -->
    <div class="topbar-row1 contents sm:flex sm:items-center sm:gap-4 sm:px-5 sm:py-2.5 sm:max-w-full sm:mx-auto sm:flex-wrap">
      <div class="flex items-center gap-2 sm:pe-4 sm:me-1 sm:border-e sm:border-[var(--border)] min-w-0">
        <div class="app-logo">
          <!-- OmniGrid hub-and-spokes mark. Mirrors the favicon + omnigrid.png
               (see static/img/logo/omnigrid.svg). Centre node emphasised,
               8 outer nodes with a low-opacity mesh connecting them. -->
          <svg width="16" height="16" viewBox="0 0 32 32">
            <g stroke="white" stroke-opacity="0.45" stroke-width="1.2" stroke-linecap="round">
              <line x1="8" y1="16" x2="24" y2="16"/>
              <line x1="16" y1="8" x2="16" y2="24"/>
              <line x1="8" y1="8" x2="24" y2="24"/>
              <line x1="24" y1="8" x2="8" y2="24"/>
            </g>
            <g fill="white">
              <circle cx="8" cy="8" r="1.8"/>
              <circle cx="24" cy="8" r="1.8"/>
              <circle cx="8" cy="24" r="1.8"/>
              <circle cx="24" cy="24" r="1.8"/>
              <circle cx="16" cy="8" r="2"/>
              <circle cx="16" cy="24" r="2"/>
              <circle cx="8" cy="16" r="2"/>
              <circle cx="24" cy="16" r="2"/>
              <circle cx="16" cy="16" r="3.2"/>
            </g>
          </svg>
        </div>
        <div class="min-w-0">
          <div class="font-semibold fs-lg leading-tight tracking-tight truncate" x-text="t('app.name')"></div>
          <!-- Tagline hidden on phone — saves a row of vertical real
               estate where the topbar was already crowded. -->
          <div class="fs-2xs text-[var(--text-faint)] leading-tight hidden sm:block" x-text="t('app.tagline')"></div>
        </div>
      </div>

      <nav class="flex items-center gap-0.5 flex-wrap">
        <!-- Loop variable is `nav` not `t` because the global i18n
             helper is also named `t()` — using `t` as the iteration
             variable would shadow it inside this scope and the
             `t('nav.stacks_updates_title', ...)` call below would
             throw "t is not a function". -->
        <template x-for="nav in navItems()" :key="nav[0]">
          <button type="button" @click="view=nav[0]"
                  :class="view===nav[0] ? 'text-[var(--text)] bg-[var(--surface-2)]' : 'text-[var(--text-dim)] hover:text-[var(--text)]'"
                  :title="nav[0]==='stacks' && counts.update > 0 ? t('nav.stacks_updates_title', { count: counts.update }) : nav[1]"
                  class="px-2 sm:px-3 py-1.5 rounded-md fs-md font-medium transition flex items-center gap-1.5 relative cursor-pointer">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 x-html="navIcon(nav[0])"></svg>
            <!-- Label hidden on mobile (icon-only nav). Tooltip via :title
                 still surfaces the name on long-press. -->
            <span x-text="nav[1]" class="hidden sm:inline"></span>
            <!-- Pending-updates badge — only on the Stacks nav so it's
                 not redundant with Services / Nodes (they're alternate
                 views over the same items, the count would just repeat).
                 Wired off `counts.update` which is recomputed on every
                 /api/items refresh; the ops-polling loop calls
                 refresh(true) when an update op completes, so the badge
                 falls back to 0 once the deploy lands without any
                 manual wiring here. -->
            <span x-show="nav[0]==='stacks' && counts.update > 0"
                  class="nav-update-badge"
                  x-text="counts.update"></span>
            <!-- Offline / down-services counter — fires when one or
                 more services / containers are reporting health=offline
                 (replicas running == 0 OR desired == 0). Same visual
                 footprint as the amber update badge but red so the
                 operator's attention lands on actionable failures
                 first. Lives on the Services nav ONLY — the Stacks
                 nav is reserved for the amber updates counter; one
                 metric per nav button keeps the visual contract clean
                 (red = failures live here, amber = update work lives
                 there). The two views surface the same items, so
                 splitting the metrics across the two navs makes the
                 nav buttons orthogonal at-a-glance signals. -->
            <span x-show="nav[0]==='services' && counts.offline > 0"
                  class="nav-offline-badge"
                  :title="t('nav.offline_title', { count: counts.offline }) || (counts.offline + ' offline service(s)')"
                  x-text="counts.offline"></span>
            <!-- Down-host counter — the Hosts-nav twin of the Services
                 offline badge. Counts curated hosts in a RED status
                 (down / unknown) via hostsDownCount(); same red footprint
                 so actionable host failures land at a glance. The count is
                 primed once on boot + kept live by the Hosts poll / SSE
                 failure-state events. -->
            <span x-show="nav[0]==='hosts' && hostsDownCount() > 0"
                  class="nav-offline-badge"
                  :title="t('nav.hosts_down_title', { count: hostsDownCount() }) || (hostsDownCount() + ' host(s) down')"
                  x-text="hostsDownCount()"></span>
          </button>
        </template>
      </nav>

      <!-- Search input — full width below sm: (drops to its own row via
           flex-wrap order class), constrained to max-w-md on tablet+. -->
      <div class="relative w-full order-last sm:order-none sm:flex-1 sm:max-w-md sm:w-auto">
        <!-- LOW-A11Y / visually-hidden label for screen readers.
             The placeholder alone is a UA-dependent fallback and not
             every reader announces it consistently. -->
        <label for="topbar-search" class="sr-only" x-text="t('topbar.search_label')"></label>
        <input type="search" id="topbar-search" x-model="search" x-ref="searchBox"
               :placeholder="t('topbar.search_placeholder')"
               class="w-full">
        <span class="absolute start-3 top-1/2 -translate-y-1/2 text-[var(--text-faint)]">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
        </span>
        <button type="button" x-show="search" @click="search=''"
                :aria-label="t('actions.clear_search') || 'Clear search'"
                class="absolute end-3 top-1/2 -translate-y-1/2 text-[var(--text-faint)] hover:text-[var(--text)] cursor-pointer text-xs bg-transparent border-0 p-0">✕
        </button>
      </div>

      <!-- Row-1 right cluster — only navigation-critical actions ride
           here: admin-only cleanup pill, deploy-watcher pill, refresh
           button, and the always-visible clock + weather widget. The
           "utility belt" (sync / stats / theme / hotkeys / lang) moved
           to the second row below so the primary row stays readable at
           narrow desktop widths (was 14 controls; now 4 + widget). -->
      <!-- Action cluster (cleanup / refresh / deploy-watcher). Hidden
           entirely on mobile — these buttons are admin-rare or covered
           by auto-refresh + user-menu nav, and on a phone they kept
           orphaning to their own wrap-row regardless of order class.
           Desktop unchanged. -->
      <div class="hidden sm:flex items-center gap-2 sm:order-none">
        <button type="button" x-show="isAdmin() && removableAll().length > 0"
                @click="bulkRemoveAll()"
                class="btn btn-danger-outline"
                :title="t('topbar.cleanup_title', { count: removableAll().length })">
          <svg width="13" height="13" stroke-width="2.2" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash"/>
          </svg>
          <span class="fs-xs"><span x-text="t('actions.cleanup')"></span> <span x-text="removableAll().length"></span></span>
        </button>
        <!-- Refresh button hidden on mobile — auto-refresh + browser
             pull-to-refresh handle the manual case, and showing it
             alone on its own wrap-row read as orphaned (operator
             flag). The user-menu's Settings / Admin / etc. covers
             other navigation. -->
        <!-- Context-aware manual refresh. Hosts view → refreshes the
             curated host list + per-host probes (`loadHosts`); every
             other view → forces an items re-gather (`refresh`). The
             spinner gates on whichever loading flag matches the
             active view so the icon only spins when THAT view's fetch
             is in flight, AND the label flips Refresh → Refreshing…
             so the operator sees ACTION feedback (operator preference:
             matches the previous Hosts-toolbar version's nicer style
             over the prior icon-only consolidation). Ghost button +
             gap-1.5 + label flip mirrors the old Hosts-toolbar shape
             that operators preferred. -->
        <button type="button" @click="view==='hosts' ? loadHosts() : refresh(true)"
                :disabled="view==='hosts' ? hostsLoading : loading"
                class="btn btn-ghost fs-sm hidden sm:inline-flex items-center gap-1.5"
                :title="t('topbar.refresh_title')">
          <!-- Spinner icon tracks ONLY foreground fetches in flight
               (loading / hostsLoading). The earlier
               cacheRefreshing / hubProbing / statsRefreshing trio fed
               into this gate too, but on busy fleets the background
               _gather can routinely take longer than the auto-refresh
               cadence, so a task is essentially always in flight and
               the spinner never settled. Background-gather state still
               flows through the response flags for diagnostic surfaces
               (per-row hints, debug panel) — it just doesn't drive the
               topbar spinner anymore. -->
          <svg width="13" height="13" aria-hidden="true"
               :class="((view==='hosts' ? hostsLoading : loading)) ? 'spin-md' : ''">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-cw"/>
          </svg>
          <span x-show="!(view==='hosts' ? hostsLoading : loading)" x-text="t('actions.refresh')"></span>
          <span x-show="view==='hosts' ? hostsLoading : loading" x-text="t('actions.refreshing')"></span>
        </button>
        <!-- Background-gather indicator was a separate pill next to
             this Refresh button; it collided visually with the button
             and confused operators. Signal now folds into the SSE
             pill on the right (`sse-pill--refreshing`) so a single
             control surface shows both connection state AND
             background-refresh activity. -->
        <!-- Deploy watcher — only visible when /api/version returns a
             string different from the one captured at page boot.
             Hard-reloads with a cache-busting query param so the new
             HTML + asset cache-bust tokens take effect. -->
        <button type="button" x-show="newVersionAvailable"
                @click="reloadForNewVersion()"
                class="btn btn-primary fs-xs flex items-center gap-1.5 animate-pulse"
                :title="t('topbar_extra.new_version_title', { version: newVersionString })">
          <svg width="12" height="12" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
          </svg>
          <span x-text="t('topbar_extra.new_version')"></span>
        </button>
      </div>

      <!-- RIGHT-EDGE PAIR — wraps clock+weather AND user-menu in a
           single flex cluster that's anchored to the right via a
           lone `ms-auto`. Using a SINGLE ms-auto here (on the outer
           wrapper) avoids the "two ms-auto elements split the free
           space" trap where clock+weather drifts to mid-header
           instead of hugging the avatar. Inside the wrapper the
           two children flow naturally with `gap-2`, so clock+weather
           sits immediately to the left of the user-avatar. -->
      <!-- Right-edge wrapper. On sm+ it's a real flex-row anchored
           right via `ms-auto`, holding clock+weather IMMEDIATELY to
           the left of the user avatar (the original desktop layout).
           On mobile, `display: contents` makes the wrapper transparent
           so its children become direct children of the topbar's flex,
           letting us reorder via Tailwind order classes:
             - avatar lifts UP onto row 1 with logo + nav (order-2)
             - clock + weather take their own full-width row 2 (order-3)
           Operator request: "make avatar go up, then make weather and
           clock use space below it". -->
      <div class="contents sm:flex sm:items-center sm:gap-2 sm:ms-auto">
        <!-- Topbar clock + weather — per-browser prefs from localStorage
             (configured under Profile). Clock ticks every 10s; weather
             via /api/weather proxy (Open-Meteo, 10-min server cache).
             Widget is single row: clock mono font · cloud icon · label,
             temp · condition subtext. Absent / disabled = nothing renders.
             On mobile: `order-3 w-full` drops it to its own row below
             the avatar; `justify-center` centers the clock+weather pair
             so they don't hug the left edge awkwardly. -->
        <div x-show="headerClockEnabled || (headerWeatherEnabled && weather && !weather.error && weather.temp_c != null)"
             class="flex items-center gap-2 pe-1 fs-xs text-[var(--text-dim)] order-3 w-full justify-end sm:order-none sm:w-auto sm:justify-start">
          <span x-show="headerClockEnabled" class="mono font-semibold tracking-wide"
                x-text="currentClock"></span>
          <template x-if="headerWeatherEnabled && weather && !weather.error && weather.temp_c != null">
            <div class="flex items-center gap-1.5">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" x-html="weatherIconPath(weather.icon)"></svg>
              <div class="flex flex-col leading-tight">
                <span>
                  <span x-show="weather.label" x-text="weather.label + ', '"></span>
                  <span x-text="formatTempPref(weather.temp_c, 1)"></span>
                </span>
                <span class="fs-2xs text-[var(--text-faint)]" x-text="weather.condition"></span>
              </div>
            </div>
          </template>
        </div>

        <!-- User menu — avatar button in the top-right opens a dropdown with
             "Signed in as …" header + profile / settings / admin / help /
             sign out. Click-outside and Esc both close it. Sits adjacent
             to the clock/weather widget above — no `ms-auto` needed, the
             wrapper handles right-anchoring for the whole pair.
             On mobile (parent's `display: contents`): `order-2 ms-auto`
             lifts the avatar up to row 1 with logo + nav, anchored to the
             far right. The `border-s` separator is hidden below sm: since
             there's no clock to its left to need separating from. -->
        <div x-show="me" x-data="{ }" class="relative sm:ps-3 sm:border-s sm:border-[var(--border)] order-2 ms-auto sm:order-none sm:ms-0">
          <button type="button" @click="userMenuOpen = !userMenuOpen"
                  class="flex items-center gap-1 p-1 rounded-full hover:bg-[var(--surface-2)] transition"
                  :title="me ? t('app.signed_in_as_user', { username: me.username }) : ''"
                  :aria-expanded="userMenuOpen">
            <!-- Wrapper provides the positioning anchor for the unread
               badge. Pre-fix the badge lived INSIDE `.user-avatar` and
               got clipped by its `overflow: hidden` (which keeps the
               uploaded avatar image inside the circular boundary) so
               operators saw only a small sliver of the badge in the
               corner. Moving the badge OUTSIDE the avatar — but inside
               this `relative` wrapper — keeps the image clip behaviour
               while letting the badge render in full above the circle. -->
            <span class="relative">
            <span class="user-avatar" :style="'--avatar-hue:' + avatarHue()">
              <!-- User-uploaded image takes priority. Falls back to the
                   hue+initial generated avatar when no upload exists or
                   when the upload 404s (e.g. file deleted out-of-band). -->
              <template x-if="me && me.avatar_url">
                <img :src="me.avatar_url" alt="" class="user-avatar-img"
                     @error="me.avatar_url = null">
              </template>
              <template x-if="!(me && me.avatar_url)">
                <span x-text="initial()"></span>
              </template>
            </span>
              <!-- Unread-notifications badge. Shows the count
                 (capped at 99+) when any notifications are unread.
                 Hidden entirely at 0 — operators don't want a "0" pill
                 cluttering the avatar. ARIA label is i18n-driven so
                 screen-reader output stays translatable. -->
            <span class="user-avatar-badge"
                  x-show="(notificationsUnread || 0) > 0"
                  :aria-label="t('avatar.unread_badge_aria', { count: notificationsUnread })"
                  x-text="(notificationsUnread > 99) ? '99+' : notificationsUnread"></span>
          </span>
            <svg width="10" height="10" stroke-width="2.5" aria-hidden="true"
                 class="text-[var(--text-dim)]" :class="userMenuOpen && 'rotate-180'">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-down"/>
            </svg>
          </button>

          <!-- Dropdown -->
          <div x-show="userMenuOpen" @click.outside="userMenuOpen = false"
               @keydown.escape.window="userMenuOpen = false"
               x-transition.opacity
               class="absolute end-0 top-full mt-1 w-[220px] bg-[var(--surface)] border border-[var(--border)] rounded-md shadow-lg z-40 overflow-hidden">
            <div class="px-3 py-2 border-b border-[var(--border)] fs-3xs uppercase tracking-wider text-[var(--text-faint)]">
              <span x-text="t('app.signed_in_as')"></span> <span class="text-[var(--text-dim)] font-semibold normal-case" x-text="me && me.username"></span>
            </div>
            <button type="button" @click="userMenuOpen=false; view='settings'; settingsSection='profile'" class="user-menu-item">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <span x-text="t('user_menu.profile')"></span>
            </button>
            <!-- In-app notifications. Same row treatment as the
               other menu items + an inline unread chip on the right
               so the operator sees the count without leaving the
               dropdown. The chip is hidden at 0 so a clean state
               doesn't look like dead UI. -->
            <button type="button" @click="userMenuOpen=false; openNotificationsPopup()" class="user-menu-item user-menu-item-with-badge">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
              </svg>
              <span x-text="t('nav.notifications')"></span>
              <span class="user-menu-item-badge" x-show="(notificationsUnread || 0) > 0"
                    x-text="(notificationsUnread > 99) ? '99+' : notificationsUnread"></span>
            </button>
            <button type="button" @click="userMenuOpen=false; view='settings'" class="user-menu-item">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
              <span x-text="t('user_menu.settings')"></span>
            </button>
            <button type="button" x-show="isAdmin()" @click="userMenuOpen=false; view='admin'" class="user-menu-item">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
              <span x-text="t('user_menu.admin')"></span>
            </button>
            <button type="button" x-show="isAdmin()" @click="userMenuOpen=false; openStatsTab('dashboard')" class="user-menu-item">
              <svg width="14" height="14" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-activity"/>
              </svg>
              <span x-text="t('user_menu.stats')"></span>
            </button>
            <button type="button" @click="userMenuOpen=false; showHotkeys=true" class="user-menu-item">
              <svg width="14" height="14" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
              </svg>
              <span x-text="t('user_menu.hotkeys')"></span>
            </button>
            <div class="border-t border-[var(--border)]"></div>
            <button type="button" @click="userMenuOpen=false; logout()" class="user-menu-item user-menu-item-danger">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              <span x-text="t('user_menu.sign_out')"></span>
            </button>
          </div>
        </div>
      </div><!-- /right-edge pair wrapper -->
    </div>

    <!-- ROW 2 — utility belt. Controls that sit here are background
         polling cadences + once-a-session preferences: sync / stats
         intervals on the left, cache-age label + theme + hotkeys +
         language picker on the right. Clock + weather stay on row 1
         (always-visible status per operator preference, 2026-04-25).
         On mobile: `display: contents` so children flow into the
         <header> flex (each child carries `order-5` so they slot
         between clock+weather and the search input). On desktop:
         restores the flex row with border-top divider. -->
    <div class="contents sm:flex sm:items-center sm:gap-2 sm:px-5 sm:py-1.5 sm:max-w-full sm:mx-auto sm:border-t sm:border-[var(--border)] sm:flex-wrap">
      <!-- Unified refresh-cadence picker. Replaces the SYNC +
           STATS pair. ONE control with FIVE choices: "Live" (push via
           SSE — `refreshInterval = -1`) OR a polling cadence
           (Off / 30s / 1m / 5m). When Live is selected the SSE pipe
           drives every chart and the polling timers idle (modulo a 5
           min safety net). When a cadence is selected SSE stays
           connected for ops/event toasts but polling at the chosen
           cadence drives every graph + indicator uniformly. The
           picker is ALWAYS visible so operators have a single,
           discoverable control over the dashboard's heartbeat —
           previous version hid the bar after SSE connected which
           operators reported as "the bar disappears".
           `w-full sm:w-auto` keeps the mobile-row wrap behaviour. -->
      <!-- Refresh-interval picker — delegates to the shared
           `og-range-picker` component. The Live chip carries the
           per-option overrides (green dot + --success background)
           that the shared template supports via `dotColor` /
           `activeBg` / `activeText`. Decorative "REFRESH" label
           passed via `rpLeadingLabel`. Responsive width utilities
           passed via `rpExtraClass`. ARIA + arrow-key contract
           comes from the shared component for free. -->
      <div x-data="{
             rpOptions: [
               { value: -1,  label: t('topbar.refresh_live'), title: t('topbar.refresh_live_title'),
                 dotColor: 'var(--success)', activeBg: 'bg-[var(--success)]',
                 activeText: 'text-[var(--text-on-success)]' },
               { value: 0,   label: t('topbar.off') },
               { value: 30,  label: t('topbar.refresh_30s') },
               { value: 60,  label: t('topbar.refresh_1m') },
               { value: 300, label: t('topbar.refresh_5m') }
             ],
             get rpCurrent() { return refreshInterval; },
             rpOnChange: (v) => setRefreshInterval(v),
             rpAriaLabel: t('topbar.refresh_picker_label'),
             rpTitle: t('topbar.refresh_picker_title'),
             rpLeadingLabel: t('topbar.refresh_label'),
             rpExtraClass: 'order-5 sm:order-none w-full sm:w-auto'
           }">
        <!-- INCLUDE: _components/og-range-picker.html -->
      </div>
      <span class="hidden sm:inline flex-1"></span>
      <!-- Connection-state pill. Mirrors the picker's chosen
           mode and shows real-time activity:
             • Refreshing (any background gather / hub-probe / stats
               refresh in flight) → GREEN pill + spinner. Wins over
               every other state so operators always see "data is
               coming in" regardless of mode.
             • Live (SSE on, healthy)         → green dot, label "Live"
             • Live (SSE reconnecting)        → amber pulse,  label "Live"
             • Off                            → grey dot,    label "Off"
             • Polling, idle (between ticks)  → grey dot,    label "Polling"
             • Polling, fetch in flight       → green flash, label "Polling"
           The flash brackets the actual network round-trip via
           `_pollStart()` / `_pollEnd()` so operators see a green
           strobe on every interval tick. -->
      <div class="sse-pill order-4 sm:order-none"
           :class="(cacheRefreshing || hubProbing || statsRefreshing)
                     ? 'sse-pill--refreshing'
                     : refreshInterval === -1
                       ? (_sseConnected ? 'sse-pill--live'
                          : (sseStatusKey() === 'events.reconnecting_title' ? 'sse-pill--reconnecting' : 'sse-pill--fallback'))
                       : refreshInterval === 0
                         ? 'sse-pill--off'
                         : (_pollFlashing ? 'sse-pill--polling-active' : 'sse-pill--polling-idle')"
           :title="(cacheRefreshing || hubProbing || statsRefreshing) ? t('events.refreshing_title')
                   : refreshInterval === -1 ? t(sseStatusKey())
                   : refreshInterval === 0 ? t('events.off_title')
                   : t('events.polling_interval_title', { seconds: refreshInterval })">
        <span class="sse-pill-dot" aria-hidden="true"></span>
        <span class="sse-pill-label"
              x-text="refreshInterval === -1 ? t('events.live_label')
                      : refreshInterval === 0 ? t('events.off_label')
                      : t('events.polling_label')"></span>
      </div>
      <!-- events-dropped counter chip. Hidden when count is 0;
           renders a small amber chip alongside the SSE pill when the
           bus has dropped events for this tab (fired from the
           `:overflow` SSE handler). One-glance signal that the bus is
           overwhelmed; the per-overflow toast is the in-the-
           moment alert, this chip is the running tally. -->
      <div class="sse-drops-pill order-4 sm:order-none"
           x-show="_sseDropped > 0"
           :title="t('events.dropped_title', { count: _sseDropped })">
        <svg width="12" height="12" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-alert-triangle"/>
        </svg>
        <span x-text="t('events.dropped_label', { count: _sseDropped })"></span>
      </div>
      <!-- Multi-tab activity pill. Shows when ≥ 1
           sibling tab is open. Click to expand a popover listing each
           tab's location with click-to-focus via BroadcastChannel.
           Hidden when only this tab is open (no value in showing
           "1 tab"). Operator can hide entirely via Settings → Profile
           → `topbar_show_tabs_widget` (default on). -->
      <div class="tabs-pill order-4 sm:order-none"
           x-show="tabActivityCount() > 0 && (!me || !me.ui_prefs || me.ui_prefs.topbar_show_tabs_widget !== false)"
           x-data="{ open: false }"
           @click.outside="open = false"
           :title="t('topbar.tabs.title', { count: tabActivityCount() + 1, siblings: tabActivityCount() })">
        <button type="button"
                @click="open = !open"
                class="tabs-pill-btn"
                :aria-expanded="open ? 'true' : 'false'"
                :aria-label="t('topbar.tabs.aria', { count: tabActivityCount() + 1 })">
          <svg width="12" height="12" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-layers"/>
          </svg>
          <span x-text="t('topbar.tabs.label', { count: tabActivityCount() + 1 })"></span>
        </button>
        <!-- Popover — sibling tab list. Newest tab first. Click a row
             to focus that tab via BroadcastChannel. Closing the
             popover doesn't close the tabs themselves. -->
        <div class="tabs-pill-popover" x-show="open" x-cloak>
          <div class="tabs-pill-header" x-text="t('topbar.tabs.popover_title')"></div>
          <template x-for="tab in tabActivityList()" :key="tab.client_id">
            <div class="tabs-pill-row-wrap">
              <button type="button"
                      @click="focusTabByClientId(tab.client_id); open = false"
                      class="tabs-pill-row"
                      :title="t('topbar.tabs.row_focus_title')">
                <div class="tabs-pill-row-title" x-text="tab.title || tab.view || '—'"></div>
                <!-- Device chip: form-factor emoji + platform · browser.
                     Backend parses the request's User-Agent header at
                     heartbeat time and stamps `tab.device` so operators
                     can tell which machine the OTHER tab is on without
                     scrolling. Tooltip carries the raw UA string for
                     two-laptop disambiguation. Hidden when the source
                     tab is from a pre-fix client that doesn't carry the
                     `device` block yet. -->
                <div x-show="tab.device && tab.device.platform"
                     class="tabs-pill-row-device fs-3xs text-[var(--text-faint)]"
                     :title="tab.device && tab.device.ua ? tab.device.ua : ''">
                  <span x-text="_tabActivityDeviceEmoji(tab.device)"></span>
                  <span x-text="_tabActivityDeviceLabel(tab.device)"></span>
                </div>
                <!-- Rich label: filter chip state + selection count
                     summary. Only renders when the source tab actually
                     had filters or a selection active so quiet rows
                     stay one-line. -->
                <div x-show="tab.rich_label"
                     class="tabs-pill-row-rich fs-3xs text-[var(--text-faint)]"
                     x-text="tab.rich_label"></div>
                <div class="tabs-pill-row-meta">
                  <span x-show="tab.actor" x-text="tab.actor"></span>
                  <span x-show="tab.ts"
                        class="tabs-pill-row-age"
                        x-text="(function(){
                          const s = Math.max(0, Math.round((Date.now() - Number(tab.ts || 0) * 1000) / 1000));
                          if (s < 60) return s + 's';
                          if (s < 3600) return Math.round(s / 60) + 'm';
                          return Math.round(s / 3600) + 'h';
                        })()"></span>
                </div>
              </button>
              <!-- "Reproduce here" button — copies the OTHER tab's
                   filter / drawer / sub-tab state into the CURRENT
                   tab. Surfaces only when the source tab has rich
                   state worth mirroring (else the action is a no-op).
                   Sibling button vs nested so the click doesn't
                   bubble into the focus action. -->
              <button type="button"
                      x-show="tab.rich_label"
                      @click.stop="reproduceTabHere(tab); open = false"
                      class="tabs-pill-row-reproduce fs-3xs"
                      :title="t('topbar.tabs.row_reproduce_title')"
                      :aria-label="t('topbar.tabs.row_reproduce_title')"
                      x-text="t('topbar.tabs.row_reproduce_button')"></button>
            </div>
          </template>
          <div x-show="!tabActivityList().length"
               class="tabs-pill-empty"
               x-text="t('topbar.tabs.popover_empty')"></div>
        </div>
      </div>
      <!-- Theme + Hotkeys — small icon buttons. On mobile they live at
           order-4 alongside the language picker so they don't get
           shoved to a new row by the wide SYNC/STATS pills below. -->
      <button type="button" @click="cycleTheme()" :title="t('topbar.theme_title', { pref: themePref })" class="btn btn-soft order-4 sm:order-none">
        <!-- Moon for dark, sun for light, split-circle for auto. All
             three reference shared <symbol> defs in static/img/ui-sprite.svg
             so the topbar stays terse and the icons match the rest of
             the UI iconography convention. -->
        <template x-if="themePref==='dark'">
          <svg width="13" height="13" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-theme-moon"/>
          </svg>
        </template>
        <template x-if="themePref==='light'">
          <svg width="13" height="13" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-theme-sun"/>
          </svg>
        </template>
        <template x-if="themePref==='auto'">
          <svg width="13" height="13" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-theme-auto"/>
          </svg>
        </template>
      </button>
      <button type="button" @click="showHotkeys=true" class="btn btn-soft order-4 sm:order-none" :title="t('topbar.hotkeys_title')">
        <svg width="13" height="13" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
        </svg>
      </button>
      <!-- Language picker. Compact <select> — the richer UI lives in
           Settings → Language. Rendered from I18N.languages which is
           populated from /i18n/index.json at boot. -->
      <!-- Language picker — `order-4` on mobile so it appears BEFORE
           the SYNC range row (order-5), per operator preference.
           Desktop unchanged. -->
      <select :value="lang" @change="setLang($event.target.value)"
              class="lang-picker fs-xs order-4 sm:order-none"
              :title="t('settings.language.label')">
        <template x-for="l in availableLanguages" :key="l.code">
          <option :value="l.code" x-text="l.name"></option>
        </template>
      </select>
    </div>

    <!-- FILTER BAR — only on Stacks / Services / Nodes views. On mobile
         the parent <header> is `flex flex-wrap`, and without an explicit
         `order-*` class this bar inherits order:0 and interleaves with
         logo+nav (which also have no order class), pushing the rest of
         the topbar around. `order-6 w-full` parks it on its own row
         BELOW the SYNC/STATS pickers (order-5) and ABOVE the search
         input (order-last). Desktop unchanged via `sm:order-none`. -->
    <div x-show="view==='stacks' || view==='services' || view==='nodes'" class="px-5 pb-3 max-w-full mx-auto w-full flex items-center gap-2 flex-wrap order-6 sm:order-none">
      <div class="flex items-center gap-1.5 flex-wrap"
           role="radiogroup"
           :aria-label="t('filters.health_group_label')"
           @keydown="_radiogroupArrowKey($event)">
        <button type="button" @click="healthFilter='';statusFilter=''"
                role="radio"
                :aria-checked="!healthFilter && !statusFilter"
                :tabindex="(!healthFilter && !statusFilter) ? 0 : -1"
                :class="(!healthFilter && !statusFilter) ? 'active' : ''"
                class="filter-chip"><span x-text="t('filters.all')"></span> <span class="count" x-text="items.length"></span></button>
        <button type="button" @click="healthFilter='healthy';statusFilter=''"
                role="radio"
                :aria-checked="healthFilter==='healthy'"
                :tabindex="healthFilter==='healthy' ? 0 : -1"
                :class="healthFilter==='healthy' ? 'active' : ''"
                class="filter-chip"><span class="dot dot-healthy inline-block me-1.5"></span><span x-text="t('filters.online')"></span> <span class="count" x-text="counts.healthy"></span></button>
        <button type="button" @click="healthFilter='degraded';statusFilter=''"
                role="radio"
                :aria-checked="healthFilter==='degraded'"
                :tabindex="healthFilter==='degraded' ? 0 : -1"
                :class="healthFilter==='degraded' ? 'active' : ''"
                class="filter-chip"><span class="dot dot-degraded inline-block me-1.5"></span><span x-text="t('filters.degraded')"></span> <span class="count" x-text="counts.degraded"></span></button>
        <button type="button" @click="healthFilter='offline';statusFilter=''"
                role="radio"
                :aria-checked="healthFilter==='offline'"
                :tabindex="healthFilter==='offline' ? 0 : -1"
                :class="healthFilter==='offline' ? 'active' : ''"
                class="filter-chip"><span class="dot dot-offline inline-block me-1.5"></span><span x-text="t('filters.offline')"></span> <span class="count" x-text="counts.offline"></span></button>
      </div>

      <!-- Vertical divider between health-group and status-group filter
           chips. Hidden below sm: because when chips wrap to multiple
           rows on mobile, the divider gets stranded on its own line.
           Natural row break already separates the two groups visually. -->
      <span class="hidden sm:inline-block w-px h-5 bg-[var(--border)] mx-1"></span>

      <div class="flex items-center gap-1.5 flex-wrap"
           role="radiogroup"
           :aria-label="t('filters.status_group_label')"
           @keydown="_radiogroupArrowKey($event)">
        <button type="button" @click="statusFilter='update';healthFilter=''"
                role="radio"
                :aria-checked="statusFilter==='update'"
                :tabindex="statusFilter==='update' ? 0 : -1"
                :class="statusFilter==='update' ? 'active' : ''"
                class="filter-chip"><span class="dot dot-update inline-block me-1.5"></span><span x-text="t('filters.updates')"></span> <span class="count" x-text="counts.update"></span></button>
        <button type="button" @click="statusFilter='up-to-date';healthFilter=''"
                role="radio"
                :aria-checked="statusFilter==='up-to-date'"
                :tabindex="statusFilter==='up-to-date' ? 0 : -1"
                :class="statusFilter==='up-to-date' ? 'active' : ''"
                class="filter-chip"><span x-text="t('filters.uptodate')"></span> <span class="count" x-text="counts.uptodate"></span></button>
        <button type="button" @click="statusFilter='error';healthFilter=''"
                role="radio"
                :aria-checked="statusFilter==='error'"
                :tabindex="statusFilter==='error' ? 0 : -1"
                :class="statusFilter==='error' ? 'active' : ''"
                class="filter-chip"><span class="dot dot-error inline-block me-1.5"></span><span x-text="t('filters.errors')"></span> <span class="count" x-text="counts.error"></span></button>
        <button type="button" @click="statusFilter='unknown';healthFilter=''"
                role="radio"
                :aria-checked="statusFilter==='unknown'"
                :tabindex="statusFilter==='unknown' ? 0 : -1"
                :class="statusFilter==='unknown' ? 'active' : ''"
                class="filter-chip"><span x-text="t('filters.unknown')"></span> <span class="count" x-text="counts.unknown"></span></button>
        <button type="button" @click="statusFilter='ignored';healthFilter=''"
                role="radio"
                :aria-checked="statusFilter==='ignored'"
                :tabindex="statusFilter==='ignored' ? 0 : -1"
                :class="statusFilter==='ignored' ? 'active' : ''"
                class="filter-chip"><span x-text="t('filters.ignored')"></span> <span class="count" x-text="counts.ignored"></span></button>
      </div>

      <div class="flex-1"></div>

      <!-- Expand / collapse toolbar — shown for any view that groups
           into collapsible rows. Click handlers delegate to the
           per-view method (stacks / nodes / hosts) so each keeps its
           own state bucket. -->
      <div x-show="view==='stacks' || view==='nodes' || view==='hosts'"
           class="flex items-center gap-1 bg-[var(--surface-2)] rounded-md p-0.5 border border-[var(--border)]"
           :title="t('filters.expand_collapse_title')">
        <button type="button" @click="view==='stacks' ? expandAllStacks() : view==='nodes' ? expandAllNodes() : expandAllHosts()"
                class="px-2.5 py-1 rounded fs-xs font-medium text-[var(--text-dim)] hover:text-[var(--text)] transition flex items-center gap-1.5">
          <svg width="10" height="10" stroke-width="2.4" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-down"/>
          </svg>
          <span x-text="t('filters.expand_all')"></span>
        </button>
        <button type="button" @click="view==='stacks' ? collapseAllStacks() : view==='nodes' ? collapseAllNodes() : collapseAllHosts()"
                class="px-2.5 py-1 rounded fs-xs font-medium text-[var(--text-dim)] hover:text-[var(--text)] transition flex items-center gap-1.5">
          <svg width="10" height="10" stroke-width="2.4" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-up"/>
          </svg>
          <span x-text="t('filters.collapse_all')"></span>
        </button>
      </div>

      <div class="flex items-center gap-1 bg-[var(--surface-2)] rounded-md p-0.5 border border-[var(--border)]">
        <button type="button" @click="view='stacks'" :class="view==='stacks' ? 'bg-[var(--surface)] text-[var(--text)]' : 'text-[var(--text-dim)]'"
                class="px-2.5 py-1 rounded fs-xs font-medium transition" x-text="t('filters.grouped')"></button>
        <button type="button" @click="view='services'" :class="view==='services' ? 'bg-[var(--surface)] text-[var(--text)]' : 'text-[var(--text-dim)]'"
                class="px-2.5 py-1 rounded fs-xs font-medium transition" x-text="t('filters.list')"></button>
      </div>

      <div class="fs-xs text-[var(--text-faint)] flex items-center gap-3">
        <span x-show="activeOps.length>0" class="flex items-center gap-1 text-[var(--primary)]">
          <span class="dot dot-primary dot-pulse"></span>
          <span x-text="t('states.running', { count: activeOps.length })"></span>
        </span>
        <span x-text="t('filters.stacks_nodes', { stacks: stacks.length, nodes: Object.keys(nodes).length })"></span>
      </div>
    </div>
  </header>

  <!-- ================== MAIN ================== -->
  <!-- `id="main"` is the target of the skip-to-main-content link
       at the top of <body>. WCAG 2.4.1 ("Bypass Blocks") — keyboard
       users press Tab once, hit Enter on the now-visible skip link,
       and focus jumps here past the topbar's ~15 nav stops. The
       link's tabindex="-1" companion below makes the <main> itself
       focusable so screen-reader cursor lands inside, not just the
       URL fragment. -->
  <main id="main" tabindex="-1" class="flex-1 px-5 py-4 max-w-full mx-auto w-full">

    <!-- SESSION_SECRET auto-generated warning. Shown only to
         admins, only when the backend reports the boot-time auto-gen
         state, only when the operator hasn't dismissed it for this
         session. Dismissal is per-session (not per-deploy) so the
         banner reappears after a restart — that's the whole point,
         operators should be reminded each restart that sessions died. -->
    <div x-show="me && me.role === 'admin' && me.session_secret_auto && !sessionSecretWarningDismissed"
         class="rounded-md border border-[var(--warning)] bg-[color-mix(in_srgb,var(--warning)_10%,var(--surface))] px-4 py-2.5 mb-3 flex items-start gap-3 fs-sm">
      <svg width="16" height="16" class="text-[var(--warning)] flex-shrink-0 mt-0.5" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-alert-triangle"/>
      </svg>
      <div class="flex-1 min-w-0">
        <div class="font-semibold text-[var(--text)]" x-text="t('warnings.session_secret_auto.title')"></div>
        <div class="text-[var(--text-dim)] mt-0.5" x-text="t('warnings.session_secret_auto.body')"></div>
      </div>
      <button type="button" @click="dismissSessionSecretWarning()"
              class="btn btn-ghost fs-xs flex-shrink-0"
              :title="t('warnings.session_secret_auto.dismiss_title')"
              :aria-label="t('actions.close')">✕
      </button>
    </div>

    <!-- / Bootstrap-admin env vars still set in .env even
         though the users table is non-empty. Bootstrap path is now a
         no-op on every restart, but a wiped DB would silently re-seed
         from the env values + the password is sitting plaintext on
         disk. Same dismissable shape as the SESSION_SECRET banner. -->
    <div x-show="me && me.role === 'admin' && me.bootstrap_env_still_set && !bootstrapEnvWarningDismissed"
         class="rounded-md border border-[var(--warning)] bg-[color-mix(in_srgb,var(--warning)_10%,var(--surface))] px-4 py-2.5 mb-3 flex items-start gap-3 fs-sm">
      <svg width="16" height="16" class="text-[var(--warning)] flex-shrink-0 mt-0.5" aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-alert-triangle"/>
      </svg>
      <div class="flex-1 min-w-0">
        <div class="font-semibold text-[var(--text)]" x-text="t('warnings.bootstrap_env_still_set.title')"></div>
        <div class="text-[var(--text-dim)] mt-0.5" x-text="t('warnings.bootstrap_env_still_set.body')"></div>
      </div>
      <button type="button" @click="dismissBootstrapEnvWarning()"
              class="btn btn-ghost fs-xs flex-shrink-0"
              :title="t('warnings.bootstrap_env_still_set.dismiss_title')"
              :aria-label="t('actions.close')">✕
      </button>
    </div>

    <!-- BULK BAR — only shown to admins (readonly can select for inspection but not act). -->
    <div x-show="selected.length>0 && isAdmin()"
         class="sticky top-[108px] z-20 bg-[var(--surface)] border border-[var(--border-bright)] rounded-md px-4 py-2 flex items-center gap-3 mb-3 shadow-lg fade-in">
      <span class="font-semibold fs-md" x-text="t('bulk.selected', { count: selected.length })"></span>
      <span class="fs-xs text-[var(--text-faint)]"
            x-text="selectionSummary()"></span>
      <span class="flex-1"></span>
      <button type="button" x-show="selectionUpdatable().length > 0" @click="bulkUpdate()" class="btn btn-warning fs-sm">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
        <span x-text="t('bulk.update')"></span> (<span x-text="selectionUpdatable().length"></span>)
      </button>
      <button type="button" x-show="selectionRestartable().length > 0" @click="bulkRestart()" class="btn btn-soft fs-sm">
        <svg width="11" height="11" stroke-width="2.2" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-rotate-cw"/>
        </svg>
        <span x-text="t('bulk.restart')"></span> (<span x-text="selectionRestartable().length"></span>)
      </button>
      <button type="button" x-show="selectionRemovable().length > 0" @click="bulkRemove()" class="btn btn-danger-outline fs-sm">
        <svg width="11" height="11" stroke-width="2.2" aria-hidden="true">
          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash"/>
        </svg>
        <span x-text="t('bulk.remove')"></span> (<span x-text="selectionRemovable().length"></span>)
      </button>
      <button type="button" @click="selected=[]" class="btn btn-ghost fs-sm" x-text="t('bulk.clear')"></button>
    </div>

    <!-- ===== SWARM AGENT UNHEALTHY BANNER ===========================
         Renders when `/api/stats` reports any Swarm node where every
         task-derived cid has had ZERO successful stats calls for N
         consecutive gather cycles (default N=3, tunable via
         `tuning_swarm_agent_unhealthy_threshold`). Common cause: the
         Swarm manager bounced and the Portainer agents on workers
         didn't re-register cleanly. Operator-fix copy points at the
         force-update of the agent service. Visible on Stacks +
         Services + Nodes views — the per-row container stats go
         blank on those three when the agent is the bottleneck. The
         Hosts view is intentionally excluded: host-stats providers
         (Beszel / Pulse / NE / Webmin / SNMP / Ping) don't go
         through Portainer's agent at all, so a Portainer-agent
         outage doesn't degrade host data. -->
    <div x-show="(unhealthyAgents || []).length > 0 &&
                 (view==='stacks' || view==='services' || view==='nodes')"
         class="mx-5 mb-3 px-4 py-3 rounded-md flex items-start gap-3"
         style="background: color-mix(in srgb, var(--warning) 12%, transparent);
                border: 1px solid color-mix(in srgb, var(--warning) 38%, transparent);
                color: var(--text);">
      <svg width="18" height="18" class="text-[var(--warning)] mt-0.5 shrink-0"
           aria-hidden="true">
        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-alert-triangle"/>
      </svg>
      <div class="flex-1 fs-sm leading-snug">
        <div class="font-semibold text-[var(--warning)] mb-1"
             x-text="t('swarm_agent_banner.title', { count: (unhealthyAgents || []).length })"></div>
        <div class="text-[var(--text-dim)]">
          <span x-text="t('swarm_agent_banner.body')"></span>
        </div>
        <ul class="mt-2 mono fs-xs text-[var(--text-dim)]">
          <template x-for="agent in (unhealthyAgents || [])" :key="agent.host">
            <li x-text="t('swarm_agent_banner.row', {
                          host: agent.host,
                          fails: agent.fails,
                          cids: agent.task_cids,
                        })"></li>
          </template>
        </ul>
        <div class="mt-2 text-[var(--text-faint)]">
          <code class="mono fs-xs"
                x-text="'docker service update --force <portainer-agent-service>'"></code>
        </div>
        <!-- Admin-only one-click restart. Auto-discovers the
             Portainer agent service by image prefix + name pattern
             (see logic/ops.py:discover_swarm_agent_service). On
             ambiguous discovery the op fails with a list of every
             candidate so the operator picks rather than risking
             auto-restart of the wrong service. -->
        <div class="mt-2 flex items-center gap-2 flex-wrap" x-show="isAdmin()">
          <button type="button" class="btn btn-soft fs-sm"
                  @click="restartSwarmAgent()"
                  :disabled="!!swarmAgentRestartBusy">
            <svg width="12" height="12" aria-hidden="true"
                 :class="swarmAgentRestartBusy ? 'animate-spin' : ''">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-rotate-cw"/>
            </svg>
            <span x-show="!swarmAgentRestartBusy"
                  x-text="t('swarm_agent_banner.restart_button')"></span>
            <span x-show="swarmAgentRestartBusy"
                  x-text="t('swarm_agent_banner.restart_in_flight')"></span>
          </button>
          <span class="fs-2xs text-[var(--text-faint)]"
                x-text="t('swarm_agent_banner.restart_help')"></span>
        </div>
      </div>
    </div>

    <!-- ===== STACKS GROUPED VIEW ===== -->
    <div x-show="view==='stacks'" class="fleet-section bg-[var(--surface)] border border-[var(--border)] rounded-md overflow-hidden">
      <!-- Empty header-only table is hidden via the CSS `.ptable:not(:has(tbody tr))`
           rule (no-empty-table) — NOT an x-show on this wrapper. An x-show
           reading the MEMOIZED `filteredStacks` getter added a third
           lightweight consumer that stole the per-flush memo subscription
           from the row x-for (caveat-6), freezing the table empty. CSS
           `:has()` hides the bare header with zero JS reactivity. -->
      <div class="overflow-x-auto scrollbar">
        <table class="ptable ptable-fleet">
          <thead>
          <tr>
            <th class="col-checkbox"></th>
            <th class="col-chev"></th>
            <th class="col-grow" x-text="t('columns.resource')"></th>
            <th class="col-image" x-text="t('columns.image')"></th>
            <th class="col-health" x-text="t('columns.health')"></th>
            <th class="col-status" x-text="t('columns.status')"></th>
            <th class="col-tasks hidden lg:table-cell" x-text="t('columns.tasks')"></th>
            <th class="col-cpu hidden md:table-cell" x-text="t('columns.cpu')"></th>
            <th class="col-mem hidden md:table-cell" x-text="t('columns.memory')"></th>
            <th class="col-disk hidden xl:table-cell" x-text="t('columns.disk')"></th>
            <th class="col-uptime hidden lg:table-cell" x-text="t('columns.uptime')"></th>
            <th class="col-action" x-text="t('columns.action')"></th>
          </tr>
          </thead>
          <template x-for="stack in filteredStacks" :key="stack.name">
            <tbody>
            <tr class="group-row"
                :class="(stack._stale || (stack.items || []).some(i => i._stale)) ? 'row-stale-flash' : ''"
                @click="toggleStack(stack.name)">
              <td></td>
              <td><span class="chev" :class="expanded.includes(stack.name) ? 'open' : ''">▶</span></td>
              <td colspan="2">
                <div class="flex items-center gap-2">
                  <!-- Loading spinner → resolved status dot.
                         Spinner spins while `/api/stats` hasn't
                         returned for the first time (initial page
                         load + bars/sparklines still arriving in the
                         background). Once stats land, swaps to a
                         small colored dot — green / amber / red /
                         grey — driven by `stackStatusDotClass`. The
                         stack-header dot is HIDDEN when the stack is
                         expanded — the per-container dots in the rows
                         below carry the granular status, so showing
                         the rolled-up dot here too duplicates the
                         signal. Loading spinner stays in both
                         expanded + collapsed states (it's a global
                         "stats not yet here" affordance, not a status). -->
                  <!-- Spinner / dot follow the SAME expand/collapse
                         gate so they don't double-render with the
                         per-container indicators below. Collapsed →
                         show the rolled-up indicator here; expanded →
                         hide so the per-container indicators in the
                         child rows carry the signal alone. The
                         spinner-vs-dot swap is unchanged (`statsLoaded`
                         flips false→true on first /api/stats response). -->
                  <template x-if="!statsLoaded && !expanded.includes(stack.name)">
                      <span class="item-loading-spinner" aria-hidden="true"
                            :title="t('chips.loading_stats') || 'Loading stats…'"></span>
                  </template>
                  <template x-if="statsLoaded && !expanded.includes(stack.name)">
                      <span class="item-status-dot"
                            :class="stackStatusDotClass(stack)"
                            :title="t('chips.stack_status_' + stackStatusDotClass(stack).replace('is-', '')) || ''"></span>
                  </template>
                  <img class="app-icon" :src="stackIconUrl(stack)" :alt="stack.name" loading="lazy"
                       x-show="stackIconUrl(stack)"
                       @error="$el.classList.add('broken')"
                       @load="$el.classList.remove('broken')">
                  <span x-text="stack.name"></span>
                  <span class="text-[var(--text-faint)] fs-xs font-normal" x-text="'(' + stack.total + ')'"></span>
                  <span x-show="stack.is_standalone" class="chip fs-3xs" x-text="t('chips.standalone')"></span>
                  <span x-show="!stack.is_standalone && !stack.stack_id" class="chip fs-3xs text-warning" x-text="t('chips.external')"></span>
                </div>
              </td>
              <td>
                <!-- Stack-header Health column shows aggregate
                       offline + degraded counts (separate column from
                       Updates so no collision). User previously asked
                       to move these to the per-service rows; reverted
                       after follow-up "offline count is not displayed"
                       — the aggregate is the natural at-a-glance
                       signal at the stack level. Per-service rows
                       still render their own `item.health` pill below
                       when expanded. -->
                <span x-show="stack.offline>0" class="pill pill-error"
                      :title="(stack.updates_offline > 0)
                          ? t('chips.off_with_stale_digest_title', { count: stack.updates_offline })
                          : ''"
                      x-text="stack.offline + ' ' + t('chips.off_suffix')
                                + ((stack.updates_offline > 0) ? '*' : '')"></span>
                <span x-show="stack.degraded>0" class="pill pill-degraded ms-1" x-text="stack.degraded"></span>
              </td>
              <td>
                <span x-show="stack.updates>0" class="pill pill-update" x-text="stack.updates + ' ' + t('chips.upd_suffix')"></span>
                <span x-show="stack.errors>0" class="pill pill-error ms-1" x-text="stack.errors + ' ' + t('chips.err_suffix')"></span>
                <span x-show="stack.unknowns>0" class="pill pill-unknown ms-1" x-text="stack.unknowns + ' ' + t('chips.unknown_short')"></span>
              </td>
              <td class="hidden lg:table-cell">
                  <span x-show="stack.uptodate > 0" class="pill pill-ok fs-2xs">
                    <span x-text="stack.uptodate + '/' + stack.total"></span>
                    <span x-text="t('chips.ok_suffix')"></span>
                  </span>
              </td>
              <td class="hidden md:table-cell fs-xs mono text-dim col-cpu"
                  x-text="stackStats(stack).hasStats ? cpuLabel(stackStats(stack).cpu) : '—'"></td>
              <td class="hidden md:table-cell fs-xs mono text-dim col-mem"
                  x-text="stackStats(stack).hasStats ? fmtBytes(stackStats(stack).memUsage) : '—'"></td>
              <td class="hidden xl:table-cell fs-xs mono text-dim col-disk"
                  x-text="stackStats(stack).hasSize ? fmtBytes(stackStats(stack).sizeRoot) : '—'"></td>
              <td class="hidden lg:table-cell"></td>
              <td class="align-right" @click.stop>
                <!-- Header "Update stack" button only renders when the
                       stack is COLLAPSED. Expanding the stack reveals
                       the per-service action column (Update / Restart
                       buttons inline with each row), so showing the
                       header button too duplicates the affordance and
                       stacks two amber buttons in the same horizontal
                       slice. Toggle off when expanded. -->
                <button type="button" x-show="isAdmin() && stack.updates>0 && stack.stack_id && !expanded.includes(stack.name)"
                        @click="updateStack(stack)"
                        :disabled="isStackBusy(stack)"
                        class="btn btn-warning fs-sm">
                  <span x-show="!isStackBusy(stack)" x-text="t('actions.update_stack')"></span>
                  <span x-show="isStackBusy(stack)" class="flex items-center gap-1.5"><span class="spin"></span><span x-text="t('actions.updating')"></span></span>
                </button>
                <a x-show="stack.stack_id"
                   :href="portainerDeepLink(stack)" target="_blank" @click.stop
                   class="fs-xs text-[var(--text-faint)] hover:text-[var(--primary)] ms-2">↗</a>
              </td>
            </tr>
            <template x-for="item in stack.items" :key="item.id">
              <tr class="item-row"
                  :class="[selected.includes(item.id) ? 'sel' : '', (item._stale || isStale(statsFor(item))) ? 'row-stale-flash' : '']"
                  x-show="expanded.includes(stack.name)"
                  @click="openDrawer(item)">
                <td @click.stop>
                  <input type="checkbox" :value="item.id" x-model="selected"
                         :disabled="!isSelectable(item)"
                         class="w-[13px] h-[13px] accent-[var(--primary)] disabled:opacity-25">
                </td>
                <td>
                  <!-- Per-container status dot. Spinner replaces it
                         while the very first /api/stats round-trip is
                         in flight (statsLoaded === false) so the row
                         shows a clear "loading data" affordance instead
                         of an honest-but-confusing grey dot. After
                         statsLoaded flips, the colored item.status
                         drives the dot — which is what the stack
                         header used to show; per-container dots are
                         the only status-dot in the expanded state. -->
                  <template x-if="!statsLoaded">
                      <span class="item-loading-spinner" aria-hidden="true"
                            :title="t('chips.loading_stats') || 'Loading stats…'"></span>
                  </template>
                  <template x-if="statsLoaded">
                    <span class="dot" :class="'dot-' + statusKey(item.status)"></span>
                  </template>
                </td>
                <td class="col-grow">
                  <div class="flex items-center gap-2">
                    <img class="app-icon sm" :src="itemIconUrl(item)" :alt="item.stack || item.name" loading="lazy"
                         x-show="itemIconUrl(item)"
                         @error="$el.classList.add('broken')"
                         @load="$el.classList.remove('broken')">
                    <div class="min-w-0">
                      <div class="mono fs-sm text-[var(--text)] truncate" :title="item.name" x-text="item.name"></div>
                      <div class="fs-2xs text-[var(--text-faint)] truncate" :title="itemSubline(item)" x-text="itemSubline(item)"></div>
                      <div x-show="topologyGroups(item).length" class="topology-map">
                        <template x-for="group in topologyGroups(item)" :key="group.node">
                            <span class="topology-node"
                                  :title="topologyNodeTooltip(group)">
                              <span class="topology-host" x-text="group.node"></span>
                              <template x-for="(c, i) in group.chips" :key="i">
                                <span class="topology-chip"
                                      :class="'topology-' + (c.state || 'unknown')"
                                      :title="topologyChipTooltip(c)"></span>
                              </template>
                            </span>
                        </template>
                      </div>
                    </div>
                  </div>
                </td>
                <td class="mono fs-xs text-dim col-image">
                  <span x-text="imageRepo(item)"></span><span class="text-[var(--text-faint)]">:</span><span class="text-[var(--text-faint)]" x-text="item.tag"></span>
                </td>
                <td><span class="pill" :class="'pill-' + (item.health || 'unknown')" x-text="item.health || '—'"></span></td>
                <td><span class="pill" :class="'pill-' + statusKey(item.status)" x-text="item.status"></span></td>
                <td class="hidden lg:table-cell fs-sm mono"
                    :class="(item.replicas && item.replicas.running < item.replicas.desired) ? 'text-[var(--warning)]' : 'text-[var(--text-dim)]'">
                  <span x-text="item.replicas ? (item.replicas.running + '/' + item.replicas.desired) : '—'"></span>
                </td>
                <td class="hidden md:table-cell stat-cell">
