                          @click="testHostHttpProbe(h)"
                          :disabled="!!(httpProbeRowTestBusy && httpProbeRowTestBusy[h.id])"
                          class="btn btn-soft fs-xs inline-flex items-center gap-1.5"
                          :aria-label="t('host_drawer.http_probe.row_test_aria')"
                          :title="t('host_drawer.http_probe.row_test_title')">
                    <svg width="13" height="13"
                         :class="(httpProbeRowTestBusy && httpProbeRowTestBusy[h.id]) ? 'spin-md' : ''"
                         aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-zap"/>
                    </svg>
                    <span x-text="(httpProbeRowTestBusy && httpProbeRowTestBusy[h.id])
                                ? t('host_drawer.http_probe.row_test_running')
                                : t('host_drawer.http_probe.row_test_button')"></span>
                  </button>
                </div>
                <!-- Inline result chip strip — one chip per URL probed
                     in the row test. Lives below the button so the
                     operator sees pass / fail per URL without scroll. -->
                <template x-if="httpProbeRowTestResult && httpProbeRowTestResult[h.id]
                              && Array.isArray((httpProbeRowTestResult[h.id] || {}).results)
                              && (httpProbeRowTestResult[h.id].results || []).length > 0">
                  <ul class="mt-2 space-y-1 fs-2xs">
                    <template x-for="r in (httpProbeRowTestResult[h.id].results || [])" :key="r.url">
                      <li class="flex items-center gap-2 flex-wrap">
                      <span class="chip fs-3xs"
                            :class="r.ok ? 'pill-ok' : 'pill-error'"
                            x-text="r.ok
                                    ? t('host_drawer.http_probe.row_test_result_ok', { status: r.status_code || '—', latency_ms: r.latency_ms || '?' })
                                    : t('host_drawer.http_probe.row_test_result_fail', { error: (r.error || 'unknown').substring(0, 80) })"></span>
                        <span class="mono text-[var(--text-dim)] break-all" x-text="r.url"></span>
                      </li>
                    </template>
                  </ul>
                </template>
                <template x-if="httpProbeRowTestResult && httpProbeRowTestResult[h.id]
                              && (httpProbeRowTestResult[h.id] || {}).error
                              && !(httpProbeRowTestResult[h.id].results || []).length">
                  <div class="mt-2 fs-2xs italic text-[var(--text-faint)]"
                       x-text="t('host_drawer.http_probe.row_test_no_urls')"></div>
                </template>
                <!-- Resume button — visible only when http_probe is in the
                     auto-paused state for THIS host. Mirrors the SNMP /
                     Webmin / Ping resume affordance pattern. -->
                <div x-show="h.provider_pause_state && h.provider_pause_state.http_probe && h.provider_pause_state.http_probe.paused"
                     class="mt-3 flex items-center gap-2 flex-wrap">
                  <button type="button"
                          @click="resumeProvider(h, 'http_probe')"
                          :disabled="!!(providerResumeBusy && providerResumeBusy[h.id + ':http_probe'])"
                          class="btn btn-soft fs-xs"
                          :aria-label="t('host_drawer.http_probe.resume_aria')"
                          :title="t('host_drawer.http_probe.resume_title')">
                  <span x-show="!(providerResumeBusy && providerResumeBusy[h.id + ':http_probe'])"
                        x-text="t('host_drawer.http_probe.resume')"></span>
                    <span x-show="!!(providerResumeBusy && providerResumeBusy[h.id + ':http_probe'])"
                          class="flex items-center gap-1">
                    <span class="spin"></span>
                    <span x-text="t('actions.working')"></span>
                  </span>
                  </button>
                  <span class="fs-3xs text-[var(--text-faint)]"
                        x-show="h.provider_pause_state && h.provider_pause_state.http_probe"
                        x-text="t('host_drawer.http_probe.paused_hint', { failures: ((h.provider_pause_state && h.provider_pause_state.http_probe && h.provider_pause_state.http_probe.consecutive_failures) || 0) })"></span>
                </div>
              </section>
            </template>

            <!-- SERVER HEALTH — DELL-RAC-MIB grids.
                     Renders for any host whose SNMP probe walked back
                     non-empty Dell server-health tables. Per-section
                     subsections gate on EITHER live data OR snapshot
                     fallback so a brief SNMP outage doesn't blank
                     them. Status pills follow the standard Dell health
                     enum (ok / non-critical / critical / non-recoverable
                     / unknown). The chassis-power figure surfaces in
                     the header next to the heading — drawn from the
                     amperageProbeTable's type=23/24 system-power probes
                     when the iDRAC reports them; older firmware leaves
                     the pill hidden. -->
            <template x-if="(h.host_dell_fans && h.host_dell_fans.length)
                                 || (h.host_dell_temps && h.host_dell_temps.length)
                                 || (h.host_dell_psus && h.host_dell_psus.length)
                                 || (h.host_dell_voltages && h.host_dell_voltages.length)
                                 || (h.host_dell_phys_disks && h.host_dell_phys_disks.length)
                                 || (h.host_dell_virt_disks && h.host_dell_virt_disks.length)
                                 || isStaleField(h, 'host_dell_fans')
                                 || isStaleField(h, 'host_dell_temps')
                                 || isStaleField(h, 'host_dell_psus')
                                 || isStaleField(h, 'host_dell_phys_disks')
                                 || isStaleField(h, 'host_dell_virt_disks')">
              <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-12">
                <h4 class="fs-2xs uppercase tracking-wider text-[var(--text-faint)] mb-3 flex items-center gap-2 flex-wrap">
                  <span x-text="t('host_drawer.server_health.heading')"></span>
                  <span x-show="typeof h.host_dell_power_watts === 'number' && h.host_dell_power_watts > 0"
                        class="chip fs-2xs"
                        :class="isStaleField(h, 'host_dell_power_watts') ? 'stale' : ''"
                        :title="isStaleField(h, 'host_dell_power_watts') ? staleAge(h) : ''">
                      <span x-text="t('host_drawer.server_health.power_consumption')"></span>
                      <span class="mono ms-1" x-text="(+h.host_dell_power_watts || 0).toFixed(0) + ' W'"></span>
                    </span>
                </h4>

                <!-- Two-column responsive grid for the per-section
                         sub-cards. Compact layout so a single drawer
                         view comfortably fits all six tables on a
                         desktop screen. -->
                <div class="server-health-grid">
                  <!-- Fans (coolingDeviceTable) -->
                  <div x-show="(h.host_dell_fans && h.host_dell_fans.length) || isStaleField(h, 'host_dell_fans')"
                       class="server-health-section"
                       :class="isStaleField(h, 'host_dell_fans') ? 'stale' : ''"
                       :title="isStaleField(h, 'host_dell_fans') ? staleAge(h) : ''">
                    <div class="server-health-section-title">
                      <span x-text="t('host_drawer.server_health.fans')"></span>
                      <span class="text-[var(--text-faint)] ms-1"
                            x-text="'(' + ((h.host_dell_fans || []).length) + ')'"></span>
                    </div>
                    <ul class="server-health-list mono">
                      <template x-for="row in (h.host_dell_fans || [])" :key="row.idx">
                        <li class="server-health-row">
                          <span class="server-health-row-name" x-text="row.name"></span>
                          <span class="server-health-row-value">
                              <span x-show="row.rpm" x-text="Number(row.rpm).toLocaleString() + ' ' + t('host_drawer.server_health.rpm')"></span>
                              <span x-show="!row.rpm" class="text-[var(--text-faint)]">—</span>
                            </span>
                          <span class="chip fs-3xs" :class="dellHealthPillClass(row.status)"
                                x-text="dellHealthLabel(row.status)"></span>
                        </li>
                      </template>
                    </ul>
                  </div>

                  <!-- Temperature probes (temperatureProbeTable) -->
                  <div x-show="(h.host_dell_temps && h.host_dell_temps.length) || isStaleField(h, 'host_dell_temps')"
                       class="server-health-section"
                       :class="isStaleField(h, 'host_dell_temps') ? 'stale' : ''"
                       :title="isStaleField(h, 'host_dell_temps') ? staleAge(h) : ''">
                    <div class="server-health-section-title">
                      <span x-text="t('host_drawer.server_health.temperatures')"></span>
                      <span class="text-[var(--text-faint)] ms-1"
                            x-text="'(' + ((h.host_dell_temps || []).length) + ')'"></span>
                    </div>
                    <ul class="server-health-list mono">
                      <template x-for="row in (h.host_dell_temps || [])" :key="row.idx">
                        <li class="server-health-row">
                          <span class="server-health-row-name" x-text="row.name"></span>
                          <span class="server-health-row-value"
                                :class="(typeof row.celsius === 'number' && row.celsius > 60) ? 'text-[var(--danger)]' : ''">
                              <span x-show="typeof row.celsius === 'number'"
                                    x-text="(+row.celsius).toFixed(1) + '°C'"></span>
                              <span x-show="!(typeof row.celsius === 'number')" class="text-[var(--text-faint)]">—</span>
                            </span>
                          <span class="chip fs-3xs" :class="dellHealthPillClass(row.status)"
                                x-text="dellHealthLabel(row.status)"></span>
                        </li>
                      </template>
                    </ul>
                  </div>

                  <!-- Power supplies (powerSupplyTable) -->
                  <div x-show="(h.host_dell_psus && h.host_dell_psus.length) || isStaleField(h, 'host_dell_psus')"
                       class="server-health-section"
                       :class="isStaleField(h, 'host_dell_psus') ? 'stale' : ''"
                       :title="isStaleField(h, 'host_dell_psus') ? staleAge(h) : ''">
                    <div class="server-health-section-title">
                      <span x-text="t('host_drawer.server_health.psus')"></span>
                      <span class="text-[var(--text-faint)] ms-1"
                            x-text="'(' + ((h.host_dell_psus || []).length) + ')'"></span>
                    </div>
                    <ul class="server-health-list mono">
                      <template x-for="row in (h.host_dell_psus || [])" :key="row.idx">
                        <li class="server-health-row">
                          <span class="server-health-row-name" x-text="row.name"></span>
                          <span class="server-health-row-value">
                              <span x-show="row.watts" x-text="Math.round(+row.watts || 0).toLocaleString() + ' W'"></span>
                              <span x-show="!row.watts" class="text-[var(--text-faint)]">—</span>
                            </span>
                          <span class="chip fs-3xs" :class="dellHealthPillClass(row.status)"
                                x-text="dellHealthLabel(row.status)"></span>
                        </li>
                      </template>
                    </ul>
                  </div>

                  <!-- Voltage probes (voltageProbeTable) -->
                  <div x-show="h.host_dell_voltages && h.host_dell_voltages.length"
                       class="server-health-section">
                    <div class="server-health-section-title">
                      <span x-text="t('host_drawer.server_health.voltages')"></span>
                      <span class="text-[var(--text-faint)] ms-1"
                            x-text="'(' + ((h.host_dell_voltages || []).length) + ')'"></span>
                    </div>
                    <ul class="server-health-list mono"
                        :id="'server-health-volt-' + h.id"
                        :class="(h.host_dell_voltages || []).length > 12 ? 'server-health-list--dense' : ''">
                      <template x-for="row in serverHealthVisibleRows(h.id, 'volt', h.host_dell_voltages || [])" :key="row.idx">
                        <li class="server-health-row"
                            :class="(h.host_dell_voltages || []).length > 12 ? 'server-health-row--dense' : ''">
                          <span class="server-health-row-name" x-text="row.name"></span>
                          <span class="server-health-row-value">
                              <span x-show="row.millivolts"
                                    x-text="(row.millivolts / 1000).toFixed(2) + ' V'"></span>
                              <span x-show="!row.millivolts" class="text-[var(--text-faint)]">—</span>
                            </span>
                          <span class="chip fs-3xs" :class="dellHealthPillClass(row.status)"
                                x-text="dellHealthLabel(row.status)"></span>
                        </li>
                      </template>
                    </ul>
                    <button x-show="serverHealthCollapsible(h.host_dell_voltages || [])"
                            type="button"
                            class="server-health-toggle"
                            :aria-expanded="serverHealthIsExpanded(h.id, 'volt')"
                            :aria-controls="'server-health-volt-' + h.id"
                            @click="toggleServerHealthExpanded(h.id, 'volt')"
                            x-text="serverHealthIsExpanded(h.id, 'volt')
                                        ? t('host_drawer.server_health.show_fewer')
                                        : t('host_drawer.server_health.show_all', { count: (h.host_dell_voltages || []).length })"></button>
                  </div>

                  <!-- Physical disks (physicalDiskTable) -->
                  <div x-show="(h.host_dell_phys_disks && h.host_dell_phys_disks.length) || isStaleField(h, 'host_dell_phys_disks')"
                       class="server-health-section"
                       :class="isStaleField(h, 'host_dell_phys_disks') ? 'stale' : ''"
                       :title="isStaleField(h, 'host_dell_phys_disks') ? staleAge(h) : ''">
                    <div class="server-health-section-title">
                      <span x-text="t('host_drawer.server_health.physical_disks')"></span>
                      <span class="text-[var(--text-faint)] ms-1"
                            x-text="'(' + ((h.host_dell_phys_disks || []).length) + ')'"></span>
                    </div>
                    <ul class="server-health-list mono"
                        :id="'server-health-pd-' + h.id"
                        :class="(h.host_dell_phys_disks || []).length > 12 ? 'server-health-list--dense' : ''">
                      <template x-for="row in serverHealthVisibleRows(h.id, 'pd', h.host_dell_phys_disks || [])" :key="row.idx">
                        <li class="server-health-row"
                            :class="(h.host_dell_phys_disks || []).length > 12 ? 'server-health-row--dense' : ''">
                          <span class="server-health-row-name" x-text="row.name"></span>
                          <span class="server-health-row-value">
                              <span x-show="row.capacity_mb"
                                    x-text="fmtBytes(row.capacity_mb * 1024 * 1024)"></span>
                              <span x-show="!row.capacity_mb" class="text-[var(--text-faint)]">—</span>
                            </span>
                          <span class="chip fs-3xs" :class="dellPdStatePillClass(row.state)"
                                x-text="dellStateLabel(row.state)"></span>
                        </li>
                      </template>
                    </ul>
                    <button x-show="serverHealthCollapsible(h.host_dell_phys_disks || [])"
                            type="button"
                            class="server-health-toggle"
                            :aria-expanded="serverHealthIsExpanded(h.id, 'pd')"
                            :aria-controls="'server-health-pd-' + h.id"
                            @click="toggleServerHealthExpanded(h.id, 'pd')"
                            x-text="serverHealthIsExpanded(h.id, 'pd')
                                        ? t('host_drawer.server_health.show_fewer')
                                        : t('host_drawer.server_health.show_all', { count: (h.host_dell_phys_disks || []).length })"></button>
                  </div>

                  <!-- Virtual disks (virtualDiskTable) -->
                  <div x-show="(h.host_dell_virt_disks && h.host_dell_virt_disks.length) || isStaleField(h, 'host_dell_virt_disks')"
                       class="server-health-section"
                       :class="isStaleField(h, 'host_dell_virt_disks') ? 'stale' : ''"
                       :title="isStaleField(h, 'host_dell_virt_disks') ? staleAge(h) : ''">
                    <div class="server-health-section-title">
                      <span x-text="t('host_drawer.server_health.virtual_disks')"></span>
                      <span class="text-[var(--text-faint)] ms-1"
                            x-text="'(' + ((h.host_dell_virt_disks || []).length) + ')'"></span>
                    </div>
                    <ul class="server-health-list mono">
                      <template x-for="row in (h.host_dell_virt_disks || [])" :key="row.idx">
                        <li class="server-health-row">
                            <span class="server-health-row-name">
                              <span x-text="row.name"></span>
                              <span x-show="row.layout"
                                    class="text-[var(--text-faint)] ms-1"
                                    x-text="'· ' + row.layout"></span>
                            </span>
                          <span class="server-health-row-value">
                              <span x-show="row.size_mb"
                                    x-text="fmtBytes(row.size_mb * 1024 * 1024)"></span>
                              <span x-show="!row.size_mb" class="text-[var(--text-faint)]">—</span>
                            </span>
                          <span class="chip fs-3xs" :class="dellVdStatePillClass(row.state)"
                                x-text="dellStateLabel(row.state)"></span>
                        </li>
                      </template>
                    </ul>
                  </div>
                </div>
              </section>
            </template>

            <!-- PRINTER — Printer-MIB toner / supply levels.
                     Section gate fires on EITHER live data OR cached
                     snapshot data so the card stays visible while the
                     SNMP provider is unreachable. Each supply renders as a
                     horizontal bar showing fill level (current/max);
                     the colour comes from the supply description (cyan /
                     magenta / yellow / black / waste). -->
            <template x-if="(h.printer_supplies || []).length > 0
                                 || isStaleField(h, 'printer_supplies')
                                 || isStaleField(h, 'printer_page_count')
                                 || h.printer_page_count">
              <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                <h4 class="fs-2xs uppercase tracking-wider text-[var(--text-faint)] mb-3"
                    x-text="t('host_drawer.printer.heading')"></h4>
                <!-- printer freshness line. Always visible
                         when SNMP history exists; renders in `--warning`
                         orange (matches the SNMP chart freshness banner and the snapshot-stale banner pattern).
                         Operators wanted explicit "last refreshed Xm
                         ago" visibility on the printer card whether or
                         not the data was actually stale — the original
                         gate (only when isStaleField fires) was invisible
                         in normal operation. -->
                <div x-show="snmpHistoryFreshness(h)"
                     class="mb-3 fs-xs flex items-center gap-2 text-[var(--warning)]"
                     :title="snmpHistoryFreshness(h) ? t('host_drawer.snmp_charts.freshness_source_' + snmpHistoryFreshness(h).source) : ''">
                  <svg width="11" height="11" aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-clock"/>
                  </svg>
                  <span x-text="snmpHistoryFreshness(h) ? t('host_drawer.snmp_charts.freshness', { age: snmpHistoryFreshness(h).label }) : ''"></span>
                </div>
                <!-- Operator-flagged: surface the lifetime page count
                         prominently inside the box rather than as small
                         greyed sub-text in the heading. -->
                <div x-show="h.printer_page_count || isStaleField(h, 'printer_page_count')"
                     class="mb-3 flex items-baseline gap-2"
                     :class="isStaleField(h, 'printer_page_count') ? 'stale' : ''"
                     :title="isStaleField(h, 'printer_page_count') ? staleAge(h) : ''">
                    <span class="fs-display-base font-semibold mono"
                          x-text="(+h.printer_page_count || 0).toLocaleString()"></span>
                  <span class="fs-xs text-[var(--text-dim)]"
                        x-text="t('host_drawer.printer.pages_label')"></span>
                </div>
                <div class="space-y-2.5"
                     :class="isStaleField(h, 'printer_supplies') ? 'stale' : ''"
                     :title="isStaleField(h, 'printer_supplies') ? staleAge(h) : ''">
                  <template x-for="(supply, i) in (h.printer_supplies || [])" :key="'p' + i">
                    <div class="space-y-1">
                      <div class="flex items-center justify-between fs-sm">
                        <!-- Title-case the supply name so HP / Brother
                                 replies that come back ALL-CAPS ("BLACK
                                 CARTRIDGE") render cleanly. -->
                        <span class="font-semibold" x-text="titleCase(supply.name) || t('host_drawer.printer.supply_unknown')"></span>
                        <span class="mono text-[var(--text-faint)]"
                              x-text="(supply.percent !== null && supply.percent !== undefined)
                                        ? Math.round(supply.percent) + '%'
                                        : (supply.level + ' / ' + supply.max)"></span>
                      </div>
                      <!-- Custom-coloured fill — `.stat-bar > .fill`
                               defaults to `var(--success)`; for printer
                               supplies we want each supply painted in
                               its mapped brand colour (cyan / magenta /
                               yellow / black / waste-grey). Set the fill
                               background inline to the resolved colour. -->
                      <div class="stat-bar" x-bind="statBarBind(Math.round(supply.percent || 0))"
                           :class="printerSupplyLevel(supply)"
                           :style="'--w:' + Math.round(supply.percent || 0) + '%'">
                        <div class="fill" :style="'background:' + printerSupplyColor(supply)"></div>
                      </div>
                    </div>
                  </template>
                  <div x-show="h.printer_console_msg || isStaleField(h, 'printer_console_msg')"
                       class="pt-2 mt-2 border-t border-dashed border-[var(--border)] fs-xs text-[var(--text-dim)] mono"
                       :class="isStaleField(h, 'printer_console_msg') ? 'stale' : ''"
                       :title="isStaleField(h, 'printer_console_msg') ? staleAge(h) : ''"
                       x-text="h.printer_console_msg"></div>
                </div>
              </section>
            </template>

            <!-- NETWORK — each interface rendered as a block with
                     its MAC (muted) and IPv4 / IPv6 addresses colour-
                     coded by family. Matches Beszel's own layout so
                     the operator's eye reads the two UIs the same way. -->
            <template x-if="(h.network_ifaces || []).length > 0 || h.bandwidth">
              <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                <h4 class="fs-2xs uppercase tracking-wider text-[var(--text-faint)] mb-3" x-text="t('host_drawer.network.heading')"></h4>
                <div class="space-y-3">
                  <div x-show="h.bandwidth" class="flex items-center justify-between fs-sm">
                    <span class="text-[var(--text-dim)]" x-text="t('host_drawer.network.bandwidth')"></span>
                    <span class="mono" x-text="fmtBytes(h.bandwidth) + '/s'"></span>
                  </div>
                  <!-- "Busy" real interfaces always render — physical /
                           virtual NICs the operator cares about (ens*, eth*,
                           wlan*, enp*, etc.) that have traffic OR an IP
                           address. Idle ports (Cisco SG300's 32-port
                           Port-Channel pool with no traffic, switch ports
                           with no link) get partitioned out and hidden
                           behind a toggle below — switches expose 30+
                           interfaces and most are unused. Sorted by
                           total traffic descending so the dominant NIC
                           floats to the top. -->
                  <template x-for="(iface, i) in networkIfacesBusyVisible(h)" :key="'r' + i">
                    <div class="space-y-1.5">
                      <div class="flex items-baseline gap-2 flex-wrap">
                        <!-- oper_status dot when SNMP returned it.
                                 Up = success token, down = danger token. -->
                        <span x-show="typeof iface === 'object' && iface.oper_status"
                              class="inline-block w-1.5 h-1.5 rounded-full self-center"
                              :class="iface.oper_status === 'up' ? 'dot-on' : 'dot-off'"
                              :title="iface.oper_status === 'up' ? t('host_drawer.network.iface_up') : t('host_drawer.network.iface_down')"></span>
                        <span class="font-semibold fs-sm mono"
                              x-text="typeof iface === 'string' ? iface : iface.name"></span>
                        <!-- 32-bit counter degraded badge. SNMP devices
                                 that don't expose ifHCInOctets fall back to
                                 32-bit ifInOctets (wraps every ~17s on a 1G
                                 link at line rate). The backend tags each
                                 iface row with `counter_width: 32 | 64`;
                                 showing the badge here lets operators know
                                 the chart can silently misrepresent under-
                                 wrap traffic on this iface. -->
                        <span x-show="typeof iface === 'object' && iface.counter_width === 32"
                              class="chip pill-warning fs-3xs-half px-1 py-0"
                              :title="t('host_drawer.network.counter_32_title')"
                              x-text="'32'"></span>
                        <span x-show="typeof iface === 'object' && iface.mac"
                              class="ip-chip ip-chip--mac"
                              x-text="iface.mac"></span>
                        <!-- SNMP traffic totals. Only rendered
                                 when the iface row has rx/tx counters
                                 (SNMP-derived hosts only). Compact
                                 rendering: ↓ rx · ↑ tx, mono so the
                                 numbers align across rows. -->
                        <span x-show="hostIfaceHasTraffic(iface)"
                              class="ms-auto fs-2xs mono text-[var(--text-faint)]">
                            <span x-text="'↓ ' + fmtBytes(iface.rx_bytes || 0)"></span>
                            <span class="mx-1">·</span>
                            <span x-text="'↑ ' + fmtBytes(iface.tx_bytes || 0)"></span>
                          </span>
                      </div>
                      <!-- stacked rx/tx bar, normalised to the
                               busiest interface on the host. Only rendered
                               when this iface has traffic AND the host has
                               at least one busy interface to scale against. -->
                      <div x-show="hostIfaceHasTraffic(iface) && hostIfaceMaxTotal(h) > 0"
                           class="iface-bar"
                           :style="hostIfaceBarStyle(iface, hostIfaceMaxTotal(h))"
                           :title="t('host_drawer.network.iface_bar_title', { rx: fmtBytes(iface.rx_bytes || 0), tx: fmtBytes(iface.tx_bytes || 0) })">
                        <span class="iface-bar-rx"></span>
                        <span class="iface-bar-tx"></span>
                      </div>
                      <div x-show="typeof iface === 'object' && (iface.addrs || []).length"
                           class="flex flex-wrap gap-1.5">
                        <template x-for="a in (typeof iface === 'object' ? (iface.addrs || []) : [])" :key="a">
                            <span class="ip-chip"
                                  :class="a.includes(':') ? 'ip-chip--v6' : 'ip-chip--v4'"
                                  x-text="a"></span>
                        </template>
                      </div>
                    </div>
                  </template>
                  <!-- Top-N cap on the busy-iface list. When
                           the active list exceeds `networkIfacesBusyCap`
                           (default 10), the rest are hidden behind a
                           per-host "Show all (N)" toggle so a 52-port
                           switch's drawer stays scannable. Sort order is
                           preserved (busy by traffic desc) so toggling
                           on reveals the lower-traffic ports inline. -->
                  <template x-if="networkIfacesBusyHiddenCount(h) > 0">
                    <div class="pt-2 border-t border-dashed border-[var(--border)]">
                      <button type="button" @click="toggleNetworkIfacesBusyAll(h)"
                              class="fs-xs text-[var(--text-dim)] hover:text-[var(--text)] flex items-center gap-1.5"
                              :title="t('host_drawer.network.busy_all_toggle_title')">
                        <svg width="10" height="10" stroke-width="3" aria-hidden="true" :style="networkIfacesShowAllBusy[h.id] ? 'transform: rotate(90deg)' : ''" style="transition: transform 120ms ease-out;">
                          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
                        </svg>
                        <span x-text="networkIfacesShowAllBusy[h.id]
                                        ? t('host_drawer.network.busy_all_hide', { count: networkIfacesBusyHiddenCount(h) })
                                        : t('host_drawer.network.busy_all_show', { count: networkIfacesBusyHiddenCount(h) })"></span>
                      </button>
                    </div>
                  </template>
                  <!-- Idle interfaces (no traffic, no IP).
                           Same toggle pattern as the Docker veths block
                           below, applied within the "real" group so a
                           32-port switch's empty Port-Channel pool
                           doesn't dominate the drawer. -->
                  <template x-if="networkIfacesActivityPartition(h).idle.length > 0">
                    <div class="pt-2 border-t border-dashed border-[var(--border)]">
                      <button type="button" @click="toggleNetworkIfacesIdle(h)"
                              class="fs-xs text-[var(--text-dim)] hover:text-[var(--text)] flex items-center gap-1.5"
                              :title="t('host_drawer.network.idle_toggle_title')">
                        <svg width="10" height="10" stroke-width="3" aria-hidden="true" :style="networkIfacesShowIdle[h.id] ? 'transform: rotate(90deg)' : ''" style="transition: transform 120ms ease-out;">
                          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
                        </svg>
                        <span x-text="networkIfacesShowIdle[h.id]
                                        ? t('host_drawer.network.idle_hide', { count: networkIfacesActivityPartition(h).idle.length })
                                        : t('host_drawer.network.idle_show', { count: networkIfacesActivityPartition(h).idle.length })"></span>
                      </button>
                      <div x-show="networkIfacesShowIdle[h.id]" class="space-y-1.5 mt-2">
                        <template x-for="(iface, i) in networkIfacesActivityPartition(h).idle" :key="'idle' + i">
                          <div class="flex items-baseline gap-2 flex-wrap">
                              <span x-show="typeof iface === 'object' && iface.oper_status"
                                    class="inline-block w-1.5 h-1.5 rounded-full self-center"
                                    :class="iface.oper_status === 'up' ? 'dot-on' : 'dot-off'"></span>
                            <span class="font-semibold fs-sm mono opacity-70"
                                  x-text="typeof iface === 'string' ? iface : iface.name"></span>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                  <!-- Docker / k8s / Proxmox internal interfaces. Hidden
                           by default behind a toggle keyed per host. On a
                           Docker host with 30+ veths this collapses the
                           drawer from a 50-row wall to a tidy summary.
                           when a host has ONLY ONE interface and
                           it's docker/internal (e.g. a thin VM showing
                           just `vmbr0`), the toggle is friction; render
                           the single iface inline AND skip the toggle
                           entirely. The condition checks the raw
                           partition, not the activity-busy/idle split,
                           because the single docker iface lives in
                           `internal` regardless of traffic. -->
                  <template x-if="networkIfacesPartition(h).internal.length === 1
                                    && networkIfacesActivityPartition(h).busy.length === 0
                                    && networkIfacesActivityPartition(h).idle.length === 0">
                    <div class="pt-2 border-t border-dashed border-[var(--border)]">
                      <template x-for="(iface, i) in networkIfacesPartition(h).internal" :key="'i-solo' + i">
                        <div class="space-y-1.5">
                          <div class="flex items-baseline gap-2 flex-wrap">
                              <span class="font-semibold fs-sm mono"
                                    x-text="typeof iface === 'string' ? iface : iface.name"></span>
                            <span x-show="typeof iface === 'object' && iface.mac"
                                  class="ip-chip ip-chip--mac"
                                  x-text="iface.mac"></span>
                          </div>
                          <div x-show="typeof iface === 'object' && (iface.addrs || []).length"
                               class="flex flex-wrap gap-1.5">
                            <template x-for="a in (typeof iface === 'object' ? (iface.addrs || []) : [])" :key="a">
                                <span class="ip-chip"
                                      :class="a.includes(':') ? 'ip-chip--v6' : 'ip-chip--v4'"
                                      x-text="a"></span>
                            </template>
                          </div>
                        </div>
                      </template>
                    </div>
                  </template>
                  <template x-if="!(networkIfacesPartition(h).internal.length === 1
                                      && networkIfacesActivityPartition(h).busy.length === 0
                                      && networkIfacesActivityPartition(h).idle.length === 0)
                                    && networkIfacesPartition(h).internal.length > 0">
                    <div class="pt-2 border-t border-dashed border-[var(--border)]">
                      <button type="button" @click="toggleNetworkIfacesDocker(h)"
                              class="fs-xs text-[var(--text-dim)] hover:text-[var(--text)] flex items-center gap-1.5"
                              :title="t('host_drawer.network.docker_toggle_title')">
                        <svg width="10" height="10" stroke-width="3" aria-hidden="true" :style="networkIfacesShowDocker[h.id] ? 'transform: rotate(90deg)' : ''" style="transition: transform 120ms ease-out;">
                          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
                        </svg>
                        <span x-text="networkIfacesShowDocker[h.id]
                                        ? t('host_drawer.network.docker_hide', { count: networkIfacesPartition(h).internal.length })
                                        : t('host_drawer.network.docker_show', { count: networkIfacesPartition(h).internal.length })"></span>
                      </button>
                      <div x-show="networkIfacesShowDocker[h.id]" class="space-y-1.5 mt-2">
                        <template x-for="(iface, i) in networkIfacesPartition(h).internal" :key="'i' + i">
                          <div class="space-y-1.5">
                            <div class="flex items-baseline gap-2 flex-wrap">
                                <span class="font-semibold fs-sm mono"
                                      x-text="typeof iface === 'string' ? iface : iface.name"></span>
                              <span x-show="typeof iface === 'object' && iface.mac"
                                    class="ip-chip ip-chip--mac"
                                    x-text="iface.mac"></span>
                            </div>
                            <div x-show="typeof iface === 'object' && (iface.addrs || []).length"
                                 class="flex flex-wrap gap-1.5">
                              <template x-for="a in (typeof iface === 'object' ? (iface.addrs || []) : [])" :key="a">
                                  <span class="ip-chip"
                                        :class="a.includes(':') ? 'ip-chip--v6' : 'ip-chip--v4'"
                                        x-text="a"></span>
                              </template>
                            </div>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>
              </section>
            </template>

            <!-- DISKS — always rendered when we have at least the
                     aggregate disk total from Beszel / Pulse / node-
                     exporter. Starts with a "Total Usage" bar (the
                     merged host_disk_total/used from whichever
                     provider reported it), then drops in per-mount
                     bars under ``efs`` when the newer Beszel agent
                     emits them. This keeps the card informative for
                     container-mode Beszel agents (which skip ``efs``)
                     while still showing richer detail for full-host
                     agents. -->
            <template x-if="h.disk_total > 0 || (h.mounts || []).length > 0">
              <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                <h4 class="fs-2xs uppercase tracking-wider text-[var(--text-faint)] mb-3" x-text="t('host_drawer.disks.heading')"></h4>
                <div class="space-y-3">
                  <!-- Total usage row — single-colour aggregate bar.
                           Per-mount rows below give the breakdown; the
                           segmented rendering now lives on the
                           collapsed host row's small disk column
                           instead (see the Disk column in the grid
                           row). Keeps the expanded DISKS card matching
                           Beszel's reference layout. -->
                  <div x-show="h.disk_total > 0">
                    <div class="flex items-baseline justify-between">
                      <span class="fs-xs text-[var(--text-dim)] font-semibold" x-text="t('host_drawer.disks.total_usage')"></span>
                      <span class="fs-2xs text-[var(--text-faint)] mono"
                            x-text="diskPercentOf(h).toFixed(1) + '% · '
                                      + fmtBytes(h.disk_used) + ' / '
                                      + fmtBytes(h.disk_total)"></span>
                    </div>
                    <div class="stat-bar mt-1" x-bind="statBarBind(diskPercentOf(h), 'columns.disk')"
                         :class="barLevel(diskPercentOf(h))"
                         :style="'--w: ' + diskPercentOf(h) + '%'">
                      <div class="fill"></div>
                    </div>
                  </div>
                  <!-- Per-mount breakdown (when stats.efs was
                           populated — full-host Beszel agents only).
                           Zero-usage mounts collapse behind a toggle
                           to keep hosts with many ZFS datasets readable
                           the card). visibleMounts(h) returns the
                           above-threshold set; toggleHostShowEmptyDisks
                           expands to show the remainder. -->
                  <template x-for="(m, i) in visibleMounts(h)" :key="i">
                    <div class="disk-mount-row">
                      <div class="flex items-baseline justify-between">
                        <span class="fs-xs mono truncate" x-text="m.n || m.name || '(disk)'"></span>
                        <span class="fs-2xs text-[var(--text-faint)] mono"
                              x-text="m.d && m.du
                                        ? (m.dp || 0).toFixed(1) + '% · '
                                          + fmtBytes((m.du || 0) * 1024**3) + ' / '
                                          + fmtBytes((m.d || 0) * 1024**3)
                                        : ''"></span>
                      </div>
                      <div class="stat-bar mt-0.5" x-bind="statBarBind((m.dp || 0))"
                           :class="barLevel(m.dp || 0)"
                           :style="'--w: ' + (m.dp || 0) + '%'">
                        <div class="fill"></div>
                      </div>
                    </div>
                  </template>
                  <!-- Show-empty toggle when there are zero-usage
                           mounts hiding. Clicking expands (or collapses)
                           them for this host only. -->
                  <button type="button"
                          x-show="emptyMountCount(h) > 0"
                          @click="toggleHostShowEmptyDisks(h.host)"
                          class="fs-2xs text-[var(--text-faint)] hover:text-[var(--primary)] hover:underline w-full text-start pt-1 mono">
                      <span x-show="!hostDisksShowEmpty[h.host]"
                            x-text="emptyMountCount(h) === 1 ? t('host_drawer.disks.show_empty_one') : t('host_drawer.disks.show_empty_many', { count: emptyMountCount(h) })"></span>
                    <span x-show="hostDisksShowEmpty[h.host]"
                          x-text="emptyMountCount(h) === 1 ? t('host_drawer.disks.hide_empty_one') : t('host_drawer.disks.hide_empty_many', { count: emptyMountCount(h) })"></span>
                  </button>
                </div>
              </section>
            </template>

            <!-- UPDATES — only rendered when Webmin reported
                     pending packages. Informational in Phase 1; a
                     later phase may link to a full package list.
                     Wrapped in x-if (not x-show) so the body
                     bindings (`x-text="h.updates_pending"` etc.)
                     don't re-evaluate on every reactive flush for
                     the ~majority of hosts that have no Webmin probe
                     and therefore no pending-updates field. -->
            <template x-if="(h.updates_pending || 0) > 0">
              <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                <h4 class="fs-2xs uppercase tracking-wider text-[var(--text-faint)] mb-3" x-text="t('host_drawer.updates.heading')"></h4>
                <dl class="drawer-dl fs-sm">
                  <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.updates.pending')"></dt>
                  <dd class="mono text-end" x-text="h.updates_pending"></dd>
                  <template x-if="(h.updates_security || 0) > 0">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.updates.security')"></dt>
                  </template>
                  <template x-if="(h.updates_security || 0) > 0">
                    <dd class="text-end">
                        <span class="pill pill-degraded fs-2xs"
                              x-text="t('host_drawer.updates.security_count', { count: h.updates_security })"></span>
                    </dd>
                  </template>
                  <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.updates.source')"></dt>
                  <dd class="mono text-end text-[var(--text-faint)]" x-text="t('settings.host_stats.source_webmin')"></dd>
                </dl>
              </section>
            </template>
          </div>

          <!-- Time-range picker — segmented buttons. Range applies
                   to ALL chart cards in the drawer (CPU / Mem / Disk /
                   Net / Disk-IO / Load + Ping + SNMP). `setHostHistoryRange`
                   re-fires `loadHostHistory` (Beszel/NE), `loadHostPingHistory`
                   , and `loadHostSnmpHistory` / `loadHostSnmpIfaceHistory`
                    so picker clicks refresh every series in
                   lock-step. Gate widened over time: `h.ping_enabled`
                   for ping-only hosts, `hostHasSnmpCharts(h)` for SNMP-
                   only hosts (managed switches / UPSes / NVRs / embedded
                   routers — no Beszel/NE so the original gate hid the
                   picker even though SNMP charts were rendering below). -->
          <div class="mt-4 flex items-center gap-2 flex-wrap"
               x-show="((h.beszel_id || h.ne_url || h.pulse_name || h.webmin_name) && (h.status === 'up' || isStale(h) || chartFreshness(h)) && ((h.providers || []).length > 0 || isStale(h) || chartFreshness(h))) || h.ping_enabled || hostHasSnmpCharts(h)">
            <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-clock"/>
            </svg>
            <!-- Buttons disabled while the picker's underlying
                     loaders are in flight. Prevents the operator
                     from rapid-clicking 1h → 6h → 24h while the first
                     fetch is still resolving — pre-fix the SPA lagged
                     the chart updates on slow networks and presented
                     inconsistent data because each pending fetch
                     finished out of order. The CSS disabled-state
                     styling is inherited from the `.range-seg button`
                     base rule. -->
            <div class="range-seg"
                 role="radiogroup"
                 :aria-label="t('host_drawer.charts.range_picker_label')"
                 :aria-busy="hostHistoryRangeBusy ? 'true' : 'false'"
                 @keydown="_radiogroupArrowKey($event)">
              <button type="button" role="radio" :class="hostHistoryRange === 1 ? 'active' : ''"
                      :aria-checked="hostHistoryRange === 1"
                      :aria-label="t('host_drawer.charts.range_1h_aria')"
                      :tabindex="hostHistoryRange === 1 ? 0 : -1"
                      :disabled="hostHistoryRangeBusy"
                      @click="setHostHistoryRange(1)"
                      x-text="t('host_drawer.charts.range_1h')"></button>
              <button type="button" role="radio" :class="hostHistoryRange === 6 ? 'active' : ''"
                      :aria-checked="hostHistoryRange === 6"
                      :aria-label="t('host_drawer.charts.range_6h_aria')"
                      :tabindex="hostHistoryRange === 6 ? 0 : -1"
                      :disabled="hostHistoryRangeBusy"
                      @click="setHostHistoryRange(6)"
                      x-text="t('host_drawer.charts.range_6h')"></button>
              <button type="button" role="radio" :class="hostHistoryRange === 24 ? 'active' : ''"
                      :aria-checked="hostHistoryRange === 24"
                      :aria-label="t('host_drawer.charts.range_24h_aria')"
                      :tabindex="hostHistoryRange === 24 ? 0 : -1"
                      :disabled="hostHistoryRangeBusy"
                      @click="setHostHistoryRange(24)"
                      x-text="t('host_drawer.charts.range_24h')"></button>
              <button type="button" role="radio" :class="hostHistoryRange === 168 ? 'active' : ''"
                      :aria-checked="hostHistoryRange === 168"
                      :aria-label="t('host_drawer.charts.range_7d_aria')"
                      :tabindex="hostHistoryRange === 168 ? 0 : -1"
                      :disabled="hostHistoryRangeBusy"
                      @click="setHostHistoryRange(168)"
                      x-text="t('host_drawer.charts.range_7d')"></button>
            </div>
            <!-- Unified chart-data freshness label. Replaces the
                     pair of (a) `hostHistoryFreshness` ("Updated Xs
                     ago", reading the FETCH time, not the data) and
                     (b) the SNMP-specific freshness banner that used
                     to live below the Ping chart. Now one generic
                     "Last sample Xm ago" works for ALL provider
                     charts (Beszel / NE / Pulse / Webmin / SNMP host /
                     SNMP iface / SNMP temp / Ping) — the helper
                     `chartFreshness(h)` walks every chart cache and
                     returns the age of the newest sample across all
                     of them. Goes amber when stale (> 10 min, ≈ 2×
                     default sampler cadence). Hidden while the range
                     picker is reloading. -->
            <span x-show="chartFreshness(h) && !hostHistoryRangeBusy"
                  class="fs-2xs italic inline-flex items-center gap-1 text-[var(--warning)]"
                  :title="t('host_drawer.charts.last_sample_title')">
                  <svg width="10" height="10" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-clock"/></svg>
                  <span x-text="chartFreshness(h) ? t('host_drawer.charts.last_sample', { age: chartFreshness(h).label }) : ''"></span>
                </span>
            <!-- "Cached" pill — fires when the chart's own data
                     is genuinely stale (newest sample > ~2× sampler
                     cadence old). Specifically answers "is the chart
                     line going to update in the next sampler tick or
                     is it frozen?". Tooltip lists the cached providers
                     via `staleProviders` for context. -->
            <span x-show="isHostChartStale(h) && !hostHistoryRangeBusy"
                  class="chip pill-warning fs-2xs px-1.5 py-0 ms-1"
                  :title="t('host_drawer.charts.cached_pill_title', { providers: staleProviders(h).map(n => providerDisplayName(n)).join(', ') || '—' })"
                  x-text="t('host_drawer.charts.cached_pill')"></span>
            <!-- Refreshing spinner shown while the picker's
                     underlying loaders are in flight.
                     Pre-fix the buttons just disabled silently with no
                     visual cue that data was being fetched, so the
                     operator wasn't sure if the click had registered.
                     Lives here next to the range picker so the cue is
                     adjacent to what the operator just clicked. -->
            <span x-show="hostHistoryRangeBusy"
                  class="inline-flex items-center gap-1 fs-2xs italic text-[var(--text-faint)]">
                  <span class="spin"></span>
                  <span x-text="t('actions.refreshing')"></span>
                </span>
          </div>
          <!-- "Link this host to Beszel/NE" hint — shown ONLY when
                   the host has zero time-series sources at all (no
                   beszel/ne, no ping). Ping-only hosts already have
                   the Ping latency chart as their time-series source
                   so this hint is misleading there; the gate now
                   excludes `h.ping_enabled`. -->
          <div x-show="!h.beszel_id && !h.ne_url && !h.pulse_name && !h.webmin_name && !h.ping_enabled && !hostHasSnmpCharts(h) && !h.snmp_name && !h.snmp_enabled && h.status === 'up' && (h.providers || []).length > 0"
               class="mt-4 fs-xs text-[var(--text-faint)] italic">
            <span x-text="t('host_drawer.charts.no_source_hint_prefix')"></span>
            <button type="button" @click="openAdminTab('hosts')"
                    class="text-[var(--primary)] hover:underline bg-transparent border-0 p-0 cursor-pointer"
                    x-text="t('host_drawer.charts.admin_hosts_link')"></button>
            <span x-text="t('host_drawer.charts.no_source_hint_suffix')"></span>
          </div>

          <!-- Ping latency — promoted to its own full-width row
                   ABOVE the CPU/Mem/Disk grid. RTT shape doesn't
                   match the percentage cards (different y-axis, narrow
                   value range, ms unit), so giving it dedicated space
                   reads cleaner than wedging it into the 2-col grid
                   with Net/Disk-IO. Card hidden when the host hasn't
                   opted in via per-host `ping.enabled` — gate is the
                   same `x-show` the inner metric-card carries. -->
          <div class="mt-3 grid grid-cols-1 gap-4"
               x-show="h.ping_enabled">
            <!-- Defensive: if the ping cache is missing for an
                     opted-in host (initial drawer-open fetch missed,
                     SSE handler hadn't fired yet, transient HTTP
                     error), kick a fresh fetch so the chart populates
                     instead of staying stuck on "Collecting data".
                     `<template x-effect>` runs once on mount and
                     re-runs when the dependencies change. The cache-
                     check is cheap; the fetch is gated on the same
                     `ping_enabled` flag the card visibility uses, so
                     non-opted hosts never trigger it. Once-per-mount
                     via `_pingChartKickedFor` set so the effect
                     doesn't loop on every reactive re-evaluation. -->
            <template x-effect="(() => {
                  try {
                    if (!h.ping_enabled) return;
                    const k = this.hostPingHistoryKey(h);
                    if (!k) return;
                    const cache = this.hostHistory && this.hostHistory[k];
                    const seriesLen = cache && Array.isArray(cache.series) ? cache.series.length : 0;
                    if (seriesLen >= 2) return;
                    this._pingChartKickedFor = this._pingChartKickedFor || new Set();
                    if (this._pingChartKickedFor.has(h.id)) return;
                    this._pingChartKickedFor.add(h.id);
                    setTimeout(() => {
                      try { this._pingChartKickedFor && this._pingChartKickedFor.delete(h.id); } catch (_) {}
                    }, 30000);
                    if (typeof this.loadHostPingHistory === 'function') {
                      this.loadHostPingHistory(h.id);
                    }
                  } catch (_) {}
                })()"></template>
            <div class="metric-card metric-card--ping"
                 x-show="h.ping_enabled"
                 :class="hostChartMax(hostPingHistoryKey(h), ['rtt']) === 0 ? 'metric-card--flat' : ''">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('hosts_extra.metrics.ping')"></span>
                  <span class="unit">ms</span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'ping')" :title="metricSource(h, 'ping')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'ping')"
                          @click.stop="toggleMetricTooltip(h, 'ping')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'ping')"
                          x-cloak @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'ping')"></span>
                  </button>
                </div>
                <div class="metric-card-stats">
                      <span x-show="h.ping_alive === false"
                            class="chip pill-error fs-2xs px-1.5 py-0"
                            x-text="t('hosts_extra.metrics.ping_down')"></span>
                  <span x-show="hostPingWindowLoss(hostPingHistoryKey(h)) > 0"
                        class="chip pill-update fs-2xs px-1.5 py-0"
                        :title="t('hosts_extra.metrics.ping_loss_title')"
                        x-text="t('hosts_extra.metrics.ping_loss', { pct: hostPingWindowLoss(hostPingHistoryKey(h)) })"></span>
                  <span x-show="hostMetricStats(hostPingHistoryKey(h), 'rtt', false)">
                        <span class="metric-legend-dot" style="background: var(--success);"></span>
                        <span x-text="t('hosts_extra.metrics.ping_rtt')"></span>
                        <span class="legend-val"
                              x-text="hostMetricStats(hostPingHistoryKey(h), 'rtt', false) ? (hostMetricStats(hostPingHistoryKey(h), 'rtt', false).minRaw.toFixed(1) + '–' + hostMetricStats(hostPingHistoryKey(h), 'rtt', false).maxRaw.toFixed(1) + ' ms') : ''"></span>
                      </span>
                </div>
              </div>
              <template x-if="hostChart(hostPingHistoryKey(h), 'rtt') && hostChartMax(hostPingHistoryKey(h), ['rtt']) > 0">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in yAxisAuto(hostChartMax(hostPingHistoryKey(h), ['rtt']), n => Math.round(n) + ' ms')" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                    <path class="metric-grid" :d="hostChart(hostPingHistoryKey(h), 'rtt', { min: 0, max: hostChartMax(hostPingHistoryKey(h), ['rtt']), height: 120 }).gridPath" fill="none"/>
                    <path class="metric-line" style="color: var(--success);"
                          :d="hostChart(hostPingHistoryKey(h), 'rtt', { min: 0, max: hostChartMax(hostPingHistoryKey(h), ['rtt']), height: 120 }).pathGapped"/>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in xAxisFromSeries(hostPingHistoryKey(h), 5)" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                </div>
              </template>
              <template x-if="!hostChart(hostPingHistoryKey(h), 'rtt')">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Metric cards — Beszel-style. Three percentage charts
                   (CPU / Memory / Disk) in a 3-col grid, then Net In /
                   Net Out side by side beneath. Axis labels live
                   outside the SVG so the polyline can stretch edge to
                   edge and still read at a glance. Whole grid hides
                   when no provider matched — the "Collecting data…"
                   placeholders are misleading for hosts that never had
                   a provider mapping. -->
          <!-- Chart grid: renders when Beszel matched AND
                   returned history, OR when the host has a node-exporter
                   URL configured (host_metrics_sampler writes
                   per-host gauges + net rates into host_metrics_samples
                   so NE-only hosts also get historical charts). Hosts
                   with neither show the "link to Beszel / set NE URL"
                   hint above instead of an empty "Collecting data…" grid.
                   Ping was promoted out of this layout ; the
                   gate no longer needs to consider `h.ping_enabled`
                   since ping-only hosts are served by the standalone
                   row above. -->
          <!-- SNMP time-series charts. Three cards for hosts
                   probed via SNMP whose data isn't covered by the
                   Beszel / NE charts: per-core CPU (multi-line), load
                   averages (3 lines), memory stacked layers. Each
                   card individually gates so a host that returns ONLY
                   per-core CPU + no load avg still gets the CPU card. -->
          <!-- (SNMP freshness banner moved to the chart-strip
                   header, see the inline-flex span next to the Cached
                   pill above. Keeping the comment block here as a
                   pointer for future agents who'll grep for "SNMP
                   freshness banner" expecting to find it in this
                   neighbourhood.) -->
          <!-- "Collecting first samples" hint when the
                   sampler hasn't accumulated 2+ samples yet. SNMP just
                   enabled? Live legend values (CPU%, Load avg, Mem
                   bytes) populate from the live probe immediately, but
                   polylines need 2 points minimum to draw a line — so
                   each chart card looks empty for ~5 minutes until the
                   second sampler tick lands. This hint replaces the
                   blank with an explicit message so the operator knows
                   it's NOT broken — just warming up. Hidden once
                   `points.length >= 2`. -->
          <!-- "Collecting first samples" hint shown ONLY when the
                   host has zero history rows AND no probe is currently
                   in flight. Pre-fix the gate was `points.length < 2`
                   which fired even on a host with 1 stale sample (e.g.
                   last sample 2h ago, no recent probe coming) — the
                   "chart will populate after the next sampler tick"
                   copy was misleading because no tick was actually
                   imminent. Now hidden the moment ANY historical
                   sample exists; the freshness banner above ("Last
                   sample N ago") carries the messaging from there. -->
          <div x-show="hostHasSnmpCharts(h)
                           && (!hostSnmpHistory[h.id]
                               || (hostSnmpHistory[h.id].points || []).length === 0)
                           && !(hostSnmpHistory[h.id] && hostSnmpHistory[h.id].loading)"
               class="mt-2 fs-xs flex items-center gap-2 text-[var(--text-faint)]">
            <svg width="11" height="11" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-info"/>
            </svg>
            <span x-text="snmpWarmingUpText()"></span>
          </div>
          <div class="mt-3 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"
               x-show="hostHasSnmpCharts(h)"
               :class="hostHistoryRangeBusy ? 'charts-refreshing' : ''">
            <!-- Per-core CPU + ssCpuIdle overlay. Matches
                     the Beszel/NE chart cards: viewBox 420×120,
                     gridlines as a path, legend dots with last-value
                     readouts, x-axis timestamps. -->
            <div class="metric-card"
                 x-show="(h.host_cpu_per_core || []).length > 0
                             || (hostSnmpHistory[h.id] && hostSnmpHistory[h.id].points
                                 && hostSnmpHistory[h.id].points.some(p => p.cpu_used_pct !== null))">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('host_drawer.snmp_charts.cpu_title')"></span><span class="unit">%</span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'snmp_cpu')" :title="metricSource(h, 'snmp_cpu')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'snmp_cpu')"
                          @click.stop="toggleMetricTooltip(h, 'snmp_cpu')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'snmp_cpu')"
                          x-cloak @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'snmp_cpu')"></span>
                  </button>
                </div>
                <div class="metric-card-stats">
                      <span x-show="snmpStats(h.id, 'cpu_used_pct')">
                        <span class="metric-legend-dot" style="background: var(--success);"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_used')"></span>
                        <span class="legend-val" x-text="snmpStats(h.id, 'cpu_used_pct') ? Math.round(snmpStats(h.id, 'cpu_used_pct').last) + '%' : ''"></span>
                      </span>
                  <span x-show="(h.host_cpu_per_core || []).length">
                        <span class="metric-legend-dot" style="background: var(--info); opacity: 0.55;"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_per_core', { n: (h.host_cpu_per_core || []).length })"></span>
                      </span>
                </div>
              </div>
              <template x-if="snmpHasEnoughHistory(h.id)">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in yAxisPercent()" :key="'cpu-y-' + i"><span x-text="l"></span></template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                    <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                    <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                    <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                    <path fill="none" stroke="var(--info)" stroke-opacity="0.55" stroke-width="1" :d="snmpCpuPerCoreCombinedLine(h.id)"></path>
                    <path fill="none" stroke="var(--success)" stroke-width="1.5" :d="snmpCpuUsedPctLine(h.id)"></path>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'cpu-x-' + i"><span x-text="l"></span></template>
                  </div>
                </div>
              </template>
              <template x-if="!snmpHasEnoughHistory(h.id)">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- Load averages — three lines (1m / 5m / 15m)
                     with legend dots + current values in the head. -->
            <div class="metric-card"
                 x-show="h.host_load_1m || h.host_load_5m || h.host_load_15m
                             || (hostSnmpHistory[h.id] && (hostSnmpHistory[h.id].points || []).some(p => p.load_1m || p.load_5m || p.load_15m))">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('host_drawer.snmp_charts.load_title')"></span><span class="unit">%</span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'snmp_load')" :title="metricSource(h, 'snmp_load')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'snmp_load')"
                          @click.stop="toggleMetricTooltip(h, 'snmp_load')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'snmp_load')"
                          x-cloak @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'snmp_load')"></span>
                  </button>
                </div>
                <div class="metric-card-stats">
                      <span>
                        <span class="metric-legend-dot" style="background: var(--success);"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_load_1m')"></span>
                        <span class="legend-val" x-text="Math.round(snmpLoadPctLive(h.id, h.host_load_1m || (snmpStats(h.id, 'load_1m') || {}).max || 0)) + '%'"></span>
                      </span>
                  <span>
                        <span class="metric-legend-dot" style="background: var(--warning);"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_load_5m')"></span>
                        <span class="legend-val" x-text="Math.round(snmpLoadPctLive(h.id, h.host_load_5m || (snmpStats(h.id, 'load_5m') || {}).max || 0)) + '%'"></span>
                      </span>
                  <span>
                        <span class="metric-legend-dot" style="background: var(--info);"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_load_15m')"></span>
                        <span class="legend-val" x-text="Math.round(snmpLoadPctLive(h.id, h.host_load_15m || (snmpStats(h.id, 'load_15m') || {}).max || 0)) + '%'"></span>
                      </span>
                </div>
              </div>
              <template x-if="snmpHasEnoughHistory(h.id)">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in yAxisPercent()" :key="'snmp-load-y-' + i"><span x-text="l"></span></template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                    <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                    <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                    <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                    <path fill="none" stroke="var(--success)" stroke-width="1.5" :d="snmpLoadLine(h.id, 'load_1m')"></path>
                    <path fill="none" stroke="var(--warning)" stroke-width="1" :d="snmpLoadLine(h.id, 'load_5m')"></path>
                    <path fill="none" stroke="var(--info)" stroke-width="1" :d="snmpLoadLine(h.id, 'load_15m')"></path>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'load-x-' + i"><span x-text="l"></span></template>
                  </div>
                </div>
              </template>
              <template x-if="!snmpHasEnoughHistory(h.id)">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- Memory layers: used / cached / buffers / free
                     with legend dots + last-known byte values. -->
            <div class="metric-card"
                 x-show="(h.host_mem_buffers || h.host_mem_cached
                             || (hostSnmpHistory[h.id] && (hostSnmpHistory[h.id].points || []).some(p => p.mem_buffers || p.mem_cached)))">
              <div class="metric-card-head">
                <!-- generic "B" unit suffix on the title was
                         redundant once the legend started rendering the
                         actual unit per value (GB / MB). Dropped. The
                         legend + Y-axis use `fmtBytesAt(value, max)`
                         to lock all four layers + axis labels to the
                         SAME unit family (operator screenshot showed
                         "1012 MB" next to "1.9 GB" — visually
                         misaligned). -->
                <div class="metric-card-title">
                  <span x-text="t('host_drawer.snmp_charts.mem_title')"></span><span class="unit" x-text="unitForBytes(snmpMemMax(h))"></span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'snmp_memory')" :title="metricSource(h, 'snmp_memory')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'snmp_memory')"
                          @click.stop="toggleMetricTooltip(h, 'snmp_memory')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'snmp_memory')"
                          x-cloak @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'snmp_memory')"></span>
                  </button>
                </div>
                <div class="metric-card-stats">
                      <span x-show="snmpStats(h.id, 'mem_used')">
                        <span class="metric-legend-dot" style="background: var(--danger);"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_mem_used')"></span>
                        <span class="legend-val" x-text="snmpStats(h.id, 'mem_used') ? fmtBytesAt(snmpStats(h.id, 'mem_used').last, snmpMemMax(h)) : ''"></span>
                      </span>
                  <span x-show="snmpStats(h.id, 'mem_cached')">
                        <span class="metric-legend-dot" style="background: var(--warning);"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_mem_cached')"></span>
                        <span class="legend-val" x-text="snmpStats(h.id, 'mem_cached') ? fmtBytesAt(snmpStats(h.id, 'mem_cached').last, snmpMemMax(h)) : ''"></span>
                      </span>
                  <span x-show="snmpStats(h.id, 'mem_buffers')">
                        <span class="metric-legend-dot" style="background: var(--info);"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_mem_buffers')"></span>
                        <span class="legend-val" x-text="snmpStats(h.id, 'mem_buffers') ? fmtBytesAt(snmpStats(h.id, 'mem_buffers').last, snmpMemMax(h)) : ''"></span>
                      </span>
                  <span x-show="snmpStats(h.id, 'mem_free')">
                        <span class="metric-legend-dot" style="background: var(--success);"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_mem_free')"></span>
                        <span class="legend-val" x-text="snmpStats(h.id, 'mem_free') ? fmtBytesAt(snmpStats(h.id, 'mem_free').last, snmpMemMax(h)) : ''"></span>
                      </span>
                </div>
              </div>
              <template x-if="snmpHasEnoughHistory(h.id)">
