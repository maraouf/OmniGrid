<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PortaUpdate</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%233b82f6'/><rect x='8' y='11' width='16' height='13' rx='2' fill='none' stroke='white' stroke-width='2'/><path d='M16 5 L16 15 M12 11 L16 15 L20 11' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<script>
  (function() {
    var pref = localStorage.getItem('theme') || 'auto';
    var sysLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
    var resolved = pref === 'auto' ? (sysLight ? 'light' : 'dark') : pref;
    document.documentElement.setAttribute('data-theme', resolved);
    // Apply persisted language/direction before first paint so RTL layout
    // doesn't flash LTR on page load. The full i18n helper below handles
    // JSON fetch + key lookups.
    var lang = localStorage.getItem('lang') || 'en';
    document.documentElement.setAttribute('lang', lang);
    // `ar` is hard-coded as RTL here just so the *shell* flips before the
    // async JSON fetch completes. Every other language's direction comes
    // from its own _meta.dir once loaded.
    document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
  })();
</script>
<script>
  // ------------------------------------------------------------------
  // i18n helper — vanilla JS, no external library. Pulls language files
  // from /i18n/<code>.json at boot and exposes `window.t(key, vars)` for
  // use in Alpine templates (`x-text="t('nav.stacks')"`) and JS.
  // ------------------------------------------------------------------
  const I18N = {
    dict: {},
    code: 'en',
    dir: 'ltr',
    languages: [],            // populated from /i18n/index.json
    _warned: new Set(),       // de-dupe console.warn for missing keys
    flatten(obj, prefix) {
      prefix = prefix || '';
      const out = {};
      for (const k in obj) {
        const v = obj[k];
        const key = prefix ? prefix + '.' + k : k;
        if (v && typeof v === 'object' && !Array.isArray(v)) {
          Object.assign(out, this.flatten(v, key));
        } else {
          out[key] = v;
        }
      }
      return out;
    },
    async loadIndex() {
      try {
        const r = await fetch('/i18n/index.json', { cache: 'no-cache' });
        if (r.ok) this.languages = await r.json();
      } catch (_) {
        // Fallback: at least offer English if the index is missing.
        this.languages = [{ code: 'en', name: 'English', dir: 'ltr' }];
      }
    },
    async load(code) {
      const r = await fetch('/i18n/' + code + '.json', { cache: 'no-cache' });
      if (!r.ok) throw new Error('language ' + code + ' not found');
      const doc = await r.json();
      this.dict = this.flatten(doc);
      this.code = code;
      this.dir = (doc._meta && doc._meta.dir) || 'ltr';
      document.documentElement.setAttribute('lang', code);
      document.documentElement.setAttribute('dir', this.dir);
      localStorage.setItem('lang', code);
      // Clear the warned-keys set so a language swap re-surfaces the ones
      // that are still missing in the new dict.
      this._warned = new Set();
    },
    t(key, vars) {
      let s = this.dict[key];
      if (s === undefined || s === '') {
        s = (window.__i18nEn && window.__i18nEn[key]);
        if ((s === undefined || s === '') && !this._warned.has(key)) {
          this._warned.add(key);
          if (typeof console !== 'undefined' && console.warn) {
            console.warn('[i18n] Missing key:', key);
          }
        }
        if (s === undefined || s === '') s = key;
      }
      if (vars) {
        for (const k in vars) {
          s = String(s).replaceAll('{' + k + '}', String(vars[k]));
        }
      }
      return s;
    },
  };
  window.I18N = I18N;
  window.t = I18N.t.bind(I18N);

  // Boot sequence — always preload English (so the missing-key fallback
  // has a dict) before applying the user's preferred language.
  window.__i18nReady = (async function () {
    try {
      const r = await fetch('/i18n/en.json', { cache: 'no-cache' });
      if (r.ok) {
        const doc = await r.json();
        window.__i18nEn = I18N.flatten(doc);
      }
    } catch (_) { window.__i18nEn = {}; }
    await I18N.loadIndex();
    const pref = localStorage.getItem('lang') || 'en';
    if (pref === 'en') {
      I18N.dict = window.__i18nEn || {};
      I18N.dir = 'ltr';
      I18N.code = 'en';
      document.documentElement.setAttribute('lang', 'en');
      document.documentElement.setAttribute('dir', 'ltr');
    } else {
      try { await I18N.load(pref); }
      catch (_) {
        I18N.dict = window.__i18nEn || {};
      }
    }
  })();
</script>
<!-- Poppins is vendored under /fonts/ and declared in css/style.css. No
     external font fetches — the app stays functional fully offline. -->

<!-- All three front-end deps served straight from /node_modules/. Tailwind
     uses @tailwindcss/browser (v4's in-browser JIT runtime equivalent to
     the old v3 Play CDN). Bump versions in package.json, `npm install`,
     commit node_modules. -->
<script src="/node_modules/@tailwindcss/browser/dist/index.global.js"></script>
<!-- Alpine is deferred further — we wait on __i18nReady first so the first
     render has translations in hand. The shim below replaces Alpine's
     auto-start with a gated one (see bottom-of-body <script>). -->
<script>
  // Tell Alpine NOT to auto-start; we'll start it manually after i18n is ready.
  window.deferLoadingAlpine = function (callback) {
    (async function () {
      try { await window.__i18nReady; } catch (_) {}
      callback();
    })();
  };
</script>

<link rel="stylesheet" href="css/style.css">
<script>
  // Global fetch wrapper installed before Alpine init. Does two things:
  //   1. Auto-attaches X-CSRF-Token on state-changing requests by copying
  //      the pu_csrf cookie (double-submit defense). Server enforces this
  //      for cookie-authed callers on every POST/PUT/PATCH/DELETE.
  //   2. Redirects to /login on a 401 response so session expiry is
  //      self-healing — user lands on the login page, authenticates,
  //      comes back to where they were.
  (function () {
    const WRITE_METHODS = new Set(['POST', 'PUT', 'PATCH', 'DELETE']);
    const orig = window.fetch;
    window.fetch = async function (input, init) {
      init = init || {};
      const method = (init.method || 'GET').toUpperCase();
      if (WRITE_METHODS.has(method)) {
        const m = document.cookie.match(/(?:^|; )pu_csrf=([^;]+)/);
        if (m) {
          const headers = new Headers(init.headers || {});
          if (!headers.has('X-CSRF-Token')) {
            headers.set('X-CSRF-Token', decodeURIComponent(m[1]));
          }
          init.headers = headers;
        }
      }
      const r = await orig.call(this, input, init);
      if (r.status === 401) {
        const path = location.pathname + location.search;
        location.href = '/login?next=' + encodeURIComponent(path);
      }
      return r;
    };
  })();
</script>

<body class="min-h-screen">

<div x-data="app()" x-init="init()" x-cloak class="flex flex-col min-h-screen">

  <!-- ================== TOPBAR ================== -->
  <header class="sticky top-0 z-30 bg-[var(--surface)]/95 backdrop-blur border-b border-[var(--border)]">
    <div class="flex items-center gap-4 px-5 py-2.5 max-w-full mx-auto">
      <div class="flex items-center gap-2 pr-4 mr-1 border-r border-[var(--border)]">
        <div class="app-logo">
          <svg width="16" height="16" viewBox="0 0 32 32" fill="none">
            <rect x="7" y="11" width="18" height="14" rx="2" stroke="white" stroke-width="2.2" fill="none"/>
            <path d="M16 4 L16 15 M11 10 L16 15 L21 10" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="font-semibold text-[14px] leading-tight tracking-tight" x-text="t('app.name')"></div>
          <div class="text-[10.5px] text-[var(--text-faint)] leading-tight" x-text="t('app.tagline')"></div>
        </div>
      </div>

      <nav class="flex items-center gap-0.5">
        <template x-for="t in navItems()" :key="t[0]">
          <button @click="view=t[0]"
                  :class="view===t[0] ? 'text-[var(--text)] bg-[var(--surface-2)]' : 'text-[var(--text-dim)] hover:text-[var(--text)]'"
                  class="px-3 py-1.5 rounded-md text-[13px] font-medium transition" x-text="t[1]"></button>
        </template>
      </nav>

      <div class="flex-1 relative max-w-md">
        <input type="search" x-model="search" x-ref="searchBox"
               :placeholder="t('topbar.search_placeholder')"
               class="w-full">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[var(--text-faint)]">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
        </span>
        <span x-show="search" @click="search=''" class="absolute right-3 top-1/2 -translate-y-1/2 text-[var(--text-faint)] hover:text-[var(--text)] cursor-pointer text-xs">✕</span>
      </div>

      <div class="flex items-center gap-2">
        <div class="flex items-center gap-0 bg-[var(--surface-2)] rounded-md p-0.5 border border-[var(--border)]" :title="t('topbar.sync_title')">
          <span class="px-1.5 text-[10px] text-faint uppercase tracking-wider" x-text="t('topbar.sync_label')"></span>
          <template x-for="p in [[t('topbar.off'),0],['30s',30],['1m',60],['5m',300]]" :key="p[1]">
            <button @click="setAutoRefresh(p[1])"
                    :class="autoRefresh===p[1] ? 'bg-[var(--primary)] text-white' : 'text-[var(--text-dim)] hover:text-[var(--text)]'"
                    class="px-2 py-1 rounded text-[11px] font-medium transition" x-text="p[0]"></button>
          </template>
        </div>
        <div class="flex items-center gap-0 bg-[var(--surface-2)] rounded-md p-0.5 border border-[var(--border)] hidden lg:flex" :title="t('topbar.stats_title')">
          <span class="px-1.5 text-[10px] text-faint uppercase tracking-wider" x-text="t('topbar.stats_label')"></span>
          <template x-for="p in [[t('topbar.off'),0],['5s',5],['15s',15],['30s',30],['1m',60]]" :key="p[1]">
            <button @click="setStatsInterval(p[1])"
                    :class="statsInterval===p[1] ? 'bg-[var(--primary)] text-white' : 'text-[var(--text-dim)] hover:text-[var(--text)]'"
                    class="px-2 py-1 rounded text-[11px] font-medium transition" x-text="p[0]"></button>
          </template>
        </div>
        <span class="text-[11px] text-[var(--text-faint)] hidden xl:inline" x-text="cacheLabel"></span>
        <button x-show="isAdmin() && removableAll().length > 0"
                @click="bulkRemoveAll()"
                class="btn btn-danger-outline"
                :title="t('topbar.cleanup_title', { count: removableAll().length })">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/></svg>
          <span class="text-[11px]"><span x-text="t('actions.cleanup')"></span> <span x-text="removableAll().length"></span></span>
        </button>
        <button @click="refresh(true)" :disabled="loading" class="btn btn-soft" :title="t('topbar.refresh_title')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" :class="loading && 'animate-spin'"><path d="M3 12a9 9 0 0 1 15.5-6.36L22 8"/><path d="M22 3v5h-5"/><path d="M22 12a9 9 0 0 1-15.5 6.36L3 16"/><path d="M2 21v-5h5"/></svg>
        </button>
        <button @click="cycleTheme()" :title="t('topbar.theme_title', { pref: themePref })" class="btn btn-soft">
          <!-- Moon for dark, sun for light, sun+moon split (crescent over sun) for auto. -->
          <template x-if="themePref==='dark'">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </template>
          <template x-if="themePref==='light'">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          </template>
          <template x-if="themePref==='auto'">
            <!-- Lucide "sun-moon": sun rays surrounding a crescent, i.e. "follow system". -->
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 8a2.83 2.83 0 0 0 4 4 4 4 0 1 1-4-4"/>
              <path d="M12 2v2"/>
              <path d="M12 20v2"/>
              <path d="m4.9 4.9 1.4 1.4"/>
              <path d="m17.7 17.7 1.4 1.4"/>
              <path d="M2 12h2"/>
              <path d="M20 12h2"/>
              <path d="m6.3 17.7-1.4 1.4"/>
              <path d="m19.1 4.9-1.4 1.4"/>
            </svg>
          </template>
        </button>
        <button @click="showHotkeys=true" class="btn btn-soft" :title="t('topbar.hotkeys_title')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
        </button>

        <!-- Language picker. Compact <select> — the richer UI lives in
             Settings → Language. Rendered from I18N.languages which is
             populated from /i18n/index.json at boot. -->
        <select :value="lang" @change="setLang($event.target.value)"
                class="lang-picker text-[11px]"
                :title="t('settings.language.label')">
          <template x-for="l in availableLanguages" :key="l.code">
            <option :value="l.code" x-text="l.name"></option>
          </template>
        </select>
      </div>

      <!-- User menu — avatar button in the top-right opens a dropdown with
           "Signed in as …" header + profile / settings / admin / help /
           sign out. Click-outside and Esc both close it. -->
      <div x-show="me" x-data="{ }" class="relative ml-auto pl-4 border-l border-[var(--border)]">
        <button @click="userMenuOpen = !userMenuOpen"
                class="flex items-center gap-1 p-1 rounded-full hover:bg-[var(--surface-2)] transition"
                :title="me ? 'Signed in as ' + me.username : ''"
                :aria-expanded="userMenuOpen">
          <span class="user-avatar" :style="'--avatar-hue:' + avatarHue()">
            <span x-text="initial()"></span>
          </span>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               class="text-[var(--text-dim)]" :class="userMenuOpen && 'rotate-180'"><polyline points="6 9 12 15 18 9"/></svg>
        </button>

        <!-- Dropdown -->
        <div x-show="userMenuOpen" @click.outside="userMenuOpen = false"
             @keydown.escape.window="userMenuOpen = false"
             x-transition.opacity
             class="absolute right-0 top-full mt-1 w-[220px] bg-[var(--surface)] border border-[var(--border)] rounded-md shadow-lg z-40 overflow-hidden">
          <div class="px-3 py-2 border-b border-[var(--border)] text-[10px] uppercase tracking-wider text-[var(--text-faint)]">
            <span x-text="t('app.signed_in_as')"></span> <span class="text-[var(--text-dim)] font-semibold normal-case" x-text="me && me.username"></span>
          </div>
          <button @click="userMenuOpen=false; view='settings'; settingsSection='profile'" class="user-menu-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span x-text="t('user_menu.profile')"></span>
          </button>
          <button @click="userMenuOpen=false; view='settings'" class="user-menu-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span x-text="t('user_menu.settings')"></span>
          </button>
          <button x-show="isAdmin()" @click="userMenuOpen=false; view='admin'" class="user-menu-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span x-text="t('user_menu.admin')"></span>
          </button>
          <button @click="userMenuOpen=false; showHotkeys=true" class="user-menu-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
            <span x-text="t('user_menu.hotkeys')"></span>
          </button>
          <div class="border-t border-[var(--border)]"></div>
          <button @click="userMenuOpen=false; logout()" class="user-menu-item user-menu-item-danger">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span x-text="t('user_menu.sign_out')"></span>
          </button>
        </div>
      </div>
    </div>

    <!-- FILTER BAR -->
    <div x-show="view==='stacks' || view==='services'" class="px-5 pb-3 max-w-full mx-auto w-full flex items-center gap-2 flex-wrap">
      <div class="flex items-center gap-1.5 flex-wrap">
        <button @click="healthFilter='';statusFilter=''"
                :class="(!healthFilter && !statusFilter) ? 'active' : ''"
                class="filter-chip"><span x-text="t('filters.all')"></span> <span class="count" x-text="items.length"></span></button>
        <button @click="healthFilter='healthy';statusFilter=''"
                :class="healthFilter==='healthy' ? 'active' : ''"
                class="filter-chip"><span class="dot dot-healthy inline-block me-1.5"></span><span x-text="t('filters.online')"></span> <span class="count" x-text="counts.healthy"></span></button>
        <button @click="healthFilter='degraded';statusFilter=''"
                :class="healthFilter==='degraded' ? 'active' : ''"
                class="filter-chip"><span class="dot dot-degraded inline-block me-1.5"></span><span x-text="t('filters.degraded')"></span> <span class="count" x-text="counts.degraded"></span></button>
        <button @click="healthFilter='offline';statusFilter=''"
                :class="healthFilter==='offline' ? 'active' : ''"
                class="filter-chip"><span class="dot dot-offline inline-block me-1.5"></span><span x-text="t('filters.offline')"></span> <span class="count" x-text="counts.offline"></span></button>
      </div>

      <span class="w-px h-5 bg-[var(--border)] mx-1"></span>

      <div class="flex items-center gap-1.5 flex-wrap">
        <button @click="statusFilter='update';healthFilter=''"
                :class="statusFilter==='update' ? 'active' : ''"
                class="filter-chip"><span class="dot dot-update inline-block me-1.5"></span><span x-text="t('filters.updates')"></span> <span class="count" x-text="counts.update"></span></button>
        <button @click="statusFilter='up-to-date';healthFilter=''"
                :class="statusFilter==='up-to-date' ? 'active' : ''"
                class="filter-chip"><span x-text="t('filters.uptodate')"></span> <span class="count" x-text="counts.uptodate"></span></button>
        <button @click="statusFilter='error';healthFilter=''"
                :class="statusFilter==='error' ? 'active' : ''"
                class="filter-chip"><span class="dot dot-error inline-block me-1.5"></span><span x-text="t('filters.errors')"></span> <span class="count" x-text="counts.error"></span></button>
        <button @click="statusFilter='unknown';healthFilter=''"
                :class="statusFilter==='unknown' ? 'active' : ''"
                class="filter-chip"><span x-text="t('filters.unknown')"></span> <span class="count" x-text="counts.unknown"></span></button>
        <button @click="statusFilter='ignored';healthFilter=''"
                :class="statusFilter==='ignored' ? 'active' : ''"
                class="filter-chip"><span x-text="t('filters.ignored')"></span> <span class="count" x-text="counts.ignored"></span></button>
      </div>

      <div class="flex-1"></div>

      <div x-show="view==='stacks'"
           class="flex items-center gap-1 bg-[var(--surface-2)] rounded-md p-0.5 border border-[var(--border)]"
           :title="t('filters.expand_collapse_title')">
        <button @click="expandAllStacks()"
                class="px-2.5 py-1 rounded text-[11px] font-medium text-[var(--text-dim)] hover:text-[var(--text)] transition flex items-center gap-1.5">

          <span x-text="t('filters.expand_all')"></span>
        </button>
        <button @click="collapseAllStacks()"
                class="px-2.5 py-1 rounded text-[11px] font-medium text-[var(--text-dim)] hover:text-[var(--text)] transition flex items-center gap-1.5">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
          <span x-text="t('filters.collapse_all')"></span>
        </button>
      </div>

      <div class="flex items-center gap-1 bg-[var(--surface-2)] rounded-md p-0.5 border border-[var(--border)]">
        <button @click="view='stacks'" :class="view==='stacks' ? 'bg-[var(--surface)] text-[var(--text)]' : 'text-[var(--text-dim)]'"
                class="px-2.5 py-1 rounded text-[11px] font-medium transition" x-text="t('filters.grouped')"></button>
        <button @click="view='services'" :class="view==='services' ? 'bg-[var(--surface)] text-[var(--text)]' : 'text-[var(--text-dim)]'"
                class="px-2.5 py-1 rounded text-[11px] font-medium transition" x-text="t('filters.list')"></button>
      </div>

      <div class="text-[11px] text-[var(--text-faint)] flex items-center gap-3">
        <span x-show="activeOps.length>0" class="flex items-center gap-1 text-[var(--primary)]">
          <span class="dot dot-primary dot-pulse"></span>
          <span x-text="t('states.running', { count: activeOps.length })"></span>
        </span>
        <span x-text="t('filters.stacks_nodes', { stacks: stacks.length, nodes: Object.keys(nodes).length })"></span>
      </div>
    </div>
  </header>

  <!-- ================== MAIN ================== -->
  <main class="flex-1 px-5 py-4 max-w-full mx-auto w-full">

    <!-- BULK BAR — only shown to admins (readonly can select for inspection but not act). -->
    <div x-show="selected.length>0 && isAdmin()"
         class="sticky top-[108px] z-20 bg-[var(--surface)] border border-[var(--border-bright)] rounded-md px-4 py-2 flex items-center gap-3 mb-3 shadow-lg fade-in">
      <span class="font-semibold text-[13px]" x-text="t('bulk.selected', { count: selected.length })"></span>
      <span class="text-[11px] text-[var(--text-faint)]"
            x-text="selectionSummary()"></span>
      <span class="flex-1"></span>
      <button x-show="selectionUpdatable().length > 0" @click="bulkUpdate()" class="btn btn-warning text-[12px]">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <span x-text="t('bulk.update')"></span> (<span x-text="selectionUpdatable().length"></span>)
      </button>
      <button x-show="selectionRestartable().length > 0" @click="bulkRestart()" class="btn btn-soft text-[12px]">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12a9 9 0 0 1 15.5-6.36L22 8"/><path d="M22 3v5h-5"/><path d="M22 12a9 9 0 0 1-15.5 6.36L3 16"/><path d="M2 21v-5h5"/></svg>
        <span x-text="t('bulk.restart')"></span> (<span x-text="selectionRestartable().length"></span>)
      </button>
      <button x-show="selectionRemovable().length > 0" @click="bulkRemove()" class="btn btn-danger-outline text-[12px]">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/></svg>
        <span x-text="t('bulk.remove')"></span> (<span x-text="selectionRemovable().length"></span>)
      </button>
      <button @click="selected=[]" class="btn btn-ghost text-[12px]" x-text="t('bulk.clear')"></button>
    </div>

    <!-- ===== STACKS GROUPED VIEW ===== -->
    <div x-show="view==='stacks'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md overflow-hidden">
      <div class="overflow-x-auto scrollbar">
        <table class="ptable">
          <thead>
            <tr>
              <th class="col-checkbox"></th>
              <th class="col-chev"></th>
              <th class="col-grow" x-text="t('columns.resource')"></th>
              <th class="col-image" x-text="t('columns.image')"></th>
              <th class="col-health" x-text="t('columns.health')"></th>
              <th class="col-status" x-text="t('columns.status')"></th>
              <th class="col-tasks hidden lg:table-cell" x-text="t('columns.tasks')"></th>
              <th class="col-cpu hidden md:table-cell" x-text="t('columns.cpu')"></th>
              <th class="col-mem hidden md:table-cell" x-text="t('columns.memory')"></th>
              <th class="col-disk hidden xl:table-cell" x-text="t('columns.disk')"></th>
              <th class="col-uptime hidden lg:table-cell" x-text="t('columns.uptime')"></th>
              <th class="col-node hidden xl:table-cell" x-text="t('columns.node')"></th>
              <th class="col-action" x-text="t('columns.action')"></th>
            </tr>
          </thead>
          <template x-for="stack in filteredStacks" :key="stack.name">
            <tbody>
              <tr class="group-row" @click="toggleStack(stack.name)">
                <td></td>
                <td><span class="chev" :class="expanded.includes(stack.name) ? 'open' : ''">▶</span></td>
                <td colspan="2">
                  <div class="flex items-center gap-2">
                    <img class="app-icon" :src="stackIconUrl(stack)" :alt="stack.name" loading="lazy"
                         @error="$el.classList.add('broken')">
                    <span x-text="stack.name"></span>
                    <span class="text-[var(--text-faint)] text-[11px] font-normal" x-text="'(' + stack.total + ')'"></span>
                    <span x-show="stack.is_standalone" class="chip text-[10px]" x-text="t('chips.standalone')"></span>
                    <span x-show="!stack.is_standalone && !stack.stack_id" class="chip text-[10px] text-warning" x-text="t('chips.external')"></span>
                  </div>
                </td>
                <td>
                  <span x-show="stack.offline>0" class="pill pill-offline" x-text="stack.offline + ' ' + t('chips.off_suffix')"></span>
                  <span x-show="stack.degraded>0" class="pill pill-degraded ms-1" x-text="stack.degraded"></span>
                </td>
                <td>
                  <span x-show="stack.updates>0" class="pill pill-update" x-text="stack.updates + ' ' + t('chips.upd_suffix')"></span>
                  <span x-show="stack.errors>0" class="pill pill-error ms-1" x-text="stack.errors + ' ' + t('chips.err_suffix')"></span>
                  <span x-show="stack.unknowns>0" class="pill pill-unknown ms-1" x-text="stack.unknowns + ' ' + t('chips.unknown_short')"></span>
                </td>
                <td class="hidden lg:table-cell text-[var(--text-faint)] text-[12px]" x-text="stack.uptodate + '/' + stack.total + ' ' + t('chips.ok_suffix')"></td>
                <td class="hidden md:table-cell text-[11.5px] mono text-dim col-cpu"
                    x-text="stackStats(stack).hasStats ? cpuLabel(stackStats(stack).cpu) : '—'"></td>
                <td class="hidden md:table-cell text-[11.5px] mono text-dim col-mem"
                    x-text="stackStats(stack).hasStats ? fmtBytes(stackStats(stack).memUsage) : '—'"></td>
                <td class="hidden xl:table-cell text-[11.5px] mono text-dim col-disk"
                    x-text="stackStats(stack).hasSize ? fmtBytes(stackStats(stack).sizeRoot) : '—'"></td>
                <td class="hidden lg:table-cell"></td>
                <td class="hidden xl:table-cell"></td>
                <td class="align-right" @click.stop>
                  <button x-show="isAdmin() && stack.updates>0 && stack.stack_id"
                          @click="updateStack(stack)"
                          :disabled="isStackBusy(stack)"
                          class="btn btn-warning text-[12px]">
                    <span x-show="!isStackBusy(stack)" x-text="t('actions.update_stack')"></span>
                    <span x-show="isStackBusy(stack)" class="flex items-center gap-1.5"><span class="spin"></span><span x-text="t('actions.updating')"></span></span>
                  </button>
                  <a x-show="stack.stack_id"
                     :href="portainerDeepLink(stack)" target="_blank" @click.stop
                     class="text-[11px] text-[var(--text-faint)] hover:text-[var(--primary)] ms-2">↗</a>
                </td>
              </tr>
              <template x-for="item in stack.items" :key="item.id">
                <tr class="item-row" :class="selected.includes(item.id) ? 'sel' : ''"
                    x-show="expanded.includes(stack.name)"
                    @click="openDrawer(item)">
                  <td @click.stop>
                    <input type="checkbox" :value="item.id" x-model="selected"
                           :disabled="!isSelectable(item)"
                           class="w-[13px] h-[13px] accent-[var(--primary)] disabled:opacity-25">
                  </td>
                  <td><span class="dot" :class="'dot-' + statusKey(item.status)"></span></td>
                  <td class="col-grow">
                    <div class="flex items-center gap-2">
                      <img class="app-icon sm" :src="itemIconUrl(item)" :alt="item.stack || item.name" loading="lazy"
                           @error="$el.classList.add('broken')">
                      <div class="min-w-0">
                        <div class="mono text-[12.5px] text-[var(--text)]" x-text="item.name"></div>
                        <div class="text-[10.5px] text-[var(--text-faint)]" x-text="itemSubline(item)"></div>
                        <div x-show="item.type==='service' && topologyGroups(item).length" class="topology-map">
                          <template x-for="group in topologyGroups(item)" :key="group.node">
                            <span class="topology-node"
                                  :title="group.node + ' — ' + group.chips.length + ' replica' + (group.chips.length===1 ? '' : 's')">
                              <span class="topology-host" x-text="group.node"></span>
                              <template x-for="(c, i) in group.chips" :key="i">
                                <span class="topology-chip"
                                      :class="'topology-' + (c.state || 'unknown')"
                                      :title="(c.state || 'unknown') + (c.err ? ': ' + c.err : '')"></span>
                              </template>
                            </span>
                          </template>
                        </div>
                      </div>
                    </div>
                  </td>
                  <td class="mono text-[11.5px] text-dim col-image">
                    <span x-text="imageRepo(item)"></span><span class="text-[var(--text-faint)]">:</span><span class="text-[var(--text-faint)]" x-text="item.tag"></span>
                  </td>
                  <td><span class="pill" :class="'pill-' + (item.health || 'unknown')" x-text="item.health || '—'"></span></td>
                  <td><span class="pill" :class="'pill-' + statusKey(item.status)" x-text="item.status"></span></td>
                  <td class="hidden lg:table-cell text-[12px] mono"
                      :class="(item.replicas && item.replicas.running < item.replicas.desired) ? 'text-[var(--warning)]' : 'text-[var(--text-dim)]'">
                    <span x-text="item.replicas ? (item.replicas.running + '/' + item.replicas.desired) : '—'"></span>
                  </td>
                  <td class="hidden md:table-cell stat-cell">
                    <template x-if="statsFor(item).has_stats">
                      <div>
                        <div class="stat-bar" :class="barLevel(statsFor(item).cpu_percent)" :style="`--w:${statsFor(item).cpu_percent}%`">
                          <div class="fill"></div>
                          <div class="label" x-text="cpuLabel(statsFor(item).cpu_percent)"></div>
                        </div>
                        <svg x-show="sparkPoints(item, 'cpu')" class="spark" :class="sparkClass(item, 'cpu')"
                             viewBox="0 0 60 10" preserveAspectRatio="none"
                             aria-hidden="true" title="CPU — last 24h">
                          <polyline fill="none" stroke="currentColor" stroke-width="1" :points="sparkPoints(item, 'cpu')"></polyline>
                        </svg>
                      </div>
                    </template>
                    <template x-if="!statsFor(item).has_stats">
                      <span class="text-[11px] text-faint">—</span>
                    </template>
                  </td>
                  <td class="hidden md:table-cell stat-cell">
                    <template x-if="statsFor(item).has_stats">
                      <div>
                        <div class="stat-bar" :class="barLevel(memPercent(item))" :style="`--w:${memPercent(item)}%`">
                          <div class="fill"></div>
                          <div class="label" x-text="memPercent(item).toFixed(0) + '%'"></div>
                        </div>
                        <div class="stat-sub" x-text="fmtBytes(statsFor(item).mem_usage) + ' / ' + fmtBytes(statsFor(item).mem_limit)"></div>
                        <svg x-show="sparkPoints(item, 'mem')" class="spark" :class="sparkClass(item, 'mem')"
                             viewBox="0 0 60 10" preserveAspectRatio="none"
                             aria-hidden="true" title="Memory — last 24h">
                          <polyline fill="none" stroke="currentColor" stroke-width="1" :points="sparkPoints(item, 'mem')"></polyline>
                        </svg>
                      </div>
                    </template>
                    <template x-if="!statsFor(item).has_stats">
                      <span class="text-[11px] text-faint">—</span>
                    </template>
                  </td>
                  <td class="hidden xl:table-cell stat-cell">
                    <template x-if="statsFor(item).has_size">
                      <div class="stat-bar info" :style="`--w:${diskPercent(item)}%`">
                        <div class="fill"></div>
                        <div class="label" x-text="fmtBytes(statsFor(item).size_root)"></div>
                      </div>
                    </template>
                    <template x-if="!statsFor(item).has_size">
                      <span class="text-[11px] text-faint">—</span>
                    </template>
                  </td>
                  <td class="hidden lg:table-cell text-[11.5px] mono text-dim" x-text="fmtAgo(uptimeFor(item))"></td>
                  <td class="hidden xl:table-cell text-[11.5px] text-[var(--text-faint)] truncate max-w-[140px]"
                    :title="nodeSummary(item) || ''"
                    x-text="nodeSummary(item) || '—'"></td>
                  <td class="align-right" @click.stop>
                    <div class="flex items-center justify-end gap-1.5">
                      <button x-show="isAdmin() && item.status==='update' && canUpdate(item)"
                              @click="itemAction(item)"
                              :disabled="isItemBusy(item)"
                              class="btn btn-warning text-[11px]">
                        <template x-if="isItemBusy(item)"><span class="flex items-center gap-1"><span class="spin"></span>…</span></template>
                        <template x-if="!isItemBusy(item)"><span x-text="actionLabel(item)"></span></template>
                      </button>
                      <button x-show="isAdmin() && isRestartable(item)"
                              @click="restartItem(item)"
                              :disabled="isRestartBusy(item)"
                              class="btn btn-soft text-[11px]"
                              :title="t('actions.restart_force_title')">
                        <template x-if="isRestartBusy(item)"><span class="spin"></span></template>
                        <template x-if="!isRestartBusy(item)">
                          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12a9 9 0 0 1 15.5-6.36L22 8"/><path d="M22 3v5h-5"/><path d="M22 12a9 9 0 0 1-15.5 6.36L3 16"/><path d="M2 21v-5h5"/></svg>
                        </template>
                      </button>
                      <button x-show="isAdmin() && item.removable"
                              @click="removeContainer(item)"
                              :disabled="isItemBusy(item)"
                              class="btn btn-danger-outline text-[11px]"
                              :title="t('actions.remove_container_title')">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/></svg>
                      </button>
                    </div>
                  </td>
                </tr>
              </template>
            </tbody>
          </template>
        </table>
      </div>
      <div x-show="loading && items.length === 0" class="loading-state">
        <span class="spin-lg" aria-hidden="true"></span>
        <div x-text="t('loading.resources')"></div>
      </div>
      <div x-show="filteredStacks.length===0 && !loading && items.length > 0" class="text-center py-16 text-[var(--text-faint)] text-sm">
        <span x-text="t('empty.no_match_filters')"></span>
        <button @click="search='';statusFilter='';healthFilter=''" class="ms-2 text-[var(--primary)] hover:underline" x-text="t('empty.clear')"></button>
      </div>
    </div>

    <!-- ===== SERVICES FLAT LIST ===== -->
    <div x-show="view==='services'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md overflow-hidden">
      <div class="overflow-x-auto scrollbar">
        <table class="ptable">
          <thead>
            <tr>
              <th class="col-checkbox">
                <input type="checkbox"
                       :checked="selected.length>0 && selected.length===filteredItems.filter(i=>isSelectable(i)).length"
                       @click="toggleSelectAll()"
                       class="w-[13px] h-[13px] accent-[var(--primary)]">
              </th>
              <th class="col-chev"></th>
              <th class="col-grow sortable" @click="sortBy('name')"><span x-text="t('columns.name')"></span> <span x-text="sortIndicator('name')"></span></th>
              <th class="sortable" @click="sortBy('stack')" x-text="t('columns.stack')"></th>
              <th class="col-image sortable" @click="sortBy('image')" x-text="t('columns.image')"></th>
              <th class="col-health" x-text="t('columns.health')"></th>
              <th class="col-status sortable" @click="sortBy('status')"><span x-text="t('columns.status')"></span> <span x-text="sortIndicator('status')"></span></th>
              <th class="col-tasks hidden lg:table-cell" x-text="t('columns.tasks')"></th>
              <th class="col-cpu hidden md:table-cell" x-text="t('columns.cpu')"></th>
              <th class="col-mem hidden md:table-cell" x-text="t('columns.memory')"></th>
              <th class="col-disk hidden xl:table-cell" x-text="t('columns.disk')"></th>
              <th class="col-uptime sortable hidden lg:table-cell" @click="sortBy('uptime')"><span x-text="t('columns.uptime')"></span> <span x-text="sortIndicator('uptime')"></span></th>
              <th class="col-node hidden xl:table-cell" x-text="t('columns.node')"></th>
              <th class="col-action" x-text="t('columns.action')"></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="item in sortedFiltered" :key="item.id">
              <tr class="item-row" :class="selected.includes(item.id) ? 'sel' : ''"
                  @click="openDrawer(item)">
                <td @click.stop>
                  <input type="checkbox" :value="item.id" x-model="selected"
                         :disabled="!isSelectable(item)"
                         class="w-[13px] h-[13px] accent-[var(--primary)] disabled:opacity-25">
                </td>
                <td><span class="dot" :class="'dot-' + statusKey(item.status)"></span></td>
                <td class="mono text-[12.5px] col-grow">
                  <div class="flex items-center gap-2">
                    <img class="app-icon sm" :src="itemIconUrl(item)" :alt="item.stack || item.name" loading="lazy"
                         @error="$el.classList.add('broken')">
                    <span x-text="item.name"></span>
                  </div>
                </td>
                <td class="mono text-[11.5px] text-[var(--text-dim)]" x-text="item.stack || '—'"></td>
                <td class="mono text-[11.5px] text-dim col-image">
                  <span x-text="imageRepo(item)"></span><span class="text-[var(--text-faint)]">:</span><span class="text-[var(--text-faint)]" x-text="item.tag"></span>
                </td>
                <td><span class="pill" :class="'pill-' + (item.health || 'unknown')" x-text="item.health || '—'"></span></td>
                <td><span class="pill" :class="'pill-' + statusKey(item.status)" x-text="item.status"></span></td>
                <td class="hidden lg:table-cell text-[12px] mono"
                    :class="(item.replicas && item.replicas.running < item.replicas.desired) ? 'text-[var(--warning)]' : 'text-[var(--text-dim)]'">
                  <span x-text="item.replicas ? (item.replicas.running + '/' + item.replicas.desired) : '—'"></span>
                </td>
                <td class="hidden md:table-cell stat-cell">
                  <template x-if="statsFor(item).has_stats">
                    <div class="stat-bar" :class="barLevel(statsFor(item).cpu_percent)" :style="`--w:${statsFor(item).cpu_percent}%`">
                      <div class="fill"></div>
                      <div class="label" x-text="cpuLabel(statsFor(item).cpu_percent)"></div>
                    </div>
                  </template>
                  <template x-if="!statsFor(item).has_stats">
                    <span class="text-[11px] text-[var(--text-faint)]">—</span>
                  </template>
                </td>
                <td class="hidden md:table-cell stat-cell">
                  <template x-if="statsFor(item).has_stats">
                    <div>
                      <div class="stat-bar" :class="barLevel(memPercent(item))" :style="`--w:${memPercent(item)}%`">
                        <div class="fill"></div>
                        <div class="label" x-text="memPercent(item).toFixed(0) + '%'"></div>
                      </div>
                      <div class="stat-sub" x-text="fmtBytes(statsFor(item).mem_usage) + ' / ' + fmtBytes(statsFor(item).mem_limit)"></div>
                    </div>
                  </template>
                  <template x-if="!statsFor(item).has_stats">
                    <span class="text-[11px] text-[var(--text-faint)]">—</span>
                  </template>
                </td>
                <td class="hidden xl:table-cell stat-cell">
                  <template x-if="statsFor(item).has_size">
                    <div class="stat-bar info" :style="`--w:${diskPercent(item)}%`">
                      <div class="fill"></div>
                      <div class="label" x-text="fmtBytes(statsFor(item).size_root)"></div>
                    </div>
                  </template>
                  <template x-if="!statsFor(item).has_size">
                    <span class="text-[11px] text-[var(--text-faint)]">—</span>
                  </template>
                </td>
                <td class="hidden lg:table-cell text-[11.5px] mono text-dim" x-text="fmtAgo(uptimeFor(item))"></td>
                <td class="hidden xl:table-cell text-[11.5px] text-[var(--text-faint)] truncate max-w-[140px]"
                    :title="nodeSummary(item) || ''"
                    x-text="nodeSummary(item) || '—'"></td>
                <td class="align-right" @click.stop>
                  <div class="flex items-center justify-end gap-1.5">
                    <button x-show="isAdmin() && item.status==='update' && canUpdate(item)"
                            @click="itemAction(item)"
                            :disabled="isItemBusy(item)"
                            class="btn btn-warning text-[11px]">
                      <template x-if="isItemBusy(item)"><span class="flex items-center gap-1"><span class="spin"></span>…</span></template>
                      <template x-if="!isItemBusy(item)"><span x-text="actionLabel(item)"></span></template>
                    </button>
                    <button x-show="isAdmin() && isRestartable(item)"
                            @click="restartItem(item)"
                            :disabled="isRestartBusy(item)"
                            class="btn btn-soft text-[11px]"
                            title="Restart (force)">
                      <template x-if="isRestartBusy(item)"><span class="spin"></span></template>
                      <template x-if="!isRestartBusy(item)">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12a9 9 0 0 1 15.5-6.36L22 8"/><path d="M22 3v5h-5"/><path d="M22 12a9 9 0 0 1-15.5 6.36L3 16"/><path d="M2 21v-5h5"/></svg>
                      </template>
                    </button>
                    <button x-show="isAdmin() && item.removable"
