                <div class="metric-card-body">
                  <!-- Y-axis labels use `fmtBytesAt(v, max)` so all
                           three labels share the same unit family. -->
                  <div class="metric-y-axis">
                    <span x-text="fmtBytesAt(snmpMemMax(h), snmpMemMax(h))"></span>
                    <span x-text="fmtBytesAt(snmpMemMax(h) / 2, snmpMemMax(h))"></span>
                    <span>0</span>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                    <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                    <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                    <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                    <path fill="none" stroke="var(--danger)" stroke-width="1.5" :d="snmpMemArea(h.id, 'used')"></path>
                    <path fill="none" stroke="var(--warning)" stroke-width="1" :d="snmpMemArea(h.id, 'cached')"></path>
                    <path fill="none" stroke="var(--info)" stroke-width="1" :d="snmpMemArea(h.id, 'buffers')"></path>
                    <path fill="none" stroke="var(--success)" stroke-width="1" :d="snmpMemArea(h.id, 'free')"></path>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'mem-x-' + i"><span x-text="l"></span></template>
                  </div>
                </div>
              </template>
              <template x-if="!snmpHasEnoughHistory(h.id)">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- switch / router total throughput. Two
                     polylines (in / out) computed from the cumulative
                     IF-MIB ifHCInOctets / ifHCOutOctets columns
                     persisted on `host_snmp_samples`. Skip-don't-
                     synthesize on out-of-bounds deltas (counter wrap,
                     reboot, gap > 1h, > 10 GB delta). Hidden until at
                     least 2 ticks recorded the IF-MIB counters. -->
            <div class="metric-card"
                 x-show="snmpHasThroughput(h.id)">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('host_drawer.snmp_charts.throughput_title')"></span><span class="unit" x-text="unitForBytes(snmpThroughputMaxBps(h.id)) + '/s'"></span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'snmp_throughput')" :title="metricSource(h, 'snmp_throughput')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'snmp_throughput')"
                          @click.stop="toggleMetricTooltip(h, 'snmp_throughput')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'snmp_throughput')"
                          x-cloak @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'snmp_throughput')"></span>
                  </button>
                </div>
                <div class="metric-card-stats">
                      <span>
                        <span class="metric-legend-dot" style="background: var(--success);"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_throughput_in')"></span>
                        <span class="legend-val" x-text="fmtBytesAt(snmpThroughputLast(h.id, 'rx'), snmpThroughputMaxBps(h.id)) + '/s'"></span>
                      </span>
                  <span>
                        <span class="metric-legend-dot" style="background: var(--info);"></span>
                        <span x-text="t('host_drawer.snmp_charts.legend_throughput_out')"></span>
                        <span class="legend-val" x-text="fmtBytesAt(snmpThroughputLast(h.id, 'tx'), snmpThroughputMaxBps(h.id)) + '/s'"></span>
                      </span>
                </div>
              </div>
              <!-- static-rate headline above the chart so
                       operators see current rx + tx without parsing
                       the chart line. Same prominence as the printer
                       lifetime page count. Hidden when no live data. -->
              <div x-show="snmpThroughputLast(h.id, 'rx') > 0 || snmpThroughputLast(h.id, 'tx') > 0"
                   class="px-4 pb-2 flex items-baseline gap-3 fs-sm">
                    <span class="flex items-baseline gap-1.5">
                      <span class="text-[var(--success)]">↓</span>
                      <span class="fs-display-xs font-semibold mono"
                            x-text="fmtBytesAt(snmpThroughputLast(h.id, 'rx'), snmpThroughputMaxBps(h.id)) + '/s'"></span>
                    </span>
                <span class="flex items-baseline gap-1.5">
                      <span class="text-[var(--info)]">↑</span>
                      <span class="fs-display-xs font-semibold mono"
                            x-text="fmtBytesAt(snmpThroughputLast(h.id, 'tx'), snmpThroughputMaxBps(h.id)) + '/s'"></span>
                    </span>
              </div>
              <template x-if="snmpHasEnoughHistory(h.id)">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <span x-text="fmtBytesAt(snmpThroughputMaxBps(h.id), snmpThroughputMaxBps(h.id)) + '/s'"></span>
                    <span x-text="fmtBytesAt(snmpThroughputMaxBps(h.id) / 2, snmpThroughputMaxBps(h.id)) + '/s'"></span>
                    <span>0</span>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                    <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                    <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                    <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                    <path fill="none" stroke="var(--success)" stroke-width="1.5" :d="snmpThroughputLine(h.id, 'rx')"></path>
                    <path fill="none" stroke="var(--info)" stroke-width="1.5" :d="snmpThroughputLine(h.id, 'tx')"></path>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'thr-x-' + i"><span x-text="l"></span></template>
                  </div>
                </div>
              </template>
              <template x-if="!snmpHasEnoughHistory(h.id)">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- per-port throughput. Multi-line chart with
                     up to top-5 interfaces by latest combined rate
                     (in + out). Each iface gets one line; in / out
                     not stacked — operators want to see absolute per-
                     port throughput. Hidden when fewer than 2 ticks
                     of iface history exist. -->
            <!-- Defensive auto-kick for SNMP iface history. Same
                     shape as the ping-card x-effect — if the cache is
                     missing or has < 2 points and the host has an SNMP
                     probe target, fire a fresh fetch. Catches cases
                     where the drawer-open path's fetch silently failed
                     (HTTP error short-circuit, sampler tick race) so
                     the chart self-heals without requiring the user
                     to close + re-open the drawer. Per-host debounce
                     via `_snmpIfaceChartKickedFor` Set (cleared after
                     30s) so the effect doesn't loop on every reactive
                     re-evaluation. -->
            <template x-effect="(() => {
                  try {
                    if (!this._snmpHasProbeTarget(h)) return;
                    const cache = this.hostSnmpIfaceHistory && this.hostSnmpIfaceHistory[h.id];
                    const ifaces = (cache && cache.ifaces) || {};
                    let pointCount = 0;
                    for (const k of Object.keys(ifaces)) {
                      const arr = Array.isArray(ifaces[k]) ? ifaces[k] : [];
                      if (arr.length > pointCount) pointCount = arr.length;
                    }
                    if (pointCount >= 2) return;
                    if (cache && cache.loading) return;
                    this._snmpIfaceChartKickedFor = this._snmpIfaceChartKickedFor || new Set();
                    if (this._snmpIfaceChartKickedFor.has(h.id)) return;
                    this._snmpIfaceChartKickedFor.add(h.id);
                    setTimeout(() => {
                      try { this._snmpIfaceChartKickedFor && this._snmpIfaceChartKickedFor.delete(h.id); } catch (_) {}
                    }, 30000);
                    if (typeof this.loadHostSnmpIfaceHistory === 'function') {
                      this.loadHostSnmpIfaceHistory(h.id, this.hostHistoryRange || 1);
                    }
                  } catch (_) {}
                })()"></template>
            <div class="metric-card md:col-span-2 lg:col-span-3"
                 x-show="snmpHasIfaceHistory(h.id) || (h.network_ifaces && h.network_ifaces.length > 0)">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('host_drawer.snmp_charts.per_port_title')"></span><span class="unit" x-text="unitForBytes(snmpIfaceMaxBps(h.id)) + '/s'"></span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'snmp_throughput')" :title="metricSource(h, 'snmp_throughput')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'snmp_throughput')"
                          @click.stop="toggleMetricTooltip(h, 'snmp_per_port')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'snmp_per_port')"
                          x-cloak @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'snmp_throughput')"></span>
                  </button>
                </div>
                <div class="metric-card-stats">
                  <template x-for="(iface, idx) in snmpTopIfacesByThroughput(h.id, 5)" :key="'pp-leg-' + iface.name">
                        <span class="fs-xs">
                          <span class="metric-legend-dot"
                                :style="'background:' + ['var(--success)','var(--info)','var(--warning)','var(--danger)','var(--primary)'][idx % 5]"></span>
                          <span class="font-semibold" x-text="iface.name"></span>
                          <span class="text-[var(--text-faint)]"
                                x-text="' ' + fmtBytesAt(iface.lastIn, snmpIfaceMaxBps(h.id)) + '/s ↓ ' + fmtBytesAt(iface.lastOut, snmpIfaceMaxBps(h.id)) + '/s ↑'"></span>
                        </span>
                  </template>
                </div>
              </div>
              <template x-if="snmpHasIfaceHistory(h.id)">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <span x-text="fmtBytesAt(snmpIfaceMaxBps(h.id), snmpIfaceMaxBps(h.id)) + '/s'"></span>
                    <span x-text="fmtBytesAt(snmpIfaceMaxBps(h.id) / 2, snmpIfaceMaxBps(h.id)) + '/s'"></span>
                    <span>0</span>
                  </div>
                  <!-- Alpine `<template x-for>` doesn't work inside
                           SVG (template elements are HTML-only) — same
                           constraint the Temperature chart hits. Render
                           5 fixed in-polylines + 5 fixed out-polylines
                           by index instead so the chart actually draws. -->
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                    <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                    <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                    <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                    <path fill="none" stroke-width="1.5" stroke="var(--success)" :d="(snmpTopIfacesByThroughput(h.id, 5)[0] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[0].name, 'in', snmpIfaceMaxBps(h.id)) : '')"></path>
                    <path fill="none" stroke-width="1.5" stroke="var(--info)" :d="(snmpTopIfacesByThroughput(h.id, 5)[1] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[1].name, 'in', snmpIfaceMaxBps(h.id)) : '')"></path>
                    <path fill="none" stroke-width="1.5" stroke="var(--warning)" :d="(snmpTopIfacesByThroughput(h.id, 5)[2] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[2].name, 'in', snmpIfaceMaxBps(h.id)) : '')"></path>
                    <path fill="none" stroke-width="1.5" stroke="var(--danger)" :d="(snmpTopIfacesByThroughput(h.id, 5)[3] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[3].name, 'in', snmpIfaceMaxBps(h.id)) : '')"></path>
                    <path fill="none" stroke-width="1.5" stroke="var(--primary)" :d="(snmpTopIfacesByThroughput(h.id, 5)[4] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[4].name, 'in', snmpIfaceMaxBps(h.id)) : '')"></path>
                    <path fill="none" stroke-width="1" stroke-dasharray="3,2" stroke="var(--success)" :d="(snmpTopIfacesByThroughput(h.id, 5)[0] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[0].name, 'out', snmpIfaceMaxBps(h.id)) : '')"></path>
                    <path fill="none" stroke-width="1" stroke-dasharray="3,2" stroke="var(--info)" :d="(snmpTopIfacesByThroughput(h.id, 5)[1] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[1].name, 'out', snmpIfaceMaxBps(h.id)) : '')"></path>
                    <path fill="none" stroke-width="1" stroke-dasharray="3,2" stroke="var(--warning)" :d="(snmpTopIfacesByThroughput(h.id, 5)[2] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[2].name, 'out', snmpIfaceMaxBps(h.id)) : '')"></path>
                    <path fill="none" stroke-width="1" stroke-dasharray="3,2" stroke="var(--danger)" :d="(snmpTopIfacesByThroughput(h.id, 5)[3] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[3].name, 'out', snmpIfaceMaxBps(h.id)) : '')"></path>
                    <path fill="none" stroke-width="1" stroke-dasharray="3,2" stroke="var(--primary)" :d="(snmpTopIfacesByThroughput(h.id, 5)[4] ? snmpIfaceLine(h.id, snmpTopIfacesByThroughput(h.id, 5)[4].name, 'out', snmpIfaceMaxBps(h.id)) : '')"></path>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'pp-x-' + i"><span x-text="l"></span></template>
                  </div>
                </div>
              </template>
              <template x-if="!snmpHasIfaceHistory(h.id)">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- per-port utilization LINE chart (replaces
                     the chip-strip heatmap operator-flagged as
                     unreadable). Top 5 interfaces by current rate
                     (same ranking as the throughput chart) plotted
                     as utilization % of link capacity. Y-axis 0-100%.
                     Spinner shows during warm-up. Same 10-fixed-
                     polyline-by-index pattern as per-port throughput
                     since `<template x-for>` doesn't work inside
                     `<svg>`. -->
            <div class="metric-card md:col-span-2 lg:col-span-3"
                 x-show="snmpHasIfaceHistory(h.id) || (h.network_ifaces && h.network_ifaces.length > 0)">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('host_drawer.snmp_charts.heatmap_title')"></span><span class="unit">%</span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'snmp_throughput')" :title="metricSource(h, 'snmp_throughput')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'snmp_throughput')"
                          @click.stop="toggleMetricTooltip(h, 'snmp_heatmap')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'snmp_heatmap')"
                          x-cloak @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'snmp_throughput')"></span>
                  </button>
                </div>
                <div class="metric-card-stats">
                  <template x-for="(iface, idx) in snmpTopIfacesByThroughput(h.id, 5)" :key="'util-leg-' + iface.name">
                        <span class="fs-xs"
                              :title="snmpIfaceLinkSpeedAssumed(h.id, iface.name, h) ? t('host_drawer.snmp_charts.heatmap_assumed_speed') : ''">
                          <span class="metric-legend-dot"
                                :style="'background:' + ['var(--success)','var(--info)','var(--warning)','var(--danger)','var(--primary)'][idx % 5]"></span>
                          <span class="font-semibold" x-text="iface.name"></span>
                          <!-- Percentage prefixed with `~` when the
                               link speed was assumed (no ifHighSpeed
                               from agent) so the approximation lives
                               in the value itself, not just the
                               trailing asterisk + colour cue. CLAUDE.md
                               "colour is never the sole carrier of
                               meaning" — the `~` doubles up the signal
                               for operators who don't notice the warn-
                               coloured `*`. The asterisk + hover
                               tooltip still surface the full "assumed
                               100 Mbps" caveat for operators who want
                               the detail. -->
                          <!-- Pre-fix `Math.round(pct)` rendered "~0%"
                               for any sub-1% value, masking the real
                               activity. `snmpIfaceUtilizationPctLabel`
                               switches to two-decimal / three-decimal
                               precision below 1% so the operator sees
                               the actual rate. -->
                          <span class="text-[var(--text-faint)]"
                                x-text="snmpIfaceUtilizationPct(h.id, iface.name, h) != null
                                          ? ' ' + (snmpIfaceLinkSpeedAssumed(h.id, iface.name, h) ? '~' : '') + snmpIfaceUtilizationPctLabel(h.id, iface.name, h)
                                          : ''"></span>
                          <span x-show="snmpIfaceLinkSpeedAssumed(h.id, iface.name, h)"
                                class="text-[var(--warning)]">*</span>
                        </span>
                  </template>
                </div>
              </div>
              <template x-if="snmpHasIfaceUtilization(h.id, h)">
                <div class="metric-card-body">
                  <!-- Auto-rescaled Y-axis. Pre-fix the labels read
                           a fixed `0% / 50% / 100%` even when the peak
                           was 0.0003% (APC UPS lance), making the chart
                           appear flat. Now: `snmpIfaceUtilizationYAxisLabels`
                           returns labels matching `snmpIfaceUtilizationYMax`'s
                           nice-snap value, and `snmpIfaceUtilizationLineScaled`
                           stretches the polyline to fill that Y range. -->
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in snmpIfaceUtilizationYAxisLabels(h.id, h)" :key="'util-y-' + i"><span x-text="l"></span></template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                    <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                    <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                    <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                    <path fill="none" stroke-width="1.5" stroke="var(--success)" :d="(snmpTopIfacesByThroughput(h.id, 5)[0] ? snmpIfaceUtilizationLineScaled(h.id, snmpTopIfacesByThroughput(h.id, 5)[0].name, h) : '')"></path>
                    <path fill="none" stroke-width="1.5" stroke="var(--info)" :d="(snmpTopIfacesByThroughput(h.id, 5)[1] ? snmpIfaceUtilizationLineScaled(h.id, snmpTopIfacesByThroughput(h.id, 5)[1].name, h) : '')"></path>
                    <path fill="none" stroke-width="1.5" stroke="var(--warning)" :d="(snmpTopIfacesByThroughput(h.id, 5)[2] ? snmpIfaceUtilizationLineScaled(h.id, snmpTopIfacesByThroughput(h.id, 5)[2].name, h) : '')"></path>
                    <path fill="none" stroke-width="1.5" stroke="var(--danger)" :d="(snmpTopIfacesByThroughput(h.id, 5)[3] ? snmpIfaceUtilizationLineScaled(h.id, snmpTopIfacesByThroughput(h.id, 5)[3].name, h) : '')"></path>
                    <path fill="none" stroke-width="1.5" stroke="var(--primary)" :d="(snmpTopIfacesByThroughput(h.id, 5)[4] ? snmpIfaceUtilizationLineScaled(h.id, snmpTopIfacesByThroughput(h.id, 5)[4].name, h) : '')"></path>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'util-x-' + i"><span x-text="l"></span></template>
                  </div>
                </div>
              </template>
              <template x-if="!snmpHasIfaceUtilization(h.id, h)">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- Pages printed chart REMOVED per operator
                     request. The Printer card already surfaces the
                     lifetime page count as an 18 px headline ;
                     the pages-per-day rate sparkline added marginal
                     value for the cost of a permanently-spinner card
                     on idle printers. -->

            <!-- APC UPS Output Load % chart. Reads
                     `load_percent` from `host_snmp_samples` rows the
                     sampler writes when host_load_percent is present.
                     Y-axis pinned to 100% so a busy UPS doesn't auto-
                     rescale the chart on every tick. Visible only
                     when ≥ 2 ticks have a non-null load_percent — the
                     gate matches `snmpHasUpsLoad(h.id)` so non-UPS
                     hosts and brand-new UPS rows skip the card cleanly. -->
            <div class="metric-card"
                 x-show="snmpHasUpsLoad(h.id)">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('host_drawer.snmp_charts.ups_load_title')"></span><span class="unit">%</span>
                </div>
                <div class="metric-card-stats"
                     x-show="typeof h.host_load_percent === 'number'">
                      <span>
                        <span class="metric-legend-dot" style="background: var(--warning);"></span>
                        <span x-text="t('host_drawer.snmp_charts.ups_load_legend')"></span>
                        <span class="legend-val mono" x-text="(+h.host_load_percent).toFixed(0) + '%'"></span>
                      </span>
                </div>
              </div>
              <template x-if="snmpHasUpsLoadHistory(h.id)">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in yAxisPercent()" :key="'ups-load-y-' + i"><span x-text="l"></span></template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                    <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                    <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                    <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                    <path fill="none" stroke="var(--warning)" stroke-width="1.5" :d="snmpUpsLoadLine(h.id)"></path>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'ups-load-x-' + i"><span x-text="l"></span></template>
                  </div>
                </div>
              </template>
              <template x-if="!snmpHasUpsLoadHistory(h.id)">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- APC UPS Battery % chart. Discharge curve
                     when on battery + recharge curve afterwards.
                     Same pattern as Output Load. -->
            <div class="metric-card"
                 x-show="snmpHasUpsBattery(h.id)">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('host_drawer.snmp_charts.ups_battery_title')"></span><span class="unit">%</span>
                </div>
                <div class="metric-card-stats"
                     x-show="typeof h.host_battery_percent === 'number'">
                      <span>
                        <span class="metric-legend-dot" style="background: var(--success);"></span>
                        <span x-text="t('host_drawer.snmp_charts.ups_battery_legend')"></span>
                        <span class="legend-val mono" x-text="(+h.host_battery_percent).toFixed(0) + '%'"></span>
                      </span>
                </div>
              </div>
              <template x-if="snmpHasUpsBatteryHistory(h.id)">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in yAxisPercent()" :key="'ups-batt-y-' + i"><span x-text="l"></span></template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                    <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                    <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                    <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                    <path fill="none" stroke="var(--success)" stroke-width="1.5" :d="snmpUpsBatteryLine(h.id)"></path>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'ups-batt-x-' + i"><span x-text="l"></span></template>
                  </div>
                </div>
              </template>
              <template x-if="!snmpHasUpsBatteryHistory(h.id)">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- APC UPS Battery Temperature chart. Auto-
                     ranges to max(50, observed_max) so a flat-ish 36°C
                     line still has vertical movement instead of
                     compressing into the bottom margin of a 0..100
                     scale. -->
            <div class="metric-card"
                 x-show="snmpHasUpsBatteryTemp(h.id)">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('host_drawer.snmp_charts.ups_battery_temp_title')"></span><span class="unit">°C</span>
                </div>
                <div class="metric-card-stats"
                     x-show="typeof h.host_battery_temp_c === 'number'">
                      <span>
                        <span class="metric-legend-dot" style="background: var(--danger);"></span>
                        <span x-text="t('host_drawer.snmp_charts.ups_battery_temp_legend')"></span>
                        <span class="legend-val mono" x-text="(+h.host_battery_temp_c).toFixed(0) + '°C'"></span>
                      </span>
                </div>
              </div>
              <template x-if="snmpHasUpsBatteryTempHistory(h.id)">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <span x-text="snmpUpsBatteryTempMax(h.id).toFixed(0) + '°'"></span>
                    <span x-text="(snmpUpsBatteryTempMax(h.id) / 2).toFixed(0) + '°'"></span>
                    <span x-text="'0°'"></span>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                    <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                    <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                    <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                    <path fill="none" stroke="var(--danger)" stroke-width="1.5" :d="snmpUpsBatteryTempLine(h.id)"></path>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'ups-temp-x-' + i"><span x-text="l"></span></template>
                  </div>
                </div>
              </template>
              <template x-if="!snmpHasUpsBatteryTempHistory(h.id)">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- Dell server temperature-probe chart.
                     Multi-line — one polyline per probe (Inlet / Exhaust /
                     CPU1 / CPU2 / chipset / etc.) sharing a single y-axis.
                     Each probe gets a distinct hue from a palette via
                     `dellTempProbes(h.id)`; the legend below the chart
                     pairs name + last reading. Auto-ranged to max(60,
                     observed_max) so a normal-range server still has
                     visible vertical movement. -->
            <div class="metric-card metric-card--wide"
                 x-show="dellHasTemps(h.id)">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('host_drawer.snmp_charts.dell_temps_title')"></span><span class="unit">°C</span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'dell_temps')" :title="metricSource(h, 'dell_temps')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'dell_temps')"
                          @click.stop="toggleMetricTooltip(h, 'dell_temps')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === (h.id + ':dell_temps')"
                          x-text="metricSource(h, 'dell_temps')"
                          @click.outside="metricTooltipOpen = null"></span>
                  </button>
                </div>
              </div>
              <template x-if="dellHasTempHistory(h.id)">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <span x-text="dellTempMaxC(h.id).toFixed(0) + '°'"></span>
                    <span x-text="(dellTempMaxC(h.id) / 2).toFixed(0) + '°'"></span>
                    <span x-text="'0°'"></span>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none" aria-hidden="true">
                    <line class="metric-grid" x1="0" y1="30" x2="420" y2="30"/>
                    <line class="metric-grid" x1="0" y1="60" x2="420" y2="60"/>
                    <line class="metric-grid" x1="0" y1="90" x2="420" y2="90"/>
                    <!-- Eight hardcoded paths indexed against dellTempProbes(h.id)[N]
                             — same fixed-polyline-by-index pattern the per-port chart
                             uses because Alpine's <template x-for> doesn't work inside
                             <svg>. Most servers have ≤8 temp probes (Inlet / Exhaust /
                             CPU1 / CPU2 / + optional chipset / DIMM banks); slots
                             beyond the host's actual probe count render with empty
                             stroke + empty d so the renderer skips them cleanly. -->
                    <path fill="none" stroke-width="1.5"
                          :stroke="(dellTempProbes(h.id)[0] || {}).color || 'transparent'"
                          :d="(dellTempProbes(h.id)[0] ? dellTempLine(h.id, dellTempProbes(h.id)[0].points) : '')"></path>
                    <path fill="none" stroke-width="1.5"
                          :stroke="(dellTempProbes(h.id)[1] || {}).color || 'transparent'"
                          :d="(dellTempProbes(h.id)[1] ? dellTempLine(h.id, dellTempProbes(h.id)[1].points) : '')"></path>
                    <path fill="none" stroke-width="1.5"
                          :stroke="(dellTempProbes(h.id)[2] || {}).color || 'transparent'"
                          :d="(dellTempProbes(h.id)[2] ? dellTempLine(h.id, dellTempProbes(h.id)[2].points) : '')"></path>
                    <path fill="none" stroke-width="1.5"
                          :stroke="(dellTempProbes(h.id)[3] || {}).color || 'transparent'"
                          :d="(dellTempProbes(h.id)[3] ? dellTempLine(h.id, dellTempProbes(h.id)[3].points) : '')"></path>
                    <path fill="none" stroke-width="1.5"
                          :stroke="(dellTempProbes(h.id)[4] || {}).color || 'transparent'"
                          :d="(dellTempProbes(h.id)[4] ? dellTempLine(h.id, dellTempProbes(h.id)[4].points) : '')"></path>
                    <path fill="none" stroke-width="1.5"
                          :stroke="(dellTempProbes(h.id)[5] || {}).color || 'transparent'"
                          :d="(dellTempProbes(h.id)[5] ? dellTempLine(h.id, dellTempProbes(h.id)[5].points) : '')"></path>
                    <path fill="none" stroke-width="1.5"
                          :stroke="(dellTempProbes(h.id)[6] || {}).color || 'transparent'"
                          :d="(dellTempProbes(h.id)[6] ? dellTempLine(h.id, dellTempProbes(h.id)[6].points) : '')"></path>
                    <path fill="none" stroke-width="1.5"
                          :stroke="(dellTempProbes(h.id)[7] || {}).color || 'transparent'"
                          :d="(dellTempProbes(h.id)[7] ? dellTempLine(h.id, dellTempProbes(h.id)[7].points) : '')"></path>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in snmpXAxis(h.id, 5)" :key="'dell-temp-x-' + i"><span x-text="l"></span></template>
                  </div>
                </div>
              </template>
              <template x-if="!dellHasTempHistory(h.id)">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
              <!-- Legend: probe name + last reading per probe.
                       Wraps to multi-row when the probe count exceeds
                       what fits in one line. -->
              <div class="metric-legend-grid">
                <template x-for="probe in dellTempProbes(h.id)" :key="'dell-temp-legend-' + probe.idx">
                      <span class="metric-legend-item">
                        <span class="metric-legend-dot" :style="'background:' + probe.color"></span>
                        <span x-text="probe.name"></span>
                        <span class="legend-val mono"
                              x-text="probe.last_c != null ? (+probe.last_c).toFixed(1) + '°C' : '—'"></span>
                      </span>
                </template>
              </div>
            </div>
          </div>

          <div class="mt-3 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"
               x-show="(h.beszel_id || h.ne_url || h.pulse_name || h.webmin_name) && (h.status === 'up' || isStale(h) || chartFreshness(h))"
               :class="hostHistoryRangeBusy ? 'charts-refreshing' : ''">
            <!-- CPU % — hidden for ping-only hosts. The
                     grid wrapper now opens for ping_enabled too so the
                     Ping chart renders, but ping doesn't contribute a
                     CPU gauge. -->
            <div class="metric-card metric-card--cpu" x-show="h.beszel_id || h.ne_url || h.pulse_name || h.webmin_name">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('columns.cpu')"></span><span class="unit">%</span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'cpu')" :title="metricSource(h, 'cpu')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'cpu')"
                          @click.stop="toggleMetricTooltip(h, 'cpu')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'cpu')"
                          x-cloak
                          @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'cpu')"></span>
                  </button>
                </div>
                <div class="metric-card-stats"
                     x-show="hostMetricStats(hostHistoryKey(h), 'cpu')">
                  <span>Min <span class="min-val" x-text="hostMetricStats(hostHistoryKey(h), 'cpu') ? hostMetricStats(hostHistoryKey(h), 'cpu').min : ''"></span></span>
                  <span>Max <span class="max-val" x-text="hostMetricStats(hostHistoryKey(h), 'cpu') ? hostMetricStats(hostHistoryKey(h), 'cpu').max : ''"></span></span>
                </div>
              </div>
              <template x-if="hostChart(hostHistoryKey(h), 'cpu', { min: 0, max: 100 })">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in yAxisPercent()" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                    <!-- Gridlines as a single <path> string — Alpine
                             `<template x-for>` doesn't work inside <svg>
                             (the SVG-namespace template element isn't a
                             real HTMLTemplateElement, so .content is
                             undefined and Alpine throws). hostChart()
                             precomputes `gridPath` to avoid the issue. -->
                    <path class="metric-grid" :d="hostChart(hostHistoryKey(h), 'cpu', { min: 0, max: 100, height: 120 }).gridPath" fill="none"/>
                    <path class="metric-area" :d="hostChart(hostHistoryKey(h), 'cpu', { min: 0, max: 100, height: 120 }).area"/>
                    <path class="metric-line" :d="hostChart(hostHistoryKey(h), 'cpu', { min: 0, max: 100, height: 120 }).pathGapped"/>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                </div>
              </template>
              <template x-if="!hostChart(hostHistoryKey(h), 'cpu', { min: 0, max: 100 })">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                    <div class="fs-2xs text-[var(--text-faint)] not-italic mt-0.5" x-text="t('loading.history_will_appear')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- Memory % — same telemetry gate as CPU. -->
            <div class="metric-card metric-card--mem" x-show="h.beszel_id || h.ne_url || h.pulse_name || h.webmin_name">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('columns.memory')"></span><span class="unit">%</span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'memory')" :title="metricSource(h, 'memory')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'memory')"
                          @click.stop="toggleMetricTooltip(h, 'memory')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'memory')"
                          x-cloak
                          @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'memory')"></span>
                  </button>
                </div>
                <div class="metric-card-stats"
                     x-show="hostMetricStats(hostHistoryKey(h), 'mp')">
                  <span>Min <span class="min-val" x-text="hostMetricStats(hostHistoryKey(h), 'mp') ? hostMetricStats(hostHistoryKey(h), 'mp').min : ''"></span></span>
                  <span>Max <span class="max-val" x-text="hostMetricStats(hostHistoryKey(h), 'mp') ? hostMetricStats(hostHistoryKey(h), 'mp').max : ''"></span></span>
                </div>
              </div>
              <template x-if="hostChart(hostHistoryKey(h), 'mp', { min: 0, max: 100 })">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in yAxisPercent()" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                    <path class="metric-area" :d="hostChart(hostHistoryKey(h), 'mp', { min: 0, max: 100, height: 120 }).area"/>
                    <path class="metric-line" :d="hostChart(hostHistoryKey(h), 'mp', { min: 0, max: 100, height: 120 }).pathGapped"/>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                </div>
              </template>
              <template x-if="!hostChart(hostHistoryKey(h), 'mp', { min: 0, max: 100 })">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- Disk % — same telemetry gate. -->
            <div class="metric-card metric-card--disk" x-show="h.beszel_id || h.ne_url || h.pulse_name || h.webmin_name">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('columns.disk')"></span><span class="unit">%</span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'disk')" :title="metricSource(h, 'disk')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'disk')"
                          @click.stop="toggleMetricTooltip(h, 'disk')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'disk')"
                          x-cloak
                          @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'disk')"></span>
                  </button>
                </div>
                <div class="metric-card-stats"
                     x-show="hostMetricStats(hostHistoryKey(h), 'dp')">
                  <span>Min <span class="min-val" x-text="hostMetricStats(hostHistoryKey(h), 'dp') ? hostMetricStats(hostHistoryKey(h), 'dp').min : ''"></span></span>
                  <span>Max <span class="max-val" x-text="hostMetricStats(hostHistoryKey(h), 'dp') ? hostMetricStats(hostHistoryKey(h), 'dp').max : ''"></span></span>
                </div>
              </div>
              <template x-if="hostChart(hostHistoryKey(h), 'dp', { min: 0, max: 100 })">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in yAxisPercent()" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                    <path class="metric-area" :d="hostChart(hostHistoryKey(h), 'dp', { min: 0, max: 100, height: 120 }).area"/>
                    <path class="metric-line" :d="hostChart(hostHistoryKey(h), 'dp', { min: 0, max: 100, height: 120 }).pathGapped"/>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                </div>
              </template>
              <template x-if="!hostChart(hostHistoryKey(h), 'dp', { min: 0, max: 100 })">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Combined Net In/Out + Disk I/O + Load Average grid.
                   Net In and Net Out used to be two separate cards; now
                   one Network card with both lines on a shared y-axis,
                   plus Disk I/O + Load Average. Ping was promoted to
                   its own full-width row above the 3-col grid
                   because its visual proportions (ms y-axis, narrow
                   value range) read poorly in a half-width slot beside
                   B/s gauges. The wrapper's gate no longer carries
                   `|| h.ping_enabled` for that reason. -->
          <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4"
               x-show="(h.beszel_id || h.ne_url || h.pulse_name || h.webmin_name) && (h.status === 'up' || isStale(h) || chartFreshness(h))">

            <!-- ====== Network (combined In + Out) ======
                     Two polylines on one SVG, shared y-axis via
                     `hostChartMax(['nr','ns'])` so the lines are
                     directly comparable. Legend at top shows both
                     metrics with their min/max from `hostMetricStats`. -->
            <div class="metric-card metric-card--net"
                 x-show="(h.beszel_id || h.ne_url || h.pulse_name || h.webmin_name) && !hostChartIsPermanentlyFlat(hostHistoryKey(h), ['nr','ns'])"
                 :class="hostChartMax(hostHistoryKey(h), ['nr','ns']) === 0 ? 'metric-card--flat' : ''">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('hosts_extra.metrics.network')"></span><span class="unit" x-text="unitForBytes(hostChartMax(hostHistoryKey(h), ['nr','ns'])) + '/s'"></span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'network')" :title="metricSource(h, 'network')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'network')"
                          @click.stop="toggleMetricTooltip(h, 'network')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'network')"
                          x-cloak
                          @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'network')"></span>
                  </button>
                </div>
                <div class="metric-card-stats">
                      <span x-show="hostMetricStats(hostHistoryKey(h), 'nr', false)">
                        <span class="metric-legend-dot" style="background: var(--metric-net);"></span>
                        <span x-text="t('hosts_extra.metrics.net_in')"></span>
                        <span class="legend-val" x-text="hostMetricStats(hostHistoryKey(h), 'nr', false) ? hostMetricStats(hostHistoryKey(h), 'nr', false).max : ''"></span>
                      </span>
                  <span x-show="hostMetricStats(hostHistoryKey(h), 'ns', false)">
                        <span class="metric-legend-dot" style="background: var(--metric-net-out);"></span>
                        <span x-text="t('hosts_extra.metrics.net_out')"></span>
                        <span class="legend-val" x-text="hostMetricStats(hostHistoryKey(h), 'ns', false) ? hostMetricStats(hostHistoryKey(h), 'ns', false).max : ''"></span>
                      </span>
                </div>
              </div>
              <template x-if="hostChart(hostHistoryKey(h), 'nr') && hostChartMax(hostHistoryKey(h), ['nr','ns']) > 0">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in yAxisAuto(hostChartMax(hostHistoryKey(h), ['nr','ns']), _fmtAxisBytesAt(hostChartMax(hostHistoryKey(h), ['nr','ns']))) " :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                    <path class="metric-grid" :d="hostChart(hostHistoryKey(h), 'nr', { min: 0, max: hostChartMax(hostHistoryKey(h), ['nr','ns']), height: 120 }).gridPath" fill="none"/>
                    <!-- Two polylines, shared y-scale via the max
                             passed to hostChart for both. The In line
                             uses `metric-net` color; Out uses
                             `metric-net-out` so they're visually
                             distinguishable on the legend. -->
                    <path class="metric-line" style="color: var(--metric-net);"
                          :d="hostChart(hostHistoryKey(h), 'nr', { min: 0, max: hostChartMax(hostHistoryKey(h), ['nr','ns']), height: 120 }).pathGapped"/>
                    <path class="metric-line" style="color: var(--metric-net-out);"
                          :d="hostChart(hostHistoryKey(h), 'ns', { min: 0, max: hostChartMax(hostHistoryKey(h), ['nr','ns']), height: 120 }).pathGapped"/>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                </div>
              </template>
              <!-- node-exporter on this host never produced a
                       non-null `node_network_*` sample in the window. The
                       generic "no NIC activity" branch below would tell
                       the operator to wait for activity, but the metric
                       is permanently missing — surface remediation copy
                       (enable `--collector.netstats`) instead. Fires
                       BEFORE the inactive branch so it wins the race. -->
              <template x-if="hostChart(hostHistoryKey(h), 'nr') && hostChartMax(hostHistoryKey(h), ['nr','ns']) === 0 && hostCollectorMissing(h, 'net')">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-loader"/>
                  </svg>
                  <div>
                    <div x-text="t('hosts_extra.collectors_missing.net_title')"></div>
                    <div class="fs-2xs text-[var(--text-faint)] mt-1"
                         x-html="t('hosts_extra.collectors_missing.net_body', {
                               metric: '<code class='mono text-[var(--text-dim)]'>node_network_*</code>',
                               flag: '<code class='mono text-[var(--text-dim)]'>--collector.netstats</code>'
                             })"></div>
                  </div>
                </div>
              </template>
              <template x-if="hostChart(hostHistoryKey(h), 'nr') && hostChartMax(hostHistoryKey(h), ['nr','ns']) === 0 && !hostCollectorMissing(h, 'net')">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-info"/>
                  </svg>
                  <div>
                    <div x-text="t('hosts_extra.net_inactive.title')"></div>
                    <!-- Source-specific guidance:
                              - Pure Beszel host (no NE configured): Beszel
                                "set NICS=eth0" hint — that agent's NIC list
                                is opt-in and operator can fix it.
                              - Any host with NE configured (NE-only OR
                                Beszel + NE both): NE wording. The earlier
                                gate on `h.beszel_id` mis-fired when the
                                operator ran BOTH agents on the same host
                                (e.g. opnsense at 192.X.X.X) and Beszel
                                reported zero NICs while NE had real net
                                data — the operator wants the NE-flavoured
                                empty-state because that's the source they
                                expect to fix. Gating on `h.ne_url` instead
                                of `h.beszel_id` makes the rule "if NE is
                                in play, show NE copy" regardless of
                                whether Beszel is also configured.
                        -->
                    <template x-if="!h.ne_url">
                      <div class="fs-2xs text-[var(--text-faint)] mt-1"
                           x-html="t('hosts_extra.net_inactive.body_in', {
                                 code: '<code class=&quot;mono text-[var(--text-dim)]&quot;>NICS=eth0</code>',
                                 ipcmd: '<code class=&quot;mono text-[var(--text-dim)]&quot;>ip a</code>'
                               })"></div>
                    </template>
                    <template x-if="h.ne_url">
                      <div class="fs-2xs text-[var(--text-faint)] mt-1"
                           x-text="t('hosts_extra.net_inactive.body_in_ne')"></div>
                    </template>
                  </div>
                </div>
              </template>
              <template x-if="!hostChart(hostHistoryKey(h), 'nr')">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- Ping latency card was promoted out of this grid in
                     see the standalone full-width row above the
                     3-col CPU/Mem/Disk grid. -->

            <!-- HTTP probe latency — full metric card matching the
                 Net / CPU / Mem shape. Drives the same chart machinery
                 (hostChart / xAxisFromSeries / yAxisAuto) against the
                 derived `httpLatencyKey(h)` slot that `loadHostHttpProbeHistory`
                 stamps with a per-timestamp avg(latency_ms) series. -->
            <div class="metric-card metric-card--http-latency"
                 x-show="h.http_probe_enabled === true && hostChart(httpLatencyKey(h), 'latency_ms')">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('host_drawer.http_probe.history_heading')"></span><span class="unit">ms</span>
                </div>
                <div class="metric-card-stats">
                  <span x-show="hostMetricStats(httpLatencyKey(h), 'latency_ms', false)">
                    <span class="metric-legend-dot" style="background: var(--metric-http-latency);"></span>
                    <span x-text="t('host_drawer.http_probe.latency_legend') || 'avg'"></span>
                    <span class="legend-val"
                          x-text="hostMetricStats(httpLatencyKey(h), 'latency_ms', false) ? _fmtAxisMs(hostMetricStats(httpLatencyKey(h), 'latency_ms', false).max) : ''"></span>
                  </span>
                </div>
              </div>
              <template x-if="hostChart(httpLatencyKey(h), 'latency_ms') && hostChartMax(httpLatencyKey(h), ['latency_ms']) > 0">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in yAxisAuto(hostChartMax(httpLatencyKey(h), ['latency_ms']), _fmtAxisMs)" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                    <path class="metric-grid"
                          :d="hostChart(httpLatencyKey(h), 'latency_ms', { min: 0, max: hostChartMax(httpLatencyKey(h), ['latency_ms']), height: 120 }).gridPath"
                          fill="none"/>
                    <path class="metric-line" style="color: var(--metric-http-latency);"
                          :d="hostChart(httpLatencyKey(h), 'latency_ms', { min: 0, max: hostChartMax(httpLatencyKey(h), ['latency_ms']), height: 120 }).pathGapped"/>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in xAxisFromSeries(httpLatencyKey(h), 5)" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                </div>
              </template>
              <template x-if="hostChart(httpLatencyKey(h), 'latency_ms') && hostChartMax(httpLatencyKey(h), ['latency_ms']) === 0">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('host_drawer.http_probe.history_no_data')"></div>
                    <div class="fs-2xs text-[var(--text-faint)] mt-1">
                      <span x-show="!hasHostStatsSource('http_probe')"
                            class="text-[var(--warning)]"
                            x-text="t('host_drawer.http_probe.no_data_hint_global_off') || 'HTTP probe is not enabled in Admin → Providers — enable the master toggle.'"></span>
                      <span x-show="hasHostStatsSource('http_probe') && !(Array.isArray(h.host_http_urls) && h.host_http_urls.length > 0)"
                            x-text="t('host_drawer.http_probe.no_data_hint_no_urls') || 'No URLs resolved for this host.'"></span>
                      <span x-show="hasHostStatsSource('http_probe') && (Array.isArray(h.host_http_urls) && h.host_http_urls.length > 0)"
                            x-text="t('host_drawer.http_probe.no_data_hint_waiting') || 'Probe configured — waiting for the next sampler tick.'"></span>
                    </div>
                  </div>
                </div>
              </template>
            </div>

            <!-- ====== Disk I/O — same dual-line pattern as
                     the combined Network card. Read/write summed across
                     mounts in `logic/beszel.py:fetch_system_history` for
                     Beszel hosts and across non-loopback / non-partition
                     block devices in `logic/host_metrics_sampler.py` for
                     NE-only hosts. Card stays visible across
                     both source types — the "idle" hint correctly
                     surfaces a genuinely-quiet disk regardless of source. -->
            <div class="metric-card metric-card--disk"
                 x-show="(h.beszel_id || h.ne_url || h.pulse_name || h.webmin_name) && !hostChartIsPermanentlyFlat(hostHistoryKey(h), ['dr','dw'])"
                 :class="hostChartMax(hostHistoryKey(h), ['dr','dw']) === 0 ? 'metric-card--flat' : ''">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('hosts_extra.metrics.disk_io')"></span><span class="unit" x-text="unitForBytes(hostChartMax(hostHistoryKey(h), ['dr','dw'])) + '/s'"></span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'disk_io')" :title="metricSource(h, 'disk_io')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'disk_io')"
                          @click.stop="toggleMetricTooltip(h, 'disk_io')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'disk_io')"
                          x-cloak
                          @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'disk_io')"></span>
                  </button>
                </div>
                <div class="metric-card-stats">
                      <span x-show="hostMetricStats(hostHistoryKey(h), 'dr', false)">
                        <span class="metric-legend-dot" style="background: var(--metric-net);"></span>
                        <span x-text="t('hosts_extra.metrics.read')"></span>
                        <span class="legend-val" x-text="hostMetricStats(hostHistoryKey(h), 'dr', false) ? hostMetricStats(hostHistoryKey(h), 'dr', false).max : ''"></span>
                      </span>
                  <span x-show="hostMetricStats(hostHistoryKey(h), 'dw', false)">
                        <span class="metric-legend-dot" style="background: var(--metric-net-out);"></span>
                        <span x-text="t('hosts_extra.metrics.write')"></span>
                        <span class="legend-val" x-text="hostMetricStats(hostHistoryKey(h), 'dw', false) ? hostMetricStats(hostHistoryKey(h), 'dw', false).max : ''"></span>
                      </span>
                </div>
              </div>
              <template x-if="hostChart(hostHistoryKey(h), 'dr') && hostChartMax(hostHistoryKey(h), ['dr','dw']) > 0">
                <div class="metric-card-body">
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in yAxisAuto(hostChartMax(hostHistoryKey(h), ['dr','dw']), _fmtAxisBytesAt(hostChartMax(hostHistoryKey(h), ['dr','dw']))) " :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                    <path class="metric-grid" :d="hostChart(hostHistoryKey(h), 'dr', { min: 0, max: hostChartMax(hostHistoryKey(h), ['dr','dw']), height: 120 }).gridPath" fill="none"/>
                    <path class="metric-line" style="color: var(--metric-net);"
                          :d="hostChart(hostHistoryKey(h), 'dr', { min: 0, max: hostChartMax(hostHistoryKey(h), ['dr','dw']), height: 120 }).pathGapped"/>
                    <path class="metric-line" style="color: var(--metric-net-out);"
                          :d="hostChart(hostHistoryKey(h), 'dw', { min: 0, max: hostChartMax(hostHistoryKey(h), ['dr','dw']), height: 120 }).pathGapped"/>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                </div>
              </template>
              <!-- node-exporter on this host never produced a
                       non-null `node_disk_*` sample in the window. The
                       generic "no disk I/O activity" branch below would
                       suggest waiting; the metric is permanently
                       missing instead. Show remediation copy (enable
                       `--collector.diskstats`). Fires BEFORE the idle
                       branch so it wins the race. -->
              <template x-if="hostChart(hostHistoryKey(h), 'dr') && hostChartMax(hostHistoryKey(h), ['dr','dw']) === 0 && hostCollectorMissing(h, 'disk_io')">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-loader"/>
                  </svg>
                  <div>
                    <div x-text="t('hosts_extra.collectors_missing.disk_io_title')"></div>
                    <div class="fs-2xs text-[var(--text-faint)] mt-1"
                         x-html="t('hosts_extra.collectors_missing.disk_io_body', {
                               metric: '<code class='mono text-[var(--text-dim)]'>node_disk_*</code>',
                               flag: '<code class='mono text-[var(--text-dim)]'>--collector.diskstats</code>'
                             })"></div>
                  </div>
                </div>
              </template>
              <template x-if="hostChart(hostHistoryKey(h), 'dr') && hostChartMax(hostHistoryKey(h), ['dr','dw']) === 0 && !hostCollectorMissing(h, 'disk_io')">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-info"/>
                  </svg>
                  <div>
                    <div x-text="t('hosts_extra.metrics.disk_io_idle')"></div>
                  </div>
                </div>
              </template>
              <template x-if="!hostChart(hostHistoryKey(h), 'dr')">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- ====== Load Average — three polylines for
                     1m / 5m / 15m on a shared y-axis. Beszel's `la`
                     field is parsed in fetch_system_history into
                     `la1` / `la5` / `la15`. Hidden when all three
                     are zero (containers / agents without load
                     reporting). Spans both columns on md+ — load
                     is a single-axis metric where extra width
                     improves readability. -->
            <div class="metric-card metric-card--cpu"
                 x-show="hostChartMax(hostHistoryKey(h), ['la1_pct','la5_pct','la15_pct','la1','la5','la15']) > 0">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('hosts_extra.metrics.load_avg')"></span><span class="unit">%</span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'load_avg')" :title="metricSource(h, 'load_avg')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'load_avg')"
                          @click.stop="toggleMetricTooltip(h, 'load_avg')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'load_avg')"
                          x-cloak
                          @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'load_avg')"></span>
                  </button>
                </div>
                <div class="metric-card-stats">
                      <span x-show="hostMetricStats(hostHistoryKey(h), 'la1_pct', false)">
                        <span class="metric-legend-dot" style="background: var(--metric-cpu);"></span>1m
                        <span class="legend-val" x-text="hostMetricStats(hostHistoryKey(h), 'la1_pct', false) ? Math.round(hostMetricStats(hostHistoryKey(h), 'la1_pct', false).maxRaw) + '%' : ''"></span>
                      </span>
                  <span x-show="hostMetricStats(hostHistoryKey(h), 'la5_pct', false)">
                        <span class="metric-legend-dot" style="background: var(--metric-mem);"></span>5m
                        <span class="legend-val" x-text="hostMetricStats(hostHistoryKey(h), 'la5_pct', false) ? Math.round(hostMetricStats(hostHistoryKey(h), 'la5_pct', false).maxRaw) + '%' : ''"></span>
                      </span>
                  <span x-show="hostMetricStats(hostHistoryKey(h), 'la15_pct', false)">
                        <span class="metric-legend-dot" style="background: var(--metric-disk);"></span>15m
                        <span class="legend-val" x-text="hostMetricStats(hostHistoryKey(h), 'la15_pct', false) ? Math.round(hostMetricStats(hostHistoryKey(h), 'la15_pct', false).maxRaw) + '%' : ''"></span>
                      </span>
                </div>
              </div>
              <template x-if="hostChart(hostHistoryKey(h), 'la1_pct')">
                <div class="metric-card-body">
                  <!-- Y-axis to match CPU/Mem/Disk card height + alignment.
                           Without this column-1 cell rendered empty and the
                           SVG visually shifted, making the chart look shorter. -->
                  <div class="metric-y-axis">
                    <template x-for="(l, i) in yAxisPercent()" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                  <svg class="metric-svg" viewBox="0 0 420 120" preserveAspectRatio="none">
                    <path class="metric-grid" :d="hostChart(hostHistoryKey(h), 'la1_pct', { min: 0, max: 100, height: 120 }).gridPath" fill="none"/>
                    <path class="metric-line" style="color: var(--metric-cpu);"
                          :d="hostChart(hostHistoryKey(h), 'la1_pct', { min: 0, max: 100, height: 120 }).pathGapped"/>
                    <path class="metric-line" style="color: var(--metric-mem);"
                          :d="hostChart(hostHistoryKey(h), 'la5_pct', { min: 0, max: 100, height: 120 }).pathGapped"/>
                    <path class="metric-line" style="color: var(--metric-disk);"
                          :d="hostChart(hostHistoryKey(h), 'la15_pct', { min: 0, max: 100, height: 120 }).pathGapped"/>
                  </svg>
                  <div class="metric-x-axis">
                    <template x-for="(l, i) in xAxisFromSeries(hostHistoryKey(h), 5)" :key="i">
                      <span x-text="l"></span>
                    </template>
                  </div>
                </div>
              </template>
              <template x-if="!hostChart(hostHistoryKey(h), 'la1_pct')">
                <div class="collecting-block">
                  <svg aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                  </svg>
                  <div>
                    <div x-text="t('loading.collecting_data')"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- ====== Bandwidth — single-line aggregate of
                     in + out bytes/s, mirroring Beszel's "Bandwidth"
                     chart. Distinct from the Network card above (which
                     splits In + Out into two lines): this is the
                     summed total at each point. The `net` field is
                     pre-computed by `fetch_system_history`
                     (`nr + ns`, falls back to `b` for older agents
                     that don't split the directions). Hidden when the
                     summed peak is zero. -->
            <div class="metric-card metric-card--net-out"
                 x-show="hostMetricStats(hostHistoryKey(h), 'net', false) && hostMetricStats(hostHistoryKey(h), 'net', false).maxRaw > 0">
              <div class="metric-card-head">
                <div class="metric-card-title">
                  <span x-text="t('hosts_extra.metrics.bandwidth')"></span><span class="unit" x-text="unitForBytes(hostChartMax(hostHistoryKey(h), ['net'])) + '/s'"></span>
                  <button type="button" class="metric-source-help" aria-haspopup="true" :aria-label="metricSource(h, 'bandwidth')" :title="metricSource(h, 'bandwidth')" :aria-expanded="metricTooltipOpen === metricTooltipKey(h, 'bandwidth')"
                          @click.stop="toggleMetricTooltip(h, 'bandwidth')"
                          @keydown.escape.window="metricTooltipOpen = null">
                    <svg width="12" height="12" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-help-circle"/>
                    </svg>
                    <span class="metric-source-tooltip"
                          x-show="metricTooltipOpen === metricTooltipKey(h, 'bandwidth')"
                          x-cloak
                          @click.stop
                          x-transition.opacity.duration.120ms
                          x-text="metricSource(h, 'bandwidth')"></span>
                  </button>
                </div>
                <div class="metric-card-stats"
                     x-show="hostMetricStats(hostHistoryKey(h), 'net', false)">
