                    <template x-if="appsCustomEditMode">
                      <article class="apps-tile" :class="'apps-tile--' + app.status" draggable="true"
                               @dragstart.stop="appsUnsectionedDragStart($event, app.group_id)"
                               @dragover.prevent @drop.stop="appsTileDrop('__unsectioned', null)"
                               role="button" tabindex="0"
                               :aria-label="t('apps.drawer.open_aria', {name: app.name})"
                               @click="openAppDrawer(app)"
                               @keydown.enter="openAppDrawer(app)"
                               @keydown.space.prevent="openAppDrawer(app)">
                        <img :src="iconUrlFor(app.icon || app.name)" alt="" width="32" height="32"
                             class="apps-tile-icon" @error="$event.target.style.visibility='hidden'">
                        <span class="apps-tile-name truncate" x-text="app.name"></span>
                        <span class="apps-tile-dot" :title="t('apps.status_' + app.status) || app.status"></span>
                      </article>
                    </template>
                  </div>
                </template>
                <div x-show="appsCustomEditMode && !appsCustomUnsectioned().length" class="apps-section-empty fs-2xs text-[var(--text-faint)]"
                     x-text="t('apps.custom.all_sorted') || 'All apps are sorted into sections.'"></div>
              </div>
            </section>
          </template>
        </div>
      </template>

      <!-- Empty states -->
      <div x-show="appsListLoaded && !appsListLoading && !filteredApps().length && (appsSearchQuery || appsStatusFilter)"
           class="text-center py-12 text-[var(--text-faint)] fs-sm"
           x-text="t('apps.empty_filtered') || 'No apps match the current filters.'"></div>
      <div x-show="appsListLoaded && !appsListLoading && !appsList.length"
           class="text-center py-16 text-[var(--text-faint)] fs-sm">
        <span x-html="t('apps.empty_html') || 'No app instances yet. Pin services to hosts via <strong>Admin → Hosts</strong> to populate this view; reusable templates live under <strong>Admin → Apps</strong>.'"></span>
        <div x-show="isAdmin()" class="mt-4">
          <button type="button" @click="openDiscoveryFromAppsView()"
                  class="btn btn-soft fs-sm inline-flex items-center gap-1.5">
            <svg width="14" height="14" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-search"/>
            </svg>
            <span x-text="t('apps.empty_cta_discover') || 'Run discovery on a host'"></span>
          </button>
        </div>
      </div>
    </div>

    <!-- ===== HISTORY VIEW ===== -->
    <div x-show="view==='history'" class="space-y-3">
      <div class="flex justify-between items-center">
        <div>
          <h2 class="font-semibold fs-xl" x-text="t('history.title')"></h2>
          <div class="fs-xs text-[var(--text-faint)]" x-text="t('history.entries', { count: historyTotal })"></div>
        </div>
        <div class="flex gap-2">
          <a :href="historyExportUrl('csv')"
             class="btn btn-soft fs-sm inline-flex items-center gap-1.5"
             :title="t('history.csv_title')">
            <svg width="13" height="13" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-file-text"/>
            </svg>
            <span x-text="t('history.csv')"></span>
          </a>
          <a :href="historyExportUrl('json')"
             class="btn btn-soft fs-sm inline-flex items-center gap-1.5"
             :title="t('history.json_title')">
            <svg width="13" height="13" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-download"/>
            </svg>
            <span x-text="t('history.json')"></span>
          </a>
          <button type="button"
                  @click="_runWithBusy('history', () => loadHistory())"
                  :disabled="_loadBusy.history === true"
                  :title="t('actions.reload')"
                  :aria-label="t('actions.reload')"
                  class="btn btn-ghost fs-sm inline-flex items-center gap-1.5">
            <svg width="13" height="13" :class="_loadBusy.history === true ? 'spin-md' : ''" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-cw"/>
            </svg>
            <span x-text="t('actions.reload')"></span>
          </button>
          <button type="button" @click="clearHistory()"
                  class="btn btn-ghost fs-sm text-danger inline-flex items-center gap-1.5"
                  :title="t('history.clear_all')">
            <svg width="13" height="13" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash"/>
            </svg>
            <span x-text="t('history.clear_all')"></span>
          </button>
        </div>
      </div>

      <!-- HISTORY FILTER BAR -->
      <div class="flex flex-wrap items-center gap-2">
        <input type="search" x-model.debounce.300ms="historyFilters.q" @input="historyApplyFilter()"
               :placeholder="t('history.search_placeholder')"
               class="fs-sm min-w-[220px] flex-1 max-w-[340px]">
        <div class="flex items-center gap-1.5 flex-wrap">
          <button type="button" @click="historyApplyFilter(() => historyFilters.status = '')"
                  :class="!historyFilters.status ? 'active' : ''" class="filter-chip" x-text="t('history.status_all')"></button>
          <button type="button" @click="historyApplyFilter(() => historyFilters.status = 'success')"
                  :class="historyFilters.status==='success' ? 'active' : ''" class="filter-chip" x-text="t('history.status_success')"></button>
          <button type="button" @click="historyApplyFilter(() => historyFilters.status = 'error')"
                  :class="historyFilters.status==='error' ? 'active' : ''" class="filter-chip" x-text="t('history.status_error')"></button>
          <button type="button" @click="historyApplyFilter(() => historyFilters.status = 'running')"
                  :class="historyFilters.status==='running' ? 'active' : ''" class="filter-chip" x-text="t('history.status_running')"></button>
          <button type="button" @click="historyApplyFilter(() => historyFilters.status = 'dry_run')"
                  :class="historyFilters.status==='dry_run' ? 'active' : ''" class="filter-chip" x-text="t('history.status_dry_run')"></button>
        </div>
        <!-- Op-type filter — labels resolved via `opTypeLabel(v)` which
             consults `t('op_types.<v>')` first then falls back to a
             title-cased split. Source list mirrors `logic.ops.OP_TYPES`
             — when adding a new op_type, extend this array AND add the
             matching i18n key under `op_types.<name>` so localised
             operators see a clean label. -->
        <select x-model="historyFilters.op_type" @change="historyApplyFilter()" class="fs-sm min-w-[150px]">
          <option value="" x-text="t('history.all_op_types')"></option>
          <template x-for="ot in [
              'update_stack','update_container','restart_service','restart_container','remove_container',
              'restart_swarm_agent','cleanup_overlay_network','hosts_bulk_pause','hosts_bulk_resume',
              'host_resume_sampling','host_provider_resume',
              'ssh_run','ssh_terminal','port_scan','port_scan_refresh',
              'prune_node','prune_all_nodes','gather_refresh','backup','asset_inventory_refresh',
              'prune_logs','prune_notifications','swarm_agent_health',
              'ai_palette','ai_host_filter','ai_telegram','telegram_command',
              'totp_admin_disabled','totp_force_set',
              'user_create','user_update','user_delete','user_pw_reset',
              'session_revoke','token_create','token_revoke',
              'backup_create','backup_delete','backup_restore',
              'config_backup_save','config_backup_import','config_backup_restore','config_backup_delete',
              'schedule_create','schedule_update','schedule_delete','schedule_run_now',
              'notification_delete',
              'settings_update','ai_memory_create','ai_memory_delete',
              'samples_prune_orphan'
            ]" :key="ot">
            <option :value="ot" x-text="opTypeLabel(ot)"></option>
          </template>
        </select>
        <select x-model="historyFilters.stack" @change="historyApplyFilter()" class="fs-sm min-w-[150px]">
          <option value="" x-text="t('history.all_stacks')"></option>
          <template x-for="s in historyStackOptions" :key="s">
            <option :value="s" x-text="s"></option>
          </template>
        </select>
        <!-- Audit-log date filters render the operator's profile format
             (`ui_prefs.datetime_format` — date-only portion). Text inputs
             instead of native date pickers so the displayed value matches
             every other date surface across the app; the helper
             `_parseUserDate` accepts the canonical token shape and
             converts back to the ISO `YYYY-MM-DD` value the existing
             filter logic consumes. Placeholder shows the active format
             token so operators can see at a glance what to type. -->
        <input type="text"
               :value="_formatIsoDate(historyFilters.fromDate)"
               @change="setHistoryDateFromText('from', $event.target.value)"
               :placeholder="_userDateOnlyFormat()"
               class="fs-sm mono"
               style="width: 9.5rem;"
               :title="t('history.from_date_title')">
        <input type="text"
               :value="_formatIsoDate(historyFilters.toDate)"
               @change="setHistoryDateFromText('to', $event.target.value)"
               :placeholder="_userDateOnlyFormat()"
               class="fs-sm mono"
               style="width: 9.5rem;"
               :title="t('history.to_date_title')">
        <button type="button" x-show="hasHistoryFilter()" @click="historyApplyFilter(() => resetHistoryFilters())"
                class="btn btn-ghost fs-xs" x-text="t('history.clear_filters')"></button>
      </div>

      <!-- HISTORY TABLE -->
      <div class="bg-[var(--surface)] border border-[var(--border)] rounded-md overflow-hidden">
        <div class="overflow-x-auto scrollbar">
          <table class="ptable">
            <thead>
            <tr>
              <th class="col-chev"></th>
              <th style="width: var(--col-when);" x-text="t('columns.when')"></th>
              <th style="width: var(--col-op);" x-text="t('columns.op')"></th>
              <th class="col-grow" x-text="t('columns.target')"></th>
              <th style="width: var(--col-stack);" class="hidden md:table-cell" x-text="t('columns.stack')"></th>
              <th style="width: var(--col-history-status);" x-text="t('columns.status')"></th>
              <th style="width: var(--col-duration);" class="hidden md:table-cell" x-text="t('columns.duration')"></th>
              <th style="width: var(--col-actor);" class="hidden lg:table-cell" x-text="t('columns.actor')"></th>
            </tr>
            </thead>
            <tbody>
            <template x-for="h in history" :key="h.id">
              <tr class="item-row" @click="openHistoryDetail(h)" style="cursor:pointer;">
                <td><span class="dot" :class="h.status==='success' ? 'dot-healthy' : 'dot-offline'"></span></td>
                <td class="mono fs-xs text-dim" x-text="formatTime(h.ts)"></td>
                <td><span class="chip fs-2xs" x-text="(h.op_type||'').replace(/_/g,' ')"></span></td>
                <td class="mono fs-sm truncate" :title="h.target_name || ''" x-text="h.target_name || '—'"></td>
                <td class="hidden md:table-cell fs-xs text-dim truncate" x-text="h.target_stack || '—'"></td>
                <td><span class="pill" :class="h.status==='success' ? 'pill-healthy' : 'pill-error'" x-text="h.status"></span></td>
                <td class="hidden md:table-cell mono fs-xs text-dim" x-text="t('common.seconds_short', { value: (h.duration||0).toFixed(1) })"></td>
                <td class="hidden lg:table-cell fs-xs text-dim" x-text="h.actor || 'ui'"></td>
              </tr>
            </template>
            </tbody>
          </table>
        </div>
        <div x-show="historyTotal === 0" class="text-center py-16 text-[var(--text-faint)] text-sm" x-text="t('empty.no_history')">
        </div>
        <!-- Server-side paging — backend returns one slice per request
             plus the total, so this control set drives every page
             change through a fresh /api/history fetch. Hidden when the
             full filtered set fits on one page (no point in showing
             '1 / 1'). Pattern + i18n keys mirror the Hosts editor
             pager (CLAUDE.md "Admin-editor pagination pattern"). -->
        <div x-show="historyTotal > historyPerPage"
             class="flex items-center justify-between gap-3 flex-wrap px-4 py-2 border-t border-[var(--border)] fs-xs">
          <div class="flex items-center gap-2 text-[var(--text-dim)]">
            <span x-text="t('pagination.page_n_of_m', { page: Math.min(historyPage, historyTotalPages()), total: historyTotalPages() })"></span>
            <span class="text-[var(--text-faint)]"
                  x-text="t('pagination.total_count', { count: historyTotal })"></span>
          </div>
          <div class="flex items-center gap-1.5">
            <button type="button" @click="historyGoToPage(1)"
                    :disabled="historyPage <= 1"
                    :class="historyPage <= 1 ? 'opacity-40 cursor-not-allowed' : ''"
                    class="btn btn-ghost fs-xs px-2"
                    :title="t('pagination.first_page_title')"
                    x-text="t('pagination.first_glyph')"></button>
            <button type="button" @click="historyPrevPage()"
                    :disabled="historyPage <= 1"
                    :class="historyPage <= 1 ? 'opacity-40 cursor-not-allowed' : ''"
                    class="btn btn-soft fs-xs px-2.5"
                    x-text="t('pagination.prev')"></button>
            <input type="number" min="1" :max="historyTotalPages()"
                   :value="Math.min(historyPage, historyTotalPages())"
                   @change="historyGoToPage($event.target.value)"
                   class="w-14 text-center fs-xs py-1"
                   :title="t('pagination.jump_to_page_title')">
            <button type="button" @click="historyNextPage()"
                    :disabled="historyPage >= historyTotalPages()"
                    :class="historyPage >= historyTotalPages() ? 'opacity-40 cursor-not-allowed' : ''"
                    class="btn btn-soft fs-xs px-2.5"
                    x-text="t('pagination.next')"></button>
            <button type="button" @click="historyGoToPage(historyTotalPages())"
                    :disabled="historyPage >= historyTotalPages()"
                    :class="historyPage >= historyTotalPages() ? 'opacity-40 cursor-not-allowed' : ''"
                    class="btn btn-ghost fs-xs px-2"
                    :title="t('pagination.last_page_title')"
                    x-text="t('pagination.last_glyph')"></button>
            <select :value="historyPerPage"
                    @change="historySetPerPage($event.target.value)"
                    class="fs-xs py-1 ms-2"
                    :title="t('pagination.rows_per_page_title')">
              <option value="25" x-text="t('pagination.per_page_option', { count: 25 })"></option>
              <option value="50" x-text="t('pagination.per_page_option', { count: 50 })"></option>
              <option value="100" x-text="t('pagination.per_page_option', { count: 100 })"></option>
              <option value="200" x-text="t('pagination.per_page_option', { count: 200 })"></option>
              <option value="500" x-text="t('pagination.per_page_option', { count: 500 })"></option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- (NOTIFICATIONS popup lives next to the HOTKEYS modal at the bottom
         of this file — operators wanted a quick check + return to current
         work without losing their place.) -->

    <!-- ===== SETTINGS VIEW ===== -->
    <div x-show="view==='settings'" class="page-layout">
      <aside class="page-sidebar"
             role="tablist" aria-orientation="vertical"
             :aria-label="t('settings.title')"
             @keydown="_sidebarTablistArrowKey($event)">
        <div class="page-sidebar-header">
          <svg width="14" height="14" class="page-sidebar-header-icon" aria-hidden="true">
            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-settings"/>
          </svg>
          <span x-text="t('settings.title')"></span>
        </div>
        <template x-for="s in settingsSections" :key="s.id">
          <button type="button" role="tab"
                  :aria-selected="settingsSection === s.id ? 'true' : 'false'"
                  :tabindex="settingsSection === s.id ? 0 : -1"
                  @click="settingsSection = s.id"
                  :class="settingsSection === s.id ? 'page-sidebar-item active' : 'page-sidebar-item'">
            <svg width="14" height="14" class="page-sidebar-icon" aria-hidden="true">
              <use :href="'/img/ui-sprite.svg?v=__APP_VERSION__#icon-' + s.icon"/>
            </svg>
            <span x-text="t('settings.sections.' + s.id)"></span>
          </button>
        </template>
      </aside>

      <div class="page-content">
        <!-- Readonly banner — clarifies why save buttons are missing. -->
        <div x-show="isReadonly()"

  <!-- ================== ACTIVE OPS FLOATING PANEL ================== -->
  <!-- bottom-4 → bottom: calc(...) so the panel clears the mobile-nav
       footer + iOS home-bar safe area on narrow viewports (matches
       the .hosts-bulk-bar pattern). On desktop --mobile-nav-height
       is 0px so behaviour is unchanged. -->
  <div x-show="activeOps.length>0"
       class="fixed end-4 bg-[var(--surface)] border border-[var(--primary)]/40 rounded-md w-[380px] max-w-[calc(100vw-32px)] z-40 glow fade-in"
       style="bottom: calc(var(--mobile-nav-height) + env(safe-area-inset-bottom, 0px) + var(--s-4));">
    <button type="button"
            class="active-ops-header w-full text-start px-3 py-2 bg-[var(--surface-2)] border-b border-[var(--border)] flex items-center gap-2 cursor-pointer rounded-t-md"
            :aria-expanded="opsExpanded ? 'true' : 'false'"
            aria-controls="active-ops-body"
            :aria-label="t('active_ops.toggle_label', { count: activeOps.length })"
            @click="opsExpanded=!opsExpanded">
      <span class="dot dot-primary dot-pulse" aria-hidden="true"></span>
      <span class="font-semibold fs-sm" x-text="t('states.running', { count: activeOps.length })"></span>
      <span class="flex-1"></span>
      <svg width="10" height="10" stroke-width="2.4" aria-hidden="true" class="text-[var(--text-dim)]">
        <use :href="opsExpanded ? '/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-down' : '/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-up'"/>
      </svg>
    </button>
    <div id="active-ops-body" x-show="opsExpanded" class="max-h-80 overflow-y-auto scrollbar">
      <template x-for="op in activeOps" :key="op.id">
        <div class="p-2.5 border-b border-[var(--border)] last:border-0"
             :class="op.status === 'success' ? 'bg-[var(--success)]/10' : op.status === 'error' ? 'bg-[var(--danger)]/10' : ''">
          <div class="flex items-center gap-2">
            <span class="chip fs-3xs" x-text="opTypeLabel(op.op_type)"></span>
            <span class="font-medium fs-sm mono flex-1 truncate" x-text="op.target_name"></span>
            <span x-show="op.status !== 'running'"
                  class="fs-3xs font-semibold"
                  :class="op.status === 'success' ? 'text-[var(--success)]' : 'text-[var(--danger)]'"
                  x-text="opStatusLabel(op.status)"></span>
            <span class="fs-3xs text-[var(--text-faint)]" x-text="t('common.seconds_short', { value: (op.duration || 0).toFixed(1) })"></span>
          </div>
          <!-- Stack-update convergence progress summary — pulls the
               latest "Convergence poll: N service(s) still updating: …"
               event line off the op's event log and renders a tidy
               one-line summary chip. Without it, the operator stares
               at the SweetAlert confirm OR the Update button waiting
               300s with no signal. Drives off the already-emitted
               `_await_stack_convergence` op.log lines so no new
               backend plumbing is needed. -->
          <template x-if="op.status === 'running' && stackConvergenceSummary(op)">
            <div class="mt-1.5 flex items-center gap-2 fs-2xs text-[var(--text-dim)]"
                 :title="t('active_ops.convergence_summary_title')">
              <span class="spin-md inline-flex" aria-hidden="true">
                <svg width="11" height="11" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-clock"/>
                </svg>
              </span>
              <span x-text="stackConvergenceSummary(op)"></span>
            </div>
          </template>
          <div class="mt-1.5 bg-[var(--bg)] rounded p-2 mono fs-2xs space-y-0.5 max-h-24 overflow-y-auto scrollbar border border-[var(--border)]">
            <template x-for="(ev,i) in op.events" :key="i">
              <div :class="ev.level==='error' ? 'text-[var(--danger)]' : ev.level==='success' ? 'text-[var(--success)]' : 'text-[var(--text-dim)]'"
                   x-text="ev.msg"></div>
            </template>
            <div x-show="op.events.length===0" class="text-[var(--text-faint)]" x-text="t('loading.waiting')"></div>
          </div>
        </div>
      </template>
    </div>
  </div>


  <!-- ================== HOST DETAIL DRAWER ==================
       Slide-out panel that replaces the legacy inline row expansion.
       Lives at top-level (outside both .hosts-mobile-cards and
       .hosts-desktop-table) so it renders on phone AND desktop —
       the responsive-grid containers above use display:none on the
       inactive form factor, which would have killed an in-row drawer.
       Wrapped in a single-element x-for so the extracted markup
       keeps using `h.X` references without rewriting every binding. -->
  <template x-if="drawerHost">
    <!-- Constant `:key` so swapping `drawerHost` from one host to another
         (keyboard arrow nav, click another host while drawer is open,
         dispatched-from-AI-palette) reuses the SAME DOM element and the
         CSS slide-in animation does NOT replay. Pre-fix the key was
         `h.host` and any drawerHost change tore down the entire drawer +
         re-mounted it, producing a visible close-and-reopen flicker the
         operator called out as wrong (services / stacks drawers stay
         visibly open across content changes — the correct behaviour). -->
    <template x-for="h in [drawerHost]" :key="'host-drawer-singleton'">
      <div>
        <!-- Slide animation lives on `.host-drawer` itself (CSS
                 `animation: slideIn .2s ease-out`). Don't add Alpine
                 x-transition directives here — they previously used
                 Tailwind `translate-x-full` classes which Tailwind
                 v4's browser-JIT runtime doesn't always pick up for
                 dynamically-added classes, so the slide silently
                 no-op'd while the drawerItem panel (using the same
                 keyframe directly via its CSS class) worked fine. -->
        <div x-show="isHostExpanded(h.host)"
             role="dialog" aria-modal="true"
             :aria-label="hostDisplayName(h)"
             @keydown="_focusTrapKeydown($event, $el)"
             :class="isAllStale(h) ? 'host-drawer scrollbar bulk-stale' : 'host-drawer scrollbar'">
          <div class="flex items-center justify-between gap-3 mb-4 sticky top-0 bg-[var(--surface)] border-b border-[var(--border)] -mx-5 -mt-4 px-5 py-3 z-10">
            <div class="min-w-0 flex items-center gap-2">
              <img class="w-5 h-5 rounded" :src="hostIconUrl(h)"
                   x-show="hostIconUrl(h)" alt="" loading="lazy"
                   @error="$event.target.style.display='none'">
              <h2 class="fs-lg font-semibold mono break-all"
                  x-text="hostTypePrefix(h) + hostDisplayName(h)"></h2>
              <!-- Asset-source indicator — same tiny 9px
                       package glyph the editor row uses to mark
                       names sourced from the asset inventory rather
                       than an operator-typed label. Visible only
                       when h.label is blank AND the asset lookup
                       returns a name. -->
              <span x-show="!h.label && assetForHost(h) && assetForHost(h).name"
                    role="img"
                    class="inline-flex flex-shrink-0"
                    :title="t('admin_hosts.label_source_asset', { name: (assetForHost(h) && assetForHost(h).name) || '' })"
                    :aria-label="t('admin_hosts.label_source_asset', { name: (assetForHost(h) && assetForHost(h).name) || '' })">
                <svg width="9" height="9"
                     class="text-[var(--text-faint)] opacity-70"
                     aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-package"/>
                </svg>
              </span>
              <!-- Health-score chip in the drawer header — clicking
                       it toggles the breakdown popover below. Same
                       colour tier as the row chip. The button form
                       is required (vs span) so keyboard nav can
                       reach it; cursor + hover state come via the
                       button.health-chip CSS rule. -->
              <button x-show="healthScore(h) != null"
                      @click="toggleHealthPopover()"
                      type="button"
                      class="chip fs-3xs px-1.5 py-0 mono health-chip flex-shrink-0"
                      :class="healthChipClass(healthScore(h))"
                      :aria-expanded="healthPopoverOpen ? 'true' : 'false'"
                      :aria-label="t('hosts_extra.health.chip_aria_label')"
                      :title="t('hosts_extra.health.chip_title', { score: healthScore(h), worst: (healthWorstAxis(h) ? healthWorstAxis(h).label : '—') })"
                      x-text="healthScore(h)"></button>
            </div>
            <div class="flex items-center gap-1">
              <!-- Full refresh — re-pull every surface this drawer shows for
                   the host in one click: assets, providers / hardware /
                   interfaces, last-known ports (NO new scan), http probes,
                   apps, and the time-series graphs. Bypasses the provider
                   cache (force). Spins while its own batch runs. -->
              <button type="button"
                      :disabled="!!_hostFullRefreshing[h.id]"
                      @click.stop="fullRefreshHost(h)"
                      class="btn btn-ghost fs-xs flex items-center gap-1.5"
                      :title="t('host_drawer.actions.full_refresh_title') || 'Refresh all host data'"
                      :aria-label="t('host_drawer.actions.full_refresh') || 'Refresh'">
                <svg width="13" height="13" :class="_hostFullRefreshing[h.id] ? 'spin-md' : ''" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-cw"/>
                </svg>
                <span x-text="t('host_drawer.actions.full_refresh') || 'Refresh'"></span>
              </button>
              <!-- quick "Edit in Admin" jump from the host
                       drawer header. Same close-drawer + view-switch +
                       focusHostsConfigRow chain the System card's
                       "+ Add URL" link uses ; admin-only since
                       only admins can edit the curated host list. -->
              <button type="button" x-show="me && me.role === 'admin'"
                      @click="(() => { const _hid = h.id; closeHostDrawer(); view='admin'; openAdminTab('hosts').then(() => focusHostsConfigRow(_hid)); })()"
                      class="btn btn-ghost fs-xs flex items-center gap-1.5"
                      :title="t('host_drawer.actions.edit_in_admin_title')">
                <svg width="13" height="13" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sliders"/>
                </svg>
                <span x-text="t('host_drawer.actions.edit_in_admin')"></span>
              </button>
              <button type="button" @click="closeHostDrawer()"
                      class="btn btn-ghost text-base leading-none"
                      :title="t('actions.close') || 'Close'"
                      :aria-label="t('actions.close') || 'Close'">✕
              </button>
            </div>
          </div>
          <!-- Permanent-fail banner — fires when the
                   host_metrics_sampler has auto-paused this host after
                   the configured failure window. Shows last error +
                   minutes since the streak started + a Resume button
                   that clears the marker via POST /api/hosts/{id}/
                   resume-sampling. -->
          <!-- Disabled-host banner takes precedence over the
                   sampling-paused banner. Operator-feedback: when a
                   host is BOTH disabled AND auto-paused, the disabled
                   state is the actionable signal — "Sampling paused
                   (113h since last probe)" reads like an outage that
                   needs investigating, but actually nothing's been
                   probed because the operator turned the host off.
                   Renders for any disabled host (whether paused or
                   not) so the operator never sees a phantom-pause
                   reading. Re-enable in Admin → Hosts to dismiss. -->
          <template x-if="h.enabled === false">
            <div class="flex items-start gap-3 bg-[var(--surface-3)] border border-[var(--border)] rounded-md p-3 fs-sm mb-4">
              <svg width="16" height="16" class="text-[var(--text-dim)] flex-shrink-0 mt-0.5" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-pause"/>
              </svg>
              <div class="min-w-0 flex-1">
                <div class="font-semibold text-[var(--text)]"
                     x-text="t('host_drawer.disabled_banner.title')"></div>
                <div class="text-[var(--text-dim)] mt-0.5"
                     x-text="t('host_drawer.disabled_banner.body')"></div>
              </div>
            </div>
          </template>
          <!-- Whole-host sampling-paused banner — only when the
                   host is ENABLED (otherwise the disabled-host banner
                   above already conveys the state more accurately). -->
          <template x-if="h.enabled !== false && h.sampling_paused">
            <div class="flex items-start gap-3 bg-[color-mix(in_srgb,var(--danger)_10%,transparent)] border border-[color-mix(in_srgb,var(--danger)_40%,var(--border))] rounded-md p-3 fs-sm mb-4">
              <svg width="16" height="16" class="text-[var(--danger)] flex-shrink-0 mt-0.5" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-alert-triangle"/>
              </svg>
              <div class="min-w-0 flex-1">
                <div class="text-[var(--text)]"
                     x-text="t('hosts_extra.permanent_fail.drawer_banner', { minutes: hostFailureMinutes(h), error: (h.last_error || '—') })"></div>
                <!-- "last probe N seconds ago" sub-line so the operator
                         can spot a host that's been paused-but-the-issue-
                         may-have-cleared without an immediate Resume click.
                         Hidden when the backend hasn't emitted last_failure_ts
                         yet (pre-schema or row genuinely absent). -->
                <div x-show="hostLastFailureAge(h)"
                     class="fs-xs text-[var(--text-faint)] mt-1"
                     x-text="hostLastFailureAge(h)"></div>
              </div>
              <button type="button" @click="resumeHostSampling(h)"
                      :disabled="!canResumeHost(h)"
                      :aria-busy="h._resumeBusy ? 'true' : 'false'"
                      class="btn btn-soft fs-xs flex-shrink-0"
                      x-text="h._resumeBusy ? t('hosts_extra.permanent_fail.resume_busy') : t('hosts_extra.permanent_fail.resume_button')"></button>
            </div>
          </template>
          <!-- "No data yet" banner — shows only for hosts with
                   a provider MAPPED but probes returning nothing
                   (status='unknown' — a real "agent running, but
                   we can't reach it / no name match" signal).
                   Every other no-data case (unconfigured rows, FTTH
                   /VDSL /5G inventory entries without any agent,
                   loading skeleton, globally-no-providers) skips the
                   banner — the status dot + debug panel already
                   tell the story without the extra scary yellow.
                   Also suppressed when ANY provider is auto-paused
                   on this host AND when snapshot data is
                   being served` true).
                   The "could not match" copy is misleading on hosts
                   where the provider HAD matched and is now just
                   paused, OR where the snapshot fallback is serving
                   the previous probe's data (the snapshot-stale
                   banner above already explains that case). The
                   no-data banner is now the LAST-RESORT message —
                   only fires when we genuinely have nothing,
                   neither live nor cached. -->
          <template x-if="(h.providers || []).length === 0 && h.status === 'unknown' && pausedProvidersFor(h).length === 0 && !isStale(h)">
            <div class="flex items-start gap-3 bg-[var(--surface-3)] border border-[var(--border)] rounded-md p-4 fs-sm mb-4">
              <svg width="18" height="18" class="text-[var(--text-dim)] flex-shrink-0 mt-0.5" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-info"/>
              </svg>
              <div>
                <div class="font-semibold text-[var(--text)]" x-text="t('hosts_extra.no_data.title')"></div>
                <div class="text-[var(--text-dim)] mt-1"
                     x-text="t('hosts_extra.no_data.body', { debug_label: t('debug_panel.show'), providers: enabledProvidersList(h) })"></div>
              </div>
            </div>
          </template>
          <!-- Stale-snapshot banner — fires when the backend stamped
                   `_stale_fields` on this host because at least one
                   provider went down and we're falling back to the last
                   cached snapshot. Banner answers "wait, is
                   this number live?" before the operator chases a ghost
                   metric. The drawer cards themselves dim individual
                   fields via the `.stale` CSS class via :class binding. -->
          <!-- Top-of-drawer "N providers paused" banner — Option C
                   from the host-disable design (operator chose: don't
                   auto-clear failure-state on host re-enable, instead
                   surface a prominent affordance to do it manually).
                   Renders ABOVE the stale banner because the paused
                   state is more actionable: stale data is "I should
                   investigate"; paused providers is "I should click
                   Resume". Hidden when the host is disabled
                   (sampling-suppressed banner takes precedence), when
                   whole-host sampling is paused (banner above already
                   conveys an actionable Resume + wires that
                   Resume to also clear paused providers — surfacing
                   both banners with two contradictory enable-states
                   is what operators reported as confusing), AND only
                   shows when the operator can actually act (admin).
                   The "Resume all" button reuses `resumeAllProviders`
                   from the bottom-of-card rollup so the
                   two affordances stay in lock-step. Disabled gate
                   shares `canResumeAny(h)` with the bottom-of-card
                   rollup + per-chip buttons so a stuck busy
                   flag never produces "top button enabled, per-chip
                   button disabled". -->
          <template x-if="h.enabled !== false && !h.sampling_paused && isAdmin() && pausedProvidersFor(h).length > 0">
            <div class="flex items-start justify-between gap-3 rounded-md p-3 fs-sm mb-4 bg-[color-mix(in_srgb,var(--warning)_14%,transparent)] border border-[color-mix(in_srgb,var(--warning)_60%,var(--border))]">
              <div class="flex items-start gap-3 min-w-0">
                <svg width="16" height="16" class="text-[var(--warning)] flex-shrink-0 mt-0.5" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-pause"/>
                </svg>
                <div class="min-w-0">
                  <div class="font-semibold text-[var(--text)]"
                       x-text="t('host_drawer.paused_banner.title', { count: pausedProvidersFor(h).length })"></div>
                  <div class="text-[var(--text-dim)] mt-0.5"
                       x-text="t('host_drawer.paused_banner.body', { providers: pausedProvidersFor(h).join(', ') })"></div>
                  <!-- "View counters" jump-link surfaces the
                           debug-panel role at the top of the drawer
                           when an investigation is warranted. The
                           debug panel itself stays at its natural
                           position (bottom of drawer) but operators
                           don't have to scroll the whole drawer to
                           discover it. Clicking opens the panel +
                           scrolls it into view via
                           `jumpToHostDebug(h.id)`; admin-only because
                           the debug panel is admin-only. -->
                  <button type="button"
                          x-show="settings && settings.debug_panel_enabled !== false"
                          @click="jumpToHostDebug(h.id)"
                          class="mt-1 fs-xs underline-offset-2 hover:underline text-[var(--text-faint)] hover:text-[var(--warning)] cursor-pointer inline-flex items-center gap-1"
                          x-text="t('host_drawer.paused_banner.view_counters')"></button>
                </div>
              </div>
              <button type="button"
                      class="fs-xs font-medium px-3 py-1 rounded border bg-[color-mix(in_srgb,var(--warning)_22%,transparent)] border-[color-mix(in_srgb,var(--warning)_70%,var(--border))] text-[var(--text)] hover:bg-[color-mix(in_srgb,var(--warning)_32%,transparent)] hover:border-[var(--warning)] disabled:opacity-50 disabled:cursor-wait inline-flex items-center gap-1.5 flex-shrink-0 cursor-pointer"
                      @click="resumeAllProviders(h)"
                      :disabled="!canResumeAny(h)"
                      :aria-label="t('hosts_extra.provider_resume_all_aria', { count: pausedProvidersFor(h).length })"
                      :aria-keyshortcuts="'Enter'"
                      :title="t('hosts_extra.provider_resume_all_title')">
                <svg width="11" height="11" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                <span x-text="t('hosts_extra.provider_resume_all', { count: pausedProvidersFor(h).length })"></span>
              </button>
            </div>
          </template>
          <template x-if="isStale(h)">
            <div class="flex items-start gap-3 rounded-md p-3 fs-sm mb-4"
                 :class="isAllStale(h)
                       ? 'bg-[color-mix(in_srgb,var(--warning)_14%,transparent)] border border-[color-mix(in_srgb,var(--warning)_60%,var(--border))]'
                       : 'bg-[color-mix(in_srgb,var(--warning)_8%,transparent)] border border-[color-mix(in_srgb,var(--warning)_40%,var(--border))]'"
                 :title="(h._stale_fields || []).join(', ')">
              <svg width="16" height="16" class="text-[var(--warning)] flex-shrink-0 mt-0.5" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-clock"/>
              </svg>
              <div class="min-w-0">
                <div class="font-semibold text-[var(--text)]"
                     x-text="isAllStale(h) ? t('host_drawer.stale.title_bulk') : t('host_drawer.stale.title')"></div>
                <div class="text-[var(--text-dim)] mt-0.5"
                     x-text="isAllStale(h)
                           ? t('host_drawer.stale.body_bulk', { age: staleAgeShort(h) })
                           : t('host_drawer.stale.body', { age: staleAgeShort(h), count: (h._stale_fields || []).length })"></div>
                <!-- Provider-level stale enumeration. Distinct
                         from the field list below: this surfaces
                         WHICH PROVIDERS are cached vs live so the
                         operator can read "Beszel + Pulse cached"
                         rather than reverse-engineering it from the
                         field names. Hidden when no provider is
                         stale (every mapped provider returned a hit
                         this gather cycle). -->
                <div x-show="staleProviders(h).length > 0"
                     class="fs-xs text-[var(--text-dim)] mt-1"
                     x-text="t('host_drawer.stale.providers_cached', {
                                   providers: staleProviders(h).map(n => providerDisplayName(n)).join(', ')
                                 })"></div>
                <!-- Surface the actual stale field names.
                         Operator-reported phantom banner: "1 field(s)
                         restored" while every chip showed Updated 2m
                         ago. The 1 field was off-screen in some card
                         the operator wasn't looking at, so the banner
                         seemed wrong. Listing the field names here AND
                         in the title attribute means operators can
                         always see which field is the snapshot
                         contributor — matches the rest of the drawer's
                         transparency contract (debug data button,
                         provider chip subtitles, etc.). Fields are
                         shown mono since they're code identifiers. -->
                <div x-show="(h._stale_fields || []).length > 0"
                     class="fs-2xs text-[var(--text-faint)] mono mt-1 break-all"
                     x-text="(h._stale_fields || []).join(', ')"></div>
                <!-- Stale-grace countdown — surfaces ONLY when at
                         least one field is within 20% of its 24h grace
                         expiry. Gives the operator a "you have X left
                         to investigate before this data silently
                         drops" heads-up so a long-running outage
                         doesn't slip past unnoticed. -->
                <div x-show="staleGraceRemainingSeconds(h) !== null"
                     class="fs-xs text-[var(--warning)] font-semibold mt-1"
                     :title="t('host_drawer.stale.grace_remaining_title')"
                     x-text="t('host_drawer.stale.grace_remaining', { remaining: staleGraceRemainingLabel(h) })"></div>
              </div>
            </div>
          </template>
          <!-- Health-score breakdown popover — toggled by the
                   chip in the drawer header. Lives at host-drawer
                   scope so it slides in/out with the drawer. Shows
                   the per-axis sub-scores with mini progress bars
                   and a "Worst axis" callout so the operator can
                   instantly identify which dimension is dragging
                   the overall number down. -->
          <template x-if="healthPopoverOpen && healthScore(h) != null">
            <div class="health-breakdown-popover">
              <div class="flex items-center justify-between gap-3 mb-2">
                <div class="min-w-0">
                  <div class="fs-sm font-semibold text-[var(--text)]"
                       x-text="t('hosts_extra.health.popover_heading')"></div>
                  <div class="fs-xs text-[var(--text-dim)] mt-0.5"
                       x-text="t('hosts_extra.health.popover_subtitle', { score: healthScore(h), count: healthAxes(h).length })"></div>
                  <div x-show="healthWorstAxis(h)"
                       class="fs-xs mt-1"
                       :class="healthChipClass(healthScore(h)) === 'health-chip-bad' ? 'text-[var(--danger)]' : healthChipClass(healthScore(h)) === 'health-chip-warn' ? 'text-[var(--warning)]' : 'text-[var(--text-dim)]'"
                       x-text="t('hosts_extra.health.popover_worst', { axis: (healthWorstAxis(h) ? healthWorstAxis(h).label : '—') })"></div>
                </div>
                <button type="button"
                        @click="toggleHealthPopover()"
                        class="btn btn-ghost fs-xs"
                        :aria-label="t('hosts_extra.health.popover_close')"
                        :title="t('hosts_extra.health.popover_close')"
                        :aria-label="t('hosts_extra.health.popover_close')">✕
                </button>
              </div>
              <template x-for="axis in healthAxes(h)" :key="axis.key">
                <div class="axis-row fs-xs">
                  <span class="text-[var(--text)]" x-text="t('hosts_extra.subline_axis', { label: axis.label, detail: axis.detail })"></span>
                  <span class="font-semibold mono"
                        :class="axis.score < 50 ? 'text-[var(--danger)]' : (axis.score < 80 ? 'text-[var(--warning)]' : 'text-[var(--success)]')"
                        x-text="axis.score + '/100'"></span>
                  <div class="axis-bar"
                       :style="'--w: ' + axis.score + '%; --c: ' + (axis.score < 50 ? 'var(--danger)' : (axis.score < 80 ? 'var(--warning)' : 'var(--success)'))">
                    <div class="fill"></div>
                  </div>
                </div>
              </template>
            </div>
          </template>
          <!-- TIMELINE CARD — unified incident-triage view that
                   collapses History (filter by host) + Notifications
                   (filter by target) + provider auto-pause /
                   recovery markers into one chronological list.
                   Collapsed by default so the drawer's first paint
                   stays light; expanded on operator click via the
                   `timelineExpanded[h.id]` toggle. Range picker
                   above the list mirrors the Beszel-history range
                   picker pattern. -->
          <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 mb-4">
            <button type="button"
                    @click="toggleHostTimeline(h.id)"
                    class="w-full flex items-center justify-between gap-3 text-start"
                    :aria-expanded="timelineExpanded[h.id] ? 'true' : 'false'">
              <div class="flex items-center gap-2 min-w-0">
                <svg width="14" height="14" class="text-[var(--text-dim)] flex-shrink-0"
                     aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-clock"/>
                </svg>
                <h4 class="fs-2xs uppercase tracking-wider text-[var(--text-faint)]"
                    x-text="t('host_drawer.timeline.heading')"></h4>
                <span class="fs-2xs text-[var(--text-faint)]"
                      x-show="hostTimeline[h.id] && hostTimeline[h.id].counts"
                      x-text="t('host_drawer.timeline.summary', {
                            ops:           (hostTimeline[h.id] && hostTimeline[h.id].counts && hostTimeline[h.id].counts.ops) || 0,
                            notifications: (hostTimeline[h.id] && hostTimeline[h.id].counts && hostTimeline[h.id].counts.notifications) || 0,
                            failures:      (hostTimeline[h.id] && hostTimeline[h.id].counts && hostTimeline[h.id].counts.failures) || 0,
                          })"></span>
              </div>
              <svg width="12" height="12" class="text-[var(--text-faint)]"
                   :class="timelineExpanded[h.id] ? 'rotate-180' : ''"
                   aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-down"/>
              </svg>
            </button>
            <template x-if="timelineExpanded[h.id]">
              <div class="mt-3" x-cloak>
                <!-- Range picker. Same shape / cadence as the
                         Beszel-history picker. -->
                <div class="flex items-center gap-2 mb-3 fs-xs">
                  <!-- Visible "Range" prefix — aria-hidden because the
                       radiogroup below carries the accessible group name via
                       its aria-label (avoids the SR double-announce). -->
                  <span class="text-[var(--text-faint)]" aria-hidden="true"
                        x-text="t('host_drawer.timeline.range_label')"></span>
                  <!-- Shared og-range-picker (radiogroup ARIA + roving tabindex
                       + arrow-key nav) — single source of truth for every SPA
                       chip strip; replaces the hand-rolled btn-ghost toggle. -->
                  <div x-data="{
                         rpOptions: [
                           { value: 24,  label: t('host_drawer.timeline.range_24h') },
                           { value: 168, label: t('host_drawer.timeline.range_7d') },
                           { value: 720, label: t('host_drawer.timeline.range_30d') }
                         ],
                         get rpCurrent() { return hostTimelineRange[h.id] || 168; },
                         rpOnChange: (v) => setHostTimelineRange(h.id, v),
                         rpAriaLabel: t('host_drawer.timeline.range_label')
                       }">
                    <!-- INCLUDE: _components/og-range-picker.html -->
                  </div>
                  <span class="flex-1"></span>
                  <button type="button"
                          @click="loadHostTimeline(h.id, true)"
                          class="btn btn-ghost fs-xs"
                          :title="t('host_drawer.timeline.refresh')">
                    <svg width="11" height="11" aria-hidden="true">
                      <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                    </svg>
                  </button>
                </div>
                <div x-show="hostTimeline[h.id] && hostTimeline[h.id].loading"
                     class="fs-xs text-[var(--text-faint)] italic"
                     x-text="t('host_drawer.timeline.loading')"></div>
                <div x-show="hostTimeline[h.id] && hostTimeline[h.id].error"
                     class="fs-xs text-[var(--danger)]"
                     x-text="hostTimeline[h.id] && hostTimeline[h.id].error"></div>
                <div x-show="hostTimeline[h.id] && !hostTimeline[h.id].loading
                               && (hostTimeline[h.id].events || []).length === 0
                               && !hostTimeline[h.id].error"
                     class="fs-xs text-[var(--text-faint)] italic"
                     x-text="t('host_drawer.timeline.empty')"></div>
                <ul class="timeline-list" x-show="hostTimeline[h.id] && (hostTimeline[h.id].events || []).length > 0">
                  <template x-for="(ev, i) in (hostTimeline[h.id] ? hostTimeline[h.id].events : [])" :key="ev.kind + '|' + ev.ts + '|' + i">
                    <li class="timeline-row" :class="'timeline-row--' + (ev.severity || 'info')">
                      <div class="timeline-icon" :class="'timeline-icon--' + (ev.severity || 'info')"
                           :title="hostTimelineKindLabel(ev.kind)">
                        <svg width="10" height="10" aria-hidden="true">
                          <use :href="'/img/ui-sprite.svg?v=__APP_VERSION__#' + hostTimelineIconRef(ev.kind, ev.severity)"/>
                        </svg>
                      </div>
                      <div class="timeline-body min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="fs-sm font-semibold text-[var(--text)] break-words"
                                  x-text="ev.title"></span>
                          <span class="chip fs-3xs px-1.5 py-0 mono"
                                :class="hostTimelineKindChipClass(ev.kind)"
                                x-text="hostTimelineKindLabel(ev.kind)"></span>
                        </div>
                        <div class="fs-2xs text-[var(--text-dim)] break-words"
                             x-show="ev.body" x-text="ev.body"></div>
                        <div class="fs-3xs text-[var(--text-faint)] mono mt-0.5">
                          <span x-text="hostTimelineTimeLabel(ev.ts)"></span>
                          <span x-show="ev.actor && ev.actor !== 'system' && ev.actor !== 'sampler'"
                                x-text="' · ' + ev.actor"></span>
                        </div>
                      </div>
                    </li>
                  </template>
                </ul>

                <!-- ========== SIMILAR INCIDENTS PANEL ==========
                         Computed similarity grouping over the same time
                         window. Walks history + notifications +
                         host_failure_events for the host, classifies each
                         error into one of ~10 buckets (timeout / auth /
                         refused / dns / tls / not-found / server-error /
                         network / parse / rate-limit / other), groups
                         by (provider, pattern), surfaces aggregate stats
                         per group. Operators used to scroll-hunt across
                         three surfaces to triangulate "is this the same
                         problem we've seen before"; this panel does the
                         work upfront. Lives BELOW the timeline so the
                         chronological events come first; the patterns
                         below summarise what those events have in common. -->
                <template x-if="hostTriage[h.id] && (hostTriage[h.id].groups || []).length > 0">
                  <div class="mt-5 pt-4 border-t border-dashed border-[var(--border)]">
                    <div class="flex items-center gap-2 mb-3">
                      <svg width="13" height="13" class="text-[var(--text-dim)]" aria-hidden="true">
                        <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-target'"/>
                      </svg>
                      <h4 class="font-semibold fs-sm"
                          x-text="t('host_drawer.triage.heading')"></h4>
                      <span class="fs-2xs text-[var(--text-faint)]"
                            x-text="t('host_drawer.triage.summary', {
                              groups: ((hostTriage[h.id] || {}).groups || []).length,
                              hours:  ((hostTriage[h.id] || {}).scope || {}).hours || 0,
                            })"></span>
                    </div>
                    <ul class="triage-list space-y-1.5">
                      <template x-for="(g, gi) in (hostTriage[h.id] ? hostTriage[h.id].groups : [])"
                                :key="(g.provider || '_') + ':' + g.pattern + ':' + gi">
                        <li class="triage-row rounded border border-[var(--border)] bg-[var(--surface-2)] px-3 py-2">
                          <button type="button"
                                  class="triage-row-header w-full flex items-center gap-2 text-start"
                                  @click="toggleTriageGroup(h.id, gi)"
                                  :aria-expanded="isTriageGroupExpanded(h.id, gi) ? 'true' : 'false'">
                            <svg width="10" height="10" class="flip-rtl flex-shrink-0" aria-hidden="true"
                                 :style="isTriageGroupExpanded(h.id, gi) ? 'transform: rotate(90deg)' : ''">
                              <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-chevron-right'"/>
                            </svg>
                            <span class="chip fs-3xs px-1.5 py-0 mono"
                                  :class="triagePatternChipClass(g.pattern)"
                                  x-text="triagePatternLabel(g.pattern)"></span>
                            <span class="fs-xs text-[var(--text-dim)]"
                                  x-show="g.provider"
                                  x-text="g.provider"></span>
                            <span class="flex-1"></span>
                            <span class="fs-xs text-[var(--text)]"
                                  x-text="t('host_drawer.triage.row_summary', {
                                    count: g.count,
                                    last:  hostTimelineTimeLabel(g.last_ts || 0),
                                    avg:   triageAvgRecoveryLabel(g.avg_duration_s),
                                  })"></span>
                          </button>
                          <div x-show="isTriageGroupExpanded(h.id, gi)" x-cloak class="mt-2 ms-5">
                            <div x-show="(g.sample_errors || []).length > 0"
                                 class="fs-2xs text-[var(--text-dim)] mono break-words mb-2">
                              <template x-for="err in (g.sample_errors || []).slice(0, 3)" :key="err">
                                <div class="mb-0.5" x-text="'· ' + err"></div>
                              </template>
                            </div>
                            <div class="fs-3xs text-[var(--text-faint)] uppercase tracking-wider mb-1"
                                 x-show="(g.occurrences || []).length > 0"
                                 x-text="t('host_drawer.triage.occurrences_label', { count: g.occurrences.length })"></div>
                            <ul class="space-y-0.5">
                              <template x-for="(occ, oi) in (g.occurrences || []).slice(0, 8)" :key="occ.ts + ':' + oi">
                                <li class="fs-2xs mono">
                                  <span class="text-[var(--text-faint)]"
                                        x-text="hostTimelineTimeLabel(occ.ts)"></span>
                                </li>
                              </template>
                              <li class="fs-3xs text-[var(--text-faint)] italic"
                                  x-show="(g.occurrences || []).length > 8"
                                  x-text="t('host_drawer.triage.more_occurrences', { count: g.occurrences.length - 8 })"></li>
                            </ul>
                          </div>
                        </li>
                      </template>
                    </ul>
                  </div>
                </template>
                <div x-show="hostTriage[h.id] && (hostTriage[h.id].groups || []).length === 0
                               && !hostTriage[h.id].error
                               && !hostTriage[h.id].loading
                               && hostTimeline[h.id] && (hostTimeline[h.id].events || []).length > 0"
                     class="mt-3 fs-2xs text-[var(--text-faint)] italic"
                     x-text="t('host_drawer.triage.no_patterns')"></div>
              </div>
            </template>
          </section>
          <!-- Drawer grid — shows whenever we have ANY data
                   worth displaying: live providers OR an asset
                   inventory match. Hosts with NEITHER still see the
                   SSH card + debug panel below. Each individual
                   section inside the grid carries its own visibility
                   gate (asset section → assetForHost(h), HARDWARE →
                   status==='up' || assetForHost(h), etc.) so empty
                   rows stay tidy. Hosts whose custom_number doesn't
                   match an asset row deliberately render NO asset
                   card — operator wants those silent (was previously
                   a diagnostic empty-state, now hidden per request). -->
          <!-- 2-column max (was 4-column with `xl:grid-cols-4`) —
                   the slide-out drawer caps at 760px wide which
                   isn't enough for four side-by-side card columns
                   without label/value collisions. Two columns gives
                   each card ~360px on desktop and stacks them on
                   mobile. -->
          <div x-show="(h.providers || []).length > 0 || assetForHost(h)"
               class="grid grid-cols-1 md:grid-cols-12 gap-4">
            <!-- ASSET INVENTORY (rich) — rendered FIRST so the
                     operator sees the curated metadata before the
                     live telemetry sections. Visible only when
                     `assetForHost(h)` returns a populated shape;
                     hosts without a match show nothing here. -->
            <!-- `x-for over [assetForHost(h)].filter(Boolean)` replaces the
                 old `x-if="assetForHost(h)"` gate so the heavy descriptor is
                 computed ONCE per render and rebound as `asset` for every
                 inner reference. Same render-or-skip semantic as x-if (empty
                 array = zero copies) but collapses ~30 per-binding calls
                 into one. :key keeps the DOM stable across reactive flushes;
                 the descriptor is memoized backend-side so the array literal
                 here returns the same object identity within one cache
                 version. -->
            <template x-for="asset in [assetForHost(h)].filter(Boolean)" :key="(h && h.id) || 'asset'">
              <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-12">
                <div class="flex items-center justify-between mb-3">
                  <h4 class="fs-2xs uppercase tracking-wider text-[var(--text-faint)]"
                      x-text="t('host_drawer.asset.heading')"></h4>
                  <div class="flex items-center gap-2">
                    <a x-show="assetEditUrl(asset)"
                       :href="assetEditUrl(asset)" target="_blank" rel="noopener"
                       class="fs-xs text-[var(--primary)] hover:underline"
                       :title="t('host_drawer.asset.edit_title')"
                       x-text="t('host_drawer.asset.edit_link')"></a>
                    <!-- Per-card refresh removed — the drawer header's full
                         refresh button now reloads assets along with every
                         other host surface in one action. -->
                  </div>
                </div>
                <dl class="drawer-dl fs-sm">
                  <template x-if="asset.name">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.name')"></dt>
                  </template>
                  <template x-if="asset.name">
                    <dd class="text-end break-words" x-text="asset.name"></dd>
                  </template>
                  <template x-if="asset.type">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.type')"></dt>
                  </template>
                  <template x-if="asset.type">
                    <dd class="text-end break-all" x-text="asset.type"></dd>
                  </template>
                  <template x-if="(asset.hostnames || []).length">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.hostnames')"></dt>
                  </template>
                  <template x-if="(asset.hostnames || []).length">
                    <dd class="text-end mono break-all">
                      <template x-for="hn in asset.hostnames" :key="hn">
                        <div x-text="hn"></div>
                      </template>
                    </dd>
                  </template>
                  <template x-if="asset.location">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.location')"></dt>
                  </template>
                  <template x-if="asset.location">
                    <dd class="text-end" x-text="asset.location"></dd>
                  </template>
                  <template x-if="asset.serial">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.serial')"></dt>
                  </template>
                  <template x-if="asset.serial">
                    <dd class="mono text-end break-all text-[var(--text-faint)]"
                        x-text="asset.serial"></dd>
                  </template>
                  <template x-if="asset.sku">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.sku')"></dt>
                  </template>
                  <template x-if="asset.sku">
                    <dd class="mono text-end break-all" x-text="asset.sku"></dd>
                  </template>
                  <template x-if="asset.ram">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.ram')"></dt>
                  </template>
                  <template x-if="asset.ram">
                    <dd class="mono text-end" x-text="asset.ram"></dd>
                  </template>
                  <template x-if="asset.firmware">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.firmware')"></dt>
                  </template>
                  <template x-if="asset.firmware">
                    <dd class="mono text-end break-all" x-text="asset.firmware"></dd>
                  </template>
                  <template x-if="asset.hardware_version">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.hardware_version')"></dt>
                  </template>
                  <template x-if="asset.hardware_version">
                    <dd class="mono text-end" x-text="asset.hardware_version"></dd>
                  </template>
                </dl>

                <template x-if="(asset.interfaces || []).length">
                  <div class="mt-4 pt-3 border-t border-[var(--border)]">
                    <div class="fs-2xs uppercase tracking-wider text-[var(--text-faint)] mb-2"
                         x-text="t('host_drawer.asset.interfaces_heading')"></div>
                    <div class="space-y-1.5">
                      <template x-for="iface in asset.interfaces" :key="iface.number + ':' + iface.name + ':' + iface.ip">
                        <div class="grid grid-cols-[1fr_auto] gap-x-3 fs-sm"
                             :class="iface.enabled ? '' : 'opacity-50'">
                          <div class="flex items-center gap-2 min-w-0">
                                <span x-show="iface.number != null"
                                      class="pill pill-info fs-3xs mono"
                                      x-text="'#' + iface.number"></span>
                            <span class="font-semibold mono" x-text="iface.name || '—'"></span>
                            <span x-show="iface.comment"
                                  class="fs-2xs text-[var(--text-faint)] truncate"
                                  :title="iface.comment"
                                  x-text="'· ' + iface.comment"></span>
                          </div>
                          <div class="text-end mono">
                            <span x-show="iface.ip" x-text="iface.ip"></span>
                            <span x-show="iface.mac"
                                  class="ms-2 fs-2xs text-[var(--text-faint)]"
                                  x-text="iface.mac"></span>
                          </div>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>

                <template x-if="(asset.ports || []).length">
                  <div class="mt-4 pt-3 border-t border-[var(--border)]">
                    <div class="fs-2xs uppercase tracking-wider text-[var(--text-faint)] mb-2"
                         x-text="t('host_drawer.asset.ports_heading')"></div>
                    <div class="flex flex-wrap gap-1.5">
                      <!-- Every port renders as the same chip;
                               clickable ones wrap in <a>, the rest
                               wrap in <span>. Uniform styling so a
                               port without a service URL is just as
                               visible as one with — operator wanted
                               ALL ports surfaced, not only URL ones. -->
                      <!-- Each iteration of <template x-for>
                               needs a SINGLE root element. Two
                               sibling <template x-if> blocks would
                               cause Alpine to render only the first
                               (URL-only ports), silently dropping
                               every non-URL port. Wrapping them in
                               one <span> per iteration fixes it. -->
                      <template x-for="port in asset.ports" :key="port.id || (port.name + ':' + port.number)">
                            <span>
                              <!-- The icon-info marker renders BEFORE the port and
                                   the whole chip flips to pill-warning when the port
                                   was NOT found by the latest scan — identical look to
                                   the "Open in scan — not in asset" chips below, so the
                                   operator can check the service / add it to the scanner.
                                   x-text can't coexist with a child icon (it replaces
                                   innerHTML), so the label moved into its own span. -->
                              <a x-show="assetPortServiceUrl(port, h)"
                                 :href="assetPortServiceUrl(port, h)" target="_blank" rel="noopener"
                                 class="fs-2xs mono hover:underline inline-flex items-center"
                                 :class="assetPortNotScanned(h, port.number) ? 'chip pill-warning' : 'chip pill-info'"
                                 :title="assetPortNotScanned(h, port.number) ? t('host_drawer.asset.port_not_scanned_title') : (port.protocol || '')">
                                <svg x-show="assetPortNotScanned(h, port.number)" width="11" height="11" class="me-1 flex-shrink-0" aria-hidden="true">
                                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-info"/>
                                </svg>
                                <span x-text="port.name + (port.number != null ? ' ' + port.number : '')"></span>
                              </a>
                              <span x-show="!assetPortServiceUrl(port, h)"
                                    class="fs-2xs mono inline-flex items-center"
                                    :class="assetPortNotScanned(h, port.number) ? 'chip pill-warning' : 'chip pill-muted'"
                                    :title="assetPortNotScanned(h, port.number) ? t('host_drawer.asset.port_not_scanned_title') : (port.protocol || '')">
                                <svg x-show="assetPortNotScanned(h, port.number)" width="11" height="11" class="me-1 flex-shrink-0" aria-hidden="true">
                                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-info"/>
                                </svg>
                                <span x-text="port.name + (port.number != null ? ' ' + port.number : '')"></span>
                              </span>
                            </span>
                      </template>
                    </div>
                    <!-- Reverse mismatch: open ports the port scan found that
                         are NOT in this asset's port list, so the operator
                         can see which scanned ports to ADD to the asset
                         record. Styled like an unmapped port-scan chip
                         (amber + the same info marker portScanShouldFlag
                         puts on the scan side) for visual symmetry. -->
                    <template x-if="assetScanOnlyPorts(h).length">
                      <div class="mt-3">
                        <div class="fs-2xs uppercase tracking-wider text-[var(--text-faint)] mb-1.5"
                             x-text="t('host_drawer.asset.scan_only_ports_heading') || 'Open in scan — not in asset'"></div>
                        <div class="flex flex-wrap gap-1.5">
                          <template x-for="sp in assetScanOnlyPorts(h)" :key="(sp.protocol || 'tcp') + ':' + sp.port">
                            <span class="chip pill-warning fs-2xs mono inline-flex items-center"
                                  :title="t('host_drawer.asset.scan_only_port_title', { port: sp.port + '/' + (sp.protocol || 'tcp') }) || ('Open in scan but not in this asset record: ' + sp.port)">
                              <svg width="11" height="11" class="me-1 flex-shrink-0" aria-hidden="true">
                                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-info"/>
                              </svg>
                              <span x-text="sp.port + '/' + (sp.protocol || 'tcp')"></span>
                              <span x-show="sp.service_hint" class="ms-1 opacity-70" x-text="'· ' + sp.service_hint"></span>
                            </span>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>

              </section>
            </template>

            <!-- SYSTEM — only the fields Beszel's agent actually
                     reports for this host are rendered. Container-mode
                     agents tend to skip platform / OS / kernel / arch;
                     hiding those empty rows makes the card honest instead
                     of full of em-dashes. -->
            <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
              <h4 class="fs-2xs uppercase tracking-wider text-[var(--text-faint)] mb-3" x-text="t('host_drawer.system.heading')"></h4>
              <dl class="drawer-dl fs-sm">
                <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.hostname')"></dt>
                <dd class="mono text-end" x-text="h.host"></dd>
                <!-- Hide Platform when it duplicates the OS's
                         first word (common when Pulse derived the
                         platform hint from its ``osName``). "debian"
                         + "debian 13.4" reads as a single row now. -->
                <template x-if="h.platform && !(h.os && h.os.toLowerCase().startsWith(h.platform.toLowerCase()))">
                  <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.platform')"></dt>
                </template>
                <template x-if="h.platform && !(h.os && h.os.toLowerCase().startsWith(h.platform.toLowerCase()))">
                  <dd class="text-end" :class="isStaleField(h, 'host_platform') ? 'stale' : ''"
                      :title="isStaleField(h, 'host_platform') ? staleAge(h) : ''"
                      x-text="h.platform"></dd>
                </template>
                <template x-if="h.os">
                  <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.os')"></dt>
                </template>
                <template x-if="h.os">
                  <dd class="text-end" :class="isStaleField(h, 'host_os') ? 'stale' : ''"
                      :title="isStaleField(h, 'host_os') ? staleAge(h) : ''"
                      x-text="h.os"></dd>
                </template>
                <template x-if="h.kernel">
                  <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.kernel')"></dt>
                </template>
                <template x-if="h.kernel">
                  <dd class="mono text-end break-all" :class="isStaleField(h, 'host_kernel') ? 'stale' : ''"
                      :title="isStaleField(h, 'host_kernel') ? staleAge(h) : ''"
                      x-text="h.kernel"></dd>
                </template>
                <template x-if="h.arch">
                  <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.arch')"></dt>
                </template>
                <template x-if="h.arch">
                  <dd class="mono text-end" :class="isStaleField(h, 'host_arch') ? 'stale' : ''"
                      :title="isStaleField(h, 'host_arch') ? staleAge(h) : ''"
                      x-text="h.arch"></dd>
                </template>
                <!-- Uptime row only renders when a provider actually
                         reported uptime_s. Inventory-only / no-agent hosts
                         (status='unconfigured') used to show "Uptime —"
                         which read as "we know but don't know" rather than
                         "no source". Hide entirely instead. -->
                <template x-if="h.uptime_s != null && h.uptime_s > 0">
                  <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.uptime')"></dt>
                </template>
                <template x-if="h.uptime_s != null && h.uptime_s > 0">
                  <dd class="mono text-end flex items-center justify-end gap-2"
                      :class="isStaleField(h, 'host_uptime_s') ? 'stale' : ''"
                      :title="isStaleField(h, 'host_uptime_s') ? staleAge(h) : ''">
                    <span x-text="fmtUptimeShort(h.uptime_s)"></span>
                    <!-- fresh-reboot badge. Only surfaces
                             when SNMP history caught an uptime backwards-
                             jump in the last 24 h (snmpRebootInfo handles
                             the windowing). Compact warning chip so the
                             operator catches a "this just bounced" signal
                             without expanding any debug panel. -->
                    <template x-if="snmpRebootInfo(h)">
                          <span class="chip pill-warning fs-3xs"
                                :title="t('host_drawer.system.reboot_title', { ago: fmtUptimeShort(snmpRebootInfo(h).age_s) })"
