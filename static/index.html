              <svg width="11" height="11" aria-hidden="true" class="text-[var(--text-dim)] transition-transform flip-rtl" :style="isGroupCollapsed(bucket.group ? bucket.group.name : '') ? '' : 'transform: rotate(90deg)'">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
              </svg>
              <!-- Parent label uses --text-dim (slightly faded) so sub-
                   group labels (which inherit full --text) stand out
                   as the more specific row. -->
              <span class="font-semibold fs-sm text-[var(--text-dim)]"
                    x-text="bucket.group ? hostGroupHeading(bucket.group) : t('hosts_extra_groups.ungrouped_label')"></span>
              <div class="flex items-center gap-2 ms-auto">
                <span x-show="bucket.group" class="pill pill-info fs-3xs mono"
                      x-text="'#' + bucket.group.range_start + '–' + bucket.group.range_end"></span>
                <span x-show="bucket.group && bucket.group.ip_range" class="pill pill-info fs-3xs mono"
                      x-text="bucket.group && bucket.group.ip_range"></span>
                <span class="fs-2xs text-[var(--text-faint)]"
                      x-text="bucketTotalHosts(bucket) === 1 ? t('hosts_extra_groups.count_one', {count: bucketTotalHosts(bucket)}) : t('hosts_extra_groups.count_many', {count: bucketTotalHosts(bucket)})"></span>
              </div>
            </div>
            <!-- One render loop covers BOTH parent-direct hosts and
                 sub-group hosts. `bucketRenderList(bucket)` flattens
                 them in order and tags each row with `_sub_group` +
                 `_sub_heading`; we emit a sub-group heading once
                 before its first row, then render every host using
                 the SAME markup. No template duplication — adding a
                 feature in one place picks it up everywhere. -->
            <template x-for="h in bucketRenderList(bucket)" :key="(h._sub_group ? h._sub_group.name + '|' : '') + h.host">
              <div>
                <!-- Sub-group heading row (first host of each sub). -->
                <div x-show="h._sub_heading && !isGroupCollapsed(bucket.group ? bucket.group.name : '')"
                     @click="toggleGroup(h._sub_group ? h._sub_group.name : '')"
                     class="host-group-heading flex items-center gap-2 px-4 py-2 ps-10 border-b border-[var(--border)] bg-[var(--surface)] cursor-pointer select-none">
                  <svg width="11" height="11" aria-hidden="true" class="text-[var(--text-dim)] transition-transform flip-rtl" :style="(h._sub_group && isGroupCollapsed(h._sub_group.name)) ? '' : 'transform: rotate(90deg)'">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
                  </svg>
                  <span class="font-semibold fs-sm" x-text="h._sub_group ? hostGroupHeading(h._sub_group) : ''"></span>
                  <div class="flex items-center gap-2 ms-auto" x-show="h._sub_group">
                    <span class="pill pill-info fs-3xs mono"
                          x-text="h._sub_group ? ('#' + h._sub_group.range_start + '–' + h._sub_group.range_end) : ''"></span>
                    <span x-show="h._sub_group && h._sub_group.ip_range" class="pill pill-info fs-3xs mono"
                          x-text="h._sub_group ? h._sub_group.ip_range : ''"></span>
                  </div>
                </div>
                <!-- Host row — used for BOTH parent-direct and
                     sub-group hosts. Indent applied when the row
                     belongs to a sub-group. -->
                <div class="border-b border-[var(--border)] last:border-b-0"
                     x-show="!h._heading_only && !isGroupCollapsed(bucket.group ? bucket.group.name : '') && (!h._sub_group || !isGroupCollapsed(h._sub_group.name))"
                     :data-host-id="h.id"
                     x-init="observeHostRow($el, h.id)">
                  <!-- Collapsed row — click-to-expand only when the host
                 is "up" AND at least one provider returned data.
                 Dead / unmatched rows get a muted cursor and no
                 hover tint so the operator gets the same visual
                 signal the red/grey status dot already implies. -->
                  <div class="hosts-row-grid px-4 py-3 items-center"
                       :class="[isHostExpandable(h) ? 'cursor-pointer hover:bg-[var(--row-hover)]' : 'cursor-default opacity-75', isStale(h) ? 'row-stale-flash' : '']"
                       @click="toggleHost(h.host)">
                    <!-- Checkbox + Chevron + status dot. Checkbox gated on
                   admin role (readonly users can't run bulk actions
                   so the column would just clutter the row).
                   `@click.stop` on the checkbox so toggling selection
                   doesn't open the drawer. -->
                    <div class="flex items-center gap-1.5">
                      <input type="checkbox"
                             x-show="isAdmin()"
                             :checked="isHostSelected(h.id)"
                             @click.stop
                             @change="toggleHostSelection(h.id)"
                             class="hosts-row-select"
                             :aria-label="t('hosts_extra.bulk.row_select_aria', { name: hostDisplayName(h) }) || 'Select host'">
                      <svg width="13" height="13" stroke-width="2.4" aria-hidden="true" class="text-[var(--text)] transition-transform flex-shrink-0 flip-rtl" :class="isHostExpanded(h.host) ? 'rotate-90' : (isHostExpandable(h) ? '' : 'opacity-30')">
                        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
                      </svg>
                      <template x-if="h._loading">
                        <span class="host-loading-spinner" aria-hidden="true"></span>
                      </template>
                      <template x-if="!h._loading">
                  <span class="w-2 h-2 rounded-full flex-shrink-0"
                        :class="'dot-status-' + (h.status || 'unknown')"
                        :title="hostProbeTitle(h)"></span>
                      </template>
                    </div>
                    <!-- Brand icon + hostname block + provider chips. The
                   icon comes from hostIconUrl(h) (explicit override
                   first, then iconUrlFor() resolver over id / label /
                   provider names). Chips show which providers
                   actually contributed data to this row. -->
                    <div class="min-w-0 flex items-center gap-2.5">
                      <img :src="hostIconUrl(h)" x-show="hostIconUrl(h)"
                           width="22" height="22" class="flex-shrink-0 rounded-sm"
                           alt="" loading="lazy"
                           @error="$event.target.style.display='none'">
                      <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-1.5">
                          <!-- Custom # badge — operator-assigned catalogue
                         number. Helps operators with many hosts orient
                         at a glance + ties to the Asset inventory
                         lookups at <asset-api-host>. Hidden when no number is
                         set so unnumbered hosts don't show "#—". -->
                          <span x-show="h.custom_number != null && h.custom_number !== ''"
                                class="chip fs-3xs px-1.5 py-0 mono"
                                :class="'pill-muted'"
                                :title="t('hosts_extra.custom_number_title')"
                                x-text="'#' + h.custom_number"></span>
                          <span class="font-semibold fs-md mono truncate"
                                x-text="hostTypePrefix(h) + hostDisplayName(h)"></span>
                          <!-- Per-row bulk-applied check glyph. Drains
                         after ~5 s via the shared `_bulkAppliedTimer`
                         in `_hostsBulkPost`. -->
                          <span x-show="h._bulkApplied"
                                role="img"
                                class="bulk-applied-glyph inline-flex flex-shrink-0"
                                :title="t('hosts_extra.bulk.row_applied') || 'Bulk action applied'"
                                :aria-label="t('hosts_extra.bulk.row_applied') || 'Bulk action applied'">
                      <svg width="13" height="13" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-check"/></svg>
                    </span>
                          <!-- Health-score chip. Synthesised 0-100 score
                         across CPU / Memory / Disk / Providers /
                         Pending Updates. Worst-axis-wins so the
                         number reflects "what's the worst thing
                         happening on this host right now". Click
                         on the row still opens the drawer; the
                         chip itself doesn't need its own click
                         handler because the row click already
                         routes there. -->
                          <!-- INCLUDE: _components/host-health-chip.html -->
                          <!-- Badges wrapped in <span> so the `title`
                         attribute fires reliably as a hover tooltip
                         — Chrome / Firefox honour `title` on
                         elements but some browsers / extensions /
                         user-agents skip it on bare <svg>.
                         The span also gets role="img" + aria-label
                         so screen readers announce the badge
                         instead of skipping over silent SVG. -->
                          <!-- Permanent-fail badge. Renders only when
                         the host_metrics_sampler has auto-paused the
                         host after consecutive probe failures. Title
                         spells out the elapsed window in minutes. -->
                          <span x-show="h.sampling_paused"
                                role="img"
                                class="inline-flex flex-shrink-0 cursor-help"
                                :title="t('hosts_extra.permanent_fail.badge_title_full', { minutes: hostFailureMinutes(h), error: (h.last_error || '—') })"
                                :aria-label="t('hosts_extra.permanent_fail.badge_title_full', { minutes: hostFailureMinutes(h), error: (h.last_error || '—') })">
                      <svg width="14" height="14"
                           class="text-[var(--danger)]"
                           aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-alert-triangle"/></svg>
                    </span>
                          <!-- Resuming badge (blue, spinning) — the
                         post-Resume re-probe window. Distinct from the
                         red paused badge so a just-resumed host reads as
                         "collecting probe data", not "still down". Ranks
                         below paused, above the transient probe-timeout /
                         stale badges. See hostResuming(). -->
                          <span x-show="!h.sampling_paused && hostResuming(h)"
                                role="img"
                                class="inline-flex flex-shrink-0 cursor-help"
                                :title="t('hosts_extra.resuming.badge_title')"
                                :aria-label="t('hosts_extra.resuming.badge_title')">
                      <svg width="13" height="13"
                           class="text-[var(--info)] spin-md"
                           aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-rotate-cw"/></svg>
                    </span>
                          <!-- Probe-timeout badge — fires when the SPA's
                         per-host /api/hosts/one/{id} call returned
                         HTTP 504 (per-host probe budget exceeded).
                         Transient: cleared automatically after the
                         60s back-off window when the next refresh
                         lands. Sits between paused (danger) and
                         stale (warning) in priority, with its own
                         hourglass glyph so the operator sees a
                         distinct "actively timing out" signal. -->
                          <span x-show="!h.sampling_paused && !hostResuming(h) && h._probe_timeout"
                                role="img"
                                class="inline-flex flex-shrink-0 cursor-help"
                                :title="t('hosts_extra.probe_timeout.badge_title_full')"
                                :aria-label="t('hosts_extra.probe_timeout.badge_title_full')">
                      <svg width="13" height="13"
                           class="text-[var(--warning)]"
                           aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-zap"/></svg>
                    </span>
                          <!-- Stale-data badge. Fires when one or
                         more provider went down and the row is
                         showing values restored from the persisted
                         snapshot. Lower visual priority than the
                         permanent-fail icon — uses --warning amber
                         (paused = --danger red) — so a host that's
                         BOTH paused and stale leads with the more
                         severe state. -->
                          <span x-show="!h.sampling_paused && !hostResuming(h) && !h._probe_timeout && isStale(h)"
                                role="img"
                                class="inline-flex flex-shrink-0 cursor-help"
                                :title="t('hosts_extra.stale_marker.badge_title_full', { age: staleAge(h), fields: ((h._stale_fields || []).join(', ') || '—') })"
                                :aria-label="t('hosts_extra.stale_marker.badge_title_full', { age: staleAge(h), fields: ((h._stale_fields || []).join(', ') || '—') })">
                      <svg width="13" height="13"
                           class="text-[var(--warning)]"
                           aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-clock"/></svg>
                    </span>
                        </div>
                        <!-- Asset location — its OWN line under the title
                       so the asset name above isn't cropped. Only
                       rendered when an asset matched. -->
                        <template x-if="assetForHost(h) && assetForHost(h).location">
                          <div class="fs-2xs text-[var(--text-faint)] truncate"
                               :title="t('host_drawer.asset.location_title')"
                               x-text="assetForHost(h).location"></div>
                        </template>
                        <div class="fs-2xs text-[var(--text-faint)]">
                          <span x-show="h.label && h.label !== h.host" class="mono me-1" x-text="h.host"></span>
                          <!-- Subline text priority:
                         1. "Updated Xs ago" when Beszel reported a
                            last-seen time (live providers signal).
                         2. Status-aware fallback for zero-provider
                            rows: i18n'd "No providers configured" for
                            inventory rows (unconfigured status),
                            "No data from providers" for rows that have
                            providers mapped but nothing responded
                            (unknown status). Loading rows stay blank
                            so the spinner isn't obscured.
                         The "N provider(s)" branch was REMOVED — the
                         chip strip on its own line directly below this
                         subline already conveys the count visually
                         (one chip per provider, with state colour). A
                         text count would be redundant noise. The
                         zero-provider fallbacks stay because they
                         convey state the chip strip can't (an empty
                         chip strip is invisible). -->
                          <span x-text="
                      fmtUpdatedAgo(h.beszel_updated) ||
                      ((h.providers || []).length
                        ? ''
                        : h.status === 'unknown'
                          ? t('hosts_extra.agents_not_responding')
                          : h.status === 'loading' ? ''
                          : t('hosts_extra.no_agents_configured'))
                    "></span>
                        </div>
                        <!-- Per-host provider chips. Pulled OUT of the
                       inline name+badges flex row above so long host
                       labels can use the full row width instead of
                       being truncated by the chip strip. Renders on
                       its OWN line under the "N Providers" subline.
                       Red when provider is globally enabled AND
                       mapped to this host but didn't return data
                       (paused / unreachable / 401). Brand colour
                       when healthy — driven by `providerColor()`,
                       per-provider customisable under Admin →
                       Providers. Hidden entirely when the host has
                       no provider chips to render so the row doesn't
                       reserve a blank vertical slot. -->
                        <div class="host-row-providers-line"
                             x-show="providerStates(h).length > 0">
                          <template x-for="p in providerStates(h)" :key="p.name">
                            <!-- INCLUDE: _components/host-provider-chip.html -->
                          </template>
                          <!-- Vocabulary legend `?` at the right edge of
                               the chip strip. Same toggle / Esc / outside-
                               click behaviour as the mobile-card variant
                               via the shared `chipLegendOpen` Alpine state. -->
                          <!-- INCLUDE: _components/chip-strip-legend.html -->
                        </div>
                        <!-- App chips — pinned apps on this host, one line
                             below the provider chips (desktop row). -->
                        <div class="apps-chip-strip host-row-apps-line flex items-center gap-1.5 flex-wrap"
                             x-show="Array.isArray(h.apps) && h.apps.length"
                             role="group" :aria-label="t('hosts_extra.app_chips_label') || 'Apps on this host'">
                          <!-- Count + aggregate-health badge: "N" coloured green
                               (all up) / amber (>=1 app down or degraded). Sibling
                               pills surface the degraded + down breakdown so the
                               operator can see HOW MANY are off without opening
                               the host drawer. Separate from the host status dot
                               (amber there = paused). -->
                          <span class="chip fs-3xs mono"
                                :class="hostAppsHealth(h).state === 'warn' ? 'pill-warning' : 'pill-ok'"
                                :title="t('hosts_extra.apps_count_title', { up: hostAppsHealth(h).up, total: hostAppsHealth(h).total }) || (hostAppsHealth(h).up + '/' + hostAppsHealth(h).total + ' apps up')"
                                x-text="t('hosts_extra.apps_count', { n: hostAppsHealth(h).total }) || (hostAppsHealth(h).total + ' apps')"></span>
                          <span x-show="hostAppsHealth(h).degraded > 0"
                                class="chip fs-3xs pill-warning"
                                :title="t('hosts_extra.apps_degraded_title', { n: hostAppsHealth(h).degraded }) || (hostAppsHealth(h).degraded + ' apps degraded on this host')"
                                x-text="t('hosts_extra.apps_degraded', { n: hostAppsHealth(h).degraded }) || (hostAppsHealth(h).degraded + ' degraded')"></span>
                          <span x-show="hostAppsHealth(h).down > 0"
                                class="chip fs-3xs pill-error"
                                :title="t('hosts_extra.apps_down_title', { n: hostAppsHealth(h).down }) || (hostAppsHealth(h).down + ' apps down on this host')"
                                x-text="t('hosts_extra.apps_down', { n: hostAppsHealth(h).down }) || (hostAppsHealth(h).down + ' down')"></span>
                          <template x-for="app in sortedHostApps(h)" :key="'happ:' + app.service_idx">
                            <!-- INCLUDE: _components/host-app-chip.html -->
                          </template>
                        </div>
                      </div>
                    </div>
                    <!-- Platform — shows the most specific OS-family value.
                   Main line is the OS string (with version) when we
                   have one, else the short platform name. Subtext
                   only appears when platform adds genuinely new info
                   (e.g. platform="Debian" but os="raspbian 13.4" —
                   two different distros). For the common "debian" +
                   "debian 13.4" case the subtext stays hidden. -->
                    <div class="min-w-0">
                      <div class="fs-sm truncate"
                           x-text="h.status === 'up' ? (h.os || h.platform || '—') : ''"></div>
                      <div class="fs-2xs text-[var(--text-faint)] truncate"
                           x-show="h.status === 'up' && h.platform && h.os
                             && h.os.toLowerCase() !== h.platform.toLowerCase()
                             && !h.os.toLowerCase().startsWith(h.platform.toLowerCase())"
                           x-text="h.platform"></div>
                    </div>
                    <!-- CPU % / Memory / Disk / Uptime / Cores / Arch / Kernel
                   — only rendered when the host is actually online.
                   Offline / unknown rows leave these cells blank so
                   the table doesn't show a row full of "0%" bars and
                   "—" dashes that imply "data is loading" when in
                   reality the host is just down. Status dot + name
                   column alone communicate the state. -->
                    <!-- CPU % — gated on hostHasCpuMetric so a host
                   that exposes only CPU via SNMP (e.g. Cisco
                   SG300 switch — CPU history yes, mem/disk no)
                   shows the CPU bar without dragging mem/disk
                   along with it. -->
                    <div>
                      <template x-if="h.status === 'up' && hostHasCpuMetric(h)">
                        <div>
                          <!-- desktop bars now self-identify on hover.
                         Pre-fix the desktop view's bars had only stale-
                         state tooltips; an operator zooming on a row
                         without the table header in view couldn't tell
                         which bar was CPU vs Memory vs Disk just by
                         the colour/level. Title now combines metric
                         name + percent + bytes (where applicable). -->
                          <div class="stat-bar" x-bind="statBarBind(Math.round(Math.min(100, h.cpu_percent || 0)), 'columns.cpu')"
                               :class="[barLevel(h.cpu_percent), isStaleField(h, 'host_cpu_percent') ? 'stale' : '']"
                               :style="'--w: ' + Math.round(Math.min(100, h.cpu_percent || 0)) + '%'"
                               :title="t('columns.cpu') + ': ' + (h.cpu_percent || 0).toFixed(1) + '%' + (h.cores ? ' (' + h.cores + ' cores)' : '') + (isStaleField(h, 'host_cpu_percent') ? ' — ' + staleAge(h) : '')">
                            <div class="fill"></div>
                          </div>
                          <template x-if="hostHasInlineSpark(h, 'cpu')">
                            <svg class="spark spark--host"
                                 :class="hostSparkClass(h, 'cpu')"
                                 viewBox="0 0 100 16" preserveAspectRatio="none" aria-hidden="true">
                              <path class="spark-area" :d="hostInlineSparklineArea(h, 'cpu')"/>
                              <path class="spark-line" fill="none" stroke="currentColor" :d="hostInlineSparkline(h, 'cpu')"/>
                            </svg>
                          </template>
                          <div class="fs-2xs mono mt-1">
                            <span x-text="(h.cpu_percent || 0).toFixed(1) + '%' + (h.cores ? ' (' + h.cores + ')' : '')"></span>
                            <template x-if="hostDriftIndicator(h, 'cpu_pct')">
                        <span class="host-drift-chip"
                              :class="hostDriftIndicator(h, 'cpu_pct').tone"
                              :title="hostDriftIndicator(h, 'cpu_pct').title"
                              :aria-label="hostDriftIndicator(h, 'cpu_pct').title"
                              x-text="hostDriftIndicator(h, 'cpu_pct').indicator"></span>
                            </template>
                          </div>
                        </div>
                      </template>
                    </div>
                    <!-- Memory % + bytes — gated on hostHasMemMetric so
                   wireless APs / switches that expose only memory
                   (not CPU/disk) still show this bar, while
                   hosts that only expose CPU don't render an
                   empty mem bar at 0%. -->
                    <div>
                      <template x-if="h.status === 'up' && hostHasMemMetric(h)">
                        <div>
                          <div class="stat-bar" x-bind="statBarBind(Math.round(h.mem_percent || memPercentOf(h)), 'columns.memory')"
                               :class="[barLevel(h.mem_percent || memPercentOf(h)), (isStaleField(h, 'host_mem_total') || isStaleField(h, 'host_mem_used')) ? 'stale' : '']"
                               :style="'--w: ' + ((h.mem_percent !== undefined && h.mem_percent !== null) ? Number(h.mem_percent) : memPercentOf(h)).toFixed(1) + '%'"
                               :title="t('columns.memory') + ': ' + ((h.mem_percent !== undefined && h.mem_percent !== null) ? Number(h.mem_percent) : memPercentOf(h)).toFixed(1) + '%' + (h.mem_total ? ' (' + fmtBytes(h.mem_used) + ' / ' + fmtBytes(h.mem_total) + ')' : '') + ((isStaleField(h, 'host_mem_total') || isStaleField(h, 'host_mem_used')) ? ' — ' + staleAge(h) : '')">
                            <div class="fill"></div>
                          </div>
                          <template x-if="hostHasInlineSpark(h, 'memory')">
                            <svg class="spark spark--host"
                                 :class="hostSparkClass(h, 'memory')"
                                 viewBox="0 0 100 16" preserveAspectRatio="none" aria-hidden="true">
                              <path class="spark-area" :d="hostInlineSparklineArea(h, 'memory')"/>
                              <path class="spark-line" fill="none" stroke="currentColor" :d="hostInlineSparkline(h, 'memory')"/>
                            </svg>
                          </template>
                          <div class="fs-2xs mono mt-1">
                            <span x-text="((h.mem_percent !== undefined && h.mem_percent !== null) ? Number(h.mem_percent) : memPercentOf(h)).toFixed(1) + '%'"></span>
                            <span class="text-[var(--text-faint)]" x-show="h.mem_total"
                                  x-text="' (' + fmtBytes(h.mem_used) + '/' + fmtBytes(h.mem_total) + ')'"></span>
                            <template x-if="hostDriftIndicator(h, 'mem_pct')">
                        <span class="host-drift-chip"
                              :class="hostDriftIndicator(h, 'mem_pct').tone"
                              :title="hostDriftIndicator(h, 'mem_pct').title"
                              :aria-label="hostDriftIndicator(h, 'mem_pct').title"
                              x-text="hostDriftIndicator(h, 'mem_pct').indicator"></span>
                            </template>
                          </div>
                        </div>
                      </template>
                    </div>
                    <!-- Disk % + bytes — gated on hostHasDiskMetric so
                   wireless APs / managed switches / chassis BMCs
                   that don't expose disk via SNMP collapse this
                   block out instead of showing an empty bar +
                   "0%" label. Segmented bar when multiple mounts
                   exist, each stripe a distinct colour
                   proportional to the mount's used portion of the
                   whole pool. Falls back to a plain single-colour
                   bar when the host reports only aggregate totals. -->
                    <div>
                      <template x-if="h.status === 'up' && hostHasDiskMetric(h)">
                        <div>
                          <!-- Single aggregate bar — matches the
                         label below so the bar visual ALWAYS
                         reflects the same percentage the operator
                         reads in text. The previous segmented
                         multi-mount variant rendered per-mount
                         fills which diverged from the aggregate
                         label (dd-wrt's 100%-full squashfs `/`
                         painted half the bar red while the
                         aggregate read `<1%` because /opt was
                         empty); operators read the bar as host
                         state and expected bar = label.
                         Per-mount detail stays in the drawer's
                         mount card AND in the bar's hover title
                         (worst mount + per-mount used/total). -->
                          <div class="stat-bar" x-bind="statBarBind(Math.round(h.disk_percent || diskPercentOf(h)), 'columns.disk')"
                               :class="[barLevel(h.disk_percent || diskPercentOf(h)), (isStaleField(h, 'host_disk_total') || isStaleField(h, 'host_disk_used')) ? 'stale' : '']"
                               :style="'--w: ' + ((h.disk_percent || diskPercentOf(h)) > 0 ? Math.max(1, Math.round(h.disk_percent || diskPercentOf(h))) : 0) + '%'"
                               :title="hostDiskBarTitle(h)">
                            <div class="fill"></div>
                          </div>
                          <template x-if="hostHasInlineSpark(h, 'disk')">
                            <svg class="spark spark--host"
                                 :class="hostSparkClass(h, 'disk')"
                                 viewBox="0 0 100 16" preserveAspectRatio="none" aria-hidden="true">
                              <path class="spark-area" :d="hostInlineSparklineArea(h, 'disk')"/>
                              <path class="spark-line" fill="none" stroke="currentColor" :d="hostInlineSparkline(h, 'disk')"/>
                            </svg>
                          </template>
                          <div class="fs-2xs mono mt-1">
                            <span x-text="fmtPercentLabel(h.disk_percent || diskPercentOf(h))"></span>
                            <span class="text-[var(--text-faint)]" x-show="h.disk_total"
                                  x-text="' (' + fmtBytes(h.disk_used) + '/' + fmtBytes(h.disk_total) + ')'"></span>
                            <template x-if="hostDriftIndicator(h, 'disk_pct')">
                        <span class="host-drift-chip"
                              :class="hostDriftIndicator(h, 'disk_pct').tone"
                              :title="hostDriftIndicator(h, 'disk_pct').title"
                              :aria-label="hostDriftIndicator(h, 'disk_pct').title"
                              x-text="hostDriftIndicator(h, 'disk_pct').indicator"></span>
                            </template>
                          </div>
                        </div>
                      </template>
                    </div>
                    <!-- Uptime -->
                    <div class="text-center fs-sm mono"
                         x-text="h.status === 'up' ? fmtUptimeShort(h.uptime_s) : ''"></div>
                    <!-- Core count -->
                    <div class="text-center fs-xs mono"
                         x-text="h.status === 'up' ? (h.cores || '—') : ''"></div>
                    <!-- Architecture -->
                    <div class="text-center fs-xs mono truncate"
                         x-text="h.status === 'up' ? (h.arch || '—') : ''"></div>
                    <!-- Kernel (truncated) -->
                    <div class="text-center fs-xs mono truncate" :title="h.kernel"
                         x-text="h.status === 'up' ? (h.kernel ? h.kernel.slice(0, 8) + (h.kernel.length > 8 ? '…' : '') : '—') : ''"></div>
                    <!-- Per-host external URL (optional — configured in
                   Admin → Hosts). When set, opens whatever the
                   operator stored (the host's web UI, a dashboard,
                   etc.). Unlike the old "Open in Beszel" link this
                   doesn't guess a URL shape — removing that because
                   Beszel's system route changed and our guess was
                   hitting 404s. -->
                    <div class="text-center">
                      <a x-show="h.url"
                         :href="h.url"
                         target="_blank" rel="noopener"
                         @click.stop
                         class="inline-flex items-center justify-center text-[var(--text-dim)] hover:text-[var(--primary)]"
                         :title="t('hosts_extra.open_link_title', { label: hostDisplayName(h) })">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                          <polyline points="15 3 21 3 21 9"/>
                          <line x1="10" y1="14" x2="21" y2="3"/>
                        </svg>
                      </a>
                    </div>
                  </div>

                  <!-- Detail drawer lives at top-level — see
                 the HOST DETAIL DRAWER block near the bottom of
                 this file. -->
                </div><!-- /host-row wrapper from desktop template (line 2017) -->
              </div><!-- /per-row wrapper from bucketRenderList template -->
            </template>
          </div>
        </template>
      </div>

      <!-- Empty-state ladder — loading, no hosts, providers broken.
           Skeleton fires while either (a) the first /api/hosts/list is
           still in flight (hostsInitialLoaded=false), or (b) a refresh
           re-set hostsLoading=true after the initial load. The "no host
           data" branches below all gate on hostsInitialLoaded so they
           never flash before the first response lands. -->
      <div x-show="hostsConfigured && (!hostsInitialLoaded || hostsLoading) && hosts.length === 0" class="skeleton-table" :aria-label="t('hosts_extra.empty.loading')">
        <template x-for="i in 6" :key="i">
          <div class="skeleton-row">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell"></div>
            <div class="skeleton-cell bar"></div>
            <div class="skeleton-cell bar"></div>
            <div class="skeleton-cell short"></div>
            <div class="skeleton-cell short"></div>
          </div>
        </template>
      </div>
      <!-- Filter-only empty state — hosts exist but no match for
           the current search query. Distinct from the "no hosts at
           all" ladder below so the operator gets a clearer "nothing
           matches, clear the filter" action. -->
      <div x-show="hostsInitialLoaded && hostsConfigured && !hostsLoading && hosts.length > 0 && filteredHosts().length === 0"
           class="text-center py-12 text-[var(--text-faint)] text-sm">
        <div>
          <span x-text="t('hosts_extra.empty.no_match')"></span>
          <span class="mono text-[var(--text-dim)]" x-text="'“' + hostsSearch + '”'"></span>.
        </div>
        <button type="button" @click="hostsSearch = ''"
                class="mt-2 text-[var(--primary)] hover:underline"
                x-text="t('hosts_extra.empty.clear_filter')"></button>
      </div>

      <!-- Empty-state ladder — ordered by most-specific cause. The
           ``hostsCuratedCount`` / ``hostsEnabledCount`` fields come
           from the server's /api/hosts response; older server
           builds don't ship those, so the first fallback case
           works even when they're absent. -->

      <!-- Case: server sent curated_count > 0 but every row disabled. -->
      <div x-show="hostsInitialLoaded && hostsConfigured && !hostsLoading && !hostsError && hosts.length === 0 && hostsCuratedCount > 0 && hostsEnabledCount === 0"
           class="text-center py-16 text-[var(--text-faint)] text-sm"
           x-html="t('hosts_extra.empty.all_disabled_html', { count: hostsCuratedCount })"></div>

      <!-- Case: server sent curated_count > 0 with enabled rows but
           no provider matched any of them. -->
      <div x-show="hostsInitialLoaded && hostsConfigured && !hostsLoading && !hostsError && hosts.length === 0 && hostsEnabledCount > 0"
           class="text-center py-16 text-[var(--text-faint)] text-sm"
           x-html="t('hosts_extra.empty.no_provider_match_html', { count: hostsEnabledCount })"></div>

      <!-- Case: positively confirmed no provider enabled. Only
           fires when the backend explicitly says configured=false
           AND reports no active sources — i.e. we're certain the
           operator hasn't enabled anything. We never INFER this
           from older-build responses that omit ``active`` because
           the assumption "no providers" would be wrong in that
           case (the old build could have providers enabled, just
           not reporting the field). -->
      <div x-show="hostsInitialLoaded && !hostsConfigured && !hostsLoading && !hostsError && hosts.length === 0 && (hostsActiveSources || []).length === 0"
           class="text-center py-16 text-[var(--text-faint)] text-sm"
           x-html="t('hosts_extra.empty.no_provider_enabled_html')"></div>

      <!-- Fallback — servers on builds that don't return
           curated_count / enabled_count, OR any case where the
           providers are enabled but returned no data. The copy
           points at the most likely fix (Test providers) rather
           than the misleading "no hosts yet". -->
      <div x-show="hostsInitialLoaded && hostsConfigured && !hostsLoading && !hostsError && hosts.length === 0 && hostsCuratedCount === 0"
           class="text-center py-16 text-[var(--text-faint)] text-sm"
           x-html="t('hosts_extra.empty.no_data_html', { sources: (hostsActiveSources || []).length ? '<span class=&quot;mono&quot;>' + ((hostsActiveSources || []).join(' / ')) + '</span>' : t('hosts_extra.empty.fallback_sources_label') })"></div>
    </div>

    <!-- ===== APPS VIEW =====
         Cross-host aggregate. One card per distinct app (grouped by
         catalog_id or name); each card shows status pill + per-host
         instance list + per-port chips. Data shape from /api/apps. -->
    <div x-show="view==='apps'" class="space-y-3">
      <div class="flex items-center justify-between flex-wrap gap-2 px-1">
        <div>
          <h2 class="font-semibold fs-xl" x-text="t('apps.title') || 'Apps'"></h2>
          <div class="fs-xs text-[var(--text-faint)]">
            <span x-text="t('apps.subtitle') || 'Services running across your fleet.'"></span>
            <template x-if="appsListLoaded">
              <span class="ms-2">
                <span class="chip pill-ok fs-2xs" x-text="t('apps.counts.up', { n: appsCounts().up })"></span>
                <span class="chip pill-warning fs-2xs" x-show="appsCounts().degraded" x-text="t('apps.counts.degraded', { n: appsCounts().degraded })"></span>
                <span class="chip pill-error fs-2xs" x-show="appsCounts().down" x-text="t('apps.counts.down', { n: appsCounts().down })"></span>
                <span class="chip pill-muted fs-2xs" x-show="appsCounts().unknown" x-text="t('apps.counts.unknown', { n: appsCounts().unknown })"></span>
              </span>
            </template>
          </div>
        </div>
        <div class="flex items-center gap-2 flex-wrap">
          <input type="search" class="fs-sm"
                 :placeholder="t('apps.search_placeholder') || 'Search apps…'"
                 x-model="appsSearchQuery"
                 style="min-width:200px;">
          <div role="group" :aria-label="t('apps.status_filter_label') || 'Filter by status'" class="flex gap-1">
            <button type="button" class="chip fs-2xs"
                    :class="appsStatusFilter === '' ? 'pill-info' : 'pill-muted'"
                    :aria-pressed="appsStatusFilter === ''"
                    @click="appsStatusFilter = ''"
                    x-text="t('apps.filter_all') || 'All'"></button>
            <button type="button" class="chip fs-2xs"
                    :class="appsStatusFilter === 'up' ? 'pill-ok' : 'pill-muted'"
                    :aria-pressed="appsStatusFilter === 'up'"
                    @click="appsStatusFilter = appsStatusFilter === 'up' ? '' : 'up'"
                    x-text="t('apps.filter_up') || 'Up'"></button>
            <button type="button" class="chip fs-2xs"
                    :class="appsStatusFilter === 'degraded' ? 'pill-warning' : 'pill-muted'"
                    :aria-pressed="appsStatusFilter === 'degraded'"
                    @click="appsStatusFilter = appsStatusFilter === 'degraded' ? '' : 'degraded'"
                    x-text="t('apps.filter_degraded') || 'Degraded'"></button>
            <button type="button" class="chip fs-2xs"
                    :class="appsStatusFilter === 'down' ? 'pill-error' : 'pill-muted'"
                    :aria-pressed="appsStatusFilter === 'down'"
                    @click="appsStatusFilter = appsStatusFilter === 'down' ? '' : 'down'"
                    x-text="t('apps.filter_down') || 'Down'"></button>
          </div>
          <!-- Group-by toggle — App (card per app, instances inside) vs
               Host (card per host, app icons beneath). Persisted to
               localStorage via setAppsViewGroupBy. -->
          <div role="group" :aria-label="t('apps.group_by_label') || 'Group apps by'" class="flex gap-1">
            <button type="button" class="chip fs-2xs"
                    :class="appsViewGroupBy === 'app' ? 'pill-info' : 'pill-muted'"
                    :aria-pressed="appsViewGroupBy === 'app'"
                    @click="setAppsViewGroupBy('app')"
                    x-text="t('apps.group_by_app') || 'By app'"></button>
            <button type="button" class="chip fs-2xs"
                    :class="appsViewGroupBy === 'host' ? 'pill-info' : 'pill-muted'"
                    :aria-pressed="appsViewGroupBy === 'host'"
                    @click="setAppsViewGroupBy('host')"
                    x-text="t('apps.group_by_host') || 'By host'"></button>
            <button type="button" class="chip fs-2xs"
                    :class="appsViewGroupBy === 'custom' ? 'pill-info' : 'pill-muted'"
                    :aria-pressed="appsViewGroupBy === 'custom'"
                    @click="setAppsViewGroupBy('custom')"
                    x-text="t('apps.group_by_custom') || 'Custom'"></button>
          </div>
          <button type="button" class="btn btn-soft fs-sm" @click="loadAppsList(true)"
                  :disabled="appsListLoading"
                  :aria-label="t('actions.refresh') || 'Refresh'">
            <svg width="13" height="13" :class="appsListLoading ? 'spin-md' : ''" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-cw"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Instant skeleton card grid — painted the MOMENT the Apps view
           mounts, BEFORE /api/apps returns, so the operator sees the page
           STRUCTURE immediately instead of a multi-second blank spinner
           (perf finding 1: the view used to gate entirely on appsListLoaded
           with only a centred spinner). Matches the Stacks/Services
           instant-skeleton convention; the real cards reconcile in when the
           fetch lands + appsListLoaded flips true. 8 placeholder shells in
           the SAME grid layout as the real card grids below so there's no
           layout shift on swap. aria-hidden — the load state is conveyed by
           the visible shimmer, not announced. -->
      <div x-show="!appsListLoaded && !appsListError"
           class="grid content-start grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3"
           aria-hidden="true">
        <template x-for="i in 8" :key="'apps-skel-' + i">
          <div class="apps-card border border-[var(--border)] rounded-md p-3 flex items-start gap-3">
            <div class="apps-card-logo">
              <div class="skeleton-cell" style="width: 100%; height: 100%;"></div>
            </div>
            <div class="flex-1 min-w-0 space-y-2">
              <div class="skeleton-cell short" style="width: 60%;"></div>
              <div class="skeleton-cell short" style="width: 40%;"></div>
              <div class="skeleton-cell bar" style="width: 80%;"></div>
              <div class="skeleton-cell bar" style="width: 70%;"></div>
            </div>
          </div>
        </template>
      </div>

      <!-- Error banner -->
      <div x-show="appsListError && appsListLoaded === false"
           class="rounded-md px-3 py-2 fs-sm bg-[var(--pill-error-bg)] text-[var(--pill-error-fg)] border border-[var(--pill-error-br)]"
           role="alert">
        <span x-text="(t('apps.error_loading') || 'Failed to load apps: ') + appsListError"></span>
      </div>

      <!-- Card grid. Tailwind: 1 col mobile, 2 col sm, 3 col lg, 4 col xl.
           Per-card status accent border on left, per-port chips beneath
           the instance list. -->
      <!-- x-if (not x-show) so the two INACTIVE view-mode grids are torn out
           of the reactive graph entirely (perf finding 3) — x-show only
           toggles display:none, leaving the hidden grids' x-for card builders
           running on every flush (2-3x mount work). Caveat-6 N/A: these are
           container gates, not memoized getters feeding a count badge. -->
      <template x-if="appsListLoaded && appsViewGroupBy === 'app' && filteredApps().length">
        <div class="grid content-start grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
          <template x-for="app in filteredApps()" :key="app.group_id">
            <!-- INCLUDE: _components/apps-card.html -->
          </template>
        </div>
      </template>

      <!-- Host-grouped card grid. One card per host carrying the apps
           that run on it; each app renders as an icon tile (brand icon
           + status dot) beneath the host header. Clicking the header
           opens the host-app drawer; clicking a tile jumps straight to
           that app's drawer. -->
      <template x-if="appsListLoaded && appsViewGroupBy === 'host' && appsHostGroups().length">
        <div class="grid content-start grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
          <template x-for="grp in appsHostGroups()" :key="grp.host_id">
            <article class="apps-card border border-[var(--border)] bg-[var(--surface)] rounded-md p-3"
                     :class="'apps-card--' + grp.status">
              <!-- Host header — clickable, opens the host-app drawer.
                   role=button div (not a <button>) so the <h3> heading
                   stays valid markup inside the clickable region. -->
              <div class="flex items-start gap-2 mb-2 w-full cursor-pointer"
                   role="button" tabindex="0"
                   @click="openAppHostDrawer(grp)"
                   @keydown.enter="openAppHostDrawer(grp)"
                   @keydown.space.prevent="openAppHostDrawer(grp)"
                   :aria-label="t('apps.host_drawer.open_aria', {name: (grp.host_label || grp.host_address)})">
              <span class="apps-host-avatar" aria-hidden="true">
                <svg width="18" height="18" class="text-[var(--text-dim)]">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-server"/>
                </svg>
              </span>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center justify-between gap-1">
                    <h3 class="font-semibold fs-sm truncate mono" x-text="grp.host_address || grp.host_id"></h3>
                    <span class="chip fs-3xs whitespace-nowrap"
                          :class="appStatusPillClass(grp.status)"
                          x-text="t('apps.status_' + grp.status) || grp.status"></span>
                  </div>
                  <p class="fs-3xs text-[var(--text-faint)] truncate">
                  <span x-show="grp.host_label && grp.host_label !== (grp.host_address || grp.host_id)"
                        x-text="grp.host_label + ' · '"></span>
                    <span x-text="t('apps.counts.apps_up', { up: grp.up_count, total: grp.app_count })"></span>
                  </p>
                </div>
              </div>
              <!-- App icon tiles -->
              <div class="apps-host-tiles">
                <template x-for="a in grp.apps" :key="a.group_id + ':' + a.service_idx">
                  <button type="button" class="apps-host-tile"
                          @click="openAppFromHostDrawer(a)"
                          :title="appsChipTitle(a)"
                          :aria-label="appsChipAriaLabel(a)">
                  <span class="apps-host-tile-icon">
                    <img :src="iconUrlFor(a.icon || a.name)" alt="" width="34" height="34" class="rounded"
                         @error="$event.target.style.visibility='hidden'">
                    <span class="apps-card-dot apps-host-tile-dot" :class="'apps-card-dot--' + a.status" aria-hidden="true"></span>
                  </span>
                    <span class="apps-host-tile-name truncate" x-text="a.name"></span>
                  </button>
                </template>
              </div>
            </article>
          </template>
        </div>
      </template>

      <!-- Custom layout (Homarr-style) — the user organises app cards into
           their own collapsible sections; the layout (sections + order +
           collapse state) persists PER-USER in ui_prefs.apps_custom_layout
           via the existing /api/me/ui-prefs channel. Two views toggled by
           `appsCustomEditMode`: a LOCKED view (default) renders the big app
           cards (the same shared apps-card the by-app grid uses) so the
           board can't be moved accidentally; EDIT mode swaps in condensed
           draggable tiles + section CRUD (native HTML5 DnD: tiles carry
           group_id, section headers carry the section id). -->
      <template x-if="appsListLoaded && appsViewGroupBy === 'custom'">
        <div class="space-y-3">
          <!-- Named-view picker — switch / create / rename / duplicate / delete
               the user's custom dashboards. Each view holds its own sections +
               layout (persisted per-user in ui_prefs.apps_custom_views). The
               active view's layout is what every section / drag / collapse
               control below operates on. -->
          <div class="flex items-center gap-1.5 flex-wrap px-1">
            <svg width="14" height="14" class="text-[var(--text-dim)] flex-shrink-0" aria-hidden="true">
              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-layers"/>
            </svg>
            <!-- Selected option is set via `:selected` on each <option>, NOT
                 `:value` on the <select> — the latter hits the Alpine
                 select-mount race (the select commits its value BEFORE the
                 x-for options exist, so it falls back to the first option
                 and the dropdown shows the wrong view vs the one actually
                 displayed). Each option self-selects when it renders, and
                 re-evaluates when appsActiveViewId() changes (create /
                 duplicate / delete), so it stays in sync both ways. -->
            <select class="fs-sm py-1 max-w-[180px]"
                    @change="appsSwitchView($event.target.value)"
                    :aria-label="t('apps.custom.view_picker_label') || 'Custom view'">
              <template x-for="v in appsViews()" :key="v.id">
                <option :value="v.id" :selected="v.id === appsActiveViewId()" x-text="v.name"></option>
              </template>
            </select>
            <!-- Dashboard-switch loading indicator — heavy dashboards take a
                 couple seconds to rebuild + mount; appsSwitchView yields so
                 this paints before the work starts. -->
            <span x-show="appsViewSwitching" class="inline-flex items-center gap-1 fs-xs text-[var(--text-faint)]">
            <span class="spin" aria-hidden="true"></span>
            <span x-text="t('apps.custom.view_loading') || 'Loading…'"></span>
          </span>
            <button type="button" class="user-action-btn" @click="appsPromptCreateView()"
                    :title="t('apps.custom.view_new') || 'New view'"
                    :aria-label="t('apps.custom.view_new') || 'New view'">
              <svg width="14" height="14" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-plus"/>
              </svg>
            </button>
            <button type="button" class="user-action-btn" @click="appsPromptRenameView(appsActiveViewId())"
                    :title="t('apps.custom.view_rename') || 'Rename view'"
                    :aria-label="t('apps.custom.view_rename') || 'Rename view'">
              <svg width="14" height="14" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-edit"/>
              </svg>
            </button>
            <button type="button" class="user-action-btn" @click="appsDuplicateView(appsActiveViewId())"
                    :title="t('apps.custom.view_duplicate') || 'Duplicate view'"
                    :aria-label="t('apps.custom.view_duplicate') || 'Duplicate view'">
              <svg width="14" height="14" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/>
              </svg>
            </button>
            <button type="button" class="user-action-btn user-action-btn--danger"
                    @click="appsConfirmDeleteView(appsActiveViewId())"
                    :disabled="appsViews().length <= 1"
                    :title="t('apps.custom.view_delete') || 'Delete view'"
                    :aria-label="t('apps.custom.view_delete') || 'Delete view'">
              <svg width="14" height="14" aria-hidden="true">
                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash"/>
              </svg>
            </button>
          </div>
          <div class="flex items-center justify-between gap-2 px-1">
            <p class="fs-xs text-[var(--text-faint)]"
               x-text="appsCustomEditMode
               ? (t('apps.custom.hint') || 'Drag app cards between sections to organise them. Drag a section header to reorder. Your layout is saved automatically.')
               : (t('apps.custom.locked_hint') || 'Your custom board. Click Edit to rearrange sections.')"></p>
            <div class="flex items-center gap-2 flex-shrink-0">
              <button type="button" x-show="appsCustomEditMode"
                      class="btn btn-soft fs-sm inline-flex items-center gap-1"
                      @click="addAppsSection()">
                <svg width="13" height="13" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-plus"/>
                </svg>
                <span x-text="t('apps.custom.add_section') || 'Add section'"></span>
              </button>
              <!-- Edit ⇄ Save (lock) toggle — pencil when locked, check when
                   editing. Switching OFF re-locks to the big-card view; the
                   layout itself is already persisted on every change. -->
              <button type="button"
                      class="btn fs-sm inline-flex items-center gap-1"
                      :class="appsCustomEditMode ? 'btn-primary' : 'btn-soft'"
                      :aria-pressed="appsCustomEditMode ? 'true' : 'false'"
                      @click="appsCustomEditMode = !appsCustomEditMode"
                      :title="appsCustomEditMode ? (t('apps.custom.save_title') || 'Lock the board') : (t('apps.custom.edit_title') || 'Rearrange the board')">
                <svg width="13" height="13" aria-hidden="true" x-show="!appsCustomEditMode">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-pencil"/>
                </svg>
                <svg width="13" height="13" aria-hidden="true" x-show="appsCustomEditMode">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-check"/>
                </svg>
                <span x-text="appsCustomEditMode ? (t('apps.custom.save') || 'Save') : (t('apps.custom.edit') || 'Edit')"></span>
              </button>
            </div>
          </div>

          <!-- Unified sections — ONE template serves both the LOCKED view
               (big cards, read-only) and the EDIT view (condensed draggable
               tiles + section CRUD): the chrome (rename input vs static name,
               delete, add-widget / add-bookmark, header drag) and the app-tile
               size (big card vs condensed tile) gate on appsCustomEditMode.
               Widget / bookmark tiles self-gate their drag + remove. Items are
               heterogeneous (kind=app|widget|bookmark) — see _buildAppsCustom. -->
          <template x-for="sec in appsCustomSections()" :key="sec.id">
            <section class="apps-section border border-[var(--border)] rounded-md"
                     x-show="appsCustomEditMode || sec.items.length"
                     @dragover.prevent
                     @drop.stop="appsCustomEditMode ? appsSectionDrop(sec.id) : null">
              <!-- The ENTIRE header row toggles collapse (operator-flagged:
                   clicking anywhere on the header, not just the chevron).
                   The guard ignores clicks that originate on an interactive
                   control (the rename input, the add/delete buttons, the
                   number/select inputs shown in edit mode) so those keep
                   their own behaviour — only "bare" header clicks toggle.
                   `cursor: pointer` on the header signals the affordance. -->
              <header class="apps-section-head flex items-center gap-2 px-2 py-1.5 cursor-pointer"
                      :draggable="appsCustomEditMode ? 'true' : 'false'"
                      @dragstart="appsCustomEditMode ? appsSectionDragStart($event, sec.id) : null"
                      @click="(($event.target.closest('input, select, textarea, button, a')) ? null : toggleAppsSectionCollapsed(sec.id))">
                <button type="button" class="user-action-btn"
                        @click.stop="toggleAppsSectionCollapsed(sec.id)"
                        :aria-expanded="(!sec.collapsed).toString()"
                        :aria-label="sec.collapsed ? (t('actions.expand') || 'Expand') : (t('actions.collapse') || 'Collapse')">
                  <svg width="14" height="14" aria-hidden="true" class="flip-rtl" :class="sec.collapsed ? '' : 'rotate-90'">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
                  </svg>
                </button>
                <input x-show="appsCustomEditMode" type="text"
                       class="apps-section-name flex-1 fs-display-sm font-semibold bg-transparent border-0"
                       :value="sec.name"
                       :placeholder="t('apps.custom.section_name_placeholder') || 'Section name'"
                       :aria-label="t('apps.custom.section_name_aria') || 'Section name'"
                       @change="renameAppsSection(sec.id, $event.target.value)"
                       @keydown.enter.prevent="$event.target.blur()">
                <span x-show="!appsCustomEditMode" class="fs-display-sm font-semibold flex-1 truncate"
                      x-text="sec.name || (t('apps.custom.unsectioned') || 'Unsectioned')"></span>
                <!-- Per-section status rollup chips (up / degraded / down) so a
                     COLLAPSED section signals at a glance which one has an issue
                     to expand. Mirrors the fleet summary pills at the top of the
                     Apps page. Each chip hides at count 0; the green up chip shows
                     whenever the section has at least one app. Shown in both edit
                     and locked mode. -->
                <!-- appsSectionCounts(sec) computed ONCE via a single-element
                     x-for (was read 9x across the gate + 3 chips, each looping
                     sec.items) — the chips reference the local `c`. NOT
                     memoized (header-chip consumers, caveat-6 freeze risk), so
                     call-once-and-destructure is the right shape. Each chip
                     carries :aria-label (not just :title) so a screen reader
                     announces "N up / degraded / down", not a bare number. -->
                <template x-for="c in [appsSectionCounts(sec)]" :key="'seccounts'">
                <span x-show="c.total" class="flex items-center gap-1 flex-shrink-0">
                  <span class="chip pill-ok fs-3xs" x-show="c.up"
                        x-text="c.up"
                        :title="t('apps.counts.up', { n: c.up })"
                        :aria-label="t('apps.counts.up', { n: c.up })"></span>
                  <span class="chip pill-warning fs-3xs" x-show="c.degraded"
                        x-text="c.degraded"
                        :title="t('apps.counts.degraded', { n: c.degraded })"
                        :aria-label="t('apps.counts.degraded', { n: c.degraded })"></span>
                  <span class="chip pill-error fs-3xs" x-show="c.down"
                        x-text="c.down"
                        :title="t('apps.counts.down', { n: c.down })"
                        :aria-label="t('apps.counts.down', { n: c.down })"></span>
                </span>
                </template>
                <template x-if="appsCustomEditMode">
                <span class="flex items-center gap-1 flex-shrink-0">
                  <select class="fs-2xs" :aria-label="t('apps.custom.add_widget') || 'Add widget'"
                          @change="addAppsWidget(sec.id, $event.target.value); $event.target.value=''">
                    <option value="" x-text="t('apps.custom.add_widget') || '+ Widget'"></option>
                    <template x-for="wk in appsWidgetKinds" :key="wk">
                      <option :value="wk" x-text="appsWidgetLabel(wk)"></option>
                    </template>
                  </select>
                  <button type="button" class="user-action-btn"
                          @click="openAppsBookmarkForm(sec.id)"
                          :aria-label="t('apps.custom.add_bookmark') || 'Add bookmark'"
                          :title="t('apps.custom.add_bookmark') || 'Add bookmark'">
                    <svg width="14" height="14" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-link"/></svg>
                  </button>
                  <button type="button" class="user-action-btn user-action-btn--danger"
                          @click="deleteAppsSection(sec.id)"
                          :aria-label="t('apps.custom.delete_section') || 'Delete section'"
                          :title="t('apps.custom.delete_section') || 'Delete section'">
                    <svg width="14" height="14" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-trash-2"/></svg>
                  </button>
                </span>
                </template>
              </header>
              <div x-show="appsCustomEditMode && appsBookmarkOpenFor === sec.id"
                   class="flex items-center gap-2 px-2 py-1.5 border-t border-[var(--border)] flex-wrap">
                <input type="text" class="fs-xs apps-bookmark-quickadd-input"
                       x-model="appsBookmarkName"
                       :placeholder="t('apps.custom.bookmark_name_placeholder') || 'Name'"
                       :aria-label="t('apps.custom.bookmark_name_placeholder') || 'Name'">
                <input type="url" class="fs-xs apps-bookmark-quickadd-input apps-bookmark-quickadd-input--url"
                       x-model="appsBookmarkUrl"
                       :placeholder="t('apps.custom.bookmark_url_placeholder') || 'https://…'"
                       :aria-label="t('apps.custom.bookmark_url_placeholder') || 'URL'"
                       @keydown.enter.prevent="submitAppsBookmark(sec.id)">
                <!-- Optional icon — a brand SLUG (e.g. ftth, plex), a full
                     SVG / PNG / favicon URL, or blank to auto-resolve from
                     the name. MUST be type="text" (NOT type="url"): a bare
                     brand slug like `ftth` is not a valid URL, so type=url
                     silently rejected it and the slug never persisted —
                     the tile then fell back to the bookmark URL as the
                     icon source (operator saw it try to load `https://5g/`
                     as the image). appsBookmarkIconUrl resolves the slug
                     through the same brand resolver the hosts use. -->
                <input type="text" class="fs-xs apps-bookmark-quickadd-input apps-bookmark-quickadd-input--icon"
                       x-model="appsBookmarkIcon"
                       :placeholder="t('apps.custom.bookmark_icon_placeholder') || 'Icon slug, URL, or blank'"
                       :aria-label="t('apps.custom.bookmark_icon_aria') || 'Icon slug or URL (optional)'"
                       @keydown.enter.prevent="submitAppsBookmark(sec.id)">
                <button type="button" class="btn btn-primary fs-2xs" @click="submitAppsBookmark(sec.id)"
                        x-text="t('actions.add') || 'Add'"></button>
                <button type="button" class="btn btn-ghost fs-2xs" @click="cancelAppsBookmarkForm()"
                        x-text="t('actions.cancel') || 'Cancel'"></button>
              </div>
              <!-- COLLAPSED SECTIONS RENDER NOTHING — `x-if` (not `x-show`)
                   so a collapsed section's cards are TORN OUT of the DOM +
                   the reactive graph entirely: no card bodies, no
                   IntersectionObservers, no sparkline / spark memos, and no
                   per-app `app-data` fetches run for a section the user
                   can't see. `x-show` only set `display:none`, which kept
                   every card live + polling — the overhead the operator
                   asked to eliminate. Expanding the section re-mounts the
                   grid, which re-arms the observers + lazy-render queue, so
                   probing resumes only when the section is back in view. -->
              <template x-if="!sec.collapsed">
                <!-- BOTH edit AND locked mode use the span-aware
                     `.apps-section-grid` (fine 90px auto-fill track) so the
                     per-card width presets (half=span 2 / normal=span 3 /
                     double=span 5) render at the SAME width in both modes.
                     Locked mode previously used a Tailwind equal-column grid
                     that ignored the span classes entirely, so a width set
                     while editing silently reverted the moment edit mode
                     closed (reported on bookmark tiles). -->
                <div class="apps-section-body-grid apps-section-grid"
                     @dragover.prevent @drop="appsCustomEditMode ? appsTileDrop(sec.id, null) : null">
                  <template x-for="item in sec.items" :key="item.uid">
                    <!-- apps-custom-cell wraps a flip-capable container.
                         `apps-card-flip` sets the perspective; the size
                         class (`apps-card--size-half|normal|double`)
                         drives grid-span + body-density; the flipped
                         class toggles via the front-face gear button. -->
                    <div class="apps-custom-cell min-w-0 apps-card-flip"
                         :class="appsCardSizeClass(item) + ' ' + appsCardHeightClass(item) + (appsCardIsFlipped(item.uid) ? ' apps-card--flipped' : '') + (appsCustomEditMode ? ' apps-card--editing' : '')"
                         :draggable="appsCustomEditMode && !_appsResizing ? 'true' : 'false'"
                         :data-apps-tile-uid="item.uid"
                         :tabindex="appsCustomEditMode ? 0 : null"
                         :aria-label="appsCustomEditMode ? (t('apps.custom.tile_reorder_aria') || 'Reorder tile — arrow keys move it within its section') : null"
                         @keydown="appsCustomEditMode ? _appsTileMoveKey($event, item.uid) : null"
                         @dragstart="(appsCustomEditMode && !_appsResizing) ? appsItemDragStart($event, item.uid) : $event.preventDefault()"
                         @dragover.prevent
                         @drop.stop="appsCustomEditMode ? appsTileDrop(sec.id, item.uid) : null">
                      <div class="apps-card-flip-inner">
                        <div class="apps-card-face-front">
                          <!-- Edit-mode RIGHT-EDGE resize handle. Drag it
                               left / right to snap the card between the three
                               size presets (half / normal / double). This is
                               the "drag the edge to resize" affordance — the
                               tiny corner N/H/D button is a secondary
                               tap-to-cycle. @pointerdown.stop.prevent so the
                               cell's reorder-drag doesn't fire (appsSizeControl
                               also sets `_appsResizing`, which the cell's
                               @dragstart reads to preventDefault the move). -->
                          <div class="apps-card-resize-handle" x-show="appsCustomEditMode"
                               @pointerdown.stop.prevent="appsSizeControl($event, item.uid)"
                               :title="t('apps.custom.size_drag_title') || 'Drag to resize (half / normal / double)'"
                               :aria-label="t('apps.custom.size_drag_title') || 'Drag to resize'"
                               aria-hidden="false"></div>
                          <!-- Edit-mode BOTTOM-EDGE resize handle. Drag it
                               up / down to snap the card between its two
                               height presets (short / tall). Vertical
                               analogue of the right-edge width handle;
                               applies to apps, widgets AND bookmarks. -->
                          <div class="apps-card-resize-handle-v" x-show="appsCustomEditMode"
                               @pointerdown.stop.prevent="appsHeightControl($event, item.uid)"
                               :title="t('apps.custom.height_drag_title') || 'Drag to resize height (short / tall)'"
                               :aria-label="t('apps.custom.height_drag_title') || 'Drag to resize height'"
                               aria-hidden="false"></div>
                          <!-- Floating gear (bookmark cards only). The
                               edit-mode resize affordance is the right-edge
                               drag handle above — the old corner size-cycle
                               button ("Normal"/"Half" text) was removed: it
                               overlapped the trash / gear icons in the
                               top-right corner and is redundant now that the
                               edge handle does the resize. -->
                          <div class="apps-card-corner-actions">
                            <!-- Floating gear: bookmark cards only. App cards
                                 render the gear as the first pill in their
                                 status-pill stack (apps-card.html) and widget
                                 tiles render it as a pill in their actions row
                                 (apps-widget-tile.html) — both per the
                                 requested consistent pill design — so suppress
                                 the floating gear for those to avoid a
                                 duplicate sitting over the card. -->
                            <button type="button" class="apps-card-gear"
                                    x-show="item.kind !== 'app' && item.kind !== 'widget' && item.kind !== 'bookmark'"
                                    @click.stop="toggleAppsCardFlipped(item.uid)"
                                    :title="t('apps.custom.gear_title') || 'Card settings'"
                                    :aria-label="t('apps.custom.gear_aria') || 'Card settings'"
                                    :aria-pressed="appsCardIsFlipped(item.uid) ? 'true' : 'false'">
                              <svg aria-hidden="true">
                                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-settings"/>
                              </svg>
                            </button>
                          </div>
                          <!-- App card — rendered at FULL fidelity in BOTH
                               locked AND edit mode (operator-flagged: edit
                               must show the real card at its current size
                               with the title + settings/refresh pills, in a
                               shimmer treatment — NOT the old small icon
                               tile). The cell carries `.apps-card--editing`
                               in edit mode (shimmer + grab cursor + dashed
                               outline) and is draggable for reorder; the
                               corner size button resizes between the three
                               presets. `appsCardSizeClass` drives the grid
                               span so half / normal / double are visibly
                               distinct widths. -->
                          <template x-if="item.kind === 'app'">
                            <template x-for="app in [item.app]" :key="app.group_id">
                              <!-- INCLUDE: _components/apps-card.html -->
                            </template>
                          </template>
                          <template x-if="item.kind === 'widget'">
                            <!-- INCLUDE: _components/apps-widget-tile.html -->
                          </template>
                          <template x-if="item.kind === 'bookmark'">
                            <!-- INCLUDE: _components/apps-bookmark-tile.html -->
                          </template>
                        </div>
                        <div class="apps-card-face-back" x-show="appsCardIsFlipped(item.uid)">
                          <!-- INCLUDE: _components/apps-card-settings.html -->
                        </div>
                      </div>
                    </div>
                  </template>
                  <div x-show="appsCustomEditMode && !sec.items.length" class="apps-section-empty fs-2xs text-[var(--text-faint)]"
                       x-text="t('apps.custom.section_empty') || 'Drop apps here'"></div>
                </div>
              </template>
            </section>
          </template>

          <!-- Unsectioned (apps only) — EDIT MODE ONLY. In locked mode the
               whole bucket is torn out of the DOM (x-if, not x-show) so apps
               the user never placed into a section are both HIDDEN and NOT
               PROBED: no card mounts, so no IntersectionObserver + no
               app-data / probe fetch runs for them. The reasoning: an app
               left unsectioned in locked mode is one the user chose not to
               surface, so it shouldn't cost render or network work. Edit
               mode shows them as a condensed draggable staging area to drag
               into a section (or knowingly leave out → hidden). -->
          <template x-if="appsCustomEditMode">
            <section class="apps-section apps-section--unsectioned border border-[var(--border)] rounded-md"
                     x-show="appsCustomUnsectioned().length || !appsCustomSections().length">
              <header class="apps-section-head flex items-center gap-2 px-2 py-1.5 cursor-pointer"
                      @click="(($event.target.closest('input, select, textarea, button, a')) ? null : toggleAppsUnsectionedCollapsed())">
                <button type="button" class="user-action-btn"
                        @click.stop="toggleAppsUnsectionedCollapsed()"
                        :aria-expanded="(!appsUnsectionedCollapsed()).toString()"
                        :aria-label="appsUnsectionedCollapsed() ? (t('actions.expand') || 'Expand') : (t('actions.collapse') || 'Collapse')">
                  <svg width="14" height="14" aria-hidden="true" class="flip-rtl"
                       :class="appsUnsectionedCollapsed() ? '' : 'rotate-90'">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
                  </svg>
                </button>
                <span class="fs-display-sm font-semibold text-[var(--text-dim)] flex-1"
                      x-text="t('apps.custom.unsectioned') || 'Unsectioned'"></span>
                <span class="fs-2xs text-[var(--text-faint)]" x-text="appsCustomUnsectioned().length"></span>
              </header>
              <div x-show="!appsUnsectionedCollapsed()"
                   :class="appsCustomEditMode ? 'apps-section-grid' : 'grid content-start grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 p-2'"
                   @dragover.prevent @drop="appsCustomEditMode ? appsTileDrop('__unsectioned', null) : null">
                <template x-for="app in appsCustomUnsectioned()" :key="app.group_id">
                  <div class="apps-custom-cell min-w-0">
                    <!-- Edit-mode only (the enclosing section is x-if'd to edit
                         mode) — a condensed draggable staging tile. No locked-
                         mode card branch here: unsectioned apps never render
                         (or probe) outside edit mode. -->
