                            class="btn btn-danger-outline text-[11px]"
                            title="Remove container">
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/></svg>
                    </button>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
      <div x-show="loading && items.length === 0" class="loading-state">
        <span class="spin-lg" aria-hidden="true"></span>
        <div x-text="t('loading.resources')"></div>
      </div>
      <div x-show="filteredItems.length===0 && !loading && items.length > 0" class="text-center py-16 text-[var(--text-faint)] text-sm" x-text="t('empty.no_match')">
      </div>
    </div>

    <!-- ===== HISTORY VIEW ===== -->
    <div x-show="view==='history'" class="space-y-3">
      <div class="flex justify-between items-center">
        <div>
          <h2 class="font-semibold text-[15px]" x-text="t('history.title')"></h2>
          <div class="text-[11px] text-[var(--text-faint)]" x-text="t('history.entries', { count: history.length })"></div>
        </div>
        <div class="flex gap-2">
          <a :href="historyExportUrl('csv')" class="btn btn-soft text-[12px]" :title="t('history.csv_title')" x-text="t('history.csv')"></a>
          <a :href="historyExportUrl('json')" class="btn btn-soft text-[12px]" :title="t('history.json_title')" x-text="t('history.json')"></a>
          <button @click="loadHistory()" class="btn btn-ghost text-[12px]" x-text="t('actions.reload')"></button>
          <button @click="clearHistory()" class="btn btn-ghost text-[12px] text-danger" x-text="t('history.clear_all')"></button>
        </div>
      </div>

      <!-- HISTORY FILTER BAR -->
      <div class="flex flex-wrap items-center gap-2">
        <input type="search" x-model.debounce.300ms="historyFilters.q" @input="loadHistory()"
               :placeholder="t('history.search_placeholder')"
               class="text-[12px] min-w-[220px] flex-1 max-w-[340px]">
        <div class="flex items-center gap-1.5 flex-wrap">
          <button @click="historyFilters.status=''; loadHistory()"
                  :class="!historyFilters.status ? 'active' : ''" class="filter-chip" x-text="t('history.status_all')"></button>
          <button @click="historyFilters.status='success'; loadHistory()"
                  :class="historyFilters.status==='success' ? 'active' : ''" class="filter-chip" x-text="t('history.status_success')"></button>
          <button @click="historyFilters.status='error'; loadHistory()"
                  :class="historyFilters.status==='error' ? 'active' : ''" class="filter-chip" x-text="t('history.status_error')"></button>
        </div>
        <select x-model="historyFilters.op_type" @change="loadHistory()" class="text-[12px] min-w-[150px]">
          <option value="" x-text="t('history.all_op_types')"></option>
          <option value="update_stack">update_stack</option>
          <option value="update_container">update_container</option>
          <option value="restart_service">restart_service</option>
          <option value="restart_container">restart_container</option>
          <option value="remove_container">remove_container</option>
        </select>
        <select x-model="historyFilters.stack" @change="loadHistory()" class="text-[12px] min-w-[150px]">
          <option value="" x-text="t('history.all_stacks')"></option>
          <template x-for="s in historyStackOptions" :key="s">
            <option :value="s" x-text="s"></option>
          </template>
        </select>
        <input type="date" x-model="historyFilters.fromDate" @change="loadHistory()"
               class="text-[12px]" :title="t('history.from_date_title')">
        <input type="date" x-model="historyFilters.toDate" @change="loadHistory()"
               class="text-[12px]" :title="t('history.to_date_title')">
        <button x-show="hasHistoryFilter()" @click="resetHistoryFilters(); loadHistory()"
                class="btn btn-ghost text-[11px]" x-text="t('history.clear_filters')"></button>
      </div>

      <!-- HISTORY TABLE -->
      <div class="bg-[var(--surface)] border border-[var(--border)] rounded-md overflow-hidden">
        <div class="overflow-x-auto scrollbar">
          <table class="ptable">
            <thead>
              <tr>
                <th class="col-chev"></th>
                <th style="width:170px" x-text="t('columns.when')"></th>
                <th style="width:140px" x-text="t('columns.op')"></th>
                <th class="col-grow" x-text="t('columns.target')"></th>
                <th style="width:120px" class="hidden md:table-cell" x-text="t('columns.stack')"></th>
                <th style="width:90px" x-text="t('columns.status')"></th>
                <th style="width:80px" class="hidden md:table-cell" x-text="t('columns.duration')"></th>
                <th style="width:100px" class="hidden lg:table-cell" x-text="t('columns.actor')"></th>
              </tr>
            </thead>
            <tbody>
              <template x-for="h in history" :key="h.id">
                <tr class="item-row" @click="openHistoryDetail(h)" style="cursor:pointer">
                  <td><span class="dot" :class="h.status==='success' ? 'dot-healthy' : 'dot-offline'"></span></td>
                  <td class="mono text-[11.5px] text-dim" x-text="formatTime(h.ts)"></td>
                  <td><span class="chip text-[10.5px]" x-text="(h.op_type||'').replace(/_/g,' ')"></span></td>
                  <td class="mono text-[12px] truncate" :title="h.target_name || ''" x-text="h.target_name || '—'"></td>
                  <td class="hidden md:table-cell text-[11.5px] text-dim truncate" x-text="h.target_stack || '—'"></td>
                  <td><span class="pill" :class="h.status==='success' ? 'pill-healthy' : 'pill-error'" x-text="h.status"></span></td>
                  <td class="hidden md:table-cell mono text-[11.5px] text-dim" x-text="(h.duration||0).toFixed(1) + 's'"></td>
                  <td class="hidden lg:table-cell text-[11.5px] text-dim" x-text="h.actor || 'ui'"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
        <div x-show="history.length===0" class="text-center py-16 text-[var(--text-faint)] text-sm" x-text="t('empty.no_history')">
        </div>
      </div>
    </div>

    <!-- ===== SETTINGS VIEW ===== -->
    <div x-show="view==='settings'" class="page-layout">
      <aside class="page-sidebar">
        <div class="page-sidebar-header" x-text="t('settings.title')"></div>
        <template x-for="s in settingsSections" :key="s.id">
          <button @click="settingsSection = s.id"
                  :class="settingsSection === s.id ? 'page-sidebar-item active' : 'page-sidebar-item'"
                  x-text="t('settings.sections.' + s.id)"></button>
        </template>
      </aside>

      <div class="page-content">
        <!-- Readonly banner — clarifies why save buttons are missing. -->
        <div x-show="isReadonly()"
             class="bg-[var(--surface-2)] border border-[var(--border-bright)] rounded-md px-4 py-2 text-[12px] text-[var(--text-dim)] flex items-center gap-2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span x-text="t('settings.readonly_banner')"></span>
        </div>

      <!-- ===== PROFILE section ===== -->
      <!-- Two-column card: avatar + identity on the left, account info on the right -->
      <div x-show="settingsSection === 'profile'" class="grid grid-cols-1 lg:grid-cols-[260px_1fr] gap-5">
        <!-- Avatar / identity card -->
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5 flex flex-col items-center text-center">
          <div class="relative mb-4">
            <template x-if="me && me.avatar_url">
              <img :src="me.avatar_url" class="w-[120px] h-[120px] rounded-full object-cover border-2 border-[var(--border-bright)]" alt="Avatar">
            </template>
            <template x-if="!(me && me.avatar_url)">
              <div class="flex items-center justify-center w-[120px] h-[120px] rounded-full text-[48px] font-semibold text-[var(--text-on-primary)] border-2 border-[var(--border-bright)]"
                   :style="'background: hsl(' + avatarHue() + ', 55%, 45%)'"
                   x-text="initial()"></div>
            </template>
            <label class="absolute bottom-1 right-1 w-8 h-8 rounded-full bg-[var(--surface-3)] border border-[var(--border-bright)] flex items-center justify-center cursor-pointer hover:bg-[var(--surface-2)]"
                   :class="avatarBusy && 'opacity-60'"
                   title="Upload a new avatar">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              <input type="file" accept="image/*" class="hidden" @change="uploadAvatar($event)" :disabled="avatarBusy">
            </label>
          </div>
          <div class="text-[15px] font-semibold" x-text="(me && me.display_name) || (me && me.username) || ''"></div>
          <div class="text-[11.5px] text-[var(--text-dim)] mt-0.5" x-text="me && me.username"></div>
          <div class="mt-3 flex items-center gap-2">
            <span class="pill" :class="me && me.role === 'admin' ? 'pill-primary' : 'pill-muted'" x-text="me && me.role"></span>
            <span class="chip" x-text="me && me.source"></span>
          </div>
          <button x-show="me && me.avatar_url" @click="clearAvatar()"
                  class="mt-4 text-[11px] text-[var(--danger)] hover:underline" x-text="t('settings.profile.avatar_remove')"></button>
        </section>

        <!-- Identity + account info card -->
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
          <h3 class="font-semibold text-[13px] mb-4" x-text="t('settings.profile.account')"></h3>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.profile.username')"></label>
              <input :value="me && me.username" disabled class="w-full text-[12.5px]">
              <p class="text-[10px] text-[var(--text-faint)] mt-1" x-text="t('settings.profile.username_hint')"></p>
            </div>
            <div>
              <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.profile.source')"></label>
              <input :value="me && me.source" disabled class="w-full text-[12.5px] mono">
            </div>
            <div>
              <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.profile.role')"></label>
              <input :value="me && me.role" disabled class="w-full text-[12.5px] mono">
            </div>
            <div>
              <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.profile.last_login')"></label>
              <input :value="me && me.last_login_at ? fmtDate(me.last_login_at) : '—'" disabled class="w-full text-[12.5px] mono">
            </div>
            <div class="sm:col-span-2">
              <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.profile.member_since')"></label>
              <input :value="me && me.created_at ? fmtDate(me.created_at) : '—'" disabled class="w-full text-[12.5px] mono">
            </div>
          </div>
        </section>

        <!-- About card — editable display name + bio + email -->
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5 lg:col-span-2">
          <h3 class="font-semibold text-[13px] mb-4" x-text="t('settings.profile.about')"></h3>
          <div class="space-y-3">
            <div>
              <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.profile.display_name')"></label>
              <input x-model="profileForm.display_name" type="text" maxlength="80"
                     :placeholder="t('settings.profile.display_name_placeholder')" class="w-full text-[12.5px]">
            </div>
            <div>
              <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.profile.email')"></label>
              <input x-model="profileForm.email" type="email" maxlength="200" :placeholder="t('settings.profile.email_placeholder')" class="w-full text-[12.5px]">
            </div>
            <div>
              <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.profile.bio')"></label>
              <textarea x-model="profileForm.bio" rows="3" maxlength="500"
                        :placeholder="t('settings.profile.bio_placeholder')"
                        class="w-full text-[12.5px]"></textarea>
              <p class="text-[10px] text-[var(--text-faint)] mt-1" x-text="t('settings.profile.bio_count', { count: (profileForm.bio || '').length })"></p>
            </div>
            <div>
              <button @click="saveProfile()" :disabled="profileBusy" class="btn btn-primary text-[12px]"
                      x-text="profileBusy ? t('actions.saving') : t('actions.save_changes')"></button>
            </div>
          </div>
        </section>

        <!-- Security card — change password (local users only) -->
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5 lg:col-span-2">
          <div class="flex items-center gap-2 mb-4">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[var(--text-dim)]"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <h3 class="font-semibold text-[13px]" x-text="t('settings.profile.security')"></h3>
          </div>
          <template x-if="me && me.source === 'local'">
            <form @submit.prevent="changePassword()" class="space-y-3">
              <h4 class="font-semibold text-[12px]" x-text="t('settings.profile.change_password')"></h4>
              <p class="text-[11.5px] text-[var(--text-faint)]" x-text="t('settings.profile.password_hint')"></p>
              <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <div>
                  <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.profile.current_password')"></label>
                  <input x-model="passwordForm.current" type="password" required autocomplete="current-password" class="w-full text-[12.5px]">
                </div>
                <div>
                  <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.profile.new_password')"></label>
                  <input x-model="passwordForm.next" type="password" required minlength="8" autocomplete="new-password" class="w-full text-[12.5px]">
                </div>
                <div>
                  <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.profile.confirm_new_password')"></label>
                  <input x-model="passwordForm.confirm" type="password" required minlength="8" autocomplete="new-password" class="w-full text-[12.5px]">
                </div>
              </div>
              <!-- Password strength + requirements. Shown the moment the user
                   starts typing a new password, so they see the bar move as
                   they add characters. Criteria are purely advisory — the
                   backend still enforces the 8-char minimum authoritatively. -->
              <div x-show="passwordForm.next" class="pw-strength">
                <div class="pw-meter">
                  <div class="pw-bar" :class="'pw-bar-' + passwordStrength.color">
                    <div :style="'width:' + (passwordStrength.score * 25) + '%'"></div>
                  </div>
                  <div class="pw-label" :class="'pw-label-' + passwordStrength.color"
                       x-text="passwordStrength.label"></div>
                </div>
                <ul class="pw-requirements">
                  <li :class="passwordStrength.criteria.length8 ? 'met' : ''">
                    <span aria-hidden="true" x-text="passwordStrength.criteria.length8 ? '✓' : '○'"></span>
                    <span x-text="t('password.requirements.length8')"></span>
                  </li>
                  <li :class="passwordStrength.criteria.length12 ? 'met' : ''">
                    <span aria-hidden="true" x-text="passwordStrength.criteria.length12 ? '✓' : '○'"></span>
                    <span x-text="t('password.requirements.length12')"></span>
                  </li>
                  <li :class="(passwordStrength.criteria.lower && passwordStrength.criteria.upper) ? 'met' : ''">
                    <span aria-hidden="true" x-text="(passwordStrength.criteria.lower && passwordStrength.criteria.upper) ? '✓' : '○'"></span>
                    <span x-text="t('password.requirements.mixed_case')"></span>
                  </li>
                  <li :class="passwordStrength.criteria.digit ? 'met' : ''">
                    <span aria-hidden="true" x-text="passwordStrength.criteria.digit ? '✓' : '○'"></span>
                    <span x-text="t('password.requirements.digit')"></span>
                  </li>
                  <li :class="passwordStrength.criteria.symbol ? 'met' : ''">
                    <span aria-hidden="true" x-text="passwordStrength.criteria.symbol ? '✓' : '○'"></span>
                    <span x-text="t('password.requirements.symbol')"></span>
                  </li>
                  <li x-show="passwordForm.confirm"
                      :class="(passwordForm.next === passwordForm.confirm) ? 'met' : 'mismatch'">
                    <span aria-hidden="true" x-text="(passwordForm.next === passwordForm.confirm) ? '✓' : '✗'"></span>
                    <span x-text="t('password.requirements.match')"></span>
                  </li>
                </ul>
              </div>
              <div>
                <button type="submit" :disabled="passwordBusy || !passwordStrength.criteria.length8" class="btn btn-primary text-[12px]"
                        x-text="passwordBusy ? t('actions.saving') : t('settings.profile.change_password')"></button>
              </div>
            </form>
          </template>
          <template x-if="me && me.source === 'authentik'">
            <div class="text-[12.5px] text-[var(--text-dim)] leading-relaxed" x-text="t('settings.profile.authentik_hint')"></div>
          </template>
          <template x-if="me && me.source !== 'local' && me.source !== 'authentik'">
            <div class="text-[12.5px] text-[var(--text-dim)]" x-text="t('settings.profile.api_token_hint')"></div>
          </template>
        </section>
      </div>

      <section x-show="settingsSection === 'notifications'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
        <h3 class="font-semibold text-[13px] mb-2" x-text="t('settings.notifications.title')"></h3>
        <p class="text-[11.5px] text-[var(--text-faint)] mb-3">
          <span x-text="t('settings.notifications.url_format_prefix')"></span> <code class="mono text-[var(--text-dim)]">http://&lt;host&gt;:&lt;port&gt;/notify/&lt;CONFIG-KEY&gt;</code> —
          <code class="mono text-[var(--text-dim)]">&lt;CONFIG-KEY&gt;</code> <span x-html="t('settings.notifications.url_format_suffix')"></span>
        </p>
        <input x-model="settings.apprise_url" type="url" :disabled="isReadonly()" :placeholder="t('settings.notifications.url_placeholder')" class="w-full">
        <input x-model="settings.apprise_tag" type="text" :disabled="isReadonly()" :placeholder="t('settings.notifications.tag_placeholder')" class="w-full mt-2">
        <div class="flex gap-2 mt-3" x-show="isAdmin()">
          <button @click="saveSettings()" class="btn btn-primary text-[12px]" x-text="t('actions.save')"></button>
          <button @click="testNotify()" class="btn btn-soft text-[12px]" x-text="t('actions.send_test')"></button>
        </div>
      </section>

      <!-- Portainer section: connection (DB-backed, UI-managed) plus the
           browser-facing public URL used for deep links. Empty config is
           fine — the dashboard renders an empty state until the form is
           filled in. API key is write-only; server reports only whether
           it's set. -->
      <div x-show="settingsSection === 'portainer'" class="space-y-4">
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
          <div class="flex items-start justify-between">
            <div>
              <h3 class="font-semibold text-[13px] mb-2" x-text="t('settings.portainer.connection_title')"></h3>
              <p class="text-[11.5px] text-[var(--text-faint)] mb-3" x-text="t('settings.portainer.connection_desc')"></p>
            </div>
            <span x-show="portainerStatus" class="chip"
                  :class="portainerStatus && portainerStatus.configured ? 'pill-success' : 'pill-muted'"
                  x-text="portainerStatus ? (portainerStatus.configured ? t('settings.portainer.configured') : t('settings.portainer.not_configured')) : ''"></span>
          </div>

          <div x-show="portainerStatus" class="space-y-3">
            <div>
              <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.portainer.url_label')"></label>
              <input x-model="portainerForm.url" type="url" :disabled="isReadonly()"
                     :placeholder="t('settings.portainer.url_placeholder')" class="w-full mono text-[12.5px]">
            </div>

            <div>
              <label class="block text-[11px] text-[var(--text-dim)] mb-1">
                <span x-text="t('settings.portainer.api_key_label')"></span>
                <span class="text-[var(--text-faint)]"
                      x-text="portainerStatus && portainerStatus.api_key_set ? t('settings.portainer.api_key_set') : t('settings.portainer.api_key_not_set')"></span>
              </label>
              <input x-model="portainerForm.api_key" type="password" :disabled="isReadonly()"
                     :placeholder="t('settings.portainer.api_key_placeholder')"
                     autocomplete="new-password"
                     class="w-full mono text-[12px]">
              <p class="text-[11px] text-[var(--text-faint)] mt-1" x-text="t('settings.portainer.api_key_hint')"></p>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div>
                <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.portainer.endpoint_id')"></label>
                <input x-model.number="portainerForm.endpoint_id" type="number" min="1" :disabled="isReadonly()"
                       class="w-full mono text-[12.5px]">
              </div>
              <label class="flex items-center gap-2 text-[12.5px] cursor-pointer mt-5">
                <input type="checkbox" :checked="portainerForm.verify_tls"
                       @change="portainerForm.verify_tls = $event.target.checked"
                       :disabled="isReadonly()">
                <span x-text="t('settings.portainer.verify_tls')"></span>
              </label>
            </div>

            <div x-show="isAdmin()" class="flex gap-2 pt-1 flex-wrap">
              <button @click="savePortainerSettings()" class="btn btn-primary text-[12px]" x-text="t('settings.portainer.save_button')"></button>
              <button @click="testPortainerConnection()" class="btn btn-soft text-[12px]" x-text="t('settings.portainer.test_button')"></button>
            </div>

            <div x-show="portainerTestResult" class="text-[12px] rounded-md px-3 py-2"
                 :class="portainerTestResult && portainerTestResult.ok ? 'bg-[var(--pill-ok-bg)] text-[var(--pill-ok-fg)] border border-[var(--pill-ok-br)]' : 'bg-[var(--pill-error-bg)] text-[var(--pill-error-fg)] border border-[var(--pill-error-br)]'">
              <template x-if="portainerTestResult && portainerTestResult.pending">
                <span x-text="t('loading.testing')"></span>
              </template>
              <template x-if="portainerTestResult && !portainerTestResult.pending">
                <span>
                  <span x-text="portainerTestResult.ok ? '✓' : '✗'"></span>
                  <span class="ml-1" x-text="portainerTestResult.detail"></span>
                </span>
              </template>
            </div>
          </div>
        </section>

        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
          <h3 class="font-semibold text-[13px] mb-2" x-text="t('settings.portainer.public_title')"></h3>
          <p class="text-[11.5px] text-[var(--text-faint)] mb-3" x-text="t('settings.portainer.public_desc')"></p>
          <input x-model="settings.portainer_public_url" type="url" :disabled="isReadonly()" :placeholder="t('settings.portainer.public_placeholder')" class="w-full">
          <button x-show="isAdmin()" @click="saveSettings()" class="btn btn-primary text-[12px] mt-3" x-text="t('actions.save')"></button>
        </section>
      </div>

      <section x-show="settingsSection === 'ignores'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
        <h3 class="font-semibold text-[13px] mb-2" x-text="t('settings.ignores.title')"></h3>
        <p class="text-[11.5px] text-[var(--text-faint)] mb-3">
          <span x-text="t('settings.ignores.intro_prefix')"></span> <span class="pill pill-ignored" x-text="t('states.ignored')"></span> <span x-text="t('settings.ignores.intro_suffix')"></span>
        </p>
        <div class="flex gap-2 flex-wrap" x-show="isAdmin()">
          <select x-model="newIgnore.kind" class="min-w-[100px]">
            <option value="image" x-text="t('settings.ignores.kind_image')"></option>
            <option value="stack" x-text="t('settings.ignores.kind_stack')"></option>
          </select>
          <input x-model="newIgnore.pattern" type="text" :placeholder="t('settings.ignores.pattern_placeholder')" class="flex-1 min-w-[200px]">
          <button @click="addIgnore()" class="btn btn-primary text-[12px]" x-text="t('actions.add')"></button>
        </div>
        <div class="mt-3 space-y-1">
          <template x-for="ig in ignores" :key="ig.pattern">
            <div class="flex items-center justify-between bg-[var(--surface-2)] rounded-md px-3 py-2 text-[12.5px]">
              <div class="flex items-center gap-2">
                <span class="chip" x-text="ig.kind"></span>
                <span class="mono" x-text="ig.pattern"></span>
              </div>
              <button x-show="isAdmin()" @click="delIgnore(ig.pattern)" class="text-[var(--danger)] hover:underline text-[11px]" x-text="t('actions.remove_link')"></button>
            </div>
          </template>
          <div x-show="ignores.length===0" class="text-[11px] text-[var(--text-faint)] italic" x-text="t('empty.no_ignores')"></div>
        </div>
      </section>

      <!-- Authentik OIDC — Authorization-code + PKCE SSO. Every value is
           DB-backed; no env vars. Client secret is write-only — server
           reports only whether it's set. Leaving the secret field blank
           on Save means "keep current". See notes/note_authentik.txt for
           the Authentik-side setup walkthrough. -->
      <section x-show="settingsSection === 'oidc'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
        <div class="flex items-start justify-between">
          <div>
            <h3 class="font-semibold text-[13px] mb-2" x-text="t('settings.oidc.title')"></h3>
            <p class="text-[11.5px] text-[var(--text-faint)] mb-3" x-text="t('settings.oidc.description')"></p>
          </div>
          <span x-show="oidcStatus"
                class="chip"
                :class="oidcStatus && oidcStatus.enabled ? 'pill-success' : 'pill-muted'"
                x-text="oidcStatus ? (oidcStatus.enabled ? t('settings.oidc.enabled') : t('settings.oidc.disabled')) : ''"></span>
        </div>

        <div x-show="oidcStatus" class="space-y-3">
          <label class="flex items-center gap-2 text-[12.5px] cursor-pointer">
            <input type="checkbox" :checked="oidcForm.enabled"
                   @change="oidcForm.enabled = $event.target.checked"
                   :disabled="isReadonly()">
            <span x-text="t('settings.oidc.enable_toggle')"></span>
          </label>

          <div>
            <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.oidc.issuer_url')"></label>
            <input x-model="oidcForm.issuer_url" type="url" :disabled="isReadonly()"
                   :placeholder="t('settings.oidc.issuer_placeholder')"
                   class="w-full mono text-[12px]">
            <p class="text-[11px] text-[var(--text-faint)] mt-1" x-html="t('settings.oidc.issuer_hint')"></p>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.oidc.client_id')"></label>
              <input x-model="oidcForm.client_id" type="text" :disabled="isReadonly()"
                     :placeholder="t('settings.oidc.client_id_placeholder')"
                     class="w-full mono text-[12px]">
            </div>
            <div>
              <label class="block text-[11px] text-[var(--text-dim)] mb-1">
                <span x-text="t('settings.oidc.client_secret')"></span>
                <span class="text-[var(--text-faint)]"
                      x-text="oidcStatus && oidcStatus.client_secret_set ? t('settings.oidc.client_secret_set') : t('settings.oidc.client_secret_not_set')"></span>
              </label>
              <input x-model="oidcForm.client_secret" type="password" :disabled="isReadonly()"
                     :placeholder="t('settings.oidc.client_secret_placeholder')"
                     autocomplete="new-password"
                     class="w-full mono text-[12px]">
            </div>
          </div>

          <div>
            <label class="block text-[11px] text-[var(--text-dim)] mb-1">
              <span x-text="t('settings.oidc.redirect_uri')"></span> <span class="text-[var(--text-faint)]" x-text="t('settings.oidc.redirect_uri_note')"></span>
            </label>
            <div class="flex items-stretch gap-2">
              <input :value="oidcStatus && oidcStatus.redirect_uri_default || ''" readonly
                     class="w-full mono text-[12px] flex-1 bg-[var(--surface-2)]">
              <button @click="copyRedirectUri()" type="button"
                      class="btn btn-soft text-[12px] whitespace-nowrap"
                      :title="t('settings.oidc.copy_title')" x-text="t('settings.oidc.copy')"></button>
            </div>
            <p class="text-[11px] text-[var(--text-faint)] mt-1" x-text="t('settings.oidc.redirect_uri_hint')"></p>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.oidc.scopes')"></label>
              <input x-model="oidcForm.scopes" type="text" :disabled="isReadonly()"
                     :placeholder="t('settings.oidc.scopes_placeholder')"
                     class="w-full mono text-[12px]">
              <p class="text-[11px] text-[var(--text-faint)] mt-1" x-html="t('settings.oidc.scopes_hint')"></p>
            </div>
            <div>
              <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.oidc.admin_group')"></label>
              <input x-model="oidcForm.admin_group" type="text" :disabled="isReadonly()"
                     :placeholder="t('settings.oidc.admin_group_placeholder')"
                     class="w-full mono text-[12.5px]">
              <p class="text-[11px] text-[var(--text-faint)] mt-1" x-html="t('settings.oidc.admin_group_hint')"></p>
            </div>
          </div>

          <label class="flex items-start gap-2 text-[12.5px] cursor-pointer">
            <input type="checkbox" :checked="oidcForm.verify_tls"
                   @change="oidcForm.verify_tls = $event.target.checked"
                   :disabled="isReadonly()" class="mt-0.5">
            <span>
              <span class="font-medium" x-text="t('settings.oidc.verify_tls_title')"></span>
              <span class="block text-[11px] text-[var(--text-faint)] mt-0.5" x-html="t('settings.oidc.verify_tls_hint')"></span>
            </span>
          </label>

          <div x-show="isAdmin()" class="flex gap-2 pt-1 flex-wrap">
            <button @click="saveOidcSettings()" class="btn btn-primary text-[12px]" x-text="t('settings.oidc.save_button')"></button>
            <button @click="testOidcConnection()" class="btn btn-soft text-[12px]" x-text="t('settings.oidc.test_button')"></button>
          </div>

          <div x-show="oidcTestResult" class="text-[12px] rounded-md px-3 py-2"
               :class="oidcTestResult && oidcTestResult.ok ? 'bg-[var(--pill-ok-bg)] text-[var(--pill-ok-fg)] border border-[var(--pill-ok-br)]' : 'bg-[var(--pill-error-bg)] text-[var(--pill-error-fg)] border border-[var(--pill-error-br)]'">
            <template x-if="oidcTestResult && oidcTestResult.pending">
              <span x-text="t('loading.testing')"></span>
            </template>
            <template x-if="oidcTestResult && !oidcTestResult.pending">
              <span>
                <span x-text="oidcTestResult.ok ? '✓' : '✗'"></span>
                <span class="ml-1" x-text="oidcTestResult.detail"></span>
              </span>
            </template>
          </div>
        </div>
      </section>

      <!-- Language section — lets operators pick the UI language. The
           same picker also lives in the topbar for quick access. Dropping
           a new file into static/i18n/ + listing it in index.json makes it
           appear here automatically on next reload. -->
      <section x-show="settingsSection === 'language'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
        <h3 class="font-semibold text-[13px] mb-2" x-text="t('settings.language.title')"></h3>
        <p class="text-[11.5px] text-[var(--text-faint)] mb-3" x-text="t('settings.language.description')"></p>
        <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('settings.language.label')"></label>
        <select :value="lang" @change="setLang($event.target.value)"
                class="text-[12.5px] min-w-[200px]">
          <template x-for="l in availableLanguages" :key="l.code">
            <option :value="l.code" x-text="l.name + ' (' + l.code + ')'"></option>
          </template>
        </select>
      </section>

      <section x-show="settingsSection === 'shortcuts'" class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
        <h3 class="font-semibold text-[13px] mb-2" x-text="t('settings.shortcuts.title')"></h3>
        <p class="text-[11.5px] text-[var(--text-faint)] mb-2" x-html="t('settings.shortcuts.hint')"></p>
        <button @click="showHotkeys=true" class="btn btn-soft text-[12px]" x-text="t('actions.open_shortcut_reference')"></button>
      </section>
      </div>
    </div>

    <!-- ===== ADMIN VIEW (admin role only) ===== -->
    <div x-show="view==='admin'" class="page-layout">
      <aside class="page-sidebar">
        <div class="page-sidebar-header" x-text="t('nav.admin')"></div>
        <template x-for="s in adminSections" :key="s.id">
          <button @click="openAdminTab(s.id)"
                  :class="adminTab === s.id ? 'page-sidebar-item active' : 'page-sidebar-item'"
                  x-text="t('admin.sections.' + s.id)"></button>
        </template>
      </aside>
      <div class="page-content">
      <div>
        <p class="text-[11px] text-[var(--text-faint)] mt-0.5" x-text="t('admin.intro')"></p>
      </div>

      <!-- USERS TAB -->
      <div x-show="adminTab==='users'" class="space-y-4">
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
          <h3 class="font-semibold text-[13px] mb-3" x-text="t('admin.users.create_title')"></h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
            <input x-model="newUser.username" type="text" :placeholder="t('admin.users.username_placeholder')" class="w-full">
            <input x-model="newUser.email" type="email" :placeholder="t('admin.users.email_placeholder')" class="w-full">
            <select x-model="newUser.auth_source" class="w-full">
              <option value="local" x-text="t('admin.users.auth_local')"></option>
              <option value="authentik" x-text="t('admin.users.auth_authentik')"></option>
            </select>
            <select x-model="newUser.role" class="w-full">
              <option value="readonly" x-text="t('admin.users.role_readonly')"></option>
              <option value="admin" x-text="t('admin.users.role_admin')"></option>
            </select>
            <input x-show="newUser.auth_source==='local'" x-model="newUser.password"
                   type="password" :placeholder="t('admin.users.password_placeholder')"
                   class="w-full md:col-span-2">
          </div>
          <div class="mt-3 flex items-center gap-3">
            <button @click="createUser()" class="btn btn-primary text-[12px]" x-text="t('actions.create')"></button>
            <span x-show="newUser.auth_source==='authentik'" class="text-[11.5px] text-[var(--text-faint)]" x-text="t('admin.users.authentik_hint')"></span>
          </div>
        </section>

        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md overflow-hidden">
          <div class="p-4 border-b border-[var(--border)] flex justify-between items-center">
            <h3 class="font-semibold text-[13px]"><span x-text="t('admin.users.list_title')"></span> <span class="text-[var(--text-faint)] font-normal" x-text="'(' + users.length + ')'"></span></h3>
            <button @click="loadUsers()" class="btn btn-ghost text-[11px]" x-text="t('actions.reload')"></button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-[12.5px]">
              <thead class="bg-[var(--surface-2)] text-[10.5px] uppercase tracking-wider text-[var(--text-faint)]">
                <tr>
                  <th class="text-start px-4 py-2" x-text="t('columns.user')"></th>
                  <th class="text-start px-4 py-2" x-text="t('columns.source')"></th>
                  <th class="text-start px-4 py-2" x-text="t('columns.role')"></th>
                  <th class="text-start px-4 py-2" x-text="t('columns.status')"></th>
                  <th class="text-start px-4 py-2" x-text="t('columns.last_login')"></th>
                  <th class="text-end px-4 py-2" x-text="t('columns.actions')"></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="u in users" :key="u.id">
                  <tr class="border-t border-[var(--border)]">
                    <td class="px-4 py-2">
                      <div class="font-medium" x-text="u.username"></div>
                      <div class="text-[10.5px] text-[var(--text-faint)]" x-text="u.email || ''"></div>
                    </td>
                    <td class="px-4 py-2">
                      <span class="chip" x-text="u.auth_source"></span>
                    </td>
                    <td class="px-4 py-2">
                      <span class="pill" :class="u.role==='admin' ? 'pill-primary' : 'pill-muted'" x-text="u.role"></span>
                    </td>
                    <td class="px-4 py-2">
                      <span class="pill" :class="u.disabled ? 'pill-error' : 'pill-success'"
                            x-text="u.disabled ? t('states.disabled') : t('states.active')"></span>
                    </td>
                    <td class="px-4 py-2 mono text-[11px] text-[var(--text-dim)]"
                        x-text="fmtDate(u.last_login_at)"></td>
                    <td class="px-4 py-2 text-end">
                      <div class="inline-flex gap-1">
                        <button @click="toggleUserRole(u)" class="btn btn-soft text-[11px]"
                                :title="u.role==='admin' ? t('admin.users.make_readonly') : t('admin.users.make_admin')"
                                x-text="u.role==='admin' ? t('admin.users.to_readonly') : t('admin.users.to_admin')"></button>
                        <button @click="toggleUserDisabled(u)" class="btn btn-soft text-[11px]"
                                x-text="u.disabled ? t('admin.users.enable') : t('admin.users.disable')"></button>
                        <button x-show="u.auth_source==='local'" @click="resetUserPassword(u)"
                                class="btn btn-soft text-[11px]" :title="t('admin.users.reset_pw_title')" x-text="t('admin.users.reset_pw')"></button>
                        <button @click="deleteUser(u)" class="btn btn-ghost text-[11px] text-danger"
                                :disabled="me && u.id === me.id ? true : false"
                                :title="me && u.id === me.id ? t('admin.users.delete_self_title') : t('admin.users.delete_title')" x-text="t('actions.delete')"></button>
                      </div>
                    </td>
                  </tr>
                </template>
                <tr x-show="users.length===0">
                  <td colspan="6" class="text-center py-8 text-[var(--text-faint)]" x-text="t('empty.no_users')"></td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>

      <!-- SESSIONS TAB -->
      <div x-show="adminTab==='sessions'" class="space-y-3">
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md overflow-hidden">
          <div class="p-4 border-b border-[var(--border)] flex justify-between items-center">
            <div>
              <h3 class="font-semibold text-[13px]"><span x-text="t('admin.sessions.active_title')"></span> <span class="text-[var(--text-faint)] font-normal" x-text="'(' + sessions.length + ')'"></span></h3>
              <p class="text-[11px] text-[var(--text-faint)] mt-0.5" x-text="t('admin.sessions.hint')"></p>
            </div>
            <button @click="loadSessions()" class="btn btn-ghost text-[11px]" x-text="t('actions.reload')"></button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-[12.5px]">
              <thead class="bg-[var(--surface-2)] text-[10.5px] uppercase tracking-wider text-[var(--text-faint)]">
                <tr>
                  <th class="text-start px-4 py-2" x-text="t('columns.user')"></th>
                  <th class="text-start px-4 py-2" x-text="t('columns.ip')"></th>
                  <th class="text-start px-4 py-2" x-text="t('columns.user_agent')"></th>
                  <th class="text-start px-4 py-2" x-text="t('columns.last_seen')"></th>
                  <th class="text-start px-4 py-2" x-text="t('columns.expires')"></th>
                  <th class="text-end px-4 py-2" x-text="t('columns.action')"></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="s in sessions" :key="s.token_id">
                  <tr class="border-t border-[var(--border)]">
                    <td class="px-4 py-2 font-medium" x-text="s.username || t('admin.sessions.deleted_user')"></td>
                    <td class="px-4 py-2 mono text-[11px]" x-text="s.ip || '—'"></td>
                    <td class="px-4 py-2 text-[11.5px] text-[var(--text-dim)] truncate max-w-[280px]" x-text="s.user_agent || '—'" :title="s.user_agent || ''"></td>
                    <td class="px-4 py-2 mono text-[11px] text-[var(--text-dim)]"
                        x-text="fmtDate(s.last_seen_at)"></td>
                    <td class="px-4 py-2 mono text-[11px] text-[var(--text-dim)]"
                        x-text="fmtDate(s.expires_at)"></td>
                    <td class="px-4 py-2 text-end">
                      <button @click="revokeSession(s)" class="btn btn-ghost text-[11px] text-danger" x-text="t('admin.sessions.revoke')"></button>
                    </td>
                  </tr>
                </template>
                <tr x-show="sessions.length===0">
                  <td colspan="6" class="text-center py-8 text-[var(--text-faint)]" x-text="t('empty.no_sessions')"></td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>

      <!-- API TOKENS TAB -->
      <div x-show="adminTab==='tokens'" class="space-y-4">
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
          <h3 class="font-semibold text-[13px] mb-2" x-text="t('admin.tokens.create_title')"></h3>
          <p class="text-[11.5px] text-[var(--text-faint)] mb-3" x-text="t('admin.tokens.create_hint')"></p>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
            <input x-model="newToken.name" type="text" :placeholder="t('admin.tokens.name_placeholder')" class="w-full md:col-span-2">
            <select x-model="newToken.role" class="w-full">
              <option value="readonly" x-text="t('admin.users.role_readonly')"></option>
              <option value="admin" x-text="t('admin.users.role_admin')"></option>
            </select>
          </div>
          <button @click="createToken()" class="btn btn-primary text-[12px] mt-3" x-text="t('admin.tokens.create_button')"></button>
        </section>

        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md overflow-hidden">
          <div class="p-4 border-b border-[var(--border)] flex justify-between items-center">
            <h3 class="font-semibold text-[13px]"><span x-text="t('admin.tokens.list_title')"></span> <span class="text-[var(--text-faint)] font-normal" x-text="'(' + tokens.length + ')'"></span></h3>
            <button @click="loadTokens()" class="btn btn-ghost text-[11px]" x-text="t('actions.reload')"></button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-[12.5px]">
              <thead class="bg-[var(--surface-2)] text-[10.5px] uppercase tracking-wider text-[var(--text-faint)]">
                <tr>
                  <th class="text-start px-4 py-2" x-text="t('columns.name')"></th>
                  <th class="text-start px-4 py-2" x-text="t('columns.role')"></th>
                  <th class="text-start px-4 py-2" x-text="t('columns.created_by')"></th>
                  <th class="text-start px-4 py-2" x-text="t('columns.last_used')"></th>
                  <th class="text-end px-4 py-2" x-text="t('columns.action')"></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="tk in tokens" :key="tk.id">
                  <tr class="border-t border-[var(--border)]">
                    <td class="px-4 py-2 font-medium" x-text="tk.name"></td>
                    <td class="px-4 py-2">
                      <span class="pill" :class="tk.role==='admin' ? 'pill-primary' : 'pill-muted'" x-text="tk.role"></span>
                    </td>
                    <td class="px-4 py-2 text-[11.5px] text-[var(--text-dim)]" x-text="tk.created_by_username || '—'"></td>
                    <td class="px-4 py-2 mono text-[11px] text-[var(--text-dim)]"
                        x-text="tk.last_used_at ? fmtDate(tk.last_used_at) : t('states.never')"></td>
                    <td class="px-4 py-2 text-end">
                      <button @click="deleteToken(tk)" class="btn btn-ghost text-[11px] text-danger" x-text="t('admin.tokens.revoke')"></button>
                    </td>
                  </tr>
                </template>
                <tr x-show="tokens.length===0">
                  <td colspan="5" class="text-center py-8 text-[var(--text-faint)]" x-text="t('empty.no_tokens')"></td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>

      <!-- BACKUPS TAB -->
      <div x-show="adminTab==='backups'" class="space-y-4">
        <section class="bg-[var(--surface)] border border-[var(--border)] rounded-md p-5">
          <h3 class="font-semibold text-[13px] mb-2" x-text="t('admin.backups.create_title')"></h3>
          <p class="text-[11.5px] text-[var(--text-faint)] mb-3" x-html="t('admin.backups.create_desc')"></p>
          <div class="flex items-center gap-2 flex-wrap">
            <button @click="createBackup()" :disabled="backupBusy"
                    class="btn btn-primary text-[12px]"
                    :class="backupBusy && 'opacity-60'"
                    x-text="backupBusy ? t('loading.creating') : t('admin.backups.backup_now')"></button>
            <label class="btn btn-soft text-[12px] cursor-pointer">

                <span x-show="drawerItem.replicas.running === drawerItem.replicas.desired && drawerItem.replicas.desired > 0" class="text-[11px] ms-2 text-success" x-text="t('drawer.healthy_note')"></span>
                <span x-show="drawerItem.replicas.desired === 0 || drawerItem.replicas.running === 0" class="text-[11px] ms-2 text-faint" x-text="t('drawer.offline_note')"></span>

            <div x-show="drawerItem.current_digest">

  <!--suppress XmlUnboundNsPrefix, HtmlUnknownAttribute -->

       x-transition:enter="transition ease-out duration-200"

       x-transition:enter-end="opacity-100 translate-x-0"
       x-transition:leave="transition ease-in duration-150"

       x-transition:leave-end="opacity-0"
       class="fixed top-4 right-4 bg-[var(--surface)] border-l-4 px-4 py-2.5 rounded-md shadow-2xl z-[60] max-w-[90vw]"
       :class="toastType==='error' ? 'border-[var(--danger)]' : 'border-[var(--success)]'">

</div>

<script>
function app() {
  return {
    // i18n reactive state. `lang` is watched to trigger Alpine re-renders
    // when the user swaps languages. `t()` is forwarded to the global
    // helper so every template can do `x-text="t('nav.stacks')"`.
    lang: (window.I18N && window.I18N.code) || 'en',
    dir: (window.I18N && window.I18N.dir) || 'ltr',
    availableLanguages: (window.I18N && window.I18N.languages) || [{ code: 'en', name: 'English', dir: 'ltr' }],
    t(key, vars) { return (window.I18N ? window.I18N.t(key, vars) : key); },
    async setLang(code) {
      if (!code || code === this.lang) return;
      try {
        await window.I18N.load(code);
        this.lang = code;
        this.dir  = window.I18N.dir;
        this.showToast(this.t('toasts.language_changed') || 'Language changed');
      } catch (e) {
        this.showToast('Language load failed', 'error');
      }
    },
    items: [], stacks: [], nodes: {},
    history: [], ignores: [],
    stats: {}, _statsTimer: null, _maxSize: 1,
    sparks: {}, _sparksTimer: null,
    version: '',
    historyFilters: { q: '', stack: '', op_type: '', status: '', actor: '', fromDate: '', toDate: '' },
    statsInterval: (() => {
      const v = parseInt(localStorage.getItem('statsInterval'), 10);
      return [0, 5, 15, 30, 60].includes(v) ? v : 15;
    })(),
    activeOps: [],
    view: (['stacks','services','history','settings','admin'].includes(localStorage.getItem('view')) ? localStorage.getItem('view') : 'stacks'),
    search: '', statusFilter: '', healthFilter: '',
    sortField: 'name', sortDir: 'asc',
    selected: [],
    expanded: (() => { try { return JSON.parse(localStorage.getItem('expanded') || '[]'); } catch (e) { return []; } })(),
    loading: false,
    drawerItem: null,
    showHotkeys: false,
    opsExpanded: true,
    toast: '', toastType: 'success', _tt: null,
    autoRefresh: 0, _autoTimer: null, _opsTimer: null,
    cacheLabel: '',
    settings: { apprise_url: '', apprise_tag: '', portainer_public_url: '' },
    // User-menu dropdown (top-right avatar button)
    userMenuOpen: false,
    // Password change form (lives in the Profile settings section now, not a modal)
    passwordForm: { current: '', next: '', confirm: '' },
    passwordBusy: false,
    // OIDC settings — `oidcStatus` is the server snapshot; `oidcForm` is
    // the editable form state before Save. Client secret is write-only —
    // we never populate it back from the server, and blank-on-save means
    // "keep existing". Same pattern as the Portainer API-key field below.
    oidcStatus: null,
    oidcForm: {
      enabled: false, issuer_url: '', client_id: '', client_secret: '',
      redirect_uri: '', scopes: 'openid email profile groups',
      admin_group: 'portaupdate-admins',
    },
    oidcTestResult: null,

    // Portainer connection — same DB-backed / UI-managed pattern as OIDC.
    // API key is write-only; blank on save means "keep current".
    portainerStatus: null,
    portainerForm: {
      url: '', endpoint_id: 1, verify_tls: true, api_key: '',
    },
    portainerTestResult: null,
    // Settings / Admin sidebar layout. Arrays drive the nav — adding a
    // section is one entry here + one <section> in the markup.
    // Section `label` is kept as a fallback (in case the translation key
    // is missing); the sidebar button actually renders via t('settings.sections.<id>').
    settingsSections: [
      { id: 'profile',       label: 'Profile' },
      { id: 'notifications', label: 'Notifications' },
      { id: 'portainer',     label: 'Portainer' },
      { id: 'ignores',       label: 'Ignore list' },
      { id: 'oidc',          label: 'Authentik OIDC' },
      { id: 'language',      label: 'Language' },
      { id: 'shortcuts',     label: 'Keyboard shortcuts' },
    ],
    settingsSection: (function () {
      // Gracefully migrate users whose localStorage still points at the
      // removed "authentik" (Forward Auth) section — land them on the
      // new OIDC panel instead of staring at an empty page.
      const v = localStorage.getItem('settingsSection') || 'profile';
      return v === 'authentik' ? 'oidc' : v;
    })(),
    // Profile form state — mirrors the `me` snapshot but held separately
    // so the user can edit without losing unsaved changes across refetches.
    profileForm: { display_name: '', bio: '', email: '' },
    profileBusy: false,
    avatarBusy: false,
    adminSections: [
      { id: 'users',    label: 'Users' },
      { id: 'sessions', label: 'Sessions' },
      { id: 'tokens',   label: 'API tokens' },
      { id: 'backups',  label: 'Backups' },
    ],
    backups: [],
    backupBusy: false,
    // Admin view state
    adminTab: 'users',
    users: [],
    sessions: [],
    tokens: [],
    newUser: { username: '', role: 'readonly', auth_source: 'local', password: '', email: '' },
    newToken: { name: '', role: 'readonly' },
    // Raw new-token payload shown exactly once in a modal after creation.
    lastCreatedToken: null,
    newIgnore: { kind: 'image', pattern: '' },
    endpointId: 1,
    busy: {},
    themePref: localStorage.getItem('theme') || 'auto',
    // Current user, set from /api/me on init. Null until that call
    // completes; the SPA defers rendering everything that depends on it.
    me: null,

    async init() {
      // Resolve identity FIRST. Unauthenticated users get redirected to
      // /login; everyone else falls through to the normal data loads.
      // (The global fetch wrapper also handles mid-session 401s, but doing
      // an explicit check up front avoids flashing an empty UI to someone
      // who isn't logged in at all.)
      try {
        const r = await fetch('/api/me');
        if (r.ok) {
          const m = await r.json();
          if (!m.authenticated) {
            const path = location.pathname + location.search;
            location.href = '/login?next=' + encodeURIComponent(path);
            return;
          }
          this.me = m;
          this.syncProfileForm();
        }
      } catch (_) { /* network hiccup — next fetch will trip the wrapper */ }

      if (window.matchMedia) {
        const mq = window.matchMedia('(prefers-color-scheme: light)');
        const onSys = () => { if (this.themePref === 'auto') this.applyTheme(); };
        mq.addEventListener ? mq.addEventListener('change', onSys) : mq.addListener(onSys);
      }
      this.applyTheme();
      this.$watch('view', v => {
        localStorage.setItem('view', v);
        // Load admin data lazily — only when the user actually navigates there.
        if (v === 'admin') this.openAdminTab(this.adminTab);
      });
      this.$watch('settingsSection', v => localStorage.setItem('settingsSection', v));
      this.$watch('expanded', v => localStorage.setItem('expanded', JSON.stringify(v)));
      window.addEventListener('keydown', (e) => this.handleHotkey(e));
      await this.loadSettings();
      await this.loadIgnores();
      await this.refresh();
      await this.loadHistory();
      this.loadVersion();
      this.pollOps();
      this.pollStats();
      this.pollSparks();
      setInterval(() => this.updateCacheLabel(), 1000);
    },

    // --- Profile: password strength meter -------------------------------
    // Pure UX affordance; the backend still enforces the 8-char minimum.
    // Scoring weights length more than character-class diversity — a
    // 12-char lowercase passphrase is stronger than `Aa1!` and the
    // meter should reflect that. Under 8 chars is always clamped to Weak
    // regardless of other criteria because the backend will reject it.
    get passwordStrength() {
      const pw = (this.passwordForm && this.passwordForm.next) || '';
      const criteria = {
        length8:  pw.length >= 8,
        length12: pw.length >= 12,
        lower:    /[a-z]/.test(pw),
        upper:    /[A-Z]/.test(pw),
        digit:    /\d/.test(pw),
        symbol:   /[^A-Za-z0-9]/.test(pw),
      };
      if (!pw) return { score: 0, label: '', color: 'faint', criteria };
      let score = 0;
      if (criteria.length8)  score += 1;
      if (criteria.length12) score += 1;
      if (criteria.lower && criteria.upper) score += 1;
      if (criteria.digit)  score += 1;
      if (criteria.symbol) score += 1;
      if (score > 4) score = 4;
      if (!criteria.length8) score = Math.min(score, 1);
      const labelKeys = [
        'password.strength.too_short',
        'password.strength.weak',
        'password.strength.fair',
        'password.strength.good',
        'password.strength.strong',
      ];
      const colors = ['danger',    'danger', 'warning', 'primary', 'success'];
      return {
        score,
        label: this.t(labelKeys[score]),
        color: colors[score],
        criteria,
      };
    },

    // --- Profile: password change ---------------------------------------
    async changePassword() {
      if (this.passwordBusy) return;
      const f = this.passwordForm;
      if (f.next !== f.confirm) {
        this.showToast('New passwords do not match', 'error');

      if ((f.next || '').length < 8) {
        this.showToast('New password must be 8+ characters', 'error');
        return;
      }
      this.passwordBusy = true;
      try {
        const body = new URLSearchParams({
          current_password: f.current,
          new_password: f.next,
          confirm_password: f.confirm,
        });
        const r = await fetch('/api/local-auth/change-password', { method: 'POST', body });
        if (r.ok) {
          this.showToast('Password changed. Other sessions were signed out.', 'success');
          this.passwordForm = { current: '', next: '', confirm: '' };
        } else {
          const j = await r.json().catch(() => ({}));
          this.showToast(j.detail || ('Change failed (' + r.status + ')'), 'error');
        }
      } catch (_) {
        this.showToast('Network error', 'error');
      } finally {
        this.passwordBusy = false;

    // Avatar helpers — deterministic colour per username so "alice" always
    // gets the same hue across refreshes. Uses HSL in CSS so the same
    // hue value produces a pleasant colour in both light and dark themes
    // (the token `--avatar-hue` feeds into a hsl() in style.css).
    initial() {
      if (!this.me || !this.me.username) return '?';
      const c = this.me.username.trim().charAt(0);
      return c ? c.toUpperCase() : '?';
    },
    avatarHue() {
      if (!this.me || !this.me.username) return 210;
      let h = 0;
      for (const ch of this.me.username) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
      return h % 360;

    // --- Sparklines ----------------------------------------------------
    // Fetched from /api/stats/history in one batched request for every
    // currently-known item id. The backend samples every 5 minutes (see
    // STATS_SAMPLE_INTERVAL in main.py), so polling more often than that
    // is wasted work — we refresh on a 5-minute cadence.
    async loadSparks() {
      const ids = (this.items || []).map(i => i.id).filter(Boolean);
      if (!ids.length) return;
      try {
        const params = new URLSearchParams({ item_id: ids.join(','), hours: '24' });
        const r = await fetch('/api/stats/history?' + params.toString());
        if (!r.ok) return;
        const d = await r.json();
        this.sparks = d.series || {};
      } catch (e) {}
    },
    pollSparks() {
      if (this._sparksTimer) clearInterval(this._sparksTimer);
      this.loadSparks();
      this._sparksTimer = setInterval(() => this.loadSparks(), 5 * 60 * 1000);
    },
    // Build an SVG polyline `points` attribute for one metric of one item.
    // Returns '' when we don't have enough data yet — the caller hides the
    // element with x-show so new installs don't render empty rectangles.
    sparkPoints(item, key) {
      const rows = this.sparks[item && item.id];
      if (!rows || rows.length < 2) return '';
      const W = 60, H = 10;
      const vals = rows.map(r => {
        if (key === 'cpu') return r.cpu || 0;
        if (key === 'mem') return r.mem_limit ? (r.mem_used / r.mem_limit) * 100 : 0;
        return 0;
      });
      let lo = Infinity, hi = -Infinity;
      for (const v of vals) { if (v < lo) lo = v; if (v > hi) hi = v; }
      // Keep the sparkline visually centred when the signal is flat.
      if (hi - lo < 0.5) { lo = Math.max(0, lo - 0.5); hi = lo + 1; }
      const step = W / (vals.length - 1);
      return vals.map((v, i) => {
        const x = (i * step).toFixed(1);
        const y = (H - ((v - lo) / (hi - lo)) * H).toFixed(1);
        return `${x},${y}`;
      }).join(' ');
    },
    sparkClass(item, key) {
      // Colour follows the CURRENT reading (not the sparkline max) so the
      // line visually agrees with the stat-bar it sits beside.
      const s = this.statsFor(item);
      if (!s || !s.has_stats) return 'muted';
      const v = key === 'cpu' ? s.cpu_percent : this.memPercent(item);
      return this.barLevel(v);
    },

    async refresh(force=false) {
      this.loading = true;
      try {
        const r = await fetch('/api/items' + (force ? '?force=true' : ''));

        const d = await r.json();
        this.items = d.items || [];

        this.nodes = d.nodes || {};
        this.cacheLabel = d.cached ? `cached ${d.age}s ago` : 'fresh';
        if (force) this.loadStats(true);  // fire-and-forget, don't block UI
      } catch (e) { this.showToast('Load failed: ' + e.message, 'error'); }
      this.loading = false;
    },
    updateCacheLabel() {},

        this.settings = {

          portainer_public_url: d.portainer_public_url || '',

        this.endpointId = d.endpoint_id || 1;

        // --- OIDC panel state ---
        this.oidcStatus = d.oidc || null;
        if (this.oidcStatus) {

            enabled:       !!this.oidcStatus.enabled,
            issuer_url:    this.oidcStatus.issuer_url || '',

    async toggleIgnore(item) {

        const match = this.ignores.find(ig =>
          (ig.kind === 'image' && (item.image || '').includes(ig.pattern)) ||
          (ig.kind === 'stack' && ig.pattern === item.stack)
        );

        this.newIgnore = { kind: 'image', pattern: item.image };
