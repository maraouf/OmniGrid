              <!-- Brand icon + hostname block + provider chips. The
                   icon comes from hostIconUrl(h) (explicit override
                   first, then iconUrlFor() resolver over id / label /
                   provider names). Chips show which providers
                   actually contributed data to this row. -->
              <div class="min-w-0 flex items-center gap-2.5">
                <img :src="hostIconUrl(h)" x-show="hostIconUrl(h)"
                     width="22" height="22" class="flex-shrink-0 rounded-sm"
                     alt="" loading="lazy"
                     @error="$event.target.style.display='none'">
                <div class="min-w-0 flex-1">
                  <div class="flex items-center gap-1.5">
                    <!-- Custom # badge — operator-assigned catalogue
                         number. Helps operators with many hosts orient
                         at a glance + ties to the Asset inventory
                         lookups at <asset-api-host>. Hidden when no number is
                         set so unnumbered hosts don't show "#—". -->
                    <span x-show="h.custom_number != null && h.custom_number !== ''"
                          class="chip text-[10px] px-1.5 py-0 mono"
                          :class="'pill-muted'"
                          :title="t('hosts_extra.custom_number_title')"
                          x-text="'#' + h.custom_number"></span>
                    <span class="font-semibold text-[13px] mono truncate"
                          x-text="hostTypePrefix(h) + hostDisplayName(h)"></span>
                    <!-- Per-row bulk-applied check glyph. Drains
                         after ~5 s via the shared `_bulkAppliedTimer`
                         in `_hostsBulkPost`. -->
                    <span x-show="h._bulkApplied"
                          role="img"
                          class="bulk-applied-glyph inline-flex flex-shrink-0"
                          :title="t('hosts_extra.bulk.row_applied') || 'Bulk action applied'"
                          :aria-label="t('hosts_extra.bulk.row_applied') || 'Bulk action applied'">
                      <svg width="13" height="13" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-check"/></svg>
                    </span>
                    <!-- Health-score chip. Synthesised 0-100 score
                         across CPU / Memory / Disk / Providers /
                         Pending Updates. Worst-axis-wins so the
                         number reflects "what's the worst thing
                         happening on this host right now". Click
                         on the row still opens the drawer; the
                         chip itself doesn't need its own click
                         handler because the row click already
                         routes there. -->
                    <span x-show="healthScore(h) != null"
                          class="chip text-[10px] px-1.5 py-0 mono health-chip flex-shrink-0"
                          :class="healthChipClass(healthScore(h))"
                          :title="t('hosts_extra.health.chip_title', { score: healthScore(h), worst: (healthWorstAxis(h) ? healthWorstAxis(h).label : '—') })"
                          x-text="healthScore(h)"></span>
                    <!-- Badges wrapped in <span> so the `title`
                         attribute fires reliably as a hover tooltip
                         — Chrome / Firefox honour `title` on
                         elements but some browsers / extensions /
                         user-agents skip it on bare <svg>.
                         The span also gets role="img" + aria-label
                         so screen readers announce the badge
                         instead of skipping over silent SVG. -->
                    <!-- Permanent-fail badge. Renders only when
                         the host_metrics_sampler has auto-paused the
                         host after consecutive probe failures. Title
                         spells out the elapsed window in minutes. -->
                    <span x-show="h.sampling_paused"
                          role="img"
                          class="inline-flex flex-shrink-0 cursor-help"
                          :title="t('hosts_extra.permanent_fail.badge_title_full', { minutes: hostFailureMinutes(h), error: (h.last_error || '—') })"
                          :aria-label="t('hosts_extra.permanent_fail.badge_title_full', { minutes: hostFailureMinutes(h), error: (h.last_error || '—') })">
                      <svg width="14" height="14"
                           class="text-[var(--danger)]"
                           aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-alert-triangle"/></svg>
                    </span>
                    <!-- Probe-timeout badge — fires when the SPA's
                         per-host /api/hosts/one/{id} call returned
                         HTTP 504 (per-host probe budget exceeded).
                         Transient: cleared automatically after the
                         60s back-off window when the next refresh
                         lands. Sits between paused (danger) and
                         stale (warning) in priority, with its own
                         hourglass glyph so the operator sees a
                         distinct "actively timing out" signal. -->
                    <span x-show="!h.sampling_paused && h._probe_timeout"
                          role="img"
                          class="inline-flex flex-shrink-0 cursor-help"
                          :title="t('hosts_extra.probe_timeout.badge_title_full')"
                          :aria-label="t('hosts_extra.probe_timeout.badge_title_full')">
                      <svg width="13" height="13"
                           class="text-[var(--warning)]"
                           aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-zap"/></svg>
                    </span>
                    <!-- Stale-data badge. Fires when one or
                         more provider went down and the row is
                         showing values restored from the persisted
                         snapshot. Lower visual priority than the
                         permanent-fail icon — uses --warning amber
                         (paused = --danger red) — so a host that's
                         BOTH paused and stale leads with the more
                         severe state. -->
                    <span x-show="!h.sampling_paused && !h._probe_timeout && isStale(h)"
                          role="img"
                          class="inline-flex flex-shrink-0 cursor-help"
                          :title="t('hosts_extra.stale_marker.badge_title_full', { age: staleAge(h), fields: ((h._stale_fields || []).join(', ') || '—') })"
                          :aria-label="t('hosts_extra.stale_marker.badge_title_full', { age: staleAge(h), fields: ((h._stale_fields || []).join(', ') || '—') })">
                      <svg width="13" height="13"
                           class="text-[var(--warning)]"
                           aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-clock"/></svg>
                    </span>
                    <!-- Per-host provider chips. Red when provider is
                         globally enabled AND mapped to this host but
                         didn't return data (paused / unreachable / 401).
                         Brand color when healthy — driven by
                         `providerColor()`, per-provider
                         customisable under Settings → Providers. -->
                    <template x-for="p in providerStates(h)" :key="p.name">
                      <span class="chip text-[9.5px] px-1 py-0"
                            :class="p.state === 'failing' ? 'pill-error'
                                    : (p.state === 'paused' ? 'pill-warning'
                                    : (p.state === 'loading' ? 'pill-custom chip-loading' : 'pill-custom'))"
                            :style="(p.state === 'failing' || p.state === 'paused') ? '' : providerChipStyle(p.name)"
                            :title="p.state === 'paused' ? t('hosts_extra.provider_paused', { provider: p.name, count: p.consecutive_failures, error: p.last_error || '—' })
                                    : (p.state === 'failing' ? t('hosts_extra.provider_failing', { provider: p.name })
                                    : (p.state === 'loading' ? t('hosts_extra.provider_loading', { provider: p.name }) || (p.name + ' — fetching…') : ''))"
                            x-text="p.name === 'node_exporter' ? 'exporter' : p.name"></span>
                    </template>
                  </div>
                  <!-- Asset location — its OWN line under the title
                       so the asset name above isn't cropped. Only
                       rendered when an asset matched. -->
                  <template x-if="assetForHost(h) && assetForHost(h).location">
                    <div class="text-[10.5px] text-[var(--text-faint)] truncate"
                         :title="t('host_drawer.asset.location_title')"
                         x-text="assetForHost(h).location"></div>
                  </template>
                  <div class="text-[10.5px] text-[var(--text-faint)]">
                    <span x-show="h.label && h.label !== h.host" class="mono me-1" x-text="h.host"></span>
                    <!-- Subline text priority:
                         1. "Updated Xs ago" when Beszel reported a
                            last-seen time (live providers signal).
                         2. "N provider(s)" when ANY provider matched
                            but no Beszel timestamp is available.
                         3. Status-aware fallback for zero-provider
                            rows: i18n'd "No agents configured" for
                            inventory rows (unconfigured status),
                            "No data from agents" for rows that have
                            providers mapped but nothing responded
                            (unknown status). Loading rows stay blank
                            so the spinner isn't obscured. -->
                    <span x-text="
                      fmtUpdatedAgo(h.beszel_updated) ||
                      ((h.providers || []).length
                        ? ((h.providers || []).length === 1
                            ? t('hosts_extra.provider_count_one')
                            : t('hosts_extra.provider_count_many', { count: (h.providers || []).length }))
                        : h.status === 'unknown'
                          ? t('hosts_extra.agents_not_responding')
                          : h.status === 'loading' ? ''
                          : t('hosts_extra.no_agents_configured'))
                    "></span>
                  </div>
                </div>
              </div>
              <!-- Platform — shows the most specific OS-family value.
                   Main line is the OS string (with version) when we
                   have one, else the short platform name. Subtext
                   only appears when platform adds genuinely new info
                   (e.g. platform="Debian" but os="raspbian 13.4" —
                   two different distros). For the common "debian" +
                   "debian 13.4" case the subtext stays hidden. -->
              <div class="min-w-0">
                <div class="text-[12px] truncate"
                     x-text="h.status === 'up' ? (h.os || h.platform || '—') : ''"></div>
                <div class="text-[10.5px] text-[var(--text-faint)] truncate"
                     x-show="h.status === 'up' && h.platform && h.os
                             && h.os.toLowerCase() !== h.platform.toLowerCase()
                             && !h.os.toLowerCase().startsWith(h.platform.toLowerCase())"
                     x-text="h.platform"></div>
              </div>
              <!-- CPU % / Memory / Disk / Uptime / Cores / Arch / Kernel
                   — only rendered when the host is actually online.
                   Offline / unknown rows leave these cells blank so
                   the table doesn't show a row full of "0%" bars and
                   "—" dashes that imply "data is loading" when in
                   reality the host is just down. Status dot + name
                   column alone communicate the state. -->
              <!-- CPU % — gated on hostHasCpuMetric so a host
                   that exposes only CPU via SNMP (e.g. Cisco
                   SG300 switch — CPU history yes, mem/disk no)
                   shows the CPU bar without dragging mem/disk
                   along with it. -->
              <div>
                <template x-if="h.status === 'up' && hostHasCpuMetric(h)">
                  <div>
                    <!-- desktop bars now self-identify on hover.
                         Pre-fix the desktop view's bars had only stale-
                         state tooltips; an operator zooming on a row
                         without the table header in view couldn't tell
                         which bar was CPU vs Memory vs Disk just by
                         the colour/level. Title now combines metric
                         name + percent + bytes (where applicable). -->
                    <div class="stat-bar" x-bind="statBarBind(Math.round(Math.min(100, h.cpu_percent || 0)), 'columns.cpu')"
                         :class="[barLevel(h.cpu_percent), isStaleField(h, 'host_cpu_percent') ? 'stale' : '']"
                         :style="'--w: ' + Math.round(Math.min(100, h.cpu_percent || 0)) + '%'"
                         :title="t('columns.cpu') + ': ' + (h.cpu_percent || 0).toFixed(1) + '%' + (h.cores ? ' (' + h.cores + ' cores)' : '') + (isStaleField(h, 'host_cpu_percent') ? ' — ' + staleAge(h) : '')">
                      <div class="fill"></div>
                    </div>
                    <svg x-show="hostHasInlineSpark(h, 'cpu')" class="spark"
                         :class="hostSparkClass(h, 'cpu')"
                         viewBox="0 0 100 16" preserveAspectRatio="none" aria-hidden="true">
                      <path fill="none" stroke="currentColor" stroke-width="1" :d="hostInlineSparkline(h, 'cpu')"/>
                    </svg>
                    <div class="text-[10.5px] mono mt-1"
                         x-text="(h.cpu_percent || 0).toFixed(1) + '%' + (h.cores ? ' (' + h.cores + ')' : '')"></div>
                  </div>
                </template>
              </div>
              <!-- Memory % + bytes — gated on hostHasMemMetric so
                   wireless APs / switches that expose only memory
                   (not CPU/disk) still show this bar, while
                   hosts that only expose CPU don't render an
                   empty mem bar at 0%. -->
              <div>
                <template x-if="h.status === 'up' && hostHasMemMetric(h)">
                  <div>
                    <div class="stat-bar" x-bind="statBarBind(Math.round(h.mem_percent || memPercentOf(h)), 'columns.memory')"
                         :class="[barLevel(h.mem_percent || memPercentOf(h)), (isStaleField(h, 'host_mem_total') || isStaleField(h, 'host_mem_used')) ? 'stale' : '']"
                         :style="'--w: ' + Math.round(h.mem_percent || memPercentOf(h)) + '%'"
                         :title="t('columns.memory') + ': ' + Math.round(h.mem_percent || memPercentOf(h)) + '%' + (h.mem_total ? ' (' + fmtBytes(h.mem_used) + ' / ' + fmtBytes(h.mem_total) + ')' : '') + ((isStaleField(h, 'host_mem_total') || isStaleField(h, 'host_mem_used')) ? ' — ' + staleAge(h) : '')">
                      <div class="fill"></div>
                    </div>
                    <svg x-show="hostHasInlineSpark(h, 'memory')" class="spark"
                         :class="hostSparkClass(h, 'memory')"
                         viewBox="0 0 100 16" preserveAspectRatio="none" aria-hidden="true">
                      <path fill="none" stroke="currentColor" stroke-width="1" :d="hostInlineSparkline(h, 'memory')"/>
                    </svg>
                    <div class="text-[10.5px] mono mt-1">
                      <span x-text="Math.round(h.mem_percent || memPercentOf(h)) + '%'"></span>
                      <span class="text-[var(--text-faint)]" x-show="h.mem_total"
                            x-text="' (' + fmtBytes(h.mem_used) + '/' + fmtBytes(h.mem_total) + ')'"></span>
                    </div>
                  </div>
                </template>
              </div>
              <!-- Disk % + bytes — gated on hostHasDiskMetric so
                   wireless APs / managed switches / chassis BMCs
                   that don't expose disk via SNMP collapse this
                   block out instead of showing an empty bar +
                   "0%" label. Segmented bar when multiple mounts
                   exist, each stripe a distinct colour
                   proportional to the mount's used portion of the
                   whole pool. Falls back to a plain single-colour
                   bar when the host reports only aggregate totals. -->
              <div>
                <template x-if="h.status === 'up' && hostHasDiskMetric(h)">
                  <div>
                    <!-- Single aggregate bar — matches the
                         label below so the bar visual ALWAYS
                         reflects the same percentage the operator
                         reads in text. The previous segmented
                         multi-mount variant rendered per-mount
                         fills which diverged from the aggregate
                         label (dd-wrt's 100%-full squashfs `/`
                         painted half the bar red while the
                         aggregate read `<1%` because /opt was
                         empty); operators read the bar as host
                         state and expected bar = label.
                         Per-mount detail stays in the drawer's
                         mount card AND in the bar's hover title
                         (worst mount + per-mount used/total). -->
                    <div class="stat-bar" x-bind="statBarBind(Math.round(h.disk_percent || diskPercentOf(h)), 'columns.disk')"
                         :class="[barLevel(h.disk_percent || diskPercentOf(h)), (isStaleField(h, 'host_disk_total') || isStaleField(h, 'host_disk_used')) ? 'stale' : '']"
                         :style="'--w: ' + ((h.disk_percent || diskPercentOf(h)) > 0 ? Math.max(1, Math.round(h.disk_percent || diskPercentOf(h))) : 0) + '%'"
                         :title="hostDiskBarTitle(h)">
                      <div class="fill"></div>
                    </div>
                    <svg x-show="hostHasInlineSpark(h, 'disk')" class="spark"
                         :class="hostSparkClass(h, 'disk')"
                         viewBox="0 0 100 16" preserveAspectRatio="none" aria-hidden="true">
                      <path fill="none" stroke="currentColor" stroke-width="1" :d="hostInlineSparkline(h, 'disk')"/>
                    </svg>
                    <div class="text-[10.5px] mono mt-1">
                      <span x-text="fmtPercentLabel(h.disk_percent || diskPercentOf(h))"></span>
                      <span class="text-[var(--text-faint)]" x-show="h.disk_total"
                            x-text="' (' + fmtBytes(h.disk_used) + '/' + fmtBytes(h.disk_total) + ')'"></span>
                    </div>
                  </div>
                </template>
              </div>
              <!-- Uptime -->
              <div class="text-center text-[12px] mono"
                   x-text="h.status === 'up' ? fmtUptimeShort(h.uptime_s) : ''"></div>
              <!-- Core count -->
              <div class="text-center text-[11.5px] mono"
                   x-text="h.status === 'up' ? (h.cores || '—') : ''"></div>
              <!-- Architecture -->
              <div class="text-center text-[11px] mono truncate"
                   x-text="h.status === 'up' ? (h.arch || '—') : ''"></div>
              <!-- Kernel (truncated) -->
              <div class="text-center text-[11px] mono truncate" :title="h.kernel"
                   x-text="h.status === 'up' ? (h.kernel ? h.kernel.slice(0, 8) + (h.kernel.length > 8 ? '…' : '') : '—') : ''"></div>
              <!-- Per-host external URL (optional — configured in
                   Admin → Hosts). When set, opens whatever the
                   operator stored (the host's web UI, a dashboard,
                   etc.). Unlike the old "Open in Beszel" link this
                   doesn't guess a URL shape — removing that because
                   Beszel's system route changed and our guess was
                   hitting 404s. -->
              <div class="text-center">
                <a x-show="h.url"
                   :href="h.url"
                   target="_blank" rel="noopener"
                   @click.stop
                   class="inline-flex items-center justify-center text-[var(--text-dim)] hover:text-[var(--primary)]"
                   :title="t('hosts_extra.open_link_title', { label: hostDisplayName(h) })">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                </a>
              </div>
            </div>

            <!-- Detail drawer lives at top-level — see
                 the HOST DETAIL DRAWER block near the bottom of
                 this file. -->
                </div><!-- /host-row wrapper from desktop template (line 2017) -->
              </div><!-- /per-row wrapper from bucketRenderList template -->
            </template>
          </div>
        </template>
      </div>

      <!-- Empty-state ladder — loading, no hosts, providers broken.
           Skeleton fires while either (a) the first /api/hosts/list is
           still in flight (hostsInitialLoaded=false), or (b) a refresh
           re-set hostsLoading=true after the initial load. The "no host
           data" branches below all gate on hostsInitialLoaded so they
           never flash before the first response lands. -->
      <div x-show="hostsConfigured && (!hostsInitialLoaded || hostsLoading) && hosts.length === 0" class="skeleton-table" :aria-label="t('hosts_extra.empty.loading')">
        <template x-for="i in 6" :key="i">
          <div class="skeleton-row">
            <div class="skeleton-cell tall"></div>
            <div class="skeleton-cell"></div>
            <div class="skeleton-cell bar"></div>
            <div class="skeleton-cell bar"></div>
            <div class="skeleton-cell short"></div>
            <div class="skeleton-cell short"></div>
          </div>
        </template>
      </div>
      <!-- Filter-only empty state — hosts exist but no match for
           the current search query. Distinct from the "no hosts at
           all" ladder below so the operator gets a clearer "nothing
           matches, clear the filter" action. -->
      <div x-show="hostsInitialLoaded && hostsConfigured && !hostsLoading && hosts.length > 0 && filteredHosts().length === 0"
           class="text-center py-12 text-[var(--text-faint)] text-sm">
        <div>
          <span x-text="t('hosts_extra.empty.no_match')"></span>
          <span class="mono text-[var(--text-dim)]" x-text="'“' + hostsSearch + '”'"></span>.
        </div>
        <button @click="hostsSearch = ''"
                class="mt-2 text-[var(--primary)] hover:underline"
                x-text="t('hosts_extra.empty.clear_filter')"></button>
      </div>

      <!-- Empty-state ladder — ordered by most-specific cause. The
           ``hostsCuratedCount`` / ``hostsEnabledCount`` fields come
           from the server's /api/hosts response; older server
           builds don't ship those, so the first fallback case
           works even when they're absent. -->

      <!-- Case: server sent curated_count > 0 but every row disabled. -->
      <div x-show="hostsInitialLoaded && hostsConfigured && !hostsLoading && !hostsError && hosts.length === 0 && hostsCuratedCount > 0 && hostsEnabledCount === 0"
           class="text-center py-16 text-[var(--text-faint)] text-sm"
           x-html="t('hosts_extra.empty.all_disabled_html', { count: hostsCuratedCount })"></div>

      <!-- Case: server sent curated_count > 0 with enabled rows but
           no provider matched any of them. -->
      <div x-show="hostsInitialLoaded && hostsConfigured && !hostsLoading && !hostsError && hosts.length === 0 && hostsEnabledCount > 0"
           class="text-center py-16 text-[var(--text-faint)] text-sm"
           x-html="t('hosts_extra.empty.no_provider_match_html', { count: hostsEnabledCount })"></div>

      <!-- Case: positively confirmed no provider enabled. Only
           fires when the backend explicitly says configured=false
           AND reports no active sources — i.e. we're certain the
           operator hasn't enabled anything. We never INFER this
           from older-build responses that omit ``active`` because
           the assumption "no providers" would be wrong in that
           case (the old build could have providers enabled, just
           not reporting the field). -->
      <div x-show="hostsInitialLoaded && !hostsConfigured && !hostsLoading && !hostsError && hosts.length === 0 && (hostsActiveSources || []).length === 0"
           class="text-center py-16 text-[var(--text-faint)] text-sm"
           x-html="t('hosts_extra.empty.no_provider_enabled_html')"></div>

      <!-- Fallback — servers on builds that don't return
           curated_count / enabled_count, OR any case where the
           providers are enabled but returned no data. The copy
           points at the most likely fix (Test providers) rather
           than the misleading "no hosts yet". -->
      <div x-show="hostsInitialLoaded && hostsConfigured && !hostsLoading && !hostsError && hosts.length === 0 && hostsCuratedCount === 0"
           class="text-center py-16 text-[var(--text-faint)] text-sm"
           x-html="t('hosts_extra.empty.no_data_html', { sources: (hostsActiveSources || []).length ? '<span class=\'mono\'>' + ((hostsActiveSources || []).join(' / ')) + '</span>' : t('hosts_extra.empty.fallback_sources_label') })"></div>
    </div>

    <!-- ===== HISTORY VIEW ===== -->
    <div x-show="view==='history'" class="space-y-3">
      <div class="flex justify-between items-center">
        <div>
          <h2 class="font-semibold text-[15px]" x-text="t('history.title')"></h2>
          <div class="text-[11px] text-[var(--text-faint)]" x-text="t('history.entries', { count: historyTotal })"></div>
        </div>
        <div class="flex gap-2">
          <a :href="historyExportUrl('csv')" class="btn btn-soft text-[12px]" :title="t('history.csv_title')" x-text="t('history.csv')"></a>
          <a :href="historyExportUrl('json')" class="btn btn-soft text-[12px]" :title="t('history.json_title')" x-text="t('history.json')"></a>
          <button @click="loadHistory()" class="btn btn-ghost text-[12px]" x-text="t('actions.reload')"></button>
          <button @click="clearHistory()" class="btn btn-ghost text-[12px] text-danger" x-text="t('history.clear_all')"></button>
        </div>
      </div>

      <!-- HISTORY FILTER BAR -->
      <div class="flex flex-wrap items-center gap-2">
        <input type="search" x-model.debounce.300ms="historyFilters.q" @input="historyApplyFilter()"
               :placeholder="t('history.search_placeholder')"
               class="text-[12px] min-w-[220px] flex-1 max-w-[340px]">
        <div class="flex items-center gap-1.5 flex-wrap">
          <button @click="historyApplyFilter(() => historyFilters.status = '')"
                  :class="!historyFilters.status ? 'active' : ''" class="filter-chip" x-text="t('history.status_all')"></button>
          <button @click="historyApplyFilter(() => historyFilters.status = 'success')"
                  :class="historyFilters.status==='success' ? 'active' : ''" class="filter-chip" x-text="t('history.status_success')"></button>
          <button @click="historyApplyFilter(() => historyFilters.status = 'error')"
                  :class="historyFilters.status==='error' ? 'active' : ''" class="filter-chip" x-text="t('history.status_error')"></button>
        </div>
        <select x-model="historyFilters.op_type" @change="historyApplyFilter()" class="text-[12px] min-w-[150px]">
          <option value="" x-text="t('history.all_op_types')"></option>
          <option value="update_stack">update_stack</option>
          <option value="update_container">update_container</option>
          <option value="restart_service">restart_service</option>
          <option value="restart_container">restart_container</option>
          <option value="remove_container">remove_container</option>
          <option value="prune_node">prune_node</option>
          <option value="backup">backup</option>
          <option value="gather_refresh">gather_refresh</option>
          <option value="asset_inventory_refresh">asset_inventory_refresh</option>
        </select>
        <select x-model="historyFilters.stack" @change="historyApplyFilter()" class="text-[12px] min-w-[150px]">
          <option value="" x-text="t('history.all_stacks')"></option>
          <template x-for="s in historyStackOptions" :key="s">
            <option :value="s" x-text="s"></option>
          </template>
        </select>
        <input type="date" x-model="historyFilters.fromDate" @change="historyApplyFilter()"
               class="text-[12px]" :title="t('history.from_date_title')">
        <input type="date" x-model="historyFilters.toDate" @change="historyApplyFilter()"
               class="text-[12px]" :title="t('history.to_date_title')">
        <button x-show="hasHistoryFilter()" @click="historyApplyFilter(() => resetHistoryFilters())"
                class="btn btn-ghost text-[11px]" x-text="t('history.clear_filters')"></button>
      </div>

      <!-- HISTORY TABLE -->
      <div class="bg-[var(--surface)] border border-[var(--border)] rounded-md overflow-hidden">
        <div class="overflow-x-auto scrollbar">
          <table class="ptable">
            <thead>
              <tr>
                <th class="col-chev"></th>
                <th style="width: var(--col-when)" x-text="t('columns.when')"></th>
                <th style="width: var(--col-op)" x-text="t('columns.op')"></th>
                <th class="col-grow" x-text="t('columns.target')"></th>
                <th style="width: var(--col-stack)" class="hidden md:table-cell" x-text="t('columns.stack')"></th>
                <th style="width: var(--col-history-status)" x-text="t('columns.status')"></th>
                <th style="width: var(--col-duration)" class="hidden md:table-cell" x-text="t('columns.duration')"></th>
                <th style="width: var(--col-actor)" class="hidden lg:table-cell" x-text="t('columns.actor')"></th>
              </tr>
            </thead>
            <tbody>
              <template x-for="h in history" :key="h.id">
                <tr class="item-row" @click="openHistoryDetail(h)" style="cursor:pointer">
                  <td><span class="dot" :class="h.status==='success' ? 'dot-healthy' : 'dot-offline'"></span></td>
                  <td class="mono text-[11.5px] text-dim" x-text="formatTime(h.ts)"></td>
                  <td><span class="chip text-[10.5px]" x-text="(h.op_type||'').replace(/_/g,' ')"></span></td>
                  <td class="mono text-[12px] truncate" :title="h.target_name || ''" x-text="h.target_name || '—'"></td>
                  <td class="hidden md:table-cell text-[11.5px] text-dim truncate" x-text="h.target_stack || '—'"></td>
                  <td><span class="pill" :class="h.status==='success' ? 'pill-healthy' : 'pill-error'" x-text="h.status"></span></td>
                  <td class="hidden md:table-cell mono text-[11.5px] text-dim" x-text="t('common.seconds_short', { value: (h.duration||0).toFixed(1) })"></td>
                  <td class="hidden lg:table-cell text-[11.5px] text-dim" x-text="h.actor || 'ui'"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
        <div x-show="historyTotal === 0" class="text-center py-16 text-[var(--text-faint)] text-sm" x-text="t('empty.no_history')">
        </div>
        <!-- Server-side paging — backend returns one slice per request
             plus the total, so this control set drives every page
             change through a fresh /api/history fetch. Hidden when the
             full filtered set fits on one page (no point in showing
             '1 / 1'). Pattern + i18n keys mirror the Hosts editor
             pager (CLAUDE.md "Admin-editor pagination pattern"). -->
        <div x-show="historyTotal > historyPerPage"
             class="flex items-center justify-between gap-3 flex-wrap px-4 py-2 border-t border-[var(--border)] text-[11.5px]">
          <div class="flex items-center gap-2 text-[var(--text-dim)]">
            <span x-text="t('pagination.page_n_of_m', { page: Math.min(historyPage, historyTotalPages()), total: historyTotalPages() })"></span>
            <span class="text-[var(--text-faint)]"
                  x-text="t('pagination.total_count', { count: historyTotal })"></span>
          </div>
          <div class="flex items-center gap-1.5">
            <button @click="historyGoToPage(1)"
                    :disabled="historyPage <= 1"
                    :class="historyPage <= 1 ? 'opacity-40 cursor-not-allowed' : ''"
                    class="btn btn-ghost text-[11px] px-2"
                    :title="t('pagination.first_page_title')"
                    x-text="t('pagination.first_glyph')"></button>
            <button @click="historyPrevPage()"
                    :disabled="historyPage <= 1"
                    :class="historyPage <= 1 ? 'opacity-40 cursor-not-allowed' : ''"
                    class="btn btn-soft text-[11px] px-2.5"
                    x-text="t('pagination.prev')"></button>
            <input type="number" min="1" :max="historyTotalPages()"
                   :value="Math.min(historyPage, historyTotalPages())"
                   @change="historyGoToPage($event.target.value)"
                   class="w-14 text-center text-[11.5px] py-1"
                   :title="t('pagination.jump_to_page_title')">
            <button @click="historyNextPage()"
                    :disabled="historyPage >= historyTotalPages()"
                    :class="historyPage >= historyTotalPages() ? 'opacity-40 cursor-not-allowed' : ''"
                    class="btn btn-soft text-[11px] px-2.5"
                    x-text="t('pagination.next')"></button>
            <button @click="historyGoToPage(historyTotalPages())"
                    :disabled="historyPage >= historyTotalPages()"
                    :class="historyPage >= historyTotalPages() ? 'opacity-40 cursor-not-allowed' : ''"
                    class="btn btn-ghost text-[11px] px-2"
                    :title="t('pagination.last_page_title')"
                    x-text="t('pagination.last_glyph')"></button>
            <select :value="historyPerPage"
                    @change="historySetPerPage($event.target.value)"
                    class="text-[11.5px] py-1 ms-2"
                    :title="t('pagination.rows_per_page_title')">
              <option value="25" x-text="t('pagination.per_page_option', { count: 25 })"></option>
              <option value="50" x-text="t('pagination.per_page_option', { count: 50 })"></option>
              <option value="100" x-text="t('pagination.per_page_option', { count: 100 })"></option>
              <option value="200" x-text="t('pagination.per_page_option', { count: 200 })"></option>
              <option value="500" x-text="t('pagination.per_page_option', { count: 500 })"></option>
            </select>
          </div>
        </div>
      </div>
    </div>

  <!-- ================== ACTIVE OPS FLOATING PANEL ================== -->
  <!-- bottom-4 → bottom: calc(...) so the panel clears the mobile-nav
       footer + iOS home-bar safe area on narrow viewports (matches
       the .hosts-bulk-bar pattern). On desktop --mobile-nav-height
       is 0px so behaviour is unchanged. -->
  <div x-show="activeOps.length>0"
       class="fixed end-4 bg-[var(--surface)] border border-[var(--primary)]/40 rounded-md w-[380px] max-w-[calc(100vw-32px)] z-40 glow fade-in"
       style="bottom: calc(var(--mobile-nav-height) + env(safe-area-inset-bottom, 0px) + var(--s-4))">
    <button type="button"
            class="active-ops-header w-full text-start px-3 py-2 bg-[var(--surface-2)] border-b border-[var(--border)] flex items-center gap-2 cursor-pointer rounded-t-md"
            :aria-expanded="opsExpanded ? 'true' : 'false'"
            aria-controls="active-ops-body"
            :aria-label="t('active_ops.toggle_label', { count: activeOps.length })"
            @click="opsExpanded=!opsExpanded">
      <span class="dot dot-primary dot-pulse" aria-hidden="true"></span>
      <span class="font-semibold text-[12px]" x-text="t('states.running', { count: activeOps.length })"></span>
      <span class="flex-1"></span>
      <svg width="10" height="10" stroke-width="2.4" aria-hidden="true" class="text-[var(--text-dim)]">
        <use :href="opsExpanded ? '/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-down' : '/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-up'"/>
      </svg>
    </button>
    <div id="active-ops-body" x-show="opsExpanded" class="max-h-80 overflow-y-auto scrollbar">
      <template x-for="op in activeOps" :key="op.id">
        <div class="p-2.5 border-b border-[var(--border)] last:border-0"
             :class="op.status === 'success' ? 'bg-[var(--success)]/10' : op.status === 'error' ? 'bg-[var(--danger)]/10' : ''">
          <div class="flex items-center gap-2">
            <span class="chip text-[10px]" x-text="opTypeLabel(op.op_type)"></span>
            <span class="font-medium text-[12px] mono flex-1 truncate" x-text="op.target_name"></span>
            <span x-show="op.status !== 'running'"
                  class="text-[10px] font-semibold"
                  :class="op.status === 'success' ? 'text-[var(--success)]' : 'text-[var(--danger)]'"
                  x-text="opStatusLabel(op.status)"></span>
            <span class="text-[10px] text-[var(--text-faint)]" x-text="t('common.seconds_short', { value: (op.duration || 0).toFixed(1) })"></span>
          </div>
          <div class="mt-1.5 bg-[var(--bg)] rounded p-2 mono text-[10.5px] space-y-0.5 max-h-24 overflow-y-auto scrollbar border border-[var(--border)]">
            <template x-for="(ev,i) in op.events" :key="i">
              <div :class="ev.level==='error' ? 'text-[var(--danger)]' : ev.level==='success' ? 'text-[var(--success)]' : 'text-[var(--text-dim)]'"
                   x-text="ev.msg"></div>
            </template>
            <div x-show="op.events.length===0" class="text-[var(--text-faint)]" x-text="t('loading.waiting')"></div>
          </div>
        </div>
      </template>
    </div>

  <!-- ================== HOST DETAIL DRAWER ==================
       Slide-out panel that replaces the legacy inline row expansion.
       Lives at top-level (outside both .hosts-mobile-cards and
       .hosts-desktop-table) so it renders on phone AND desktop —
       the responsive-grid containers above use display:none on the
       inactive form factor, which would have killed an in-row drawer.
       Wrapped in a single-element x-for so the extracted markup
       keeps using `h.X` references without rewriting every binding. -->
  <template x-if="drawerHost">
    <template x-for="h in [drawerHost]" :key="h.host">
      <div>
            <!-- Slide animation lives on `.host-drawer` itself (CSS
                 `animation: slideIn .2s ease-out`). Don't add Alpine
                 x-transition directives here — they previously used
                 Tailwind `translate-x-full` classes which Tailwind
                 v4's browser-JIT runtime doesn't always pick up for
                 dynamically-added classes, so the slide silently
                 no-op'd while the drawerItem panel (using the same
                 keyframe directly via its CSS class) worked fine. -->
            <div x-show="isHostExpanded(h.host)"
                 role="dialog" aria-modal="true"
                 :aria-label="hostDisplayName(h)"
                 :class="isAllStale(h) ? 'host-drawer scrollbar bulk-stale' : 'host-drawer scrollbar'">
              <div class="flex items-center justify-between gap-3 mb-4 sticky top-0 bg-[var(--surface)] border-b border-[var(--border)] -mx-5 -mt-4 px-5 py-3 z-10">
                <div class="min-w-0 flex items-center gap-2">
                  <img class="w-5 h-5 rounded" :src="hostIconUrl(h)"
                       x-show="hostIconUrl(h)" alt="" loading="lazy"
                       @error="$event.target.style.display='none'">
                  <h2 class="text-[14px] font-semibold mono break-all"
                      x-text="hostTypePrefix(h) + hostDisplayName(h)"></h2>
                  <!-- Asset-source indicator — same tiny 9px
                       package glyph the editor row uses to mark
                       names sourced from the asset inventory rather
                       than an operator-typed label. Visible only
                       when h.label is blank AND the asset lookup
                       returns a name. -->
                  <svg x-show="!h.label && assetForHost(h) && assetForHost(h).name"
                       width="9" height="9"
                       class="text-[var(--text-faint)] flex-shrink-0 opacity-70"
                       aria-hidden="true"
                       :title="t('admin_hosts.label_source_asset', { name: (assetForHost(h) && assetForHost(h).name) || '' })"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-package"/></svg>
                  <!-- Health-score chip in the drawer header — clicking
                       it toggles the breakdown popover below. Same
                       colour tier as the row chip. The button form
                       is required (vs span) so keyboard nav can
                       reach it; cursor + hover state come via the
                       button.health-chip CSS rule. -->
                  <button x-show="healthScore(h) != null"
                          @click="toggleHealthPopover()"
                          type="button"
                          class="chip text-[10px] px-1.5 py-0 mono health-chip flex-shrink-0"
                          :class="healthChipClass(healthScore(h))"
                          :aria-expanded="healthPopoverOpen ? 'true' : 'false'"
                          :aria-label="t('hosts_extra.health.chip_aria_label')"
                          :title="t('hosts_extra.health.chip_title', { score: healthScore(h), worst: (healthWorstAxis(h) ? healthWorstAxis(h).label : '—') })"
                          x-text="healthScore(h)"></button>
                </div>
                <div class="flex items-center gap-1">
                  <!-- quick "Edit in Admin" jump from the host
                       drawer header. Same close-drawer + view-switch +
                       focusHostsConfigRow chain the System card's
                       "+ Add URL" link uses ; admin-only since
                       only admins can edit the curated host list. -->
                  <button x-show="me && me.role === 'admin'"
                          @click="(() => { const _hid = h.id; closeHostDrawer(); view='admin'; openAdminTab('hosts').then(() => focusHostsConfigRow(_hid)); })()"
                          class="btn btn-ghost text-[11.5px] flex items-center gap-1.5"
                          :title="t('host_drawer.actions.edit_in_admin_title')">
                    <svg width="13" height="13" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-sliders"/></svg>
                    <span x-text="t('host_drawer.actions.edit_in_admin')"></span>
                  </button>
                  <button @click="closeHostDrawer()"
                          class="btn btn-ghost text-base leading-none"
                          :title="t('actions.close') || 'Close'"
                          :aria-label="t('actions.close') || 'Close'">✕</button>
                </div>
              </div>
              <!-- Permanent-fail banner — fires when the
                   host_metrics_sampler has auto-paused this host after
                   the configured failure window. Shows last error +
                   minutes since the streak started + a Resume button
                   that clears the marker via POST /api/hosts/{id}/
                   resume-sampling. -->
              <!-- Disabled-host banner takes precedence over the
                   sampling-paused banner. Operator-feedback: when a
                   host is BOTH disabled AND auto-paused, the disabled
                   state is the actionable signal — "Sampling paused
                   (113h since last probe)" reads like an outage that
                   needs investigating, but actually nothing's been
                   probed because the operator turned the host off.
                   Renders for any disabled host (whether paused or
                   not) so the operator never sees a phantom-pause
                   reading. Re-enable in Admin → Hosts to dismiss. -->
              <template x-if="h.enabled === false">
                <div class="flex items-start gap-3 bg-[var(--surface-3)] border border-[var(--border)] rounded-md p-3 text-[12px] mb-4">
                  <svg width="16" height="16" class="text-[var(--text-dim)] flex-shrink-0 mt-0.5" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-pause"/></svg>
                  <div class="min-w-0 flex-1">
                    <div class="font-semibold text-[var(--text)]"
                         x-text="t('host_drawer.disabled_banner.title')"></div>
                    <div class="text-[var(--text-dim)] mt-0.5"
                         x-text="t('host_drawer.disabled_banner.body')"></div>
                  </div>
                </div>
              </template>
              <!-- Whole-host sampling-paused banner — only when the
                   host is ENABLED (otherwise the disabled-host banner
                   above already conveys the state more accurately). -->
              <template x-if="h.enabled !== false && h.sampling_paused">
                <div class="flex items-start gap-3 bg-[color-mix(in_srgb,var(--danger)_10%,transparent)] border border-[color-mix(in_srgb,var(--danger)_40%,var(--border))] rounded-md p-3 text-[12px] mb-4">
                  <svg width="16" height="16" class="text-[var(--danger)] flex-shrink-0 mt-0.5" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-alert-triangle"/></svg>
                  <div class="min-w-0 flex-1">
                    <div class="text-[var(--text)]"
                         x-text="t('hosts_extra.permanent_fail.drawer_banner', { minutes: hostFailureMinutes(h), error: (h.last_error || '—') })"></div>
                    <!-- "last probe N seconds ago" sub-line so the operator
                         can spot a host that's been paused-but-the-issue-
                         may-have-cleared without an immediate Resume click.
                         Hidden when the backend hasn't emitted last_failure_ts
                         yet (pre-schema or row genuinely absent). -->
                    <div x-show="hostLastFailureAge(h)"
                         class="text-[11px] text-[var(--text-faint)] mt-1"
                         x-text="hostLastFailureAge(h)"></div>
                  </div>
                  <button @click="resumeHostSampling(h)"
                          :disabled="!canResumeHost(h)"
                          :aria-busy="h._resumeBusy ? 'true' : 'false'"
                          class="btn btn-soft text-[11.5px] flex-shrink-0"
                          x-text="h._resumeBusy ? t('hosts_extra.permanent_fail.resume_busy') : t('hosts_extra.permanent_fail.resume_button')"></button>
                </div>
              </template>
              <!-- "No data yet" banner — shows only for hosts with
                   a provider MAPPED but probes returning nothing
                   (status='unknown' — a real "agent running, but
                   we can't reach it / no name match" signal).
                   Every other no-data case (unconfigured rows, FTTH
                   /VDSL /5G inventory entries without any agent,
                   loading skeleton, globally-no-providers) skips the
                   banner — the status dot + debug panel already
                   tell the story without the extra scary yellow.
                   Also suppressed when ANY provider is auto-paused
                   on this host AND when snapshot data is
                   being served` true).
                   The "could not match" copy is misleading on hosts
                   where the provider HAD matched and is now just
                   paused, OR where the snapshot fallback is serving
                   the previous probe's data (the snapshot-stale
                   banner above already explains that case). The
                   no-data banner is now the LAST-RESORT message —
                   only fires when we genuinely have nothing,
                   neither live nor cached. -->
              <template x-if="(h.providers || []).length === 0 && h.status === 'unknown' && pausedProvidersFor(h).length === 0 && !isStale(h)">
                <div class="flex items-start gap-3 bg-[var(--surface-3)] border border-[var(--border)] rounded-md p-4 text-[12.5px] mb-4">
                  <svg width="18" height="18" class="text-[var(--text-dim)] flex-shrink-0 mt-0.5" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-info"/></svg>
                  <div>
                    <div class="font-semibold text-[var(--text)]" x-text="t('hosts_extra.no_data.title')"></div>
                    <div class="text-[var(--text-dim)] mt-1"
                         x-text="t('hosts_extra.no_data.body', { debug_label: t('debug_panel.show'), providers: enabledProvidersList(h) })"></div>
                  </div>
                </div>
              </template>
              <!-- Stale-snapshot banner — fires when the backend stamped
                   `_stale_fields` on this host because at least one
                   provider went down and we're falling back to the last
                   cached snapshot. Banner answers "wait, is
                   this number live?" before the operator chases a ghost
                   metric. The drawer cards themselves dim individual
                   fields via the `.stale` CSS class via :class binding. -->
              <!-- Top-of-drawer "N providers paused" banner — Option C
                   from the host-disable design (operator chose: don't
                   auto-clear failure-state on host re-enable, instead
                   surface a prominent affordance to do it manually).
                   Renders ABOVE the stale banner because the paused
                   state is more actionable: stale data is "I should
                   investigate"; paused providers is "I should click
                   Resume". Hidden when the host is disabled
                   (sampling-suppressed banner takes precedence), when
                   whole-host sampling is paused (banner above already
                   conveys an actionable Resume + wires that
                   Resume to also clear paused providers — surfacing
                   both banners with two contradictory enable-states
                   is what operators reported as confusing), AND only
                   shows when the operator can actually act (admin).
                   The "Resume all" button reuses `resumeAllProviders`
                   from the bottom-of-card rollup so the
                   two affordances stay in lock-step. Disabled gate
                   shares `canResumeAny(h)` with the bottom-of-card
                   rollup + per-chip buttons so a stuck busy
                   flag never produces "top button enabled, per-chip
                   button disabled". -->
              <template x-if="h.enabled !== false && !h.sampling_paused && isAdmin() && pausedProvidersFor(h).length > 0">
                <div class="flex items-start justify-between gap-3 rounded-md p-3 text-[12px] mb-4 bg-[color-mix(in_srgb,var(--warning)_14%,transparent)] border border-[color-mix(in_srgb,var(--warning)_60%,var(--border))]">
                  <div class="flex items-start gap-3 min-w-0">
                    <svg width="16" height="16" class="text-[var(--warning)] flex-shrink-0 mt-0.5" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-pause"/></svg>
                    <div class="min-w-0">
                      <div class="font-semibold text-[var(--text)]"
                           x-text="t('host_drawer.paused_banner.title', { count: pausedProvidersFor(h).length })"></div>
                      <div class="text-[var(--text-dim)] mt-0.5"
                           x-text="t('host_drawer.paused_banner.body', { providers: pausedProvidersFor(h).join(', ') })"></div>
                      <!-- "View counters" jump-link surfaces the
                           debug-panel role at the top of the drawer
                           when an investigation is warranted. The
                           debug panel itself stays at its natural
                           position (bottom of drawer) but operators
                           don't have to scroll the whole drawer to
                           discover it. Clicking opens the panel +
                           scrolls it into view via
                           `jumpToHostDebug(h.id)`; admin-only because
                           the debug panel is admin-only. -->
                      <button type="button"
                              x-show="settings && settings.debug_panel_enabled !== false"
                              @click="jumpToHostDebug(h.id)"
                              class="mt-1 text-[11px] underline-offset-2 hover:underline text-[var(--text-faint)] hover:text-[var(--warning)] cursor-pointer inline-flex items-center gap-1"
                              x-text="t('host_drawer.paused_banner.view_counters')"></button>
                    </div>
                  </div>
                  <button type="button"
                          class="text-[11px] font-medium px-3 py-1 rounded border bg-[color-mix(in_srgb,var(--warning)_22%,transparent)] border-[color-mix(in_srgb,var(--warning)_70%,var(--border))] text-[var(--text)] hover:bg-[color-mix(in_srgb,var(--warning)_32%,transparent)] hover:border-[var(--warning)] disabled:opacity-50 disabled:cursor-wait inline-flex items-center gap-1.5 flex-shrink-0 cursor-pointer"
                          @click="resumeAllProviders(h)"
                          :disabled="!canResumeAny(h)"
                          :aria-label="t('hosts_extra.provider_resume_all_aria', { count: pausedProvidersFor(h).length })"
                          :aria-keyshortcuts="'Enter'"
                          :title="t('hosts_extra.provider_resume_all_title')">
                    <svg width="11" height="11" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                      <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                    <span x-text="t('hosts_extra.provider_resume_all', { count: pausedProvidersFor(h).length })"></span>
                  </button>
                </div>
              </template>
              <template x-if="isStale(h)">
                <div class="flex items-start gap-3 rounded-md p-3 text-[12px] mb-4"
                     :class="isAllStale(h)
                       ? 'bg-[color-mix(in_srgb,var(--warning)_14%,transparent)] border border-[color-mix(in_srgb,var(--warning)_60%,var(--border))]'
                       : 'bg-[color-mix(in_srgb,var(--warning)_8%,transparent)] border border-[color-mix(in_srgb,var(--warning)_40%,var(--border))]'"
                     :title="(h._stale_fields || []).join(', ')">
                  <svg width="16" height="16" class="text-[var(--warning)] flex-shrink-0 mt-0.5" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-clock"/></svg>
                  <div class="min-w-0">
                    <div class="font-semibold text-[var(--text)]"
                         x-text="isAllStale(h) ? t('host_drawer.stale.title_bulk') : t('host_drawer.stale.title')"></div>
                    <div class="text-[var(--text-dim)] mt-0.5"
                         x-text="isAllStale(h)
                           ? t('host_drawer.stale.body_bulk', { age: staleAge(h) })
                           : t('host_drawer.stale.body', { age: staleAge(h), count: (h._stale_fields || []).length })"></div>
                    <!-- Provider-level stale enumeration. Distinct
                         from the field list below: this surfaces
                         WHICH PROVIDERS are cached vs live so the
                         operator can read "Beszel + Pulse cached"
                         rather than reverse-engineering it from the
                         field names. Hidden when no provider is
                         stale (every mapped provider returned a hit
                         this gather cycle). -->
                    <div x-show="staleProviders(h).length > 0"
                         class="text-[11px] text-[var(--text-dim)] mt-1"
                         x-text="t('host_drawer.stale.providers_cached', {
                                   providers: staleProviders(h).map(n => providerDisplayName(n)).join(', ')
                                 })"></div>
                    <!-- Surface the actual stale field names.
                         Operator-reported phantom banner: "1 field(s)
                         restored" while every chip showed Updated 2m
                         ago. The 1 field was off-screen in some card
                         the operator wasn't looking at, so the banner
                         seemed wrong. Listing the field names here AND
                         in the title attribute means operators can
                         always see which field is the snapshot
                         contributor — matches the rest of the drawer's
                         transparency contract (debug data button,
                         provider chip subtitles, etc.). Fields are
                         shown mono since they're code identifiers. -->
                    <div x-show="(h._stale_fields || []).length > 0"
                         class="text-[10.5px] text-[var(--text-faint)] mono mt-1 break-all"
                         x-text="(h._stale_fields || []).join(', ')"></div>
                  </div>
                </div>
              </template>
              <!-- Health-score breakdown popover — toggled by the
                   chip in the drawer header. Lives at host-drawer
                   scope so it slides in/out with the drawer. Shows
                   the per-axis sub-scores with mini progress bars
                   and a "Worst axis" callout so the operator can
                   instantly identify which dimension is dragging
                   the overall number down. -->
              <div x-show="healthPopoverOpen && healthScore(h) != null"
                   class="health-breakdown-popover">
                <div class="flex items-center justify-between gap-3 mb-2">
                  <div class="min-w-0">
                    <div class="text-[12.5px] font-semibold text-[var(--text)]"
                         x-text="t('hosts_extra.health.popover_heading')"></div>
                    <div class="text-[11px] text-[var(--text-dim)] mt-0.5"
                         x-text="t('hosts_extra.health.popover_subtitle', { score: healthScore(h), count: healthAxes(h).length })"></div>
                    <div x-show="healthWorstAxis(h)"
                         class="text-[11px] mt-1"
                         :class="healthChipClass(healthScore(h)) === 'health-chip-bad' ? 'text-[var(--danger)]' : healthChipClass(healthScore(h)) === 'health-chip-warn' ? 'text-[var(--warning)]' : 'text-[var(--text-dim)]'"
                         x-text="t('hosts_extra.health.popover_worst', { axis: (healthWorstAxis(h) ? healthWorstAxis(h).label : '—') })"></div>
                  </div>
                  <button type="button"
                          @click="toggleHealthPopover()"
                          class="btn btn-ghost text-[11.5px]"
                          :aria-label="t('hosts_extra.health.popover_close')"
                          :title="t('hosts_extra.health.popover_close')"
                          :aria-label="t('hosts_extra.health.popover_close')">✕</button>
                </div>
                <template x-for="axis in healthAxes(h)" :key="axis.key">
                  <div class="axis-row text-[11.5px]">
                    <span class="text-[var(--text)]" x-text="axis.label + ' · ' + axis.detail"></span>
                    <span class="font-semibold mono"
                          :class="axis.score < 50 ? 'text-[var(--danger)]' : (axis.score < 80 ? 'text-[var(--warning)]' : 'text-[var(--success)]')"
                          x-text="axis.score + '/100'"></span>
                    <div class="axis-bar"
                         :style="'--w: ' + axis.score + '%; --c: ' + (axis.score < 50 ? 'var(--danger)' : (axis.score < 80 ? 'var(--warning)' : 'var(--success)'))">
                      <div class="fill"></div>
                    </div>
                  </div>
                </template>
              </div>
              <!-- TIMELINE CARD — unified incident-triage view that
                   collapses History (filter by host) + Notifications
                   (filter by target) + provider auto-pause /
                   recovery markers into one chronological list.
                   Collapsed by default so the drawer's first paint
                   stays light; expanded on operator click via the
                   `timelineExpanded[h.id]` toggle. Range picker
                   above the list mirrors the Beszel-history range
                   picker pattern. -->
              <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 mb-4">
                <button type="button"
                        @click="toggleHostTimeline(h.id)"
                        class="w-full flex items-center justify-between gap-3 text-start"
                        :aria-expanded="timelineExpanded[h.id] ? 'true' : 'false'">
                  <div class="flex items-center gap-2 min-w-0">
                    <svg width="14" height="14" class="text-[var(--text-dim)] flex-shrink-0"
                         aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-clock"/></svg>
                    <h4 class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)]"
                        x-text="t('host_drawer.timeline.heading')"></h4>
                    <span class="text-[10.5px] text-[var(--text-faint)]"
                          x-show="hostTimeline[h.id] && hostTimeline[h.id].counts"
                          x-text="t('host_drawer.timeline.summary', {
                            ops:           (hostTimeline[h.id] && hostTimeline[h.id].counts.ops) || 0,
                            notifications: (hostTimeline[h.id] && hostTimeline[h.id].counts.notifications) || 0,
                            failures:      (hostTimeline[h.id] && hostTimeline[h.id].counts.failures) || 0,
                          })"></span>
                  </div>
                  <svg width="12" height="12" class="text-[var(--text-faint)]"
                       :class="timelineExpanded[h.id] ? 'rotate-180' : ''"
                       aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-down"/></svg>
                </button>
                <div x-show="timelineExpanded[h.id]" class="mt-3" x-cloak>
                  <!-- Range picker. Same shape / cadence as the
                       Beszel-history picker. -->
                  <div class="flex items-center gap-2 mb-3 text-[11px]">
                    <span class="text-[var(--text-faint)]"
                          x-text="t('host_drawer.timeline.range_label')"></span>
                    <template x-for="opt in [[24, 'range_24h'], [168, 'range_7d'], [720, 'range_30d']]" :key="opt[0]">
                      <button type="button"
                              @click="setHostTimelineRange(h.id, opt[0])"
                              class="btn btn-ghost text-[11px] px-2 py-0.5"
                              :class="((hostTimelineRange[h.id] || 168) === opt[0]) ? 'btn-soft' : ''"
                              x-text="t('host_drawer.timeline.' + opt[1])"></button>
                    </template>
                    <span class="flex-1"></span>
                    <button type="button"
                            @click="loadHostTimeline(h.id, true)"
                            class="btn btn-ghost text-[11px]"
                            :title="t('host_drawer.timeline.refresh')">
                      <svg width="11" height="11" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
                    </button>
                  </div>
                  <div x-show="hostTimeline[h.id] && hostTimeline[h.id].loading"
                       class="text-[11px] text-[var(--text-faint)] italic"
                       x-text="t('host_drawer.timeline.loading')"></div>
                  <div x-show="hostTimeline[h.id] && hostTimeline[h.id].error"
                       class="text-[11px] text-[var(--danger)]"
                       x-text="hostTimeline[h.id] && hostTimeline[h.id].error"></div>
                  <div x-show="hostTimeline[h.id] && !hostTimeline[h.id].loading
                               && (hostTimeline[h.id].events || []).length === 0
                               && !hostTimeline[h.id].error"
                       class="text-[11px] text-[var(--text-faint)] italic"
                       x-text="t('host_drawer.timeline.empty')"></div>
                  <ul class="timeline-list" x-show="hostTimeline[h.id] && (hostTimeline[h.id].events || []).length > 0">
                    <template x-for="(ev, i) in (hostTimeline[h.id] ? hostTimeline[h.id].events : [])" :key="ev.kind + '|' + ev.ts + '|' + i">
                      <li class="timeline-row" :class="'timeline-row--' + (ev.severity || 'info')">
                        <div class="timeline-icon" :class="'timeline-icon--' + (ev.severity || 'info')"
                             :title="hostTimelineKindLabel(ev.kind)">
                          <svg width="10" height="10" aria-hidden="true">
                            <use :href="'/img/ui-sprite.svg?v=__APP_VERSION__#' + hostTimelineIconRef(ev.kind, ev.severity)"/>
                          </svg>
                        </div>
                        <div class="timeline-body min-w-0">
                          <div class="flex items-center gap-2 flex-wrap">
                            <span class="text-[12px] font-semibold text-[var(--text)] break-words"
                                  x-text="ev.title"></span>
                            <span class="chip text-[10px] px-1.5 py-0 mono"
                                  :class="hostTimelineKindChipClass(ev.kind)"
                                  x-text="hostTimelineKindLabel(ev.kind)"></span>
                          </div>
                          <div class="text-[10.5px] text-[var(--text-dim)] break-words"
                               x-show="ev.body" x-text="ev.body"></div>
                          <div class="text-[10px] text-[var(--text-faint)] mono mt-0.5">
                            <span x-text="hostTimelineTimeLabel(ev.ts)"></span>
                            <span x-show="ev.actor && ev.actor !== 'system' && ev.actor !== 'sampler'"
                                  x-text="' · ' + ev.actor"></span>
                          </div>
                        </div>
                      </li>
                    </template>
                  </ul>

                  <!-- ========== SIMILAR INCIDENTS PANEL ==========
                       Computed similarity grouping over the same time
                       window. Walks history + notifications +
                       host_failure_events for the host, classifies each
                       error into one of ~10 buckets (timeout / auth /
                       refused / dns / tls / not-found / server-error /
                       network / parse / rate-limit / other), groups
                       by (provider, pattern), surfaces aggregate stats
                       per group. Operators used to scroll-hunt across
                       three surfaces to triangulate "is this the same
                       problem we've seen before"; this panel does the
                       work upfront. Lives BELOW the timeline so the
                       chronological events come first; the patterns
                       below summarise what those events have in common. -->
                  <div x-show="hostTriage[h.id] && (hostTriage[h.id].groups || []).length > 0"
                       class="mt-5 pt-4 border-t border-dashed border-[var(--border)]">
                    <div class="flex items-center gap-2 mb-3">
                      <svg width="13" height="13" class="text-[var(--text-dim)]" aria-hidden="true"><use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-target'"/></svg>
                      <h4 class="font-semibold text-[12.5px]"
                          x-text="t('host_drawer.triage.heading')"></h4>
                      <span class="text-[10.5px] text-[var(--text-faint)]"
                            x-text="t('host_drawer.triage.summary', {
                              groups: (hostTriage[h.id].groups || []).length,
                              hours:  (hostTriage[h.id].scope && hostTriage[h.id].scope.hours) || 0,
                            })"></span>
                    </div>
                    <ul class="triage-list space-y-1.5">
                      <template x-for="(g, gi) in (hostTriage[h.id] ? hostTriage[h.id].groups : [])"
                                :key="(g.provider || '_') + ':' + g.pattern + ':' + gi">
                        <li class="triage-row rounded border border-[var(--border)] bg-[var(--surface-2)] px-3 py-2">
                          <button type="button"
                                  class="triage-row-header w-full flex items-center gap-2 text-start"
                                  @click="toggleTriageGroup(h.id, gi)"
                                  :aria-expanded="isTriageGroupExpanded(h.id, gi) ? 'true' : 'false'">
                            <svg width="10" height="10" class="flip-rtl flex-shrink-0" aria-hidden="true"
                                 :style="isTriageGroupExpanded(h.id, gi) ? 'transform: rotate(90deg)' : ''"><use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-chevron-right'"/></svg>
                            <span class="chip text-[10px] px-1.5 py-0 mono"
                                  :class="triagePatternChipClass(g.pattern)"
                                  x-text="triagePatternLabel(g.pattern)"></span>
                            <span class="text-[11.5px] text-[var(--text-dim)]"
                                  x-show="g.provider"
                                  x-text="g.provider"></span>
                            <span class="flex-1"></span>
                            <span class="text-[11.5px] text-[var(--text)]"
                                  x-text="t('host_drawer.triage.row_summary', {
                                    count: g.count,
                                    last:  hostTimelineTimeLabel(g.last_ts || 0),
                                    avg:   triageAvgRecoveryLabel(g.avg_duration_s),
                                  })"></span>
                          </button>
                          <div x-show="isTriageGroupExpanded(h.id, gi)" x-cloak class="mt-2 ms-5">
                            <div x-show="(g.sample_errors || []).length > 0"
                                 class="text-[10.5px] text-[var(--text-dim)] mono break-words mb-2">
                              <template x-for="err in (g.sample_errors || []).slice(0, 3)" :key="err">
                                <div class="mb-0.5" x-text="'· ' + err"></div>
                              </template>
                            </div>
                            <div class="text-[10px] text-[var(--text-faint)] uppercase tracking-wider mb-1"
                                 x-show="(g.occurrences || []).length > 0"
                                 x-text="t('host_drawer.triage.occurrences_label', { count: g.occurrences.length })"></div>
                            <ul class="space-y-0.5">
                              <template x-for="(occ, oi) in (g.occurrences || []).slice(0, 8)" :key="occ.ts + ':' + oi">
                                <li class="text-[10.5px] mono">
                                  <span class="text-[var(--text-faint)]"
                                        x-text="hostTimelineTimeLabel(occ.ts)"></span>
                                </li>
                              </template>
                              <li class="text-[10px] text-[var(--text-faint)] italic"
                                  x-show="(g.occurrences || []).length > 8"
                                  x-text="t('host_drawer.triage.more_occurrences', { count: g.occurrences.length - 8 })"></li>
                            </ul>
                          </div>
                        </li>
                      </template>
                    </ul>
                  </div>
                  <div x-show="hostTriage[h.id] && (hostTriage[h.id].groups || []).length === 0
                               && !hostTriage[h.id].error
                               && !hostTriage[h.id].loading
                               && hostTimeline[h.id] && (hostTimeline[h.id].events || []).length > 0"
                       class="mt-3 text-[10.5px] text-[var(--text-faint)] italic"
                       x-text="t('host_drawer.triage.no_patterns')"></div>
                </div>
              </section>
              <!-- Drawer grid — shows whenever we have ANY data
                   worth displaying: live providers OR an asset
                   inventory match. Hosts with NEITHER still see the
                   SSH card + debug panel below. Each individual
                   section inside the grid carries its own visibility
                   gate (asset section → assetForHost(h), HARDWARE →
                   status==='up' || assetForHost(h), etc.) so empty
                   rows stay tidy. Hosts whose custom_number doesn't
                   match an asset row deliberately render NO asset
                   card — operator wants those silent (was previously
                   a diagnostic empty-state, now hidden per request). -->
              <!-- 2-column max (was 4-column with `xl:grid-cols-4`) —
                   the slide-out drawer caps at 760px wide which
                   isn't enough for four side-by-side card columns
                   without label/value collisions. Two columns gives
                   each card ~360px on desktop and stacks them on
                   mobile. -->
              <div x-show="(h.providers || []).length > 0 || assetForHost(h)"
                   class="grid grid-cols-1 md:grid-cols-12 gap-4">
                <!-- ASSET INVENTORY (rich) — rendered FIRST so the
                     operator sees the curated metadata before the
                     live telemetry sections. Visible only when
                     `assetForHost(h)` returns a populated shape;
                     hosts without a match show nothing here. -->
                <template x-if="assetForHost(h)">
                  <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-12">
                    <div class="flex items-center justify-between mb-3">
                      <h4 class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)]"
                          x-text="t('host_drawer.asset.heading')"></h4>
                      <a x-show="assetEditUrl(assetForHost(h))"
                         :href="assetEditUrl(assetForHost(h))" target="_blank" rel="noopener"
                         class="text-[11px] text-[var(--primary)] hover:underline"
                         :title="t('host_drawer.asset.edit_title')"
                         x-text="t('host_drawer.asset.edit_link')"></a>
                    </div>
                    <dl class="drawer-dl text-[12px]">
                      <template x-if="assetForHost(h).name">
                        <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.name')"></dt>
                      </template>
                      <template x-if="assetForHost(h).name">
                        <dd class="text-end break-words" x-text="assetForHost(h).name"></dd>
                      </template>
                      <template x-if="assetForHost(h).type">
                        <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.type')"></dt>
                      </template>
                      <template x-if="assetForHost(h).type">
                        <dd class="text-end break-all" x-text="assetForHost(h).type"></dd>
                      </template>
                      <template x-if="(assetForHost(h).hostnames || []).length">
                        <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.hostnames')"></dt>
                      </template>
                      <template x-if="(assetForHost(h).hostnames || []).length">
                        <dd class="text-end mono break-all">
                          <template x-for="hn in assetForHost(h).hostnames" :key="hn">
                            <div x-text="hn"></div>
                          </template>
                        </dd>
                      </template>
                      <template x-if="assetForHost(h).location">
                        <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.location')"></dt>
                      </template>
                      <template x-if="assetForHost(h).location">
                        <dd class="text-end" x-text="assetForHost(h).location"></dd>
                      </template>
                      <template x-if="assetForHost(h).serial">
                        <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.serial')"></dt>
                      </template>
                      <template x-if="assetForHost(h).serial">
                        <dd class="mono text-end break-all text-[var(--text-faint)]"
                            x-text="assetForHost(h).serial"></dd>
                      </template>
                      <template x-if="assetForHost(h).sku">
                        <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.asset.sku')"></dt>
                      </template>
