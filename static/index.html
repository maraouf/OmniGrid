                             Speedtest's latest_speedtest) renders its result
                             HERE — under the button — instead of in a transient
                             toast the operator can't read. image_url (when the
                             skill returns one) shows as a clickable preview. -->
                        <template x-for="sk in appInstanceSkills(inst)" :key="'skres:' + sk.id">
                          <template x-if="appSkillResult(inst, sk.id)">
                            <div class="apps-skill-result mt-2 rounded-md border px-2.5 py-2"
                                 :class="appSkillResult(inst, sk.id).ok ? 'border-[var(--border)] bg-[var(--surface-2)]' : 'border-[var(--danger)]'">
                              <div class="fs-2xs uppercase tracking-wide text-[var(--text-faint)] mb-1.5"
                                   x-text="appSkillLabel(sk)"></div>
                              <!-- OK: render each detail line as ONE inline row —
                                   the stats flow together (plain text, not wide
                                   per-stat chips) so ⬇️/⬆️/🏓 stay on a single line
                                   in the narrow drawer instead of stacking. -->
                              <template x-if="appSkillResult(inst, sk.id).ok">
                                <div class="flex flex-col gap-1">
                                  <template x-for="(segs, li) in appSkillResultLines(appSkillResult(inst, sk.id))" :key="li">
                                    <div class="apps-skill-line flex flex-wrap items-baseline gap-x-3 gap-y-0.5 fs-xs">
                                      <template x-for="(seg, si) in segs" :key="si">
                                        <template x-for="p in [appSkillSegParts(seg)]" :key="'p'">
                                          <span class="whitespace-nowrap">
                                            <span x-show="p.icon" class="font-semibold"
                                                  :style="p.color ? ('color: ' + p.color) : ''"
                                                  x-text="p.icon"></span><span
                                            x-text="p.icon ? (' ' + p.text) : p.text"></span>
                                          </span>
                                        </template>
                                      </template>
                                    </div>
                                  </template>
                                </div>
                              </template>
                              <template x-if="!appSkillResult(inst, sk.id).ok">
                                <div class="fs-xs break-words text-[var(--danger)]"
                                     x-text="appSkillResult(inst, sk.id).detail"></div>
                              </template>
                              <template x-if="appSkillResult(inst, sk.id).image_url">
                                <a :href="appSkillResult(inst, sk.id).image_url" target="_blank" rel="noopener"
                                   class="block mt-2">
                                  <img :src="appSkillResult(inst, sk.id).image_url" alt=""
                                       loading="lazy"
                                       class="max-w-full rounded border border-[var(--border)]"/>
                                </a>
                              </template>
                            </div>
                          </template>
                        </template>
                      </div>
                    </template>
                  </div>
                </template>
                <!-- App-LEVEL aggregated extras + fleet actions — rendered
                     ONCE for the whole app (NOT per host): e.g. AdGuard's
                     combined stats (blocked / queries / clients / …) + fleet
                     Enable / Disable / Disable-for / Refresh. Same app-level
                     slot the Apps grid card uses, so a fleet app shows its
                     stats AND actions in ONE card here instead of a skill
                     card duplicated per instance. -->
                <template x-for="app in [drawerApp]" :key="'aggext'">
                  <!-- App-level extras honour the per-instance show_extras
                       admin toggle (via appsShowExtras, resolved from the
                       first instance → catalog → preset) — same gate as the
                       Apps-grid card so the drawer + card agree. -->
                  <template x-if="anyAppAggExtrasMatch(app) && appsShowExtras(app, (app.instances && app.instances[0]) || null, (typeof item !== 'undefined' ? item : null))">
                    <div class="rounded-md border border-[var(--border)] p-3 apps-drawer-extras-box mt-2">
                      <!-- INCLUDE: _components/apps/_all_extras_app.html -->
                    </div>
                  </template>
                </template>
              </div>
            </div>
          </div>
        </template>
      </aside>
    </div>
  </template>

  <!-- ================== APPS-BY-HOST DRAWER ==================
       Opened from a host card in the host-grouped Apps view. Shows the
       host header + every app running on it; clicking a row drills into
       that app's own drawer (openAppFromHostDrawer closes this one
       first so only one drawer is ever open). -->
  <template x-if="drawerAppHost">
    <div class="fixed inset-0 z-40 fade-in">
      <div @click="closeAppHostDrawer()" class="absolute inset-0 backdrop"></div>
      <aside role="dialog" aria-modal="true"
             :aria-label="drawerAppHost ? (drawerAppHost.host_label || drawerAppHost.host_address) : (t('apps.host_drawer.title') || 'Host apps')"
             @keydown="_focusTrapKeydown($event, $el)"
             class="absolute inset-y-0 end-0 w-full md:w-[560px] bg-[var(--surface)] border-s border-[var(--border)] overflow-y-auto scrollbar slide-in">
        <template x-if="drawerAppHost">
          <div class="p-5">
            <!-- Header -->
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0 flex-1 flex items-start gap-2">
                <span class="apps-host-avatar" aria-hidden="true">
                  <svg width="18" height="18" class="text-[var(--text-dim)]">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-server"/>
                  </svg>
                </span>
                <div class="min-w-0">
                  <h2 class="fs-display-sm font-semibold break-all mono"
                      x-text="drawerAppHost.host_address || drawerAppHost.host_id"></h2>
                  <div class="flex items-center gap-1.5 flex-wrap mt-1">
                    <span class="chip fs-3xs" :class="appStatusPillClass(drawerAppHost.status)"
                          x-text="t('apps.status_' + drawerAppHost.status) || drawerAppHost.status"></span>
                    <span class="fs-3xs text-[var(--text-faint)]"
                          x-text="t('apps.counts.apps_up', { up: drawerAppHost.up_count, total: drawerAppHost.app_count })"></span>
                    <span x-show="drawerAppHost.host_label && drawerAppHost.host_label !== (drawerAppHost.host_address || drawerAppHost.host_id)"
                          class="fs-3xs text-[var(--text-faint)]" x-text="drawerAppHost.host_label"></span>
                  </div>
                </div>
              </div>
              <button type="button" @click="closeAppHostDrawer()" class="user-action-btn"
                      :aria-label="t('actions.close')" :title="t('actions.close')">
                <svg width="14" height="14" aria-hidden="true">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-x"/>
                </svg>
              </button>
            </div>

            <!-- Apps on this host -->
            <div class="mt-4">
              <div class="fs-2xs uppercase tracking-wide text-[var(--text-faint)] mb-2"
                   x-text="t('apps.host_drawer.apps') || 'Apps on this host'"></div>
              <div class="space-y-2">
                <template x-for="a in (drawerAppHost.apps || [])" :key="a.group_id + ':' + a.service_idx">
                  <div class="apps-host-drawer-row" role="button" tabindex="0"
                       @click="openAppFromHostDrawer(a)"
                       @keydown.enter="openAppFromHostDrawer(a)"
                       @keydown.space.prevent="openAppFromHostDrawer(a)"
                       :aria-label="t('apps.drawer.open_aria', {name: a.name})">
                    <div class="flex items-center gap-2">
                      <img :src="iconUrlFor(a.icon || a.name)" alt="" width="26" height="26" class="rounded"
                           @error="$event.target.style.visibility='hidden'">
                      <span class="apps-card-dot" :class="'apps-card-dot--' + a.status" aria-hidden="true"></span>
                      <span class="flex-1 truncate fs-sm font-medium" x-text="a.name"></span>
                      <span x-show="a.last_probe && a.last_probe.rtt_ms" class="fs-3xs text-[var(--text-faint)]"
                            x-text="(a.last_probe && a.last_probe.rtt_ms) ? appsLatencyMs(a.last_probe.rtt_ms) : ''"></span>
                      <svg width="14" height="14" class="text-[var(--text-faint)] flip-rtl" aria-hidden="true">
                        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
                      </svg>
                    </div>
                    <div x-show="appsInstanceReason(a)" class="fs-xs mt-1"
                         :class="a.status === 'down' ? 'text-[var(--danger)]' : 'text-[var(--text-faint)]'"
                         x-text="appsInstanceReason(a)"></div>
                    <div x-show="(a.port_results || []).length" class="apps-port-grid mt-1">
                      <template x-for="pr in (a.port_results || [])" :key="pr.port">
                        <a class="apps-port-pill"
                           :class="'apps-port-pill--' + appsPortState(pr) + (appsPortHref(pr, grp) ? ' apps-port-pill--link' : '')"
                           :href="appsPortHref(pr, grp) || null"
                           :target="appsPortHref(pr, grp) ? '_blank' : null"
                           rel="noopener"
                           @click.stop
                           :title="appsPortTitle(pr)">
                          <span class="apps-card-dot" :class="'apps-card-dot--' + appsPortState(pr)" aria-hidden="true"></span>
                          <span x-text="pr.port + '/' + (pr.protocol || 'tcp')" class="mono"></span>
                        </a>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>
      </aside>
    </div>
  </template>

  <!-- ================== DETAIL DRAWER ================== -->
  <template x-if="drawerItem">
    <div class="fixed inset-0 z-40 fade-in">
      <div @click="drawerItem=null" class="absolute inset-0 backdrop"></div>
      <aside role="dialog" aria-modal="true"
             :aria-label="drawerItem && drawerItem.name ? drawerItem.name : t('item.drawer_title')"
             @keydown="_focusTrapKeydown($event, $el)"
             class="absolute inset-y-0 end-0 w-full md:w-[500px] bg-[var(--surface)] border-s border-[var(--border)] overflow-y-auto scrollbar slide-in">
        <template x-if="drawerItem">
          <div class="p-5">
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0 flex-1">
                <div class="flex items-center gap-1.5 flex-wrap">
                  <span class="chip" x-text="drawerItem.type"></span>
                  <span class="pill" :class="'pill-' + (drawerItem.health || 'unknown')" x-text="drawerItem.health || '—'"></span>
                  <span class="pill" :class="'pill-' + statusKey(drawerItem.status)" x-text="drawerItem.status"></span>
                </div>
                <!-- Brand icon (when one resolves) to the LEFT, spanning the
                     name + image:tag lines stacked to its right. -->
                <div class="flex items-start gap-3 mt-2">
                  <img class="drawer-item-icon" :src="itemIconUrl(drawerItem)"
                       x-show="itemIconUrl(drawerItem)"
                       :alt="drawerItem.stack || drawerItem.name" loading="lazy"
                       @error="$el.style.display='none'">
                  <div class="min-w-0 flex-1">
                    <h2 class="fs-display-sm font-semibold mono break-all" x-text="drawerItem.name"></h2>
                    <div class="mono fs-xs text-[var(--text-dim)] break-all mt-1">
                      <span x-text="imageRepo(drawerItem)"></span><span class="text-[var(--text-faint)]">:</span><span x-text="drawerItem.tag"></span>
                    </div>
                  </div>
                </div>
              </div>
              <button type="button" @click="drawerItem=null" class="btn btn-ghost text-base leading-none"
                      :aria-label="t('actions.close')">✕
              </button>
            </div>

            <div class="mt-5 space-y-2">
              <button type="button" x-show="isAdmin() && drawerItem.status==='update' && canUpdate(drawerItem)"
                      @click="itemAction(drawerItem)"
                      :disabled="isItemBusy(drawerItem)"
                      class="w-full btn btn-warning justify-center py-2.5 fs-md">
                <template x-if="isItemBusy(drawerItem)"><span class="flex items-center gap-2"><span class="spin"></span><span x-text="t('actions.updating')"></span></span></template>
                <template x-if="!isItemBusy(drawerItem)"><span><span x-text="t('drawer.restart_flash')"></span> <span x-text="actionLabel(drawerItem)"></span></span></template>
              </button>
              <div x-show="isAdmin() && drawerItem.status==='update' && !canUpdate(drawerItem)"
                   class="w-full bg-[var(--surface-2)] border border-[var(--warning)]/30 rounded-md p-3 fs-xs text-warning"
                   x-text="t('drawer.external_warning')"></div>
              <div class="grid grid-cols-2 gap-2">
                <button type="button" x-show="isAdmin() && isRestartable(drawerItem)"
                        @click="restartItem(drawerItem)"
                        :disabled="isRestartBusy(drawerItem)"
                        class="btn btn-soft justify-center fs-sm">
                  <template x-if="isRestartBusy(drawerItem)"><span class="flex items-center gap-1.5"><span class="spin"></span><span x-text="t('actions.restarting')"></span></span></template>
                  <template x-if="!isRestartBusy(drawerItem)"><span x-text="t('drawer.restart')"></span></template>
                </button>
                <button type="button" x-show="isAdmin() && drawerItem.removable"
                        @click="removeContainer(drawerItem)"
                        :disabled="isItemBusy(drawerItem)"
                        class="btn btn-danger-outline justify-center fs-sm"
                        x-text="t('drawer.remove_container')"></button>
                <button type="button" x-show="isAdmin()" @click="toggleIgnore(drawerItem)"
                        class="btn btn-soft justify-center fs-sm"
                        x-text="drawerItem.ignored ? t('drawer.unignore') : t('drawer.ignore')"></button>
                <!-- Switch-to-tag inline popover. Operator-requested
                     modern UI/UX (no extra modal popup) — clicking the
                     button anchors a small inline panel below it with
                     a free-text input pre-focused for the new tag. Enter
                     to submit, Esc / outside-click to cancel. Replaces
                     the earlier "Switch to :latest" + SwAl-prompt
                     pattern. Generalised — accepts any valid Docker
                     tag (operator's case: switch komodo-core from the
                     pinned `2.0.0-dev` snapshot to the floating `2`
                     tag for v2-line patch updates without bumping to
                     `:latest` which still tracks v1). -->
                <div x-show="isAdmin() && canRetagToLatest(drawerItem)">
                  <button type="button"
                          @click="openRetagPopover(drawerItem, $event)"
                          :disabled="isItemBusy(drawerItem)"
                          :class="isRetagPopoverOpen(drawerItem) ? 'w-full btn btn-primary justify-center fs-sm' : 'w-full btn btn-soft justify-center fs-sm'"
                          :title="t('drawer.retag_tag_title')"
                          :aria-expanded="isRetagPopoverOpen(drawerItem) ? 'true' : 'false'"
                          x-text="t('drawer.retag_tag')"></button>
                  <div x-show="isRetagPopoverOpen(drawerItem)"
                       x-transition.opacity.duration.150ms
                       @click.outside="closeRetagPopover()"
                       @keydown.escape.window="closeRetagPopover()"
                       class="retag-popover"
                       :style="_retagPopoverStyle()"
                       role="dialog"
                       :aria-label="t('drawer.retag_tag_title')">
                    <div class="retag-popover-header" x-text="t('drawer.retag_tag_header')"></div>
                    <div class="retag-popover-current">
                      <span class="text-[var(--text-faint)] fs-2xs" x-text="t('drawer.retag_tag_current_label')"></span>
                      <code class="mono fs-xs text-[var(--text-dim)]" x-text="drawerItem.image || '—'"></code>
                    </div>
                    <input type="text"
                           :data-retag-input="drawerItem.raw_id || drawerItem.id"
                           x-model="_retagDraft"
                           @keyup.enter="submitRetagPopover(drawerItem)"
                           @keyup.escape="closeRetagPopover()"
                           :placeholder="t('drawer.retag_tag_placeholder')"
                           class="retag-popover-input mono fs-sm"
                           autocomplete="off"
                           spellcheck="false">
                    <div class="retag-popover-help fs-2xs text-[var(--text-faint)]"
                         x-text="t('drawer.retag_tag_help')"></div>
                    <div class="retag-popover-actions">
                      <button type="button"
                              @click="closeRetagPopover()"
                              class="btn btn-soft fs-xs"
                              x-text="t('actions.cancel')"></button>
                      <button type="button"
                              @click="submitRetagPopover(drawerItem)"
                              :disabled="_retagBusy"
                              class="btn btn-primary fs-xs"
                              x-text="_retagBusy ? t('actions.working') : t('drawer.retag_tag_submit')"></button>
                    </div>
                  </div>
                </div>
                <a x-show="drawerItem.stack_id"
                   :href="portainerDeepLink(drawerItem)" target="_blank"
                   class="btn btn-soft justify-center fs-sm text-center" x-text="t('drawer.portainer')"></a>
                <a x-show="drawerItem.hub_link"
                   :href="drawerItem.hub_link" target="_blank"
                   class="btn btn-soft justify-center fs-sm text-center" x-text="t('drawer.registry')"></a>
              </div>
            </div>

            <div class="mt-6 space-y-4">
              <div x-show="drawerItem.stack">
                <div class="fs-3xs text-[var(--text-faint)] uppercase tracking-wider" x-text="t('drawer.stack')"></div>
                <div class="mono mt-1 fs-md" x-text="drawerItem.stack"></div>
              </div>
              <div>
                <div class="fs-3xs text-[var(--text-faint)] uppercase tracking-wider" x-text="t('drawer.replicas')"></div>
                <div class="mt-1">
                <span class="fs-display-xs font-semibold mono"
                      :class="(drawerItem.replicas.running < drawerItem.replicas.desired) ? 'text-[var(--warning)]' : 'text-[var(--success)]'"
                      x-text="drawerItem.replicas.running + ' / ' + drawerItem.replicas.desired"></span>
                  <span x-show="drawerItem.replicas.running < drawerItem.replicas.desired" class="fs-xs ms-2 text-warning" x-text="t('drawer.degraded_note')"></span>
                  <span x-show="drawerItem.replicas.running === drawerItem.replicas.desired && drawerItem.replicas.desired > 0" class="fs-xs ms-2 text-success" x-text="t('drawer.healthy_note')"></span>
                  <span x-show="drawerItem.replicas.desired === 0 || drawerItem.replicas.running === 0" class="fs-xs ms-2 text-faint" x-text="t('drawer.offline_note')"></span>
                </div>
              </div>
              <div x-show="drawerItem.placements && drawerItem.placements.length">
                <div class="fs-3xs text-[var(--text-faint)] uppercase tracking-wider" x-text="t('drawer.placement')"></div>
                <div class="mt-1 space-y-1">
                  <template x-for="(p,i) in drawerItem.placements" :key="i">
                    <div class="fs-sm mono flex items-center gap-2 flex-wrap">
                      <span class="dot" :class="p.state==='running' ? 'dot-ok' : p.state==='failed' ? 'dot-error' : 'dot-unknown'"></span>
                      <span class="font-medium" x-text="p.node"></span>
                      <span class="text-[var(--text-faint)] fs-xs" x-text="p.state || '—'"></span>
                      <!-- Hide the per-placement err string when the
                           dedicated "Latest task error" panel below is
                           going to show the same text — pre-fix the
                           error rendered twice (once truncated here,
                           once in full below). When task_error isn't
                           set (e.g. the placement carries an err for
                           a state we didn't aggregate into task_error)
                           we still render it so nothing is hidden. -->
                      <span x-show="p.err && !drawerItem.task_error"
                            class="text-[var(--danger)] fs-xs truncate"
                            :title="p.err" x-text="p.err"></span>
                    </div>
                  </template>
                </div>
              </div>

              <!-- Exposed ports — surfaces external:internal mappings for
                   services + containers. Each row carries an "Open"
                   link that navigates to http://<host>:<published>
                   when a host can be resolved. Host resolution chain:
                   (a) for containers, the curated host with the same
                   hostname as item.node, falling back to the Portainer
                   public URL hostname; (b) for services published in
                   ingress mode, the Portainer public URL hostname (any
                   swarm node serves the published port). When no host
                   can be resolved, the row renders without a link
                   (the mapping is still visible). -->
              <div x-show="drawerItem.ports && drawerItem.ports.length">
                <div class="fs-3xs text-[var(--text-faint)] uppercase tracking-wider" x-text="t('drawer.ports')"></div>
                <div class="mt-1 space-y-1">
                  <template x-for="(pt,i) in drawerItem.ports" :key="i">
                    <div class="fs-sm mono flex items-center gap-2 flex-wrap">
                      <span class="font-semibold" x-text="pt.published"></span>
                      <span class="text-[var(--text-faint)]">→</span>
                      <span x-text="pt.target"></span>
                      <span class="text-[var(--text-faint)] fs-xs" x-text="pt.protocol || 'tcp'"></span>
                      <template x-if="itemPortLink(drawerItem, pt)">
                        <a :href="itemPortLink(drawerItem, pt)" target="_blank" rel="noopener"
                           class="fs-xs ms-auto inline-flex items-center gap-1 text-[var(--primary)] hover:underline"
                           :title="itemPortLink(drawerItem, pt)">
                          <span x-text="t('drawer.ports_open') || 'Open'"></span>
                          <span aria-hidden="true">↗</span>
                        </a>
                      </template>
                    </div>
                  </template>
                </div>
              </div>

              <!-- Recent task errors — surfaces task.Status.Err so the
                   user doesn't have to SSH into the manager and run
                   `docker service ps --no-trunc`. Only renders when at
                   least one failed task carries an Err string. The
                   latest error is shown prominently; the full failure
                   history (up to 10) collapses behind a Show/Hide
                   toggle so a sticky-error service doesn't spam the
                   drawer. Known-issue blurbs (VXLAN sandbox-join
                   pattern, image-pull pattern, mount pattern) render
                   a Help link with the SSH-fixable command when the
                   error matches. -->
              <!-- Visual urgency gates on the SERVICE'S CURRENT health.
                   Healthy services CAN have a non-empty task_error if
                   Swarm had to retry scheduling (e.g. transient VXLAN
                   conflict, stale overlay subnet); the new task
                   succeeded and the service is up — but the historical
                   failure record persists. Showing a red alarm-style
                   panel for a 3/3 healthy service is misleading. When
                   healthy, switch the border + heading text + body
                   colour to the warning (amber) family so the panel
                   reads as "past failures, look-but-don't-panic".
                   The auto-fix actions stay because the kernel may
                   still hold leftover state worth proactively cleaning
                   up. When degraded / offline, the original danger
                   styling stays intact for the active-failure case. -->
              <div x-show="drawerItem.task_error && drawerItem.task_error.length"
                   class="mt-2 p-2 rounded border"
                   :style="'background: var(--surface-2); border-color: var(--' + (drawerItem.health === 'healthy' ? 'warning' : 'danger') + ');'">
                <div class="fs-3xs text-[var(--text-faint)] uppercase tracking-wider mb-1"
                     x-text="drawerItem.health === 'healthy' ? (t('drawer.task_error_resolved_label') || t('drawer.task_error_label')) : t('drawer.task_error_label')"></div>
                <div class="mono fs-xs whitespace-pre-wrap break-all"
                     :style="'color: var(--' + (drawerItem.health === 'healthy' ? 'warning' : 'danger') + ');'"
                     x-text="drawerItem.task_error"></div>
                <div x-show="taskErrorKnownIssue(drawerItem.task_error)"
                     class="mt-2 fs-xs"
                     :style="'color: var(--text-dim);'">
                  <div class="font-semibold mb-1"
                       x-text="t('drawer.task_error_known_issue_label')"></div>
                  <div x-html="taskErrorKnownIssue(drawerItem.task_error)"></div>
                </div>
                <!-- Action buttons surfaced when an auto-fix is available
                     for the matched pattern. `taskErrorAutoFixActions(item)`
                     returns a list of { id, label, kind } where kind
                     drives the click handler: 'restart' calls the
                     existing restart-service endpoint; 'ssh' opens the
                     SSH terminal on the failing node with a pre-filled
                     diagnostic command. Each pattern can offer 0..N
                     actions so a future "recreate-network" backend
                     route would slot in by adding another kind. -->
                <!-- Action buttons surfaced when an auto-fix is
                     available for the matched pattern. Buttons use
                     `btn-primary` (try-this-first) and `btn-danger`
                     (escalation) — pre-fix `btn-secondary` was used
                     but no such class exists in style.css, so the
                     non-danger button rendered unstyled. The spinner
                     reuses the `.spin` keyframe; gap-2 keeps the
                     buttons evenly separated.
                     Hidden when the service is currently healthy —
                     user-flagged: keeping the historical error visible
                     is fine for forensic context, but exposing
                     destructive auto-fix actions (force-restart,
                     cleanup-stale-overlay) on a 3/3 healthy service
                     invites accidental misclicks that would interrupt
                     a running deployment. The buttons reappear if the
                     service degrades. -->
                <div x-show="isAdmin() && drawerItem.health !== 'healthy' && taskErrorAutoFixActions(drawerItem).length"
                     class="mt-3 flex flex-wrap items-center gap-2">
                  <template x-for="act in taskErrorAutoFixActions(drawerItem)" :key="act.id">
                    <button type="button"
                            class="btn fs-xs inline-flex items-center gap-1"
                            :class="act.danger ? 'btn-danger' : 'btn-primary'"
                            :disabled="!!drawerItem._auto_fix_running"
                            @click="runTaskErrorAutoFix(drawerItem, act)"
                            :title="act.help || ''">
                      <span x-show="!drawerItem._auto_fix_running" x-text="act.label"></span>
                      <span x-show="drawerItem._auto_fix_running" class="flex items-center gap-1">
                      <span class="spin"></span>
                      <span x-text="t('drawer.task_error_running') || 'Running…'"></span>
                    </span>
                    </button>
                  </template>
                </div>
                <div x-show="(drawerItem.task_history || []).length > 1"
                     class="mt-2">
                  <button type="button"
                          class="fs-xs text-[var(--text-dim)] hover:text-[var(--text)]"
                          @click="drawerItem._show_task_history = !drawerItem._show_task_history">
                  <span x-show="!drawerItem._show_task_history"
                        x-text="t('drawer.task_history_show', { count: (drawerItem.task_history || []).length })"></span>
                    <span x-show="drawerItem._show_task_history"
                          x-text="t('drawer.task_history_hide')"></span>
                  </button>
                  <div x-show="drawerItem._show_task_history" class="mt-2 space-y-1">
                    <template x-for="(h, idx) in (drawerItem.task_history || [])" :key="idx">
                      <div class="fs-xs mono p-1 rounded"
                           :style="'background: var(--surface);'">
                        <div class="flex items-center gap-2 flex-wrap">
                          <span class="text-[var(--text-faint)]" x-text="h.ts || '—'"></span>
                          <span class="pill pill-error fs-3xs" x-text="h.state || '?'"></span>
                          <span class="text-[var(--text-faint)]" x-text="h.node || '?'"></span>
                        </div>
                        <div x-show="h.err" class="mt-1 whitespace-pre-wrap break-all text-[var(--text-dim)]" x-text="h.err"></div>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
              <div x-show="drawerItem.current_digest">
                <div class="fs-3xs text-[var(--text-faint)] uppercase tracking-wider flex justify-between">
                  <span x-text="t('drawer.local_digest')"></span>
                  <button type="button" @click="copy(drawerItem.current_digest)" class="hover:text-[var(--text)]" x-text="t('drawer.copy')"></button>
                </div>
                <div class="mono fs-2xs break-all mt-1 text-[var(--text-dim)]" x-text="drawerItem.current_digest"></div>
              </div>
              <div x-show="drawerItem.remote_digest">
                <div class="fs-3xs text-[var(--text-faint)] uppercase tracking-wider flex justify-between">
                  <span x-text="t('drawer.remote_digest')"></span>
                  <button type="button" @click="copy(drawerItem.remote_digest)" class="hover:text-[var(--text)]" x-text="t('drawer.copy')"></button>
                </div>
                <div class="mono fs-2xs break-all mt-1"
                     :class="drawerItem.status==='update' ? 'text-[var(--warning)]' : 'text-[var(--text-dim)]'"
                     x-text="drawerItem.remote_digest"></div>
              </div>
              <div x-show="drawerItem.updated">
                <div class="fs-3xs text-[var(--text-faint)] uppercase tracking-wider" x-text="t('drawer.last_updated')"></div>
                <div class="mt-1 fs-sm mono" x-text="drawerItem.updated"></div>
              </div>
            </div>

            <!-- Debug panel — admin-only, same gating as the host
                 drawer's panel. Surfaces _cache["items"]/[stacks] raw
                 record + live_stats entry + per-item stats_samples
                 diagnostic so the operator can see WHY drawer
                 sparklines / bars are showing "Collecting data" /
                 empty without grepping logs. `--compact` modifier
                 shrinks the column min + box height so two panes
                 fit per row in the 500px item drawer. -->
            <template x-if="me && me.role === 'admin' && (settings && settings.debug_panel_enabled !== false) && drawerItem.raw_id">
              <section class="host-debug-panel host-debug-panel--compact">
                <button type="button"
                        class="host-debug-toggle host-debug-toggle--accent"
                        @click="toggleSubjectDebug('item', drawerItem.raw_id)"
                        :aria-expanded="subjectsDebugOpen[subjectDebugKey('item', drawerItem.raw_id)] ? 'true' : 'false'">
                  <svg width="12" height="12" class="flip-rtl" aria-hidden="true"
                       :style="subjectsDebugOpen[subjectDebugKey('item', drawerItem.raw_id)] ? 'transform: rotate(90deg)' : ''">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
                  </svg>
                  <svg width="14" height="14" class="host-debug-toggle-icon" aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-bug"/>
                  </svg>
                  <span x-text="subjectsDebugOpen[subjectDebugKey('item', drawerItem.raw_id)] ? t('debug_panel.hide') : t('debug_panel.show')"></span>
                  <span class="host-debug-hint" x-show="!subjectsDebugOpen[subjectDebugKey('item', drawerItem.raw_id)]" x-text="t('debug_panel.hint')"></span>
                </button>
                <div x-show="subjectsDebugOpen[subjectDebugKey('item', drawerItem.raw_id)]" class="host-debug-body">
                  <template x-if="subjectsDebugLoading[subjectDebugKey('item', drawerItem.raw_id)]">
                    <div class="host-debug-loading">
                      <span class="spin-lg" aria-hidden="true"></span>
                      <span x-text="t('debug_panel.probing')"></span>
                    </div>
                  </template>
                  <template x-if="subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)] && subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)]._error">
                    <div class="host-debug-error" x-text="t('debug_panel.error_prefix', { error: subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)]._error })"></div>
                  </template>
                  <template x-if="subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)] && !subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)]._error">
                    <div class="host-debug-content">
                      <div class="host-debug-toolbar">
                        <div class="host-debug-toolbar-actions">
                          <button type="button" class="btn btn-ghost fs-xs inline-flex items-center gap-1"
                                  @click="loadSubjectDebug('item', drawerItem.raw_id)"
                                  :disabled="!!subjectsDebugLoading[subjectDebugKey('item', drawerItem.raw_id)]"
                                  :title="t('debug_panel.refresh_title')">
                            <svg width="14" height="14" aria-hidden="true"
                                 :class="subjectsDebugLoading[subjectDebugKey('item', drawerItem.raw_id)] ? 'spin-md' : ''">
                              <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                            </svg>
                            <span x-text="t('debug_panel.refresh')"></span>
                          </button>
                        </div>
                      </div>
                      <div class="host-debug-grid">
                        <section class="host-debug-box"
                                 x-show="(subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)].diagnostics || []).length">
                          <header class="host-debug-box-head">
                            <span class="host-debug-label host-debug-label--rendered" x-text="t('debug_panel.labels.diagnostics')"></span>
                          </header>
                          <ul class="host-debug-json scrollbar" style="margin:0; padding-inline-start: var(--s-5); list-style: disc;">
                            <template x-for="msg in (subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)].diagnostics || [])" :key="msg">
                              <li class="fs-xs" x-text="msg"></li>
                            </template>
                          </ul>
                        </section>
                        <section class="host-debug-box"
                                 x-show="subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)].samples_in_window">
                          <header class="host-debug-box-head">
                            <span class="host-debug-label host-debug-label--rendered" x-text="t('debug_panel.labels.samples_in_window')"></span>
                            <button type="button" class="host-debug-copy"
                                    @click="copyDebugJson(subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)].samples_in_window, 'debug_panel.labels.samples_in_window')"
                                    :aria-label="copyAriaLabel('debug_panel.labels.samples_in_window')"
                                    :title="t('debug_panel.copy_title')">
                              <svg width="12" height="12" aria-hidden="true">
                                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/>
                              </svg>
                            </button>
                          </header>
                          <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)].samples_in_window)"></pre>
                        </section>
                        <section class="host-debug-box"
                                 x-show="subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)].live_stats && Object.keys(subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)].live_stats).length">
                          <header class="host-debug-box-head">
                            <span class="host-debug-label host-debug-label--rendered" x-text="t('debug_panel.labels.live_stats')"></span>
                            <button type="button" class="host-debug-copy"
                                    @click="copyDebugJson(subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)].live_stats, 'debug_panel.labels.live_stats')"
                                    :aria-label="copyAriaLabel('debug_panel.labels.live_stats')"
                                    :title="t('debug_panel.copy_title')">
                              <svg width="12" height="12" aria-hidden="true">
                                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/>
                              </svg>
                            </button>
                          </header>
                          <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)].live_stats)"></pre>
                        </section>
                        <section class="host-debug-box">
                          <header class="host-debug-box-head">
                            <span class="host-debug-label host-debug-label--rendered" x-text="t('debug_panel.labels.cached_record')"></span>
                            <button type="button" class="host-debug-copy"
                                    @click="copyDebugJson(subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)].record, 'debug_panel.labels.cached_record')"
                                    :aria-label="copyAriaLabel('debug_panel.labels.cached_record')"
                                    :title="t('debug_panel.copy_title')">
                              <svg width="12" height="12" aria-hidden="true">
                                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/>
                              </svg>
                            </button>
                          </header>
                          <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)].record || {})"></pre>
                        </section>
                        <section class="host-debug-box"
                                 x-show="subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)].stack">
                          <header class="host-debug-box-head">
                            <span class="host-debug-label host-debug-label--rendered" x-text="t('debug_panel.labels.stack_rollup')"></span>
                            <button type="button" class="host-debug-copy"
                                    @click="copyDebugJson(subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)].stack, 'debug_panel.labels.stack_rollup')"
                                    :aria-label="copyAriaLabel('debug_panel.labels.stack_rollup')"
                                    :title="t('debug_panel.copy_title')">
                              <svg width="12" height="12" aria-hidden="true">
                                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/>
                              </svg>
                            </button>
                          </header>
                          <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(subjectsDebug[subjectDebugKey('item', drawerItem.raw_id)].stack || {})"></pre>
                        </section>
                      </div>
                    </div>
                  </template>
                </div>
              </section>
            </template>
          </div>
        </template>
      </aside>
    </div>
  </template>

  <!-- ================== NEW-TOKEN REVEAL MODAL ================== -->
  <div x-show="lastCreatedToken" class="fixed inset-0 z-50 fade-in">
    <div class="absolute inset-0 backdrop-strong"></div>
    <div class="relative flex items-center justify-center p-4 h-full overflow-auto scrollbar">
      <div class="bg-[var(--surface)] border border-[var(--border)] rounded-md max-w-lg w-full"
           role="dialog" aria-modal="true" :aria-label="t('admin.token_modal.title')"
           @keydown="_focusTrapKeydown($event, $el)">
        <div class="p-4 border-b border-[var(--border)]">
          <h2 class="fs-xl font-semibold" x-text="t('admin.token_modal.title')"></h2>
          <p class="fs-xs text-[var(--text-faint)] mt-0.5" x-text="t('admin.token_modal.hint')"></p>
        </div>
        <div class="p-5 space-y-3">
          <div>
            <label class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('admin.token_modal.name')"></label>
            <div class="bg-[var(--surface-2)] rounded-md px-3 py-2 fs-md"
                 x-text="lastCreatedToken && lastCreatedToken.name"></div>
          </div>
          <div>
            <label class="block fs-xs text-[var(--text-dim)] mb-1" x-text="t('admin.token_modal.role')"></label>
            <div class="bg-[var(--surface-2)] rounded-md px-3 py-2 fs-md"
                 x-text="lastCreatedToken && lastCreatedToken.role"></div>
          </div>
          <div>
            <label class="block fs-xs text-[var(--text-dim)] mb-1" x-html="t('admin.token_modal.token_label')"></label>
            <div class="flex items-stretch gap-2">
              <input type="text" readonly
                     :value="lastCreatedToken && lastCreatedToken.token"
                     class="mono fs-sm flex-1"
                     onclick="this.select()">
              <button type="button" @click="copyToClipboard(lastCreatedToken.token)"
                      class="btn btn-soft fs-sm whitespace-nowrap" x-text="t('settings.oidc.copy')"></button>
            </div>
          </div>
        </div>
        <div class="p-4 border-t border-[var(--border)] flex justify-end">
          <button type="button" @click="lastCreatedToken = null" class="btn btn-primary fs-sm" x-text="t('admin.token_modal.saved')"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- ================== NOTIFICATION TEMPLATE EDITOR / VIEWER ==================
       Admin-only edit modal (writable) + Profile-side viewer (read-only)
       for per-event notification templates. Both modes share the same
       markup; mode is gated on `notifyTemplateEditor.readOnly`. Open
       via `openNotifyTemplateEditor(event)` (admin) or
       `openNotifyTemplateViewer(event)` (read-only). Esc / backdrop
       click closes; live preview pane debounces keystrokes by 200ms. -->
  <template x-if="notifyTemplateEditor.open">
    <div class="fixed inset-0 z-50 fade-in" x-cloak>
      <div @click="closeNotifyTemplateEditor()" class="absolute inset-0 backdrop-strong"></div>
      <div class="relative flex items-start justify-center p-4 h-full overflow-auto scrollbar"
           role="dialog" aria-modal="true"
           :aria-label="notifyTemplateEditor.readOnly ? t('profile.notify_templates.modal_title') : t('admin.notify_templates.modal_title')"
           @keydown="_focusTrapKeydown($event, $el)"
           @keydown.escape.window="closeNotifyTemplateEditor()">
        <div class="bg-[var(--surface)] border border-[var(--border)] rounded-md max-w-3xl w-full max-h-[90vh] overflow-y-auto scrollbar mt-[5vh]">
          <!-- Sticky header — title + reset link + close. -->
          <div class="p-4 border-b border-[var(--border)] flex justify-between items-start gap-3 sticky top-0 bg-[var(--surface)] z-10">
            <div class="min-w-0 flex-1">
              <h2 class="fs-xl font-semibold flex items-center gap-2 flex-wrap">
                <span x-text="notifyTemplateEditor.readOnly ? t('profile.notify_templates.modal_title') : t('admin.notify_templates.modal_title')"></span>
                <span class="chip pill-info fs-2xs"
                      x-text="(notifyTemplateEvent && notifyTemplateEvent.label) ? t('admin.notifications.events.' + notifyTemplateEvent.label) : ''"
                      x-show="notifyTemplateEvent && notifyTemplateEvent.label"></span>
              </h2>
              <p class="fs-xs text-[var(--text-faint)] mt-0.5"
                 x-text="notifyTemplateEditor.readOnly ? t('profile.notify_templates.modal_subtitle') : t('admin.notify_templates.modal_subtitle')"></p>
            </div>
            <div class="flex items-center gap-2">
              <!-- Reset link — admin only, enabled only when current
                   differs from default. -->
              <button type="button"
                      x-show="!notifyTemplateEditor.readOnly"
                      :disabled="!notifyTemplateEditorIsDirty()"
                      @click="resetNotifyTemplateEditor()"
                      class="btn btn-ghost fs-xs"
                      x-text="t('admin.notify_templates.reset_to_default')"></button>
              <button type="button" @click="closeNotifyTemplateEditor()" class="btn btn-ghost"
                      :aria-label="t('actions.close')">✕
              </button>
            </div>
          </div>

          <div class="p-5 space-y-4" x-show="notifyTemplateEditor.event">
            <!-- Title editor + chip strip. -->
            <div>
              <label class="block fs-xs font-medium text-[var(--text-dim)] mb-1.5"
                     x-text="t('admin.notify_templates.title_label')"></label>
              <template x-if="!notifyTemplateEditor.readOnly">
                <input type="text"
                       x-ref="notifyTemplateTitleInput"
                       x-model="notifyTemplateEditor.title"
                       :placeholder="notifyTemplateEditor.title_default"
                       @input.debounce.200ms="refreshNotifyTemplatePreview()"
                       class="w-full mono fs-sm">
              </template>
              <template x-if="notifyTemplateEditor.readOnly">
              <pre class="bg-[var(--surface-2)] rounded-md px-3 py-2 fs-sm whitespace-pre-wrap break-words mono"
                   x-text="notifyTemplateEditor.title || notifyTemplateEditor.title_default"></pre>
              </template>
              <!-- Inline chip strip for inserting placeholders into the
                   title. Click → insert at the current caret position via
                   insertNotifyTemplatePlaceholder. -->
              <div x-show="!notifyTemplateEditor.readOnly"
                   class="flex flex-wrap gap-1.5 mt-2 items-center">
              <span class="fs-2xs text-[var(--text-faint)] me-1"
                    x-text="t('admin.notify_templates.chip_strip_label')"></span>
                <template x-for="ph in notifyTemplateEditor.available_placeholders" :key="'title-chip-' + ph">
                  <button type="button"
                          @click="insertNotifyTemplatePlaceholder('title', ph)"
                          class="chip pill-info fs-xs mono cursor-pointer"
                          :title="t('admin.notify_templates.placeholder_help_with_sample', { help: t('admin.notify_templates.placeholder_help.' + ph), sample: notifyTemplateEditor.samples[ph] || '' })"
                          x-text="'{' + ph + '}'"></button>
                </template>
              </div>
            </div>

            <!-- Body editor. -->
            <div>
              <label class="block fs-xs font-medium text-[var(--text-dim)] mb-1.5"
                     x-text="t('admin.notify_templates.body_label')"></label>
              <template x-if="!notifyTemplateEditor.readOnly">
              <textarea x-ref="notifyTemplateBodyInput"
                        x-model="notifyTemplateEditor.body"
                        :placeholder="notifyTemplateEditor.body_default"
                        @input.debounce.200ms="refreshNotifyTemplatePreview()"
                        rows="6"
                        class="w-full mono fs-sm"></textarea>
              </template>
              <template x-if="notifyTemplateEditor.readOnly">
              <pre class="bg-[var(--surface-2)] rounded-md px-3 py-2 fs-sm whitespace-pre-wrap break-words mono"
                   x-text="notifyTemplateEditor.body || notifyTemplateEditor.body_default || t('admin.notify_templates.body_empty_hint')"></pre>
              </template>
              <div x-show="!notifyTemplateEditor.readOnly"
                   class="flex flex-wrap gap-1.5 mt-2 items-center">
              <span class="fs-2xs text-[var(--text-faint)] me-1"
                    x-text="t('admin.notify_templates.chip_strip_label')"></span>
                <template x-for="ph in notifyTemplateEditor.available_placeholders" :key="'body-chip-' + ph">
                  <button type="button"
                          @click="insertNotifyTemplatePlaceholder('body', ph)"
                          class="chip pill-info fs-xs mono cursor-pointer"
                          :title="t('admin.notify_templates.placeholder_help_with_sample', { help: t('admin.notify_templates.placeholder_help.' + ph), sample: notifyTemplateEditor.samples[ph] || '' })"
                          x-text="'{' + ph + '}'"></button>
                </template>
              </div>
            </div>

            <!-- Live preview pane. -->
            <div class="border-t border-[var(--border)] pt-3">
              <div class="flex items-center justify-between gap-2 mb-1.5">
                <label class="fs-xs font-medium text-[var(--text-dim)]"
                       x-text="t('admin.notify_templates.preview_label')"></label>
                <span class="fs-2xs text-[var(--text-faint)]"
                      x-text="t('admin.notify_templates.preview_sample_hint')"></span>
              </div>
              <div class="bg-[var(--surface-2)] rounded-md px-3 py-2 space-y-1.5">
                <div class="fs-sm font-semibold text-[var(--text)]"
                     x-text="notifyTemplateEditor.preview.rendered_title || notifyTemplateEditor.title_default"></div>
                <div class="fs-sm text-[var(--text-dim)] whitespace-pre-wrap break-words"
                     x-text="notifyTemplateEditor.preview.rendered_body || notifyTemplateEditor.body_default || t('admin.notify_templates.body_empty_hint')"></div>
              </div>
              <!-- Unknown-placeholder warning. -->
              <div x-show="(notifyTemplateEditor.preview.unknown_placeholders || []).length > 0"
                   class="fs-xs text-[var(--warning)] mt-1.5 flex items-start gap-1.5">
                <svg width="11" height="11" aria-hidden="true" class="flex-shrink-0 mt-0.5">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-alert-triangle"/>
                </svg>
                <span>
                <span x-text="t('admin.notify_templates.unknown_placeholder_warning')"></span>
                <span class="mono" x-text="(notifyTemplateEditor.preview.unknown_placeholders || []).map(p => '{' + p + '}').join(', ')"></span>
              </span>
              </div>
            </div>

            <!-- Read-only viewer note. -->
            <div x-show="notifyTemplateEditor.readOnly"
                 class="fs-xs text-[var(--text-faint)] italic"
                 x-text="t('profile.notify_templates.readonly_note')"></div>
          </div>

          <!-- Footer — Save / Send test (admin) OR Close-only (read-only). -->
          <div class="p-4 border-t border-[var(--border)] flex items-center gap-2 flex-wrap sticky bottom-0 bg-[var(--surface)]">
            <template x-if="!notifyTemplateEditor.readOnly">
              <div class="flex items-center gap-2 flex-wrap">
                <button type="button" @click="saveNotifyTemplate()"
                        :disabled="notifyTemplateEditor.saving || !notifyTemplateEditorIsDirty()"
                        :class="notifyTemplateEditorIsDirty() ? 'ring-2 ring-[var(--warning)]' : ''"
                        class="btn btn-primary fs-sm">
                  <span x-show="!notifyTemplateEditor.saving" x-text="t('actions.save')"></span>
                  <span x-show="notifyTemplateEditor.saving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving')"></span></span>
                </button>
                <button type="button" @click="testNotifyTemplate()"
                        :disabled="notifyTemplateEditor.testing"
                        class="btn btn-soft fs-sm">
                  <span x-show="!notifyTemplateEditor.testing" x-text="t('admin.notify_templates.send_test')"></span>
                  <span x-show="notifyTemplateEditor.testing" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving')"></span></span>
                </button>
                <span x-show="notifyTemplateEditorIsDirty()"
                      class="fs-xs text-[var(--warning)] flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-[var(--warning)] animate-pulse"></span>
                <span x-text="t('hosts_actions.unsaved_label')"></span>
              </span>
              </div>
            </template>
            <button type="button" @click="closeNotifyTemplateEditor()"
                    class="btn btn-soft fs-sm ms-auto"
                    x-text="t('actions.close')"></button>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ================== NOTIFICATIONS POPUP ==================
       In-app notifications surface. Operators wanted a quick
       check + dismiss without losing their place on whatever view they
       were on, so this is a modal overlay (same pattern as the hotkeys
       modal below) rather than a top-level view. Click the avatar →
       Notifications to open; backdrop click or Esc closes. SSE keeps
       the list current while open; 30s polling fallback otherwise. -->
  <template x-if="showNotificationsPopup">
    <div class="fixed inset-0 z-50 fade-in" x-cloak>
      <div @click="showNotificationsPopup=false" class="absolute inset-0 backdrop-strong"></div>
      <div class="relative flex items-start justify-center p-4 h-full overflow-auto scrollbar"
           role="dialog" aria-modal="true" :aria-label="t('notifications.heading')"
           @keydown="_focusTrapKeydown($event, $el)"
           @keydown.escape.window="showNotificationsPopup=false">
        <div class="bg-[var(--surface)] border border-[var(--border)] rounded-md max-w-3xl w-full max-h-[90vh] overflow-y-auto scrollbar mt-[5vh]">
          <div class="p-4 border-b border-[var(--border)] flex justify-between items-center sticky top-0 bg-[var(--surface)] z-10">
            <div>
              <h2 class="fs-xl font-semibold" x-text="t('notifications.heading')"></h2>
              <div class="fs-xs text-[var(--text-faint)] mt-0.5">
                <span x-text="t('notifications.unread_count', { count: notificationsUnread })"></span>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <!-- Reload icon (circular arrows) — matches the refresh
                   affordance the operator already recognises from the
                   stacks toolbar / drawer chart-grid. SVG sits inside
                   the button alongside an `aria-label` so screen
                   readers announce the action. -->
              <button type="button" @click="loadNotifications()"
                      :disabled="notificationsLoading"
                      class="btn btn-ghost fs-sm inline-flex items-center gap-1.5"
                      :aria-label="t('actions.reload')" :title="t('actions.reload')">
                <svg width="14" height="14" aria-hidden="true"
                     :class="notificationsLoading ? 'animate-spin' : ''">
                  <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/>
                </svg>
                <span x-show="!notificationsLoading" x-text="t('actions.reload')"></span>
                <span x-show="notificationsLoading" x-text="t('actions.reloading')"></span>
              </button>
              <button type="button" @click="markAllNotificationsRead()" class="btn btn-soft fs-sm"
                      :disabled="(notificationsUnread || 0) === 0"
                      x-text="t('notifications.mark_all_read')"></button>
              <button type="button" @click="showNotificationsPopup=false" class="btn btn-ghost"
                      :aria-label="t('actions.close')">✕
              </button>
            </div>
          </div>

          <!-- Filter bar — lives INSIDE the sticky header (not the
               scrolling body) so severity / event / unread-only stay
               visible as the operator pages through long lists. The
               severity radiogroup uses ARIA `radiogroup` per CLAUDE.md
               "Filter chips need aria-pressed when used as toggles" —
               radio semantic because the choices are mutually exclusive
               (one severity at a time, NOT multi-select). -->
          <div class="px-4 py-3 border-b border-[var(--border)] sticky top-[57px] bg-[var(--surface)] z-10 flex flex-wrap gap-2 items-center fs-sm">
            <span class="text-[var(--text-faint)]" x-text="t('notifications.filter_severity')"></span>
            <div role="radiogroup" :aria-label="t('notifications.filter_severity')" class="flex gap-1"
                 @keydown="_radiogroupArrowKey($event)">
              <!-- Per-severity colouring: each chip carries the brand
                   pill class for its severity (info/success/warning/error)
                   so operators see at a glance which filter is which.
                   The "all" chip stays neutral. The currently-selected
                   chip layers `chip-active` on top — adds a leading dot
                   + thin border in the chip's own colour + bold label so
                   the active state is unmissable but visually subtle. -->
              <template x-for="sev in ['all','info','success','warning','error']" :key="sev">
                <button type="button" role="radio" :aria-checked="notificationsFilterSeverity === sev"
                        :tabindex="notificationsFilterSeverity === sev ? 0 : -1"
                        @click="notificationsFilterSeverity = sev; loadNotifications()"
                        :class="[
                        'chip',
                        sev === 'info' ? 'pill-info' : (sev === 'success' ? 'pill-ok' : (sev === 'warning' ? 'pill-update' : (sev === 'error' ? 'pill-error' : ''))),
                        notificationsFilterSeverity === sev ? 'chip-active' : ''
                      ]"
                        x-text="sev === 'all' ? t('filters.all') : t('notifications.severity.' + sev)"></button>
              </template>
            </div>

            <span class="text-[var(--text-faint)] ms-2" x-text="t('notifications.filter_event')"></span>
            <select x-model="notificationsFilterEvent" @change="loadNotifications()"
                    class="fs-sm">
              <option value="all" x-text="t('filters.all')"></option>
              <template x-for="ev in notificationEventOptions()" :key="ev">
                <option :value="ev" x-text="ev"></option>
              </template>
            </select>

            <label class="ms-2 inline-flex items-center gap-1">
              <input type="checkbox" x-model="notificationsFilterUnread"
                     @change="loadNotifications()">
              <span x-text="t('notifications.filter_unread_only')"></span>
            </label>

            <!-- Cluster-pivot toggle. When on, rows
                 with identical (event, target_kind, target_id) collapse
                 into one cluster row with a count badge — operators on
                 a busy fleet pivot from "47 service restart" rows to
                 one row per (service, event). Persists to
                 `ui_prefs.notifications_group_similar` so the operator's
                 choice survives reloads / cross-device login. -->
            <label class="ms-2 inline-flex items-center gap-1"
                   :title="t('notifications.group_similar_help')">
              <input type="checkbox" x-model="notificationsGroupSimilar"
                     @change="_persistNotificationsGroupSimilar()">
              <span x-text="t('notifications.group_similar')"></span>
            </label>
          </div>

          <div class="p-4 space-y-3">
            <div x-show="notificationsLoading" class="loading-state">
              <span class="spin-lg" aria-hidden="true"></span>
              <span x-text="t('loading.section')"></span>
            </div>

            <div x-show="!notificationsLoading && notifications.length === 0"
                 class="text-center py-16 text-[var(--text-faint)] text-sm"
                 x-text="t('notifications.empty')"></div>

            <!-- Flat list — default mode, every notification gets its own
                 row. Branch on `notificationsGroupSimilar` so the cluster
                 path stays out of the DOM when the toggle is off. -->
            <div x-show="!notificationsLoading && notifications.length > 0 && !notificationsGroupSimilar"
                 class="space-y-2">
              <template x-for="n in notifications" :key="n.id">
                <article class="notification-row"
                         :class="(n.read_at == null) ? 'notification-row--unread' : 'notification-row--read'"
                         :data-severity="n.severity || 'info'">
                  <span :class="notificationDotClass(n.severity)" aria-hidden="true"></span>
                  <div class="notification-row-body">
                    <div class="notification-row-header">
                      <span class="notification-row-title" x-text="n.title || n.event || ''"></span>
                      <span class="notification-row-meta">
                      <span class="fs-xs text-[var(--text-faint)]" x-text="fmtAgo(n.ts * 1000)"></span>
                      <button type="button" x-show="n.read_at == null"
                              @click="markNotificationRead(n.id)"
                              class="btn btn-ghost fs-xs"
                              x-text="t('notifications.mark_read')"></button>
                    </span>
                    </div>
                    <div class="notification-row-sub" x-show="n.body" x-text="n.body"></div>
                    <div class="notification-row-footer">
                      <span class="chip" x-show="n.event" x-text="n.event"></span>
                      <span class="fs-xs text-[var(--text-faint)]"
                            x-show="n.actor"
                            x-text="'@' + n.actor"></span>
                      <span class="fs-xs text-[var(--text-faint)]"
                            x-show="n.target_kind && n.target_id"
                            x-text="n.target_kind + ': ' + n.target_id"></span>
                    </div>
                  </div>
                </article>
              </template>
            </div>

            <!-- Clustered list — pivots rows by (event, target_kind,
                 target_id). Each cluster header shows count + range +
                 latest row's title. Click the row OR the chevron to
                 expand the cluster's individual items inline. Singleton
                 clusters (count===1) skip the expansion affordance and
                 render identically to a flat row. -->
            <div x-show="!notificationsLoading && notifications.length > 0 && notificationsGroupSimilar"
                 class="space-y-2">
              <template x-for="c in notificationClusters()" :key="c.key">
                <article class="notification-row notification-cluster"
                         :class="[
                         (c.unread > 0) ? 'notification-row--unread' : 'notification-row--read',
                         isNotificationClusterExpanded(c.key) ? 'notification-cluster--expanded' : '',
                       ]"
                         :data-severity="c.severity || 'info'">
                  <span :class="notificationDotClass(c.severity)" aria-hidden="true"></span>
                  <div class="notification-row-body">
                    <div class="notification-row-header">
                    <span class="notification-row-title">
                      <span x-text="c.latest.title || c.latest.event || ''"></span>
                      <span x-show="c.count > 1"
                            class="notification-cluster-count"
                            :title="t('notifications.cluster_count_title', { count: c.count })"
                            x-text="'×' + c.count"></span>
                    </span>
                      <span class="notification-row-meta">
                      <span class="fs-xs text-[var(--text-faint)]"
                            x-text="fmtAgo(c.latest_ts * 1000)"></span>
                      <button type="button" x-show="c.unread > 0"
                              @click="markClusterRead(c)"
                              class="btn btn-ghost fs-xs"
                              :title="t('notifications.mark_cluster_read_title', { count: c.unread })"
                              x-text="t('notifications.mark_cluster_read')"></button>
                      <button type="button" x-show="c.count > 1"
                              @click="toggleNotificationCluster(c.key)"
                              class="btn btn-ghost fs-xs notification-cluster-toggle"
                              :aria-expanded="isNotificationClusterExpanded(c.key) ? 'true' : 'false'"
                              :title="isNotificationClusterExpanded(c.key) ? t('notifications.collapse') : t('notifications.expand')"
                              :aria-label="isNotificationClusterExpanded(c.key) ? t('notifications.collapse') : t('notifications.expand')"
                              x-text="isNotificationClusterExpanded(c.key) ? '▴' : '▾'"></button>
                    </span>
                    </div>
                    <div class="notification-row-sub" x-show="c.latest.body" x-text="c.latest.body"></div>
                    <div class="notification-row-footer">
                      <span class="chip" x-show="c.latest.event" x-text="c.latest.event"></span>
                      <span class="fs-xs text-[var(--text-faint)]"
                            x-show="c.latest.actor"
                            x-text="'@' + c.latest.actor"></span>
                      <span class="fs-xs text-[var(--text-faint)]"
                            x-show="c.latest.target_kind && c.latest.target_id"
                            x-text="c.latest.target_kind + ': ' + c.latest.target_id"></span>
                      <span class="fs-xs text-[var(--text-faint)]"
                            x-show="c.count > 1"
                            x-text="t('notifications.cluster_range', {
                            earliest: fmtAgo(c.earliest_ts * 1000),
                            latest: fmtAgo(c.latest_ts * 1000)
                          })"></span>
                    </div>
                    <!-- Expanded items list — only rendered when this
                         cluster's key is in the expansion set. Each
                         sub-row reuses the flat-row markup at a smaller
                         indent so visually they read as "instances of
                         the parent cluster". -->
                    <div class="notification-cluster-items"
                         x-show="isNotificationClusterExpanded(c.key)">
                      <template x-for="n in c.items" :key="n.id">
                        <article class="notification-row notification-cluster-item"
                                 :class="(n.read_at == null) ? 'notification-row--unread' : 'notification-row--read'"
                                 :data-severity="n.severity || 'info'">
                          <span :class="notificationDotClass(n.severity)" aria-hidden="true"></span>
                          <div class="notification-row-body">
                            <div class="notification-row-header">
                              <span class="notification-row-title fs-sm" x-text="n.title || n.event || ''"></span>
                              <span class="notification-row-meta">
                              <span class="fs-xs text-[var(--text-faint)]" x-text="fmtAgo(n.ts * 1000)"></span>
                              <button type="button" x-show="n.read_at == null"
                                      @click="markNotificationRead(n.id)"
                                      class="btn btn-ghost fs-xs"
                                      x-text="t('notifications.mark_read')"></button>
                            </span>
                            </div>
                            <div class="notification-row-sub fs-xs" x-show="n.body" x-text="n.body"></div>
                          </div>
                        </article>
                      </template>
                    </div>
                  </div>
                </article>
              </template>
            </div>
            <!-- Server-side pagination — each Prev / Next click is a
                 fresh /api/notifications fetch with the appropriate
                 offset; the response REPLACES the in-memory list so a
                 fleet with 1000+ notifications never piles them all into
                 the DOM. "Showing items A–B of N" makes the cap visible.
                 Hidden when the total fits in a single page. -->
            <div x-show="!notificationsLoading && notificationsTotal > 0"
                 class="flex items-center justify-between gap-3 pt-3 border-t border-[var(--border)] fs-xs">
            <span class="text-[var(--text-faint)]"
                  x-text="t('notifications.showing_count', {
                            from: (notificationsOffset || 0) + 1,
                            to:   (notificationsOffset || 0) + (notifications.length || 0),
                            total: notificationsTotal,
                            page: notificationsPage(),
                            pages: notificationsPageCount()
                          })"></span>
              <div class="flex items-center gap-1.5"
                   x-show="notificationsTotal > (notificationsLimit || 50)">
                <button type="button" @click="notificationsPrevPage()"
                        :disabled="!notificationsHasPrev() || notificationsLoading"
                        class="btn btn-soft fs-xs"
                        x-text="t('pagination.prev')"></button>
                <button type="button" @click="notificationsNextPage()"
                        :disabled="!notificationsHasNext() || notificationsLoading"
                        class="btn btn-soft fs-xs"
                        x-text="t('pagination.next')"></button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ================== COMMAND PALETTE (Cmd-K / Ctrl-K) ================== -->
  <!-- Universal "go anywhere" search modal. Toggle from anywhere via
       Cmd-K / Ctrl-K (handleHotkey wires both). Pure-client fuzzy
       match against this.hosts / this.items / admin-route map / top-
       level views / hotkeys list. Activation dispatches by the
       result's `kind` (see commandPaletteActivate in app.js).
       Backdrop click + Esc close. ↑/↓ moves selection; Enter
       activates. -->
  <!-- ============== AI ASSISTANT SIDEBAR ============== -->
  <!-- Floating launcher button — visible on the left edge when AI
       is enabled AND the drawer is closed. Hidden while the drawer
       is open (so it doesn't clash with the drawer surface) AND when
       AI is globally disabled (`ai_enabled=false` or no provider
       configured) — visible affordance ≠ available action; pre-fix
       operators clicked the button, typed a question, then learned
       AI was disabled via toast on Send. Per CLAUDE.md "Floating
       launcher visibility-vs-feature gate" rule + the UX review's
       VIS-MED finding. -->
  <button type="button"
          x-show="!aiSidebarOpen && aiSidebarSurfaceEnabled() && !aiSidebarLauncherHidden"
          @click="openAiSidebar()"
          class="ai-sidebar-launcher"
          :title="t('ai_sidebar.launcher_title')"
          :aria-label="t('ai_sidebar.launcher_title')">
    <svg width="18" height="18" aria-hidden="true">
      <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-message-circle'"/>
    </svg>
  </button>
  <!-- Backdrop — click to dismiss. Sits below the drawer
       (z-39 vs z-40) so the drawer is always reachable. -->
  <!-- Backdrop — hidden when sidebar is pinned (no overlay needed
       since the body shrinks via padding-inline-start). -->
  <div x-show="aiSidebarOpen && !aiSidebarPinned"
       x-cloak
       @click="closeAiSidebar()"
       class="ai-sidebar-backdrop"
       aria-hidden="true"></div>
  <!-- Reactive body-class + CSS-var wiring for pin-to-dock — adds
       `body.ai-pinned` whenever the sidebar is pinned so the CSS
       padding-inline-start rule shrinks main content. ALSO stamps
       `--ai-sidebar-width` on document.body so the matching CSS rule
       (`body.ai-pinned { padding-inline-start: var(--ai-sidebar-width) }`)
       reads the operator's actual sidebar width — pre-fix the var was
       set only as inline style on `<aside class="ai-sidebar-drawer">`,
       which CSS variables do NOT cascade sideways from, so the body
       rule always fell through to its 480px fallback. With a custom
       width like 620px, the sidebar was 620px wide but the body
       padding was 480px → 140px overlap → sidebar covered content.
       Same shape as the `_applyDrawerScrollLock` pattern (effect that
       mutates document-level state from a sidebar / drawer signal). -->
  <template x-effect="(() => {
    try {
      const w = ((this.me && this.me.client_config && this.me.client_config.ai_sidebar_width_px) || 480);
      document.body.style.setProperty('--ai-sidebar-width', w + 'px');
      if (this.aiSidebarPinned) document.body.classList.add('ai-pinned');
      else document.body.classList.remove('ai-pinned');
    } catch (_) {}
  })()"></template>
  <!-- Drawer — slides in from the left. Always rendered so the
       slide-in transform animates; visibility controlled via the
       `.open` class. When pinned, `.pinned` overrides the slide
       transform so the bar stays put. -->
  <aside class="ai-sidebar-drawer"
         id="og-ai-sidebar"
         :class="(aiSidebarOpen ? 'open' : '') + (aiSidebarPinned ? ' pinned' : '')"
         role="dialog" aria-modal="true"
         :aria-label="t('ai_sidebar.drawer_label')"
         :aria-hidden="aiSidebarOpen ? 'false' : 'true'"
         :style="'--ai-sidebar-width: ' + (((me && me.client_config && me.client_config.ai_sidebar_width_px) || 480)) + 'px'"
         @keydown="aiSidebarOpen && _focusTrapKeydown($event, $el)">
    <div class="ai-sidebar-header">
      <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
        <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-message-circle'"/>
      </svg>
      <h3 x-text="t('ai_sidebar.title')"></h3>
      <!-- Export buttons — icon-only to keep the sidebar header
           compact. Tooltip + aria-label both carry the localised
           description so screen readers + mouse-hover users still
           get the action name. file-text icon for TXT, braces icon
           for JSON (`{}` reads as JSON universally). -->
      <button type="button"
              @click="exportAiConversation('txt')"
              x-show="aiConversation.length > 0 && (me && me.client_config && me.client_config.ai_conversation_export_enabled !== false)"
              class="btn btn-ghost fs-xs"
              :title="t('ai_sidebar.export_txt_title')"
