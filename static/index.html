                          <section class="host-debug-box" x-show="hasDebugData(hostsDebug[h.id].providers_normalized?.pulse)">
                            <header class="host-debug-box-head">
                              <span class="host-debug-label host-debug-label--pulse" x-text="t('debug_panel.labels.normalized_pulse')"></span>
                              <button type="button" class="host-debug-copy"
                                      @click="copyDebugJson(hostsDebug[h.id].providers_normalized?.pulse, 'debug_panel.labels.normalized_pulse')"
                                      :aria-label="copyAriaLabel('debug_panel.labels.normalized_pulse')"
                                      :title="t('debug_panel.copy_title')">
                                <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/></svg>
                              </button>
                            </header>
                            <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(hostsDebug[h.id].providers_normalized?.pulse)"></pre>
                          </section>
                          <section class="host-debug-box" x-show="hasDebugData(hostsDebug[h.id].providers_normalized?.beszel)">
                            <header class="host-debug-box-head">
                              <span class="host-debug-label host-debug-label--beszel" x-text="t('debug_panel.labels.normalized_beszel')"></span>
                              <button type="button" class="host-debug-copy"
                                      @click="copyDebugJson(hostsDebug[h.id].providers_normalized?.beszel, 'debug_panel.labels.normalized_beszel')"
                                      :aria-label="copyAriaLabel('debug_panel.labels.normalized_beszel')"
                                      :title="t('debug_panel.copy_title')">
                                <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/></svg>
                              </button>
                            </header>
                            <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(hostsDebug[h.id].providers_normalized?.beszel)"></pre>
                          </section>
                          <section class="host-debug-box" x-show="hasDebugData(hostsDebug[h.id].providers_normalized?.node_exporter)">
                            <header class="host-debug-box-head">
                              <span class="host-debug-label host-debug-label--ne" x-text="t('debug_panel.labels.normalized_ne')"></span>
                              <button type="button" class="host-debug-copy"
                                      @click="copyDebugJson(hostsDebug[h.id].providers_normalized?.node_exporter, 'debug_panel.labels.normalized_ne')"
                                      :aria-label="copyAriaLabel('debug_panel.labels.normalized_ne')"
                                      :title="t('debug_panel.copy_title')">
                                <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/></svg>
                              </button>
                            </header>
                            <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(hostsDebug[h.id].providers_normalized?.node_exporter)"></pre>
                          </section>
                          <section class="host-debug-box" x-show="hasDebugData(hostsDebug[h.id].providers_normalized?.webmin)">
                            <header class="host-debug-box-head">
                              <span class="host-debug-label host-debug-label--webmin" x-text="t('debug_panel.labels.normalized_webmin')"></span>
                              <button type="button" class="host-debug-copy"
                                      @click="copyDebugJson(hostsDebug[h.id].providers_normalized?.webmin, 'debug_panel.labels.normalized_webmin')"
                                      :aria-label="copyAriaLabel('debug_panel.labels.normalized_webmin')"
                                      :title="t('debug_panel.copy_title')">
                                <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/></svg>
                              </button>
                            </header>
                            <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(hostsDebug[h.id].providers_normalized?.webmin)"></pre>
                          </section>
                          <section class="host-debug-box" x-show="hasDebugData(hostsDebug[h.id].providers_normalized?.ping)">
                            <header class="host-debug-box-head">
                              <span class="host-debug-label host-debug-label--ping" x-text="t('debug_panel.labels.normalized_ping')"></span>
                              <button type="button" class="host-debug-copy"
                                      @click="copyDebugJson(hostsDebug[h.id].providers_normalized?.ping, 'debug_panel.labels.normalized_ping')"
                                      :aria-label="copyAriaLabel('debug_panel.labels.normalized_ping')"
                                      :title="t('debug_panel.copy_title')">
                                <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/></svg>
                              </button>
                            </header>
                            <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(hostsDebug[h.id].providers_normalized?.ping)"></pre>
                          </section>
                          <section class="host-debug-box" x-show="hasDebugData(hostsDebug[h.id].providers_normalized?.snmp)">
                            <header class="host-debug-box-head">
                              <span class="host-debug-label host-debug-label--snmp" x-text="t('debug_panel.labels.normalized_snmp')"></span>
                              <button type="button" class="host-debug-copy"
                                      @click="copyDebugJson(hostsDebug[h.id].providers_normalized?.snmp, 'debug_panel.labels.normalized_snmp')"
                                      :aria-label="copyAriaLabel('debug_panel.labels.normalized_snmp')"
                                      :title="t('debug_panel.copy_title')">
                                <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/></svg>
                              </button>
                            </header>
                            <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(hostsDebug[h.id].providers_normalized?.snmp)"></pre>
                          </section>
                          <!-- Asset inventory (raw upstream payload).
                               Sourced from the host's `asset` field
                               which is itself the compact shape; the
                               operator wants the FULL upstream row
                               for cross-referencing, so we read from
                               the asset cache by custom_number. -->
                          <section class="host-debug-box host-debug-box--wide" x-show="hasDebugData(rawAssetForHost(h))">
                            <header class="host-debug-box-head">
                              <span class="host-debug-label host-debug-label--merged">Asset (raw)</span>
                              <button type="button" class="host-debug-copy"
                                      @click="copyDebugJson(rawAssetForHost(h), 'debug_panel.labels.asset_raw')"
                                      :aria-label="copyAriaLabel('debug_panel.labels.asset_raw')"
                                      :title="t('debug_panel.copy_title')">
                                <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/></svg>
                              </button>
                            </header>
                            <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(rawAssetForHost(h))"></pre>
                          </section>
                          <!-- Asset inventory (compact shape — what
                               the drawer actually renders). -->
                          <section class="host-debug-box host-debug-box--wide" x-show="hasDebugData(assetForHost(h))">
                            <header class="host-debug-box-head">
                              <span class="host-debug-label host-debug-label--merged">Asset (shape)</span>
                              <button type="button" class="host-debug-copy"
                                      @click="copyDebugJson(assetForHost(h), 'debug_panel.labels.asset_shape')"
                                      :aria-label="copyAriaLabel('debug_panel.labels.asset_shape')"
                                      :title="t('debug_panel.copy_title')">
                                <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/></svg>
                              </button>
                            </header>
                            <pre class="host-debug-json scrollbar" x-text="fmtDebugJson(assetForHost(h))"></pre>
                          </section>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </template>

              <!-- Admin-only SSH card — one-shot command runner against
                   the host resolved from its hosts_config id. Dry-run-
                   first by default; destructive commands raise a typed-
                   hostname confirm before the real run (also enforced
                   backend-side via logic/ssh.command_is_destructive).
                   Visible only when SSH is ENABLED for this host
                   (post-fix opt-in semantics —
                   hosts_config[].ssh.enabled=true). Gate reads
                   `h.ssh_enabled` straight from the row (not
                   sshStatus) so the panel never appears even for a
                   split second before sshStatus loads. -->
              <template x-if="me && me.role === 'admin' && h.ssh_enabled">
                <div class="host-debug-panel">
                  <button type="button"
                          class="host-debug-toggle host-debug-toggle--accent"
                          @click="toggleSshCard(h.id)"
                          :aria-expanded="sshOpen[h.id] ? 'true' : 'false'">
                    <svg width="12" height="12" class="flip-rtl" aria-hidden="true" :style="sshOpen[h.id] ? 'transform: rotate(90deg)' : ''"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/></svg>
                    <svg width="14" height="14" class="host-debug-toggle-icon" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-terminal"/></svg>
                    <span x-text="t('hosts_extra_ssh.card_title')"></span>
                    <span class="host-debug-hint ms-2"
                          x-text="!sshStatus[h.id] ? t('hosts_extra_ssh.status_checking')
                                   : sshStatus[h.id].configured ? t('hosts_extra_ssh.status_ready')
                                   : t('hosts_extra_ssh.status_not_configured')"></span>
                  </button>
                  <div x-show="sshOpen[h.id]" class="host-debug-body"
                       :data-host-section="'ssh-' + h.id">
                    <!-- Resolved target summary -->
                    <div class="host-debug-toolbar">
                      <div class="host-debug-meta">
                        <span x-text="t('hosts_extra_ssh.resolved_label') + ':'"></span>
                        <span class="host-debug-tag mono"
                              x-text="sshStatus[h.id] && sshStatus[h.id].resolved
                                       ? (sshStatus[h.id].resolved.user || '?') + '@' + (sshStatus[h.id].resolved.host || h.id) + ':' + (sshStatus[h.id].resolved.port || 22)
                                       : h.id"></span>
                        <span x-show="sshStatus[h.id] && sshStatus[h.id].resolved && sshStatus[h.id].resolved.key_fingerprint"
                              class="host-debug-tag mono"
                              :title="t('hosts_extra_ssh.fingerprint_label')"
                              x-text="'SHA256:' + (sshStatus[h.id] && sshStatus[h.id].resolved && sshStatus[h.id].resolved.key_fingerprint || '')"></span>
                        <span x-show="sshStatus[h.id] && !sshStatus[h.id].configured"
                              class="host-debug-tag host-debug-tag--warn"
                              x-text="t('hosts_extra_ssh.fingerprint_empty')"></span>
                      </div>
                      <div class="flex items-center gap-2">
                        <button type="button" class="btn btn-ghost text-[11px]"
                                @click="testSshConnection(h.id)"
                                :disabled="!!sshTestBusy[h.id]"
                                x-text="sshTestBusy[h.id] ? t('hosts_extra_ssh.running') : t('hosts_extra_ssh.test_button')"></button>
                        <!-- Interactive PTY terminal modal. Admin-only,
                             same gating as the rest of the SSH card. Disabled until
                             SSH is configured + the host is up — same rules as the
                             one-shot Run button. Styled as a primary action with
                             an icon so it reads as a clickable button, not a link. -->
                        <button type="button"
                                class="btn btn-primary text-[11.5px] flex items-center gap-1.5"
                                @click="openHostTerminal(h)"
                                :disabled="!(sshStatus[h.id] && sshStatus[h.id].configured) || !isSshAllowed(h)"
                                :title="!isSshAllowed(h) ? sshDisabledReason(h) : t('hosts_extra_ssh.terminal.open_button_hint')">
                          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                               stroke="currentColor" stroke-width="2"
                               stroke-linecap="round" stroke-linejoin="round"
                               aria-hidden="true">
                            <polyline points="4 17 10 11 4 5"/>
                            <line x1="12" y1="19" x2="20" y2="19"/>
                          </svg>
                          <span x-text="t('hosts_extra_ssh.terminal.open_button')"></span>
                        </button>
                      </div>
                    </div>

                    <!-- Common actions — ALL driven by Admin → SSH
                         custom actions. Clicking a preset drops the
                         rendered command (with `{host}` substituted)
                         into the textarea below so the operator can
                         review and edit before hitting Run. -->
                    <div class="mb-3"
                         x-show="(sshSettings.custom_actions || []).length > 0">
                      <div class="text-[11px] text-[var(--text-faint)] mb-1.5"
                           x-text="t('hosts_extra_ssh.common_actions_label')"></div>
                      <div class="flex flex-wrap gap-2">
                        <template x-for="(action, idx) in (sshSettings.custom_actions || [])"
                                  :key="action.id || ('a' + idx)">
                          <button type="button" class="btn btn-soft text-[11.5px]"
                                  @click="runSshCustomAction(h.id, action)"
                                  :disabled="!isSshAllowed(h)"
                                  :title="isSshAllowed(h) ? action.command : sshDisabledReason(h)"
                                  x-text="action.title"></button>
                        </template>
                      </div>
                    </div>

                    <!-- Custom command + dry-run + Run button. -->
                    <div class="mb-3">
                      <label class="block text-[11px] text-[var(--text-faint)] mb-1"
                             x-text="t('hosts_extra_ssh.custom_label')"></label>
                      <textarea :value="sshCommand[h.id] || ''"
                                @input="sshCommand = Object.assign({}, sshCommand, { [h.id]: $event.target.value })"
                                :disabled="!(sshStatus[h.id] && sshStatus[h.id].configured) || !isSshAllowed(h)"
                                :title="!isSshAllowed(h) ? sshDisabledReason(h) : ''"
                                rows="6" maxlength="4096"
                                class="w-full mono text-[11.5px] py-2 scrollbar"
                                style="min-height: 7rem; resize: vertical;"
                                :placeholder="t('hosts_extra_ssh.custom_placeholder')"></textarea>
                      <div class="flex items-center gap-3 flex-wrap mt-2">
                        <label class="inline-flex items-center gap-2 text-[11.5px] text-[var(--text-dim)]">
                          <input type="checkbox"
                                 :checked="sshDryRun[h.id] === true"
                                 @change="sshDryRun = Object.assign({}, sshDryRun, { [h.id]: $event.target.checked })">
                          <span x-text="t('hosts_extra_ssh.dry_run_label')"></span>
                        </label>
                        <button type="button"
                                class="btn btn-primary text-[12px]"
                                @click="runSshCommand(h.id)"
                                :disabled="!!sshBusy[h.id] || !(sshStatus[h.id] && sshStatus[h.id].configured) || !((sshCommand[h.id] || '').trim()) || !isSshAllowed(h)"
                                :title="!isSshAllowed(h) ? sshDisabledReason(h) : ''">
                          <span x-show="!sshBusy[h.id]" x-text="t('hosts_extra_ssh.run_button')"></span>
                          <span x-show="!!sshBusy[h.id]" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('hosts_extra_ssh.running')"></span></span>
                        </button>
                        <span x-show="!isSshAllowed(h)"
                              class="text-[11px] text-[var(--warning)]"
                              x-text="sshDisabledReason(h)"></span>
                      </div>
                    </div>

                    <!-- Result pane — exit, stdout, stderr, duration,
                         copy. Shown only after at least one run. -->
                    <template x-if="sshResult[h.id]">
                      <div class="host-debug-box">
                        <header class="host-debug-box-head">
                          <span class="host-debug-label"
                                x-text="t('hosts_extra_ssh.result_exit') + ': ' + (sshResult[h.id].exit_code == null ? '—' : sshResult[h.id].exit_code)"></span>
                          <span class="host-debug-hint"
                                x-text="t('hosts_extra_ssh.result_duration') + ': ' + (sshResult[h.id].duration_ms || 0) + 'ms' + (sshResult[h.id].dry_run ? ' · dry-run' : '')"></span>
                          <button type="button" class="host-debug-copy"
                                  @click="copySshOutput(h.id)"
                                  :aria-label="t('hosts_extra_ssh.result_copy')"
                                  :title="t('hosts_extra_ssh.result_copy')">
                            <svg width="12" height="12" aria-hidden="true"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-copy"/></svg>
                          </button>
                        </header>
                        <div x-show="sshResult[h.id].error" class="host-debug-error"
                             x-text="sshResult[h.id].error"></div>
                        <div x-show="sshResult[h.id].stdout" class="px-3 pt-2 text-[10.5px] text-[var(--text-faint)]"
                             x-text="t('hosts_extra_ssh.result_stdout')"></div>
                        <pre x-show="sshResult[h.id].stdout" class="host-debug-json scrollbar"
                             x-text="sshResult[h.id].stdout"></pre>
                        <div x-show="sshResult[h.id].stderr" class="px-3 pt-2 text-[10.5px] text-[var(--danger)]"
                             x-text="t('hosts_extra_ssh.result_stderr')"></div>
                        <pre x-show="sshResult[h.id].stderr" class="host-debug-json scrollbar ssh-result-stderr"
                             x-text="sshResult[h.id].stderr"></pre>
                      </div>
                    </template>
                  </div>
                </div>
              </template>

            </div>
      </div>
    </template>
  </template>

  <!-- ================== NODE DRAWER ================== -->
  <!-- Per-node config: Beszel system-name alias, etc. Opens from the
       Nodes view's "Settings" button. Same slide-in pattern as the
       item drawer. Settings save calls POST /api/settings with a
       merged beszel_aliases object so other nodes' entries are kept. -->
  <div x-show="drawerNode" class="fixed inset-0 z-40 fade-in">
    <div @click="drawerNode=null" class="absolute inset-0 backdrop"></div>
    <aside x-show="drawerNode"
           role="dialog" aria-modal="true"
           :aria-label="drawerNode && drawerNode.name ? t('nodes.beszel.alias_section_title') + ' — ' + drawerNode.name : t('nodes.beszel.alias_section_title')"
           class="absolute inset-y-0 right-0 w-full md:w-[460px] bg-[var(--surface)] border-l border-[var(--border)] overflow-y-auto scrollbar slide-in">
      <template x-if="drawerNode">
        <div class="p-5">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <div class="text-[10.5px] uppercase tracking-wider text-[var(--text-faint)]" x-text="t('nodes.beszel.drawer_kicker')"></div>
              <h2 class="text-[17px] font-semibold mt-1 mono break-all" x-text="drawerNode.name"></h2>
            </div>
            <button @click="drawerNode=null" class="btn btn-ghost text-base leading-none"
                    :aria-label="t('actions.close')">✕</button>
          </div>

          <div class="mt-5 space-y-5">
            <!-- Beszel alias editor -->
            <section>
              <h3 class="text-[12px] uppercase tracking-wider text-[var(--text-dim)] mb-2"
                  x-text="t('nodes.beszel.alias_section_title')"></h3>
              <p class="text-[12px] text-[var(--text-faint)] mb-3 leading-snug"
                 x-html="t('nodes.beszel.alias_section_desc')"></p>
              <label class="block text-[11px] text-[var(--text-dim)] mb-1" for="node-beszel-alias"
                     x-text="t('nodes.beszel.alias_input_label')"></label>
              <input id="node-beszel-alias"
                     type="text"
                     class="input w-full"
                     :placeholder="drawerNode.name"
                     x-model="drawerNode.aliasInput"
                     @keydown.enter="saveNodeBeszelMapping()">
              <div class="flex items-center gap-2 mt-3">
                <button class="btn btn-primary text-[12px]"
                        :disabled="drawerNodeSaving"
                        @click="saveNodeBeszelMapping()">
                  <span x-show="!drawerNodeSaving" x-text="t('actions.save')"></span>
                  <span x-show="drawerNodeSaving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving')"></span></span>
                </button>
                <button class="btn btn-ghost text-[12px]" @click="drawerNode=null" x-text="t('actions.cancel')"></button>
              </div>
            </section>
          </div>
        </div>
      </template>
    </aside>
  </div>

  <!-- ================== DETAIL DRAWER ================== -->
  <div x-show="drawerItem" class="fixed inset-0 z-40 fade-in">
    <div @click="drawerItem=null" class="absolute inset-0 backdrop"></div>
    <aside x-show="drawerItem"
           role="dialog" aria-modal="true"
           :aria-label="drawerItem && drawerItem.name ? drawerItem.name : t('item.drawer_title')"
           class="absolute inset-y-0 right-0 w-full md:w-[500px] bg-[var(--surface)] border-l border-[var(--border)] overflow-y-auto scrollbar slide-in">
      <template x-if="drawerItem">
        <div class="p-5">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0 flex-1">
              <div class="flex items-center gap-1.5 flex-wrap">
                <span class="chip" x-text="drawerItem.type"></span>
                <span class="pill" :class="'pill-' + (drawerItem.health || 'unknown')" x-text="drawerItem.health || '—'"></span>
                <span class="pill" :class="'pill-' + statusKey(drawerItem.status)" x-text="drawerItem.status"></span>
              </div>
              <h2 class="text-[17px] font-semibold mt-2 mono break-all" x-text="drawerItem.name"></h2>
              <div class="mono text-[11.5px] text-[var(--text-dim)] break-all mt-1">
                <span x-text="imageRepo(drawerItem)"></span><span class="text-[var(--text-faint)]">:</span><span x-text="drawerItem.tag"></span>
              </div>
            </div>
            <button @click="drawerItem=null" class="btn btn-ghost text-base leading-none"
                    :aria-label="t('actions.close')">✕</button>
          </div>

          <div class="mt-5 space-y-2">
            <button x-show="isAdmin() && drawerItem.status==='update' && canUpdate(drawerItem)"
                    @click="itemAction(drawerItem)"
                    :disabled="isItemBusy(drawerItem)"
                    class="w-full btn btn-warning justify-center py-2.5 text-[13px]">
              <template x-if="isItemBusy(drawerItem)"><span class="flex items-center gap-2"><span class="spin"></span><span x-text="t('actions.updating')"></span></span></template>
              <template x-if="!isItemBusy(drawerItem)"><span><span x-text="t('drawer.restart_flash')"></span> <span x-text="actionLabel(drawerItem)"></span></span></template>
            </button>
            <div x-show="isAdmin() && drawerItem.status==='update' && !canUpdate(drawerItem)"
                 class="w-full bg-[var(--surface-2)] border border-[var(--warning)]/30 rounded-md p-3 text-[11.5px] text-warning"
                 x-text="t('drawer.external_warning')"></div>
            <div class="grid grid-cols-2 gap-2">
              <button x-show="isAdmin() && isRestartable(drawerItem)"
                      @click="restartItem(drawerItem)"
                      :disabled="isRestartBusy(drawerItem)"
                      class="btn btn-soft justify-center text-[12px]">
                <template x-if="isRestartBusy(drawerItem)"><span class="flex items-center gap-1.5"><span class="spin"></span><span x-text="t('actions.restarting')"></span></span></template>
                <template x-if="!isRestartBusy(drawerItem)"><span x-text="t('drawer.restart')"></span></template>
              </button>
              <button x-show="isAdmin() && drawerItem.removable"
                      @click="removeContainer(drawerItem)"
                      :disabled="isItemBusy(drawerItem)"
                      class="btn btn-danger-outline justify-center text-[12px]"
                      x-text="t('drawer.remove_container')"></button>
              <button x-show="isAdmin()" @click="toggleIgnore(drawerItem)"
                      class="btn btn-soft justify-center text-[12px]"
                      x-text="drawerItem.ignored ? t('drawer.unignore') : t('drawer.ignore')"></button>
              <!-- Switch-to-:latest — for stack-managed items pinned
                   to a version tag. Mutates the compose file's image:
                   line via the standard update path so Portainer pulls
                   `:latest` next deploy. Hidden when the image already
                   tracks `:latest` (or has no tag, i.e. defaults to
                   `:latest` already). -->
              <button x-show="isAdmin() && canRetagToLatest(drawerItem)"
                      @click="retagStackToLatest(drawerItem)"
                      :disabled="isItemBusy(drawerItem)"
                      class="btn btn-soft justify-center text-[12px]"
                      :title="t('drawer.retag_latest_title')"
                      x-text="t('drawer.retag_latest')"></button>
              <a x-show="drawerItem.stack_id"
                 :href="portainerDeepLink(drawerItem)" target="_blank"
                 class="btn btn-soft justify-center text-[12px] text-center" x-text="t('drawer.portainer')"></a>
              <a x-show="drawerItem.hub_link"
                 :href="drawerItem.hub_link" target="_blank"
                 class="btn btn-soft justify-center text-[12px] text-center" x-text="t('drawer.registry')"></a>
            </div>
          </div>

          <div class="mt-6 space-y-4">
            <div x-show="drawerItem.stack">
              <div class="text-[10px] text-[var(--text-faint)] uppercase tracking-wider" x-text="t('drawer.stack')"></div>
              <div class="mono mt-1 text-[13px]" x-text="drawerItem.stack"></div>
            </div>
            <div>
              <div class="text-[10px] text-[var(--text-faint)] uppercase tracking-wider" x-text="t('drawer.replicas')"></div>
              <div class="mt-1">
                <span class="text-[16px] font-semibold mono"
                      :class="(drawerItem.replicas.running < drawerItem.replicas.desired) ? 'text-[var(--warning)]' : 'text-[var(--success)]'"
                      x-text="drawerItem.replicas.running + ' / ' + drawerItem.replicas.desired"></span>
                <span x-show="drawerItem.replicas.running < drawerItem.replicas.desired" class="text-[11px] ms-2 text-warning" x-text="t('drawer.degraded_note')"></span>
                <span x-show="drawerItem.replicas.running === drawerItem.replicas.desired && drawerItem.replicas.desired > 0" class="text-[11px] ms-2 text-success" x-text="t('drawer.healthy_note')"></span>
                <span x-show="drawerItem.replicas.desired === 0 || drawerItem.replicas.running === 0" class="text-[11px] ms-2 text-faint" x-text="t('drawer.offline_note')"></span>
              </div>
            </div>
            <div x-show="drawerItem.placements && drawerItem.placements.length">
              <div class="text-[10px] text-[var(--text-faint)] uppercase tracking-wider" x-text="t('drawer.placement')"></div>
              <div class="mt-1 space-y-1">
                <template x-for="(p,i) in drawerItem.placements" :key="i">
                  <div class="text-[12.5px] mono flex items-center gap-2 flex-wrap">
                    <span class="dot" :class="p.state==='running' ? 'dot-ok' : p.state==='failed' ? 'dot-error' : 'dot-unknown'"></span>
                    <span class="font-medium" x-text="p.node"></span>
                    <span class="text-[var(--text-faint)] text-[11px]" x-text="p.state || '—'"></span>
                    <span x-show="p.err" class="text-[var(--danger)] text-[11px] truncate" :title="p.err" x-text="p.err"></span>
                  </div>
                </template>
              </div>
            </div>
            <div x-show="drawerItem.current_digest">
              <div class="text-[10px] text-[var(--text-faint)] uppercase tracking-wider flex justify-between">
                <span x-text="t('drawer.local_digest')"></span>
                <button @click="copy(drawerItem.current_digest)" class="hover:text-[var(--text)]" x-text="t('drawer.copy')"></button>
              </div>
              <div class="mono text-[10.5px] break-all mt-1 text-[var(--text-dim)]" x-text="drawerItem.current_digest"></div>
            </div>
            <div x-show="drawerItem.remote_digest">
              <div class="text-[10px] text-[var(--text-faint)] uppercase tracking-wider flex justify-between">
                <span x-text="t('drawer.remote_digest')"></span>
                <button @click="copy(drawerItem.remote_digest)" class="hover:text-[var(--text)]" x-text="t('drawer.copy')"></button>
              </div>
              <div class="mono text-[10.5px] break-all mt-1"
                   :class="drawerItem.status==='update' ? 'text-[var(--warning)]' : 'text-[var(--text-dim)]'"
                   x-text="drawerItem.remote_digest"></div>
            </div>
            <div x-show="drawerItem.updated">
              <div class="text-[10px] text-[var(--text-faint)] uppercase tracking-wider" x-text="t('drawer.last_updated')"></div>
              <div class="mt-1 text-[12px] mono" x-text="drawerItem.updated"></div>
            </div>
          </div>
        </div>
      </template>
    </aside>
  </div>

  <!-- ================== NEW-TOKEN REVEAL MODAL ================== -->
  <div x-show="lastCreatedToken" class="fixed inset-0 z-50 fade-in">
    <div class="absolute inset-0 backdrop-strong"></div>
    <div class="relative flex items-center justify-center p-4 h-full overflow-auto scrollbar">
      <div class="bg-[var(--surface)] border border-[var(--border)] rounded-md max-w-lg w-full"
           role="dialog" aria-modal="true" :aria-label="t('admin.token_modal.title')">
        <div class="p-4 border-b border-[var(--border)]">
          <h2 class="text-[15px] font-semibold" x-text="t('admin.token_modal.title')"></h2>
          <p class="text-[11.5px] text-[var(--text-faint)] mt-0.5" x-text="t('admin.token_modal.hint')"></p>
        </div>
        <div class="p-5 space-y-3">
          <div>
            <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('admin.token_modal.name')"></label>
            <div class="bg-[var(--surface-2)] rounded-md px-3 py-2 text-[13px]"
                 x-text="lastCreatedToken && lastCreatedToken.name"></div>
          </div>
          <div>
            <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-text="t('admin.token_modal.role')"></label>
            <div class="bg-[var(--surface-2)] rounded-md px-3 py-2 text-[13px]"
                 x-text="lastCreatedToken && lastCreatedToken.role"></div>
          </div>
          <div>
            <label class="block text-[11px] text-[var(--text-dim)] mb-1" x-html="t('admin.token_modal.token_label')"></label>
            <div class="flex items-stretch gap-2">
              <input type="text" readonly
                     :value="lastCreatedToken && lastCreatedToken.token"
                     class="mono text-[12px] flex-1"
                     onclick="this.select()">
              <button @click="copyToClipboard(lastCreatedToken.token)"
                      class="btn btn-soft text-[12px] whitespace-nowrap" x-text="t('settings.oidc.copy')"></button>
            </div>
          </div>
        </div>
        <div class="p-4 border-t border-[var(--border)] flex justify-end">

  <!-- ================== NOTIFICATION TEMPLATE EDITOR / VIEWER ==================
       Admin-only edit modal (writable) + Profile-side viewer (read-only)
       for per-event notification templates. Both modes share the same
       markup; mode is gated on `notifyTemplateEditor.readOnly`. Open
       via `openNotifyTemplateEditor(event)` (admin) or
       `openNotifyTemplateViewer(event)` (read-only). Esc / backdrop
       click closes; live preview pane debounces keystrokes by 200ms. -->
  <div x-show="notifyTemplateEditor.open" class="fixed inset-0 z-50 fade-in" x-cloak>
    <div @click="closeNotifyTemplateEditor()" class="absolute inset-0 backdrop-strong"></div>
    <div class="relative flex items-start justify-center p-4 h-full overflow-auto scrollbar"
         role="dialog" aria-modal="true"
         :aria-label="notifyTemplateEditor.readOnly ? t('profile.notify_templates.modal_title') : t('admin.notify_templates.modal_title')"
         @keydown.escape.window="closeNotifyTemplateEditor()">
      <div class="bg-[var(--surface)] border border-[var(--border)] rounded-md max-w-3xl w-full max-h-[90vh] overflow-y-auto scrollbar mt-[5vh]">
        <!-- Sticky header — title + reset link + close. -->
        <div class="p-4 border-b border-[var(--border)] flex justify-between items-start gap-3 sticky top-0 bg-[var(--surface)] z-10">
          <div class="min-w-0 flex-1">
            <h2 class="text-[15px] font-semibold flex items-center gap-2 flex-wrap">
              <span x-text="notifyTemplateEditor.readOnly ? t('profile.notify_templates.modal_title') : t('admin.notify_templates.modal_title')"></span>
              <span class="chip pill-info text-[10.5px]"
                    x-text="(notifyTemplateEvent && notifyTemplateEvent.label) ? t('admin.notifications.events.' + notifyTemplateEvent.label) : ''"
                    x-show="notifyTemplateEvent && notifyTemplateEvent.label"></span>
            </h2>
            <p class="text-[11.5px] text-[var(--text-faint)] mt-0.5"
               x-text="notifyTemplateEditor.readOnly ? t('profile.notify_templates.modal_subtitle') : t('admin.notify_templates.modal_subtitle')"></p>
          </div>
          <div class="flex items-center gap-2">
            <!-- Reset link — admin only, enabled only when current
                 differs from default. -->
            <button type="button"
                    x-show="!notifyTemplateEditor.readOnly"
                    :disabled="!notifyTemplateEditorIsDirty()"
                    @click="resetNotifyTemplateEditor()"
                    class="btn btn-ghost text-[11.5px]"
                    x-text="t('admin.notify_templates.reset_to_default')"></button>
            <button @click="closeNotifyTemplateEditor()" class="btn btn-ghost"
                    :aria-label="t('actions.close')">✕</button>
          </div>
        </div>

        <div class="p-5 space-y-4" x-show="notifyTemplateEditor.event">
          <!-- Title editor + chip strip. -->
          <div>
            <label class="block text-[11.5px] font-medium text-[var(--text-dim)] mb-1.5"
                   x-text="t('admin.notify_templates.title_label')"></label>
            <template x-if="!notifyTemplateEditor.readOnly">
              <input type="text"
                     x-ref="notifyTemplateTitleInput"
                     x-model="notifyTemplateEditor.title"
                     :placeholder="notifyTemplateEditor.title_default"
                     @input.debounce.200ms="refreshNotifyTemplatePreview()"
                     class="w-full mono text-[12.5px]">
            </template>
            <template x-if="notifyTemplateEditor.readOnly">
              <pre class="bg-[var(--surface-2)] rounded-md px-3 py-2 text-[12.5px] whitespace-pre-wrap break-words mono"
                   x-text="notifyTemplateEditor.title || notifyTemplateEditor.title_default"></pre>
            </template>
            <!-- Inline chip strip for inserting placeholders into the
                 title. Click → insert at the current caret position via
                 insertNotifyTemplatePlaceholder. -->
            <div x-show="!notifyTemplateEditor.readOnly"
                 class="flex flex-wrap gap-1.5 mt-2 items-center">
              <span class="text-[10.5px] text-[var(--text-faint)] me-1"
                    x-text="t('admin.notify_templates.chip_strip_label')"></span>
              <template x-for="ph in notifyTemplateEditor.available_placeholders" :key="'title-chip-' + ph">
                <button type="button"
                        @click="insertNotifyTemplatePlaceholder('title', ph)"
                        class="chip pill-info text-[11px] mono cursor-pointer"
                        :title="t('admin.notify_templates.placeholder_help.' + ph) + ' → ' + (notifyTemplateEditor.samples[ph] || '')"
                        x-text="'{' + ph + '}'"></button>
              </template>
            </div>
          </div>

          <!-- Body editor. -->
          <div>
            <label class="block text-[11.5px] font-medium text-[var(--text-dim)] mb-1.5"
                   x-text="t('admin.notify_templates.body_label')"></label>
            <template x-if="!notifyTemplateEditor.readOnly">
              <textarea x-ref="notifyTemplateBodyInput"
                        x-model="notifyTemplateEditor.body"
                        :placeholder="notifyTemplateEditor.body_default"
                        @input.debounce.200ms="refreshNotifyTemplatePreview()"
                        rows="6"
                        class="w-full mono text-[12.5px]"></textarea>
            </template>
            <template x-if="notifyTemplateEditor.readOnly">
              <pre class="bg-[var(--surface-2)] rounded-md px-3 py-2 text-[12.5px] whitespace-pre-wrap break-words mono"
                   x-text="notifyTemplateEditor.body || notifyTemplateEditor.body_default || t('admin.notify_templates.body_empty_hint')"></pre>
            </template>
            <div x-show="!notifyTemplateEditor.readOnly"
                 class="flex flex-wrap gap-1.5 mt-2 items-center">
              <span class="text-[10.5px] text-[var(--text-faint)] me-1"
                    x-text="t('admin.notify_templates.chip_strip_label')"></span>
              <template x-for="ph in notifyTemplateEditor.available_placeholders" :key="'body-chip-' + ph">
                <button type="button"
                        @click="insertNotifyTemplatePlaceholder('body', ph)"
                        class="chip pill-info text-[11px] mono cursor-pointer"
                        :title="t('admin.notify_templates.placeholder_help.' + ph) + ' → ' + (notifyTemplateEditor.samples[ph] || '')"
                        x-text="'{' + ph + '}'"></button>
              </template>
            </div>
          </div>

          <!-- Live preview pane. -->
          <div class="border-t border-[var(--border)] pt-3">
            <div class="flex items-center justify-between gap-2 mb-1.5">
              <label class="text-[11.5px] font-medium text-[var(--text-dim)]"
                     x-text="t('admin.notify_templates.preview_label')"></label>
              <span class="text-[10.5px] text-[var(--text-faint)]"
                    x-text="t('admin.notify_templates.preview_sample_hint')"></span>
            </div>
            <div class="bg-[var(--surface-2)] rounded-md px-3 py-2 space-y-1.5">
              <div class="text-[12.5px] font-semibold text-[var(--text)]"
                   x-text="notifyTemplateEditor.preview.rendered_title || notifyTemplateEditor.title_default"></div>
              <div class="text-[12px] text-[var(--text-dim)] whitespace-pre-wrap break-words"
                   x-text="notifyTemplateEditor.preview.rendered_body || notifyTemplateEditor.body_default || t('admin.notify_templates.body_empty_hint')"></div>
            </div>
            <!-- Unknown-placeholder warning. -->
            <div x-show="(notifyTemplateEditor.preview.unknown_placeholders || []).length > 0"
                 class="text-[11px] text-[var(--warning)] mt-1.5 flex items-start gap-1.5">
              <svg width="11" height="11" aria-hidden="true" class="flex-shrink-0 mt-0.5"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-alert-triangle"/></svg>
              <span>
                <span x-text="t('admin.notify_templates.unknown_placeholder_warning')"></span>
                <span class="mono" x-text="(notifyTemplateEditor.preview.unknown_placeholders || []).map(p => '{' + p + '}').join(', ')"></span>
              </span>
            </div>
          </div>

          <!-- Read-only viewer note. -->
          <div x-show="notifyTemplateEditor.readOnly"
               class="text-[11px] text-[var(--text-faint)] italic"
               x-text="t('profile.notify_templates.readonly_note')"></div>
        </div>

        <!-- Footer — Save / Send test (admin) OR Close-only (read-only). -->
        <div class="p-4 border-t border-[var(--border)] flex items-center gap-2 flex-wrap sticky bottom-0 bg-[var(--surface)]">
          <template x-if="!notifyTemplateEditor.readOnly">
            <div class="flex items-center gap-2 flex-wrap">
              <button @click="saveNotifyTemplate()"
                      :disabled="notifyTemplateEditor.saving || !notifyTemplateEditorIsDirty()"
                      :class="notifyTemplateEditorIsDirty() ? 'ring-2 ring-[var(--warning)]' : ''"
                      class="btn btn-primary text-[12px]">
                <span x-show="!notifyTemplateEditor.saving" x-text="t('actions.save')"></span>
                <span x-show="notifyTemplateEditor.saving" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving')"></span></span>
              </button>
              <button @click="testNotifyTemplate()"
                      :disabled="notifyTemplateEditor.testing"
                      class="btn btn-soft text-[12px]">
                <span x-show="!notifyTemplateEditor.testing" x-text="t('admin.notify_templates.send_test')"></span>
                <span x-show="notifyTemplateEditor.testing" class="flex items-center gap-1"><span class="spin"></span><span x-text="t('actions.saving')"></span></span>
              </button>
              <span x-show="notifyTemplateEditorIsDirty()"
                    class="text-[11.5px] text-[var(--warning)] flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-[var(--warning)] animate-pulse"></span>
                <span x-text="t('hosts_actions.unsaved_label')"></span>
              </span>
            </div>
          </template>
          <button @click="closeNotifyTemplateEditor()"
                  class="btn btn-soft text-[12px] ms-auto"
                  x-text="t('actions.close')"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- ================== NOTIFICATIONS POPUP ==================
       In-app notifications surface. Operators wanted a quick
       check + dismiss without losing their place on whatever view they
       were on, so this is a modal overlay (same pattern as the hotkeys
       modal below) rather than a top-level view. Click the avatar →
       Notifications to open; backdrop click or Esc closes. SSE keeps
       the list current while open; 30s polling fallback otherwise. -->
  <div x-show="showNotificationsPopup" class="fixed inset-0 z-50 fade-in" x-cloak>
    <div @click="showNotificationsPopup=false" class="absolute inset-0 backdrop-strong"></div>
    <div class="relative flex items-start justify-center p-4 h-full overflow-auto scrollbar"
         role="dialog" aria-modal="true" :aria-label="t('notifications.heading')"
         @keydown.escape.window="showNotificationsPopup=false">
      <div class="bg-[var(--surface)] border border-[var(--border)] rounded-md max-w-3xl w-full max-h-[90vh] overflow-y-auto scrollbar mt-[5vh]">
        <div class="p-4 border-b border-[var(--border)] flex justify-between items-center sticky top-0 bg-[var(--surface)] z-10">
          <div>
            <h2 class="text-[15px] font-semibold" x-text="t('notifications.heading')"></h2>
            <div class="text-[11px] text-[var(--text-faint)] mt-0.5">
              <span x-text="t('notifications.unread_count', { count: notificationsUnread })"></span>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <!-- Reload icon (circular arrows) — matches the refresh
                 affordance the operator already recognises from the
                 stacks toolbar / drawer chart-grid. SVG sits inside
                 the button alongside an `aria-label` so screen
                 readers announce the action. -->
            <button @click="loadNotifications()"
                    :disabled="notificationsLoading"
                    class="btn btn-ghost text-[12px] inline-flex items-center gap-1.5"
                    :aria-label="t('actions.reload')" :title="t('actions.reload')">
              <svg width="14" height="14" aria-hidden="true"
                   :class="notificationsLoading ? 'animate-spin' : ''"><use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-ccw"/></svg>
              <span x-show="!notificationsLoading" x-text="t('actions.reload')"></span>
              <span x-show="notificationsLoading" x-text="t('actions.reloading')"></span>
            </button>
            <button @click="markAllNotificationsRead()" class="btn btn-soft text-[12px]"
                    :disabled="(notificationsUnread || 0) === 0"
                    x-text="t('notifications.mark_all_read')"></button>
            <button @click="showNotificationsPopup=false" class="btn btn-ghost"
                    :aria-label="t('actions.close')">✕</button>
          </div>
        </div>

        <!-- Filter bar — lives INSIDE the sticky header (not the
             scrolling body) so severity / event / unread-only stay
             visible as the operator pages through long lists. The
             severity radiogroup uses ARIA `radiogroup` per CLAUDE.md
             "Filter chips need aria-pressed when used as toggles" —
             radio semantic because the choices are mutually exclusive
             (one severity at a time, NOT multi-select). -->
        <div class="px-4 py-3 border-b border-[var(--border)] sticky top-[57px] bg-[var(--surface)] z-10 flex flex-wrap gap-2 items-center text-[12px]">
          <span class="text-[var(--text-faint)]" x-text="t('notifications.filter_severity')"></span>
          <div role="radiogroup" :aria-label="t('notifications.filter_severity')" class="flex gap-1">
            <!-- Per-severity colouring: each chip carries the brand
                 pill class for its severity (info/success/warning/error)
                 so operators see at a glance which filter is which.
                 The "all" chip stays neutral. The currently-selected
                 chip layers `chip-active` on top — adds a leading dot
                 + thin border in the chip's own colour + bold label so
                 the active state is unmissable but visually subtle. -->
            <template x-for="sev in ['all','info','success','warning','error']" :key="sev">
              <button role="radio" :aria-checked="notificationsFilterSeverity === sev"
                      @click="notificationsFilterSeverity = sev; loadNotifications()"
                      :class="[
                        'chip',
                        sev === 'info' ? 'pill-info' : (sev === 'success' ? 'pill-ok' : (sev === 'warning' ? 'pill-update' : (sev === 'error' ? 'pill-error' : ''))),
                        notificationsFilterSeverity === sev ? 'chip-active' : ''
                      ]"
                      x-text="sev === 'all' ? t('filters.all') : t('notifications.severity.' + sev)"></button>
            </template>
          </div>

          <span class="text-[var(--text-faint)] ms-2" x-text="t('notifications.filter_event')"></span>
          <select x-model="notificationsFilterEvent" @change="loadNotifications()"
                  class="text-[12px]">
            <option value="all" x-text="t('filters.all')"></option>
            <template x-for="ev in notificationEventOptions()" :key="ev">
              <option :value="ev" x-text="ev"></option>
            </template>
          </select>

          <label class="ms-2 inline-flex items-center gap-1">
            <input type="checkbox" x-model="notificationsFilterUnread"
                   @change="loadNotifications()">
            <span x-text="t('notifications.filter_unread_only')"></span>
          </label>
        </div>

        <div class="p-4 space-y-3">
          <div x-show="notificationsLoading" class="loading-state">
            <span class="spin-lg" aria-hidden="true"></span>
            <span x-text="t('loading.section')"></span>
          </div>

          <div x-show="!notificationsLoading && notifications.length === 0"
               class="text-center py-16 text-[var(--text-faint)] text-sm"
               x-text="t('notifications.empty')"></div>

          <div x-show="!notificationsLoading && notifications.length > 0"
               class="space-y-2">
            <template x-for="n in notifications" :key="n.id">
              <article class="notification-row"
                       :class="(n.read_at == null) ? 'notification-row--unread' : 'notification-row--read'"
                       :data-severity="n.severity || 'info'">
                <span :class="notificationDotClass(n.severity)" aria-hidden="true"></span>
                <div class="notification-row-body">
                  <div class="notification-row-header">
                    <span class="notification-row-title" x-text="n.title || n.event || ''"></span>
                    <span class="notification-row-meta">
                      <span class="text-[11px] text-[var(--text-faint)]" x-text="fmtAgo(n.ts * 1000)"></span>
                      <button x-show="n.read_at == null"
                              @click="markNotificationRead(n.id)"
                              class="btn btn-ghost text-[11px]"
                              x-text="t('notifications.mark_read')"></button>
                    </span>
                  </div>
                  <div class="notification-row-sub" x-show="n.body" x-text="n.body"></div>
                  <div class="notification-row-footer">
                    <span class="chip" x-show="n.event" x-text="n.event"></span>
                    <span class="text-[11px] text-[var(--text-faint)]"
                          x-show="n.actor"
                          x-text="'@' + n.actor"></span>
                    <span class="text-[11px] text-[var(--text-faint)]"
                          x-show="n.target_kind && n.target_id"
                          x-text="n.target_kind + ': ' + n.target_id"></span>
                  </div>
                </div>
              </article>
            </template>
          </div>
          <!-- Server-side pagination — each Prev / Next click is a
               fresh /api/notifications fetch with the appropriate
               offset; the response REPLACES the in-memory list so a
               fleet with 1000+ notifications never piles them all into
               the DOM. "Showing items A–B of N" makes the cap visible.
               Hidden when the total fits in a single page. -->
          <div x-show="!notificationsLoading && notificationsTotal > 0"
               class="flex items-center justify-between gap-3 pt-3 border-t border-[var(--border)] text-[11.5px]">
            <span class="text-[var(--text-faint)]"
                  x-text="t('notifications.showing_count', {
                            from: (notificationsOffset || 0) + 1,
                            to:   (notificationsOffset || 0) + (notifications.length || 0),
                            total: notificationsTotal,
                            page: notificationsPage(),
                            pages: notificationsPageCount()
                          })"></span>
            <div class="flex items-center gap-1.5"
                 x-show="notificationsTotal > (notificationsLimit || 50)">
              <button @click="notificationsPrevPage()"
                      :disabled="!notificationsHasPrev() || notificationsLoading"
                      class="btn btn-soft text-[11.5px]"
                      x-text="t('pagination.prev')"></button>
              <button @click="notificationsNextPage()"
                      :disabled="!notificationsHasNext() || notificationsLoading"
                      class="btn btn-soft text-[11.5px]"
                      x-text="t('pagination.next')"></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ================== COMMAND PALETTE (Cmd-K / Ctrl-K) ================== -->
  <!-- Universal "go anywhere" search modal. Toggle from anywhere via
       Cmd-K / Ctrl-K (handleHotkey wires both). Pure-client fuzzy
       match against this.hosts / this.items / admin-route map / top-
       level views / hotkeys list. Activation dispatches by the
       result's `kind` (see commandPaletteActivate in app.js).
       Backdrop click + Esc close. ↑/↓ moves selection; Enter
       activates. -->
  <!-- Modal display gated by inline :style instead of x-show.
       Three rounds of operator reports of Ctrl+K not opening the
       panel; capture-phase listener confirmed the keystroke
       reaches the page (see init() in app.js) and openCommandPalette
       is being called. The remaining failure mode is x-show toggling
       display on this outermost div not propagating through the
       cascade reliably (Tailwind v4 in-browser JIT also touches
       inline display in arbitrary-class generation). Explicit
       `:style="commandPaletteOpen ? '' : 'display:none'"` is the
       most deterministic gate available — Alpine still reactively
       re-evaluates on every state change but the assignment is a
       direct style override that beats every cascade quirk. -->
  <div :style="commandPaletteOpen ? 'display:flex' : 'display:none'"
       class="fixed inset-0 z-50 fade-in"
       role="dialog" aria-modal="true" :aria-label="t('command_palette.dialog_label')">
    <div @click="closeCommandPalette()" class="absolute inset-0 backdrop-strong"></div>
    <div class="relative flex items-center justify-center p-4 w-full h-full overflow-auto scrollbar">
      <!-- Inner card uses inline style for max-height instead of
           Tailwind v4's `max-h-[80vh]` arbitrary class — the in-
           browser JIT was inconsistent at generating the arbitrary
           value, leaving the card collapsed to its content height
           AND with no scrollable overflow on long result lists.
           The hotkeys modal renders fine because it uses standard
           classes too — operator-confirmed Ctrl+K wasn't showing
           the panel even though the keydown was firing. -->
      <div id="cmdpal-card"
           style="max-height: 80vh;"
           class="bg-[var(--surface)] border border-[var(--border)] rounded-md max-w-2xl w-full flex flex-col overflow-hidden shadow-xl"
           @click.stop>
        <div class="flex items-center gap-2 p-3 border-b border-[var(--border)]">
          <svg width="16" height="16" class="text-[var(--text-faint)]" aria-hidden="true"><use href="#icon-search"/></svg>
          <input type="text" id="cmdpal-input"
                 x-model="commandPaletteQuery"
                 @input="commandPaletteSelectedIdx = 0"
                 @keydown.arrow-down.prevent="commandPaletteMove(1)"
                 @keydown.arrow-up.prevent="commandPaletteMove(-1)"
                 @keydown.enter.prevent="commandPaletteActivate()"
                 :placeholder="t('command_palette.placeholder')"
                 class="flex-1 bg-transparent border-0 outline-none text-[14px] text-[var(--text)] placeholder:text-[var(--text-faint)]"
                 autocomplete="off" spellcheck="false"
                 role="combobox"
                 aria-controls="cmdpal-results"
                 aria-expanded="true"
                 :aria-activedescendant="commandPaletteResults().length ? 'cmdpal-row-' + commandPaletteSelectedIdx : null">
          <kbd class="text-[10.5px] text-[var(--text-faint)] border border-[var(--border)] rounded px-1.5 py-0.5">Esc</kbd>
        </div>
        <div class="overflow-y-auto scrollbar flex-1">
          <template x-if="commandPaletteResults().length === 0">
            <div class="p-6 text-center text-[12px] text-[var(--text-faint)]"
                 x-text="commandPaletteQuery ? t('command_palette.empty_state') : t('command_palette.start_typing')"></div>
          </template>
          <template x-if="commandPaletteResults().length > 0">
            <div id="cmdpal-results" role="listbox" :aria-label="t('command_palette.results_label')">
              <template x-for="(r, i) in commandPaletteResults()" :key="r.kind + ':' + (r.payload && (r.payload.id || r.payload) || r.label) + ':' + i">
                <button type="button"
                     :id="'cmdpal-row-' + i"
                     :data-cmdpal-idx="i"
                     role="option"
                     :aria-selected="commandPaletteSelectedIdx === i ? 'true' : 'false'"
                     tabindex="-1"
                     @click="commandPaletteSelectedIdx = i; commandPaletteActivate()"
                     @mouseenter="commandPaletteSelectedIdx = i"
                     class="cmdpal-row w-full text-start px-3 py-2 cursor-pointer flex items-center gap-3 border-b border-[var(--border)] last:border-0"
                     :class="commandPaletteSelectedIdx === i ? 'cmdpal-row-active' : ''">
                  <span class="cmdpal-kind-pill text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded"
                        :class="'cmdpal-kind-' + r.group"
                        x-text="t('command_palette.group.' + r.group)"></span>
                  <span class="flex-1 min-w-0">
                    <span class="block text-[12.5px] text-[var(--text)] truncate" x-text="r.label"></span>
                    <span x-show="r.sub" class="block text-[10.5px] text-[var(--text-faint)] truncate mono" x-text="r.sub"></span>
                  </span>
                  <span x-show="commandPaletteSelectedIdx === i" class="text-[10.5px] text-[var(--text-faint)]" aria-hidden="true">↵</span>
                </button>
              </template>
            </div>
          </template>
        </div>
        <div class="px-3 py-2 border-t border-[var(--border)] text-[10.5px] text-[var(--text-faint)] flex items-center gap-3 flex-wrap">
          <span><kbd class="border border-[var(--border)] rounded px-1">↑</kbd> <kbd class="border border-[var(--border)] rounded px-1">↓</kbd> <span x-text="t('command_palette.footer_navigate')"></span></span>
          <span><kbd class="border border-[var(--border)] rounded px-1">↵</kbd> <span x-text="t('command_palette.footer_select')"></span></span>
          <span><kbd class="border border-[var(--border)] rounded px-1">Esc</kbd> <span x-text="t('command_palette.footer_close')"></span></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ================== HOTKEYS HELP MODAL ================== -->
  <div x-show="showHotkeys" class="fixed inset-0 z-50 fade-in">
    <div @click="showHotkeys=false" class="absolute inset-0 backdrop-strong"></div>
    <div class="relative flex items-center justify-center p-4 h-full overflow-auto scrollbar"
         role="dialog" aria-modal="true" :aria-label="t('hotkeys.title')">
      <div class="bg-[var(--surface)] border border-[var(--border)] rounded-md max-w-2xl w-full max-h-[90vh] overflow-y-auto scrollbar">
        <div class="p-4 border-b border-[var(--border)] flex justify-between items-center sticky top-0 bg-[var(--surface)] z-10">
          <div class="flex items-start gap-2">
            <!-- Header icon matches the Settings sidebar's `shortcuts`
                 entry (`icon-help-circle`) so the modal's identity is
                 consistent with the navigation chrome that opens it. -->
            <svg width="16" height="16" class="text-[var(--text-dim)] mt-1" aria-hidden="true"><use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-help-circle'"/></svg>
            <div>
              <h2 class="text-[15px] font-semibold" x-text="t('hotkeys.title')"></h2>
              <p class="text-[11px] text-[var(--text-faint)] mt-0.5" x-html="t('hotkeys.hint')"></p>
            </div>
          </div>
          <button @click="showHotkeys=false" class="btn btn-ghost"
                  :aria-label="t('actions.close')">✕</button>
        </div>
        <div class="p-5 grid grid-cols-1 md:grid-cols-2 gap-5">
          <template x-for="group in hotkeyGroups()" :key="group.title">
            <section>
              <h3 class="font-semibold text-[12px] uppercase tracking-wider text-[var(--text-faint)] mb-2" x-text="group.title"></h3>
              <ul class="space-y-1.5">
                <template x-for="entry in group.items" :key="entry.label">
                  <li class="flex items-center justify-between gap-3 text-[12.5px]">
                    <span class="text-[var(--text-dim)]">
                      <span x-text="entry.label"></span>
                      <span x-show="entry.note" class="text-[10.5px] text-[var(--text-faint)] ms-1" x-text="'· ' + (entry.note || '')"></span>
                    </span>
                    <span class="flex items-center gap-1 flex-shrink-0">
                      <template x-for="(k, i) in entry.keys" :key="i">
                        <span class="flex items-center gap-1">
                          <kbd class="kbd" x-text="k"></kbd>
                          <span x-show="i < entry.keys.length - 1" class="text-[10px] text-[var(--text-faint)]">+</span>
                        </span>
                      </template>
                    </span>
                  </li>
                </template>
              </ul>
            </section>
          </template>
        </div>
      </div>
    </div>
  </div>

  <!-- ================== INTERACTIVE SSH TERMINAL MODAL ==================
       Live PTY-backed shell. Browser <-WSS-> backend <-asyncssh-> target.
       Cookie-authed; admin-only. Audit row written at session OPEN + CLOSE
       (start/end events only — keystrokes never logged). Esc / X to close.
       The xterm.js viewport renders into the .terminal-host div via Alpine
       lifecycle hooks (openHostTerminal / closeHostTerminal). -->
  <div x-show="terminalModalOpen" class="fixed inset-0 z-50 fade-in" x-cloak>
    <div @click="closeHostTerminal()" class="absolute inset-0 backdrop-strong"></div>
    <div class="relative flex items-center justify-center p-4 h-full overflow-auto scrollbar">
      <div class="bg-[var(--surface)] border border-[var(--border)] rounded-md max-w-5xl w-full flex flex-col modal-panel--default-height"
           role="dialog" aria-modal="true" :aria-label="t('hosts_extra_ssh.terminal.modal_title', { host: terminalHost && (terminalHost.label || terminalHost.id) || '' })">
        <header class="p-3 border-b border-[var(--border)] flex justify-between items-center bg-[var(--surface)] z-10 flex-shrink-0">
          <div class="flex items-center gap-3 min-w-0">
            <h2 class="text-[14px] font-semibold truncate"
                x-text="t('hosts_extra_ssh.terminal.modal_title', { host: terminalHost && (terminalHost.label || terminalHost.id) || '' })"></h2>
            <span class="ssh-term-status mono text-[11px]"
                  :class="{
                    'ssh-term-status--ok': terminalState === 'connected',
                    'ssh-term-status--warn': terminalState === 'connecting',
                    'ssh-term-status--err': terminalState === 'disconnected' || terminalState === 'error',
                  }">
              <span x-show="terminalState === 'connecting'" x-text="t('hosts_extra_ssh.terminal.connecting')"></span>
              <span x-show="terminalState === 'connected'" x-text="t('hosts_extra_ssh.terminal.connected')"></span>
              <span x-show="terminalState === 'disconnected'"
                    x-text="t('hosts_extra_ssh.terminal.disconnected') + (terminalCloseReason ? ' · ' + terminalCloseReason : '')"></span>
              <span x-show="terminalState === 'error'"
                    x-text="t('hosts_extra_ssh.terminal.connection_failed') + (terminalCloseReason ? ' · ' + terminalCloseReason : '')"></span>
            </span>
            <span x-show="terminalResolved && terminalResolved.user"
                  class="host-debug-tag mono text-[10.5px]"
                  x-text="terminalResolved ? ((terminalResolved.user || '?') + '@' + (terminalResolved.host || '') + ':' + (terminalResolved.port || 22)) : ''"></span>
          </div>
          <div class="flex items-center gap-2">
            <button type="button" class="btn btn-ghost text-[11px]"
                    x-show="terminalState === 'disconnected' || terminalState === 'error'"
                    @click="reconnectHostTerminal()"
                    x-text="t('hosts_extra_ssh.terminal.reconnect')"></button>
            <button @click="closeHostTerminal()" class="btn btn-ghost"
                    :title="t('hosts_extra_ssh.terminal.close_hint')"
                    :aria-label="t('hosts_extra_ssh.terminal.close_hint')">✕</button>
          </div>
        </header>
        <div class="terminal-host scrollbar"
             x-ref="terminalHost"
             :dir="'ltr'"
             style="flex: 1 1 auto; min-height: 0; background: var(--terminal-bg); padding: var(--s-2);"></div>
      </div>
    </div>
  </div>

  <!-- ================== TOAST ================== -->
  <!--suppress XmlUnboundNsPrefix, HtmlUnknownAttribute -->
  <!-- Logical-property classes (`end-4` / `border-s-4`) replace
       physical `right-4` / `border-l-4` so the toast slides in from
       the trailing edge in RTL locales (Arabic / Hebrew) without
       extra rules. ARIA: `role="status"` + `aria-live="polite"` +
       `aria-atomic="true"` so screen readers announce the toast as
       it appears; error toasts upgrade to `role="alert"` +
       `aria-live="assertive"` so they're announced immediately
       (matches the user-visible tonal urgency of red toasts). -->
  <div x-show="toast"
       :role="toastType === 'error' ? 'alert' : 'status'"
       :aria-live="toastType === 'error' ? 'assertive' : 'polite'"
       aria-atomic="true"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 translate-y-4"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       class="fixed bottom-4 end-4 bg-[var(--surface)] border-s-4 px-4 py-2.5 rounded-md shadow-2xl z-[60] max-w-[90vw]"
       :class="toastType==='error' ? 'border-[var(--danger)]' : 'border-[var(--success)]'">
    <div class="text-[12.5px]" x-text="toast"></div>
  </div>

  <!-- ================== FOOTER ================== -->
  <footer class="app-footer">
    <span x-text="t('app.version')"></span>
    <span class="mono" x-text="version || '—'"></span>
  </footer>

</div>

<!-- app.js moved to <head> — see the comment there for why it must
     load before Alpine. The previous deferred-at-bottom placement
     raced against alpine-gate.js's dynamic Alpine injection on the
     reload-after-new-version path. -->

</body>
</html>
