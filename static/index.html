                                x-text="t('host_drawer.system.reboot_badge', { ago: fmtUptimeShort(snmpRebootInfo(h).age_s) })"></span>
                    </template>
                  </dd>
                </template>
                <template x-if="h.docker_node">
                  <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.docker_node')"></dt>
                </template>
                <template x-if="h.docker_node">
                  <dd class="mono text-end" x-text="h.docker_node"></dd>
                </template>
                <!-- DMI / hardware identity — populated only when
                         node-exporter scraped `node_dmi_info` on a
                         physical / VM host (containers usually skip
                         the DMI collector). Vendor + product identify
                         the actual box (e.g. "QOTOM Q555G6"); BIOS
                         version is useful for firmware audit; serial
                         shown last + muted because most operators
                         treat it as private. -->
                <template x-if="h.dmi_vendor">
                  <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.vendor')"></dt>
                </template>
                <template x-if="h.dmi_vendor">
                  <dd class="text-end" x-text="h.dmi_vendor"></dd>
                </template>
                <template x-if="h.dmi_product">
                  <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.product')"></dt>
                </template>
                <template x-if="h.dmi_product">
                  <dd class="text-end" x-text="h.dmi_product"></dd>
                </template>
                <template x-if="h.dmi_bios_version">
                  <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.bios_version')"></dt>
                </template>
                <template x-if="h.dmi_bios_version">
                  <dd class="mono text-end break-all" x-text="h.dmi_bios_version"></dd>
                </template>
                <template x-if="h.dmi_serial">
                  <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.serial')"></dt>
                </template>
                <template x-if="h.dmi_serial">
                  <dd class="mono text-end break-all text-[var(--text-faint)]" x-text="h.dmi_serial"></dd>
                </template>
                <!-- Proxmox metadata from Pulse — shows VM/LXC
                         identity and the PVE host it runs on so the
                         operator can tell apart two guests with
                         similar names (e.g. docker, docker-dev). -->
                <template x-if="h.pulse_kind">
                  <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.proxmox')"></dt>
                </template>
                <template x-if="h.pulse_kind">
                  <dd class="mono text-end">
                        <span x-text="h.pulse_kind === 'lxc' ? t('host_drawer.proxmox_kind.lxc')
                                     : h.pulse_kind === 'qemu' ? t('host_drawer.proxmox_kind.qemu')
                                     : h.pulse_kind === 'node' ? t('host_drawer.proxmox_kind.node')
                                     : (h.pulse_kind || '').toUpperCase()"></span>
                    <span x-show="h.pulse_vmid" class="text-[var(--text-faint)]"
                          x-text="' #' + h.pulse_vmid"></span>
                    <span x-show="h.pulse_node && h.pulse_kind !== 'node'" class="text-[var(--text-faint)]"
                          x-text="' · on ' + h.pulse_node"></span>
                  </dd>
                </template>
                <!-- URL row — always visible. Clickable link when
                         populated, "+ Add" deep-link to Admin → Hosts
                         when empty, matching Beszel's affordance. -->
                <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.system.url')"></dt>
                <dd class="text-end">
                  <a x-show="h.url" :href="h.url" target="_blank" rel="noopener"
                     class="text-[var(--primary)] hover:underline mono" x-text="h.url"></a>
                  <!--: previous wiring only set `adminTab`
                           which has no visible effect when the SPA is
                           on the Hosts view — the click looked dead.
                           Now: close the drawer, switch the SPA to
                           Admin, route to the Hosts editor sub-tab,
                           and scroll the row matching this host id
                           into view + auto-expand it so the operator
                           lands directly on the URL field they wanted
                           to edit. -->
                  <!-- (revised): pre-fix the click chained
                           `$nextTick(() => focusHostsConfigRow(h.id))`
                           after `openAdminTab('hosts')`, but
                           `openAdminTab` is async + AWAITS
                           `loadHostsConfig()` + `loadSettings()` for
                           the hosts branch — `$nextTick` was firing
                           before either resolved, so `hostsConfig` was
                           still empty when `focusHostsConfigRow`
                           queried it (`cfgIdx === -1` → early return →
                           no expand, no scroll). Switching to
                           `.then()` chains the focus call AFTER the
                           openAdminTab Promise resolves; by then the
                           cfg array is populated and the row's _uid is
                           minted in loadHostsConfig. -->
                  <a x-show="!h.url" href="#"
                     @click.prevent="(() => { const _hid = h.id; closeHostDrawer(); view='admin'; openAdminTab('hosts').then(() => focusHostsConfigRow(_hid)); })()"
                     class="text-[var(--primary)] hover:underline"
                     :aria-label="t('host_drawer.system.add_url_aria')"
                     x-text="t('host_drawer.system.add_url')"></a>
                </dd>
              </dl>
            </section>

            <!-- ENABLED AGENTS — dedicated card listing
                     the providers WIRED on this curated row, rendered
                     as colored pills (not a comma-joined string in the
                     System card — operator wanted real visual chips).
                     Distinct from the per-row `providers` chips next
                     to the host name: those reflect what RETURNED data
                     THIS tick (live up/down state); these reflect what
                     the operator has CONFIGURED, regardless of current
                     reachability. Useful at a glance for "why is this
                     row grey — did I forget to enable an agent?". Chip
                     colour comes from `providerColor()` — defaults to a
                     distinct hue per provider and overridable via
                     Settings → Providers. -->
            <template x-if="hostEnabledAgents(h).length">
              <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                <h4 class="fs-2xs uppercase tracking-wider text-[var(--text-faint)] mb-3" x-text="t('host_drawer.system.agents')"></h4>
                <!-- Top-aligned: chips have variable height because some
                         carry a Resume button + "Updated Xm ago" subtitle
                         while others don't. `items-start` keeps the
                         baseline of every chip flush at the top so the
                         row reads as a list rather than a centered
                         constellation of differently-sized pills. -->
                <div class="flex items-start gap-1.5 flex-wrap">
                  <template x-for="agent in hostEnabledAgents(h)" :key="agent.name">
                    <!-- Wrapper so the per-provider Paused badge + Resume
                             button sit beside the chip + the "Updated
                             Xm ago" last-OK subtitle sits below. -->
                    <div class="inline-flex flex-col items-start gap-0.5">
                          <span class="inline-flex items-center gap-1">
                            <!-- Chip colour mirrors the per-host provider
                                 state used by the outer Hosts row + the
                                 mobile chip strip — failing AND paused both
                                 → pill-error (red), healthy → pill-custom +
                                 providerChipStyle (customised brand colour).
                                 Pre-fix the drawer chip ignored the
                                 failing state and showed brand colour
                                 even when the outside chip was red,
                                 visually contradicting the host's actual
                                 health. -->
                            <span class="chip fs-xs px-2 py-0.5"
                                  :class="agentStateClass(h, agent.name)"
                                  :style="agentStateStyle(h, agent.name)"
                                  :title="agentStateTitle(h, agent.name)"
                                  x-text="agent.label"></span>
                            <template x-if="agentPauseInfo(h, agent.name) && isAdmin()">
                              <!-- Visual separator + button styling
                                   distinct from the chip so the operator
                                   reads "Resume" as a button to click,
                                   not as a status pill. Pre-fix the
                                   button used `class="chip"` which
                                   visually nested inside the paused
                                   chip, making the interactive boundary
                                   ambiguous. -->
                              <button type="button"
                                      class="fs-2xs font-medium px-2 py-0.5 rounded border bg-[color-mix(in_srgb,var(--warning)_18%,transparent)] border-[color-mix(in_srgb,var(--warning)_60%,var(--border))] text-[var(--text)] hover:bg-[color-mix(in_srgb,var(--warning)_28%,transparent)] hover:border-[var(--warning)] disabled:opacity-50 disabled:cursor-wait inline-flex items-center gap-1 cursor-pointer"
                                      @click="resumeProvider(h, agent.name)"
                                      :disabled="!canResume(h, agent.name)"
                                      :aria-busy="providerResumeBusy[h.id + ':' + agent.name] ? 'true' : 'false'"
                                      :aria-label="t('hosts_extra.provider_resume_aria', { provider: agent.label })"
                                      :aria-keyshortcuts="'Enter'"
                                      :title="t('hosts_extra.provider_resume_title', { provider: agent.label })">
                                <svg width="9" height="9" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                  <polygon points="5 3 19 12 5 21 5 3"/>
                                </svg>
                                <span x-text="providerResumeBusy[h.id + ':' + agent.name] ? t('hosts_extra.provider_resuming') : t('hosts_extra.provider_resume')"></span>
                              </button>
                            </template>
                          </span>
                      <!-- Per-provider stat subtitle — three stacked
                               micro-text lines (last-OK age, sample count,
                               cadence), each shown below the other so the
                               display reads correctly. Per user request
                               these are NOT collapsed onto one dot-separated
                               line. Each line is gated on its own value, so
                               a chip with no data yet shows nothing; the
                               flex-col wrapper above stacks them via gap-0.5.
                               last-OK reads
                               provider_pause_state[<name>].last_ok_ts (epoch
                               seconds) — hidden until the provider has had at
                               least one successful probe. -->
                      <span x-show="providerLastOkSeconds(h, agent.name) > 0"
                            class="fs-3xs-half text-[var(--text-faint)] mono ps-0.5"
                            x-text="t('hosts_extra.provider_last_ok', { age: providerLastOkAge(h, agent.name) })"></span>
                      <span x-show="providerSampleCount(h, agent.name) > 0"
                            class="fs-3xs-half text-[var(--text-faint)] mono ps-0.5"
                            x-text="t('hosts_extra.provider_sample_count', { count: Number(providerSampleCount(h, agent.name)).toLocaleString() })"></span>
                      <span x-show="providerSampleInterval(h, agent.name) > 0"
                            class="fs-3xs-half text-[var(--text-faint)] mono ps-0.5"
                            x-text="t('hosts_extra.provider_sample_interval', { every: providerSampleIntervalLabel(h, agent.name) })"></span>
                      <!-- Freshness-disagreement warning overlay.
                           Fires when the per-(provider, host) last_ok stamp
                           lags this provider's sample-table newest_ts by
                           significantly more than the sampler interval —
                           proves the sampler IS writing samples but the
                           per-provider stamp is going stale separately.
                           Operator-debug surface for future per-provider
                           plumbing drift. :title carries the exact gap. -->
                      <span x-show="providerFreshnessLag(h, agent.name)"
                            class="fs-3xs-half text-[var(--warning)] ps-0.5"
                            :title="providerFreshnessLagTitle(h, agent.name)"
                            :aria-label="providerFreshnessLagTitle(h, agent.name)">⚠</span>
                    </div>
                  </template>
                </div>
                <!-- "Resume all (N)" rollup. Renders only when ≥ 2
                         providers on this host are currently paused —
                         a single-paused host already has one Resume
                         button on its chip, so the rollup would be
                         redundant. Admin-only. Pairs with the per-chip
                         Resume button: this fans out the same action
                         to every paused chip in one click. -->
                <template x-if="isAdmin() && pausedProvidersFor(h).length >= 2">
                  <div class="mt-3 pt-3 border-t border-[var(--border)] flex items-center justify-end">
                    <button type="button"
                            class="fs-xs px-2.5 py-1 rounded border bg-[color-mix(in_srgb,var(--warning)_10%,transparent)] border-[color-mix(in_srgb,var(--warning)_50%,var(--border))] text-[var(--text)] hover:bg-[color-mix(in_srgb,var(--warning)_18%,transparent)] hover:border-[var(--warning)] disabled:opacity-50 disabled:cursor-wait inline-flex items-center gap-1.5"
                            @click="resumeAllProviders(h)"
                            :disabled="!canResumeAny(h)"
                            :aria-label="t('hosts_extra.provider_resume_all_aria', { count: pausedProvidersFor(h).length })"
                            :aria-keyshortcuts="'Enter'"
                            :title="t('hosts_extra.provider_resume_all_title')">
                      <svg width="11" height="11" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                      </svg>
                      <span x-text="t('hosts_extra.provider_resume_all', { count: pausedProvidersFor(h).length })"></span>
                    </button>
                  </div>
                </template>
              </section>
            </template>

            <!-- HARDWARE — same honest-fields rule. CPU model /
                     Cores come from the host-daemon agent; container
                     agents omit them. Threads / Memory / Disk / Agent /
                     Status are always emitted, so they always render.
                     Card visible when EITHER the host is up (live
                     metrics) OR an asset-inventory match exists
                     (vendor / model / serial from <asset-api-host> — useful
                     even for hosts with no live providers like FTTH
                     routers / 5G modems). Each row inside is gated
                     on its own field so cards stay tidy when only
                     one source contributes data. -->
            <!-- Section gate now also fires on snapshot-fallback
                     hits so cached hardware values (cpu_model /
                     mem_total / disk_total / serial / model / firmware
                     / vendor / swap_used) stay mounted when every
                     live provider is offline. Mirrors the symmetry
                     introduced for UPS / Printer / Network cards
                      — the operator's last-known view of
                     the hardware shouldn't disappear just because the
                     SNMP / NE / Webmin probes are temporarily failing,
                     since the snapshot fallback is exactly what's
                     supposed to bridge that gap. -->
            <template x-if="h.status === 'up'
                                 || assetForHost(h)
                                 || isStaleField(h, 'host_cpu_model')
                                 || isStaleField(h, 'host_mem_total')
                                 || isStaleField(h, 'host_disk_total')
                                 || isStaleField(h, 'host_serial')
                                 || isStaleField(h, 'host_model')
                                 || isStaleField(h, 'host_firmware')
                                 || isStaleField(h, 'host_vendor')
                                 || isStaleField(h, 'host_swap_used')
                                 || isStaleField(h, 'host_bios_version')
                                 || h.host_bios_version">
              <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                <h4 class="fs-2xs uppercase tracking-wider text-[var(--text-faint)] mb-3" x-text="t('host_drawer.hardware.heading')"></h4>
                <dl class="drawer-dl fs-sm">
                  <template x-if="h.cpu_model">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.hardware.cpu')"></dt>
                  </template>
                  <template x-if="h.cpu_model">
                    <dd class="text-end mono break-all" :class="isStaleField(h, 'host_cpu_model') ? 'stale' : ''"
                        :title="isStaleField(h, 'host_cpu_model') ? staleAge(h) : ''"
                        x-text="h.cpu_model"></dd>
                  </template>
                  <template x-if="h.cores">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.hardware.cores')"></dt>
                  </template>
                  <template x-if="h.cores">
                    <dd class="mono text-end" :class="(isStaleField(h, 'host_cores') || isStaleField(h, 'host_threads')) ? 'stale' : ''"
                        :title="(isStaleField(h, 'host_cores') || isStaleField(h, 'host_threads')) ? staleAge(h) : ''"
                        x-text="h.cores"></dd>
                  </template>
                  <template x-if="h.threads">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.hardware.threads')"></dt>
                  </template>
                  <template x-if="h.threads">
                    <dd class="mono text-end" :class="isStaleField(h, 'host_threads') ? 'stale' : ''"
                        :title="isStaleField(h, 'host_threads') ? staleAge(h) : ''"
                        x-text="h.threads"></dd>
                  </template>
                  <template x-if="h.mem_total">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.hardware.memory')"></dt>
                  </template>
                  <template x-if="h.mem_total">
                    <dd class="mono text-end" :class="isStaleField(h, 'host_mem_total') ? 'stale' : ''"
                        :title="isStaleField(h, 'host_mem_total') ? staleAge(h) : ''"
                        x-text="fmtBytes(h.mem_total)"></dd>
                  </template>
                  <!-- Swap usage — pulled from host_swap_used (bytes).
                           Snapshot fallback stamps this when live providers
                           stop returning it; without rendering anywhere,
                           the field surfaced as "1 stale field" in the
                           drawer banner with no UI bind point (the swap
                           CHART card uses host_swap_percent / `s`, not
                           used-bytes). Render here so cached snapshot
                           data is identifiable + operators can spot
                           memory pressure at a glance even on stable
                           hosts. -->
                  <template x-if="h.host_swap_used">
                    <dt class="text-[var(--text-dim)]" x-text="t('charts.swap')"></dt>
                  </template>
                  <template x-if="h.host_swap_used">
                    <dd class="mono text-end" :class="isStaleField(h, 'host_swap_used') ? 'stale' : ''"
                        :title="isStaleField(h, 'host_swap_used') ? staleAge(h) : ''"
                        x-text="fmtBytes(h.host_swap_used)"></dd>
                  </template>
                  <template x-if="h.disk_total">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.hardware.disk')"></dt>
                  </template>
                  <template x-if="h.disk_total">
                    <dd class="mono text-end" :class="isStaleField(h, 'host_disk_total') ? 'stale' : ''"
                        :title="isStaleField(h, 'host_disk_total') ? staleAge(h) : ''"
                        x-text="fmtBytes(h.disk_total)"></dd>
                  </template>
                  <template x-if="h.agent">
                    <dt class="text-[var(--text-dim)]"
                        :title="t('host_drawer.hardware.beszel_agent_title')"
                        x-text="t('host_drawer.hardware.beszel_agent')"></dt>
                  </template>
                  <template x-if="h.agent">
                    <dd class="mono text-end" x-text="h.agent"></dd>
                  </template>
                  <!-- Load averages — three windows (1m / 5m / 15m)
                           rendered as percentages of total CPU capacity
                           (load ÷ cores × 100). Each labelled inline so
                           the operator doesn't have to remember which
                           number is which window. Falls back to raw
                           load when core count is unknown (rare — only
                           when the live providers haven't reported it
                           yet). Populated only when node-exporter
                           scraped this host. -->
                  <template x-if="(h.load_1m || 0) > 0 || (h.load_5m || 0) > 0 || (h.load_15m || 0) > 0">
                    <dt class="text-[var(--text-dim)]"
                        :title="t('host_drawer.hardware.load_title')"
                        x-text="t('host_drawer.hardware.load')"></dt>
                  </template>
                  <template x-if="(h.load_1m || 0) > 0 || (h.load_5m || 0) > 0 || (h.load_15m || 0) > 0">
                    <dd class="mono text-end whitespace-nowrap"
                        :class="(isStaleField(h, 'host_load_1m') || isStaleField(h, 'host_load_5m') || isStaleField(h, 'host_load_15m')) ? 'stale' : ''"
                        x-text="(h.cores && h.cores > 0)
                            ? ((((h.load_1m || 0) / h.cores) * 100).toFixed(0) + '% · '
                               + (((h.load_5m || 0) / h.cores) * 100).toFixed(0) + '% · '
                               + (((h.load_15m || 0) / h.cores) * 100).toFixed(0) + '%')
                            : ((h.load_1m || 0).toFixed(2) + ' · '
                               + (h.load_5m || 0).toFixed(2) + ' · '
                               + (h.load_15m || 0).toFixed(2))"
                        :title="(isStaleField(h, 'host_load_1m') || isStaleField(h, 'host_load_5m') || isStaleField(h, 'host_load_15m'))
                            ? staleAge(h)
                            : ((h.cores && h.cores > 0)
                               ? ('1m / 5m / 15m load (% of total CPU capacity, ' + h.cores + ' cores)')
                               : '1m / 5m / 15m load average')"></dd>
                  </template>
                  <!-- Asset inventory rows.
                           Matched by h.custom_number against the cached
                           <asset-api-host> asset list. Each row gated on its own
                           field so hosts without that data stay tidy.
                           Distinct from DMI so operators can spot when
                           the DB record ≠ what node-exporter reports
                           on the box (manufacturer mismatch / swap
                           wasn't recorded upstream). Title tooltip
                           explains the source. -->
                  <template x-if="assetForHost(h) && assetForHost(h).vendor">
                    <dt class="text-[var(--text-dim)]"
                        :title="t('host_drawer.hardware.asset_title')"
                        x-text="t('host_drawer.hardware.asset_vendor')"></dt>
                  </template>
                  <template x-if="assetForHost(h) && assetForHost(h).vendor">
                    <dd class="text-end break-all" x-text="assetForHost(h).vendor"></dd>
                  </template>
                  <template x-if="assetForHost(h) && assetForHost(h).model">
                    <dt class="text-[var(--text-dim)]"
                        :title="t('host_drawer.hardware.asset_title')"
                        x-text="t('host_drawer.hardware.asset_model')"></dt>
                  </template>
                  <template x-if="assetForHost(h) && assetForHost(h).model">
                    <dd class="text-end break-all" x-text="assetForHost(h).model"></dd>
                  </template>
                  <template x-if="assetForHost(h) && assetForHost(h).serial">
                    <dt class="text-[var(--text-dim)]"
                        :title="t('host_drawer.hardware.asset_title')"
                        x-text="t('host_drawer.hardware.asset_serial')"></dt>
                  </template>
                  <template x-if="assetForHost(h) && assetForHost(h).serial">
                    <dd class="mono text-end break-all text-[var(--text-faint)]"
                        x-text="assetForHost(h).serial"></dd>
                  </template>
                  <!-- SNMP-derived hardware. entPhysicalTable +
                           Cisco MIB walks populate host_model / host_serial /
                           host_firmware on the API row. Each gated on its
                           own field so hosts without SNMP (or without the
                           specific OID) skip the row. Distinct from
                           asset_model / asset_serial above — those are the
                           operator-curated DB record; these are what the
                           device itself reports right now. Mismatch is a
                           signal worth surfacing (swapped hardware not
                           updated in inventory). -->
                  <template x-if="h.host_model || isStaleField(h, 'host_model')">
                    <dt class="text-[var(--text-dim)]"
                        :title="t('host_drawer.hardware.snmp_title')"
                        x-text="t('host_drawer.hardware.snmp_model')"></dt>
                  </template>
                  <template x-if="h.host_model || isStaleField(h, 'host_model')">
                    <dd class="text-end break-all"
                        :class="isStaleField(h, 'host_model') ? 'stale' : ''"
                        :title="isStaleField(h, 'host_model') ? staleAge(h) : ''"
                        x-text="h.host_model || '—'"></dd>
                  </template>
                  <template x-if="h.host_serial || isStaleField(h, 'host_serial')">
                    <dt class="text-[var(--text-dim)]"
                        :title="t('host_drawer.hardware.snmp_title')"
                        x-text="t('host_drawer.hardware.snmp_serial')"></dt>
                  </template>
                  <template x-if="h.host_serial || isStaleField(h, 'host_serial')">
                    <dd class="mono text-end break-all text-[var(--text-faint)]"
                        :class="isStaleField(h, 'host_serial') ? 'stale' : ''"
                        :title="isStaleField(h, 'host_serial') ? staleAge(h) : ''"
                        x-text="h.host_serial || '—'"></dd>
                  </template>
                  <template x-if="h.host_firmware || isStaleField(h, 'host_firmware')">
                    <dt class="text-[var(--text-dim)]"
                        :title="t('host_drawer.hardware.snmp_title')"
                        x-text="t('host_drawer.hardware.snmp_firmware')"></dt>
                  </template>
                  <template x-if="h.host_firmware || isStaleField(h, 'host_firmware')">
                    <dd class="mono text-end break-all"
                        :class="isStaleField(h, 'host_firmware') ? 'stale' : ''"
                        :title="isStaleField(h, 'host_firmware') ? staleAge(h) : ''"
                        x-text="h.host_firmware || '—'"></dd>
                  </template>
                  <!-- BIOS version + release date — Dell systemBIOSTable. Distinct from host_firmware which
                           on a Dell server actually carries the iDRAC
                           firmware string; host_bios_version is the
                           server's own BIOS / UEFI revision. Stale-fallback
                           gated like every other Hardware card row. -->
                  <template x-if="h.host_bios_version || isStaleField(h, 'host_bios_version')">
                    <dt class="text-[var(--text-dim)]"
                        x-text="t('host_drawer.hardware.bios_version')"></dt>
                  </template>
                  <template x-if="h.host_bios_version || isStaleField(h, 'host_bios_version')">
                    <dd class="mono text-end break-all"
                        :class="isStaleField(h, 'host_bios_version') ? 'stale' : ''"
                        :title="isStaleField(h, 'host_bios_version') ? staleAge(h) : ''">
                      <span x-text="h.host_bios_version || '—'"></span>
                      <span x-show="h.host_bios_date"
                            class="text-[var(--text-faint)] ms-1"
                            x-text="'(' + h.host_bios_date + ')'"></span>
                    </dd>
                  </template>
                  <!-- Status row hidden for inventory-only / no-agent
                           hosts. The header status dot already conveys
                           "unconfigured" — repeating it here as a row that
                           literally reads "Status: unconfigured" was just
                           noise. Show only when something meaningful is
                           being communicated (up / down / paused / unknown). -->
                  <template x-if="h.status && h.status !== 'unconfigured'">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.hardware.status')"></dt>
                  </template>
                  <template x-if="h.status && h.status !== 'unconfigured'">
                    <dd class="text-end">
                        <span class="pill fs-2xs"
                              :class="h.status === 'up' ? 'pill-ok' : h.status === 'down' ? 'pill-error' : 'pill-unknown'"
                              x-text="h.status"></span>
                    </dd>
                  </template>
                  <!-- Services summary. Row appears only when the
                           host's Beszel agent is reporting services (total > 0).
                           Always shows "{N} services"; appends "· {F} failed"
                           in red when failures exist; lists failed names
                           underneath. Hosts whose agent doesn't track services
                           skip this row entirely (the gate). -->
                  <template x-if="(h.services || {}).total > 0">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.hardware.services')"></dt>
                  </template>
                  <template x-if="(h.services || {}).total > 0">
                    <dd class="text-end">
                      <!-- Count colour: green when no failures (positive
                               "all good" signal so the operator can scan
                               at a glance), neutral mono otherwise — the
                               ·N failed in red carries the alarm in that
                               case so the count itself shouldn't compete. -->
                      <span class="mono"
                            :class="h.services.failed === 0 ? 'text-[var(--success)]' : ''"
                            x-text="h.services.total + ' ' + t('host_drawer.hardware.services_unit')"></span>
                      <!-- Always render "· N failed" — green "0 failed"
                               when N=0 reassures the operator that
                               monitoring is live AND clean (vs. silent =
                               ambiguous "not tracked OR no failures?"). -->
                      <span class="ms-1"
                            :class="h.services.failed > 0 ? 'text-[var(--danger)]' : 'text-[var(--success)]'"
                            x-text="'· ' + h.services.failed + ' ' + t('host_drawer.hardware.services_failed')"></span>
                      <div x-show="h.services.failed > 0"
                           class="fs-2xs text-[var(--danger)] mt-1 mono break-all"
                           x-text="(h.services.failed_names || []).join(', ')"></div>
                      <!-- Per-unit detail toggle — lazy-loads
                               `/api/hosts/{id}/beszel/services` on first
                               open. Hidden for hosts whose summary
                               reports zero units (already gated by the
                               outer x-if). The detail pane shows every
                               tracked unit with its state pill +
                               last-change age, sorted with failed
                               units first — matches the endpoint's
                               server-side sort. -->
                      <button type="button"
                              @click.stop="toggleHostBeszelServices(h.id)"
                              class="btn btn-ghost btn-xs fs-2xs ms-1 mt-1"
                              :aria-expanded="!!hostBeszelServicesOpen[h.id]">
                        <span x-text="hostBeszelServicesOpen[h.id] ? t('host_drawer.beszel_services.hide') : t('host_drawer.beszel_services.show')"></span>
                      </button>
                      <!-- Live re-probe — fetches /beszel/services?refresh=1
                           so the Beszel hub is queried fresh + the per-unit
                           table upserted before the read. Lets an operator
                           who just fixed a failed unit confirm it's back
                           without waiting for the next sampler tick. Shown
                           only while the pane is open. -->
                      <button type="button"
                              x-show="hostBeszelServicesOpen[h.id]"
                              @click.stop="loadHostBeszelServices(h.id, true)"
                              :disabled="hostsBeszelServicesLoading[h.id]"
                              class="btn btn-ghost btn-xs fs-2xs ms-1 mt-1 inline-flex items-center gap-1"
                              :title="t('host_drawer.beszel_services.refresh_title')"
                              :aria-label="t('host_drawer.beszel_services.refresh_title')">
                        <svg width="11" height="11" :class="hostsBeszelServicesLoading[h.id] ? 'spin-md' : ''" aria-hidden="true">
                          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-cw"/>
                        </svg>
                        <span x-text="t('host_drawer.beszel_services.refresh')"></span>
                      </button>
                    </dd>
                  </template>
                </dl>
                <!-- Per-unit Beszel services detail pane. Renders
                         below the dl when the user clicks "Show
                         services" on the summary row. Each row: state
                         pill (active green, failed red, others muted),
                         unit name (mono), last-change age. Sticky
                         header inside a scrollable cap (max 320px)
                         so a host with 100+ units stays compact. -->
                <template x-if="hostBeszelServicesOpen[h.id] && (h.services || {}).total > 0">
                  <div x-transition.opacity.duration.150ms
                       class="mt-2"
                       :data-host-section="'beszel-services-' + h.id">
                    <template x-if="hostsBeszelServicesLoading[h.id]">
                      <div class="fs-xs text-[var(--text-faint)] flex items-center gap-2 py-2">
                        <span class="spin" aria-hidden="true"></span>
                        <span x-text="t('host_drawer.beszel_services.loading')"></span>
                      </div>
                    </template>
                    <template x-if="!hostsBeszelServicesLoading[h.id]
                                    && hostsBeszelServices[h.id]
                                    && hostsBeszelServices[h.id].error">
                      <div class="fs-xs text-[var(--danger)] py-2"
                           x-text="t('host_drawer.beszel_services.error', { error: hostsBeszelServices[h.id].error })"></div>
                    </template>
                    <template x-if="!hostsBeszelServicesLoading[h.id]
                                    && hostsBeszelServices[h.id]
                                    && !hostsBeszelServices[h.id].error
                                    && (hostsBeszelServices[h.id].services || []).length === 0">
                      <div class="fs-xs text-[var(--text-faint)] py-2"
                           x-text="t('host_drawer.beszel_services.empty')"></div>
                    </template>
                    <div x-show="!hostsBeszelServicesLoading[h.id]
                                 && hostsBeszelServices[h.id]
                                 && !hostsBeszelServices[h.id].error
                                 && (hostsBeszelServices[h.id].services || []).length > 0"
                         class="host-debug-table-wrap scrollbar">
                      <table class="host-debug-table mono">
                        <thead>
                        <tr>
                          <th class="text-start" x-text="t('host_drawer.beszel_services.col_state')"></th>
                          <th class="text-start" x-text="t('host_drawer.beszel_services.col_name')"></th>
                          <th class="text-end" x-text="t('host_drawer.beszel_services.col_changed')"></th>
                        </tr>
                        </thead>
                        <tbody>
                        <template x-for="svc in ((hostsBeszelServices[h.id] || {}).services || [])" :key="svc.name">
                          <tr>
                            <td class="text-start">
                                <span class="chip"
                                      :class="beszelServicePillClass(svc.state)"
                                      x-text="beszelServiceStateLabel(svc.state)"></span>
                            </td>
                            <td class="text-start" x-text="svc.name"></td>
                            <td class="text-end fs-2xs text-[var(--text-faint)]"
                                x-text="svc.last_change_ts ? relativeAge(Date.now()/1000 - svc.last_change_ts) : '—'"></td>
                          </tr>
                        </template>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </template>
              </section>
            </template>

            <!-- APPS — operator-curated service chip array for this host.
                     Renders the chips pinned via Admin → Hosts as a card grid
                     with brand icon, name, status pill, per-port mini-status,
                     "Open" + "Probe now" buttons. Reuses the same iconUrlFor()
                     resolver as the rest of the SPA. Gates on h.apps being a
                     non-empty list (set by `_shape_host_apps` backend-side).
                     Status is up / down / unknown derived from the most-recent
                     service_samples row stamped onto each chip. -->
            <!-- PORT SCAN — on-demand TCP-connect scanner.
                     Card surfaces when the master toggle is ON AND the
                     curated row opted in via Admin → Hosts (`port_scan.enabled`),
                     OR when the host already has a prior scan stamped
                     in `host.detected_ports`. The "Scan ports" button
                     fires `runPortScan(h)` which POSTs to /api/hosts/{id}/port-scan
                     and refreshes the row. Detected-port chip diff
                     against `host.services[]` (curated): three states —
                     curated-and-detected (green), detected-only (amber,
                     "unknown port"), curated-only (grey, "not listening
                     right now"). Admin-only — gated on me.role === 'admin'. -->
            <template x-if="(((settings || {}).port_scan_enabled) && (((h.port_scan_cfg || h.port_scan || {}).enabled !== false))) || (h.detected_ports && h.detected_ports.length)">
              <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                <div class="flex items-center justify-between gap-2 mb-3">
                  <h4 class="fs-2xs uppercase tracking-wider text-[var(--text-faint)] flex items-center gap-2">
                    <span x-text="t('host_drawer.port_scan.heading')"></span>
                    <template x-if="h.last_port_scan_ts">
                        <span class="chip pill-muted fs-2xs"
                              x-text="t('host_drawer.port_scan.last_scanned', { when: fmtAgo(h.last_port_scan_ts * 1000) + ' ago' })"></span>
                    </template>
                  </h4>
                  <button type="button"
                          x-show="me && me.role === 'admin'"
                          :disabled="!!(h._port_scan_running) || !!((_inFlightPortScans || {})[h.id]) || !((h.address || '').trim())"
                          @click="runPortScan(h)"
                          class="btn btn-ghost fs-xs flex items-center gap-1"
                          :title="!((h.address || '').trim()) ? (t('host_drawer.port_scan.address_required_title') || 'Set Hostname or IP in Admin → Hosts to enable port scanning.') : t('host_drawer.port_scan.scan_button_title')">
                    <svg width="11" height="11"
                         :class="(h._port_scan_running || ((_inFlightPortScans || {})[h.id])) ? 'spin-md' : ''"
                         aria-hidden="true">
                      <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-search'"/>
                    </svg>
                    <span x-text="(h._port_scan_running || ((_inFlightPortScans || {})[h.id])) ? t('host_drawer.port_scan.scanning') : t('host_drawer.port_scan.scan_button')"></span>
                  </button>
                </div>
                <!-- Address-required banner — port scan is disabled
                         until the operator sets the dedicated probe
                         target in Admin → Hosts. Shown above the rest
                         of the card body so the operator's first read
                         is "why is the button disabled" rather than
                         missing port chips. -->
                <template x-if="me && me.role === 'admin' && !((h.address || '').trim())">
                  <div class="rounded border border-[var(--warning)] bg-[var(--surface-2)] p-2 mb-3 fs-xs flex items-start gap-2">
                    <svg width="13" height="13" class="text-[var(--warning)] flex-shrink-0 mt-0.5" aria-hidden="true">
                      <use :href="'/img/ui-sprite.svg?v=' + (window.OG_VERSION || '') + '#icon-alert-triangle'"/>
                    </svg>
                    <span x-text="t('host_drawer.port_scan.address_required_body') || 'Set Hostname or IP for this host in Admin → Hosts to enable port scanning. Without it, the scanner would target the host id (often unresolvable) and produce misleading results.'"></span>
                  </div>
                </template>
                <template x-if="!h.last_port_scan_ts && me && me.role === 'admin'">
                  <div class="text-[var(--text-faint)] fs-xs mb-2"
                       x-text="t('host_drawer.port_scan.no_scans_yet')"></div>
                </template>
                <!-- Scan ran but found 0 open ports — distinct from
                         "no scan yet". Tells the operator the probe
                         actually completed and ALL the scanned ports
                         are closed/filtered. Helpful pointer to the
                         Admin → Logs `[port_scanner]` line which carries
                         the categorised closed-reason summary
                         (dns / refused / timeout / oserror) so they can
                         triage WHY zero ports came back. -->
                <template x-if="h.last_port_scan_ts && !(h.detected_ports || []).length">
                  <div class="text-[var(--text-faint)] fs-xs mb-2"
                       x-text="t('host_drawer.port_scan.zero_open')"></div>
                </template>
                <template x-if="(h.detected_ports || []).length">
                  <div class="mb-2">
                    <div class="text-[var(--text-dim)] fs-xs mb-1"
                         x-text="t('host_drawer.port_scan.detected_label', { count: (h.detected_ports || []).length })"></div>
                    <div class="flex flex-wrap gap-1.5">
                      <template x-for="p in sortedDetectedPorts(h)" :key="(h.id || h.host || '') + ':' + (p.protocol || 'tcp') + ':' + p.port">
                          <span class="chip fs-xs mono inline-flex items-center"
                                x-data="{ get mapped() { return portScanMappedApp(h, p); } }"
                                :class="portScanChipClass(h, p)"
                                :title="portScanChipTitle(h, p)">
                            <!-- Single status dot — green/red/amber/grey for the
                                 mapped target. Prefers this port's per-port probe
                                 verdict (port_status); falls back to the app's
                                 overall status when there's no per-port result.
                                 Rendered FIRST (before the port number) for parity
                                 with the Apps port pills, which lead with the dot. -->
                            <span x-show="mapped"
                                  class="apps-card-dot me-1"
                                  :class="mapped ? 'apps-card-dot--' + (mapped.port_status || mapped.status) : ''"
                                  :title="mapped ? ((mapped.port_status || mapped.status) === 'up' ? (t('host_drawer.port_scan.probe_up') || 'Probe: reachable') : ((mapped.port_status || mapped.status) === 'down' ? (t('host_drawer.port_scan.probe_down') || 'Probe: unreachable') : '')) : ''"
                                  aria-hidden="true"></span>
                            <!-- Asset-vs-scan mismatch marker — round
                                 exclamation icon prepended when the
                                 detected port isn't in the host's
                                 asset-inventory port list. Inherits
                                 the chip's text colour via
                                 `currentColor` so it visually matches
                                 the pill (no separate colour). Only
                                 renders when asset inventory is
                                 enabled AND the asset has port defs;
                                 see `portScanShouldFlag(h, p)`. -->
                            <template x-if="portScanShouldFlag(h, p)">
                              <svg width="11" height="11" class="me-1 flex-shrink-0" aria-hidden="true">
                                <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-info"/>
                              </svg>
                            </template>
                            <span x-text="p.port + '/' + (p.protocol || 'tcp')"></span>
                            <span x-show="p.service_hint" class="ms-1 opacity-70"
                                  x-text="'· ' + p.service_hint"></span>
                            <!-- Mapped-target annotation — when a scanned open
                                 port matches a configured app chip OR an
                                 http_probe URL on this host, show its icon +
                                 name so the operator sees what owns the port.
                                 The status is carried by the single dot above
                                 (not duplicated here). `mapped` is computed once
                                 per chip via the chip-level x-data. -->
                            <template x-if="mapped">
                              <span class="ms-1.5 ps-1.5 inline-flex items-center gap-1 border-s border-[color:var(--border-bright)]"
                                    :title="mapped.is_http_probe ? ((t('host_drawer.port_scan.mapped_probe_title', { url: mapped.url }) || ('Probe: ' + mapped.url))) : (t('host_drawer.port_scan.mapped_app_title', { name: mapped.name }) || ('App: ' + mapped.name))">
                                <img :src="iconUrlFor(mapped.icon)" alt="" width="12" height="12"
                                     class="rounded flex-shrink-0"
                                     @error="$event.target.style.visibility='hidden'">
                                <span x-text="mapped.name"></span>
                              </span>
                            </template>
                          </span>
                      </template>
                    </div>
                  </div>
                </template>
                <template x-if="curatedOnlyServices(h).length">
                  <div>
                    <div class="text-[var(--text-dim)] fs-xs mb-1"
                         x-text="t('host_drawer.port_scan.curated_only_label', { count: curatedOnlyServices(h).length })"></div>
                    <div class="flex flex-wrap gap-1.5">
                      <template x-for="s in curatedOnlyServices(h)" :key="s.port + ':' + (s.name || '')">
                          <span class="chip pill-muted fs-xs mono"
                                :title="t('host_drawer.port_scan.curated_only_chip_title', { name: s.name || '—' })">
                            <span x-text="s.port"></span>
                            <span x-show="s.name" class="ms-1 opacity-70"
                                  x-text="'· ' + s.name"></span>
                          </span>
                      </template>
                    </div>
                  </div>
                </template>
              </section>
            </template>

            <template x-if="Array.isArray(h.apps) && h.apps.length">
              <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                <header class="flex items-center gap-2 mb-2">
                  <svg width="14" height="14" class="text-[var(--text-dim)]" aria-hidden="true">
                    <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-grid"/>
                  </svg>
                  <h3 class="font-semibold fs-sm"
                      x-text="t('host_drawer.apps.title') || 'Apps'"></h3>
                  <span class="chip pill-info fs-3xs ms-2"
                        x-text="t('host_drawer.apps.up_count', { up: (h.apps || []).filter(a => a.status === 'up').length, total: (h.apps || []).length })"></span>
                  <!-- Probe controls — grouped + right-aligned. "Probe
                       failed" (shown only when ≥1 app is down) re-probes
                       ONLY the non-up services — the common "I fixed the
                       down ones, are they back?" case without re-probing
                       the whole mostly-up list. "Probe all" hits every app.
                       Admin-only; both share the per-host probing flag so
                       they spin + disable together while a batch runs. -->
                  <div class="ms-auto flex items-center gap-2" x-show="isAdmin()">
                    <button type="button"
                            x-show="(h.apps || []).some(a => a && a.status && a.status !== 'up')"
                            class="btn btn-warning fs-2xs inline-flex items-center gap-1"
                            :disabled="hostAppsProbingAll(h)"
                            @click.stop="probeFailedHostApps(h)"
                            :title="t('host_drawer.apps.probe_failed_title') || 'Re-probe only the down services on this host'">
                      <svg width="12" height="12" :class="hostAppsProbingAll(h) ? 'spin-md' : ''" aria-hidden="true">
                        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-cw"/>
                      </svg>
                      <span x-text="t('host_drawer.apps.probe_failed_btn', { n: (h.apps || []).filter(a => a && a.status && a.status !== 'up').length }) || ('Probe failed (' + (h.apps || []).filter(a => a && a.status && a.status !== 'up').length + ')')"></span>
                    </button>
                    <button type="button"
                            class="btn btn-soft fs-2xs inline-flex items-center gap-1"
                            :disabled="hostAppsProbingAll(h)"
                            @click.stop="probeAllHostApps(h)"
                            :title="t('host_drawer.apps.probe_all_title') || 'Probe every app on this host now'">
                      <svg width="12" height="12" :class="hostAppsProbingAll(h) ? 'spin-md' : ''" aria-hidden="true">
                        <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-refresh-cw"/>
                      </svg>
                      <span x-text="t('host_drawer.apps.probe_all', { n: (h.apps || []).length }) || ('Probe all (' + (h.apps || []).length + ')')"></span>
                    </button>
                  </div>
                </header>
                <!-- Compact wrapping tiles — each app is one inline tile that
                     flows + wraps (multiple per row) instead of taking a full
                     line. Every app shows its port(s) as small pills (even
                     single-port apps), coloured by each port's probe verdict
                     (up / down / pending). -->
                <div class="apps-drawer-tiles flex flex-wrap gap-2 fs-xs">
                  <template x-for="app in sortedHostApps(h)" :key="app.service_idx">
                    <div class="apps-drawer-tile"
                         :title="app.name + (app.catalog ? ' (' + app.catalog.name + ')' : '')">
                      <img :src="iconUrlFor(app.icon || (app.catalog && (app.catalog.icon || app.catalog.slug)) || app.name)"
                           alt="" width="16" height="16" class="rounded flex-shrink-0"
                           @error="$event.target.style.visibility='hidden'">
                      <a x-show="app.url" class="apps-drawer-tile-name apps-drawer-tile-name--link"
                         :href="app.url" target="_blank" rel="noopener" @click.stop
                         :title="(app.name || (app.catalog && app.catalog.name) || '') + ' — ' + (t('host_drawer.apps.open') || 'Open')"
                         x-text="app.name || (app.catalog && app.catalog.name) || (t('host_drawer.apps.unnamed') || 'unnamed')"></a>
                      <span x-show="!app.url" class="apps-drawer-tile-name"
                            x-text="app.name || (app.catalog && app.catalog.name) || (t('host_drawer.apps.unnamed') || 'unnamed')"></span>
                      <span class="apps-drawer-tile-ports">
                        <template x-for="pr in (app.port_results || [])" :key="pr.port">
                          <a class="apps-port-pill"
                             :class="'apps-port-pill--' + appsPortState(pr) + (appsPortHref(pr, h) ? ' apps-port-pill--link' : '')"
                             :href="appsPortHref(pr, h) || null"
                             :target="appsPortHref(pr, h) ? '_blank' : null"
                             rel="noopener"
                             @click.stop
                             :title="appsPortTitle(pr)">
                            <span class="apps-card-dot" :class="'apps-card-dot--' + appsPortState(pr)" aria-hidden="true"></span>
                            <span class="mono" x-text="pr.port + '/' + (pr.protocol || 'tcp')"></span>
                          </a>
                        </template>
                        <!-- No configured ports (e.g. a url-only chip) — fall back
                             to the app's rollup status dot so the tile still shows
                             a verdict. -->
                        <span x-show="!(app.port_results || []).length"
                              class="apps-card-dot" :class="'apps-card-dot--' + app.status" aria-hidden="true"></span>
                      </span>
                      <a x-show="app.url" :href="app.url" target="_blank" rel="noopener"
                         class="btn-ghost p-0.5 flex-shrink-0" @click.stop
                         :aria-label="t('host_drawer.apps.open') || 'Open'"
                         :title="t('host_drawer.apps.open') || 'Open'">
                        <svg width="12" height="12" aria-hidden="true">
                          <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-external-link"/>
                        </svg>
                      </a>
                    </div>
                  </template>
                </div>
                <div x-show="(h.apps || []).filter(a => a.status === 'degraded').length"
                     class="mt-2 fs-2xs text-[var(--warning)]"
                     x-text="(h.apps || []).filter(a => a.status === 'degraded').length + ' ' + (t('host_drawer.apps.degraded_suffix') || 'degraded')"></div>
                <div x-show="(h.apps || []).filter(a => a.status === 'down').length"
                     class="mt-2 fs-2xs text-[var(--danger)]"
                     x-text="(h.apps || []).filter(a => a.status === 'down').length + ' ' + (t('host_drawer.apps.down_suffix') || 'down')"></div>
              </section>
            </template>

            <!-- UPS — APC PowerNet-MIB data. Rendered
                     ONLY when the host probed via SNMP returned PowerNet
                     data — `host_ups_status` is the gate. Status badge
                     plus battery / load gauges using the same `.stat-bar`
                     primitive other cards use. Battery temperature shows
                     red above 40°C (APC's "warm" threshold for SLA cells),
                     battery percent shows red below 20% and amber below
                     50%, runtime uses fmtUpsRuntime for the human format. -->
            <!-- Card gate fires on ANY UPS field truthy — pre-fix
                     the gate required `host_ups_status` to be a non-
                     empty string, but a UPS whose SNMP probe extracted
                     battery_percent + battery_temp_c but not the output-
                     status OID (some basic Smart-UPS models) had the
                     entire card hidden despite having usable data. The
                     section also surfaces when the values are stale
                     (snapshot fallback), so a probe outage doesn't
                     blank the card. Live OR stale on any single field
                     is enough. -->
            <template x-if="!!(h.host_ups_status)
                                 || typeof h.host_battery_percent === 'number'
                                 || typeof h.host_battery_temp_c === 'number'
                                 || typeof h.host_load_percent === 'number'
                                 || h.host_battery_runtime_s
                                 || h.host_battery_status
                                 || isStaleField(h, 'host_ups_status')
                                 || isStaleField(h, 'host_battery_percent')
                                 || isStaleField(h, 'host_load_percent')">
              <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                <h4 class="fs-2xs uppercase tracking-wider text-[var(--text-faint)] mb-3 flex items-center gap-2">
                  <span x-text="t('host_drawer.ups.heading')"></span>
                  <span x-show="h.host_ups_status"
                        class="chip fs-2xs"
                        :class="[upsStatusPillClass(h.host_ups_status), isStaleField(h, 'host_ups_status') ? 'stale' : '']"
                        :title="isStaleField(h, 'host_ups_status') ? staleAge(h) : ''"
                        x-text="upsStatusLabel(h.host_ups_status)"></span>
                </h4>
                <dl class="drawer-dl fs-sm">
                  <template x-if="typeof h.host_battery_percent === 'number'">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.ups.battery')"></dt>
                  </template>
                  <template x-if="typeof h.host_battery_percent === 'number'">
                    <dd class="text-end"
                        :class="isStaleField(h, 'host_battery_percent') ? 'stale' : ''"
                        :title="isStaleField(h, 'host_battery_percent') ? staleAge(h) : ''">
                      <div class="flex items-center justify-end gap-2">
                        <div class="stat-bar w-24" x-bind="statBarBind((h.host_battery_percent || 0), 'hosts_extra.metrics.ups_battery')"
                             role="progressbar"
                             aria-valuemin="0"
                             aria-valuemax="100"
                             :aria-valuenow="(+h.host_battery_percent || 0).toFixed(0)"
                             :aria-valuetext="(+h.host_battery_percent || 0).toFixed(0) + '% — ' + t('host_drawer.ups.battery')"
                             :class="upsBatteryLevel(h.host_battery_percent)"
                             :style="'--w:' + (h.host_battery_percent || 0) + '%'">
                          <div class="fill"></div>
                        </div>
                        <span class="mono" x-text="(+h.host_battery_percent).toFixed(0) + '%'"></span>
                      </div>
                    </dd>
                  </template>
                  <template x-if="typeof h.host_load_percent === 'number'">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.ups.load')"></dt>
                  </template>
                  <template x-if="typeof h.host_load_percent === 'number'">
                    <dd class="text-end"
                        :class="isStaleField(h, 'host_load_percent') ? 'stale' : ''"
                        :title="isStaleField(h, 'host_load_percent') ? staleAge(h) : ''">
                      <div class="flex items-center justify-end gap-2">
                        <div class="stat-bar w-24" x-bind="statBarBind((h.host_load_percent || 0), 'hosts_extra.metrics.load_avg')"
                             role="progressbar"
                             aria-valuemin="0"
                             aria-valuemax="100"
                             :aria-valuenow="(+h.host_load_percent || 0).toFixed(0)"
                             :aria-valuetext="(+h.host_load_percent || 0).toFixed(0) + '% — ' + t('host_drawer.ups.load')"
                             :class="barLevel(h.host_load_percent)"
                             :style="'--w:' + (h.host_load_percent || 0) + '%'">
                          <div class="fill"></div>
                        </div>
                        <span class="mono" x-text="(+h.host_load_percent).toFixed(0) + '%'"></span>
                      </div>
                    </dd>
                  </template>
                  <template x-if="h.host_battery_runtime_s">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.ups.runtime')"></dt>
                  </template>
                  <template x-if="h.host_battery_runtime_s">
                    <dd class="text-end mono"
                        :class="isStaleField(h, 'host_battery_runtime_s') ? 'stale' : ''"
                        :title="isStaleField(h, 'host_battery_runtime_s') ? staleAge(h) : ''"
                        x-text="fmtUpsRuntime(h.host_battery_runtime_s)"></dd>
                  </template>
                  <template x-if="h.host_battery_temp_c">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.ups.battery_temp')"></dt>
                  </template>
                  <template x-if="h.host_battery_temp_c">
                    <dd class="text-end mono"
                        :class="[(+h.host_battery_temp_c) > 40 ? 'text-[var(--danger)]' : '', isStaleField(h, 'host_battery_temp_c') ? 'stale' : '']"
                        :title="isStaleField(h, 'host_battery_temp_c') ? staleAge(h) : ''"
                        x-text="(+h.host_battery_temp_c).toFixed(0) + '°C'"></dd>
                  </template>
                  <template x-if="h.host_battery_status">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.ups.battery_status')"></dt>
                  </template>
                  <template x-if="h.host_battery_status">
                    <dd class="text-end">
                        <span class="chip fs-2xs"
                              :class="[upsBatteryStatusPillClass(h.host_battery_status), isStaleField(h, 'host_battery_status') ? 'stale' : '']"
                              :title="isStaleField(h, 'host_battery_status') ? staleAge(h) : ''"
                              x-text="upsBatteryStatusLabel(h.host_battery_status)"></span>
                    </dd>
                  </template>
                </dl>
              </section>
            </template>

            <!-- HTTP / TLS / DNS probe card — seventh host-stats provider.
                     Renders when at least one URL has a probe result OR a
                     snapshot-stale value is present. Per-URL status pills
                     surface every URL in the operator's curated list +
                     the TLS expiry warning + the DNS resolution check.
                     Live or stale on any single field is enough so a
                     brief outage doesn't blank the card. -->
            <template x-if="(h.http_probe_enabled === true)
                                 && ((Array.isArray(h.host_http_urls) && h.host_http_urls.length > 0)
                                     || (h.host_http_url_count_total || 0) > 0
                                     || isStaleField(h, 'host_http_status_ok')
                                     || isStaleField(h, 'host_http_tls_expires_in_days'))">
              <section class="rounded border border-[var(--border)] bg-[var(--surface)] p-4 md:col-span-6">
                <h4 class="fs-2xs uppercase tracking-wider text-[var(--text-faint)] mb-3 flex items-center gap-2 flex-wrap">
                  <span x-text="t('host_drawer.http_probe.heading')"></span>
                  <!-- N/M URLs healthy rollup chip. Hidden when there
                       are no URLs (the gate above would suppress the
                       whole card in that case anyway). -->
                  <span x-show="(h.host_http_url_count_total || 0) > 0"
                        class="chip fs-2xs"
                        :class="(h.host_http_url_count_ok === h.host_http_url_count_total) ? 'pill-ok' : ((h.host_http_url_count_ok > 0) ? 'pill-warning' : 'pill-error')"
                        :title="isStaleField(h, 'host_http_url_count_total') ? staleAge(h) : ''"
                        x-text="t('host_drawer.http_probe.urls_summary', { ok: h.host_http_url_count_ok || 0, total: h.host_http_url_count_total || 0 })"></span>
                  <!-- Updated-when freshness label — mirrors the
                       host-drawer chart freshness convention. Hidden
                       until a sample has landed. -->
                  <span x-show="h.host_http_ts && h.host_http_ts > 0"
                        class="fs-3xs italic text-[var(--text-faint)] ms-auto"
                        :title="t('host_drawer.http_probe.last_updated_title')"
                        x-text="t('host_drawer.http_probe.last_updated', { age: fmtSecondsAgoLabel(Math.max(0, (Date.now() / 1000) - (h.host_http_ts || 0))) })"></span>
                </h4>
                <dl class="drawer-dl fs-sm">
                  <!-- DNS resolution outcome. Two-state chip + optional
                       dns_error tooltip when the lookup failed. -->
                  <template x-if="h.host_http_dns_resolved !== undefined && h.host_http_dns_resolved !== null">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.http_probe.dns_label')"></dt>
                  </template>
                  <template x-if="h.host_http_dns_resolved !== undefined && h.host_http_dns_resolved !== null">
                    <dd class="text-end">
                    <span class="chip fs-2xs"
                          :class="[h.host_http_dns_resolved ? 'pill-ok' : 'pill-error', isStaleField(h, 'host_http_dns_resolved') ? 'stale' : '']"
                          :title="isStaleField(h, 'host_http_dns_resolved') ? staleAge(h) : (h.host_http_dns_error || '')"
                          x-text="h.host_http_dns_resolved ? t('host_drawer.http_probe.dns_resolved') : t('host_drawer.http_probe.dns_failed')"></span>
                    </dd>
                  </template>
                  <!-- TLS cert expiry — three-state pill (green > warn,
                       amber within warn window, red expired). Threshold
                       from /api/me's client_config so the value is
                       operator-tunable via Admin → Config. -->
                  <template x-if="typeof h.host_http_tls_expires_in_days === 'number'">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.http_probe.tls_label')"></dt>
                  </template>
                  <template x-if="typeof h.host_http_tls_expires_in_days === 'number'">
                    <dd class="text-end">
                    <span class="chip fs-2xs"
                          :class="[httpProbeTlsPillClass(h.host_http_tls_expires_in_days), isStaleField(h, 'host_http_tls_expires_in_days') ? 'stale' : '']"
                          :title="isStaleField(h, 'host_http_tls_expires_in_days') ? staleAge(h) : ''"
                          x-text="(h.host_http_tls_expires_in_days >= 0)
                                  ? t('host_drawer.http_probe.tls_expires_in', { days: h.host_http_tls_expires_in_days })
                                  : t('host_drawer.http_probe.tls_expired', { days: Math.abs(h.host_http_tls_expires_in_days) })"></span>
                    </dd>
                  </template>
                  <!-- TLS subject / issuer rows — populated only when
                       the cert was successfully parsed AND the sampler
                       captured the RDN. Hidden when blank. -->
                  <template x-if="h.host_http_tls_subject">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.http_probe.tls_subject')"></dt>
                  </template>
                  <template x-if="h.host_http_tls_subject">
                    <dd class="text-end mono fs-xs"
                        :class="isStaleField(h, 'host_http_tls_subject') ? 'stale' : ''"
                        :title="isStaleField(h, 'host_http_tls_subject') ? staleAge(h) : ''">
                      <span x-text="h.host_http_tls_subject"></span>
                      <!-- Asset-inventory cert correlation — when the
                           host's asset record has linked cert child rows
                           (Type.ShortName=CERT or similar), surface a
                           chevron-link per cert so the operator can jump
                           to the renewal record without context-switching
                           to the asset UI. Hidden when no certs are
                           tracked upstream for this host. -->
                      <template x-for="cert in (assetForHost(h) && assetForHost(h).certs) || []" :key="cert.asset_id">
                        <a :href="cert.link_url || '#'"
                           :target="cert.link_url ? '_blank' : ''"
                           rel="noopener"
                           class="ms-2 fs-2xs inline-flex items-center gap-1 text-[var(--primary)] hover:underline"
                           :title="t('host_drawer.http_probe.cert_link_title', { name: cert.name, issuer: cert.issuer || '—', expires: cert.expires_at || '—' })"
                           :aria-label="t('host_drawer.http_probe.cert_link_aria', { name: cert.name })">
                          <span x-text="cert.name"></span>
                          <svg width="11" height="11" aria-hidden="true">
                            <use href="/img/ui-sprite.svg?v=__APP_VERSION__#icon-chevron-right"/>
                          </svg>
                        </a>
                      </template>
                    </dd>
                  </template>
                  <template x-if="h.host_http_tls_issuer">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.http_probe.tls_issuer')"></dt>
                  </template>
                  <template x-if="h.host_http_tls_issuer">
                    <dd class="text-end mono fs-xs"
                        :class="isStaleField(h, 'host_http_tls_issuer') ? 'stale' : ''"
                        :title="isStaleField(h, 'host_http_tls_issuer') ? staleAge(h) : ''"
                        x-text="h.host_http_tls_issuer"></dd>
                  </template>
                  <!-- Latency — primary URL's response time. -->
                  <template x-if="typeof h.host_http_latency_ms === 'number'">
                    <dt class="text-[var(--text-dim)]" x-text="t('host_drawer.http_probe.latency_label')"></dt>
                  </template>
                  <template x-if="typeof h.host_http_latency_ms === 'number'">
                    <dd class="text-end mono"
                        :class="isStaleField(h, 'host_http_latency_ms') ? 'stale' : ''"
                        :title="isStaleField(h, 'host_http_latency_ms') ? staleAge(h) : ''"
                        x-text="appsLatencyMs(h.host_http_latency_ms)"></dd>
                  </template>
                </dl>
                <!-- Per-URL status strip — one row per probed URL with
                     a status-code chip + the URL itself. Collapsed by
                     default beyond the row cap (8 on desktop, 3 on
                     narrow) with a "Show N more" button — keeps the
                     card compact for hosts probing 15+ URLs so the
                     SERVER HEALTH card below doesn't get pushed out of
                     view. Sorted failing → warning → ok so the most
                     actionable URLs are above the fold. -->
                <template x-if="Array.isArray(h.host_http_urls) && h.host_http_urls.length > 0">
                  <div class="mt-3">
                    <ul class="space-y-1.5 fs-xs">
                      <template x-for="u in httpProbeVisibleUrls(h)" :key="u.url">
                        <li class="flex items-center gap-2 flex-wrap">
                        <span class="chip fs-3xs"
                              :class="(u.status_ok && u.content_match_ok) ? 'pill-ok' : 'pill-error'"
                              x-text="(u.status_code !== null && u.status_code !== undefined) ? String(u.status_code) : '—'"></span>
                          <span class="mono text-[var(--text-dim)] break-all" x-text="u.url"></span>
                          <span x-show="u.error"
                                class="fs-3xs text-[var(--danger)] ms-auto"
                                x-text="u.error"></span>
                        </li>
                      </template>
                    </ul>
                    <!-- Show-all toggle — only renders when the URL list
                         overflows the collapsed cap. Button counts the
                         hidden remainder so the operator knows what's
                         below the fold without expanding to find out. -->
                    <button type="button"
                            x-show="httpProbeHasMoreUrls(h)"
                            @click="toggleHttpProbeShowAll(h)"
                            class="mt-2 btn btn-ghost fs-2xs"
                            x-text="httpProbeShowAll[h.id]
                                  ? t('host_drawer.http_probe.show_less')
                                  : t('host_drawer.http_probe.show_all', { n: httpProbeHiddenUrlCount(h) })"></button>
                  </div>
                </template>
                <!-- Latency history was promoted out of this card into
                     its own full-width metric card alongside CPU / Mem /
                     Disk / Net — see the metric-card--http-latency block
                     in the drawer's main metric grid. Keeps the chart
                     visually consistent with the other per-host charts
                     (same axes, range picker, freshness label). -->
                <!-- Per-row Test button — fires POST /api/hosts/{id}/http-probe/test
                     against this row's resolved URLs and renders per-URL
                     result chips inline. Operator drills in when a chip
                     flips amber / red and wants an immediate live re-
                     probe (no waiting for the next sampler tick). -->
                <div class="mt-3 flex items-center gap-2 flex-wrap"
                     x-show="isAdmin() && (h.http_probe_enabled || (Array.isArray(h.host_http_urls) && h.host_http_urls.length > 0))">
                  <button type="button"
