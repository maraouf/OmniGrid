<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PortaUpdate — Sign in</title>
<script>
  (function () {
    let pref = localStorage.getItem('theme') || 'auto';
    let sysLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
    let resolved = pref === 'auto' ? (sysLight ? 'light' : 'dark') : pref;
    document.documentElement.setAttribute('data-theme', resolved);
    // Apply the persisted language + direction ASAP so the login form
    // doesn't flash in the wrong direction. The full i18n helper below
    // handles dict loading and string substitution.
    let lang = localStorage.getItem('lang') || 'en';
    document.documentElement.setAttribute('lang', lang);
    document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
  })();
</script>
<link rel="icon" href="/img/logo/icon-512.png" />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body class="login">
 <div class="login-wrap">
  <img src="/img/logo/icon-512.png" alt="PortaUpdate" class="login-logo" />
  <form class="login-card" id="login" autocomplete="on">
    <h1 data-i18n="app.name">PortaUpdate</h1>
    <p class="sub" data-i18n="login.title">Sign in to continue.</p>

    <label for="u" data-i18n="login.username">Username</label>
    <input id="u" name="username" type="text" autofocus required />

    <label for="p" data-i18n="login.password">Password</label>
    <input id="p" name="password" type="password" required />

    <button type="submit" id="btn" data-i18n="login.sign_in">Sign in</button>

    <!-- OIDC SSO button. Hidden by default; unhidden once /api/auth/providers
         confirms the provider is configured. href is built from the current
         ?next= so the post-login redirect lands the user where they started. -->
    <div class="sso-wrap" id="ssoWrap" hidden>
      <div class="sso-divider"><span data-i18n="login.or">or</span></div>
      <a class="btn-sso" id="ssoBtn" href="#">
        <img src="/img/icons/authentik.svg" alt="" class="sso-icon" aria-hidden="true" />
        <span data-i18n="login.sso_button">Sign in with Authentik</span>
      </a>
    </div>

    <div class="err" id="err"></div>

    <div class="footer" id="ver"></div>
  </form>
 </div>

<script>
  // Minimal i18n helper — same shape as the one in index.html but tiny,
  // because the login page only renders a handful of strings. No language
  // picker here; the choice follows whatever the user last set in the app
  // (persisted in localStorage under 'lang').
  const I18N = {
    dict: {},
    code: 'en',
    flatten(obj, prefix) {
      prefix = prefix || '';
      const out = {};
      for (const k in obj) {
        const v = obj[k];
        const key = prefix ? prefix + '.' + k : k;
        if (v && typeof v === 'object' && !Array.isArray(v)) {
          Object.assign(out, this.flatten(v, key));
        } else {
          out[key] = v;
        }
      }
      return out;
    },
    async load(code) {
      try {
        const r = await fetch('/i18n/' + code + '.json', { cache: 'no-cache' });
        if (!r.ok) throw new Error('missing');
        const doc = await r.json();
        this.dict = this.flatten(doc);
        this.code = code;
        const dir = (doc._meta && doc._meta.dir) || 'ltr';
        document.documentElement.setAttribute('lang', code);
        document.documentElement.setAttribute('dir', dir);
      } catch (_) {
        // Silent — login still works with untranslated English DOM.
      }
    },
    t(key, vars) {
      let s = this.dict[key];
      if (s === undefined || s === '') {
        s = (window.__i18nEn && window.__i18nEn[key]);
        if (s === undefined || s === '') s = key;
      }
      if (vars) {
        for (const k in vars) {
          s = String(s).replaceAll('{' + k + '}', String(vars[k]));
        }
      }
      return s;
    },
  };
  window.t = I18N.t.bind(I18N);

  function applyI18nDom() {
    const els = document.querySelectorAll('[data-i18n]');
    for (let i = 0; i < els.length; i++) {
      const el = els[i];
      const key = el.getAttribute('data-i18n');
      const v = I18N.t(key);
      if (v && v !== key) el.textContent = v;
    }
  }

  (async function bootI18n() {
    // Always load English first so the missing-key fallback has a dict.
    try {
      const r = await fetch('/i18n/en.json', { cache: 'no-cache' });
      if (r.ok) {
        const doc = await r.json();
        window.__i18nEn = I18N.flatten(doc);
      }
    } catch (_) {}
    const lang = localStorage.getItem('lang') || 'en';
    if (lang !== 'en') await I18N.load(lang);
    else I18N.dict = window.__i18nEn || {};
    applyI18nDom();
  })();

  (function () {
    const form = document.getElementById('login');
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    const ver = document.getElementById('ver');
    const ssoWrap = document.getElementById('ssoWrap');
    const ssoBtn = document.getElementById('ssoBtn');

    // Show version so operators can sanity-check which build is live.
    fetch('/api/version').then(r => r.ok ? r.json() : null).then(v => {
      if (v && v.version) ver.textContent = 'v' + v.version;
    }).catch(() => {});

    function showErr(msg) {
      err.textContent = msg;
      err.classList.add('show');
    }
    function clearErr() {
      err.classList.remove('show');
      err.textContent = '';
    }

    function nextPath() {
      // Default to "/" but honor a ?next=<path> if it's a same-origin path.
      const p = new URLSearchParams(location.search).get('next') || '/';
      // Reject absolute / protocol-relative URLs — open-redirect defense.
      if (!p.startsWith('/') || p.startsWith('//')) return '/';
      return p;
    }

    // Advertise SSO once we know it's configured. Hidden by default so a
    // misconfigured deployment never shows a dead button; the endpoint is
    // public (no auth required) so the call completes even for anonymous
    // visitors.
    fetch('/api/auth/providers').then(r => r.ok ? r.json() : null).then(p => {
      if (p && p.oidc) {
        ssoBtn.href = '/api/oidc/login?next=' + encodeURIComponent(nextPath());
        ssoWrap.hidden = false;
      }
    }).catch(() => {});

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErr();
      btn.disabled = true;
      btn.textContent = window.t ? window.t('login.signing_in') : 'Signing in…';
      try {
        const body = new URLSearchParams({
          username: document.getElementById('u').value,
          password: document.getElementById('p').value,
        });
        const r = await fetch('/api/local-auth/login', {
          method: 'POST',
          body,
          credentials: 'same-origin',
        });
        if (r.ok) {
          location.href = nextPath();
          return;
        }
        if (r.status === 429) {
          const j = await r.json().catch(() => ({}));
          showErr(j.detail || (window.t ? window.t('login.too_many_attempts') : 'Too many attempts. Try again shortly.'));
        } else if (r.status === 401) {
          showErr(window.t ? window.t('login.invalid_credentials') : 'Invalid username or password.');
        } else {
          showErr(window.t ? window.t('login.sign_in_failed', { status: r.status }) : ('Sign-in failed (' + r.status + '). Try again.'));
        }
      } catch (_) {
        showErr(window.t ? window.t('login.network_error') : 'Network error. Try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = window.t ? window.t('login.sign_in') : 'Sign in';
      }
    });
  })();
</script>
</body>
</html>
